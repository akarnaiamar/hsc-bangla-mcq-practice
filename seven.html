<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">সৈয়দ মুজতবা আলীর 'গন্তব্য কাবুল' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। লভিকোটাল থেকে দক্কার দূরত্ব কত মাইল?
(ক) নয় (খ) দশ
(গ) এগারো (ঘ) বারো
উত্তর: (খ) দশ

২। "এর গান ওর সৌরভে মিলে গিয়েছে।"— উক্তিটি দ্বারা কী বোঝানো হয়েছে?
(ক) গান ও সৌরভ ভিন্নতাসূচক (খ) সুর ও সুগন্ধ একাকার
(গ) গান সুগন্ধের সৃষ্টি করে (ঘ) সুর সৌরভের পরিপূরক
উত্তর: (খ) সুর ও সুগন্ধ একাকার

উদ্দীপকের আলোকে ৩ ও ৪ নং প্রশ্নের উত্তর দাও:
মিথুনের পাহাড় দেখার শখ অনেক দিন থেকেই। তাই এবার গ্রীষ্মের ছুটিতে তিনি গিয়েছিলেন পার্বত্য জেলা খাগড়াছড়ি। সেখানে আঁকাবাঁকা পাহাড়ি রাস্তা আর দুই ধারে ঘন ঘন জঙ্গল দেখে তিনি অভিভূত হন। পাহাড়ের গা বেয়ে নেমে আসা রিসাং ঝরনার সুশীতল জল আর আলুটিলার গুহায় রোমাঞ্চকর অভিযাত্রা তাকে ভীষণভাবে নাড়া দেয়। তাছাড়া বিভিন্ন জাতি, ধর্ম ও বর্ণের পাহাড়ি অধিবাসীদের সাথে মিশে তার বিচিত্র অভিজ্ঞতা হয়।

৩। 'গন্তব্য কাবুল' রচনার কোন বৈশিষ্ট্য উদ্দীপকে প্রকাশিত হয়েছে?
(ক) আন্তরিকতা (খ) দেশপ্রেম
(গ) সৌন্দর্যপ্রিয়তা (ঘ) উচ্চাভিলাষ
উত্তর: (গ) সৌন্দর্যপ্রিয়তা

৪। প্রকাশ্য বৈশিষ্ট্যটি নিচের কোন বাক্যে বিদ্যমান?
i. দুই দিকে হাজার ফুট উঁচু পাথরের ন্যাড়া পাহাড়
ii. কত দেশের কত রকমের লোক পণ্যবাহিনীর সঙ্গে সঙ্গে চলেছে
iii. এর গান ওর সৌরভে মিশে গিয়েছে।
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

বিষয়বস্তু ও লাইনের ধারায় বহুনির্বাচনি প্রশ্ন ও উত্তর
৫। সৈয়দ মুজতবা আলী কত সালে জন্মগ্রহণ করেন?
(ক) ১৯০৪ সালে (খ) ১৯০৫ সালে
(গ) ১৯০৬ সালে (ঘ) ১৯০৭ সালে
উত্তর: (ক) ১৯০৪ সালে

৬। সৈয়দ মুজতবা আলী কত তারিখে জন্মগ্রহণ করেন?
(ক) ১১ই সেপ্টেম্বর, ১৯০৪ (খ) ১৩ই সেপ্টেম্বর, ১৯০৪
(গ) ১৪ই সেপ্টেম্বর, ১৯০৫ (ঘ) ১৫ই সেপ্টেম্বর, ১৯০৫
উত্তর: (খ) ১৩ই সেপ্টেম্বর, ১৯০৪

৭। সৈয়দ মুজতবা আলী কোথায় জন্মগ্রহণ করেন?
(ক) রহিমগঞ্জ (খ) কমলগঞ্জ
(গ) করিমগঞ্জ (ঘ) গোলাপগঞ্জ
উত্তর: (গ) করিমগঞ্জ

৮। সৈয়দ মুজতবা আলীর পৈতৃক নিবাস কোথায়?
(ক) যশোর (খ) সিলেট
(গ) বগুড়া (ঘ) গাইবান্ধা
উত্তর: (খ) সিলেট
(দ্রষ্টব্য: ছবিতে প্রশ্নটি 'পিতার নাম' লেখা থাকলেও অপশন অনুযায়ী এটি পৈতৃক নিবাস হবে)

৯। সৈয়দ মুজতবা আলীর পিতার নাম কী?
(ক) সৈয়দ সিকান্দার আলী (খ) সৈয়দ মোশারফ আলী
(গ) সৈয়দ ইকরাম আলী (ঘ) সৈয়দ জহির আলী
উত্তর: (ক) সৈয়দ সিকান্দার আলী

১০। সৈয়দ মুজতবা আলীর শিক্ষাজীবনের অধিকাংশ সময় কোথায় কেটেছে?
(ক) করিমগঞ্জ (খ) রোয়াকপুর
(গ) শান্তিনিকেতন (ঘ) সিলেট
উত্তর: (গ) শান্তিনিকেতন

১১। সৈয়দ মুজতবা আলী কোন বিশ্ববিদ্যালয় থেকে স্নাতক ডিগ্রি লাভ করেন?
(ক) কলকাতা (খ) যাদবপুর
(গ) আলিগড় (ঘ) বিশ্বভারতী
উত্তর: (ঘ) বিশ্বভারতী

১২। সৈয়দ মুজতবা আলী কত সালে স্নাতক ডিগ্রি লাভ করেন?
(ক) ১৯২৫ সালে (খ) ১৯২৬ সালে
(গ) ১৯২৭ সালে (ঘ) ১৯২৮ সালে
উত্তর: (খ) ১৯২৬ সালে

১৩। সৈয়দ মুজতবা আলী কোন বিশ্ববিদ্যালয় থেকে পিএইচডি ডিগ্রি লাভ করেন?
(ক) টরেন্টো বিশ্ববিদ্যালয় (খ) আলীগড় বিশ্ববিদ্যালয়
(গ) জার্মানির বন বিশ্ববিদ্যালয় (ঘ) বিশ্বভারতী বিশ্ববিদ্যালয়
উত্তর: (গ) জার্মানির বন বিশ্ববিদ্যালয়

১৪। সৈয়দ মুজতবা আলী কোথায় কিছুকাল অধ্যাপনা করেন?
(ক) সিলেট (খ) শান্তিনিকেতন
(গ) আফগানিস্তান (ঘ) করিমগঞ্জ
উত্তর: (গ) আফগানিস্তান

১৫। সৈয়দ মুজতবা আলী কোন সাহিত্যের প্রতি বিশেষ অনুরাগী ছিলেন?
(ক) নজরুল সাহিত্য (খ) জীবনানন্দ সাহিত্য
(গ) রবীন্দ্র সাহিত্য (ঘ) গোবিন্দদাস সাহিত্য
উত্তর: (গ) রবীন্দ্র সাহিত্য

১৬। কোন বিষয়ে সৈয়দ মুজতবা আলীর বিশেষ পাণ্ডিত্য ছিল?
(ক) ভাষাতত্ত্ব (খ) জীবন বাস্তবতা
(গ) সৌন্দর্যতত্ত্ব (ঘ) সাহিত্যিক রসবোধ
উত্তর: (ঘ) সাহিত্যিক রসবোধ

১৭। সৈয়দ মুজতবা আলীর রচনার মুখ্য প্রবণতা কোনটি?
(ক) আধ্যাত্মিক দর্শন (খ) জীবন বাস্তবতা
(গ) সৌন্দর্যতত্ত্ব (ঘ) সাহিত্যিক রসবোধ
উত্তর: (ঘ) সাহিত্যিক রসবোধ

১৮। নিচের কোনটি সৈয়দ মুজতবা আলী রচিত গ্রন্থ?
(ক) চোরাবালি (খ) যোগাযোগ
(গ) শবনম (ঘ) চতুরঙ্গ
উত্তর: (গ) শবনম

১৯। নিচের কোনটি সৈয়দ মুজতবা আলীর গ্রন্থ নয়?
(ক) দেশে বিদেশে (খ) পঞ্চতন্ত্র
(গ) পথের পাঁচালী (ঘ) শবনম
উত্তর: (গ) পথের পাঁচালী

২০। সৈয়দ মুজতবা আলী কত সালে মৃত্যুবরণ করেন?
(ক) ১৯৭১ (খ) ১৯৭২
(গ) ১৯৭৩ (ঘ) ১৯৭৪
উত্তর: (ঘ) ১৯৭৪

২১। সৈয়দ মুজতবা আলী কত সালে মৃত্যুবরণ করেন?
(ক) ১০ই ফেব্রুয়ারি ১৯৭৪ (খ) ১১ই ফেব্রুয়ারি ১৯৭৪
(গ) ১২ই ফেব্রুয়ারি ১৯৭৪ (ঘ) ১৩ই ফেব্রুয়ারি ১৯৭৪
উত্তর: (খ) ১১ই ফেব্রুয়ারি ১৯৭৪

২২। সৈয়দ মুজতবা আলী কোথায় মৃত্যুবরণ করেন?
(ক) করিমগঞ্জে (খ) ঢাকায়
(গ) শান্তিনিকেতনে (ঘ) আফগানিস্তানে
উত্তর: (খ) ঢাকায়

২৩। লেখক টাপনি থেকে কত দামে শার্ট কিনেছিলেন?
(ক) আট সিকে দিয়ে (খ) নয় সিকে দিয়ে
(গ) পাঁচ সিকে দিয়ে (ঘ) সাত সিকে দিয়ে
উত্তর: (খ) নয় সিকে দিয়ে

২৪। ইউরোপীয়ান থার্ড প্রতিষ্ঠানটি কোন বাঙালির জন্য ভারতের সর্বত্র আনাগোনা করত?
(ক) সাহেব (খ) বাবু
(গ) গোয়েন্দা (ঘ) বিচক্ষণ
উত্তর: (ঘ) বিচক্ষণ

২৫। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনির লেখক কোথা থেকে থার্ডে উঠেছিলেন?
(ক) করিমগঞ্জ (খ) হাওড়া
(গ) শিলিগুড়ি (ঘ) পশ্চিমবঙ্গ
উত্তর: (খ) হাওড়া

২৬। “এটা ইউরোপীয়ানদের জন্য।”— কথাটি কে বলেছিল?
(ক) লেখক (খ) ফিরিঙ্গি
(গ) বৃদ্ধ (ঘ) স্টেশনমাস্টার
উত্তর: (খ) ফিরিঙ্গি

২৭। বাংলা শব্দের কোথায় অনুস্বার যোগ করলে সংস্কৃত হয়?
(ক) প্রথমে (খ) মাঝে
(গ) শেষে (ঘ) শেষের আগে
উত্তর: (গ) শেষে

২৮। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনি—
(ক) হাওড়া (খ) করিমগঞ্জ
(গ) তালতলা (ঘ) দ. দিনাজপুর
উত্তর: (গ) তালতলা

২৯। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনিতে লেখকের ভ্রমণের উৎসাহ চুপসে আসছিল কেন?

(গ) অসুস্থ ছিলেন বলে (ঘ) ভালো গাড়ি পাননি বলে

৩০। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনিতে লেখকের মতে কোনটি কাপুরুষজনোচিত?
(ক) ভালো সঙ্গী না পাওয়ার (খ) কুকুর দেখে ভয় পাওয়া
(গ) নিজেকে একা ভাবা (ঘ) নিজের অপারগতা লুকানো

৩১। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনিতে কে বিলেতি কায়দা জানে?
(ক) লেখক (খ) ফিরিঙ্গি
(গ) স্টেশনমাস্টার (ঘ) লেখকের সঙ্গী
উত্তর: (খ) ফিরিঙ্গি

৩২। সাহেবের খাবার বের করতে দেখে লেখকের অভিব্যক্তি কেমন হলো?
(ক) মুখ উজ্জ্বল হয়ে উঠল (খ) চোখ দুটো জমে যেতে লাগল
(গ) মন খারাপ হয়ে গেল (ঘ) অবাক হয়ে গেলেন
উত্তর: (খ) চোখ দুটো জমে যেতে লাগল

৩৩। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনিতে লেখক কোথা থেকে খাবার এনেছিলেন?
(ক) হাওড়া ব্রিজ (খ) ক্যানিংগড়
(গ) জাকারিয়া স্ট্রিট (ঘ) শান্তিনিকেতন
উত্তর: (গ) জাকারিয়া স্ট্রিট

৩৪। ‘গন্তব্য কাবুল’ রচনায় কোন মাসের গরমের কথা উল্লেখ আছে?
(ক) মার্চ (খ) এপ্রিল
(গ) মে (ঘ) জুন
উত্তর: (ঘ) জুন

৩৫। ‘গন্তব্য কাবুল’ রচনায় কয়টা বাজতে না বাজতেই রোদ গাড়িতে প্রবেশ করে?

(গ) আটটা (ঘ) নয়টা
উত্তর: (খ) সাতটা

৩৬। ‘গন্তব্য কাবুল’ রচনায় রোদ আর গাড়ির পাল্লায় কার প্রাণ যায়?
(ক) পথিকের (খ) রান্নার
(গ) যাত্রীদের (ঘ) চালকের
উত্তর: (গ) যাত্রীদের

৩৭। ‘গন্তব্য কাবুল’ রচনায় কাদের দাড়ির হরেক রকম বাহার?

(গ) শিখ সর্দারজিদের (ঘ) পথিক
উত্তর: (গ) শিখ সর্দারজিদের

৩৮। ‘গন্তব্য কাবুল’ রচনায় কে স্টেশনে আসবেন লেখককে নিতে?
(ক) বন্ধু (খ) বন্ধুর বন্ধু
(গ) শিখ বন্ধু (ঘ) পাঠান বন্ধু
উত্তর: (খ) বন্ধুর বন্ধু

৩৯। ‘গন্তব্য কাবুল’ রচনায় কে লেখকের সাথে প্রথম আলাপ আরম্ভ করলেন?

(গ) ইরাকি মেয়ে (ঘ) বেদুইন নারী
উত্তর: (ক) বুড়ো সর্দার

৪০। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনির কোন স্টেশনে এক গাড়ি বাঙালি নামে না?
(ক) কাবুল (খ) পেশাওয়ার
(গ) হাওড়া (ঘ) যাদবপুর
উত্তর: (খ) পেশাওয়ার

৪১। কতক্ষণ অপেক্ষা করলে বন্ধুর বন্ধু লেখককে খুঁজে নেবেন?
(ক) দু-মিনিট (খ) তিন-মিনিট
(গ) চার-মিনিট (ঘ) পাঁচ-মিনিট
উত্তর: (ক) দু-মিনিট

(গ) টি শার্ট-প্যান্ট (ঘ) গেঞ্জি-ধুতি
উত্তর: (খ) ধুতি-পাঞ্জাবি

৪৩। কে লেখককে আরও বোকা বানাবেন বলে তাঁর ধারণা?

(গ) টিটি (ঘ) বুড়ো সর্দার

(গ) ফিরিঙ্গি (ঘ) দোকানদার
উত্তর: (ক) সর্দারজি

(ক) সাড়ে তিন গজ (খ) সাড়ে চার গজ
(গ) সাড়ে পাঁচ গজ (ঘ) সাড়ে ছয় গজ র
উত্তর: (ক) সাড়ে তিন গজ

৪৬। লাহোরে শিলোয়ার বানাতে কী পরিমাণ কাপড় লাগে—
(ক) সাড়ে চার গজ (খ) সাড়ে পাঁচ গজ
(গ) সাড়ে ছয় গজ (ঘ) সাড়ে সাত গজ

(গ) সাড়ে দশ গজ (ঘ) পুরো থান
উত্তর: (গ) সাড়ে দশ গজ

(গ) পঁচিশ গজ (ঘ) ত্রিশ গজ
উত্তর: (খ) বিশ গজ

৫০। পাঠানমুলুকের শিলোয়ার কোন কাপড় দিয়ে বানানো?
(ক) লিনিয়ান (খ) সুতি
(গ) খাদি (ঘ) খাকি শার্টিন
উত্তর: (ঘ) খাকি শার্টিন

৫১। কে বুড়ো বয়সেও বায়োস্কোপ দেখতে যান?
(ক) লেখক (খ) সর্দারজি
(গ) পাঠান (ঘ) ফিরিঙ্গি
উত্তর: (খ) সর্দারজি

৫২। কার একপাল নাতি-নাতনি?
(ক) লেখকের (খ) ফিরিঙ্গির
(গ) সর্দারজির (ঘ) ইংরেজ বাবুর
উত্তর: (গ) সর্দারজির

৫৩। দুশো বছরের পুরনো গল্পে মেম সাহেব কতগুলো ফ্রক পরেছিলেন?

(গ) চৌদ্দটি (ঘ) ষোলোটি
উত্তর: (খ) দশটি

(ক) বেদুইনরা (খ) সর্দারজিরা
(গ) পাঠানরা (ঘ) ফিরিঙ্গি
উত্তর: (গ) পাঠানরা

৫৬। কোন কথাটায় লেখক আরামবোধ করেননি?

(গ) শিলোয়ারের হিসাবের কথায়
(ঘ) সর্দারজির প্রীতিপ্রীতির কথায়

(গ) ভোর রাতে (ঘ) রাত আটটায়
উত্তর: (খ) রাত নয়টায়

৫৮। লেখকের বন্ধুর বন্ধুর নাম কী?

(ক) বাঙালি (খ) শিখ
(গ) পাঠান (ঘ) ফিরিঙ্গি
উত্তর: (গ) পাঠান

৬০। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনির পাঠানের অভ্যর্থনা কেমন ছিল?

(গ) কৃত্রিম (ঘ) দায়সারা

(ক) পাঁচ দিন (খ) ছয় দিন
(গ) সাত দিন (ঘ) আট দিন
উত্তর: (গ) সাত দিন

৬২। পেশাওয়ার থেকে যাত্রা করার সময় লেখকের কী মনে হলো?
(ক) ভীষণ একা (খ) ভয়ংকর একা
(গ) চির একা (ঘ) নিঃসঙ্গ একা
উত্তর: (খ) ভয়ংকর একা

(ঘ) প্রিয়জনের কথা মনে পড়েছে বলে
উত্তর: (গ) আফগানিস্তানের সবাই নিজেদের প্রাণ নিয়ে ব্যস্ত বলে

৬৪। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনির ড্রাইভার শিখ সর্দারজির বয়স কত?
(ক) ষাটের কাছাকাছি (খ) পঞ্চাশের কাছাকাছি
(গ) চল্লিশের কাছাকাছি (ঘ) সত্তরের কাছাকাছি
উত্তর: (ক) ষাটের কাছাকাছি

৬৫। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনির ড্রাইভার শিখ সর্দারজির কী অসুখ ছিল?
(ক) মৃগী (খ) ডায়াবেটিস
(গ) রাতকানা (ঘ) কুষ্ঠ
উত্তর: (গ) রাতকানা

(গ) ছয়টি (ঘ) সাতটি
উত্তর: (গ) ছয়টি

(গ) টিভিতে (ঘ) বেতারে
উত্তর: (ঘ) বেতারে

৬৮। ‘গন্তব্য কাবুল’ ভ্রমণকাহিনির কাবুলরা প্রায় সবকিছু কোথা থেকে আমদানি করে?

উত্তর: (খ) হিন্দুস্তান

উদ্দীপকের আলোকে ১৫৫ ও ১৫৬ নং প্রশ্নের উত্তর দাও:
সুজন ও নির্মল ইন্ডিয়া ট্যুরের জন্য ঢাকা থেকে রওনা হয়। তারা সারা রাস্তায় অনেক ধরনের পরিকল্পনা করে। তাদের গাড়ি যখন বেনাপোল পৌঁছায় তখন সেখানে চেক হয় পাসপোর্ট। তারা দুইজন নির্বিঘ্নে পার হলেও অনেকেই সেখানে আটকে যায়। বিশেষ করে ব্যবসায়ীরা। তখন সুবল বলে এটা পার হওয়া বেশ ঝামেলার।

উত্তর: (খ) খাইবার পাস পার হওয়া

        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            const filteredData = wrongQuestionsOnly
                ? data.map((q, i) => ({ ...q, originalIndex: i }))
                    .filter((q, i) => userAnswers[i] && userAnswers[i] !== q.answer)
                : data.map((q, i) => ({ ...q, originalIndex: i }));

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
        };
    </script>
</body>

</html>
