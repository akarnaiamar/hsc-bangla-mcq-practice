<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">আবু জাফর ওবায়দুল্লাহ এর 'আমি কিংবদন্তির কথা বলছি' পদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবির পূর্বপুরুষের পিঠে কীসের মতো ক্ষত ছিল? 
(ক) কৃষ্ণচূড়া (খ) রক্তজবা
(গ) পশুর থাবা (ঘ) শ্বাপদের
উত্তর: (খ) রক্তজবা

২। 'আমি কিংবদন্তির কথা বলছি' কবিতায় রক্তজবার প্রসঙ্গ যে অর্থে ব্যবহৃত হয়েছে— 
(ক) অন্তমিত রক্তিম সূর্য (খ) জাতীয় চেতনা
(গ) রক্তের প্রয়োজনীয়তা (ঘ) অত্যাচারের তাজা আঘাত
উত্তর: (ঘ) অত্যাচারের তাজা আঘাত

৩। কবির মতে কর্ষিত জমির প্রতিটি শস্যদানা কী? 
(ক) গান (খ) স্লোগান
(গ) কবিতা (ঘ) গদ্য
উত্তর: (গ) কবিতা

৪। জিহ্বায় উচ্চারিত কেমন শব্দ কবিতা? 
(ক) তীক্ষ্ণ (খ) কঠিন
(গ) সহজ (ঘ) সত্য
উত্তর: (ঘ) সত্য

৫। যে কবিতা শুনতে জানে না সে মায়ের কোলে শুয়ে কী শুনতে পারে না? 
(ক) গান (খ) কবিতা
(গ) ছড়া (ঘ) গল্প
উত্তর: (ঘ) গল্প

৬। কার ভালোবাসার সুকণ্ঠ সংগীত কবিতা? 
(ক) মায়ের (খ) বোনের
(গ) সুপুরুষের (ঘ) শিল্পীর
উত্তর: (গ) সুপুরুষের

৭। 'আমি কিংবদন্তির কথা বলছি' কবিতায়— যে গাভীর পরিচর্যা করে, জননীর আশীর্বাদ তাকে কী করে? 
(ক) দীর্ঘায়ু (খ) দীর্ঘদেহী
(গ) বলিষ্ঠ (ঘ) সমৃদ্ধ
উত্তর: (ক) দীর্ঘায়ু

৮। "একটি উজ্জ্বল জানালার কথা বলছি"— এখানে উজ্জ্বল জানালা কীসের প্রতীক? 
(ক) স্বাধীনতার সূর্য (খ) জ্ঞানের পূর্ণ বিকাশ
(গ) চিন্তার স্বাধীনতা (ঘ) মুক্তজীবনের প্রত্যাশা
উত্তর: (ঘ) মুক্তজীবনের প্রত্যাশা

৯। 'আমি কিংবদন্তির কথা বলছি' কবিতায় মুক্তির পূর্বশর্ত কী? 
(ক) শান্তি (খ) সাহসী
(গ) যুদ্ধ (ঘ) স্বাধীনতা
উত্তর: (গ) যুদ্ধ

১০। ভাষা-আন্দোলন ও মুক্তিযুদ্ধ কোন কবির কবিতায় বিষয় হিসেবে বিশেষ প্রাধান্য পেয়েছে? 
(ক) কাজী নজরুল ইসলাম (খ) আবু জাফর ওবায়দুল্লাহ
(গ) জীবনানন্দ দাশ (ঘ) সুফিয়া কামাল
উত্তর: (খ) আবু জাফর ওবায়দুল্লাহ

১১। চাষি খেতে চালাচ্ছে হাল, তাঁতি বসে তাঁত বোনে, জেলে ফেলে জাল— উদ্দীপকটিতে 'আমি কিংবদন্তির কথা বলছি' কবিতার যে চরণের মিল রয়েছে— 
(ক) তাঁর করতলে পলিমাটির সৌরভ ছিল
(খ) পতিত জমি আবাদের কথা বলতেন
(গ) অরণ্য ও শ্বাপদের কথা বলতেন
(ঘ) কর্ষিত জমির প্রতিটি শস্যদানা কবিতা
উত্তর: (ক) তাঁর করতলে পলিমাটির সৌরভ ছিল

১২। 'তাঁর পিঠে রক্ত জবার মতো ক্ষত ছিল'—এ চরণটিতে কার পিঠের ক্ষতকে নির্দেশ করা হয়েছে? 
(ক) কবির পূর্বপুরুষের (খ) বাংলার কৃষকদের
(গ) মুক্তিযোদ্ধাদের (ঘ) কবির পিতার
উত্তর: (ক) কবির পূর্বপুরুষের

১৩। "তাঁর করতলে পলিমাটির সৌরভ ছিল"— 'আমি কিংবদন্তির কথা বলছি' কবিতার চরণটিতে বোঝানো হয়েছে পূর্বপুরুষদের—
(ক) দাসত্ব (খ) শ্রমনিষ্ঠা
(গ) ভূমিনির্ভরতা (ঘ) মৃত্তিকা সংলগ্নতা
উত্তর: (ঘ) মৃত্তিকা সংলগ্নতা

১৪। 'কবিতা'কে কবি কী বলে অভিহিত করেছেন? [রা. বো. ১৮]
(ক) অতিক্রান্ত পাহাড় (খ) উনোনের আগুন
(গ) কর্ষিত জমির শস্যদানা (ঘ) পলিমাটির সৌরভ
উত্তর: (গ) কর্ষিত জমির শস্যদানা

১৫। পূর্বপুরুষের পিঠে রক্তজবার মতো ক্ষত ছিল। কারণ তিনি— [চ. বো. ১৮]
(ক) ক্রীতদাস ছিলেন (খ) শিকারি ছিলেন
(গ) পশুর দ্বারা আক্রান্ত হয়েছিলেন (ঘ) অস্ত্রের আঘাতপ্রাপ্ত হয়েছিলেন
উত্তর: (ক) ক্রীতদাস ছিলেন

১৬। 'তাঁর পিঠে রক্তজবার মতো ক্ষত ছিল'— কারণ তিনি ছিলেন— [দি. বো. ১৬]
(ক) যোদ্ধা (খ) ক্রীতদাস
(গ) অভিশপ্ত (ঘ) বন্যপশু দ্বারা আক্রান্ত
উত্তর: (খ) ক্রীতদাস

১৭। 'আমি কিংবদন্তির কথা বলছি' কবিতায় 'জননীর আশীর্বাদ' কাকে দীর্ঘায়ু করবে? [কু. বো. ২২]
(ক) যে গাভীর পরিচর্যা করে (খ) যে মৎস্য লালন করে
(গ) যে লৌহ খণ্ডকে প্রজ্বলিত করে (ঘ) যে কর্ষণ করে
উত্তর: (ক) যে গাভীর পরিচর্যা করে

১৮। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবির মা কীসের কথা বলতেন? [দি. বো. ২২]
(ক) সাগরের (খ) নদীর
(গ) পাহাড়ের (ঘ) গাছপালার
উত্তর: (খ) নদীর

১৯। 'আমি কিংবদন্তির কথা বলছি' কবিতায় যে কবিতা শুনতে জানে না সে কী শুনবে? [য. বো. ১৯]
(ক) উচ্চারিত সত্য (খ) অরণ্য এবং শ্বাপদের কথা
(গ) প্রবহমান নদীর কলতান (ঘ) ঝড়ের আর্তনাদ
উত্তর: (ঘ) ঝড়ের আর্তনাদ

২০। 'আমি কিংবদন্তির কথা বলছি' কবিতায় "ভালোবাসা দিলে মা মরে যায়"— চরণটির তাৎপর্য কী? [ঢ. বো. সি. বো. ১৮]
(ক) মায়ের ছেলেদের চলে যাওয়া (খ) মায়ের গল্প শুনতে না পারা
(গ) ছেলেদের জন্য মায়ের উৎকণ্ঠা (ঘ) দেশের জন্য সন্তানের মায়াত্যাগ
উত্তর: (ঘ) দেশের জন্য সন্তানের মায়াত্যাগ

২১। 'কিংবদন্তি' শব্দের অর্থ কী? [রা. বো., ব. বো. ২২]
(ক) ঐতিহ্য (খ) ইতিহাস
(গ) সুনাম (ঘ) জনশ্রুতি
উত্তর: (ঘ) জনশ্রুতি

২২। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি কার যুদ্ধের কথা বলছেন? [য. বো. ২২]
(ক) ভাইয়ের (খ) বোনের
(গ) মায়ের (ঘ) পূর্ব পুরুষদের
উত্তর: (ক) ভাইয়ের

২৩। 'আমরা কি তাঁর মতো কবিতার কথা বলতে পারবো?'— এ অংশে কবির কোন আকাঙ্ক্ষা ব্যক্ত হয়েছে? [ব. বো. ১৭]
(ক) প্রতিবাদী চেতনার (খ) সৌন্দর্যবোধ প্রকাশের
(গ) ভাষার প্রগাঢ়তার (ঘ) স্বদেশপ্রীতির
উত্তর: (ক) প্রতিবাদী চেতনার

২৪। 'আমি কিংবদন্তির কথা বলছি'— কবিতায় জননীর আশীর্বাদে কে দীর্ঘায়ু হবে? [ব. বো. ১৬]
(ক) যে কর্ষণ করে (খ) গাভীর পরিচর্যাকারী
(গ) মৎস্য লালনকারী (ঘ) লৌহখণ্ড প্রজ্বলনকারী
উত্তর: (খ) গাভীর পরিচর্যাকারী

২৫। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি কেন তাঁর পূর্ব পুরুষের কথা বলেছেন? [য. বো. ২২]
(ক) সাহসী ছিল বলে (খ) নিপীড়িত হয়েছে বলে
(গ) গৌরবোজ্জ্বল ইতিহাস রয়েছে বলে (ঘ) লৌহখণ্ড প্রজ্বলনকারী
উত্তর: (গ) গৌরবোজ্জ্বল ইতিহাস রয়েছে বলে

২৬। 'আমি কিংবদন্তির কথা বলছি' কবিতায় 'বিচলিত স্নেহ' বলতে কবি কী বুঝিয়েছেন? [ব. বো. ১৯]
(ক) কপট মায়া (খ) লোক দেখানো আদর
(গ) আপনজনের উৎকণ্ঠা (ঘ) সন্ত্রস্ত ভালোবাসা
উত্তর: (গ) আপনজনের উৎকণ্ঠা

২৭। আমি যেখানেই থাকি, যেমনি থাকি, সর্বদা মনে বাংলাদেশকেই লালন করি— উল্লিখিত অংশ 'আমি কিংবদন্তির কথা বলছি' কবিতার কোন মনোভাবকে উপস্থাপন করে? [রা. বো. ১৭]
(ক) শেকড়সন্ধানী (খ) দেশদরদি
(গ) প্রকৃতি চেতনা (ঘ) স্বাধীনতার
উত্তর: (ক) শেকড়সন্ধানী

২৮। 'একটি উজ্জ্বল জানালার কথা বলছি'— এখানে 'উজ্জ্বল জানালা' কীসের প্রতীক? [য. বো. ১৮]
(ক) স্বাধীনতার সূর্য (খ) জ্ঞানের পূর্ণ বিকাশ
(গ) চিন্তার স্বাধীনতা (ঘ) মুক্ত জীবনের প্রত্যাশা
উত্তর: (ঘ) মুক্ত জীবনের প্রত্যাশা

২৯। কোন পঙক্তিটি 'চিত্রকল্প' বা 'ইমেজ'-এর প্রকৃষ্ট উদাহরণ? [ঢা. বো. ২২]
(ক) তাহারেই পড়ে মনে, ভুলিতে পারি না কোনো মতে।
(খ) মানুষ তবুও ঋণী পৃথিবীরই কাছে।
(গ) কর্ষিত জমি প্রতিটি শস্যদানা কবিতা।
(ঘ) আবার ফুটেছে দ্যাখো কৃষ্ণচূড়া থরে থরে শহরের পথে–
উত্তর: (গ) কর্ষিত জমি প্রতিটি শস্যদানা কবিতা।

৩০। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কোন শব্দটি ঐতিহ্যের প্রতীক হয়ে উঠেছে? [সি. বো. ২২]
(ক) পূর্বপুরুষ (খ) ক্রীতদাস
(গ) কিংবদন্তি (ঘ) কবিতা
উত্তর: (গ) কিংবদন্তি

বহুপদী সমাপ্তিসূচক প্রশ্নোত্তর
৩১। "গর্ভবতী বোনের মৃত্যুর কথা বলছি"— [ম. বো. ২০]
i. আর্তনাদ
ii. আনন্দ
iii. বিদ্রোহ
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৩২। সূর্যকে হৃদপিণ্ডে ধরে রাখার অর্থ হলো— [রা. বো. ২০]
i. মুক্তির অনিবার্যতায়
ii. সর্বশক্তিকে ধারণ
iii. সামর্থ্য অর্জন
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩৩। কবি আবু জাফর ওবায়দুল্লাহর মতে, কবিতা হলো— [য. বো. ১৮]
i. সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান
ii. মায়ের কোলে শুয়ে গল্প শোনা
iii. কর্ষিত জমির প্রতিটি শস্যদানা
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৩৪। 'বিচলিত স্নেহ' বলতে 'আমি কিংবদন্তির কথা বলছি' কবিতায় কী বোঝানো হয়েছে? [সি. বো. ১৮]
i. আপনজনের উৎকণ্ঠা
ii. ভালোবাসা আর শঙ্কা
iii. বিফল স্নেহ
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩৫। 'আমি কিংবদন্তির কথা বলছি' বলতে কবি বোঝাতে চেয়েছেন— [চ. বো. ২২]
i. বাঙালির হাজার বছরের ইতিহাস-ঐতিহ্য
ii. বাঙালির সুদীর্ঘকালের শোষণ-বঞ্চনার ইতিকথা
iii. অন্যায়-অত্যাচারের বিরুদ্ধে বাঙালির শাশ্বত প্রতিবাদী সত্তা
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

অভিন্ন তথ্যভিত্তিক প্রশ্নোত্তর
❖ উদ্দীপকের আলোকে ৩৬ ও ৩৭ নং প্রশ্নের উত্তর দাও: কাঁটা হেরি ক্ষান্ত কেন কমল তুলিতে

দুঃখ বিনা সুখ লাভ হয় কি মহীতে?

৩৬। উদ্দীপকটি 'আমি কিংবদন্তির কথা বলছি' কবিতার কোন চরণকে সমর্থন করছে? [ব. বো. ২৩]
(ক) তাঁর পিঠে রক্তজবার মতো ক্ষত ছিল
(খ) সে সন্তানের জন্য মরতে পারে না
(গ) সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান কবিতা
(ঘ) জিহ্বায় উচ্চারিত প্রতিটি মুক্ত শব্দ কবিতা
উত্তর: (গ) সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান কবিতা

৩৭। উদ্দীপকে 'আমি কিংবদন্তির কথা বলছি' কবিতার যে বিষয় প্রকাশিত হয়েছে— [ব. বো. ২৩]
i. ত্যাগ স্বীকার
ii. ফল ভোগ
iii. আঘাতের চিহ্ন
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

❖ উদ্দীপকের আলোকে ৩৮ ও ৩৯ নং প্রশ্নের উত্তর দাও: বাংলার মানুষ বারবার অত্যাচারিত হয়েছে ঠিকই; কিন্তু প্রতিবারই শোষকশ্রেণির বিরুদ্ধে রুখে দাঁড়িয়েছে। এভাবে সে নির্মাণ করছে তার গৌরবোজ্জ্বল জীবনগাথা।

৩৮। উদ্দীপকটি তোমার পাঠ্য কোন কবিতার সঙ্গে সাদৃশ্যপূর্ণ? [য. বো. ২০]
(ক) আঠারো বছর বয়স (খ) আমি কিংবদন্তির কথা বলছি
(গ) বিদ্রোহী (ঘ) ফেব্রুয়ারি ১৯৬৯
উত্তর: (খ) আমি কিংবদন্তির কথা বলছি

৩৯। উদ্দীপক এবং উক্ত সাদৃশ্যপূর্ণ কবিতার উপজীব্য বিষয় হচ্ছে— [য. বো. ২০]
i. ইতিহাস
ii. ঐতিহ্য
iii. সংগ্রাম
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ৪০ নং প্রশ্নের উত্তর দাও: ইদানীং সম্ভ্রান্ত পরিবারগুলো গৃহকর্মীর উপর অমানবিক পাশবিক নির্যাতন করে থাকে। [সি. বো. ১৭]

৪০। উদ্দীপকটিতে ফুটে ওঠা ভাবের সাথে সাদৃশ্যপূর্ণ চরণ কোনটি? 
(ক) তাঁর করতলে পলিমাটির সৌরভ ছিল
(খ) তাঁর পিঠে রক্তজবার মতো ক্ষত ছিল
(গ) সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান কবিতা
(ঘ) কারণ তিনি ক্রীতদাস ছিলেন
উত্তর: (খ) তাঁর পিঠে রক্তজবার মতো ক্ষত ছিল

❖ উদ্দীপকের আলোকে ৪১ ও ৪২ নং প্রশ্নের উত্তর দাও: “কে কবি-কবে কে মোরে? ঘটকালি করি

শব্দে শব্দে বিয়া দেয় যেই জন।”

৪১। উদ্দীপকে বর্ণিত বিষয়ের সঙ্গে 'আমি কিংবদন্তির কথা বলছি' কবিতার নিম্নোক্ত সাদৃশ্যপূর্ণ পঙক্তি কোনটি? [রা. বো. ২২]
(ক) আমি কবি এবং কবিতার কথা বলছি
(খ) আমরা কি তাঁর মতো কবিতার কথা বলতে পারবো
(গ) সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান কবিতা
(ঘ) জিহ্বায় উচ্চারিত প্রতিটি সত্য শব্দ কবিতা
উত্তর: (ক) আমি কবি এবং কবিতার কথা বলছি

৪২। 'আমি কিংবদন্তির কথা বলছি' কবিতায় উল্লিখিত কবির কাজ উদ্দীপকের কবির তুলনায় ভিন্নতর। নিচের কোনটিতে তা প্রকাশ পেয়েছে? [রা. বো. ২২]
(ক) কবিসৃষ্ট শব্দবন্ধ কবিতা
(খ) স্বপ্নদ্রষ্টা কবির কবিতা স্বপ্নদ্রষ্টা
(গ) কবি অনিবার্য অভ্যুত্থানের কথা বলেন
(ঘ) কবি স্বাধীনতার কথা বলেন
উত্তর: (খ) স্বপ্নদ্রষ্টা কবির কবিতা স্বপ্নদ্রষ্টা

❖ উদ্দীপকের আলোকে ৪৩ ও ৪৪ নং প্রশ্নের উত্তর দাও: আমি জন্মেছি বাংলায়, আমি বাংলায় কথা বলি,
আমি বাংলার আলপথ দিয়ে হাজার বছর চলি।
চলি পলিমাটি কোমলে আমার চলার চিহ্ন ফেলে।
তেরোশত নদী শুধায় আমাকে, 'কোথা থেকে তুমি এলে?' [ম. বো. ২২]

৪৩। কবিতাংশের 'বাংলার আলপথ' এর সাথে 'আমি কিংবদন্তির কথা বলছি' কবিতার সাদৃশ্যপূর্ণ ভাব কোনটি? 
(ক) ইতিহাস ও ঐতিহ্য (খ) বাংলার সৌন্দর্য
(গ) সংগ্রাম ও বিপ্লব (ঘ) শাসন ও নিপীড়ন
উত্তর: (ক) ইতিহাস ও ঐতিহ্য

৪৪। উদ্দীপকে প্রতিফলিত চেতনা ব্যক্ত হয়েছে নিচের কোন চরণে? 
(ক) কর্ষিত জমির প্রতিটি শস্যদানা কবিতা
(খ) আমি কবি এবং কবিতার কথা বলছি
(গ) আমি কিংবদন্তির কথা বলছি
(ঘ) তাঁর করতলে পলিমাটির সৌরভ ছিল
উত্তর: (গ) আমি কিংবদন্তির কথা বলছি

❖ উদ্দীপকের আলোকে ৪৫ ও ৪৬ নং প্রশ্নের উত্তর দাও: সুনীল গঙ্গোপাধ্যায়ের 'আমিই সে' ছোট উপন্যাসটিতে বিধৃত হয়েছে মানব সভ্যতার আদিম ইতিহাস আর সভ্যতার অগ্রগতি। কীভাবে আদিম মানুষ সভ্য মানুষে পরিণত হয়েছে, তারই প্রকাশ ঘটেছে উপন্যাসটিতে। [রা. বো. ১৯]

৪৫। উদ্দীপকের সাথে 'আমি কিংবদন্তির কথা বলছি' কবিতার সাদৃশ্য রয়েছে? [রা. বো. ১৯]
i. ঐতিহ্য চেতনায়
ii. মুক্তির চেতনায়
iii. সংগ্রামী চেতনায়
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৪৬। উদ্দীপক ও 'আমি কিংবদন্তির কথা বলছি' কবিতার বৈসাদৃশ্য লক্ষ্য করা যায়। (ক) সভ্যতা বিকাশে (খ) ইতিহাস চেতনায়
(গ) ভাবগাম্ভীর্যে (ঘ) সংগ্রামশীলতায়
উত্তর: (গ) ভাবগাম্ভীর্যে

❖ উদ্দীপকের আলোকে ৪৭ ও ৪৮ নং প্রশ্নের উত্তর দাও: আমি তো এসেছি তিতুমীর আর হাজী শরীয়ত থেকে।
আমি তো এসেছি গীতাঞ্জলি ও অগ্নিবীণা থেকে।
এসেছি বাঙালি ক্ষুদিরাম আর সূর্য সেনের থেকে।
এসেছি বাঙালি জয়নুল আর অবনী ঠাকুর থেকে।
এসেছি বাঙালি রাষ্ট্রভাষার লাল রাজপথ থেকে। [কু. বো. ১৬]

৪৭। উদ্দীপকের চেতনার সঙ্গে 'আমি কিংবদন্তির কথা বলছি' কবিতার যে চরণের মিল রয়েছে— 
(ক) আমি আমার ভালোবাসার কথা বলছি
(খ) আমরা কি তাঁর মতো স্বাধীনতার কথা বলতে পারবো
(গ) সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান কবিতা
(ঘ) আমি কবি এবং কবিতার কথা বলছি
উত্তর: (ঘ) আমি কবি এবং কবিতার কথা বলছি

৪৮। উদ্দীপক ও 'আমি কিংবদন্তির কথা বলছি' কবিতায় প্রকাশিত মূলভাব— 
(ক) ঐতিহ্যপ্রীতি ও মুক্তির আকাঙ্ক্ষা (খ) ভালোবাসা আর শঙ্কা
(গ) মানবিক উদ্ভাসনের স্বপ্ন (ঘ) কবিতার সত্য অনুধাবন
উত্তর: (ক) ঐতিহ্যপ্রীতি ও মুক্তির আকাঙ্ক্ষা

❖ উদ্দীপকের আলোকে ৪৯ ও ৫০ নং প্রশ্নের উত্তর দাও: অজয় রায় তাঁর “আদি বাঙালি: নৃতাত্ত্বিক ও সমাজতাত্ত্বিক বিশ্লেষণ” বইয়ে বাঙালিজনের নৃতাত্ত্বিক, সামাজিক ও সাংস্কৃতিক পরিচয় চমৎকারভাবে ফুটিয়ে তুলেছেন। [কু. বো. ১৬]

৪৯। উদ্দীপকটি 'আমি কিংবদন্তির কথা বলছি' কবিতার কোন বিষয়কে উপস্থাপন করে? 
(ক) বাঙালির সংগ্রাম (খ) বাঙালির গৌরব
(গ) বাঙালির বিজয় (ঘ) বাঙালির ঐতিহ্য
উত্তর: (ঘ) বাঙালির ঐতিহ্য

৫০। উক্ত বিষয়ের প্রেক্ষিতে 'আমি কিংবদন্তির কথা বলছি' কবিতাকে বলা যায়— i. আত্মপরিচয়ের কবিতা
ii. আত্মালোচনার কবিতা
iii. আত্মচেতনার কবিতা
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

❖ উদ্দীপকের আলোকে ৫১ ও ৫২ নং প্রশ্নের উত্তর দাও: 
আবার আসিব ফিরে ধানসিঁড়িটির তীরে এই বাংলায়। [চ. বো. ১৭]

৫১। উদ্দীপকের সঙ্গে 'আমি কিংবদন্তির কথা বলছি' কবিতার বৈসাদৃশ্য হলো— i. শব্দ প্রয়োগে
ii. ছন্দ ব্যবহারে
iii. চিত্রকল্প ব্যবহারে
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৫২। বৈসাদৃশ্য থাকলেও উভয়ের যোগসূত্র কোনটি? [চ. বো. ১৭]
(ক) ঐতিহ্য নির্মাণে (খ) আত্মস্বীকারোক্তিতে
(গ) জীবনের প্রকাশে (ঘ) গভীরতা সঞ্চারে
উত্তর: (খ) আত্মস্বীকারোক্তিতে

৫৩। 'আমার সময়' কাব্যগ্রন্থটির রচয়িতা কে? [ঢাবি ক: (ঘ-ইউনিট) ১৮-১৯]
(ক) দিলওয়ার (খ) শামসুর রাহমান
(গ) সুফিয়া কামাল (ঘ) আবু জাফর ওবায়দুল্লাহ
উত্তর: (ঘ) আবু জাফর ওবায়দুল্লাহ

৫৪। 'সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান—' এ পঙক্তির শূন্যস্থানে বসবে যে শব্দটি— [ঢাবি (খ-ইউনিট) ১৬-১৭]
(ক) স্বাধীনতা (খ) মুক্তি
(গ) কবিতা (ঘ) সংগতি
উত্তর: (গ) কবিতা

৫৫। 'আমি কিংবদন্তির কথা বলছি' কবিতাটি কোন ছন্দে রচিত? [জবি (খ-ইউনিট) ১৯-২০]
(ক) গদ্য (খ) সমচরণ
(গ) মাত্রাবৃত্ত (ঘ) অক্ষরবৃত্ত
উত্তর: (ক) গদ্য

৫৬। আবু জাফর ওবায়দুল্লাহর কবিতায় বিশেষভাবে প্রাধান্য পেয়েছে— [জবি (গ-ইউনিট) ১৯-২০]
(ক) রাষ্ট্রভাষা আন্দোলন ও মুক্তিযুদ্ধ (খ) মানবীয় সংকট ও সম্ভাবনা
(গ) শোষিত নিপীড়িত মেহনতি মানুষ (ঘ) সমাজ ও রাজনীতি
উত্তর: (ক) রাষ্ট্রভাষা আন্দোলন ও মুক্তিযুদ্ধ

৫৭। আবু জাফর ওবায়দুল্লাহর মতে, যে কবিতা শুনতে জানে না সে কীসের অধিকার থেকে বঞ্চিত হবে? [জবি (গ-ইউনিট) ১৯-২০]
(ক) সমৃদ্ধির অধিকার (খ) দিগন্তের অধিকার
(গ) শিল্পের অধিকার (ঘ) সংস্কৃতির অধিকার
উত্তর: (খ) দিগন্তের অধিকার

৫৮। 'সুন্দরের অনিবার্য অভ্যুত্থান কবিতা' কোন কবিতার চরণ? [চবি (খ-ইউনিট) ১৯-২০]
(ক) ঐকতান (খ) রক্তে আমার অনাদি অস্থি
(গ) আমি কিংবদন্তির কথা বলছি (ঘ) ফেব্রুয়ারি ১৯৬৯
উত্তর: (গ) আমি কিংবদন্তির কথা বলছি

৫৯। 'আমি কবি ও কবিতার কথা বলছি' পাঠ্যবইয়ের কোন কবিতায় পঙক্তিটি রয়েছে? [চবি (খ-ইউনিট) ১৭-১৮]
(ক) নতুন কবিতা (খ) আমি কিংবদন্তির কথা বলছি
(গ) রক্তে আমার অনাদি অস্থি (ঘ) ব্ল্যাক-আউটের পূর্ণিমায়
উত্তর: (খ) আমি কিংবদন্তির কথা বলছি

৬০। 'তাঁর পিঠে রক্তজবার মতো ক্ষত ছিল' পঙক্তিটি কোন কবিতার? [চবি (ছ-ইউনিট) ১৮-১৯]
(ক) লোক-লোকান্তর (খ) সাম্যবাদী
(গ) আমি কিংবদন্তির কথা বলছি (ঘ) তাহারেই পড়ে মনে
উত্তর: (গ) আমি কিংবদন্তির কথা বলছি

৬১। 'আমি কিংবদন্তির কথা বলছি' কবিতাটি কোন কাব্যগ্রন্থ থেকে নেওয়া? [চবি (খ১-ইউনিট) ১৬-১৭]
(ক) সাত নলীর হার (খ) বৃষ্টি ও সাহসী পুরুষের জন্য প্রার্থনা
(গ) আমি কিংবদন্তির কথা বলছি (ঘ) খাঁচার ভিতর অচিন পাখি
উত্তর: (গ) আমি কিংবদন্তির কথা বলছি

৬২। 'আমি কিংবদন্তির কথা বলছি' কবিতায় শুদ্ধতার প্রতীক কোনটি? [চবি (খ৩-ইউনিট) ১৬-১৭]
(ক) মাটি (খ) পর্বত
(গ) আগুন (ঘ) পানি
উত্তর: (গ) আগুন

৬৩। 'জিহ্বায় উচ্চারিত প্রতিটি সত্য শব্দ'— [রাবি (খ-ইউনিট)-১৮-১৯]
(ক) কবিতা (খ) গল্প
(গ) উপন্যাস (ঘ) নাটক
উত্তর: (ক) কবিতা

৬৪। কবি উচ্চারিত সত্যের মতো কীসের কথা বলেছেন? [রাবি (খ-ইউনিট)-১৭-১৮]
(ক) আকাঙ্ক্ষার (খ) কল্পনার
(গ) প্রত্যাশার (ঘ) স্বপ্নের
উত্তর: (ঘ) স্বপ্নের

৬৫। 'তাঁর পিঠে রক্তজবার মতো ক্ষত ছিল।' লাইনটি কোন কবির? [ইবি ক-ইউনিট ১৭-১৮]
(ক) আবু জাফর ওবায়দুল্লাহ (খ) সিকান্দার আবু জাফর
(গ) হাসান হাফিজুর রহমান (ঘ) সুফিয়া কামাল
উত্তর: (ক) আবু জাফর ওবায়দুল্লাহ

৬৬। কোন কবি রাষ্ট্রদূত ছিলেন? [রাবি ক-ইউনিট ১৭-১৮; (খ-ইউনিট) ১৭-১৮; জাককানইবি (সকল ইউনিট)-১৭-১৮]
(ক) আসাদ চৌধুরী (খ) সিকদার আমিনুল হক
(গ) শহীদ কাদরী (ঘ) আবু জাফর ওবায়দুল্লাহ
উত্তর: (ঘ) আবু জাফর ওবায়দুল্লাহ

৬৭। যে কর্ষণ করে তাকে কী বলে? [রাবি (ক ইউনিট) ১৬-১৭]
(ক) কৃষক (খ) কামার
(গ) কাসারি (ঘ) রাখাল
উত্তর: (ক) কৃষক

৬৮। 'যে কবিতা শুনতে জানে না/ সে আজন্ম ক্রীতদাস থেকে যাবে' কবিতাংশে 'কবিতা' শব্দটি কীসের প্রতীক হিসেবে ব্যবহৃত হয়েছে? [কুবি (খ-ইউনিট) ১৭-১৮]
(ক) ঐতিহ্যকথা (খ) সত্যবাণী
(গ) মুক্তির আহ্বান (ঘ) শান্তির সুর
উত্তর: (গ) মুক্তির আহ্বান

৬৯। 'জিহ্বায় উচ্চারিত প্রতিটি — কবিতা।' শূন্যস্থানে কী বসবে? [বেরোবি (গ ইউনিট)-১৯-২০]
(ক) শব্দমালা (খ) সত্য
(গ) সত্য শব্দ (ঘ) শব্দরাশি
উত্তর: (গ) সত্য শব্দ

৭০। যে কবিতা শুনতে জানে না, সে আজন্ম কী থেকে যাবে? [বেরোবি (গ ইউনিট)-১৬-১৭]
(ক) বন্দি (খ) মূর্খ
(গ) ক্রীতদাস (ঘ) অভাগা
উত্তর: (গ) ক্রীতদাস

৭১। কবি আবু জাফর ওবায়দুল্লাহ কোন মন্ত্রণালয়ের দায়িত্বে ছিলেন? [বেরোবি (গ ইউনিট)-১৬-১৭]
(ক) শিক্ষা (খ) অর্থনীতি
(গ) সংস্কৃতি (ঘ) কৃষি ও পানিসম্পদ
উত্তর: (ঘ) কৃষি ও পানিসম্পদ

৭২। 'আমি কিংবদন্তির কথা বলছি' কোন ধরনের রচনা? [ইবি (খ ইউনিট) ১৯-২০]
(ক) কবিতা (খ) গল্প
(গ) নাটক (ঘ) ছড়া
উত্তর: (ক) কবিতা

৭৩। 'তাঁর করতলে পলিমাটির সৌরভ ছিল।' চরণটি কোন কবিতার? [ইবি (খ ইউনিট) ১৭-১৮]
(ক) আমি কিংবদন্তির কথা বলছি (খ) রক্তে আমার অনাদি অস্থি
(গ) এই পৃথিবীতে এক স্থান আছে (ঘ) তাহারেই পড়ে মনে
উত্তর: (ক) আমি কিংবদন্তির কথা বলছি


৭৪। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি 'বিচলিত স্নেহ' বলতে কী বুঝিয়েছেন? [ইবি (জ-ইউনিট) ১৬-১৭]
(ক) স্নেহের অভাব (খ) আপনজনের স্নেহ
(গ) স্নেহের আশঙ্কা (ঘ) আপনজনের উৎকণ্ঠা
উত্তর: (ঘ) আপনজনের উৎকণ্ঠা

৭৫। 'আমি কিংবদন্তির কথা বলছি' কবিতাটিতে কোন ভাবটি মুখ্য হয়ে উঠেছে? [ইবি (গ-ইউনিট) ১৮-১৯]
(ক) শাসকদের প্রতি সকলের নতজানু হওয়া (খ) শাসক শ্রেণি সম্পর্কে জনমতে ব্যাপক ভীতি
(গ) পূর্ব পুরুষদের প্রতি শ্রদ্ধা ও কৃতজ্ঞতা (ঘ) স্বাধীনতা রক্ষা করতে না পারার আশঙ্কা
উত্তর: (গ) পূর্ব পুরুষদের প্রতি শ্রদ্ধা ও কৃতজ্ঞতা

৭৬। আবু জাফর ওবায়দুল্লাহ কোন গ্রামে জন্মগ্রহণ করেন? [জাককানইবি (ছ-ইউনিট) ১৮-১৯]
(ক) ঝালকাঠি (খ) সরূপকাঠি
(গ) ক্ষুদ্রকাঠি (ঘ) বাবুকাঠি
উত্তর: (গ) ক্ষুদ্রকাঠি

৭৭। 'জিহ্বায় উচ্চারিত প্রতিটি সত্য শব্দ কবিতা' লাইনটি কোন কবিতার অংশ? [জাককানইবি (ছ-ইউনিট) ১৮-১৯]
(ক) আঠারো বছর বয়স (খ) সাম্যবাদী
(গ) আমি কিংবদন্তির কথা বলছি (ঘ) সেই অস্ত্র
উত্তর: (গ) আমি কিংবদন্তির কথা বলছি

৭৮। কোন কাব্যগ্রন্থটি আবু জাফর ওবায়দুল্লাহ রচিত? [জাককানইবি (ছ-ইউনিট) ১৮-১৯]
(ক) সাত নলীর হার (খ) আসমানের কান্না
(গ) বন্দী শিবির থেকে (ঘ) মায়া কাজল
উত্তর: (ক) সাত নলীর হার

৭৯। 'কিংবদন্তি' শব্দটির অর্থ কী? [কুবি (গ-ইউনিট) ১৮-১৯; বেরোবি (ক-ইউনিট) ১৭-১৮; (ক-ইউনিট) ১৬-১৭]
(ক) কিংকর্তব্যবিমূঢ় (খ) ইতিহাস
(গ) খ্যাতি (ঘ) জনশ্রুতি
উত্তর: (ঘ) জনশ্রুতি

৮০। 'আমি কিংবদন্তির কথা বলছি' কবিতায় যে পূর্বপুরুষের কথা বলা হয়েছে তাঁরা ছিলেন— [কুবি (গ-ইউনিট) ১৮-১৯]
(ক) কুৎসিত (খ) দীর্ঘদেহী
(গ) স্থুলদেহী (ঘ) খর্বদেহী
উত্তর: (খ) দীর্ঘদেহী

কবি পরিচিতি সংক্রান্ত প্রশ্ন
৮১। আবু জাফর ওবায়দুল্লাহর জন্ম কোন গ্রামে? 
(ক) স্বরূপকাঠি (খ) বহেরচর-ক্ষুদ্রকাঠি
(গ) কোলা-পাটগাতি (ঘ) চর কুড়লি-মুড়লি
উত্তর: (খ) বহেরচর-ক্ষুদ্রকাঠি

৮২। আবু জাফর ওবায়দুল্লাহ জন্ম কত খ্রিস্টাব্দে? 
(ক) ১৯১৯ (খ) ১৯২৬
(গ) ১৯২৯ (ঘ) ১৯৩৪
উত্তর: (ঘ) ১৯৩৪

৮৩। আবু জাফর ওবায়দুল্লাহ কত খ্রিস্টাব্দে মৃত্যুবরণ করেন? 
(ক) ১৯৯৭ (খ) ১৯৯৯
(গ) ২০০১ (ঘ) ২০০৭
উত্তর: (গ) ২০০১

৮৪। আবু জাফর ওবায়দুল্লাহ কোন জেলায় জন্মগ্রহণ করেন? 
(ক) ঢাকা (খ) ফরিদপুর
(গ) বরিশাল (ঘ) চট্টগ্রাম
উত্তর: (গ) বরিশাল

৮৫। আবু জাফর ওবায়দুল্লাহ কোন বিষয়ে বিএ ও এমএ পাশ করেন? 
(ক) বাংলা সাহিত্যে (খ) ইংরেজি সাহিত্যে
(গ) প্রাণিবিদ্যায় (ঘ) অর্থনীতিতে
উত্তর: (খ) ইংরেজি সাহিত্যে

৮৬। আবু জাফর ওবায়দুল্লাহ কোথায় অধ্যাপনা করেন? 
(ক) কলকাতা বিশ্ববিদ্যালয়ে (খ) বিশ্বভারতী বিশ্ববিদ্যালয়ে
(গ) ঢাকা বিশ্ববিদ্যালয়ে (ঘ) রাজশাহী বিশ্ববিদ্যালয়ে
উত্তর: (গ) ঢাকা বিশ্ববিদ্যালয়ে

৮৭। আবু জাফর ওবায়দুল্লাহ কোন দেশের রাষ্ট্রদূত ছিলেন? 
(ক) সুইজারল্যান্ড (খ) জাপান
(গ) যুক্তরাজ্য (ঘ) যুক্তরাষ্ট্র
উত্তর: (ঘ) যুক্তরাষ্ট্র

৮৮। আবু জাফর ওবায়দুল্লাহ বাংলাদেশ সরকারের কোন বিষয়ক মন্ত্রী ছিলেন? 
(ক) স্থানীয় সরকার ও পল্লী উন্নয়ন (খ) কৃষি ও পানি সম্পদ
(গ) পাট ও বস্ত্র (ঘ) শিক্ষা ও প্রযুক্তি
উত্তর: (খ) কৃষি ও পানি সম্পদ

৮৯। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবির পূর্বপুরুষের পিঠে কীসের মতো ক্ষত ছিল? [য. বো. ২০]
(ক) কৃষ্ণচূড়া (খ) রক্তজবা
(গ) পশুর থাবা (ঘ) শ্বাপদের
উত্তর: (খ) রক্তজবা

৯০। 'তাঁর পিঠে রক্ত জবার মতো ক্ষত ছিল'— এ চরণটিতে কার পিঠের ক্ষতকে নির্দেশ করা হয়েছে? [ঢা. বো. ১৯]
(ক) কবির পূর্বপুরুষের (খ) বাংলার কৃষকদের
(গ) মুক্তিযোদ্ধাদের (ঘ) কবির পিতার
উত্তর: (ক) কবির পূর্বপুরুষের

৯১। 'আমি কিংবদন্তির কথা বলছি' কবিতায় রক্তজবার প্রসঙ্গ যে অর্থে ব্যবহৃত হয়েছে— [সি. বো. ২০]
(ক) অন্তমিত রক্তিম সূর্য (খ) জাতীয় চেতনা
(গ) রক্তের প্রয়োজনীয়তা (ঘ) অত্যাচারের তাজা আঘাত
উত্তর: (ঘ) অত্যাচারের তাজা আঘাত

৯২। পূর্বপুরুষের পিঠে রক্তজবার মতো ক্ষত ছিল তা বোঝা যায় কীভাবে? [নটর ডেম কলেজ, ঢাকা]
(ক) কৃষক থাকায় (খ) শ্রমিক থাকায়
(গ) ক্রীতদাস থাকায় (ঘ) নমঃশূদ্র থাকায়
উত্তর: (গ) ক্রীতদাস থাকায়

৯৩। 'আমি কিংবদন্তির কথা বলছি' কবিতায় আমাদের পূর্বপুরুষদের পিঠে রক্তজবার মতো ক্ষত ছিল কেন? [যশোর]
(ক) তারা যোদ্ধা ছিলেন বলে (খ) তারা ক্রীতদাস ছিলেন বলে
(গ) তারা নিপীড়িত ছিলেন বলে (ঘ) তারা অভিশপ্ত ছিলেন বলে
উত্তর: (খ) তারা ক্রীতদাস ছিলেন বলে

৯৪। পূর্বপুরুষের পিঠে রক্তজবার মতো ক্ষত ছিল। কারণ তিনি— [চ. বো. ১৬]
(ক) ক্রীতদাস ছিলেন (খ) শিকারি ছিলেন
(গ) পশুর দ্বারা আক্রান্ত হয়েছিলেন (ঘ) অস্ত্রের আঘাতপ্রাপ্ত হয়েছিলেন
উত্তর: (ক) ক্রীতদাস ছিলেন

৯৫। 'তাঁর পিঠে রক্তজবার মতো ক্ষত ছিল'— কারণ তিনি ছিলেন— [দি. বো. ১৬]
(ক) যোদ্ধা (খ) ক্রীতদাস
(গ) অভিশপ্ত (ঘ) বন্যপশু দ্বারা আক্রান্ত
উত্তর: (খ) ক্রীতদাস

৯৬। মানুষের উপর অত্যাচারের ইতিহাস তুলে ধরা হয়েছে কোন পঙক্তিটিতে? [চিটাগাং ইউরিয়া ফার্টিলাইজার কলেজ]
(ক) সূর্যকে হৃদপিণ্ডে ধরে রাখতে পারে না
(খ) তাঁর দিগন্তের অধিকার থেকে বঞ্চিত হবে
(গ) সে দিগন্তের অধিকার থেকে বঞ্চিত হবে
(ঘ) সে পিঠে রক্তজবার মতো ক্ষত ছিল
উত্তর: (খ) তাঁর দিগন্তের অধিকার থেকে বঞ্চিত হবে

৯৭। "তাঁর করতলে পলিমাটির সৌরভ ছিল"— 'আমি কিংবদন্তির কথা বলছি' কবিতার চরণটিতে বোঝানো হয়েছে পূর্বপুরুষদের— [ঢা. বো. ১৬]
(ক) দাসত্ব (খ) শ্রমনিষ্ঠা
(গ) ভূমিনির্ভরতা (ঘ) মৃত্তিকা সংলগ্নতা
উত্তর: (ঘ) মৃত্তিকা সংলগ্নতা

৯৮। "তাঁর করতলে পলিমাটির সৌরভ ছিল"— চরণটিতে কোন বিষয়টি ইঙ্গিত করা হয়েছে? [ঢাকা কলেজ]
(ক) কৃষিনির্ভর সমাজ (খ) পরাধীন সমাজ
(গ) শোষিত পূর্বপুরুষ (ঘ) অতীত ঐতিহ্য
উত্তর: (ক) কৃষিনির্ভর সমাজ

৯৯। কবির পূর্বপুরুষের পলিমাটির সৌরভ ছিল কোথায়? [সেনাবাহিনী (বিএ) কলেজ, চট্টগ্রাম]
(ক) লৌহখণ্ডে (খ) করতলে
(গ) শস্যদানায় (ঘ) রক্তজবায়
উত্তর: (খ) করতলে

১০০। চাষি খেতে চালাচ্ছে হাল, তাঁতি বসে তাঁত বোনে, জেলে ফেলে জাল— উদ্দীপকটিতে 'আমি কিংবদন্তির কথা বলছি' কবিতার যে চরণের মিল রয়েছে— [ব. বো. ২২]
(ক) তাঁর করতলে পলিমাটির সৌরভ ছিল
(খ) পতিত জমি আবাদের কথা বলতেন
(গ) অরণ্য ও শ্বাপদের কথা বলতেন
(ঘ) কর্ষিত জমির প্রতিটি শস্যদানা কবিতা
উত্তর: (ক) তাঁর করতলে পলিমাটির সৌরভ ছিল

১০১। কবির মতে কর্ষিত জমির প্রতিটি শস্যদানা কী? [ঢা. বো. ২০]
(ক) গান (খ) স্লোগান
(গ) কবিতা (ঘ) গদ্য
উত্তর: (গ) কবিতা

১০২। 'কবিতা'কে কবি কী বলে অভিহিত করেছেন? [রা. বো. ১৬]
(ক) অতিক্রান্ত পাহাড় (খ) উনোনের আগুন
(গ) কর্ষিত জমির শস্যদানা (ঘ) পলিমাটির সৌরভ
উত্তর: (গ) কর্ষিত জমির শস্যদানা

১০৩। কবির মতে, কর্ষিত জমির প্রতিটি শস্যদানা কী? [ঢা. বো. ২০]
(ক) গান (খ) স্লোগান
(গ) কবিতা (ঘ) গদ্য
উত্তর: (গ) কবিতা

১০৪। যে কবিতা শুনতে জানে না সে কী শুনবে? 
(ক) বজ্রের আর্তনাদ (খ) মেঘের গর্জন
(গ) ঝড়ের আর্তনাদ (ঘ) বৃষ্টির শব্দ
উত্তর: (গ) ঝড়ের আর্তনাদ

১০৫। যে কবিতা শুনতে জানে না, সে কী জানে না? 
(ক) সে নদীতে ভাসতে পারে (খ) সে ভালোবেসে যুদ্ধে যেতে পারে
(গ) সে সন্তানের জন্য মরতে পারে না (ঘ) সে সূর্যকে হৃদপিণ্ডে ধরে রাখতে পারে
উত্তর: (গ) সে সন্তানের জন্য মরতে পারে না

১০৬। 'তিনি কবি ও কবিতার কথা বলতেন'— উক্তিটি দ্বারা কবির পূর্বপুরুষের কোন মানসিকতার পরিচয় পাওয়া যায়? 
(ক) সৃজনশীল (খ) সংগ্রামী
(গ) বিদ্রোহী (ঘ) উদার
উত্তর: (ক) সৃজনশীল

১০৭। জিহ্বায় উচ্চারিত কেমন শব্দ কবিতা? [রা. বো. ২০]
(ক) তীক্ষ্ণ (খ) কঠিন
(গ) সহজ (ঘ) সত্য
উত্তর: (ঘ) সত্য

১০৮। জিহ্বায় উচ্চারিত প্রতিটি কোন কোন শব্দ কবিতা? 
(ক) সত্য, মিথ্যা (খ) সত্য, মুক্ত
(গ) মুক্ত, বদ্ধ (ঘ) আবদ্ধ, রুদ্ধ
উত্তর: (খ) সত্য, মুক্ত

১০৯। যে কবিতা শুনতে জানে না সে কীসের অধিকার থেকে বঞ্চিত হবে? 
(ক) মানবিকতার (খ) দিগন্তের
(গ) স্বাধীনতার (ঘ) শৃঙ্খলার
উত্তর: (খ) দিগন্তের

১১০। ভাষা-আন্দোলন ও মুক্তিযুদ্ধ কোন কবির কবিতায় বিষয় হিসেবে বিশেষ প্রাধান্য পেয়েছে? [ঢা. বো. ২২]
(ক) কাজী নজরুল ইসলাম (খ) আবু জাফর ওবায়দুল্লাহ
(গ) জীবনানন্দ দাশ (ঘ) সুফিয়া কামাল
উত্তর: (খ) আবু জাফর ওবায়দুল্লাহ

কবি পরিচিতি ও সম্মাননা সংক্রান্ত প্রশ্ন
১১১। আবু জাফর ওবায়দুল্লাহ রাষ্ট্রভাষা আন্দোলনে অবদান রাখার জন্য কোন সম্মান লাভ করেন? 
(ক) বাংলা একাডেমি পুরস্কার (খ) একুশে পদক
(গ) আদমজী সাহিত্য পুরস্কার (ঘ) স্বাধীনতা পুরস্কার
উত্তর: (খ) একুশে পদক

১১২। আবু জাফর ওবায়দুল্লাহকে কত খ্রিস্টাব্দে বাংলা একাডেমি পুরস্কার প্রদান করা হয়? 
(ক) ১৯৭০ (খ) ১৯৭৬
(গ) ১৯৭৯ (ঘ) ১৯৮২
উত্তর: (গ) ১৯৭৯

১১৩। নিচের কোনটি আবু জাফর ওবায়দুল্লাহর রচিত কাব্যগ্রন্থ? 
(ক) ছায়াহরিণ (খ) রৌদ্রকরোটিতে
(গ) কমলের চোখ (ঘ) সাতটি তারার তিমির
উত্তর: (গ) কমলের চোখ

কবিতার গভীর ভাব ও তাৎপর্য
১১৪। যে কবিতা শুনতে জানে না সে মায়ের কোলে শুয়ে কী শুনতে পারে না? [ঢা. বো. ২৩]
(ক) গান (খ) কবিতা
(গ) ছড়া (ঘ) গল্প
উত্তর: (ঘ) গল্প

১১৫। 'আমি কিংবদন্তির কথা বলছি' কবিতায় "ভালোবাসা দিলে মা মরে যায়"— চরণটির তাৎপর্য কী? [ঢা. বো., সি. বো. ১৯]
(ক) মায়ের ছেলেদের চলে যাওয়া (খ) মায়ের গল্প শুনতে না পারা
(গ) ছেলেদের জন্য মায়ের উৎকণ্ঠা (ঘ) দেশের জন্য সন্তানের মায়াত্যাগ
উত্তর: (ঘ) দেশের জন্য সন্তানের মায়াত্যাগ

১১৬। 'আমি কিংবদন্তির কথা বলছি' কবিতায় ভালোবাসা দিলে মা মরে যায় কেন? 
(ক) ব্যক্তি মা হওয়ায় (খ) সকলের মা হয়ে ওঠায়
(গ) যুদ্ধের কারণে (ঘ) দেশমাতৃকার প্রয়োজনে
উত্তর: (ঘ) দেশমাতৃকার প্রয়োজনে

১১৭। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবির মা কীসের কথা বলতেন? [দি. বো. ২২]
(ক) সাগরের (খ) নদীর
(গ) পাহাড়ের (ঘ) গাছপালার
উত্তর: (খ) নদীর

১১৮। 'প্রবহমান নদী যে সাঁতার জানে না তাকেও ভাসিয়ে রাখে' কথাটি কে বলতেন? [ঢাকা রেসিডেন্সিয়াল মডেল কলেজ]
(ক) মা (খ) ভাই
(গ) পূর্বপুরুষ (ঘ) ক্রীতদাস
উত্তর: (ক) মা

১১৯। 'গর্ভবতী বোনের মৃত্যুর কথা বলছি'— এর পরের লাইন কোনটি? [আদমজী ক্যান্টনমেন্ট কলেজ, ঢাকা]
(ক) ভালোবাসা দিলে মা মরে যায় (খ) যুদ্ধ আসে ভালোবেসে
(গ) মায়ের ছেলেরা চলে যায় (ঘ) আমি আমার ভালোবাসার কথা বলছি
উত্তর: (ঘ) আমি আমার ভালোবাসার কথা বলছি

১২০। যে কবিতা শুনতে জানে না সে সূর্যকে কোথায় ধরে রাখতে পারে না? [আহম্মদ উদ্দিন শাহ শিশু নিকেতন স্কুল ও কলেজ, গাইবান্ধা]
(ক) হাতে (খ) হৃদপিণ্ডে
(গ) মাথায় (ঘ) অন্তরে
উত্তর: (খ) হৃদপিণ্ডে

১২১। সূর্যকে হৃদপিণ্ডে ধরে রাখার মাধ্যমে কোন চেতনা প্রকাশ পেয়েছে? [ফেনী গার্লস ক্যাডেট কলেজ]
(ক) প্রজ্বলিত (খ) স্বাধীনতার
(গ) শোষণের শাসকের (ঘ) শাসকের
উত্তর: (খ) স্বাধীনতার

১২২। 'আমি কিংবদন্তির কথা বলছি' কবিতা অনুসারে কীভাবে যুদ্ধ আসে? [ম. বো. ২০]
(ক) মায়ের মৃত্যুতে (খ) গর্ভবতী বোনের মৃত্যুতে
(গ) ত্যাগে (ঘ) ভালোবেসে
উত্তর: (ঘ) ভালোবেসে

১২৩। 'যুদ্ধ আসে ভালোবেসে'— এর তাৎপর্য ধারণ করে কোনটি? [চট্টগ্রাম কলেজ]
(ক) পরাধীনতায় অধিকার অর্জিত হয় যুদ্ধেই
(খ) যুদ্ধ আসে বলেই দেশের প্রতি মমত্ব জন্মে
(গ) মানবীয় প্রেম অপ্রচ্ছন্ন থাকে যুদ্ধ না এলে
(ঘ) 'যুদ্ধ' ও 'ভালোবাসা' বিপরীত ধর্মী হলেও সমার্থক
উত্তর: (খ) যুদ্ধ আসে বলেই দেশের প্রতি মমত্ব জন্মে

১২৪। কেন মানুষ ভালোবেসে যুদ্ধে যেতে পারে না? [সরকারি সুন্দরবন আদর্শ কলেজ, খুলনা]
(ক) কবিতার ব্যঞ্জনা জানা নেই বলে (খ) কবিতার আকৃতি জানে না বলে
(গ) কবিতার মর্মার্থ জানা নেই বলে (ঘ) কবিতার বিদ্রোহী ভাব বোঝে না বলে
উত্তর: (ক) কবিতার ব্যঞ্জনা জানা নেই বলে

১২৫। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি কার মৃত্যুর কথা বলেছেন? [বি এ এফ শাহীন কলেজ, তেজগাঁও]
(ক) ভাইয়ের (খ) বোনের
(গ) মায়ের (ঘ) বাবার
উত্তর: (খ) বোনের

১২৬। যে কবিতা শুনতে পারে না সে ভালোবেসে কোথায় যেতে পারে না? [চট্টগ্রাম ইউরিয়া ফার্টিলাইজার স্কুল এন্ড কলেজ]
(ক) যুদ্ধে (খ) গ্রামে
(গ) মিছিলে (ঘ) বিদেশে
উত্তর: (ক) যুদ্ধে

১২৭। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি কার যুদ্ধের কথা বলেছেন? [য. বো. ২২]
(ক) ভাইয়ের (খ) বোনের
(গ) মায়ের (ঘ) পূর্ব পুরুষদের
উত্তর: (ক) ভাইয়ের

১২৮। কার ভালোবাসার সুকণ্ঠ সংগীত কবিতা? [সি. বো. ২০]
(ক) মায়ের (খ) বোনের
(গ) সুপুরুষের (ঘ) শিল্পীর
উত্তর: (গ) সুপুরুষের

১২৯। 'আমরা কি তাঁর মতো কবিতার কথা বলতে পারবো?'— এ অংশে কবির কোন আকাঙ্ক্ষা ব্যক্ত হয়েছে? [ব. বো. ১৭]
(ক) প্রতিবাদী চেতনার (খ) সৌন্দর্যবোধ প্রকাশের
(গ) ভাষার প্রগাঢ়তার (ঘ) স্বদেশপ্রীতির
উত্তর: (ক) প্রতিবাদী চেতনার

১৩০। 'আমি কিংবদন্তির কথা বলছি' কবিতায়— যে গাভীর পরিচর্যা করে, জননীর আশীর্বাদ তাকে কী করে? [সি. বো. ২০]
(ক) দীর্ঘায়ু (খ) দীর্ঘদেহী
(গ) বলিষ্ঠ (ঘ) সমৃদ্ধ
উত্তর: (ক) দীর্ঘায়ু

১৩১। 'আমি কিংবদন্তির কথা বলছি' কবিতায় 'জননীর আশীর্বাদ' কাকে দীর্ঘায়ু করবে? [কু. বো. ২২]
(ক) যে গাভীর পরিচর্যা করে (খ) যে মৎস্য লালন করে
(গ) যে লৌহ খণ্ডকে প্রজ্বলিত করে (ঘ) যে কর্ষণ করে
উত্তর: (ক) যে গাভীর পরিচর্যা করে

১৩২। 'আমি কিংবদন্তির কথা বলছি'— কবিতায় জননীর আশীর্বাদে কে দীর্ঘায়ু হবে? [ব. বো. ১৬]
(ক) যে কর্ষণ করে (খ) গাভীর পরিচর্যাকারী
(গ) মৎস্য লালনকারী (ঘ) লৌহখণ্ড প্রজ্বলনকারী
উত্তর: (খ) গাভীর পরিচর্যাকারী

১৩৩। 'যে গাভীর পরিচর্যা করে' তার পরের চরণ কোনটি? [ময়মনসিংহ গার্লস ক্যাডেট কলেজ]
(ক) প্রবহমান নদী তাকে পুরস্কৃত করবে (খ) ইস্পাতের তরবারি তাকে সশস্ত্র করবে
(গ) জননীর আশীর্বাদ তাকে দীর্ঘায়ু করবে (ঘ) শস্যের ভাণ্ডার তাকে সমৃদ্ধ করবে
উত্তর: (গ) জননীর আশীর্বাদ তাকে দীর্ঘায়ু করবে

১৩৪। 'কিংবদন্তি' শব্দের অর্থ কী? [রা. বো., য. বো. ২২]
(ক) ঐতিহ্য (খ) ইতিহাস
(গ) সুনাম (ঘ) জনশ্রুতি
উত্তর: (ঘ) জনশ্রুতি

১৩৫। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কোন শব্দটি ঐতিহ্যের প্রতীক হয়ে উঠেছে? [সি. বো. ২২]
(ক) পূর্বপুরুষ (খ) ক্রীতদাস
(গ) কিংবদন্তি (ঘ) কবিতা
উত্তর: (গ) কিংবদন্তি

১৩৬। 'কিংবদন্তি' হলো— [লক্ষ্মীপুর সরকারি কলেজ]
(ক) রূপকাহিনী (খ) ঐতিহ্যের অনুষঙ্গ
(গ) ছড়াকবিতা (ঘ) বিখ্যাত মানুষ
উত্তর: (খ) ঐতিহ্যের অনুষঙ্গ

১৩৭। 'আমি কিংবদন্তির কথা বলছি' কবিতায় 'কিংবদন্তি' শব্দটি কীসের প্রতীক হয়ে উঠেছে? [য. বো. ২২]
(ক) সভ্যতার (খ) সংস্কৃতির
(গ) ঐতিহ্যের (ঘ) ইতিহাসের
উত্তর: (গ) ঐতিহ্যের

১৩৮। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি কার যুদ্ধের কথা বলেছেন? [য. বো. ২২]
(ক) ভাইয়ের (খ) বোনের
(গ) মায়ের (ঘ) পূর্ব পুরুষদের
উত্তর: (ক) ভাইয়ের

১৩৯। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি কার যুদ্ধের কথা বলেছেন? [বৃন্দাবন সরকারি কলেজ, হবিগঞ্জ]
(ক) বাবার (খ) ভাইয়ের
(গ) পূর্বপুরুষের (ঘ) নিজের
উত্তর: (খ) ভাইয়ের

১৪০। "যে গাভীর পরিচর্যা করে/জননীর আশীর্বাদ তাকে দীর্ঘায়ু করবে"— এ পঙক্তিদ্বয়ের জননী বলতে কাকে বোঝানো হয়েছে? [পটুয়াখালী সরকারি মহিলা কলেজ]
(ক) মাতৃভূমিকে (খ) গো-মাতাকে
(গ) দেশপ্রেমকে (ঘ) জন্মদাত্রীকে
উত্তর: (ঘ) জন্মদাত্রীকে

১৪১। 'আমরা কি তাঁর মতো কবিতার কথা বলতে পারবো' চরণটিতে কবির মনের কোন দিকটি প্রকাশ পেয়েছে? [ডা: আবদুর রাজ্জাক মিউনিসিপ্যাল কলেজ, যশোর]
(ক) ভীতি (খ) সংশয়
(গ) শঙ্কা (ঘ) হতাশা
উত্তর: (খ) সংশয়

১৪২। 'রক্তজবার মতো প্রতিরোধের উচ্চারণ কবিতা' চরণটিতে কী প্রকাশিত হয়েছে? [বিসিআইসি কলেজ, ঢাকা]

উত্তর: (খ) দৃপ্ত শপথ

১৪৩। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি রক্তজবার মতো ক্ষত বলতে কীসের ক্ষত বুঝিয়েছেন? [ভিকারুননিসা নূন স্কুল এন্ড কলেজ, ঢাকা]
(ক) পূর্বপুরুষদের অত্যাচারিত হওয়ার (খ) পূর্বপুরুষদের আঘাতপ্রাপ্ত হওয়ার
(গ) পূর্বপুরুষদের নিপীড়িত হওয়া (ঘ) পূর্বপুরুষদের নির্যাতিত হওয়া

১৪৪। প্রবহমান নদী কাকে পুরস্কৃত করবে? 
(ক) যে কর্ষণ করে (খ) যার হাতে পলিমাটির সৌরভ লেগে আছে
(গ) যে গাভীর পরিচর্যা করে (ঘ) যে মৎস্য লালন করে
উত্তর: (ঘ) যে মৎস্য লালন করে

১৪৫। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি কেন তাঁর পূর্ব পুরুষের কথা বলেছেন? [ঘ. বো. ২২]
(ক) সাহসী ছিল বলে (খ) নিপীড়িত হয়েছে বলে
(গ) গৌরবোজ্জ্বল ইতিহাস রয়েছে বলে
উত্তর: (গ) গৌরবোজ্জ্বল ইতিহাস রয়েছে বলে

১৪৬। 'আমি কিংবদন্তির কথা বলছি' কবিতায় ‘বিচলিত স্নেহ’ বলতে কবি কী বুঝিয়েছেন? [ব. বো. ১৯]
(ক) কপট মায়া  (খ) লোক দেখানো আদর
(গ) আপনজনের উৎকণ্ঠা  (ঘ) সশ্রদ্ধ ভালোবাসা
উত্তর: (গ) আপনজনের উৎকণ্ঠা

১৪৭। ‘আমি যেখানেই থাকি, যেমনি থাকি, সর্বদা মনে বাংলাদেশকেই লালন করি’- উল্লিখিত অংশ ‘আমি কিংবদন্তির কথা বলছি’ কবিতার কোন মনোভাবকে উপস্থাপন করে? [রা. বো. ১৭]

(গ) প্রকৃতি চেতনা  (ঘ) স্বাধীনতার
উত্তর: (ক) শেকড়সন্ধানী

১৪৮। “একটি উজ্জ্বল জানালার কথা বলছি”— এখানে উজ্জ্বল জানালা কিসের প্রতীক? [ঢা. বো. ২০]

(গ) চিন্তার স্বাধীনতা  (ঘ) মুক্তজীবনের প্রত্যাশা
উত্তর: (ঘ) মুক্তজীবনের প্রত্যাশা

১৪৯। ‘একটি উজ্জ্বল জানালার কথা বলছি’- এখানে ‘উজ্জ্বল জানালা’ কীসের প্রতীক? [য. বো. ১৬]
(ক) স্বাধীনতার সূর্য  (খ) জ্ঞানের পূর্ণ বিকাশ
(গ) চিন্তার স্বাধীনতা  (ঘ) মুক্ত জীবনের প্রত্যাশা
উত্তর: (ঘ) মুক্ত জীবনের প্রত্যাশা

১৫০। 'আমি কিংবদন্তির কথা বলছি' কবিতায় মুক্তির পূর্বশর্ত কী? [রা. বো. ২০]
(ক) শান্তি  (খ) সাহসী
(গ) যুদ্ধ  (ঘ) স্বাধীনতা
উত্তর: (গ) যুদ্ধ

১৫১। ‘যেখানেই থাকি, হৃদয়ে বাংলাদেশ’ উক্তিটি 'আমি কিংবদন্তির কথা বলছি' কবিতার কবির কোন মনোভাবকে উপস্থাপন করে? [আইডিয়াল কলেজ, ধানমন্ডি, ঢাকা]
(ক) মুক্তিযুদ্ধের মনোভাব  (খ) দেশপ্রেমিক মনোভাব
(গ) প্রকৃতি চেতনার মনোভাব  (ঘ) শিকড়সন্ধানী মনোভাব
উত্তর: (ঘ) শিকড়সন্ধানী মনোভাব

১৫২। গঠনরীতির দিক থেকে আলাদা কোনটি? [জয়পুরহাট গার্লস ক্যাডেট কলেজ]

(ক) সভ্যতার  (খ) সংস্কৃতির
(গ) ঐতিহ্যের  (ঘ) ইতিহাসের
উত্তর: (গ) ঐতিহ্যের

১৫৪। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কোন পঙক্তিটি বারবার প্রয়োগ করেছেন কবি? [নটর ডেম কলেজ; বিএএফ শাহীন কলেজ]
(ক) আমি কবি ও কবিতার কথা বলছি
(খ) আমি কিংবদন্তির কথা বলছি
(গ) ভালোবাসা দিলে মা মরে যায়
(ঘ) আমি বিচলিত স্নেহের কথা বলছি
উত্তর: (খ) আমি কিংবদন্তির কথা বলছি

১৫৫। ‘আমি বিচলিত স্নেহের কথা বলছি’ এখানে বিচলিত অর্থ কী? [বান্দরবান সরকারি কলেজ]

(গ) উদ্বিগ্ন  (ঘ) উচ্চারণযোগ্য
উত্তর: (গ) উদ্বিগ্ন

১৫৬। 'আমি কিংবদন্তির কথা বলছি' কবিতায় উজ্জ্বল জানালার অনুষঙ্গ ব্যবহৃত হয়েছে কেন? [বিএএফ শাহীন কলেজ]
(ক) মুক্তজীবনের প্রত্যাশা জানাতে  (খ) আনন্দের উচ্ছ্বাস বোঝাতে
(গ) সকল গ্লানি ঝেড়ে ফেলতে  (ঘ) অতিষ্ঠ হওয়ার জন্য
উত্তর: (ক) মুক্তজীবনের প্রত্যাশা জানাতে

১৫৭। কবির পূর্বপুরুষেরা কবিতার অনুরক্ত ছিলেন কেন? [সরকারি বেগম রোকেয়া কলেজ, রংপুর]
(ক) বিপ্লবী ছিলেন বলে  (খ) সৃষ্টিশীল ছিলেন বলে
(গ) কবিতাপ্রেমী ছিলেন বলে  (ঘ) পরিশ্রমী ছিলেন বলে
উত্তর: (খ) সৃষ্টিশীল ছিলেন বলে

১৫৮। কবি কেন তাঁর পূর্বপুরুষের কথা বলেছেন? [শহীদ বীর উত্তম লে. আনোয়ার গার্লস কলেজ, ঢাকা]
(ক) সাহসী ছিল বলে  (খ) নিপীড়িত হয়েছে বলে
(গ) ইতিহাসকে তুলে ধরতে  (ঘ) ঐতিহ্যকে তুলে ধরতে
উত্তর: (ঘ) ঐতিহ্যকে তুলে ধরতে

১৫৯। কবি কেন উনোনের আগুনে আলোকিত একটি জানালার কথা বলেছেন? [বিএএফ শাহীন কলেজ]
(ক) সাফল্য প্রাপ্তির প্রত্যাশা জানাতে
(খ) পবিত্রতা রক্ষা করার জন্যে
(গ) মুক্ত জীবনের প্রত্যাশা জানাতে
(ঘ) চেতনার জাগরণের জন্যে
উত্তর: (গ) মুক্ত জীবনের প্রত্যাশা জানাতে

১৬০। 'আমি কিংবদন্তির কথা বলছি' কবিতার শুরুতে কোন বিষয়টি ফুটে উঠেছে? [পটুয়াখালী সরকারি মহিলা কলেজ]

(গ) দেশের প্রতি ভালোবাসা  (ঘ) বাংলার হাজার বছরের ইতিহাস
উত্তর: (ঘ) বাংলার হাজার বছরের ইতিহাস

১৬১। 'আমি কিংবদন্তির কথা বলছি' কবিতায় শুদ্ধতার প্রতীক হিসেবে কী ব্যবহৃত হয়েছে? [রায়পুর সরকারি কলেজ, লক্ষ্মীপুর]
(ক) পানি  (খ) আগুন
(গ) গাছ  (ঘ) বাতাস
উত্তর: (খ) আগুন

১৬২। 'আমি কিংবদন্তির কথা বলছি' কবিতায় ‘কবিতা’ শব্দটি কী হিসেবে ব্যবহৃত হয়েছে? [শরীয়তপুর সরকারি কলেজ]
(ক) জাগরণ  (খ) প্রতীক
(গ) সংগ্রাম  (ঘ) প্রত্যাশা
উত্তর: (খ) প্রতীক

(ক) শৃঙ্খল মুক্তি  (খ) কবির প্রত্যাশা

উত্তর: (ক) শৃঙ্খল মুক্তি

১৬৪। 'আমি কিংবদন্তির কথা বলছি' কবিতায় কবি আবু জাফর ওবায়দুল্লাহ কবিতা ও সত্যের অভেদ কল্পনার মধ্য দিয়ে কোন বিষয়টি তুলে ধরেছেন? [সরকারি নূরুন্নাহার মহিলা কলেজ, ঝিনাইদহ]

উত্তর: (গ) পরিবারের কথা

১৬৮। কবি জানেন মুক্তির পূর্বশর্ত—

ii. ফল ভোগ
iii. আঘাতের চিহ্ন
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ১৯৫ ও ১৯৬ নং প্রশ্নের উত্তর দাও:
“কে কবি-কবে কে মোরে? ঘটকালি করি
শব্দে শব্দে বিয়া দেয় যেই জন।” [রা. বো. ২২]

১৯৫। উদ্দীপকে বর্ণিত বিষয়ের সঙ্গে ‘আমি কিংবদন্তির কথা বলছি’ কবিতার নিম্নোক্ত সাদৃশ্যপূর্ণ পঙ্ক্তি কোনটি?
(ক) আমি কবি এবং কবিতার কথা বলছি
(খ) আমরা কি তাঁর মতো কবিতার কথা বলতে পারবো
(গ) সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান কবিতা
(ঘ) জিহ্বায় উচ্চারিত প্রতিটি সত্য শব্দ কবিতা
উত্তর: (ক) আমি কবি এবং কবিতার কথা বলছি

১৯৬। ‘আমি কিংবদন্তির কথা বলছি’ কবিতায় উল্লিখিত কবির কাজ উদ্দীপকের কবির তুলনায় ভিন্নতর। নিচের কোনটিতে তা প্রকাশ পেয়েছে? [রা. বো. ২২]
(ক) কবিসৃষ্ট শব্দবদ্ধ কবিতা
(খ) স্বপ্নদ্রষ্টা কবির কবিতা স্বপ্নদ্রষ্টা
(গ) কবি অনিবার্য অভ্যুত্থানের কথা বলেন
(ঘ) কবি স্বাধীনতার কথা বলেন
উত্তর: (খ) স্বপ্নদ্রষ্টা কবির কবিতা স্বপ্নদ্রষ্টা

১৯৭। উদ্দীপকটি তোমার পাঠ্য কোন কবিতার সঙ্গে সাদৃশ্যপূর্ণ? [য. বো. ২৩]
(ক) আঠারো বছর বয়স  (খ) আমি কিংবদন্তির কথা বলছি
(গ) বিদ্রোহী  (ঘ) ফেব্রুয়ারি ১৯৬৯
উত্তর: (খ) আমি কিংবদন্তির কথা বলছি

১৯৮। উদ্দীপক এবং উক্ত সাদৃশ্যপূর্ণ কবিতার উপজীব্য বিষয় হচ্ছে— [য. বো. ২৩]
i. ইতিহাস
ii. ঐতিহ্য
iii. সংগ্রাম
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৯৯ ও ২০০ নং প্রশ্নের উত্তর দাও:
আমি জন্মেছি বাংলায়, আমি বাংলায় কথা বলি,
আমি বাংলার আল পথ দিয়ে হাজার বছর চলি।
আমি পলিমাটি কোমলে আমার চলার চিহ্ন ফেলে।
তেরোশত নদী শুধায় আমাকে, ‘কোথা থেকে তুমি এলে?’

১৯৯। কবিতাংশের ‘বাংলার আলপথ’ এর সাথে ‘আমি কিংবদন্তির কথা বলছি’ কবিতার সাদৃশ্যপূর্ণ ভাব কোনটি? [ম. বো. ২২]
(ক) ইতিহাস ও ঐতিহ্য  (খ) বাংলার সৌন্দর্য
(গ) সংগ্রাম ও বিপ্লব  (ঘ) শাসন ও নিপীড়ন
উত্তর: (ক) ইতিহাস ও ঐতিহ্য

২০০। উদ্দীপকে প্রতিফলিত চেতনা ব্যক্ত হয়েছে নিচের কোন চরণে? [ম. বো. ২২]
(ক) কর্ষিত জমির প্রতিটি শস্যদানা কবিতা
(খ) আমি কবি এবং কবিতার কথা বলছি
(গ) আমি কিংবদন্তির কথা বলছি
(ঘ) তাঁর করতলে পলিমাটির সৌরভ ছিল
উত্তর: (গ) আমি কিংবদন্তির কথা বলছি

উদ্দীপকের আলোকে ২০১ ও ২০২ নং প্রশ্নের উত্তর দাও:
সুনীল গঙ্গোপাধ্যায়ের ‘আমিই সে’ ছোট্ট উপন্যাসটিতে বিধৃত হয়েছে মানব সভ্যতার আদিম ইতিহাস আর সভ্যতার অগ্রগতি। কীভাবে আদিম মানুষ সভ্য মানুষে পরিণত হয়েছে, তারই প্রকাশ ঘটেছে উপন্যাসটিতে। [রা. বো. ১৯]

২০১। উদ্দীপকের সাথে ‘আমি কিংবদন্তির কথা বলছি’ কবিতার সাদৃশ্য রয়েছে—
i. ঐতিহ্য চেতনায়
ii. মুক্তির চেতনায়
iii. সংগ্রামী চেতনায়
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

২০২। উদ্দীপক ও ‘আমি কিংবদন্তির কথা বলছি’ কবিতার বৈসাদৃশ্য লক্ষ করা যায়—
(ক) সভ্যতা বিকাশে  (খ) ইতিহাস চেতনায়
(গ) ভাবগাম্ভীর্যে  (ঘ) সংগ্রামশীলতায়
উত্তর: (গ) ভাবগাম্ভীর্যে

উদ্দীপকের আলোকে ২০৩ ও ২০৪ নং প্রশ্নের উত্তর দাও:
সোনার ছেলেটি মুক্তিযুদ্ধে যায়।
মা ডাকে পিছু, ‘আয় খোকা, ফিরে আয়’।
শোনেনি সে কথা কেন?
সেদিন স্বদেশের প্রয়োজন ছিল বেশি, জেনো। [বরিশাল সরকারি মহিলা কলেজ]

২০৩। উদ্দীপকটি ‘আমি কিংবদন্তির কথা বলছি’ কবিতার যে বক্তব্য নিয়ে রচিত—
i. যুদ্ধ আসে ভালোবেসে
ii. মায়ের ছেলেরা চলে যায়
iii. ভালোবাসা দিলে মা মরে যায়
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২০৪। উদ্দীপক ও ‘আমি কিংবদন্তির কথা বলছি’ কবিতায় স্পষ্ট—
i. ভালোবাসার জন্য যুদ্ধ হয়েছে
ii. বিদেশিদের চক্রান্তের কারণে এ দেশে যুদ্ধ এসেছে
iii. আজও দেশের মানুষ সত্য ও ন্যায়ের পক্ষে যুদ্ধ করে
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ২০৫ ও ২০৬ নং প্রশ্নের উত্তর দাও:
আমি তো এসেছি তিতুমীর আর হাজী শরীয়ত থেকে।
আমি তো এসেছি গীতাঞ্জলি ও অগ্নিবীণা থেকে।
এসেছি বাঙালি ক্ষুদিরাম আর সূর্য সেনের থেকে।
এসেছি বাঙালি জয়নুল আর অবন ঠাকুর থেকে।
এসেছি বাঙালি রাষ্ট্রভাষার লাল রাজপথ থেকে। [কু. বো. ১৬]

২০৫। উদ্দীপকের চেতনার সঙ্গে ‘আমি কিংবদন্তির কথা বলছি’ কবিতার যে চরণের মিল রয়েছে—
(ক) আমি আমার ভালোবাসার কথা বলছি
(খ) আমরা কি তাঁর মতো স্বাধীনতার কথা বলতে পারবো
(গ) সশস্ত্র সুন্দরের অনিবার্য অভ্যুত্থান কবিতা
(ঘ) আমি কবি এবং কবিতার কথা বলছি
উত্তর: (ঘ) আমি কবি এবং কবিতার কথা বলছি

২০৬। উদ্দীপক ও ‘আমি কিংবদন্তির কথা বলছি’ কবিতায় প্রকাশিত মূলভাব—
(ক) ঐতিহ্যপ্রীতি ও মুক্তির আকাঙ্ক্ষা  (খ) ভালোবাসা আর শঙ্কা
(গ) মানবিক উদ্ভাসনের স্বপ্ন  (ঘ) কবিতার সত্য অনুধাবন
উত্তর: (ক) ঐতিহ্যপ্রীতি ও মুক্তির আকাঙ্ক্ষা

উদ্দীপকের আলোকে ২০৭ ও ২০৮ নং প্রশ্নের উত্তর দাও:
সে যাই হোক, কবির হয়ে শুধু এই কথাটি আমি বলতে চাই যে, কবির উক্তি আমাদের অনেকেরই বন্ধ চোখকে খুলে দেয়, কারণ খোলা চোখকে বন্ধ করে না। [সরকারি বিজ্ঞান কলেজ, ঢাকা]

২০৭। কবি এবং কবিতার প্রসঙ্গ কোন কবিতাটিতে এসেছে?
(ক) ফেব্রুয়ারি ১৯৬৯  (খ) আঠারো বছর বয়স
(গ) রক্তে আমার অনাদি অস্থি  (ঘ) আমি কিংবদন্তির কথা বলছি
উত্তর: (ঘ) আমি কিংবদন্তির কথা বলছি

২০৮। উক্ত কবিতার প্রেক্ষাপটে কবিরা সমাজ ও রাষ্ট্রের জন্যে প্রয়োজনীয় কারণ—
i. তাঁরা কবিতা লেখেন
ii. তাঁরা ভালোবাসতে শেখান
iii. তাঁরা মুক্তির কথা বলেন
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ২০৯ ও ২১০ নং প্রশ্নের উত্তর দাও:
অজয় রায় তাঁর “আদি বাঙালি: নৃতাত্ত্বিক ও সমাজতাত্ত্বিক বিশ্লেষণ” বইয়ে বাঙালিজনের নৃতাত্ত্বিক, সামাজিক ও সাংস্কৃতিক পরিচয় চমৎকারভাবে ফুটিয়ে তুলেছেন। [কু. বো. ১৯]

২০৯। উদ্দীপকটি ‘আমি কিংবদন্তির কথা বলছি’ কবিতার কোন বিষয়কে উপস্থাপন করে—
(ক) বাঙালির সংগ্রাম  (খ) বাঙালির গৌরব
(গ) বাঙালির বিজয়  (ঘ) বাঙালির ঐতিহ্য
উত্তর: (ঘ) বাঙালির ঐতিহ্য

২১০। উক্ত বিষয়ের প্রেক্ষিতে ‘আমি কিংবদন্তির কথা বলছি’ কবিতাকে বলা যায়—
i. আত্মপরিচয়ের কবিতা
ii. আত্মসমালোচনার কবিতা
iii. আত্মচেতনার কবিতা
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ২১১ ও ২১২ নং প্রশ্নের উত্তর দাও:
আবার আসিব ফিরে ধানসিঁড়িটির তীরে এই বাংলায়। [ঢা. বো. ১৭]

২১১। উদ্দীপকের সঙ্গে ‘আমি কিংবদন্তির কথা বলছি’ কবিতার বৈসাদৃশ্য হলো—
i. শব্দ প্রয়োগে
ii. ছন্দ ব্যবহারে
iii. চিত্রকল্প ব্যবহারে
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২১২। বৈসাদৃশ্য থাকলেও উভয়ের যোগসূত্র কোনটি? [ঢা. বো. ১৭]
(ক) ঐতিহ্য নির্মাণে  (খ) আত্মাধিকারোচিত্তে
(গ) জীবনের প্রকাশে  (ঘ) গভীরতা সঞ্চারে
উত্তর: (গ) জীবনের প্রকাশে

উদ্দীপকের আলোকে ২১৩ ও ২১৪ নং প্রশ্নের উত্তর দাও:
যত দূর যাই
যেখানেই থাকি, হৃদয়ে বাংলাদেশ
যত বলে যাই
যেদিকেই যাই, রূপের নাইকো শেষ [গুলশান কমার্স কলেজ; সরকারি আজিজুল হক কলেজ]

২১৩। উদ্দীপকটি ‘আমি কিংবদন্তির কথা বলছি’ কবিতায় প্রকাশিত কবি মনের কোন ভাবকে প্রকাশ করে?
(ক) শেকড়সন্ধানী মনোভাব  (খ) দেশদরদি মনোভাব

২১৭। “সুন্দরের অনিবার্য অভ্যুত্থান কবিতা” কোন কবিতার চরণ? [ঢাবি (খ ইউনিট) ১৯-২০]

২১৯। আবু জাফর ওবায়দুল্লাহর কবিতায় বিশেষভাবে প্রাধান্য পেয়েছে— [জবি (গ ইউনিট) ১৯-২০]

২২০। “জিহ্বায় উচ্চারিত প্রতিটি —— কবিতা”— শূন্যস্থানে কী হবে? [বেরোবি (গ ইউনিট) ১৯-২০; ঢাবি (ক ইউনিট) ১৬-১৭]

২২১। কোন কাব্যগ্রন্থটি আবু জাফর ওবায়দুল্লাহ রচিত? [জাকনবি (খ ইউনিট) ১৭-১৮]
(ক) আসমানের কান্না  (খ) সাত নলীর হার

২২২। 'আমি কিংবদন্তির কথা বলছি' কবিতায় শুদ্ধতার প্রতীক কোনটি? [ঢাবি (ঘ-৩ ইউনিট) ১৬-১৭]
(ক) মাটি  (খ) পর্বত
(গ) পানি  (ঘ) আগুন
উত্তর: (ঘ) আগুন
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let reviewList = [];
        let reviewMode = false;
        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadReviewList() {
            const saved = localStorage.getItem(STORAGE_KEY + "_review");
            if (saved) reviewList = JSON.parse(saved);
        }

        function saveReviewList() {
            localStorage.setItem(STORAGE_KEY + "_review", JSON.stringify(reviewList));
        }

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
            <button onclick="toggleReviewMode()" id="review-btn" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                📌 Need to Review (${reviewList.length})
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            let filteredData = data.map((q, i) => ({ ...q, originalIndex: i }));

            if (reviewMode) {
                filteredData = filteredData.filter(item => reviewList.includes(item.originalIndex));
            } else if (wrongQuestionsOnly) {
                filteredData = filteredData.filter((item, i) =>
                    userAnswers[i] && userAnswers[i] !== data[i].answer
                );
            }

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" 
                            ${reviewList.includes(originalIdx) ? 'checked' : ''} 
                            onchange="toggleReview(${originalIdx}, this.checked)"
                            class="w-5 h-5 accent-purple-500">
                        <span class="text-purple-400 text-sm font-medium">Review</span>
                    </label>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        function toggleReview(qIndex, isChecked) {
            if (isChecked) {
                if (!reviewList.includes(qIndex)) reviewList.push(qIndex);
            } else {
                reviewList = reviewList.filter(idx => idx !== qIndex);
            }
            saveReviewList();
            updateReviewButton();
        }

        function updateReviewButton() {
            const btn = document.getElementById('review-btn');
            if (btn) btn.textContent = `📌 Need to Review (${reviewList.length})`;
        }

        function toggleReviewMode() {
            reviewMode = !reviewMode;
            const btn = document.getElementById('review-btn');

            if (reviewMode) {
                btn.style.backgroundColor = '#6b21a8';
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
            } else {
                btn.style.backgroundColor = '';
                btn.innerHTML = `📌 Need to Review (${reviewList.length})`;
            }

            const container = document.getElementById('quiz-container');
            container.style.opacity = '0.5';
            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
            loadReviewList();
            updateReviewButton();
        };
    </script>
