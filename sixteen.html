<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">রবীন্দ্রনাথের 'অপরিচিতা' গল্প</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। কবি জসীমউদ্‌দীন কত সালে জন্মগ্রহণ করেন?
(ক) ১৯০১ (খ) ১৯০৩ (গ) ১৯০৫ (ঘ) ১৯০৭
উত্তর: (খ) ১৯০৩

২। জসীমউদ্‌দীনকে কোন বিশ্ববিদ্যালয় ডি-লিট ডিগ্রি প্রদান করে?
(ক) কলকাতা বিশ্ববিদ্যালয় (খ) দিল্লি বিশ্ববিদ্যালয় (গ) ঢাকা বিশ্ববিদ্যালয় (ঘ) রবীন্দ্রভারতী বিশ্ববিদ্যালয়
উত্তর: (ঘ) রবীন্দ্রভারতী বিশ্ববিদ্যালয়

৩। 'প্রতিদান' কবিতায় কবি কার ঘর বাঁধেন?
(ক) যে কবির ঘর ভেঙেছে (খ) যে কবির ঘর বেঁধেছে (গ) যে কবির ঘর নিয়ে গেছে (ঘ) যে কবিকে ঘর দিয়েছে
উত্তর: (ক) যে কবির ঘর ভেঙেছে

৪। "আমার এ ঘর ভাঙিয়াছে যেবা আমি বাঁধি তার ঘর"- এই চরণে কবি কী বুঝিয়েছেন?
(ক) পরোপকার (খ) আত্মগ্লানি (গ) সর্বংসহা মনোভাব (ঘ) কৃতজ্ঞতাবোধ
উত্তর: (ক) পরোপকার

৫। 'প্রতিদান' কবিতায় উল্লিখিত রজনী কেমন ছিল?
(ক) দীঘল (খ) জ্যোৎস্নালোকিত (গ) মেঘাচ্ছন্ন (ঘ) অন্ধকারাচ্ছন্ন
উত্তর: (ক) দীঘল

৬। 'প্রতিদান' কবিতায় কার জন্য দীঘল রজনী জেগে থাকেন?
(ক) কবিকে পর করে যে (খ) কবির ঘুম হরণ করে যে (গ) কবির ঘর ভাঙে যে (ঘ) কবির বুকে আঘাত করে যে
উত্তর: (খ) কবির ঘুম হরণ করে যে

৭। 'কাঁটা পেয়ে তারে ফুল করি দান'- চরণটিতে কবি কী বুঝিয়েছেন?
(ক) কৃতজ্ঞতা (খ) পরার্থপরতা (গ) ক্ষুদ্রতা (ঘ) অপচিকীর্ষা
উত্তর: (খ) পরার্থপরতা

৮। কীসের মধ্যে ব্যক্তির প্রকৃত সুখ নিহিত?
(ক) জ্ঞান অর্জন (খ) হানাহানি (গ) পরার্থপরতা (ঘ) ক্ষুদ্র স্বার্থ
উত্তর: (গ) পরার্থপরতা

৯। 'প্রতিদান' কবিতায় কবির চেতনা প্রকাশ পেয়েছে?
(ক) উদারতা (খ) উদাসীনতা (গ) বিমুখতা (ঘ) নির্লিপ্ততা
উত্তর: (ক) উদারতা

১০। 'প্রতিদান' কবিতায় কে পথের বিরাগী হয়েছেন?
(ক) কবি স্বয়ং (খ) কবির আপনজন (গ) কবির পিতা (ঘ) কবির প্রতিবেশী
উত্তর: (ক) কবি স্বয়ং

১১। "যে মোরে দিয়েছে বিষে-ভরা বাণ, আমি দেই তারে বুকভরা গান,"- এখানে 'বিষে-ভরা বাণ' কী অর্থ জ্ঞাপন করেছে? [ঢা. বো. ২২]
(ক) কটূকথা (খ) তীর (গ) মন্ত্র (ঘ) শর
উত্তর: (ক) কটূকথা

১২। 'প্রতিদান' কবিতায় কবি 'বিষে-ভরা' বাণের পরিবর্তে কী দিয়েছেন?
(ক) সোহাগ-জড়ানো ফুল (খ) বুক ভরা গান (গ) নিঠুরিয়া বাণী (ঘ) বুকেতে কঠিন আঘাত
উত্তর: (খ) বুক ভরা গান

১৩। 'আপন করিতে কাঁদিয়া বেড়াই যে মোরে করেছে পর।'- পঙক্তিতে কী বোঝানো হয়েছে?
(ক) ক্ষমাশীলতা (খ) মানবপ্রীতি (গ) আন্তরিকতা (ঘ) আত্মতৃপ্তি 
(দ্রষ্টব্য: চিত্রে 'ঘ' উত্তর দেওয়া আছে, তবে এটি সাধারণত উদারতা বা পরার্থপরতার বহিঃপ্রকাশ)।
উত্তর: (ঘ) ক্ষমাশীলতা

১৪। সুন্দর ও নিরাপদ পৃথিবীর জন্য কেমন মানুষ দরকার?
(ক) বিত্তবান (খ) ভালোবাসাপূর্ণ (গ) জ্ঞানী (ঘ) দক্ষ
উত্তর: (খ) ভালোবাসাপূর্ণ

১৫। 'প্রতিদান' কবিতায় কবি অনিষ্টকারীকে কী দিয়েছেন?
(ক) ক্ষমা (খ) শান্তি (গ) দয়া (ঘ) অভিশাপ
উত্তর: (ক) ক্ষমা

১৬। 'প্রতিদান' কবিতায় প্রতিদান শব্দটি কোন অর্থে ব্যবহৃত হয়েছে?
(ক) অনিষ্টকারীকে ক্ষমা (খ) বাসযোগ্য সুন্দর পৃথিবী বিনির্মাণ (গ) অনিষ্টকারীকে শাস্তি প্রদান (ঘ) অপকারীর উপকার
উত্তর: (খ) বাসযোগ্য সুন্দর পৃথিবী বিনির্মাণ

১৭। প্রতিদান কবিতার মূল উপজীব্য হলো—
i. ক্ষমাশীলতা
ii. উদারতা
iii. পরার্থপরতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৮ ও ১৯ নং প্রশ্নের উত্তর দাও:
"মেরেছো কলসির কানা, তাই বলে কি প্রেম দেব না?"

১৮। উদ্দীপকের ভাব 'প্রতিদান' কবিতার কোন চরণে অনুপস্থিত?
(ক) আমার এ ঘর ভাঙিয়াছে যেবা আমি বাঁধি তার ঘর
(খ) আপন করিতে কাঁদিয়া বেড়াই যে মোরে করেছে পর
(গ) আমার এ কূল ভাঙিয়াছে যেবা আমি বাঁধি তার কূল
(ঘ) রঙিন ফুলের সোহাগ-জড়ানো ফুল মালঞ্চ ধরি
উত্তর: (ঘ) রঙিন ফুলের সোহাগ-জড়ানো ফুল মালঞ্চ ধরি

১৯। উদ্দীপকে 'প্রতিদান' কবিতার যে বিষয়টি ফুটে উঠেছে—
(ক) মহানুভবতা (খ) ভালোবাসা (গ) প্রত্যুপকার (ঘ) পরোপকার
উত্তর: (ঘ) পরোপকার

উদ্দীপকের আলোকে ২০ ও ২১ নং প্রশ্নের উত্তর দাও:
"পরার্থে আপন সুখ দিয়ে বিসর্জন,
তুমিও হওগো ধন্য তরুর মতন।"

২০। উদ্দীপকের সাথে 'প্রতিদান' কবিতার কোন দিকটি সামঞ্জস্যপূর্ণ?
(ক) সহনশীলতা (খ) ক্ষমা
(গ) পরার্থপরতা (ঘ) অনিষ্টকারী মঙ্গল
উত্তর: (গ) পরার্থপরতা

২১। 'অনুচ্ছেদ ও 'প্রতিদান' কবিতা অনুসারে মানবজীবন কখন সার্থক হবে?
(ক) সুখ বিসর্জন দিলে
(খ) দুঃখে জীবন কাটালে
(গ) আত্মকেন্দ্রিক হলে
(ঘ) আত্মত্যাগ ও পরোপকার করলে
উত্তর: (ঘ) আত্মত্যাগ ও পরোপকার করলে

উদ্দীপকের আলোকে ২২ ও ২৩ নং প্রশ্নের উত্তর দাও:
ইব্রাহিমের ঘর পুড়িয়ে দেয় অজয়। ইব্রাহিমও তার প্রতিশোধ নেওয়ার জন্য তৎপর হয়ে ওঠে। একদিন সুযোগ বুঝে সেও অজয়ের ঘরে আগুন লাগিয়ে পুড়িয়ে দেয়।

২২। উদ্দীপকের সঙ্গে 'প্রতিদান' কবিতার কার বৈসাদৃশ্য রয়েছে? [চ. বো. ২২]
(ক) কবির (খ) যে কবিকে পর করেছে
(গ) প্রকৃতির (ঘ) কবির স্বজন
উত্তর: (ক) কবির

২৩। 'প্রতিদান' কবিতার প্রেক্ষাপট বিবেচনায় উদ্দীপকের ইব্রাহিম একজন—
i. অসৎ মানুষ
ii. অমানবিক মানুষ
iii. অসহিষ্ণু মানুষ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ২৪ ও ২৫ নং প্রশ্নের উত্তর দাও:
মা-মরা মেয়ে রহিমাকৈ সৎমা অনেক অত্যাচার করে। সারাদিন খাটিয়ে সমস্ত কাজ করিয়ে নেয়। সামান্য ভুল করলেই সে রহিমাকৈ নির্যাতন করে। রহিমা তবুও সৎমাকে নিজের মায়ের মতোই ভালোবাসে।

২৪। উদ্দীপকের সৎ মায়ের সাথে 'প্রতিদান' কবিতার সাদৃশ্য কোথায়?
(ক) উদারতায় (খ) ক্ষমাশীলতায়
(গ) কর্মনিপুণতায় (ঘ) প্রতিহিংসায়
উত্তর: (ঘ) প্রতিহিংসায়

২৫। রহিমার মধ্যে কবি চেতনার প্রতিফলিত দিকটি হলো—
i. কর্মনিপুণতা
ii. উদারতা
iii. ক্ষমাশীলতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

২৬। 'প্রতিদান' কবিতার কবি কাঁটা পেয়ে কী দান করেছেন?
(ক) ফুল (খ) ঘৃণা
(গ) বাণ (ঘ) ঘর
উত্তর: (ক) ফুল

২৭। ‘আমার এ ঘর ভাঙিয়াছে যেবা আমি বাঁধি তার ঘর’- এ পঙক্তিতে কী বোঝানো হয়েছে?
(ক) পরোপকার (খ) আত্মগ্লানি
(গ) সর্বংসহা মনোভাব (ঘ) কৃতজ্ঞতাবোধ
উত্তর: (ক) পরোপকার

উদ্দীপকের আলোকে ২৮ ও ২৯ নং প্রশ্নের উত্তর দাও:
ইমাম হাসান (রা.) তাঁকে বিষ প্রয়োগে হত্যাকারী জায়েদাকে ক্ষমা করে দিলেন এবং বললেন, পরকালে তাকে বেহেশত প্রদানের জন্য আল্লাহর কাছে সুপারিশ করবেন।

২৮। উদ্দীপকের হাসান (রা.) এর সাথে 'প্রতিদান' পঙক্তির মিল আছে?
(ক) কত ঠাঁই হতে কত কী যে আমি সাজাই নিরন্তর
(খ) দীঘল রজনী তার তরে জাগি ঘুম যে হরেছে মোর
(গ) রঙিন ফুলের সোহাগ জড়ানো ফুল মালঞ্চ ধরি
(ঘ) যে গেছে বুকেতে আঘাত হানিয়া তার লাগি আমি কাঁদি
উত্তর: (ঘ) যে গেছে বুকেতে আঘাত হানিয়া তার লাগি আমি কাঁদি

২৯। উপর্যুক্ত মিলের কারণ—
i. ক্ষমাশীলতা
ii. আত্মপ্রশংসা
iii. পারস্পরিক সৌহার্দ্য
নিচের কোনটি সঠিক?
(ক) i ও iii (খ) i ও ii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও iii

কবি পরিচিতি অংশ:
৩০। জসীমউদ্‌দীনের মামার বাড়ি কোথায়?
(ক) গোবিন্দপুর গ্রাম (খ) বনানী
(গ) রাজেন্দ্রপুর (ঘ) তাম্বুলখানা
উত্তর: (ঘ) তাম্বুলখানা

৩১। জসীমউদ্‌দীনের পৈতৃক নিবাস কোথায়?
(ক) গোবিন্দপুর (খ) তাম্বুলখানা
(গ) গাইবান্ধা (ঘ) ফতেপুর
উত্তর: (ক) গোবিন্দপুর

৩২। জসীমউদ্‌দীন বিএ পাস করেন কোন কলেজ থেকে?
(ক) ফরিদপুর রাজেন্দ্র কলেজ (খ) কলকাতা ইসলামিয়া কলেজ
(গ) খুলনার বিএল কলেজ (ঘ) মিরপুর বাঙলা কলেজ
উত্তর: (ক) ফরিদপুর রাজেন্দ্র কলেজ

৩৩। জসীমউদ্‌দীন কোন বিশ্ববিদ্যালয় থেকে এমএ ডিগ্রি লাভ করেন?
(ক) ঢাকা বিশ্ববিদ্যালয় (খ) কলকাতা বিশ্ববিদ্যালয়
(গ) পাটনা বিশ্ববিদ্যালয় (ঘ) চট্টগ্রাম বিশ্ববিদ্যালয়
উত্তর: (খ) কলকাতা বিশ্ববিদ্যালয়

৩৪। জসীমউদ্‌দীন কলেজে অধ্যয়নকালে কোন কবিতা রচনা করে খ্যাতি অর্জন করেন?
(ক) পল্লীজননী (খ) কবর
(গ) রূপাই (ঘ) দেশ
উত্তর: (খ) কবর

৩৫। ‘কবর’ কবিতা কার সৃষ্টি?
(ক) মুনীর চৌধুরী (খ) রফিক আজাদ
(গ) জসীমউদ্‌দীন (ঘ) হুমায়ূন আজাদ
উত্তর: (গ) জসীমউদ্‌দীন

৩৬। ‘পল্লিকবি’ হিসেবে সমধিক পরিচিত কে?
(ক) আহসান হাবীব (খ) সুভাষ মুখোপাধ্যায়
(গ) রবীন্দ্রনাথ ঠাকুর (ঘ) জসীমউদ্‌দীন
উত্তর: (ঘ) জসীমউদ্‌দীন

৩৭। কোন কবি সরকারের প্রচার ও জনসংযোগ বিভাগে উচ্চপদে আসীন হয়েছিলেন?
(ক) সুকান্ত ভট্টাচার্য (খ) জীবনানন্দ দাশ
(গ) জসীমউদ্‌দীন (ঘ) মাইকেল মধুসূদন দত্ত
উত্তর: (গ) জসীমউদ্‌দীন

৩৮। জসীমউদ্‌দীনের কোন কাব্যগ্রন্থ বিভিন্ন বিদেশি ভাষায় অনূদিত হয়েছে?
(ক) ধানখেত (খ) রাখালি
(গ) নকশি কাঁথার মাঠ (ঘ) বালুচর
উত্তর: (গ) নকশি কাঁথার মাঠ

৩৯। 'সোজন বাদিয়ার ঘাট' কী জাতীয় রচনা?
(ক) কাব্য (খ) উপন্যাস
(গ) নাটক (ঘ) ছোটগল্প
উত্তর: (ক) কাব্য

৪০। 'প্রতিদান' কবিতায় কবি কার ঘর বাঁধেন?
(ক) যে কবির ঘর ভেঙেছে (খ) যে কবির ঘর বেঁধেছে
(গ) যে কবির ঘর নিয়ে গেছে (ঘ) যে কবিকে ঘর দিয়েছে
উত্তর: (ক) যে কবির ঘর ভেঙেছে

৪১। 'আমার এ ঘর ভাঙিয়াছে যেবা আমি বাঁধি তার ঘর'- এই চরণে কবি কী বুঝিয়েছেন?
(ক) পরোপকার (খ) আত্মগ্লানি
(গ) সর্বংসহা মনোভাব (ঘ) কৃতজ্ঞতাবোধ
উত্তর: (ক) পরোপকার

৪২। কবি কাকে আপন করতে কেঁদে বেড়ান?
(ক) যে তাঁকে পর করেছে (খ) যে তাঁকে আপন করেছে
(গ) যে তাঁকে ভালোবেসেছে (ঘ) যে তাঁকে আশ্রয় দিয়েছে
উত্তর: (ক) যে তাঁকে পর করেছে

৪৩। হাবিবের কেউ ক্ষতি করলে সে প্রতিশোধ না নিয়ে উল্টো উপকার করে। হাবিবের সঙ্গে 'প্রতিদান' কবিতার সাদৃশ্য কোথায়?
(ক) পরার্থে আত্মনিবেদনে (খ) করুণায়
(গ) প্রতিশোধে (ঘ) প্রীতিময় সম্পর্কে
উত্তর: (ক) পরার্থে আত্মনিবেদনে

৪৪। কবি পথে পথে ফিরছেন কেন?
(ক) অনিষ্টকারীর উপকারের জন্য (খ) প্রতিশোধ গ্রহণের জন্য
(গ) ক্ষমা প্রার্থনার জন্য (ঘ) আত্মগ্লানির কারণে
উত্তর: (ক) অনিষ্টকারীর উপকারের জন্য

৪৫। 'প্রতিদান' কবিতায় উল্লিখিত রজনী কেমন ছিল?
(ক) দীঘল (খ) জ্যোৎস্নালোকিত
(গ) মেঘাচ্ছন্ন (ঘ) অন্ধকারাচ্ছন্ন
উত্তর: (ক) দীঘল

৪৬। 'প্রতিদান' কবিতায় কার জন্য দীঘল রজনী জেগে থাকেন? [চ. বো. ২৩]
(ক) কবিকে পর করে যে (খ) কবির ঘুম হরণ করে যে
(গ) কবির ঘর ভাঙে যে (ঘ) কবির বুকে আঘাত করে যে
উত্তর: (খ) কবির ঘুম হরণ করে যে

৪৭। কবি কেন দীর্ঘ রজনী জেগেছেন?
(ক) মহৎ বলে (খ) স্বার্থপর বলে
(গ) লোভী বলে (ঘ) আত্মগ্লানিতে
উত্তর: (ক) মহৎ বলে

৪৮। 'প্রতিদান' কবিতায় কবি কী কী বেঁধে দিতে চেয়েছেন?
(ক) ফুল ও নৌকা (খ) ঘর ও বাড়ি
(গ) ঘর ও কূল (ঘ) বাগান ও কূল
উত্তর: (গ) ঘর ও কূল

৪৯। কবি কার জন্য কাঁদেন?
(ক) যে কবিকে আঘাত করেছে (খ) যে কবির কূল ভেঙেছে
(গ) যে কবির ঘর ভেঙেছে (ঘ) যে বিষে-ভরা বাণ দিয়েছে
উত্তর: (ক) যে কবিকে আঘাত করেছে

৫০। 'প্রতিদান' কবিতায় উল্লিখিত 'বাণ' কেমন?
(ক) বিষাক্ত (খ) স্নেহমাখা
(গ) সোহাগ-জড়ানো (ঘ) সুতীক্ষ্ণ
উত্তর: (ক) বিষাক্ত

৫১। কবি কাঁটার বিনিময়ে ফুল দান করেন—
(ক) এক মাস ধরে (খ) এক বছর ধরে
(গ) এক যুগ ধরে (ঘ) সারা জীবন ধরে
উত্তর: (ঘ) সারা জীবন ধরে

৫২। কোথায় কবর বাঁধার কথা কবিতায় উল্লেখ আছে?
(ক) বুকে (খ) ঘরের পাশে
(গ) বাগানে (ঘ) হৃদয়ে
উত্তর: (ক) বুকে

৫৩। 'প্রতিদান' কবিতায় কবর বাঁধা বলতে কী বোঝানো হয়েছে?
(ক) সাহস দেওয়া (খ) ব্যথা দেওয়া
(গ) উপহাস করা (ঘ) অবজ্ঞা করা
উত্তর: (খ) ব্যথা দেওয়া

৫৪। কবি কবরের বিনিময়ে কী দিতে চেয়েছেন?
(ক) কবর (খ) ফুল মালঞ্চ
(গ) ঘর (ঘ) বাণ
উত্তর: (খ) ফুল মালঞ্চ

৫৫। 'প্রতিদান' কবিতায় ফুল-মালঞ্চ কীসের সোহাগ জড়ানো?
(ক) ফুল ভাসানো ঢেউয়ের (খ) মাতৃস্নেহের
(গ) রঙিন ফুলের (ঘ) হৃদয়ের উষ্ণতার
উত্তর: (গ) রঙিন ফুলের

৫৬। 'প্রতিদান' কবিতায় মোট কয়টি পঙক্তি রয়েছে?
(ক) ১৮ টি (খ) ১৯ টি
(গ) ২০ টি (ঘ) ২১ টি
উত্তর: (ক) ১৮ টি

৫৭। আঘাতকারীর জন্য কান্নার মধ্য দিয়ে কবির মাঝে কী প্রকাশ পেয়েছে?
(ক) অসহায়ত্ব (খ) প্রতিহিংসা
(গ) শোক (ঘ) মানবপ্রেম
উত্তর: (ঘ) মানবপ্রেম

৫৮। 'যে মোরে দিয়েছে বিষে-ভরা বাণ, আমি দেই তারে বুকভরা গান'- এ পঙক্তিতে কী বোঝানো হয়েছে?
(ক) আত্মত্যাগ (খ) সর্বংসহা মনোভাব
(গ) পারস্পরিক সৌহার্দ্য (ঘ) বোকামি
উত্তর: (ক) আত্মত্যাগ

৫৯। বিষে-ভরা বাণের বিনিময়ে কবি বুকভরা গান দিতে চান কেন?
(ক) সৌহার্দ্য রক্ষায় (খ) অসহায়ত্বের কারণে
(গ) অনিষ্টকারীর ভয়ে (ঘ) শিল্পীস্বভাবের কারণে
উত্তর: (ক) সৌহার্দ্য রক্ষায়

৬০। ইমন অন্যায়ভাবে গ্রামছাড়া হলেও গ্রামের কারো বিপদে সেই সবার আগে সাহায্যের হাত বাড়ায়। ইমনের মধ্যে 'প্রতিদান' কবিতার কোন দিকটি প্রকাশ পেয়েছে?
(ক) আত্মগ্লানি (খ) আন্তরিকতা
(গ) ক্ষমাশীলতা (ঘ) আত্মত্যাগ
উত্তর: (গ) ক্ষমাশীলতা

৬১। মাসুদ সেই লোকটির জন্য টাকা ব্যয় করল যে মাসুদকে অপমান করেছিল। মাসুদের কোন গুণ ‘প্রতিদান’ কবিতার ‘আমার এ কূল ভাঙিয়াছে যেবা আমি তার কূল বাঁধি’- চরণে খুঁজে পাওয়া যায়—
(ক) ক্ষমাশীল ও পরোপকারী মানসিকতা (খ) ক্ষমাশীলতা
(গ) কৃতজ্ঞতা (ঘ) দানশীলতা
উত্তর: (ক) ক্ষমাশীল ও পরোপকারী মানসিকতা

৬২। 'বিরাগী' শব্দের অর্থ কী?
(ক) নিষ্ঠুর (খ) উদাসীন
(গ) অনুরাগ (ঘ) করুণা
উত্তর: (খ) উদাসীন

৬৩। 'মালঞ্চ' অর্থ কী?
(ক) ভালোবাসা (খ) ক্ষমা
(গ) ফুলের বাগান (ঘ) মঞ্চ
উত্তর: (গ) ফুলের বাগান

৬৪। 'প্রতিদান' কবিতায় সমাজকে কী দ্বারা আক্রান্ত বলা হয়েছে?
(ক) পরচর্চা (খ) আত্মস্বার্থ কামনা
(গ) লোভ (ঘ) বিভেদ-হিংসা-হানাহানি
উত্তর: (ঘ) বিভেদ-হিংসা-হানাহানি

৬৫। কবি কেন ভালোবাসাপূর্ণ মানুষ কামনা করেছেন?
(ক) নিরাপদ পৃথিবীর জন্য (খ) ব্যক্তিস্বার্থে
(গ) পরিবারের জন্য (ঘ) প্রতিদান পেতে
উত্তর: (ক) নিরাপদ পৃথিবীর জন্য

৬৬। কবি কীভাবে প্রীতিময় পরিবেশ সৃষ্টির আকাঙ্ক্ষা করেন?
(ক) প্রেম ও ভালোবাসার মাধ্যমে (খ) অর্থের মাধ্যমে
(গ) প্রতিহিংসা দিয়ে (ঘ) প্রতিশোধ দিয়ে
উত্তর: (ক) প্রেম ও ভালোবাসার মাধ্যমে

৬৭। কমল কখনো মানুষকে হিংসা করে না। সে মিলেমিশে থাকতে পছন্দ করে। ‘প্রতিদান’ কবিতার কোন দিকটি কমলের মধ্যে লক্ষণীয়?
(ক) ভালোবাসা (খ) ক্ষমা
(গ) দয়া (ঘ) উদারতা
উত্তর: (ক) ভালোবাসা

৬৮। 'প্রতিদান' কবিতার মূল প্রতিপাদ্য কোনটি?
(ক) ক্ষমা (খ) সংকীর্ণতা
(গ) ক্ষমা ও পরোপকার (ঘ) পরোপকার
উত্তর: (গ) ক্ষমা ও পরোপকার

৬৯। 'নিঠুরিয়া বাণী' কী?
(ক) নিষ্ঠুর কথা (খ) নিঠুর কথা
(গ) গালিগালাজপূর্ণ কথা (ঘ) গুরুত্বহীন কথা
উত্তর: (ক) নিঠুর কথা (বা নিষ্ঠুর কথা)

৭০। 'প্রতিদান' কবিতায় প্রতিদান শব্দটি কোন অর্থে ব্যবহৃত হয়েছে?
(ক) অনিষ্টকারীকে ক্ষমা প্রদান
(খ) বাসযোগ্য সুন্দর পৃথিবী বিনির্মাণ
(গ) অনিষ্টকারীকে শাস্তি প্রদান
(ঘ) অপকারীর উপকার
উত্তর: (ঘ) অপকারীর উপকার (দ্রষ্টব্য: এটি প্রসঙ্গের ওপর নির্ভর করে বিকল্প খ-ও হতে পারে)।

৮৮। কবি কেঁদে বেড়ান—
i. পরকে আপন করতে
ii. অন্যের আপন হতে
iii. দুঃখ পেয়ে
নিচের কোনটি সঠিক?
(ক) i (খ) ii ও iii
(গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i

৮৯। মহিমা কিছু গয়না বাড়ির কাজের মেয়ে শাহেনা চুরি করা সত্ত্বেও মহিমা শাহেনাকে ক্ষমা করে দেয় এবং শাহেনার বিপদের সময় সে অর্থ দিয়ে সাহায্য করে। 'প্রতিদান' কবিতার যে চরণ এই ঘটনার সাথে সাদৃশ্যপূর্ণ—
i. আমার এ ঘর ভাঙিয়াছে যেবা আমি বাঁধি তার ঘর
ii. আমার এ কূল ভাঙিয়াছে যেবা আমি তার কূল বাঁধি
iii. মোর বুকে যেবা কবর বেঁধেছে আমি তার বুক ভরি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৯০। প্রতিদান কবিতার মূল উপজীব্য হলো—
i. ক্ষমাশীলতা
ii. উদারতা
iii. পরার্থপরতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৯১। যে কবিকে পর করে দিয়েছিল কবি তাকে আপন করে পেতে চেয়েছেন, কারণ—
i. মানুষের প্রতি সহানুভূতি
ii. কবির পরার্থপরতা
iii. কবির অহিংস মনোভাব
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii
(গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৯২। ‘আমার এ কূল ভাঙিয়াছে যেবা আমি তার কূল বাঁধি’- বলতে বোঝানো হয়েছে—
i. ক্ষমাশীলতা
ii. স্বার্থপরতা
iii. সহনশীলতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (গ) i ও iii

৯৩। কবি আঘাতের পরিবর্তে দিতে চেয়েছেন—
i. ভালোবাসা
ii. ক্ষমা
iii. প্রত্যাঘাত
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii
(গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ৯৪ ও ৯৫ নং প্রশ্নের উত্তর দাও:
রোকন তার বন্ধু আসাদকে অনেক কটু কথা বলে। আসাদ ঠাণ্ডা মাথায় রোকনের কথা শুনলো এবং তাকে ভালোভাবে বুঝিয়ে বলে ভুল বোঝাবুঝির সমাপ্তি টানলো। 
৯৪। উদ্দীপকের সাথে 'প্রতিদান' কবিতার কোন চরণটি সাদৃশ্যপূর্ণ?
(ক) আমি দেই তারে বুকভরা গান (খ) আপন করিতে কাঁদিয়া বেড়াই যে মোরে করেছে পর
(গ) পথে পথে আমি ফিরি তার লাগি (ঘ) দীঘল রজনী তার তরে জাগি ঘুম যে হরেছে মোর
উত্তর: (ক) আমি দেই তারে বুকভরা গান

৯৫। উদ্দীপকে 'প্রতিদান' কবিতার ফুটে ওঠা দিক—
i. উদারতা
ii. প্রতিহিংসা
iii. সহনশীলতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ৯৬ ও ৯৭ নং প্রশ্নের উত্তর দাও:
ঝন্টু ও পন্টু দুই বন্ধু। ঝন্টু খুব সহজেই মানুষকে আপন করে নিতে পারে। অন্যদিকে পন্টু খুব প্রতিহিংসাপরায়ণ। কেউ তার ক্ষতি করলে সেও পাল্টা ক্ষতি করার চেষ্টা করে।

৯৬। উদ্দীপকের ঝন্টুর সাথে 'প্রতিদান' কবিতার কোন দিকটি সাদৃশ্যপূর্ণ?
(ক) ক্ষমাশীলতা (খ) দানশীলতা
(গ) উদারতা (ঘ) পরার্থপরতা
উত্তর: (গ) উদারতা

৯৭। উদ্দীপকের পন্টু 'প্রতিদান' কবিতার ভাববিরোধী, কারণ সে—
i. প্রতিহিংসাপরায়ণ
ii. প্রতিশোধপরায়ণ
iii. প্রতিযোগিতায় বিশ্বাসী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ৯৮ ও ৯৯ নং প্রশ্নের উত্তর দাও:
শিলাকে তার সৎমা অনেক অত্যাচার করে। সারাদিন কাজ করিয়ে নেয়। সামান্য ভুল করলেই সে শিলার ওপর নির্যাতন শুরু করে। তবুও শিলা তার সৎমাকে নিজের মায়ের মতোই ভালোবাসে।

৯৮। উদ্দীপকের সৎমায়ের সাথে 'প্রতিদান' কবিতার বৈসাদৃশ্য কোথায়?
(ক) উদারতায় (খ) ক্ষমাশীলতায়
(গ) প্রতিহিংসায় (ঘ) করুণায়
উত্তর: (গ) প্রতিহিংসায়

৯৯। শিলার মধ্য দিয়ে কবি চেতনার প্রতিফলিত দিকটি—
i. ভালোবাসা
ii. উদারতা
iii. ক্ষমাশীলতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১০০ ও ১০১ নং প্রশ্নের উত্তর দাও:
"পরার্থে আপন সুখ দিয়ে বিসর্জন,
তুমিও হওগো ধন্য তরুর মতন।" [সি. বো. ২৩]

১০০। উদ্দীপকের সাথে 'প্রতিদান' কবিতার কোন দিকটি সামঞ্জস্যপূর্ণ?
(ক) সহনশীলতা (খ) ক্ষমা
(গ) পরার্থপরতা (ঘ) অনিষ্টকারী মঙ্গল
উত্তর: (গ) পরার্থপরতা

১০১। অনুচ্ছেদ ও 'প্রতিদান' কবিতা অনুসারে মানবজীবন কখন সার্থক হবে?
(ক) সুখ বিসর্জন দিলে (খ) দুঃখে জীবন কাটালে
(গ) আত্মকেন্দ্রিক হলে (ঘ) আত্মত্যাগ ও পরোপকার করলে
উত্তর: (ঘ) আত্মত্যাগ ও পরোপকার করলে

কবি পরিচিতি ও সাধারণ জ্ঞান:
১০২। জসীমউদ্‌দীনের প্রথম প্রকাশিত কাব্যগ্রন্থ কোনটি?
(ক) রাখালি (খ) বালুচর
(গ) নকশি কাঁথার মাঠ (ঘ) সোজন বাদিয়ার ঘাট
উত্তর: (ক) রাখালি

১০৩। কোন কবির নামানুসারে ঢাকা বিশ্ববিদ্যালয়ের একটি ছাত্রাবাসের নামকরণ হয়েছে?
(ক) শামসুর রাহমান (খ) সুধীন্দ্রনাথ দত্ত
(গ) গোলাম মোস্তফা (ঘ) জসীমউদ্‌দীন
উত্তর: (ঘ) জসীমউদ্‌দীন

১০৪। বিশ্ববিদ্যালয়ের ছাত্র থাকাকালে কোন কবির কবিতা প্রবেশিকা বাংলা সংকলনে অন্তর্ভুক্ত হয়?
(ক) মধুসূদন দত্ত (খ) জসীমউদ্‌দীন
(গ) ফররুখ আহমদ (ঘ) শামসুর রাহমান
উত্তর: (খ) জসীমউদ্‌দীন

১০৫। শোক-কবিতাকে ইংরেজিতে বলে—
(ক) Elegy (খ) Obituary
(গ) Condolence (ঘ) Epigram
উত্তর: (ক) Elegy

১০৬। 'The Field of Embroidered Quilt' বাক্যটি কবি জসীমউদ্‌দীনের কোন কাব্যের ইংরেজি অনুবাদ?
(ক) সোজন বাদিয়ার ঘাট (খ) রঙিলা নায়ের মাঝি
(গ) নকশি কাঁথার মাঠ (ঘ) রাখালি
উত্তর: (গ) নকশি কাঁথার মাঠ

১০৭। ঢাকা বিশ্ববিদ্যালয়ে কিছুকাল অধ্যাপনা করেছেন যে কবি—
(ক) বেগম সুফিয়া (খ) শামসুর রাহমান
(গ) জসীমউদ্‌দীন (ঘ) বুদ্ধদেব বসু
উত্তর: (গ) জসীমউদ্‌দীন

১০৮। ‘নকশি কাঁথার মাঠ’ কাব্যগ্রন্থের ইংরেজি অনুবাদ করেন—
(ক) E. M. Milford (খ) W. B. Yeats
(গ) Wordsworth (ঘ) John Milton
উত্তর: (ক) E. M. Milford

১০৯। ‘যে মোরে করিল পথের বিরাগী’- এর পরবর্তী চরণ কী?
(ক) পথে পথে আমি ফিরি তার লাগি (খ) পথে ঘাটে আমি ফিরি তার লাগি
(গ) পথ হতে পথে ফিরি তার লাগি (ঘ) পথে পথে ফিরি তার লাগি
উত্তর: (ক) পথে পথে আমি ফিরি তার লাগি

১১০। আঘাতকারীর জন্য কান্নার মধ্য দিয়ে কবির মাঝে কী প্রকাশ পেয়েছে?
(ক) অসহায়ত্ব (খ) শোক
(গ) প্রতিহিংসা (ঘ) মানবপ্রেম
উত্তর: (ঘ) মানবপ্রেম

১১১। “যে মোরে দিয়েছে বিষে-ভরা বাণ, আমি দেই তারে বুকভরা গান”- এ পঙক্তিতে কী বোঝানো হয়েছে?
(ক) আত্মত্যাগ (খ) সর্বংসহা মনোভাব
(গ) পারস্পরিক সৌহার্দ্য (ঘ) বোকামি
উত্তর: (খ) সর্বংসহা মনোভাব

১১২। কবি কীভাবে প্রীতিময় পরিবেশ সৃষ্টির আকাঙ্ক্ষা করেন?
(ক) প্রেম ও ভালোবাসার মাধ্যমে (খ) অর্থের মাধ্যমে
(গ) প্রতিহিংসা দিয়ে (ঘ) প্রতিশোধ দিয়ে
উত্তর: (ক) প্রেম ও ভালোবাসার মাধ্যমে

১১৩। “আমি লয়ে করে তারি মুখখানি”- এর পরবর্তী চরণ কোনটি?
(ক) কত ঠাঁই হতে কত কী যে আনি সাজাই নিরন্তর
(খ) আপন করিতে কাঁদিয়া বেড়াই যে মোরে করেছে পর
(গ) মোর বুকে যেবা কবর বেঁধেছে আমি তার বুক ভরি
(ঘ) পথে পথে আমি ফিরি তার লাগি
উত্তর: (ক) কত ঠাঁই হতে কত কী যে আনি সাজাই নিরন্তর

১১৪। নিঠুরিয়া বাণী শুনেও তার মুখখানি সাজিয়ে দেওয়ার মাধ্যমে কবি চরিত্রের কোন দিকটি প্রকাশ পেয়েছে?
(ক) প্রতিশোধপরায়ণতা (খ) সৌন্দর্যপ্রিয়তা
(গ) উদাসীনতা (ঘ) ক্ষমাশীলতা
উত্তর: (ঘ) ক্ষমাশীলতা

১১৫। ‘প্রতিদান’ কবিতায় কী বিসর্জনের কথা বলা হয়েছে?
(ক) ক্ষুদ্র স্বার্থ (খ) ব্যক্তিগত স্বার্থ
(গ) মায়ের স্বার্থ (ঘ) বৃহৎ স্বার্থ
উত্তর: (ক) ক্ষুদ্র স্বার্থ

১১৬। জীবনে প্রকৃত সার্থকতা ও সুখ অনুভব করা যায়—
i. স্বার্থ বিসর্জনে
ii. অপরের কল্যাণসাধনে
iii. নির্লিপ্ত জীবনযাপনে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১১৭। ‘প্রতিদান’ কবিতায় কবির প্রত্যাশা—
i. সুন্দর পৃথিবী
ii. প্রীতিময় সম্পর্ক
iii. সৌহার্দ্যপূর্ণ মনোভাব
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
