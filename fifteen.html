<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">শরৎচন্দ্র চট্টোপাধ্যায় এর 'বিলাসী' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। "ঘন জঙ্গলের পথ। একটু দেখে পা ফেলে যেয়ো।" — উক্তিটি কার?
(ক) ন্যাড়ার (খ) মৃত্যুঞ্জয়ের
(গ) বিলাসীর (ঘ) খুড়ার
উত্তর: (গ) বিলাসী

২। 'মহত্ত্বের কাহিনী আমাদের অনেক আছে।' এখানে 'মহত্ত্ব' কী অর্থে ব্যবহৃত হয়েছে?
(ক) ব্যঙ্গার্থে (খ) প্রশংসার্থে
(গ) ক্ষোভার্থে (ঘ) নিন্দার্থে
উত্তর: (ক) ব্যঙ্গার্থে

উদ্দীপকের আলোকে ৩ ও ৪ নং প্রশ্নের উত্তর দাও:
নিলুফা শহরের একটি পোশাক কারখানায় কাজ করেন। তার শহরে কাজ করার বিষয়টি গ্রামের কিছু মানুষ পছন্দ করেন না। ছুটিতে বাড়ি গেলে গ্রামের ওই মানুষগুলো নিলুফার নামে বিচার বসান। তারা নিলুফাকে জোর করে গ্রাম থেকে বের দেওয়ার সিদ্ধান্ত নেন। কিন্তু নিলুফা তাতে প্রতিবাদ করেন। অসুস্থ মাকে রেখে তিনি এ সময় কিছুতে কোথাও যাবেন না।

৩। অনুচ্ছেদের সঙ্গে 'বিলাসী' গল্পের যে দিকের সাদৃশ্য রয়েছে তা হলো—
i. নারীর প্রতি নির্যাতন
ii. কুসংস্কারাচ্ছন্ন সমাজ
iii. গ্রামীণ বিচার ব্যবস্থা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪। এই অবস্থা বিবেচনায় নিয়ে বলা যায়, নিলুফা ও বিলাসী উভয়েই—
i. প্রতিবাদী নারীসত্তা
ii. নির্যাতিত নারী
iii. কুসংস্কারের শিকার
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৫। শরৎচন্দ্র চট্টোপাধ্যায় কত সালে জন্মগ্রহণ করেন?
(ক) ১৮৭৬ (খ) ১৮৭৫
(গ) ১৮৭০ (ঘ) ১৮৯৯
উত্তর: (ক) ১৮৭৬ (মৃত্যু ১৯৩৮ সালে)

৬। শরৎচন্দ্র চট্টোপাধ্যায় কোন জেলায় জন্মগ্রহণ করেন?
(ক) পাবনা (খ) হুগলি
(গ) চব্বিশ পরগণা (ঘ) ফেনী
উত্তর: (খ) হুগলি

৭। শরৎ সাহিত্যে সমাজের নিচুতলার মানুষ কীভাবে চিত্রিত হয়েছে?
(ক) অপরূপ জীবন জিজ্ঞাসা নিয়ে (খ) অপূর্ব মানবমহিমা নিয়ে
(গ) প্রচ্ছন্ন বেদনা আর দ্রোহ নিয়ে (ঘ) অসাধারণ সামাজিক বোধ নিয়ে
উত্তর: (খ) অপূর্ব মানবমহিমা নিয়ে

৮। কোন জনপ্রিয় ঔপন্যাসিকের ছেলেবেলা কাটে দারিদ্র্যের মধ্যে?
(ক) বঙ্কিমচন্দ্র চট্টোপাধ্যায়ের (খ) শরৎচন্দ্র চট্টোপাধ্যায়ের
(গ) প্রমথ চৌধুরীর (ঘ) রবীন্দ্রনাথ ঠাকুরের
উত্তর: (খ) শরৎচন্দ্র চট্টোপাধ্যায়ের

৯। শরৎচন্দ্র চট্টোপাধ্যায়ের কত বছর বয়সে সন্ন্যাসী হয়েছিলেন?
(ক) চব্বিশ (খ) ত্রিশ
(গ) পঞ্চাশ (ঘ) ষাট
উত্তর: (ক) চব্বিশ

১০। শরৎচন্দ্র চট্টোপাধ্যায় বর্মা মুলুকে গিয়েছিলেন কেন?
(ক) জীবিকার তাগিদে (খ) ভ্রমণের জন্য
(গ) ব্যবসায় করার জন্য (ঘ) বিদ্যা অর্জনের জন্য
উত্তর: (ক) জীবিকার তাগিদে

১১। শরৎচন্দ্র চট্টোপাধ্যায়ের প্রথম গল্পের নাম কী?
(ক) মন্দির (খ) বিলাসী
(গ) দেনা পাওনা (ঘ) মহেশ
উত্তর: (ক) মন্দির

১২। শরৎচন্দ্র চট্টোপাধ্যায়ের শ্রেষ্ঠ উপন্যাস কোনটি?
(ক) পল্লীসমাজ (খ) অরক্ষণীয়া
(গ) শ্রীকান্ত (ঘ) দেবদাস
উত্তর: (গ) শ্রীকান্ত (আত্মজীবনীমূলক উপন্যাস)

১৩। শরৎচন্দ্রকে কত সালে ডি.লিট ডিগ্রি প্রদান করা হয়?
(ক) ১৯৩৫ সালে (খ) ১৯৩৬ সালে
(গ) ১৯৩৭ সালে (ঘ) ১৯৩৮ সালে
উত্তর: (খ) ১৯৩৬ সালে

১৪। 'বিলাসী' গল্পের ন্যাড়া কত ক্রোশ পথ হেঁটে স্কুলে যেত?
(ক) দুই ক্রোশ (খ) চার ক্রোশ
(গ) পাঁচ ক্রোশ (ঘ) ছয় ক্রোশ
উত্তর: (ক) দুই ক্রোশ

১৫। 'বিলাসী' গল্পের প্রথমেই কী প্রকাশ করা হয়েছে?
(ক) বিদ্যার্জনের চিত্র (খ) কষ্টে বিদ্যার্জনের চিত্র
(গ) দলবেঁধে বিদ্যালয়ে গমনের চিত্র (ঘ) ত্রুটিপূর্ণ বিদ্যার্জনের চিত্র
উত্তর: (খ) কষ্টে বিদ্যার্জনের চিত্র

১৬। 'রম্ভা' শব্দ 'বিলাসী' গল্পে কোন অর্থে ব্যবহৃত হয়েছে?
(ক) আম (খ) জাম
(গ) কলা (ঘ) রসনা
উত্তর: (গ) কলা

১৭। কামস্কাটকায় কতটি জীবন্ত আগ্নেয়গিরি আছে?
(ক) পনেরোটি (খ) সতেরোটি
(গ) বিশটি (ঘ) চব্বিশটি
উত্তর: (খ) সতেরোটি

১৮। 'পারশিয়া' অর্থ কী?
(ক) ফ্রান্স (খ) সৌদি আরব
(গ) পারস্য বা ইরান দেশ (ঘ) কামস্কাটকা
উত্তর: (গ) পারস্য বা ইরান দেশ

১৯। মুঘল সাম্রাজ্যের দ্বিতীয় মুঘল সম্রাট হুমায়ুনের পিতার নাম কী?
(ক) বাবর (খ) আকবর
(গ) গিয়াসউদ্দীন (ঘ) ফিরোজ
উত্তর: (ক) বাবর

২০। 'চল্লিশের কোঠা' বলতে লেখক কী বুঝিয়েছেন?
(ক) ৪০-৪৯ (খ) ৪০-৫০
(গ) ৪০-৪৫ (ঘ) ৩০-৩৯
উত্তর: (ক) ৪০-৪৯

২১। মৃত্যুঞ্জয় কোন ক্লাসে পড়ত?
(ক) থার্ড ক্লাসে (খ) ফোর্থ ক্লাসে
(গ) সেকেন্ড ক্লাসে (ঘ) প্রথম ক্লাসে
উত্তর: (ক) থার্ড ক্লাসে

২২। মৃত্যুঞ্জয়ের ফোর্থ ক্লাসে পড়ার ইতিহাস কেউ জানে না কেন?
(ক) কারও কাছে বলেনি বলে (খ) মৃত্যুঞ্জয় ভালো ছাত্র ছিল বলে
(গ) মৃত্যুঞ্জয় ভালো ছাত্র ছিল না বলে (ঘ) মৃত্যুঞ্জয় বয়সে বড় ছিল বলে
উত্তর: (গ) মৃত্যুঞ্জয় ভালো ছাত্র ছিল না বলে

২৩। 'ফোর্থ ক্লাস' এখনকার সময়ের কোন শ্রেণি?
(ক) পঞ্চম (খ) ষষ্ঠ
(গ) সপ্তম (ঘ) অষ্টম
উত্তর: (গ) সপ্তম

২৪। গ্রামের এক প্রান্তে মৃত্যুঞ্জয়ের কীসের বাগান ছিল?
(ক) আম-কাঁঠালের (খ) পেয়ারা-লিচুর
(গ) কলা-আনারসের (ঘ) আপেল-কমলার
উত্তর: (ক) আম-কাঁঠালের

২৫। মৃত্যুঞ্জয়ের বাগানের অর্ধেক অংশ কে নিজের বলে দাবি করতেন?
(ক) খুড়া (খ) ন্যাড়া
(গ) সাপুড়ে (ঘ) ভূদেববাবু
উত্তর: (ক) খুড়া

২৬। 'উপরের আদালতের হুকুম' বলতে কোনটিকে বোঝানো হয়েছে?
(ক) হাইকোর্টের নির্দেশ (খ) জজকোর্টের নির্দেশ
(গ) খুড়ার নির্দেশ (ঘ) স্রষ্টার নির্দেশ
উত্তর: (ঘ) স্রষ্টার নির্দেশ

২৭। মৃত্যুঞ্জয় নিজে রান্না করে খেত কেন?
(ক) মৃত্যুঞ্জয় তা পছন্দ করত (খ) তার আপন বলতে কেউ ছিল না
(গ) হোটেল ছিল না বলে (ঘ) হোটেলের খাদ্য পছন্দ করত না বলে
উত্তর: (খ) তার আপন বলতে কেউ ছিল না

২৮। মৃত্যুঞ্জয়ের সঙ্গে পাড়ার ছেলেরা উপযাচক হয়ে কথা বলত কেন?
(ক) দোকান থেকে খাবার খেতে (খ) মৃত্যুঞ্জয় ভদ্র ছিল বলে
(গ) মৃত্যুঞ্জয় বোকা ছিল বলে (ঘ) মৃত্যুঞ্জয় তাদের আত্মীয় বলে
উত্তর: (ক) দোকান থেকে খাবার খেতে

২৯। মৃত্যুঞ্জয় সেবাযত্ন করে কে যমের মুখ থেকে ফিরিয়ে এনেছে?
(ক) কল্যাণী (খ) বিলাসী
(গ) ন্যাড়া (ঘ) খুড়া
উত্তর: (খ) বিলাসী

৭০। 'বিলাসী' গল্পের নামকরণে কীসের ওপর প্রাধান্য দেওয়া হয়েছে?
(ক) পার্শ্বিক চরিত্র (খ) কেন্দ্রীয় চরিত্র
(গ) অপ্রধান চরিত্র (ঘ) বিষয়বস্তু
উত্তর: (খ) কেন্দ্রীয় চরিত্র

৭১। 'বিলাসী' গল্পের প্রেক্ষাপট হলো—
(ক) কৌলীন্য প্রথা (খ) তৎকালীন পারিবারিক জীবন
(গ) সাপুড়েদের জীবন (ঘ) তৎকালীন হিন্দু সমাজব্যবস্থা
উত্তর: (ঘ) তৎকালীন হিন্দু সমাজব্যবস্থা

৭২। 'বিলাসী' গল্পের কেন্দ্রীয় চরিত্র কোনটি?
(ক) বিলাসী (খ) মৃত্যুঞ্জয়
(গ) ন্যাড়া (ঘ) খুড়া
উত্তর: (ক) বিলাসী

৭৩। 'বিলাসী' গল্পে কোন সময়ের সমাজব্যবস্থার স্বরূপ উন্মোচিত হয়েছে?
(ক) উনিশ শতকের (খ) বিশ শতকের
(গ) আঠারো শতকের (ঘ) ষোলো শতকের
উত্তর: (খ) বিশ শতকের

৭৪। 'বিলাসী' গল্পে ফুটে উঠেছে তৎকালীন হিন্দু সমাজের—
(ক) বাল্যবিবাহ (খ) বহুবিবাহ
(গ) বর্ণবৈষম্য (ঘ) উচ্চাভিলাষিতা
উত্তর: (গ) বর্ণবৈষম্য

৭৫। 'বিলাসী' গল্পটি ‘ভারতী’ পত্রিকায় কোন সংখ্যায় প্রকাশিত হয়েছে?
(ক) ফাল্গুন (খ) পৌষ
(গ) বৈশাখ (ঘ) শ্রাবণ
উত্তর: (গ) বৈশাখ

৭৬। 'বিলাসী' গল্পটি কার জবানিতে বর্ণিত হয়েছে?
(ক) ন্যাড়ার (খ) মৃত্যুঞ্জয়ের
(গ) বিলাসীর (ঘ) খুড়ার
উত্তর: (ক) ন্যাড়ার

৭৭। ন্যাড়া চরিত্রে কার ছেলেবেলার ছায়াপাত ঘটেছে?
(ক) মৃত্যুঞ্জয়ের (খ) খুড়ার
(গ) শরৎচন্দ্রের (ঘ) সাপুড়ের
উত্তর: (গ) শরৎচন্দ্রের

৭৮। 'বিলাসী' গল্পের বিলাসী কিসের প্রতীক?
(ক) প্রেমনিষ্ঠার (খ) স্বার্থপরতার
(গ) বিনয়ের (ঘ) কুণ্ঠার
উত্তর: (ক) প্রেমনিষ্ঠার

৭৯। 'বিলাসী' গল্পে কোন সমাজের কথা বলা হয়েছে?
(ক) মুসলমান সমাজের কথা (খ) রক্ষণশীল হিন্দু সমাজের কথা
(গ) গোঁড়াপন্থি মুসলমান সমাজের কথা (ঘ) খ্রিস্টান সমাজের কথা
উত্তর: (খ) রক্ষণশীল হিন্দু সমাজের কথা

৮০। 'বিলাসী' গল্পের সমাজব্যবস্থায় কোন বিষয়টি ফুটে উঠেছে?
(ক) পরোপকারী সমাজচিত্র (খ) নিষ্ঠুর সমাজচিত্র
(গ) অসাম্প্রদায়িক সমাজচিত্র (ঘ) কৃতজ্ঞ সমাজচিত্র
উত্তর: (খ) নিষ্ঠুর সমাজচিত্র

৮১। বলিলাম, ‘পৌঁছে দিতে হবে না।’— উক্তিটিতে কোন শক্তির কথা বলা হয়েছে?
(ক) ভীরুতা (খ) সাহসিকতা
(গ) আত্মসম্মানবোধ (ঘ) আশঙ্কা
উত্তর: (গ) আত্মসম্মানবোধ

৮২। ‘ইহা আর একটি শক্তি।’— উক্তিটিতে কোন শক্তির কথা বলা হয়েছে?
(ক) ভালোবাসা (খ) বিধি-ব্যবস্থা
(গ) বংশ মর্যাদা (ঘ) বিহরহির আজ্ঞা
উত্তর: (ক) ভালোবাসা

৮৩। ‘রোগা মানুষ সমস্ত রাত খেতে পারবে না’ এখানে কোন খাবারের কথা বলা হয়েছে?
(ক) লুচি (খ) অন্ন
(গ) রুটি (ঘ) সন্দেশ
উত্তর: (গ) রুটি

৮৪। ‘বিলাসী’ গল্পটি কোন পত্রিকায় প্রকাশিত হয়?
(ক) ধূমকেতু (খ) সবুজপত্র
(গ) ভারতী (ঘ) কল্লোল
উত্তর: (গ) ভারতী

৮৫। “গ্রামের মধ্যে মৃত্যুঞ্জয়ের ছিল এমনি সুনাম।” ‘সুনাম’ কথাটা কোন অর্থে ব্যবহৃত হয়েছে?
(ক) সুনাম (খ) অপমান
(গ) কুখ্যাতি (ঘ) দুর্নাম
উত্তর: (ঘ) দুর্নাম

৮৬। ‘যে বস্তুটি এই অসাধ্য সাধন করিয়া তুলিয়াছিল তাহার পরিচয় যদিও সেদিন পাই নাই, কিন্তু আর একদিন পাইয়াছিলাম।’— এখানে ‘বস্তুটি’ বলতে ‘বিলাসী’ গল্পে কী বোঝানো হয়েছে?
(ক) মানবতা (খ) প্রেম
(গ) লৌকিকতা (ঘ) সম্পদের লোভ
উত্তর: (খ) প্রেম

৮৭। ‘বিলাসী’ গল্পে কাকে গালিগালাজ করে দেশ উদ্ধারের কথা বলা হয়েছে?
(ক) সরকারকে (খ) ব্রাহ্মণকে
(গ) ইংরেজকে (ঘ) ক্ষত্রিয়কে
উত্তর: (গ) ইংরেজকে

৮৮। ন্যাড়ার স্কুলে যাতায়াতের পথ কত ক্রোশ দূরে?
(ক) এক ক্রোশ (খ) দুই ক্রোশ
(গ) তিন ক্রোশ (ঘ) চার ক্রোশ
উত্তর: (ঘ) চার ক্রোশ (দ্রষ্টব্য: ৫ নং পৃষ্ঠার প্রশ্ন ১৪ তেও একই উত্তর আছে)

৮৯। ‘বিলাসী’ গল্পে বর্ণিত যাদের বাড়ি পল্লীগ্রামে তাদের শতকরা কতভাগকে বিদ্যার্জনের জন্য দীর্ঘ দূরত্ব অতিক্রম করতে হয়?
(ক) ৪০ ভাগকে (খ) ৬০ ভাগকে
(গ) ৮০ ভাগকে (ঘ) ১০০ ভাগকে
উত্তর: (গ) ৮০ ভাগকে

৯০। মাঝে মাঝেই স্কুলের পথে কার সাথে ন্যাড়ার দেখা হতো?
(ক) বিলাসীর সাথে (খ) মৃত্যুঞ্জয়ের সাথে
(গ) মৃত্যুঞ্জয়ের খুড়ার সাথে (ঘ) বুড়ো মালোর সাথে
উত্তর: (খ) মৃত্যুঞ্জয়ের সাথে

৯১। ‘সম্ভবত তাহা প্রত্নতাত্ত্বিকের গবেষণার বিষয়’- উক্তিটিতে কী প্রকাশ পেয়েছে?
(ক) বিশ্বাস (খ) ব্যঙ্গ
(গ) বিস্ময় (ঘ) হতাশা
উত্তর: (খ) ব্যঙ্গ

৯২। ন্যাড়া পরীক্ষার উত্তরপত্রে হুমায়ুনের পিতার নাম কী লেখে?
(ক) বাবর খাঁ (খ) হালাকু খাঁ
(গ) চেঙ্গিস খাঁ (ঘ) তোগলক খাঁ
উত্তর: (ঘ) তোগলক খাঁ

৯৩। মৃত্যুঞ্জয়ের জীবিকানির্বাহ হতো কীভাবে?
(ক) চাকরি দ্বারা (খ) আমবাগান জমা দিয়ে
(গ) ব্যবসা দ্বারা (ঘ) সাপ খেলা দেখিয়ে
উত্তর: (খ) আমবাগান জমা দিয়ে

৯৪। মৃত্যুঞ্জয়ের খুড়ার কাজ কী ছিল?
(ক) ভাইপোর নানাবিধ সুনাম করা (খ) ভাইপোর নানাবিধ দুর্নাম করা
(গ) ভাইপোর সঙ্গে ঝগড়া করা (ঘ) ভাইপোর নানাবিধ সেবা করা
উত্তর: (খ) ভাইপোর নানাবিধ দুর্নাম করা

৯৫। ‘বিলাসী’ গল্পে ন্যাড়া তার এক আত্মীয়ের কাহিনী উল্লেখ করে কী বোঝাতে চেয়েছেন?
(ক) স্বামীর গুরুত্ব (খ) প্রেমের কবিতা
(গ) স্বেচ্ছারিতা (ঘ) মেকি স্বামীপ্রেম
উত্তর: (ঘ) মেকি স্বামীপ্রেম

৯৬। মৃত্যুঞ্জয় শয্যাগত প্রায় কতদিন?
(ক) এক মাস (খ) দেড় মাস
(গ) আড়াই মাস (ঘ) দুই মাস
উত্তর: (খ) দেড় মাস

৯৭। যমরাজ মৃত্যুঞ্জয়ের সাথে সুবিধা করতে পারেনি কেবল কার জোরে?
(ক) বুড়ো মালোর (খ) বিলাসীর
(গ) মৃত্যুঞ্জয়ের (ঘ) ন্যাড়ার
উত্তর: (খ) বিলাসীর

৯৮। অসুস্থ থাকাকালে মৃত্যুঞ্জয় কত দিন অচেতন অবস্থায় ছিল?
(ক) ৭-৮ দিন (খ) ৮-১০ দিন
(গ) ১০-১৫ দিন (ঘ) ১৫-২০ দিন
উত্তর: (গ) ১০-১৫ দিন

৯৯। সামনে পরীক্ষা বলে সুরভী নাওয়া-খাওয়া ভুলে রাত জেগে পড়াশোনা করায় ওর লাবণ্যময় চেহারা ফ্যাকাশে হয়ে গেছে। সুরভীর ক্ষেত্রে প্রযোজ্য উক্তি কোনটি?
(ক) ঠিক যেন ফুলদানিতে জল দিয়ে ভিজাইয়া রাখা বাসি ফুল
(খ) অতিকায় হস্তী লোপ পাইয়াছে কিন্তু তেলাপোকা টিকিয়া আছে
(গ) বাস্তবিক যমরাজ চেষ্টার ত্রুটি কিছু করেন নাই
(ঘ) মা-সরস্বতী কোথায় যে লুকাইবেন, ভাবিয়া পান না
উত্তর: (ক) ঠিক যেন ফুলদানিতে জল দিয়ে ভিজাইয়া রাখা বাসি ফুল

১০০। 'ঠিক যেন ফুলদানিতে জল দিয়া ভিজাইয়া রাখা বাসি ফুলের মতো।'— উক্তিটি কার সম্পর্কে বলা হয়েছে?
(ক) মৃত্যুঞ্জয় (খ) বিলাসী
(গ) ন্যাড়া (ঘ) খুড়া
উত্তর: (খ) বিলাসী

১০১। ‘ওরে বাপরে! আমি একলা থাকতে পারব না’- বলে কে চিৎকার দিয়েছিল?
(ক) বিলাসী (খ) মৃত্যুঞ্জয়
(গ) ন্যাড়ার আত্মীয়া (ঘ) মৃত্যুঞ্জয়ের খুড়া
উত্তর: (গ) ন্যাড়ার আত্মীয়া

১০২। ন্যাড়ার আত্মীয়া তাঁর স্বামীর সাথে কত বছর নির্ভয়ে ঘর করেছিলেন?
(ক) বাইশ বছর (খ) তেইশ বছর
(গ) চব্বিশ বছর (ঘ) পঁচিশ বছর
উত্তর: (ঘ) পঁচিশ বছর

১০৩। মৃত্যুঞ্জয় কোন বংশের ছেলে?
(ক) মালো (খ) মিত্তির
(গ) দত্ত (ঘ) আচার্য
উত্তর: (খ) মিত্তির

১০৪। ‘গেল গেল, গ্রামটা রসাতলে গেল’- কেন গ্রামটা রসাতলে গেল?
(ক) মৃত্যুঞ্জয় বিলাসীর প্রণয়ের কারণে
(খ) মৃত্যুঞ্জয় বিলাসীর সেবা গ্রহণের কারণে
(গ) মৃত্যুঞ্জয় বিলাসীকে বিবাহের কারণে
(ঘ) মৃত্যুঞ্জয় বিলাসীর ভাত গ্রহণের কারণে
উত্তর: (গ) মৃত্যুঞ্জয় বিলাসীকে বিবাহের কারণে

১০৫। বিলাসীর আত্মমর্যাদাবোধ প্রকাশিত হয়েছে কোন উক্তিটির মাধ্যমে?
(ক) আমরা কেন মিছামিছি লোক ঠকাতে যাই
(খ) এসব তুমি আর কখনো করো না
(গ) বাবা আমারে বাবুর সাথে নিকা দিয়েছে জানো
(ঘ) বাবুরা আমাকে একটিবার ছেড়ে দাও
উত্তর: (গ) বাবা আমারে বাবুর সাথে নিকা দিয়েছে জানো

১০৬। বিলাসীকে টেনে হিঁচড়ে নিয়ে যাওয়ার পেছনে কারণ কী ছিল?
(ক) অন্যায়ের শাস্তি প্রদান (খ) মানসিক সংকীর্ণতা
(গ) মৃত্যুঞ্জয়ের সঙ্গে শত্রুতা (ঘ) ধর্মীয় নির্দেশ পালন
উত্তর: (খ) মানসিক সংকীর্ণতা

১০৭। ‘বিষহরির আজ্ঞা’ কী?
(ক) মন্ত্র (খ) বাণী
(গ) দোয়া (ঘ) পুঁথি
উত্তর: (ক) মন্ত্র

১০৮। ‘কাগজ তো ইঁদুরেও আনতে পারে’- উক্তিটি কার?
(ক) বিলাসীর (খ) ন্যাড়ার
(গ) মৃত্যুঞ্জয়ের (ঘ) মৃত্যুঞ্জয়ের খুড়ার
উত্তর: (গ) মৃত্যুঞ্জয়ের

১০৯। মৃত্যুঞ্জয় রান্না করে খেত কেন?
(ক) মৃত্যুঞ্জয় নিজে কাজ করতে পছন্দ করত
(খ) মৃত্যুঞ্জয়ের আপন বলতে কেউ ছিল না
(গ) অন্যের হাতের খাবার মৃত্যুঞ্জয়ের অপছন্দ ছিল
(ঘ) পাচকের রান্না খাওয়া নিষিদ্ধ ছিল
উত্তর: (খ) মৃত্যুঞ্জয়ের আপন বলতে কেউ ছিল না

১১০। মৃত্যুঞ্জয় নামটি কীভাবে মিথ্যা প্রতিপন্ন হলো?
(ক) মৃত্যুঞ্জয়ের মৃত্যুর ফলে (খ) অসুস্থতা থেকে বাঁচার ফলে
(গ) মৃত্যুঞ্জয়কে সাপে কাটার ফলে (ঘ) বিলাসীকে বিয়ে করার ফলে
উত্তর: (ক) মৃত্যুঞ্জয়ের মৃত্যুর ফলে

১১১। মৃত্যুঞ্জয়ের মৃত্যুর পরে বিলাসী কতদিন বেঁচে ছিল?
(ক) দশ দিন (খ) নয় দিন
(গ) আট দিন (ঘ) সাত দিন
উত্তর: (ঘ) সাত দিন

১১২। ‘সন্ন্যাসী অবস্থায় কামাখ্যা গিয়া সিদ্ধ হইয়া আসিয়াছে’- এখানে ‘সিদ্ধ হওয়া’ বলতে কী বোঝানো হয়েছে?
(ক) গরমে অসুস্থ (খ) সূর্য তাপে দগ্ধ
(গ) সন্ন্যাসে সাফল্য (ঘ) সন্ন্যাসে ইস্তফা
উত্তর: (গ) সন্ন্যাসে সাফল্য

১১৩। ‘সে তাহার নামজাদা শ্বশুরের শিষ্য’— ‘বিলাসী’ গল্পের এ বাক্যে ‘শ্বশুর’ বলতে কাকে বোঝানো হয়েছে?
(ক) বিলাসীকে (খ) মৃত্যুঞ্জয়কে
(গ) ন্যাড়াকে (ঘ) বিলাসীর বাবাকে
উত্তর: (ঘ) বিলাসীর বাবাকে

১১৪। মৃত্যুঞ্জয়ের খুড়া ষোলো আনা বাগান লাভ করল কীভাবে?
(ক) বিলাসীর মৃত্যুর ফলে (খ) মৃত্যুঞ্জয়ের জাত বিসর্জনে
(গ) মৃত্যুঞ্জয়ের মৃত্যুর ফলে (ঘ) মৃত্যুঞ্জয়ের অন্নপাপে
উত্তর: (গ) মৃত্যুঞ্জয়ের মৃত্যুর ফলে

১১৫। মৃত্যুঞ্জয়ের খুড়া কর্তৃক মৃত্যুঞ্জয়ের গ্লানি অধিক হারে প্রচারের উদ্দেশ্য কী ছিল?
(ক) মৃত্যুঞ্জয়কে সৎপথে ফিরিয়ে আনা
(খ) ধর্মীয় বিধিবিধান সুপ্রতিষ্ঠিত করা
(গ) মৃত্যুঞ্জয়ের যাবতীয়-সম্পত্তি লাভ
(ঘ) চৌদ্দ পুরুষের জাত রক্ষা করা
উত্তর: (গ) মৃত্যুঞ্জয়ের যাবতীয়-সম্পত্তি লাভ

১১৬। ছেলেবেলায় ন্যাড়ার কয়টি বিষয়ের প্রতি প্রবল শখ ছিল?
(ক) দুইটি (খ) তিনটি
(গ) চারটি (ঘ) পাঁচটি
উত্তর: (ক) দুইটি

১১৭। ‘ঘন জঙ্গলের পথ, একটু দেখে পা ফেলে যেয়ো’— এ উক্তিতে বিলাসীর কোন বৈশিষ্ট্য ফুটে উঠেছে?
(ক) সেবাপরায়ণ (খ) স্নেহময়
(গ) মানবদরদি (ঘ) নারীসুলভ
উত্তর: (ক) সেবাপরায়ণ

১১৮। বিলাসীর আত্মহত্যার মধ্য দিয়ে প্রকাশিত হয়েছে—
(ক) ভালোবাসার জয় (খ) ভালোবাসার পরাজয়
(গ) সমাজের জয় (ঘ) সমাজের পরাজয়
উত্তর: (ক) ভালোবাসার জয়

১১৯। ন্যাড়া সন্ন্যাসীগিরিতে ইস্তফা দেয় কেন?
(ক) সাপের ভয়ে (খ) মশার কামড়ে
(গ) মৃত্যুর ভয়ে (ঘ) বাঘের ভয়ে
উত্তর: (খ) মশার কামড়ে

১২০। মৃত্যুঞ্জয় সাপুড়ে জীবন গ্রহণ করল কেন?
(ক) বিলাসীকে ভালোবেসে বিয়ের কারণে
(খ) সাপ ধরা তার শখ ছিল বলে
(গ) সাপুড়ে জীবন ভালো লাগত বলে
(ঘ) গ্রামছাড়া হয়েছিল বলে
উত্তর: (ক) বিলাসীকে ভালোবেসে বিয়ের কারণে

১২১। ন্যাড়া কতদিন সন্ন্যাস জীবন-যাপন করেছিল?
(ক) বছরখানেক (খ) বছর দুয়েক
(গ) বছর-তিনেক (ঘ) বছর-চারেক
উত্তর: (ক) বছরখানেক

১২২। ‘কলি কি সত্যিই উল্টাইতে বসিল?’— উক্তিটি কার?
(ক) মৃত্যুঞ্জয়ের (খ) ন্যাড়ার
(গ) খুড়ার (ঘ) ছেলে বুড়ো সকলের
উত্তর: (ঘ) ছেলে বুড়ো সকলের

১২৩। ‘বিলাসী’ গল্পের রক্ষণশীল সমাজের পরিচয় কোন চরিত্রের মধ্যে ফুটে উঠেছে?
(ক) ন্যাড়া (খ) খুড়া
(গ) বিলাসী (ঘ) মৃত্যুঞ্জয়
উত্তর: (খ) খুড়া

১২৪। ‘কে বলিবে এ আমাদের সেই মৃত্যুঞ্জয়’— ‘বিলাসী’ গল্পে মৃত্যুঞ্জয়ের পরিবর্তন কোনটি?
(ক) জাত বিসর্জন (খ) বিয়ে
(গ) অন্নপাপ (ঘ) অসুস্থতা
উত্তর: (ক) জাত বিসর্জন

১২৫। ‘সাপের বিষ যে বাঙালির বিষ নয় তা আমি বুঝিয়েছিলাম।’— লেখকের এই মন্তব্যের কারণ কোনটি?
(ক) বাঙালির বিদ্বেষী মনোভাব (খ) বাঙালির পরশ্রীকাতরতা
(গ) বাঙালির সাপ ধরার দক্ষতা (ঘ) বাঙালির ক্ষণিকের উত্তেজনা
উত্তর: (ঘ) বাঙালির ক্ষণিকের উত্তেজনা

১২৬। মৃত্যুঞ্জয়ের ‘অন্নপাপ’- এর মধ্যে খুড়া কোনটি খুঁজে পেয়েছে?
(ক) স্বার্থসিদ্ধির বিশাল সম্ভাবনা (খ) ধর্মীয় বিধি-বিধান অমান্য
(গ) সামাজিক মূল্যবোধের অবক্ষয় (ঘ) পারিবারিক মূল্যবোধের অবক্ষয়
উত্তর: (ক) স্বার্থসিদ্ধির বিশাল সম্ভাবনা

১২৭। বিলাসীর সৎ সাহসিকতার পরিচয় মেলে কীভাবে?
(ক) মৃত্যুঞ্জয়ের সেবা করার মাধ্যমে
(খ) শিকড় বিক্রি নিষেধ করার মাধ্যমে
(গ) সাপ ধরার বায়না প্রত্যাখ্যানের মাধ্যমে
(ঘ) সাপের সংখ্যা ধারণা করার মাধ্যমে
উত্তর: (খ) শিকড় বিক্রি নিষেধ করার মাধ্যমে

১২৮। ‘ঠাকুর আমার মাথার দিব্যি রইল, এসব তুমি আর কখনো কোরো না’— বিলাসীর এ নিষেধের বিষয় কী ছিল?
(ক) শিকড় বিক্রি করা (খ) জাত বিসর্জন দেওয়া
(গ) সাপ ধরা (ঘ) সন্ন্যাসগমন করা
উত্তর: (গ) সাপ ধরা

১২৯। ভূদেবচন্দ্র মুখোপাধ্যায়ের পারিবারিক প্রবন্ধের বিষয়বস্তু কী ছিল?
(ক) হিন্দুসমাজের জয়গান (খ) হিন্দুসমাজের কুসংস্কার
(গ) হিন্দুসমাজের ধর্মমত (ঘ) হিন্দুসমাজের আচার-অনুষ্ঠান
উত্তর: (খ) হিন্দুসমাজের কুসংস্কার

১৩০। ‘বিলাসী’ গল্পে উল্লেখিত সময়কাল দশম শ্রেণি ছিল কোনটি?
(ক) ফোর্থ ক্লাস (খ) ফার্স্ট ক্লাস
(গ) সেকেন্ড ক্লাস (ঘ) থার্ড ক্লাস
উত্তর: (খ) ফার্স্ট ক্লাস

১৩১। বীণাপাণি কিসের দেবী?
(ক) বুদ্ধির (খ) অন্নের
(গ) বিদ্যার (ঘ) সিদ্ধির
উত্তর: (গ) বিদ্যার

১৩২। ‘তাহার হাতের উল্টাপিঠ দিয়ে ঝরঝর করিয়া রক্ত পড়িতেছিল’— এখানে কার হাতের কথা বলা হয়েছে?
(ক) মৃত্যুঞ্জয়ের (খ) বিলাসীর
(গ) ন্যাড়ার (ঘ) শাহজীর
উত্তর: (ক) মৃত্যুঞ্জয়ের

১৩৩। মৃত্যুঞ্জয়ের জাত কী ছিল?
(ক) সদ্ব্রাহ্মণ (খ) কায়স্থ
(গ) শূদ্র (ঘ) বৈশ্য
উত্তর: (খ) কায়স্থ

১৩৪। ‘কাগজ তো ইঁদুরেও আনতে পারে’— বিলাসী গল্পে এই উক্তি—
(ক) বিলাসীর (খ) খুড়ার
(গ) মৃত্যুঞ্জয়ের (ঘ) ন্যাড়ার
উত্তর: (গ) মৃত্যুঞ্জয়ের

১৩৫। ‘উৎসর্গ’ শব্দের অর্থ কী?
(ক) উচ্চাশা (খ) উচ্চজ্বল
(গ) উৎসর্গ (ঘ) উৎসবে
উত্তর: (গ) উৎসর্গ

১৩৬। “যাক, তাহার দুঃখের কাহিনীটি আর বাড়াইব না”— এ কথা কার প্রসঙ্গে বলা হয়েছে?
(ক) বিলাসী (খ) আত্মাদী
(গ) কল্যাণী (ঘ) মাতিলদা
উত্তর: (ক) বিলাসী

১৩৭। “অতিকায় হস্তী লোপ পাইয়াছে কিন্তু তেলাপোকা টিকিয়া আছে।”— উক্তিটির লেখক কে?
(ক) শরৎচন্দ্র চট্টোপাধ্যায় (খ) প্রমথ চৌধুরী
(গ) রবীন্দ্রনাথ ঠাকুর (ঘ) দীনেশচন্দ্র সেন
উত্তর: (ক) শরৎচন্দ্র চট্টোপাধ্যায়

১৩৮। ন্যাড়ার মাদুলি-কবচ মৃত্যুঞ্জয়ের মৃত্যুর সঙ্গে কোথায় গিয়েছিল?
(ক) শ্মশানে (খ) জাহান্নামে
(গ) কবরে (ঘ) নর্দমায়
উত্তর: (গ) কবরে

১৩৯। ‘বিষহরির দোহাই বুঝি বা আর খাটে না’— এটি বোঝা গেল কখন?
(ক) মৃত্যুঞ্জয় যখন সাপে কামড় দিল
(খ) যখন মৃত্যুঞ্জয়ের হাতে মাদুলি বেঁধে দেওয়া হলো
(গ) যখন মৃত্যুঞ্জয় শিকড়-বাকড় খাওয়ানো হলো
(ঘ) যখন মৃত্যুঞ্জয় বমি করল
উত্তর: (ঘ) যখন মৃত্যুঞ্জয় বমি করল

১৪০। বিলাসীকে নির্যাতন করার জন্য কত লোক গিয়েছিল?
(ক) ৫-৬ জন (খ) ৭-৮ জন
(গ) ১০-১২ জন (ঘ) ১৫-২০ জন
উত্তর: (গ) ১০-১২ জন

১৪১। ‘বিলাসী’ গল্পে কোন রোগের উল্লেখ আছে?
(ক) ম্যালেরিয়া (খ) যক্ষ্মা
(গ) বসন্ত (ঘ) কলেরা
উত্তর: (ক) ম্যালেরিয়া

১৪২। ন্যাড়া কোন বঙ্গের অনেক পল্লীতে অনেকদিন ঘুরে গৌরব করার মতো অনেক বড় বড় ব্যাপার প্রত্যক্ষ করেছে?
(ক) উত্তরবঙ্গের (খ) দক্ষিণবঙ্গের
(গ) পূর্ববঙ্গের (ঘ) পশ্চিমবঙ্গের
উত্তর: (খ) দক্ষিণবঙ্গের

১৪৩। ‘বিলাসী’ গল্পে কোন পশুর নাম নেই?
(ক) হস্তী (খ) শিয়াল
(গ) হরিণ (ঘ) গোরু
উত্তর: (গ) হরিণ

১৪৪। ‘মালো’ শব্দের অর্থ—
(ক) সাপের ওঝা (খ) মুচি
(গ) মালোদের অধিবাসী (ঘ) মা
উত্তর: (ক) সাপের ওঝা

১৪৫। “স্বদেশের মঙ্গলের জন্য সমস্ত অকাতরে সহ্য করিয়া তাহাকে হিড়হিড় করিয়া টানিয়া লইয়া চলিলাম”— কাকে কে টেনে নিয়ে চলল?
(ক) হেমন্তীর তার বাবা
(খ) মৃত্যুঞ্জয়কে গল্পের কথক
(গ) মৃত্যুঞ্জয়কে পুলিশ
(ঘ) বিলাসীকে মৃত্যুঞ্জয়ের খুড়া ও গ্রামবাসী
উত্তর: (ঘ) বিলাসীকে মৃত্যুঞ্জয়ের খুড়া ও গ্রামবাসী

১৪৬। ‘বিলাসী’ গল্পে প্রাতঃস্মরণীয় স্বর্গীয় মুখোপাধ্যায় মহাশয়ের ঘটনা কিসের পরিচয়?
(ক) ঔদার্যের (খ) মহত্ত্বের
(গ) দান-ধ্যানের (ঘ) সংকীর্ণতার
উত্তর: (ক) ঔদার্যের

১৪৭। ‘ফণা তোলা’ বলতে বুঝায়—
(ক) ফণা বিস্তার করা (খ) সর্পের দাঁত তোলা
(গ) মন্ত্র প্রয়োগ (ঘ) অসাধারণ
উত্তর: (ক) ফণা বিস্তার করা

১৪৮। ‘বিলাসীর বাপকে সংবাদ দিবার জন্য লোক গেল’— কেন?
(ক) মৃত্যুঞ্জয়কে বিলাসীর কাছ থেকে ছাড়িয়ে আনার জন্য
(খ) মৃত্যুঞ্জয়কে বাঁচানোর জন্য
(গ) মৃত্যুঞ্জয়ের মৃত্যু সংবাদ জানানোর জন্য
(ঘ) বিলাসী মারা গিয়েছে বলে
উত্তর: (খ) মৃত্যুঞ্জয়কে বাঁচানোর জন্য

১৪৯। শরৎচন্দ্রের উপাধি ছিল—
(ক) অপরাজেয় কথাশিল্পী (খ) গল্পের জনক
(গ) ভোরের পাখি (ঘ) পল্লী কবি
উত্তর: (ক) অপরাজেয় কথাশিল্পী

১৫০। ‘বিলাসী’ গল্পে গ্রামের ছেলেদের স্কুলে যেতে হয়—
i. দুই ক্রোশ পথ পায়ে হেঁটে
ii. বর্ষার দিনে এক হাঁটু কাদা ভেঙে
iii. গ্রামের দিনে ধুলার সাগর সাঁতরে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৫১। ‘বিলাসী’ গল্পে লেখক প্রমোশনের দিন মুখ ভার করে বাড়ি ফিরে এসে ভাবতেন—
i. বিদ্যা এক অমূল্য ধন
ii. মাস্টারকে ঠ্যাঙানো উচিত
iii. অমন বিশ্রী স্কুল ছেড়ে দেওয়াই উচিত
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১৫২। “নালতের মিত্তির বলিয়া সমাজে আর তাঁর মুখ বাহির করিবার জো রহিল না।” মৃত্যুঞ্জয়ের জ্ঞাতি খুড়ার একথা বলার কারণ—
i. মৃত্যুঞ্জয় সাপুড়ে মেয়ে বিলাসীকে নিকা করেছে
ii. মৃত্যুঞ্জয় বিলাসীর হাতে ভাত খেয়েছে
iii. মৃত্যুঞ্জয় একটি মেয়েকে নিয়ে পালিয়েছে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৫৩। ন্যাড়াকে সাপ ধরার বিদ্যা শেখাতে বিলাসীর আপত্তি ছিল, কারণ কাজটি—
i. বিলাসীর অপছন্দের
ii. শক্ত ও ভীতিকর
iii. প্রতারণামূলক
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৫৪। বিলাসীর করুণ পরিণতির জন্য দায়ী—
i. তৎকালীন রক্ষণশীল হিন্দু সমাজব্যবস্থা
ii. মৃত্যুঞ্জয়ের জ্ঞাতি খুড়ার ষড়যন্ত্র
iii. মৃত্যুঞ্জয়ের সাপুড়ে হওয়া
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৫৫। ‘বিলাসী’ গল্পে বিলাসীর প্রেমের মহিমায় আলোয় ধরা পড়েছে—
i. সমাজজীবনের অনুদারতা ও রক্ষণশীলতা
ii. সমাজজীবনের নিষ্ঠুর ও অশুভ চেহারা
iii. অসাম্প্রদায়িক মানসিকতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৫৬। বিলাসীর আত্মহত্যার কারণ—
i. স্বামীর শোক
ii. ভালোবাসাকে জীবন্ত রাখা
iii. নিষ্ঠুর সমাজব্যবস্থা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৫৭। “বাবুরা, আমাকে একটি বার ছেড়ে দাও আমি রুটিগুলো ঘরে নিয়ে আসি।” বিলাসী এ কথা বলার কারণ—
i. শিয়াল-কুকুর খেয়ে যাবে
ii. রোগা মানুষ সমস্ত রাত খেতে পাবে না
iii. মৃত্যুঞ্জয় মরে যাবে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৫৮। চরিত্র বোঝার ক্ষেত্রে গুরুত্ব দিতে হয়—
i. ভাষার উপর
ii. চরিত্রের সংলাপের ওপর
iii. চরিত্রের সামাজিক পটভূমির ওপর
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১৫৯। ‘তিলার্ধ’ শব্দটি দিয়ে ‘বিলাসী’ গল্পে বোঝানো হয়েছে—
i. তিল পরিমাণ সময়ের অর্থ
ii. মুহূর্তমাত্র
iii. পরক্ষণেই
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ১৬০ ও ১৬১ নং প্রশ্নের উত্তর দাও:
অচলায়তন বিদ্যাপীঠের প্রতিষ্ঠাতা দাদাতাঠাকুর। এর ছাত্ররা প্রথা, বিধান ও সংস্কারের দাস। পাশের গ্রামের নিচু জাতের মানুষের সঙ্গে মেলামেশা করার জন্য তিনি এখন আর বিদ্যাপীঠে থাকেন না।

১৬০। দাদাতাঠাকুরের মতো নিচের কোন চরিত্রটি একই পরিস্থিতির শিকার?
(ক) মৃত্যুঞ্জয় (খ) খুড়া
(গ) ন্যাড়া (ঘ) বিলাসী
উত্তর: (ক) মৃত্যুঞ্জয়

১৬১। উদ্দীপকে ‘বিলাসী’ গল্পের কোন সামাজিক দিকটি উপস্থাপিত হয়েছে?
(ক) ব্রাহ্মণবাদ (খ) শ্রেণি বৈষম্য
(গ) নিষ্ঠুরতা (ঘ) বর্ণপ্রথা
উত্তর: (ঘ) বর্ণপ্রথা

উদ্দীপকের আলোকে ১৬২ ও ১৬৩ নং প্রশ্নের উত্তর দাও:
মালিনী নিম্নবর্ণের মেয়ে। সে কর্মনিপুণ, বুদ্ধিমতী এবং সেবাব্রতী। তার এসব গুণের জন্য জাতিভেদ ভুলে উঁচু বংশের পিতৃহীন চন্দন তাকে বিয়ে করেছে।

১৬২। উদ্দীপকের মালিনী তোমার পাঠ্যবইয়ের কোন চরিত্রের পরিচয় বহন করে?
(ক) হৈমন্তী (খ) বিলাসী
(গ) রেণু (ঘ) হরিমতি
উত্তর: (খ) বিলাসী

১৬৩। উদ্দীপকের মালিনী চরিত্রের যেসব বৈশিষ্ট্য ‘বিলাসী’ গল্পে বিলাসীর মধ্যে পাওয়া যায়—
i. কর্মনিপুণ ii. সৌন্দর্যের অহংকার iii. সেবাব্রতী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ১৬৪ ও ১৬৫ নং প্রশ্নের উত্তর দাও:
সুবল কুলীন হিন্দু ঘরের সন্তান। সে ভালোবেসে বিয়ে করেছে মুচির মেয়ে বাসন্তীকে। সমাজ এই ভালোবাসার মূল্য দেয়নি, ঘরছাড়া করেছে সুবলকে। গ্রামবাসী মিলে হেনস্তা করেছে বাসন্তীকে, কারণ সে নিচু জাতের মেয়ে। গ্রামবাসীর নেতৃত্বে ছিল সুবলেরই এক আত্মীয়।

১৬৪। উদ্দীপকটি সমর্থন করে ‘বিলাসী’ গল্পের—
i. বিশ শতকের সমাজচিত্র
ii. রক্ষণশীল মুসলিম সমাজের চিত্র
iii. রক্ষণশীল হিন্দু সমাজের চিত্র
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৬৫। সুবলের আত্মীয় ‘বিলাসী’ গল্পের কোন চরিত্রকে সমর্থন করে?
(ক) জ্ঞাতি খুড়া (খ) ন্যাড়া
(গ) মৃত্যুঞ্জয় (ঘ) হুমায়ুন
উত্তর: (ক) জ্ঞাতি খুড়া

১৬৬। ‘পঞ্চমুখ’ শব্দটা ‘বিলাসী’ গল্পে কী অর্থে ব্যবহৃত হয়েছে?
(ক) প্রশংসা অর্থে (খ) পাঁচ মুখে যে কথা বলে
(গ) পাঁচ মুখের সমাহার (ঘ) পঞ্চমুখে কীর্তন
উত্তর: (ক) প্রশংসা অর্থে

উদ্দীপকের আলোকে ১৬৭ ও ১৬৮ নং প্রশ্নের উত্তর দাও:
নার্গিস বিদেশে গৃহকর্মীর কাজ করে। বিদেশে কাজ করার বিষয়টি তার এলাকার মানুষ পছন্দ করে না। তিন বছর নার্গিস বাড়ি ফিরে এলে গ্রামবাসী তার নামে বিচার বসায় এবং তাকে গ্রামছাড়া করার সিদ্ধান্ত নেয়। নার্গিস প্রতিবাদী কণ্ঠে বলে "অসুস্থ মাকে রেখে কিছুতেই আমি কোথাও যাব না।"

১৬৭। উদ্দীপকের সঙ্গে ‘বিলাসী’ গল্পের যে বিষয়ের সাদৃশ্য রয়েছে—
i. নারীর প্রতি নির্যাতন
ii. কুসংস্কারাচ্ছন্ন সমাজ
iii. গ্রামীণ বিচার ব্যবস্থা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৬৮। উদ্দীপকের বিষয়টি বিবেচনায় নার্গিস ও বিলাসী উভয়ে কেমন প্রকৃতির নারী?
(ক) প্রতিবাদহীন (খ) প্রতিবাদী
(গ) আত্মকেন্দ্রিক (ঘ) কুসংস্কার পন্থী
উত্তর: (খ) প্রতিবাদী

উদ্দীপকের আলোকে ১৬৯ ও ১৭০ নং প্রশ্নের উত্তর দাও:
প্রেমিক আশিকুরের ভালোবাসার টানে মালয়েশিয়া থেকে ছুটে এসেছেন অভিজাত বংশের কন্যা ফাতেমা বিনতে আব্দুর রহমান। তারা বিবাহ বন্ধনে আবদ্ধ হয়। বিয়ের পর স্ত্রীকে বাড়িতে সসম্মানে নিয়ে গেছেন তিনি। এখন তারা আটপৌরে জীবন-যাপন করছেন।

১৬৯। উদ্দীপকে ফাতেমা বিনতে আব্দুর রহমান কাকে প্রতিনিধিত্ব করে?
(ক) মৃত্যুঞ্জয় (খ) কল্যাণী
(গ) আত্মাদী (ঘ) বিলাসী
উত্তর: (ক) মৃত্যুঞ্জয়

১৭০। উদ্দীপকে ‘বিলাসী’ গল্পের কোন সমাজ বাস্তবতা প্রতিফলিত হয়েছে?
(ক) বর্ণবৈষম্য (খ) রক্ষণশীলতা
(গ) জাতিভেদ (ঘ) কুসংস্কার
উত্তর: (গ) জাতিভেদ (অপশনে জাতিভেদ না থাকলে বর্ণবৈষম্য হতো)

উদ্দীপকের আলোকে ১৭১ ও ১৭২ নং প্রশ্নের উত্তর দাও:
শহরে জরুরি কাজে এসেছে প্রীতিময় চাকমা। সকাল থেকে ঘোরাঘুরি করে ক্ষুধার্ত হয়ে খাবার চাইলে হোটেল মালিক বলল, ‘আদিবাসীদের জন্য সুন্দর বাসন আমার হোটেলে রাখি না।’

১৭১। প্রীতিময় চাকমার সাথে ‘বিলাসী’ গল্পের কোন চরিত্রের মিল রয়েছে?
(ক) মৃত্যুঞ্জয়ের (খ) ন্যাড়ার
(গ) বিলাসীর (ঘ) খুড়ার
উত্তর: (গ) বিলাসীর

১৭২। প্রীতিময় চাকমার প্রতি হোটেল মালিকের মনোভাব ‘বিলাসী’ গল্পের যে প্রসঙ্গের সাথে সঙ্গতিপূর্ণ, তা হলো—
i. সংকীর্ণতা
ii. ব্রাহ্মণবাদ
iii. অস্পৃশ্যতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ১৭৩ নং প্রশ্নের উত্তর দাও:
মরণরে তুঁহু মম শ্যাম সমান।

১৭৩। উদ্দীপকের সঙ্গে সঙ্গতিপূর্ণ চরিত্র কোনটি?
(ক) মৃত্যুঞ্জয় (খ) বিলাসী
(গ) ন্যাড়া (ঘ) ন্যাড়ার আত্মীয়া
উত্তর: (খ) বিলাসী

১৭৪। উক্ত চরিত্রের স্বেচ্ছায় মৃত্যুকে আলিঙ্গনের প্রকৃত কারণ কোনটি?
(ক) ধর্ম (খ) সমাজ
(গ) প্রেম (ঘ) ঘৃণা
উত্তর: (গ) প্রেম

১৭৫। ‘কলি কি সত্যিই উল্টাইতে বসিল।’ ‘বিলাসী’ গল্পে গাঁয়ের লোকের এমন মনোভাব প্রকাশ পায়—
i. তাদের ধর্মপ্রীতির ভাব
ii. জাত-সংস্কারের চিন্তা
iii. সমাজের কুসংস্কার প্রয়োজনীয়তা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৭৬ ও ১৭৭ নং প্রশ্নের উত্তর দাও:
রিজ্ঞা আর সুজনের পনেরো বছরের সংসার। হঠাৎ এক রাতে রিজ্ঞার স্বামী মারা যায়। প্রতিবেশী হারাধন রিজ্ঞাকে সান্ত্বনা দিলেও রিজ্ঞা স্বামীর সাথে সহমরণে যেতে চায়।

১৭৬। উদ্দীপকের অনুরূপ ঘটনা তোমার পাঠ্যবইয়ের কোন গল্পে বর্ণিত হয়েছে?
(ক) অপরিচিতা (খ) বিলাসী
(গ) গৃহ (ঘ) মাসি-পিসি
উত্তর: (খ) বিলাসী

১৭৭। গল্পের লেখকের উক্ত ঘটনা বর্ণনার অন্তর্নিহিত তাৎপর্য হলো—
i. বিলাসী মৃত্যুঞ্জয়ের ভালোবাসার গভীরতা পরিমাপ
ii. মানবিক সম্পর্ককে নিছক চুক্তিতে আবদ্ধ না করা
iii. হৃদয় জয়ের আনন্দ উপলব্ধি ব্যাখ্যা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৭৮ ও ১৭৯ নং প্রশ্নের উত্তর দাও:
তিন্নী তথাকথিত নিম্নবর্ণের মেয়ে। সে কর্মনিপুণ, বুদ্ধিমতী এবং সেবাব্রতী। সে কারণে বিত তাকে বিয়ে করেছে। কিন্তু নিম্নবর্ণের হওয়ায় বিতর পরিবার তিন্নীকে মেনে নেয়নি।

১৭৮। উদ্দীপকে ‘বিলাসী’ গল্পের যে দিকটি ফুটে উঠেছে—
(ক) জাতিভেদ (খ) কুসংস্কার
(গ) শ্রেণিভেদ (ঘ) ধর্মবৈষম্য
উত্তর: (ক) জাতিভেদ

১৭৯। উদ্দীপকে ‘তিন্নী’ চরিত্রের যে সব বৈশিষ্ট্য ‘বিলাসী’ গল্পে পাওয়া যায় ‘বিলাসী’ চরিত্রের মধ্যে—
i. কর্মনিপুণ
ii. সৌন্দর্যের অহংকার
iii. সেবাব্রতী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৮০। রাতের আঁধারে বনের পথে ন্যাড়াকে এগিয়ে দেওয়ার পেছনে কাজ করেছে বিলাসীর—
i. কর্তব্যজ্ঞান ii. উদ্বেগ iii. দায়িত্বশীলতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৮১। মৃত্যুঞ্জয়ের জন্য বিলাসীর ভালোবাসার প্রমাণ হলো—
i. সাপ ধরার বায়না ফিরিয়ে দেওয়া
ii. মৃত্যুঞ্জয়ের শোকে আত্মহত্যা করা
iii. মৃত্যুঞ্জয়কে সেবাযত্নের মাধ্যমে সুস্থ করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৮২। ‘ফুলদানিতে ভিজাইয়া রাখা বাসি ফুল’ মূলত বিলাসীর—
i. দৈনিক সৌন্দর্যের পরিচয়
ii. স্বাস্থ্যহীনতার পরিচয়
iii. শারীরিক ক্লান্তির পরিচয়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১৮৩। গ্রামবাসী লাঠিসোটা নিয়ে মৃত্যুঞ্জয়ের পোড়োবাড়িতে উপস্থিত হওয়ার উদ্দেশ্য—
i. মৃত্যুঞ্জয়কে আক্রমণ করা
ii. বিলাসীকে গ্রামছাড়া করা
iii. হরিপুরের সমাজ রক্ষা করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১৮৪। মৃত্যুঞ্জয়ের মৃত্যুতে সুবিধা হলো—
i. খুড়ার ii. সমাজের iii. বিলাসীর বাবার
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৮৫। ‘বিলাসী’ গল্পের জীবন-প্রবাহ উঠে এসেছে—
i. যৌতুকপ্রথা ii. কুসংস্কার iii. ধর্মীয় গোঁড়ামি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১৮৬। ‘অতিকায় হস্তী লোপ পাইয়াছে কিন্তু তেলাপোকা টিকিয়া আছে’— এ উক্তিটি ইঙ্গিত করে—
i. বর্ণ-হিন্দু সমাজের রীতি-নীতির প্রতি
ii. সমাজের অলিখিত বিধি-ব্যবস্থার প্রতি
iii. সমাজের অন্ধবিশ্বাস ও সংকীর্ণতার প্রতি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৮৭। মৃত্যুঞ্জয়ের সাথে সবাই যেচে আলাপ করত—
i. তার কাছ থেকে খাবার আদায়ের আশায়
ii. গ্রামের সবাই তাকে খুব পছন্দ করত বলে
iii. সে অত্যন্ত পরোপকারী ছিল বলে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৮৮। ‘একদিন এই মন্ত্রের সত্য মিথ্যার চরম মীমাংসা হইয়া গেল।’ যেদিন—
i. ন্যাড়া মন্ত্রসিদ্ধ হলো
ii. মৃত্যুঞ্জয়কে সাপে কাটল
iii. মৃত্যুঞ্জয় মারা গেল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১৮৯। ‘সনাতন হিন্দু এ কুসংস্কার মানে না।’— এ উক্তিতে প্রকাশিত হয়েছে—
i. বিদ্বেষ ii. প্রেম iii. ব্যঙ্গ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ১৯০ ও ১৯১ নং প্রশ্নের উত্তর দাও:
মহুয়া পালার হোমড়া বেদে যখন নদের চাঁদকে মারার জন্য মহুয়ার হাতে বিষলক্ষের ছুরি তুলে দেয়, মহুয়া তখন সে ছুরি নিজের বুকে চালিয়ে দিয়ে তার প্রেমকে চির অমর করে রাখে।

১৯০। মহুয়ার সঙ্গে তুলনা চলে—
(ক) মৃত্যুঞ্জয়ের (খ) হৈমন্তীর
(গ) বিলাসীর (ঘ) ন্যাড়ার
উত্তর: (গ) বিলাসীর

১৯১। ‘বিলাসী’ গল্পের ন্যাড়ার বর্ণনা অনুযায়ী শাস্ত্রমতে, উদ্দীপকের মহুয়ার স্থান—
(ক) স্বর্গে (খ) নরকে
(গ) সমাজে (ঘ) মর্ত্যে
উত্তর: (খ) নরকে
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let reviewList = [];
        let reviewMode = false;
        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadReviewList() {
            const saved = localStorage.getItem(STORAGE_KEY + "_review");
            if (saved) reviewList = JSON.parse(saved);
        }

        function saveReviewList() {
            localStorage.setItem(STORAGE_KEY + "_review", JSON.stringify(reviewList));
        }

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
            <button onclick="toggleReviewMode()" id="review-btn" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                📌 Need to Review (${reviewList.length})
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            let filteredData = data.map((q, i) => ({ ...q, originalIndex: i }));

            if (reviewMode) {
                filteredData = filteredData.filter(item => reviewList.includes(item.originalIndex));
            } else if (wrongQuestionsOnly) {
                filteredData = filteredData.filter((item, i) =>
                    userAnswers[i] && userAnswers[i] !== data[i].answer
                );
            }

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" 
                            ${reviewList.includes(originalIdx) ? 'checked' : ''} 
                            onchange="toggleReview(${originalIdx}, this.checked)"
                            class="w-5 h-5 accent-purple-500">
                        <span class="text-purple-400 text-sm font-medium">Review</span>
                    </label>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        function toggleReview(qIndex, isChecked) {
            if (isChecked) {
                if (!reviewList.includes(qIndex)) reviewList.push(qIndex);
            } else {
                reviewList = reviewList.filter(idx => idx !== qIndex);
            }
            saveReviewList();
            updateReviewButton();
        }

        function updateReviewButton() {
            const btn = document.getElementById('review-btn');
            if (btn) btn.textContent = `📌 Need to Review (${reviewList.length})`;
        }

        function toggleReviewMode() {
            reviewMode = !reviewMode;
            const btn = document.getElementById('review-btn');

            if (reviewMode) {
                btn.style.backgroundColor = '#6b21a8';
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
            } else {
                btn.style.backgroundColor = '';
                btn.innerHTML = `📌 Need to Review (${reviewList.length})`;
            }

            const container = document.getElementById('quiz-container');
            container.style.opacity = '0.5';
            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
            loadReviewList();
            updateReviewButton();
        };
    </script>
