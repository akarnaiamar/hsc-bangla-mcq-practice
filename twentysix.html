<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">আলাওলের 'ঋতু বর্ণন' পদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। মহাকবি আলাওল কত শতকের কবি ছিলেন?
(ক) পনেরো (খ) সতেরো
(গ) ষোলো (ঘ) আঠারো
উত্তর: (খ) সতেরো

২। কার আশ্রয়ে আলাওল প্রতিভা বিকশিত হয়?
(ক) সুলেমানের (খ) চোরার
(গ) মাগন ঠাকুরের (ঘ) শক্তির
উত্তর: (গ) মাগন ঠাকুরের

৩। মহাকবি আলাওলের রচনায় কোন চেতনা স্পষ্ট?
(ক) আধ্যাত্মিক (খ) ক্ষোভের
(গ) দেশীয় (ঘ) নাগরিক
উত্তর: (ঘ) নাগরিক

৪। ‘পদ্মাবতী’ আলাওলের কোন ধরনের রচনা?
(ক) উপন্যাস (খ) প্রবন্ধ
(গ) ছোটগল্প (ঘ) কাব্য
উত্তর: (ঘ) কাব্য

৫। মহাকবি আলাওলের রচনা হলো—
i. সয়ফুলমুলুক বদিউজ্জামাল
ii. তোহফা
iii. রাগতালনামা
নিচের কোনটি সঠিক?
(ক) i, ii (খ) i, iii
(গ) ii, iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৬। ‘কিংশুক’ শব্দের অর্থ কী?
(ক) বৃক্ষ (খ) পলাশ ফুল
(গ) শিমুল ফুল (ঘ) রাজহংস
উত্তর: (খ) পলাশ ফুল

৭। ‘অম্বুর’ শব্দের অর্থ কী?
(ক) দক্ষিণ (খ) উচ্চালয়
(গ) আঁখির (ঘ) গাঢ় নীল
উত্তর: (গ) আঁখির

৮। ‘খণ্ড তর্পণ’ কবিতায় ফুটে উঠেছে কোন দ্বন্দ্ব?
(ক) ফলদ (খ) দলদ
(গ) ঐকিক (ঘ) অসমগতি
উত্তর: (ঘ) অসমগতি

৯। কুসুমিত কিংশুক বন কোন রঙের?
(ক) সবুজ (খ) লাল
(গ) কালো (ঘ) নীল
উত্তর: (খ) লাল

১০। ‘খণ্ড তর্পণ’ কবিতায় অঙ্গে কোন জিনিস চর্চিত করা হয়?
(ক) চন্দন (খ) শিলা
(গ) মৌরি (ঘ) হলুদ
উত্তর: (ক) চন্দন

১১। ‘খণ্ড তর্পণ’ কবিতায় নির্মল আকাশ কোন ঋতুর?
(ক) শরৎ (খ) বসন্ত
(গ) গ্রীষ্ম (ঘ) শীত
উত্তর: (ক) শরৎ

১২। ‘খণ্ড তর্পণ’ কবিতায় কয়টি ঋতুর নাম উল্লেখ আছে?
(ক) ৪ (খ) ৩
(গ) ৬ (ঘ) ৫
উত্তর: (ক) ৪

১৩। ‘খণ্ড তর্পণ’ কবিতায় শরতের বিদায়ে কোন ঋতু আসে?
(ক) গ্রীষ্ম (খ) বসন্ত
(গ) বর্ষা (ঘ) হেমন্ত
উত্তর: (ঘ) হেমন্ত

১৪। ‘ঋতু বর্ণনা’ কবিতায় কীসের ভয়ে সূর্য লুকায়?
(ক) শীত (খ) মেঘ
(গ) রৌদ্র (ঘ) বর্ষা
উত্তর: (ক) শীত

১৫। ‘ঋতু বর্ণনা’ কবিতায় দীর্ঘ সুখের কী পলকে পোহায়?
(ক) রাত (খ) দিন
(গ) সকাল (ঘ) সন্ধ্যা
উত্তর: (ক) রাত

১৬। ‘ঋতু বর্ণনা’ কবিতায় চরণসংখ্যা কতটি?
(ক) ২৯ (খ) ৩০
(গ) ৩৩ (ঘ) ৩২
উত্তর: (ঘ) ৩২

১৭। ‘ঋতু বর্ণনা’ কবিতায় কয়টি ঋতুর বৈশিষ্ট্য আছে?
(ক) ৬ (খ) ৮
(গ) ৫ (ঘ) ৪
উত্তর: (গ) ৫

১৮। ‘ঋতু বর্ণনা’ কবিতায় কোন সময়ে ঘন ঘন গরজিত হয়?
(ক) পাবন (খ) ঝড়
(গ) সমীর (ঘ) নিশি
উত্তর: (ক) পাবন

১৯। ‘ঋতু বর্ণনা’ কবিতায় কৈলাসে কার বাসস্থান?
(ক) শিব (খ) দুর্গা
(গ) কালী (ঘ) গুরুদেব
উত্তর: (ক) শিব

নিচের উদ্দীপকটি পড়ে ২০ ও ২১ নম্বর প্রশ্নের উত্তর দাও:
‘কিশলয়ে-পর্ণে অশান্ত ওড়ে তার অঞ্চল প্রান্ত...
ফুলে ফুলে হাসি অফুরন্ত।”

২০। উদ্দীপকে ‘ঋতু বর্ণনা’ কবিতার বসন্ত ঋতুর কোন দিকটি ফুটে উঠেছে?
(ক) নতুন পাতা গজানো (খ) নতুন ফুল ফোটা
(গ) প্রেমভাব জাগ্রত হওয়া (ঘ) বনস্পতিতে মুকুল আসা
উত্তর: (খ) নতুন ফুল ফোটা

২১। ফুটে ওঠা দিকটির সাথে কোন চরণের সাযুজ্য রয়েছে?
(ক) মুকুলিত কৈল তবে বৃক্ষ বনস্পতি
(খ) মলয়া সমীর হেলা কামের পদতি
(গ) প্রথমে বসন্ত ঋতু নবীন পল্লব
(ঘ) কুসুমিত কিংশুক সঘন বন লাল
উত্তর: (ঘ) কুসুমিত কিংশুক সঘন বন লাল

২২। ‘ঋতু বর্ণনা’ কবিতায় ‘তুরিতে’ শব্দের অর্থ কী?
(ক) দ্রুত (খ) স্থির
(গ) ধীর (ঘ) লাফ
উত্তর: (ক) দ্রুত

২৩। ‘ঋতু বর্ণনা’ কবিতায় ‘শিখিনী’ শব্দের অর্থ কী?
(ক) ব্যাঙ (খ) ময়ূর
(গ) ময়ূরী (ঘ) সাপ
উত্তর: (গ) ময়ূরী

২৪। আলাওল আনুমানিক কত খ্রিস্টাব্দে জন্মগ্রহণ করেন?
(ক) ১৬০৫ (খ) ১৬০৯
(গ) ১৬০৭ (ঘ) ১৬০৮
উত্তর: (গ) ১৬০৭

২৫। কবি আলাওলের রচনায় সুস্পষ্ট হলো—
i. নাগরিক চেতনা
ii. প্রকৃতির ব্যবহার
iii. রুচির ছাপ
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

২৬। আলাওল কোথায় যাওয়ার সময় জলদস্যুর কবলে পড়েন?
(ক) ঢাকা (খ) চট্টগ্রাম
(গ) সিলেট (ঘ) নোয়াখালী
উত্তর: (খ) চট্টগ্রাম

২৭। নিচের কোনটি আলাওলের কাব্য নয়?
(ক) ইউসুফ-জোলেখা (খ) তোহফা
(গ) পদ্মাবতী (ঘ) হপ্ত পয়কর
উত্তর: (ক) ইউসুফ-জোলেখা

২৮। আলাওল কত খ্রিস্টাব্দে মৃত্যুবরণ করেন?
(ক) ১৬৮০ (খ) ১৬৭৯
(গ) ১৬৮২ (ঘ) ১৬৮৩
উত্তর: (ক) ১৬৮০

নিচের উদ্দীপকটি পড়ে ২৯ ও ৩০ নম্বর প্রশ্নের উত্তর দাও:
ঘাম ঝরে
দরদর
গ্রীষ্মের দুপুরে
খাল বিল
চৌচির
জল নেই পুকুরে।
মাঠে ঘাটে
লোক নেই, খাঁ খাঁ করে রোদ্দুর।

২৯। উদ্দীপকে ‘ঋতু বর্ণনা’ কবিতার গ্রীষ্মের কোন ভাবটি ফুটে উঠেছে?
(ক) প্রেমের ভাব (খ) তাপদাহ ভাব
(গ) রসাল ভাব (ঘ) পুষ্প বাহারের ভাব
উত্তর: (খ) তাপদাহ ভাব

৩০। উক্ত ভাবের সাথে সংগতিপূর্ণ চরণ কোনটি?
(ক) রৌদ্র ত্রাসে রহে ছায়া চরণে সরণ
(খ) চন্দন চম্পক মাল্য মলয়া পবন
(গ) সতত দম্পতি সঙ্গে ব্যাপিত মদন
(ঘ) বিচিত্র বসন অঙ্গে চন্দন চর্চিত
উত্তর: (ক) রৌদ্র ত্রাসে রহে ছায়া চরণে সরণ

৩১। ‘ঋতু বর্ণনা’ কবিতায় প্রথমে কোন ঋতুর বর্ণনা আছে?
(ক) গ্রীষ্ম (খ) বর্ষা
(গ) শরৎ (ঘ) বসন্ত
উত্তর: (ঘ) বসন্ত

৩২। 'নিদাঘ সময়' বলতে কী বোঝানো হয়েছে?
(ক) প্রচণ্ড গরমকাল (খ) আবহাওয়া ঠান্ডা
(গ) পীড়নের সময় (ঘ) বর্ষার আগমন
উত্তর: (ক) প্রচণ্ড গরমকাল

নিচের উদ্দীপকটি পড়ে ৩৩ ও ৩৪ সংখ্যক প্রশ্নের উত্তর দাও।
আসে বসন্ত ফুলবনে জাগে বনভূমি সুন্দরী।

৩৩। কবিতাংশে ‘ঋতু বর্ণনা’ কবিতার বসন্ত ঋতুর কোন দিকটি উন্মোচিত হয়েছে?
(ক) সুন্দর শোভা (খ) মল্লার রাগ
(গ) পুষ্পমাল্য (ঘ) মলয় সমীর
উত্তর: (ক) সুন্দর শোভা

৩৪। উক্ত দিকটি নিচের কোন পঙক্তিতে প্রকাশ পেয়েছে?
(ক) চন্দন চম্পক মাল্য মলয়া পবন
(খ) কুসুমিত কিংশুক সঘন বন লাল
(গ) পাবন সময় ঘন ঘন গরজিত
(ঘ) ঘনবীন খঞ্জন দেখি বড়হি কৌতুক
উত্তর: (ক) চন্দন চম্পক মাল্য মলয়া পবন

৩৫। আলাওল কোন শতকের কবি ছিলেন?
(ক) পনেরো (খ) সতেরো
(গ) ষোলো (ঘ) চৌদ্দ
উত্তর: (খ) সতেরো

৩৬। আলাওল আনুমানিক কত খ্রিস্টাব্দে জন্মগ্রহণ করেন?
(ক) ১৬০৫ (খ) ১৬০৯
(গ) ১৬০৭ (ঘ) ১৬০৮
উত্তর: (গ) ১৬০৭

            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            const filteredData = wrongQuestionsOnly
                ? data.map((q, i) => ({ ...q, originalIndex: i }))
                    .filter((q, i) => userAnswers[i] && userAnswers[i] !== q.answer)
                : data.map((q, i) => ({ ...q, originalIndex: i }));

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
        };
    </script>
</body>

</html>
