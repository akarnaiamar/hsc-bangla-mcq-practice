<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">রোকেয়া সাখাওয়াত হোসেনের 'অর্ধাঙ্গী' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। বেগম রোকেয়া একজন—
(ক) সাহসী সাহিত্যিক (খ) প্রথাবিরোধী লেখক
(গ) নারীবাদী সাহিত্যিক (ঘ) সমাজ সচেতন সাহিত্যিক
উত্তর: (ঘ) সমাজ সচেতন সাহিত্যিক

২। কোন রচনাটি রোকেয়া সাখাওয়াত হোসেনের নয়?
(ক) পদ্মরাগ (খ) মতিচূর
(গ) অবরোধবাসিনী (ঘ) চক্রবাক
উত্তর: (ঘ) চক্রবাক

৩। পার্সি মহিলাদের পর্দা মোচন হলেও কী মোচন হয়নি?
(ক) আর্থিক কষ্ট (খ) মানসিক দাসত্ব
(গ) পারিবারিক কলহ (ঘ) মনের উদারতা
উত্তর: (খ) মানসিক দাসত্ব

৪। 'ভগিনী' শব্দ দ্বারা কী বোঝানো হয়েছে?
(ক) ভাগনী (খ) ভাগ্নে
(গ) ভাতিজি (ঘ) বোন
উত্তর: (ঘ) বোন

৫। কোন প্রবন্ধে প্রায় সমগ্র নারীজাতির উল্লেখ আছে?
(ক) পদ্মরাগ (খ) সুলতানার স্বপ্ন
(গ) স্ত্রীজাতির অবনতি (ঘ) মতিচূর
উত্তর: (গ) স্ত্রীজাতির অবনতি

৬। কোন প্রবন্ধে প্রায় সমগ্র নারীজাতির উল্লেখ আছে? (পুনরাবৃত্তি)
(ক) পদ্মরাগ (খ) সুলতানার স্বপ্ন
(গ) স্ত্রীজাতির অবনতি (ঘ) মতিচূর
উত্তর: (ঘ) মতিচূর

৭। কোনো কোনো বালিকা রন্ধন ও সূচিকর্মে কেমন হয়?
(ক) নিপুণা (খ) সুনিপুণা
(গ) দক্ষ (ঘ) অনভিজ্ঞ
উত্তর: (খ) সুনিপুণা

৮। 'অর্ধাঙ্গী' প্রবন্ধে 'Worse Halves' কারা?
(ক) পুরুষ (খ) নারী
(গ) স্বামী (ঘ) স্ত্রী
উত্তর: (গ) স্বামী

৯। 'অর্ধাঙ্গী' প্রবন্ধে চিত্রিত হয়েছে—
i. মুসলিম নারীসমাজের পশ্চাৎপদতার কারণ
ii. নারীর প্রতি পুরুষের সংকীর্ণ দৃষ্টিভঙ্গি
iii. বিংশ শতকে নারীদের অবস্থা
নিচের কোনটি সঠিক?
(ক) i (খ) i ও ii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১০। নারীদেরকে পুরুষের অবস্থা থেকে পৃথক করেছে কোনটি?
(ক) ধর্মীয় গোঁড়ামি (খ) ধর্মীয় কুসংস্কার
(গ) শিক্ষার অনগ্রসরতা (ঘ) সমাজের বিধিব্যবস্থা
উত্তর: (ঘ) সমাজের বিধিব্যবস্থা

১১। আমাদের দেশের নারীশিক্ষার বন্দোবস্ত ছিল—
i. আরবি বর্ণমালা শিক্ষা দেওয়া
ii. কোরআন শরিফ শিক্ষা দেওয়া
iii. এফ.এ পর্যন্ত শিক্ষা দেওয়া
নিচের কোনটি সঠিক?
(ক) i (খ) i ও ii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও ii

১২। 'অর্ধাঙ্গী' প্রবন্ধে 'তরঙ্গিণী' কী?
(ক) মেঘ (খ) ঢেউ
(গ) বৃষ্টি (ঘ) নদী
উত্তর: (ঘ) নদী

১৩। 'অল্পকেশ' শব্দটি দিয়ে লেখক বুঝিয়েছেন—
i. সাদা চুলবিশিষ্ট
ii. পক্ককেশবিশিষ্ট
iii. কালো চুলবিশিষ্ট
নিচের কোনটি সঠিক?
(ক) i (খ) ii
(গ) i ও ii (ঘ) iii
উত্তর: (গ) i ও ii

১৪। 'রাসভকর্ণ' মানে কী?
(ক) গরুর কান (খ) ছাগলের কান
(গ) গাধার কান (ঘ) কুকুরের কান
উত্তর: (গ) গাধার কান

১৫। 'বাতুল' মানে কী?
(ক) মাতালতা (খ) বুদ্ধিহীন
(গ) পাগল (ঘ) বিচারহীন
উত্তর: (গ) পাগল

উদ্দীপক ও সংশ্লিষ্ট প্রশ্ন
উদ্দীপক: শাকিরা ও জুলিয়া দুই বান্ধবী। আই.এ পাশ করে শাকিরার বিয়ে হয়েছে। সে স্বামীর অনুগত গৃহিণী। স্বামীর আদেশ-নিষেধ অবনত মস্তকে পালন করাকেই সে একমাত্র কর্তব্য মনে করে। জুলিয়া বি.এ পাশ করে স্বামীর পাশাপাশি চাকরি নিয়েছে। জুলিয়ার চাকরি করাকে শাকিরা মর্যাদাহানি মনে করে।

১৬। 'অর্ধাঙ্গী' প্রবন্ধ অনুসারে উদ্দীপকের শাকিরার চরিত্রে কী প্রকাশ পেয়েছে?
(ক) উন্নত মানসিকতা (খ) মানসিক দাসত্ব
(গ) আধুনিক চিন্তা (ঘ) স্বামীভক্তি
উত্তর: (খ) মানসিক দাসত্ব

১৭। 'অর্ধাঙ্গী' প্রবন্ধের আলোকে জুলিয়ার চরিত্রটি সমর্থন করে—
i. নারীকে পুরুষের সমকক্ষতা অর্জন
ii. নারী-পুরুষের সম্মিলিত প্রচেষ্টা
iii. নারীর জনপ্রিয়তা বৃদ্ধি
নিচের কোনটি সঠিক?
(ক) i (খ) i ও ii
(গ) ii ও iii (ঘ) i, iii
উত্তর: (খ) i ও ii

১৮। পর্দার বাইরে আসা বলতে লেখক কী বলেছেন?
(ক) পরাধীনতার মুক্তি (খ) চাকরি করা
(গ) শিক্ষিত হওয়া (ঘ) মানসিক স্বাধীনতা
উত্তর: (ক) পরাধীনতার মুক্তি

১৯। স্ত্রীদের বিদ্যার দৌড় সচরাচর কী পর্যন্ত?
(ক) প্রাথমিক বিদ্যালয় (খ) বোধোদয়
(গ) রামায়ণ (ঘ) কোরআন
উত্তর: (খ) বোধোদয়

২০। কাদের মতে, নারী পুরুষের অর্ধেক?
(ক) লেখকদের (খ) মুসলমানদের
(গ) হিন্দুদের (ঘ) ইহুদিদের
উত্তর: (খ) মুসলমানদের

২১। 'অর্ধাঙ্গী' প্রবন্ধে লেখক সীতাকে কার সাথে তুলনা করেছেন?
(ক) রামের (খ) দেবীর
(গ) রানির (ঘ) পুতুলের
উত্তর: (ঘ) পুতুলের

২২। রোকেয়া সাখাওয়াত হোসেন কোন গ্রামে জন্মগ্রহণ করেন?
(ক) নিশ্চিন্তপুর (খ) মিঠাপুকুর
(গ) পায়রাবন্দ (ঘ) তাম্বুলখানা
উত্তর: (গ) পায়রাবন্দ

২৩। 'জড়পদার্থ' শব্দটি দ্বারা কী বোঝানো হয়েছে?
(ক) নারীদেরকে (খ) পুরুষদেরকে
(গ) বিভিন্ন জড়বস্তুকে (ঘ) সমাজের রীতিকে
উত্তর: (ক) নারীদেরকে

২৪। আমেরিকা আবিষ্কার করতে কৃতসংকল্প হয়েছিলেন কে?
(ক) কলম্বাস (খ) ভাস্কো-দা-গামা
(গ) হিউয়েন সাঙ (ঘ) আলেকজান্ডার
উত্তর: (ক) কলম্বাস

২৫। কোন সমাজে স্ত্রীশিক্ষার যথেষ্ট সুবিধা আছে?
(ক) হিন্দু (খ) মুসলিম
(গ) খ্রিস্টান (ঘ) ইহুদি
উত্তর: (গ) খ্রিস্টান

২৬। কোনটিকে রোকেয়া অপার্থিব সম্পত্তি বলেছেন?
(ক) পিতৃস্নেহ (খ) মাতৃস্নেহ
(গ) সম্পত্তির উত্তরাধিকার (ঘ) স্বামীর ভালোবাসা
উত্তর: (ক) পিতৃস্নেহ

২৭। দ্বিচক্র শকটের বড় অংশ কে?
(ক) পতি (খ) পত্নী
(গ) ভাই (ঘ) বোন
উত্তর: (ক) পতি

২৮। 'অর্ধাঙ্গী' প্রবন্ধের তাৎপর্য হলো—
(ক) নারী স্বাধীনতা (খ) নারীশিক্ষা
(গ) নারীজাগরণ (ঘ) নারী আন্দোলন
উত্তর: (গ) নারীজাগরণ

২৯। 'অবরোধবাসিনী' গ্রন্থটির লেখক—
(ক) শওকত ওসমান (খ) রোকেয়া সাখাওয়াত হোসেন
(গ) কাজী নজরুল ইসলাম (ঘ) সুফিয়া কামাল
(ঙ) সৈয়দ ওয়ালীউল্লাহ
উত্তর: (খ) রোকেয়া সাখাওয়াত হোসেন

৩০। রোকেয়া সাখাওয়াত হোসেন কথিত অপার্থিব সম্পত্তি—
(ক) জমি (খ) হিতৈষিতা
(গ) গ্রন্থ (ঘ) সূচিকর্ম
উত্তর: (খ) হিতৈষিতা

৩১। “রাজশাসনের রীতিনীতি সূক্ষ্মভাবে রয়েছে ইহাতে।” — কোন রচনার অন্তর্গত?
(ক) অর্ধাঙ্গী (খ) শকুন্তলা
(গ) ভাষার কথা (ঘ) সাহিত্যে খেলা
উত্তর: (ক) অর্ধাঙ্গী

৩২। রোকেয়া সাখাওয়াত হোসেন কোন দুই দল লোককে অলস বলেছেন?
(ক) শিক্ষিত পুরুষ ও অশিক্ষিত নারী
(খ) অল্পকেশ বুদ্ধিমানগণ ও তাদের অনুসারী
(গ) রাজরাজড়া ও সম্ভ্রান্ত মহিলা
(ঘ) ভিক্ষু ও ধনবান
উত্তর: (ঘ) ভিক্ষু ও ধনবান

৩৩। 'পয়জার' শব্দটির অর্থ—
(ক) পাদুকা (খ) পায়জামা
(গ) দাণ্ডিপাল্লা (ঘ) পালোয়ান
(ঙ) পাগলামি
উত্তর: (ক) পাদুকা

৩৪। 'সূত্রধর' হলো—
(ক) তাঁতি (খ) মালি
(গ) ছুতার (ঘ) মাঝি
(ঙ) কৃষক
উত্তর: (গ) ছুতার

৩৫। অর্ধাঙ্গীতে রোকেয়া সাখাওয়াত হোসেন কাদের পর্দামোচন হয়েছে বলে জানিয়েছেন?
(ক) আরবীয়দের (খ) পার্সিদের
(গ) হিন্দুদের (ঘ) মিশরীয়দের
উত্তর: (খ) পার্সিদের

৩৬। “করিমা বখশশা-এ বরহালে মা” এটি আছে যে রচনায়—
(ক) অর্ধাঙ্গী (খ) যৌবনের গান
(গ) সৌদামিনী মালো (ঘ) তাহারই পড়ে মনে
উত্তর: (ক) অর্ধাঙ্গী

৩৭। “যে প্রবন্ধে প্রায় সমগ্র নারীজাতির উল্লেখ আছে।” — কোন প্রবন্ধটি?
(ক) নবদম্পতির প্রেমলাপ (খ) অবরোধবাসিনী
(গ) সুলতানার স্বপ্ন (ঘ) স্ত্রীজাতির অবনতি
উত্তর: (ঘ) স্ত্রীজাতির অবনতি

৩৮। 'শামস-উল-ওলামা'র শাব্দিক অর্থ—
(ক) আরবি পণ্ডিত (খ) জ্ঞানীদের মধ্যে সূর্য
(গ) মাদ্রাসার শিক্ষক (ঘ) বড় আলেম
উত্তর: (খ) জ্ঞানীদের মধ্যে সূর্য

৩৯। “অবলাব হাতেও সমাজের জীবন-মরণের কাঠি আছে।” বাক্যটি যে রচনা থেকে গৃহীত হয়েছে তার নাম—
(ক) অর্ধাঙ্গী (খ) যৌবনের গান
(গ) সৌদামিনী মালো (ঘ) একুশের গল্প
উত্তর: (ক) অর্ধাঙ্গী

৪০। রোকেয়া সাখাওয়াত হোসেন-এর 'অর্ধাঙ্গী' রচনায় কোন ফলের উল্লেখ আছে?
(ক) আম (খ) কাঁঠাল
(গ) জাম (ঘ) লিচু
উত্তর: (খ) কাঁঠাল

৪১। 'কাদম্বিনী' শব্দের অর্থ—
(ক) যে কাঁদে (খ) যে কাঁদায়
(গ) মেঘমালা (ঘ) অসহায়
উত্তর: (গ) মেঘমালা

৪২। “আবশ্যক হইলে কোন্দলও চলে” — এ উদ্ধৃতিটি কোন রচনার?
(ক) হৈমন্তী (খ) বিলাসী
(গ) অর্ধাঙ্গী (ঘ) সাহিত্যে খেলা
উত্তর: (গ) অর্ধাঙ্গী

৪৩। সাগরের পানি বাষ্প হয়ে মেঘে পরিণত হয়। আবার সেই মেঘ বৃষ্টিরূপা হয়ে সাগরে পতিত হয়। উপরের বাক্য দুটি দ্বারা বোঝানো হয়েছে—
(ক) একে অপরের অনুসারী (খ) প্রত্যেকে আমরা পরের তরে
(গ) একের কর্তব্য অন্যের অধিকার (ঘ) প্রত্যেকেই প্রত্যেকের নিকট ঋণী
উত্তর: (ঘ) প্রত্যেকেই প্রত্যেকের নিকট ঋণী

৪৪। নারীদের শুধু রান্নাঘরেই সীমাবদ্ধ রাখা উচিত নয়। কারণ এটা তাদের—
i. অকর্মণ্য করে তোলে
ii. মানসিক দাসত্ব প্রকাশ করে
iii. স্বামীদের আরামপ্রিয়তা বৃদ্ধি করে
নিচের কোনটি সঠিক?
(ক) i (খ) ii
(গ) i ও ii (ঘ) ii ও iii
উত্তর: (গ) i ও ii

৪৫। 'অর্ধাঙ্গী' প্রবন্ধে বর্ণিত 'নাকের দড়ি' শব্দের অর্থ কী?
(ক) অধিকার ও মালিকানার বস্তু (খ) মেয়েদের আটকে রাখার কৌশল
(গ) তন্তু বয়ন করে তৈরিকৃত রশি (ঘ) নতজানু ও বাধ্য করার অস্ত্র
উত্তর: (ঘ) নতজানু ও বাধ্য করার অস্ত্র

কবিতাংশ ও সংশ্লিষ্ট প্রশ্ন
নিচের কবিতাংশ পড়ে ৪৬ ও ৪৭ নং প্রশ্নের উত্তর দাও:
বিশ্বের যা কিছু মহান সৃষ্টি চিরকল্যাণকর
অর্ধেক তার করিয়াছে নারী, অর্ধেক তার নর।

৪৬। উপরের কবিতাংশের মর্মানুসারে নারীর সার্থক পরিচয় কোনটি?
(ক) প্রপয়িনী (খ) সহচরী
(গ) অর্ধাঙ্গী (ঘ) সমভাগিনী
উত্তর: (গ) অর্ধাঙ্গী

৪৭। সামাজিক কল্যাণ সাধনে বেগম রোকেয়ার কোন আহ্বানটির সঙ্গে উপরের কবিতাংশের মিল আছে?
(ক) নারীর মানসিক দাসত্ব মোচন (খ) নারীর যথাযথ সম্মান প্রতিষ্ঠা
(গ) নারীকে পুরুষের সমকক্ষ করা (ঘ) নারী-পুরুষের সম্মিলিত প্রচেষ্টা
উত্তর: (ঘ) নারী-পুরুষের সম্মিলিত প্রচেষ্টা

৪৮। রোকেয়া সাখাওয়াত হোসেন সমস্ত প্রতিকূলতার ভেতরেও আপন প্রচেষ্টায় কোন বিষয়ে দক্ষতা অর্জন করেছিলেন?
(ক) বাংলা ও ফারসি (খ) বাংলা ও ইংরেজি
(গ) বাংলা ও হিন্দি (ঘ) বাংলা ও উর্দু
উত্তর: (খ) বাংলা ও ইংরেজি

৪৯। 'মানসিক দাসত্ব' বলতে রোকেয়া সাখাওয়াত হোসেন কী বুঝিয়েছেন?
(ক) নারীর অচেতন অবস্থাকে (খ) নারীর ব্যক্তিত্বহীনতাকে
(গ) নারীর আরামপ্রিয়তাকে (ঘ) নারীর পরাধীনতাকে
উত্তর: (ঘ) নারীর পরাধীনতাকে

৫০। মানসিক দাসত্বের ব্যাপারটি বোঝানোর জন্য লেখক কোন নারীদের দৃষ্টান্ত টেনেছেন?
(ক) ফরাসি নারীদের (খ) পার্সি নারীদের
(গ) ইংরেজ নারীদের (ঘ) ভারতীয় নারীদের
উত্তর: (খ) পার্সি নারীদের

৫১। পার্সি পুরুষগণ কোন সভ্যতার অনুকরণ করতেন?
(ক) ইংরেজ (খ) ফরাসি
(গ) বিলাতি (ঘ) ইউরোপীয়
উত্তর: (গ) বিলাতি

৫২। 'অর্ধাঙ্গী' প্রবন্ধে বেগম রোকেয়া কোনটি 'বাতুলতা' মনে করতে চেয়েছেন?
(ক) কলম্বাসের আমেরিকা আবিষ্কার (খ) নারীদের পুরুষের সমকক্ষতা লাভ
(গ) পুরুষের ন্যায় নারী নিজেকে শ্রেষ্ঠ জ্ঞান করা (ঘ) উন্নত সমাজ গঠনে নারীদের জেগে ওঠা
উত্তর: (গ) পুরুষের ন্যায় নারী নিজেকে শ্রেষ্ঠ জ্ঞান করা

৫৩। কলম্বাসকে মানুষ বাতুল বলেছিল কেন?
(ক) অবিশ্বাস্য কাজে হাত দিয়েছিলেন বলে (খ) মহাকাশে যাত্রা করেছিলেন বলে
(গ) পাগলামি করেছিলেন বলে (ঘ) আমেরিকা আবিষ্কার করেছিলেন বলে
উত্তর: (ঘ) আমেরিকা আবিষ্কার করেছিলেন বলে (দ্রষ্টব্য: মূল পাঠ্য অনুযায়ী 'অবিশ্বাস্য কাজে হাত দেওয়া' বেশি যুক্তিযুক্ত হতে পারে)

৫৪। পুরুষগণ স্ত্রীজাতির ওপর উপযুক্ত সম্মান প্রদর্শন করেন না কেন?
(ক) পুরুষেরা শক্তিশালী বলে (খ) পুরুষদের সংকীর্ণ দৃষ্টিভঙ্গির জন্য
(গ) পুরুষেরা স্ত্রীদের খাওয়ায় বলে (ঘ) নারীরা পরাধীন বলে
উত্তর: (খ) পুরুষদের সংকীর্ণ দৃষ্টিভঙ্গির জন্য

৫৫। “সীতার সঙ্গে রামের সম্বন্ধও প্রায় সেইরূপ।” — এতে লেখকের কোন মনোভাব প্রকাশ পেয়েছে?
(ক) প্রতিবাদী (খ) সহনশীল
(গ) অসহ্য (ঘ) বিদ্রূপাত্মক
উত্তর: (ঘ) বিদ্রূপাত্মক

৫৬। 'অনলে উৎসর্গ' শব্দটি দ্বারা কোনটি প্রকাশ পেয়েছে?
(ক) বায়ুকে উৎসর্গ করা (খ) আগুনে পুড়িয়ে ফেলা
(গ) আগুনকে আরও ছড়িয়ে দেওয়া (ঘ) আগুনের নামে উৎসর্গ করা
উত্তর: (ঘ) আগুনের নামে উৎসর্গ করা (দ্রষ্টব্য: অপশনে 'আগুনে পুড়িয়ে ফেলা' মার্ক করা আছে কিন্তু আক্ষরিক অর্থ ঘ)

৫৭। 'অর্ধাঙ্গী' প্রবন্ধ অনুসারে কে ব্যক্তিত্বের ষোলো আনা পরিচয় দিয়েছিল?
(ক) কৃষ্ণ (খ) মহিম
(গ) রাবণ (ঘ) রাম
উত্তর: (ঘ) রাম

৫৮। ইংরেজি ভাষায় কথায় কথায় স্ত্রীকে কী বলে?
(ক) সহচরী (খ) অর্ধাঙ্গী
(গ) প্রপয়িনী (ঘ) অর্ধাঙ্গিনী 
উত্তর: (খ) অর্ধাঙ্গী

৫৯। অল্পকেশ বুদ্ধিমানগণ সংসারকে কীসের সঙ্গে তুলনা করেছেন?
(ক) আজব কারখানা (খ) আজব গাড়ি
(গ) দ্বিচক্র যান (ঘ) নৌকা
উত্তর: (গ) দ্বিচক্র যান

৬০। 'better half' শব্দটির পরিভাষা কোনটি?
(ক) পরার্থ (খ) পরমার্থ
(গ) নিষ্টুরার্থ (ঘ) উত্তমার্থ
উত্তর: (ঘ) উত্তমার্থ

৬১। 'দর্পণ' বলতে কোনটি বোঝানো হয়েছে?
(ক) আয়না (খ) দর্প
(গ) দাপট (ঘ) দরজা
উত্তর: (ক) আয়না

৬২। রোকেয়া সাখাওয়াত হোসেন 'অর্ধাঙ্গী' প্রবন্ধে দক্ষিণ বাহুর দৈর্ঘ্য কত বলেছেন?
(ক) পঁচিশ ইঞ্চি (খ) ছাব্বিশ ইঞ্চি
(গ) ত্রিশ ইঞ্চি (ঘ) বাইশ ইঞ্চি
উত্তর: (গ) ত্রিশ ইঞ্চি

৬৩। 'অর্ধাঙ্গী' প্রবন্ধ অনুসারে দ্বিচক্র শকটের বড় অংশটি কে?
(ক) পতি (খ) পত্নী
(গ) ভাই (ঘ) বোন
উত্তর: (ক) পতি

৬৪। 'নবদম্পতির প্রেমলাপ' কবিতাটি কার লেখা?
(ক) রবীন্দ্রনাথ ঠাকুর (খ) কাজী নজরুল ইসলাম
(গ) জসীম উদ্দীন (ঘ) মধুসূদন
উত্তর: (ক) রবীন্দ্রনাথ ঠাকুর

৬৫। 'অর্ধাঙ্গী' প্রবন্ধ অনুসারে স্বামী যখন পৃথিবী থেকে সূর্য ও নক্ষত্রের দূরত্ব মাপেন, স্ত্রী তখন কী করেন?
(ক) বালিশের ওয়াড়ে ফুল তোলেন (খ) বালিশের ওয়াড়ে সেলাই করেন
(গ) বালিশের ওয়াড়ের দৈর্ঘ্য-প্রস্থ মাপেন (ঘ) বালিশের ওয়াড় পরিষ্কার করেন
উত্তর: (গ) বালিশের ওয়াড়ের দৈর্ঘ্য-প্রস্থ মাপেন

৬৬। গৃহিণীর কোথায় না যাওয়া ভালো বলে 'অর্ধাঙ্গী' প্রবন্ধে উল্লেখ করা হয়েছে?
(ক) সৌরজগতে (খ) আকাশে
(গ) সূর্যমণ্ডলে (ঘ) নক্ষত্রালয়
উত্তর: (গ) সূর্যমণ্ডলে

৬৭। নারীকে রান্নাঘরে সীমাবদ্ধ রাখলে কী ক্ষতি হবে?
(ক) বুদ্ধি ও মেধা সীমাবদ্ধ হয়ে যাবে
(খ) কেবল রান্নাতেই দক্ষ হবে
(গ) নারীর বুদ্ধিবৃত্তিকে সেবা থেকে সমাজ ও জাতি বঞ্চিত হবে

        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {

                card.innerHTML = `

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `

                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
</body>

</html>
