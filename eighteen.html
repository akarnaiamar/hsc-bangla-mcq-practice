<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">জীবনানন্দ দাশের 'সুচেতনা' পদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। 'মানুষ তবু ঋণী পৃথিবীরই কাছে' উক্তিটিতে প্রকাশ পেয়েছে—
(ক) ইহলৌকিকতা (খ) ভাবালুতা (গ) সাম্যবাদী (ঘ) পরাবাস্তববাদী চেতনা
উত্তর: (ক) ইহলৌকিকতা

উদ্দীপকের আলোকে ২ ও ৩ নং প্রশ্নের উত্তর দাও:
তবে পাল খোলো, তবে নোঙর তোলো;
এবার অনেক পথ শেষে সন্ধানী!
হেরার তোরণ মিলবে সম্মুখে জানি। (সাত সাগরের মাঝি)

২। উদ্দীপক ও কবিতার মধ্যে প্রতিফলিত হয়েছে—
(ক) অতীতের মোহমুগ্ধতা (খ) দেশপ্রেমের চেতনা (গ) সংকট উত্তরণের প্রত্যাশা (ঘ) সমকাল নিয়ে হতাশা
উত্তর: (গ) সংকট উত্তরণের প্রত্যাশা

৩। 'হেরার তোরণ মিলবে সম্মুখে জানি'— উক্তির সাথে 'সুচেতনা' কবিতার কোন চরণের সাদৃশ্য লক্ষ্য করা যায়?
(ক) এই পৃথিবীর রণ রক্ত সফলতা সত্য (খ) মানুষ তবু ঋণী পৃথিবীরই কাছে 
(গ) সে অনেক শতাব্দীর মনীষীর কাজ (ঘ) শাশ্বত রাত্রির বুকে সকলি অনন্ত সূর্যোদয়
উত্তর: (ঘ) শাশ্বত রাত্রির বুকে সকলি অনন্ত সূর্যোদয়

৪। 'পৃথিবীর গভীর গভীরতর অসুখ এখন'— উক্তিটিতে প্রকাশ পেয়েছে—
(ক) ভাবালুতা (খ) মর্ত্যচেতনা (গ) ইহলৌকিকতা (ঘ) সমকাল নিয়ে হতাশা
উত্তর: (ঘ) সমকাল নিয়ে হতাশা

৫। জীবনানন্দ দাশের কবি চেতনায় 'সুচেতনা' হলো—
i. এক চেতনানিহিত আরাধ্য নারী-সত্তা
ii. এক শুভচেতনা
iii. জীবমুক্তি এক চেতনা যা পৃথিবীর মানুষকে জীবনময় করে রাখে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii (গ) ii ও iii (ঘ) i ও iii
উত্তর: (গ) ii ও iii

৬। জীবনানন্দ দাশ কত সালে জন্মগ্রহণ করেন?
(ক) ১৮৯৭ (খ) ১৮৯৮ (গ) ১৮৯৯ (ঘ) ১৯০০
উত্তর: (গ) ১৮৯৯

৭। জীবনানন্দ দাশ কার কাছে কবিতা লেখার অনুপ্রেরণা লাভ করেন?
(ক) মায়ের কাছে (খ) বাবার কাছে (গ) ভাইয়ের কাছে (ঘ) দাদার কাছে
উত্তর: (ক) মায়ের কাছে

৮। জীবনানন্দ দাশ তাঁর কবিতায় কেমন জগৎ নির্মাণ করেন?
(ক) সূক্ষ্ম ও গভীর অনুভবের জগৎ (খ) বেদনা ও হতাশার জগৎ (গ) উচ্চাশা ও উদ্যমের জগৎ (ঘ) জাঁকজমকপূর্ণ মানবিক জগৎ
উত্তর: (ক) সূক্ষ্ম ও গভীর অনুভবের জগৎ

৯। নিসর্গের সঙ্গে কী যুক্ত হয়ে জীবনানন্দের হাতে অনন্য সাধারণ কবিতা শিল্প রচিত হয়েছে?
(ক) অনুভব ও বোধ (খ) প্রজ্ঞা ও বিবেক (গ) বিচক্ষণতা ও জ্ঞান (ঘ) সুশিক্ষা ও মনন
উত্তর: (ক) অনুভব ও বোধ

১০। কোন দিক দিয়ে জীবনানন্দ দাশের কবিতা তুলনা রহিত?
(ক) যন্ত্রাশ্রিত নাগরিক জীবন অঙ্কনের দিক থেকে (খ) গ্রামবাংলার নিসর্গের ছবি অঙ্কনের দিক থেকে (গ) দ্রোহ ও জাগরণী চেতনার দিক থেকে (ঘ) সৌহার্দ্য ও সম্প্রীতি প্রকাশের দিক থেকে
উত্তর: (খ) গ্রামবাংলার নিসর্গের ছবি অঙ্কনের দিক থেকে

১১। জীবনানন্দের কবিতাকে রবীন্দ্রনাথের 'চিত্ররূপময়' বলার কারণ কী?
(ক) অসাধারণ চিত্রকল্প (খ) অসাধারণ কাব্য বৈশিষ্ট্য (গ) অসাধারণ অলংকার (ঘ) অসাধারণ কবিভাষা
উত্তর: (খ) অসাধারণ কাব্য বৈশিষ্ট্য

১২। বুদ্ধদেব বসু জীবনানন্দ দাশকে কী বলে আখ্যা দিয়েছেন?
(ক) শুদ্ধতম কবি (খ) তিমির হননের কবি (গ) রূপসী বাংলার কবি (ঘ) নির্জনতম কবি
উত্তর: (ঘ) নির্জনতম কবি

১৩। নিচের কোন কবির নিসর্গ বিষয়ক কবিতা ১৯৭১ সালের মুক্তিযুদ্ধে বাংলাদেশের সংগ্রামী জনতাকে তীব্রভাবে অনুপ্রাণিত করেছিল?
(ক) জীবনানন্দ দাশ (খ) শরৎচন্দ্র চট্টোপাধ্যায় (গ) জসীমউদ্দীন (ঘ) আহসান হাবীব
উত্তর: (ক) জীবনানন্দ দাশ

১৪। জীবনানন্দ দাশের লেখা উপন্যাসের সংখ্যা কতটি?
(ক) ২ টি (খ) ৩ টি (গ) ৪ টি (ঘ) ৬ টি
উত্তর: (ক) ২ টি (দ্রষ্টব্য: মূল বই অনুযায়ী জীবনানন্দ দাশের প্রকাশিত উপন্যাসের সংখ্যা ২১টি, তবে ছবিতে উত্তর হিসেবে ২১ লেখা থাকলেও বিকল্পে নেই। সম্ভবত এটি মুদ্রণ ত্রুটি বা নির্দিষ্ট কোনো তথ্যের ভিত্তিতে দেওয়া।)

১৫। 'সুচেতনা' শব্দটি কবি কী অর্থে ব্যবহার করেছেন?
(ক) সুন্দর চেতনা (খ) শুভ চেতনা (গ) নারী সংশোধনে (ঘ) প্রেমিকার সংশোধনে
উত্তর: (খ) শুভ চেতনা

১৬। জীবনানন্দ দাশ সুচেতনাকে দূরতর দ্বীপ রূপে কল্পনা করেছেন কেন?
(ক) সাধারণের অগম্য বলে (খ) রহস্যময়তা প্রকাশের জন্য (গ) কবির নাবিকসুলভ মানসিকতার কারণে (ঘ) সুচেতনা সকলের মাঝে বিরাজমান নয় বলে
উত্তর: (ঘ) সুচেতনা সকলের মাঝে বিরাজমান নয় বলে

১৭। 'সুচেতনা' কবিতায় দূরতর দ্বীপটি কোথায় অবস্থিত?
(ক) সকালের নক্ষত্রের কাছে (খ) বিকেলের নক্ষত্রের কাছে (গ) সন্ধ্যার নক্ষত্রের কাছে (ঘ) রাতের নক্ষত্রের কাছে
উত্তর: (খ) বিকেলের নক্ষত্রের কাছে

১৮। দারুচিনি-বনানীর ফাঁকে কী আছে?
(ক) নির্জনতা (খ) পাখির কলতান (গ) সুরমা প্রাসাদ (ঘ) সুচেতনা
উত্তর: (ক) নির্জনতা

১৯। কোনটি পৃথিবীর শেষ সত্য নয়?
(ক) রণ রক্ত বিফলতা (খ) রণ রক্ত সফলতা (গ) অসুখ ও ক্রমমুক্তি (ঘ) রাত্রি ও সূর্যোদয়
উত্তর: (খ) রণ রক্ত সফলতা

২০। এই পৃথিবীর রণ রক্ত সফলতাকে কবি শেষ সত্য বলে স্বীকার করেন না কেন?
(ক) পৃথিবীর গভীরতর অসুখ বলে (খ) কবি আশাবাদী হতে পারছেন না বলে (গ) পৃথিবীর ক্রমমুক্তিতে আশাবাদী বলে (ঘ) কবি সত্যদ্রষ্টা বলে
উত্তর: (গ) পৃথিবীর ক্রমমুক্তিতে আশাবাদী বলে

২১। 'রণ রক্ত সফলতা' বলতে কী বোঝানো হয়েছে?
(ক) যুদ্ধ-বিগ্রহ (খ) সীমাহীন রক্তপাত (গ) সভ্যতার দ্বন্দ্ব (ঘ) সভ্যতার বিকাশের যুদ্ধ ও রক্তপাত
উত্তর: (ঘ) সভ্যতার বিকাশের যুদ্ধ ও রক্তপাত

২২। জীবনানন্দ দাশ দারুচিনি-বনানীর ফাঁকে নির্জনতার কথা বলেছেন কেন?
(ক) কবি নিসর্গপ্রেমিক বলে (খ) দারুচিনি বনানীর নীরবতা বোঝাতে (গ) সুচেতনা নাগরিক সভ্যতার দুর্লভ বলে (ঘ) জনসমাজে নির্জনতা নেই বলে
উত্তর: (গ) সুচেতনা নাগরিক সভ্যতার দুর্লভ বলে

২৩। 'সুচেতনা' কবিতায় কবিপ্রাণ রূঢ় রৌদ্রে ঘুরেছে কেন?
(ক) জীবিকা সংগ্রহের তাগিদে (খ) সংগ্রামী চেতনায় উজ্জীবিত হয়ে (গ) মানুষকে মানুষের মতো ভালোবাসতে (ঘ) মানুষকে শ্রেণিসচেতন করে তুলতে
উত্তর: (গ) মানুষকে মানুষের মতো ভালোবাসতে

২৪। 'সুচেতনা' কবিতায় কোনটিকে অনেক শতাব্দীর মনীষীর কাজ বলা হয়েছে?
(ক) পৃথিবীর গভীরতর অসুখ (খ) সমুজ্জ্বল ভোর (গ) রণরক্ত সফলতা (ঘ) পৃথিবীর ক্রমমুক্তি
উত্তর: (ঘ) পৃথিবীর ক্রমমুক্তি

২৫। 'সুচেতনা' কবিতায় কোন পথে আলো জ্বেলে পৃথিবীর ক্রমমুক্তি হবে?
(ক) সৌহার্দের পথে (খ) সুচেতনার পথে (গ) সম্প্রীতির পথে (ঘ) সাম্যবাদের পথে
উত্তর: (খ) সুচেতনার পথে

২৬। 'সুচেতনা' কবিতায় কবি যে বাতাসের উল্লেখ করেছেন তা কেমন?
(ক) প্রবল উষ্ণ (খ) অতীব শীতল (গ) পরম সূর্যকরোজ্জ্বল (ঘ) চরম খ্যাপাটে
উত্তর: (গ) পরম সূর্যকরোজ্জ্বল

২৭। ক্লান্ত ক্লান্তিহীন নাবিকের হাতে কবি কী গড়ে দিতে চান?
(ক) অন্তিম প্রভাত (খ) সুরম্য জাহাজ (গ) মানবিক সভ্যতা (ঘ) ভালো মানবসমাজ
উত্তর: (ঘ) ভালো মানবসমাজ

২৮। কবি কোন সময়ে ভালো মানবসমাজ গড়ার প্রত্যয় ব্যক্ত করেন?
(ক) আগামী শতকে (খ) অন্তিম প্রভাতে (গ) অন্তিম সন্ধ্যায় (ঘ) আগামী দিনে
উত্তর: (খ) অন্তিম প্রভাতে

২৯। মাটি ও পৃথিবীর টানে মানবজন্মের ঘরে এসে কবি কী অনুভব করেছেন?
(ক) এসে ভালোই হলো (খ) এসে খারাপ হলো (গ) না এলেই ভালো হতো (ঘ) না এলেই খারাপ হতো
উত্তর: (গ) না এলেই ভালো হতো

৩০। 'শিশির শরীর ছুঁয়ে সমুজ্জ্বল ভোরে'— চরণটিতে কোন অনুভূতি প্রকাশ পেয়েছে?
(ক) শিশিরের প্রতি কবির মুগ্ধতা (খ) ভোরের প্রতি কবির মুগ্ধতা (গ) প্রকৃতির মাঝে মুক্তির স্বাদ লাভ (ঘ) শিশিরের মাঝে মিশে যাওয়ার আকুলতা
উত্তর: (গ) প্রকৃতির মাঝে মুক্তির স্বাদ লাভ

৩১। 'সুচেতনা, তুমি এক দূরতর দ্বীপ/বিকেলের নক্ষত্রের কাছে' চরণদ্বয়ে প্রকাশ পেয়েছে—
i. কবির স্থান ও সময় চেতনা
ii. সুচেতনা সর্বত্র বিরাজমান নয়
iii. নিসর্গের সঙ্গে মানবিক বোধের সম্পর্ক
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৩২। কবি মনে করেন, মানুষের শুভচেতনা—
i. দ্বীপের মতো বিচ্ছিন্ন
ii. সর্বত্র বিস্তারিত নয়
iii. সর্বত্র বিরাজমান
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩৩। 'এই পৃথিবীর রণ রক্ত সফলতা সত্য; তবু শেষ সত্য নয়।' কবিতার এই চরণটিতে প্রকাশ পেয়েছে—
i. মানুষের ব্যর্থতা ও সফলতা নিয়ে পরম আশাবাদ
ii. মানুষের ব্যর্থতা ও সফলতার দ্বন্দ্ব অতীতে ছিল, এখনো আছে
iii. মানুষের ব্যর্থতা ও সফলতার দ্বন্দ্ব অতীতে ছিল, ভবিষ্যতেও থাকবে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩৪। 'দেখেছি আমারি হাতে হয়তো নিহত/ ভাই বোন বন্ধু পরিজন পড়ে আছে' চরণটিতে প্রকাশ পেয়েছে—
i. নব পৃথিবীর উদ্বোধনে মানুষের ত্যাগ
ii. জাতিতে জাতিতে বিরাজমান বৈরিতা
iii. ভালোবাসা ও হিংসা-দ্বেষের সহাবস্থান
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৩৫। 'পৃথিবীর গভীর গভীরতর অসুখ এখন' চরণটিতে প্রকাশ পেয়েছে—
i. মানুষের সভ্যতার ক্ষয়িষ্ণু প্রবণতা
ii. মানুষের বিপন্ন বর্তমান
(ছবিতে নিচের অংশটি কাটা পড়েছে, তবে i ও ii দুটিই সঠিক হওয়ার কথা।)

৩৫। (পূর্বের পাতার ধারাবাহিকতায়)
iii. স্থিতিশীল বর্তমান ও উদ্দেশ্যহীন ভবিষ্যৎ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩৬। 'মানুষ তবু ঋণী পৃথিবীরই কাছে' চরণে ফুটে উঠেছে—
i. পৃথিবীর শুভ চেতনা থেকে প্রাপ্তি কম নয়
ii. পৃথিবী সকলের জন্য সমান সুযোগ রেখেছে
iii. পৃথিবীব্যাপী অন্ধকারের অন্তরালেই আছে সূর্যোদয়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩৭। 'না এলেই ভালো হতো অনুভব ক'রে'— কবির এমন অনুভবের কারণ—
i. পৃথিবীর চারদিকে সংকট
ii. পৃথিবীব্যাপী অন্ধকার
iii. অশুভ শক্তির তৎপরতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩৮। 'সুচেতনা' কবিতায় মানবরূপে জন্ম নেওয়াকে জীবনানন্দ দাশের কাছে আপাতভাবে কাঙ্ক্ষিত মনে হয়েছে—
i. পেশাগত সংকট প্রত্যক্ষ করে
ii. ব্যক্তির সংকট প্রত্যক্ষ করে
iii. সামষ্টিক সংকট প্রত্যক্ষ করে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৩৯। পৃথিবী ও শুভচেতনা থেকে প্রাপ্তিই শেষ পর্যন্ত আমাদের—
i. প্রাণিত করে
ii. স্বাবলম্বী করে
iii. ঋণী করে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৪০। সুচেতনার ইতিবাচক আলো প্রজ্বলনের মাধ্যমে সকল বিপর্যয় থেকে—
i. পৃথিবী মুক্তি পাবে
ii. মানুষের মুক্তি ঘটবে
iii. মুক্তির দিশা মিলবে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪১। কবি জীবনানন্দ দাশের বিশ্বাস— পৃথিবীব্যাপী অন্ধকার ও অশুভের অন্তরালেই আছে—
i. নির্জনতা
ii. মুক্তির পথ
iii. আলোকোজ্জ্বল পৃথিবী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ৪২ ও ৪৩ নং প্রশ্নের উত্তর দাও:
আজ যে শিশু পৃথিবীর আলোয় এসেছে
আমরা তার তরে একটি সাজানো বাগান চাই।

৪২। উদ্দীপকে উল্লিখিত সাজানো বাগান 'সুচেতনা' কবিতার কোন প্রসঙ্গের প্রতিনিধি?
(ক) সুচেতনা (খ) ভালো মানবসমাজ (গ) দারুচিনি-বন (ঘ) দূরতর দ্বীপ
উত্তর: (খ) ভালো মানবসমাজ

৪৩। উদ্দীপক ও 'সুচেতনা' কবিতার মাঝে মিল—
i. সুন্দর পৃথিবী গড়ার প্রত্যয়ে
ii. মানবজন্মকে আপাতভাবে অনাকাঙ্ক্ষিত অনুভবে
iii. প্রবল আশাবাদ প্রকাশে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ৪৪ ও ৪৫ নং প্রশ্নের উত্তর দাও:
"যত ক্লান্তি, যত ব্যথা যাক না সব দূরে
আজ শিশির ভেজা ভোরে।"

৪৪। উদ্দীপকের বিষয়বস্তু পাঠ্যবইয়ের কোন কবিতার সঙ্গে সাদৃশ্যপূর্ণ?
(ক) সোনার তরী (খ) সুচেতনা (গ) পদ্মা (ঘ) বিদ্রোহী
উত্তর: (খ) সুচেতনা

৪৫। উদ্দীপক ও কবিতা উভয় ক্ষেত্রে প্রকাশ পেয়েছে—
i. নৈরাশ্য ও আশার টানাপোড়েন
ii. প্রকৃতির মাঝে মুক্তির আস্বাদ
iii. প্রকৃতি ও মানবমনের সম্পর্ক
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ৪৬ ও ৪৭ নং প্রশ্নের উত্তর দাও:
আজ অশান্ত দিন
বেঁচে থাকা-আশা ক্ষীণ
তবু পথ চাওয়া অবিরাম।

৪৬। উদ্দীপকটি কোন চেতনার দিক থেকে 'সুচেতনা' কবিতার সঙ্গে সাদৃশ্যপূর্ণ?
(ক) নৈরাশ্য চেতনার (খ) আশাবাদী চেতনার (গ) ভাববাদী চেতনার (ঘ) সাম্যবাদী চেতনার
উত্তর: (খ) আশাবাদী চেতনার

৪৭। 'সুচেতনা' কবিতার যে চরণে উক্ত চেতনার প্রকাশ ঘটেছে তা হলো—
i. শাশ্বত রাত্রির বুকে সকলি অনন্ত সূর্যোদয়
ii. মানুষ তবু ঋণী পৃথিবীরই কাছে
iii. এ পথেই পৃথিবীর ক্রমমুক্তি হবে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii (দ্রষ্টব্য: ছবিতে উত্তর হিসেবে শুধু 'খ' চিহ্নিত করা আছে)

উদ্দীপকের আলোকে ৪৮ ও ৪৯ নং প্রশ্নের উত্তর দাও:
প্রীতি ও প্রেমের পুণ্য বাঁধনে যবে মিলি পরস্পরে,
স্বর্গ আসিয়া দাঁড়ায় তখন আমাদেরই কুঁড়েঘরে। — শেখ ফজলল করিম

৪৮। উদ্দীপকের সাথে 'সুচেতনা' কবিতার মিল রয়েছে—
i. চেতনায়
ii. আত্মত্যাগে
iii. বিশ্বাসে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৪৯। উপর্যুক্ত মিলের যথার্থতা পরিলক্ষিত হয় নিচের কোন চরণে?
(ক) পৃথিবীর গভীর গভীরতর অসুখ এখন (খ) সুচেতনা, তুমি এক দূরতর দ্বীপ (গ) এ-পথেই পৃথিবীর ক্রমমুক্তি হবে (ঘ) এই পৃথিবীর রণ রক্ত সফলতা সত্য
উত্তর: (গ) এ-পথেই পৃথিবীর ক্রমমুক্তি হবে

উদ্দীপকের আলোকে ৫০ ও ৫১ নং প্রশ্নের উত্তর দাও:
বর্তমানে পৃথিবীতে হিংসা-বিদ্বেষ লেগেই রয়েছে। যার ফলস্বরূপ সাধারণ মানুষের মৃত্যু ঘটছে। আজ এই বিদ্বেষ দূর করার একমাত্র মাধ্যম ভালোবাসা।

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

            loadProgress();
            const container = document.getElementById('quiz-container');

            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls

            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন

            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            const filteredData = wrongQuestionsOnly
                ? data.map((q, i) => ({ ...q, originalIndex: i }))
                    .filter((q, i) => userAnswers[i] && userAnswers[i] !== q.answer)
                : data.map((q, i) => ({ ...q, originalIndex: i }));

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
        };
    </script>
</body>

</html>
