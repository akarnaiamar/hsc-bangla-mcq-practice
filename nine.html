<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">মোতাহের হোসেন চৌধুরীর 'জীবন ও বৃক্ষ' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১. মোতাহের হোসেন চৌধুরী কত সালে জন্মগ্রহণ করেছেন?
(ক) ১৯০১ (খ) ১৯০২
(গ) ১৯০৩ (ঘ) ১৯০৪
উত্তর: (গ) ১৯০৩

২. 'জীবন ও বৃক্ষ' প্রবন্ধে জীবনের মানে কী?
(ক) গুণ (খ) বৃদ্ধি
(গ) প্রাপ্তি (ঘ) অর্জন
উত্তর: (খ) বৃদ্ধি

৩. স্বল্পপ্রাণ, স্থূলবুদ্ধি ও জবরদস্তিপ্রিয় মানুষে কোনটি পরিপূর্ণ?
(ক) জগৎ (খ) সমাজ
(গ) সংসার (ঘ) দেশ
উত্তর: (গ) সংসার

৪. কার সার্থকতা ছবি তত সহজে উপলব্ধি করা যায় না?
(ক) ফুলের (খ) ফলের
(গ) বৃক্ষের (ঘ) নদীর
উত্তর: (ঘ) নদীর

৫. গোপন ও নীরব সাধনা কার মধ্যে অভিব্যক্ত?
(ক) বৃক্ষে (খ) নদীতে
(গ) মানুষে (ঘ) ফুলে
উত্তর: (ক) বৃক্ষে

৬. 'আত্মিক' শব্দের অর্থ কী?
(ক) সুপরিণতজাত (খ) মনোজাগতিক
(গ) বিনয় (ঘ) সংবেদনশীলতা
উত্তর: (খ) মনোজাগতিক

৭. 'জীবন ও বৃক্ষ' প্রবন্ধের উৎস কী?
(ক) সংস্কৃতির কথা (খ) সভ্যতা
(গ) সংস্কৃতি কথা (ঘ) সুখ
উত্তর: (গ) সংস্কৃতি কথা

৮. মানুষকে কী সৃষ্টি করে নিতে হয়?
(ক) আত্মা (খ) মন
(গ) স্বপ্ন (ঘ) বাস্তবতা
উত্তর: (ক) আত্মা

৯. সুখ-দুঃখ-বেদনা উপলব্ধির ফলে অন্তরের কী হয়?
(ক) উদাসীনতা (খ) পরিপক্কতা
(গ) নির্লিপ্ততা (ঘ) সংকীর্ণতা
উত্তর: (খ) পরিপক্কতা

১০. রবীন্দ্রনাথের মতে মনুষ্যত্বের বেদনা উপলব্ধ হয়—
(ক) প্রকৃতিতে (খ) বৃক্ষে
(গ) নদীর গতিতে (ঘ) বাতাসের গতিতে
উত্তর: (গ) নদীর গতিতে

১১. কার কাজ কেবল টিকে থাকার সুবিধা দেওয়া নয়?
(ক) ব্যক্তির (খ) পরিবারের
(গ) গোষ্ঠীর (ঘ) সমাজের
উত্তর: (ঘ) সমাজের

১২. মোতাহের হোসেন কোন ধরনের গদ্য রচয়িতা হিসেবে খ্যাত?
(ক) মননশীল (খ) রম্যরচয়িতা
(গ) বিজ্ঞানভিত্তিক (ঘ) ইসলামি
উত্তর: (ক) মননশীল

১৩. বড় মানুষের কাছে জীবনাদর্শের প্রতীক কী?
(ক) মানবিকতা (খ) বিজ্ঞানমনস্কতা
(গ) সজীব বৃক্ষ (ঘ) প্রবহমান নদী
উত্তর: (গ) সজীব বৃক্ষ

১৪. নীরব ভাষায় বৃক্ষ আমাদের কীসের গান শোনায়?
(ক) সাম্যের (খ) শান্তির
(গ) সার্থকতার (ঘ) প্রীতির
উত্তর: (গ) সার্থকতার

১৫. রবীন্দ্রনাথ ঠাকুরকে লেখক কী বলেছেন?
(ক) প্রকৃতিপ্রেমী (খ) বৃক্ষপ্রেমী
(গ) দার্শনিক (ঘ) ঋষি
উত্তর: (খ) বৃক্ষপ্রেমী (তপোবনপ্রেমিক)

১৬. মোতাহের হোসেন বিশেষভাবে স্মরণীয় কোন আন্দোলনের জন্য?
(ক) বুদ্ধির মুক্তি আন্দোলন (খ) স্বদেশি আন্দোলন
(গ) ব্রিটিশ বিরোধী আন্দোলন (ঘ) ফরায়েজী আন্দোলন
উত্তর: (ক) বুদ্ধির মুক্তি আন্দোলন

১৭. 'বুদ্ধির মুক্তি আন্দোলন' কীসের প্রতিনিধিত্ব করে?
(ক) বাঙালি ইংরেজি শিক্ষার অগ্রগতি
(খ) বাঙালি ধর্মীয় শিক্ষার অগ্রগতি
(গ) বাঙালি হিন্দু সমাজের অগ্রগতি
(ঘ) বাঙালি মুসলমান সমাজের অগ্রগতি
উত্তর: (ঘ) বাঙালি মুসলমান সমাজের অগ্রগতি

১৮. Conquest of Happiness গ্রন্থের রচয়িতা কে?
(ক) বার্ট্রান্ড রাসেল (খ) জিওফ্রে চসার
(গ) ডগলাস অ্যাডামস (ঘ) উইলিয়াম মরিস
উত্তর: (ক) বার্ট্রান্ড রাসেল

১৯. মোতাহের হোসেন চৌধুরী কর্তৃক ক্লাইভ বেলের 'Civilization' গ্রন্থ অবলম্বনে রচিত গ্রন্থের নাম কী?
(ক) সভ্যতা (খ) সুখ
(গ) বনি আদম (ঘ) নেকড়ে অরণ্য
উত্তর: (ক) সভ্যতা

২০. "সমাজের কাজ কেবল টিকে থাকার সুবিধা দেয়া নয়, মানুষকে বড় করে তোলা।" এখানে বড় করে তোলা বলতে কী বোঝানো হয়েছে?
(ক) মানসিক বৃদ্ধি (খ) ত্যাগ
(গ) ঘনিষ্ঠতা (ঘ) আত্মমগ্নতা
উত্তর: (ক) মানসিক বৃদ্ধি

২১. 'জীবন ও বৃক্ষ' প্রবন্ধের বক্তব্য অনুযায়ী যারা প্রেম ও সৌন্দর্যের স্পর্শ লাভ করেনি তাদের একমাত্র দেবতা কে?
(ক) নিষ্ঠুরতা (খ) অহংকার
(গ) স্থূলবুদ্ধি (ঘ) বিকৃতি
উত্তর: (খ) অহংকার

২২. 'জীবন ও বৃক্ষ' অনুযায়ী স্বল্পপ্রাণ, স্থূলবুদ্ধি ও জবরদস্তিপ্রিয় মানুষেরা স্পর্শ লাভ করেনি?
(ক) যথার্থ চিন্তায় (খ) মানবিকতায়
(গ) গভীরতার (ঘ) প্রেম ও সৌন্দর্যের
উত্তর: (ঘ) প্রেম ও সৌন্দর্যের

২৩. "প্রকৃতির যে ধর্ম, মানুষের সে ধর্ম"— উক্তিটি দ্বারা কী বোঝানো হয়েছে?
(ক) পরোপকারিতা (খ) সংবেদনশীলতা
(গ) উদারতা (ঘ) বৃদ্ধির ধর্ম
উত্তর: (ঘ) বৃদ্ধির ধর্ম

২৪. বৃক্ষ যে কেবল বৃদ্ধির ইশারা তা নয়—
(ক) জীবনেরও বৃদ্ধি (খ) প্রশান্তিরও ইঙ্গিত
(গ) ফলবানেরও ইঙ্গিত (ঘ) অর্থনীতিরও উৎস
উত্তর: (খ) প্রশান্তিরও ইঙ্গিত

২৫. অন্যের সার্থকতার পথে অন্তরায় সৃষ্টি করা কার কাজ?
(ক) দস্যুপ্রবৃত্তির মানুষের (খ) দাঙ্গাবাজ মানুষের
(গ) জবরদস্তিপ্রিয় মানুষের (ঘ) আগ্রাসী চরিত্রের মানুষের
উত্তর: (গ) জবরদস্তিপ্রিয় মানুষের

২৬. অনুভূতির চক্ষুকে বড় করে তুললে কী সহজে উপলব্ধি করা যায়?
(ক) ফুল ফোটার দৃশ্য (খ) ফুল ফোটার বেদনা
(গ) বৃক্ষের বেদনা (ঘ) জীবনের বিকাশ
উত্তর: (গ) বৃক্ষের বেদনা

২৭. 'বৃক্ষের পানে তাকিয়ে আমরা লাভবান হতে পারি'— কীভাবে?
(ক) বৃক্ষকে অনুসরণ ও অনুকরণ করে (খ) বৃক্ষের মতো পরোপকারী হয়ে
(গ) প্রতিদিন বৃক্ষের বৃদ্ধি দেখে (ঘ) বৃক্ষের ফুল-ফল ভোগ করে
উত্তর: (ক) বৃক্ষকে অনুসরণ ও অনুকরণ করে

২৮. কী মানুষের সাধনা হওয়া উচিত নয়?
(ক) অনবরত ধেয়ে চলা (খ) শুধু নিজে বাঁচা
(গ) আদর্শহীন বেঁচে থাকা (ঘ) শ্রীহীন জীবনের বিকাশ
উত্তর: (ক) অনবরত ধেয়ে চলা

২৯. দোরের কাছে দাঁড়িয়ে বৃক্ষ কীসের বাণী প্রচার করে?
(ক) নীতি, শান্তি ও সেবার (খ) সাম্য, মৈত্রী ও স্বাধীনতার
(গ) একতা, শৃঙ্খলা ও সাধনার (ঘ) সাধনা, ত্যাগ ও পরিপূর্ণতার
উত্তর: (ক) নীতি, শান্তি ও সেবার

৩০. নদীর সাগরে পতিত হওয়ায় প্রাপ্তি স্পষ্ট হয়ে ওঠে না কেন?
(ক) প্রত্যহ দেখা যায় না বলে (খ) গোপন ও নীরব সাধনা অভিব্যক্ত নয় বলে
(গ) নদীর সেটি আত্মবিসর্জন বলে (ঘ) নদীর মতো ধেয়ে চলা মানুষের সাধনা হওয়া উচিত নয় বলে
উত্তর: (গ) নদীর সেটি আত্মবিসর্জন বলে

৩১. সৃজনশীল মানুষের কীসে পার্থক্য দেখা যায় না?
(ক) প্রাপ্তি ও দানে (খ) চিন্তায় ও কর্মে
(গ) প্রাপ্তি ও অপ্রাপ্তিতে (ঘ) নিজ ও পর ভেদে আচরণে
উত্তর: (ক) প্রাপ্তি ও দানে

৩২. বারবার বৃক্ষের দিকে তাকানো প্রয়োজন কেন?
(ক) আত্মার পরিপক্কতার জন্যে (খ) জীবনে প্রেরণা লাভের জন্যে
(গ) সার্থকতা অর্জনের জন্যে (ঘ) জীবনের তাৎপর্য উপলব্ধির জন্যে
উত্তর: (ঘ) জীবনের তাৎপর্য উপলব্ধির জন্যে

৩৩. বৃক্ষের পানে তাকিয়ে রবীন্দ্রনাথ কী উপলব্ধি করেছেন?
(ক) বিকাশ (খ) অন্তরের সৃষ্টিধর্ম
(গ) মনুষ্যত্বের বেদনা (ঘ) ফললাভের বেদনা
উত্তর: (খ) অন্তরের সৃষ্টিধর্ম

৩৪. 'অনুভূতির চক্ষু'— 'জীবন ও বৃক্ষ' প্রবন্ধে যে অর্থ প্রকাশ করে—
(ক) বিবেকবান (খ) গভীর চিন্তা
(গ) সূক্ষ্ম বিচার-বিবেচনা (ঘ) উপলব্ধির ক্ষমতা
উত্তর: (ঘ) উপলব্ধির ক্ষমতা

৩৫. বৃক্ষের ইতিহাস কোন পর্যন্ত বিস্তৃত?
(ক) মৃত্যু পর্যন্ত (খ) অঙ্কুরিত হওয়া
(গ) ফলবান হওয়া (ঘ) বৃদ্ধ হওয়া
উত্তর: (গ) ফলবান হওয়া

৩৬. আত্মাকে মধুর ও পুষ্ট করে গড়ে তুলতে হবে কেন?
(ক) দ্রষ্টার উপভোগের উপযুক্ত হতে (খ) সৃষ্টির শ্রেষ্ঠ জীব হতে
(গ) মানবিক বিকাশ পূর্ণ করতে (ঘ) মনুষ্যত্বের বেদনা উপলব্ধি করতে
উত্তর: (ক) দ্রষ্টার উপভোগের উপযুক্ত হতে

৩৭. Ripeness is all কথাটি কে বলেছেন?
(ক) শেলি (খ) হোমার
(গ) ডিলওয়ার (ঘ) মহাকবি শেক্সপিয়ার
উত্তর: (ঘ) মহাকবি শেক্সপিয়ার

৩৮. 'জীবন ও বৃক্ষ' প্রবন্ধে স্রষ্টার উপভোগ্য কী?
(ক) মানবপ্রেম (খ) প্রেম ও সৌন্দর্য
(গ) সৃজনশীল ব্যক্তি (ঘ) আত্মারূপ ফল
উত্তর: (ঘ) আত্মারূপ ফল

৩৯. কী কখনো শিক্ষার প্রধান বিষয়বস্তু হতে পারে না?
(ক) কলা (খ) বিজ্ঞান
(গ) চিত্রকলা (ঘ) সংগীত
উত্তর: (খ) বিজ্ঞান

৪০. কী দ্বারা জীবনবোধ ও মূল্যবোধে অন্তর পরিপূর্ণ হয়?
(ক) আত্মজিজ্ঞাসায় (খ) ধর্মচর্চায়
(গ) সংগীতচর্চায় (ঘ) সাহিত্য-শিল্পকলায়
উত্তর: (ঘ) সাহিত্য-শিল্পকলায়

৪১. মানুষের মর্যাদা কোনটিতে নিহিত?
(ক) ধন বৃদ্ধিতে (খ) আত্মার পুষ্টি সাধনে
(গ) দৈহিক বৃদ্ধিতে (ঘ) নীরব ভাষায়
উত্তর: (খ) আত্মার পুষ্টি সাধনে

৪২. মোতাহের হোসেন চৌধুরী বৃক্ষের জীবনের কোন দুটি জিনিস উপলব্ধি করার পক্ষপাতী?
(ক) সার্থকতা ও সজীবতা (খ) গতি ও বিকাশ
(গ) গতি ও প্রকৃতি (ঘ) ধৈর্য ও নীরবতা
উত্তর: (খ) গতি ও বিকাশ

৪৩. 'জীবন ও বৃক্ষ' প্রবন্ধ অনুযায়ী মানুষের মর্যাদা কীসে?
(ক) পরোপকারে (খ) আত্মবৃদ্ধির ক্ষমতায়
(গ) আত্মা তৈরির সক্ষমতায় (ঘ) আত্মোপলব্ধির ক্ষমতায়
উত্তর: (খ) আত্মবৃদ্ধির ক্ষমতায়

নিচের উদ্দীপকটি পড়ে ৪৪ ও ৪৫ নম্বর প্রশ্নের উত্তর দাও:
স্কুল শিক্ষক আবির জ্ঞানচর্চার মাধ্যমে নিজেকে যেমন সমৃদ্ধ করেছেন, তেমনি আলোকিত করেছেন শিক্ষার্থীদের।

৪৪. উদ্দীপকের আবিরের জ্ঞানচর্চার মাধ্যমে নিজেকে সমৃদ্ধ করার সাথে 'জীবন ও বৃক্ষ' প্রবন্ধের কোন বিষয়ের মিল রয়েছে?
(ক) নদীর সাগরে পতিত হওয়া (খ) দৈহিক বিকাশ ঘটানো
(গ) মনুষ্যত্বের বেদনা উপলব্ধি (ঘ) বৃক্ষের ফুলে-ফলে পরিপূর্ণ হওয়া
উত্তর: (ঘ) বৃক্ষের ফুলে-ফলে পরিপূর্ণ হওয়া

৪৫. উদ্দীপকের ভাবের প্রতিফলন ঘটেছে 'জীবন ও বৃক্ষ' প্রবন্ধের কোন ভূমিকায়?
(ক) পরোপকারিতায় (খ) প্রাপ্তি ও দানে
(গ) আত্মনিবেদনে (ঘ) বিকাশ সাধনে
উত্তর: (খ) প্রাপ্তি ও দানে

৪৬. স্রষ্টার উপভোগ্য আত্মারূপ ফল কীভাবে সৃষ্টি হয়?
(ক) অভিজ্ঞতায় (খ) দৈহিক বৃদ্ধির ধারা
(গ) আত্মিক বৃদ্ধির ধারা (ঘ) পরিপক্কতায়
উত্তর: (ঘ) পরিপক্কতায়

৪৭. জীবনে অনুকরণীয় উপযুক্ত মহৎ ও শ্রেষ্ঠ দিকগুলোকে কী বলে?
(ক) মনুষ্যত্ব (খ) সাধনা
(গ) বস্তুজিজ্ঞাসা (ঘ) জীবনাদর্শ
উত্তর: (ঘ) জীবনাদর্শ

৪৮. নদীর গতি কেমন নয়?
(ক) জটিল (খ) সহজ
(গ) সর্পিল (ঘ) সোজা
উত্তর: (খ) সহজ

৪৯. কীসের ব্যাপারে প্রাপ্তি একটা বড় জিনিস?
(ক) বিকাশ (খ) সাধনা
(গ) পরিপূর্ণতা (ঘ) মানবিকতা
উত্তর: (খ) সাধনা

৫০. নদী কোথায় পতিত হয়?
(ক) নদীতে (খ) হ্রদে
(গ) সাগরে (ঘ) মহাসাগরে
উত্তর: (গ) সাগরে

৫১. 'নিশান' শব্দটি কোন ভাষার শব্দজাত?
(ক) বাংলা (খ) হিন্দি
(গ) উর্দু (ঘ) ফারসি
উত্তর: (ঘ) ফারসি

৫২. মুনি-ঋষিরা তপস্যা করেন এমন বন—
(ক) তপোবন (খ) আশ্রম
(গ) সাধনাকেন্দ্র (ঘ) ঋষির আশ্রম
উত্তর: (ক) তপোবন

৫৩. স্বল্পপ্রাণ স্থূলবুদ্ধির লোকজন মাঝে মাঝে কিসের কথা বলে?
(ক) শান্তির (খ) অহংকারের
(গ) মানবপ্রেমের (ঘ) জ্ঞানের
উত্তর: (গ) মানবপ্রেমের

৫৪. উদ্দীপকটি পড়ে ৫৪ ও ৫৫ সংখ্যক প্রশ্নের উত্তর দাও:
তমাল মেধাবী। দেশের স্বনামধন্য মেডিকেল কলেজ থেকে ডাক্তারি পাস করে ফিরে যান নিজ গ্রামে। প্রতিষ্ঠা করেন দাতব্য চিকিৎসালয়। শহরে প্র্যাকটিস করে অনেক টাকা রোজগারের পরিবর্তে নিজ গ্রামের সাধারণ মানুষের সেবাকে তিনি ব্রত হিসেবে গ্রহণ করলেন।

উদ্দীপকের তমালের সাথে 'জীবন ও বৃক্ষ' প্রবন্ধের কার সাদৃশ্য আছে?
(ক) বৃক্ষের (খ) জীবনের
(গ) লেখকের (ঘ) নদীর
উত্তর: (ক) বৃক্ষের

৫৫. উদ্দীপকের ভাবার্থ নিচের কোন বাক্যে প্রকাশ পেয়েছে?
(ক) বৃদ্ধি কেবল দৈহিক নয়, আত্মিকও
(খ) বৃক্ষ যে কেবল বৃদ্ধির ইশারা তা নয়, প্রশান্তিরও ইঙ্গিত
(গ) যা তার প্রাপ্তি তাই তার দান
(ঘ) নীরব ভাষায় বৃক্ষ আমাদের সার্থকতার গান শোনায়
উত্তর: (ক) বৃদ্ধি কেবল দৈহিক নয়, আত্মিকও

৫৬. কার ছবি আমরা প্রত্যহ দেখতে পাই না?
(ক) ফুল ফোটার (খ) নদীর সাগরে পতিত হওয়ার
(গ) জীবন বিকশিত হওয়ার (ঘ) বৃক্ষের বেদনার
উত্তর: (খ) নদীর সাগরে পতিত হওয়ার

৫৭. 'জীবন ও বৃক্ষ' প্রবন্ধে 'বুলি' শব্দটি কী অর্থে ব্যবহৃত হয়েছে?
(ক) কথা (খ) বক্তব্য
(গ) গত-বাঁধা কথা (ঘ) মর্যাদাপূর্ণ বাণী
উত্তর: (গ) গত-বাঁধা কথা

৫৮. নির্মাণ সৃষ্টিতে তৎপর যে—
(ক) সৃজনশীল (খ) সুশ্রী
(গ) সৃষ্টিকর্মী (ঘ) নতুনত্বের প্রতীক
উত্তর: (ক) সৃজনশীল

৫৯. বৃক্ষ আমাদের কীভাবে সার্থকতার গান গেয়ে শোনায়?
(ক) নীরব ভাষণে (খ) সরব ভাষণে
(গ) নীরব ভাষায় (ঘ) ফলমূল দিয়ে
উত্তর: (গ) নীরব ভাষায়

৬০. 'স্থূলবুদ্ধি' শব্দের অর্থ কী?
(ক) সূক্ষ্ম বিচারবুদ্ধিহীন (খ) অভিজ্ঞতাহীন
(গ) জ্ঞানহীন (ঘ) উপলব্ধিহীন
উত্তর: (ক) সূক্ষ্ম বিচারবুদ্ধিহীন

৬১. কখন বৃক্ষের বেদনা সহজে উপলব্ধি করা যায়?
(ক) চর্মচক্ষু দিয়ে বিচার করলে (খ) অনুভূতি দিয়ে বিচার করলে
(গ) অহংকার দিয়ে বিচার করলে (ঘ) চিন্তা দিয়ে বিচার করলে
উত্তর: (খ) অনুভূতি দিয়ে বিচার করলে

৬২. আত্মার উন্নতি না হওয়ার কারণ কী?
(ক) জীবনবোধে অন্তর পরিপূর্ণ না হলে (খ) মর্যাদা না পেলে
(গ) প্রেম না থাকলে (ঘ) অনুভূতি না থাকলে
উত্তর: (ক) জীবনবোধে অন্তর পরিপূর্ণ না হলে

৬৩. বারবার বৃক্ষের দিকে তাকানো প্রয়োজন কেন?
(ক) জীবনে প্রেরণা লাভের জন্য (খ) জীবনে সার্থকতা অর্জনের জন্য
(গ) আত্মার পরিপক্কতার জন্য (ঘ) জীবনের তাৎপর্য উপলব্ধির জন্য
উত্তর: (ঘ) জীবনের তাৎপর্য উপলব্ধির জন্য

৬৪. নিচের উদ্দীপকটি পড় এবং ৬৪ ও ৬৫ নং প্রশ্নের উত্তর দাও:
হাসান সাহেব বিদগ্ধ ব্যক্তি। তিনি একটি বৃক্ষ রোপণ করে পরিবারের সবাইকে ডেকে বললেন, 'এই বৃক্ষ থেকে আমাদের শিক্ষা গ্রহণ করতে হবে। বৃক্ষের অঙ্কুরোদগম থেকে ফুলে-ফলে বিকশিত হওয়া পর্যন্ত তার কাছ থেকে শেখার শেষ নেই।'

উদ্দীপকের হাসান সাহেবের সঙ্গে প্রাবন্ধিকের কোন দিক থেকে সাদৃশ্য রয়েছে?
(ক) বাহ্যিক আচরণগত (খ) বাহ্যিক আবরণগত
(গ) চেতনাগত (ঘ) বাহ্যিক চেহারাগত
উত্তর: (গ) চেতনাগত

৬৫. উদ্দীপকের ভাবার্থ নিচের কোন বাক্যে প্রকাশ পেয়েছে?
(ক) বৃক্ষের সাধনায় যেমন একটা ধীরস্থির ভাব পাওয়া যায়, মানুষের সাধনাও তেমনি
(খ) বৃক্ষ যে কেবল বৃদ্ধির ইশারা তা নয়, প্রশান্তিরও ইঙ্গিত
(গ) যা তার প্রাপ্তি তাই তার দান
(ঘ) নীরব ভাষায় বৃক্ষ আমাদের সার্থকতার গান শোনায়
উত্তর: (ঘ) নীরব ভাষায় বৃক্ষ আমাদের সার্থকতার গান শোনায়

নিচের উদ্দীপকটি পড় এবং ৬৬ ও ৬৭ নং প্রশ্নের উত্তর দাও:
বৃক্ষ নানাভাবে মানুষের কল্যাণ করে থাকে। মানুষের কাছ থেকে বৃক্ষ কোনো উপকার পায় না। পৃথিবীতে বৃক্ষের দানের শেষ নেই।

৬৬. উদ্দীপকটি 'জীবন ও বৃক্ষ' প্রবন্ধের কোন দিকটির কথা প্রকাশ করেছে?

(গ) বৃক্ষের কল্যাণ (ঘ) বৃক্ষের নিধন

(গ) ii ও iii (ঘ) i, ii ও iii

নিচের উদ্দীপকটি পড়ে ৬৮ ও ৬৯ নম্বর প্রশ্নের উত্তর দাও:
বিদ্যাসাগর সারা জীবন মানুষকে ভালোবেসে গেছেন। মানবধর্মই তাঁর কাছে ছিল অনেক বড়। তিনি সাধারণ মানুষকে ভালোবেসে তাদের পাশে এসে দাঁড়াতে পারাকেই জীবনের ব্রত মনে করেছিলেন।

৬৮. উদ্দীপকের সাথে 'জীবন ও বৃক্ষ' প্রবন্ধের সাদৃশ্য কোথায়?
(ক) প্রাপ্তিতে (খ) অপেক্ষায়
(গ) স্বপ্নে (ঘ) সাধনায়
উত্তর: (ঘ) সাধনায়

(ক) i (খ) i ও ii
(গ) i ও iii (ঘ) i, ii ও iii

নিচের উদ্দীপকটি পড়ে ৭১ ও ৭২ নম্বর প্রশ্নের উত্তর দাও:
আপনারে রাখিলে ব্যর্থ জীবন সাধনা 
জনম বিশ্বের তরে পরার্থে কামনা।

(খ) নীরব সাধনাই মানুষের প্রকৃত পরিচয়
(গ) বিবেকহীন নিষ্ঠুর মানুষের জয়গানে মুখর পৃথিবী
(ঘ) পরিপূর্ণ ও সার্থক মানুষ মাত্রই স্বার্থপর
উত্তর: (খ) নীরব সাধনাই মানুষের প্রকৃত পরিচয়

(ক) বৃক্ষকে (খ) নদীকে
(গ) ধর্মকে (ঘ) আত্মাকে
উত্তর: (ক) বৃক্ষকে

নিচের উদ্দীপকটি পড় এবং ৭৩ ও ৭৪ নং প্রশ্নের উত্তর দাও:
'পরের কারণে স্বার্থ দিয়া বলি 
এ জীবন মন সকলি দাও, 
তার মতো সুখ কোথাও কি আছে? 
আপনার কথা ভুলিয়া যাও।

iii. নীতি, শান্তি ও সেবার বাণী প্রচার করা

i. সার্থকতার ছবি উপলব্ধি ii. অপরের কল্যাণ iii. শান্তি ও সেবার বাণী

(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii

i. মানুষ ii. তরুলতা iii. জীবজন্তু
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii
(গ) i ও iii (ঘ) i, ii ও iii

i. সংস্কৃতি কথা ii. সুখ iii. সভ্যতা

"নদী কভু পান নাহি করে নিজ জল / তরুগণ নাহি খায় নিজ নিজ ফল / গাভী কভু নাহি করে নিজ দুগ্ধ পান / সাধুর ঐশ্বর্য শুধু পরহিত তরে।"

(ক) প্রাপ্তিতে (খ) অপেক্ষায়

i. বড় মানুষ ii. সূক্ষ্মবুদ্ধি, উদারহৃদয় iii. গভীরচিন্তিত ব্যক্তি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৯০. বৃক্ষের নীরব সাধনার পিছনে রয়েছে—
i. বিকাশ ii. পরিপূর্ণতা iii. সার্থকতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
