<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">বঙ্কিমচন্দ্র চট্টোপাধ্যায় এর 'বাঙ্গালা নব্য লেখকের প্রতি নিবেদন' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {

        const rawText = `
১। লেখকের ‘লোকরঞ্জন-প্রবৃত্তি’ প্রবল হয়ে ওঠে কী কারণে?
(ক) পাঠকের রুচি বিবেচনায় আনলে
(খ) অর্থলাভের আশায় লিখলে
(গ) সৌন্দর্য সৃষ্টির উদ্দেশ্য থাকলে
(ঘ) বিদ্যা প্রকাশের প্রচেষ্টা থাকলে
উত্তর: (খ) অর্থলাভের আশায় লিখলে

২। বঙ্কিমচন্দ্র চট্টোপাধ্যায় ‘লেখা’ বিলম্বে ছাপাতে বলেছেন কেন?
(ক) উপযুক্ত প্রমাণ সংযোজনের সুবিধার্থে
(খ) পাঠকের মনে চাহিদার উদ্রেক করতে
(গ) লেখার ভুল-ত্রুটি সংশোধন করতে
(ঘ) মনুষ্যজাতির মঙ্গল সাধন করতে
উত্তর: (গ) লেখার ভুল-ত্রুটি সংশোধন করতে

উদ্দীপকের আলোকে ৩ ও ৪ নং প্রশ্নের উত্তর দাও।
“আপনারে যে ভেঙেচুরে গড়তে চায় পরের ছাঁচে,
অলীক, ফাঁকি মেকি সে জন, নামটা তার কদিন বাঁচে।”

৩। কবিতাংশের ভাব ‘বাঙলার নব্য লেখকদিগের প্রতি নিবেদন’ প্রবন্ধের লেখকের যে নিবেদনের সাথে সাদৃশ্যপূর্ণ তা হলো—
i. পরাণুকরণে নিরুৎসাহিতা
ii. অন্য লেখকদের অনুকৃতি
iii. স্বকীয়তার সচেষ্ট থাকা
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৪। উক্ত নিবেদন রক্ষিত হলে নিচের কোনটি ঘটত বলে প্রাবন্ধিক মনে করেন?
(ক) লেখক স্বাতন্ত্রিক বৈশিষ্ট্যে সমুজ্জ্বল হতেন
(খ) বাংলা সাহিত্যের ভাণ্ডার সমৃদ্ধ হতো
(গ) অলঙ্কার প্রয়োগ যথার্থ হতো
(ঘ) রচনার পারিপাট্য বজায় থাকত
উত্তর: (খ) বাংলা সাহিত্যের ভাণ্ডার সমৃদ্ধ হতো

৫। বঙ্কিমচন্দ্র চট্টোপাধ্যায় পশ্চিমবঙ্গে কোথায় জন্মগ্রহণ করেন?
(ক) হুগলি
(খ) বর্ধমান
(গ) মেদিনীপুর
(ঘ) চব্বিশ পরগনা
উত্তর: (ঘ) চব্বিশ পরগনা

৬। বঙ্কিমচন্দ্র চট্টোপাধ্যায় পেশাগত জীবনে কী ছিলেন?
(ক) অধ্যাপক
(খ) ব্যবসায়ী
(গ) প্রকৌশলী
(ঘ) ম্যাজিস্ট্রেট
উত্তর: (ঘ) ম্যাজিস্ট্রেট

৭। বঙ্কিমচন্দ্রের গ্রন্থ সংখ্যা কতটি?
(ক) ৩২
(খ) ৩৪
(গ) ৫৪
(ঘ) ৬৪
উত্তর: (খ) ৩৪

৮। বঙ্কিমচন্দ্র চট্টোপাধ্যায় চাকরিসূত্রে কোথায় ম্যাজিস্ট্রেট হিসেবে যোগদান করে নীলকরদের অত্যাচার দমন করেছিলেন?
(ক) যশোরে
(খ) বরিশালে
(গ) ঢাকায়
(ঘ) খুলনায়
উত্তর: (ঘ) খুলনায়

৯। বঙ্কিমচন্দ্র চট্টোপাধ্যায় কোন পত্রিকায় কবিতা প্রকাশের মাধ্যমে সাহিত্যচর্চা শুরু করেন?
(ক) বঙ্গদর্শন
(খ) সাধনা
(গ) বেঙ্গল গেজেট
(ঘ) সংবাদ প্রভাকর
উত্তর: (ঘ) সংবাদ প্রভাকর (১৮৫২)

১০। বঙ্কিমচন্দ্র চট্টোপাধ্যায় কর্তৃক প্রকাশিত পত্রিকার নাম কী?
(ক) সংবাদ প্রভাকর
(খ) বঙ্গদর্শন
(গ) দিগদর্শন
(ঘ) সমাচার দর্পণ
উত্তর: (খ) বঙ্গদর্শন (১৮৭২)

১১। বঙ্কিমচন্দ্র চট্টোপাধ্যায় রচিত প্রথম উপন্যাস কোনটি?
(ক) কপালকুণ্ডলা
(খ) মৃণালিনী
(গ) কৃষ্ণকান্তের উইল
(ঘ) দুর্গেশনন্দিনী
উত্তর: (ঘ) দুর্গেশনন্দিনী (১৮৬৫)

১২। বঙ্কিমচন্দ্র চট্টোপাধ্যায় রচিত ইংরেজি উপন্যাসটির নাম কী?
(ক) Rajmohan's Wife
(খ) Sultana's Dream
(গ) Civilization
(ঘ) Conquest of Happiness
উত্তর: (ক) Rajmohan's Wife

১৩। বঙ্কিমচন্দ্র চট্টোপাধ্যায়ের উপাধি কী?
(ক) কবিকঙ্কন
(খ) ভোরের পাখি
(গ) সাহিত্য সম্রাট
(ঘ) সান্ধ্য কবি
উত্তর: (গ) সাহিত্য সম্রাট

১৪। যশের জন্য লিখলে কী হবে?
(ক) যশ হবে
(খ) লেখা ভালো হবে
(গ) অর্থ হবে
(ঘ) লেখা ভালো হবে না
উত্তর: (ঘ) লেখা ভালো হবে না

১৫। লেখকের মতে লেখা ভালো হলে কোনটি নিশ্চিত?
(ক) অর্থ আপনিই আসবে
(খ) অলংকার আপনিই আসবে
(গ) খ্যাতি আপনিই আসবে
(ঘ) প্রকাশক আপনিই আসবে
উত্তর: (গ) খ্যাতি আপনিই আসবে

১৬। রচনার দ্বিতীয় অনুচ্ছেদে লেখক কীসের জন্য লিখতে বারণ করেছেন?
(ক) যশের
(খ) টাকার
(গ) ক্ষমতার
(ঘ) ব্যক্তিস্বার্থের
উত্তর: (খ) টাকার

১৭। প্রবন্ধ অনুসারে কোথায় অনেকে টাকার জন্য লেখে এবং টাকাও পায়?
(ক) এশিয়ায়
(খ) ইউরোপে
(গ) আফ্রিকায়
(ঘ) অস্ট্রেলিয়ায়
উত্তর: (খ) ইউরোপে

১৮। ‘আমাদের এখনও সে দিন হয় নাই’— কোন দিন?
(ক) টাকার বিনিময়ে সুসাহিত্য রচনার দিন
(খ) সম্মানি ছাড়াই সুসাহিত্য রচনার দিন

(ঘ) শিক্ষা ছাড়াই সুসাহিত্য রচনার দিন

(ক) চুরি করার প্রবৃত্তি
(খ) স্বার্থসাধন প্রবৃত্তি
(গ) হিংসাত্মক প্রবৃত্তি
(ঘ) লোকরঞ্জন প্রবৃত্তি
উত্তর: (ঘ) লোকরঞ্জন প্রবৃত্তি

২০। আমাদের সাধারণ পাঠকের রুচি ও শিক্ষা বিবেচনা করে লোকরঞ্জন করা হলে রচনা কেমন হয়ে ওঠে?

(খ) জটিল ও দুর্বোধ্য
(গ) বিকৃত ও অনিষ্টকর
(ঘ) সরল ও সহজবোধ্য
উত্তর: (গ) বিকৃত ও অনিষ্টকর

২১। আমাদের সাধারণ পাঠকের মনোরঞ্জন করে সাহিত্য রচনা করা হলে রচনা বিকৃত ও অনিষ্টকর হয়ে ওঠে কেন?
(ক) তাতে অর্থপ্রাপ্তির সম্ভাবনা বেশি থাকে বলে
(খ) লেখক যশ লাভের আশায় লেখেন বলে

(ঘ) লেখা জটিল ও দুর্বোধ্য হয়ে ওঠে বলে
উত্তর: (গ) সাধারণ পাঠকগণ শিক্ষা ও রুচিতে পিছিয়ে বলে

২২। বঙ্কিমচন্দ্রের মতে, সাহিত্য রচনার উদ্দেশ্য কোনটি?

(খ) লোকরঞ্জন
(গ) যশলাভ
(ঘ) অর্থলাভ
উত্তর: (ক) মানব কল্যাণ

(খ) যদি লিখলে অর্থপ্রাপ্তি ঘটে
(গ) যদি যশ লাভের সম্ভাবনা থাকে
(ঘ) যদি সত্য ও সুন্দরের সৃষ্টি হয়
উত্তর: (ঘ) যদি সত্য ও সুন্দরের সৃষ্টি হয়

২৪। মানব কল্যাণ ও সৌন্দর্য সৃষ্টি ব্যতীত অন্য উদ্দেশ্যে সাহিত্য রচয়িতাদের লেখক কাদের সাথে তুলনা করেছেন?

(খ) যাত্রাওয়ালা
(গ) ফেরিওয়ালা
(ঘ) কাবুলিওয়ালা
উত্তর: (খ) যাত্রাওয়ালা

২৫। ‘বাঙলার নব্য লেখকদিগের প্রতি নিবেদন’ রচনায় কোন ব্যবসায়ীদের নীচ শ্রেণির বলা হয়েছে?
(ক) সবজি ব্যবসায়ী
(খ) চামড়া ব্যবসায়ী
(গ) যাত্রা ব্যবসায়ী
(ঘ) ধান ব্যবসায়ী
উত্তর: (গ) যাত্রা ব্যবসায়ী

২৬। বঙ্কিমচন্দ্রের মতে কোন প্রবন্ধ কখনো হিতকর হতে পারে না?

উত্তর: (গ) যা মানুষের অনিষ্ট সাধন করে

২৭। ‘সুতরাং তাহা একেবারে পরিহার্য’— কোনটি?
(ক) লোকরঞ্জনের প্রবৃত্তি
(খ) লেখাকে সরল করে তোলার চেষ্টা
(গ) সকল প্রমাণ লেখায় সংযুক্তকরণ
(ঘ) মানব কল্যাণ ব্যতীত ভিন্ন উদ্দেশ্যে সাহিত্য রচনা
উত্তর: (ঘ) মানব কল্যাণ ব্যতীত ভিন্ন উদ্দেশ্যে সাহিত্য রচনা

২৮। সত্য ও ধর্ম ব্যতীত অন্য উদ্দেশ্যে লেখনী ধারণকে বঙ্কিমচন্দ্র কী বলেছেন?
(ক) মহাপাপ
(খ) ব্যক্তিস্বাধীনতা
(গ) অপ্রয়োজনীয়
(ঘ) অরুচিকর
উত্তর: (ক) মহাপাপ

২৯। লেখাকে কিছুকাল ফেলে রাখলে কী লাভ হয়?
(ক) বাজারে লেখকের চাহিদা বাড়ে
(খ) অধিক অর্থপ্রাপ্তির সম্ভাবনা তৈরি হয়
(গ) ভুল-ত্রুটিগুলো নজরে আসে
(ঘ) প্রকাশের সম্ভাবনা কমে যায়
উত্তর: (গ) ভুল-ত্রুটিগুলো নজরে আসে

৩০। রচনার উৎকর্ষ সাধনের জন্য বঙ্কিমচন্দ্র চট্টোপাধ্যায়ের পরামর্শ কী?
(ক) লেখার পর ত্রুটি সংশোধনে সময় নেওয়া
(খ) লেখায় বিদ্যা প্রকাশের চেষ্টা করা
(গ) লেখায় অলংকার প্রয়োগে সচেষ্ট হওয়া
(ঘ) উন্নত সাহিত্যের অনুকরণ করা
উত্তর: (ক) লেখার পর ত্রুটি সংশোধনে সময় নেওয়া

৩১। বঙ্কিমচন্দ্র চট্টোপাধ্যায় কাব্য, নাটক ও উপন্যাস কত বছর ফেলে রেখে সংশোধন করতে বলেছেন?
(ক) এক দুই
(খ) দুই তিন
(গ) দুই এক
(ঘ) দুই চার
উত্তর: (গ) দুই এক

৩২। রচনার উৎকর্ষ সাধনে সময় নেওয়া হয়ে ওঠে না কাদের?
(ক) যারা যশলাভে আগ্রহী
(খ) যারা সাময়িক সাহিত্যে আগ্রহী
(গ) যারা অলঙ্কার পরিত্যাগে আগ্রহী
(ঘ) যারা বিদ্যা প্রকাশে আগ্রহী
উত্তর: (খ) যারা সাময়িক সাহিত্যে আগ্রহী

৩৩। বিভিন্ন উপলক্ষে আকাশকে অল্প সময়ে প্রবন্ধ লিখে পত্রিকা অফিসে ছাপাতে হয়। সময় স্বল্পতার কারণে সে নিজের লেখাটি দু-একবারের বেশি পড়ে দেখতে পারে না। বঙ্কিমচন্দ্র চট্টোপাধ্যায়ের মতে, আকাশের লেখা প্রবন্ধগুলোকে কী বলা যায়?
(ক) অপসাহিত্য
(খ) সাময়িক সাহিত্য
(গ) বিকৃত সাহিত্য
(ঘ) চিরন্তন সাহিত্য
উত্তর: (খ) সাময়িক সাহিত্য

৩৪। ‘বিদ্যা প্রকাশের চেষ্টা করিবেন না’ কারণ বিদ্যা—
(ক) পাঠক অপমানিত বোধ করে
(খ) রচনার সরলতা নষ্ট হয়
(গ) স্বাভাবিকভাবেই প্রকাশ পায়
(ঘ) সব পাঠকের রুচি এক নয়
উত্তর: (গ) স্বাভাবিকভাবেই প্রকাশ পায়


৩৫। রচনায় লেখকের বিদ্যা প্রকাশের চেষ্টা পাঠকের জন্য কী হয়ে ওঠে?
(ক) অবমাননাকর
(খ) বিরক্তিকর
(গ) হানিকর
(ঘ) ভয়ংকর
উত্তর: (খ) বিরক্তিকর

৩৬। ‘রচনার পারিপাট্যের বিশেষ হানিসনক’— কোনটি?
(ক) রচনা ফেলে রাখা
(খ) অলংকার প্রয়োগ
(গ) প্রমাণাদি সংযুক্ত করা
(ঘ) বিদ্যা প্রকাশের চেষ্টা
উত্তর: (ঘ) বিদ্যা প্রকাশের চেষ্টা

৩৭। এখনকার প্রবন্ধে বঙ্কিমচন্দ্র কোনটি বড়ো বেশি দেখতে পান?
(ক) বিদেশি ভাষার উদ্ধৃতি
(খ) মাতৃভাষার উদ্ধৃতি
(গ) সাধু ভাষার উদ্ধৃতি
(ঘ) চলিত ভাষার উদ্ধৃতি
উত্তর: (ক) বিদেশি ভাষার উদ্ধৃতি

৩৮। প্রবন্ধে বিদেশি ভাষার উদ্ধৃতির আধিক্য কোনটি প্রমাণ করে?
(ক) অনধিকার চর্চা
(খ) সাময়িক সাহিত্যে আসক্তি
(গ) বিদ্যা প্রকাশের চেষ্টা
(ঘ) অলংকারের অপ্রয়োগ
উত্তর: (গ) বিদ্যা প্রকাশের চেষ্টা

৩৯। বঙ্কিমচন্দ্র রচনায় লেখককে কোন ভাষার উদ্ধৃতি ব্যবহারে নিরুৎসাহিত করেছেন?
(ক) দেশি ভাষার
(খ) সাধু ভাষার
(গ) লেখকের অজানা ভাষার
(ঘ) ইংরেজি ভাষার
উত্তর: (গ) লেখকের অজানা ভাষার

৪০। রচনায় অলংকার বা ব্যঙ্গ প্রয়োগের পরিমিতি নির্ভর করে কীসের উপর?
(ক) লেখকের মুন্শিয়ানার উপর
(খ) পাঠকের বোধগম্যতার উপর
(গ) প্রকাশকের চাহিদার উপর
(ঘ) বিদ্যা প্রকাশের দক্ষতার উপর
উত্তর: (ক) লেখকের মুন্শিয়ানার উপর

৪১। বঙ্কিমচন্দ্রের মতে কোনটির মতো কদর্য আর কিছুই নেই?
(ক) রচনাকে অতি সরল করার চেষ্টা
(খ) অর্থ লাভের আশায় সাহিত্য রচনা
(গ) রচনায় ব্যঙ্গ বা অলংকারের অযাচিত প্রয়োগ
(ঘ) রচনা লেখার পর দীর্ঘকাল ফেলে রাখা
উত্তর: (গ) রচনায় ব্যঙ্গ বা অলংকারের অযাচিত প্রয়োগ

৪২। ‘যে স্থানে অলংকার বা ব্যঙ্গ বড় সুন্দর বলিয়া বোধ হইবে, সেই স্থানটি কাটিয়া দিবে’— এটি কেমন বিধি?
(ক) নতুন
(খ) প্রাচীন
(গ) চিরন্তন
(ঘ) অত্যাবশ্যকীয়
উত্তর: (খ) প্রাচীন

৪৩। বঙ্কিমচন্দ্রের মতে কে শ্রেষ্ঠ লেখক?
(ক) যিনি যশ লাভের আশায় লেখেন না
(খ) যিনি অর্থ লাভের আশায় লেখেন না
(গ) যাঁর লেখায় মনের ভাব সহজেই ফুটে ওঠে
(ঘ) যাঁর লেখায় বিদ্যা ও অলংকারের আধিক্য থাকে
উত্তর: (গ) যাঁর লেখায় মনের ভাব সহজেই ফুটে ওঠে

৪৪। বঙ্কিমচন্দ্রের মতে লেখার উদ্দেশ্য কোনটি?
(ক) পাঠককে বোঝানো
(খ) পাঠককে জ্ঞানদান
(গ) পাঠকের মনোরঞ্জন
(ঘ) পাঠকের শ্রদ্ধা অর্জন
উত্তর: (ক) পাঠককে বোঝানো

৪৫। ‘ব্যাধিই সংক্রামক, স্বাস্থ্য নহে’— ‘বাঙলার নব্য লেখকদিগের প্রতি নিবেদন’ রচনার কোন কথাটির ক্ষেত্রে উক্তিটি প্রযোজ্য?
(ক) সকল অলংকারের শ্রেষ্ঠ অলংকার সরলতা
(খ) বিদ্যা প্রকাশের চেষ্টা করিবেন না
(গ) অনুকরণের দোষগুলি অনুকৃত হয়, গুণগুলি হয় না
(ঘ) টাকার জন্য লিখিবেন না
উত্তর: (গ) অনুকরণের দোষগুলি অনুকৃত হয়, গুণগুলি হয় না

৪৬। কোনো বিষয়ে লেখার সময় যথেষ্ট প্রমাণ না থাকলে সে বিষয়ে বঙ্কিমচন্দ্র চট্টোপাধ্যায়ের পরামর্শ কী?
(ক) লিখিও না
(খ) থামিও না
(গ) প্রমাণ আবশ্যক নহে
(ঘ) পরে সংগ্রহ করিও
উত্তর: (ক) লিখিও না

৪৭। কোনো বিষয়ে লেখার জন্য প্রমাণাদি সংগ্রহ ও সংরক্ষণের বিষয়ে বঙ্কিমচন্দ্রের পরামর্শ কী?
(ক) সব প্রমাণাদি লেখায় সংযুক্ত করতে হবে
(খ) সব প্রমাণাদি হাতে থাকতে হবে
(গ) প্রমাণ পরে সংগ্রহ করে নিতে হবে
(ঘ) কিছু প্রমাণ সংগ্রহে রাখতে হবে
উত্তর: (খ) সব প্রমাণাদি হাতে থাকতে হবে

৪৮। বঙ্কিমচন্দ্র চট্টোপাধ্যায় কোনটিকে ‘বাঙলার ভরসা’ বলেছেন?
(ক) বাংলার সাহিত্য
(খ) বাংলার প্রকৃতি
(গ) বাংলার কৃষি
(ঘ) বাংলার মানুষ
উত্তর: (ক) বাংলার সাহিত্য

৪৯। ‘যশের জন্য লিখিবেন না।’ তাহলে—
i. যশলাভ হবে না
ii. লেখার মান খারাপ হবে
iii. অর্থপ্রাপ্তি ঘটবে না
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৫০। আমাদের দেশের সাধারণ পাঠকের রুচি ও শিক্ষা বিবেচনায় লেখকদের উচিত নয়—
i. রচনায় লোকরঞ্জন করা
ii. মানব কল্যাণে লেখা
iii. টাকার জন্য লেখা
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৫১। আমাদের দেশের পাঠক বিবেচনায়, সেই রচনা হিতকর হতে পারে না যে রচনা—
i. লেখক স্বার্থসাধনের জন্য লেখেন
ii. লেখক অর্থলাভের জন্য লেখেন
iii. পরনিন্দা বা পরপীড়নকে উৎসাহিত করে
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৫২। সাহিত্যের উদ্দেশ্য হলো—
i. সত্য ও সুন্দরের চর্চা
ii. পাঠকের মনোরঞ্জন
iii. মানবজাতির কল্যাণ সাধন
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৫৩। বঙ্কিমচন্দ্র চট্টোপাধ্যায় রচনাকে কিছুকাল ফেলে রাখার পরামর্শ দিয়েছেন—
i. ভুল-ত্রুটি সংশোধনের জন্য
ii. রচনার উৎকর্ষ লাভের জন্য
iii. লেখকের জনপ্রিয়তা যাচাইয়ের জন্য
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৫৪। সাময়িক সাহিত্য লেখকের পক্ষে অবনতিকর। কেননা, এতে—
i. ভুলত্রুটি থাকার আশঙ্কা থাকে
ii. কম অর্থ পাওয়া যায়
iii. লেখক নিজেকে শুধরে নেওয়ার সুযোগ পান না
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৫৫। রচনার উৎকর্ষ সাধনে বর্জনীয়—
i. যশ লাভের আশা
ii. বিদ্যা প্রকাশের চেষ্টা করা

উদ্দীপকের আলোকে ৬০ নং প্রশ্নের উত্তর দাও।

ii. সাহিত্যের উদ্দেশ্য সাধন করে

(খ) i ও iii

সমাজপতিদের কাছে খাতির লাভের বাসনায় রোমান তাদের প্রশংসা করে প্রবন্ধ রচনা করে। তাদের অন্যায় ও দুর্নীতি আড়াল করা সর্বোচ্চ চেষ্টা করে সে।

৬২। ‘বাঙলার নব্য লেখকদিগের প্রতি নিবেদন’ রচনা অনুসারে রোমানকে কাদের সাথে তুলনা করা যায়?

৮৩। ‘বাঙলার নব্য লেখকদিগের প্রতি নিবেদন’ রচনার তাৎপর্যপূর্ণ দিক হলো—

(ক) বাংলার লেখকদের অর্থনৈতিক দৈন্য দূরীকরণে

৯৩। এখনকার প্রবন্ধে কোন ভাষার কোটেশন বেশি দেখা যায়?
(ক) বাংলা, ইংরেজি, সংস্কৃত
(খ) ইংরেজি, হিন্দি, ফারসি, সংস্কৃত
(গ) ইংরেজি, সংস্কৃত, ফারসি, জার্মান
(ঘ) জার্মান, সংস্কৃত, হিন্দি
উত্তর: (গ) ইংরেজি, সংস্কৃত, ফারসি, জার্মান

৯৪। “ভাণ্ডারে না থাকিলে মাথা কুটিলেও আসিবে না” উক্তিটি দ্বারা কোনটির প্রতি নির্দেশ দিয়েছেন?
(ক) অলঙ্কার বা ব্যঙ্গ
(খ) ইতিহাস চেতনা
(গ) সাহিত্যের রস
(ঘ) ভাব ও ভাষা
উত্তর: (ক) অলঙ্কার বা ব্যঙ্গ
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
