<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">মানিক বন্দ্যোপাধ্যায় এর 'মাসি পিসি' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। মানিক বন্দ্যোপাধ্যায় কত সালে জন্মগ্রহণ করেন?
(ক) ১৮০৮ (খ) ১৮৩৮ (গ) ১৯০৮ (ঘ) ১৯৩৮
উত্তর: (গ) ১৯০৮

২। ‘দিবারাত্রির কাব্য’ কী জাতীয় রচনা?
(ক) কাব্য (খ) উপন্যাস (গ) নাটক (ঘ) ছোটগল্প
উত্তর: (খ) উপন্যাস

৩। ‘মাসি-পিসি’ গল্পে চায়ের দোকান কোথায় অবস্থিত?
(ক) পুলের কাছে (খ) গঞ্জের বাজারে (গ) খালের ধারে (ঘ) কাছারি বাড়িতে
উত্তর: (ক) পুলের কাছে

৪। ‘জগু আর সেই জগু নেই’- বলতে জগু চরিত্রের কোনটিকে বোঝানো হয়েছে?
(ক) লোভ দূরীকরণ (খ) আর্থিক সমৃদ্ধি (গ) চারিত্রিক পরিবর্তন (ঘ) মানসিক বিকৃতি
উত্তর: (গ) চারিত্রিক পরিবর্তন

৫। ‘মাসি-পিসি’ গল্পে ‘বজ্জাত হোক, খুনে হোক জামাই তো!’- বাক্যটিতে প্রকাশ পেয়েছে—
(ক) জামাইপ্রীতি (খ) সংস্কার প্রিয়তা (গ) সামাজিক রীতি (ঘ) প্রধানুগত্য
উত্তর: (গ) সামাজিক রীতি (নোট: সামাজিক রীতি অপশনে না থাকলে প্রধানুগত্য হতো। কারণ জামাই আদর একটি সামাজিক রীতি হিসেবে স্বীকৃত।)

৬। মাসি-পিসির মধ্যে ঐকান্তিক ভাব থাকার কারণ কী?
(ক) তাদের চিন্তা-ভাবনা এক (খ) তাদের স্বভাব একই প্রকৃতির (গ) তাদের বয়স ও অবস্থা এক (ঘ) তাদের চেহারা এক
উত্তর: (গ) তাদের বয়স ও অবস্থা এক

৭। “নিজেকে তার ছ্যাঁচড়া, নোংরা, নর্দমার মতো লাগে।”- কার সম্পর্কে বলা হয়েছে?
(ক) মাসি (খ) পিসি (গ) আহ্লাদি (ঘ) জগু
উত্তর: (গ) আহ্লাদি

৮। ‘দুজনে মিলে কাজ করছে যেন একজন করছে।’- উক্তিটি দিয়ে বোঝানো হয়েছে মাসি-পিসির—
(ক) আত্মীয়তা (খ) বোঝাপড়া (গ) সখ্য (ঘ) আন্তরিকতা
উত্তর: (খ) বোঝাপড়া

৯। ‘মাসি-পিসি’ গল্পে কার মাথায় ফেটিবাঁধা বাবরি চুল ছিল?
(ক) জগুর (খ) বৈদ্যর (গ) ওসমানের (ঘ) কৈলাশের
উত্তর: (খ) বৈদ্যর

১০। ‘মাসি-পিসি’ গল্পটি কোন পত্রিকায় প্রথম প্রকাশিত হয়েছিল?
(ক) পূর্বাশা (খ) দিনকাল (গ) সবুজ পত্র (ঘ) সওগাত
উত্তর: (ক) পূর্বাশা

১১। ‘মাঝখানে গুটিসুটি হয়ে বসে আছে অল্পবয়সী একটি বউ’- বউটি কে?
(ক) জমিলা (খ) রহিমা (গ) আহ্লাদি (ঘ) বিলাসী
উত্তর: (গ) আহ্লাদি

১২। মানিক বন্দ্যোপাধ্যায়ের পিতৃপ্রদত্ত নাম কী?
(ক) সুবোধকুমার বন্দ্যোপাধ্যায় (খ) প্রভাতকুমার বন্দ্যোপাধ্যায় (গ) প্রবোধকুমার বন্দ্যোপাধ্যায় (ঘ) সরোজকুমার বন্দ্যোপাধ্যায়
উত্তর: (গ) প্রবোধকুমার বন্দ্যোপাধ্যায়

১৩। ‘ওসব একরকম ছেড়ে দিয়েছে জগু’- এখানে ‘ওসব’ বলতে কী বোঝানো হয়েছে?
(ক) মারধর করা (খ) মামলা-মোকদ্দমা করা (গ) গালমন্দ করা (ঘ) নেশা করা
উত্তর: (ঘ) নেশা করা

১৪। ‘বজ্জাত হোক, খুনে হোক, জামাই তো!’— ‘মাসি-পিসি’ গল্পে পিসির এই উক্তির মধ্য দিয়ে প্রকাশ পেয়েছে—
(ক) সামাজিকতা ও দায়িত্ববোধ (খ) মানবিকতা ও কল্যাণবোধ (গ) সৌজন্য ও আত্মীয়তা (ঘ) চাতুর্য ও কৌশল
উত্তর: (ক) সামাজিকতা ও দায়িত্ববোধ

১৫। ‘মাসি-পিসি’ গল্পে অল্পদিন আগে কার মেয়েটা শ্বশুর বাড়িতে মরেছে?
(ক) কৈলাশের (খ) রহমানের (গ) গোকুলের (ঘ) কানাইয়ের
উত্তর: (খ) রহমানের

১৬। আহ্লাদি ও বুড়ো রহমানের কন্যা তারা দুজনেই—
(ক) সুন্দরী (খ) নির্যাতিতা (গ) শিক্ষিতা (ঘ) অশিক্ষিতা
উত্তর: (খ) নির্যাতিতা

১৭। ‘জেলে নয় গেলাম কৈলেশ, কিন্তু মেয়ে যদি সোয়ামির কাছে না যেতে চায় খুন হবার ভয়ে?’- উক্তিটিতে প্রকাশ পেয়েছে মাসি-পিসি চরিত্রের—
(ক) সাহসিকতা ও বাগাড়ম্বরতা (খ) সাহসিকতা ও বুদ্ধিমত্তা (গ) আইন সচেতনতা ও বাগাড়ম্বরতা (ঘ) আইন সচেতনতা ও বুদ্ধিমত্তা
উত্তর: (খ) সাহসিকতা ও বুদ্ধিমত্তা

১৮। আহ্লাদিকে তার স্বামী যেভাবে নিয়ে যাবে বলে কৈলাশকে জানায়—
(ক) নৌকায় করে (খ) জোর খাটিয়ে (গ) মামলা করে (ঘ) কৌশল করে
উত্তর: (গ) মামলা করে

১৯। কলেরায় আহ্লাদির পরিবার কতজন সদস্যকে হারিয়েছিল?
(ক) ২ (খ) ৩ (গ) ৪ (ঘ) ৫
উত্তর: (খ) ৩

২০। ‘কে এগিয়ে আসবে এসো, বঁটির এক কোপে গলা ফাঁক করে দেবো!’— এখানে কী বুঝিয়েছেন?
(ক) যদি এগিয়ে আসো তবে মারা পড়বে 
(খ) অবশ্যই দু’একটাকে কাটব
(গ) দু’একটাকে না মেরে শান্তি নেই
(ঘ) এগিয়ে না এলে গলা কাটব
উত্তর: (ক) যদি এগিয়ে আসো তবে মারা পড়বে

২১। ‘মাসি-পিসি’ কেন কাছারি বাড়ি যেতে রাজি হয়নি?
(ক) যেতে ইচ্ছে করছিল না বলে (খ) বাড়িতে চুরি হওয়ার ভয়ে
(গ) নির্যাতনের শিকার হওয়ার ভয়ে (ঘ) আহ্লাদির নিরাপত্তাজনিত কারণে
উত্তর: (ঘ) আহ্লাদির নিরাপত্তাজনিত কারণে

২২। আহ্লাদিকে রক্ষার জন্য মাসি-পিসির প্রচেষ্টায় তাদের চরিত্রের যে দিকটি প্রকাশ পেয়েছে তা হলো—
(ক) দায়বদ্ধতা থেকে মুক্তি (খ) সংগ্রামশীলতা
(গ) মানবিকতা (ঘ) অস্তিত্ব রক্ষা
উত্তর: (খ) সংগ্রামশীলতা

২৩। ‘মাসি-পিসি’ গল্পে শেষ পর্যন্ত প্রকাশ পেয়েছে—
(ক) মাসি-পিসির বুদ্ধদীপ্ত প্রতিরোধ (খ) আহ্লাদির জীবন সংগ্রাম
(গ) মাসি-পিসির মধ্যকার ঐক্য (ঘ) আহ্লাদির প্রতি জগুর আকর্ষণ
উত্তর: (ক) মাসি-পিসির বুদ্ধদীপ্ত প্রতিরোধ

২৪। ‘মাসি-পিসি’ গল্পটি নিচের কোন গ্রন্থে সংকলিত হয়েছে?
(ক) প্রাগৈতিহাসিক (খ) আজ কাল পরশুর গল্প
(গ) পরিস্থিতি (ঘ) সরীসৃপ
উত্তর: (গ) পরিস্থিতি

২৫। ‘মাসি-পিসি’ কাঁথা-কম্বল ভিজিয়ে রাখে—
(ক) যুদ্ধের আয়োজন হিসেবে (খ) জমিদারদের দেওয়া আগুন নেভাতে
(গ) অনেক দিন অপরিচ্ছন্ন ছিল বলে (ঘ) পেয়াদাদের জাপটে ধরতে
উত্তর: (ক) যুদ্ধের আয়োজন হিসেবে

২৬। শালতি কী কাঠের তৈরি?
(ক) আম বা তাল (খ) জাম বা শাল
(গ) তাল বা শাল (ঘ) গাব বা তাল
উত্তর: (গ) তাল বা শাল

২৭। ‘মাসি-পিসি’ গল্পে আহ্লাদির মুখে কে দেখতে পায় নিজ মেয়ের মুখের ছাপ?
(ক) কৈলাশ (খ) জগু
(গ) রহমান (ঘ) কানাই
উত্তর: (গ) রহমান

২৮। ‘মাসি-পিসি’ গল্পে দুই বিধবার চরিত্রে মিল কিসে?
(ক) জামাইকে ঠকানোর চিন্তায় (খ) দায়িত্বশীলতা ও মানবিক জীবনযুদ্ধে
(গ) নৌকা চালানোর পারদর্শিতায় (ঘ) ব্যবসায় বুদ্ধিতে
উত্তর: (খ) দায়িত্বশীলতা ও মানবিক জীবনযুদ্ধে

২৯। ‘মাসি-পিসি’ গল্পের মূল উপজীব্য হচ্ছে—
(ক) পুরুষতান্ত্রিকতা (খ) স্বামী কর্তৃক নির্যাতন
(গ) নারীর অসহায়ত্ব (ঘ) নারীর দারিদ্র্য
উত্তর: (গ) নারীর অসহায়ত্ব

৩০। কোনটি মানিক বন্দ্যোপাধ্যায়ের উপন্যাস নয়?
(ক) জননী (খ) প্রাগৈতিহাসিক
(গ) পদ্মানদীর মাঝি (ঘ) দিবারাত্রির কাব্য
উত্তর: (খ) প্রাগৈতিহাসিক (এটি একটি ছোটগল্প গ্রন্থ)

৩১। ‘মাসি-পিসি’ গল্পে ‘ডরাসনি’ ভয় কিসের? কোন প্রসঙ্গে এ উক্তি করা হয়েছে?
(ক) স্বামীর ঘর করা (খ) কাছারিবাড়ি যাওয়া
(গ) বাবার জমিজমা দেখা (ঘ) রাতে একা থাকা
উত্তর: (ক) স্বামীর ঘর করা

৩২। ‘মাসি-পিসি’ গল্প অবলম্বনে “পিসির হাতে ছিল— মাসি নিয়ে আসে—”
(ক) কাটারি, বঁটি (খ) বঁটি, কাটারি
(গ) রামদা, বঁটি (ঘ) কাটারি, রামদা
উত্তর: (ক) কাটারি, বঁটি

৩৩। কানাই চৌকিদার কখন মাসি-পিসির সন্ধান করতে আসে?
(ক) শুক্লপক্ষের একাদশীর দিন (খ) দ্বাদশীর দিন
(গ) দ্বাদশীর রাত্রে (ঘ) অমাবস্যার অন্ধকারে
উত্তর: (গ) দ্বাদশীর রাত্রে

৩৪। ‘বেমক্কা’ শব্দের অর্থ—
(ক) অসতর্ক (খ) অসংযত
(গ) অসংগত (ঘ) অসমর্থ
উত্তর: (গ) অসংগত

৩৫। ‘মাসি-পিসি’ গল্পে চৌকিদারের নাম কী?
(ক) কানাই (খ) ওসমান
(গ) রহমান (ঘ) কৈলেশ
উত্তর: (ক) কানাই

৩৬। কানাইয়ের সাথে গোকুলের কতজন পেয়াদা এসেছিলেন?
(ক) দুই (খ) তিন
(গ) চার (ঘ) পাঁচ
উত্তর: (খ) তিন

৩৭। মাসি-পিসি আহ্লাদিকে জগুর কাছে পাঠাতে চায়নি কেন?
(ক) নির্যাতনের ভয়ে (খ) স্নেহের আতিশয্যে
(গ) দারিদ্র্যের কারণে (ঘ) আহ্লাদি যেতে চায়নি বলে
উত্তর: (ক) নির্যাতনের ভয়ে

উদ্দীপকের আলোকে ৩৮ ও ৩৯ নং প্রশ্নের উত্তর দাও:
দেখি নাই যারে, চিনি নাই যারে
শুনি নাই নাম কভু
তিনিই আজকে দেবতা আমার
তিনিই আমার প্রভু।

৩৮। উদ্দীপকের প্রভু ‘মাসি-পিসি’ রচনার কার সাথে সাদৃশ্যপূর্ণ?
(ক) লেখকের (খ) জগুর
(গ) কৈলেশের (ঘ) গোকুলের
উত্তর: (খ) জগুর

৩৯। উভয়ের মধ্যে যে বৈশিষ্ট্য প্রকাশ পেয়েছে তা হলো:
(ক) আধিপত্য (খ) পাণ্ডিত্য
(গ) স্বৈরাচারী (ঘ) অহংবোধ
উত্তর: (গ) স্বৈরাচারী

৪০। মানিক বন্দ্যোপাধ্যায় বাজি ধরে লিখেছেন কোন গল্প?
(ক) সরীসৃপ (খ) অতসীমামী
(গ) হলুদ পোড়া (ঘ) আফলাতুন
উত্তর: (খ) অতসীমামী

৪১। বাহকের মাথায় খড় চাপাতে ব্যস্ত ছিল—
(ক) মাসি (খ) রহমান
(গ) আহ্লাদি (ঘ) কৈলাশ
উত্তর: (খ) রহমান

৪২। শালতি থেকে খড়ের বোঝা কতজনের মাথায় চড়ে উপরে জমা হচ্ছে?
(ক) দুইজনের (খ) তিনজনের (গ) চারজনের (ঘ) অনেক
উত্তর: (খ) তিনজনের

৪৩। মাসি-পিসির কাপড়ের আঁচল কোমরে বাঁধা ছিল—
(ক) কানাইয়ের সাথে ঝগড়া করছিল বলে (খ) ঘড়া থেকে পানি আনছিল বলে
(গ) তরকারি বিক্রি করছিল বলে (ঘ) শালতির লাগি ঠেলছিল বলে
উত্তর: (ঘ) শালতির লাগি ঠেলছিল বলে

৪৪। মাসি-পিসির গলা খসখসে, আওয়াজ একটু মোটা, একটু ঝঙ্কার আছে। এখানে ‘ঝঙ্কার’ শব্দ দ্বারা প্রকাশ পেয়েছে মাসি-পিসি—
(ক) অসাহিত্য (খ) আত্মবিশ্বাসী (গ) প্রতিবাদী (ঘ) অহংকারী
উত্তর: (ক) অসাহিত্য

৪৫। কৈলাশের প্রতিবাদের অন্তরালে মূলত কী লুকিয়ে আছে?
(ক) ভণ্ডামি (খ) শঠতা (গ) মিথ্যাচার (ঘ) সরলতা
উত্তর: (গ) মিথ্যাচার

৪৬। “জগু আর সেই জগু নেই। বৌকে নিতে চায় এখন।”— আলোচ্য সংলাপে জগু পুনরায় বৌকে নিতে চায় কেন?
(ক) নিজের ভুল বুঝতে পেরে (খ) নবজাতকের আগমনে
(গ) সম্পত্তির লোভে (ঘ) আহ্লাদির বাপ, মা ও ভাই মারা যাওয়ার কারণে
উত্তর: (গ) সম্পত্তির লোভে

৪৭। শ্বশুরবাড়িতে না যাওয়ার জন্য কে দাপাদাপি করে কেঁদেছে?
(ক) আহ্লাদি (খ) মাসি (গ) রহমানের মেয়ে (ঘ) পিসি
উত্তর: (গ) রহমানের মেয়ে

৪৮। আহ্লাদির দিকে কে ছলছল চোখে তাকায়?
(ক) কৈলেশ (খ) রহমান (গ) জগু (ঘ) মাসি
উত্তর: (খ) রহমান

৪৯। “মরবে তোমরা জান মাসি, জান পিসি, মারা পড়বে তোমরা একেবারে।” উক্তিটির মধ্যে প্রচ্ছন্ন আছে—
(ক) প্রতিশোধ নেওয়া (খ) ভয় দেখানো (গ) গায়ের জোর বোঝানো (ঘ) অধিকার খাটানো
উত্তর: (খ) ভয় দেখানো

৫০। কৈলাশের হুমকি শুনে মাসি-পিসি মুখ চাওয়া-চাওয়ি করল কেন?
(ক) নিজেদের ভাবনার আদান-প্রদান করতে (খ) কৈলাশকে শায়েস্তা করতে
(গ) জগুকে শায়েস্তা করতে (ঘ) আহ্লাদির জন্য চিন্তিত হয়ে
উত্তর: (ক) নিজেদের ভাবনার আদান-প্রদান করতে

৫১। আহ্লাদির বাবা মাসি-পিসির খাওয়া ছাঁটাই করেছিল কেন?
(ক) অভিমান করে (খ) অভাবের তাড়নায় (গ) বিরক্ত হয়ে (ঘ) শত্রুতা বশত
উত্তর: (খ) অভাবের তাড়নায়

৫২। “তোর মেসো ঠিক ছিল, শাশুড়ি-ননদ ছিল বাঘ।”— এখানে বাঘ কী অর্থে ব্যবহৃত হয়েছে?
(ক) ভয়ংকর (খ) হিংস্র (গ) নিষ্ঠুর (ঘ) ক্রুদ্ধ
উত্তর: (গ) নিষ্ঠুর

৫৩। মাসি-পিসির মধ্যে গভীর ভাব গড়ে ওঠার কারণ—
(ক) অর্থ উপার্জন (খ) দুজনেই আশ্রিত
(গ) একসাথে ব্যবসা করে (ঘ) আহ্লাদির দায়িত্ব কাঁধে পড়ায়
উত্তর: (ঘ) আহ্লাদির দায়িত্ব কাঁধে পড়ায়

৫৪। মাসি-পিসির মধ্যে সম্পর্কের দূরত্ব ঘুচে যায় কীভাবে?
(ক) আহ্লাদির দায়িত্ব গ্রহণে (খ) শাক-সবজির ব্যবসায় নেমে
(গ) দুর্ভিক্ষে পতিত হয়ে (ঘ) দুজনে বিধবা হওয়ায়
উত্তর: (খ) শাক-সবজির ব্যবসায় নেমে

৫৫। ‘নিজেকে তার ছ্যাঁচড়া, নোংরা, নর্দমার মতো লাগে।’— ‘মাসি-পিসি’ গল্পে উক্তিটি দ্বারা আহ্লাদি চরিত্রের কোন বৈশিষ্ট্যটি ফুটে উঠেছে?
(ক) অপরাধ প্রবণতা (খ) অনুশোচনা (গ) আত্মসম্মানবোধ (ঘ) হতাশা
উত্তর: (গ) আত্মসম্মানবোধ

৫৬। মাসির প্রতি পিসির অবজ্ঞা ছিল কেন?
(ক) অবাচিত মনে করে (খ) বেশি অর্থ উপার্জন করায়
(গ) সব বিষয়ে খবরদারি করায় (ঘ) পিসিকে নিন্দা করায়
উত্তর: (ক) অবাচিত মনে করে

৫৭। মাসি-পিসির সমস্ত মন জুড়ে কিসের ভাবনা রয়েছে?
(ক) নতুন ব্যবসার (খ) জীবন সংগ্রামের (গ) আহ্লাদিকে রক্ষার (ঘ) শালতি কেনার
উত্তর: (গ) আহ্লাদিকে রক্ষার

৫৮। মাসি-পিসি উপোস থাকে কখন?
(ক) দুর্গাপূজায় (খ) লক্ষ্মীপূজায় (গ) শুক্লপক্ষের একাদশীতে (ঘ) কৃষ্ণপক্ষের দ্বাদশীতে
উত্তর: (গ) শুক্লপক্ষের একাদশীতে

৫৯। সরকার বাবুর সাথে মাসি-পিসির ঝগড়া হয়েছে কী নিয়ে?
(ক) আহ্লাদির বর নিয়ে (খ) তরকারি বিক্রি নিয়ে
(গ) বাজারে জায়গা দখল নিয়ে (ঘ) বাজারের তোলা নিয়ে
উত্তর: (ঘ) বাজারের তোলা নিয়ে

৬০। ‘মাসি-পিসি’ গল্পে গাঁয়ের গুণ্ডা কে?
(ক) কৈলেশ (খ) কানাই (গ) ওসমান (ঘ) রহমান
উত্তর: (গ) ওসমান

৬১। ‘সেই এখানকার কর্তা, সেই সর্বেসর্বা’— ‘মাসি-পিসি’ গল্পে এ উক্তিটি দিয়ে কী বোঝানো হয়েছে?
(ক) আহ্লাদির মনোভাব (খ) প্রতিবেশীদের দৃঢ়তা (গ) পুরুষতান্ত্রিকতা (ঘ) মোড়লিপনা
উত্তর: (গ) পুরুষতান্ত্রিকতা

৬২। ‘মাসি-পিসি’ গল্পে কানাই কার চৌকিদার?
(ক) কৈলাশের (খ) রহমানের (গ) সরকার বাবুর (ঘ) কর্তাবাবুর
উত্তর: (ঘ) কর্তাবাবুর

৬৩। ‘মাসি-পিসি’ গল্পের খলনায়ক কে?
(ক) বংশী (খ) কৈলাশ (গ) রহমান (ঘ) গোকুল
উত্তর: (ঘ) গোকুল

৬৪। পাড়ার লোক ছুটে এলে মাসি-পিসি কার কার চৌদ্দপুরুষ উদ্ধার করতে সাহস পায়?
(ক) গোকুল ও কৈলাশের (খ) গোকুল ও দারোগাবাবুর
(গ) কৈলাশ ও দারোগাবাবুর (ঘ) জগু, কৈলাশ ও জমিদারের লোকদের
উত্তর: (খ) গোকুল ও দারোগাবাবুর

৬৫। ‘আহ্লাদির বাপের আমলের গোরুটা নেই’— কী আছে?
(ক) গোয়ালঘর (খ) দড়ি (গ) গামলা (ঘ) ঘড়া
উত্তর: (গ) গামলা

৬৬। ‘মাসি-পিসি’ গল্পে ‘কাটারি’ অর্থ কী?
(ক) কাটতির যন্ত্র (খ) কাঁটা খেলা (গ) কাটবার অস্ত্র (ঘ) কাঁটা দেওয়া
উত্তর: (গ) কাটবার অস্ত্র

৬৭। ‘ব্যঞ্জন’ শব্দের অর্থ কী?
(ক) রান্না করা শাক (খ) রান্না করা তরকারি
(গ) রান্না করা ডাল (ঘ) রান্না করা মাছ
উত্তর: (খ) রান্না করা তরকারি

৬৮। ‘মাসি-পিসি’ গল্পটিকে তাৎপর্যপূর্ণ করে তুলেছে মাসি-পিসির কোন দিকটি?
(ক) তাদের বুদ্ধিদীপ্ত চেতনা (খ) স্নেহপরায়ণতা
(গ) প্রতিবাদী ভূমিকা (ঘ) মাতৃত্বের মহিমা
উত্তর: (ক) তাদের বুদ্ধিদীপ্ত চেতনা

৬৯। ‘মাসি-পিসি’ গল্পের মূল উপজীব্য বিষয় কোনটি?
(ক) নারী জীবনের অস্তিত্বের সংকট (খ) বিধবা বিবাহ
(গ) যৌতুকপ্রথা (ঘ) পিতৃহীন তরুণীর কাহিনী
উত্তর: (ক) নারী জীবনের অস্তিত্বের সংকট

৭০। ‘মাসি-পিসি’ গল্পের বৈচিত্র্যময় দিক কোনটি?
(ক) অত্যাচারের কাহিনী (খ) কথ্য ভাষার প্রয়োগ
(গ) নারীর ব্যবসা পরিচালনা (ঘ) স্বামী কর্তৃক নির্যাতন
উত্তর: (গ) নারীর ব্যবসা পরিচালনা

৭১। ‘মাসি-পিসি’ গল্পে মাসি-পিসি কেমন প্রকৃতির?
(ক) অবলা শ্রমজীবী নগরী সমাজের প্রতিনিধি (খ) অত্যন্ত নিরীহ শ্রেণির প্রতিনিধি
(গ) উচ্চবংশীয় শ্রমজীবী সমাজের প্রতিনিধি (ঘ) নিম্নশ্রেণির শ্রমজীবী, সাহসী নারীর প্রতিনিধি
উত্তর: (ঘ) নিম্নশ্রেণির শ্রমজীবী, সাহসী নারীর প্রতিনিধি

৭২। খড় বহনকারীরা পথে খড় ফেলেছিল কেন?
(ক) চলায় স্বাচ্ছন্দ্য আনতে (খ) বোঝা হালকা করতে
(গ) কাদা থেকে পা বাঁচাতে (ঘ) মালিকের আদেশ ছিল
উত্তর: (গ) কাদা থেকে পা বাঁচাতে

৭৩। “মোটা ময়লা থানের আঁচল দুজনেরই কোমরে বাঁধা”— এখানে ‘থান’ বলতে কী বোঝানো হয়েছে?
(ক) ওড়না (খ) শাড়ি (গ) গামছা (ঘ) চাদর
উত্তর: (খ) শাড়ি

৭৪। মাসি-পিসির শালতির গতি ঠেকানোর কারণ কী?
(ক) কৈলাশের আহ্বান (খ) রহমানের আহ্বান (গ) জগুর আহ্বান (ঘ) দারোগাবাবুর আহ্বান
উত্তর: (ক) কৈলাশের আহ্বান

৭৫। ‘মাসি-পিসির গলা খসখসে’— এর মাধ্যমে কী বোঝানো হয়েছে?
(ক) স্পষ্ট মনোভাব (খ) রুক্ষ মনোভাব (গ) উগ্র মনোভাব (ঘ) তিক্ত মনোভাব
উত্তর: (খ) রুক্ষ মনোভাব

৭৬। ‘খুনসুটি রাখো দিকি কৈলেশ তোমার’ মাসির এ উক্তিটিতে কৈলেশের প্রতি কী প্রকাশ পেয়েছে?
(ক) স্নেহ (খ) বিরক্তি (গ) অবজ্ঞা (ঘ) ক্ষোভ
উত্তর: (খ) বিরক্তি

৭৭। জগু আহ্লাদিকে কীভাবে ছ্যাকা দিত?
(ক) খুন্তি গরম করে (খ) বিড়ি দিয়ে (গ) কলকে পুড়িয়ে (ঘ) চ্যালা কাঠ পুড়িয়ে
উত্তর: (গ) কলকে পুড়িয়ে

৭৮। ‘শত অত্যাচারের পরেও জগু বাড়িতে এলে তার আদর-আপ্যায়নে বিন্দুমাত্র ত্রুটি করা হবে না।’— এই ভাবনার মধ্যে মাসি-পিসির যে পরিচয় বিধৃত—
(ক) কৌশল মাত্র (খ) বুদ্ধিদীপ্ত ছলনা (গ) স্বাভাবিক সৌজন্যবোধ (ঘ) দূরদর্শিতা
উত্তর: (ঘ) দূরদর্শিতা

৭৯। ‘আহ্লাদি একটা শব্দ করে, অস্ফুট আর্তনাদের মতো।’— আহ্লাদি এরূপ করেছিল কেন?
(ক) ভয় পেয়েছিল (খ) পেট কামড়েছিল (গ) চোখে পোকা পড়েছিল (ঘ) মাথা ঘোরাচ্ছিল
উত্তর: (ক) ভয় পেয়েছিল

৮০। ‘মাসি-পিসি’ গল্পে পাতাশূন্য গাছটাতে কোন পাখির দল উড়ে এসে বসেছে?
(ক) শালিকের (খ) কাকের (গ) চিলের (ঘ) শকুনের
উত্তর: (ঘ) শকুনের

৮১। ‘দূর ছাই সয়ে আর কুড়িয়ে পেতে খেয়ে’ বলতে কী বোঝানো হয়েছে?
(ক) অবজ্ঞা আর অবহেলার দূরে সরিয়ে দেওয়া (খ) তুচ্ছ-তাচ্ছিল্যের মধ্যে খেয়ে, না খেয়ে বেঁচে থাকা
(গ) পরিশ্রম করেও পেটপুরে খেতে না পাওয়া (ঘ) তরি-তরকারি আর ছাই বেঁচে জীবন ধারণা
উত্তর: (খ) তুচ্ছ-তাচ্ছিল্যের মধ্যে খেয়ে, না খেয়ে বেঁচে থাকা

৮২। আহ্লাদি কখন স্বামীর বাড়ি থেকে বাপের বাড়ি এসেছিল?
(ক) খরার সময় (খ) বন্যার সময় (গ) মহামারির সময় (ঘ) দুর্ভিক্ষের সময়
উত্তর: (ঘ) দুর্ভিক্ষের সময়

৮৩। ‘মরণ ঠেকাতেই ফুরিয়ে আসছে তাদের জীবনীশক্তি।’— ‘মাসি-পিসি’ গল্পে উপর্যুক্ত বাক্যে কোন সময়ের উল্লেখ করা হয়েছে?
(ক) দুর্ভিক্ষের মর্মস্পর্শিতার (খ) জোতদারের অত্যাচারের
(গ) মানবিক জীবনযুদ্ধের (ঘ) সংগ্রাম পরিচালনার
উত্তর: (ক) দুর্ভিক্ষের মর্মস্পর্শিতার

৮৪। ‘উড়ে এসে জুড়ে বসা’ বলতে কী বোঝায়?
(ক) অনধিকার চর্চা (খ) ওড়াউড়ি স্বভাব (গ) বাজে স্বভাব (ঘ) বসে থাকার স্বভাব
উত্তর: (ক) অনধিকার চর্চা

৮৫। মাসির ওপর পিসির অবজ্ঞা ও অবহেলার ভাব ছিল কেন?
(ক) পিসির নিজের বাড়ি বলে (খ) পিসির বাপের বাড়ি বলে
(গ) পিসি বদমেজাজি বলে (ঘ) পিসির শারীরিক শক্তি বেশি বলে
উত্তর: (খ) পিসির বাপের বাড়ি বলে

৮৬। ‘মাসি-পিসি’ গল্পে আহ্লাদি একটি বিন্দুমাত্র। তাকে কেন্দ্র করে বৃত্ত রচনা করেছে মাসি-পিসি। এই বৃত্তটা কীসের?
(ক) মমতা ও মানবতার (খ) আত্মীয়তা ও কর্তব্যের
(গ) বুদ্ধি ও সাহসের (ঘ) দায়িত্ব ও সংগ্রামের
উত্তর: (ঘ) দায়িত্ব ও সংগ্রামের

৮৭। জগুর বউ নেওয়ার আগ্রহে কোন বিষয়টি ফুটে উঠেছে?
(ক) সচেতনতা (খ) মানবিকতাবোধ
(গ) সামাজিকতা (ঘ) লোভী মানসিকতা
উত্তর: (ঘ) লোভী মানসিকতা

৮৮। আহ্লাদিকে পাওয়ার জন্য কে মাসি-পিসিকে পাগল করে তুলেছে?
(ক) কৈলাশ (খ) জগু
(গ) দারোগাবাবু (ঘ) গোকুল
উত্তর: (ঘ) গোকুল

৮৯। শুক্লপক্ষের একাদশীতে মাসি-পিসি উপোষ করেছেন কেন?
(ক) পুণ্যের আশায় (খ) আহ্লাদির কল্যাণ কামনায়
(গ) অনাগত সন্তানের মঙ্গলাকাঙ্ক্ষায় (ঘ) মানত পূরণে
উত্তর: (ক) পুণ্যের আশায়

৯০। আগন্তুকরা খানিকটা ভ্যাবাচাকা খেয়ে গিয়েছিল কেন?
(ক) মাসি-পিসির দৃঢ়তা দেখে (খ) লোকজন জড় হতে দেখে
(গ) দারোগাকে পালাতে দেখে (ঘ) মাসি-পিসির বঁটি দেখে
উত্তর: (ক) মাসি-পিসির দৃঢ়তা দেখে

৯১। ‘মোরা নয় মরব’— উক্তিটিতে নিচের কোন ভাবটি প্রকাশ পেয়েছে?
(ক) সংগ্রামী চেতনা (খ) অকুতোভয় মানসিকতা
(গ) মৃত্যু চেতনা (ঘ) জেদি মনোভাব
উত্তর: (খ) অকুতোভয় মানসিকতা

৯২। কানাই দলবল নিয়ে কেন অদৃশ্য হয়ে যায়?
(ক) মাসি-পিসির চিৎকারে (খ) মাসি-পিসির ধমক খেয়ে
(গ) মাসি-পিসি ধাওয়া দিলে (ঘ) মাসি-পিসির সাহসিকতায়
উত্তর: (ঘ) মাসি-পিসির সাহসিকতায়

৯৩। ‘মাসি-পিসি’ বুকে নতুন জোর পায় কীভাবে?
(ক) কানাইদের পালিয়ে যেতে দেখে (খ) দারোগাকে শিক্ষা দিতে পারায়
(গ) পাড়া-প্রতিবেশীদের সহযোগিতা দেখে (ঘ) আহ্লাদির আনুগত্য দেখে
উত্তর: (গ) পাড়া-প্রতিবেশীদের সহযোগিতা দেখে

৯৪। ‘যুদ্ধের আয়োজন করে তৈরি হয়ে বসে থাকে মাসি-পিসি’-বাক্যটিতে মাসি-পিসি চরিত্রের কোন দিকটি ফুটে উঠেছে?
(ক) প্রতিশোধপরায়ণতা (খ) প্রতিবাদী রূপ
(গ) নির্ভীকতা (ঘ) রুদ্রমূর্তি
উত্তর: (খ) প্রতিবাদী রূপ

৯৫। ‘শালতি’ শব্দের অর্থ কী?
(ক) বৈঠা (খ) নৌকা
(গ) লগি (ঘ) ছাউনি
উত্তর: (খ) নৌকা

৯৬। কদমছাঁট চুল বলতে কেমন চুলকে বোঝায়?
(ক) কাঁধ পর্যন্ত লম্বা চুল (খ) কোঁকড়ানো চুল
(গ) ছোট করে ছাঁটা চুল (ঘ) আধাপাকা চুল
উত্তর: (গ) ছোট করে ছাঁটা চুল

৯৭। নৌকা চালানোর জন্য ব্যবহৃত বাঁশের দণ্ডকে কী বলা হয়?
(ক) লগি (খ) বৈঠা
(গ) শালতি (ঘ) লাঠি
উত্তর: (ক) লগি

৯৮। ‘সোমত্ত’ শব্দের অর্থ কী?
(ক) সমর্থ (খ) স্বার্থ
(গ) সুপ্ত (ঘ) ধৈর্য
উত্তর: (ক) সমর্থ

৯৯। ‘খুনসুটি’ কী?
(ক) হাসি-তামাশা (খ) মারামারি
(গ) অন্যায় দাবি (ঘ) পক্ষপাতিত্ব
উত্তর: (ক) হাসি-তামাশা

১০০। ‘মাসি-পিসি’ গল্পটির সারকথা কোনটি?
(ক) আপসহীন নারী (খ) বুদ্ধিমতী নারী
(গ) সংগ্রামী নারী (ঘ) ঐক্যবদ্ধ নারী
উত্তর: (গ) সংগ্রামী নারী

১০১। খালে কাদা, ভাঙা ইটপাটকেল আর ওজনে ভারী আবর্জনা বেরিয়ে পড়ে গেছে কেন?
(ক) জোয়ারের জন্য (খ) ভাটার জন্য
(গ) সেচের কারণে পানি কমে গেছে বলে (ঘ) খালে বাঁধ দিয়ে জল শুকানোর জন্য
উত্তর: (খ) ভাটার জন্য

১০২। প্রৌঢ়া বিধবা মানে—
(ক) প্রবীণ স্বামীহীন নারী (খ) স্বামীহীন তেজস্বী নারী
(গ) চল্লিশোর্ধ্ব স্বামীহীন নারী (ঘ) অল্পবয়সী স্বামীহীন নারী
উত্তর: (গ) চল্লিশোর্ধ্ব স্বামীহীন নারী

১০৩। নৌকা দিয়ে আসার সময় আহ্লাদির পরনে কী ছিল?
(ক) নকশা পাড়ের সস্তা সাদা শাড়ি (খ) নকশাহীন দামি রঙিন শাড়ি
(গ) রঙিন পাড়ের সস্তা সাদা শাড়ি (ঘ) নকশা পাড়ের সস্তা নীল শাড়ি
উত্তর: (ক) নকশা পাড়ের সস্তা সাদা শাড়ি

১০৪। মাসি-পিসি দুজনে শালতির দুমাথায় থাকলে কৈলাশের খবরটা বলা সম্ভব নয় কেন?
(ক) খবরটা গোপন বলে (খ) আহ্লাদি শুনে ফেলবে বলে
(গ) তাদের দূরত্ব অনেক বেশি বলে (ঘ) কৈলাশকে জোরে বলতে হবে বলে
উত্তর: (ক) খবরটা গোপন বলে

১০৫। কৈলাশের কথা আহ্লাদি কান পেতে শোনে কেন?
(ক) তার স্বামী খবর পাঠিয়েছে বলে (খ) স্বামীর কাছে সব ফাঁস করে দেওয়ার জন্য
(গ) স্বামীর খবর জানতে কৌতূহলী বলে (ঘ) কৈলাশ তার স্বামীর বন্ধু বলে
উত্তর: (গ) স্বামীর খবর জানতে কৌতূহলী বলে

১০৬। কৈলাশের প্রথমে খুনসুটিকরে কথা বলার কারণ—
(ক) মাসি-পিসিকে ভয় পায় বলে (খ) মাসি-পিসির সাথে ভাব জমাতে
(গ) মাসি-পিসিকে পরোক্ষভাবে ভয় দেখাতে (ঘ) জগুর কাছে সহজে আহ্লাদিকে পাঠাতে রাজি করাতে
উত্তর: (খ) মাসি-পিসির সাথে ভাব জমাতে

১০৭। বুড়ো রহমান ছলছল দৃষ্টিতে আহ্লাদির দিকে তাকায় কেন?
(ক) আহ্লাদির দুঃখে সমব্যথী হয়ে (খ) মমতাবোধে তাড়িত হয়ে
(গ) আহ্লাদিকে দেখে মেয়ের কথা মনে পড়ে বলে (ঘ) আহ্লাদির ওপর অত্যাচার হয় বলে
উত্তর: (গ) আহ্লাদিকে দেখে মেয়ের কথা মনে পড়ে বলে

১০৮। বছরের পর বছর ধরে মাসি-পিসি কিছু টাকা পুঁজি করেছিল কেন?
(ক) আহ্লাদিকে দেওয়ার জন্য (খ) দুঃসময়ে খরচের জন্য
(গ) দুর্ভিক্ষে খরচের জন্য (ঘ) আহ্লাদির পিতাকে দেওয়ার জন্য
উত্তর: (খ) দুঃসময়ে খরচের জন্য

১০৯। দুর্ভিক্ষের সময়ে মাসি-পিসিদের থাকাটা বরাদ্দ রেখে খাওয়াটা ছাঁটাই করার কারণ—
(ক) অর্থনৈতিক সংকট (খ) সামাজিক সংকট
(গ) পারিবারিক সংকট (ঘ) রাজনৈতিক সংকট
উত্তর: (ক) অর্থনৈতিক সংকট

১১০। আহ্লাদির বাবা গলা কেটে রক্ত দিয়ে মাসি-পিসি ঋণ শোধ দিতে পারলেও অন্ন জোগান দিতে পারবে না কেন?
(ক) অর্থনৈতিক সক্ষমতা নেই বলে (খ) তার চাকরি চলে গেছে বলে
(গ) মহামারিতে আক্রান্ত বলে (ঘ) আহ্লাদির মা রাগ করবে বলে
উত্তর: (ক) অর্থনৈতিক সক্ষমতা নেই বলে

১১১। আহ্লাদিকে একা রেখে কোথাও যেতে মাসি-পিসির সাহস হয় না কেন?
(ক) একা পেয়ে কেউ তার ক্ষতি করবে ভেবে (খ) জগু তুলে নিয়ে যাবে ভেবে
(গ) একা থাকতে আহ্লাদি ভয় পায় বলে (ঘ) তারা আহ্লাদিকে অনেক ভালোবাসে বলে
উত্তর: (ক) একা পেয়ে কেউ তার ক্ষতি করবে ভেবে

১১২। “ভাওতা দিয়ে আমাদের দমাবার ফিকির সব।”— এখানে ‘ভাওতা’ শব্দের প্রতিরূপ হলো—
(ক) ভয় (খ) চালবাজি
(গ) প্রতারণা (ঘ) হুমকি
উত্তর: (খ) চালবাজি

১১৩। বাইরে দিন কাটালেও আহ্লাদির কোনো পরিশ্রম হয়নি কেন?
(ক) শুয়ে-বসে ছিল বলে (খ) মাসি-পিসি কাজ করতে দেয়নি বলে
(গ) মাসি-পিসি নিজেরাই নৌকা চালিয়েছে বলে (ঘ) আহ্লাদি নিজে থেকে কোনো কাজ করতে চায়নি বলে
উত্তর: (ক) শুয়ে-বসে ছিল বলে

১১৪। আহ্লাদির নিজেকে ছ্যাঁচড়া, নোংরা, নর্দমার মতো লাগে কেন?
(ক) গোকুলের ভয়ে (খ) মাসি-পিসির কাছে অনেক দর হাঁকে বলে
(গ) তরি-তরকারির মতো তাকে লোকজন কিনতে চায় বলে (ঘ) তার জন্য মাসি-পিসিকে অনেক দুর্ভোগ পোহাতে হচ্ছে বলে
উত্তর: (ঘ) তার জন্য মাসি-পিসিকে অনেক দুর্ভোগ পোহাতে হচ্ছে বলে

১১৫। জগু এলে মাসি-পিসি আহ্লাদিকে আনন্দের অভিনয় করতে শিখিয়ে দিতে চায় কেন?
(ক) জামাইকে শান্ত রাখতে (খ) যাতে আহ্লাদিকে না নিতে চায় সেজন্য
(গ) জামাইকে গোকুলের বিরুদ্ধে চড়াও হতে (ঘ) জগু যাতে মামলা না করে সেজন্য
উত্তর: (খ) যাতে আহ্লাদিকে না নিতে চায় সেজন্য

১১৬। মাসি-পিসি মূলত কোন সমাজের কাছে হার মেনেছে?
(ক) সন্ত্রাসী সমাজের (খ) মাতৃতান্ত্রিক সমাজের
(গ) পুরুষতান্ত্রিক সমাজের (ঘ) বাবুশাসিত সমাজের
উত্তর: (গ) পুরুষতান্ত্রিক সমাজের

১১৭। কানাইয়ের দলবল নিয়ে অদৃশ্য হওয়ার প্রধান কারণ—
(ক) মাসি-পিসির হাত থেকে বাঁচা (খ) জনরোষ থেকে বাঁচা
(গ) মাসি-পিসির হাঁকডাক (ঘ) বঁটি-কাটারির কোপ থেকে বাঁচা
উত্তর: (খ) জনরোষ থেকে বাঁচা

১১৮। হট্টগোলের পর রাত্রিটাকে আরও নিঝুম আর থমথমে মনে হওয়ার কারণ—
(ক) অজানা আতঙ্ক (খ) রাত্রির নিস্তব্ধতা
(গ) প্রতিবেশীদের চলে যাওয়া (ঘ) কানাইদের ওত পেতে থাকা
উত্তর: (ক) অজানা আতঙ্ক

১১৯। কেন দুর্বৃত্তরা সোনারের ঘরে আগুন দেয়?
(ক) মেয়েকে কুটুম বাড়িতে পাঠানোয় (খ) মেয়েকে স্কুলে পাঠানোয়
(গ) মেয়েকে বিয়ে দেওয়ায় (ঘ) মেয়েকে ঘরে আটকে রাখায়
উত্তর: (ক) মেয়েকে কুটুম বাড়িতে পাঠানোয়

১২০। অত্যাচারী স্বামী, লালসা উন্মত্ত জোতদার ও দারোগার বিরুদ্ধে মাসি-পিসির কোন দিকটি প্রশংসনীয়?
(ক) দায়িত্বশীল ও মানবিক জীবনযুদ্ধ (খ) সংগ্রামী মানস
(গ) জীবন পরিচালনায় কঠিন সংগ্রাম (ঘ) নিপীড়িত আহ্লাদির প্রতি মাতৃপ্রেম
উত্তর: (ক) দায়িত্বশীল ও মানবিক জীবনযুদ্ধ

১২১। ‘মাসি-পিসি’ গল্পে ‘শকুন’ কিসের প্রতীক?
(ক) দুঃশাসন (খ) দীর্ঘশ্বাস
(গ) হাহাকার (ঘ) মন্বন্তর
উত্তর: (ঘ) মন্বন্তর

১২২। পিসি কৈলাশকে আসল খবর বলার তাগিদ দেয় কেন?
(ক) বেলা নেই বলে (খ) মোদ্দা কথা শোনার অভিপ্রায়ে
(গ) সময় নষ্ট হচ্ছে বলে (ঘ) আহ্লাদি উদ্বিগ্ন বলে
উত্তর: (ক) বেলা নেই বলে

১২৩। কৈলাশ আহ্লাদিকে শুনিয়ে শুনিয়ে কথা বলার কারণ কী?
(ক) যাতে আহ্লাদি মাসি-পিসিকে সতর্ক করিয়ে দেয় (খ) যাতে জগুকে আগের মতো সম্মান করে
(গ) যাতে ভয় পেয়ে জগুর কাছে ফিরে যায় (ঘ) যাতে আহ্লাদি কান্নাকাটি শুরু করে দেয়
উত্তর: (গ) যাতে ভয় পেয়ে জগুর কাছে ফিরে যায়

১২৪। ‘মাসি-পিসি’ গল্পে মাসি ও পিসির একাত্মতার কারণ কোনটি?
i. উভয়েই বিধবা
ii. আহ্লাদির প্রতি দায়িত্বশীলতা
iii. জীবন সংগ্রাম
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১২৫। ‘দারোগা বাবু এসে বসে আছেন বাবুর সাথে’— ‘মাসি-পিসি’ গল্পের এ বাক্যে প্রকাশ পায়—
i. বাবুর সাথে দারোগা বাবুর সুসম্পর্ক রয়েছে
ii. দারোগা বাবুর হুকুম পালন করতে হবে
iii. দারোগা বাবু মাসিপিসির বিচার করতে এসেছেন
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১২৬। যে শক্তির দ্বারা মাসি-পিসি আহ্লাদিকে প্রতিকূল পরিবেশ থেকে বাঁচাতে সক্ষম হয়েছিল, তা হচ্ছে—
i. সাহস
ii. ঐক্য
iii. গায়ের জোর
নিচের কোনটি সঠিক?
(ক) i (খ) ii (গ) i ও ii (ঘ) ii ও iii
উত্তর: (গ) i ও ii

উদ্দীপকের আলোকে ১২৭ ও ১২৮ নং প্রশ্নের উত্তর দাও:
ট্রেনে উঠেই বুড়ো লোকটাকে দেখলাম। সে আমার দিকে তাকালো করুণ দৃষ্টিতে। জানি না, আমার মতো তার একটা ছেলে ছিল কিনা।

১২৭। উদ্দীপকের বুড়ো লোকটার সাথে ‘মাসি-পিসি’ গল্পের কোন চরিত্রটি সমতা সৃষ্টি করে?
(ক) কৈলাশ (খ) রহমান (গ) বিপিন (ঘ) জগু
উত্তর: (খ) রহমান

১২৮। উদ্দীপকের মধ্যে যে ভাবটি প্রকাশ পেয়েছে ‘মাসি-পিসি’ গল্পের আলোকে এ ভাবকে বলা যায়—
i. পিতার ভালোবাসা
ii. সন্তান বাৎসল্য
iii. হারানোর যন্ত্রণা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১২৯ ও ১৩০ নং প্রশ্নের উত্তর দাও:
জহির রায়হানের ‘হাজার বছর ধরে’ উপন্যাসের গ্রামীণ যুবক আবুল বউ পিটিয়ে আনন্দ উপভোগ করে।

১২৯। উদ্দীপকের আবুলের সাথে ‘মাসি-পিসি’ গল্পের কোন চরিত্রের মিল রয়েছে?
(ক) কৈলেশ (খ) বুড়ো রহমান (গ) জগু (ঘ) গোকুল
উত্তর: (গ) জগু

১৩০। ‘মাসি পিসি’ গল্পের উক্ত চরিত্রের সাথে উদ্দীপকের আবুলের সাদৃশ্য কোথায়?
(ক) স্ত্রীর প্রতি নিষ্ঠুর আচরণে (খ) স্ত্রীর প্রতি অবজ্ঞায়
(গ) স্ত্রীর প্রতি নির্যাতনে (ঘ) স্ত্রীর প্রতি কর্তৃত্বপরায়ণতায়
উত্তর: (গ) স্ত্রীর প্রতি নির্যাতনে

উদ্দীপকের আলোকে ১৩১ ও ১৩২ নং প্রশ্নের উত্তর দাও:
রহিমা স্বামীর নির্যাতন সইতে না পেরে বিধবা ফুফু রাহেলা বেগমের নিকট চলে আসে। গ্রামের মাতব্বরের ছেলে জগলুর কুদৃষ্টি পড়ে তার ওপর। দৃঢ় প্রত্যয়ী রাহেলা বেগম মা-পাখির মতো আগলে রাখে অনাথা রহিমাকে।

১৩১। রাহেলা বেগম ‘মাসি-পিসি’ গল্পের কার প্রতিনিধিত্ব করেছেন?
(ক) মাসি-পিসি (খ) মাসি (গ) পিসি (ঘ) আহ্লাদি (ভুল মার্কিং ছিল ছবিতে, সঠিক উত্তর মাসি-পিসি হওয়ার কথা, তবে উদ্দীপক অনুযায়ী মাসি/পিসি উভয়েই হতে পারে।)
উত্তর: (ক) মাসি-পিসি

১৩২। উদ্দীপকটিতে ‘মাসি-পিসি’ গল্পের কোন দিকের প্রতিফলন ঘটেছে?
(ক) নারীর কঠোরতা (খ) পুরুষের লালসা
(গ) পণপ্রথা (ঘ) জীবিকার সংগ্রাম
উত্তর: (খ) পুরুষের লালসা

উদ্দীপকের আলোকে ১৩৩ ও ১৩৪ নং প্রশ্নের উত্তর দাও:
“শুনি রাজা কহে, ‘বাপু, জানো তো হে, করেছি বাগানখানা পেলে দুই বিঘে প্রস্থে ও দীর্ঘে সমান হইবে টানা ওটা দিতে হবে।’ ”

১৩৩। উদ্দীপকের রাজার সাথে ‘মাসি-পিসি’ গল্পের সাদৃশ্য চরিত্র কোনটি?
(ক) ঘোষ মশায় (খ) বিপিন (গ) জনাদ্দন (ঘ) গোকুল
উত্তর: (ঘ) গোকুল

১৩৪। উদ্দীপকে ‘মাসি-পিসি’ গল্পের কোন দিকটি প্রকাশ পেয়েছে?
(ক) দুর্বলের ওপর উৎপীড়ন (খ) অসহায়ের আক্ষেপ
(গ) আধিপত্যবাদ (ঘ) নীরব প্রতিবাদ
উত্তর: (গ) আধিপত্যবাদ

১৩৫। মাসি ও পিসি আগে রোজগার করত—
i. ধান ভেনে
ii. কাঁথা সেলাই করে
iii. হোগলা গেঁথে
নিচের কোনটি সঠিক?
(ক) i (খ) i ও ii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৩৬। ‘মাসি-পিসি’ গল্পে দুর্ভিক্ষের সময়—
i. মাসি-পিসি আহ্লাদিকে রক্ষা করেছে
ii. মাসি-পিসি নিজেদের খাবারের ব্যবস্থা করেছে
iii. আহ্লাদি স্বামীর বাড়ি থেকে ফেরত এসেছে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৩৭। কানাই চৌকিদারের ভ্যাবাচাকা খাওয়ার কারণ—
i. মাসি-পিসির হাতের অস্ত্র
ii. মাসি-পিসির সাহসী মনোভাব
iii. মাসি-পিসির আকস্মিক চিৎকার
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৩৮। যে শক্তির দ্বারা মাসি-পিসি আহ্লাদিকে প্রতিকূল পরিবেশ থেকে বাঁচাতে সক্ষম হয়েছিল, তা হচ্ছে—
i. সাহস
ii. ঐক্য
iii. গায়ের জোর
নিচের কোনটি সঠিক?
(ক) i (খ) ii (গ) i ও ii (ঘ) ii ও iii
উত্তর: (গ) i ও ii

১৩৯। আহ্লাদিকে নিরাপদ রাখার ক্ষেত্রে অসহায় বিধবা নারী দুজন ছিল—
i. দায়িত্বশীল
ii. স্বার্থপর
iii. মানবিক জীবনযুদ্ধে ব্রতী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii (ছবিতে উত্তর হিসেবে 'খ' চিহ্নিত আছে, কারণ 'স্বার্থপর' নেতিবাচক শব্দ)।

১৪০। ‘মাসি-পিসি’ গল্পে প্রকাশ পেয়েছে—
i. নারী লাঞ্ছনার চিত্র
ii. তৎকালীন সমাজ বাস্তবতা
iii. প্রান্তিক জীবনের অসহায়ত্ব
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৪১। ‘মাসি-পিসি’ গল্পের বৈচিত্র্যময় দিক হলো—
i. দুর্ভিক্ষের মর্মস্পর্শী স্মৃতি
ii. প্রকৃতির প্রতি নিবিড়তা
iii. মানবিক জীবনসংগ্রাম
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii (ছবি অনুযায়ী)।

উদ্দীপকের আলোকে ১৪২ ও ১৪৩ নং প্রশ্নের উত্তর দাও:
ঘরের চালে খড় চাপাতে মস্ত দেখতে পায় রাহেলা বেগমকে। জোরে ডাক দেয়। রাহেলা বেগম এলে মস্ত বলে, ‘ভাবি, যাও কই, বসো পান খাও।’ রাহেলা বেগমের বিরক্তি ধরে। বেলা প্রায় শেষ, ঘরে অনেক কাজ বাকি।

১৪২। উদ্দীপকের রাহেলা বেগমের সাথে ‘মাসি-পিসি’ গল্পের কোন চরিত্রদ্বয়ের সাদৃশ্য রয়েছে?
(ক) মাসি ও আহ্লাদি (খ) পিসি ও আহ্লাদি
(গ) মাসি ও পিসি (ঘ) আহ্লাদি ও কানুর মায়ের
উত্তর: (গ) মাসি ও পিসি

১৪৩। উদ্দীপকের মস্তর ‘মাসি-পিসি’ গল্পের আলোকে বলা যায়—
i. কৈলাশ চরিত্রের প্রতিনিধি
ii. সময় অপচয়কারী
iii. একজন শ্রমজীবী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৪৪ ও ১৪৫ নং প্রশ্নের উত্তর দাও:
জহির রায়হান রচিত ‘হাজার বছর ধরে’ উপন্যাসে দেখা যায়, নারী সত্তার কোনো মূল্য নেই। নারী সমাজ সেখানে নিগৃহীত ও নির্যাতিত। উপন্যাসের অন্যতম চরিত্র বুড়ো মকবুল কারণে-অকারণে বউকে মারধর করে। কেউ প্রতিবাদ পর্যন্ত করে না।

১৪৪। উদ্দীপকের মকবুল ‘মাসি-পিসি’ গল্পের কোন চরিত্রকে স্মরণ করিয়ে দেয়?
(ক) বুড়ো রহমান (খ) কৈলাশ (গ) কানাই (ঘ) জগু
উত্তর: (ঘ) জগু

১৪৫। উদ্দীপক ও ‘মাসি-পিসি’ গল্প যে দিক থেকে অভিন্ন—
i. প্রতিবাদ
ii. নির্যাতন
iii. অসহায়ত্ব
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ১৪৬ ও ১৪৭ নং প্রশ্নের উত্তর দাও:
আকবর সাহেব ভিটেমাটি বিক্রি করে বড় মেয়েকে বিয়ে দিতে না দিতেই মেয়েটি ক্ষত-বিক্ষত শরীর নিয়ে বাবার বাড়ি ফেরত আসে। মেয়ের জামাই শ্বশুরের কাছে আরও টাকা চায়।

১৪৬। উদ্দীপকে ‘মাসি-পিসি’ গল্পের যে দিকটি প্রকাশিত হয়েছে—
(ক) কৈলাশের হঠকারিতা (খ) জগুর স্ত্রী নির্যাতন
(গ) বাঁচার জন্য সংগ্রাম (ঘ) মেয়েদের জীবন এমনই
উত্তর: (খ) জগুর স্ত্রী নির্যাতন

১৪৭। আকবর সাহেবের বড় মেয়ে ও ‘মাসি-পিসি’ গল্পের আহ্লাদি দুজনেই—
i. স্বামীর হাতে নির্যাতিত
ii. পুরুষতান্ত্রিকতার বলি
iii. সামাজিক অনাচারের শিকার
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৪৮ ও ১৪৯ নং প্রশ্নের উত্তর দাও:
চার বছরের কৌশিককে নিয়ে সদ্য বিধবা হয়েছে অর্ণা বেগম। কিন্তু বৈধব্য গ্রহণ করতে না করতেই গ্রামের প্রভাবশালী বিষ্ণুপদ তাকে নানাভাবে উত্যক্ত করে। এ নিয়ে সমাজের কাছে বিচার চেয়েও পায়নি অর্ণা বেগম। অবশেষে একদিন তিনি নিজের শক্তি ও সাহস দিয়ে প্রতিরোধ করে বিষ্ণুপদ ও তার দলবলকে।

১৪৮। উদ্দীপকের বিষ্ণুপদের সঙ্গে ‘মাসি-পিসি’ গল্পের নিচের কোন চরিত্রের সাদৃশ্য রয়েছে?
(ক) দারোগা (খ) জগু (গ) কৈলাশ (ঘ) গোকুল
উত্তর: (ঘ) গোকুল

১৪৯। উদ্দীপকে ‘মাসি-পিসি’ গল্পের সাদৃশ্যপূর্ণ দিকটি হলো—
i. আর্থিক দীনতা
ii. চারিত্রিক স্খলন
iii. ক্ষমতার দৌরাত্ম্য
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ১৫০ ও ১৫১ নং প্রশ্নের উত্তর দাও:
অল্প বয়সে বিধবা হওয়া মরিয়ম তার ফুফুর আশ্রয়ে একটি চায়ের দোকান করে। এলাকার যুবক কলিম উৎপাত করলে ফুফু পুলিশ ডেকে এনে তাকে ধরিয়ে দেয়।

১৫০। উদ্দীপকের কলিম ‘মাসি-পিসি’ গল্পের কার কথা মনে করিয়ে দেয়?
(ক) জগু (খ) কৈলেশ (গ) মাসি (ঘ) চৌকিদার
উত্তর: (ঘ) চৌকিদার (নোট: এখানে কলিম চরিত্রটি উৎপাতকারী হিসেবে গোকুল বা জগুর সাথে সাদৃশ্যপূর্ণ হওয়ার কথা, তবে বিকল্প অনুযায়ী চৌকিদার বা নেতিবাচক চরিত্রের প্রতিনিধি)।

১৫১। মরিয়মের কর্মকাণ্ডে ‘মাসি-পিসি’ গল্পের মাসি-পিসির কোন বৈশিষ্ট্য ধরা পড়েছে?
i. স্বাবলম্বন
ii. আত্মরক্ষা
iii. জীবনযুদ্ধে হার না মানা
নিচের কোনটি সঠিক?
(ক) i (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৫২ ও ১৫৩ নং প্রশ্নের উত্তর দাও:
বিধবা সালেহা তার একমাত্র ছেলে মতিকে নিয়ে কোনো রকম বেঁচে আছে। এবারের বন্যায় ফসলের ব্যাপক ক্ষতি হলে এলাকায় মন্দা লেগে যায়। দিশেহারা সালেহা অনেক কষ্ট করে ছেলের মুখে দুটো খাবার তুলে দেয়।

১৫২। উদ্দীপকে ‘মাসি-পিসি’ গল্পের কোন দিকটি প্রকাশ পেয়েছে?
(ক) দায়িত্ববোধ (খ) প্রাকৃতিক দুর্যোগ (গ) স্বাবলম্বন (ঘ) দারিদ্র্যের কশাঘাত
উত্তর: (ক) দায়িত্ববোধ

১৫৩। উদ্দীপকের সালেহা এবং গল্পের মাসি-পিসি সম্পর্কে বলা যায় এর—
i. স্নেহবৎসল
ii. পরিশ্রমী
iii. দায়িত্বশীল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৫৪। মাসির দাম্পত্য জীবনের ক্ষেত্রে কোন তথ্যটি ঠিক?
i. মাসির স্বামী ভালো ছিল
ii. মাসির স্বামী মদ্যপ ছিল
iii. মাসির শাশুড়ি-ননদ বাঘ ছিল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (গ) i ও iii

১৫৫। ‘সব বিরোধ সব পার্থক্য উড়ে গিয়ে মাসি-পিসি দুজনের হয়ে গেল একমন, একপ্রাণ।’ কারণ—
i. আহ্লাদির ভার গ্রহণ
ii. নিজেদের বেঁচে থাকার সংগ্রাম
iii. রোজগারের নতুন বন্দোবস্ত
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৫৬। ‘মাসি-পিসি’ গল্পের বৈচিত্র্যময় দিক হলো—
i. দুর্ভিক্ষের মর্মস্পর্শী স্মৃতি
ii. প্রকৃতির প্রতি নিবিড়তা
iii. মানবিক জীবনসংগ্রাম
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৫৭। ‘ভাওতা দিয়ে আমাদের দমাবার ফিকির।’— সংলাপাটিতে যে ভাওতার কথা বলা হয়েছে—
i. আহ্লাদির স্বামীর জগু আদালতে নালিশ করার বিষয়টি
ii. অসহায় তিনটি নারীর অস্তিত্বের লড়াইয়ে যে বাধা-বিপত্তি
iii. অসহায় তিনটি নারীকে বিভ্রান্তিতে ফেলার যে চক্রান্ত
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (গ) i ও iii

১৫৮। আহ্লাদিকে নিরাপদ রাখার ক্ষেত্রে অসহায় বিধবা নারী দুজন ছিল—
i. দায়িত্বশীল
ii. স্বার্থপর
iii. মানবিক জীবনযুদ্ধে ব্রতী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৫৯। মাসি-পিসিকে বলা যায়—
i. বিধবা
ii. প্রৌঢ়া
iii. গরিব
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৬০। জগু শ্বশুরবাড়ি বেড়াতে এলে—
i. ভালোমন্দ খাবার দেওয়া হয়
ii. উপহার দেওয়া হয়
iii. জামাই আদর পায়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৬১। ‘মাসি-পিসি’ গল্পে জগু আহ্লাদিকে—
i. কলকেপোড়া ছ্যাঁকা দিত
ii. খুঁটির সঙ্গে বেঁধে রাখত
iii. চাবুক দিয়ে পেটাত
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৬২। বুড়ো রহমানকে বলা যায়—
i. শ্রমজীবী মানুষ
ii. সন্তানবৎসল
iii. পরশ্রীকাতর
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৬৩। আহ্লাদির বাপ-মা বেঁচে থাকলে—
i. আহ্লাদিকে স্বামীর বাড়ি ফিরে যেতে হতো
ii. মাসি-পিসির আদর-যত্ন বাড়ত
iii. মাসি-পিসির ভাব জমত না
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii

১৬৪। মাসি-পিসি যুদ্ধের আয়োজন করে যে কারণে—
i. আত্মরক্ষার্থে
ii. প্রতিরোধ করতে
iii. জমি রক্ষার্থে

(ক) i (খ) ii (গ) i ও ii (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৬৫ নং প্রশ্নের উত্তর দাও:
বাঁচতে হলে গর্জে ওঠো
লোহার ফলাই হোক না মুঠো।

১৬৫। উদ্দীপকের সাথে ‘মাসি-পিসি’ গল্পের সাদৃশ্য যে কারণে—
i. মাসি-পিসি দা-বঁটি নিয়ে রুখে দাঁড়ায়
ii. মাসি-পিসি জীবন সংগ্রামে নিজেদের যোগ্যতার প্রমাণ দেয়
iii. মাসি-পিসি বয়সের ভারে নুয়ে পড়ে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ১৬৬ ও ১৬৭ নং প্রশ্নের উত্তর দাও:
রোজগার করে কিছু উপার্জন করলেই তাহেরের দোকানে যায়। চা-সিগারেট খায়, আড্ডা দেয়, আবার বিপন্নগ্রস্ত মানুষ দেখলে তাকে আরও বিপদে ফেলে নিজের স্বার্থ উদ্ধার করতে চায়।

১৬৬। উদ্দীপকের তাহের ‘মাসি-পিসি’ গল্পের কোন চরিত্রের প্রতিনিধি?
(ক) কানাই (খ) গোকুল (গ) জগু (ঘ) কৈলাশ
উত্তর: (ঘ) কৈলাশ

১৬৭। সাদৃশ্যপূর্ণ চরিত্রটির বৈশিষ্ট্য হচ্ছে তারা উভয়ই—
i. নেশাগ্রস্ত
ii. কৌশলী
iii. অমিতব্যয়ী
নিচের কোনটি সঠিক?
(ক) i (খ) i ও ii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ১৬৮ ও ১৬৯ নং প্রশ্নের উত্তর দাও:
আকবর সাহেব ভিটেমাটি বিক্রি করে বড়ো মেয়েকে বিয়ে দিতে না দিতেই মেয়েটি ক্ষত-বিক্ষত শরীর নিয়ে বাবার বাড়ি ফেরত আসে। মেয়ের জামাই শ্বশুরের কাছে আরও টাকা চায়।

১৬৮। উদ্দীপকে ‘মাসি-পিসি’ গল্পের যে দিকটি প্রকাশিত হয়েছে—
(ক) কৈলাশের হঠকারিতা (খ) জগুর স্ত্রী নির্যাতন (গ) বাঁচার জন্য সংগ্রাম (ঘ) মেয়েদের জীবন এমনই
উত্তর: (খ) জগুর স্ত্রী নির্যাতন

১৬৯। আকবর সাহেবের বড়ো মেয়ে ও ‘মাসি-পিসি’ গল্পের আহ্লাদি দুজনেই—
i. স্বামীর হস্তে নির্যাতিত
ii. পুরুষতান্ত্রিকতার বলি
iii. সামাজিক অনাচারের শিকার
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৭০। “একজনের বয়স হয়েছে, আধপাকা চুল, রোগা শরীর”— এখানে কার কথা বলা হয়েছে?
(i) বৃদ্ধ লোকটির (ii) রহমানের (iii) কৈলাশের
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৭১। কৈলাশের শারীরিক বৈশিষ্ট্য লক্ষণীয়—
i. মাঝবয়সী
ii. বেঁটে ও জোয়ান
iii. কদম ছাঁটা রুক্ষ চুল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii (ছবি অনুযায়ী সবকটি বৈশিষ্ট্য কৈলাশের সাথে সম্পর্কিত)।

১৭২। ‘মাসি-পিসি’ গল্পে ব্যবহৃত শব্দ হচ্ছে—
i. খপর
ii. বেমক্কা
iii. জীবনীশক্তি
নিচের কোনটি সঠিক?

উত্তর: (ঘ) i, ii ও iii

১৭৩। “বজ্জাত হোক, খুনে হোক, জামাই তো”— মাসির এই ভাবনার কারণ—
i. সমাজ পুরুষতান্ত্রিক
ii. মাসি-পিসির অসহায়ত্ব
iii. সামাজিকতা

উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ১৭৪ নং প্রশ্নের উত্তর দাও:
সামাজিক সূচকে বাংলাদেশের বিস্ময়কর সাফল্যের পেছনে নারী অগ্রগতি বড় ভূমিকা রাখলেও ঘরের মধ্যে নারীর অবস্থা তেমন বদলায়নি। দেশের বিবাহিত নারীদের ৮৭% স্বামীর মাধ্যমে কোনো না কোনো সময়ে, কোনো না কোনো ধরনের নির্যাতনের শিকার হয়েছেন।

১৭৪। উদ্দীপকের সঙ্গে ‘মাসি-পিসি’ গল্পের কোন দিক দিয়ে সাদৃশ্য রয়েছে?
i. স্ত্রী নির্যাতন
ii. জীবনমান উন্নয়নে নারীর ভূমিকা

(খ) i ও iii

১৭৫। জগু এবং উদ্দীপকের মতো স্বামীরা সমাজের চোখে—
i. ঘৃণিত
ii. নিন্দিত
iii. বর্জনীয়
নিচের কোনটি সঠিক?

(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৭৬। নারী-নির্যাতনকারীদের বিরুদ্ধে আমাদের—

ii. প্রতিবাদী হওয়া উচিত
iii. সতর্ক হওয়া উচিত

১৭৭। ‘মাসি-পিসি’ গল্পটিকে তাৎপর্যপূর্ণ করে তুলেছে—
i. মাতৃত্বের মহিমা
ii. সেবাব্রতিতা
iii. মাসি-পিসির বুদ্ধিদীপ্ত সাহসী সংগ্রাম
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) iii
(ঘ) i, ii ও iii
উত্তর: (গ) iii

১৭৮। আঁটসাঁট থমথমে গড়ন, গোলগাল মুখ কথাটি যার ক্ষেত্রে প্রযোজ্য—
i. আহ্লাদির
ii. পিসির
iii. মাসির
নিচের কোনটি সঠিক?
(ক) i
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i

১৭৯। জগু মামলা করতে চায় যে কারণে—
i. আহ্লাদিকে নিয়ে যেতে
ii. মাসি-পিসিকে শিক্ষা দিতে
iii. জমি উদ্ধার করতে
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৮০। ‘মাসি-পিসি’ গল্পে মাসি ও পিসির মধ্যে যে দিকটি সাদৃশ্যপূর্ণ—
i. তারা সমবয়সী
ii. শ্বশুর ঘরে নির্যাতিত
iii. সন্তান জন্মদানে কদর বৃদ্ধি
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let reviewList = [];
        let reviewMode = false;
        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadReviewList() {
            const saved = localStorage.getItem(STORAGE_KEY + "_review");
            if (saved) reviewList = JSON.parse(saved);
        }

        function saveReviewList() {
            localStorage.setItem(STORAGE_KEY + "_review", JSON.stringify(reviewList));
        }

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
            <button onclick="toggleReviewMode()" id="review-btn" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                📌 Need to Review (${reviewList.length})
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            let filteredData = data.map((q, i) => ({ ...q, originalIndex: i }));

            if (reviewMode) {
                filteredData = filteredData.filter(item => reviewList.includes(item.originalIndex));
            } else if (wrongQuestionsOnly) {
                filteredData = filteredData.filter((item, i) =>
                    userAnswers[i] && userAnswers[i] !== data[i].answer
                );
            }

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" 
                            ${reviewList.includes(originalIdx) ? 'checked' : ''} 
                            onchange="toggleReview(${originalIdx}, this.checked)"
                            class="w-5 h-5 accent-purple-500">
                        <span class="text-purple-400 text-sm font-medium">Review</span>
                    </label>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        function toggleReview(qIndex, isChecked) {
            if (isChecked) {
                if (!reviewList.includes(qIndex)) reviewList.push(qIndex);
            } else {
                reviewList = reviewList.filter(idx => idx !== qIndex);
            }
            saveReviewList();
            updateReviewButton();
        }

        function updateReviewButton() {
            const btn = document.getElementById('review-btn');
            if (btn) btn.textContent = `📌 Need to Review (${reviewList.length})`;
        }

        function toggleReviewMode() {
            reviewMode = !reviewMode;
            const btn = document.getElementById('review-btn');

            if (reviewMode) {
                btn.style.backgroundColor = '#6b21a8';
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
            } else {
                btn.style.backgroundColor = '';
                btn.innerHTML = `📌 Need to Review (${reviewList.length})`;
            }

            const container = document.getElementById('quiz-container');
            container.style.opacity = '0.5';
            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
            loadReviewList();
            updateReviewButton();
        };
    </script>
