<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">সুফিয়া কামাল এর 'তাহারেই পড়ে মনে' পদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। 'তাহারেই পড়ে মনে' কবিতায় কার প্রতি কবির তীব্র বিমুখতা? 
(ক) বসন্তের (খ) শীতের (গ) নিজের (ঘ) ভক্তের
উত্তর: (ক) বসন্তের

২। 'দক্ষিণ দুয়ার গেছে খুলি?'—চরণটিতে কী বোঝানো হয়েছে? 
(ক) দখিনা বাতাস (খ) কবির উদাসীনতা (গ) বসন্তের আগমন (ঘ) কবির অভিমান
উত্তর: (খ) কবির উদাসীনতা

৩। 'তাহারেই পড়ে মনে' কবিতায় কোথায় বসন্তের আবির্ভাব ঘটেছে? 
(ক) প্রকৃতিতে (খ) কবি মনে (গ) প্রিয়জনের মনে (ঘ) কবিভক্তের মনে
উত্তর: (ক) প্রকৃতিতে

৪। জানি তোমার হৃদয় শূন্য, মন পুড়ে কার জন্য? উদ্দীপকের 'কার' শব্দটি 'তাহারেই পড়ে মনে' কবিতার কোন বিষয় স্মরণ করিয়ে দেয়? 
(ক) কবি ভক্ত (খ) মাঘের সন্ন্যাসী (গ) শীত (ঘ) বসন্ত
উত্তর: (খ) মাঘের সন্ন্যাসী

৫। 'তাহারেই পড়ে মনে' কবিতায় কবি কাকে 'মাঘের সন্ন্যাসী' রূপে কল্পনা করেছেন? 
(ক) দখিনা সমীর (খ) শীত (গ) বসন্ত (ঘ) মাধবী কুঁড়ি
উত্তর: (খ) শীত

৬। 'তাহারেই পড়ে মনে' কবিতায় কোন বিষয়টি প্রাধান্য পেয়েছে? 
(ক) প্রকৃতির প্রতি মানবমনের বিমুখতা (খ) মানুষের ব্যক্তিগত জীবনের দুঃখ-কষ্ট 
(গ) প্রকৃতির প্রতি কবিমনের ভাবান্তর (ঘ) মানবমন ও প্রকৃতির যোগসাদৃশ্য
উত্তর: (ঘ) মানবমন ও প্রকৃতির যোগসাদৃশ্য

৭। 'তাহারেই পড়ে মনে' কবিতার লক্ষণীয় বৈশিষ্ট্য কোনটি? 
(ক) শোকধর্মিতা (খ) বর্ণনাত্মক (গ) নাটকীয়তা (ঘ) মহাকাব্যিক
উত্তর: (গ) নাটকীয়তা

৮। 'তাহারেই পড়ে মনে' কবিতায় কবি কার সাথে অভিমান করেছেন? 
(ক) স্বামীর (খ) প্রকৃতির (গ) বসন্তের (ঘ) শীতের
উত্তর: (গ) বসন্তের

৯। 'তাহারেই পড়ে মনে' কবিতায় কবি কোন ঋতুর বন্দনা করেছেন? 
(ক) গ্রীষ্ম (খ) বর্ষা (গ) শীত (ঘ) বসন্ত
উত্তর: (ঘ) বসন্ত

১০। 'তরী তার এসেছে কি?' 'তাহারেই পড়ে মনে' কবিতায় 'তরী' কীসের প্রতীক? 
(ক) প্রিয়জনের (খ) কবিতার (গ) মানবজীবনের (ঘ) বসন্তের
উত্তর: (ঘ) বসন্তের

১১। 'তাহারেই পড়ে মনে' কবিতায় কে গন্ধে অধীর আকুল হয়েছে কিনা জানতে চাওয়া হয়েছে? 
(ক) আমের মুকুল (খ) দক্ষিণ দুয়ার (গ) দখিনা সমীর (ঘ) বাতাবি লেবুর ফুল
উত্তর: (গ) দখিনা সমীর

১২। 'বসন্ত-বন্দনা তব কণ্ঠে শুনি- এ মোর মিনতি'- এ মিনতি করে— 
(ক) কবিভক্ত (খ) কবি (গ) প্রিয়জন (ঘ) দখিনা সমীর
উত্তর: (ক) কবিভক্ত

১৩। 'ফুল কি ফোটেনি শাখে?'— কবি সুফিয়া কামাল এ রকম প্রশ্ন করেছেন কেন? 
(ক) মনের আনন্দে (খ) বন্দনাগীতি রচনার লক্ষ্যে (গ) উদাসীনতার জন্য (ঘ) জানার আগ্রহে
উত্তর: (গ) উদাসীনতার জন্য

১৪। "হে কবি, নীরব কেন ফাল্গুন যে এসেছে ধরায়"- এ চরণে 'নীরব কেন' বলতে কবির কেমন অবস্থা বোঝায়? 
(ক) জীবন সম্পর্কে উদাসীনতা (খ) ঘুমিয়ে থাকা 
(গ) কাব্য ও গান রচনায় সক্রিয় না হওয়া (ঘ) শীতের চাদর মুড়ি দিয়ে থাকা
উত্তর: (গ) কাব্য ও গান রচনায় সক্রিয় না হওয়া

১৫। "বাতাবি লেবুর ফুল ফুটেছে কি?"— 'তাহারেই পড়ে মনে' কবিতার এই চরণ দ্বারা প্রকাশিত হয়েছে— 
(ক) প্রকৃতির বর্ণনা (খ) গাছের বর্ণনা (গ) কবির হাহাকার (ঘ) কবির ব্যক্তিগত উচ্ছ্বাস
উত্তর: (গ) কবির হাহাকার

১৬। 'তাহারেই পড়ে মনে' কবিতায় পুষ্পশূন্য দিগন্তের পথে চলে গেছে কে? 
(ক) কুহেলী উত্তরী (খ) মাঘের সন্ন্যাসী (গ) ঋতুর রাজন (ঘ) দখিনা সমীর
উত্তর: (খ) মাঘের সন্ন্যাসী

১৭। 'তাহারেই পড়ে মনে' কবিতায়—'কোথা তব নব পুষ্পসাজ'—উক্তিটি কার উদ্দেশ্যে বলা হয়েছে? 
(ক) বসন্তের (খ) ভক্তের (গ) কবির (ঘ) শীতের
উত্তর: (গ) কবির

১৮। নিচের কোনটিতে কবির অভিমান প্রকাশ পেয়েছে? 
(ক) কহিল সে কাছে সরে আসি (খ) কহিল সে মৃদু মধু-স্বরে 
(গ) কহিল সে সুদূরে চাহিয়া (ঘ) কহিল সে পরম হেলায়
উত্তর: (ঘ) কহিল সে পরম হেলায়

১৯। 'কহিল সে কাছে সরে আসি'— পরের পঙক্তি কোনটি? 
(ক) কুহেলী উত্তরী তলে মাঘের সন্ন্যাসী (খ) বাতাবি লেবুর ফুল ফুটেছে কি 
(গ) নাই হলো, না হোক এবারে (ঘ) শুনি নাই, রাখিনি সন্ধান
উত্তর: (ক) কুহেলী উত্তরী তলে মাঘের সন্ন্যাসী

২০। 'তাহারেই পড়ে মনে' কবিতায় কবি কাকে ব্যথা দিয়েছেন?
(ক) ফাল্গুন (খ) প্রকৃতি (গ) পাঠক (ঘ) ঋতুরাজ
উত্তর: (ঘ) ঋতুরাজ

২১। 'তাহারেই পড়ে মনে' কবিতায় 'অর্ঘ্য বিরচন' শব্দটি কী অর্থে ব্যবহৃত হয়েছে?
(ক) ঋতুরাজ বসন্তকে বরণ (খ) ফুলের বন্দনাগীত (গ) বসন্তের আগমনী গান (ঘ) অঞ্জলি বা উপহার রচনা
উত্তর: (ঘ) অঞ্জলি বা উপহার রচনা

২২। 'তাহারেই পড়ে মনে' কবিতায় ব্যবহৃত 'কুহেলী উত্তরী' শব্দটি কী অর্থ বহন করে?
(ক) মাঘের কুয়াশা (খ) উত্তরের কুয়াশা (গ) কুয়াশার চাদর (ঘ) পৌষের কুয়াশা
উত্তর: (গ) কুয়াশার চাদর

২৩। তোমার পঠিত কোন কবিতাটি সংলাপ নির্ভর?
(ক) সুচেতনা (খ) তাহারেই পড়ে মনে (গ) বিদ্রোহী (ঘ) প্রতিদান
উত্তর: (খ) তাহারেই পড়ে মনে

২৪। 'তাহারেই পড়ে মনে' কবিতাটি প্রকাশিত হয়—
(ক) ১৯৩২ খ্রিস্টাব্দে (খ) ১৯৩৩ খ্রিস্টাব্দে (গ) ১৯৩৫ খ্রিস্টাব্দে (ঘ) ১৯৩৬ খ্রিস্টাব্দে
উত্তর: (গ) ১৯৩৫ খ্রিস্টাব্দে

২৫। 'তাহারেই পড়ে মনে' কবিতায় কবির মন বিষণ্ণতায় আচ্ছন্ন যে কারণে—
(ক) কবিভক্তের উদাসীনতায় (খ) প্রিয়জন হারানোর শোকে (গ) বসন্তের আবির্ভাবে (ঘ) প্রকৃতির বিচিত্র সাজে
উত্তর: (খ) প্রিয়জন হারানোর শোকে

২৬। 'তাহারেই পড়ে মনে' কবিতায় কবি শীতকে মাঘের সন্ন্যাসী বলেছেন। কারণ—
i. মাঘের শীতের তীব্রতার জন্য
ii. শীতের রিক্ততার জন্য
iii. কুয়াশার চাদরের জন্য
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

২৭। 'তাহারেই পড়ে মনে' কবিতাটির লক্ষণীয় বৈশিষ্ট্য হলো—
i. অন্ত্যমিল প্রবণতা ii. সংলাপধর্মিতা iii. নাটকীয়তা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (খ) ii ও iii

২৮। 'তাহারেই পড়ে মনে' কবিতা অনুসারে বসন্ত ঋতুতে— [ম. বো. ২০]
i. মানব মনে আনন্দ বিরাজ করে
ii. আমের মুকুল ফোটে
iii. দখিনা বাতাস বইতে থাকে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২৯। 'তাহারেই পড়ে মনে' কবিতায় 'নীরব কেন' বলতে বোঝায়—
i. কবি উদাসীন হয়ে আছেন কেন?
ii. কবি কেন বসন্তকে সম্বোধন করছেন না?
iii. কবি কেন কাব্য রচনায় সক্রিয় হচ্ছেন না?
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৩০। 'তাহারেই পড়ে মনে' কবিতায় 'পুষ্পারতি' বলতে বোঝানো হয়েছে—
i. ফুলের বন্দনা ii. ফুলের নিবেদন iii. ফুলের সৌরভ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপক নির্ভর প্রশ্ন:
উদ্দীপকের আলোকে ৩১ ও ৩২ নং প্রশ্নের উত্তর দাও।
"হিম কুহেলির অন্তর তলে আজিকে পুলক জাগে,
রাঙিয়া উঠেছে পলাশ কলিকা মধুর রঙিন রাগে।"

৩১। অনুচ্ছেদটি 'তাহারেই পড়ে মনে' কবিতার কোন ঘটনার সাথে সাদৃশ্যপূর্ণ?
(ক) শীত বিদায়ের (খ) বসন্ত আগমনের (গ) প্রাকৃতিক সৌন্দর্যের (ঘ) গ্রীষ্মের দাবদাহের
উত্তর: (খ) বসন্ত আগমনের

৩২। অনুচ্ছেদটিতে 'তাহারেই পড়ে মনে' কবিতার কোন সুর ধ্বনিত হয়েছে?
(ক) শীতের আগমন (খ) শীতের গভীরতা (গ) প্রকৃতির পরিপূর্ণতা (ঘ) প্রকৃতির পরিবর্তন
উত্তর: (গ) প্রকৃতির পরিপূর্ণতা

উদ্দীপকের আলোকে ৩৩ ও ৩৪ নং প্রশ্নের উত্তর দাও।
মুন্না বিশিষ্ট ব্যবসায়ী। হঠাৎ তার শিশুপুত্র সড়ক দুর্ঘটনায় নিহত হয়। পুত্রশোকে সে ব্যবসা ছেড়ে দিয়েছে। এমনকি ঈদের নামাজ পড়তেও যেতে পারেনি।

৩৩। উদ্দীপকের 'মুন্না' 'তাহারেই পড়ে মনে' কবিতার কোন চরিত্রকে মনে করিয়ে দেয়?
(ক) কবির পুত্র (খ) কবির স্বামী (গ) কবিভক্ত (ঘ) কবি
উত্তর: (ঘ) কবি

৩৪। উদ্দীপকে ও 'তাহারেই পড়ে মনে' কবিতায় যুগপৎভাবে ফুটে উঠেছে—
i. নির্লিপ্ততা ii. স্মৃতিকাতরতা iii. প্রিয়জন হারানোর বেদনা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩৫। উদ্দীপকের আয়োজকগণ 'তাহারেই পড়ে মনে' কবিতার কার সাথে তুল্য?
(ক) কবি (খ) কবি-ভক্ত (গ) বসন্তবরণ (ঘ) ঋতুরাজ
উত্তর: (ক) কবি

৩৬। উদ্দীপকের কবি হাসান বশির এবং 'তাহারেই পড়ে মনে' কবিতার কবির চিন্তা-চেতনায় প্রকাশ পেয়েছে— [কু. বো. ২২]
i. স্মৃতিকাতরতা ii. মানবমনের রহস্যময়তা iii. বৈপরীত্য
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ৩৭ ও ৩৮ নং প্রশ্নের উত্তর দাও।
চারিদিকে উৎসবের রঙ। নতুন বছরকে বরণ করার প্রাণান্ত প্রয়াস। সপ্তাহ দুয়েক আগে মাকে হারানো মেয়েটিকে শোক ভোলাতেই নিয়ে এসেছে বান্ধবীরা। মায়ের স্মৃতি বুকে নিয়েও ধীরে ধীরে মেয়েটি সহজ হয়ে উঠছে; উপভোগ করছে বর্ষবরণ।

৩৭। উদ্দীপকের 'বর্ষবরণ' 'তাহারেই পড়ে মনে' কবিতার কোন বিষয়ের সাথে সাদৃশ্যপূর্ণ?
(ক) ফাল্গুন বরণ (খ) বসন্ত বরণ (গ) ফাল্গুন বন্দনা (ঘ) বসন্ত বন্দনা
উত্তর: (খ) বসন্ত বরণ

৩৮। উদ্দীপকে মেয়েটির সহজ হয়ে ওঠা আর 'তাহারেই পড়ে মনে' কবিতায় কবির আচরণে প্রকাশ পেয়েছে?
i. বৈপরীত্য ii. স্মৃতিমুগ্ধতা iii. মানব মনের রহস্যময়তা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ৩৯ ও ৪০ নং প্রশ্নের উত্তর দাও।
জীবনের সবক্ষেত্রে সফল আকাশ কিন্তু তার সাফল্য তার মা আলোকিত করে না। মায়ের সমস্ত অন্তর জুড়ে অকালে হারিয়ে যাওয়া আবির।

৩৯। উদ্দীপকের আবির 'তাহারেই পড়ে মনে' কবিতায় কী প্রতিনিধিত্ব করে?
(ক) বসন্তের (খ) কবির (গ) শীতের (ঘ) প্রকৃতির
উত্তর: (গ) শীতের

৪০। উদ্দীপক ও 'তাহারেই পড়ে মনে' কবিতা উভয় ক্ষেত্রেই প্রকাশিত—
i. প্রিয়জন হারানোর বেদনা ii. ব্যক্তিজীবনের রিক্ততা iii. সাফল্যের প্রতি উদাসীনতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৪১। 'কুহেলী উত্তরী তলে ----- সন্ন্যাসী' উক্তিটির শূন্যস্থানে বসবে—
(ক) মাঘের (খ) পৌষের (গ) শীতের (ঘ) ফাল্গুনের
উত্তর: (ক) মাঘের

৪২। 'কহিল সে স্নিগ্ধ আঁখি তুলি' বাক্যটিতে 'স্নিগ্ধ আঁখি' বলতে বোঝায়—
(ক) ক্ষীণদৃষ্টি (খ) অশ্রুসিক্ত নয়ন (গ) কোমল চোখ (ঘ) উৎসুক চাহনি
উত্তর: (গ) কোমল চোখ

(ক) একজন (খ) দুজন (গ) তিনজন (ঘ) চারজন
উত্তর: (ক) একজন

৪৪। 'মাধবী' অর্থ—
(ক) মধুকর (খ) মধুমালতী (গ) বাসন্তী ফুল (ঘ) মধুময়
উত্তর: (গ) বাসন্তী ফুল

(ক) বরণের আগে বসন্ত এসেছে বলে (খ) শীত কবির প্রিয় বলে (গ) বন্দনা গীতি রচিত হয়নি বলে (ঘ) রিক্ত শীতের করুণ বিদায়কে ভোলা যাচ্ছে না বলে
উত্তর: (ঘ) রিক্ত শীতের করুণ বিদায়কে ভোলা যাচ্ছে না বলে

৪৬। সুফিয়া কামালের পৈতৃক নিবাস কোথায়?
(ক) ঢাকায় (খ) বরিশালে (গ) কুমিল্লায় (ঘ) হুগলিতে
উত্তর: (গ) কুমিল্লায়

৪৭। 'তাহারেই পড়ে মনে' কবিতায় ব্যবহৃত 'পুষ্পারতি' শব্দটি কীভাবে গঠিত হয়েছে?

উত্তর: (খ) সন্ধিযোগে

৪৮। 'কুঁড়ি' শব্দটি এসেছে—
(ক) 'কুঁড়ে' থেকে (খ) 'কুন্তিল' থেকে (গ) 'কোরক' থেকে (ঘ) 'পুষ্প' থেকে
উত্তর: (গ) 'কোরক' থেকে

৪৯। 'ফুল কি ফোটেনি শাখে? পুষ্পারতি লভেনি কি ......' শূন্যস্থানে কী হবে?
(ক) বসন্তের সাজ (খ) ঋতুর সাজন (গ) ঋতুর সাজ (ঘ) ঋতুর রাজন
উত্তর: (ঘ) ঋতুর রাজন

৫০। কবিভক্ত কার কাছে বসন্ত-বন্দনা কণ্ঠে শোনার মিনতি করেছেন—
(ক) কাজী নজরুল ইসলাম (খ) রবীন্দ্রনাথ ঠাকুর (গ) সুফিয়া কামাল (ঘ) সুকান্ত ভট্টাচার্য
উত্তর: (গ) সুফিয়া কামাল

৫১। বসন্ত কাকে স্মরণ করে পৃথিবীতে এসেছে?
(ক) কবিকে (খ) প্রিয়জনকে (গ) ফাল্গুনকে (ঘ) প্রকৃতিকে
উত্তর: (গ) ফাল্গুনকে

৫২। 'তাহারেই পড়ে মনে' কবিতায় কবির বসন্ত বিমুখতার মধ্য দিয়ে কোনটি ফুটে উঠেছে?
(ক) অভিমান (খ) ব্যর্থতা (গ) শূন্যতা (ঘ) উদাসীনতা
উত্তর: (ঘ) উদাসীনতা

৫৩। 'তাহারেই পড়ে মনে' কবিতায় কোন কোন ফলের উল্লেখ আছে?
(ক) আম ও কাঁঠাল (খ) আম ও জাম (গ) বাতাবি ও কাঁঠাল (ঘ) বাতাবি ও আম
উত্তর: (ঘ) বাতাবি ও আম

৫৪। কোনটি বেগম সুফিয়া কামালের গ্রন্থ নয়?
(ক) ছায়াহরিণ (খ) মায়া কাজল (গ) সাঁঝের মায়া (ঘ) কেয়ার কাঁটা
উত্তর: (ক) ছায়াহরিণ

৫৫। 'কহিল সে সুদূরে চাহিয়া।' পরের চরণ কোনটি?
(ক) অলখের পাথার বাহিয়া (খ) এসেছে তা ফাল্গুনে স্মরিয়া (গ) বসন্তেরে আনিতে বরিয়া (ঘ) দক্ষিণ দুয়ার গেছে খুলি?
উত্তর: (ক) অলখের পাথার বাহিয়া

৫৬। 'অর্ঘ্য' শব্দের অর্থ কী?
(ক) পূজার উপকরণ (খ) পূজার বাদ্য (গ) পূজার মণ্ডপ (ঘ) পূজার আধার
উত্তর: (ক) পূজার উপকরণ

৫৭। 'তাহারেই পড়ে মনে' কবিতার বর্ণনাকারী চরিত্র কোনটি?
(ক) কবি স্বয়ং (খ) কবিভক্ত (গ) বৃদ্ধ দাদু (ঘ) কুললক্ষ্মী
উত্তর: (খ) কবিভক্ত

৫৮। 'রচিয়া লহ না আজও গীতি' এখানে 'না' কী অর্থে ব্যবহৃত?
(ক) অনুরোধ (খ) উপদেশ (গ) নিষেধ (ঘ) তিরস্কার
উত্তর: (ক) অনুরোধ

৫৯। 'দুয়ার' শব্দটির উৎস—
(ক) দ্বার (খ) দার (গ) দরজা (ঘ) ফটক
উত্তর: (ক) দ্বার

৬০। কোন কবিতায় বিষাদময় রিক্ততার অনুরণন ঘটেছে?

উত্তর: (ঘ) তাহারেই পড়ে মনে

৬১। 'একাত্তরের ডায়েরি' কার রচনা?
(ক) সেলিনা রহমান (খ) সুফিয়া কামাল (গ) জাহানারা ইমাম (ঘ) মালেকা বেগম
উত্তর: (খ) সুফিয়া কামাল

৬২। 'তাহারেই পড়ে মনে' কবিতায় 'দক্ষিণ দুয়ার' কীভাবে খুলেছে?
(ক) কবি নিজে খুলেছেন (খ) ভক্তরা খুলেছে (গ) উত্তরের কুয়াশায় খুলেছে (ঘ) বসন্ত বাতাসে খুলেছে

(ক) প্রকৃতির মর্মর সুর (খ) পুষ্পিত বসন্তের সুর (গ) অফুরন্ত আনন্দ সুর (ঘ) বিষাদময় রিক্ততার সুর
উত্তর: (ঘ) বিষাদময় রিক্ততার সুর

৬৪। সুফিয়া কামাল সম্পর্কে কোন তথ্যটি যথার্থ?
(ক) সুফিয়া কামালের পৈতৃক নিবাস ব্রাহ্মণবাড়িয়া (খ) জন্ম ১৯১১ খ্রিস্টাব্দে যশোরে (গ) তাঁর স্বামীর নাম সৈয়দ নেহাল হোসেন (ঘ) তিনি ক্রীড়া আন্দোলনের পথিকৃৎ
উত্তর: (গ) তাঁর স্বামীর নাম সৈয়দ নেহাল হোসেন

৬৫। 'তাহারেই পড়ে মনে' কবিতায় কবির বসন্ত বিমুখতার কারণ—
(ক) অভিমান (খ) প্রিয় বিয়োগ (গ) রাগ (ঘ) দ্বিধা
উত্তর: (খ) প্রিয় বিয়োগ

৬৬। 'পুষ্পারতি' শব্দের অর্থ কী?
(ক) বসন্তকাল (খ) প্রদীপ (গ) ফুলের গহনা (ঘ) ফুলের বন্দনা
উত্তর: (ঘ) ফুলের বন্দনা

৬৭। 'তাহারেই পড়ে মনে' কবিতাটিতে কোনটির উল্লেখ নেই?
(ক) আমের মুকুল (খ) কমল বন (গ) বাতাবি লেবু (ঘ) মাধবী কুঁড়ি
উত্তর: (খ) কমল বন

উদ্দীপকের আলোকে ৬৮ ও ৬৯ নং প্রশ্নের উত্তর দাও।
শাহজাহানের অমর সৃষ্টি তাজমহল। তাজমহলকে ঘিরে আছে তাঁর প্রাণপ্রিয় স্ত্রী মমতাজের স্মৃতি। তাই পৃথিবীর সমস্ত সৌন্দর্য একত্র করে তিনি সাজিয়েছেন প্রিয়তম স্ত্রীর সমাধি।

৬৮। নিচের কোন চরণটিতে উদ্দীপকের ভাবের প্রতিফলন ঘটেছে?
(ক) যদিও এসেছে তবু তুমি তারে করিলে বৃথাই (খ) তাহারেই পড়ে মনে, ভুলিতে পারি না কোনো মতে (গ) তরী তার এসেছে কি? বেজেছে কি আগমনী গান (ঘ) বাতাবি লেবুর ফুল ফুটেছে কি? ফুটেছে কি আমের মুকুল?
উত্তর: (খ) তাহারেই পড়ে মনে, ভুলিতে পারি না কোনো মতে

৬৯। শাহজাহান ও সুফিয়া কামালের আচরণের ভিন্নতা থাকলেও বলা যায় উভয়ই—
(ক) আবেগাশ্রয়ী ও অহংকারী (খ) অভিমানী ও স্নেহপরায়ণ (গ) স্মৃতিকাতর ও প্রেমময় (ঘ) উদাসীন ও মেধাবী
উত্তর: (গ) স্মৃতিকাতর ও প্রেমময়

৭০। 'নাই হলো, না হোক এবারে' কবি তার ভক্তকে একথা বলেছেন—
(ক) মৃদু মৃদু স্বরে (খ) মধু মৃদু স্বরে (গ) মৃদু মধু স্বরে (ঘ) মধু মধু স্বরে
উত্তর: (গ) মৃদু মধু স্বরে

৭১। লিটি চলতি রূপ কোনটি?
(ক) লবে (খ) লহ (গ) রন্ধিতে (ঘ) যাহাকে
উত্তর: (ক) লবে

৭২। 'পাথার' শব্দের অর্থ কী?
(ক) সমুদ্র (খ) নদী (গ) মেঘ (ঘ) বসন্ত
উত্তর: (ক) সমুদ্র

৭৩। মাধবী কুঁড়ির বুকে কী নেই?
(ক) ঘ্রাণ (খ) গন্ধ (গ) অর্ঘ্য (ঘ) পুষ্পসাজ
উত্তর: (খ) গন্ধ

৭৪। 'তাহারেই পড়ে মনে' কবিতার চরণ সংখ্যা কয়টি?
(ক) ২৪ টি (খ) ৩০ টি (গ) ৩২ টি (ঘ) ৪২ টি
উত্তর: (খ) ৩০ টি

৭৫। 'তাহারেই পড়ে মনে' কবিতায় 'অলখ' শব্দটির অর্থ নয় কী?
(ক) অলক্ষ (খ) দৃষ্টির অগোচর (গ) দৃষ্টি নন্দন (ঘ) অপ্রত্যক্ষ
উত্তর: (খ) দৃষ্টির অগোচর

৭৬। মাঘের সন্ন্যাসী পুষ্পশূন্য দিগন্তের চলে গেছে কীভাবে?
(ক) রিক্ত হস্তে (খ) মাধবী কুঁড়ি নিয়ে (গ) শীতের বেদনা নিয়ে (ঘ) বাতাবি লেবু নিয়ে
উত্তর: (ক) রিক্ত হস্তে

৭৭। কবি ভক্তের মতে কবি বসন্তকে ব্যথা দিয়েছে কীভাবে?
(ক) ভুলে গিয়ে (খ) উপেক্ষা করে (গ) অর্ঘ্য বিরচন করে (ঘ) অভিমান করে
উত্তর: (খ) উপেক্ষা করে

৭৮। 'ফুলের বন্দনা বা নিবেদন' বোঝাতে 'তাহারেই পড়ে মনে' কবিতায় কোন শব্দটি ব্যবহৃত হয়েছে?
(ক) পুষ্পাঞ্জলি (খ) পুষ্প বিরচন (গ) পুষ্পসাজ (ঘ) পুষ্পারতি
উত্তর: (ঘ) পুষ্পারতি

৭৯। 'নাই হলো, না হোক এবারে' এখানে কী না হওয়ার কথা বোঝানো হয়েছে?
(ক) পুষ্পশূন্য দিগন্তের পথে কবির চলে যাওয়া (খ) শীতের বিদায়ের জন্য কবির গান গাওয়া (গ) মাঘের সন্ন্যাসীর জন্য কবির গান গাওয়া (ঘ) বসন্তের জন্য কবির গান গাওয়া
উত্তর: (ঘ) বসন্তের জন্য কবির গান গাওয়া

৮০। 'তাহারেই পড়ে মনে' কবিতায় কবিকে আচ্ছন্ন করে—
(ক) সোনালি অতীত (খ) বিষাদময় রিক্ততা (গ) শৈশবের স্মৃতি (ঘ) মধুর বর্তমান
উত্তর: (খ) বিষাদময় রিক্ততা

৮১। 'তাহারেই পড়ে মনে' কবিতাটির স্তবকসংখ্যা—
(ক) চার (খ) পাঁচ (গ) ছয় (ঘ) সাত
উত্তর: (খ) পাঁচ

৮২। 'জননী সাহসিকা' অভিধায় অভিষিক্ত হয়েছেন কোন সাহিত্যিক?
(ক) বেগম রোকেয়া (খ) সুফিয়া কামাল (গ) জাহানারা ইমাম (ঘ) কুসুমকুমারী দাশ
উত্তর: (খ) সুফিয়া কামাল

৮৩। 'আামের মুকুলের গন্ধে অধীর আকুল হয়ে আছে কী?
(ক) দখিনা বাতাস (খ) পৃথিবী (গ) নদীর ঢেউ (ঘ) কেয়াবন
উত্তর: (ক) দখিনা বাতাস

৮৪। 'তাহারেই পড়ে মনে' কবিতায় কয়টি ঋতুর উল্লেখ আছে?
(ক) ২ টি (খ) ৩ টি (গ) ১ টি (ঘ) ৪ টি
উত্তর: (গ) ১ টি

৮৫। 'লহ' শব্দের অর্থ কী?
(ক) রক্ত (খ) নাও (গ) লাহ (ঘ) লাল
উত্তর: (খ) নাও

৮৬। 'তাহারেই পড়ে মনে' কবিতায় 'বিমুখতা' বলতে কী বোঝানো হয়েছে?
(ক) ঘৃণা (খ) অপ্রসন্নতা (গ) অসচেতনতা (ঘ) অবজ্ঞা
উত্তর: (ঘ) অবজ্ঞা

৮৭। 'তাহারেই পড়ে মনে' কবিতায় শীতকালকে মাঘের সন্ন্যাসী বলার কারণ কী?
(ক) শীতকাল বারবার শূন্য হাতে ফিরে আসে (খ) শীতকাল খালি হাতে বিদায় নেয় (গ) শীতকাল কুয়াশার চাদর গায়ে বিদায় নেয় (ঘ) শীতকালে গাছের পাতা ঝড়ে যাওয়ায়
উত্তর: (খ) শীতকাল খালি হাতে বিদায় নেয়

৮৮। 'ফুল কি ফোটেনি শাখে?'— কবি সুফিয়া কামাল এ রকম প্রশ্ন করেছেন কেন?
(ক) মনের আনন্দে (খ) বন্দনাগীতি রচনার লক্ষ্যে (গ) উদাসীনতার জন্য (ঘ) জানার আগ্রহে
উত্তর: (গ) উদাসীনতার জন্য

৮৯। জানি তোমার হৃদয় শূন্য মন পুড়ে কার জন্য? উদ্দীপকের 'কার' শব্দটি 'তাহারেই পড়ে মনে' কবিতার কোন বিষয় স্মরণ করিয়ে দেয়?
(ক) কবি ভক্ত (খ) মাঘের সন্ন্যাসী (গ) শীত (ঘ) বসন্ত
উত্তর: (খ) মাঘের সন্ন্যাসী

৯০। 'পুষ্পশূন্য দিগন্তের পথে'- এর প্রতীকী তাৎপর্য কোনটি?
(ক) শীত প্রকৃতির রিক্ততা (খ) বসন্তের বিপরীত রূপ (গ) পত্রপুষ্পহীন আদিগন্ত পথ (ঘ) কবির মন জুড়ে থাকা প্রিয়জন হারানোর বেদনা
উত্তর: (ঘ) কবির মন জুড়ে থাকা প্রিয়জন হারানোর বেদনা

৯১। 'তাহারেই পড়ে মনে' কবিতায় কোথায় বসন্তের আবির্ভাব ঘটেছে?
(ক) প্রকৃতিতে (খ) কবির মনে (গ) প্রিয়জনের মনে (ঘ) কবিভক্তের মনে
উত্তর: (ক) প্রকৃতিতে

৯২। 'তাহারেই পড়ে মনে' কবিতায় 'অর্ঘ্য বিরচন' শব্দটি কী অর্থে ব্যবহৃত হয়েছে?
(ক) ঋতুরাজ বসন্তকে বরণ (খ) ফুলের বন্দনাগীত (গ) বসন্তের আগমনী গান (ঘ) অঞ্জলি বা উপহার রচনা
উত্তর: (ঘ) অঞ্জলি বা উপহার রচনা

৯৩। 'কেয়ার কাঁটা' কী?
(ক) শামসুর রাহমান রচিত একটি গ্রন্থ (খ) সুফিয়া কামাল রচিত একটি গ্রন্থ (গ) জীবনানন্দ দাশ রচিত একটি গ্রন্থ (ঘ) সৈয়দ শামসুল হক রচিত একটি গ্রন্থ
উত্তর: (খ) সুফিয়া কামাল রচিত একটি গ্রন্থ

৯৪। বাংলাদেশের নারী আন্দোলনের অন্যতম পথিকৃৎ কে?
(ক) কামিনী রায় (খ) সুফিয়া কামাল (গ) নবাব ফয়জুন্নেসা (ঘ) রোকেয়া সাখাওয়াত হোসেন
উত্তর: (খ) সুফিয়া কামাল

৯৫। সুফিয়া কামাল মাতৃমূর্তিতে নন্দিত হয়েছেন—
i. সাহিত্য সাধনার জন্য ii. নারী আন্দোলনের জন্য iii. স্বদেশি আন্দোলনের জন্য
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৯৬। সুফিয়া কামাল একাধারে লিখেছেন—
i. কাব্য ii. উপন্যাস iii. স্মৃতিকথা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৯৭। 'হে কবি, নীরব কেন ফাগুন যে এসেছে ধরায়'- কবি কেন নীরব?
(ক) শীতের সৌন্দর্য ভুলতে পারছেন না বলে (খ) শীতের রিক্ততা ভুলতে পারছেন না বলে (গ) মাধবীর গন্ধ ভুলতে পারছেন না বলে (ঘ) দখিনা সমীর ভুলতে পারছেন না বলে
উত্তর: (খ) শীতের রিক্ততা ভুলতে পারছেন না বলে

৯৮। মাঘের সন্ন্যাসী দিগন্তের কেমন পথে গেছে?
(ক) পুষ্পশূন্য (খ) কুয়াশা ঢাকা (গ) পত্রহীন (ঘ) রিক্ততাপূর্ণ
উত্তর: (ক) পুষ্পশূন্য

        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            const filteredData = wrongQuestionsOnly
                ? data.map((q, i) => ({ ...q, originalIndex: i }))
                    .filter((q, i) => userAnswers[i] && userAnswers[i] !== q.answer)
                : data.map((q, i) => ({ ...q, originalIndex: i }));

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
        };
    </script>
</body>
