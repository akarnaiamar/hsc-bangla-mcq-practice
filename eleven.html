<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">গী দ্য মোপাসাঁ এর 'নেকলেস' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১. গী দ্য মোপাসাঁ কোন দেশে জন্মগ্রহণ করেন?
(ক) ফ্রান্স (খ) রাশিয়া (গ) জাপান (ঘ) চীন
উত্তর: (ক) ফ্রান্স

২. পেশাগত জীবনে পূর্বেন্দু দস্তিদার কী ছিলেন?
(ক) চাকরিজীবী (খ) শিক্ষক (গ) রাজনীতিবিদ (ঘ) আইনজীবী
উত্তর: (ঘ) আইনজীবী

৩. ধনী অথবা বিশিষ্ট লোকের সঙ্গে মাদাম লোইসেলের বিবাহের কোনো সম্ভাবনা ছিল না কেন?
(ক) শিক্ষাগত যোগ্যতার অভাবে (খ) পিতার অর্থনৈতিক দুরবস্থার কারণে (গ) বংশমর্যাদার কারণে (ঘ) বাহ্যিক সৌন্দর্যের অভাবে
উত্তর: (খ) পিতার অর্থনৈতিক দুরবস্থার কারণে

৪. মাদাম লোইসেলের মনে সর্বদা কিসের দুঃখ?
(ক) সৌন্দর্য (খ) স্বামী (গ) যোগ্যতা (ঘ) অর্থনৈতিক দুরবস্থা
উত্তর: (ঘ) অর্থনৈতিক দুরবস্থা

৫. মাদাম লোইসেল বাসকক্ষের জিনিসপত্র কেমন ছিল?
(ক) দামি (খ) রঙিন (গ) সস্তা (ঘ) বিবর্ণ
উত্তর: (ঘ) বিবর্ণ

৬. বিকেল কয়টায় গল্পগুজব করার জন্য ছোট সুরভিত একটি কক্ষের কথা লোইসেল ভাবে?
(ক) চার (খ) পাঁচ (গ) ছয় (ঘ) সাত
উত্তর: (খ) পাঁচ

৭. 'নেকলেস' গল্পে কী রঙের রোহিত মাছের টুকরোর কথা বলা হয়েছে?
(ক) গোলাপি (খ) সাদা (গ) সোনালি (ঘ) রুপালি
উত্তর: (ক) গোলাপি

৮. কী হওয়ার তীব্র ইচ্ছা মাদাম লোইসেল মনে মনে পোষণ করে?
(ক) সুন্দরী (খ) প্রণয়যাচিকা (গ) ধনী (ঘ) শিক্ষিতা
উত্তর: (খ) প্রণয়যাচিকা

৯. মাদাম লোইসেল স্বামীর হাত থেকে খামটি ছিঁড়ে তার ভেতর থেকে কী বের করল?
(ক) চিঠি (খ) কাগজ (গ) টাকা (ঘ) কার্ড
উত্তর: (ঘ) কার্ড

১০. কী জোগাড় করতে মঁসিয়ে লোইসেলকে অনেক কষ্ট করতে হয়েছে?
(ক) গোলাপ ফুল (খ) জড়োয়া হার (গ) নিমন্ত্রণলিপি (ঘ) ফ্রক
উত্তর: (গ) নিমন্ত্রণলিপি

১১. স্ত্রীকে ফুঁপিয়ে ফুঁপিয়ে কাঁদতে দেখে মঁসিয়ে লোইসেল কেমন হয়ে গেল?
(ক) বিবর্ণ (খ) নির্বাক (গ) রাগান্বিত (ঘ) হতাশ
উত্তর: (খ) নির্বাক

১২. মাদাম লোইসেল কালো স্যাটিনের বক্সে কী দেখল?
(ক) মুক্তার হার (খ) সোনার হার (গ) রুপার হার (ঘ) হীরার হার
উত্তর: (ঘ) হীরার হার

১৩. 'বল' নাচের অপরূপ পোশাকের সঙ্গে কোনটির দারিদ্র্য সুপরিস্ফুট হয়ে উঠেছিল?
(ক) স্কার্ফ (খ) চাদর (গ) জুতো (ঘ) হার
উত্তর: (খ) চাদর

১৪. হতাশ হয়ে কাঁপতে কাঁপতে মঁসিয়ে ও মাদাম লোইসেল কোন নদীর দিকে হাঁটতে থাকে?
(ক) সিন (খ) জর্ডান (গ) মিসৌরি (ঘ) ডেওসি
উত্তর: (ক) সিন

১৫. মাদাম লোইসেলের পিতা পেশায় কী ছিলেন?
(ক) ব্যবসায়ী (খ) শিক্ষক (গ) কেরানি (ঘ) আইনজীবী
উত্তর: (গ) কেরানি

১৬. মাদাম লোইসেল চরিত্রটি কেমন?
(ক) বাস্তববাদী (খ) স্পষ্টভাষী (গ) কল্পনাপ্রবণ (ঘ) আবেগপ্রবণ
উত্তর: (গ) কল্পনাপ্রবণ

১৭. মাদাম লোইসেল পোশাক কেনার জন্য তার স্বামীকে কত ফ্রাঁ-এর কথা বলেছিল?
(ক) দুইশ' (খ) তিনশ' (গ) চারশ' (ঘ) পাঁচশ'
উত্তর: (গ) চারশ'

১৮. "তারপর তার সম্পদ নিয়ে সে চলে আসে।" এখানে 'সম্পদ' বলতে কোনটিকে বোঝানো হয়েছে?
(ক) সোনার ব্রুচ (খ) কঙ্কণ (গ) হীরার হার (ঘ) সোনার হার
উত্তর: (গ) হীরার হার

১৯. মঁসিয়ে লোইসেলের কাছে তার বাবার মৃত্যুর পরে প্রাপ্ত কত হাজার ফ্রাঁ ছিল?
(ক) পাঁচ হাজার (খ) দশ হাজার (গ) আঠারো হাজার (ঘ) বিশ হাজার
উত্তর: (গ) আঠারো হাজার

২০. "তার দাম দিতে দশ বছর লেগেছে।" এখানে কিসের কথা বলা হয়েছে?
(ক) হার (খ) ফ্রক (গ) জুতো (ঘ) আংটি
উত্তর: (ক) হার

২১. কীসের ভাব নিয়ে মাদাম লোইসেল আমন্ত্রণলিপি টেবিলের উপর নিক্ষেপ করল?
(ক) রাগ (খ) অভিমান (গ) ক্ষোভ (ঘ) অবজ্ঞা
উত্তর: (ঘ) অবজ্ঞা

২২. কারা আরাম কেদারায় ঘুমিয়ে থাকবে বলে মাদাম লোইসেল ভাবত?
(ক) সে নিজে (খ) তার স্বামী (গ) দুইজন গৃহভৃত্য (ঘ) পরিচারিকা
উত্তর: (গ) দুইজন গৃহভৃত্য

২৩. 'স্যাটিন' বলতে কী বোঝানো হয়?
(ক) পুস্তক (খ) রেশমি বস্ত্র (গ) পাট বস্ত্র (ঘ) অলংকার
উত্তর: (খ) রেশমি বস্ত্র

২৪. মাদাম লোইসেল কার কথায়, কোনো কান না দিয়ে তাড়াতাড়ি সিঁড়ি বেয়ে নামতে থাকে?
(ক) স্বামীর (খ) রেমপন্নু (গ) জনশিক্ষামন্ত্রীর (ঘ) বান্ধবীর
উত্তর: (ক) স্বামীর

২৫. কত সাল পর্যন্ত ফ্রান্সে ফ্রাঁ প্রচলিত ছিল?
(ক) ২০০১ (খ) ২০০২ (গ) ২০০৩ (ঘ) ২০০৪
উত্তর: (খ) ২০০২

২৬. মাদাম লোইসেলের নৃত্যের মধ্যে কী ছিল?
(ক) গর্ব ও উৎসাহ (খ) আবেগ ও উৎসাহ (গ) সাফল্য ও আবেগ (ঘ) গর্ব ও আবেগ
উত্তর: (খ) আবেগ ও উৎসাহ

২৭. কী হিসেবে মোপাসাঁ বিশ্বব্যাপী খ্যাতি অর্জন করেন?
(ক) গল্পকার (খ) নাট্যকার (গ) কবি (ঘ) সাংবাদিক
উত্তর: (ক) গল্পকার

২৮. সাহিত্যসাধনার ক্ষেত্রে মোপাসাঁর দৃষ্টিভঙ্গি কেমন?
(ক) রাজনৈতিক (খ) পক্ষপাতী (গ) ধর্মীয় (ঘ) নিরপেক্ষ
উত্তর: (ঘ) নিরপেক্ষ

২৯. মাদাম লোইসেল তার শ্রেণির অন্যতম হিসেবে কেমন ছিল?
(ক) সুখী (খ) রাগী (গ) গর্বিত (ঘ) অসুখী
উত্তর: (ঘ) অসুখী

৩০. মাদাম লোইসেলের স্বামী শিক্ষা পরিষদ অফিসের কী ছিলেন?
(ক) শিক্ষা পরিষদ অফিসের টাইপিস্ট (খ) শিক্ষা পরিষদ অফিসের কেরানি
(গ) শিক্ষা পরিষদ অফিসের পিয়ন (ঘ) শিক্ষা পরিষদ অফিসের কর্মকর্তা
উত্তর: (খ) শিক্ষা পরিষদ অফিসের কেরানি

৩১. 'থাকবে তাতে বিভিন্ন চমৎকার আসবাব'- এখানে কীসের কথা বলা হয়েছে?
(ক) পার্শ্বকক্ষ (খ) বাসকক্ষ (গ) খাবারঘর (ঘ) বৈঠকখানা
উত্তর: (ঘ) বৈঠকখানা

৩২. কনভেন্টের বান্ধবীর সাথে দেখা করে এসে মাদাম লোইসেল সারাদিন কাঁদত কেন?
(ক) নিজ দুর্ভাগ্যের কথা ভেবে (খ) বান্ধবীর সাথে ঝগড়া করে (গ) পুরনো দিনের কথা মনে করে (ঘ) বান্ধবীর সাথে রাগ করে
উত্তর: (ক) নিজ দুর্ভাগ্যের কথা ভেবে

৩৩. বান্ধবীর সাথে দেখা করার পর মাদাম লোইসেলকে কী গ্রাস করত?
(ক) পরশ্রীকাতরতা (খ) হতাশা ও নৈরাশ্য (গ) লোভ (ঘ) অভিমান
উত্তর: (খ) হতাশা ও নৈরাশ্য

৩৪. মাদাম লোইসেল তাড়াতাড়ি খামটি ছিঁড়েছিল কেন?
(ক) দামি কিছুর আশায় (খ) নতুন খবরের আশায় (গ) স্বামীর খুশির জন্য (ঘ) কৌতূহল মেটাতে
উত্তর: (ক) দামি কিছুর আশায়

৩৫. "কিন্তু লক্ষ্মীটি, আমি ভেবেছিলাম এতে তুমি খুশি হবে।"—আলোচ্য বাক্যে কোন বিষয়টি লক্ষণীয়?
(ক) অভিমান (খ) দুঃখবোধ (গ) নিরাসক্তি (ঘ) আনুগত্য
উত্তর: (খ) দুঃখবোধ

৩৬. মাদাম লোইসেল কোন দৃষ্টি দিয়ে স্বামীর দিকে তাকাল?
(ক) ঘৃণা (খ) রাগ (গ) ক্ষোভ (ঘ) বিরক্তি
উত্তর: (ঘ) বিরক্তি

৩৭. মাতিলদা শিক্ষামন্ত্রীর নিমন্ত্রণলিপি পেয়েও যেতে চাচ্ছিল না কেন?

১২২. 'নেকলেস' গল্পের কোন বৈশিষ্ট্য উদ্দীপকে প্রতিফলিত?
(ক) ঘটনার আকস্মিকতা (খ) অবাস্তবতা (গ) নান্দনিকতা (ঘ) অপরিণামদর্শিতা
উত্তর: (ঘ) অপরিণামদর্শিতা
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
