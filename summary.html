                summary: "এটা একটা উদাহরণ। এখানে গল্পের ছোট সারাংশ লিখবে।",
                content: `                ১
আজ আমার বয়স সাতাশ মাত্র। এ জীবনটা না দৈর্ঘ্যের হিসাবে বড়ো, না গুণের হিসাবে। তবু ইহার একটু বিশেষ মূল্য আছে। ইহা সেই ফুলের মতো যাহার বুকের উপরে ভ্রমর আসিয়া বসিয়াছিল, এবং সেই পদক্ষেপের ইতিহাস তাহার জীবনের মাঝখানে ফলের মতো গুটি ধরিয়া উঠিয়াছে।

সেই ইতিহাসটুকু আকারে ছোটো, তাহাকে ছোটো করিয়াই লিখিব। ছোটোকে যাঁহারা সামান্য বলিয়া ভুল করেন না তাঁহারা ইহার রস বুঝিবেন।

কলেজে যতগুলো পরীক্ষা পাস করিবার সব আমি চুকাইয়াছি। ছেলেবেলায় আমার সুন্দর চেহারা লইয়া পণ্ডিতমশায় আমাকে শিমুল ফুল ও মাকাল ফলের সহিত তুলনা করিয়া বিদ্রূপ করিবার সুযোগ পাইয়াছিলেন। ইহাতে তখন বড়ো লজ্জা পাইতাম; কিন্তু বয়স হইয়া এ কথা ভাবিয়াছি, যদি জন্মান্তর থাকে তবে আমার মুখে সুরূপ এবং পণ্ডিতমশায়দের মুখে বিদ্রূপ আবার যেন এমনি করিয়াই প্রকাশ পায়।

আমার পিতা এতকালে গরিব ছিলেন। ওকালতি করিয়া তিনি প্রচুর টাকা রোজগার করিয়াছেন, ভোগ করিবার সময় নিমেষমাত্রও পান নাই। মৃত্যুতে তিনি যে হাঁফ ছাড়িলেন, সেই তাঁর প্রথম অবকাশ।

আমার তখন বয়স অল্প। মার হাতেই আমি মানুষ। মা গরিবের ঘরের মেয়ে; তাই, আমরা যে ধনী এ কথা তিনিও ভোলেন না, আমাকেও ভুলিতে দেন না। শিশুকালে আমি কোলে কোলেই মানুষ-- বোধ করি, সেইজন্য শেষ পর্যন্ত আমার পুরাপুরি বয়সই হইল না। আজও আমাকে দেখিলে মনে হইবে, আমি অন্নপূর্ণার কোলে গজাননের ছোটো ভাইটি।

আমার আসল অভিভাবক আমার মামা। তিনি আমার চেয়ে বড়োজোর বছর ছয়েক বড়ো। কিন্তু ফল্গুর বালির মতো তিনি আমাদের সমস্ত সংসারটাকে নিজের অন্তরের মধ্যে শুষিয়া লইয়াছেন। তাঁহাকে না খুঁড়িয়া এখানকার এক গণ্ডূষও রস পাইবার জো নাই। এই কারণে কোনো কিছুর জন্যই আমাকে কোনো ভাবনা ভাবিতে হয় না।

কন্যার পিতা মাত্রেই স্বীকার করিবেন, আমি সৎপাত্র। তামাকটুকু পর্যন্ত খাই না। ভালোমানুষ হওয়ার কোনো ঝঞ্ঝাট নাই, তাই আমি নিতান্ত ভালোমানুষ। মাতার আদেশ মানিয়া চলিবার ক্ষমতা আমার আছে-- বস্তুত না-মানিবার ক্ষমতা আমার নাই। অন্তঃপুরের শাসনে চলিবার মতো করিয়াই আমি প্রস্তুত হইয়াছি, যদি কোনো কন্যা স্বয়ম্বরা হন তবে এই সুলক্ষণটি স্মরণ রাখিবেন।

অনেক বড়ো ঘর হইতে আমার সম্বন্ধ আসিয়াছিল। কিন্তু মামা, যিনি পৃথিবীতে আমার ভাগ্যদেবতার প্রধান এজেণ্ট, বিবাহ সম্বন্ধে তাঁর একটা বিশেষ মত ছিল। ধনীর কন্যা তাঁর পছন্দ নয়। আমাদের ঘরে যে মেয়ে আসিবে সে মাথা হেঁট করিয়া আসিবে, এই তিনি চান। অথচ টাকার প্রতি আসক্তি তাঁর অস্থিমজ্জায় জড়িত। তিনি এমন বেহাই চান যাহার টাকা নাই অথচ যে টাকা দিতে কসুর করিবে না। যাহাকে শোষণ করা চলিবে অথচ বাড়িতে আসিলে গুড়গুড়ির পরিবর্তে বাঁধা হুঁকায় তামাক দিলে যাহার নালিশ খাটিবে না।

আমার বন্ধু হরিশ কানপুরে কাজ করে। সে ছুটিতে কলিকাতায় আসিয়া আমার মন উতলা করিয়া দিল। সে বলিল, 'ওহে, মেয়ে যদি বল একটা খাসা মেয়ে আছে।'

কিছুদিন পূর্বেই এম.এ. পাস করিয়াছি। সামনে যতদূর পর্যন্ত দৃষ্টি চলে ছুটি ধূ ধূ করিতেছে; পরীক্ষা নাই, উমেদারি নাই, চাকরি নাই; নিজের বিষয় দেখিবার চিন্তাও নাই, শিক্ষাও নাই, ইচ্ছাও নাই-- থাকিবার মধ্যে ভিতরে আছেন মা এবং বাহিরে আছেন মামা।

এই অবকাশের মরুভূমির মধ্যে আমার হৃদয় তখন বিশ্বব্যাপী নারীরূপের মরীচিকা দেখিতেছিল-- আকাশে তাহার দৃষ্টি, বাতাসে তাহার নিশ্বাস, তরুমর্মরে তাহার গোপন কথা।

এমন সময় হরিশ আসিয়া বলিল, 'মেয়ে যদি বল, তবে--'। আমার শরীর মন বসন্তবাতাসে বকুলবনের নবপল্লবরাশির মতো কাঁপিতে কাঁপিতে আলোছায়া ধুনিতে লাগিল। হরিশ মানুষটা ছিল রসিক, রস দিয়া বর্ণনা করিবার শক্তি তাহার ছিল, আর আমার মন ছিল তৃষার্ত।

আমি হরিশকে বলিলাম, 'একবার মামার কাছে কথাটা পাড়িয়া দেখো।'

হরিশ আসর জমাইতে অদ্বিতীয়। তাই সবর্ত্রই তাহার খাতির। মামাও তাহাকে পাইলে ছাড়িতে চান না। কথাটা তাঁর বৈঠকে উঠিল। মেয়ের চেয়ে মেয়ের বাপের খবরটাই তাঁহার কাছে গুরুতর। বাপের অবস্থা তিনি যেমনটি চান তেমনি। এককালে ইহাদের বংশে লক্ষ্মীর মঙ্গলঘট ভরা ছিল। এখন তাহা শূন্য বলিলেই হয়, অথচ তলায় সামান্য কিছু বাকি আছে। দেশে বংশমর্যাদা রাখিয়া চলা সহজ নয় বলিয়া ইনি পশ্চিমে গিয়া বাস করিতেছেন। সেখানে গরিব গৃহস্থের মতোই থাকেন। একটি মেয়ে ছাড়া তাঁর আর নাই। সুতরাং তাহারই পশ্চাতে লক্ষ্মীর ঘটটি একবারে উপুড় করিয়া দিতে দ্বিধা হইবে না।

এ-সব ভালো কথা। কিন্তু মেয়ের বয়স যে পনেরো, তাই শুনিয়া মামার মন ভার হইল। বংশে তো কোনো দোষ নাই? না, দোষ নাই-- বাপ কোথাও তাঁর মেয়ের যোগ্য বর খুঁজিয়া পান না। একে তো বরের হাট মহার্ঘ, তাহার পরে ধনুকভাঙা পণ, কাজেই বাপ কেবলই সবুর করিতেছেন কিন্তু মেয়ের বয়স সবুর করিতেছে না।

যাই হোক, হরিশের সরস রসনার গুণ আছে। মামার মন নরম হইল। বিবাহের ভূমিকা-অংশটা নির্বিঘ্নে সমাধা হইয়া গেল। কলিকাতার বাহিরে বাকি যে পৃথিবীটা আছে সমস্তটাকেই মামা আণ্ডামান দ্বীপের অন্তর্গত বলিয়া জানেন। জীবনে একবার বিশেষ কাজে তিনি কোন্নগর পর্যন্ত গিয়াছিলেন। মামা যদি মনু হইতেন তবে তিনি হাবড়ার পুল বার হওয়াটাকে তাঁহার সংহিতায় একেবারে নিষেধ করিয়া দিতেন। মনের মধ্যে ইচ্ছা ছিল, নিজের চোখে মেয়ে দেখিয়া আসিব। সাহস করিয়া প্রস্তাব করিতে পারিলাম না।

কন্যাকে আশীর্বাদ করিবার জন্য যাহাকে পাঠানো হইল সে আমাদের বিনুদাদা, আমার পিস্‌তুতো ভাই। তাহার মত, রুচি এবং দক্ষতার 'পরে আমি ষোল-আনা নির্ভর করিতে পারি। বিনুদা ফিরিয়া আসিয়া বলিলেন, 'মন্দ নয় হে! খাঁটি সোনা বটে।'

বিনুদাদার ভাষাটা অত্যন্ত আঁট। যেখানে আমরা বলি 'চমৎকার', সেখানে তিনি বলেন 'চলনসই'। অতএব বুঝিলাম, আমরা ভাগ্যে প্রজাপতির সঙ্গে পঞ্চশরের কোনো বিরোধ নাই।

২
বলা বাহুল্য, বিবাহ-উপলক্ষে কন্যাপক্ষকেই কলিকাতায় আসিতে হইল। কন্যার পিতা শম্ভুনাথবাবু হরিশকে কত বিশ্বাস করেন তাহার প্রমাণ এই যে, বিবাহের তিন দিন পূর্বে তিনি আমাকে প্রথম চক্ষে দেখেন এবং আশীর্বাদ করিয়া যান। বয়স তাঁর চল্লিশের কিছু এপারে বা ওপারে। চুল কাঁচা, গোঁফে পাক ধরিতে আরম্ভ করিয়াছে মাত্র। সুপুরুষ বটে। ভিড়ের মধ্যে দেখিলে সকলের আগে তাঁর উপরে চোখ পড়িবার মতো চেহারা।

আশা করি, আমাকে দেখিয়া তিনি খুশি হইয়াছিলেন। বোঝা শক্ত, কেননা তিনি বড়োই চুপচাপ। যে দুটি-একটি কথা বলেন, যেন তাহাতে পুরা জোর দিয়া বলেন না। মামার মুখ তখন অনর্গল ছুটিতেছিল-- ধনে মানে আমাদের স্থান যে শহরের কারো চেয়ে কম নয়, সেইটেকেই তিনি নানা প্রসঙ্গে প্রচার করিতেছিলেন। শম্ভুনাথবাবু এ কথায় একেবারে যোগই দিলেন না-- কোনো ফাঁকে একটা হুঁ বা হাঁ কিছুই শোনা গেল না। আমি হইলে দমিয়া যাইতাম। কিন্তু, মামাকে দমানো শক্ত। তিনি শম্ভুনাথবাবুর চুপচাপ ভাব দেখিয়া ভাবিলেন, লোকটা নিতান্ত নির্জীব, একেবারে কোনো তেজ নাই। বেহাই-সম্প্রদায়ের আর যাই থাক্‌, তেজ থাকাটা দোষের, অতএব মামা মনে মনে খুশি হইলেন। শম্ভুনাথবাবু যখন উঠিলেন তখন মামা সংক্ষেপে উপর হইতেই তাঁকে বিদায় করিলেন, গাড়িতে তুলিয়া দিতে গেলেন না।

পণ সম্বন্ধে দুই পক্ষে পাকাপাকি কথা ঠিক হইয়া গিয়াছিল। মামা নিজেকে অসামান্য চতুর বলিয়াই অভিমান করিয়া থাকেন। কথাবার্তায় কোথাও তিনি কিছু ফাঁক রাখেন নাই। টাকার অঙ্ক তো স্থির ছিলই, তার পরে গহনা কত ভরির এবং সোনা কত দরের হইবে সেও একেবারে বাঁধাবাঁধি হইয়া গিয়াছিল। আমি নিজে এসমস্ত কথার মধ্যে ছিলাম না; জানিতাম না, দেনা-পাওনা কী স্থির হইল। মনে জানিতাম, এই স্থূল অংশটাও বিবাহের একটা প্রধান অংশ, এবং সে অংশের ভার যাঁর উপরে তিনি এক কড়াও ঠকিবেন না। বস্তুত, আশ্চর্য পাকা লোক বলিয়া মামা আমাদের সমস্ত সংসারের প্রধান গর্বের সামগ্রী। যেখানে আমাদের কোনো সম্বন্ধ আছে সেখানে সর্বত্রই তিনি বুদ্ধির লড়াইয়ে জিতিবেন, এ একেবারে ধরা কথা। এইজন্য আমাদের অভাব না থাকিলেও এবং অন্য পক্ষের অভাব কঠিন হইলেও জিতিব, আমাদের সংসারের এই জেদ-- ইহাতে যে বাঁচুক আর যে মরুক।

গায়ে-হলুদ অসম্ভব রকম ধুম করিয়া গেল। বাহক এত গেল যে তাহার আদমসুমারি করিতে হইলে কেরানি রাখিতে হয়। তাহাদিগকে বিদায় করিতে অপর পক্ষকে যে নাকাল হইতে হইবে, সেই কথা স্মরণ করিয়া মামার সঙ্গে মা একযোগে বিস্তর হাসিলেন।

ব্যাণ্ড, বাঁশি, শখের কন্সর্ট প্রভৃতি যেখানে যতপ্রকার উচ্চ শব্দ আছে সমস্ত একসঙ্গে মিশাইয়া বর্বর কোলাহলের মত্তহস্তী দ্বারা সংগীত-সরস্বতীর পদ্মবন দলিত বিদলিত করিয়া, আমি তো বিবাহ-বাড়িতে গিয়া উঠিলাম। আংটিতে হারেতে জরি-জহরাতে আমার শরীর যেন গহনার দোকান নিলামে চড়িয়াছে বলিয়া বোধ হইল। তাঁহাদের ভাবী জামাইয়ের মূল্য কত সেটা যেন কতক পরিমাণে সর্বাঙ্গে স্পষ্ট করিয়া লিখিয়া, ভাবী শ্বশুরের সঙ্গে মোকাবিলা করিতে চলিয়াছিলাম।

মামা বিবাহ-বাড়িতে ঢুকিয়া খুশি হইলেন না। একে তো উঠানটাতে বরযাত্রীদের জায়গা সংকুলান হওয়াই শক্ত, তাহার পরে সমস্ত আয়োজন নিতান্ত মধ্যম রকমের।

ইহার পরে শম্ভুনাথবাবুর ব্যবহারটাও নেহাত ঠাণ্ডা। তাঁর বিনয়টা অজস্র নয়। মুখে তো কথাই নাই। কোমরে চাদর বাঁধা, গলাভাঙা, টাকপড়া, মিসকালো এবং বিপুল শরীর তাঁর একটি উকিল বন্ধু যদি নিয়ত হাত জোড় করিয়া, মাথা হেলাইয়া, নম্রতার স্মিতহাস্যে ও গদ্‌গদ বচনে কন্সর্ট পার্টির করতাল-বাজিয়ে হইতে শুরু করিয়া বরকর্তাদের প্রত্যেককে বার বার প্রচুররূপে অভিষিক্ত করিয়া না দিতেন তবে গোড়াতেই একটা এস্‌পার-ওসপার হইত।

আমি সভায় বসিবার কিছুক্ষণ পরেই মামা শম্ভুনাথবাবুকে পাশের ঘরে ডাকিয়া লইয়া গেলেন। কী কথা হইল জানি না, কিছুক্ষণ পরেই শম্ভুনাথবাবু আমাকে আসিয়া বলিলেন, 'বাবাজি, একবার এই দিকে আসতে হচ্ছে।'

ব্যাপারখানা এই।-- সকলের না হউক, কিন্তু কোনো কোনো মানুষের জীবনের একটা-কিছু লক্ষ্য থাকে। মামার একমাত্র লক্ষ্য ছিল, তিনি কোনোমতেই কারো কাছে ঠকিবেন না। তাঁর ভয়, তাঁর বেহাই তাঁকে গহনায় ফাঁকি দিতে পারেন--  বিবাহকার্য শেষ হইয়া গেলে সে ফাঁকির আর প্রতিকার চলিবে না। বাড়িভাড়া, সওগাদ, লোকবিদায় প্রভৃতি সম্বন্ধে যেরকম টানাটানির পরিচয় পাওয়া গেছে তাহাতে মামা ঠিক করিয়াছিলেন, দেওয়া-থোওয়া সম্বন্ধে এ লোকটির শুধু মুখের কথার উপর ভর করা চলিবে না। সেইজন্য বাড়ির স্যাক্‌রাকে সুদ্ধ সঙ্গে আনিয়াছিলেন। পাশের ঘরে গিয়া দেখিলাম, মামা এক তক্তপোশে এবং স্যাক্‌রা  তাহার দাঁড়িপাল্লা কষ্টিপাথর প্রভৃতি লইয়া মেজেয় বসিয়া আছে।

শম্ভুনাথবাবু আমাকে বলিলেন, 'তোমার মামা বলিতেছেন, বিবাহের কাজ শুরু হইবার আগেই তিনি কনের সমস্ত গহনা যাচাই করিয়া দেখিবেন, ইহাতে তুমি কী বল।'

আমি মাথা হেঁট করিয়া চুপ করিয়া রহিলাম।

মামা বলিলেন, 'ও আবার কী বলিবে। আমি যা বলিব তাই হইবে।'

শম্ভুনাথবাবু আমার দিকে চাহিয়া কহিলেন, 'সেই কথা তবে ঠিক? উনি যা বলিবেন তাই হইবে? এ সম্বন্ধে তোমার কিছুই বলিবার নাই?'

আমি একটু ঘাড়-নাড়ার ইঙ্গিতে জানাইলাম, এ-সব কথায় আমার সম্পূর্ণ অনধিকার।

'আচ্ছা তবে বোসো, মেয়ের গা হইতে সমস্ত গহনা খুলিয়া আনিতেছি।' এই বলিয়া তিনি উঠিলেন।

মামা বলিলেন, 'অনুপম এখানে কী করিবে। ও সভায় গিয়া বসুক।'

শম্ভুনাথ বলিলেন,'না, সভায় নয়, এখানেই বসিতে হইবে।'

কিছুক্ষণ পরে তিনি একখানা গামছায় বাঁধা গহনা আনিয়া তক্তপোশের উপর মেলিয়া ধরিলেন। সমস্তই তাঁহার পিতামহীদের আমলের গহনা-- হাল ফ্যাশানের সূক্ষ্ণ কাজ নয়-- যেমন মোটা, তেমনি ভারী।

স্যাক্‌রা গহনা হাতে তুলিয়া লইয়া বলিল, 'এ আর দেখিব কী। ইহাতে খাদ নাই-- এমন সোনা এখনকার দিনে ব্যবহারই হয় না।'

এই বলিয়া সে মকরমুখা মোটা একখানা বালায় একটু চাপ দিয়া দেখাইল , তাহা বাঁকিয়া যায়।

মামা তখনি তাঁর নোটবইয়ে গহনাগুলির ফর্দ টুকিয়া লইলেন, পাছে যাহা দেখানো হইল তাহার কোনোটা কম পড়ে। হিসাব করিয়া দেখিলেন, গহনা যে-পরিমাণ দিবার কথা এগুলি সংখ্যায় দরে এবং ভারে তার অনেক বেশি।

গহনাগুলির মধ্যে একজোড়া এয়ারিং ছিল। শম্ভুনাথ সেইটে স্যাক্‌রার হাতে দিয়া বলিলেন, 'এইটে একবার পরখ করিয়া দেখো।'

স্যাক্‌রা কহিল, 'ইহা বিলাতি মাল, ইহাতে সোনার ভাগ সামান্যই আছে।'

শম্ভুবাবু এয়ারিংজোড়া মামার হাতে দিয়া বলিলেন, 'এটা আপনারাই রাখিয়া দিন।'

মামা সেটা হাতে লইয়া দেখিলেন, এই এয়ারিং দিয়াই কন্যাকে তাঁহারা আশীর্বাদ করিয়াছিলেন।

মামার মুখ লাল হইয়া উঠিল। দরিদ্র তাঁহাকে ঠকাইতে চাহিবে কিন্তু তিনি ঠকিবেন না, এই আনন্দ-সম্ভোগ হইতে বঞ্চিত হইলেন এবং তাহার উপরেও কিছু উপরি-পাওনা জুটিল। অত্যন্ত মুখ ভার করিয়া বলিলেন, 'অনুপম, যাও তুমি সভায় গিয়া বোসো গে।'

শম্ভুনাথবাবু বলিলেন, 'না, এখন সভায় বসিতে হইবে না। চলুন, আগে আপনাদের খাওয়াইয়া দিই।'

মামা বলিলেন, 'সে কী কথা। লগ্ন--'

শম্ভুনাথবাবু বলিলেন, 'সেজন্য কিছু ভাবিবেন না--  এখন উঠুন।'

লোকটি নেহাত ভালোমানুষ ধরনের কিন্তু ভিতরে বেশ একটু জোর আছে বলিয়া বোধ হইল। মামাকে উঠিতে হইল। বরযাত্রীদেরও আহার হইয়া গেল। আয়োজনের আড়ম্বর ছিল না। কিন্তু, রান্না ভালো এবং সমস্ত বেশ পরিষ্কার পরিচ্ছন্ন বলিয়া সকলেরই তৃপ্তি হইল।

বরযাত্রীদের খাওয়া শেষ হইলে শম্ভুনাথবাবু আমাকে খাইতে বলিলেন। মামা বলিলেন, 'সে কী কথা। বিবাহের পূর্বে বর খাইবে কেমন করিয়া।'

এ সম্বন্ধে মামার কোনো মতপ্রকাশকে তিনি সম্পূর্ণ উপেক্ষা করিয়া আমার দিকে চাহিয়া বলিলেন, 'তুমি কী বল। বসিয়া যাইতে দোষ কিছু আছে?'

মূর্তিমতী মাতৃ-আজ্ঞা-স্বরূপে মামা উপস্থিত, তাঁর বিরুদ্ধে চলা আমার পক্ষে অসম্ভব। আমি আহারে বসিতে পারিলাম না।

তখন শম্ভুনাথবাবু মামাকে বলিলেন, 'আপনাদিগকে অনেক কষ্ট দিয়াছি। আমরা ধনী নই, আপনাদের যোগ্য আয়োজন করিতে পারি নাই, ক্ষমা করিবেন। রাত হইয়া গেছে, আর আপনাদের কষ্ট বাড়াইতে ইচ্ছা করি না। এখন তবে--'

মামা বলিলেন, 'তা,সভায় চলুন, আমরা তো প্রস্তুত আছি।'

শম্ভুনাথ বলিলেন, 'তবে আপনাদের গাড়ি বলিয়া দিই?'

মামা আশ্চর্য হইয়া বলিলেন, 'ঠাট্টা করিতেছেন নাকি?'

শম্ভুনাথ কহিলেন, 'ঠাট্টা তো আপনিই করিয়া সারিয়াছেন। ঠাট্টার সম্পর্কটাকে স্থায়ী করিবার ইচ্ছা আমার নাই।'

মামা দুই চোখ এতবড়ো করিয়া মেলিয়া অবাক হইয়া রহিলেন।

শম্ভুনাথ কহিলেন, 'আমার কন্যার গহনা আমি চুরি করিব, এ কথা যারা মনে করে তাদের হাতে আমি কন্যা দিতে পারি না।'

আমাকে একটি কথাও বলাও তিনি আবশ্যক বোধ করিলেন না। কারণ, প্রমাণ হইয়া গেছে, আমি কেহই নই।

তার পরে যা হইল সে আমি বলিতে ইচ্ছা করি না। ঝাড়লণ্ঠন ভাঙিয়া-চুরিয়া, জিনিসপত্র লণ্ডভণ্ড করিয়া, বরযাত্রের দল দক্ষযজ্ঞের পালা সারিয়া বাহির হইয়া গেল।

বাড়ি ফিরিবার সময় ব্যাণ্ড রসনচৌকি ও কন্সর্ট একসঙ্গে বাজিল না এবং অভ্রের ঝাড়গুলো আকাশের তারার উপর আপনাদের কর্তব্যের বরাত দিয়া কোথায় যে মহানির্বাণ লাভ করিল সন্ধান পাওয়া গেল না।

৩
বাড়ির সকলে তো রাগিয়া আগুন। কন্যার পিতার এত গুমর! কলি যে চারপোয়া হইয়া আসিল! সকলে বলিল,'দেখি, মেয়ের বিয়ে দেন কেমন করিয়া।' কিন্তু মেয়ের বিয়ে হইবে না, এ ভয় যার মনে নেই তার শাস্তির উপায় কী।

সমস্ত বাংলাদেশের মধ্যে আমিই একমাত্র পুরুষ যাহাকে কন্যার বাপ বিবাহের আসর হইতে নিজে ফিরাইয়া দিয়াছে। এতবড়ো সৎপাত্রের কপালে এতবড়ো কলঙ্কের দাগ কোন্‌ নষ্টগ্রহ এত আলো জ্বালাইয়া, বাজনা বাজাইয়া, সমারোহ করিয়া, আঁকিয়া দিল? বরযাত্ররা এই বলিয়া কপাল চাপড়াইতে লাগিল যে, 'বিবাহ হইল না অথচ আমাদের ফাঁকি দিয়া খাওয়াইয়া দিল-- পাকযন্ত্রটাকে সমস্ত অন্নসুদ্ধ সেখানে টান মারিয়া ফেলিয়া দিয়া আসিতে পারিলে তবে আফসোস মিটিত।'

'বিবাহের চুক্তিভঙ্গ ও মানহানির দাবিতে নালিশ করিব' বলিয়া মামা অত্যন্ত গোল করিয়া বেড়াইতে লাগিলেন। হিতৈষীরা বুঝাইয়া দিল, তাহা হইলে তামাশার যেটুকু বাকি আছে তাহা পুরা হইবে।

বলা বাহুল্য, আমিও খুব রাগিয়াছিলাম। কোনো গতিকে শম্ভুনাথ বিষম জব্দ হইয়া আমাদের পায়ে ধরিয়া আসিয়া পড়েন, গোঁফের রেখায় তা দিতে দিতে যেটুকু বাকি আছে তাহা পুরা হইবে।

কিন্তু, এই আক্রোশের কালো রঙের স্রোতের পাশাপাশি আর-একটা স্রোত বহিতেছিল যেটার রঙ একেবারেই কালো নয়। সমস্ত মন যে সেই অপরিচিতার পানে ছুটিয়া গিয়াছিল--এখনো যে তাহাকে কিছুতেই টানিয়া ফিরাইতে পারি না। দেয়ালটুকুর আড়ালে রহিয়া গেল গো। কপালে তার চন্দন আঁকা, গায়ে তার লাল শাড়ি, মুখে তার লজ্জার রক্তিমা, হৃদয়ের ভিতরে কী যে তা কেমন করিয়া বলিব। আমার কল্পলোকের কল্পলতাটি বসন্তের সমস্ত ফুলের ভার আমাকে নিবেদন করিয়া দিবার জন্য নত হইয়া পড়িয়াছিল। হাওয়া আসে, গন্ধ পাই, পাতার শব্দ শুনি-- কেবল আর একটিমাত্র পা-ফেলার অপেক্ষা-- এমন সময়ে সেই এক পদক্ষেপের দূরত্বটুকু এক মুহূর্তে অসীম হইয়া উঠিল।

এতদিন যে প্রতি সন্ধ্যায় আমি বিনুদার বাড়িতে গিয়া তাঁহাকে অস্থির করিয়া তুলিয়াছিলাম। বিনুদার বর্ণনার ভাষা অত্যন্ত সংকীর্ণ বলিয়াই তাঁর প্রত্যেক কথাটি স্ফুলিঙ্গের মতো আমার মনের মাঝখানে আগুন জ্বালিয়া দিয়াছিল। বুঝিয়াছিলাম, মেয়েটির রূপ বড়ো আশ্চর্য, কিন্তু না দেখিলাম তাহাকে চোখে, না দেখিলাম তার ছবি; সমস্তই অস্পষ্ট হইয়া রহিল; বাহিরে ত সে ধরা দিলই না, তাহাকে মনেও আনিতে পারিলাম না-- এইজন্য মন সেদিনকার সেই বিবাহসভার দেয়ালটার বাহিরে ভূতের মতো দীর্ঘনিশ্বাস ফেলিয়া বেড়াইতে লাগিল।

হরিশের কাছে শুনিয়াছি, মেয়েটিকে আমার ফোটোগ্রাফ দেখানো হইয়াছিল। পছন্দ করিয়াছে বৈকি। না করিবার তো কোনো কারণ নাই। আমার মন বলে, সে ছবি তার কোনো একটি বাক্সে লুকানো আছে। একলা ঘরে দরজা বন্ধ করিয়া এক- একদিন নিরালা দুপুরবেলায় সে কি সেটি খুলিয়া দেখে না। যখন ঝুঁকিয়া পড়িয়া দেখে তখন ছবিটির উপরে কি তার মুখের দুই ধার দিয়া এলোচুল আসিয়া পড়ে না। হঠাৎ বাহিরে কারো পায়ের শব্দ পাইলে সে কি তাড়াতাড়ি তার সুগন্ধ আঁচলের মধ্যে ছবিটিকে লুকাইয়া ফেলে না।

দিন যায়। একটা বৎসর গেল। মামা তো লজ্জায় বিবাহসম্বন্ধের কথা তুলিতেই পারেন না। মার ইচ্ছা ছিল, আমার অপমানের কথা যখন সমাজের লোক ভুলিয়া যাইবে তখন বিবাহের চেষ্টা দেখিবেন।

এদিকে আমি শুনিলাম, সে মেয়ের নাকি ভালো পাত্র জুটিয়াছিল কিন্তু সে পণ করিয়াছে , বিবাহ করিবে না। শুনিয়া আমার মন পুলকের আবেশে ভরিয়া গেল। আমি কল্পনায় দেখিতে লাগিলাম, সে ভালো করিয়া খায় না। সন্ধ্যা হইয়া আসে, সে চুল বাঁধিতে ভুলিয়া যায়। তার বাপ তার মুখের পানে চান আর ভাবেন, 'আমার মেয়ে দিনে দিনে এমন হইয়া যাইতেছে কেন।' হঠাৎ কোনোদিন তার ঘরে আসিয়া দেখেন, মেয়ের দুই চক্ষে জলে ভরা। জিজ্ঞাসা করেন, 'মা, তোর কী হইয়াছে বল্‌ আমাকে।' মেয়ে তাড়াতাড়ি চোখের জল মুছিয়া বলে, 'কই কিছুই তো হয়নি,বাবা।' বাপের এক মেয়ে যে-- বড়ো আদরের মেয়ে। যখন অনাবৃষ্টির দিনের ফুলের কুঁড়িটির মতো মেয়ে একেবারে বিমর্ষ হইয়া পড়িয়াছে তখন বাপের প্রাণে আর সহিল না। তখন অভিমান ভাসাইয়া দিয়া তিনি ছুটিয়া আসিলেন আমাদের দ্বারে। তার পরে? তার পরে মনের মধ্যে সেই যে কালো রঙের ধারাটা বহিতেছে সে যেন কালো সাপের মতো রূপ ধরিয়া ফোঁস করিয়া উঠিল। সে বলিল, 'বেশ তো, আর-একবার বিবাহের আসর সাজানো হোক, আলো জ্বলুক, দেশ-বিদেশের লোকের নিমন্ত্রণ হোক, তার পরে তুমি বরের টোপর পায়ে দলিয়া দলবল লইয়া সভা ছাড়িয়া চলিয়া এসো।' কিন্তু, যে ধারাটি চোখের জলের মতো শুভ্র সে রাজহংসের রূপ ধরিয়া বলিল, যেমন করিয়া আমি একদিন দময়ন্তীর পুষ্পবনে গিয়াছিলাম তেমনি করিয়া আমাকে একবার উড়িয়া যাইতে দাও-- আমি বিরহিণীর কানে কানে একবার সুখের খবরটা দিয়া আসি গে।' তার পরে? তার পরে দুঃখের রাত পোহাইল, নববর্ষার জল পড়িল, ম্লান ফুলটি মুখ তুলিল--এবারে সেই দেয়ালটার বাহিরে রহিল সমস্ত পৃথিবীর আর-সবাই, আর ভিতরে প্রবেশ করিল একটিমাত্র মানুষ। তার পরে? তার পরে আমার কথাটি ফুরালো।

৪
কিন্তু, কথা এমন করিয়া ফুরাইল না। যেখানে আসিয়া তাহা অফুরান হইয়াছে সেখানকার বিবরণ একটুখানি বলিয়া আমার এ লেখা শেষ করিয়া দিই।

মাকে লইয়া তীর্থে চলিয়াছিলাম। আমার উপরেই ভার ছিল। কারণ, মামা এবারেও হাবড়ার পুল পার হন নাই। রেলগাড়িতে ঘুমাইতেছিলাম। ঝাঁকানি খাইতে খাইতে মাথার মধ্যে নানাপ্রকার এলোমেলো স্বপ্নের ঝুমঝুমি বাজিতেছিল। হঠাৎ একটা কোন্‌ স্টেশনে জাগিয়া উঠিলাম। আলোতে অন্ধকারে মেশা সেও এক স্বপ্ন; কেবল আকাশের তারাগুলি চিরপরিচিত-- আর সবই অজানা অস্পষ্ট; স্টেশনের দীপ-কয়টা খাড়া হইয়া দাঁড়াইয়া আলো ধরিয়া এই পৃথিবীটা যে কত অচেনা, এবং যাহা চারি দিকে তাহা যে কতই বহুদূরে, তাহাই দেখাইয়া দিতেছে। গাড়ির মধ্যে মা ঘুমাইতেছেন; আলোর নীচে সবুজ পর্দা টানা; তোরঙ্গ বাক্স জিনিসপত্র সমস্তই কে কার ঘাড়ে এলোমেলো হইয়া রহিয়াছে, তাহারা যেন স্বপ্নলোকের উলটপালট আসবাব, সবুজ প্রদোষের মিট্‌মিটে আলোতে থাকা এবং না-থাকার মাঝখানে কেমন-একরকম হইয়া পড়িয়া আছে।

এমন সময়ে সেই অদ্ভুত পৃথিবীর অদ্ভুত রাত্রে কে বলিয়া উঠিল, 'শিগ্‌গির চলে আয়, এই গাড়িতে জায়গা আছে।'

মনে হইল, যেন গান শুনিলাম। বাঙালি মেয়ের গলায় বাংলা কথা যে কী মধুর তাহা এমনি করিয়া অসময়ে অজায়গায় আচমকা শুনিলে তবে সম্পূর্ণ বুঝিতে পারা যায়। কিন্তু, এই গলাটিকে কেবলমাত্র মেয়ের গলা বলিয়া একটা শ্রেণীভুক্ত করিয়া দেওয়া চলে না, এ কেবল একটি মানুষের গলা; শুনিলেই মন বলিয়া ওঠে, 'এমন তো আর শুনি নাই।'

চিরকাল গলার স্বর আমার কাছে বড়ো সত্য। রূপ জিনিসটি বড়ো কম নয় কিন্তু মানুষের মধ্যে যাহা অন্তরতম এবং অনির্বচনীয়, আমার মনে হয়, কণ্ঠস্বর যেন তারই চেহারা। আমি তাড়াতাড়ি গাড়ির জানলা খুলিয়া বাহিরে মুখ বাড়াইয়া দিলাম; কিছুই দেখিলাম না। প্ল্যাট্‌ফর্মের অন্ধকারে দাঁড়াইয়া গার্ড তাহার একচক্ষু লণ্ঠন নাড়িয়া দিল, গাড়ি চলিল; আমি জানলার কাছে বসিয়া রহিলাম। আমার চোখের সামনে কোনো মূর্তি ছিল না, কিন্তু হৃদয়ের মধ্যে আমি একটি হৃদয়ের রূপ দেখিতে লাগিলাম। সে যেন এই তারাময়ী রাত্রির মতো, আবৃত করিয়া ধরে কিন্তু তাহাকে ধরিতে পারা যায় না। ওগো সুর, অচেনা কণ্ঠের সুর, এক নিমেষে তুমি যে আমার চিরপরিচয়ের আসনটির উপরে আসিয়া বসিয়াছ। কী আশ্চর্য পরিপূর্ণ তুমি-- চঞ্চল কালের ক্ষুব্ধ হৃদয়ের উপরে ফুলটির মতো ফুটিয়াছে অথচ তার ঢেউ লাগিয়া একটি পাপড়িও টলে নাই, অপরিমেয় কোমলতায় এতটুকু দাগ পড়ে নাই।

গাড়ি লোহার মৃদঙ্গে তাল দিতে দিতে চলিল; আমি মনের মধ্যে গান শুনিতে শুনিতে চলিলাম। তাহার একটিমাত্র ধুয়া-- 'গাড়িতে জায়গা আছে।' আছে কি, জায়গা আছে কি। জায়গা যে পাওয়া যায় না, কেউ যে কাকেও চেনে না। অথচ সেই না-চেনাটুকু যে কুয়াশামাত্র, সে যে মায়া, সেটা ছিন্ন হইলেই যে চেনার আর অন্ত নাই। ওগো সুধাময় সুর, যে হৃদয়ের অপরূপ রূপ তুমি সেই কি আমার চিরকালের চেনা নয়। জায়গা আছে, আছে--শীঘ্র আসিতে ডাকিয়াছ, শীঘ্রই আসিয়াছি, এক নিমেষও দেরি করি নাই।

রাত্রে ভালো করিয়া ঘুম হইল না। প্রায় প্রতি স্টেশনেই একবার করিয়া মুখ বাড়াইয়া দেখিলাম, ভয় হইতে লাগিল, যাহাকে দেখা হইল না সে পাছে রাত্রেই নামিয়া যায়।

পরদিন সকালে একটা বড়ো স্টেশনে গাড়ি বদল করিতে হইবে। আমাদের ফার্স্টক্লাসের টিকিট-- মনে আশা ছিল, ভিড় হইবে না। নামিয়া দেখি, প্ল্যাটফর্মে সাহেবদের আর্দালি-দল আসবাবপত্র লইয়া গাড়ির জন্য অপেক্ষা করিতেছে। কোন্‌ এক ফৌজের বড়ো জেনারেল-সাহেব ভ্রমণে বাহির হইয়াছেন। দুই-তিন মিনিট পরেই গাড়ি আসিল। বুঝিলাম, ফার্স্টক্লাসের আশা ত্যাগ করিতে হইবে। মাকে লইয়া কোন্‌ গাড়িতে উঠি সে এক বিষম ভাবনায় পড়িলাম। সব গাড়িতেই ভিড়। দ্বারে দ্বারে উঁকি মারিয়া বেড়াইতে লাগিলাম। এমন সময় সেকেণ্ডক্লাসের গাড়ি হইতে একটি মেয়ে আমার মাকে লক্ষ্য করিয়া বলিলেন, 'আপনারা আমাদের গাড়িতে আসুন-না--এখানে জায়গা আছে।'

আমি তো চমকিয়া উঠিলাম। সেই আশ্চর্যমধুর কণ্ঠ এবং সেই গানেরই ধুয়া-- 'জায়গা আছে'। ক্ষণমাত্র বিলম্ব না করিয়া মাকে লইয়া গাড়িতে উঠিয়া পড়িলাম। জিনিসপত্র তুলিবার প্রায় সময় ছিল না। আমার মতো অক্ষম দুনিয়ায় নাই। সেই মেয়েটিই কুলিদের হাত হইতে তাড়াতাড়ি চল্‌তি গাড়িতে আমাদের বিছানাপত্র টানিয়া লইল। আমার একটা ফোটোগ্রাফ তুলিবার ক্যামেরা স্টেশনেই পড়িয়া রহিল--  গ্রাহ্যই করিলাম না।

তার পরে-- কী লিখিব জানি না। আমার মনের মধ্যে একটি অখণ্ড আনন্দের ছবি আছে, তাহাকে কোথায় শুরু করিব, কোথায় শেষ করিব? বসিয়া বসিয়া বাক্যের পর বাক্য যোজনা করিতে ইচ্ছা করে না।এবার সেই সুরটিকে চোখে দেখিলাম। তখনো তাহাকে সুর বলিয়াই মনে হইল। মায়ের মুখের দিকে চাহিলাম; দেখিলাম, তাঁর চোখে পলক পড়িতেছে না। মেয়েটির বয়স ষোলো কি সতেরো হইবে, কিন্তু নবযৌবন ইহার দেহে মনে কোথাও যেন একটুও ভার চাপাইয়া দেয় নাই। ইহার গতি সহজ, দীপ্তি নির্মল, সৌন্দর্যের শুচিতা অপূর্ব, ইহার কোনো জায়গায় কিছু জড়িমা নাই।

আমি দেখিতেছি, বিস্তারিত করিয়া কিছু বলা আমার পক্ষে অসম্ভব। এমন-কি, সে যে কী রঙের কাপড় কেমন করিয়া পরিয়াছিল তাহাও ঠিক করিয়া বলিতে পারিব না। এটা খুব সত্য যে, তার বেশে ভূষায় এমন কিছুই ছিল না যেটা তাহাকে ছাড়াইয়া বিশেষ করিয়া চোখে পড়িতে পারে। সে নিজের চারি দিকের সকলের চেয়ে অধিক-রজনীগন্ধার শুভ্র মঞ্জরীর মতো সরল বৃন্তটির উপরে দাঁড়াইয়া, যে গাছে ফুটিয়াছে সে গাছকে সে একেবারে অতিক্রম করিয়া উঠিয়াছে। সঙ্গে দুটি-তিনটি ছোটো ছোটো মেয়ে ছিল, তাহাদিগকে লইয়া তাহার হাসি এবং কথার আর অন্ত ছিল না। আমি হাতে একখানা বই লইয়া সেদিকে কান পাতিয়া রাখিয়াছিলাম। যেটুকু কানে আসিতেছিল সে তো সমস্তই ছেলেমানুষদের সঙ্গে ছেলেমানুষি কথা। তাহার বিশেষত্ব এই যে, তাহার মধ্যে বয়সের তফাত কিছুমাত্র ছিল না -- ছোটোদের সঙ্গে সে অনায়াসে এবং আনন্দে ছোটো হইয়া গিয়াছিল। সঙ্গে কতকগুলি ছবিওয়ালা ছেলেদের গল্পের বই-- তাহারই কোন্‌ একটা বিশেষ গল্প শোনাইবার জন্য মেয়েরা তাকে ধরিয়া পড়িল। এ গল্প নিশ্চয় তারা বিশ পঁচিশ বার শুনিয়াছে। মেয়েদের কেন যে এত আগ্রহ তাহা বুঝিলাম। সেই সুধাকণ্ঠের সোনার কাঠিতে সকল কথা যে সোনা হইয়া ওঠে। মেয়েটির সমস্ত শরীর মন যে একেবারে প্রাণে ভরা, তার সমস্ত চলায় বলায় স্পর্শে প্রাণ ঠিকরিয়া ওঠে। তাই মেয়েরা যখন তার মুখে গল্প শোনে তখন, গল্প নয়, তাহাকেই শোনে; তাহাদের হৃদয়ের উপর প্রাণের ঝরনা ঝরিয়া পড়ে। তার সেই উদ্ভাসিত প্রাণ আমার সেদিনকার সমস্ত সূর্যকিরণকে সজীব করিয়া তুলিল; আমার মনে হইল, আমাকে যে-প্রকৃতি তাহার আকাশ দিয়া বেষ্টন করিয়াছে সে ঐ তরুণীরই অক্লান্ত অম্লান প্রাণের বিশ্বব্যাপী বিস্তার।-- পরের স্টেশনে পৌঁছিতেই খাবারওয়ালাকে ডাকিয়া সে খুব খানিকটা চানা-মুঠ কিনিয়া লইল, এবং মেয়েদের সঙ্গে মিলিয়া নিতান্ত ছেলেমানুষের মতো করিয়া কলহাস্য করিতে করিতে অসংকোচে খাইতে লাগিল। আমার প্রকৃতি যে জাল দিয়া বেড়া--আমি কেন বেশ সহজে হাসিমুখে মেয়েটির কাছে এই চানা একমুঠা চাহিয়া লইতে পারিলাম না। হাত বাড়াইয়া দিয়া কেন আমার লোভ স্বীকার করিলাম না।

মা ভালো-লাগা এবং মন্দ-লাগার মধ্যে দোমনা হইয়া ছিলেন। গাড়িতে আমি পুরুষমানুষ, তবু ইহার কিছুমাত্র সংকোচ নাই, বিশেষত এমন লোভীর মত খাইতেছে,সেটা ঠিক তাঁর পছন্দ হইতেছিল না; অথচ ইহাদের বেহায়া বলিয়াও তাঁর ভ্রম হয় নাই। তাঁর মনে হইল, এ মেয়ের বয়স হইয়াছে কিন্তু শিক্ষা হয় নাই। মা হঠাৎ কারো সঙ্গে আলাপ করিতে পারেন না। মানুষের সঙ্গে দূরে দূরে থাকাই তাঁর অভ্যাস। এই মেয়েটির পরিচয় লইতে তাঁর খুব ইচ্ছা, কিন্তু স্বাভাবিক বাধা কাটাইয়া উঠিতে পারিতেছিলেন না।

এমন সময় গাড়ি একটা বড়ো স্টেশনে আসিয়া থামিল। সেই জেনারেল-সাহেবের একদল অনুসঙ্গী এই স্টেশন হইতে উঠিবার উদ্যোগ করিতেছে। গাড়িতে কোথাও জায়গা নাই। বার বার আমাদের গাড়ির সামনে দিয়া তারা ঘুরিয়া গেল। মা তো ভয়ে আড়ষ্ট, আমিও মনের মধ্যে শান্তি পাইতেছিলাম না।

গাড়ি ছাড়িবার অল্পকাল পূর্বে একজন দেশী রেলোয়ে কর্মচারী, নাম-লেখা দুই খানা টিকিট গাড়ির দুই বেঞ্চের কাছে লট্‌কাইয়া দিয়া আমাকে বলিল, 'এ গাড়ির এই দুই বেঞ্চ আগে হইতেই দুই সাহেব রিজার্ভ করিয়াছেন, আপনাদিগকে অন্য গাড়িতে যাইতে হইবে।'

আমি তো তাড়াতাড়ি ব্যস্ত হইয়া দাঁড়াইয়া উঠিলাম। মেয়েটি হিন্দিতে বলিল, 'না, আমরা গাড়ি ছাড়িব না।'

সে লোকটি রোখ করিয়া বলিল, 'না ছাড়িয়া উপায় নাই।'

কিন্তু মেয়েটির চলিষ্ণুতার কোনো লক্ষণ না দেখিয়া সে নামিয়া গিয়া ইংরেজ স্টেশন-মাস্টারকে ডাকিয়া আনিল। সে আসিয়া আমাকে বলিল, 'আমি দুঃখিত কিন্তু--'

শুনিয়া আমি 'কুলি কুলি' করিয়া ডাক ছাড়িতে লাগিলাম। মেয়েটি উঠিয়া দুই চক্ষে অগ্নিবর্ষণ করিয়া বলিল,'না, আপনি যাইতে পারিবেন না, যেমন আছেন বসিয়া থাকুন।'

বলিয়া সে দ্বারের কাছে দাঁড়াইয়া স্টেশন-মাস্টারকে ইংরেজি ভাষায় বলিল, 'এ গাড়ি আগে হইতে রিজার্ভ করা, এ কথা মিথ্যাকথা।'

বলিয়া নাম-লেখা টিকিট খুলিয়া প্ল্যাটফর্মে ছুঁড়িয়া ফেলিয়া দিল।

ইতিমধ্যে আর্দালি সমেত ইউনিফর্ম-পরা সাহেব দ্বারের কাছে আসিয়া দাঁড়াইয়াছে। গাড়িতে সে তার আসবাব উঠাইবার জন্য আর্দালিকে প্রথমে ইশারা করিয়াছিল। তাহার পর মেয়েটির মুখে তাকাইয়া, তার কথা শুনিয়া, ভাব দেখিয়া স্টেশন-মাস্টারকে একটু স্পর্শ করিল এবং তাহাকে আড়ালে লইয়া গিয়া কী কথা হইল জানি না। দেখা গেল, গাড়ি ছাড়িবার সময় অতীত হইলেও আর-একটা গাড়ি জুড়িয়া তবে ট্রেন ছাড়িল। মেয়েটি তার দলবল লইয়া আবার একপত্তন চানা-মুঠ খাইতে শুরু করিল , আর আমি লজ্জায় জানলার বাহিরে মুখ বাড়াইয়া প্রকৃতির শোভা দেখিতে লাগিলাম ।

কানপুরে গাড়ি আসিয়া থামিল। মেয়েটি জিনিসপত্র বাঁধিয়া প্রস্তুত-- স্টেশনে একটি হিন্দুস্থানি চাকর ছুটিয়া আসিয়া ইহাদিগকে নামাইবার উদ্যোগ করিতে লাগিল।

মা তখন  আর থাকিতে পারিলেন না। জিজ্ঞাসা করিলেন, 'তোমার নাম কী, মা।'

মেয়েটি বলিল, 'আমার নাম কল্যাণী।'

শুনিয়া মা এবং আমি দুজনেই চমকিয়া উঠিলাম।

'তোমার বাবা-- '

'তিনি এখানকার ডাক্তার, তাঁর নাম শম্ভুনাথ সেন।'

তার পরেই সবাই নামিয়া গেল।

উপসংহার
মামার নিষেধ অমান্য করিয়া, মাতৃ-আজ্ঞা ঠেলিয়া, তার পরে আমি কানপুরে আসিয়াছি। কল্যাণীর বাপ এবং কল্যাণীর সঙ্গে দেখা হইয়াছে। হাত জোড় করিয়াছি, মাথা হেঁট করিয়াছি; শম্ভুনাথবাবুর হৃদয় গলিয়াছে। কল্যাণী বলে, 'আমি বিবাহ করিব না।'

আমি জিজ্ঞাসা করিলাম, 'কেন।'

সে বলিল, 'মাতৃ-আজ্ঞা।'

কী সর্বনাশ! এ পক্ষেও মাতুল আছে নাকি।

তার পরে বুঝিলাম, মাতৃভূমি আছে। সেই বিবাহ-ভাঙার পর হইতে কল্যাণী মেয়েদের শিক্ষার ব্রত গ্রহণ করিয়াছে।

কিন্তু, আমি আশা ছাড়িতে পারিলাম না। সেই সুরটি যে আমার হৃদয়ের মধ্যে আজও বাজিতেছে-- সে যেন কোন্‌ ওপারের বাঁশি-- আমার সংসারের বাহির হইতে আসিল-- সমস্ত সংসারের বাহিরে ডাক দিল। আর, সেই যে রাত্রির অন্ধকারের মধ্যে আমার কানে আসিয়াছিল 'জায়গা আছে', সে যে আমার চিরজীবনের গানের ধুয়া হইয়া রহিল। তখন আমার বয়স ছিল তেইশ, এখন হইয়াছে সাতাশ। এখনো আশা ছাড়ি নাই, কিন্তু মাতুলকে ছাড়িয়াছি। নিতান্ত এক ছেলে বলিয়া মা আমাকে ছাড়িতে পারেন নাই।

তোমরা মনে করিতেছ, আমি বিবাহের আশা করি? না, কোনোকালেই না। আমার মনে আছে, কেবল সেই একরাত্রির অজানা কণ্ঠের মধুর সুরের আশা-- জায়গা আছে। নিশ্চয়ই আছে। নইলে দাঁড়াব কোথায়? তাই বৎসরের পর বৎসর যায়-- আমি এইখানেই আছি। দেখা হয়, সেই কণ্ঠ শুনি, যখন সুবিধা পাই কিছু তার কাজ করে দিই-- আর মন বলে, এই তো জায়গা পাইয়াছি। ওগো অপরিচিতা, তোমার পরিচয়ের শেষ হইল না, শেষ হইবে না; কিন্তু ভাগ্য আমার ভালো, এই তো আমি জায়গা পাইয়াছি।

গগনে গরজে মেঘ, ঘন বরষা।
কূলে একা বসে আছি, নাহি ভরসা।
      রাশি রাশি ভারা ভারা
      ধান-কাটা হল সারা,

খরপরশা—

এখন আমারে লহো করুণা ক'রে॥

                summary: "সারাংশ লিখো",
                content: `
কোন রোগীর চিকিৎসা করিতে হইলে প্রথমে রোগের অবস্থা জানা আবশ্যক (নারীর অধঃপতিত দশা থেকে মুক্তির জন্য প্রথমে তাদের হীনদশার স্বরূপ উন্মোচন জরুরি)। তাই অবলাজাতির (নারী) উন্নতির পথ আবিষ্কার করিবার পূর্বে তাহাদের অবনতির চিত্র দেখাইতে হয়। আমি “স্ত্রীজাতির অবনতি” শীর্ষক প্রবন্ধে ভগিনীদিগকে জানাইয়াছি যে, আমাদের একটা রোগ আছে-‘দাসত্ব’ (মানসিক দাসত্ব ও নারীর ব্যক্তিত্বহীনতা)। সে রোগের কারণ এবং অবস্থা কতক পরিমাণে ইতঃপূর্বে (স্ত্রীজাতির অবনতি প্রবন্ধে) বর্ণনা করা হইয়াছে। এক্ষণে আমরা দেখাইতে চেষ্টা করিব, সেই রোগ হওয়ায় আমাদের সামাজিক অবস্থা কেমন বিকৃত হইয়াছে। ঔষধ পথ্যের বিধান স্থানান্তরে দেওয়া হইবে।

এইখানে গোঁড়া পর্দাপ্রিয় ভগ্নীদের অবগতির জন্য দু একটা কথা বলিয়া রাখা আবশ্যক বোধ করি। আমি অবরোধ প্রথার (পুরুষশাসনের ফলে গৃহবন্দি হওয়া অন্তঃপুরের নারী) বিরুদ্ধে দণ্ডায়মান হই নাই। কেহ যদি আমার “স্ত্রীজাতির অবনতি” প্রবন্ধে পর্দাবিদ্বেষ ছাড়া আর কোন উদ্দেশ্য দেখিতে না পান, তবে আমাকে মনে করিতে হইবে আমি নিজের মনোভাব উত্তমরূপে ব্যক্ত করিতে পারি নাই, অথবা তিনি প্রবন্ধটি মনোযোগ সহকারে পাঠ করেন নাই।

সে প্রবন্ধে প্রায় সমগ্র নারীজাতির উল্লেখ আছে। সকল সমাজের মহিলাগণই কি অবরোধে বন্দিনী থাকেন? অথবা তাঁহারা পর্দানশীল নহেন বলিয়া কি আমি তাঁহাদিগকে সম্পূর্ণ উন্নত বলিয়াছি? আমি মানসিক দাসত্বের (enslaved মনের) আলোচনা করিয়াছি।

কোন একটা নূতন কাজ করিতে গেলে সমাজ প্রথমত গোলযোগ উপস্থিত করে (নতুনকে মেনে নিতে সংকোচ) এবং পরে সেই নূতন চাল চলন সহিয়া লয়, তাহারই দৃষ্টান্তস্বরূপ পার্সি মহিলাদের পরিবর্তিত অবস্থার উল্লেখ করিয়াছি। পূর্বে তাঁহারা ছত্রব্যবহারেরও অধিকারিণী ছিলেন না (বাইরে যাওয়ার অনুমতি না থাকায়), তারপর তাঁহাদের বাড়াবাড়িটা সীমা লঙ্ঘন করিয়াছে, তবু তো পৃথিবী ধ্বংস হয় নাই। এখন পার্সি মহিলাদের পর্দামোচন হইয়াছে সত্য, কিন্তু মানসিক দাসত্ব মোচন হইয়াছে কি? অবশ্যই হয় নাই। আর ঐ যে পর্দা ছাড়িয়াছেন, তাহা দ্বারা তাঁহাদের স্বকীয় বুদ্ধি-বিবেচনার তো কোন পরিচয় পাওয়া যায় না। পার্সি পুরুষগণ কেবল অন্ধভাবে বিলাতি সভ্যতার অনুকরণ করিতে যাইয়া (সমালোচনা) স্ত্রীদিগকে পর্দার বাইরে আনিয়াছে, ইহাতে অবলাদের জীবনীশক্তির তো কিছু পরিচয় পাওয়া যায় না-তাঁহারা যে জড়পদার্থ, সেই জড়পদার্থই আছেন। পুরুষ যখন তাঁহাদিগকে অন্তঃপুরে রাখিতেন, তাঁহারা তখন সেইখানে থাকিতেন। আবার পুরুষ যখন তাঁহাদের “নাকের দড়ি” ধরিয়া টানিয়া তাঁহাদিগকে মাঠে বাহির করিয়াছেন, তখনই তাঁহারা পর্দার বাহির হইয়াছে! ইহাতে রমণীকুলের বাহাদুরি কী? ঐরূপ পর্দা-বিরোধ কখনই প্রশংসনীয় নহে।

কলম্বস যখন আমেরিকা আবিস্কার করিতে কৃতসঙ্কল্প হন, তখন লোকে তাঁহাকে বাতুল বলে নাই কি (অবিশ্বাস্য কাজে হাত দেওয়ায়)? নারী আপন স্বত্ব-স্বামিত্ব বুঝিয়া আপনাকে নরের ন্যায় শ্রেষ্ঠ জ্ঞান করিতে চাহে, ইহাও বাতুলতা বই আর কি?

পুরুষগণ স্ত্রীজাতির প্রতি যতটুকু সম্মান প্রদর্শন করেন, তাহাতে আমরা সম্পূর্ণ তৃপ্ত হইতে পারি না (পুরুষদের সংকীর্ণ দৃষ্টিভঙ্গির কারণে)। লোকে কালী, শীতলা প্রভৃতি রাক্ষস-প্রকৃতির দেবীকে ভয় করে, পূজা করে, সত্য। কিন্তু সেইরূপ বাঘিনী, নাগিনী, সিংহী প্রভৃতি “দেবী” ও কি ভয় ও পূজা লাভ করে না? তবেই দেখা যায় পূজাটা কে পাইতেছেন,-রমণী কালী, না রাক্ষসী নৃমুণ্ডমালিনী?

নারীকে শিক্ষার দিবার জন্য গুরুলোকে সীতা দেবীকে আদর্শরূপে দেখাইয়া থাকেন। সীতা অবশ্যই পর্দানশীল ছিলেন না। তিনি রামচন্দ্রের অর্ধাঙ্গী, রাণী, প্রণয়িনী এবং সহচরী। আর রামচন্দ্র প্রেমিক, ধার্মিক-সবই। কিন্তু রাম সীতার প্রতি যে ব্যবহার করিয়াছেন, তাহাতে প্রকাশ পায় যে, একটি পুতুলের সঙ্গে কোন বালকের যে সম্বন্ধ, সীতার সঙ্গে রামের সম্বন্ধও প্রায় সেইরূপ (বিদ্রুপ প্রকাশ)। বালক ইচ্ছা করিলে পুতুলকে প্রাণপণে ভালবাসিতে পারে; পুতুল হারাইলে বিরহে অধীর হইতে পারে; পুতুলের ভাবনায় অনিদ্রায় রজনী যাপন করিতে পারে; পুতুলটা যে ব্যক্তি চুরি করিয়াছিল, তাহার প্রতি খড়গহস্ত হইতে পারে; হারান পুতুল ফিরিয়া পাইলে আহলাদে আটখানা (আনন্দে আত্মহারা) হইতে পারে; আবার বিনা কারণে রাগ করিয়াও পুতুলটা কাদায় ফেলিয়া দিতে পারে, কিন্তু পুতুল বালকের কিছুই করিতে পারে না, কারণ হস্তপদ থাকা সত্ত্বেও পুত্তলিকা অচেতন পদার্থ (নারীদের মানসিক দাসত্ব ও পরাধীনতা)! বালক তাহার পুতুল স্বেচ্ছায় অনলে উৎসর্গ করিতে পারে, পুতুল পুড়িয়া গেল দেখিয়া ভূমে (মাটিতে) লুটাইয়া ধূলি-ধূসরিত হইয়া উচ্চৈঃস্বরে কাঁদিতে পারে!!

রামচন্দ্র “স্বামিত্বের” ষোল আনা পরিচয় দিয়াছেন! আর সীতা?-কেবল প্রভু রামের সহিত বনযাত্রার ইচ্ছা প্রকাশ করিয়া দেখাইয়াছেন যে, তাঁহারও ইচ্ছা প্রকাশের শক্তি আছে। রাম বেচারা অবোধ বালক, সীতার অনুভব শক্তি আছে, ইহা তিনি বুঝিতে চাহেন নাই, কেন না, বুঝিয়া কার্য করিতে গেলে স্বামিত্বটা পূর্ণমাত্রায় খাটান যাইত না!

যে-রঙ লাগে না ভালো চোখে, যে-রঙ সন্ত্রাস আনে
প্রাত্যহিকতায় আমাদের মনে-সকাল সন্ধ্যায়-

আমি আর আমার মতোই বহু লোক
রাত্রি-দিন ভূলুন্ঠিত ঘাতকের আস্তানায়, কেউ মরা, আধমরা কেউ, কেউ বা ভীষণ জেদী, দারুণ বিপ্লবে ফেটে পড়া। চতুর্দিকে
মানবিক বাগান, কমলবন হচ্ছে তছনছ।
বুঝি তাই উনিশশো ঊনসত্তরেও

সালামের চোখ আজ আলোকিত ঢাকা,

                content: `
বাতাস উঠলে এখন টাঙনের পানিতে কাঁপন লাগে না। পানি এখন অনেক নিচে। বালি কেটে কেটে ভারি ধীর স্রোতে এখন শীতের টাঙন বয়ে যায়। পানির তলায় বালি চিকমিক করে, কোথাও কোথাও সবুজ গুল্ম স্রোতের ভেতরে ভাটির দিকে মাথা রেখে এপাশ ওপাশ ফেরে। চতুর দু-একটা মাছ তির তির করে উজানে ছুটে গেলেও আবার ভাটিতে ফিরে আসে। কিন্তু কাঁপে না পানির স্রোত। এমনকি সাঁকোর ওপর দিয়ে চিনি কলের ভারী আখ-বওয়া ট্রাকগুলো যাবার সময়ও না। সাঁকোর থামগুলো গুম গুম শব্দ করে ওঠে, কিন্তু পানির স্রোত তেমনি ধীর, তেমনি শান্ত। আসমান, কান্দর আর দিগন্তজুড়ে যে শীতের একটা শান্ত ভাব থাকবার কথা সেই ভাবটা টাঙনের স্রোতে আজকাল সব সময় ধরা থাকে।

আর ঐ শান্ত নদীর ধারে বসে থাকবার জন্যেই কিনা কে জানে কপিলদাস ভারি আরামে রোদের দিকে পিঠ মেলে দিয়ে ঝিমোতে পারে। তার চারদিকে নানা শব্দ কিন্তু সে সব তার কানে ঢোকে কি না বোঝা মুশকিল। ধরো, কী রকম গাঁ গাঁ চিৎকার করতে করতে চিনি কলের ট্রাকগুলো ছুটছে, ফার্মের ভেতরে বিনোদ মিস্তিরি খান-দুই ট্রাক্টর ট্রায়ালের জন্য চালু করে রেখেছে-তার ধক্ ধক্ ধক্ ধক্ শব্দ একটানা সকাল দুপুর রাত ধরে ক্রমাগত হয়ে চলেছে, নদীর ওপারে আবার কোথায় এক রাখাল সারাদিন ধরে একটা বুনো সুর বাঁশিতে বাজিয়ে যাচ্ছে-এ সবই তার কানে ঢুকবার কথা। কিন্তু কপিলদাস চুপচাপ। মাথাটা ডাইনে-বাঁয়ে অল্প-স্বল্প দুলছে, আর সে বসে রয়েছে তো বসেই রয়েছে।

ওদিকে ছাগল ঢুকে যদি সবৃজি ক্ষেত তছনছ করে, কি বিন্দা মাঝির বউ সোনামুখী নগেন হোরোর বোন সিলভীর সঙ্গে ঝগড়া বাধায় কিংবা নদীর ওপারে খোলা কান্দরে খরগোশ তাড়িয়ে নিয়ে আসে কোনো ভিন গাঁয়ের কুকুর এবং সেজন্যে যদি এপারের বাচ্চারা লে লে হই হই করেও ওঠে-কপিলদাস নড়বে না, হেলবে না, কান পাতবে না-কাউকে একটা কথা জিজ্ঞেসও করবে না।

আসলে কপিলদাস বুড়োর কাছে সবই একটার সঙ্গে আরেকটা মেলানো বলে মনে হয়। মনে হয়, এরকমই হয়ে আসছে দুনিয়ায়। ঝগড়া বলো, ঝাঁটি বলো, জন্ম বলো, মরণ বলো-সবই একটার সঙ্গে আরেকটা মেলানো। কত দেখল সে জীবনে। সব কিছুই শেষ পর্যন্ত একটা জায়গায় গিয়ে মিলে যায়। রাগ বল, ক্ষোভ বল, আবার হাসিখুশি মনের ভাব বল, কিংবা সামনে প্রকাণ্ড কান্দর, কি কান্দরের ওপরকার আসমান, আবার তার নিচে টাঙনের স্রোত-সব কিছু, যা দেখতে পাওয়া যাচ্ছে, যা শোনা যাচ্ছে-সবই একটার সঙ্গে আরেকটা শেষ পর্যন্ত মেলানো। আসলে, তার মনে হয়, সংসারের অনেক ভেতরে শান্ত ধীর এবং নিরবচ্ছিন্ন একটা স্রোত আছে। সব কিছুর ওপর দিয়ে ঐ স্রোত বয়ে যায়। সেখানে কাঁপন নেই, উত্তেজনা নেই, চিৎকার নেই। সব কিছু সেখানে ক্রমাগত একটার সঙ্গে আরেকটা মিলে যাচ্ছে।

ঠিক এই ধরনের একটা গা-ছাড়া পরিতৃপ্ত ভাব আজকাল তাকে প্রায়ই পেয়ে বসে। আর সেজন্যেই শীতের রোদে পিঠ দিয়ে ভারি আরামে সে ঝিমোতে পারে। বয়স বেড়ে গেলে সম্ভবত মানুষের এরকম একটা অবস্থা এসে যায়।

তবে সব সময় ঐ ভাবটা থাকে না।

আর তখনই পুরনো ঘটনা ছবির পর ছবি সাজিয়ে নিয়ে আসে চোখের সামনে। পুশনা পরবে কি তুমুল নাচ জুড়েছে দেখো কপিলদাস। তার গলায় বাঁধা মান্দল কী রকম শূন্যে ঘুরপাক খাচ্ছে, মেয়েদের গলায় কেমন শানানো স্বর। কপিলদাস দেখতে দেখতে নিজের যৌবনকালে চলে যায়। একের পর এক ঘটনা মনে পড়তে থাকে তার। আর ঐ রকমভাবে স্মৃতি তার সামনে পুরনো পসরা খুলে বসলে সে ভারি সুখে ঐসব পুরনো ঘটনার মধ্যে বিচরণ করে ফেরে।

একবার সেই যে কি হলো, মহাজনের ধান খামার বাড়ি থেকেই কিষানদের হাতে বিলিয়ে দিলি-মনে আছে সে কথা?

আর মানুয়েল পাদ্রিকে টাঙনের পানিতে ধাক্কা মেরে ফেলে দিয়েছিলি? মনে নাই?

চকিতে সে দেখতে পায় বর্ষায় ভরা টাঙনের পানিতে পাদ্রি তলিয়ে গেল। ঘোলাটে পানির মধ্যে কালো জুতোসুদ্ধ তার পা দুখানি ওপরে উৎক্ষিপ্ত হতে দেখা গেল স্পষ্ট করে। একটু পরই মানুয়েল পাদ্রি আবার ভেসে উঠেছিল। আর সে কি গাল! সাঁতরাতে সাঁতরাতে শাসাচ্ছিল, দেখিস তোর বাপকে বলব, দেখব বিচার হয় কি না।

সেই ছেলেবেলার কথা। হাপন ছিল যখন সে। তোর তির কী রকম নিখুঁত নিশানায় গিয়ে বিধত, কপিলদাস মনে নাই সে কথা?

হ্যাঁ মনে আছে। কপিলদাস মাথা দুলিয়ে দুলিয়ে নিজেকে শোনায়-সব মনে আছে।

কেন মনে থাকবে না। সান্তালের বাচ্চা না সে? দেখ তো খরগোশের পেছনে কে ছুটছে অমন? শুকদেবের ব্যাটা চতুর মাঝি নাকি দিবোদাসের ব্যাটা কপিলদাস? আর ঐ দেখ, কপিলদাসের শিকারি কুকুর কী রকম ছুটে যাচ্ছে তির-খাওয়া শিকারের পেছনে। কপিলদাস মনের ভেতরে স্পষ্ট দেখতে পায় তার কালো রঙের কুকুরটাকে-যেটা তার কিশোরকালের সঙ্গী ছিল সর্বক্ষণ। কুকুরটাকে শেষ পর্যন্ত বাঘে খেল।

কপিলদাস একেক দিন আবার নিজের কাছে গল্প ফাঁদে। দূর থেকে দেখা যায় বুড়ো থেকে থেকে মাথা নাড়াচ্ছে আর ঝুঁকে ঝুঁকে দুলছে। কোন গল্পটা আরম্ভ করবে সে? বাহ্ গল্পের কি আর শেষ আছে-নিজেকেই শোনায় বুড়ো। ধরো, মেলার সেই ঘটনাটা-

মেলার গল্পটাই হঠাৎ মাঝখান থেকে শুরু হয়ে যায়। কেন যে বেছে বেছে মেলার গল্পটাই শুরু হয়-সে এক আশ্চর্য ব্যাপার। গল্প আরম্ভ করলেই সে মেলার ঘটনায় চলে আসে।

কিংবা ঐ ধান কাটার ব্যাপারটাই ধরো না কেন। আধিয়ার জোতদারের মাঝখানে পড়ে গেল সাঁওতাল বস্তিটা। গুপীনাথ হুঁ হ্যাঁ করে না, ডাইনে-বাঁয়ে তাকায় না। ওদিকে কে একজন আগুনের কুণ্ডলীর ওপরে আরেক বোঝা নাড়া চাপিয়ে দিয়ে গেল। দাউ দাউ করে জ্বলে উঠল আগুন। আর ঐ আগুনের আলোয় গুপীনাথের কপাল চকচক করতে লাগল। কিন্তু সে শাদা চুল ভর্তি মাথাটা ঝুঁকিয়ে বসে আছে তো বসেই আছে।

সাঁওতালদের তখন কি মুশকিল ভাবো দেখি। মহাজন বসত করবার জায়গা দেয়, আবাদের জমি দেয়, গিরস্তির কাজ দেয়-সেই মহাজনের বিপক্ষে কেমন করে যায়। মহাজন যে সব দেয়। হ্যাঁ, সব দেয়-কিন্তুক পেটের ভাতটা কি সারা বছর দেয়, আঁ? কহ মড়ল, কহ দে, দেয় পেটের ভাতটা? এই রকমের সব বাদানুবাদ। কিন্তুক যদি ভিটেমাটি থেকে তুলে দেয় তাহলে? এই রকমের সব তর্কাতর্কি। ওদিকে গুপীনাথ কিছুই বলে না। মড়ল হলে বোধ হয় ঐ অবস্থায় কিছু বলা যায় না।

কিন্তুক তখন ভারি জাড় হে মড়ল। দেহ দলদল করে কাঁপছে। দূরে দূরে যারা দাঁড়িয়েছিল তাদের মধ্যে থেকে কে যেন চেঁচিয়ে বলে উঠেছিল-হামরা মাহাজনের সঙ্গে নাই, আধিয়ার কিষানের সঙ্গে হামরা।

কে বলেছিল কথাটা? মনে নেই এখন। সে নিজে হতে পারে, মোহন কিস্কু হতে পারে-কিংবা চতুর মাঝিও হতে পারে। লোকটা যে কে ঠিক মনে নেই। কিন্তু কথাটা ঠিক মনে আছে।

তারপর?

কপিলদাস আর খেই ধরতে পারে না। বিচার সভার শেষ দৃশ্যটা স্মরণে আসে না। বরং হঠাৎ ধান কাটার দৃশ্যটা মনের ভেতরে দেখতে পায় সে। কপিলদাস মাঠে নেমেছে, পাশের ক্ষেতে মোহন কিস্কুর বউ টরি-সারা কান্দরে আর একটা মানুষ দেখা যায় না। ধান গাছের নোয়ানো পাতায়, শিষের গায়ে, তখনও রাতের হিম ফোঁটায় ফোঁটায় জমে আছে। রোদের তাপ গায়ে লাগে কি লাগে না এমনি কুয়াশা।

ঐ রকম গল্প বলতে বলতে বেলা ফুরিয়ে যায় এক সময়। রোদের তাপ কমে আসে। ঝাপসা চোখ দুটি মেলে সে তখন আসমানের ধূসর রঙ দেখে। একবার নদীর ভাটি থেকে উঠে আসা শঙ্খচিলের ডাকটাও শুনতে পায়। বাতাসে তখন শীতের কামড়। তার দুহাতের আঙুল ছেঁড়া কোটের বোতাম দুটি খুঁজতে থাকে।

আর ঐ সময়ই তার চোখে পড়ে যায়। দেখে কজন লোক টাঙনের উঁচু পাড়ে দাঁড়িয়ে বস্তির দিকে হাত তুলে কী যেন দেখাচ্ছে। লোকগুলোকে সে চিনতে চেষ্টা করে। ওখানে এই সময়ে কারা? অমন পরিষ্কার জামা-কাপড় পরা-কে লোকটা? অনেকক্ষণ ধরে লোকটার নড়া-চড়ার ভঙ্গিটা লক্ষ করে। লক্ষ করতে করতেই মনে পড়ে-কদিন আগেও বোধহয় ওদের এইভাবেই দেখেছে সে। ঠিক এইভাবেই দাঁড়িয়ে দাঁড়িয়ে বস্তির দিকে হাত তুলে কী যেন বলাবলি করছিল। সে এক সময় চিনতে পারে। পরিষ্কার জামা-কাপড় পরা লোকটা ম্যানেজার মহাজন ছাড়া আর অন্য কেউ হতে পারে না। কিন্তু এমন সময় ওখানে দাঁড়িয়ে ওদের কি কাজ? একবার মনে হয় জরিপ হচ্ছে বোধ হয়। একেক সময় ঐ রকম জমিজমার মাপামাপি চলে। ওরা কি জমিজমা মাপতে এসেছে? কই এ রকম কোনো খবর তো তার কানে আসেনি।

একটু পর আর দেখা যায় না কাউকে। দেখতে না পাওয়ায় কৌতূহলটাও আর থাকে না। কপিলদাস তখন গরুর পালের ঘরে ফেরা ঘুন্টির আওয়াজ কান পেতে শোনে। ফার্মের গরুগুলোর গলায় নতুন ঘুন্টি বাঁধা হয়েছে নিশ্চয়ই। আজকাল বোধহয় জয়হরির ছোট ছেলেটা ফার্মের গরু চরায়। জয়হরির কী যেন হয়েছিল? জয়হরির কথা স্মরণ করতে চেষ্টা করে সে। আর ঠিক ঐ সময় কাছে এসে দাঁড়ায় সলিমউদ্দিন। এসেই ডাকে, বুঢ়া দাদা বাড়িত যাবো নাই?

হ্যাঁ যামু, সে জয়হরির কথা স্মরণ করতে না পেরে সলিমউদ্দিনের দিকে মনোযোগ দেয়। ছোঁড়া কোথেকে আসছে সেই কথা জিজ্ঞেস করতে করতে উঠে দাঁড়ায়।

সলিমউদ্দিন তখন কুশিয়ার ক্ষেতে আজ কী কাণ্ডটা ঘটেছে সেই ঘটনার বর্ণনা আরম্ভ করে এবং ঐ আরম্ভের মুখেই সে জানিয়ে দেয়-বুঢ়া দাদা তুমার বস্তিটা আর এইঠে থাকবে নাই, ইবছর এইঠে ধানের আবাদ হবে। কথাটা কেন যে বলে ছোঁড়া বুড়ো ঠিক ধরতে পারে না। কিংবা এমনও হতে পারে যে তার বর্ণনাতেই বোধহয় প্রসঙ্গটা থাকে না।

কপিলদাসের হঠাৎ খেয়াল হয় লোকগুলোকে আর দেখা যাচ্ছে না। এখুনি না দেখল। মুহূর্তের মধ্যে কোথায় উবে গেল অতোগুলো মানুষ।

নাকি সে দেখে নি! তার কেবলি মতিভ্রম হতে থাকে। ইদিকে সলিমউদ্দিনের সেই খামারবাড়ির ঘটনাটার বর্ণনা তখনো ফুরোয়নি।

আবার কথাটা নতুন করে বলতে হলো সলিমউদ্দিনকে। বলল, তুমার বসতটা ইবার উঠায় দিবে, এইঠে ইবছর ট্রাকটর চলিবে।

কপিলদাস এবারও বুঝতে পারে না। তার নিজের হিসাব মেলে না। ট্রাকটর জমিতে চলবে, তাই চলে এসেছে এতকাল। মানুষের বসতের উপর দিয়ে ট্রাকটর চলতে যাবে কেন? ই কেমন কথা? সে অন্ধকারেই ডাইনে বাঁয়ে তাকায়। বলে, ঠিক শুনিছিস তুই, কহ ঠিক শুনিছিস?

সলিমউদ্দিন এবার সত্যিই বিরক্ত হয়। বলে, মোর কথা বিশ্বাস না হয় আর কাহাকো পুছে দেখ। মুই ইবার যাঁউ, তুই বুঢ়া মানুষ, তোর কিছু ফম থাকে না।

কথাটা বলেই হঠাৎ ছোঁড়া চলে গেল।

রাস্তায় দাঁড়িয়ে দাঁড়িয়ে কপিলদাস মাথা নাড়ায়। আর নিজেকে শোনায়-না, ক্যানে পালাব। তার পা আপনা থেকে বাড়ির পথ ধরে। কোথায় পালাবে সে। এক সময় আবার হাসি পায় বুড়োর, পালাবার কথাটা এল কোত্থেকে? তুই বুঢ়া মানুষ হে মড়ল-নিজেকে শুনিয়ে শুনিয়ে তখন সে বলে, তোর কিছু ফম থাকে না। আর ঐ সময় ট্রাকটরের আওয়াজটা তার কানে এসে ধাক্কা মারে। কী কারণে যে হঠাৎ ধকধক শব্দ করে জেগে উঠল ঘুমন্ত ট্রাকটরটা আন্দাজ করা মুশকিল। বিনোদ মিস্ত্রি একেকদিন এই রকম হঠাৎ ট্রাকটরের এঞ্জিন চালিয়ে দেয়। ট্রাকটরটা সে চোখের সামনে দেখতে পায় যেন। বিশাল বিশাল দুটো চাকা ঘুরতে ঘুরতে মাঠের বুকের ওপর দিয়ে চলেছে, পেছনের ধারালো চাকতিগুলো মাটি ফালা ফালা করে দিচ্ছে, গন্ধ বেরুচ্ছে কাটা মাটির ভেতর থেকে। ঐভাবে ট্রাকটরটা চলে আসে একেবারে দীনেশ কিন্তুর বাড়ির সীমানা পর্যন্ত। তারপরই বেশ দিব্যি ঘুরে যায়। বসতই হলো ট্রাকটর চলাফেরা করার শেষ সীমানা। হ্যাঁ, কলের জিনিস ঐ পর্যন্ত আসে। সংসারের সীমানা পর্যন্তই তার আসবার ক্ষমতা, তারপর আর পারে না, এতকাল অন্তত পারেনি। আর এখন সেই কলের জিনিস হুড়মুড় করে ঢুকে পড়বে দীনেশ কিছুর উঠোনে। ঘরের দেয়ালে ভোঁতা নাক ঢুকিয়ে উল্টো দিকের দেয়াল ফুঁড়ে বেরুবে। দৃশ্যটাকে সে মনের ভেতর দেখতে পায়। আর তাই দেখে সে ভয়ানক অস্থিরতা বোধ করে। ই কী কথা আঁ? ট্রাকটর চলে আসবে সংসারের বুকের ওপর?

কপিলদাস বুড়োর এখন মনে পড়তে থাকে। এই বস্তি উঠে যাবার ব্যাপারটা আকস্মিক নয় একেবারে-তাহলেও, এই কি শেষ পর্যন্ত পরিণতি? বস্তিটস্তি উঠে যাবে আর ট্রাকটর চলতে থাকবে ঘরবাড়ি-ভিটেমাটির উপর দিয়ে। কোথায় একটা মেয়েমানুষের মাথা গরম করে মাতালের দিকে দা উঁচিয়ে তেড়ে যাবার ঘটনা আর কোথায় বাড়িঘর সংসারসুদ্ধ লোপাট করে দেওয়া। কিসের সঙ্গে কিসের জড়ানো। কিন্তু ভাবো তো বসতটা কত পুরনো? মনে আছে তোর, হ্যাঁ বাহে মড়লের ব্যাটা, তোর কি ফম আছে?

হ্যাঁ হ্যাঁ ফম আছে। বিচার বসেছিল ফার্মের অফিস ঘরে। কে একজন সাহেব মানুষ শুধোচ্ছিল। আর সে উত্তর দিচ্ছিল। কবে কোন প্রাচীনকালে এসেছিল একদল মানুষ। সেই দলের মড়ল ছিল শিবোনাথ। শিবোনাথ আবার গুণিন ছিল। কিন্তুক গুণিন হলেই কি সব হয়, আঁ? হয় কখনও? হয় না।

ঐ পর্যন্ত বলার পর আর বলতে পারেনি-মহিন্দর ধমকে উঠেছিল। পরে জানিয়েছিল, তুই আর হামার সঙ্গে আসিস না বাপ-তোর কথার কুনো ঠিক নাই। কুন কথাত তুই কুন কথা কহিস বুঝিস না।

হ্যাঁ মড়ল তুই বুঢ়া মানুষ-তুই কিছু করিবা পারিস না। ঐ দিনই কে যেন বলেছিল কথাটা। কপিলদাস কথাটা নিজেকে শোনালো আরেকবার-তুই বুঢ়া মানুষ হে মড়ল, তোর কিছু করার নাই। একবার নয়, ঘুরে ঘুরে কথাটা সে বলেই চলল। আর থেকে থেকে ভারি গভীর দীর্ঘশ্বাস পড়ল কয়টা। আর ঐ দীর্ঘশ্বাস তাকে বার্ধক্যের অক্ষমতা স্মরণ করিয়ে দিতে লাগল।

বাড়ি ফিরতে ফিরতে তার দেরি হয়ে যায়। ততক্ষণে ঠাণ্ডায় পা দুখানি অসাড় হয়ে উঠেছে। উঠোনের আগুনের কাছে বসে বসে সে হাত-পা সেঁকে কিছুক্ষণ। মহিন্দরের বউ বিন্নী থালায় করে ভাত দিয়ে যায়। আগুনের তাতে ততক্ষণে আরাম লাগছে কপিলদাসের। ভাতের পাশে এক টুকরো পোড়া মাংস দেখতে পেয়ে সে খুশি হয়। নাতিদের শুধোয় কী শিকার পেয়েছিল তারা। মহিন্দরের ছেলে শিকারের গল্পটা আরম্ভ করে বোধহয়-কিন্তু তার গল্পের দিকে বুড়ো আর মনোযোগ দিতে পারে না।

দাদা, বড় জঙ্গল্ভ নাকি বাঘ থাকে?

নাতির প্রশ্ন শুনে একটু সজাগ হতে হয় বুড়োকে। ঠিক মনে করতে পারে না। প্রাণনগরের জঙ্গলে কি বাঘ আছে? কিছুক্ষণ চিন্তা করে সে। তারপর মাথা নাড়ায়, নাই রে-শুকদাস, ঐঠে বাঘটাগ নাই। কিন্তুক ছিল এক সময়।

নাতিরা ঘন হয়ে বসে। কপিলদাস ভাত খাওয়ার কথা ভুলে যায় তখন। সে গল্প আরম্ভ করে।

গল্প মানে তো নিজের কথা। সাঁওতাল কিশোর ছেলের যে ব্যাপারে সবচাইতে আকর্ষণ সেটাই সে ধীর স্বরে বর্ণনা করতে থাকে। তার কালো রঙের কুকুরটার কথা আসে। তার ঘরে খুঁজলে তিরের চোঙা দুটো এখনো পাওয়া যাবে-সেই চোঙায় বাছা বাছা তির জমানো থাকত। একবার তির দিয়ে একটা বাঘ গেঁথে ফেলেছিল। ভাগ্যিস সে তখনো বাঘ কী জিনিস জানত না। বনবিড়াল ভেবে নিশানা করে তির ছেড়ে দিয়েছে আর অমনি কী ডাক! ভয় পেয়ে পড়িমরি করে কী রকম দৌড়েছিল সেই ঘটনাটা সে বলে এবং বলবার সময় দৌড়ের বর্ণনাটাই প্রধান হয়ে উঠতে থাকে। বুড়ো মানুষের গুনগুন গুনগুন ধীর স্বরের একঘেঁয়েমিতে বিরক্তি লাগে বাচ্চাদের। শুকদাস অস্থির হয়ে ডাকে, দাদা বাঘটার কী হইল?

ও, হ্যাঁ, বাঘটা। কপিলদাসকে একটু ভেবে নিতে হয়। তির খেয়ে বিকট চিৎকার করে উঠবার পর বাঘটার যে কী হয়েছিল কোনোভাবেই মনে পড়তে চায় না। তখন গল্পটা সে বানাতে আরম্ভ করে। তার বর্ণনায় তখন কৌতুক আসে। বাঘের ল্যাজ ধরে টানতে টানতে নিয়ে আসবার ব্যাপারটা সে রঙ চড়িয়ে বলতে চায়। কিন্তু বাঘটা টেনে নিয়ে আসবার সময় কি রকম কষ্ট হচ্ছিল সে কথাটাই ঘুরেফিরে বলতে থাকে সে।

শীতের রাত, ততক্ষণে সবারই ঘরে গিয়ে শোবার কথা। কিন্তু কেউ শুতে যাচ্ছে না সেটা সে লক্ষ্য করে। দেখে, ইতিমধ্যে মহিন্দর, দীনদাস এবং তাদের সঙ্গে সঙ্গে আরও কয়েকজন উঠোনে এসে দাঁড়িয়েছে। বোঝা যাচ্ছে কোনো শলাপরামর্শ হচ্ছে। কিন্তু বিষয়টা যে কী, কিছুই অনুমান করা যায় না।

ও হ্যাঁ, বাঘটার যেন কী হয়েছিল? কপিলদাস কিশোর দুটির মুখের দিকে তাকিয়ে আবার ল্যাজ ধরে টানবার প্রসঙ্গে ফিরে আসে। ঐ রকম যখন টেনে আনছিল তখনো কিন্তু বাঘটা বেঁচে ছিল-হ্যাঁ। ঘা খাওয়া বাঘ কিন্তু ভয়ংকর জিনিস।

এই পর্যন্ত বলে থামতে হয়। ঘা খাওয়া বাঘের ভয়ংকরতা কীভাবে বোঝাবে সেজন্যে তাকে ভাবতে হয়। আর ঐ সময় মহিন্দরদের কাছে একটি লোককে আসতে দেখে সে গল্পের কথা ভুলে যায়। উঠে গিয়ে দাঁড়ায় মহিন্দর আর দীনদাসের কাছে।

নিজের ছেলে মহিন্দর বিরক্ত হয়-বলে, তুই এখুন যা তো বাবা, বুঢ়া মানুষ তুই ইসবের কী বুঝিস!

কপিলদাস বুড়ো এবার সত্যিই দমে যায়। নিজের জন্ম দেয়া ছেলে যদি এই রকম করে বলে, তো সে কী করবে। তাকে পিছিয়ে আসতে হয়। হ! মড়ল তুই তো বুঢ়া মানুষ, তুই কিছু করিবা পারিস না। কথাটা ঘুরেফিরে কেউ যেন তার কানের কাছে বারবার করে বলতে থাকে। সে কিছুই করতে পারে না, তাকিয়ে দেখা ছাড়া আর কিছুই করার নেই তার। দাঁড়িয়ে দাঁড়িয়ে সে মানুষের জটলাটা দেখে। ততক্ষণে জায়গাটা বেশ একটুখানি সমাবেশ মতো হয়ে উঠেছে। দেখে, দীনদাস হাত নেড়ে নেড়ে কী বলে চলেছে। তারপর আবার মহিন্দর আরম্ভ করল। তার কথা শেষ হতে না হতেই ওদিক থেকে আবার ভায়া মাঝি আরম্ভ করল।

ভারি ধীর নোয়ানো স্বর। শান্তভাবে পরামর্শ হচ্ছে যেন। রাগ নেই। জ্বালা নেই। কারো দুচোখ ধকধক করে জ্বলে উঠছে না, কেউ চিৎকার করে গালাগাল দিচ্ছে না। কপিলদাসের ভারি অবাক লাগে গোটা ব্যাপারটা দেখে। অবাক লাগে, কিন্তু কিছু বলে না সে। বরং নিজেকে সরিয়ে আনে। কয়েক পা পিছিয়ে আসে সে। কিন্তু ঐ কয়েক পা সরে আসতে অনেকটা সময় লেগে যায় তার। কানের কাছে তখনও সে শুনছে-তুই বুঢ়া মানুষ হে মড়ল, তোর কিছুই করার নাই। যেখান থেকে উঠে এসেছিল সেইখানে সে ফিরে যায়। শুধুই যথাস্থানে ফিরে যাওয়া, শুধুই মেনে নেওয়া-তার কেবলই মনে হতে থাকে।

বাচ্চারা লোকসমাগম দেখেই সম্ভবত উঠে এসেছে বিছানা ছেড়ে। মেয়ে-বউরা এখানে সেখানে ইতস্তত দাঁড়িয়ে। বাচ্চারা একত্র হলে যা হয়-ততক্ষণে খুনসুটি, দাপাদাপি এবং হাসাহাসি এইসব আরম্ভ হয়ে গিয়েছে। পাথরের ওপর ঘষে ঘষে তীরে শান দেওয়া তখনো হচ্ছে। মহিন্দরের ছেলে ডাকল, দাদা তারপর বাঘটার কী হইল?

ও, সেই গল্প। কপিলদাসের মনে পড়ে একটু আগে শিকারের গল্প বলতে বলতে সে উঠে গিয়েছিল। তখন আগুনের আলো কিশোর মুখের ওপর চমকাচ্ছে, কে একজন কঞ্চি দিয়ে আগুনটা আরেকটুখানি উস্কে দিল। আর ঐ ঘটনার কারণেই কি না কে জানে, কপিলদাস গল্পটা আবার আরম্ভ করে দিল। হ্যাঁ, বাঘটার ল্যাজ ধরে টানতে টানতে আসছিল সে। ভারী ওজন হয় বাঘের। আর বাঘটা ওদিকে তখনও কিন্তু মরেনি। নাহ্, বাঘটা বোধহয় মরেই গিয়েছিল। হঠাৎ তার মনে পড়ে।

কপিলদাস সৎ হয়ে উঠতে চায় বাচ্চাদের কাছে। গল্প বানানো বাদ দেয়। তার স্পষ্ট মনে পড়ে তখন। বাঘটার গায়ে বিকট গন্ধ ছিল, তিরটা ঠিক বুকের মাঝখানে গিয়ে গেঁথেছিল, একেবারে এদিক থেকে ওদিক বেরিয়ে গিয়েছিল। রক্ত তখনও বেরুচ্ছিল গলগল করে। আর ঐ সময়, বিকেল বেলায়, প্রাণনগরের জঙ্গলের ধারে একটা লোক ছিল না চারদিকে কোথাও। সে চিৎকার করে বাবাকে ডাকছিল, বন্ধুদের ডাকছিল। আর ঠিক তখন হঠাৎ তার পাশের ঝোঁপ থেকে কি একটা জানোয়ার লাফ দিয়ে বেরিয়েই বাঁয়ে ছুটতে শুরু করে দিল। ঐ জানোয়ারটা দেখেই সে-

এ পর্যন্ত বলেই সে থামে। নিজের দুর্বলতা প্রকাশ হয়ে যাবে বলে ইতস্তত করে। আহা কেমন করে বলবে যে শেয়াল দেখে সে ভয়ানক ভয় পেয়ে পালিয়েছিল।

তারপর, তারপর কী হইল? বাচ্চারা সমস্বরে জিজ্ঞেস করলে সে হঠাৎ হেসে ওঠে।

কপিলদাস তখন নিজের আলাদা অস্তিত্ব আর অনুভব করতে পারে না। তীরে শান দেবার সময় কী রকম করে পাথরের ওপর ঘষতে হয়-তাই দেখায়। একজনের হাত থেকে বাঁশিটা টেনে নিয়ে ফুঁ দিয়ে একটা বহু পুরনো সুর বাজায়। কী বাজালো আঁ, কী বাজালো দাদা? প্রশ্ন হলে সে ভাঙা ভাঙা গলায় গানটা গায়-

ফকির বুলে ঢুলুক বাজে
ভালুক নাচে ঝাম,
হাইয়ারে হালমাল কই গেলু রে-এ-এ।

গানটি শুনে বাচ্চারাও গাইতে শুরু করে দেয়।

বুড়োর ভীমরতি হয়েছে ভেবে মেয়েরা কেউ কেউ মনোযোগ দেয় বাচ্চাদের জটলার দিকে। বড়রা যেখানে সভা বসিয়েছে সেখান থেকেও কে একজন চিৎকার করে গোলমাল বন্ধ করতে বলে। কিন্তু বাচ্চাদের থামাবে কে? মহিন্দরের ছেলে ধনুকের জন্যে বাঁশের ছিলা তৈরিতে ব্যস্ত ছিল। কপিলদাস তার হাত থেকে কেড়ে নিলো ধনুকটা। বলল, দেখ, কেমন করে ছিলা পরাতে হয় ধনুকে।

বাচ্চারা তখন ঘিরে দাঁড়ায় বুড়োর চারদিকে। কপিলদাস হাঁটু ভেঙে ধনুকের এক মাথা ধরে ঝুলে পড়ে ধনুকটা নোয়ায়। তারপর বাঁ হাতে ছিলার ফাঁসটা ধনুকের মাথায় ঢোকাতে চায়। কিন্তু প্রথমবারেই পারে না।

ডান হাতটা তার ভীষণভাবে কাঁপতে থাকে। বাচ্চারা বুড়োর কাণ্ড দেখে সমস্বরে বলে, পারব নাই দাদা-তুই পারব নাই। কিন্তু পারে সে। ঐ কাঁপা কাঁপা হাতেই সে ছিলা পরিয়ে দেয় ধুনকের। তারপর উঠে দাঁড়িয়ে ছিলা টেনে ধনুকের একটা টঙ্কার তোলে। ভারি সুন্দর টানটান আওয়াজ হয় তাতে। এরপরও বুড়ো থামে না। একটা শানানো তির নেয় হাতে এবং তিরটা ধনুকের ছিলায় বসিয়ে তাক করে। সামনের দিকে একবার, একবার ডাইনে, একবার বাঁয়ে। বুড়ো ভয় দেখিয়ে মস্করা করে যেন। বাচ্চারা তাতে হই হই করে ওঠে। আর ঐ রকম হই হই শুনেই সম্ভবত কপিলদাস তিরটা দু আঙুলের ফাঁকে চেপে ছিলা ধরে টানে। টেনে ধনুকের নিশানা করে অন্ধকারের দিকে। মহিন্দরের ছেলে বলে ওঠে, দাদা তিরটা ছুটে যাবে, দাদা মোর তিরটা ছুটে যাবে। কিন্তু কপিলদাস নাতির মিনতি শুনতে পায় কি না বোঝা যায় না। সে সত্যি সত্যি তিরটা ছেড়ে দেয়। আর বাতাস কাটা শব্দ করে তিরটা অন্ধকারের দিকে ছুটে যায়।

চারদিকে মানুষের বসত। মেয়েরা বুড়োরা কাণ্ড লক্ষ করে হ্যাঁ হ্যাঁ করে ওঠে। সভার মানুষদের মধ্য থেকেও কয়েকজন এগিয়ে আসে। কিন্তু ততক্ষণে বুড়ো কপিলদাস আর একটা তির হাতে তুলে নিয়েছে। সবাই যখন নিষেধ করছে তখন সে দ্বিতীয় তিরটাও সামনের অন্ধকারের দিকে নিশানা করে ছুড়ে দিয়েছে। এবং ঐ কাণ্ড ঘটে যাওয়ায় ব্যাপারটা আর ছেলেমানুষি তামাসার পর্যায়ে থাকে না। দূর থেকে মহিন্দর চিৎকার করে ওঠে, বিন্নি গালাগাল করতে আরম্ভ করে। কিন্তু বুড়ো তখন হাসছে কেমন দেখো, যেন সে কিশোরকালে ফিরে গিয়েছে। জীবনে প্রথম নিশানা ভেদ করার যে খুশি-সেই খুশি পেয়ে বসেছে তাকে। সে শান দেয়া আরও একখানা তির হাতে তুলে নিয়েছে তখন। ওদিকে পেছন থেকে দীনদাস চিৎকার করে বলছে-ধর বুঢ়াটাকে, ধরে কাঢ়ে লে ধেনুকখান-সেই চিৎকার বুড়োর কানে পৌঁছায় না। কেউ পেছনে তাকে ধরতে আসছে কিনা সেদিকে ভ্রূক্ষেপ না করে কপিলদাস বুড়ো দুহাতে তির-ধনুক নিয়ে সামনের অন্ধকারের দিকে চলতে থাকে। বিমূঢ় মানুষজনের চোখের সামনে দিয়েই সে অনায়াসে অন্ধকার, গাছপালা, কৈশোর এবং আদিম উল্লাসের মধ্যে চলে যায়। আর সেখান থেকে সে তার তৃতীয় তিরটা সঠিক নিশানায় ছুড়বার জন্যে তৈরি হতে থাকে।

                content: `
কোন রোগীর চিকিৎসা করিতে হইলে প্রথমে রোগের অবস্থা জানা আবশ্যক (নারীর অধঃপতিত দশা থেকে মুক্তির জন্য প্রথমে তাদের হীনদশার স্বরূপ উন্মোচন জরুরি)। তাই অবলাজাতির (নারী) উন্নতির পথ আবিষ্কার করিবার পূর্বে তাহাদের অবনতির চিত্র দেখাইতে হয়। আমি “স্ত্রীজাতির অবনতি” শীর্ষক প্রবন্ধে ভগিনীদিগকে জানাইয়াছি যে, আমাদের একটা রোগ আছে-‘দাসত্ব’ (মানসিক দাসত্ব ও নারীর ব্যক্তিত্বহীনতা)। সে রোগের কারণ এবং অবস্থা কতক পরিমাণে ইতঃপূর্বে (স্ত্রীজাতির অবনতি প্রবন্ধে) বর্ণনা করা হইয়াছে। এক্ষণে আমরা দেখাইতে চেষ্টা করিব, সেই রোগ হওয়ায় আমাদের সামাজিক অবস্থা কেমন বিকৃত হইয়াছে। ঔষধ পথ্যের বিধান স্থানান্তরে দেওয়া হইবে।

এইখানে গোঁড়া পর্দাপ্রিয় ভগ্নীদের অবগতির জন্য দু একটা কথা বলিয়া রাখা আবশ্যক বোধ করি। আমি অবরোধ প্রথার (পুরুষশাসনের ফলে গৃহবন্দি হওয়া অন্তঃপুরের নারী) বিরুদ্ধে দণ্ডায়মান হই নাই। কেহ যদি আমার “স্ত্রীজাতির অবনতি” প্রবন্ধে পর্দাবিদ্বেষ ছাড়া আর কোন উদ্দেশ্য দেখিতে না পান, তবে আমাকে মনে করিতে হইবে আমি নিজের মনোভাব উত্তমরূপে ব্যক্ত করিতে পারি নাই, অথবা তিনি প্রবন্ধটি মনোযোগ সহকারে পাঠ করেন নাই।

সে প্রবন্ধে প্রায় সমগ্র নারীজাতির উল্লেখ আছে। সকল সমাজের মহিলাগণই কি অবরোধে বন্দিনী থাকেন? অথবা তাঁহারা পর্দানশীল নহেন বলিয়া কি আমি তাঁহাদিগকে সম্পূর্ণ উন্নত বলিয়াছি? আমি মানসিক দাসত্বের (enslaved মনের) আলোচনা করিয়াছি।

কোন একটা নূতন কাজ করিতে গেলে সমাজ প্রথমত গোলযোগ উপস্থিত করে (নতুনকে মেনে নিতে সংকোচ) এবং পরে সেই নূতন চাল চলন সহিয়া লয়, তাহারই দৃষ্টান্তস্বরূপ পার্সি মহিলাদের পরিবর্তিত অবস্থার উল্লেখ করিয়াছি। পূর্বে তাঁহারা ছত্রব্যবহারেরও অধিকারিণী ছিলেন না (বাইরে যাওয়ার অনুমতি না থাকায়), তারপর তাঁহাদের বাড়াবাড়িটা সীমা লঙ্ঘন করিয়াছে, তবু তো পৃথিবী ধ্বংস হয় নাই। এখন পার্সি মহিলাদের পর্দামোচন হইয়াছে সত্য, কিন্তু মানসিক দাসত্ব মোচন হইয়াছে কি? অবশ্যই হয় নাই। আর ঐ যে পর্দা ছাড়িয়াছেন, তাহা দ্বারা তাঁহাদের স্বকীয় বুদ্ধি-বিবেচনার তো কোন পরিচয় পাওয়া যায় না। পার্সি পুরুষগণ কেবল অন্ধভাবে বিলাতি সভ্যতার অনুকরণ করিতে যাইয়া (সমালোচনা) স্ত্রীদিগকে পর্দার বাইরে আনিয়াছে, ইহাতে অবলাদের জীবনীশক্তির তো কিছু পরিচয় পাওয়া যায় না-তাঁহারা যে জড়পদার্থ, সেই জড়পদার্থই আছেন। পুরুষ যখন তাঁহাদিগকে অন্তঃপুরে রাখিতেন, তাঁহারা তখন সেইখানে থাকিতেন। আবার পুরুষ যখন তাঁহাদের “নাকের দড়ি” ধরিয়া টানিয়া তাঁহাদিগকে মাঠে বাহির করিয়াছেন, তখনই তাঁহারা পর্দার বাহির হইয়াছে! ইহাতে রমণীকুলের বাহাদুরি কী? ঐরূপ পর্দা-বিরোধ কখনই প্রশংসনীয় নহে।

কলম্বস যখন আমেরিকা আবিস্কার করিতে কৃতসঙ্কল্প হন, তখন লোকে তাঁহাকে বাতুল বলে নাই কি (অবিশ্বাস্য কাজে হাত দেওয়ায়)? নারী আপন স্বত্ব-স্বামিত্ব বুঝিয়া আপনাকে নরের ন্যায় শ্রেষ্ঠ জ্ঞান করিতে চাহে, ইহাও বাতুলতা বই আর কি?

পুরুষগণ স্ত্রীজাতির প্রতি যতটুকু সম্মান প্রদর্শন করেন, তাহাতে আমরা সম্পূর্ণ তৃপ্ত হইতে পারি না (পুরুষদের সংকীর্ণ দৃষ্টিভঙ্গির কারণে)। লোকে কালী, শীতলা প্রভৃতি রাক্ষস-প্রকৃতির দেবীকে ভয় করে, পূজা করে, সত্য। কিন্তু সেইরূপ বাঘিনী, নাগিনী, সিংহী প্রভৃতি “দেবী” ও কি ভয় ও পূজা লাভ করে না? তবেই দেখা যায় পূজাটা কে পাইতেছেন,-রমণী কালী, না রাক্ষসী নৃমুণ্ডমালিনী?

নারীকে শিক্ষার দিবার জন্য গুরুলোকে সীতা দেবীকে আদর্শরূপে দেখাইয়া থাকেন। সীতা অবশ্যই পর্দানশীল ছিলেন না। তিনি রামচন্দ্রের অর্ধাঙ্গী, রাণী, প্রণয়িনী এবং সহচরী। আর রামচন্দ্র প্রেমিক, ধার্মিক-সবই। কিন্তু রাম সীতার প্রতি যে ব্যবহার করিয়াছেন, তাহাতে প্রকাশ পায় যে, একটি পুতুলের সঙ্গে কোন বালকের যে সম্বন্ধ, সীতার সঙ্গে রামের সম্বন্ধও প্রায় সেইরূপ (বিদ্রুপ প্রকাশ)। বালক ইচ্ছা করিলে পুতুলকে প্রাণপণে ভালবাসিতে পারে; পুতুল হারাইলে বিরহে অধীর হইতে পারে; পুতুলের ভাবনায় অনিদ্রায় রজনী যাপন করিতে পারে; পুতুলটা যে ব্যক্তি চুরি করিয়াছিল, তাহার প্রতি খড়গহস্ত হইতে পারে; হারান পুতুল ফিরিয়া পাইলে আহলাদে আটখানা (আনন্দে আত্মহারা) হইতে পারে; আবার বিনা কারণে রাগ করিয়াও পুতুলটা কাদায় ফেলিয়া দিতে পারে, কিন্তু পুতুল বালকের কিছুই করিতে পারে না, কারণ হস্তপদ থাকা সত্ত্বেও পুত্তলিকা অচেতন পদার্থ (নারীদের মানসিক দাসত্ব ও পরাধীনতা)! বালক তাহার পুতুল স্বেচ্ছায় অনলে উৎসর্গ করিতে পারে, পুতুল পুড়িয়া গেল দেখিয়া ভূমে (মাটিতে) লুটাইয়া ধূলি-ধূসরিত হইয়া উচ্চৈঃস্বরে কাঁদিতে পারে!!

রামচন্দ্র “স্বামিত্বের” ষোল আনা পরিচয় দিয়াছেন! আর সীতা?-কেবল প্রভু রামের সহিত বনযাত্রার ইচ্ছা প্রকাশ করিয়া দেখাইয়াছেন যে, তাঁহারও ইচ্ছা প্রকাশের শক্তি আছে। রাম বেচারা অবোধ বালক, সীতার অনুভব শক্তি আছে, ইহা তিনি বুঝিতে চাহেন নাই, কেন না, বুঝিয়া কার্য করিতে গেলে স্বামিত্বটা পূর্ণমাত্রায় খাটান যাইত না!

আচ্ছা, দেশ কালের নিয়মানুসারে কবির ভাষায় স্বর মিলাইয়া না হয় মানিয়া লই যে, আমরা স্বামীর দাসী নহি-অর্ধাঙ্গী। আমরা তাঁহাদের গৃহে গৃহিণী, মরণে (না হয়, অন্ততঃ তাঁহাদের চাকুরী উপলক্ষে যথা তথ্য) অনুগামিনী, সুখ দুঃখে সমভাগিনী, ছায়াতুল্য সহচরী ইত্যাদি।

কিন্তু কলিযুগে আমাদের ন্যায় অর্ধাঙ্গী লইয়া পুরুষগণ কিরূপ বিকলাঙ্গ হইয়াছেন, তাহা কি কেহ একটু চিন্তাচক্ষে দেখিয়াছেন? আক্ষেপের (অথবা প্রভুদের সৌভাগ্যের) বিষয় যে, আমি চিত্রকর নহি-নতুবা এই নারীরূপ অর্ধাঙ্গ তাঁহাদের কেমন অপরূপ মূর্ত্তি হইয়াছি, তাহা আঁকিয়া দেখাইতাম।

শুক্লকেশ বুদ্ধিমানগণ বলেন যে, আমাদের সাংসারিক জীবনটা দ্বিচক্র শকটের ন্যায়-ঐ শকটের এক চক্র পতি, অপরটি পত্নী। তাই ইংরেজি ভাষায় কথায় কথায় স্ত্রীকে অংশিনী (partner) উত্তমার্ধ (better half) ইত্যাদি বলে। জীবনের কর্তব্য অতি গুরুতর, সহজ নহে-

“সুকঠিন গার্হস্থ্য ব্যাপার
সুশৃঙ্খল কে পারে চালাতে?
রাজ্যশাসনের রীতি নীতি
সূক্ষ্মভাবে রয়েছে ইহাতে।”

বোধ হয় এই গার্হস্থ্য ব্যাপারটাকে মস্তকস্বরূপ কল্পনা করিয়া শাস্ত্রকারগণ পতি ও পত্নীকে তাহার অঙ্গস্বরূপ বলিয়াছেন। তবে দেখা যাউক বর্তমান যুগে সমাজের মূর্তিটা কেমন।

মনে করুন কোন স্থানে পূর্বদিকে একটি বৃহৎ দর্পণ আছে, যাহাতে আপনি আপাদমস্তক নিরীক্ষণ করিতে পারেন। আপনার দক্ষিণাঙ্গভাগ পুরুষ এবং বামাঙ্গভাগ স্ত্রী। এই দর্পণের সম্মুখে দাঁড়াইয়া দেখুন-

আপনার দক্ষিণ বাহু দীর্ঘ (ত্রিশ ইঞ্চি) এবং স্থুল, বাম বাহু দৈর্ঘ্যে চব্বিশ ইঞ্চি এবং ক্ষীণ। দক্ষিণ চরণে দৈর্ঘ্যে ১২ ইঞ্চি, বাম চরণ অতিশয় ক্ষুদ্র। দক্ষিণ স্বন্ধ উচ্চতায় পাঁচ ফিট, বাম স্কন্ধ উচ্চতায় চারি ফিট! (তবেই মাথাটা সোজা থাকিতে পারে না, বাম দিকে ঝুঁকিয়া পড়িতেছে! কিন্তু আবার দক্ষিণ কর্ণভারে বিপরীত দিকেও একটু ঝুঁকিয়াছে!) দক্ষিণ কর্ণ হস্তিকর্ণের ন্যায় বৃহৎ, বাম কর্ণ রাসভকর্ণের (গাধার কান) ন্যায় দীর্ঘ! দেখুন!-ভালো করিয়া দেখুন, আপনার মূর্তিটা কেমন!
যদি এ মূর্তিটা অনেকের মনোমত না হয়, তবে দ্বিচক্র শকটের গতি দেখাই। যে শকটের এক চক্র বড় (পতি) এবং এক চক্র ছোট (পত্নী) হয়, সে শকট অধিক দূরে অগ্রসর হইতে পারে না; সে কেবল একই স্থানে (গৃহকোণেই) ঘুরিতে থাকিবে। তাই ভারতবাসী উন্নতির পথে অগ্রসর হইতে পারিতেছেন না।

সমাজের বিধি ব্যবস্থা আমাদিগকে তাহাদের অবস্থা হইতে সম্পূর্ণ পৃথক রহিয়াছে; তাঁহাদের সুখ দুঃখ এক প্রকার, আমাদের সুখ দুঃখ অন্য প্রকার। এস্থলে বাবু রবীন্দ্রনাথ ঠাকুরের “নবদম্পতির প্রেমালাপ” কবিতার দুই চারি ছত্র উদ্ধৃত করিতে বাধ্য হইলাম-

“বর। কেন সখি কোণে কাঁদিছ বসিয়া?
“কনে। পুষি মেনিটিরে ফেলিয়া এসেছি ঘরে।

“বর। কি করিছ বনে কুঞ্জভবনে? (লতার ঘর)
“কনে। খেতেছি বসিয়া টোপা কূল।

“বর। জগৎ ছানিয়া, কি দিব আনিয়া জীবন করি ক্ষয়?
তোমা তবে সখি, বল করিব কি?
“কনে। আরো কূল পাড় গোটা ছয়।

“বর। বিরহের বেলা কেমনে কাটিবে?
“কনে। দেব পুতুলের বিয়ে।”

সুতরাং দেখা যায় কন্যাকে এরূপ শিক্ষা দেওয়া হয় না, যাহাতে সে স্বামীর ছায়াতুল্য সহচরী হইতে পারে। প্রভুদের বিদ্যার গতির সীমা নাই, স্ত্রীদের বিদ্যার দৌড় সচরাচর “বোধোদয়” পর্যন্ত!

স্বামী যখন পৃথিবী হইতে সূর্য ও নক্ষত্রের দূরত্ব মাপেন (উচ্চশিক্ষা), স্ত্রী তখন একটা বালিশের ওয়াড়ের দৈর্ঘ্য প্রস্থ (সেলাই করিবার জন্য) মাপেন! স্বামী যখন কল্পনা-সাহায্যে সুদূর আকাশে গ্রহনক্ষত্রমালা বেষ্টিত সৌরজগতের বিচরণ করেন, সূর্যমণ্ডলের ঘনফল তুলাদণ্ডে ওজন করেন এবং ধূমকেতুর গতি নির্ণয় করেন, স্ত্রী তখন রন্ধনশালায় বিচরণ করেন, চাউল ডাউল ওজন করেন এবং রাঁধুনির গতি নির্ণয় করেন। বলি জ্যোতির্বেত্তা মহাশয়, আপনার পার্শ্বে আপনার সহধর্মীনি কই? বোধ হয়, গৃহিণী যদি আপনার সঙ্গে সূর্যমণ্ডলে যান, তবে তথায় পঁহুছিবার পূর্বেই উত্তাপে বাস্পীভূত হইয়া যাইবেন! তবে সেখানে গৃহিণীর না যাওয়াই ভালো! (ব্যঙ্গ)

অনেকে বলেন, স্ত্রীলোকদের উচ্চশিক্ষার প্রয়োজন নাই (সংকীর্ণ মনোভাব)। মেয়ে চর্ব্য, চূষ্য (চিবিয়ে ও চুষে খাওয়া যায়) রাঁধিতে পারে, বিবিধ প্রকার সেলাই করিতে পারে, দুই চারিখানা উপন্যাস পাঠ করিতে পারে, ইহাই যথেষ্ট। আর বেশি আবশ্যই নাই। কিন্তু ডাক্তার বলেন যে আবশ্যক আছে, যেহেতু মাতার দোষ গুণ লইয়া পুত্রগণ ধরাধামে (পৃথিবীতে) অবতীর্ণ হয় (মায়ের শিক্ষা সন্তানদের মধ্যে বেশি প্রভাব ফেলে)। এইজন্য দেখা যায় যে, আমাদের দেশে অনেক বালক শিক্ষকের বেত্রতাড়নায় কণ্ঠস্থ বিদ্যার জোরে এফ. এ., বি. এ. পাশ হয় বটে (উচ্চশিক্ষিত); কিন্তু বালকের মনটা তাহার মাতার সহিত রান্নাঘরেই ঘুরিতে থাকে (মানসিকতায় পিছিয়ে পড়ে)! তাহাদের বিদ্যাপরীক্ষায় এ কথার সত্যতার উপলব্ধি হইতে পারে।
আমার জনৈক বন্ধু তাঁহার ছাত্রকে উত্তর দক্ষিণ প্রভৃতি দিঙনির্ণয়ের কথা (cardinal points) বুঝাইতেছিলেন। শেষে তিনি প্রশ্ন করিলেন, “যদি তোমার দক্ষিণ হস্ত পশ্চিমে এবং বাম হস্ত পূর্বে থাকে, তবে তোমার মুখ কোন দিকে হইবে?” উত্তর পাইলেন “আমার পশ্চাৎ দিকে!”

যাঁহারা কন্যার ব্যায়াম করা (শরীর চর্চা) অনাবশ্যক মনে করেন, তাঁহারা দৌহিত্রকে (নাতি) হৃষ্টপুষ্ট ‘পাহলওয়ান’ দেখিতে চাহেন কি না? তাঁহাদের দৌহিত্র ঘুষিটা খাইয়া থাপড়টা মারিতে পারে (প্রতিবাদী মনোভাব), এরূপ ইচ্ছা করেন কি না? যদি সেরূপ ইচ্ছা করেন, তবে বোধ হয়, তাঁহারা সুকুমারী গোলাপ-লতিকায় কাঁঠাল ফলাইতে চাহেন (দুর্বল মায়ের বলিষ্ঠ সন্তান অসম্ভব বিষয়)! আর যদি তাঁহারা ইচ্ছা করেন যে দৌহিত্রও বলিষ্ঠ না হয় (দুর্বল থাকুক), বরং পয়জার (জুতা) পেটা হইয়া নত মস্তকে উচ্চৈঃস্বরে বলে, “মাৎ মারো! চোট লাগতা হায়!” এবং পয়জার লাভ শেষ হইলে দূরে গিয়া প্রহারকর্তাকে শাসাইয়া বলে যে, “কায় মারতা থা? হাম নালিশ করেগা!” (প্রতিবাদ  করার শক্তি নেই) তাহা হইলে আমি তাঁহাদিগকে আমার বক্তব্য বুঝাইতে অক্ষম।

খ্রিস্টিয়ান সমাজে যদিও স্ত্রীশিক্ষার যথেষ্ট সুবিধা আছে, তবু রমণী আপন স্বত্ব ষোল আনা ভোগ করিতে পায় না (অধিকার না থাকায়)। তাহাদের মন দাসত্ব হইতে মুক্তি পায় না। স্বামী ও স্ত্রী কতক পরিমাণে জীবনের পথে পাশাপাশি চলিয়া থাকেন বটে; কিন্তু প্রত্যেক উত্তমার্ধই (Better half) তাঁহার অংশীর (partner এর) জীবনে আপন জীবনে মিলাইয়া তন্ময়ী (সম্পূর্ণরূপে এক হয়ে) হইয়া যান না। স্বামী যখন ঋণজালে জড়িত হইয়া ভাবিয়া ভাবিয়া মরমে মরিতেছেন (দুশ্চিন্তায় মগ্ন), স্ত্রী তখন একটা নূতন টুপির (bonnet এর) চিন্তা করিতেছেন (শখ পূরণের ইচ্ছা)! কারণ তাঁহাকে কেবল মূর্তিমতী কবিতা হইতে শিক্ষা দেওয়া হইয়াছে-তাই তিনি মনোরমা কবিতা সাজিয়া থাকিতে চাহেন। ঋণদায়রূপ গদ্য (prosaic) অবস্থা তিনি বুঝিতে অক্ষম (বাস্তব পরিস্থিতি বুঝতে)।

এখন মুসলমান সমাজে প্রবেশ করা যাউক; মুসলমানের মতে আমরা পুরুষের ‘অর্ধেক’ (উত্তরাধিকারী সম্পত্তি), অর্থাৎ দুইজন নারী একজন নরের সমতুল্য। অথবা দুইটি ভ্রাতা ও একটি ভগিনী একত্র হইলে আমরা ‘আড়াই জন’ হই! আপনারা “মুহম্মদীয় আইনে” দেখিতে পাইবেন যে বিধান আছে, পৈতৃক সম্পত্তিতে কন্যা পুত্রের অর্ধেক ভাগ পাইবে। এ নিয়মটি কিন্তু পুস্তকেই সীমাবদ্ধ (বাস্তবে মেয়েদের সম্পত্তি থেকে বঞ্চিত করা হয়)। যদি আপনারা একটু পরিশ্রম স্বীকার করিয়া কোন ধনবান মুসলমানের সম্পত্তি বিভাগ করা দেখেন, কিংবা জমিদারি পরিদর্শন করিতে যান, তবে দেখিবেন কার্যত কন্যার ভাগে শূন্য (০) কিংবা যৎসামান্য পড়িতেছে।

আমি এখন অপার্থিব সম্পত্তির (যার আর্থিক মূল্য হয় না) কথা বলিব। পিতার স্নেহ, যত্ন ইত্যাদি অপার্থিব সম্পত্তি। এখানেও পক্ষপাতিতার মাত্রা বেশী। ঐ যত্ন, স্নেহ, হিতৈষিতার (আদরের) অর্ধেকই আমরা পাই কই? যিনি পুত্রের সুশিক্ষার জন্য চারিজন শিক্ষক নিযুক্ত করেন, তিনি কন্যার জন্য দুই জন শিক্ষয়ত্রী নিযুক্ত করেন কি? যেখানে পুত্র তিনটা (বি. এ. পর্যন্ত) পাশ করে, সেখানে কন্যা দেড়টা পাশ (এন্ট্রাস পাশ ও এফ. এ. ফেল) করে কি? পুত্রদের বিদ্যালয়ের সংখ্যা করা যায় না, বালিকাদের বিদ্যালয় সংখ্যায় পাওয়াই যায় না! সে স্থলে ভ্রাতা ‘শমস-উল-ওলামা’ (জ্ঞানীদের মধ্যে সূর্য) সে স্থলে ভগিনী ‘নজম-উল-ওলামা’ (জ্ঞানীদের মধ্যে নক্ষত্র) হইয়াছেন কি? তাঁহাদের (পুরুষদের) অন্তঃপুর গগণে অসংখ্য “নজমন্নেসা” “শমসন্নেসা” শোভা পাইতেছেন বটে (গুণী নারী আছে বটে)। কিন্তু আমরা সাহিত্য-গগনে “নজম-উল-ওলামা” (সাহিত্য ও শিক্ষায় নারীর অবদান) দেখিতে চাই!

আমাদের জন্য এ দেশে শিক্ষার বন্দোবস্ত সচরাচর এইরূপ-প্রথমে আরবীয় বর্ণমালা, অতঃপর কোরান শরীফ পাঠ। কিন্তু শব্দগুলির অর্থ বুঝাইয়া দেওয়া হয় না, কেবল স্মরণশক্তির সাহায্যে টিয়াপাখির মতো আবৃত্তি কর। কোন পিতার হিতৈষণার মাত্রা বৃদ্ধি হইলে, তিনি দুহিতাকে “হাফেজা” করিতে চেষ্টা করেন। সমুদয় কোরানখানি যাঁহার কণ্ঠস্থ থাকে, তিনিই “হাফেজ”। আমাদের আরবী শিক্ষা ঐ পর্যন্ত!
পারস্য এবং উর্দু শিখিতে হইলে, প্রথমেই “করিমা ববখশা এবর হালেমা” (আল্লাহ আমাদের দয়া করুন) এবং একেবারে (উর্দু) “বানাতন নাস” পড় (উর্দু শেখার প্রাথমিক বই)! একে আকার ইকার নাই, তাতে আবার আর কোন সহজপাঠ্য পুস্তক পূর্বে পড়া হয় নাই সুতরাং পাঠের গতি দ্রুতগামী হয় না। অনেকের ঐ কয়খানি পুস্তক পাঠ শেষ হওয়ার পূর্বেই কন্যা-জীবন শেষ হয় (শিক্ষাগ্রহণের ক্ষেত্রে বৈষম্য)। বিবাহ হইলে বালিকা ভাবে, “যাহা হোক, পড়া হইতে রক্ষা পাওয়া গেল! (লেখাপড়াকে বোঝা মনে করে)” কোন কোন বালিকা রন্ধন ও সূচীকর্মে সুনিপুণা হয়। বঙ্গদেশের বালিকাদিগকে রীতিমত বঙ্গভাষা শিক্ষা দেওয়া হয় না। কেহ কেহ উর্দু পড়িতে শিখে, কিন্তু কলম ধরিতে শিখে না। ইহাদের উন্নতির চরম সীমা সলমা চুমকির কারুকার্য, উলের জুতা মোজা ইত্যাদি প্রস্তুত করিতে শিক্ষা পর্যন্ত। 

যদি ধর্মগুরু মোহাম্মদ (সা.) আপনাদের হিসাব নিকাশ লয়েন যে, “তোমরা কন্যার প্রতি কিরূপ ন্যায় ব্যবহার করিয়াছ?” তবে আপনারা কি বলিবেন?

পয়গম্বরদের ইতিহাসে শুনা যায়, জগতে যখনই মানুষ বেশি অত্যাচার অনাচার করিয়াছে, তখনই এক-একজন পয়গম্বর আসিয়া দুষ্টের দমন ও শিষ্টের পালন করিয়াছেন (নবীদের দায়িত্ব)। আরবে স্ত্রীজাতির প্রতি অধিক অত্যাচার হইতেছিল; আরববাসিগণ কন্যাহত্যা করিতেছিল তখন হযরত মোহাম্মদ (সা.) কন্যাকুলের রক্ষকস্বরূপ দণ্ডায়মান হইয়াছিলেন। তিনি কেবল বিবিধ ব্যবস্থা দিয়াই ক্ষান্ত থাকেন নাই (কেবল নিয়ম বর্ণনাতেই সীমাবদ্ধ না), স্বয়ং কন্যা পালন করিয়া আদর্শ দেখাইয়াছেন। তাঁহার জীবন ফাতেমাময় করিয়া দেখাইয়াছেন-কন্যা কীরূপ আদরণীয়া। সে আদর, সে স্নেহ জগতে অতুল।

আহা! তিনি নাই বলিয়া (নবীর বিধানের বাস্তবায়ন) আমাদের এ দুর্দশা। তবে আইস ভগিনীগণ! আমরা সকলে সমস্বরে বলি :

“করিমা ববখশা এবর হালে মা!” করিম (ঈশ্বর) অবশ্যই কৃপা করিবেন। যেহেতু “সাধনার সিদ্ধি।” আমরা “করিমের” অনুগ্রহলাভের জন্য যত্ন করিলে অবশ্যই তাঁহার করুণা লাভ করিব। আমরা ঈশ্বর ও মাতার নিকট ভ্রাতাদের “অর্ধেক” নহি। তাহা হইলে এইরূপ স্বাভাবিক বন্দোবস্ত হইত-পুত্র যেখানে দশ মাস স্থান পাইবে, দুহিতা সেখানে পাঁচ মাস! পুত্রের জন্য যতখানি দুগ্ধ আমদানি হয়, কন্যার জন্য তাহার অর্ধেক! সেরূপ তো নিয়ম নাই! আমরা জননীর স্নেহ মমতা ভ্রাতার সমানই ভোগ করি। মাতৃহৃদয়ে পক্ষপাতিতা নাই (মা যেখানে পক্ষপাতিত্ব করে না)। তবে কেমন করিয়া বলিব, ঈশ্বর পক্ষপাতী? তিনি কি মাতা অপেক্ষা অধিক করুণাময় নহেন?

আমি এবার রন্ধন ও সূচীকার্য সম্বন্ধে যাহা বলিয়াছি, তাহাতে আবার যেন কেহ মনে না করেন যে আমি সূচীকর্ম ও রন্ধনশিক্ষার বিরোধী (এসব কাজ অবশ্যই শিখতে হবে)। জীবনের প্রধান প্রয়োজনীয় বস্তু অন্নবস্ত্র; সুতরাং রন্ধন ও সেলাই অবশ্য শিক্ষণীয়। কিন্তু তাই বলিয়া জীবনটাকে শুধু রান্নাঘরেই সীমাবদ্ধ রাখা উচিত নহে। (এতে নারীর বৃদ্ধিবৃত্তিক সেবা থেকে সমাজ ও জাতি বঞ্চিত হবে)

স্বীকার করি যে, শারীরিক দুর্বলতাবশত নারীজাতি অপর জাতির সাহায্যে নির্ভর করে। তাই বলিয়া পুরুষ “প্রভু” হইতে পারে না। কারণ জগতে দেখিতে পাই, প্রত্যেকেই প্রত্যেকের নিকট কোন না কোন প্রকার সাহায্য প্রার্থনা করে, যেন একে অপরের সাহায্য ব্যতীত চলিতে পারে না (সামাজিক ও প্রাকৃতিক নিয়ম)। তরুলতা যেমন বৃষ্টির সাহায্য-প্রার্থী, মেঘও আবার নদীর নিকট ঋণী। তবে তরঙ্গিনী কাদম্বিনীর “স্বামী’, না কাদম্বিনী তরঙ্গীণীর “স্বামী”, এ স্বাভাবিক নিয়মের কথা ছাড়িয়া কেবল সামাজিক নিয়মে দৃষ্টিপাত করিলেও আমরা তাহাই দেখি। (নারী-পুরুষ পরস্পরের পরিপূরক)

কেহ সূত্রধর (ছুতার, কাঠের মিস্ত্রি), কেহ তন্তুবায় (তাঁতি) ইত্যাদি। একজন ব্যারিষ্টার ডাক্তারের সাহায্য-প্রার্থী, আবার ডাক্তারও ব্যারিষ্টারের সাহায্য চাহেন। তবে ডাক্তারকে ব্যারিষ্টারের স্বামী বলিব, না ব্যারিষ্টার ডাক্তারের স্বামী? যদি ইহাদের কেহ কাহাকে “স্বামী” বলিয়া স্বীকার না করেন, তবে শ্রীমতীগণ জীবনের চিরসঙ্গী শ্রীমানদিগকে “স্বামী” ভাবিবেন কেন? (স্বামী শব্দটি ঈশ্বরের সমার্থক)

আমরা উত্তমার্ধ (better halves) তাঁহারা নিকৃষ্টার্ধ (worse halves), আমরা অর্ধাঙ্গী, তাঁহারা অর্ধাঙ্গ। অবলার হাতেও সমাজের জীবন মরণের কাঠি আছে (সমাজ পরিচালনায় নারীদের ভূমিকা), যেহতু “না জাগিলে সব ভারত-ললনা” এ ভারত আর জাগিতে পারিবে না। প্রভুদের ভীরুতা কিংবা তেজস্বিতা জননীর ইচ্ছার উপর নির্ভর করে। তবে কেবল শারীরিক বলের দোহাই দিয়া অদূরদর্শী ভ্রাতৃমহোদয়গণ যেন শ্রেষ্ঠত্বের দাবি না করেন!

আমরা পুরুষের ন্যায় সুশিক্ষা ও অনুশীলনের সম্যক সুবিধা না পাওয়ায় পশ্চাতে পড়িয়া আছি। (শিক্ষার অভাবই নারীসমাজের অবনতির মূল কারণ) সমান সুবিধা পাইলে আমরাও কি শ্রেষ্ঠত্ব লাভ করিতে পারিতাম না? আশৈশব আত্মনিন্দা শুনিতেছি, তাই এখন আমরা অন্ধভাবে পুরুষের শ্রেষ্ঠতা স্বীকার করি, এবং নিজেকে অতি তুচ্ছ মনে করি। অনেক সময় “হাজার হোক ব্যাটা ছেলে!” বলিয়া ব্যাটা ছেলেদের দোষ ক্ষমা করিয়া অন্যায় প্রশংসা করি। (অন্যায়কে সমর্থন) এই তো ভুল।

আমি ভগিনীদের কল্যাণ কামনা করি। তাঁহাদের ধর্মবন্ধন বা সমাজ বন্ধন ছিন্ন করিয়া তাঁহাদিগকে একটা উন্মুক্ত প্রান্তরে বাহির করিতে চাহি না (পারিবারিক স্থিতিশীলতা ভাঙতে চাই না)। মানসিক উন্নতি করিতে হইলে হিন্দুকে হিন্দুত্ব বা খ্রিস্টানি ছাড়িতে হইবে এমন কোন কথা নাই। আপন আপন সম্প্রদায়ের পার্থক্য রক্ষা করিয়াও মনটাকে স্বাধীনতা দেওয়া যায় না (ধর্ম মেনেও উন্নত মানসিকতা অর্জন করা যায়)। আমরা যে কেবল উপযুক্ত শিক্ষার অভাবে অবনত হইয়াছি, তাই বুঝিতে ও বুঝাইতে চাই।

অনেকে হয়ত ভয় পাইয়াছেন যে, বোধ হয় একটা পত্নীবিদ্রোহের আয়োজন করা হইতেছে। অথবা ললনাগণ দলে দলে উপস্থিত হইয়া বিপকে রাজকীয় কার্যক্ষেত্রে হইতে তাড়াইয়া দিয়া সেই পদগুলি অধিকার করিবেন-শ্যামলা, চোগা, আইন কানুনের পাঁজি পুঁথি লুঠিয়া লইবেন (পুরুষদের কর্মক্ষেত্র কেড়ে নিবে)! অথবা সদলবলে কৃষিক্ষেত্রে উপস্থিত হইয়া কৃষকগুলিকে তাড়াইয়া দিয়া তাহাদের শস্যক্ষেত্র দখল করিবেন, হাল গরু কাড়িয়া লইবেন, তবে তাঁহাদের অভয় দিয়া বলিতে হইবে-নিশ্চিন্ত থাকুন।

পুরুষগণ আমাদিগকে সুশিক্ষা হইতে পশ্চাৎপদ রাখিয়াছেন বলিয়া আমরা অকর্মণ্য হইয়া গিয়াছি (সংকীর্ণ দৃষ্টিভঙ্গি)। ভারতে ভিক্ষু ও ধনবান-এই দুই দল লোক অলস; এবং ভদ্রমহিলার দল কর্তব্য অপেক্ষা অল্প কাজ করে। আমাদের আরামপ্রিয়তা খুব বাড়িয়াছে। আমাদের হস্ত, পদ, মন, চক্ষু ইত্যাদির সদ্ব্যবহার করা হয় না। দশজন রমণীরত্ব একত্র হইলে ইহার উহার-বিশেষত আপন আপন অর্ধাঙ্গের নিন্দা কিংবা প্রশংসা করিয়া বাকপটুতা দেখায়। আবশ্যক হইলে কোন্দলও চলে।

আশা করি এখন “স্বামী’ স্থলে “অর্ধাঙ্গ” শব্দ প্রচলিত হইবে। (স্ত্রীর সমান মর্যাদা এবং অধিকারকে তুলে)
