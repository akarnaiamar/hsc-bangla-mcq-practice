                content: `
ভোররাত থেকে বৃষ্টি (স্বস্তির বার্তা)। আহা! বৃষ্টির ঝমঝম বোল। এই বৃষ্টির মেয়াদ আল্লা দিলে পুরো তিনদিন। কারণ শনিতে সাত মঙ্গলে তিন, আর সব দিন দিন (খনার বচন)। এটা জেনারেল স্টেটমেন্ট (মূল বচন- পৌষের কুয়া বৈশাখের ফল, যদ্দিন কুয়া তদ্দিন জল- শনিতে সাত মঙ্গলে তিন, আর সব দিন দিন- [অর্থ] পৌষে যতদিন কুয়াশা হবে বৈশাখেও ততদিন হবে। শনিবারে বৃষ্টি শুরু হলে অনবরত সাতদিন বৃষ্টি হবে। মঙ্গলবারে বৃষ্টি শুরু হলে টানা তিনদিন থাকবে।এছাড়া অন্যবারে বৃষ্টি শুরু হলে সেইদিন হয়েই থেমে যাবে)। স্পেসিফিক ক্লাসিফিকেশনও আছে। যেমন, মঙ্গলে ভোররাতে হলে শুরু, তিন দিন মেঘের গুরুগুরু। তারপর, বুধের সকালে নামল জল, বিকেলে মেঘ কয় এবার চল। বৃহস্পতি শুক্র কিছু বাদ নাই। কিন্তু এখন ভুলে গেছে (এই ধরনের প্রবাদের চর্চা)। যেটুকু মনে আছে, পুরু বেড-কভারের নিচে গুটিসুটি মেরে শুয়ে আর একপশলা ঘুমিয়ে নেওয়ার জন্য তাই যথেষ্ট। অন্তত তিন দিন ফুটফাট বন্ধ (গুলির আওয়াজ)। বাদলায় বন্দুক-বারুদ কি একটু জিরিয়ে নেবে না? এই ক’টা দিন নিশ্চিন্তে আরাম করো। (তীব্র বৃষ্টিতে বারুদ বন্দুকের ক্ষতি হওয়ায় এখন গোলাগুলির সম্ভাবনা কম)

তা আর হলো কই? ম্যান প্রোপোজেস (গড ডিসপোজেস- মানুষ ভাবে এক, হয় আরেক)—। এমন চমৎকার বাদলার সকালে দরজায় প্রবল কড়া নাড়া শেষ হেমন্তের শীত শীত পর্দা ছিঁড়ে ফালা ফালা করে ফেলল। সব ভেস্তে দিল (ঘুমের পরিকল্পনা বাদ)। মিলিটারি। মিলিটারি আজ তার ঘরে। আল্লা গো। আল্লাহুমা আন্তা সুবহানাকা ইন্নি কুনতু মিনাজ জোয়ালেমিন। —পড়তে পড়তে সে দরজার দিকে এগোয়। এই কয়েকমাসে কত সুরাই সে মুখস্থ করেছে (মুসলমান প্রমাণ করতে)। রাস্তায় বেরুলে পাঁচ কলেমা সবসময় রেডি রাখে ঠোঁটের ওপর। কোনদিক থেকে কখন মিলিটারি ধরে। —তবুও একটা না একটা ভুল হয়ে যায় (আতঙ্কে)। দোয়া মনে হলো ঠিকই কিন্তু টুপিটা মাথায় দিতে ভুলে গেল।

দুটো ছিটকিনি, একটা খিল এবং কাঠের ডাশা দরজার কপাট ফাঁক করতেই বাতাস আর বৃষ্টির ঝাপটার সঙ্গে ঘরে ঢোকে প্রিন্সিপালের পিওন। আলহামদুলিল্লাহ। মিলিটারি নয়। পিওনকে জড়িয়ে ধরে চুমু খেতে ইচ্ছে করছে (অপ্রত্যাশিত ভয় থেকে মুক্তি পাওয়ায়)। কিন্তু লোকটা চিনচিনে গলা গম্ভীর স্বরে হাঁকে ‘স্যার মে সালাম দিয়া’। বলেই ভাঙাচোরা গালের খোঁচা খোঁচা দাড়িতে লোকটা নিজের বাক্যের কোমল শ্বাসটুকু শুষে নেয় এবং হুকুম ছাড়ে, ‘তলব কিয়া। আভি জানে হোগা’।
কী ব্যাপার?
বেশি কথা বলার সময় নেই— কলেজের দেওয়াল ঘেঁষে কারা বোমা ফাটিয়ে গেছে (গেরিলা আক্রমণ) গত রাতে।
মানে?
‘মিসকিরিয়ান (দুষ্কৃতিকারী বা মুক্তিযোদ্ধা) লোগ ইলেকটিরি টেরানসফার্মার তোড় দিয়া। অওর ওয়াপস যানে কা টাইম প্রিন্সিপালের সাহেবকা কোঠিমে গেরেনড ফেকা। গেট তোড় গিয়া।’

ভয়াবহ কাণ্ড। ইলেকট্রিক ট্রান্সফর্মার তো কলেজের সামনের দেওয়াল ঘেঁষে। দেয়ালের পর বাগান, টেনিস লন। তারপর কলেজ দালান। মস্ত দালান পার হয়ে ফুটবল ক্রিকেট খেলার মাঠ। মাঠ পেরিয়ে একটু বাঁ দিকে প্রিন্সিপালের কোয়ার্টার। এর সঙ্গে মিলিটারি ক্যাম্প। কলেজের জিমন্যাশিয়ামে (ব্যায়ামাগার) এখন মিলিটারি ক্যাম্প। প্রিন্সিপালের বাড়ির গেটে বোমা ফেলা মানে মিলিটারি ক্যাম্প অ্যাটাক করা। (প্রিন্সিপ্যাল পাকিস্তানিদের দোসর বলে)
সামনের দেওয়ালে বোমা মেরে এতটা পথ ক্রস করে গেল কী করে? সে জানতে চায়, ক্যায়সে? (এমন অন্তর্ঘাতের পর আক্রমণকারীরা কীভাবে পালিয়ে গেল)
প্রিন্সিপালের পিয়ন জানবে কী করে? ‘উও আপ হি কহ সাকতা।’ (পিওন নূরুল ‍হুদাকে মিসক্রিয়ান্টদের দোসর মনে করে)

মানে? সে-ই বা বলবে কী করে? পিওন কি তাকে মিসক্রিয়েন্টদের লোক ভাবে নাকি?—তার মাথাটা আপনা আপনি নিচু হলে মুখ দিয়ে পানির মতো গড়িয়ে পড়ে (নরম স্বরে বলে), ‘ইসহাক মিয়া, বৈঠিয়ে। চা-টা খাইয়ে। আমার এই পাঁচ সাত মিনিট লাগেগা।’
‘নেহি।’ নাশতার আমন্ত্রণ ফিরিয়ে দিয়ে ইসহাক বলে, ‘আব্দুস সাত্তার মিরধাকা ঘর যানে হোগা। আপ আভি আইয়ে। এক কর্নেল সাহাব পঁওছ গিয়া। সব পরফসরকো এত্তেলা দিয়া। ফওরন আইয়ে।’
কর্নেলের নেতৃত্বে মিলিটারির হাতে কলেজটা এবং তাকেও ন্যস্ত করে ইসহাক বেরিয়ে যায়, রাস্তায় ঘড়ঘড় করতে থাকা বেবি ট্যাক্সির গর্জন তুলে সে রওনা হলো জিওগ্রাফির প্রফেসরের বাড়ির দিকে। ইসহাক নিজেই এখন মিলিটারির কর্নেল বললেও চলে (উচ্চপদস্থ কেউ না থাকায়)। তবে ভোরবেলা কলেজের ভেতরে কর্নেল খোদ চলে আসায় সে হয়তো ডেমোটেড হয়েছে লেফটেন্যান্ট কর্নেলে (মুক্তিযুদ্ধের সময় তার দাপট বেড়ে যায়। তবে স্বয়ং কর্নেল চলে আসায় তার ক্ষমতা কিছুটা কমে যায়)। আরো নিচেও নামতে পারে। কিন্তু ক্যাপ্টেনের দিকে ঠেলা মুশকিল। মিলিটারি প্রাদুর্ভাবের (উৎপাত) পর থেকে তাকে দেখে (মিলিটারিদের প্রতিনিধি বলে) কলেজের সবাই তটস্থ। এপ্রিলের শুরু থেকে সে বাংলা বলা ছেড়েছে। কোনকালে দাদা না পরদাদার ভায়রার মামু না কে যেন দিল্লিওয়ালা কোন সাহেবের খাস খানসামা (খাবার পরিবেশক) ছিল, সেই সুবাদে দিনরাত এখন উর্দু বলে। (আত্মীয়ের থেকে উর্দু শিখে)

প্রিন্সিপাল গাট্টাগোট্টা বেঁটেখাটো মানুষ, নিজের চাপরাশির সাথে নতুন জাব লবজ করতে গিয়ে গলায় তার রক্ত উঠে যায়। ‘ইসাক মিয়া, দেশতে বহুত মুসিবত্ হো রহা হ্যায়। প্রফেসর লোক আদমিকো হুঁশিয়ার থাকতে বলিয়ে। গুজব বোলনা মানা কর দিজিয়ে। আভি মিলিটারি সাহাবকো মদদ করনা এখন ফরজ কাম হ্যায়।’
‘জরুর।’ দেশালাইয়ের কাঠির মতো রোগা পটকা শরীরের উপর ফিট করা ভিজে বারুদের মতো ছোট্ট মাথা ঝাঁকিয়ে ইসহাক আরো তিনবার সম্মতি দেয় জরুর! জরুর! জরুর। কয়েকদিন আগের ইসহাকের এই জরুর বৃষ্টিতে ভিজে আরও টাটকা হয়ে তার কানে বাজতে না বাজতে কোথায় যেন ফেটে পড়ে দুম করে। এই বৃষ্টিতে কি ফের শুরু হলো নাকি? —না না সে ফ মেঘের গর্জন। বৃষ্টি বোধহয় বাড়ছে। না—। এখন বেরুতেই হয়। আল্লা ভরসা।’

‘যেতেই হবে’? অসময়ের বৃষ্টিতে ভিজে তোমার হাঁপানির টানটা আবার—। বৌয়ের এসব সোহাগের কথা শুনলে কি আর চলবে (স্বামীর প্রতি যত্নশীল মনোভাব)? বৌ প্রিন্সিপালের ধমকের ভাগ নেবে? এর উপর কলেজে কর্নেল এসেছে। কপালে আজ কী আছে আল্লাই জানে (মৃত্যুর শঙ্কা)। ফায়ারিং স্কোয়াডে যদি দাঁড় করিয়েই দেয় তো কর্নেল সাহেবের হাতে পায়ে ধরে ঠিক কপালে গুলি করানোর হুকুম জারি করা যায় না (স্বল্প যন্ত্রণায় মৃত্যু)? প্রিন্সিপাল কি তার জন্যে কর্নেলের কাছে এ তদবিরটুকু করবে না? পাকিস্তানের জন্য প্রিন্সিপাল দিনরাত দোয়া-দরুদ পড়ছে। সময় নেই অসময় নেই আল্লার দরবারে কান্নাকাটি করে (অখণ্ড পাকিস্তানের মঙ্গল কামনায়)) এবং সময় করে কলিগদের গালাগালিও করে (কলিগরা মুক্তিযুদ্ধ সমর্থন করায়)।
এপ্রিল মাসের মাঝামাঝি প্রিন্সিপাল মিলিটারির বড় কর্তাদের কাছে সবিনয় নিবেদন করেছিল, পাকিস্তান যদি বাঁচাতে হয় তো সব স্কুল কলেজ থেকে শহীদমিনার হটাও (বাঙালি জাতির ঐতিহ্য ধ্বংস)। এসব আন অথারাইজড কনস্ট্রাকশন হলো হিন্দুদের শিবলিঙ্গের সামিল, এগুলো হলো পাকিস্তানের শরীরের কাঁটা। পাকিস্তানের পাক সাফ শরীরটাকে নীরোগ করতে হলে এসব কাঁটা উপড়াতে হবে। তা মিলিটারি ডক্টর আফাজ আহমদর পরামর্শ শুনেছে, গ্রামে গঞ্জে যেখানেই গেছে, প্রথমেই কামান তাক করেছে শহীদ মিনারের দিকে। দেশে একটা কলেজেও শহীদ মিনার অক্ষত নেই (জাতির ঐতিহ্য ধ্বংস)। তা প্রিন্সিপাল তাদের এতবড় একটা পরামর্শ দিল, আর সামান্য এক লেকচারারকে গুলি করার সময় শরীরের আলতুফালতু জায়গা বাদ দিয়ে কপালটা টার্গেট করার অনুরোধটা তারা মানবে না? আবার প্রিন্সিপালকে সে এত সার্ভিস দিচ্ছে (তোয়াজ করা ও প্রিন্সিপ্যালের ফরমায়েশ শোনা), তার কলিগের, তওবা, সাব-অর্ডিনেটের জন্যে এতটুকু করবে না? (কপালে গুলি করে মৃত্যুর অনুরোধ)

প্যান্টের ভিতর পা গলিয়ে দিতে দিতে সে শোনে রান্নাঘর থেকে বৌ বলছে ‘তাড়াতাড়ি চলে এসো। বৃষ্টি শুরু হওয়ার আগে মিরপুর ব্রিজের দিক থেকে গুলির আওয়াজ আসছিল। কখন কী হয়।’
এসব কথা বলার দরকার কী (আতঙ্কজনক কথাবার্তা)? —রেডিও টেলিভিশনে হরদম বলছে সিচুয়েশন নরমাল। পরিস্থিতি স্বাভাবিক (দেশবাসীকে সান্ত্বনা দেওয়া)। দুশমনকে সম্পূর্ণ কব্জা করা গেছে। মিসক্রিয়েন্টরা সব খতম। প্রেসিডেন্ট (ইয়াহইয়া খান) দেশে গণতন্ত্র ফিরিয়ে দিতে বদ্ধপরিকর। কিছুদিন বাদে বাদে তার ভাষণ শোনা যায়, আওয়ার আলটিমেট এইম রিমেইনস দা সেম (পূর্ব প্রতিশ্রুতি এখনো বহাল আছে), দ্যাট ইজ টু হ্যান্ডওভার পাওয়ার টু দি ইলেকটেড রিপ্রেজেনটিটিভস অন দ্য পিপল। সবই তো নর্মাল হয়ে আসছে। বাঙ্গালি, আই মিন ইস্ট পাকিস্তান গভর্নর (ডা. আব্দুল মুতালিব মালিক মন্ত্রিসভা), মন্ত্রীরা ইস্ট পাকিস্তানি। সবই তো স্বাভাবিক। এখন বৌ তার এসব বাজে কথা বলে কেন? ইস! আসমাকে নিয়ে আর পারা যায় না।
পরশু রাতে বিছানায় ছটফট করতে করতে বলে কি, রাতে দুই-চারবার গুলিগালাজের আওয়াজ না শুনলে ঘুম হয় না। —এর জন্যই তার ঘরে কখন যে কী মুসিবত নেমে আসে আল্লাই জানে।

এই বৃষ্টিতে শুধু ছাতায় কুলাবে না গো। বৌয়ের আরেক দফা সোহাগ শোনা গেল, তুমি বরং মিন্টুর রেইনকোটটা নিয়ে যাও।
ইস! আবার মিন্টু। বৌয়ের এই ভাইটার জন্যেই তাকে এক্সট্রা তটস্থ হয়ে থাকতে হয় (শালা মুক্তিবাহিনীতে যোগ দেওয়ায়)। বাড়ি থেকে, হ্যাঁ, হ্যাঁ, তার মগবাজারের দুই কামরার ফ্লাট থেকেই তো মিন্টু চলে গেল জুন মাসে, জুনের ২৩ তরিখে (গেরিলা যোদ্ধারা এক ঠিকানায় স্থায়ী থাকে না)। জুলাইয়ের পয়লা তারিখ সে বাড়ি শিফট করল। বলা যায় না, ওখানে যদি কেউ আঁচ করে থাকে। ও চলে যাবার তিনদিন পরেই পাশের ফ্লাটের গোলগাল মুখের মহিলা তার বউকে জিজ্ঞেস করেছিল (কৌতূহলবশত), ভাবী, আপনার ভাইকে দেখছি না। ব্যস, এই শুনেই সে বাড়ি বদলাবার জন্যে লেগে গেল হন্যে হয়ে (মিন্টুর ব্যাপারে কেউ সন্দেহ করলে)। মিলিটারি লাগার পর থেকে এই নিয়ে চারবার বাড়ি পালটানো হলো (মুক্তিবাহিনীর সাথে আঁতাত রাখার কথা গোপন রাখতে)। এখানে আসার পর নিচের তলার ভদ্রলোক একদিন বলছিল, আমার ভাইটাকে আর ঢাকায় রাখলাম না (নিরাপত্তাহীনতার কারণে)। যে গোলমাল, বাড়ি পাঠিয়ে দিলাম। শুনে বুকটা তার টিপটিপ করছিল, এবার যদি তার শালার প্রসঙ্গ তোলে? নিরাপত্তার জন্যই সে এখানে এসেছে। কলেজ থেকে দূরে, আত্মীয়-স্বজন থেকে দূরে। শহর থেকেও দূরেই বলা যায়। ভেবেছিল নতুন এলাকা, পুবদিকে জানালা ধরে দাঁড়ালে চোখে পড়ে বিল আর ধানক্ষেত। তা কী বিপদ! এদিকে নাকি নৌকা করে চলে আসে স্টেনগানওয়ালা ছোকরার দল (মুক্তিবাহিনীর তৎপরতা)। এদিককার মানুষ চোখে খালি নৌকা দেখে, নৌকাভরা অস্ত্র। এর উপর বৌ যদি মিন্টুর কথা তোলে তো অস্ত্র ঢুকে পড়ে তার ঘরের মধ্যিখানে। মিন্টু যে কোথায় গেছে তা সে-ও জানে তার বৌ-ও জানে (ক্র্যাক প্লাটুন)।

আবার দেখো নিজের ভাইয়ের গৌরব প্রতিষ্ঠা করতে আসমা ছেলেদের কী বলছে, তারা পর্যন্ত বলে, ছোট মামা গেছে খানসেনাদের মারতে। কোন কথায় কী বিপদ হয়, কেউ বলতে পারে? তো আসমার যদি এতই সাহস তো সেও ভাইয়ের সঙ্গে কোমর বাঁধলো না কেন? —মুখে বলা যায় না, কিন্তু বলার জন্য তার জিব কাঁপে। মিন্টুর কথা ভুলে যাও আসমা, ভুলে যাও। আমাদের সঙ্গে কেউ নাই, কেউ নাই।

কিসিনজার সাহেব (তৎকালীন মার্কিন পররাষ্ট্রমন্ত্রী) বলেছে, এসব হলো পাকিস্তানের ইনটার্নাল অ্যাফেয়ার (পরাশক্তিধর দেশগুলোর দায়িত্বহীন আচরণ)।—মানুষ মেরে সাফ করে দেয়, বাড়িঘর, গ্রাম, বাজারহাট জ্বালিয়ে দিচ্ছে,—কারো কোনো মাথাব্যথা নেই (মানুষের প্রতি কোনো দরদ নেই)। এসব হলো ইনটার্নাল অ্যাফেয়ার।—না, না, এ ধরনের ভাবনা (প্রতিবাদী মনোভাব) ধারে কাছে ঘেঁষতে দেওয়া ঠিক না। নিচের ফ্ল্যাটে থাকে এক ওয়েলডিং ওয়ার্কশপের মালিক, তার শ্বশুর নিশ্চয় সর্দার গোছের রাজাকার। সপ্তাহে দুইদিন-তিনদিন মেয়ের বাড়িতে রেফ্রিজারেটর, টেপ রেকর্ডার, দামি দামি সোফাসেট, ফ্যান, খাট-পালং সব চালান পাঠায় (অপরের মাল লুট করে)।

একদিন এমনকি হিন্দুদের কোন দেবতার মূর্তি পর্যন্ত এসেছিল, সোনার কি-না কে জানে। ট্রাক ট্রাক মাল আসে, আবার চলেও যায়। রাজাকার এসব পায় কোথায়? লোকটা যদি টের পায় তার জামাইয়ের ওপরতলার প্রফেসরের শালা হলো মিসক্রিয়েন্ট, মিলিটারি খতম করার নিয়ত করে সে চলে গেছে এই বোনের ঘর থেকেই, তাহলে গোলাগুলি চলবে এই বাড়িতেই, এই ঘরের মধ্যে। সেই গুলির বোলে আসমাকে ঘুম পাড়তে হবে সারা জীবের জন্যে।—এখানে কথাবার্তা বলার সময় হুঁশ ঠিক রাখা দরকার।

‘দেখি তো, ফিট করে কি-না’? আসমা এগিয়ে এসে তার গায়ে রেইনকোট চড়িয়ে দিতে দিতে বলে, ‘মিন্টু তো আমার অনেক লম্বা। তোমার গায়ে হবে তো?’—দেখো, ফের মিন্টুর দৈর্ঘ্যের তুলনা করে তার সঙ্গে। এই ভাইকে নিয়ে এরকম বাড়াবাড়ি করাটা কি আসমার ঠিক হচ্ছে? ভালোই হলো। তোমার গোড়ালি পর্যন্ত ঢাকা পড়েছে। পায়েও বৃষ্টি লাগবে না। এখানেই আসমার শেষ নয়। রেইনকোটের সঙ্গেকার টুপি এনে চড়িয়ে দেয় তার মাথায়।

মিন্টুটার কাজ! শালা তার আবার কী মহৎ কীর্তি স্থাপন করল। নাহ, এবার তার কীর্তি অন্যরকম। কী? না, আলনায় ঝুলিয়ে গেছে রেইনকোট, টুপিটা রেখে গেছে ওয়ার্ডরোবের মাথায়। কাল কোরান শরিফ নামাতে গিয়ে দেখি ওটা পড়ে আছে। আর কিছু রাখেনি তো? নিজের চোখে দেখতে সে ওয়ার্ডরোবের ওপরটায় ভালো করে চোখ বোলায়। মগবাজারে এক বাড়িতে মিলিটারি ঢুকে খাটের নিচে চাইনিজ রাইফেল পেয়েছিল তিনটে। অথচ বাড়ির বাসিন্দা, গোবেচারি ডাক্তার এর কিছুই জানত না। ঘরের জিনিসপত্র রোজ রোজ দেখে রাখা ভালো।

‘আব্বু ছোটমামা হয়েছে। আব্বু ছোটমামা হয়েছে।’ আড়াই বছরের মেয়ের সদ্য-ঘুম-ভাঙা গলায় ভাঙা ভাঙা বুলি শুনে সে চমকে ওঠে, মিন্টু কি ঢুকে পড়লো অস্ত্রশস্ত্র হাতে, এর মানে ওর পিছে পিছে ঢুকছে মিলিটারি। তার মানে—। না, দরজার ছিটকিনি ও খিল সব বন্ধ। আড়াই বছরের কন্যা বিছানায় বসে বসেই হাততালি দেয়, আব্বু ছোটমামা, আব্বু ছোটমামা।

তাকে কি মিন্টুর মতো দেখাচ্ছে? মিলিটারি আবার ভুল করে বসবে না তো? এর মধ্যে তার পাঁচ বছরের ছেলেটা গম্ভীর চোখে তাকে পর্যবেক্ষণ করে রায় দেয়, আব্বুকে ছোট মামার মতো দেখাচ্ছে। আব্বু তাহলে মুক্তিবাহিনী। তা-ই না? এ তো ভাবনার কথা (মুক্তিবাহিনীর মতো দেখানো)। ড্রেসিং টেবিলের সামনে দাঁড়িয়ে নিজের নতুন রূপে সে ভ্যাবাচ্যাকা খায়।

রঙ খাকি নয়, আবার জলপাই রঙও নয়। মাটির মতো রঙটা একটু জ্বলে গেছে, তবে তাতে জেল্লা কমেনি। দেখতে একটু মিলিটারি মিলিটারি লাগছে। মিলিটারির মতো দেখা নিরাপদ নয়। রেইনকোট পরাকে মিলিটারির ছদ্মবেশ বলে গণ্য করলে মিলিটারি তাকে ধরে সোজা পাঠিয়ে দেবে ক্যান্টনমেন্টে। না—।

খামাখা ভয় পাচ্ছে। বৃষ্টির দিনে রেইনকোট গায়ে দেয়াটা অপরাধ হবে কেন? মিলিটারির কি আর বিবেচনাবোধ নাই। প্রিন্সিপাল ড. আফাজ আহমদ ঠিকই বলে, শোনেন, মিলিটারি যাদের ধরে, মিছেমিছি ধরে না। সাবভার্সিভ অ্যাকটিভিটিজের সঙ্গে তারা সামহাউ অর আদার ইনভলভড (পাকিস্তানিদের অন্যায়কে সমর্থন)। তা সে তো বাপু এসব থেকে শত হাত দূরে। শালা তার বর্ডার ক্রস করল, ফিরে এসে দেশের ভিতর দমাদম (নির্বিচারে) মিলিটারি মারে। তাতে আর দুলাভাইয়ের দোষটা কোথায় (দুলাভাই শালার এমন কর্মকাণ্ড সমর্থন করে)? এই যে মিলিটারি প্রত্যেকদিন এই ঢাকা শহরের বাজার পোড়ায়, বস্তিতে আগুন লাগিয়ে টপাটপ মানুষ মারে, মেয়েদের ধরে নিয়ে যায়,—সে কখনও এসব নিয়ে টু শব্দটি (প্রতিবাদ) করেছে? কলেজের দেয়াল ঘেঁষে প্রিন্সিপালের কোয়ার্টারের পাশে মিলিটারি ক্যাম্প, ক্লাসটাস সব বন্ধ (যুদ্ধের আতংকে)। ছেলেরা কেউ আসে না। মাস্টারদের হাজিরা দিতে হয় (চাকরি রক্ষার্থে), তাও বহু টিচার গা ঢাকা দিয়েছে (আত্মগোপনে থাকা) কবে থেকে। সে তো রোজ টাইমলি যায়। (যাতে কেউ সন্দেহ না করে) স্টাফরুমে কলিগরা ফিসফিস করে, কোথায় কোন ব্রিজ উড়ে গেল, কোথায় সাত মিলিটারির লাশ পড়েছে ছেলেদের গুলিতে, এই কলেজের কোন কোন ছেলে ফ্রন্টে গেছে (মুক্তিযোদ্ধাদের নেতৃত্ব দিচ্ছে),— কই সে তো এসব আলাপের মধ্যে কখনও থাকে না। এসব কথা (মুক্তিযুদ্ধ নিয়ে কথা) শুরু হলেই আলগোছে (নীরবে) উঠে সে চলে যায় প্রিন্সিপালের কামরায়। ড. আফাজ আহমদ খ্যাসখ্যাস গলায় হিন্দুস্থান ও মিসক্রিয়েন্টদের আশু ও অবশ্যম্ভাবী পতন সন্বন্ধে নিশ্চিত ভবিষ্যদ্বাণী শোনে। ঐ ঘরে আজকাল সহজে কেউ ঘেঁষে না (মুক্তিযুদ্ধ বিরোধী কথা বলায়)। উর্দুর প্রফেসর আকবর সাজিদকে প্রিন্সিপাল আজকাল তোয়াজ করে (উর্দু ভাষা জানায়)।

তো ঐ সাজিদ আবার স্যারকে আমল দেয় না। বরং মাঝে মাঝে ‘আপকা তবিয়ত ভালো হ্যায়?’ বলে প্রিন্সিপালের উর্দুচর্চা নিয়ে ঠাট্টা করে। ড. আফাজ আহমদ পাকিস্তানের অখণ্ডতা রক্ষার জন্য উদ্বিগ্ন থাকে বলে কিংবা জবাব দেওয়ার জন্য ঠিকঠাক উর্দু বাক্য গঠন করতে পারে না বলে চুপ করে থাকে। আবার কথার জবাব না পেয়ে সাজিদ পাছে রাগ করে এই ভেবে হো হো করে, জি হ্যাঁ আপনার মেহেরবানি। সাজিদ হাসে আমার মেহেরবানি? আমি মেহেরবানি করার কে? বলিয়ে জেনারেল সাহেবকা মেহেরবানি। এরপর কথা বলতে গেলে উর্দু জবাবে আর কুলাবে না বলে প্রিন্সিপাল খামোস মেরে যায়। উর্দুর প্রফেসরকে নিয়ে লোকটা মুসকিলে পড়েছে। কোনটা তার ঠাট্টা আর কোনটা অ্যাপ্রিসিয়েশন বোঝা দিনদিন শক্ত হয়ে পড়েছে। এমনকি মিলিটারির তৎপরতায় অভিভূত প্রিন্সিপালের যুদ্ধ সম্বন্ধে বিশ্লেষণ শুনতে শুনতে সাজিদ একদিন ‘আপনি মিলিটারি সায়েন্সের উপর ডক্টরেট করে ফেলেন স্যার। মোহাম্মদপুরের এক এলএমএফ ডাক্তার আজকাল হোমিওপ্যাথি শুরু করেছে, অ্যালোপ্যাথি ভি ছাড়ল না। তো মহল্লার মানুষ ওর নাম দিল ডবল ডক্টর। তা আপনি ডবল ডক্টর হয়ে যান।’ বলতে বলতে হো হো করে হাসলে ড. আফাজ আহমদকে তার সিঙ্গেল ডক্টরেট নিয়েই হেঁ হেঁ করতে হয়। কলিগরা পড়ে বিপদে। এই অসময়ে কোন রসিকতায় হাসাটা নিরাপদ তারা ঠিক ঠাওর করতে পারে না।

মিন্টুর ফেলে যাওয়া নাকি রেখে যাওয়া রেইনকোটে ঢোকার পর তার পা শিরশির করছে (দেশপ্রেমের উত্তেজনায়), আর এক মুহূর্ত দাঁড়িয়ে থাকা যাচ্ছে না। প্রিন্সিপাল তাকে ডেকে পাঠিয়েছে সেই কখন!
রাস্তায় একটা রিকশা নাই। তা রিকশার পরোয়া সে এখন করছে না (রেইনকোট পরায়)। রেইনকোটের ভেতরে হাঁটতে হাঁটতে বাসস্ট্যান্ডে যেতে তার কোনো অসুবিধা হবে না। রেইনকোটের ওপর বৃষ্টি পড়ছে অবিরাম। কী মজা, তার গায়ে লাগে না একটি ফোঁটা। টুপির বারান্দা বেয়ে পানি গড়িয়ে পড়ে কয়েক ফোঁটা সে চেটে দেখে। ঠিক পানসে স্বাদ নয়, টুপির তেজ (মুক্তিযোদ্ধার সাহসের সঞ্চার) কি পানিতেও লাগল নাকি? তাকে কি মিলিটারির মতো দেখাচ্ছে? পাঞ্জাব আর্টিলারি, না বেলুচ রেজিমেন্ট, না কম্যান্ডো ফোর্স, নাকি প্যারা মিলিটারি, নাকি মিলিটারি পুলিশ, —ওদের তো একেক গুষ্টির একেক নাম, একেক সুরত। তার রেইনকোটে তাকে নতুন কোনো বাহিনীর লোক বলে মনে হচ্ছে? হোক। সে বেশ হনহন করে হাঁটে। শেষ হেমন্তের বৃষ্টিতে বেশ শীত শীত ভাব। কিন্তু রেইনকোটের ভিতরে কী সুন্দর ওম। মিন্টুটা এই রেইনকোট রেখে গিয়ে কী ভালোই যে করেছে।

এটা নিতে ছোঁড়াটা যে কবে ফেরে! —আহা, এই তুমুল বৃষ্টির মধ্যে ছেলেটা কোথায় কোন নদীর তীরে ওৎ পেতে বসে রয়েছে। হয়তো পাকিস্তানি সেনাবাহিনীর এক প্লাটুন গ্রাম জ্বালিয়ে শ-দুয়েক মানুষ মেরে লাশগুলোকে ফেলে জিপে করে নিয়ে যাচ্ছে জ্যান্ত জোয়ান মেয়েদের, মিন্টুর স্টেনগান নিশ্চয় তাক করে রয়েছে ঐ মিলিটারিগুলোর দিকে। ‘মিলিটারি সব ক-টাকে খতম করে মেয়েগুলোকে বাঁচাতে পারবে তো? পারবে না? —বড়ো রাস্তায় মিলিটারির লরি দেখে তার চৈতন্যোদয় ঘটে। মিন্টুকে নিয়ে এতক্ষণের ভাবনা আড়াল করতে নিজের চোখ জোড়ায় পুরু করে ভক্তি মাখিয়ে সে তাকিয়ে থাকে লরির দিকে। না বাবা, ওদের সঙ্গে চোখাচোখি না হওয়াই ভালো। লরি চলে যায় উত্তরে, তাকে তাই তাকাতে হয় দক্ষিণের দিকে। কিন্তু লরির বৃষ্টি ভেজা আওয়াজ মুছে ফেলা কি এতই সোজা? মিরপুর ব্রিজ থেকে আসমা কাল রাতে গোলাগুলির আওয়াজ পেয়েছে, লরি কি ওদিকেই গেল? —আরে কোথায় কী হয়, আর আসমা নিত্য শোনে গুলির শব্দ। এসব স্রেফ গুজব। প্রিন্সিপাল বলে, গুজব ছড়ানো আর গুজবে কান দেওয়া সমান অপরাধ। ঐ যে পদ্য আছে, অন্যায় যে করে আর অন্যায় যে সহে—। এটা হিন্দুর লেখা বলে কিংবা পরের কথাগুলা মনে নাই বলে প্রিন্সিপাল ঐ পর্যন্ত বলেই থেমে যায়। বরং উর্দুতে বলে, সাজিদ সাহেব, গুজব সব গজব হোতা। সাজিদ সঙ্গে সঙ্গে ছন্দ লাগায়, গুজব জো থা ওহি সব আজ হজব হো চুকা হ্যায়। প্রিন্সিপাল ভক্তিগদগদ হয়ে ঘর্ঘর গলায় বলে, ইকবালের নাকি দাঁড়ান লিখে নেই। আকবর সাজিদ বাধা দেয়, তওবা ইকবালের কেন হবে। গুজব তো বাংলা কথা হলো। উর্দুমে ইসকো—প্রিন্সিপালের তর সয় না, এটাই ভালো। আপনি বলেন আমি লিখে নেই। অনুপ্রাসটি রাখার খাতিরে সাজিদ গুজবের উর্দু প্রতিশব্দ ব্যবহার করে না। এর সঙ্গে সে আবৃত্তি করে পরের লাইনটি, আমির কে আরমান পুরে হো চুকে হ্যায়।
মানে?
মানে হলো আমিরের ইচ্ছা ফুলফিল হয়েছে। বলতে বলতে সাজিদ আরো চরণ তৈরি করে। হাত পা নেড়ে সে পুরো কবিতাটি আবৃত্তি করে,
গুজব জো থা ওহি সব আজ গজব হো চুকা হ্যায়
আমির কে আরমানপুরে হো চুকে হ্যায়
আল্লা এক, রসুল এক, পাকিস্তান ভি এক,
ইসে জিসকো ইমান নেহি উও নালায়ক।
কুচল দো উস গাদ্দারকো জাঁ ভি মিলে,
পাকিস্তানি ফওজ কভি পিছে না হিলে।

স্টাফ রুমে এসে সাজিদ বলে, প্রিন্সিপাল যদি এটা কোনো মেজর কি কর্নেলকে শোনায় তো তার শাস্তি হবে, মিলিটারি বলবে, তুম মজাক করো রহা? তার কলিগরা চুপ করে থাকে। সাজিদের সামনে এখন কেউ এসব নিয়ে কথা বলতে চায় না। এমনকি তার বন্ধু আলী কবিরও একটু এড়িয়েই চলে। ওদিকে নিজের কামরায় বসে খাস পিয়ন ইসহাকের সামনে প্রিন্সিপাল বাংলা হরফে লেখা এই উর্দু পদ্যটি বারবার আবৃত্তি করে এবং কয়েকদিনের মধ্যে এটিকে স্বরচিত বলে ভাবতে শুরু করে। আবৃত্তি করার সময় সুখে ও ভক্তিতে তার চোখ জোড়া বুজে বুজে আসে।
রেইনকোটে বৃষ্টির জলতরঙ্গ বাজে ঐ কবিতার ছন্দে এবং হঠাৎ করে তার মনে হয়, প্রিন্সিপাল হয়তো কর্নেলকে ওটাই আবৃত্তি করে শোনাচ্ছে। গুজবের উর্দু প্রতিশব্দ জানতে চেয়ে জবাব না পেয়ে কর্নেল যদি হঠাৎ করে চটে যায়? উর্দুর প্রফেসর আকবর সাজিদ সেনাবাহিনীর তৎপরতা নিয়ে নানা রকম ঠাট্টা-মশকরা করে। জিওগ্রাফির আব্দুস সাত্তার মৃধা ফিসফিস করে বলে, নিজের মাতৃভাষাকে বর্মের মতো ব্যবহার করে লোকটা নিশ্চয়ই মিসক্রিয়েন্টদের হয়ে কাজ করছে। আবার ইংরেজির খোন্দকার একদিন সবাইকে হুঁশিয়ার করে দেয়, ওর কথায় সায় দেবেন না। ও আসলে এইসব বলে আপনাদের অ্যাটিচুডটা জানতে চায়। বেটা নির্ঘাত আর্মির লোক। তা আকবর সাজিদ কয়েকদিন হলো একটু চুপচাপই থাকে। স্টাফ রুমে সে বসলে সবাই উসখুস করে, আবার প্রিন্সিপালের কামরায় যেতেও তার ভালো লাগে না। সে নিজেও সাজিদের কাছ থেকে দূরে দূরেই থাকে। দরকার কী? তবে, রেইনকোটের কল্যাণে গায়ে পানি না লাগিয়ে বৃষ্টিতে দাঁড়িয়ে আকবর সাজিদের সঙ্গে গোপনে কয়েকটা কথা বলার জন্যে প্রাণটা তার আইঢাই করে। এর মানে কী?
না, এসব হাউস ভালো নয়। সেনাবাহিনী নিয়ে বাংলা কিংবা উর্দুতে ঠাট্টা মশকরা করার ভাবনা থেকে যতটা মুক্ত থাকা যায়।

বাসস্ট্যান্ডে পৌঁছে বাসের জন্য তাকে তাকাতে হয় উত্তরেই। মিলিটারি লরির লেজটাও (চিহ্ন) দেখা যাচ্ছে না। আবার তার বাসেরও নামগন্ধ নেই। বাসস্ট্যান্ডে জনপ্রাণি বলতে সে একেবারে একা। রাস্তার পাশে পান-বিড়ি-সিগ্রেটের ছোট দোকানটার ঝাঁপ একটুখানি তুলে দোকানদারও তাকিয়ে রয়েছে উত্তরেই, ওদিকে কি কোনো গোলমাল হলো নাকি (এক দৃষ্টিতে সবাই তাকিয়ে থাকায়)? দোকানদার ছেলেটা একটু বাচাল টাইপের। বাসস্ট্যান্ডে তাকে দেখলেই ছোঁড়াটা বিড়বিড় করে, কাল শোনেন নাই? মিরপুরের বিল দিয়া দুই নৌকা বোঝাই কইরা আইছিল। একটা জিপ উড়ইয়া দিছে, কমপক্ষে পাঁচটা খানসেনা খতম। বিবিসি কইছে, রংপুর-দিনাজপুরের হাফের বেশি জায়গা স্বাধীন।

কাল চরমপত্র শুনেছেন? এর সামনে সে বেশিক্ষণ দাঁড়ায় না। এসব গুজব শোনার সময়ও সে যদি ধরা পড়ে তো! গুজব জো থা ওহি সব আজ গজব হো চুকা হ্যায়। প্রিন্সিপাল বলে গুজবই হলো বাঙ্গালির কাল। গুজবের আকর্ষণ ভারি তীব্র, গুজব মানেই সুস্বাদু। এই যে এখন বৃষ্টির আড়াল পেয়েও হতে পারে, কিংবা রেইনকোটের কল্যাণে বৃষ্টির হাত থেকে রেহাই পাবার স্বস্তির ফলেও হতে পারে, সে এগিয়ে গেল দোকানদারের দিকে। একটা গুজব শোনার হাউশ করে সে জিজ্ঞেস করে, ‘বাস আসেনি কতক্ষণ’?
‘আর বাস! বাস আসবে কৈ থাইকা?’ বলে ছেলেটা তাড়াতাড়ি ঝাঁপ ফেলে মুখ গুঁজে দিল দোকানের ভেতরে। তার ভাবনা হয়, বাস ডিপোতে কোনো হামলা হয়েছে নাকি? আসমার শোনা ঐ গোলাগুলির শব্দ কি আসছিল বাস ডিপো থেকে? মিলিটারি লরি কি ওদিকেই গেল? বাসডিপোর পেছনে একটা বস্তি আছে, সেখানে মিলিটারি কি আগুন দিতে গেল? জায়গাটা খুব একটা দূরে তো নয়, সে একবার ঘুরেও তো আসতে পারে। বৃষ্টিটা ধরে এসেছে। যাবে নাকি একবার? —তার যাওয়া হলো না।

এর মধ্যেই ছিপছিপে বৃষ্টিতে লালচে আভা তুলে এসে পড়ল লাল রঙের স্টেট বাস। বাসে যাত্রী কম। না, না, কন্ডাক্টররা সবসময় যেমন খালি গাড়ি বলে চ্যাঁচায় (লোক থাকলেও খালি বলে), সেরকম নয়। সত্যি সত্যি অর্ধেকের বেশি সিট খালি। সে বাসে উঠলে তার রেইনকোটের পানি পড়তে লাগল বাসের ভিজে মেঝেতে। এজন্য তার একটু খারাপ কথা, অন্তত টিটকিরি শোনার কথা। কিন্তু তাকে কেউ কিছু বলে না।
বাসে এত খালি সিট। বাঁশবনে ডোম কানা—প্রবাদটি মনে না পড়লেও ঠোঁটে তার একটু হাসি বিছানো থাকে। এই নীরব কিন্তু স্পষ্ট হাসির কারণ কি এই যে, তার রেইনকোটের পানিতে বাস সয়লাব হয়ে গেলেও (লোকেরা তাকে পাকিস্তানি মনে করে ভয় করছে) কেউ টুঁ শব্দটি করছে না? তার পোশাক কি সবাইকে ঘাবড়ে দিল নাকি?

খালি রাস্তা পেয়ে বাস চলে খুব জোরে। কিন্তু তার আসনটি সে নির্বাচন করতে পারছে না (অনেক আসন থাকায়)। টলতে টলতে একবার এই সিট দেখে, পছন্দ হয় না বলে ফের ঐ সিটের দিকে যায়। এমন সময় পেছনের দিক থেকে দুজন যাত্রী উঠে পড়ে তাড়াহুড়া করে। রাখো রাখো বলতে বলতে ঝুঁকি নিয়ে তারা নেমে পড়ে চলন্ত বাস থেকে। সে তাদের দিকে তাকায় এবং বুঝতে পারে, এরা পালালো ঠিক তাকে দেখেই। লোক দুটো নিশ্চয় ক্রিমিনাল। একটা চোর আর একটা পকেটমার। নামবার মুহূর্তে দুটোর মধ্যে সর্দার টাইপেরটা তার দিকে পেছন ফিরে তাকাল। সেই চোখভরা ভয়, কেবল ভয়।

জুৎসই (উপযুক্ত) সিট বেছে নিয়ে সে ধপাস করে বসতেই ফোমে ফস করে আওয়াজ হয় এবং তাইতে ঘাড় ফিরিয়ে তাকায় সামনের সিটে বসা তিনজন যাত্রী। তা এদেরও সে ঠিক চোর অথবা পকেটমার বলে ঠিক শনাক্ত করে ফেলে। ডাকাতও হতে পারে। কিংবা মিলিটারি কোনো বস্তিতে আগুন লাগিয়ে চলে এলে এরা ছোটে সেখানে লুটপাট করতে। অথবা মিলিটারি কোথাও লুটপাট করলে এরা গিয়ে উচ্ছিষ্ট কুড়ায়। তিনটেই পরের স্টপেজে নামার জন্যে অনেক আগেই ধড়ফড় করে উঠে দাঁড়ায় এবং বাস থামার সঙ্গে-সঙ্গে নেমে পড়ে ঝটপট পায়ে। তিনটি ক্রিমিনালের একটাও তার দিকে ফিরেও তাকায় না। তার মানে তাকে বেশ ভয় পেয়েছে বলেই তার সঙ্গে চোখাচোখি এড়াতে এদের এত কসরত।

যাক, মিন্টুর রেইনকোটে তার কাজ হচ্ছে। চোর ছ্যাঁচোড় পকেটমাররা কেটে পড়ছে। ভালো মানুষেরা থাক। সে বেশ সৎসঙ্গে চলে যাবে কলেজ পর্যন্ত।
আসাদ গেট বাস স্টপেজে ঝিরঝিরে বৃষ্টিতে দাঁড়িয়ে অপেক্ষা করছিল বেশ কয়েকজন মানুষ। ছাতা হাতে কেউ-কেউ নিজ-নিজ ছাতার নিচে আবার ছাতা ছাড়া অনেকেই অন্যের ছাতার নিচে মাথার অন্তত খানিকটা পেতে দিয়ে বৃষ্টির ছাঁট থেকে আত্মরক্ষা করতে শরীরগুলোকে আঁকাবাঁকা করছিল। বাস থামলে সে দেখল, একে একে নয়জন প্যাসেঞ্জার বাসে উঠল। সে বেশ খুঁটিয়ে খুঁটিয়ে সবাইকে দেখে। তো তার দিকে তাকিয়ে নয়জনের তিনজন আরে রাখো-রাখো এবং একজন রোখো-রোখো বলতে বলতে নেমে পড়ল ধড়ফড় করে। শেষের জন বোধ হয় এমনই অর্ডিনারি চোর, ছিঁচকে চোর হওয়ার সম্ভাবনাই বেশি। আর প্রথম তিনটে কোথাও সুন্দরী মেয়েমানুষ দেখলে মিলিটারিকে খবর দেয় (অন্যদের সম্পর্কে খারাপ ধারণা) কিংবা মিলিটারির কাছ থেকে বন্দুক নিয়ে পাকিস্তান জিন্দাবাদ, পাকিস্তান জিন্দাবাদ স্লোগান দিয়ে মহল্লায়-মহল্লায় ঘোরে আর সুন্দরী মেয়েদের ধরে এনে পৌঁছে দেয় মিলিটারি ক্যাম্পে। এগুলো হলো রাজাকার।
ফের নতুন করে অপরাধীমুক্ত বাসে যেতে এখন ভালো লাগছে। জানালার বাইরে বৃষ্টির আঁশ উড়ছে। ঠান্ডা হাওয়ায়, গাছপালা ও লোকজন ও দোকানপাট ও বাড়িঘরের ওপর ট্রান্সপারেন্ট আবরণ দেখে তার এক্সট্রা ভালো লাগে।
সমস্ত ভালো লাগাটা চিড় খায় বাস হঠাৎ করে ব্রেক কষলে। তখন তাকে তাকাতে হয় বাঁয়ে, চোখে পড়ে নির্মীয়মাণ মসজিদের ছাদের দিকে। দরজা থেকে ঠান্ডা হাওয়া এসে লাগে তার মুখে এবং নাকের ভিতর দিয়ে সেই হাওয়া ঢুকে পড়ে বুকে, সেখানে ধাক্কা লাগে; ক্রাক-ডাউনের রাত (২৫ মার্চের রাত) কেটে ভোর হলে মিলিটারির গুলিতে এই মসজিদের ছাদ থেকে পড়ে গিয়েছিল মোয়াজ্জিন সাহেব। ঠান্ডা হাওয়ার ধাক্কা রেইনকোটের তাপে এতটাই গরম (আতংকে) হয়ে ওঠে যে, মনে হয় ভেতরে বুঝি আগুন ধরে গেল। মসজিদের উল্টোদিকের বাড়িতে তিনতলায় থাকত তখন তারা। রাতভর ট্যাঙ্কের হুঙ্কার আর মেশিনগান আর স্টেনগানের ঘেউঘেউ (কটাক্ষ করা) আর মানুষের কাতরানিতে তাদের কারো ঘুম হয়নি সে রাতে। ছেলমেয়েদের নিয়ে ছেলেমেয়ের মায়ের সঙ্গে সে শুয়েছিল খাটের নিচে (মিলিটারিদের ভয়ে)। ভোরবেলা মিলিটারি মানুষ মারায় একটু বিরতি দিলে ছেলেমেয়েরা ঘুমিয়ে পড়ে এবং বন্ধ জানালার পর্দা একটু তুলে সে রাস্তা দেখতে থাকে। রাস্তার ওপারে মসজিদের ছাদে মোয়াজ্জিন সাহেব দাঁড়িয়ে ছিল আজান দিতে। সাধারণত জুমার নামাজটা সে নিয়মিত পড়ে। তবে সেই ভোরে তার আজান শুনতে ইচ্ছা করছিল খুব (ভীত-সন্ত্রস্ত অবস্থায় মানুষ ধর্মের কথা বেশি মনে করে)। মোয়াজ্জিনের আজান দেওয়াটা সম্পূর্ণ দেখবে বলে সে জানালার ধার থেকে সরে না। সারা এলাকায় ইলেক্ট্রিসিটি নষ্ট, মসজিদের মাইক্রোফোন অকেজো। মোয়াজ্জিন সাহেব গমগমে (গম্ভীর গলা) গলায় যতটা পারে জোর দিয়ে বলে উঠল আল্লাহু আকবার। দ্বিতীয়বার আল্লাহর মহত্ত্ব ঘোষণা করার সুযোগ তার আর মেলেনি, এর আগেই সম্পূর্ণ অন্যরকম ধ্বনি (মৃত্যুর গোঙানি) করে লোকটা পড়ে যায় রাস্তার ওপর। সেদিন সকালে বৃষ্টি ছিল না। আজ বৃষ্টির সকালে মিলিটারি কি ঐ দৃশ্যের পুনর্ঘটনের পাঁয়তারা করছে? এখন তো কোনো নামাজের ওয়াক্ত নেই, আজান দেওয়াবে কী করে? এরা বোধহয় যেকোনো সময়কেই নামাজের ওয়াক্ত ঘোষণা করে নতুন হুকুম জারি করেছে।

মিলিটারি এখন যাবতীয় গাড়ি থামাচ্ছে। গাড়ির প্যাসেঞ্জারদের দাঁড় করিয়ে দেয় রাস্তার উপর। আরেকদল মিলিটারি স্টেনগান তাক করিয়ে রেখেছে এই মানুষের সারির উপর। অন্য একটি দল ফের ঐ সব লোকের জামাকাপড় ও শরীরের গোপন জায়গাগুলো তল্লাশি করে। মিলিটারি যাদের পছন্দ করছে (সন্দেহ করছে) তাদের ঠেলে দিচ্ছে পেছনে দাঁড়ানো একটা লরির দিকে। তাদের বাসটিতে এসে উঠল লম্বা ও খুব ফর্সা এক মিলিটারি।

এখন বাসের ভিতর কোনো আওয়াজ নেই। যাত্রীদের বুকের টিপটিপ শব্দ এই নীরবতার সুযোগে বাড়ে এবং এটাই তার মাথায় বাজে দ্রাম-দ্রাম করে। বারান্দাওয়ালা টুপির নিচে শব্দের ঘষায় ঘষায় আগুন জ্বলে এবং তার হলকা (গরম বাতাসের ঝাপটা) বেরোয় তার চোখ দিয়ে। তবে একটু নড়ে বসলে মাথা ও বুকের ধ্বনি নিয়ন্ত্রণে আসে এবং এসবকে পরোয়া না করে সে সরাসরি তাকাল মিলিটারির মুখের দিকে। মিলিটারির চোখ ছুঁচালো হয়ে আসে এবং ছুঁচালো চোখের মণি কাঁটার মতো বিঁধে যায় তার মুখে। সেও তার চোখের ভোঁতা কিন্তু গরম চাউনিটাকে স্থির করে আলগোছে বিছিয়ে দেয় মিলিটারির খাড়া নাকে, ছুঁচালো চোখে, গোঁফের নিচে, নাক, গোঁফ ও চোখের আশেপাশের ও নিচের লালচে চামড়ায়। এতে কাজ হলো। মিলিটারির চোখা চোখ সরে যায় তার মুখ থেকে, নেমে পড়ে তার রেইনকোটের উপর। মনে হয় রেইনকোটের পানির ফোঁটাগুলো লোকটা গুণে গুণে দেখছে।
ভেতরের তাপে এই সব পানির ফোঁটা দেখে মিলিটারির এত থ বনে যাবার কী হলো? লোকটা কি এগুলোতে রক্তের চিহ্ন দেখে? রেইনকোটের বৃষ্টির ফোঁটা গোণাগুণতি সেরে মিলিটারি হঠাৎ বলে ‘আগে বাড়ো’। বাস হঠাৎ স্টার্ট দিয়ে কয়েক পা লাফিয়ে আগে বাড়ে এবং যাত্রীদের স্বস্তির নিঃশ্বাসের ধাক্কায় অতিরিক্ত বেগে ছুটে পার হয়ে যায় ঢাকা কলেজের গেট। নিউ মার্কেটের সামনে এসে পড়লে সে উঠে দাঁড়ায় এবং হুকুম করে, রাখেন নামবো। বাস একটু স্লো হলে তার রেইনকোটের জমানো পানি গড়িয়ে পড়তে দিয়ে অপরাধীমুক্ত বাস থেকে নামতে নামতে সহযাত্রীর দিকে তাকিয়ে সে ঠোঁট বাঁকায় (ব্যঙ্গাত্মক হাসি), এতে তার সামনের সারির দাঁতও বেরিয়ে পড়ে। যারা দেখছে তারা তার সেই ভঙ্গিটিকে ঠিক হাসি বলে শনাক্ত করতে পেরেছিল বলে তার ধারণা হয়।

প্রিন্সিপালের কামরায় প্রিন্সিপালের সিংহাসন মার্কা চেয়ারে বসে আছেন জাঁদরেল টাইপের এক মিলিটারি পান্ডা। তার ভারিক্কি মুখ থেকে অনুমান করা যায় পান্ডাটি কর্নেল কিংবা মেজর জেনারেল, অথবা মেজর বা ব্রিগেডিয়ার। তাকে দেখে (নূরুল হুদাকে দেখে) প্রিন্সিপালের কালো মুখ বেগুনি হয় (মিলিটারির সামনে জবাবদিহিতার ভয়ে। যেহেতু সে প্রিন্সিপ্যালের অধীন কর্মচারী)। ড. আফাজ আহমদ এম এস সি, পিএইচ ডি, ই পি এস ই এস (স্বাভাবিক) হওয়ার চেষ্টা করতে করতে স্যার বলে, হি ইজ প্রফেসর হুদা।
কিন্তু ড. আফাজ আহমদ এম এস সি, পিএইচ ডি নিজের ভুল সংশোধন (লেকচারারকে প্রফেসর বলা) না করে পারেন না, সরি হি ইজ নট এ প্রফেসর। এ লেকচারার ইন কেমিস্ট্রি।
শাট আপ।
এবার প্রিন্সিপাল থামে।
তাকে এবং আবদুস সাত্তার মৃধাকে নিয়ে মিলিটারি জিপে তোলার আগে জাঁদরেল কর্নেল না ব্রিগেডিয়ার প্রিন্সিপালকে কড়া গলায় বলে, সেনাবহিনীকে নিয়ে মজা করে শায়েরি করা (সেনাদের ব্যঙ্গ করে কবিতা লেখা) খুব বড়ো অপরাধ। এবার তাকে ছেড়ে দেওয়া হলো, তবে কড়া ওয়াচে (নজরদারি) রাখা হবে। উর্দুর প্রফেসর আকবর সাজিদের দোহাই (কবিতার ব্যাপারে সাজিদকে দায়ী করা) পড়ে প্রিন্সিপালের সুবিধা হয় না। নুরুল উদ্বিগ্ন হয়, সাজিদ সাহেব যদি পালিয়ে না থাকে তো তার কপালে যে কী আছে তা জানে এক আল্লা আর জানে এই মিলিটারি।

তাদের দুজনের চোখ বেঁধে দেওয়া হয়েছিল, জিপ চলছিল এঁকেবেঁকে। মস্ত উঁচু একটা ঘরে (মোট তিনটি ঘরে পাঠানো হয়) তাদের এনে ফেলা হলো। চোখ খুলে দিলে সে আবদুস সাত্তার মৃধাকে দেখতে পায় না। জায়গাটাও একেবারে অচেনা। একটা ডেক-চেয়ারে সে যে কতক্ষণ বসে থাকল তার কোনো হিসাব নেই। তার সামনে একটা চেয়ারে এসে বসল এক মিলিটারি। তাকে ইংরেজিতে নানান প্রশ্ন করে, সে জবাব দেয়। লোকটা চলে গেলে তাকে অন্য ঘরে নিয়ে ফের অন্য একটা লোক এসে তাকে প্রশ্ন করে এবং সে জবাব দেয়। প্রশ্নগুলো প্রায় একই রকম এবং তার উত্তরেরও হেরফের হয় না। যেমন, কিছুদিন আগে তাদের কলেজে কয়েকটা লোহার আলমারি কেনা হয়েছে। ওগুলো বয়ে নিয়ে এসেছিল কারা?

সে জবাব দেয়, ঠিক। অফিসের জন্য তিনটে, বোটানি হিস্ট্রি জিওগ্রাফি ডিপার্টমেন্টের জন্য দুটো করে এবং ইংরেজির জন্য একটা, সর্বমোট দশটি আলমারি কলেজে নিয়ে আসা হয়েছে।
এত কথা বলার দরকার নেই তার। ঐ আলমারি নিয়ে আসা হয় কয়েকটা ঠেলাগাড়ি করে। ঠেলাগাড়িওয়ালাদের সে তো ভালো করেই চেনে।
নুরুল হুদা জবাব দেয়, তাদের সে চিনবে কোত্থেকে? তারা হলো কুলি, সে একজন লেকচারার।তাহলে সে তাদের সঙ্গে এত কথা বলছিল কেন?
প্রিন্সিপালের আদেশে সে আলমারিগুলোর স্টিলের পাতের ঘনত্ব, দেরাজের (ড্রয়ার) সংখ্যা ও আকার, তালাচাবির মান, রঙের মান প্রভৃতি পরীক্ষা করে দেখছিল, তার দায়িত্ব ছিল—।

মিলিটারি শান্ত গলায় তথ্য সরবরাহ করার (নূরুল হুদা থেকে কথা বের করতে) ভঙ্গিতে বলে, মিসক্রিয়েন্টরা কলেজে ঢুকেছিল কুলির বেশে। এটা তার চেয়ে আর ভালো জানে কে? তারা আজ ধরা পড়ে নুরুল হুদার নাম বলেছে। তাদের সঙ্গে তার যোগাযোগ নিয়মিত, সে গ্যাঙের (গোপন ষড়যন্ত্রকারী দল) একজন নিয়মিত সদস্য।

‘আমার নাম? সত্যি বলেছে? আমার নাম বলেছে?’ নুরুল হুদার হঠাৎ চিৎকারে মিলিটারি বিরক্ত হয় না, বরং উৎসাহ পায় (অপরাধী চিহ্নিত করতে পারায়)। উৎসাহিত মিলিটারি ফের বলে, কুলিরা ছিল ছদ্মবেশী মিসক্রিয়েন্ট। তারা কলেজের টিচারদের মধ্যে নুরুল হুদার নামই বলেছে।

নুরুল হুদা অবাক হয়ে তাকিয়ে থাকে (কুলিরা তার নাম বলায়)। তারা কি তাকে চেনে? কেমিস্ট্রি ডিপার্টমেন্টে আলমারি সাজিয়ে রাখার সময় এক কুলি দাঁড়িয়েছিল তার গাঁ ঘেঁষে। তখন তো ঘোরতর বর্ষাকাল, ঢাকায় এবার বৃষ্টিও হয়েছে খুব। রাতদিন এই বৃষ্টি নিয়ে সে কী যেন বলেছিল, তাতে কুলিটা বিড়বিড় করে ওঠে, বর্ষাকালেই তো জুৎ।’ (আক্রমণের উপযুক্ত সময়) কথাটা দু’বার বলেছিল। এর মানে কী? স্টাফরুমে কে একজন একদিন না দু’দিন ফিসফিস করছিল, বাংলার বর্ষা তো শালারা জানে না (বর্ষার ভয়াবহতা)। রাশিয়ায় ছিল জেনারেল উইনটার, আমাদের জেনারেল মনসুন (প্রতিকূল আবহাওয়া)।—ঐ ছদ্মবেশী ছেলেটা কি এই কথাই বুঝিয়েছিল? তার ওপর তাদের এত আস্থা?—উৎসাহে (দেশের জন্য অবদান রাখায়) নুরুল হুদা এদিক-ওদিক তাকায়। তার মৌনতা মিলিটারিকে আরেকটু নিশ্চিত করে (মৌনতা সম্মতির লক্ষণ)।

কিছুক্ষণ পর, কতক্ষণ পর সে বুঝতে পারে না, মিলিটারি তাকে ফের একই প্রশ্ন করে জবাব না পেয়ে প্রবল বেগে দুটো ঘুসি লাগায় তার মুখে। প্রথম ঘুসিতে সে কাত হয়, দ্বিতীয় ঘুসিতে পড়ে যায় মেঝেতে। মেঝে থেকে তুলে তাকে মিলিটারি ফের জিজ্ঞেস করে, ‘ওদের আস্তানা (গেরিলাদের আস্তানা) কোথায় সে খবর তার তো ভালোভাবেই জানা আছে।’ সে জবাব দেয়, ‘হ্যাঁ!’
ঐ ঠিকানাটা বলে দিলেই তাকে সসম্মানে ছেড়ে দেয়া হবে এই নিশ্চয়তা দিয়ে তাকে পাউরুটি আর দুধ খাওয়ানো হয়। তাকে ভাবতে সময় (মানসিক নির্যাতন) দিয়ে মিলিটারি চলে যায়। কিছুক্ষণ পর, কতক্ষণ সে জানে না, মিলিটারি ফিরে এসে ফের বলে, মিসক্রিয়েন্টদের ঠিকানা তো তার জানা আছে। সে ফের জবাব দেয় হ্যাঁ! কিন্তু পরের প্রশ্নের জবাব না পেয়ে মিলিটারি তাকে নিয়ে যায় অন্য একটি ঘরে। তার বেঁটেখাটো শরীরটাকে ঝুলিয়ে দেওয়া হলো ছাদে-লাগানো একটা আংটার সঙ্গে। তার পাছায় চাবুকের বাড়ি পড়ে সপাৎ সপাৎ করে। তবে বাড়িগুলো বিরতিহীন পড়তে থাকায় কিছুক্ষণের মধ্যে সেগুলো নুরুল হুদার কাছে মনে হয় স্রেফ উৎপাত বলে (আঘাত উপলব্ধি না করা)। মনে হচ্ছে যেন বৃষ্টি পড়ছে মিন্টুর রেইনকোটের ওপর। রেইনকোটটা এরা খুলে ফেলেছে, কোথায় রাখল কে জানে। কিন্তু তার ওম (মুক্তিযোদ্ধার রেইনকোটের অনুভূতি) তার শরীরে এখনো লেগেই রয়েছে। বৃষ্টির মতো চাবুকের বাড়ি পড়ে তার রেইনকোটের মতো চামড়ায় আর সে অবিরাম বলেই চলে, মিসক্রিয়েন্টদের ঠিকানা তার জানা আছে। শুধু তার শালার নয়, তার ঠিকানা জানার মধ্যে কোনো বাহাদুরি নাই (শালা তার কাছেই থাকে), সে ছদ্মবেশী কুলিদের আস্তানাও চেনে। তারাও তাকে চেনে এবং তার উপর তাদের আস্থাও কম নয়। তাদের সঙ্গে তার আঁতাতের অভিযোগ ও তাদের সঙ্গে তার আঁতাত রাখার উত্তেজনায় (দেশের জন্য অবদান রাখার উত্তেজনায়) নুরুল হুদার ঝুলন্ত শরীর এতটাই কাঁপে যে চাবুকের বাড়ির দিকে তার আর মনোযোগ দেওয়া হয়ে ওঠে না (সাহস, উষ্ণতা ও দেশপ্রেমবোধের উজ্জীবিত হওয়ায়)।

জগৎ-বিখ্যাত ফরাসি ভাস্কর রোদ্যাঁ, যিনি নিতান্ত জড় প্রস্তরের দেহ থেকে অসংখ্য জীবিতপ্রায় দেব-দানব কেটে বার করেছেন (সুনিপুণ ভাস্কর্য শিল্প) তিনিও, শুনতে পাই, যখন-তখন হাতে কাদা নিয়ে, আঙুলের টিপে মাটির পুতুল ত’য়ের করে থাকেন (খেলাচ্ছলে শিল্পচর্চা)। এই পুতুল গড়া হচ্ছে তাঁর খেলা (শিল্পচর্চার পন্থা সম্পর্কে ইঙ্গিত)। শুধু রোদ্যাঁ কেন, পৃথিবীর শিল্পীমাত্রেই এই শিল্পের খেলা খেলে থাকেন (শিল্পীর স্বভাবজাত বৈশিষ্ট্য)। যিনি গড়তে জানেন, তিনি শিবও গড়তে পারেন বাঁদরও গড়তে পারেন (বড় মাপের শিল্পীদের দক্ষতা)। আমাদের সঙ্গে বড়ো বড়ো শিল্পীদের তফাত এইটুকু যে, তাঁদের হাতে এক করতে আর হয় না (তারা একবারেই সফল হয়, আমরা হই না)। সম্ভবত এই কারণে কলারাজ্যের (শিল্পরাজ্যে) মহাপুরুষদের যা-খুশি-তাই করবার যে অধিকার আছে, ইতর শিল্পীদের সে অধিকার নেই (বড় শিল্পীদের সমালোচনা হয় না কিন্তু আমাদের সমালোচিত হতে হয়)। স্বর্গ হতে দেবতারা মধ্যে মধ্যে ভূতলে অবতীর্ণ হওয়াতে কেউ আপত্তি করেন না (দেবতাদের অবস্থানগত পতন সমালোচিত হয় না), কিন্তু মর্ত্যবাসীদের (মানুষের জন্য) পক্ষে রসাতলে গমন করাটা বিশেষ নিন্দনীয় (মানুষের সামান্য পতন বিশাল নিন্দনীয়)। অথচ এ কথা অস্বীকার করবার জো (উপায়) নেই যে, যখন এ জগতে দশটা দিক আছে তখন সেই-সব দিকেই গতায়াত (যাতায়াত) করবার প্রবৃত্তিটি মানুষের পক্ষে স্বাভাবিক (খেলাচ্ছলে শিল্পচর্চা করার অধিকার)। মন উঁচুতেও উঠতে চায়, নিচুতেও নামতে চায় (কর্মের মাধ্যমে অন্যকে আকৃষ্ট বা খ্যাতি পাওয়ার ইচ্ছা)। বরং সত্য কথা বলতে গেলে সাধারণ লোকের মন স্বভাবতই যেখানে আছে তারই চার পাশে ঘুরে বেড়াতে চায় (খুব বেশি প্রত্যাশা থাকে না), উড়তেও চায় না ডুবতেও চায় না (খুব খ্যাতি বা একেবারে পতন চায় না)। কিন্তু সাধারণ লোকে সাধারণ লোককে কি ধর্ম, কি নীতি, কি কাব্য, সকল রাজ্যেই অহরহ ডানায় ভর দিয়ে থাকতেই (শূন্যলোকে ভাসা- সতর্ক থাকার পরামর্শ) পরামর্শ দেয়। একটু উঁচুতে না চড়লে আমরা দর্শক এবং শ্রোতৃ-মণ্ডলীর নয়ন-মন আকর্ষণ করতে পারি নে। বেদীতে না বসলে (শ্রেষ্ঠত্বের আসনে বসতে না পারলে) আমাদের উপদেশ কেউ মানে না, রঙ্গমঞ্চে না চড়লে আমাদের অভিনয় কেউ দেখে না, আর কাষ্ঠমঞ্চে না দাঁড়ালে আমাদের বক্তৃতা কেউ শোনে না। সুতরাং জনসাধারণের চোখের সম্মুখে থাকবার লোভে (খ্যাতি পাওয়ার জন্য) আমরাও অগত্যা চব্বিশ ঘণ্টা টঙে চড়ে থাকতে চাই, কিন্তু পারি নে (আকর্ষণ ধরে রাখতে পারি না)। অনেকের পক্ষে নিজের আয়ত্তের বহির্ভূত উচ্চস্থানে ওঠবার চেষ্টাটাই (সীমিত প্রতিভার কারণে) মহাপতনের কারণ হয়। এ-সব কথা বলবার অর্থ এই যে, কষ্টকর হলেও আমাদের পক্ষে অবশ্য মহাজনদের পথ অনুসরণ করাই কর্তব্য (পরিশ্রমের মাধ্যমে সাফল্য লাভ)। কিন্তু ডাইনে-বাঁয়ে ছোটোখাটো গলিঘুঁজিতে খেলাচ্ছলে প্রবেশ করবার যে অধিকার তাঁদের আছে (মনের আনন্দের সাহিত্য রচনা করার অধিকার), সে অধিকারে আমরা কেন বঞ্চিত হব? গান করতে গেলেই যে সুর তারায় চড়িয়ে রাখতে হবে (শ্রুতিমধুর গান), কবিতা লিখতে হলেই যে মনের শুধু গভীর ও প্রখর ভাব প্রকাশ করতে হবে (মানসম্মত কবিতা), এমন কোনো নিয়ম থাকা উচিত নয় (শিল্পচর্চা যথার্থভাবেই করতে হবে এমন নিয়ম থাকা উচিত না)। শিল্পরাজ্যে খেলা করবার প্রবৃত্তির ন্যায় অধিকারও বড়ো-ছোটো সকলেরই সমান আছে (সাহিত্য সৃষ্টি করার অধিকার সকলের আছে)। এমন-কি, এ কথা বললেও অত্যুক্তি হয় না যে, এ পৃথিবীতে একমাত্র খেলার ময়দানে ব্রাহ্মণশূদ্রের প্রভেদ নেই (খেলার মাঠে কোনো বৈষম্য থাকে না)। রাজার ছেলের সঙ্গে দরিদ্রের ছেলেরও খেলায় যোগ দেবার অধিকার আছে। আমরা যদি একবার সাহস করে কেবলমাত্র খেলা করবার জন্য (কোনো প্রত্যাশা না নিয়ে) সাহিত্যজগতে প্রবেশ করি, তা হলে নির্বিবাদে সে জগতের রাজা-রাজড়ার দলে মিশে যাব (অচিরেই মানসম্মত সাহিত্য রচনার যোগ্যতা)। কোনোরূপ উচ্চ আশা নিয়ে সে ক্ষেত্রে উপস্থিত হলেই নিম্নশ্রেণিতে পড়ে যেতে হবে (অধিক প্রত্যাশা পতনের কারণ হয়)।

২
লেখকেরাও অবশ্য দশের কাছে হাততালির প্রত্যাশা রাখেন, বাহবা না পেলে মনঃক্ষুণ্ণ হন। কেননা তাঁরাই হচ্ছেন যথার্থ সামাজিক জীব, বাদবাকি সকলে কেবলমাত্র পারিবারিক (লেখকরা সমাজ নিয়ে লেখালেখি করেন তাই সমাজের কাছে ভালো কিছুর প্রত্যাশা করেন)। বিশ্বমানবের মনের সঙ্গে নিত্যনূতন সম্বন্ধ পাতানোই (মানুষের মনকে জাগানো) হচ্ছে কবি-মনের নিত্যনৈমিত্তিক কর্ম (কবিদের দায়িত্ব)। এমনকি কবির আপন মনের গোপন কথাটিও গীতিকবিতাতে (ব্যক্তিগত অনুভূতি  ছন্দোবদ্ধ পদে প্রকাশ) রঙ্গভূমির (আমোদ-প্রমোদের স্থান) স্বগতোক্তি (আপন মনে নিজের কথা) স্বরূপেই উচ্চারিত হয় (কবির ব্যক্তিগত বিষয়ও সমাজের দর্পণস্বরূপ), যাতে করে সেই মর্মকথা হাজার লোকের কানের ভিতর দিয়ে মরমে প্রবেশ করতে পারে। কিন্তু উচ্চমঞ্চে আরোহণ করে উচ্চৈঃস্বরে উচ্চবাচ্য না করলে যে জনসাধারণের নয়ন-মন আকর্ষণ করা যায় না, এমন কোনো কথা নেই (প্রচারণা ছাড়াও জনমন আকৃষ্ট করা যায়)। সাহিত্যজগতে যাঁদের খেলা করবার প্রবৃত্তি (ইচ্ছা) আছে, সাহস আছে ও ক্ষমতা আছে (খেলাচ্ছলে সাহিত্য রচনা করার ধৈর্য), মানুষের নয়ন-মন আকর্ষণ করবার সুযোগ বিশেষ করে তাঁদের কপালেই ঘটে। মানুষে যে খেলা দেখতে ভালোবাসে তার পরিচয় তো আমরা এই জড় সমাজেও (পৃথিবীতে) নিত্যই পাই। টাউনহলে বক্তৃতা শুনতেই বা ক’জন যায় আর গড়ের মাঠে (কলকাতার বিস্তীর্ণ মাঠ) ফুটবল খেলা দেখতেই বা ক’জন যায়। অথচ এ কথাও সত্য যে, টাউনহলের বক্তৃতার উদ্দেশ্য অতি মহৎ, আর গড়ের মাঠের খেলোয়াড়দের ছুটোছুটি দৌড়াদৌড়ি আগাগোড়া অর্থশূন্য এবং উদ্দেশ্যবিহীন। আসল কথা এই যে, মানুষের দেহমনের সকল প্রকার ক্রিয়ার মধ্যে ক্রীড়া শ্রেষ্ঠ, কেননা তা উদ্দেশ্যহীন (আনন্দই খেলার একমাত্র উদ্দেশ্য- তাই কোনো প্রত্যাশা থাকে না)। মানুষে যখন খেলা করে, তখন সে এক আনন্দ ব্যতীত অপর কোনো ফলের আকাঙ্ক্ষা রাখে না। যে খেলার ভিতর আনন্দ নেই কিন্তু উপরি পাওনার আশা আছে, তার নাম খেলা নয়, জুয়াখেলা। এবং যেহেতু খেলার আনন্দ নিরর্থক অর্থাৎ অর্থগত (আর্থিক প্রাপ্তি বা প্রত্যাশা থাকে না) নয়, সে কারণ তা কারো নিজস্ব হতে পারে না। এ আনন্দে সকলেরই অধিকার সমান।

সুতরাং সাহিত্যে খেলা করবার অধিকার যে আমাদের আছে, শুধু তাই নয়, স্বার্থ (নিজের স্বার্থ রক্ষা) এবং পরার্থ (অপরের উপকার করা) এ দুয়ের যুগপৎ সাধনের (সমন্বয় সাধন) জন্য মনোজগতে খেলা করাই হচ্ছে আমাদের পক্ষে সর্বপ্রধান কর্তব্য। যে লেখক সাহিত্যক্ষেত্রে ফলের চাষ (প্রত্যাশা নিয়ে লেখা) করতে ব্রতী হন, যিনি কোনোরূপ কার্য-উদ্ধারের অভিপ্রায়ে লেখনী ধারণ করেন, তিনি গীতের মর্মও বোঝেন না, গীতার ধর্মও বোঝেন না (পরিস্থিতি অনুসারে চলতে পারেন না)। কেননা খেলা হচ্ছে জীবজগতে একমাত্র নিষ্কাম কর্ম, অতএব মোক্ষলাভের (আনন্দ/ আত্মার মুক্তি লাভ) একমাত্র উপায়। স্বয়ং ভগবান বলেছেন, যদিচ তাঁর কোনোই অভাব নেই তবুও তিনি এই বিশ্ব সৃজন করেছেন, অর্থাৎ সৃষ্টি তাঁর লীলামাত্র। কবির সৃষ্টিও এই বিশ্বসৃষ্টির অনুরূপ, সে সৃজনের মূলে কোনো অভাব দূর করবার অভিপ্রায় নেই—সে সৃষ্টির মূল অন্তরাত্মার স্ফূর্তি এবং তার ফল আনন্দ। এক কথায় সাহিত্যসৃষ্টি জীবাত্মার (মানুষের) লীলামাত্র, এবং সে লীলা বিশ্বলীলার (বিশ্বসৃষ্টির মতো সাহিত্য সৃষ্টিও কেবল আনন্দের জন্য) অন্তর্ভূত; কেননা জীবাত্মা পরমাত্মার অঙ্গ এবং অংশ (মানুষ স্রষ্টার সৃষ্টি ও তার কর্ম অনুসরণ করে)।

৩
সাহিত্যের উদ্দেশ্য সকলকে আনন্দ দেওয়া, কারো মনোরঞ্জন করা নয়। এ দুয়ের ভিতর যে আকাশ-পাতাল প্রভেদ (বিস্তর ব্যবধান) আছে, সেইটি ভুলে গেলেই লেখকেরা নিজে খেলা না করে পরের জন্যে খেলনা তৈরি করতে বসেন (নিজের আনন্দ দূরে সরিয়ে দিয়ে অপরের থেকে কিছু প্রত্যাশায় লিখা)।

সমাজের মনোরঞ্জন করতে গেলে সাহিত্য যে স্বধর্মচ্যুত (উদ্দেশ্য হারিয়ে ফেলে) হয়ে পড়ে, তার প্রমাণ বাংলাদেশে আজ দুর্লভ নয়। কাব্যের ঝুমঝুমি, বিজ্ঞানের চুষিকাঠি, দর্শনের বেলুন, রাজনীতির রাঙা লাঠি, ইতিহাসের ন্যাকড়ার পুতুল, নীতির টিনের ভেঁপু এবং ধর্মের জয়ঢাক- এই-সব জিনিসে সাহিত্যের বাজার ছেয়ে গেছে (বিভিন্ন উদ্দেশ্যে সাহিত্য রচিত হচ্ছে)। সাহিত্যরাজ্যে খেলনা পেয়ে পাঠকের মনতুষ্টি হতে পারে, কিন্তু তা গড়ে লেখকের মনতুষ্টি হতে পারে না। কারণ পাঠকসমাজ যে-খেলনা আজ আদর করে, কাল সেটিকে ভেঙে ফেলে (পাঠকরা সর্বদা সাহিত্যের যথাযথ মূল্যায়ন করতে পারে না)—সে প্রাচ্যই হোক আর পাশ্চাত্যই হোক, কাশীরই হোক আর জার্মানিরই হোক, দুদিন ধরে তা কারো মনোরঞ্জন করতে পারে না। আমি জানি যে, পাঠকসমাজকে আনন্দ দিতে গেলে তাঁরা প্রায়শই বেদনাবোধ করে থাকেন (প্রত্যাশা পূরণ না হওয়ায়)। কিন্তু এতে ভয় পাবার কিছুই নেই; কেননা কাব্যজগতে যার নাম আনন্দ, তারই নাম বেদনা। (প্রত্যাশা থাকলেই কষ্ট থাকবে)

অপরপক্ষে এ যুগে পাঠক হচ্ছে জনসাধারণ, সুতরাং তাঁদের মনোরঞ্জন করতে হলে আমাদের অতি সস্তা খেলনা (মানসম্মতহীন সাহিত্য) গড়তে হবে, নইলে তা বাজারে কাটবে না (বাজারে চলবে না)। এবং সস্তা করার অর্থ খেলো করা। বৈশ্য (যারা সবকিছুতে ব্যবসা বা স্বার্থ দেখে) লেখকের পক্ষেই শূদ্র পাঠকের মনোরঞ্জন করা সংগত (নিম্নশ্রেণির লোকের মনোরঞ্জনের জন্য মানহীন সাহিত্য প্রয়োজন)। অতএব সাহিত্যে আর যাই কর-না-কেন, পাঠকসমাজের মনোরঞ্জন করবার চেষ্টা করে না।

৪
তবে কি সাহিত্যের উদ্দেশ্য লোককে শিক্ষা দেওয়া?—অবশ্য নয়। কেননা কবির মতিগতি শিক্ষকের মতিগতির সম্পূর্ণ বিপরীত। স্কুল না বন্ধ হলে যে খেলার সময় আসে না, এ তো সকলেরই জানা কথা (স্কুল আনন্দের স্থান না, বাধ্য হয়ে পড়ার স্থান)। কিন্তু সাহিত্যরচনা যে আত্মার লীলা (মনের আনন্দের সাথে শিক্ষার কোনো সম্পর্ক নেই), এ কথা শিক্ষকেরা স্বীকার করতে প্রস্তুত নন। সুতরাং শিক্ষা ও সাহিত্যের ধর্ম কর্ম যে এক নয়, এ সত্যটি একটু স্পষ্ট করে (প্রমাণ দিয়ে দেখানো) দেখিয়ে দেওয়া আবশ্যক। প্রথমত শিক্ষা হচ্ছে সেই বস্তু যা লোকে নিতান্ত অনিচ্ছাসত্ত্বেও গলাধঃকরণ করতে বাধ্য হয়, অপরপক্ষে কাব্যরস লোকে শুধু স্বেচ্ছায় নয় সানন্দে পান করে (কাব্য মানুষ আনন্দের জন্য পড়ে); কেননা শাস্ত্রমতে সে রস অমৃত (আত্মার খোরাক জোগায়)। দ্বিতীয়ত শিক্ষার উদ্দেশ্য হচ্ছে মানুষের মনকে বিশ্বের খবর জানানো, সাহিত্যের উদ্দেশ্য মানুষের মনকে জাগানো; কাব্য যে সংবাদপত্র নয়, এ কথা সকলেই জানেন। তৃতীয়ত অপরের মনের অভাব পূর্ণ করবার উদ্দেশ্যেই শিক্ষকের হস্তে শিক্ষা জন্মলাভ করেছে, কিন্তু কবির নিজের মনের পরিপূর্ণতা হতেই সাহিত্যের উৎপত্তি। সাহিত্যের উদ্দেশ্য যে আনন্দদান করা, শিক্ষাদান করা নয়, একটি উদাহরণের সাহায্যে তার অকাট্য প্রমাণ দেওয়া যেতে পারে।

বাল্মীকি (রামায়ণ প্রণেতা) আদিতে মুনিঋষিদের জন্য রামায়ণ রচনা করেছিলেন, জনগণের জন্য নয়। এ কথা বলা বাহুল্য যে, বড় বড় মুনিঋষিদের কিঞ্চিৎ শিক্ষা দেওয়া তাঁর উদ্দেশ্য ছিল না। কিন্তু রামায়ণ শ্রবণ করে মহর্ষিরাও (মহা মনীষী) যে কতদূর আনন্দে আত্মহারা হয়েছিলেন তার প্রমাণ তাঁরা কুশীলবকে (রামচন্দ্রের দুই ছেলে কুশ ও লব- অভিনেতা) তাঁদের যথাসর্বস্ব, এমন-কি, কৌপীন পর্যন্ত পেলা (উপহার) দিয়েছিলেন (রামায়ণ শুনে আনন্দে আত্মহারা হয়ে পোশাক ‍উপহার দেয়)। রামায়ণ কাব্য হিসাবে যে অমর এবং জনসাধারণ আজও যে তার শ্রবণে-পঠনে আনন্দ উপভোগ করে তার একমাত্র কারণ, আনন্দের ধর্মই এই যে তা সংক্রামক (আনন্দ সবার মধ্যে ছড়িয়ে দিতে হয়)। অপরপক্ষে লাখে একজনও যে যোগবশিষ্ঠ রামায়ণের (বশিষ্ঠ মুনির উপদেশ সংবলিত রামায়ণ) ছায়া মাড়ান না তার কারণ, সে বস্তু লোককে শিক্ষা দেবার উদ্দেশ্যে রচিত হয়েছিল, আনন্দ দেবার জন্যে নয়। আসল কথা এই যে, সাহিত্য কস্মিনকালেও স্কুলমাস্টারির ভার নেয় নি। এতে দুঃখ করবার কোনো কারণ নেই। দুঃখের বিষয় এই যে, স্কুল মাস্টারেরা একালে সাহিত্যের ভার নিয়েছেন।

কাব্যরস নামক অমৃতে যে আমাদের অরুচি জন্মেছে, তার জন্য দায়ী এ যুগের স্কুল এবং তার মাস্টার। কাব্য পড়বার ও বোঝবার জিনিস, কিন্তু স্কুলমাস্টারের কাজ হচ্ছে বই পড়ানো ও বোঝানো। লেখক এবং পাঠকের মধ্যে এখন স্কুলমাস্টার দণ্ডায়মান (মধ্যস্থতাকারী)। এই মধ্যস্থদের কৃপায় আমাদের সঙ্গে কবির মনের মিলন দূরে যাক (কবিতা উপলব্ধি করা যায় না), চার চক্ষুর মিলনও ঘটে না। স্কুলঘরে আমরা কাব্যের রূপ দেখতে পাই নে, শুধু তার গুণ শুনি। টীকা-ভাষ্যের প্রসাদে আমরা কাব্য সম্বন্ধে সকল নিগূঢ় তত্ত্ব জানি, কিন্তু সে যে কি বস্তু তা চিনি নে (কাব্যের বর্ণনা শুনি কিন্তু কাব্যের আনন্দ অনুভব করতে পারি না)। আমাদের শিক্ষকদের প্রসাদে (বৈজ্ঞানিক ব্যাখ্যা) আমাদের এ জ্ঞান লাভ হয়েছে যে, পাথুরে-কয়লা হীরার সবর্ণ না হলেও সগোত্র; (দেখতে ভিন্ন হলেও মূল সত্তা এক হতে পারে) অপরপক্ষে হীরক ও কাচ যমজ হলেও সহোদর নয় (দেখতে অভিন্ন হলেও মানের দিক দিয়ে বিস্তর ব্যবধান থাকতে পারে)। এর একের জন্ম পৃথিবীর গর্ভে (হীরা), অপরটির মানুষের হাতে (কাচ); এবং এ উভয়ের ভিতর এক দা-কুমড়ার সম্বন্ধ ব্যতীত অপর কোনো সম্বন্ধ নেই (হীরা দিয়ে কাচ কাটা হয়- অথচ দেখতে অভিন্ন)। অথচ এত জ্ঞান সত্ত্বেও আমরা সাহিত্যে কাচকে হীরা এবং হীরাকে কাচ বলে নিত্য ভুল করি (যথাযথ মূল্যায়ন না করা), এবং হীরা ও কয়লাকে একশ্রেণীভুক্ত করতে তিলমাত্রও দ্বিধা করি নে (সব সাহিত্যকে একই মানের মনে করা), কেননা ওরূপ করা যে সংগত তার বৈজ্ঞানিক প্রমাণ আমাদের মুখস্থ আছে। সাহিত্য শিক্ষার ভার নেয় না, কেননা মনোজগতে শিক্ষকের কাজ হচ্ছে কবির কাজের ঠিক উলটো। কারণ কবির কাজ হচ্ছে কাব্য সৃষ্টি করা, আর শিক্ষকের কাজ হচ্ছে প্রথমে তা বধ করা তার পরে তার শবচ্ছেদ করা (নানাবিধ ব্যাখ্যা-তত্ত্ব বের করা) এবং ঐ উপায়ে তার তত্ত্ব আবিষ্কার করা ও প্রচার করা। এই-সব কারণে নির্ভয়ে বলা যেতে পারে যে, কারো মনোরঞ্জন করাও সাহিত্যের কাজ নয়, কাউকে শিক্ষা দেওয়াও নয় (এতে সাহিত্যের আনন্দ বিনষ্ট হয়)। সাহিত্য ছেলের হাতের খেলনাও নয়, গুরুর হাতের বেতও নয় (একবারে সহজ বা খুব কঠিন না)। বিচারের সাহায্যে এই মাত্রই প্রমাণ করা যায়। তবে বস্তু (সাহিত্য) যে কি, তার জ্ঞান অনুভূতিসাপেক্ষ, তর্কসাপেক্ষ নয় (সাহিত্য অনুভব করা যায়, প্রমাণ করা যায় না)। সাহিত্যে মানবাত্মা খেলা করে এবং সেই খেলার আনন্দ উপভোগ করে। এ কথার অর্থ যদি স্পষ্ট না হয় তা হলে কোনো সুদীর্ঘ ব্যাখ্যার দ্বারা তা স্পষ্টতর করা আমার অসাধ্য।

এই-সব কথা শুনে আমার জনৈক শিক্ষাভক্ত বন্ধু এই সিদ্ধান্তে উপনীত হয়েছেন যে, সাহিত্য খেলাচ্ছলে শিক্ষা দেয়।

লালসালু উপন্যাসের প্রতিটি চরিত্র বিশ্লেষণ

মজিদ : কেন্দ্রীয় চরিত্র। সকল ঘটনার নিয়ন্ত্রক। কুসংস্কার, শঠতা ও অন্ধবিশ্বাসের প্রতীক। মহব্বতনগর গ্রামে নাটকীয়ভাবে প্রবেশ করে এবং সেখানে সে নিজের ক্ষমতা বিস্তার করতে শুরু করে। ক্রন্দনরতা মেয়ে (হাসুনির মা) তার ভালো লাগে।
রহিমা : মজিদের প্রথম স্ত্রী। শক্তিমত্তা তার বাইরের রূপ কিন্তু প্রকৃতপক্ষে ঠান্ডা ও ভীতু প্রকৃতির মেয়ে। স্বল্পভাষী ও মজিদের একান্ত অনুগত। গ্রামের লোকেরা তারই অন্যতম সংস্করণ। রহিমা এই গ্রামের মেয়ে। ছোটবেলায় নাকে নোলক পরে হলদে শাড়ি পেঁচিয়ে পরে ছুটোছুটি করত যা সবার মনে আছে। রহিমা বারো বছর মজিদের সাথে সংসার করেছে। মজিদের প্রতি রহিমার আনুগত্য ধ্রুবতারার মতো অনড়, বিশ্বাস পর্বতের মতো অটল। সে মজিদের ঘরের খুঁটি।
জমিলা : মজিদের দ্বিতীয় স্ত্রী। চঞ্চল প্রকৃতির মেয়ে। প্রথম দেখায় মজিদকে দুলার বাপ মনে করে। মজিদের আচরণ তার কাছে ভালো লাগে না। জিকিরের সময় সে বাড়ির বাইরে চলে আসায় সবাই তার দিকে চেয়ে থাকে। মজিদ তাকে ‘ঝি’ সম্বোধন করে তাড়িয়ে দেয়। মজিদের ধারণা তাকে জ্বীনে আছর করেছে। তাই তাকে মাজারের সাথে আটকে রাখে।
খালেক ব্যাপারী : প্রতিনিধিত্বশীল চরিত্র। তাঁর কাঁধেই গ্রামের সব দায়িত্ব। মজিদের অন্যতম সহায়ক। মসজিদ নির্মাণের বারো আনা খরচ সে দেয়।
আমিনা : খালেক ব্যাপারীর রূপবতী প্রথম স্ত্রী। রহিমার মতো সেও নিঃসন্তান। তাই আউয়ালপুরের পীরের পানি পড়া খেতে চায়। কিন্তু মজিদ তা জানতে পারে এবং নিজের স্বার্থ চরিতার্থ করতে খালেক ব্যাপারীকে স্ত্রী তালাক দিতে বাধ্য করে। যৌবনে থোতামুখের তালগাছ দেখে বুঝত যে, সে জামাইয়ের বাড়ি এসে পৌঁছেছে।
তানু : খালেক ব্যাপারীর দ্বিতীয় স্ত্রী। প্রতি বছর আস্ত আস্ত সন্তান জন্ম দেয় বলে আমিনা বিবির সহ্য হয় না।
পীর সাহেব : আউয়ালপুরের পীর। ময়মনসিংহের কোনো এক অঞ্চলে বংশানুক্রমে বাস করে। এক সময় তার চোখে আগুন ছিল। সে গাছে উঠে বসে থাকে। তার মুরিদদের ধারণা তিনি সূর্যকে নিয়ন্ত্রণ করতে পারেন। মৃত মানুষকে জীবিত করতে পারেন। মহব্বত নগরের লোকেরা আওয়ালপুরে আক্রমণ করলেও তিনি প্রতি আক্রমণ করেন না। এর প্রধান কারণ তার জইফ বা দুর্বল অবস্থা। এই বয়সে দাঙ্গা-হাঙ্গামা ভালো লাগে না। তিনি উদারতা দেখিয়ে বলেন, কুত্তা তোমাকে কামড় দিলে তুমিও কি তাকে কামড়াবে?
ধলা মিয়া : তানু বিবির বড় ভাই। বোকা কিছিমের মানুষ। বোন-জামাইয়ের ভাত এতই মিঠা লাগে যে, নড়ার নাম করে না বছরান্তেও। ব্যাপারীর সামনে কথা বলতে অস্বস্তি করে। পালাই পালাই ভাব থাকে। পরগাছা মুরুব্বি বলে পরিচিত। খালেক ব্যাপারী তাকে আওয়ালপুরের পীরের কাছে পানি পড়া আনার জন্য পাঠায় কিন্তু সে মজিদের কাছে সব বলে দেয়। মজিদকে ঘুস দেওয়ার প্রস্তাব করে। বুড়োর মতন সেও ঢেঙ্গা-লম্বা মানুষ।
মোদাব্বের মিয়া : আক্কাসের বাবা। রাগ উঠলে তোতলায়।
আক্কাস : গ্রামের শিক্ষিত যুবক। অনেক দিন বিদেশে ছিল। করিমগঞ্জের স্কুলে নিজে ইংরেজি পড়েছে। পাট বা তামাকের আড়তে চাকরি করে টাকা পয়সা জমিয়ে দেশে ফিরেছে। ছোটবেলা থেকে সে উচক্কা ধরনের ছেলে। করিমগঞ্জে গিয়ে বড় পোস্টের কাউকে ধরে সরকারের কাছে সাহায্যের জন্য পাঠায়। গ্রামে স্কুল বানাতে চায়। কিন্তু মজিদ তা হতে দেয় না। আক্কাসের বাবা মোদাব্বের মিয়াও স্কুল প্রতিষ্ঠার বিরোধিতা করে।
দুদু মিঞা : সাত ছেলের বাপ। মজিদ তাকে কলেমা জানার কথা জিজ্ঞেস করলে সে ঘাড় ঘুরে আধাপাকা মাথা চুলকায়। মুখে তার লজ্জার হাসি-চোখ পিটপিট করে। মাথায় যেনো ছিট। মজিদ তাকে ব্যাপারীর মক্তবে কলেমা শিখার আদেশ দেয়। কারণে-অকারণে খেতে না পাওয়ার কথা বলা তার অভ্যাস।
দুদু মিঞার ছেলে : বাপের অবস্থা দেখে খিলখিল করে হাঁসে। বাপের মাথা নত করার ভঙ্গিটা তার কাছে গাধার ভঙ্গির মতো মনে হয়।
নানি-বুড়ি : আগামি বছর যখন তানু বিবির কোলে নতুন এক আগন্তুক ট্যাঁ ট্যাঁ করে উঠবে, তখন তার ডাক পড়বে।
হাসুনির মা : তাহের-কাদের-রতনের বোন। রহিমাকে ধান ভানার কাজে সহায়তা করে। তার স্বামী মারা গেছে। ধানক্ষেতের তাজা রঙে তার মনে পুলক জাগে। আবার বিয়ে করার ইচ্ছা হয়। ঝড় এলে তার হই হই করা অভ্যাস। রহিমা তার মোটাতাজা ছেলে হাসুনিকে পুষ্যি রাখতে চায়।
তাহের-কাদের : হাসুনির মার ভাই। তাদের বুড়ো বাবা বুড়িমাকে চ্যালা কাঠ দিয়ে মারতে এলে তারা তা প্রতিরোধ করে। দাঁড় নেয়ে তারা মাছ শিকার করে। এদের বুদ্ধি-বিবেচনা থাকলেও এরা স্বার্থের ঘোরে ঢাকা।
রতন : তাহের-কাদেরর কনিষ্ঠ ভাই।
বুড়ো : তাহের-কাদের-রতন-হাসুনির মা তার সন্তান। ঢেঙ্গা দীর্ঘ মানুষ। মজিদের কাছে হাসুনির মা বুড়ো সম্পর্কে বিচার দেওয়ায় হাসুনির মাকে মনের আশ মিটিয়ে প্রহার করে। এর জন্য তাকে বিচারের সম্মুখীন হতে হয়। মজিদ এ বিচারে রায় দেয়। একদিন সন্ধ্যায় কোথায় যেনো চলে যায়, আর খুঁজে পাওয়া যায়নি। এককালে বুদ্ধিমান লোক ছিল। বৈমাত্রেয় ভাইয়ের সাথে সম্পত্তি নিয়ে বিরোধ ঘটিয়ে আজ সে নিঃসঙ্গ।
বুড়ি : তাহের কাদেরের মা। যৌবনকালে হাসি-খুশি-ছটফটে ও উড়নি মেয়ে ছিল। একসময় চড়ুই পাখির মতো নাচত। খইয়ের মতো কথা ফুটত তার মুখ দিয়ে। একসময় তার চরিত্র নিয়ে গ্রামবাসীরা অপবাদ দেয় যা বুড়ো বিশ্বাস করে। এখন এই বৃদ্ধ বয়সে তার দেহ-মন পড়ে গেছে। বুড়ো হাসুনির মাকে প্রহার করতে গেলে সে উঠোনে পা ছড়িয়ে দিয়ে বিলাপ শুরু করে। বুড়ো নিরুদ্দেশ হলে বুড়ি নিশ্চুপ হয়ে যায়। খেলোয়াড় চলে গেছে তাই সে খেলবে কার সাথে?
সলেমানের বাপ : মজিদের সভায় অশীতিপর বৃদ্ধ সলেমনের বাপও ছিল। সে ছিল হাঁপানি রোগী। মজিদের মাজার আবিষ্কারের সময় সে দম খিঁচে লজ্জায় চোখ নত করে রাখে।
কানুর বাপ : মজিদকে এক ছিলিম তামাক এনে দেয়।
মতলব খাঁ : ইউনিয়ন বোর্ডের প্রেসিডেন্ট। পীর সাহেবের পুরানো মুরিদ।
জনৈক লোক : যাকে মজিদ ধানের কথা জিজ্ঞেস করে। সে ঘাড় চুলকিয়ে নিতি-বিতি করে বলে, যা-ই হয়েছে তা-ই যথেষ্ট। ছেলেপুলে নিয়ে দুই বেলা খেতে পারার কথা বলে সে। তার কোনো একটা কথায় মজিদ বৃক্ষের মতো দাঁড়িয়ে থাকে।
খোনকার মোল্লা : সমাজে জানাযা পড়ায়। তার বাড়ির সামনে মূর্তি নজরে পড়ে।
সরকারি কর্মচারী : তিনি বাইরে বিদেশি কিন্তু ভেতরে মুসলমান। তিনি গ্রামে পরদাদার আমলের কিছু কবরের কথা বলেন।
রেহান আলি : গ্রামের মাতব্বর। মজিদ যখন লোকদের গালাগাল করে, তখন সেও ছিল।
জোয়ান মদ্দ কালু মতি : মজিদের গালাগাল শুনে লজ্জায় মাথা হেট করে রাখে।
ছমিরুদ্দিন : কোঁচবিদ্ধ হয়ে মারা যায়। তার রক্তাক্ত দেহ দেখে আবেদ-জাবেদের মনে দানবীয় উল্লাস হওয়ার কথা কিন্তু তারা পাথর হয়ে যায়।
কালু মিঞা : আউয়ালপুরের সংঘর্ষে লিপ্ত হলে তার মাথা দু’ফাক হয়ে যায়। ফলে সে বেদনায় গোঙায়।
ছুনুর বাপ : মরণরোগে যন্ত্রণা পাচ্ছে। রহিমা তার জন্য দোয়া করে।
খেতানির মা : পক্ষাঘাতে কষ্ট পাচ্ছে। রহিমা তার জন্য দোয়া করে।
খ্যাংটা বুড়ি : মাথায় শনের মতো চুল। সাতকূলে তার কেউ নেই। তার ছেলে যাদুর মৃত্যুর কারণে মাজারে এসে বিলোপ করে ও খোদার বিরুদ্ধে নালিশ করে। মজিদ তাকে বোঝাতে ব্যর্থ হয়। সে পাঁচ পয়সা মজিদের দিকে ছুড়ে মারে ও সন্তানকে ফেরত চায়।
মোদচ্ছের পীর : নাম না জানা পীর। যাকে ঘিরেই মজিদের যত ভণ্ডামি, অভিনয় ও আধিপত্য বিস্তার।
কম্পাউন্ডার : করিমগঞ্জের হাসপাতালে মজিদ তাকে ডাক্তার মনে করে। ভাং-গাঁজা খাওয়া রস-কষশূন্য হাড়গিলে চেহারা তার। দুটো পয়সার লোভে তার চোখ চকচক করে থাকে।

লালসালু উপন্যাসের সূত্রপাত 

(নোয়াখালী অঞ্চলের আর্থ-সামাজিক অবস্থা) শস্যহীন জনবহুল এ অঞ্চলের বাসিন্দাদের বেরিয়ে পড়বার (জীবিকার জন্য) ব্যাকুলতা ধোঁয়াটে আকাশটাকে পর্যন্ত যেন সদা সন্ত্রস্ত করে রাখে (অভাব অনটন এতই অনিশ্চিত যে যেন ধোঁয়াটে আকাশ হার মানে)। ঘরে কিছু নেই। ভাগাভাগি, লুটালুটি আর স্থান বিশেষে খুনাখুনি করে সর্বপ্রচেষ্টার শেষ। দৃষ্টি (খাবারের জন্য) বাইরের পানে, মস্ত নদীটির ওপারে, জেলার বাইরে— প্রদেশেরও! হয়তো-বা আরও দূরে। যারা নলি বানিয়ে (ভেলা চালানোর লম্বা বাঁশের কঞ্চি) ভেসে পড়ে তাদের দৃষ্টি দিগন্তে আটকায় না। (দেশের বাইরে জীবিকার উপায়) জ্বালাময়ী আশা; ঘরে হা-শূন্য মুখথোবড়ানো নিরাশা বলে তাতে মাত্রাতিরিক্ত প্রখরতা। দূরে তাকিয়ে যাদের চোখে আশা জ্বলে তাদের আর তর সয়না, দিনমানক্ষণের সবুর ফাঁসির শামিল। তাই তারা ছোটে, ছোটে।
অন্য অঞ্চল থেকে গভীর রাতে যখন ঝিমধরা রেলগাড়ি সর্পিল গতিতে এসে পৌঁছয় এ-দেশে তখন হঠাৎ আগাগোড়া তার দীর্ঘ দেহে ঝাঁকুনি লাগে, ঝনঝন করে ওঠে লোহালক্কড়। রাতের অন্ধকারে লন্ঠন জ্বালানো ঘুমন্ত কত স্টেশন পেরিয়ে এসে এইখানে নিদ্রাচ্ছন্ন ট্রেনটির সমস্ত চেতনা জেগে সজারুকাঁটা হয়ে ওঠে। তাছাড়া এদের বহির্মুখ উন্মত্ততা আগুনের হল্কার মতো পুড়িয়ে দেয় দেহ। রেলগাড়ির খুপরিগুলো থেকে আচমকা-জেগে-ওঠা যাত্রীরা কেউ-বা ভয় পেয়ে কেউ-বা অপরিসীম কৌতূহলে মুখ বাড়ায়, দেখে আবছা-অন্ধকারে ছুটোছুটি করতে থাকা লোকদের। (হুড়মুড় করে স্টেশন থেকে যাত্রীরা উঠে) কোথায় যাবে তারা? কিসের এত উন্মত্ততা, কিসের এত অধীরতা? এ লাইনে যারা নতুন তারা চেয়ে-চেয়ে দেখে। (মানুষের ছুটাছুটি) কিন্তু এরা ছোটে। ছোটে আর চিৎকার করে। গাড়ির এ মাথা থেকে ও মাথা। ইতোমধ্যে আত্মীয়স্বজন, জানপছানের (পরিচিত) লোক হারিয়ে যায়। (ভীড়ের কারণে) কারো জামা ছেঁড়ে, কারো টুপিটা অন্যের পায়ের তলায় দুমড়ে যায়। কারো বা আসল জিনিসটা, অর্থাৎ বদনাটা—যা না হলে বিদেশে এক পা চলে না—কী করে আলগোছে (গোপনে) হারিয়ে যায়। হারাবে না কেন? দেহটা গেলেই হয়—এমন একটা মনোভাব নিয়ে ছুটোছুটি করলে হারাবেই তো। (যাওয়াটাই মুখ্য, উপকরণ নয়) অনেকের অনেক সময় গলায় ঝোলানো তাবিজের থোকাটা ছাড়া দেহে বিন্দুমাত্র বস্ত্র থাকে না শেষ পর্যন্ত। তারা অবশ্য বয়সে ছোকরা। বয়স হলে এরা আর কিছু না হোক শক্ত করে গিরেটা দিতে শেখে।

অজগরের মতো দীর্ঘ রেলগাড়ির কিন্তু ধৈর্যের সীমা নেই। তার দেহ ঝনঝন করে লোহালক্কড়ের ঝঙ্কারে, উত্তাপলাগা দেহ কেঁপে-কেঁপে ওঠে কিন্তু হঠাৎ উঠে ছুটে পালায় না। দেহচ্যুত হয়ে অদূরে অস্পষ্ট আলোয় ইঞ্জিনটা পানি খায়। পানি খায় ঠিক মানুষের মতোই। আর অপেক্ষা করে। ধৈর্যের কাঁটা নড়ে না। (ট্রেন না ছাড়ার দেরি সহ্য হয় না) কেনই বা নড়বে? নিশুতি রাতে (গভীর রাত) যে-দেশে এসে পৌঁছেছে সে-দেশে এখন অন্ধকারে ঢাকা থাকলেও সে জানে যে, তাতে শস্য নেই। বিরান মাঠ, সরভাঙ্গা পাড় (পাড়ভাঙ্গা পুকুর) আর বন্যাভাসানো ক্ষেত। নদীগহ্বরেও জমি কম নেই। (নদীর ভাঙনে বিলীন জমি)

সত্যি শস্য নেই। যা আছে তা যৎসামান্য। শস্যের চেয়ে টুপি বেশি, ধর্মের আগাছা বেশি। (শস্য সামান্য হলেও ধর্মভীরু লোকের অভাব নেই। এছাড়াও কুসংস্কারে পরিপূর্ণ.) ভোরবেলায় এত মক্তবে আর্তনাদ ওঠে যে, মনে হয় এটা খোদাতা’লার বিশেষ দেশ। ন্যাংটা ছেলেও আমসিপারা পড়ে, গলা ফাটিয়ে মৌলবির বয়স্ক গলাকে ডুবিয়ে সমস্বরে চেঁচিয়ে পড়ে। গোঁফ উঠতে না উঠতেই কোরান হেফ্‌জ করা সারা। সঙ্গে সঙ্গে মুখেও কেমন—একটা ভাব জাগে। হাফেজ তারা। বেহেশতে তাদের স্থান নির্দিষ্ট।

কিন্তু দেশটা কেমন মরার দেশ। (শস্য উৎপাদন না হওয়ায়) শস্যশূন্য। শস্য যা-বা হয় তা জনবহুলতার তুলনায় যৎসামান্য। সেই হচ্ছে মুশকিল। এবং তাই খোদার পথে ঘনিষ্ঠ হয়ে আসার চেতনায় যেমন একটা বিশিষ্ট ভাব ফুটে ওঠে, তেমনি না খেতে পেয়ে চোখে আবার কেমন-একটা ভাব জাগে (ক্ষুধার জ্বালায় পর্যদুস্ত)। জীর্ণদেহ নরম হয়ে ওঠে, আর স্বাভাবিক সরুগলা কেরাতের সময় মধু ছড়ালেও এদিকে দীনতায় আর অসহায়তায় ক্ষীণতর হয়ে ওঠে। তাতে দিনকে দিন ব্যথা-বেদনা আঁকিবুঁকি কাটে (ক্ষুধায়)। শীর্ণ চিবুকের (থুতনি) আশে-পাশে যে কটা ফিকে দাড়ি অসংযত দৌর্বল্যে ঝুলে থাকে তাতে মাহাত্ম্য ফোটাতে চায়, কিন্তু ক্ষুধার্ত চোখের তলে চামড়াটে চোয়ালের দীনতা ঘোচে না। কেউ কেউ আরো আশা নিয়ে আলিয়া মাদ্রাসায় পড়ে। বিদেশে গিয়ে পোকায় খাওয়া মস্ত মস্ত কেতাব খতম করে। কিন্তু কেতাবে যে বিদ্যে লেখা তা কোন এক বিগত যুগে চড়ায় পড়ে আটকে গেছে। (অতীতের শিক্ষাকে বর্তমান যুগোপযোগী না করা) চড়া কেটে সে-বিদ্যেকে এত যুগ অতিক্রম করিয়ে বর্তমান স্রোতের সঙ্গে মিশিয়ে দেবে এমন লোক আবার নেই। অতএব কেতাবগুলোর বিচিত্র অক্ষরগুলো দূরান্ত কোনো এক অতীতকালের অরণ্যে আর্তনাদ করে।

তবু আশা, কত আশা। খোদাতা’লার ওপর প্রগাঢ় ভরসা। দিন যায় অন্য এক রঙিন কল্পনায়। কিন্তু ক্ষুধার্ত চোখ বৈরীভাবাপন্ন ব্যক্তিসুখ-উদাসীন দুনিয়ার পানে চেয়ে-চেয়ে আরো ক্ষয়ে আসে। খোদার এলেমে বুক ভরে না তলায় পেট শূন্য বলে। মসজিদের বাঁধানো পুকুরপাড়ে চৌকোণ পাথরের খণ্ডটার ওপর বসে শীতল পানিতে অজু বানায়, টুপিটা খুলে তার গহ্বরে ফুঁ দিয়ে ঠান্ডা করে আবার পরে। কিন্তু শান্তি পায় না। (খাবারের কষ্টের কারণে মনে আধ্যাত্মিক শান্তি আসে না) মন থেকে-থেকে খাবি খায় (হিমশিম খায়), দিগন্তে ঝলকানো রোদের পানে চেয়ে চোখ পুড়ে যায়।

এরা তাই দেশ ত্যাগ করে। ত্যাগ করে সদলবলে বেরিয়ে ছড়িয়ে পড়ে। নলি বানিয়ে জাহাজের খালাসি হয়ে ভেসে যায়, কারখানার শ্রমিক হয়, বাসাবাড়ির চাকর, দফতরির এটকিনি (দপ্তরি), ছাপাখানার মেশিনম্যান, টেনারিতে চামড়ার লোক। কেউ মসজিদে ইমাম হয়, কেউ মোয়াজ্জিন। দেশময় কত সহস্র মসজিদ। কিন্তু শহরের মসজিদ, শহরতলির মসজিদ—এমন কি গ্রামে-গ্রামে মসজিদগুলো পর্যন্ত আগে থেকে দখল হয়ে আছে (ইমাম নির্দিষ্ট থাকে)। শেষে কেউ-কেউ দূরদূরান্তে চলে যায়। হয়তো বাহে-মুলুকে (উত্তরবঙ্গ), নয়তো মনিদের দেশে (সিলেট- মণিপুরীদের দেশ)। দূর-দূর গ্রামে, যে-গ্রামে পৌঁছতে হলে কত চড়া-পড়া শুষ্ক নদী পেরোতে হয়, মোষের গাড়িতে খড়ের গাদায় ঘুমোতে হয় কত রাত। গারো পাহাড়ে দুর্গম অঞ্চলে কে কবে বাঁশের মসজিদ করেছিল—সেখানেও।

(মজিদের জীবিকা সন্ধান) এক সরকারী কর্মচারী সেখানে হয়তো একদিন পায়ে বুট এঁটে শিকারে যায়। বাইরে বিদেশি পোশাক, মুখমণ্ডলও মসৃণ। কিন্তু আসলে ভেতরে মুসলমান। কেবল নতুন খোলসপরা নব্য শিক্ষিত মুসলমান। (পোশাকে ইংরেজ হলেও ভেতরে মুসলমান) সে (সরকারি কর্মচারী) এ-দুর্গম অঞ্চলে মিহি কণ্ঠের আজান শুনে চমকে ওঠে। সঙ্গে সঙ্গে তার শিকারের আশাও কিছু দমে যায়।
পরের মৌলভীর সঙ্গে সাক্ষাৎ হয়। আত্মীয়স্বজন ছেড়ে বনবাসে দিন কাটানোর ফলে লোকটার (মৌলভির) চোখেমুখে নিঃসঙ্গতার বন্য শূন্যতা। (প্রিয়জন থেকে দূরে থাকার কষ্ট)
–আপনার দৌলতখানা? (মৌলভি কর্মচারীকে প্রশ্ন করে)
শিকারি বলে।
–আপনার নাম?
নাম শুনে মৌলভীর চোখ উজ্জ্বল (মুসলমান বলে) হয়ে ওঠে। তাছাড়া মুহূর্তে খোদার দুনিয়া চোখের সামনে আলোকিত হয়ে ওঠে। (জীবিকার নতুন সন্ধান)
শিকারিও পাল্টা প্রশ্ন করে। বাড়ির কথা বলতে গিয়ে হঠাৎ মৌলভীর মনে স্মৃতি জাগে। কিন্তু সংযত হয়ে বলে, এধারের লোকদের মধ্যে খোদাতা’লার আলোর অভাব। লোকগুলো অশিক্ষিত, কাফের। তাই এদের মধ্যে আলো ছড়াতে এসেছে। বলে না যে, দেশে শস্য নেই, দেশে নিরন্তর টানাটানি, মরার খরা।
দূর জঙ্গলে বাঘ ডাকে। ক্বচিৎ কখনো হাতিও দাবড়ে-কুঁদে নেমে আসে। কিন্তু দিনে পাঁচ-পাঁচবার দীর্ঘ শালগাছ ছাড়িয়ে একটা ক্ষীণগলা জাগে—মৌলবীর গলা (আজানের স্বর)। বুনো ভারি হাওয়ায় তার হাল্কা ক-গাছি দাড়ি ওড়ে এবং গভীর রাতে হয়তো চোখের কোণটা চকচক করে ওঠে বাড়ির ভিটেটার জন্যে। (প্রিয়জনের কথা মনে পড়ে) কিন্তু সেটা শিকারির কল্পনা। আস্তানায় ফিরে এসে বন্দুদের নল সাফ করতে করতে শিকারি কল্পনা করে সে-কথা, তবে নতুন এক আলোর ঝলকে মৌলবীর চোখ যে দীপ্ত হয়ে ওঠে সে কথা জানে না; ভাবতেও পারে না হয়তো।

মজিদের নাটকীয় প্রবেশ
একদিন শ্রাবণের শেষাশেষি নিরাক পড়েছে (স্তব্ধ ও গুমোট আবহাওয়া)। হাওয়াশূন্য স্তব্ধতায় মাঠপ্ৰান্তর আর বিস্তৃত ধান ক্ষেত নিথর, কোথাও একটু কম্পন নেই (বাতাস নেই)। আকাশে মেঘ নেই। তামাটে নীলাভ রঙ দিগন্ত পর্যন্ত স্থির হয়ে আছে।

এমনি দিনে লোকেরা ধানক্ষেতে নৌকা নিয়ে বেরোয়। ডিঙ্গিতে দু-দুজন করে, সঙ্গে কেঁচ-জুতি (বর্শা ও অন্যান্য)। নিম্পন্দ ধান-ক্ষেতে প্ৰগাঢ় নিঃশব্দতা। কোথাও একটা কাক আর্তনাদ করে উঠলে মনে হয় আকাশটা বুঝি চটের মতো চিরে গেল। অতি সন্তৰ্পণে ধানের ফাঁকে ফাঁকে তারা নৌকা চালায়; ঢেউ হয় না, শব্দ হয় না। (মাছ ধরার জন্য) গলুই-এ মূর্তির মতো দাঁড়িয়ে থাকে। একজন–চোখে ধারালো দৃষ্টি। ধানের ফাকে ফাকে সাপের সর্পিল সূক্ষ্মগতিতে সে-দৃষ্টি একেবেঁকে চলে।

বিস্তৃত ধানক্ষেতের এক প্ৰান্তে তাহের-কাদেরও আছে। তাহের দাঁড়িয়ে সামনে–চোখে তার তেমনি শিকারীর সূচাগ্র একাগ্ৰতা। পেছনে তেমনি মূর্তির মতো বসে কাদের ভাইয়ের ইশারার অপেক্ষায় থাকে। দাঁড় বাইছে কিন্তু এমন কৌশলে যে, মনে হয় নীচে পানি নয়, তুলো।

হঠাৎ তাহের ঈষৎ কেঁপে উঠে মুহূর্তে শক্ত হয়ে যায়। সামনের পানে চেয়ে থেকেই পেছনে আঙ্গুল দিয়ে ইশারা করে। সামনে, বায়ে। একটু বাঁয়ে ক’টা শীষ নড়ছে–নিরাকপড়া বিস্তৃত ধানক্ষেতে কেমন স্পষ্ট দেখায় সে-নড়া। (মাছের নড়া) আরো বায়ে। সাবধান, আস্তে। তাহেরের আঙলি অদ্ভুত ক্ষিপ্ৰতায় এসব নির্দেশই দেয়।

ততক্ষণে সে পাশ থেকে আলগোছে কোঁচটা তুলে নিয়েছে। নিতে একটু শব্দ হয়নি। হয়নি তার প্রমাণ, ধানের শীষ এখনো ওখানে নড়ছে। (মাছ টের পয়নি) তারপর কয়েকটা নিঃশ্বাসরুদ্ধ-করা মুহূর্ত। দূরে যে-কটা নৌকা ধান-ক্ষেতের ফাঁকে ফাঁকে এমনি নিঃশব্দে ভাসছিল, সেগুলো থেমে যায়। লোকেরা স্থির দৃষ্টিতে তাকিয়ে থাকে ধনুকের মতো টান হয়ে ওঠা তাহেরের কালো দেহটির পানে। তারপর দেখে, হঠাৎ বিদ্যুৎ চমকের মতো সেই কালো দেহটির ঊর্ধ্বাংশ কেঁপে উঠল, তীরের মতো বেরিয়ে গেলো একটা কোঁচ। সা-ঝাক্‌।
একটু পরে একটা বৃহৎ রুই মুখ হাঁ করে ভেসে ওঠে।
আবার নৌকা চলে। ধীরে ধীরে, সন্তৰ্পণে।

এক সময় ঘুরতে ঘুরতে তাহেরদের নৌকা মতিগঞ্জের সড়কটার কাছে এসে পড়ে। কাদের পেছনে বসে তেমনি নিস্পলক দৃষ্টিতে চেয়ে আছে তাহেরের পানে তাঁর আঙ্গুলের ইশারার জন্যে। হঠাৎ এক সময়ে দেখে, তাহের সড়কের পানে চেয়ে কী দেখছে, চোখে বিস্ময়ের ভাব। সেও সেদিকে তাকায়। দেখে, মতিগঞ্জের সড়কের ওপরেই একটি অপরিচিত লোক আকাশের পানে হাত তুলে মোনাজাতের ভঙ্গিতে দাঁড়িয়ে আছে, শীর্ণ মুখে ক-গাছি দাড়ি, চোখ নির্মীলিত। মুহূর্তের পর মুহূর্ত কাটে, লোকটির চেতনা নেই। নিরাকপড়া আকাশ যেন তাকে পাথরের মূর্তিতে রূপান্তরিত করেছে।

কাদের আর তাহের অবাক হয়ে চেয়ে চেয়ে দেখে। মাছকে সতর্ক করে দেবার ভয়ে কথা হয় না, কিন্তু পাশেই একবার ধানের শীষ স্পষ্টভাবে নড়ে ওঠে, ঈষৎ আওয়াজও হয়–সেদিকে দৃষ্টি নেই।

এক সময়ে লোকটি মোনাজাত শেষ করে। কিছুক্ষণ কী ভেবে ঝট করে পাশে নামিয়ে রাখা পুটুলিটা তুলে নেয়। তারপর বড় বড় পা ফেলে উত্তর দিকে হাঁটতে থাকে। উত্তর দিকে খানিকটা এগিয়ে মহব্বতনগর গ্ৰাম। তাহের ও কাদেরের বাড়ি সেখানে।
অপরাহ্ণের দিকে মাছ নিয়ে দু-ভাই বাড়ি ফিরে দেখে খালেক ব্যাপারীর ঘরে কেমন একটা জটিল। সেখানে গ্রামের লোকেরা আছে, তাদের বাপও আছে। সকলের কেমন গম্ভীর ভাব, সবার মুখ চিন্তায় নত। ভেতরে উঁকি মেরে দেখে, একটু আলগা হয়ে বসে আছে সেই লোকটা–নৌকা থেকে মতিগঞ্জের সড়কের ওপর তখন তাকে মোনাজাত করতে দেখেছিল। রোগা লোক, বয়সের ধারে যেন চোয়াল দুটো উজ্জল। চোখ বুজে আছে। কোটরগত নিমীলিত সে চোখে একটুও কম্পন নেই।

(নাটকীয় প্রবেশ) এভাবেই মজিদের প্রবেশ হলো মহব্বতনগর গ্রামে। প্রবেশটি নাটকীয় হয়েছে সন্দেহ নেই, কিন্তু গ্রামের লোকেরা নাটকের পক্ষপাতী (নাটক না করলে গ্রামের মানুষ মর্যাদা দেয় না)। সরাসরি মতিগঞ্জের সড়ক দিয়ে যে গ্রামে এসে ঢুকবে তার চেয়ে বেশি পছন্দ হবে তাকে, যে বিলটার বড় অশ্বত্থ গাছ থেকে নেমে আসবে। মজিদের আগমনটা তেমনি চমকপ্ৰদ।। চমকপ্ৰদ এই জন্যে যে, তার আগমন মুহূর্ত সমগ্ৰ গ্ৰামকে চমকে দেয়। শুধু তাই নয়, গ্রামবাসীদের নিবুদ্ধিতা সম্পর্কে তাদের সচেতন করে দেয়, অনুশোচনায় জর্জরিত করে দেয় তাদের অন্তর। শীর্ণ লোকটি (মজিদ) চীৎকার করে গালাগাল করে লোকদের। খালেক ব্যাপারী ও মাতব্বর রেহান আলী ছিল। জোয়ান মদ্দ কালু মতি, তারাও ছিল। কিন্তু লজ্জায় তাদের মাথা হেঁট। নবাগত লোকটির কোটরাগত চোখে আগুন। (রাগ)

আপনারা জাহেল, বেএলেম, আনপাড়হ। মোদচ্ছের পীরের মাজারকে আপনারা এমন করি ফেলি রাখছেন?
গ্ৰাম থেকে একটু বাইরে একটা বৃহৎ বাঁশঝাড়। মোটাসোটা হলদে তার গুঁড়ি। সেই বাঁশঝাড়ের ক-গজ ওধারে একটা পরিত্যক্ত পুকুরের পাশে ঘন সন্নিবিষ্ট হয়ে আছে গাছপালা। যেন একদিন কার বাগান ছিল সেখানে। তারই একাধারে টালখাওয়া ভাঙা এক প্ৰাচীন কবর। ছোট ছোট ইটগুলো বিবৰ্ণ শ্যাওলায় সবুজ, যুগযুগের হাওয়ায় কালচে। ভেতরে সুড়ঙ্গের মতো। শেয়ালের বাসা হয়তো। ওরা কী করে জানবে যে, ওটা মোদাচ্ছের পীরের মাজার? সভায় অশীতিপর বৃদ্ধ সলোমানের বাপও ছিল। হাঁপানির রোগী। সে দম খিঁচে লজ্জায় নত করে রাখে চোখ।

-আমি ছিলাম গারো পাহাড়ে, মধুপুর গড় থেকে তিন দিনের পথ।–মজিদ বলে। বলে যে, সেখানে সুখে শান্তিতেই ছিল। (দুরবস্থা লুকিয়ে রাখে) গোলাভরা ধান, গরু-ছাগল। তবে সেখানকার মানুষরা কিন্তু অশিক্ষিত বর্বর। তাদের মধ্যে কিঞ্চিৎ খোদার আলো ছড়াবার জন্যেই অমন বিদেশ-বিভূঁইয়ে সে বসবাস করছিল। তারা বর্বর হলে কী হবে, দিল তাদের সাচ্চা, খাঁটি সোনার মতো। খোদা-রসুলের ডাক একবার দিলে পৌঁছে দিতে পারলে তারা বেচাইন হয়ে যায় (গারো পাহাড়ের অধিবাসী)। তাছাড়া তাদের খাতির-যত্ন ও স্নেহ-মমতার মধ্যে বেশ দিন কাটছিল; কিন্তু সে একদিন স্বপ্ন দেখে। সে-স্বপ্নই তাকে নিয়ে এসেছে এত দূরে। মধুপুর গড় থেকে তিন দিনের পথ সে দুৰ্গম অঞ্চলে মজিদ যে বাড়ি গড়ে তুলেছিল তা নিমেষের মধ্যে ভেঙে ছুটে চলে এসেছে।
লোকেরা ইতোমধ্যে বার-কয়েক শুনেছে সে-কথা, তবু আবার উৎকর্ণ হয়ে ওঠে।
– উনি একদিন স্বপ্নে ডাকি বললেন…
বলতে বলতে মজিদের কোটরাগত ক্ষুদ্র চোখ দুটো পানিতে ছাপিয়ে ওঠে।
গ্রামের লোকগুলি ইদানীং অবস্থাপন্ন হয়ে উঠেছে। জোতজমি করেছে, বাড়িঘর করে গরু ছাগল আর মেয়েমানুষ পুষে চড়াই-উতরাই ভাব ছেড়ে ধীরস্থির হয়ে উঠেছে, মুখে চিকনাই (মসৃণ/সুন্দর) হয়েছে। কিন্তু খোদার দিকে তাদের নজর কম। (টাকা পয়সা হলেও ধর্মীয় কাজে গুরুত্ব কম) এখানে ধানক্ষেতে হাওয়া গান তোলে বটে। কিন্তু মুসল্লীদের গলা (ধর্মপরায়ণ না) আকাশে ভাসে না। গ্রামের প্রান্তে সেই জঙ্গলের মধ্যে কবরের পাশে দাঁড়িয়ে বুকে ঝোলানো তামার দাঁত-খিলাল দিয়ে দাঁতের গহবর খোঁচাতে খোঁচাতে মজিদ সেদিন সে-কথা স্পষ্ট বুঝেছিল (ধর্মীয় কাজে অবহেলা)। সঙ্গে সঙ্গে এ-কথাও বুঝেছিল যে, দুনিয়ায় সচ্ছলভাবে দু’বেলা খেয়ে বঁচবার জন্যে যে-খেলা খেলতে যাচ্ছে সে-খেলা সাংঘাতিক (নিজের প্রতারণার জন্য পরকালের ভয়)। মনে সন্দেহ ছিল, ভয়ও ছিল। কিন্তু জমায়েতের অধোবদন চেহারা দেখে পরিষ্কার হয়ে গিয়েছিল অন্তর! হাঁপানি-রোগগ্ৰস্ত অশীতিপর বৃদ্ধের চোখের পানে চেয়েও তাতে লজ্জা ছাড়া কিছু দেখেনি।

জঙ্গল সাফ হয়ে গেলে। ইট-সুরকি নিয়ে সেই প্ৰাচীন কবর সদ্যমৃত কোনো মানুষের কবরের মতো নতুন দেহ ধারণ করল। ঝালরওয়ালা সালু দ্বারা আবৃত হলো মাছের পিঠের মতো সে কবর। আগরবাতি গন্ধ ছড়াতে লাগল, মোমবাতি জ্বলতে লাগল রাতদিন। গাছপালায় ঢাকা স্থানটি আগে স্যাঁতসেঁতে ছিল, এখন রোদ পড়ে খটখাটে হয়ে উঠল। হাওয়ারও ভাপসা গন্ধ খড়ের মতে শুষ্ক হয়ে উঠল।

এ গ্ৰাম সে গ্রাম থেকে লোকেরা আসতে লাগল। তাদের মৰ্মদ্ভদ কান্না, অশ্রুসজল কৃতজ্ঞতা, আশার কথা, ব্যর্থতার কথা সালুতে আবৃত মাছের পিঠের মতো অজ্ঞাত ব্যক্তির সেই কবরের কোলে ব্যক্ত হতে লাগল দিনের পর দিন (আকাঙ্ক্ষা পূরণে মানত করা)। তার সঙ্গে পয়সা–ঝকঝকে পয়সা, ঘষা পয়সা, সিকি-দুয়ানি-আধুলি, সাচ্চা টাকা, নকল টাকা ছড়াছড়ি যেতে লাগল। (মাজারের মাধ্যমে মজিদের স্বচ্ছলতা)
ক্ৰমে ক্ৰমে মজিদের ঘরবাড়ি উঠল। বাহির ঘর, অন্দর ঘর, গোয়াল ঘর, আওলাঘর (অপরিচ্ছন্ন ঘর)। জমি হলো, গৃহস্থালি হলো। নিরাকপড়া শ্রাবণের সেই হাওয়া-শূন্য স্তব্ধ দিনে তাঁর জীবনের যে নতুন অধ্যায় শুরু হয়েছিল, মাছের পিঠের মতো সালু কাপড়ে আবৃত নশ্বর জীবনের প্রতীকটির পাশে সে জীবন পদে পদে এগিয়ে চলল (মাজারের মাধ্যমে ক্রমেই মজিদের আর্থিক সচ্ছলতা)।

হয়তো সামনের দিকে, হয়তো কোথাও নয়। সে-কথা ভেবে দেখবার লোক সে নয় (জবাবদিহিতার ভয় না থাকা)। বতোর দিনে (কুমিল্লা-রাজশাহী আঞ্চলিক শব্দ। ধান কাটার দিনে) মাগর-মগরা (প্রচুর) ধান আসে ঘরে, তাই যথেষ্ট। তথাকথিত মাজারের পানে চেয়ে ক্বচিৎ কখনো সে যে ভাবিত না তা নয় (প্রতারণা সম্পর্কে পরকালীন ভয়)। কিন্তু তারও যে বঁচবার অধিকার আছে সেই কথাটাই সে সাময়িক চিন্তার মধ্যে প্ৰধান হয়ে ওঠে (বাঁচার জন্য প্রতারণার বৈধতা)। তাছাড়া গারো পাহাড়ের শ্রমক্লান্ত হাড় বের করা দিনের কথা (অতি কষ্টের দিন) স্মরণ হলে সে শিউরে ওঠে। ভাবে, খোদার বান্দা সে নির্বোধ ও জীবনের জন্যে অন্ধ। তার ভুলভ্রান্তি তিনি মাফ কবে দেবেন। তাঁর করুণা অপার, সীমাহীন। (খোদা এই প্রতারণা মাফ করবেন)

একদিন মজিদ বিয়েও করে। অনেকদিন থেকে আলি-বালি একটি চওড়া বেওয়া (বিধবা) মেয়েকে দেখছিল। দেহে যৌবন যেন ব্যাপ্ত হয়ে ছড়িয়ে আছে, বিশাল তার রূপ। দূর থেকে আবছা আবছা তার প্রশস্ত দেহ দেখে শীর্ণ মজিদ জ্বলে উঠেছিল (বিয়ের প্রতি আগ্রহ)। শেষে সেই প্ৰশস্ত ব্যাপ্ত-যৌবন মেয়েলোকটিই বিবি হয়ে তার ঘরে এল। নাম রহিমা। সত্যি সে লম্বা-চওড়া মানুষ! হাড়-চওড়া মাংসল দেহ। শীঘ্ৰ দেখা গেলো, তার শক্তিও কম নয়। বড় বড় হাঁড়ি সে অনায়াসে এক স্থান থেকে অন্য স্থানে তুলে নিয়ে যায়। হাঁটে যখন, মাটিতে আওয়াজ হয়, কথা কয় যখন, মাঠ থেকে শোনা যায় গলা।
তবে তার শক্তি, তার চওড়া দেহ– যে দেহ দূর থেকে আলি-ঝালি দেখে মজিদের বুকে আগুন ধরেছিল (আকর্ষণ)– তা বাইরের খোলস মাত্র। আসলে সে ঠান্ডা, ভীতু মানুষ (অনুগত স্বভাব)। দশ কথায় রা (আওয়াজ) নেই, রক্তে রাগ নেই। মজিদের প্রতি তার সম্মান, শ্রদ্ধা ও ভয়। শীর্ণ মানুষটির পেছনে মাছের পিঠের মতো মাজারটির বৃহৎ ছায়া দেখে। (মজিদের মুখে মাজারের প্রতিচ্ছবি দেখে)
ও যখন উঠানে হাঁটে তখন মজিদ চেয়ে চেয়ে দেখে। তারপর মধুর হেসে আস্তে মাথা নেড়ে বলে,
—অমন করি হাঁটতে নাই।
থমকে গিয়ে রহিমা তার দিকে তাকায়।
মজিদ বলে,—অমন করি হাঁটতে নাই বিবি, মাটি গোস্বা করে। এই মাটিতেই তো একদিন ফিরি যাইবা–থেমে আবার বলে, মাটিরে কষ্ট দেওন গুনাহ্‌।
এ কথা আগেও শুনেছে রহিমা। মুরুব্বিরা বলেছে, বাড়ির আত্মীয়রা বলেছে। মজিদের কথায় বাইরে সালু কাপড়ে আবৃত মাজারটির কথা স্মরণ হয়। মজিদ নীরবে চেয়ে চেয়ে দেখে, রহিমার চোখে ভয়। (মজিদ ও মাজার সম্পর্কে অনুগত মনোভাব)
মধুরভাবে হেসে আবার বলে,—অমন করি কখনো হাঁটিও না। কবরে আজাব হইবে। (জোর পায়ে ও শব্দ করে)
শক্তিমত্তা নারীর উজ্জ্বল পরিষ্কার চোখে ঘনায়মান ভয়ের ছায়া দেখে মজিদ খুশি হয়। তারপর বাইরে গিয়ে কোরান তেলাওয়াত শুরু করে। গলা ভালো তার, পড়বার ভঙ্গিও মধুর। একটা চমৎকার সুরে সারা বাড়ি ভরে যায়। যেন হাসনাহেনার মিষ্টি মধুর গন্ধ ছড়ায়।
কাজ করতে করতে রহিমা থমকে যায়; কান পেতে শোনে (মজিদের তেলাওয়াত)। খোদাতাআলার রহস্যময় দিগন্ত তার (রহিমার) অন্তরে যেন বিদ্যুতের মতো থেকে থেকে ঝিলিক দিয়ে ওঠে। একটি অব্যক্ত ভীতিও ঘনিয়ে আসে মনে। সে খোদাকে ভয় পায়, স্বামী মসজিদকে ভয় পায়।
পুকুরে গোসল করে সিক্ত বসনে (ভেজা শরীর) উঠানে দাঁড়িয়ে রহিমা যখন চুল ঝাড়ে তখনো চেয়ে চেয়ে দেখে মজিদ। (রহিমার সৌন্দর্য) বিছানার পাশে যে দেহটির তাল পায় না, সে দেহটিই এখন সিক্ত কাপড় ভেদ করে অদ্ভুত সুন্দর হয়ে ওঠে। তার চোখ চকচক করে (আকর্ষণ)। কিন্তু রহিমার চেতনা নেই।
গলা কেশে মজিদ বলে,—খোলা জায়গায় আমন বেশরমের মতো দাঁড়াইও না বিবি। (অন্যরা দেখে ফেলবে)
সচকিত হয়ে রহিমা হাত নামায়, বুকে ভালো করে আঁচল দেয়, পেছনে সাপটে থাকা কাপড় আলগা করে দিয়ে এধার-ওধার যেন বেগান-বেগায়ের লোকের সন্ধানে তাকায়। কিন্তু ঐ তো কেবল মজিদ বসে আছে। দরজার পাশে, হাতে হুঁকা। গলা সীসার মতো অবশেষে লজ্জা আসে রহীমার সারা দেহে। দ্রুত পায়ে সে আড়ালে চলে যায়। (স্বাভাবিক লজ্জাসুলভ মনোভাব)
মজিদের সামনে এমনভাবে আর দাঁড়ায় না কখনো। গ্রামের লোকেরা যেন রহিমারই অন্য সংস্করণ (রহিমার মতোই অনুগত)। তাগড়া তাগড়া দেহ–চেনে জমি আর ধান, চেনে পেট। খোদার কথা নেই। স্মরণ করিয়ে দিলে আছে, নচেৎ ভুল মেরে থাকে। জমির জন্যে প্ৰাণ। সে জমিতে বর্ষণহীন খরার দিনে ফাটল ধরলে তখন কেবল স্মরণ হয় খোদাকে। (বিপদে পড়লেই খোদাতে স্মরণ করে) কিন্তু জমি এ ধারে উর্বর, চারা ছড়িয়েছে কি সোনা ফলবে (অনেক উর্বর জমি)। মানুষরাও পরিশ্রম করে, জমিও সে শ্রমের সম্মান দেয়। দেয় তো বুক উজাড় করে দেয়।

জমি চাষাবাদ প্রক্রিয়া ও মানুষের মনোভাব

মাঠে গিয়ে মানুষ মেঠো (মাটির সাথে মিশে যায়) হয়ে ওঠে। কখনো ঘরোয়া হিংসা-বিদ্বেষের জন্যে বা আত্মমর্যাদার ভুয়ো ঝাণ্ডা উঁচিয়ে রাখবার জন্যে তারা জমিকে দাবার ছকের মতো ভাগ করে ফেলে (খণ্ড-বিখণ্ড জমি)। সে-জমিকেই আবার রক্ত দিয়ে রক্ষা করতে দ্বিধা করে না (জমির কারণে যুদ্ধ)। হয়তো দুনিয়ার দূষিত আবহাওয়ার মধ্যে তারা বর্বরতার নীচতায় নেমে আসে, কিন্তু যখন জমির গন্ধ নাকে লাগে, মাটির এলো খাবড়া দলাগুলোর পানে চেয়ে আপন রক্তমাংসের কথা স্মরণ হয়, তখন ভুলে যায় সমস্ত হিংসা-বিদ্বেষ (জমির কারণে একতা ফিরে আসে)। সিপাইর খণ্ডিত ছিন্ন দেহের একতাল অর্থহীন মাংসের মতো জমিও তখন প্ৰাণের চাইতে বড় হয়ে ওঠে। খাবলা খাবল রুঠাজমি (নিষ্ফলা জমি), ডোবাজমি, কাদাজমি। ফাটলধরা জ্যৈষ্ঠের জমি–সব জমি একান্ত আপন; কোনোটার প্রতি অবহেলা নেই (জমির প্রতি ভালোবাসা)। যেমন সুস্থ মুমূর্ষু বা জরাজর্জর আত্মীয়জনের প্রতি দৃষ্টিভেদ থাকে না মানুষের (সব আত্মীয় যেমন সমান, সব জমিও তেমন)। মাথার ঘাম পায়ে ফেলেই তারা খাটে।

হয়তো কাঠফাটা রোদ, হয়তো মুষলধারে বৃষ্টি—তারা পরিশ্রম করে চলে। অগ্রহায়ণের শীত খোলামাঠে হাড় কাঁপায়, রোদ-পানি-খাওয়া মোটা কর্কশ ত্বকের ডাসা লোমগুলো পর্যন্ত জলো শীতল হওয়ায় খাড়া হয়ে ওঠে।–তবু কোমর পরিমাণ পানিতে ডুবে থাকা মাঠ সাফ করে (জমির ফসল উঠায়)। সযত্নে, সস্নেহে সাফ করে যত জঞ্জাল। কিন্তু জঞ্জালের আবার শেষ নেই। কার্তিকে পানি সরে এলেও কচুরিপানা জড়িয়ে জড়িয়ে থাকে জমিতে। তখন আবার দল বেঁধে লেগে যায় তারা। ভাগ্যকে ঘষে সাফ করবার উপায় নেই (এই কষ্টের কাজ দূর করার উপায় নেই), কিন্তু যে-জমি জীবন (জমিই জীবিকার মাধ্যম), সে-জমিকে জঞ্জালমুক্ত করে ফসলের জন্যে তৈরি করে। তার জন্যে অক্লান্ত পরিশ্রমকে ভয় নেই। এদিকে সূৰ্য ক্রমশ দূরপথ ভ্ৰমণে বেরোয়, ঝিমিয়ে আসে তাপ, মেঘশূন্য আকাশের জমাট ঢালা নীলিমার মধ্যে শুকিয়ে ওঠে। দিগন্ত বিস্তৃত মাঠ। তখন শুরু হয় আরেক দফা পরিশ্রম। রাত নেই দিন নেই হাল দেয়।

তারপর ছড়ায় চারা ছড়াবার সময়, না তাকায় দিগন্তের পানে। না স্মরণ করে খোদাকে (ফসল বুননের ব্যস্ততায় ধর্মকর্মের খবর থাকে না)। খোদাকে স্মরণ করে না বলেই হয়তো চারা ছড়ানো জমি শুকিয়ে কঠিন হতে থাকে। রোদ চড়া হয়ে আসে, শূন্য আকাশ বিশাল নগ্নতায় নীল হয়ে জ্বলে পুড়ে মরে (অনাবৃষ্টির কারণে জমিতে পানির অভাব)। নধর নধর হয়ে ওঠা কচি কচি ধানের ডগার পানে চেয়ে বুক কেঁপে ওঠে তাদের (ধান নষ্ট হয়ে যায়)। তারা দল বেঁধে আবার ছোটে। তারপর রাত নেই দিন নেই বিল থেকে কেঁদে কেঁদে পানি তোলে (সেঁচের জন্য)। সামান্য ছুতোয় প্ৰতিবেশীর মাথায় দা বসাতে যাদের বিন্দুমাত্র দ্বিধা হয় না, তাদেরই বুক বিমৰ্ষ আকাশের তলে কচি-নধর ধান দেখে শঙ্কিত হয়ে ওঠে (মানুষ মারতে দ্বিধা করে না কিন্তু ফসল ভালো না হলে তারা বিচলিত হয়), মাটির তৃষ্ণায় তাদেরও অন্তর খা খা করে। রাত নেই দিন নেই, কোঁদে (বিশেষ যন্ত্র) করে পানি তোলে মণকে মণ।

এত শ্রম এত কষ্ট, তবু ভাগ্যের ঠিক-ঠিকানা (কৃষিক্ষেত্রে অনিশ্চিত প্রাপ্তি) নেই। চৈত্রের শেষ দিক বা বৈশাখের শুরু। ধান ওঠে-ওঠে, এমন সময়ে কোনো এক দুপুরে কালো মেঘের সাথে আসে ঝড়, আসে শিলাবৃষ্টি, হয়তো না বলে না কয়ে নিমেষেব মধ্যে ধ্বংস করে দিয়ে যায় মাঠ। কোচবিদ্ধ হয়ে নিহত ছমিরুদিনের রক্তাক্ত দেহের পানে চেয়ে আবেদ-জাবেদের মনে দানবীয় উল্লাস হতে পারে, কিন্তু এখন তারা পাথর হয়ে যায় (ফলন নষ্ট হওয়ার শোকে)। যার একরাত্তি জমিও নেই, তারও চোখ ছলছল করে ওঠে। এবং হয়তো তখন খোদাকে স্মরণ করে, হয়তো করে না। (মানুষ মারা গেলে যেখানে গ্রামবাসী দানবীয় উল্লাস করে কঠোর মনোভাবের পরিচয় দেয়, তারা পর্যন্ত ঝড়ে নষ্ট হওয়া ফসলের শোক সামলাতে পারে না)

গ্রামবাসীর ‍উপর মজিদের প্রভাব বিস্তার

মাঠের প্রান্তে একাকি দাঁড়িয়ে মজিদ দাঁত খিলাল করে আর সে কথাই ভাবে। কাতারে কাতারে সারবন্দি হয়ে দ্বিতীয়ার চাঁদের মতো (সরু-চিকন কাস্তে) কাস্তে নিয়ে মজুররা যখন ধান কাটে আর বুক ফাটিয়ে গীত গায় তখনো মজিদ দূরে দাঁড়িয়ে দেখে আর ভাবে। গলার তামার খিলাল দিয়ে দাঁতের গহবর গুতোয় আর ভাবে। কিসের এত গান, এত আনন্দ? মজিদের চোখ ছোট হয়ে আসে (পর্যবেক্ষণ মনোভাব)। রহিমার শরীরে তো এদেরই রক্ত আর তার মতোই এরা তাগড়া, গােটাগোট্টা ও প্রশস্ত। রহিমার চোখে ভয় দেখেছে মজিদ। এরা কি ভয় পাবে না? ওদের গান আকাশে ভাসে, ঝিলমিল করতে থাকা ধানের শীষে এদের আকৰ্ণ হাসির ঝলক লাগে। ওদের খোদার ভয় নেই। মজিদও চায়, তার গোলা ভরে উঠক ধানে।

কিন্তু সে তো জমিকে ধন মনে করে না, আপন রক্তমাংসের সামিল খেয়াল করে না? শ্যেন দৃষ্টিতে (বাজপাখির মতো তীক্ষ্ন দৃষ্টি) অবশ্য চেয়ে চেয়ে দেখে ধানকাটা; কিন্তু তাদের মতো লোম-জাগানো পুলক লাগে না তার অন্তরে (গ্রামবাসীর বিশ্বাস জমির উপর, মজিদের বিশ্বাস খোদার উপর)। হাসি তাদের প্রাণ, এ-কথা মজিদের ভালো লাগে না। তাদের গীত ও হাসিও ভালো লাগে না। ঝালরওয়ালা সালু কাপড়ে আবৃত মাজারটিকে তাদের হাসি আর গীত অবজ্ঞা করে যেন।

জমায়েতকে মজিদ বলে, খোদাই রিজিক দেনেওয়ালা।
শুনে সালু কাপড়ের ঢাকা রহস্যময়, চিরনীরব মাজারের পাশে তারা স্তব্ধ হয়ে যায়।
মজিদ বলে, মাঠভরা ধান দেখে যাদের মনে মাটির প্রতি পূজার ভাব জাগে তারা বুত-পূজারী (মাটিকেই রিযিকদাতা মনে করায়)। তারা গুনাগার।
জমায়েত মাথা হেঁট করে থাকে।

বতোর দিন (ধান কাটার দিন) ঘুরে আসে, আবার পেরিয়ে যায়। মজিদের জমিজোত বাড়ে, সঙ্গে সঙ্গে সম্মানও বাড়ে। গায়ের মাতব্বর ওর কথা ছাড়া কথা কয় না; সলাপরামর্শ, আদেশ-উপদেশ, নসিহতের জন্যে তার কাছেই আসে, চিরনীরব সালু কাপড়ে আবৃত মাজারের মুখপাত্র হিসেবে তার কথা সাগ্রহে শোনে, খরা পড়লে তারই কাছে ছুটে আসে খতম পড়বার জন্যে। খোদা রিজিক দেনেওয়ালা একথা তারা আজ বোঝে। মাঠের বুকে গান গেয়ে গজব কাটানো যায় না, বোঝে। মজিদও আত্মবিশ্বাস পায়। (ধর্মের প্রতি মানুষের অনুগত ভাব দেখে)

মজিদ সাত ছেলের বাপ দুদু মিঞাকে প্রশ্ন করে,
কলমা জানো মিঞা?
ঘাড় গুজে আধাপাকা মাথা চুলকায় দুদু মিঞা। মুখে লজ্জার হাসি।
গর্জে উঠে মজিদ বলে,–হাসিও না মিঞা।
থতমত খেয়ে হাসি বন্ধ করে দুদু মিঞা।
সাত ছেলের এক ছেলে সঙ্গে এসেছিল। সে বাপের অবস্থা দেখে খিলখিল করে হাসে। (সর্বসম্মুখে অপমান) বাপের মাথা নত করে থাকার ভঙ্গিটা যেন গাধার ভঙ্গির মতো হয়ে উঠেছে। চোখ কিন্তু তার পিটপিট করে। বলে,
—আমি গরিব মুরুক্ষু মানুষ।
খোদাকে হয়তো সে জানে। কিন্তু জ্বলন্ত পেটের মধ্যে সব কিছু যেন বাষ্প হয়ে মিলিয়ে যায় (খাবারের অভাবে ধর্মকর্ম ‍ভুলে যায়)। ভেতরে গনগনে আগুন, সব উড়ে যায়, পুড়ে যায়। আজ লজ্জায় মাথা নত করে রাখে–গাধার মতো পিঠে ঘাড়ে সমান।
এবার খালেক ব্যাপারী ধমকে ওঠে,–কলমা জানস না ব্যাটা?
সে আর মাথা তোলে না। ছেলেটা হাসে।
খালেক ব্যাপারী একটি মক্তব দিয়েছে। এরই মধ্যে একপাল ছেলেমেয়ে জুটে গেছে। ভোরে যখন কলতান করে আমসিপারা পড়ে তখন কখনো মজিদের মনে স্মৃতি জাগে। শৈশবের স্মৃতি- যে দেশ ছেড়ে এসেছে, যে-শস্যহীন দেশ তার জন্মস্থান–সেখানে একদা এক মক্তবে এই রকম করে সে আমসিপারা পড়ত।
অবশেষে মজিদ আদেশ দেয়।
—ব্যাপারীর মক্তবে তুমি কলম শিখবা।
ঘাড় নেড়ে তখুনি রাজি হয়ে যায় লোকটি। শেষে মুখ তুলে বোকার মতো বলে,
গরিব মানুষ, খাইবার পাই না।
লোকটির মাথায় যেন ছিট। যত্রতত্র কারণে-অকারণে না খেতে পাওয়ার কথাটি শোনানো অভ্যাস তার। শুনিয়ে হয়তো মানুষের সমবেদনা আকর্ষণ করার চেষ্টা করে। কিন্তু লোকে খেতে পায়, পায় না; এতে সমবেদনার কী আছে? প্রশ্ন থাকলে তো সমবেদনা থাকবে। ও কী করে আমন গাধার মতো ঘাড়-পিঠ সমান করতে পারে সে-কথা তো কেউ জিজ্ঞেস করে না। দৃশ্যটি অবশ্য উপভোগ করে।
মজিদের পক্ষ থেকে খালেক ব্যাপারী ধমকে বলে,
—হইছে হইছে, ভাগ।

একদিন ধাড়িধাড়ি ছেলে কয়েকটি পাকড়াও করে মজিদ।
–কীরে ব্যাটা, খৎনা হইছে?
একটি ছেলে আরেকটিকে আঙুল দিয়ে দেখিয়ে বলে,
–আর অয় নাই।
সে রেগে বলে–অরও অয় নাই।
শুনে আগুন হয়ে যায় মজিদ; বলে, পরশু দিন জুম্মাবার, সেদিন যদি দুজনেরই একসাথে খৎনা না হয়, তবে মুশকিল হবে।
একবার একটি ছেলে বলে,—হেই কবে আমার খৎনা হইছে!
তার বাপও মাথা নেড়ে সায় দেয়,–ছোট থাকতেই খৎনা দিছি। মিছা কথা না হুজুর।
কিন্তু মজিদ বিশ্বস্ত সূত্রে শুনেছে, ছেলেটির খৎনা হয়নি। গর্জন করে উঠে বলে,
–তোল লুঙ্গি?
বাপ আবার বলে, খোদার কসম, ওর খৎনা হইছে। কিন্তু তার কথায় কান না দিয়ে মজিদ বিদ্যুৎবেগে ছুটে গিয়ে ধাঁ করে তুলে ফেলে তার লুঙ্গি। ছেলেটি পালাবার উপক্রম করছিল, থাবা দিয়ে তার ঘাড় ধরে ফেলে মজিদ। বাপও পালাই-পালাই করছিল, কিন্তু কীভাবে পালায় ভেবে না পেয়ে ওখানেই বোকার মতো চোখ মেলে বসে থাকে। খানিকক্ষণ বাপ-পুতকে একসঙ্গে গালাগাল করে ছেলেটিকে ধরে নিয়ে এসে মজিদ নিজের বাইরের ঘরে খুটির সঙ্গে বেঁধে রাখে। বলে,
–আজই নামাজের পর আমিই তোর খৎনা দিমু। দাড়িগোঁফ ওঠা মদ্দের মতো ছেলে ঠিরঠির করে কাঁপতে থাকে। বাপের মুখে রা নেই। শুকিয়ে সে মুখ আমসি হয়ে গেছে।
সারাটি দুপুর কোরবানির ছাগলের মতো খুঁটিবন্দি হয়ে থাকে ছেলেটি। আছরের নামাজের পর মজিদ ছুরি-তেনা নিয়ে আসতেই সে তারস্বরে আর্তনাদ করে উঠে কান্না জুড়ে দেয়। দেখে বাপের আর সয় না, সেও হাউ-মাউ করে কেঁদে ওঠে। বাইরে লোক জমে গিয়েছিল। খালেক ব্যাপারীও এসেছিল ব্যাপার দেখতে। তারা ধমকাতে থাকে বাপকে।
দাঁত কড়াকড়ি করে মজিদের (রাগে)। মাঠে শয়তানের মতো গান যখন ধরে তখন খোদার কথা আর মনে হয় না? বুড়ো ধামড়া ছেলে, খৎনা হয়নি ভাবতেও কেমন লাগে। তওবা, তওবা! ব্যাপারীকে শুনিয়ে মজিদ বলে,
–আপনাগো দেশটা বড় জাহেলের দেশ।
ছেলের কান্না থামে না। মজিদ যখন বাঁশের কঞ্চি ছিলছে তখন সে আরেকবার তারস্বরে আর্তনাদ করে উঠে বলে,
—আমার বাপেরও খৎনা অয় নাই—তানারে আগে দেন।
মজিদ বিস্ময়ে হতভম্ব। খালেক ব্যাপারীর পানে চেয়ে কয়েক মুহূর্ত নিষ্পলক হয়ে থাকে, মুখে ভাষা জোগায় না। লজ্জায় ব্যাপারীর কান পর্যন্ত লাল। (বুড়ো লোকের খাতনা না হওয়ায়)
আধা ঘণ্টার মধ্যে দু-দুটো খৎনা হয়ে গেলে। ব্যাপারটা ঠিক হাটবাজারের মধ্যে যেন হলো। কারণ বাপ-বেটাকে ধরবার জন্যে লোকের প্রয়োজন ছিল বলে, এবং এসব দৃশ্য না দেখে থাকা যায় না। বলে ঘরটায় ভিড় জমে গিয়েছিল। শুধু তাই নয়, পেছনে বেড়ার ফুটো দিয়ে দেখল পাড়ার যত মেয়েরা–ছুকরি, জোয়ান, বুড়ি। রহীমা পর্যন্ত না দেখে পারল না। স্বামীর কীর্তিতে উজ্জ্বল হয়ে ওঠা চোখে অন্য মেয়েদের সঙ্গে সেও মুখে আঁচল দিয়ে খানিকট হাসল। (গ্রামবাসীর উপর স্বামীর ক্ষমতা)
সে-রাতে দোয়া-দরুদ সেরে মাজারঘর থেকে বেরিয়ে এসে বা পাশের খোলা মাঠের পানে তাকিয়ে মজিদ কতক্ষণ চুপচাপ দাঁড়িয়ে থাকে। দিগন্ত-বিস্তৃত হয়ে যে মাঠ দূরে আবছাভাবে মিলিয়ে গেছে সেখান থেকে তারার রাজ্য। ও ধারের গ্রাম নিস্তব্ধ। দু-একটা পাড়ায় কেবল কুত্তা ঘেউ ঘেউ করে।

নীরবতার মধ্যে হঠাৎ মজিদ একটা শক্তি বোধ করে অন্তরে (আধ্যাত্মিক শক্তি ও গ্রামবাসীর উপর প্রভাব)। মহব্বতনগর গ্রামে সে শক্তির শিকড় গেড়েছে। আর সে-শক্তি শাখা-প্ৰশাখা মেলে সারা গ্রামকে আছন্ন করে লোকদের জীবনকে জড়িয়ে ধরেছে সবলভাবে। প্ৰতিপত্তিশালী খালেক ব্যাপারী আছে বটে (মজিদের অন্যতম সহযোগী), কিন্তু তার শক্তিতে আর মজিদের শক্তিতে প্ৰভেদ আছে (ধর্মীয় শক্তি ও অর্থশক্তির ব্যবধান)। আজ অপরাহ্ণে যে-দুটি লোককে মজিদ কষ্ট দিয়েছে তারা নির্ভেজাল কষ্টই পেয়েছে। সে কষ্ট পাওয়ার পেছনে ক্ৰোধ নেই, দ্বেষ নেই (ধর্মীয় কারণে কষ্ট)। আজ সেই লোকদেরই খালেক ব্যাপারী চাবুক মারুক; প্ৰতিপত্তির ভয়ে তারা মুখে রা না করলেও অন্তরে ঘনিয়ে উঠবে দ্বেষ, প্ৰতিহিংসার আগুন। মজিদের শক্তি ওপর থেকে আসে, আসে ঐ সালু কাপড়ে আবৃত মাজার থেকে। মাজারটি তার শক্তির মূল।

নারীদের উপর মজিদের প্রভাব
মজিদের সে-শক্তি প্ৰতিফলিত হয় রহিমার ওপর। মেয়েমানুষরা আসে তার কাছে। এ গ্রামেরই মেয়ে রহিমা। ছোটবেলায় নাকে নোলক পরে হলদে শাড়ী পেচিয়ে পরে ছুটোছুটি করত–সবার মনে সে-ছবি এখনো স্পষ্ট। প্ৰথম বিয়ের সময় তারা তাকে দেখেছে, স্বামীর মৃত্যুর পরও তাকে দেখেছে। কিন্তু ওরাই আজ এসে চেনে না (ধর্মীয় পরিবর্তন)। কথা কয় অন্য ভাবে, গলা নরম করে সুপারিশের জন্যে ধরে। খিড়কির দরজা দিয়ে আসে তারা, এসে সন্তৰ্পণে কথা কয়। কাঁদলেও চেপে চেপে কাঁদে। বাইরে মাজার যেমন রহস্যময় তাদের কাছে, মজিদও তেমনি রহস্যময়।
মজিদ ধরা-ছোয়ার বাইরে। যোগসূত্র হচ্ছে রহিমা। (মজিদের সংযোগ মাধ্যম)
রহিমা শোনে তাদের কথা। কখনো হৃদয় গলে আসে অপরের দুঃখের কথা শুনে, কখনো ছলছল করে ওঠে চোখ। গভীর রাতে কখনো মাজারের ধারে গিয়ে দাঁড়িয়ে নির্নিমেষ চোখে তাকিয়ে থাকে মাছের পিঠের মতো স্তব্ধ, বিচিত্ৰ সেই মাজারের পানে। মাথায় কপাল পর্যন্ত ঘোমটা টানা, দেহ নিশ্চল। তাকিয়ে থাকতে থাকতে ঘোর লাগে, চোখ অবশ হয়ে আসে, মহাশক্তির কাছে পাছে কোনো বেয়াদবি করে বসে সে-ভয়ে বুক কেঁপে ওঠে কখনো। তবু মুহূর্তের পর মুহূর্ত মূর্তির মতো দাঁড়িয়ে থাকে। ভাবে, কোন মানুষ ওখানে ঘুমিয়ে আছেন–যাঁর রুহ এখনো মানুষের দুঃখ-যাতনায় কাঁদে, তাদের মঙ্গলের জন্যে আকুল হয়ে থাকে সদাসর্বদা? (মাজারের প্রতি প্রবল অন্ধবিশ্বাস)
কখনো কখনো অতি সঙ্গোপনে রহীমা একটা আৰ্জি জানায়। বলে তার সন্তান নেই; সন্তানশূন্য কোলটি খাঁ খাঁ করে (মাতৃত্বের আগ্রহ)। তিনি তাকে যেন একটি সন্তান দেন। আর্জি জানায় চোখের আকুলতায়, এদিকে ঠোঁট পর্যন্ত কঁপে না। অতি গোপন মনের কথা শিশুর সরলতায় সালুকাপড়ে ঢাকা রহস্যময় মাজারের পানে চেয়ে বলে।—না হয় লজ্জা, না হয়। দ্বিধা।
একদিন হঠাৎ এই সময় দমকা হাওয়া ছোটে, জঙ্গলের যে কটা গাছ আজও অকর্তিত অবস্থায় বিরাজমান তাতে আচমকা গোঙানি ধরে (বাতাসের শব্দ)। হাওয়া এসে এখানে সালু কাপড়ের প্রান্ত নাড়ে, কেঁপে ওঠা মোমবাতির আলোয় ঝলমল করে ওঠে রূপালি ঝালর। রহিমাও কেঁপে ওঠে, কী একটা মহাভয় তার রক্ত শীতল করে দেয়। মনে হয়, কে যেন কথা কইবে আকাশের মহা-তামিস্রার (ঘোর অন্ধকার) বুক থেকে বিচিত্র এক কণ্ঠ সহসা জেগে উঠবে (আধ্যাত্মিক শক্তি ডাক দিবে)। আবার স্থির হয়ে যায়, মোমবাতির শিখাও নিষ্কম্প, স্থির হয়ে ওঠে। ওপরে আকাশ-ভরা তারা তেমনি নীরব।

কোনোদিন রহিমা সারা মানবজাতির জন্যে দোয়া করে। ও-পাড়ার ছুনুর বাপ মরণরোগে যন্ত্রণা পাচ্ছে, তাকে শান্তি দাও। খেতানির মা পক্ষাঘাতে কষ্ট পাচ্ছে।—তার ওপর করুণা করো। কারা একপাল ছেলেমেয়ে নিয়ে ভাতে কষ্ট পাচ্ছে তাদের ওপর করুণা করো, রহম করে। চার গ্রাম পরে বড় নদী। ক’দিন আগে সে নদীতে ঝড়ের মুখে ডুবে মারা গেছে ক’টি লোক। তাদের কথা স্মরণ করে বলে, ঘরে স্ত্রী-পুত্র রেখে নৌকা নিয়ে যারা নদীতে যায় তাদের ওপর যেন তোমার রহমত হয়।

অনেক সময় অদ্ভুত আৰ্জি নিয়ে মেয়েলোকেরা আসে রহিমার কাছে। যেমন আসে ধান ভাননি হাসুনির মা। বহুদিন আগে নিরাকপড়া এক শ্রাবণের দুপুরে মাছ ধরতে মতিগঞ্জের সড়কের ওপর যারা প্ৰথম মজিদকে দেখেছিল, সেই তাহের আর কাদেরের বোন হাসুনির মা। সে এসে বলে,
-আমার এক আৰ্জি।
এমন এক ভঙ্গিতে বলে যে রহিমার হাসি পায়। কিন্তু মনে মনেই হাসে, গম্ভীর হয়ে থাকে বাইরে। হাসুনির মা বলে,
-আমার আর্জি–ওনারে কইবেন, আমার যেন মওত হয়।
এবার ঈষৎ হেসে রহিমা বলে,
–ক্যান গো বিটি?
-জ্বালা আর সইহ্য হয় না বুবু। (পারিবারিক কলহ) আল্লায় যেন আমারে সত্বর দুনিয়া থিকা লইয়া যায়।
সকৌতুকে রহিমা প্রশ্ন করে,
—তোমার হাসুনির কী হইব তুমি মরলে?
সেদিকে তার ভাবনা নেই। আপনা থেকেই যেন উত্তর যোগায় মুখে।
—তুমি নিবা বুবু। তোমারই হাতে সোপর্দ কইরা আমি খালাস হমু।
রহিমা হাসে। হাতে কাঁথার কাজ। হাসে আর মাথা নত করে কাঁথা সেলাই করে।
একদিন হাসুনির মা এসে বলে,
—আমার এক আর্জি বুবু।
–কও?
-ওনারে কইবেন–বুড়া-বুড়ি দুইগারে যানি দুনিয়ার থান লইয়া যায় খোদাতা’লা।
কৃত্রিম বিস্ময়ে (মা-বাবার মৃত্যু কামনা করায়) চোখ তুলে চেয়ে রহিমা প্রশ্ন করে,
-ওইটা আবার কেমন কথা হইল?
—হ, খাঁটি কথা কইলাম বুবু। দুইটার লাঠালাঠি চুলচুলি আর ভালো লাগে না।
বুড়ো বাপ তার ঢেঙা দীর্ঘ মানুষ; মা ছোটখাটো, কোঁকড়ানো। কিন্তু দু’জনের মুখে বিষ (কটু কথা)। ঝগড়া-ফ্যাসাদ লেগেই আছে। তবে এক একদিন এমন লাগা লাগে যে, খুনখুনি হবার জোগাড়। ঢেঙা লোকটি তেড়ে আসে বারবার, ঘুণ-ধরা হাড় কড়কড় করে। বুড়ি ওদিকে নড়েচড়ে না। এক জায়গায় বসে থেকে মাথা ঝাপিয়ে ঝাপিয়ে রাজ্যের গালাগাল জুড়ে দেয়। গালাগাল দিয়ে বুড়োকে যখন বিন্দুমাত্র ঘায়েল করতে পারে না তখন শেষ অস্ত্ৰ হানে।
-ওরে মরার ব্যাটা, তুই কী ভাবছস? ভাবছস বুঝি পোলাগুলি তোর জন্মের? আল্লা সাক্ষী–হেগুলি তোর জন্মের না, তোর জন্মের না (সন্তানের জন্ম নিয়ে প্রশ্ন তোলে বুড়োকে ক্ষেপানোর জন্য)!
শুনে হাসুনির মায়ের কান লাল (লজ্জায়) হয়ে ওঠে; আর আঁচলে মুখ লুকিয়ে হাসে।
তাহের-কাদের আর কনিষ্ঠ ভাই রতন–তাদের বুদ্ধি-বিবেচনা থাকলেও তা আবার স্বার্থের ঘেরে ঢাকা (জমির কারণে বাবার পক্ষ নেয়)। সামান্য হলেও বাপের জমি আছে, ঘর আছে, লাঙল-গরু আছে। তার দিনও ঘনিয়ে এসেছে আর বর্ষায় টেকে কিনা সন্দেহ। তারা চুপ করে শোনে।
অন্ধ ক্ৰোধে কাঁপিতে কাঁপিতে বুড়া বাপ এগিয়ে আসে। ছেলেদের পানে চেয়ে বলে,
-হুনছস কথা, হুনছস?
ছেলেরা সমস্বরে বলে,–ঠ্যাঙা বেটিরে, ঠ্যাঙা।
সমর্থন পেয়ে বুড়ো চেলা নিয়ে দৌড়ে আসে। তাহের শেষে জমিজোতের মায়া ছেড়ে বাপের হাত ধরে ফেলে। কাদের বোঝায়,–থাক, কইবার দেও। খোদাই তার শাস্তি দিবো।
