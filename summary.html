হলওয়েল : (সকলের উদ্দেশে) Good morning to you. 
(সকলের সঙ্গে করমর্দন। ওয়াট্স কোনো কথা না বলে সকলের সঙ্গে করমর্দন করল। মহিলাটি একটু ইতস্তত করে অন্য দিকে চলে গেলেন।)
ড্রেক : বল, খবর বল হলওয়েল। উৎকণ্ঠায় নিঃশ্বাস বন্ধ হয়ে এল যে।
হলওয়েল : মুর্শিদাবাদে ফিরেই নবাব আমাদের মুক্তি দিয়েছেন। অবশ্য নানা রকম ওয়াদা করতে হয়েছে, নাকে-কানে খৎ দিতে হয়েছে এই যা।
ড্রেক : কলকাতায় ফেরা যাবে?
হলওয়েল : না।
ওয়াটস : আপাতত নয়, কিন্তু ধীরে ধীরে হয়ত একটা ব্যবস্থা হয়ে যাবে।
কিলপ্যাট্রিক : কী রকম ব্যবস্থা?
ওয়াটস : অর্থাৎ মেজাজ বুঝে যথাসময়ে কিছু উপঢৌকনসহ হাজির হয়ে আবার একটা সম্পর্ক গড়ে তোলা সম্ভব হবে।
ড্রেক : তার জন্যে কতকাল অপেক্ষা করতে হবে কে জানে?
হলওয়েল : একটা ব্যাপার স্পষ্ট বোঝা যাচ্ছে, নবাব ইংরেজের ব্যবসা সমূলে উচ্ছেদ করতে চান না। তা চাইলে এভাবে আপনারা নিশ্চিত থাকতে পারতেন না।
ড্রেক : তাহলে নবাবের সঙ্গে যোগাযোগের ব্যবস্থাটা করে ফেলতে হয়।
হলওয়েল : কিছুটা করেই এসেছি। তা ছাড়া উমিচাঁদ নিজের থেকেই আমাদের সাহায্য করার প্রস্তাব পাঠিয়েছে।
ড্রেক : হুররে।
ওয়াটস : মিরজাফর, জগৎশেঠ, রাজবল্লভ এঁরাও আস্তে আস্তে নবাবের কানে কথাটা তুলবেন।
ড্রেক : (হ্যারি ও মার্টিনকে) আশা করি তোমাদের মেজাজ এখন কিছুটা ঠান্ডা হয়েছে। আমাদের মিলেমিশে থাকতে হবে, একযোগে কাজ করতে হবে।
হ্যারি : আমরা তো ঝগড়া করতে চাইনে। আমরা আমাদের ভবিষ্যৎ জানতে চাই।
মার্টিন : যেমন হোক একটা নিশ্চিত ফল দেখতে চাই।
(উভয়ের প্রস্থান)
ড্রেক : (উচ্চকণ্ঠে) Patience is the keyword. young men. 
হলওয়েল : (পায়ে চাপড় মেরে) উঃ, কী মশা। সিরাজউদ্দৌলা মসকিউটো ব্রিগেড মবিলাইজ করে দিয়েছে নাকি?
ড্রেক : যা বলছ ম্যালেরিয়া আর ডিসেন্ট্রিতে ভুগে কয়েকজন এর ভেতরে মারাও গেছে।
ওয়াটস : বড় ভয়ানক জায়গায় আস্তানা গেড়েছেন আপনারা।
ড্রেক : But it is important from military point of view. সমুদ্র কাছেই। কলকাতাও চল্লিশ মাইলের ভেতরে। প্রয়োজন হলে যে কোনো দিকে ধাওয়া করা যাবে।
কিলপ্যাট্রিক : দ্যাটস ট্রু। কলকাতায় ফেরার আশায় বসে থাকতে হলে এই জায়গাটাই সবচেয়ে নিরাপদ। নদীর দুপাশে ঘন জঙ্গল। সেদিক দিয়ে বিপদের কোনো আশঙ্কা নেই। বিপদ যদি আসেই তাহলে তা আসবে কলকাতার দিক দিয়ে গঙ্গার স্রোতে ভেসে। কাজেই সতর্ক হবার যথেষ্ট সময় পাওয়া যাবে।
হলওয়েল : কলকাতার দিক থেকে আপাতত কোনো বিপদের সম্ভাবনা নেই। উমিচাঁদ কলকাতার দেওয়ান মানিকচাঁদকে হাত করেছে। তার অনুমতি পেলেই জঙ্গল কেটে আমরা এখানে হাট-বাজার বসিয়ে দেব।
ড্রেক : অফকোর্স নেটিভরা আমাদের সঙ্গে ব্যবসা করতে চায়। কিন্তু ফৌজদারের ভয়েই তা পারছে না।
(প্রহরী সৈনিকের প্রবেশ। সে ড্রেকের হাতে এক টুকরো কাগজ দিল। ড্রেক কাগজ পড়ে চেঁচিয়ে উঠল)
উমিচাঁদের লোক এই চিঠি এনেছে।
সকলে : হোয়াট? এত তাড়াতাড়ি। (চা-সহ প্রহরীর প্রবেশ। অভিবাদনান্তে ড্রেকের হাতে পত্র দিল আগন্তুক। ড্রেক ইঙ্গিত করতেই তারা আবার বেরিয়ে গেল)
ড্রেক : (মাঝে মাঝে উচ্চৈঃস্বরে পত্র পড়তে লাগল)’– আমি চিরকালই ইংরেজের বন্ধু। মৃত্যু পর্যন্ত এই বন্ধুত্ব আমি বজায় রাখিব।- মানিকচাঁদকে অনেক কষ্টে রাজি করানো হইয়াছে, সে কলকাতায় ইংরেজদের ব্যবসা করিবার অনুমতি দিয়াছে। এর জন্যে তাহাকে বারো হাজার টাকা নজরানা দিতে হইয়াছে। টাকাটা নিজের তহবিল হইতে দিয়া দেওয়ানের স্বাক্ষরিত হুকুমনামা হাতে হাতে সংগ্রহ করিয়া পত্রবাহক মারফত পাঠাইলাম। এই টাকা এবং আমার পারিশ্রমিক ও অন্যান্য ব্যয় বাবদ যাহা ন্যায্য বিবেচিত হয় তাহা পত্রবাহকের হাতে পাঠাইলেই আমি চিরকৃতজ্ঞ থাকিব। বলা বাহুল্য, পারিশ্রমিক বাবদ আমি পাঁচ হাজার টাকা পাইবার আশা করি। অবশ্য ড্রেক সাহেবের বিবেচনায় তাহা গ্রাহ্য না হইলে দুই চারি শত টাকা কম লইতেও আমার আপত্তি নাই কোম্পানি আমার উপর ষোলো আনা বিশ্বাস রাখিতে পারেন। সুদূর লাহোর হইতে আমি বাংলাদেশে আসিয়াছি অর্থ উপার্জনের জন্য, যেমন আসিয়াছেন কোম্পানির লোকেরা। কাজেই উদ্দেশ্যের দিক দিয়া বিচার করিলে আমি আপনাদেরই সমগোত্রীয়।’ (চিঠি ভাঁজ করতে করতে)
এ পারফেক্ট স্কাউন্ড্রেল ইজ দিস ওঁমিচাঁদ।
হলওয়েল : কিন্তু উমিচাঁদের সাহায্য তো হাতছাড়া করা যাচ্ছে না।
ওয়াটস : Even when it is too costly. 
ড্রেক : সেই তো মুশকিল। ওর লোভের অন্ত নেই। মানিকচাঁদের হুকুমনামার জন্যে সতেরো হাজার টাকা দাবি করেছে। আমি হলপ করে বলতে পারি দুহাজারের বেশি মানিকচাঁদের পকেটে যাবে না। বাকিটা যাবে উমিচাঁদের তহবিলে।
হলওয়েল : কিন্তু কিছুই করবার নেই। উপযুক্ত অবস্থার সুযোগ পেয়ে সে ছাড়বে কেন?
ড্রেক : দেখি, টাকাটা দিয়ে ওর লোকটাকে বিদায় করি। (বেরিয়ে গেল)
ওয়াটস : শুধু উমিচাঁদের দোষ দিয়ে কী লাভ? মিরজাফর, জগৎশেঠ, রাজবল্লভ, মানিকচাঁদ কে হাত পেতে নেই?
কিলপ্যাট্রিক : দশদিকের দশটি খালি হাত ভর্তি করলে হিমশিম খেয়ে যাচ্ছে ইংরেজ, ডাচ আর ফরাসিরা।
হলওয়েল : কিছু না, কিছু না। হাজার হাতে হাজার হাজার হাত থেকে নিয়ে দশ হাত বোঝাই করতে আর কতটুকু সময় লাগে? বিপদ সেখানে নয়। বিপদ হলো বখরা নিয়ে মতান্তর ঘটলে। (ভাগ বাটোয়ারা নিয়ে মতানৈক্য লাগলে আসল ষড়যন্ত্র ফাঁস হতে পারে)
(ড্রেকের প্রবেশ)
ড্রেক : (উমিচাঁদের চিঠি বার করে) আর একটা জরুরি খবর আছে উমিচাঁদের চিঠিতে। শওকতজঙ্গের সঙ্গে সিরাজউদ্দৌলার লেগে গেল বলে। এই সুযোগ নেবে মিরজাফর, রাজবল্লভ, জগৎশেঠের দল। তারা শওকত জঙ্গকে সমর্থন করবে।
ওয়াটস : খুব স্বাভাবিক। শওকতজঙ্গ নবাব হলে সকলের উদ্দেশ্যেই হাসিল হবে। ভাং খেয়ে নাচওয়ালিদের নিয়ে সারাক্ষণ সে পড়ে থাকবে আর উজির ফৌজদাররা যার যা খুশি তাই করতে পারবে।
ড্রেক : আগেভাগেই তার কাছে আমাদের ভেট (উপহার) পাঠানো উচিত বলে আমার মনে হয়।
কিলপ্যাট্রিক : I send you. 
ওয়াটস : তা পাঠান। কিন্তু সন্ধ্যে হয়ে গেল যে! এখানে একটা বাতি দেবে না?
ড্রেক : অর্ডারলি, বাত্তি লে আও।
হলওয়েল : নবাবের কয়েদখানায় থেকে এ দুদিনে শুকিয়ে মরুভূমি হয়ে গেছি। আপনাদের অবস্থা কি ততটাই খারাপ?
ড্রেক : নট সো ব্যাড, আই হোপ।
(আর্দালি একটা বাতি রাখল)
ড্রেক : পেগ লাগাও।
(দূরে থেকে কণ্ঠস্বর)
নেপথ্যে : জাহাজ-জাহাজ আসছে।
চারজনে সমস্বরে : কোথায়? From which side? 
নেপথ্যে : সমুদ্রের দিক থেকে জাহাজ আসছে। দুখানা, তিনখানা, চারখানা, পাঁচখানা। পাঁচখানা জাহাজ। কোম্পানির জাহাজ! (আর্দালি বোতল আর গ্লাস রাখল টেবিলে)
ড্রেক : কোম্পানির জাহাজ? মাস্ট বি ফ্রম ম্যাড্রাস। লেট আস সেলিব্রেট। হিপ হিপ হুররে।
সমস্বরে : হুররে।
(সবাই গ্লাসে মদ ঢেলে নিল)
[দৃশ্যান্তর]

প্রথম অঙ্ক-তৃতীয় দৃশ্য
সময় : ১৭৫৬ সাল, ১০ই অক্টোবর।
স্থান : ঘসেটি বেগমের বাড়ি।
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে- ঘসেটি বেগম, উমিচাঁদ, রাজবল্লভ, জগৎশেঠ, রাইসুল জুহালা, রায়দুর্লভ, প্রহরী, সিরাজ, মোহনলাল, নর্তকী, বাদকগণ।]

(পৌঢ়া বেগম জাঁকজমকপূর্ণ জলসার সাজে সজ্জিতা। আসরে উপস্থিত রাজবল্লভ, জগৎশেঠ, রায় দুর্লভ, বাদক এবং নর্তকী। সুসজ্জিত খানসামা তাম্বুল এবং তাম্রকূট পরিবেশন করছে। একজন বিচিত্রবেশী অতিথির সঙ্গে আসরে প্রবেশ করল উমিচাঁদ। প্রায় সঙ্গে সঙ্গে এক পর্যায়ের নাচ শেষ হলো। সকলের হাততালি।)

ঘসেটি : বসুন, উমিচাঁদজি। সঙ্গের মেহমানটি আমাদের অচেনা বলেই মনে হচ্ছে।
উমিচাঁদ : (যথাযোগ্য সম্মান দেখিয়ে) মাফ করবেন বেগম সাহেবা, ইনি একজন জবরদস্ত শিল্পী। আমার সঙ্গে অল্পদিনের পরিচয় কিন্তু তাতেই আমি এঁর কেরামতিতে একেবারে মুগ্ধ। আজকের জলসা সরগরম করে তুলতে পারবেন আশা করে এঁকে আমি সঙ্গে নিয়ে এসেছি।
রাজবল্লভ : তাহলেও এখানে একজন অপরিচিত মেহমান-
উমিচাঁদ : না, না, সে সব কিছু ভাবতে হবে না। দরিদ্র শিল্পী, পেটের ধান্দায় আসরে জলসায় কেরামতি দেখিয়ে বেড়ান।
জগৎশেঠ : তাহলে আরম্ভ করুন ওস্তাদজি। দেখি নাচওয়ালিদের ঘুঙুর (ঝুমকার মালা) এবং ঘাগরা (এক ধরনের পোশাক) বাদ দিয়ে আপনার কাজের তারিফ করা যায় কিনা।
(ঘসেটি রাজবল্লভের দৃষ্টি বিনিময়। আগন্তুক আসরের মাঝখানে গিয়ে দাঁড়াল)
রাজবল্লভ : ওস্তাদজির নামটা-
আগন্তক : রাইসুল জুহালা।
(সকলের উচ্চহাসি) (নামের অর্থ মূর্খদের প্রধান)
রাজদুলর্ভ : জাহেলদের রইস। এই নামের গৌরবেই আপনি উমিচাঁদজিকে পথ দেখিয়ে নিয়ে এলেন নাকি?
(আবার সকলের হাসি)
উমিচাঁদ : (ইষৎ রুষ্ট) আমি তো বেশক জাহেল। তা না হলে আপনারা সরশুদ্ধ দুধ খেয়েও গোঁফ শুকনো রাখেন, আর আমি দুধের হাড়ির কাছে যেতে না যেতেই হাড়ির কালি মেখে গুলবাঘা বনে যাই। (আপনারা ষড়যন্ত্র করেও নিরাপদে থাকেন আর আমি কিছু না করেও ধরা খেয়ে যাই)
ঘসেটি : আপনারা বড় বেশি কথা কাটাকাটি করেন। শুরু করুন, ওস্তাদজি।
জুহালা : য্যায়সা হুকুম। আমি নানা রকমের জন্তু জানোয়ারের আদব-কায়দা সম্বন্ধে ওয়াকিফহাল। আপাতত আমি আপনাদের একটা নাচ দেখব। পক্ষীকুলের একটি বিশেষ শ্রেণি, ধার্মিক হিসেবে যার জবরদস্ত নাম (বক), সেই পাখির নৃত্যকলা আপনারা দেখবেন। দেশের বর্তমান অবস্থা বিবেচনা করে এই বিশেষ নৃত্যটি আমি জনপ্রিয় করতে চাই। (দেশে বর্তমানে বকধার্মিক তথা ভণ্ডদের প্রভাব ‍বুঝাতে এই নৃত্য জনপ্রিয় করছি) (তবলচিকে) একটু ঠেকা দিয়ে দিন।
(তাল বলে দিল। নৃত্য চলাকালে ঘসেটি এবং রাজবল্লভ নিচুস্বরে পরামর্শ করলেন। পরে উমিচাঁদ এবং রাজবল্লভও কিছু আলোচনা করলেন। নাচ শেষ হলে সকলে হর্ষ প্রকাশ।)
রাজবল্লভ : ওস্তাদজি জবরদস্ত লোক মনে হচ্ছে। ওঁকে আরও কিছু কেরামতি (গোয়েন্দার কাজ) দেখাবার দায়িত্ব দিলে কেমন হয়?
(উমিচাঁদ রাইসুল জুহালাকে একপাশে ডেকে নিয়ে কিছু বলল। তারপর নিজের আসনে ফিরে এল)
উমিচাঁদ : উনি রাজি আছেন। উপযুক্ত পারিশ্রমিক পেলে কলাকৌশল দেখাবার ফাঁকে ফাঁকে দু-চারখানা চিঠিপত্রের আদান-প্রদান করতে ওঁর আপত্তি নেই।
রাজবল্লভ : তাহলে এখন ওঁকে বিদায় দিন। পরে দরকার মতো কাজে লাগানো হবে।
রাইসুল জুহালা : বহুত আচ্ছা, হুজুর।
(সবাইকে সালাম করে কালোয়াতি (সংগীত দক্ষতা) করতে করতে বেরিয়ে গেল)
ঘসেটি : তাহলে আবার নাচ শুরু হোক?
রাজবল্লভ : আমার মনে হয় নাচওয়ালিদের কিছুক্ষণ বিশ্রাম দিয়ে কাজের কথা সেরে নেওয়াই ভালো।
ঘসেটি : তাই হোক।
(ইঙ্গিত করতেই দলবলসহ নাচওয়ালিদের প্রস্থান)
রাজদুর্লভ : বেগম সাহেবাই আরম্ভ করুন।
ঘসেটি : আপনারা তো সব জানেন। এখন খোলাখুলিভাবে যার যা বলার আছে বলুন। (দাবি দাওয়া পেশ করুন)
জগৎশেঠ : সিরাজউদ্দৌলার বিরুদ্ধে শওকতজঙ্গকে আমরা পরোক্ষ সমর্থন দিয়েই দিয়েছি। কিন্তু শওকতজঙ্গ নবাব হলে আমি কি পাব তা আমাকে পরিষ্কার করে বলুন।
ঘসেটি : শওকতজঙ্গ আপনাদেরই ছেলে। সে নবাবি পেলে প্রকারান্তরে আপনারাই তো দেশের মালিক হয়ে বসবেন।
রাজদুর্লভ : এটা কোনো কথা হলো না। (স্পষ্ট কোনো চুক্তি হল না) যিনি নবাব হবেন-
জগৎশেঠ : আমার কথা আগে শেষ হোক দুর্লভরাম।
রাজদুর্লভ : বেশ, আপনার কথাই শেষ করুন। কিন্তু মনে রাখবেন কথা শেষ হবার পর আর কোনো কথা উঠবে না।
জগৎশেঠ : সে আবার কী কথা?
রাজবল্লভ : আপনারা তর্কের ভেতর যাচ্ছেন আলোচনা শুরু করার আগেই। খুব সংক্ষেপে কথা শেষ করা দরকার। বর্তমান অবস্থায় এই ধরনের আলোচনা (ষড়যন্ত্রমূলক আলোচনা) দীর্ঘ করা বিপজ্জনক।
জগৎশেঠ : কথা ঠিক। কিন্তু নিজের স্বার্থ সম্বন্ধে নিশ্চিত না হয়ে একটা বিপদের ঝুঁকি নিতে যাওয়াটাও তো বুদ্ধিমানের কাজ নয়। মাফ করবেন বেগম সাহেবা, আমি খোলাখুলি বলছি। অস্বীকার করে লাভ নেই যে, শওকতজঙ্গ নিতান্তই অকর্মণ্য। ভাংয়ের গেলাস এবং নাচওয়ালি ছাড়া আর কিছুই জানে না। কাজেই শওকতজঙ্গ নবাব হবে নামমাত্র। আসল কর্তৃত্ব থাকবে বেগম সাহেবার এবং পরোক্ষে তাঁর নামে দেশ শাসন করবেন রাজবল্লভ।
রায়দুর্লভ : ঠিক এই ধরনের একটা সম্ভাবনার উল্লেখ করার ফলেই হোসেন কুলি খাঁকে (ষড়যন্ত্রমূলক কর্মকাণ্ডের কারণে) প্রাণ দিতে হয়েছে।
জগৎশেঠ : আমি তা বলছিনে। তা ছাড়া এখানে সে কথা অবান্তর। আমি বলতে চাইছি যে, শওকতজঙ্গ নবাবি পেলে বেগম সাহেবা এবং রাজা রাজবল্লভের স্বার্থ যেমন নির্বিঘ্ন হবে আমাদের তেমন আশা নেই। কাজেই আমাদের পক্ষে নগদ কারবারই ভালো।
ঘসেটি : ধনকুবের জগৎশেঠকে নগদ অর্থ দিতে হলে শওকতজঙ্গের যুদ্ধের খরচ চলবে কী করে?
জগৎশেঠ : না, না, আমি নগদ টাকা চাইছিনে। যুদ্ধের খরচ বাবদ টাকা আমি দেব, অবশ্য আমার সাধ্য। কিন্তু আসল এবং লাভ মিলিয়ে আমাকে একটা কর্জনামা সই করে দিলেই আমি নিশ্চিত হতে পারি।
রাংদুর্লভ : আমাকেও পদাধিকারের একটা একবারনামা সই করে দিতে হবে। (প্রহরীর প্রবেশ। ঘসেটি বেগমের হাতে পত্র দান)
ঘসেটি : (চিঠি খুলতে খুলতে) সিপাহসালার মিরজাফরের পত্র। (পড়তে পড়তে) তিনি শওকতজঙ্গকে পূর্ণ সমর্থন জানিয়েছেন এবং অবিলম্বে সিরাজের বিরুদ্ধে যুদ্ধযাত্রার পরামর্শ দিয়েছেন।
রাজবল্লভ : বহুত খুব।
উমিচাঁদ : আমার তো কোনো বিষয়ে কোনো দাবিদাওয়া নেই, আমি সকলের খাদেম। খুশি হয়ে যে যা দেয় তাই নিই। কাজেই এতক্ষণ আমি চুপ করেই আছি।
ঘসেটি : আপনারও যদি কিছু বলার থাকে এখুনি বলে ফেলুন।
উমিচাঁদ : নিজের সম্বন্ধে কিছু নয়। তবে সিপাহসালারের প্রস্তুতি আমার পছন্দ হয়েছে তাই বলছি। ইংরেজ আবার সংঘবদ্ধ হয়ে উঠেছে। সিরাজউদ্দৌলার পতনই তাদের কাম্য। শওকতজঙ্গ এখুনি যদি আঘাত হানতে পারেন, তিনি ইংরেজদের প্রত্যক্ষ সহযোগিতা পাবেন। ফলে জয় তাঁর অবধারিত।
ঘসেটি : সিরাজের পতন কে না চায়?
উমিচাঁদ : অন্তত আমরা চাই। কারণ সিরাজউদ্দৌলার নবাবিতে নির্বিঘ্ন হতে পারলে আমাদের সকলের স্বার্থই রাহুগ্রস্ত হবে।
ঘসেটি : সিরাজ সম্বন্ধে উমিচাঁদের বড় বেশি আশঙ্কা।
উমিচাঁদ : কিছুমাত্র নয় বেগম সাহেবা। দওলত আমার কাছে ভগবানের দাদামশায়ের চেয়েও বড়। আমি দওলতের পূজারী। তা না হলে সিরাজউদ্দৌলাকে বাতিল করে শওকতজঙ্গকে চাইব কেন? আমি কাজ কতদূর এগিয়ে এসেছি এই দেখুন তার প্রামণ।
(পকেট থেকে চিঠি বার করে ঘসেটি বেগমের হাতে দিল)
ঘসেটি : (চিঠির নিচে স্বাক্ষর দেখে উল্লসিত হয়ে) এ যে ড্রেক সাহেবের চিঠি!
উমিচাঁদ : আমার প্রস্তাব অনুমোদন করে তিনি জবাব দিয়েছেন।
ঘসেটি : (পত্র পড়তে পড়তে) লিখেছেন শওকতজঙ্গ যুদ্ধ ঘোষণার সঙ্গে সঙ্গে সিরাজের সেনাপতিদের অধীনস্থ ফৌজ যেন রাজধানী আক্রমণ করে। তাহলে সিরাজউদ্দৌলার পরাজয় অবশ্যম্ভাবী হয়ে উঠবে।
রাজবল্লভ : আমাদের বন্ধু সিপাহসালার মিরজাফর, রায়দুর্লভ, ইয়ার লুৎফ খান ইচ্ছে করলেই এ সুযোগের সদ্ব্যবহার করতে পারেন।
(হঠাৎ বাইরে তুমুল কোলাহল। সকলেই সচকিত। ঘসেটি বেগম কোলাহলের কারণ জানবার জন্যে যেতেই রাজবল্লভ তাঁকে থামিয়ে দিয়ে নাচওয়ালিদের ডেকে পাঠালেন। প্রায় সঙ্গে সঙ্গে তারা সদলবলে কামরায় এল।)
রাজবল্লভ : আরম্ভ কর জলদি। (ঘুঙুরের আওয়াজ উঠবার পর পরই সবেগে কামরায় ঢুকলেন নবাব সিরাজউদ্দৌলা। পেছনে মোহনলাল। সবাই তড়িৎ-বেগে দাঁড়ালো। নাচওয়ালিদের নাচ থেমে গেল।)
ঘসেটি : (ভীতিরুদ্ধ কণ্ঠে) নবাব!
সিরাজ : কি ব্যাপার খালাআম্মা, বড়ো ভারী জলসা বসিয়েছেন?
ঘসেটি : (আত্মস্থ হয়ে) এ রকম জলসা এই নতুন নয়।
সিরাজ : তা নয়, তবে বাংলাদেশের সেরা লোকেরাই শুধু শামিল হয়েছেন বলে জলসার রোশনাই আমার চোখ ধাঁধিয়ে দিয়েছে।
ঘসেটি : নবাব কি নাচগানের মজলিস মানা করে দিয়েছেন?
সিরাজ : নাচগানের মহফিলের জন্যে দেউড়িতে (প্রধান দরজা) কড়া পাহারা বসিয়ে রেখেছেন খালাআম্মা। তারা তো আমার ওপরে গুলিই চালিয়ে দিয়েছিল প্রায়। দেহরক্ষী ফৌজ সঙ্গে না থাকলে এই জলসায় এতক্ষণে মর্সিয়া শুরু করতে হতো। (হঠাৎ কণ্ঠস্বরে অবিচল তীব্রতা ঢেলে)
রাজবল্লভ, জগৎশেঠ, রায়দুর্লভ, আপনারা এখন যেতে পারেন। মতিঝিলের জলসা আমি চিরকালের মতো ভেঙে দিলাম। (ঘসেটি বেগমকে) তৈরি হয়ে নিন, খালাআম্মার পক্ষে প্রাসাদের বাইরে থাকা নিরাপদ নয়।
ঘসেটি : (রোষে চিৎকার করে) তুমি আমাকে বন্দি করে নিয়ে যেতে এসেছ? তোমার এতখানি স্পর্ধা?
সিরাজ : এতে ক্রুদ্ধ হবার কি আছে? আম্মা আছেন, আপনিও তাঁর সঙ্গেই প্রাসাদে থাকবেন।
ঘসেটি : মতিঝিল ছেড়ে আমি এক পা নড়ব না। তোমার প্রাসাদে যাব? তোমার প্রাসাদ বাজ পড়ে খান খান হয়ে যাবে। (সহসা কাঁদতে আরম্ভ করলেন)
সিরাজ : (অবিচলিত) তৈরি হয়ে নিন, খালাআম্মা। আপনাকে আমি নিয়ে যাব।
ঘসেটি : (মাতম করতে করতে) রাজা রাজবল্লভ, জগৎশেঠ বিধবার ওপরে এই অত্যাচারের বিরুদ্ধে আপনারা কিছুই করতে পারছেন না?
রাজবল্লভ : (একটু ইতস্তত করে) জাঁহাপনা কি সত্যিই-
সিরাজ : (উত্তপ্ত) আপনাদের চলে যেতে বলেছি রাজা রাজবল্লভ। নবাবের হুকুম অমান্য করা রাজদ্রোহিতার শামিল। আশা করি অপ্রিয় ঘটনার ভেতর দিয়ে তা আপনাদের স্মরণ করিয়ে দিতে হবে না।
(রাজবল্লভ প্রভৃতি প্রস্থানোদ্যত) হ্যাঁ, শুনুন রায়দুর্লভ, শওকতজঙ্গকে আমি বিদ্রোহী ঘোষণা করেছি। তাকে উপযুক্ত শিক্ষা দেবার জন্যে মোহনলালের অধীনে সেনাবাহিনী পাঠাবার ব্যবস্থা করেছি। আপনি তৈরি থাকবেন। প্রয়োজন হলে আপনাকেও মোহনলালের অনুগামী হতে হবে।
রায়দুর্লভ : হুকুম, জাঁহাপনা। (তারা নিষ্ক্রান্ত হলো। ঘসেটি বেগম হাহাকার করে কেঁদে উঠলেন।)
সিরাজ : মোহনলাল আপনাকে নিয়ে আসবে, খালাআম্মা। আপনার কোনো রকম অমর্যাদা হবে না। (বেরিয়ে যাবার জন্যে পা বাড়ালেন)
ঘসেটি : তোমার ক্ষমতা ধবংস হবে, সিরাজ। নবাবি? নবাবি করতে হবে না বেশিদিন। কেয়ামত নাজেল হবে। আমি তা দেখব-দেখব।

দ্বিতীয় অঙ্ক- প্রথম দৃশ্য
সময় : ১৭৫৭ সাল, ১০ই মার্চ।
স্থান : নবাবের দরবার।
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে- নকিব (ঘোষণা প্রদানকারী), সিরাজ, রাজবল্লভ, মিরজাফর, জগৎশেঠ, রায়দুর্লভ, উৎপীড়িত ব্যক্তি, প্রহরী, ওয়াটস, মোহনলাল।]
(দরবারে উপস্থিত- মিরজাফর, রাজবল্লভ, জগৎশেঠ, রায়দুর্লভ, উমিচাঁদ এবং ইংরেজ কোম্পানির প্রতিনিধি ওয়াটস। মোহনলাল, মিরমর্দান, সাঁফ্রে অস্ত্রসজ্জিত বেশে দণ্ডায়মান। নকিবের কণ্ঠে দরবারে নবাবের আগমন ঘোষিত হলো।)

নকিব : নবাব মনসুর-উল-মূলুক সিরাজউদ্দৌলা শাহকুলি খাঁ মির্জা মুহম্মদ হায়বতজঙ্গ বাহাদুর। বা-আদাব আগাহ বাশেদ।
(সবাই আসন ত্যাগ করে উঠে দাঁড়াল দৃঢ় পদক্ষেপে নবাব ঢুকলেন। সবাই নতশিরে শ্রদ্ধা জানালো।)
সিরাজ : (সিংহাসনে আসীন হয়ে) আজকের এই দরবারে আপনাদের বিশেষভাবে আমন্ত্রণ করা হয়েছে কয়েকটি জরুরি বিষয়ের মীমাংসার জন্যে।
রাজবল্লভ : বেয়াদবি মাফ করবেন জাঁহাপনা। দরবারে এ পর্যন্ত তেমন কোনো জরুরি বিষয়ের মীমাংসা হয়নি (দরবারের গুরুত্বহীনতা)। তাই আমরা তেমন-
সিরাজ : গুরুতর কোনো বিষয়ের মীমাংসা হয়নি এই জন্যে যে, গুরুতর কোনো সমস্যার মুখোমুখি হতে হবে এমন আশঙ্কা আমার ছিল না। আমার বিশ্বাস ছিল যে, সিপাহসালার মিরজাফর, রাজবল্লভ, জগৎশেঠ, রায়দুর্লভ, তাঁদের দায়িত্ব সম্বন্ধে সজাগ থাকবেন। আমার পথ বিঘ্নসঙ্কুল হয়ে উঠবে না (রাজ্যে বিশৃঙ্খলা হবে না)। অন্তত নবাব আলিবর্দির অনুরাগভাজনদের কাছ থেকে আমি তাই আশা করেছিলাম।
মিরজাফর : জাঁহাপনা কি আমাদের আচরণে সন্দেহ প্রকাশ করছেন?
সিরাজ : আপনাদের বিরুদ্ধে অভিযোগ জানাবার কোনো বাসনা আমার নেই। আমার নালিশ আজ আমার নিজের বিরুদ্ধে (আত্মসমালোচনা)। বিচারক আপনারা। বাংলার প্রজা সাধারণের সুখ-স্বাচ্ছন্দ্য বিধান করতে পারিনি বলে আমি তাদের কাছে অপরাধী। আজ সেই অপরাধের জন্যে আপনাদের কাছে আমি বিচারপ্রার্থী।
জগৎশেঠ : আপনার অপরাধ!
সিরাজ : পরিহাস বলে মনে হচ্ছে শেঠজি? চেয়ে দেখুন এই লোকটার দিকে (ইঙ্গিত করার সঙ্গে সঙ্গে প্রহরী একজন হতশ্রী ব্যক্তিকে দরবারে হাজির করল। সে ডুকরে কেঁদে উঠল)
রায়দুর্লভ : একি! (করুণ অবস্থা দেখে) এর এই অবস্থা কে করলে? (তরবারি নিষ্কাশন)
সিরাজ : তরবারি কোষাবদ্ধ করুন রায়দুর্লভ! এর এই অবস্থার জন্যে দায়ী সিরাজের দুর্বল শাসন।
উৎপীড়িত ব্যক্তি : আমাকে শেষ করে দিয়েছে হুজুর।
মিরজাফর : আমরা যে কিছুই বুঝতে পারছি না, জাঁহাপনা।
উৎপীড়িত ব্যক্তি : লবণ বিক্রি করিনি বলে কুঠির সাহেবদের লোকজন আমার বাড়িঘর জ্বালিয়ে দিয়েছে। (ক্রন্দন)
সিরাজ : (সিংহাসনের হাতলে ঘুষি মেরে) কেঁদো না। শুকনো খটখটে গলায় (কান্না থামিয়ে) বলো আর কি হয়েছে। আমি দেখতে চাই, আমার রাজত্বে হৃদয়হীন জালিমের বিরুদ্ধে অসহায় মজলুম কঠিনতর জালিম হয়ে উঠেছে (অত্যাচারীর বিরুদ্ধে প্রতিশোধ পরায়ণ মনোভাব)।
উৎপীড়িত ব্যক্তি : লবণ বিক্রি করিনি বলে কুঠির সাহেবদের লোকজন আমার বাড়িঘর জ্বালিয়ে দিয়েছে। ষণ্ডা ষণ্ডা (বিশাল দেহ) পাঁচজনে মিলে আমার পোয়াতি বউটাকে- ওহ্ হো হো (কান্না)- আমি দেখতে চাইনি। কিন্তু চোখ বুজলেই- ওদের আর একজন আমার নখের ভেতরে খেজুরকাঁটা ফুটিয়েছে। আমার বউকে ওরা খুন করে ফেলেছে হুজুর। (কান্নায় ভেঙে পড়ল)
সিরাজ : (হঠাৎ আসন ত্যাগ করে ওয়াটসের কাছে গিয়ে প্রবল কণ্ঠে) ওয়াটস!
ওয়াট্স : (ভয়ে বিবর্ণ) Your Excellency.
সিরাজ : আমার নিরীহ প্রজাটির এই দুরবস্থার জন্যে কে দায়ী?
ওয়াটস : How can I know that? Your excellency. 
সিরাজ : তুমি কী করে জানবে? তোমাদের অপকীর্তির কোনো খবর আমার কাছে পৌঁছায় না ভেবেছ? কুঠিয়াল ইংরেজরা এমনি করে দৈনিক কতগুলো নিরীহ প্রজার ওপর অত্যাচার করে তার হিসেব দাও।
ওয়াটস : আপনি আমায় অপমান করছেন ইওর এক্সিলেন্সি। দেশের কোথায় কী হচ্ছে সে কৈফিয়ত আমি দেবো কী করে? আমি তো আপনার দরবারে কোম্পানির প্রতিনিধি।
সিরাজ : তুমি প্রতিনিধি? ড্রেক এবং তোমার পরিচয় জানি না ভেবেছ? দুশ্চরিত্র এবং উচ্ছৃঙ্খলতার জন্যে দেশ থেকে নির্বাসিত না করে ভারতের বাণিজ্যের জন্য তোমাদের পাঠানো হয়েছে। তাই এদেশে বাণিজ্য করতে এসে দুর্নীতি এবং অনাচারের পথ তোমরা ত্যাগ করতে পারনি। কৈফিয়ত দাও আমার নিরীহ প্রজাদের ওপর এই জুলুমে কেনো?
ওয়াটস : আপনার প্রজাদের সঙ্গে আমাদের কী সম্পর্ক। আমরা ট্যাক্স দিয়ে শান্তিতে বাণিজ্য করি।
সিরাজ : ট্যাক্স দিয়ে বাণিজ্য কর বলে আমার নিরীহ প্রজার ওপরে অত্যাচার করবার অধিকার তোমরা পাওনি।
(সমবেত সকলকে উদ্দেশ করে)
এই লোকটি লবণ প্রস্তুতকারক। লবণের ইজারাদার কুঠিয়াল ইংরেজ। স্থানীয় লোকদের তৈরি যাবতীয় লবণ তারা তিন চার আনা মণ দরে পাইকারি হিসেবে কিনে নেয়। তারপর এখানে বসেই এখানকার লোকের কাছে সেই লবণ বিক্রি করে দুটাকা আড়াই টাকা মণ দরে।
মিরজাফর : এ তো ডাকাতি।
সিরাজ : আপনাদের পরামর্শেই আমি কোম্পানিকে লবণের ইজারাদারি দিয়েছি। আপনারা আমাকে বুঝিয়েছিলেন রাজস্বের পরিমাণ বাড়লে দেশের অর্থনৈতিক মেরুদণ্ড মজবুত হয়ে উঠবে। কিন্তু এই কি তার প্রমাণ? এই লোকটি কুঠিয়াল ইংরেজদের কাছে পাইকারি দরে লবণ বিক্রি করতে চায়নি বলে তার এই অবস্থা। বলুন শেঠজি, বলুন রাজবল্লভ, ব্যক্তিগত অর্থলালসায় বিচারবুদ্ধি হারিয়ে আমি এই কুঠিয়ালদের প্রশয় দিয়েছি কি না? বলুন সিপাহসালার, বলুন রায়দুর্লভ, আমি এই অনাচারীদের বিরুদ্ধে শাসন- শক্তি প্রয়োগ করবার সদিচ্ছা দেখিয়েছি কি-না? বিচার করুন। আপনাদের কাছে আজ আমি আমার অপরাধের বিচারপ্রার্থী।
(প্রহরী উৎপীড়িত লোকটিকে বাইরে নিয়ে গেল)
রাজবল্লভ : জাঁহাপনার বুদ্ধির তারিফ না করে পারা যায় না। কিন্তু প্রকাশ্য দরবারে এমন সুচিন্তিত পরিকল্পনায় আমাদের অপমান না করলেও চলত।
জগৎশেঠ : নবাবের কাছে আমাদের পদমর্যাদার কোনো মূল্যই নেই। তাই-
সিরাজ : আপনারাও সবাই মিলে নবাবের মর্যাদা যে কোনো মূল্যে বিক্রি করে দিতে চান, এই তো?
মিরজাফর : একথা বলে নবাব আমাদের বিরুদ্ধে ষড়যন্ত্রের অভিযোগ আনতে চাইছেন। এই অযথা দুর্ব্যবহার আমরা হৃষ্ট মনে গ্রহণ (নবাবের অপমান সহ্য করা) করতে পারব কি না সন্দেহ।
সিরাজ : বাংলার নবাবকে ভয় দেখাচ্ছেন সিপাহসালার? দরবারে বসে নবাবের সঙ্গে কী রকম আচরণ করা বিধেয় তাও আপনার স্মরণ নেই? এই মুহূর্তে আপনাকে বরখাস্ত করে সেনাবাহিনীর কর্তৃত্ব আমি নিজে গ্রহণ করতে পারি। আপনি, জগৎশেঠ, রাজবল্লভ, উমিচাঁদ সবাইকে কয়েদখানায় আটক রাখতে পারি। হ্যাঁ, কোনো দুর্বলতা নয়। শত্রুর কবল থেকে দেশকে বাঁচাতে হলে আমাকে তাই করতে হবে। মোহনলাল!
(মোহনলাল তরবারি নিষ্কাশন করল)
সিরাজ : (হাতের ইঙ্গিতে মোহনলালকে নিরস্ত করে শান্তভাবে) না, আমি তা করব না। ধৈর্য ধরে থাকব। অসংখ্য ভুল বোঝাবুঝি, অসংখ্য ছলনা এবং শাঠ্যের (প্রতারণা) ওপর আমাদের মৌলিক সম্প্রীতির ভিত্তি প্রতিষ্ঠিত। কিন্তু আজ সন্দেহেরও কোনো অবকাশ রাখব না।
মিরজাফর : আমাদের প্রতি নবাবের সন্দিগ্ধ মনোভাবের পরিবর্তন না হলে দেশের কল্যাণের কথা ভেবে আমরা উৎকণ্ঠিত হয়ে উঠব। (জীবনের শঙ্কা)
সিরাজ : ওই একটি পথ সিপাহসালার-দেশের কল্যাণ, দেশবাসীর কল্যাণ। শুধু ওই একটি পথেই আবার আমরা উভয়ে উভয়ের কাছাকাছি আসতে পারি। আমি জানতে চাই, সেই পথে আপনারা আমার সহযাত্রী হবেন কি না?
রাজবল্লভ : জাঁহাপনার উদ্দেশ্য স্পষ্ট জানা দরকার।
সিরাজ : আমার উদ্দেশ্য অস্পষ্ট নয়। কলকাতায় ওয়াটস এবং ক্লাইভ আলিনগরের সন্ধি খেলাপ করে, আমার আদেশের বিরুদ্ধে ফরাসি অধিকৃত চন্দননগর আক্রমণ করেছে। তাদের ঔদ্ধত্য বিদ্রোহের পর্যায়ে এসে দাঁড়িয়েছে। এখুনি এর প্রতিবিধান (শাস্তি দেওয়া) করতে না পারলে ওরা একদিন আমাদের রাষ্ট্রীয় মর্যাদায় হস্তক্ষেপ করবে।
মিরজাফর : জাঁহাপনা, আমাদের হুকুম করুন।
সিরাজ : আমি অন্তহীন সন্দেহ-বিদ্বেষের ঊর্ধ্বে ভরসা নিয়েই আপনাদের সামনে দাঁড়িয়েছি। তবু বলছি- আপনারা ইচ্ছে করলে আমাকে ত্যাগ করতে পারেন। বোঝা যতই দুর্বহ হোক একাই তা বইবার চেষ্টা করব। শুধু আপনাদের কাছে আমার একমাত্র অনুরোধ যে, মিথ্যে আশ্বাস দিয়ে আপনারা আমাকে বিভ্রান্ত করবেন না।
মিরজাফর : দেশের স্বার্থের জন্যে নিজেদের স্বার্থ তুচ্ছ করে আমরা নবাবের আজ্ঞাবহ হয়েই থাকব।
সিরাজ : আমি জানতাম দেশের প্রয়োজনকে আপনারা কখনো তুচ্ছ জ্ঞান করবেন না।
(সিরাজের ইঙ্গিতে প্রহরী তাঁর হাতে কোরান শরিফ দিল। সিরাজ দুহাতে সেটা নিয়ে চুমু খেয়ে বুকের সঙ্গে বুকের সঙ্গে জড়িয়ে ধরলেন। তারপর মিরজাফরের দিকে এগিয়ে দিলেন। মিরজাফর নতজানু হয়ে দুহাতে কোরান ছুঁয়ে প্রতিজ্ঞা করলেন।
মিরজাফর : আমি আল্লাহর পাক কালাম ছুঁয়ে ওয়াদা করছি, আজীবন নবাবের আজ্ঞাবহ হয়েই থাকব।
(সিরাজ প্রহরীর হাতে কোরান শরিফ সমর্পণ করলেন এবং অপর প্রহরীর হাত থেকে তামা, তুলসী, গঙ্গাজলের পাত্র গ্রহণ করলেন। তাঁর ইঙ্গিত পেয়ে একে একে রাজবল্লভ, জগৎশেঠ উমিচাঁদ উমিচাঁদ, রায়দুর্লভ নিজের নিজের প্রতিজ্ঞা উচ্চারণ করে গেলেন।)
রাজবল্লভ : আমি রাজবল্লভ, তামাতুলসী, গঙ্গাজল ছুঁয়ে ঈশ্বরের নামে শপথ করছি, আমার জীবন নবাবের কল্যাণে উৎসর্গীকৃত।
রায়দুর্লভ : ঈশ্বরের নামে প্রতিজ্ঞা করছি, সর্বশক্তি নিয়ে চিরকালের জন্যে আমি নবাবের অনুগামী।
উমিচাঁদ : রামজি কি কসম, ম্যায় কোরবান হুঁ নওয়াবকে লিয়ে। (প্রহরী গঙ্গাজলের পাত্র নিয়ে চলে গেল।)
সিরাজ : (ওয়াটসকে) ওয়াটস।
ওয়াটস : Your Excellency.
সিরাজ : আলিনগরের সন্ধির শর্ত অনুসারে কোম্পানির প্রতিনিধি হিসেবে দরবারে তোমাকে আশ্রয় দিয়েছিলাম। সেই সম্মানের অপব্যবহার করে এখানে বসে তুমি গুপ্তচরের কাজ করছ। তোমাকে সাজা না দিয়েই ছেড়ে দিচ্ছি। বেরিয়ে যাও দরবার থেকে। ক্লাইভ আর ওয়াটসকে গিয়ে সংবাদ দাও যে, তাদের আমি উপযুক্ত শিক্ষা দেব। আমার ইচ্ছের বিরুদ্ধে বেইমান নন্দকুমার ঘুষ খাইয়ে তারা চন্দননগর ধবংস করেছে। এই ঔদ্ধত্যের শাস্তি তাদের যথাযোগ্য ভাবেই দেওয়া হবে।
ওয়াটস : Your Excellency.
(কুর্নিশ করে বেরিয়ে গেল)
[দৃশ্যান্তর]

দ্বিতীয় অঙ্ক-দ্বিতীয় দৃশ্য
সময় : ১৭৫৭ সাল, ১৯এ মে। স্থান : মিরজাফরের আবাস।
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে- জগৎশেঠ, মিরজাফর, রাজবল্লভ, রাইসুল, প্রহরী।]
(মন্ত্রণাসভায় উপস্থিত, মিরজাফর, রাজবল্লভ, রাজদুর্লভ, জগৎশেঠ)

জগৎশেঠ : সিপাহসালার বড় বেশি হতাশ হয়েছেন।
মিরজাফর : না শেঠজি, হতাশ হবার প্রশ্ন নয়। আমি নিস্তব্ধ হয়েছি আগ্নেয়গিরির মতো প্রচণ্ড গর্জনে ফেটে পড়বার জন্যে (তীব্র ক্ষোভ প্রকাশ) তৈরি হচ্ছি। বুকের ভেতর আকাঙ্ক্ষার আর অধিকারের লাভা (রাজত্বের তীব্র লোভ) টগবগ করে ফুটে উঠছে ঘৃণা আর বিদ্বেষের অসহ্য উত্তাপে। এবার আমি আঘাত হানবই।
রাজবল্লভ : শুধু অপমান! প্রাণের আশঙ্কায় সে আমাদের আতঙ্কিত করে তোলেনি? পদস্থ কেউ হলে মানীর মর্যাদা বুঝত (সিরাজ তাদের সম্মান দিতে জানে না)। কিন্তু মোহনলালের মতো সামান্য একটা সিপাই যখন তলোয়ার খুলে সামনে দাঁড়াল তখন আমার চোখে কেয়ামতের ছবি ভেসে উঠেছিল।
রায়দুর্লভ : সিপাহসালারের অপমানটাই আমার বেশি বেজেছে। (মীর জাফরকে উসকানি)
মিরজাফর : এখন আপনারা সবাই আশা করি বুঝতে পারছেন যে, সিরাজ আমাদের শাস্তি দেবে না। (সিরাজের অদূরদর্শীতা)
জগৎশেঠ : তা দেবে না। চতুর্দিকে বিপদ, তা সত্ত্বেও সে আমাদের বন্দি করতে চায়। এরপর সিংহাসনে স্থির হতে পারলে তো কথাই নেই।
রাজবল্লভ : আমাদের অস্তিত্বই সে লোপ করে দেবে। আমাদের সম্বন্ধে যতটুকু সন্দেহ নবাবের বাইরের আচরণে প্রকাশ পেয়েছে, প্রকাশ পায়নি তার চেয়ে বহু গুণ বেশি। শওকতজঙ্গের ব্যাপারে নবাব আমাদের কিছুই জিজ্ঞাসা করিনি। শুধু মোহনলালের অধীনে সৈন্য পাঠিয়ে তাকে বিনাশ করেছে। এতে আমাদের নিশ্চিত হবার কিছুই নেই।
জগৎশেঠ : তার প্রমাণ তো রয়েছে হাতের কাছে। আমাদের গ্রেফতার করতে গিয়েও করেনি। কিন্তু রাজা মানিকচাঁদকে তো ছাড়ল না। তাকে কয়েদখানায় যেতে হলো। শেষ পর্যন্ত দশ লক্ষ টাকা খেসারত দিয়ে তবে তার মুক্তি। আমি দেখতে পাচ্ছি নন্দকুমারের অদৃষ্টেও বিপদ ঘনিয়ে এসেছে।
মিরজাফর : আমাদের কারও অদৃষ্ট মেঘমুক্ত থাকবে না শেঠজি। (বিপদ কেটে যাবে)
রাজবল্লভ : আমি ভাবছি তেমন দুঃসময় যদি আসে, আর মূল্য দিয়ে মুক্তি কিনবার পথটাও যদি খোলা থাকে, তা হলেও সে মূল্যের পরিমাণ এত বিপুল হবে যে আমরা তা বইতে পারব কিনা সন্দেহ। মানিকচাঁদের মুক্তিমূল্য পঞ্চাশ কোটি টাকার কম হবে না।
জগৎশেঠ : ওরে বাবা! তার চেয়ে গলায় পা দিয়ে বুকের ভেতর থেকে কলজেটাই টেনে বার করে আনুক। পঞ্চাশ কোটি? আমার যাবতীয় সম্পত্তি বিক্রি করলেও এক কোটি টাকা হবে না। ধরতে গেলে মাসের খরচটাই তো ওঠে না। নবাবের হাত থেকে ধন-সম্পত্তি রক্ষার জন্যে মাসে মাসে অজস্র টাকা খরচ করে সেনাপতি ইয়ার লুৎফ খাঁয়ের অধীনে দুহাজার অশ্বারোহী পুষতে হচ্ছে। (নবাব যেন তার অবৈধ সম্পত্তির কথা না জানে)
মিরজাফর : কাজেই আর কালক্ষেপ নয়।
রাজবল্লভ : আমরা প্রস্তুত। কর্মপন্থা আপনিই নির্দেশ করুন। আমরা একবাক্যে আপনাকেই নেতৃত্ব দিলাম।
মিরজাফর : আমার ওপরে আপনাদের আন্তরিক ভরসা আছে তা আমি জানি। তবু আজ একটা বিষয় খোলাসা করে নেওয়া উচিত। আজ আমরা সবাই সন্দেহ-দোলায় দুলছি। কেউ কাউকে বিশ্বাস করতে পারছিনে। তাই আমাদের সিদ্ধান্ত কাগজে-কলমে পাকাপাকি করে নেওয়াই আমার প্রস্তাব।
জগৎশেঠ : আমার তাতে কোনো আপত্তি নেই।
রায়দুর্লভ : এতে আপত্তির কি থাকতে পারে?
(নেপথ্যে কণ্ঠস্বর)
নেপথ্যে (দরজা দিয়ে কেউ ঢুকছে) : ওরে বাবা কতবার দেখতে হবে? দেউড়ি থেকে আরম্ভ করে এ পর্যন্ত মোট একুশবার দেখিয়েছি। এই দেখ বাবা, আর একটিবার দেখ। হলো তো?
(রাইসুল জুহালা কামরায় ঢুকল)
কী গেরোরে বাবা। (কী বিপদ)
মিরজাফর : কী হয়েছে?
রাইস : সালাম হুজুর। ওই পাহারাওয়ালা হুজুর। সবাই হাত বাড়িয়ে আঙুল নাচিয়ে বলে, দেখলাও। দেরি করলে তলোয়ারে হাত দেয়। আমি বলি, আছে বাবা, আছে। খোদ নবাবের পাঞ্জা- (অনুমতিপত্র)
মিরজাফর : (সন্ত্রস্ত) নবাবের পাঞ্জা?
রাইস : আলবত হুজুর। কেন নয়? (আবার কুর্নিশ করে) হুজুরের নবাব হতে আর বাকি কি?
মিরজাফর : (প্রসন্ন হাসি হেসে) সে যাক! খবর কী তাই বলো!
রাইস : প্রায় শেষ খবর নিয়ে এসেছিলাম (মৃত্যুর সংবাদ) হুজুর। তলোয়ারের খাড়া এক কোপ। একেবারে গর্দান সমেত-
রাজবল্লভ : (বিরক্ত) আবোল তাবোল বকে বড় বেশি সময় নষ্ট করছ রাইস মিয়া।
রাইস : (ক্ষুদ্ধ) আবোল তাবোল কি হুজুর, বলছি তো তলোয়ারের খাড়া এক কোপ। লাফিয়ে সরে দাঁড়িয়ে তাই রক্ষে। তবু এই দেখুন (পকেট থেকে দ্বিখণ্ডিত মূলার নিম্নাংশ বার করল।) একটু নুন জোগাড় হলেই কাঁচা খাব বলে মুলোটা হাতে নিয়েই ঘুরছিলাম। ক্লাইভ সাহেবের তলোয়ারের কোপে সেটাই দুখ-।
জগৎশেঠ : এ যে দেখি ব্যাপারটা ক্রমশ ঘোরালো করে তুলছে। ক্লাইভ সাহেব তোমাকে তলোয়ারের কোপ মারতে গেল কেন?
রাইস : গেরো হুজুর। কপালের গেরো। উমিচাঁদজির চিঠি নিয়ে তাঁর কাছে গেলাম। তিনি চিঠি না পড়ে কটমট করে আমার দিকে চাইতে লাগলেন। তারপর ওঁর কামানের মতো গলা দিয়ে একতাল কথার গোলা ছুটে বার হলো: Are you a spy? এবং সঙ্গে সঙ্গে ওই প্রশ্নই বাংলায়-তুমি গুপ্তচর? এমন এক অদ্ভুত উচ্চরণ করলেন, আমি শুনলাম তুমি ঘুফুৎচোর? চোর কথাটা শুনেই মাথা গরম হয়ে উঠল। তা ছাড়া ঘুফুৎচোর? গামছা চোর বদনা চোর, জুতো চোর, গরু চোর, সিঁধেল চোর, কাফন চোর আমাদের আপনাদের ভেতরে হুজুর কত রকমারি চোরের নাম যে শুনেছি আর তাদের চেহারা চিনেছি তার আর হিসাব নেই। কিন্তু ঘুফুৎচোর আর আমি স্বয়ং। হিতাহিত বিচার না করেই হুজুর মুখের ওপরেই বলে ফেললাম, -(মৃদু হাসি) একটু ইংরেজিও তো জানি, ইংরেজিতেই বললাম, ইউ শাট আপ। সঙ্গে সঙ্গে তলোয়ারের এক কোপ। (হেসে উঠে) অহংকার করব না হুজুর, লাফটা যা দিয়েছিলাম একবারে মাপা। তাই আমার গর্দানের বদলে ক্লাইভ সাহেবের ভাগ্যে জুটছে মুলোর মাথাটা।
মিরজাফর : কথা থামাবে রাইস মিয়া।
রাইস : হুজুর।
মিরজাফর : এখন তুমি কার কাছ থেকে আসছ?
রাইস : উমিচাঁদজির কাছ থেকে। এই যে চিঠি। (পত্র দিল)
মিরজাফর : (পত্র পড়ে রাজবল্লভের দিকে এগিয়ে দিলেন) ক্লাইভ সাহেবের ওখানে কাকে দেখলে?
রাইস : অনেকগুলো সাহেব মেমসাহেব হুজুর। ভূত ভূত চেহারা সব। (অত্যধিক ফর্সা)
মিরজাফর : কারো নাম জানো না?
রাইস : সবতো বিদেশি নাম। এদেশি হলে পুরুষগুলো বলা যেত- বেম্মোদত্যি, জটাধারী, মামদো, পেঁচো, চোয়ালে পেঁচো, গলায় দড়ে, এক ঠেংগে, কন্দকাটা ইত্যাদি। মেয়েগুলোকে বলতে পারতাম; শাঁকচুন্নি, উলকামুখী, আঁষটেপেতি, কানি পিশাচি এই সব আর কি।
জগৎশেঠ : রাইস মিয়ার মুখে কথার খই ফুটছে।
রাইস : রাত-বেরাতে চলাফেরা করি ভূত পেত্নীর সঙ্গেও যোগ রাখতে হয় হুজুর। (চিঠিখানা রাজবল্লভ, জগৎশেঠ এবং রায়দুর্লভের হাত ঘুরে আবার মিরাজফরের হাতে এল)
মিরজাফর : একে তাহলে বিদায় দেওয়া যাক?
রাজবল্লভ : চিঠির জবাব দেবেন না? (রাইস এই জবাব সিরাজের কাছে দিবে)
মিরজাফর : চিঠিপত্র যত কম দেওয়া যায় ততই ভালো কে জানে কোথায় সিরাজের গুপ্তচর ওৎ পেতে বসে আছে।
জগৎশেঠ : তাছাড়া আমাদের গুপ্তচরদেরই বা বিশ্বাস কী? তারা মূল চিঠি হয়ত আসল জায়গায় পৌঁছচ্ছে; কিন্তু একখানা করে তার নকল যথা সময়ে নবাবের লোকের হাতে পাচার করে দিচ্ছে।
রাইস : সন্দেহ করাটা অবশ্য বুদ্ধিমানের কাজ; কিন্তু বেশি সন্দেহে বুদ্ধি ঘুলিয়ে যেতে পারে। একটা কথা মনে রাখবেন হুজুর, গুপ্তচররাও যথেষ্ট দায়িত্ব নিয়ে কাজ করে। তাদের বিপদের ঝুঁকিও কম নয়।
জগৎশেঠ : কিছু মনে করো না। তোমার সম্বন্ধে কোনো মন্তব্য করিনি।
মিরজাফর : তুমি তাহলে এখন এস। উমিচাঁদজিকে আমার এই সাংকেতিক মোহরটা দিও। তাহলেই তিনি তোমার কথা বিশ্বাস করবেন। তাঁকে বলো দুনম্বর জায়গায় আগামী মাসের ৮ তারিখে সব কিছু লেখাপড়া হবে।
রাইস : হুজুর। (সাংকেতিক মোহরটা নিয়ে বেরিয়ে গেল)
মিরজাফর : রাইসুল জুহালা খুবই চালাক। সে উমিচাঁদের বিশ্বাসী লোক। ওর সামনে শেঠজির ওকথা বলা ঠিক হয়নি।
জগৎশেঠ : আমি শুধু বলেছি কি হতে পারে।
মিরজাফর : কত কিছুই হতে পারে শেঠজি। আমরাই কি দিনকে রাত করে তুলছিনে (পরিস্থিতি ঘোলাটে করা)? নবাবের মির মুন্সি আসল চিঠি গায়েব করে নকল চিঠি পাঠাচ্ছে কোম্পানির কাছে। তাতেই তো ওদের এত সহজে ক্ষেপিয়ে দেওয়া সম্ভব হয়েছে। বুদ্ধিটা অবশ্য রাজবল্লভের। কিন্তু ভাবুন তো কতখানি দায়িত্ব এবং বিপদের ঝুঁকি নিয়ে কাজ করছে নবাবের বিশ্বাসী মির মুন্সি।
জগৎশেঠ : তা তো বটেই। গুপ্তচরের সহায়তা ছাড়া আমরা এক পাও এগোতে পারতাম না।
মিরজাফর : প্রস্তুতি প্রায় শেষ হয়ে এসেছে। এখন আমি ভাবছি ইংরেজদের ওপরে পুরোপুরি নির্ভর করা যাবে কি না? (ইংরেজদের প্রতি অবিশ্বাস)
রাজবল্লভ : তাতে কোনো সন্দেহ নেই। ওরা বেনিয়ার (ব্যবসায়ী) জাত। পয়সা ছাড়া কিছু বোঝে না। ওরা জানে সিরাজউদ্দৌলার কাছ থেকে কোনো রকম সুবিধার আশা নেই। কাজেই সিপাহসালারকে ওরা সাহায্য দেবে নগদ মূল্যের বিনিময়ে।
জগৎশেঠ : অবশ্য টাকা ছাড়া। কারণ সিরাজকে গদিচ্যুত করা ওদের প্রয়োজন হলেও সিপাহসালারকে সিংহাসনে বসবার জন্যে ওরা সব রকমের সাহায্য দেবে।
রাজবল্লভ : সেটাও একটা সমস্যা হয়ে দাঁড়াবে কি না তা তো বুঝতে পারছিনে। আমি যতদূর শুনেছি ওদের দাবি দুকোটি টাকার ওপরে যাবে। কিন্তু এত টাকা সিরাজউদ্দৌলার তহবিল থেকে কোনোক্রমেই পাওয়া যাবে না।
মিরজাফর : আমরা অনেক দূর এগিয়ে এসেছি রাজা রাজবল্লভ। ও কথা আর এখন ভাবলে চলবে না। সকলের স্বার্থের খাতিরে ক্লাইভের দাবি মেটাবার যা হোক একটা ব্যবস্থা করতেই হবে। (বিভোর কণ্ঠে) সফল করতে হবে আমার স্বপ্ন। বাংলার মসনদ-নবাব আলিবর্দীর আমলে, উদ্ধত সিরাজের আমলে মসনদের পাশে অবনত মস্তকে দাঁড়িয়ে আমি এই কথাই শুধু ভেবেছি, একটা দিন, মাত্র একটা দিনও যদি ওই মসনদে মাথা উঁচু করে আমি বসতে পারতাম।
[দৃশ্যান্তর]

দ্বিতীয় অঙ্ক-তৃতীয় দৃশ্য
সময় : ১৭৫৭ সাল, ৯ই জুন।
স্থান : মিরনের আবাস।
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে-নর্তকীগণ, বাদকগণ, মিরন, পরিচারিকা, রায়দুর্লভ, জগৎশেঠ, রাজবল্লভ, মিরজাফর, ওয়াটস, ক্লাইভ, রক্ষী, মোহনলাল।]
(ফরাসে তাকিয়া ঠেস দিয়ে অর্ধশায়িত মিরন। পার্শ্বে উপবিষ্টা নর্তকীর হাতে ডান হাত সমর্পিত। অপর নর্তকী নৃত্যরতা। নৃত্যের মাঝে মাঝে সুরামত্ত মিরনের উল্লাসধ্বনি।)

মিরন : সাবাস। বহুত খুব। তোমরা আছ বলেই (নর্তকীদের ‍নৃত্য দেখে) বেঁচে থাকতে ভালো লাগে।
(নর্তকী নাচের ফাঁকে এক টুকরো হাসি ছুঁড়ে দিল মিরনের দিকে। পরিচারিকা কামরায় এসে চিঠি দিল মিরনের হাতে। সেটা পড়ে বিরক্ত হলো মিরন। তবু পরিচারিকাকে সম্মতিসূচক ইঙ্গিত করতেই সে বেরিয়ে গেল। পার্শ্বে উপবিষ্টা নর্তকী মিরনের ইঙ্গিতে কামরার অন্যদিকে চলে গেল। অল্প পরেই ছদ্মবেশধারী এক ব্যক্তিকে কামরায় পৌঁছিয়ে দিয়ে পরিচারিকা চলে গেল।)

মিরন : সেনাপতি রায়দুর্লভ এ সময়ে এখানে আসবেন তা ভাবিনি।
(নর্তকীদের চলে যেতে ইঙ্গিত করল)
রাযদুর্লভ : আমাকে আপনি নৃত্যগীতের সুধারসে একেবারে নিরাসক্ত বলেই ধরে নিয়েছেন।
মিরন : তা নয়, তবে আপনি যখন ছদ্মবেশে হঠাৎ এখানে উপস্থিত হয়েছেন তখনি বুঝেছি প্রয়োজন জরুরি। তাই সময় নষ্ট করতে চাইলুম না।
রায়দুর্লভ : দুদণ্ড সময় নষ্ট করে একটু আমোদ-প্রমোদই না হয় হতো। অহরহ অশান্তি আর অব্যবস্থার মধ্য থেকে জীবন বিস্বাদ হয়ে উঠেছে। কিন্তু (একজনকে দেখিয়ে) এ নর্তকীকে আপনি পেলেন কোথায়? একে যেন এর আগে দেখেছি বলে মনে হচ্ছে। সে যাক। হঠাৎ আপনার এখানে বৈঠকের আয়োজন? তাও খবর পেলাম কিছুক্ষণ আগে।
মিরন : আমার এখানে না করে উপায় কি? মোহনলালের গুপ্তচর জীবনে অসম্ভব করে তুলেছে। আমার বাসগৃহ অনেকটা নিরাপদ। কারণ মোহনলাল জানে যে আমি নাচ-গানে মশগুল থাকতেই ভালোবাসি।
রায়দুর্লভ : কে কে আসছেন এখানে?
মিরন : প্রয়োজনীয় সবাই। তাছাড়া বাইরে থেকে বিশেষ অতিথি হিসেবে আসবেন কোম্পানির প্রতিনিধি কেউ একজন।
রায়দুর্লভ : কোম্পানির প্রতিনিধি কলকাতা থেকে এখানে আসছেন?
মিরন : তিনি আসবেন কাশিমবাজার থেকে।
রায়দুর্লভ : সে যা হোক। আলোচনায় আমি থাকতে পারব না। কারণ আমার পক্ষে বেশিক্ষণ বাইরে থাকা নিরাপদ নয়। কখন কি কাজে নবাব তলব করে বসবেন তার ঠিক নেই। তলবের সঙ্গে সঙ্গে হাজির না পেলে তখুনি সন্দেহ জমে উঠবে। আপনার কাছে তাই আগেভাগে এলাম শুধু আমার সম্বন্ধে কী ব্যবস্থা হলো জানবার জন্যে।
মিরন : আপনার ব্যবস্থা তো পাকা। সিরাজের পতন হলে আব্বা হবেন মসনদের মালিক। কাজেই সিপাহসালারের পদ আপনার জন্যে একেবারে নির্দিষ্ট।
রায়দুর্লভ : আমার দাবিও তাই। তবে আর একটা কথা। চারিদিককার অবস্থা দেখে যদি বুঝি যে, আপনাদের সাফল্যের কোনো আশা নেই, তাহলে কিন্তু আমার সহায়তা আপনারা আশা করবেন না? (প্রয়োজনে গা বাঁচিয়ে চলা)
মিরন : (ঈষৎ বিস্মিত) কি ব্যাপার? আপনাকে যেন কিছুটা আতঙ্কিত মনে হচ্ছে।
রায়দুর্লভ : আতঙ্কিত নই। কিন্তু দ্বিধাগ্রস্ত হওয়াটা অস্বাভাবিক নয়। চারিদিকে শুধু অবিশ্বাস আর ষড়যন্ত্র। এর ভেতরে কর্তব্য স্থির (সিদ্ধান্ত ঠিক রাখা) করাই দায় হয়ে উঠেছে।
(পরিচারিকার প্রবেশ)
পরিচারিকা : মেহমান।
রায়দুর্লভ : আমি সরে পড়ি।
মিরন : বসেই যান না। মেহমানরা এসে পড়েছেন। কিছুক্ষণের ভেতরেই বৈঠক শুরু হয়ে যাবে।
রায়দুর্লভ : না। আমার কেমন যেন অস্বস্তি লাগছে। আমি পালাই। কিন্তু আমার সঙ্গে যে ওয়াদা তার যেন খেলাপ না হয়। (প্রস্থান)
(পরিচারিকাকে ইঙ্গিত করে মিরন কিছুটা প্রস্তুত হয়ে বসল। মিরন সমাদর করে তাদের বসাল।)
মিরন : একটু আগে রায়দুর্লভ এসেছিলেন ব্যক্তিগত কারণে তিনি আলোচনায় থাকতে পারবেন না বললেন। কিন্তু তাঁর দাবির কথাটা আমার কাছে তিনি খোলাখুলিই জানিয়ে গেছেন।
জগৎশেঠ : তাঁকে প্রধান সেনাপতির পদ দিতে হবে এই তো?
রায়বল্লভ : সবাই উচ্চাভিলাষী। সবাই সুযোগ খুঁজছে। তা না হলে রায়দুর্লভ মাসে মাসে আমার কাছ থেকে যে বেতন পাচ্ছে তাতেই তার স্বর্গ পাবার কথা।
মিরজাফর : ও সব কথা থাক রাজা। সবাই একজোটে কাজ করতে হবে। সকলের দাবিই মানতে হবে। রায়দুর্লভ ক্ষুদ্র শক্তিধর। তার সাহায্যেই আমরা জিতব এমন কথা নয়। কিন্তু প্রয়োজনীয় মুহূর্তে নবাবের সঙ্গে তার বিশ্বাসঘাতকতার গুরুত্ব আছে বৈ কি!
(পরিচারিকার প্রবেশ)
পরিচারিকা : জানানা সওয়ারি। (মহিলা সওয়ারি)
(সবাই একটু বিব্রত হয়ে পড়ল। মিরজাফর হঠাৎ পকেট থেকে কয়েক টুকরো কাগজ বের করে তাতে মন দিলেন। মিরন লজ্জিত। হঠাৎ আত্মসংবরণ করে ধমকে উঠল)
মিরন : ভাগো হিঁয়াসে, কমবখৎ।
(পরিচারিকার দ্রুত প্রস্থান)
রাজবল্লভ : (ইঙ্গিতপূর্ণ হাসি হেসে) চট করে দেখে এস। আত্মীয়রাই কেউ হবে হয়তো।
(সুযোগটুকু পেয়ে মিরন তৎক্ষণাৎ বেরিয়ে গেল। অভাবিত পরিবেশ এড়াবার জন্যে জগৎশেঠ নতুন প্রসঙ্গের অবতারণা করলেন)
জগৎশেঠ : (হঠাৎ যেন পরিবেশের খেই ধরতে পেরেছেন) আরে বাপরে একেবারে কালকেউটে (উমিচাঁদ)। তার দাবিই তো সকলের আগে। তা না হলে দণ্ড না পেরোতেই সমস্ত খবর পৌঁছে যাবে নবাবের দরবারে। মনে হয় কলকাতায় বসেই সে চুক্তিতে স্বাক্ষর দেবে।
(দুজন মহিলাসহ উল্লসিত মিরন কামরায় ঢুকলো)
মিরন : এঁরাই জানানা সওয়ারি।
(রমণীর ছদ্মবেশ ত্যাগ করলেন ওয়াটস এবং ক্লাইভ। মিরন বেরিয়ে গেল)
ওয়াটস : Sorry to disappointe you gentlemen. (প্রত্যাশিত নারী না দেখায়)। Are you surprised? 
ইনি রবার্ট ক্লাইভ।
মিরজাফর : (সসম্ভ্রমে উঠে দাঁড়িয়ে) কর্নেল ক্লাইভ?
ক্লাইভ : Are you surprised? অবাক হলেন?
মিরজাফর : অবাক হবারই কথা। এ সময়ে এভাবে এখানে আসা খুবই বিপজ্জনক।
ক্লাইভ : বিপদ? কার বিপদ জাফর আলি খান? আপনার না আমার?
মিরজাফর : দুজনেরই। তবে আপনার কিছুটা বেশি।
ক্লাইভ : আমার কোনো বিপদ নেই। তা ছাড়া বিপদ ঘটাবে কে?
জগৎশেঠ : নবাবের গুপ্তচরের হাতে তো পড়নি?
ক্লাইভ : নবাবকে আমার কোনো ভয় নেই। কারণ সে আমাদের কিছুই করতে পারবে না।
রাজবল্লভ : কেন পারবে না? গাল ফুলিয়ে বড় বড় কথা বললেই সব হয়ে গেল নাকি! তুমি এখানে একা এসেছ। তোমাকে ধরে বস্তাবন্দি হুলো-বেড়ালের মতো পানাপুকুরে দুচারটে চুবনি দিতে বাদশাহের ফরমান জোগাড় করতে হবে নাকি?
ক্লাইভ : I do not understand your hulu business, But I am sure Nabab can cause no harm to us. 
জগৎশেঠ : ভগবানের দিব্যি কর্নেল সাহেব, তোমরা বড় বেহায়া। এই সেদিন কলকাতায় যা মার খেয়েছো এখনো তার ব্যাথা ভোলার কথা নয় এরি ভেতরে-
ক্লাইভ : দেখো শেঠজি, এক আধবার অমন হয়েই থাকে। তা ছাড়া রবাট ক্লাইভের সঙ্গে এখনো যুদ্ধ হয়নি। যখন হবে তখন তোমরাই তার ফল দেখবে।
রাজবল্লভ : সেটা দেখবার আগেই গলাবাজি করছ কেন?
ক্লাইভ : এই জন্যে যে নবাবের কোনো ক্ষমতা নেই। যার প্রধান সেনাপতি বিশ্বাসঘাতক, যার খাজাঞ্চি, দেওয়ান, আমির, ওমরাহ সবাই প্রতারক তার কোনো ক্ষমতা থাকতে পারে না। তবে হ্যাঁ, আপনারা ইচ্ছা করলে আমাদের ক্ষতি করতে পারেন।
রাজবল্লভ : আমরা?
ক্লাইভ : হোয়াই নট? আপনারা সব পারেন। আজ নবাবকে ডোবাচ্ছেন, কাল আমাদের পথে বসাবেন না তা কি বিশ্বাস করা যায়? আমি বরং নবাবকে বিশ্বাস করতে পারি, কিন্তু- (ষড়যন্ত্রকারীকে কেউ বিশ্বাস করে না)
মিরজাফর : এইসব কথার জন্যেই আমরা এখানে হাজির হয়েছি নাকি?
ক্লাইভ : সরি, মিস্টার জাফর আলি খান। হ্যাঁ, একটা জরুরি কথা আগেই সেরে নেওয়া যাক। উমিচাঁদ এ যুগের সেরা বিশ্বাসঘাতক। আমাদের প্ল্যানের কথা সে নবাবকে জানিয়ে দিয়েছে। কলকাতা অ্যাটাকের সময়ে তার যা ক্ষতি হয়েছিল নবাব তা কমপেনসেট (ক্ষতিপূরণ) করতে চেয়েছেন। স্ক্রাউন্ডেলটা আবার এক নতুন অফার নিয়ে আমাদের কাছে এসেছে।
মিরজাফর : আমি শুনেছি সে আরও ত্রিশ লক্ষ টাকা চায়।
ক্লাইভ : এবং তাকে অত টাকা দেবার মতো পজিশন আমাদের নয়। থাকলেও আমরা তা দেবো না। কেন দেবো? হোয়াই? থার্টি লাকস অফ রুপিস ইজ নো জোক।
রাজবল্লভ : কিন্তু উমিচাঁদ যে রকম ধড়িবাজ তাতে সে হয়ত অন্যরকম কিছু ষড়যন্ত্র করতে পারে। আমাদের যাবতীয় গুপ্ত খবর তার জানা।
ক্লাইভ : ডোনট ওরি, রাজা! উমিচাঁদ অনেক বুদ্ধি রাখে। বাট ক্লাইভ ইজ নো লেস। আমি উমিচাঁদকে ঠকাবার ব্যবস্থা করেছি।
মিরজাফর : কী রকম?
ক্লাইভ : দুটো দলিল হবে। আসল দলিলে উমিচাঁদের কোনো রেফারেন্স থাকবে না। নকল দলিলে লেখা থাকবে যে নবাব হেরে গেলে কোম্পানি উমিচাঁদকে ত্রিশ লক্ষ টাকা দেবে।
রাজবল্লভ : কিন্তু সে যদি কোনো রকমে এ কথা জানতে পারে?
ক্লাইভ : আপনারা না জানালে জানবে না। আর জানলে কারও বুঝতে বাকি থাকবে না যে, আপনারাই তা জানিয়েছেন।
জগৎশেঠ : আমাদের সম্বন্ধে আপনারা নিশ্চিত থাকতে পারেন।
মিরজাফর : দলিল সই করবে কে?
ক্লাইভ : কমিটির সকলেই করেছেন। এখানে আপনি সই করবেন এবং রাজা রাজবল্লভ ও জগৎশেঠ থাকবেন উইটনেস। নকল দলিলটায় অ্যাডমিরাল ওয়াটসন সই করতে রাজি হননি।
মিরজাফর : উমিচাঁদ মানবে কেন তাহলে?
ক্লাইভ : সে ব্যবস্থা হয়েছে। ওয়াটসনের সই জাল করে দিয়েছে লুসিংটন।
জগৎশেঠ : তাহলে আর দেরি কেন? আমাদের আবার এক জায়গায় বেশিক্ষণ থাকা নিরাপদ নয়।
ক্লাইভ : অফকোরস। দলিল দুটোই তৈরি আছে। শুধু সই হয়ে গেলেই কাজ মিটে যায়।
(দলিলের কপি মিরজাফরের দিকে এগিয়ে দিল)
মিরজাফর : একটু পড়ে দেখব না?
ক্লাইভ : ড্রাফট (খসড়া) তো আগেই পড়েছেন।
রাজবল্লভ : তাহলেও একবার পড়ে দেখা দরকার।
ক্লাইভ : ইফ ইউ ওয়ান্ট গো অ্যাহেড। পড়ে দেখুন উমিচাঁদের মতো আপনাদেরও ঠকানো হয়েছে কি না। (দলিলটা রাজবল্লভের দিকে এগিয়ে দিয়ে) নিন রাজা আপনিই পড়ুন।
রাজবল্লভ : (পড়তে পড়তে) যুদ্ধে সিরাজউদ্দৌলার পতন হলে কোম্পানি পাবেন এক কোটি টাকা, কলকাতার বাসিন্দারা ক্ষতিপূরণ বাবদ পাবেন সত্তর লক্ষ টাকা, ক্লাইভ সাহেব পাবেন দশ লক্ষ টাকা, অ্যাডমিরাল ওয়াটসন পাবেন-
মিরজাফর : এগুলো দেখে আর লাভ কি?
রাজবল্লভ : এখন আর কিছু লাভ নেই, কিন্তু ভাবছি নবাবের তহবিল দুবার করে লুট করলেও তিন কোটি টাকা পাওয়া যাবে কিনা।
মিরজাফর : বড় দেরি হয়ে যাচ্ছে। আসুন দস্তখত দিয়ে কাজ শেষ করে ফেলি।
রাজবল্লভ : এই দলিল অনুসারে সিপাহসালার শুধু মসনদে বসবেন কিন্তু রাজ্য চালাবেন কোম্পানি। (বাঁদরের রুটি ভাগ)
ক্লাইভ : (বিরক্ত) ইউ আর থিংকিং লাইক এ ফুল। আমরা কেন রাজ্য চালাবে।
আমরা শুধু ব্যবসা-বাণিজ্য করবার প্রিভিলেজটুকু সিকিউরড করে নিচ্ছি। তা আমাদের করতেই হবে।
জগৎশেঠ : আপনাদের স্বার্থ রক্ষা করুন। কিন্তু দেশের শাসন ক্ষমতায়, আপনাদের হাত দেবেন এ তো ভালো কথা নয়।
ক্লাইভ : (রীতিমতো ক্রুদ্ধ) দেন হোয়াট ইউ আর গোয়িং টু ডু অ্যাবাউট ইট? দলিল দুটো তাহলে ফিরিয়ে নিয়ে যাই। আপনাদের শর্তাদি জানিয়ে দেবেন। সেইভাবে আবার একটা খসড়া তৈরি করা যাবে।
মিরজাফর : না না, সেকি কথা? এমনিতেই বাজারে নানারকম গুজব ছড়িয়ে পড়েছে। কোনদিন সিরাজউদ্দৌলা সবাইকে গারদে পুরে দেবে তার ঠিক নেই। দিন, আমি দলিল সই করে দিই। শুভকাজে অযথা বিলম্ব করা বুদ্ধিমানের কাজ নয়।
(রাজবল্লভের হাত থেকে দলিল নিয়ে সই করতে বসল। কিন্তু একটু ইতস্তত করে-)
মিরজাফর : বুকের ভেতর হঠাৎ যেন কেঁপে উঠল। বাইরে কোথাও মড়াকান্না শুনতে পাচ্ছেন শেঠজি? (দেশের প্রতি ক্ষুদ্র মমতা)
মিরজাফর : আমি যেন শুনলাম।
ক্লাইভ : (উচ্চহাসি) বিদ্রোহী সেনাপতি, অথচ সো কাউয়ার্ড।
রাজবল্লভ : নানা প্রকারের দুশ্চিন্তায় আপনার শরীর মন দুর্বল হয়ে পড়েছে। ও কিছু নয়।
মিরজাফর : তাই হয়তো।
(কলম নিয়ে স্বাক্ষর দিতে গিয়ে আবার ইতস্তত করল)
মিরজাফর : কিন্তু রাজবল্লভ যেমন বললেন, সবাই মিলে সত্যিই আমরা বাংলাকে বিক্রি করে দিচ্ছি না তো?
ক্লাইভ : ওহ্ হোয়াট ননসেন্স! আমি জানতাম কাউয়ার্ডদের ওপর কোনো কাজের জন্যেই ভরসা করা যায় না। তাই বিপদের ঝুঁকি নিয়ে দলিল সই করাতে নিজেই এসেছি। একা ওয়াটসকে পাঠিয়ে নিশ্চিত থাকতে পারিনি। এখন দেখছি আমার অনুমান অক্ষরে অক্ষরে সত্যি। (মিরজাফরকে) আরে বাংলা আপনাদেরই থাকবে। রাজা হয়ে আমরা কী করব? আমরা চাই টাকা। আপনাদের কোনো ভয় নেই। ইউ আর স্যাক্রিফাইসিং দ্যা নবাব অ্যান্ড নট দ্যা কান্ট্রি, দেশের জন্যে দেশের নবাবকে আপনারা সরিয়ে দিচ্ছেন। কারণ, সে অত্যাচারী। সে থাকলে দেশের কল্যাণ হবে না।
মিরজাফর : আপনি ঠিক বলেছেন। আমরা নবাবকে সরিয়ে দিচ্ছি। সে আমাদের সম্মান দেয় না। (দলিলে সই করল। নেপথ্যে করুণ সংগীত চলতে থাকবে। জগৎশেঠ এবং রাজবল্লভও সই করল।)
ক্লাইভ : দ্যাটস অল রাইট। (দলিল ভাঁজ করতে করতে) আমরা এমন কিছু করলাম যা ইতিহাস হবে। ইউ হ্যাভ ডান এ গ্রেট থিং-এ গ্রেড থিং। (ক্লাইভ এবং ওয়াটস আবার নারীর ছদ্মবেশ নিল, তারপর সবাই বেরিয়ে গেল। অন্যদিক দিয়ে মিরনের প্রবেশ।)
মিরন : হা হা হা। আর দেরি নেই।
(হাততালি দিতেই পরিচারিকার প্রবেশ) আগামীকাল যুদ্ধ। জানিস আগামী পরশু কী হবে? আগামী পরশু আমি শাহজাদা মিরন। শাহজাদা হা হা হা। তারপর একদিন বাংলার নবাব। (দ্রুত জনৈক রক্ষীর প্রবেশ)
রক্ষী : হুজুর, সেনাপতি মোহনলাল।
মিরন : (আতঙ্কিত) মোহনলাল।
মোহনলাল : শুনলাম আজ এখানে ভারী জলসা হবে। বহু গণ্যমান্য লোক উপস্থিত আছে। তাই খোঁজ নিতে এলাম।
মিরন : সেনাপতি মোহনলাল, আপনার দুঃসাহসের সীমা নেই। আমার প্রাসাদে কার অনুমতিতে আপনি প্রবেশ করেছেন?
মোহনলাল : প্রয়োজন মতো যে কোনো জায়গায় যাবার অনুমতি আমার আছে। সত্য বলুন এখানে গুপ্ত ষড়যন্ত্র হচ্ছিল কি না?
মিরন : মিথ্যা অপবাদ দিচ্ছেন সেনাপতি। জানেন এর ফল কী ভয়ানক হতে পারে? নবাবের সঙ্গে আব্বার সমস্ত গোলমাল সেদিন প্রকাশ্যে মিটমাট হয়ে গেল? নবাব তাঁকে বিশ্বাস করে সৈন্য পরিচালনার ভার দিয়েছেন। আর আপনি এসেছেন আমাদের বিরুদ্ধে ষড়যন্ত্রের অপবাদ নিয়ে। আমি এখুনি আব্বাকে নিয়ে নবাবের প্রাসাদে যাব। (উঠে দাঁড়াল) এই অপমানের বিচার হওয়া দরকার।
মোহনলাল : প্রতারণার চেষ্টা করবেন না। (তরবারি কোষমুক্ত করল) আমার গুপ্তচর ভুল সংবাদ দেয় না। সত্য বলুন, কী হচ্ছিল এখানে? কে কে ছিল মন্ত্রণাসভায়?
মিরন : মন্ত্রণাসভা হচ্ছিল কিনা, এবং হলে কোথায় হচ্ছিল আমি তার কিছুই জানিনে। ওসব বাজে জিনিসে সময় কাটানো আমার স্বভাব নয়। (পরিচারিকাকে ডেকে মিরন কিছু ইঙ্গিত করল) যখন না-ছোড় হয়েছেন তখন বেয়াদবি না করে আর উপায় কি?
(নর্তকীর প্রবেশ)
এখানে কী হচ্ছিল আশা করি সেনাপতি বুঝতে পেরেছেন?
(একটি মালা নিয়ে নাচের ভঙ্গিতে দুলতে দুলতে নর্তকী মোহনলালের দিকে এগিয়ে গেল। মোহনলাল তরবারির অগ্রভাগ দিয়ে মালাটি গ্রহণ করে শূন্যে ছুড়ে দিয়ে তরবারির দ্বিতীয় আঘাতে শূন্যেই তা দ্বিখণ্ডিত করে কামরা থেকে বেরিয়ে গেল)
মিরন : মূর্তিমান বেরসিক হা হা হা…
[দৃশ্যান্তর]

তৃতীয় অঙ্ক- প্রথম দৃশ্য
সময় : ১৭৫৭ সাল, ১০ই জুন থেকে ২১এ জুনের মধ্যে যেকোন একদিন।
স্থান : লুৎফুন্নিসার কক্ষ।
[ শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে- ঘসেটি, লুৎফা, আমিনা, সিরাজ, পরিচারিকা]

(নবাব-জননী আমিনা বেগম ও লুৎফুন্নিসা উপবিষ্টা। ঘসেটি বেগমের প্রবেশ)

ঘসেটি : বড় সুখে আছ রাজমাতা আমিনা বেগম।
লুৎফা : আসুন খালাআম্মা।
ঘসেটি : বেঁচে থাক। সুখী এবং সৌভাগ্যবতী হও এমন দোয়া করলে সেটা আমার পক্ষে অভিশাপ হয়ে দাঁড়াবে। তাই সে দোয়া করতে পারলুম না।
আমিনা : ছিঃ বড় আপা। এস, কাছে এসে বস।
ঘসেটি : বসতে আসিনি। দেখতে এলাম কত সুখে আছ তুমি। পুত্র নবাব, পুত্রবধূ নবাব বেগম, পৌত্রী (নাতিন) শাহজাদি।
আমিনা : সিরাজ তোমারও তো পুত্র। তুমিও তো কোলে-পিঠে করে মানুষ করেছ।
ঘসেটি : অদৃষ্টের পরিহাস, তাই ভুল করেছিলাম। যদি জানতাম বড় হয়ে সে একদিন আমার সৌভাগ্যের অন্তরায় হবে, যদি জানতাম অহরহ সে আমার দুশ্চিন্তার একমাত্র কারণ হয়ে দাঁড়াবে, জীবনের সমস্ত সুখ-শান্তি সে গ্রাস করবে রাহুর মতো, তাহলে দুধের শিশু সিরাজকে প্রাসাদ-চত্বরে আছড়ে মেরে ফেলতে কিছুমাত্র দ্বিধা করতাম না।
লুৎফা : আপনাকে আমরা মায়ের মতো ভালোবাসি। মায়ের মতোই শ্রদ্ধা করি।
ঘসেটি : থাক! যে সত্যিকার মা তার মহলেই তো চাঁদের হাট (গুণীজনের সমাগম) বসিয়েছ। আমাকে আবার পরিহাস করা কেন? দরিদ্র নারী আমি। নিজের সামান্য বিত্তের অধিকারিণী হয়ে এক কোণে পড়ে থাকতে চেয়েছিলাম। কিন্তু মহাপরাক্রমশালী (ব্যঙ্গ) নবাব সে অধিকারটুকুও আমাকে দিলেন না।
আমিনা : কী হয়েছে তোমার? পুত্রবধূর সামনে এরকম রূঢ় ব্যবহার করছ কেন?
ঘসেটি : কে পুত্র আর কে পুত্রবধূ? সিরাজ আমার কেউ নয়। সিরাজ বাংলার নবাব-আমি তার প্রজা। ক্ষমতার অহংকারে উন্মত্ত (পাগল) না হলে আমার সম্পত্তিতে হস্তক্ষেপ করতে সে সাহস করত না। মতিঝিল থেকে আমাকে সে তাড়িয়ে দিতে পারত না।
লুৎফা : শুনেছি আপনার কাছ থেকে কিছু টাকা তিনি ধার নিয়েছেন। কলকাতা অভিযানের সময়ে টাকার প্রয়োজন হয়েছিল তাই। কিন্তু গোলমাল মিটে গেলে সে টাকা তো আবার আপনি ফেরত পাবেন।
ঘসেটি : নবাব টাকা ফেরত দেবেন!
লুৎফা : কেন দেবেন না? তা ছাড়া সে টাকা তো তিনি ব্যক্তিগত প্রয়োজনে ব্যয় করেননি। দেশের জন্যে-
ঘসেটি : থাম। লম্বা লম্বা বক্তৃতা করো না। সিরাজের বক্তৃতা তবু সহ্য হয়। তাকে বুকে-পিঠে করে মানুষ করেছি। কিন্তু তোমার মুখে বড় বড় বুলি শুনলে গায়ে যেন জ্বালা ধরে যায়। (উচিত কথা শুনতে তিক্ত লাগে)
আমিনা : সিরাজ তোমার কোনো ক্ষতি করেনি বড় আপা।
ঘসেটি : তার নবাব হওয়াটাই তো আমার মস্ত ক্ষতি।
আমিনা : নবাবি সে কারো কাছ থেকে কেড়ে নেয়নি। ভূতপূর্ব (পূর্বের) নবাবই তাকে সিংহাসন দিয়ে গেছেন।
ঘসেটি : বৃদ্ধ নবাবকে (আলিবর্দি) ছলনায় ভুলিয়ে তোমরা সিংহাসন দখল করেছ।
আমিনা : আমরা।
ঘসেটি : ভাবছো যে বিস্মিত হবার ভঙ্গি করলেই আমি তোমাকে বিশ্বাস করব-কেমন? তোমাকে আমি চিনি। তুমি কম সাপিনী নও।
আমিনা : তুমি অনর্থক বিষ উদ্গার (ক্ষোভ প্রকাশ) করছ বড় আপা। তোমার এই ব্যবহারের অর্থ আমি কিছুই বুঝতে পারছিনে।
ঘসেটি : বুঝবে। সে দিন আসছে। আর বেশিদিন এমন সুখে তোমার ছেলেকে নবাবি করতে হবে না। (সিরাজের প্রবেশ)
সিরাজ : সিরাজউদ্দৌলা একটি দিনের জন্যেও সুখে নবাবি করেনি খালাম্মা।
ঘসেটি : এসেছ শয়তান। ধাওয়া করেছ আমার পিছু?
সিরাজ : আপনার সঙ্গে প্রয়োজন আছে।
ঘসেটি : কিন্তু তোমার সঙ্গে আমার কোনো প্রয়োজন নেই।
সিরাজ : আমার প্রয়োজন আপনার সম্মতির অপেক্ষা রাখছে না খালাম্মা।
ঘসেটি : তাই বুঝি সেনাপতি পাঠিয়ে আমাকে সংবাদ দিয়েছ যে, তোমার আরও কিছু টাকার দরকার।
সিরাজ : খবর আপনার অজানা থাকার কথা নয়।
ঘসেটি : অর্থাৎ।
সিরাজ : অর্থাৎ আমি জানি যে, বাংলার ভাগ্য নিয়ে গুরুত্বপূর্ণ রাজনৈতিক আলোচনার সমস্ত খবরই আপনি রাখেন। আরও স্পষ্ট করে শুনতে চান? আমি জানি যে, সিরাজের বিরুদ্ধে আপনার আক্রোশের কারণ আপনার সম্পত্তিতে সে হস্তক্ষেপ করেছে বলে নয়, রাজনৈতিক প্রাধান্য লাভের আশায় আপনি উন্মাদ। আমি অনুরোধ করছি আপনার সঙ্গে আমাকে যেন কোনো প্রকারের দুর্ব্যবহার করতে বাধ্য করা না হয়।
ঘসেটি : তুমি আমাকে ভয় দেখাচ্ছ?
সিরাজ : আপনাকে আমি সাবধান করে দিচ্ছি।
ঘসেটি : তোমার এই চোখ রাঙাবার স্পর্ধা বেশিদিন থাকবে না নবাব (নবাবি বেশিদিন টিকবে না)। আমিও তোমাকে সাবধান করে দিচ্ছি।
সিরাজ : আপনার ভবিষ্যৎ ভেবে আপনি উৎকণ্ঠিত হবেন না খালাম্মা। আপনার নিজের সম্বন্ধেই আমি আপনাকে সতর্ক করে দিচ্ছি। নবাবের মাতৃস্থানীয়া হয়ে তাঁর শত্রুদের সঙ্গে আপনার যোগাযোগ রাখা বাঞ্চনীয় নয়। অন্তত আমি আপনাকে সে দুর্নামের হাত থেকে রক্ষা করতে চাই।
ঘসেটি : তোমার মতলব বুঝতে পারছি না।
সিরাজ : রাষ্ট্রের অভ্যন্তরীণ গোলযোগের সময়ে কোনো ক্ষমতাভিলাষী, স্বার্থপরায়ণ নারীর পক্ষে রাজনীতির সঙ্গে যোগাযোগ রাখা দেশের পক্ষে অকল্যাণকর। আমি তাই আপনার গতিবিধির ওপরে লক্ষ্য রাখবার ব্যবস্থা করেছি। আমার প্রাসাদে আপনার স্বাধীনতায় হস্তক্ষেপ করা হবে না। তবে লক্ষ্য রাখা হবে যাতে দেশের বর্তমান অশান্তি দূর হবার আগে বাইরের কারো সঙ্গে আপনি কোনো যোগাযোগ রাখতে না পারেন। (নজরবন্দি করা)
ঘসেটি : (ক্ষিপ্ত) ওর অর্থ আমি বুঝি মহামান্য নবাব। (দ্রুত আমিনার দিকে এগিয়ে এসে) শুনলে তো রাজামাতা, আমাকে বন্দিনী করে রাখা হলো। এইবার বল তো আমি তার মা, সে আমার পুত্র-তাই না? হা হা হা।
(অসহায় ক্রোধে কাঁপতে কাঁপতে বেরিয়ে গেলেন)
আমিনা : এসব লক্ষণ ভালো নয়। (উঠে দরজার দিকে এগোতে এগোতে) বড় আপা শুনে যাও, বড় আপা- (বেরিয়ে গেলেন)
লুৎফা : খালাম্মা বড় বেশি অপমান বোধ করেছেন। তাঁর সঙ্গে অমন ব্যবহার করাটা হয়ত উচিত হয়নি।
সিরাজ : আামর ব্যবহারে সবাই অপমান বোধ করছেন লুৎফা। শুধু অপমান নাই আমার।
লুৎফা : ও কথা কেন বলছেন জাঁহাপনা।
সিরাজ : তুমি অন্ধ হলে আর কার কাছে আমি আশ্রয় পাব বল তো লুৎফা (আক্ষেপ)। দেখতে পাচ্ছ না, শুধু আপনার নয় আমাকে ধ্বংস করবার আয়োজনে সবাই কী রকম মেতে উঠেছে।
লুৎফা : কিন্তু খালাম্মা-
সিরাজ : আমাকে ক্ষমতাচ্যুত করতে পারলে খালাম্মা খুশি হবেন সবচেয়ে বেশি।
লুৎফা : অতটা বিশ্বাস করা কঠিন। তবে ওঁর মন আপনার ওপরে যথেষ্ট বিষিয়ে উঠেছে তা ঠিক। কিন্তু-
সিরাজ : থামলে কেন? বল।
লুৎফা : বলাটা বোধ হয় ঠিক হবে না।
সিরাজ : বল।
লুৎফা : বিধবা মেয়েমানুষ, ওঁর সম্পত্তিতে বারবার এমন হস্তক্ষেপ করতে থাকলে ভরসা নষ্ট হবারই কথা।
সিরাজ : লুৎফা, তুমিও আমার বিচার করতে বসলে। কর, আমি আপত্তি করব না। দাদু মরবার পর থেকে এই ক-মাসের ভেতরে আমি এত বদলে গেছি (প্রতিকূলতার কারণে পরিবর্তন) যে আমার নিকটতম তুমিও তা বুঝতে পারবে না।
লুৎফা : জাঁহাপনা।
সিরাজ : মনে পড়ে লুৎফা, দাদুর মৃত্যুশয্যায় আমি কসম খেয়েছিলাম শরাব স্পর্শ করব না। আমি তা করিনি। তুমিও জান লুৎফা আমি তা করিনি।
লুৎফা : আমি ও-সব কোনো কথাই তুলছিনে জাঁহাপনা।
সিরাজ : আমি জানি। সেই জন্যেই বলছি সব কিছু খুঁটিয়ে খুঁটিয়ে বিচার কর।
লুৎফা : আমি আপনার বিরুদ্ধে অভিযোগ আনবার জন্যে কোনো কথা বলিনি, জাঁহাপনা। খালাম্মা রাগে প্রায় কাঁদতে কাঁদতে বেরিয়ে গেলেন তাই-
সিরাজ : তাই তোমার মনে হলো ওঁর টাকা-পয়সায় হাত দিয়েছি বলেই উনি আমার ওপর অতখানি বিরক্ত হয়েছেন। কিন্তু তুমি জান না, কতখানি উৎসাহ নিয়ে উনি অজস্র অর্থ ব্যয় করেছেন শওকতজঙ্গের কামিয়াবির জন্যে। শুধু শওকতজঙ্গ কেন, আমার শত্রুদের শক্তি বৃদ্ধির জন্যেও ওঁর দান কম নয়।
লুৎফা : আমি মাফ চাইছি জাঁহাপনা, আমার অন্যায় হয়েছে।
সিরাজ : লুৎফা, এত দেয়াল (বাধা) কেন বল তো?
লুৎফা : দেয়াল? কোথায় দেয়াল জাঁহাপনা?
সিরাজ : আমার চারপাশে লুৎফা। আমার সারা অস্তিত্ব জুড়ে কেবল যেন দেয়ালের ভিড়। উজির, অমাত্য, সেনাপতিদের এবং আমার মাঝখানে দেয়াল, দেশের নিশ্চিত শাসন ব্যবস্থা এবং আমার মাঝখানে দেয়াল, খালাম্মা আর আমার মাঝখানে, আমার চিন্তা আর কাজের মাঝখানে, আমার স্বপ্ন আর বাস্তবের মাঝখানে আমার অদৃষ্ট আর কল্যাণের মাঝখানে শুধু দেয়াল আর দেয়াল।
লুৎফা : জাঁহাপনা!
সিরাজ : আমি এর কোনোটি ডিঙিয়ে যাচ্ছি, কোনোটি ভেঙে ফেলছি, কিন্তু তবু তো দেয়ালের শেষ হচ্ছে না, লুৎফা।
লুৎফা : আপনি ক্লান্ত হয়েছেন জাঁহাপনা।
সিরাজ : মসনদে বসবার পর থেকে প্রতিটি মুহূর্ত যেন দুপায়ের দশ আঙুলের ওপর ভর দিয়ে দাঁড়িয়ে আছি। ক্লান্তি আসাটা কিছু অস্বাভাবিক নয়। সমস্ত প্রাণশক্তি যেন নিস্তেজ হয়ে পড়ছে লুৎফা।
লুৎফা : সমস্ত দুশ্চিন্তা বাদ দিয়ে আমার কাছে দু-একদিন বিশ্রাম করুন।
সিরাজ : কবে যে দুদণ্ড বিশ্রাম পাব তার ঠিক নেই। আবার তো যুদ্ধে যেতে হচ্ছে।
লুৎফা : সে কী!
সিরাজ : আমার বিরুদ্ধে কোম্পানির ইংরেজদের আয়োজন সম্পূর্ণ। আমি এগিয়ে গিয়ে বাধা না দিলে তারা সরাসরি রাজধানী আক্রমণ করবে।
লুৎফা : ইংরেজদের সঙ্গে তো আপনার মিটমাট হয়ে গেল।
সিরাজ : হ্যাঁ, আলিনগরের সন্ধি। কিন্তু সে সন্ধির মর্যাদা একমাস না যেতেই তারা ধুলোয় লুটিয়ে দিয়েছে।
লুৎফা : কজন বিদেশি বেনিয়ার এত স্পর্ধা কী করে সম্ভব?
সিরাজ : ঘরের লোক অবিশ্বাসী হলে বাইরের লোকের পক্ষে সবই সম্ভব, লুৎফা। শুধু একটা জিনিস বুঝে উঠতে পারিনি, ধর্মের নামে ওয়াদা করে মানুষ তা খেলাফ করে কী করে? নিজের স্বার্থ কি এতই বড়?
লুৎফা : কোনো প্রতিকার করতে পারেননি জাঁহাপনা?
সিরাজ : পারিনি। চেয়েছি, চেষ্টাও করেছি; কিন্তু শেষ পর্যন্ত ভরসা পাইনি। রাজবল্লভ, জগৎশেঠকে কয়েদ করলে, মিরজাফরকে ফাঁসি দিলে হয়ত প্রতিকার হতো, কিন্তু সেনাবাহিনী তা বরদাস্ত করত কিনা কে জানে?
লুৎফা : থাক ওসব কথা। আজ আপনি বিশ্রাম করুন।
সিরাজ : আর কাল সকালেই দেশের পথে-ঘাটে লোকের মুখে মুখে ছড়িয়ে পড়বে, যুদ্ধের আয়োজন ফেলে রেখে হারেমের কয়েকশ বেগমের সঙ্গে নবাবের উদ্দাম রাসলীলার কাহিনি।
লুৎফা : মহলে বেগমের তো সত্যিই কোনো অভাব নেই।
সিরাজ : ঠাট্টা করছ লুৎফা? তুমি তো জানোই, মরহুম শওকতজঙ্গের বিশাল হারেম বাধ্য হয়েই আমাকে প্রতিপালন করতে হচ্ছে।
লুৎফা : সে যাক। আজ আপনার বিশ্রাম। শুধু আমার কাছে থাকবেন আপনি। শুধু আমরা দুজন।
সিরাজ : অনেক সময়ে সত্যিই তা ভেবেছি, লুৎফা। তোমার খুব কাছাকাছি বহুদিন আসতে পারিনি। আমাদের মাঝখানে একটি রাজত্বের দেয়াল। মাঝে মাঝে ভেবেছি, এই বাধা যদি দূর হয়ে যেত। নিশ্চিত সাধারণ গৃহস্থের ছোট্ট সাজানো সংসার আমরা পেতাম।
(পরিচারিকার প্রবেশ)
পরিচারিকা : বেগম সাহেবা।
লুৎফা : (তার দিকে এগিয়ে আসতে আসতে) জাঁহাপনা এখন বিশ্রাম করছেন। যাও।
পরিচারিকা : সেনাপতি মোহনলালের কাছ থেকে খবর এসেছে। (পেছোতে লাগল)
লুৎফা : না।
(পরিচারিকার প্রস্থান)
সিরাজ : (এগিয়ে আসতে আসতে) মোহনলালের জরুরি খবরটা শুনতেই দাও, লুৎফা। (লুৎফা সিরাজের গতিরোধ করল)
লুৎফা : (আবেগজড়িত কণ্ঠে) না।
(সিরাজ থামল ক্ষণকালের জন্যে। লুৎফার দিকে মেলে রাখা নীরব দৃষ্টি ধীরে ধীরে স্নেহসিক্ত হয়ে উঠল। কিন্তু পর মুহূর্তেই লুৎফার প্রসারিত বাহু ধীরে ধীরে সরিয়ে দিয়ে বের হয়ে গেল। লুৎফা চেয়ে রইল সিরাজের চলে যাওয়া পথের দিকে-দুফোঁটা অশ্রু গড়িয়ে পড়ল ওর দুগাল বেয়ে)
[দৃশ্যান্তর]

তৃতীয় অঙ্ক-দ্বিতীয় দৃশ্য
সময় : ১৭৫৭ সাল, ২২এ জুন।
স্থান : পলাশিতে সিরাজের শিবির
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে-সিরাজ, মোহনলাল, মিরমর্দান, প্রহরী, বন্দি কমর]
(গভীর রাত্রি। শিবিরের ভেতরে নবাব চিন্তাগ্রস্তভাবে পায়চারি করছেন।
দূর থেকে শৃগালের প্রহর ঘোষণার শব্দ ভেসে আসবে।)
সিরাজ : দ্বিতীয় প্রহর অতিক্রান্ত হলো। শুধু ঘুম নেই শেয়াল আর সিরাজউদ্দৌলার চোখে। (আবার নীরব পায়চারি) ভেবে আমি অবাক হয়ে যাই-
(মোহনলালের প্রবেশ। কুর্নিশ করে দাঁড়াতেই)
সিরাজ : সত্যি অবাক হয়ে যাই মোহনলাল, ইংরেজ সভ্য জাতি বলেই শুনেছি। তারা শৃঙ্খলা জানে, শাসন মেনে চলে। কিন্তু এখানে ইংরেজরা যা করছে সে তো স্পষ্ট রাজদ্রোহ। একটি দেশের শাসন ব্যবস্থার বিরুদ্ধে তারা অস্ত্র ধরছে। আশ্চর্য!
মোহনলাল : জাঁহাপনা!
সিরাজ : হ্যাঁ, বলো মোহনলাল, কী খবর।
মোহনলাল : ইংরেজের পক্ষে মোট সৈন্য তিন হাজারের বেশি হবে না। অবশ্য তারা অস্ত্র চালনায় সুশিক্ষিত। নবাবের পক্ষে সৈন্যসংখ্যা ৫০ হাজারের বেশি। ছোট বড় মিলিয়ে ওদের কামান হবে গোটা দশেক। আমাদের কামান পঞ্চাশটার বেশি।
সিরাজ : এখন প্রশ্ন হলো আমাদের সব সিপাই লড়বে কিনা এবং সব কামান থেকে গোলা ছুটবে কি না।
মোহনলাল : জাঁহাপনা!
সিরাজ : এমন আশঙ্কা কেন করছি তাই জানতে চাইছ তো? মিরজাফর, রায়দুর্লভ, ইয়ার লুৎফ খাঁ নিজের সেনাবাহিনী নিয়ে যুদ্ধক্ষেত্রে উপস্থিত হয়েছে। কিন্তু আমার বিশ্বাস করতে প্রবৃত্তি হয় না যে, ওরা ইংরেজের বিরুদ্ধে লড়বে।
মোহনলাল : সিপাহসালারের আরও একখানা গোপন চিঠি ধরা পড়েছে।
(নবাবের হাতে পত্র দান। নবাব সেটা পড়ে হাতের মুঠোয় মুচড়ে ফেললেন)
সিরাজ : বেইমান।
মোহনলাল : ক্লাইভের আরও তিনখানা চিঠি ধরা পড়েছে। সে সিপাহসালারের জবাবের জন্যে পাগল হয়ে উঠেছে মনে হয়।
সিরাজ : সাংঘাতিক লোক এই ক্লাইভ। মতলব হাসিল করার জন্যে যে কোনো অবস্থার ভেতর ঝাঁপিয়ে পড়ে। ওর কাছে সব কিছুই যেন বড় রকমের জুয়া খেলা।
(মিরমর্দানের প্রবেশ। যথারীতি কুর্নিশ করে একদিকে দাঁড়াল)
সিরাজ : বল মিরমর্দান।
মিরমর্দান : ইংরেজ সৈন্য লক্ষবাগে আশ্রয় নিয়েছে। ক্লাইভ এবং তার সেনাপতিরা উঠেছে গঙ্গা তীরের ছোট বাড়িটায়। এখান থেকে প্রায় এক ক্রোশ দূরে।
সিরাজ : তোমাদের ফৌজ সাজাবার আয়োজন শেষ হয়েছে তো?
মিরমর্দান : (একটা প্রকাণ্ড নকশা নবাবের সামনে মেলে ধরে) আমরা সব গুছিয়ে ফেলেছি। (নকশা দেখাতে দেখাতে) আপনার ছাউনির সামনে গড়বন্দি হয়েছে (সৈন্য সাজানো)। ছাউনির সামনে মোহনলাল, সাঁফ্রে আর আমি। আরও ডানদিকে গঙ্গার ধারে এই টিপিটার উপরে একদল পদাতিক আমার জামাই বদ্রিআলি খাঁর অধীনে যুদ্ধ করবে। তাদের ডান পাশের গঙ্গার দিকে একটু এগিয়ে নৌবে সিং হাজারির বাহিনী। বাঁ দিক দিয়ে লক্ষবাগ পর্যন্ত অর্ধচন্দ্রাকারে সেনাবাহিনী সাজিয়েছেন সিপাহসালার, রায়দুর্লভরাম আর ইয়ার লুৎফ খাঁ।
সিরাজ : (নকশার কাছ থেকে সরে এসে একটু পায়চারি করলেন) কত বড় শক্তি, তবু কত তুচ্ছ (একতা না থাকায়)
মিরমর্দান
মিরমর্দান : জাঁহাপনা!
সিরাজ : আমি কি দেখেছি জান? কেমন যেন অঙ্কের হিসেবে ওদের সুবিধের পাল্লা ভারী হয়ে উঠেছে।
মিরমর্দান : ইংরেজদের ঘায়েল করতে সোনাপতি মোহনলাল, সাঁফ্রে আর আমার বাহিনীই যথেষ্ট।
সিরাজ : ঠিক তা নয়, মিরমর্দান। আমি জানি তোমাদের বাহিনীতে পাঁচ হাজার ঘোড়সওয়ার আর আট হাজার পদাতিক সেনা রয়েছে। তারা জান দিয়ে পড়বে। কিন্তু সমস্ত অবস্থাটা কী দাঁড়াচ্ছে, এস তোমাদের সঙ্গে আলোচনা করি।
মোহনলাল : জাঁহাপনা!
সিরাজ : মিরজাফরের বাহিনী সাজিয়েছে দূরে লক্ষবাগের অর্ধেকটা ঘিরে। যুদ্ধে তোমরা হারতে থাকলে ওরা দুকদম এগিয়ে ক্লাইভের সঙ্গে মিলবে বিনা বাধায়। যেন নিশ্চেন্তে আত্মীয় বাড়ি যাচ্ছে।
মিরমর্দান : কিন্তু আমরা হারব কেন?
সিরাজ : না হারলে ওরা যে তোমাদের ওপরেই গুলি চালাবে না তার কোনো নিশ্চয়তা নেই। যাক, শিবিরের কাছে ওদের ফৌজ রাখবার কথা আমরাও ভাবি না। কারণ, সামনে তোমরা যুদ্ধ করতে থাকলে, ওরা পেছনে নবাবের শিবির দখল করতে এক মুহূর্ত দেরি করবে না।
মোহনলাল : ওদের সেনাবাহিনী যুদ্ধক্ষেত্রে না আনলেই বোধ হয়-
সিরাজ : এনেছি চোখে চোখে রাখার জন্যে। পেছনে রেখে এলে ওরা সঙ্গে সঙ্গে রাজধানী দখল করত।
মিরমর্দান : এত চিন্তিত হবার কারণ নেই, জাঁহাপনা। আমাদের প্রাণ থাকতে নবাবের কোনো ক্ষতি হবে না।
সিরাজ : আমি জানি, তাই আরও বেশি ভরসা হারিয়ে ফেলছি। তোমাদের প্রাণ বিপন্ন হবে অথচ স্বাধীনতা রক্ষা হবে না, এই চিন্তাটাই আজ বেশি করে পীড়া দিচ্ছে।
মোহানলাল : আমরা জয়ী হব, জাঁহাপনা!
সিরাজ : পরাজিত হবে, আমিই কি তা ভাবছি। আমি শুধু অশুভ সম্ভাবনাগুলো শেষবারের মতো খুঁটিয়ে বিচার করে দেখছি। আগামীকাল তোমরা যুদ্ধ করবে কিন্তু হুকুম দেবে মিরজাফর। যুদ্ধক্ষেত্রে সেনাবাহিনীতে অভ্যন্তরীণ গোলযোগ এড়াবার জন্যে যুদ্ধের সর্বময় কর্তৃত্ব সিপাহসালারকে দিতেই হবে। ফল কী হবে কে জানে। আমি কর্তব্য স্থির করতে পারছিনে, কিন্তু কেন যে পারছিনে আশা করি তোমরা বুঝছ।
মিরমর্দান : জাঁহাপনা!
সিরাজ : আজ আমার ভরসা আমার সেনাবাহিনীর শক্তিতে নয়, মোহনলাল। আমার একমাত্র ভরসা আগামীকাল যুদ্ধক্ষেত্রে বাংলার স্বাধীনতা মুছে যাবার সূচনা দেখে মিরজাফর, রায়দুর্লভ, ইয়ার লুৎফদের মনে যদি দেশপ্রীতি জেগে ওঠে সেই সম্ভাবনাটুকু।
(কিছুটা কোলাহল শোনা গেল বাইরে। দুজন প্রহরী এক ব্যক্তিকে নিয়ে হাজির হলো)
প্রহরী : হুজুর, একই লোকটা নবাবের ছাউনির দিকে এগোবার চেষ্টা করছিল।
(সঙ্গে সঙ্গে মোহনলাল বন্দির কাছে এগিয়ে এসে নবাবকে একটু যেন আড়াল করে দাঁড়াল। নবাব দুপা এগিয়ে এলেন। অপর দিক দিয়ে মিরমর্দান বন্দির আর এক পাশে দাঁড়াল)
বন্দি : (সকাতর ক্রন্দনে) আমি পলাশি গ্রামের লোক, হুজুর। রৌশনি (আলো) দেখতে এখানে এসেছি।
মোহনলাল ; (প্রহরীকে) তল্লাশি কর।
(প্রহরী তল্লাশি করে কিছুই পেল না)
কিন্তু একে সাধারণ গ্রামবাসী বলে মনে হচ্ছে না, জাঁহাপনা!
মিরমর্দান : (প্রহরীকে) বাইরে নিয়ে যাও। কথা আদায় কর। (হঠাৎ) দেখি দেখি। এ তো কমর বেগ জমাদার। মিরজাফরের গুপ্তচর উমর বেগের ভাই। এও গুপ্তচর।
কমর : (সহসা মাটিতে লুটিয়ে পড়ে) জাঁহাপনার কাছে বিচারের জন্যে এসেছি। আমাকে আসতে দেয় না, তাই চুরি করে হুজুরের কদম মোবারকে ফরিয়াদ জানাতে আসছিলাম।
সিরাজ : (কাছে এগিয়ে এসে) কি হয়েছে তোমার?
কমর : আমার ভাইকে সেনাপতি মোহনলালের হুকুমে খুন করা হয়েছে, হুজুর।
সিরাজ : মোহনলাল!
মোহনলাল : গুপ্তচর উমর বেগ জমাদার হাতেনাতে ধরা পড়েছিল জাঁহাপনা। ক্লাইভের চিঠি ছিল তার কাছে। প্রহরীদের হতে ধরা পড়বার পর সে পালাবার চেষ্টা করে। ফলে প্রহরীদের তলোয়ারের ঘায়ে সে মারা পড়েছে।
(সিরাজ অবিশ্বাসের দৃষ্টিতে মোহনলালের দিকে এক দৃষ্টে চেয়ে রইলেন)
মোহনলাল : (যেন দোষ ঢাকবার চেষ্টায়) সে চিঠি জাঁহাপনার কাছে আগেই দাখিল করা হয়েছে।
সিরাজ : (মোহনলালের দিক থেকে দৃষ্টি একটু পায়চারি করে চিন্তিত ভাবে) কথায় কথায় মৃত্যুবিধান করাটাই শাসকের সবচাইতে যোগ্যতার পরিচয় কিনা সে বিষয়ে আমি নিঃসন্দেহ নই, মোহনলাল।
কমর : জাঁহাপনা মেহেরবান।
সিরাজ : (প্রহরীদের) একে নিয়ে যাও। কাল যুদ্ধ শেষ হবার পর একে মুক্তি দেবে।
কমর : (রুদ্ধস্বরে) এই কি জাঁহাপনার বিচার?
সিরাজ : আমি জানি, এখানে এ অবস্থায় শুধু ফরিয়াদ জানাতেই আসবে এতটা নির্বোধ তুমি নও। (কঠোর স্বরে প্রহরীদের) নিয়ে যাও।
(বন্দিকে নিয়ে প্রহরীদের প্রস্থান। শৃগালের প্রহর ঘোষণা)
সিরাজ : তোমরাও এখন যেতে পার। আজ রাতে তোমাদের কিছুটা বিশ্রামের প্রয়োজন। রাত প্রায় শেষ হয়ে এল।
(মোহনলাল ও মিরমর্দান বেরিয়ে গেল। সিরাজ পায়চারি করতে লাগলেন। সোরাহি থেকে পানি ঢেলে খেলেন। কোথায় একটা প্যাঁচা ডেকে উঠল। সিরাজ উৎকর্ণ হয়ে তা শুনলেন। কি যেন ভেবে রেহেলে রাখা কোরান শরিফের কাছে গিয়ে জায়নামাজে বসলেন। কোরান শরিফ তুলে ওষ্ঠে ঠেকিয়ে রেহেলের ওপর রেখে পড়তে লাগলেন। দূর থেকে আজানের ধ্বনি ভেসে এল। সিরাজ কোরান শরিফ মুড়ে রাখলেন। ‘আসসালাতু খায়রুম মিনান নাওম’-এর পর মোনাজাত করলেন। আস্তে আস্তে পাখির ডাক জেগে উঠতে লাগল। হঠাৎ সুতীব্র তূর্যনাদ স্তব্ধতা ভেঙে খান খান করে দিল।)
(দৃশ্যান্তর)

তৃতীয় অঙ্ক-তৃতীয় দৃশ্য
সময় : ১৭৫৭ সাল, ২৩এ জুন।
স্থান : পলাশির যুদ্ধক্ষেত্র
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে-সিরাজ, প্রহরী, সৈনিক, দ্বিতীয় সৈনিক, তৃতীয় সৈনিক, সাঁফ্রে, মোহনলাল, রাইসুল জুহালা, ক্লাইভ, রাজবল্লভ, মিরজাফর, ইংরেজ সৈনিকগণ]
(গোলাগুলির শব্দ, যুদ্ধ, কোলাহল। সিরাজ নিজের তাঁবুতে অস্থিরভাবে পায়চারি করছেন। সৈনিকের প্রবেশ)
সিরাজ : (উৎকণ্ঠিত) কী খবর সৈনিক?
সৈনিক : যুদ্ধের প্রথম মহড়ায় কোম্পানির ফৌজ পিছু হটে গিয়ে লক্ষবাগে আশ্রয় নিয়েছে। সিপাহসালার, সেনাপতি রায়দুর্লভ এবং ইয়ার লুৎফ খাঁর সৈন্য যুদ্ধে যোগ দেয়নি।
সিরাজ : মিরমর্দান, মোহনলাল?
সৈনিক : ওরা শত্রুদের পিছু হটিয়ে লক্ষবাগের দিকে এগিয়ে যাচ্ছেন।
সিরাজ : আচ্ছা, যাও।
(সৈনিকের প্রস্থান। কোলাহল প্রবল হয়ে উঠল। দ্বিতীয় সৈনিকের প্রবেশ।)
দ্বিতীয় সৈনিক : দুঃসংবাদ, জাঁহাপনা। সেনাপতি নৌবে সিং হাজারি (প্রথম মৃত্যু) ঘায়েল হয়েছেন।
সিরাজ : (কঠোর স্বরে) যাও।
(প্রস্থান : একটু পরে তৃতীয় সৈনিকের প্রবেশ।)
তৃতীয় সৈনিক : কিছুক্ষণ আগে যে বৃষ্টি হলো তাতে ভিজে আমাদের বারুদ অকেজো হয়েছে, জাঁহাপনা।
সিরাজ : (ভীত স্বরে) বারুদ ভিজে গেছে?
তৃতীয় সৈনিক : সেনাপতি মিরমর্দান তাই কামানের অপেক্ষা না করে হাতাহাতি লড়বার জন্যে দ্রুত এগিয়ে যাচ্ছেন।
সিরাজ : আর কোম্পানির ফৌজ যখন কামান ছুঁড়বে?
তৃতীয় সৈনিক : শত্রুদের সময় দিতে চান না বলেই সেনাপতি মিরমর্দান শুধু তলোয়ার নিয়েই সামনে এগোচ্ছেন।
(দ্রুত প্রথম সৈনিকের প্রবেশ)
প্রথম সৈনিক : সেনাপতি বদ্রিআলি খাঁ নিহত, জাঁহাপনা। যুদ্ধের অবস্থা খারাপ।
সিরাজ : না। যুদ্ধের অবস্থা খারাপ হয় না বদ্রিআলি ঘায়েল হলে। মিরমর্দান, মোহনলাল আছে। কোনো ভয় নেই, যাও।
(প্রথম ও তৃতীয় সৈনিকের প্রস্থান। হঠাৎ যুদ্ধ কোলাহল কেমন যেন আর্ত চিৎকারে (অশুভ শঙ্কা) পরিণত হলো)
সিরাজ : কি হলো? (টুলের ওপর দাঁড়িয়ে দুরবিন দিয়ে যুদ্ধক্ষেত্রের অবস্থা দেখবার চেষ্টা)
(ফরাসি সেনাপতি সাঁফ্রের প্রবেশ)
সিরাজ : (দ্রুত এগিয়ে এসো) কি খবর সাঁফ্রে (ফরাসি সৈনিক)? আমাদের পরাজয় হয়েছে?
সাঁফ্রে : (কুর্নিশ করে) এখনো হয়নি, ইওর একসেলেন্সি। কিন্তু যুদ্ধের অবস্থা খারাপ হয়ে উঠেছে।
সিরাজ : শক্তিমান বীর সেনাপতি, তোমরা থাকতে যুদ্ধে হার হবে কেন? যাও, যুদ্ধে যাও, সাঁফ্রে। জয়লাভ কর।
সাঁফ্রে : আমি তো ফ্রান্সের শত্রুদের বিরুদ্ধে লড়ছি জাঁহাপনা। দরকার হলে যুদ্ধক্ষেত্রে আমি প্রাণ দেব। কিন্তু আপনার বিরাট সেনাবাহিনী চুপ করে দাঁড়িয়ে আছে স্ট্যান্ডিং লাইক পিলার্স।
সিরাজ : মিরজাফর, রায়দুর্লভকে বাদ দিয়েও তোমরা লড়াইয়ে জিতবে। আমি জানি তোমরা জিতবেই।
সাঁফ্রে : আমাদের গোলার আঘাতে কোম্পানির ফৌজ পিছু হটে লক্ষবাগে আশ্রয় নিচ্ছিল। এমন সময়ে এল বৃষ্টি। হঠাৎ জাফর আলি খান আদেশ দিলেন এখন যুদ্ধ হবে না। মোহনলাল যুদ্ধ বন্ধ করতে চাইলেন না। কিন্তু সিপাহসালারের আদেশ পেয়ে টায়ার্ড সোলজারস যুদ্ধ বন্ধ করে শিবিরে ফিরতে লাগল। সুযোগ পেয়ে সঙ্গে সঙ্গে কিলপ্যাট্রিক আমাদের আক্রমণ করছে। মিরমর্দান তাদের বাধা দিচ্ছেন। কিন্তু বৃষ্টিতে ভিজে বারুদ অকেজো হয়ে গেছে। তাঁকে এগোতে হচ্ছে কামান ছাড়া। অ্যান্ড দ্যাট ইজ ডেনজারস।
(দ্বিতীয় সৈনিকের প্রবেশ। কিছু না বলে চুপ করে)
সিরাজ : কী সংবাদ!
(কিছু বলবার চেষ্টা করেও পারল না)
সিরাজ : (অধৈর্য হয়ে কাছে এসে প্রহরীকে ঝাঁকুনি দিয়ে) কী খবর, বল কী খবর?
দ্বিতীয় সৈনিক : সেনাপতি মিরমর্দানের পতন হয়েছে, জাঁহাপনা।
সাঁফ্রে : হোয়াট? মিরমর্দান কিলড?
সিরাজ : (যেন আচ্ছন্ন) মিরমর্দান শহিদ হয়েছেন?
সাঁফ্রে : দি ব্রেভেস্ট সোলজার ইজ ডেড।
আমি যাই, ইওর একসিলেন্সি। আপনাকে কথা দিয়ে যাচ্ছি, ফরাসিরা প্রাণপণে লড়বে।
(প্রস্থান)
সিরাজ : ঠিক বলেছ সাঁফ্রে, শ্রেষ্ঠ বাঙালি বীর যুদ্ধে শহিদ হয়েছে। এখন তাহলে কি করতে হবে? সাঁফ্রে, মোহনলাল-
দ্বিতীয় সৈনিক : সেনাপতি মোহনলালকে খবর দিতে হবে, জাঁহাপনা?
সিরাজ : মোহনলাল? না। নৌবে সিং, বদ্রিআলি, মিরমর্দান সবাই নিহত। এখন কী করতে হবে। (পায়চারি করতে করতে হঠাৎ) হ্যাঁ, আলিবর্দির সঙ্গে যুদ্ধ থেকে যুদ্ধে আমিই তো ঘুরেছি। বাংলার সেনাবাহিনীর শ্রেষ্ঠ বীর সৈনিক সে তো আমি যুদ্ধক্ষেত্রে আমি উপস্থিত নেই বলেই পরাজয় গুটিগুটি এগিয়ে আসছে। (সৈনিককে উদ্দেশ করে) আমার হাতিয়ার নিয়ে এস। আমি যুদ্ধে যাব। আমার এতদিনের ভুল সংশোধন করার এই শেষ সুযোগ আমাকে নিতে হবে।
(মোহনলালের প্রবেশ)
মোহনলাল : না, জাঁহাপনা।
(সৈনিক বেরিয়ে গেল)
সিরাজ : মোহনলাল।
মোহনলাল : পলাশিতে যুদ্ধ শেষ হয়েছে, জাঁহাপনা। এখন আর আত্মাভিমানের সময় নেই। আপনাকে অবিলম্বে রাজধানীতে ফিরে যেতে হবে।
সিরাজ : মিরজাফরের কাছে একবার কৈফিয়ত চাইব না?
মোহনলাল : মিরজাফর ক্লাইভের সঙ্গে যোগ দিল বলে। আর একটি মুহূর্তও নষ্ট করবেন না জাঁহাপনা। মুর্শিদাবাদে ফিরে গিয়ে আপনাকে নতুন করে আত্মরক্ষার প্রস্তুতি নিতে হবে।
সিরাজ : আমি একাই ফিরে যাব?
মোহনলাল : আমার শেষ যুদ্ধ পলাশিতেই। আমি যাই, জাঁহাপনা। সাঁফ্রে আর আমার যুদ্ধ এখনো শেষ হয়নি।
(নতজানু হয়ে নবাবের পদস্পর্শ করল। তারপর দ্বিতীয় কথা না বলে বেরিয়ে গেল)
সিরাজ : (আত্মাগতভাবে) যাও, মোহনলাল। আর দেখা হবে না। আর কেউ রইল না। শুধু আমি রইলাম-নতুন করে প্রস্তুতি নিতে হবে, মোহনলাল বলে গেল।
(দ্বিতীয় সৈনিকের প্রবেশ)
সৈনিক : দেহরক্ষী অশ্বারোহীরা প্রস্তুত, জাঁহাপানা। আপনার হাতিও তৈরি।
সিরাজ : চল।
(যেতে যেতে কী যেন মনে করে দাঁড়ালেন)
সিরাজ : সেনাপতি মোহনলালকে খবর পাঠাও। কয়েকজন ঘোড়সওয়ারের হেফাজতে মিরমর্দানের লাশ যেন এক্ষুনি মুর্শিদাবাদে পাঠানো হয়। উপযুক্ত মর্যাদায় মিরমর্দানের লাশ দাফন করতে হবে।
(বেরিয়ে গেলেন। প্রায় সঙ্গে সঙ্গে দুজন প্রহরী নবাব শিবিরের জিনসপত্র গোছাতে লাগল। রাইসুল জুহালার প্রবেশ)
রাইস : জাঁহাপনা তাহলে চলে গেছেন? রক্ষা।
প্রহরী : আমরা সবাই চলে যাচ্ছি।
রাইস : মিরজাফর-ক্লাইভের দলবল এসে পড়ল বলে।
প্রহরী : তা হলে আর দেরি নয়, চল সরে পড়া যাক।
(বেরিয়ে যাবার উদ্যোগ করতেই সশস্ত্র সৈন্যদের হাতে তারা বন্দি হলো। সৈন্যদের সঙ্গে এল ক্লাইভ, মিরজাফর, রাজবল্লভ, রায়দুর্লভ।)
ক্লাইভ : হি হ্যাজ ফ্লেড অ্যাওয়ে, আগেই পালিয়েছে। (বন্দিদের কাছে এসে) কোথায় গেছে নবাব? (বন্দিরা নিরুত্তর)
ক্লাইভ : (রাইসুল জুহালাকে বুটের লাথি মারল) কোথায় গেছে নবাব? সে কুইকলি ইফ ইউ ওয়ান্ট টু লাইভ। বাঁচতে হলে জলদি করে বল।
রাইস : (হেসে উঠে মিরজাফরকে দেখিয়ে) ইনি বুঝি বাংলার সিপাহসালার? যুদ্ধে বাংলাদেশের জয় হয়েছে তো হুজুর?
রাজবল্লভ : যেন চেনা চেনা মনে হচ্ছে লোকটাকে?
ক্লাইভ : নো টাইম ফর ফান, কাম অন সে, হোয়ার ইজ সিরাজ?
(আবার লাথি মারল)
রাইস : নবাব সিরাজউদ্দৌলা এখনো জীবিত। এর বেশি আর কিছু জানিনে।
রাজবল্লভ : চিনেছি , এ তো সেই রাইসুল জুহালা।
ক্লাইভ : হি মাস্ট বি এ স্পাই।
(টান মেরে পরচুলা খুলে ফেলল)
মিরজাফর : নারান সিং। সিরাজউদ্দৌলার প্রধান গুপ্তচর।
ক্লাইভ : গুলি কর ওকে হেয়ার অ্যান্ড নাও।
(দুজন গোরা সৈন্য নবাবের পরিত্যক্ত আসনের সঙ্গে পিঠমোড়া করে নারান সিংকে বাঁধতে লাগল।)
ক্লাইভ : (মিরজাফরকে) এখনই মুর্শিদাবাদের দিকে মার্চ করুন। বিশ্রাম করা চলবে না। সিরাজউদ্দৌলা যেন শক্তি সঞ্চয়ের সময় না পায়।
(ক্লাইভ কথা বলছে, পিছনে গোরা সৈন্য দুজন নারান সিংহকে গুলি করল। মিরজাফর, রাজবল্লভ, রায়দুর্লভ, নিদারুণ শঙ্কিত। ক্লাইভ অবিচল। গুলিবিদ্ধ নারান সিংয়ের দিকে তাকিয়ে সহজ কণ্ঠে বললো)
ক্লাইভ : গুপ্তচরকে এইভাবেই সাজা দিতে হয়।
নারান : (মৃত্যুস্তিমিত কণ্ঠে) এ দেশে থেকে এ দেশকে ভালোবেসেছি। গুপ্তচরের কাজ করেছি দেশের স্বাধীনতার খাতিরে। সে কি বেইমানির চেয়ে খারাপ? মোনাফেকির চেয়ে খারাপ? ঝিমিয়ে যেতে লাগল। হঠাৎ একটু সতেজ হয়ে) তবু ভয় নেই; সিরাজউদ্দৌলা বেঁচে আছে।
ক্লাইভ : (গোরা সৈন্য দুটিকে) হাউ ডু ইউ কিল? ইডিয়টস। যখন মারবে শুট স্ট্রেইট ইনটু হার্ট, এমন করে মারবে যেন সঙ্গে সঙ্গে মরে।
(পিস্তল বার করল)
নারান : ভগবান সিরাজউদ্দৌলাকে রক্ষা-
(ক্লাইভ নিজে গুলি করার সঙ্গে সঙ্গে নারান সিংয়ের মৃত্যু হলো।)
[দৃশ্যান্তর]

তৃতীয় অঙ্ক-চতুর্থ দৃশ্য
সময় : ১৭৫৭ সাল, ২৫এ জুন।
স্থান ; মুর্শিদাবাদ নবাব দরবার।
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে-সিরাজ, ব্যক্তি, সৈনিক, অপর সৈনিক, বার্তাবাহক, দ্বিতীয় বার্তা বাহক, জনতা ও লুৎফা।]
(দরবারে গণ্যমান্য লোকের সংখ্যা কম। বিভিন্ন শ্রেণির সাধারণ মানুষের সংখ্যাই বেশি। স্তিমিত আলোয় সিরাজ বক্তৃতা করছেন। ধীরে ধীরে আলো উজ্জ্বল হবে।)
সিরাজ : পলাশির যুদ্ধে পরাজিত হয়ে আমাকে পালিয়ে আসতে হয়েছে, সে-কথা গোপন করে এখন আর কোনো লাভ নেই। কিন্তু-
ব্যক্তি : প্রাণের ভয়ে কে না পালায় হুজুর? (ব্যঙ্গ প্রকাশ)
সিরাজ : আপনাদের কি তাই বিশ্বাস যে প্রাণের ভয়ে আমি পালিয়ে এসেছি? (জনতা নীরব)
সিরাজ : না, প্রাণের ভয়ে আমি পালাইনি। সেনাপতিদের পরামর্শে যুদ্ধের বিধি অনুসারেই আমি হাল ছেড়ে দিয়ে বিজয়ী শত্রুর কাছে আত্মসমর্পণ করিনি। ফিরে এসেছি রাজধানীতে স্বাধীনতা বজায় রাখবার শেষ চেষ্টা করব বলে।
ব্যক্তি : কিন্তু রাজধানী খালি করে তো সবাই পালাচ্ছে জাঁহাপনা।
সিরাজ : আমি অনুরোধ করছি, কেউ যেন তা না করেন। এখনো আশা আছে। এখনো আমরা একত্রে রুখে দাঁড়াতে পারলে শত্রু মুর্শিদাবাদে ঢুকতে পারবে না।
ব্যক্তি : তা কী করে হবে হুজুর? অত বড় সেনাবাহিনী যখন ছারখার হয়ে গেল।
সিরাজ : তারা যুদ্ধ করেনি। তারা দেশবাসীর সঙ্গে, দেশের মাটির সঙ্গে প্রতারণা করেছে। কিন্তু যারা নিজের স্বার্থের চেয়ে দেশের স্বার্থ বড় করে দেখতে শিখেছিল, মুষ্টিমেয় সেই কজনই শুধু যুদ্ধ করে প্রাণ দিয়ে গেছে। এই প্রাণদান আমরা ব্যর্থ হতে দেব না।
ব্যক্তি : পরাজয়ের খবর বাতাসের বেগে সর্বত্র ছড়িয়ে পড়েছে, জাঁহাপনা। ঘরে ঘরে কান্নার রোল উঠেছে। বিজয়ী সৈন্যের অত্যাচার এবং লুটতরাজের ভয়ে নগরের অধিকাংশ লোকজন তাদের দামি জিনসপত্রগুলো সঙ্গে নিয়ে যে কোনো দিকে পালিয়ে যাচ্ছে।
সিরাজ : আপনারা ওদের বাধা দিন। ওদের অভয় দিন।। শত্রুসৈন্যদের হাতে পড়বার আগেই সাধারণ চোর-ডাকাত ওদের সর্বস্ব কেড়ে নেবে।
ব্যক্তি : কেউ শোনে না, হুজুর। সবাই প্রাণের ভয়ে পালাচ্ছে।
সিরাজ : কোথায় পালাবে? পেছন থেকে আক্রমণ করবার সুযোগ দিলে মৃত্যুর হাত থেকে পালানো যায় না। আপনারা কেউ অধৈর্য হবেন না। সবাইকে শক্ত হয়ে দাঁড়াতে বলুন। এই আমাদের শেষ সুযোগ, এ কথা বারবার করে বলছি। ক্লাইভের হাতে রাজধানীর পতন হলে এ দেশের স্বাধীনতা চিরকালের মতো লুপ্ত হয়ে যাবে।
ব্যক্তি : জাঁহাপনা, কোথায় বা পাওয়া যাবে তত বেশি সৈন্য আর কোথায় বা তার ব্যয়-ব্যবস্থা।
সিরাজ : দু-এক দিনের ভেতরেই বিভিন্ন জমিদারের কাছ থেকে যথেষ্ট সৈন্য সাহায্য আসবে। অর্থের অভাব নেই। সেনাবাহিনীর খরচের জন্যে রাজকোষ উন্মুক্ত করে দেওয়া হয়েছে। আপনারা বলুন কার কী প্রয়োজন।
সৈনিক : ইয়ার লুৎফ খাঁর সৈন্যদলে রোজ বেতনে আমি জমাদারের কাজ করি জাঁহাপনা। আমার অধীনে ২০০ সিপাই। আমরা হুজুরের জন্যে প্রাণপণে লড়তে প্রস্তুত।
সিরাজ : বেশ, খাজাঞ্চির কাছ থেকে টাকা নিয়ে যান। আপনার সিপাইদের তৈরি হতে আদেশ দিন। মুর্শিদাবাদে এই মুহূর্তে অন্তত দশ হাজার সৈন্য সংগ্রহ হবে। জমিদারের কাছ থেকে সাহায্য আসবার আগে এই বাহিনী নিয়েই আমরা শত্রুর মোকাবিলা করতে পারব।
অপর সৈনিক : আমি রাজা রাজবল্লভের অশ্বারোহী বাহিনীতে ঠিকা হারে কাজ করি। আমার মতো এমন আরও শতাধিক লোক রাজবল্লভের বাহিনীতে কাজ করে। জাঁহাপনার হুকুম হলে আমরা একটা ফৌজ অল্প সময়ের ভেতরেই খাড়া করতে পারি।
সিরাজ : এখুনি চলে যান। খাজাঞ্চির কাছ থেকে টাকা নিয়ে নিন যত দরকার।
(বার্তাবাহকের প্রবেশ)
বার্তাবাহক : শহরে আরও বিশৃঙ্খলা দেখা দিয়েছে, জাঁহাপনা। মুহম্মদ ইরিচ খাঁ সাহেব এই মাত্র সপরিবারে শহর ছেড়ে চলে গেলেন।
সিরাজ : (বিস্ময়ের বিমূঢ়) ইরিচ খাঁ পালিয়ে গেলেন! সিরাজউদ্দৌলার শ্বশুর ইরিচ খাঁ?
বার্তাবাহক : জাঁহাপনা!
সিরাজ : আশ্চর্য! এই কিছুক্ষণ আগে তিনি আমার কাছ থেকে অজস্র টাকা নিয়ে গেলেন সেনাবাহিনী সংগঠনের জন্যে।
ব্যক্তি : তাহলে আর আশা কোথায়!
সিরাজ : তাহলেও আশা আছে।
(দ্বিতীয় বার্তাবাহকের প্রবেশ)
দ্বিতীয় বার্তা : জাঁহাপনার কাছ থেকে সৈন্য সংগ্রহের জন্যে যারা টাকা নিয়েছে তাদের অনেকেই নিজেদের লোকজন নিয়ে শহর থেকে পালিয়ে যাচ্ছে।
সিরাজ : তাহলেও আশা! ভীরু প্রতারকের দল চিরকালই পালায়। কিন্তু তাতে বীরের মনোবল ক্ষুণ্ন হয় না। এমনি করে পালাতে পারতেন মিরমর্দান, মোহনলাল, বদ্রিআলি, নৌবে সিং। তার বদলে তাঁরা পেতেন শত্রুর অনুগ্রহ, প্রভূত সম্পদ এবং সম্মান। কিন্তু তা তাঁরা করেননি। দেশের স্বাধীনতার জন্যে দেশবাসীর মর্যাদার জন্যে, তাঁরা জীবন দিয়ে গেছেন। স্বার্থান্ধ প্রতারকের কাপুরুষতা বীরের সংকল্প টলাতে পারেনি। এই আদর্শ যেন লাঞ্ছিত না হয়। দেশপ্রেমিকের রক্ত যেন আবর্জনার স্তুপে চাপা না পড়ে।
(জনতা নীরব। সিরাজের অস্থির পদচারণা)
সিরাজ : সমস্ত দুর্বলতা ঝেড়ে ফেলে আপনারা ভেবে দেখুন, কে বেশি শক্তিমান? একদিকে দেশের সমস্ত সাধারণ মানুষ-অন্যদিকে মুষ্টিমেয় কয়েকজন বিদ্রোহী। তাদের হাতে অস্ত্র আছে, আর আছে ছলনা এবং শাঠ্য। অস্ত্র আমাদেরও আছে, কিন্তু তার চেয়ে যা বড়, সবচেয়ে যা বড় আামদের আছে সেই দেশপ্রেম এবং স্বাধীনতা রক্ষার সংকল্প। এই অস্ত্র নিয়ে আমরা কাপুরুষ দেশদ্রোহীদের অবশ্যই দমন করতে পারব।
ব্যক্তি : সাধারণ মানুষ তো যুদ্ধ কৌশল জানে না, হুজুর।
সিরাজ : তবু তাদের সংঘবদ্ধ হতে হবে। হাজার মানুষ একযোগে রুখে দাঁড়াতে পারলে কৌশলের প্রয়োজন হবে না। বিক্রম দিয়েই আমরা শত্রুকে হতবল করতে পারব। তা না হলে, ভবিষ্যতে বছরের পর বছর, দেশের সাধারণ মানুষ দেশদ্রোহী এবং বিদেশি দস্যুর হাতে যে ভাবে উৎপীড়িত হবে তা অনুমান করাও কষ্টকর। আপনারা ভেবে দেখুন, কেন এই যুদ্ধ? মুসলমান মিরজাফর, ব্রাহ্মণ রাজবল্লভ, কায়স্থ রায়দুর্লভ, জৈন মহাতাব চাঁদ শেঠ, শিখ উমিচাঁদ, ফিরিঙ্গি খ্রিষ্টান ওয়াটস ক্লাইভ আজ একজোট হয়েছে কিসের জন্যে? সিরাজউদ্দৌলাকে ধবংস করবার প্রয়োজন তাদের কেন এত বেশি? তারা চায় মসনদের অধিকার। কারণ, তা না হলে তাদের ব্যক্তিগত স্বার্থ রক্ষা হয় না। দেশের উপরে অবাধ লুঠতরাজের একচেটিয়া অধিকার তারা পেতে পারে না সিরাজউদ্দৌলা বর্তমান থাকতে। একবার সে সুযোগ পেতে তাদের আসল চেহারা আপনারা দেখতে পাবেন। বাংলার ঘরে ঘরে হাহাকারের বন্যা বইয়ে দেবে মিরজাফর-ক্লাইভের লুণ্ঠন অত্যাচার। কিন্তু তখন আর কোনো উপায় থাকবে না। তাই সময় থাকতে একযোগে মাথা তুলে দাঁড়ান। আপনারা অবশ্যই জয়লাভ করবেন। (উদ্দীপনা দানের চেষ্টা)
ব্যক্তি : কিন্তু জাঁহাপনা, সৈন্য পরিচালনার যোগ্য সেনাপতিও তো আমাদের নেই।
সিরাজ : আছে। সেনাপতি মোহনলাল বন্দি হননি। তিনি অবিলম্বে আমাদের সঙ্গে যোগ দেবেন। তাছাড়া আমি আছি। মরহুম আলিবর্দীর আমল থেকে এ পর্যন্ত কোন যুদ্ধে আমি শরিক হইনি? পরাজিত হয়েছি একমাত্র পলাশিতে। কারণ সেখানে যুদ্ধ হয়নি, হয়েছে যুদ্ধের অভিনয়। আবার যুদ্ধ হবে, আর সৈন্য পরিচালনা করব আমি নিজে। আমাদের সঙ্গে যোগ দেবেন বিহার থেকে রামনারায়ণ, পাটনা থেকে ফরাসি বীর মসিয়েল।
(বার্তাবাহকের প্রবেশ)
বার্তা : সেনাপতি মোহনলাল বন্দি হয়েছেন, জাঁহাপনা।
সিরাজ : (কিছুটা হতাশ) মোহনলাল বন্দি হয়েছে?
জনতা : তাহলে আর কোনো আশা নেই। কোনো আশা নেই।
(জনতা দরবার কক্ষ ত্যাগ করতে লাগল)
সিরাজ : মোহনলাল বন্দি? (কতকটা যেন আত্মা-সংবরণ করে) তাহলেও কোনো ভয় নেই। আপনারা হাল ছেড়ে দেবেন না।
(সিরাজ হাত তুলে পলায়নপর জনতাকে আশ্বাস দেবার চেষ্টা করতে লাগলেন। জনতা তাতে কান না দিয়ে পালাতেই লাগল।)
সিরাজ : আমার পাশে এসে দাঁড়ান। আমরা শত্রুকে অবশ্যই রুখব।
(সবাই বেরিয়ে গেল। অবসন্ন সিরাজ আসনে বসে পড়লেন। দুহাতে মুখ ঢাকলেন। ধীরে ধীরে সন্ধ্যার আঁধার ঘনিয়ে এল। লুৎফার প্রবেশ। মাথায় হাত রেখে ডাকলেন)
লুৎফা : নবাব।
সিরাজ : (চমকে উঠে) লুৎফা! তুমি এই প্রকাশ্য দরবারে কেন, লুৎফা?
লুৎফা : অন্ধকারের ফাঁকা দরবারে বসে থেকে কোনো লাভ নেই নবাব।
সিরাজ : (রুদ্ধ কণ্ঠে)। কেউ নেই, কেউ আমার সঙ্গে দাঁড়াল না, লুৎফা। দরবার ফাঁকা হয়ে গেল।
লুৎফা ; (কাঁধে হাত রেখে) তবু ভেঙে পড়া চলবে না, জাঁহাপনা। এখান থেকে যখন হলো না তখন যেখানে আপনার বন্ধুরা আছেন, সেখান থেকেই বিদ্রোহীদের শাস্তি দেবার আয়োজন করতে হবে।
সিরাজ : যেখানে আমার বন্ধুরা আছেন? হ্যাঁ, আপাতত পাটনায় যেতে পারলে একটা কিছু করা যাবে।
লুৎফা : তাহলে আর বিলম্ব নয়, জাঁহাপনা। এখুনি প্রাসাদ ত্যাগ করা দরকার।
সিরাজ : হ্যাঁ, তাই যাই।
লুৎফা : আমি তার আয়োজন করে ফেলেছি।
সিরাজ : কী আর আয়োজন লুৎফা। দু তিন জন বিশ্বাসী খাদেম সঙ্গে থাকলেই যথেষ্ট। তোমরা প্রাসাদেই থাক। আবার যদি ফিরি, দেখা হবে।
লুৎফা ; না, আমি যাব আপনার সঙ্গে।
সিরাজ : মানুষের দৃষ্টি থেকে চোরের মতো পালিয়ে পালিয়ে আমাকে পথ চলতে হবে। সে-কষ্ট তুমি সইতে পারবে না লুৎফা।
লুৎফা : পারব। আমাকে পারতেই হবে। বাংলার নবাব যখন পরের সাহায্যের আশায় লালায়িত তখন আমার কিসের অহংকার? মৃত্যু যখন আমার স্বামীকে কুকুরের মতো তাড়া করে ফিরছে তখন আমার কিসের কষ্ট? আমি যাব আমি সঙ্গে যাব।
(কান্নায় ভেঙে পড়লেন। সিরাজ তাঁকে দুহাতে গ্রহণ করলেন।)
[দৃশ্যান্তর]

চতুর্থ অঙ্ক- প্রথম দৃশ্য
সময় : ১৭৫৭ সাল, ২৯এ জুন।
স্থান : মিরজাফরের দরবার।
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে- রাজবল্লভ, জগৎশেঠ, নকিব, মিরজাফর, ক্লাইভ, ওয়াটস, কিলপ্যাট্রিক, উমিচাঁদ, প্রহরী, মিরন, মোহাম্মদি বেগ।]

(রাজবল্লভ, জগৎশেঠ, রায়দুর্লভসহ অন্যান্য আমির ওমরাহরা দরবারে আসীন। দরবার কক্ষ এমনআনন্দ-কোলাহলে মুখর যে সেটাকে রাজদরবারের পরিবর্তে নাচ-গানের মজিলস বলেও ভেবে নেওয়া যেতে পারে।)

রাজবল্লভ : কই আসর জুড়িয়ে গেল যে। নতুন নবাব সাহেবের (মীর জাফর) দরবারে আসতে এত দেরি হচ্ছে কেন?
জগৎশেঠ : ঢাল-তলোয়ার ছেড়ে নবাবি লেবাস নিচ্ছেন খাঁ সাহেব, একটু দেরি তো হবেই। তাছাড়া চুলের নতুন খেজাব, চোখে সুর্মা, দাড়িতে আতর এ সব তাড়াহুড়ার কাজ নয়।
রাজবল্লভ : দর্জি নতুন পোশাকটা নিয়ে ঠিক সময়ে পৌঁছেছে কি না কে জানে।
জগৎশেঠ : না না, সে ভাবনা নেই। নবাব আলিবর্দী ইন্তেকাল করার আগের দিন থেকেই পোশাকটি তৈরি। আমি ভাবছি সিংহাসনে বসবার আগেই খাঁ সাহেব সিরাজউদ্দৌলার হারেমে ঢুকে পড়লেন কি না।
রাজবল্লভ : তবেই হয়েছে। বেশুমার হুর-গেলমানদের বিচিত্র ওড়নার গোলকধাঁধা এড়িয়ে বার হয়ে আসতে খাঁ সাহেবের বাকি জীবনটাই না খতম হয়ে যায়।
(নকীবের ঘোষণা)
নকীব : সুবে বাংলার নবাব, দেশবাসীর ধন-দৌলত, জান-সালামতের জিম্মাদার মির মুহম্মদ জাফর আলি খান দরবারে তশরিফ আনছেন। হুঁশিয়ার… (মিরজাফরের প্রবেশ, সঙ্গে মিরন। সবাই সসম্ভ্রমে উঠে দাঁড়াল। মিরজাফর ধীরে ধীরে সিংহাসনের কাছে গেলেন। একবার আড়াআড়িভাবে সিংহাসনটা প্রদক্ষিণ করলেন। তারপর একপাশে গিয়ে একটা হাতল ধরে দাঁড়ালেন। দরবারের সবাই কিছুটা বিস্মিত।)
রাজবল্লভ : (সিংহাসনের দিকে ইঙ্গিত করে) আসন গ্রহণ করুন সুবে বাংলার নবাব। দরবার আপনাকে কুর্নিশ করবার জন্যে অধৈর্য হয়ে অপেক্ষা করছে।
মিরজাফর : (চারিদিকে তাকিয়ে) কর্নেল সাহেব এসে পড়লেন বলে।
জগৎশেঠ : কর্নেল সাহেব এসে কোম্পানির পক্ষ থেকে নজরানা দেবেন সে তো দরবারের নিয়ম।
মিরজাফর : হ্যাঁ, উনি এখুনি আসবেন।
রাজবল্লভ : (ঈষৎ অসহিষ্ণু) কর্নেল ক্লাইভ আসা অবধি দেশের নবাব সিংহাসনের হাতল ধরে দাঁড়িয়ে থাকবেন নাকি?
(নাকীবের ঘোষণা)
নকীব : মহামান্য কোম্পানির প্রতিনিধি কর্নেল রবার্ট ক্লাইভ বাহাদুর, দরবার হুশিয়ার…
(ক্লাইভের প্রবেশ। সঙ্গে ওয়াটস কিলপ্যাট্রিক। গোটা দরবার সন্ত্রস্ত। মিরজাফরের মুখ আনন্দে ভরে উঠল।)
ক্লাইভ : লং লিভ জাফর আলি খান। বাট হোয়াট ইজ দিস? নবাব মসনদের পাশে দাঁড়িয়ে আছেন ইনি কি নবাব না ফকির?
মিরজাফর : (বিনয়ের সঙ্গে) কর্নেল সাহেব হাত ধরে তুলে না দিলে আমি মসনদে বসবো না।
ক্লাইভ : (প্রচণ্ড বিস্ময়ে) হোয়াট? দিস ইজ ফ্যান্টাসটিক আই মাস্ট সে। আপনি নবাব, এ মসনদ আপনার। আমি তো আপনার রাইয়াৎ (প্রজা) -আপনাকে নজরানা দেব।
মিরজাফর : মিরজাফর বেইমান নয়, কর্নেল ক্লাইভ। বাংলার মসনদের জন্যে আমি আপনার কাছে ঋণী। সে মসনদে বসতে হলে আপনার হাত ধরেই বসব, তা না হলে নয়।
ক্লাইভ : (ওয়াটস নিচু স্বরে) নো ক্লাউন উইল এভার বিট হিম। (দরবারের উদ্দেশে) আমাকে লজ্জায় ফেলেছেন নবাব জাফর আলি খান। আই এম কমপ্লিটলি ওভারহোয়েলমড। বুঝতে পারছিনে কী করা দরকার। (এগিয়ে গিয়ে মিরজাফরের হাত ধরল। তাকে সিংহাসনে বসিয়ে দিতে দিতে) জেন্টেলমেন, আই প্রেজেন্ট ইউ দ্যা নিউ নবাব, হিজ এক্সিলেন্সি জাফর আলি খান। আপনাদের নতুন নবাব জাফর আলি খানকে আমি মসনদে বসিয়ে দিলাম। মে গড হেল্প হিম এ্যান্ড হেল্প ইউ এ্যান্ড ওয়েল।
ওয়াটস ও কিলপ্যাট্রিক : হিপ হিপ হুররে।
(মিরজাফর মসনদে বসলেন। দরবারের সবাই কুর্নিশ করল।)
ক্লাইভ : আপনাদের দেশে আবার শান্তি আসল।
(কিলপ্যাট্রিকের কাছ থেকে একটি সুদৃশ্য তোড়া নিয়ে নবাবের পায়ের কাছে রাখল)
ক্লাইভ : কোম্পানির তরফ থেকে আমি নবাবের নজরানা দিলাম।
ওয়াট্স ও কিলপ্যাট্রিক : লং লিভ জাফর আলি খান।
(একে একে অন্যেরা নজরানা দিয়ে কুর্নিশ করতে লাগল। হঠাৎ পাগলের মতো চিৎকার করতে করতে উমিচাঁদের প্রবেশ। দৌড়ে ক্লাইভের কাছে গিয়ে)
উমিচাঁদ : আমাকে খুন করে ফেলো- আমাকে খুন করে ফেল। (ক্লাইভের তলোয়ারের খাপ টেনে নিয়ে নিজের বুকে ঠুকতে ঠুকতে) খুন কর, আমাকে খুন কর।
মিরজাফর : কী হয়েছে? ব্যাপার কী?
উমিচাঁদ : ওহ সব বেইমান-বেইমান! না, আমি আত্মহত্যা করব। (নিজের গলা সবলে চেপে ধরল। গলা দিয়ে ঘড়ঘড় আওয়াজ বেরুতে লাগল। ক্লাইভ সবলে তার হাত ছাড়িয়ে ঝাঁকুনি দিতে দিতে)
ক্লাইভ : হাউ ইউ গন ম্যাড?
উমিচাঁদ : ম্যাড বানিয়েছ। এখন খুন করে ফেল। দয়া করে খুন কর কর্নেল সাহেব।
ক্লাইভ : ডোন্ট বি সিলি। কী হয়েছে তা তো বলবে?
উমিচাঁদ : আমার টাকা কোথায়?
ক্লাইভ : কীসের টাকা?
উমিচাঁদ : দলিলে সই করে দিয়েছিলে, সিরাজউদ্দৌলা হেরে গেলে আমাকে বিশ লক্ষ টাকা দেওয়া হবে।
ক্লাইভ : কোথায় সে দলিল?
উমিচাঁদ : তোমরা জাল করেছ। (দৌড়ে সিংহাসনের কাছে গিয়ে) আপনি বিচার করুন। আপনি নবাব সুবিচার করুন।
ক্লাইভ : আমি এর কিছুই জানিনে।
উমিচাঁদ : তা জানবে কেন সাহেব। নবাবের রাজকোষ বাঁটোয়ারা করে তোমার ভাগে পড়েছে একুশ লাখ টাকা। সকলের ভাগেই অংশ মতো কিছু না কিছু পড়েছে। শুধু আমার বেলাতে…
(ক্রন্দন)
ক্লাইভ : (সবলে উমিচাঁদের বাহু আকর্ষণ করে) ইউ আর ড্রিমিং উমিচাঁদ, তুমি খোয়াব দেখছ।
উমিচাঁদ : খোয়াব দেখছি? দলিলে পরিষ্কার লেখা বিশ লক্ষ টাকা পাব। তুমি নিজে সই করেছ।
ক্লাইভ : আমি সই করলে আমার মনে থাকত। তোমার বয়স হয়েছে- মাথায় গোলমাল দেখা দিয়েছে এখন তুমি কিছুদিন তীর্থ কর- ঈশ্বরকে ডাক। মন ভালো হবে। (উমিচাঁদকে কিলপ্যাট্রিকের হাতে দিয়ে দিল। সে তাকে বাইরে টেনে নিয়ে গেল। উমিচাঁদ চিৎকার করতে লাগল; আমার টাকা, আমার টাকা।)
ক্লাইভ : উমিচাঁদের মাথা খারাপ হয়েছে। ইওর এক্সিলেন্সি, মে ফরগিভ আস।
জগৎশেঠ : এমন শুভ দিনটা থমথমে করে দিয়ে গেল।
ক্লাইভ : ভুলে যান। ও কিছু নয়। (নবাবের দিকে ফিরে) আমার মনে হয় আজ প্রথম দরবারে নবাবের কিছু বলা উচিত।
রাজবল্লভ : নিশ্চয়ই। প্রজাসাধারণ আশ্বাসে আবার নতুন করে বুক বাঁধবে। রাজকার্য পরিচালনায় কাকে কী দায়িত্ব দেওয়া হবে তাও মোটামুটি তাদেরকে জানানো দরকার।
মিরজাফর : (ধীরে ধীরে উঠে দাঁড়িয়ে-পাগড়ি ঠিক করে) আজকের এই দরবারে আমরা সরকারি কাজ আরম্ভ করার আগে কর্নেল ক্লাইভকে শুকরিয়া জানাচ্ছি তাঁর আন্তরিক সহায়তার জন্যে। বিনিময়ে আমি তাকে ইনাম দিচ্ছি বার্ষিক চার লক্ষ টাকা আয়ের জমিদারি চব্বিশ পরগণার স্থায়ী মালিকানা।
(ওয়াটস ও কিলপ্যাট্রিক এক সঙ্গে : হুররে। ক্লাইভ হাসিমুখে মাথা নোয়ালো।)
মিরজাফর : দেশবাসীকে আমি আশ্বাস দিচ্ছি যে, তাঁদের দুর্ভোগের অবসান হয়েছে। সিরাজউদ্দৌলার অত্যাচারের হাত থেকে তাঁরা নিষ্কৃতি পেয়েছেন। এখন থেকে কারও শান্তিতে আর কোনো রকম বিঘ্ন ঘটবে না।
(প্রহরীর প্রবেশ)
প্রহরী : সেনাপতি মির কাশেমের দূত।
মিরজাফর : হাজির কর।
(বসলেন। দূতের প্রবেশ। মিরন দ্রুত তার কাছে এগিয়ে এল। মিরনের হাতে পত্র প্রদান।
মিরন পত্র খুলেই উল্লসিত হয়ে উঠল।)
মিরন : পলাতক সিরাজউদ্দৌলা মির কাশেমের সৈন্যদের হাতে ভগবানগোলায় বন্দি হয়েছে। তাকে রাজধানীতে নিয়ে আসা হচ্ছে।
(মিরজাফরের হাতে পত্র প্রদান)
ক্লাইভ : ভালো খবর। ইউ ক্যান রিয়েলি সেফ নাও।
মিরজাফর : কিন্তু তাকে রাজধানীতে নিয়ে আসবার কী দরকার? বাইরে যে কোনো জায়গায় আটকে রাখলেই তো চলত।
ক্লাইভ : (রুখে উঠল) নো, ইওর অনার। এখন আপনাকে শক্ত হতে হবে। শাসন চালাতে হলে মনে দুর্বলতা রাখলে চলবে না। আপনি যে শাসন করতে পারেন, শাস্তি দিতে পারেন, দেশের লোকের মনে সে কথা জাগিযে রাখতে হবে এভরি মোমেন্ট। কাজেই সিরাজউদ্দৌলা শিকল-বাঁধা অবস্থায় পায়ে হেঁটে সবার চোখের সামনে দিয়ে আসবে জাফরগঞ্জের কয়েদখানায়। কোনো লোক তার জন্যে এতটুকু দয়া দেখালে তার গর্দান যাবে। এখন মসনদের মালিক নবাব জাফর আলি খান। সিরাজউদ্দৌলা এখন কয়েদি, ওয়ার ক্রিমিন্যাল। তার জন্যে যে সিমপ্যাথি দেখাবে সে ট্রেটার। আর আইনে ট্রেটারের শাস্তি মৃত্যু। অ্যান্ড দ্যাট ইজ হাউ ইউ মাস্ট রুল।
মিরজাফর ; আপনারা সবাই শুনেছেন আশা করি। সিরাজকে বন্দি করা হয়েছে। যথাসময়ে তার বিচার হবে। আমি আশা করি কেউ তার জন্যে সহানুভূতি দেখিয়ে নিজের বিপদ টেনে আনবেন না।
ক্লাইভ : ইয়েস। তাছাড়া মুর্শিদাবাদের রাজপথ দিয়ে যখন তাকে সোলজাররা টানতে টানতে নিয়ে যাবে তখন রাস্তার দুধার তেকে অর্ডিনারি পাবলিক তার মুখে থুথু দেবে- দে মাস্ট স্পিট অন হিজ ফেস।
মিরজাফর : অতটা কেন?
ক্লাইভ : আমি জান হি ইজ এ ডেড হর্স। কিন্তু এটা না করলে লোকে আপনার ক্ষমতা দেখে ভয় পাবে কেন? পাবলিকের মনে টেরর জাগিয়ে রাখতে পারাটাই শাসন ক্ষমতার গ্রানাইট ফাউন্ডেশন। (আতঙ্ক সৃষ্টি করা)
(মিরজাফর মসনদ থেকে নেমে দাঁড়াতেই দরবারে কাজ শেষ হলো। নবাব দরবার থেকে বেরিয়ে গেলেন, সঙ্গে সঙ্গে প্রধান অমাত্যরা এবং তার পেছনে অন্য সকলে। মঞ্চের আলো আস্তে আস্তে ক্ষীণ হয়ে গেল: কিন্তু প্রেক্ষাগৃহ অন্ধকার। ধীরে ধীরে মঞ্চে অনুজ্জ্বল আলো জ্বলে উঠল। কথা বলতে বলতে ক্লাইভ এবং মিরনের প্রবেশ।)
ক্লাইভ : আজ রাত্রেই কাজ সারতে হবে। এসব ব্যাপারে চান্স নেওয়া চলে না।
মিরন : কিন্তু হুকুম দেবে কে? আব্বা রাজি হলেন না।
ক্লাইভ : রাজবল্লভকে বল।
মিরন : তিনি নাকি অসুস্থ। তাঁর সঙ্গে দেখাই করা গেল না।
ক্লাইভ : দেন?
মিরন : রায়দুর্লভ ইয়ার লুৎফ খাঁ-ওঁরাও রাজি হলেন না।
ক্লাইভ : তাহলে তোমাকে সেটা করতে হবে।
মিরন : প্রহরীরা আমার হুকুম শুনবে কেন?
ক্লাইভ : তোমার নিজের হাতেই সিরাজউদ্দৌলাকে মারতে হবে ইন ইওর ওন ইনটারেস্ট। সে বেঁচে থাকতে তোমার কোনো আশা নেই। নবাবি মসনদ তো পরের কথা, আপাতত হোয়াট অ্যাবাউট দ্যা লাভলি প্রিন্সেস? লুৎফুন্নিসা তোমার কাছে ধরা দেবে কেন সিরাজউদ্দৌলা জীবিত থাকতে?
মিরন : আমি একজন লোক ব্যবস্থা করেছি। সে কাজ করবে, কিন্তু তোমার হুকুম চাই।
ক্লাইভ : হোয়াট এ পিটি, হায়ার্ড কিলাররা পর্যন্ত তোমার কথায় বিশ্বাস করে না। এনি ওয়ে, ডাক তাকে।
(মিরন বেরিয়ে গেল এবং মোহাম্মদি বেগকে নিয়ে ফিরে এল।)
মিরন : মোহাম্মদি বেগ।
ক্লাইভ : তুমি রাজি আছ?
মোহাম্মদি বেগ : দশ হাজার টাকা দিতে হবে। পাঁচ হাজার অগ্রিম।
ক্লাইভ : এগ্রিড (মিরনকে) ওকে টাকাটা এখুনি দিয়ে দাও।
(মিরন এবং মোহাম্মদি বেগ বেরুবার উপক্রম করল)
ক্লাইভ : দেয়ার মে বি ট্রাবল, অবস্থা বুঝে কাজ কর, বি কেয়ারফুল। কাজ ফতে হলেই আামকে খবর দেবে, যাও।
(ওরা বেরিয়ে গেল। ক্লাইভের মুখটা কঠিন হয়ে উঠল। বাঁ হাতের তালুতে ডান হাতের মুঠো দিয়ে আঘাত করে বললো)
ইট ইজ এ মাস্ট।
