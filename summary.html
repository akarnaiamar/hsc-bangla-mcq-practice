চতুর্থ অঙ্ক-দ্বিতীয় দৃশ্য
সময় : দোসরা জুলাই।
স্থান : জাফরাগঞ্জের কয়েদখানা
[শিল্পীবৃন্দ : মঞ্চে প্রবেশের পর্যায় অনুসারে-কারা প্রহরী, সিরাজ, মিরন, মোহাম্মদি বেগ]
(প্রায়-অন্ধকার কারাকক্ষে সিরাজউদ্দৌলা। এক কোণে একটি নিরাবরণ দড়ির খাটিয়া, অন্য প্রান্তে একটি সোরাহি এবং পাত্র। সিরাজ অস্থিরভাবে পায়চারি করছেন আর বসছেন। কারাকক্ষের বাইরে প্রহরারত শান্ত্রী। মিরন এবং তার পেছনে মোহাম্মদি বেগের প্রবেশ। তার দুহাত বুকে বাঁধা। ডান হাতে নাতিদীর্ঘ মোটা লাঠি। প্রহরী দরজা খুলতেই কামরায় একটুখানি আলো প্রতিফলিত হলো।)

সিরাজ : (খাটিয়ায় উপবিষ্ট-আলো দেখে চমকে উঠে) কোথা থেকে আলো আসছে। বুঝি প্রভাত হয়ে এল।
(খাটিয়া থেকে উঠে মঞ্চের সামনে এগিয়ে এল। মঞ্চের মাঝামাঝি এসে দাঁড়াল মিরন এবং তার পেছনে মোহাম্মদি বেগ।)
সিরাজ : (মোনাজাতের ভঙ্গিতে হাত তুলে) এ প্রভাত শুভ হোক তোমার জন্যে, লুৎফা। শুভ হোক আমার বাংলার জন্যে। নিশ্চিত হোক বাংলার প্রত্যেকটি নরনারী। আলহামদুলিল্লাহ।
মিরন : আল্লাহর কাছে মাফ-চেয়ে নাও শয়তান।
সিরাজ: (চমকে উঠে) মিরন! তুমি এ সময়ে এখানে? আমাকে অনুগ্রহ দেখাতে এসেছ, না পীড়ন করতে?
মিরন : তোমার অপরাধের জন্য নবাবের দণ্ডাজ্ঞা শোনাতে এসেছি।
সিরাজ : নবাবের দণ্ডাজ্ঞা?
মিরন : বাংলার প্রজাসাধারণকে পীড়নের জন্যে, দরবারের পদস্থ আমির ওমরাহদের মর্যাদাহানির জন্যে, বাংলাদেশে ইস্ট ইন্ডিয়া কোম্পানির আইনসঙ্গত বাণিজ্যের অধিকার ক্ষুণ্ন করবার জন্যে, অশান্তি এবং বিপ্লব সৃষ্টির জন্যে তুমি অপরাধী। নবাব জাফর আলি খান এই অপরাধের জন্য তোমাকে মৃত্যুদণ্ড দিয়েছেন।
সিরাজ : মৃত্যুদণ্ড? জাফর আলি খান স্বাক্ষর করেছেন? কই দেখি।
মিরন : আসামির সে অধিকার থাকে নাকি? (পেছনে ফিরে) মোহাম্মদি বেগ।
মোহাম্মদি বেগ : জনাব।
মিরন : নবাবের হুকুম তামিল কর।
(সঙ্গে সঙ্গে বেরিয়ে গেল। মোহাম্মদি বেগ লাঠিটা মুঠো করে ধরে সিরাজের দিকে এগোতে লাগল)
সিরাজ : প্রথমে মিরন তারপর মোহাম্মদি বেগ। মিরন তবু মিরজাফরের পুত্র, কিন্তু তুমি মোহাম্মদি বেগ, তুমি আসছ আমাকে খুন করতে?
(মোহাম্মদি বেগ তেমনি এগোতে লাগল। সিরাজ হঠাৎ ভয় পেয়ে পিছিয়ে যেতে যেতে।)
সিরাজ : আমি মৃত্যুর জন্যে তৈরি। কিন্তু তুমি এ কাজ কোরো না মোহাম্মদি বেগ।
(মোহাম্মদি বেগ তবু এগোচ্ছে। সিরাজ আরও ভীত)
সিরাজ : তুমি এ কাজ করো না মোহাম্মদি বেগ। অতীতের দিকে চেয়ে দেখ, চেয়ে দেখ। আমার আব্বা-আম্মা পুত্র স্নেহে তোমাকে পালন করেছেন। তাঁদেরই সন্তানের রক্তে স্নেহের ঋণ আঃ…
(লাঠি দিয়ে মাথায় প্রচণ্ড আঘাত করল। সিরাজ লুটিয়ে পড়ল। মোহাম্মদি বেগ স্থির দৃষ্টিতে দেখতে লাগল মাথা ফেটে ফিনকি দিয়ে রক্ত বার হচ্ছে। ডান হাতের কনুই এবং বাঁ হাতের তালুতে ভর দিয়ে সিরাজ কিছুটা মাথা তুললেন)
সিরাজ : (স্থলিত কণ্ঠে) লুৎফা, খোদার কাছে শুকরিয়া, এ পীড়ন তুমি দেখলে না।
(মোহাম্মদি বেগ লাঠি ফেলে খাপ থেকে ছোরা খুলে সিরাজের লুণ্ঠিত দেহের ওপরে ঝাঁপিয়ে পড়ল এবং তার পিঠে পর পর কয়েকবার ছোরার আঘাত করল। সিরাজের দেহে মৃত্যুর আকুঞ্চন। মোহাম্মদি বেগ উঠে দাঁড়াল)
সিরাজ : (ঈষৎ মাথা নাড়বার চেষ্টা করতে করতে মৃত্যু-নিস্তেজ কণ্ঠে) লা ইলাহা ইল্লাল্লাহ…
(মোহাম্মদি বেগ লাথি মারল। সঙ্গে সঙ্গে সিরাজের জীবন শেষ হলো। শুধু মৃত্যুর আক্ষেপে তার হাত দুটো মাটি আঁকড়ে ধরবার চেষ্টায় মুষ্টিবদ্ধ হয়ে কাঁপতে কাঁপতে চিরকালের মতো নিস্পন্দ হয়ে গেল।)
মোহাম্মদি
বেগ : (উল্লাসের সঙ্গে) হা হা হা….

আলিবর্দি (মির্জা মুহম্মদ আলিবর্দি খাঁ) : (১৬৭৬-১০.০৪.১৭৫৬ খ্রি.)। প্রকৃত নাম মির্জা মুহম্মদ আলি। তিনি ১৭৪০ সাল থেকে ১৭৫৬ সাল পর্যন্ত বাংলা, বিহার ও উড়িষ্যার নবাব ছিলেন। আলিবর্দি খাঁর বাবা ছিলেন আরব দেশীয় এবং মা তুর্কি। ইরানের (পারস্য) এই সামান্য সৈনিক ভাগ্যান্বেষণে ভারতবর্ষে এসেছিলেন। চাকরির উদ্দেশ্যে দিল্লিতে এসে সুবিধা করতে না পেরে তিনি বাংলার নবাব মুর্শিদকুলি খাঁর জামাতা সুজাউদ্দিনের দরবারের পারিষদ ও পরে একটি জেলার ফৌজদার নিযুক্ত হন। ১৭২৭ খ্রিস্টাব্দে মুর্শিদকুলি খাঁর মৃত্যুর পর তিনি ও তাঁর অগ্রজ হাজি আহমদের বুদ্ধিতে সুজাউদ্দিন বাংলার মসনদে বসেন। খুশি হয়ে সুজাউদ্দিন তাঁকে ‘আলিবর্দি’ উপাধি দিয়ে রাজ্যের ফৌজদার নিযুক্ত করেন। ১৭৩৩ খ্রিস্টাব্দে বিহার বাংলার সঙ্গে যুক্ত হলে তিনি বিহারের নায়েব সুবা পদে অভিষিক্ত হন। ১৭৩৯ খ্রিস্টব্দে সুজাউদ্দিনের মৃত্যুর পর নবাব হন তাঁর পুত্র সরফরাজ খাঁ। কিন্তু বিহারের সুবেদার আলিবর্দী খাঁ তখন অপরিসীম শক্তি ও সামর্থ্যর অধিকারী। অমাত্যবর্গও তাঁর অনুগত। অবশেষে ১৭৪০ সালের ৯ই এপ্রিল মুর্শিদাবাদের কাছে গিরিয়ার যুদ্ধে সরফরাজ খাঁকে পরাজিত করে আলিবর্দি বাংলা, বিহার ও উড়িষ্যার নবাব নিযুক্ত হন।
আলিবর্দি খাঁ ছিলেন অত্যন্ত সুদক্ষ শাসক। তিনি শাসন ব্যবস্থাকে শক্তিশালী করার জন্য হিন্দু সম্প্রদায়ের অনেক যোগ্য ব্যক্তিকে গুরুত্বপূর্ণ পদে অধিষ্ঠিত করেন। বর্গীদের অত্যাচারে দেশের মানুষ যখন অতিষ্ট তখন তিনি কঠিন হাতে তাদের দমন করেন। বর্গি প্রধান ভাস্কর পণ্ডিতসহ তেইশজন নেতাকে তিনি কৌশলে হত্যা করেন এবং বর্গিদের সঙ্গে সন্ধি স্থাপন করেন। একইভাবে তিনি অর্থনৈতিক উন্নয়নের কথা বিবেচনায় রেখে ইউরোপীয় বণিকদের উচ্ছেদ না করে কৌশলে তাদের দমিয়ে রাখেন। এভাবে অত্যন্ত বিচক্ষণতার সঙ্গে তিনি দেশে শান্তি প্রতিষ্ঠা করেন।
আলিবর্দি খাঁর কোনো পুত্রসন্তান ছিল না। তিন কন্যা ঘসেটি বেগম (মেহেরউননেসা), শাহ বেগম ও আমিনা বেগমকে তিনি তাঁর ভাই হাজি মুহম্মদের তিন পুত্রের সঙ্গে বিয়ে দেন। আশি বছর বয়সে বৃদ্ধ নবাব আলিবর্দি ১০ই এপ্রিল ১৭৫৬ সালে মৃত্যুবরণ করেন। তাঁর মৃত্যুর পর ছোট মেয়ে আমিনা বেগমের পুত্র সিরাজউদ্দৌলা বাংলা, বিহার, উড়িষ্যার নবাব নিযুক্ত হন। সিরাজ ছিলেন আলিবর্দির অত্যন্ত প্রিয়পাত্র। আলিবর্দির ইচ্ছা অনুযায়ী সিরাজ নবাব হিসেবে অধিষ্ঠিত হন।
মিরজাফর : প্রকৃত নাম মির জাফর আলি খাঁন পারস্য (ইরান) থেকে নিঃস্ব অবস্থায় ভারতবর্ষে আসেন। উচ্চ বংশীয় যুবক হওয়ায় নবাব আলিবর্দি খাঁন তাকে স্নেহ করতেন এবং বৈমাত্রেয় ভগ্নী শাহ খানমের সঙ্গে মিরজাফরের বিয়ে দেন। আলিবর্দি তাকে সরকারের উচ্চ পদে নিযুক্ত করেন। তিনি কূটকৌশল ও চাতুর্যের মাধ্যমে নবাবের অত্যন্ত প্রিয়পাত্র হয়েছিলেন এবং সেনাপতি ও বকশির পদে অধিষ্ঠিত হয়েছিলেন। কিন্তু তার মেধা, বুদ্ধি ও কৌশলের মূলে ছিল ক্ষমতালিপ্সা। ফলে আলিবর্দিকে হত্যা করার ষড়যন্ত্র থেকে শুরু করে দুর্নীতির অভিযোগে তাকে একাধিকবার ক্ষমতাচ্যুত করেছিলেন নবাব। আবার বার বার ক্ষমা পাওয়া সত্ত্বেও তার চরিত্রের বিশ্বাসঘাতকতার কোনো পরিবর্তন হয়নি।
নবাব আলিবর্দির মৃত্যুর পর যুবক সিরাজউদ্দৌলা নবাব হিসেবে সিংহাসনে আরোহণ করলে চারদিকে ষড়যন্ত্র ঘনীভূত হয়ে ওঠে। বিশেষ করে ইংরেজদের সীমাহীন লোভ ও স্বার্থপরতার ষড়যন্ত্রে অনেক রাজ অমাত্যের সঙ্গে মুখ্য ভূমিকায় অবতীর্ণ হন মিরজাফর। ইংরেজদের প্রলোভনে সিংহাসনে অধিষ্ঠিত হওয়ার আকাঙ্ক্ষায় তিনি তখন নীতি-নৈতিকতাহীন এক উন্মদে পরিণত হন। তাই পলাশির যুদ্ধে সেনাপতির পদে অধিষ্ঠিত হয়েও এবং পবিত্র কোরান ছুঁয়ে নবাবের পক্ষে যুদ্ধ করার শপথ গ্রহণ করলেও তিনি বিশ্বাসঘাতকতার পথ থেকে বিন্দুমাত্র সরে আসেননি। বরং পলাশির যুদ্ধে নবাব সিরাজের পতনকে ত্বরান্বিত করার জন্য দেশপ্রেমিক সৈনিকদের যুদ্ধ করার সুযোগ দেননি। পলাশির যুদ্ধে নবাব সিরাজের পতনের পর ক্লাইভের গাধা বলে পরিচিত মিরজাফর ১৭৫৭ সালের ২৯এ জুন ক্লাইভের হাত ধরে বাংলার মসনদে আরোহণ করেন। কিন্তু ইংরেজদের স্বার্থের পরিপন্থী বিবেচনায় তাকে গদিচ্যুত করে তার জামাতা মিরকাসিমকে বাংলার মসনদে বসান। ১৭৬৪ সালে পুনরায় তাকে সিংহাসনে বসানো হয়। ইংরেজদের কাছে বাংলার স্বাধীনতা বিকিয়ে দেওয়া এই বিশ্বাসঘাতক মানুষটি কুষ্ঠরোগে আক্রান্ত হয়ে ৫ই ফেব্রুয়ারি ১৭৬৫ সালে মারা যান। বাংলার ইতিহাসে মিরজাফর বিশ্বাসঘাতকতার প্রতীক, নিকৃষ্ট মানুষের প্রতীক। ফলে মিরজাফর মানেই হলো বিশ্বাসঘাতক।
ক্লাইভ : পিতা-মাতার অত্যন্ত উচ্ছ্বঙ্খল সন্তান ছিলেন রবার্ট ক্লাইভ। তার দৌরাত্ম্যে অস্থির হয়ে বাবা-মা তাকে ইস্ট ইন্ডিয়া কোম্পানির চাকরি দিয়ে ইংল্যান্ড থেকে ভারতবর্ষে পাঠিয়ে দেন। তখন তার বয়স মাত্র সতেরো বছর। কোম্পানির ব্যবসার মাল ওজন আর কাপড় বাছাই করতে করতে বিরক্ত হয়ে ক্লাইভ দুবার পিস্তল দিয়ে আত্মহত্যা করতে গিয়েছিলেন। কিন্তু গুলি চলেনি বলে বেঁচে যান ভাগ্যবান ক্লাইভ।
ফরাসিরা এদেশে বাণিজ্য বিস্তার ও রাজ্যজয়ের জন্য প্রস্তুত হচ্ছিল। বাজার দখল ও রাজ্য জয়কে কেন্দ্র করে তখন ফরাসিদের বিরুদ্ধে চলছিল ইংরেজ বণিকদের যুদ্ধ। সেইসব চোটখাটো যুদ্ধে সৈনিক ক্লাইভ একটার পর একটা কৃতিত্ব প্রদর্শন করেন। বোম্বাই এর মারাঠা জলদস্যুদের বিরুদ্ধে জয়লাভ করে কর্নেল পদবি লাভ করেন এবং মাদ্রাজের ডেপুটি গভর্নর পদে অধিষ্ঠিত হন।
সে সময় সিরাজউদ্দৌলা কলকাতা আক্রমণ করে ইংরেজদের ফোর্ট উইলয়াম দুর্গ দখল করে নেন। ইংরেজ পক্ষের গভর্নর ড্রেক পালিয়ে যান। কিন্তু কর্নেল ক্লাইভ অধিক সংখ্যক সৈন্যসামন্ত নিয়ে মাদ্রাজ থেকে কলকাতায় এসে দুর্গ দখল করে নেন।
তারপর চলল মুর্শিদাবাদে নবাবের সঙ্গে দরকষাকষি। ক্লাইভ ছিলেন যেমন ধূর্ত তেমনি সাহসী; আবার যেমন মিথ্যাবাদী তেমনি কৌশলী। চারদিক থেকে ষড়যন্ত্রের জাল বিস্তার করে তিনি তরুণ নবাবকে বিভ্রান্ত ও বিব্রত করার জন্য চেষ্টা করেন। নবাবের অধিকাংশ লোভী, স্বার্থপর, শঠ ও বিশ্বাসঘাতক অমাত্য ও সেনাপতিদের উৎকোচ ও প্রলোভন দিয়ে নিজের দলে ভিড়িয়ে নেন। অবশেষে তার নেতৃত্বে চন্দননগরে ফরাসি কুঠি আক্রমণ করা হয়। ফরাসিরা পালিয়ে যান। এবার ক্লাইভ নবাবের বিরুদ্ধে সরাসরি যুদ্ধ ঘোষণা করেন। ১৭৫৭ সালের ২৩এ জুন পলাশি প্রান্তরে ক্লাইভের নেতৃত্বে যুদ্ধ হয়। এ যুদ্ধ শঠতার ও বিশ্বাসঘাতকতার। সিরাজউদ্দৌলার অধিকাংশ সেনাপতি যু্দ্ধে অংশগ্রহণ করেননি। ফলে খুব সহজেই ক্লাইভের সৈন্য জয়লাভ করে।
ক্লাইভ বিশ্বাসঘাতক মিরজাফরকে বাংলার সিংহাসনে বসান। কিন্তু প্রকৃত শাসনকর্তা হন তিনি নিজেই। মিরজাফর তার অনুগ্রহে নামেমাত্র রাজ্য পরিচালনা করতেন। ১৭৬০ সালে ফেব্রুয়ারি মাসে মহাবিত্তশালী, বিজয়ী ক্লাইভ দেশে ফিরে যান। এ সময় তার বার্ষিক আয় ৪ লক্ষ টাকা।
১৭৬৪ সালের জুন মাসে ক্লাইভ ব্রিটিশ কর্তৃপক্ষের কাছ থেকে অসীম ক্ষমতা নিয়ে আবার ভারতবর্ষে ফিরে আসেন। ১৭৬৭ সালের জুলাই মাসে যখন তিনি চির দিনের জন্য লন্ডনে ফিরে যান তখন তিনি হতোদ্যম, অপমানিত ও লজ্জিত। ভারত লুণ্ঠনের বিপুল অর্থ ব্রিটিশ কোষাগারে না-রেখে আত্মসাৎ করার অপরাধে তার বিরুদ্ধে অভিযোগ দাঁড় করানো হয় তিনি লজ্জায় ও অপমানে বিষন্নতা রোগে আক্রান্ত হন এবং ১৭৭৪ সালে ২২এ নভেম্বর আত্মহত্যা করেন।
উমিচাঁদ : উমিচাঁদ লাহোরের অধিবাসী শিখ সম্প্রদায়ের লোক ছিলেন। কলকাতায় এসে প্রথমে তিনি গোমস্তার কাজ করতেন। পরে ইংরেজদের ব্যবসার দালালি করতে শুরু করেন। মাল কেনা-বেচার জন্য দালালদের তখন বেশ প্রয়োজন ছিল। দালালি ব্যবসা করে উমিচাঁদ কোটি টাকার মালিক হয়েছিলেন। কখনো কখনো নবাবের প্রয়োজনে উচ্চ সুদে টাকা ধার দিয়ে নবাবের দরবারে যথেষ্ট প্রভাবশালী হয়ে উছেছিলেন। প্রচুর টাকার অথিকারী হয়ে উমিচাঁদ দেশের রাজনীতিতে অনুপ্রবেশ শুরু করেন। উমিচাঁদ বড় ধুরন্ধর ব্যক্তি ছিলেন। ইংরেজদের কথা নবাবের কাছে এবং নবাবের কথা ইংরেজদের কাছে বলে দুপক্ষের সঙ্গে সুসম্পর্ক রাখতেন। গভর্নর রোজার ড্রেক তাকে একবার বন্দি করে ফোর্ট উইলিয়ম দুর্গে রেখেছিলেন। উমিচাঁদ মিরজাফর প্রমুখদের নবাব বিরোধী চক্রান্ত ও শলাপরামর্শের সহযোগী ছিলেন। ইংরেজদের সঙ্গে অন্যদের যে ১৫ দফা গোপন চুক্তি হয় তাতে উমিচাঁদ গো ধরে লিখিয়ে নিয়েছিলেন, ইংরেজরা জয়ী হলে তাকে কুড়ি লক্ষ টাকা দেবে। কিন্তু ক্লাইভ ছিলেন বিস্ময়কর কূটকৌশলী মানুষ। তিনি সাদা ও লাল দুরকম দলিল করে জাল দলিলটা উমিচাঁদকে ধরিয়ে দিয়েছিলেন। সাদা দলিলটা ছিল ক্লাইভের কাছে এবং তাতে উমিচাঁদের দাবির কথা উল্লেখ ছিল না।
যুদ্ধ জয়ের পরে উমিচাঁদ ক্লাইভের এই ভাঁওতা বুঝতে পেরে টাকার শোকে পাগল হয়ে পথে পথে ঘুরেছেন এবং অকালে মারা গেছেন। এদেশের ইংরেজদের ক্ষমতা দখলের পেছনে উমিচাঁদের ষড়যন্ত্র এবং বিশ্বাসঘাতকতা অনেকাংশে দায়ী।
ওয়াটস : ইস্ট ইন্ডিয়া কোম্পানির কাশিম বাজার কুঠিরের পরিচালক ছিলেন উইলিয়াম ওয়াটসন। ইংরেজদের সঙ্গে চুক্তি অনুসারে নবাবের দরবারে ইংরেজ প্রতিনিধি হিসেবে প্রবেশাধিকার ছিল তার নাদুসনুদুস মোটাসোটা এবং দেখতে সহজ-সরল এই লোকটি ছিলেন আদর্শ ও নীতিনৈতিকতা বিবর্জিত মানুষ। সর্বপ্রকার মিথ্যার আশ্রয় গ্রহণে তার জুড়ি ছিল না। মিরজাফরসহ অন্যান্য বিশ্বাসঘাতকদের সঙ্গে তিনি সর্বদা যোগাযোগ রাখতেন এবং নবাব সিরাজউদ্দৌলার বিরুদ্ধে ষড়যন্ত্রের অন্যতম প্রধান সহায়ক ব্যক্তি হিসেবে কাজ করেছেন। নারীর ছদ্মবেশে ষড়যন্ত্রের সভায় উপস্থিত হয়ে বিশ্বাসঘাতক মিরজাফর, রাজা রাজবল্লভ প্রমুখদের সঙ্গে পরামর্শ করতেন। নবাব একবার তাকে বন্দি করেছিলেন আর একাধিকবার তাকে শূলে চড়িয়ে হত্যা করার কথা ঘোষণা করেছিলেন। কিন্তু রাজবল্লভদের পরামর্শে নবাব তাকে ক্ষমা করেন। হতোদ্যম ওয়াটস দেশে ফিরে যান এবং অকালে মৃত্যুবরণ করেন। কিন্তু ওয়াটসের স্ত্রী এদেশের অন্য একজন ইংরেজ যুবককে বিয়ে করে থেকে যান।
ওয়াটসন (অ্যাডমিরাল চার্লস ওয়াটসন) : ইংরেজ পক্ষের নৌবাহিনীর প্রধান ছিলেন অ্যাডমিরাল ওয়াটসন। ওয়াটসন ছিলেন ব্রিটিশ রাজের কমিশন পাওয়া অ্যাডমিরাল। ১৭৫৬ সালের অক্টোবর মাসের ১৬ তারিখে মাদ্রাজ থেকে সৈন্যসামন্তসহ পাঁচখানি যুদ্ধ জাহাজ নিয়ে তিনি কলকাতার দিকে রওনা হন। কলকাতা তখন ছিল নবাব সিরাজউদ্দৌলার দখলে। আর ইংরেজরা ফলতা অঞ্চলে পালিয়ে যান। ইংরেজদের হয়ে যুদ্ধ করার জন্য ক্লাইভের সঙ্গে যুক্ত হন ওয়াটসন। ১৫ই ডিসেম্বর ক্লাইভ ও ওয়াটসনের সেনাবাহিনী কলকাতায় পৌঁছায়। নবাবের ফৌজদার মানিকচাঁদকে তাড়িয়ে দিয়ে ইংরেজরা কলকাতা দখল করেন। ওয়াটসন হলেন কোম্পানির সিলেক্ট কমিটির মেম্বর। ওয়াটসন মনে মনে ক্লাইভের ক্ষমতাকে তুচ্ছ জ্ঞান করতেন। উমিচাঁদকে ফাঁকি দেওয়ার জন্য যে জাল দলিলে ক্লাইভ ও মিরজাফর প্রমুখেরা সই করেছিলেন তাতে ওয়াটসন সই দেননি। তার সই নকল করা হয়েছিল। অ্যাডমিরাল ওয়াটসনের নৌবাহিনীর নেতৃত্বের জন্য ইংরেজরা অতি সহজে চন্দনগরের ফরাসিদের বিরুদ্ধে যুদ্ধে জয়লাভ করেছিলেন। অ্যাডমিরাল ওয়াটসন পলাশির যুদ্ধের দুমাস পরেই অসুস্থ হয়ে কলকাতায় মারা যান। সেন্ট জোন্স গোরস্থানে তাঁর কবর আছে।
হলওয়েল : লন্ডনের গাইস হাসপাতাল থেকে ডাক্তারি পাস করে হলওয়েল কোম্পানির চাকরি নিয়ে ভারতবর্ষে চলে আসেন। পাটনা ও ঢাকার অফিসে কিছুকাল চাকরি করে ১৭৩২ সালে তিনি সার্জন হয়ে কলকাতায় আসেন। তখন তার মাইনে ছিল পঞ্চাশ টাকা মাত্র। সুতরাং অবৈধভাবে বিপুল অর্থ-ঐশ্বর্য লাভের আশায় তিনি সিভিল সার্ভিসে চাকরি নেন। ১৭৫২ সালে তিনি চব্বিশ পরগনার জমিদারের দায়িত্ব পালন করেন। যুদ্ধের সময় তিনি ফোর্টের অস্থায়ী গভর্নর নিযুক্ত হন।
সিরাজউদ্দৌলা কলকাতা আক্রমণ করলে কোম্পানির গভর্নর ড্রেক, সৈন্যাধ্যক্ষ মিনসিনসহ সবাই নৌকায় চড়ে পালিয়ে যান। তখন ডা. হলওয়েল কলকাতার সৈন্যাধ্যক্ষ ও গভর্নর হন। কিন্তু সিরাজের আক্রমণের কাছে টিকতে পারননি। সিরাজের বাহিনী হলওয়েলকে বন্দি করে মুর্শিদাবাদে নিয়ে আসেন।
মিথ্যা বলে অতিরঞ্জিত করে অসত্য ও অন্যায়ের আশ্রয় নিয়ে নবাব সিরাজউদ্দৌলাকে এবং তাঁর শাসনামলকে কলঙ্কিত করা ছিল হলওয়েলের উদ্দেশ্য। সেই উদ্দেশ্যেই তিনি অন্ধকূপ হত্যা কাহিনি (Black Hole Tragedy) বানিয়েছিলেন।
তার বানানো গল্পটি হলো : নবাব দুর্গ জয় করে ১৮ ফুট লম্বা এবং ১৫ ফুট চওড়া একটি ঘরে ১৪৬ জন ইংরেজকে বন্দি করে রাখেন-যে ঘরের চারদিক ছিল বন্ধ। সকালে দেখা গেল ১২৩ জন ইংরেজ মারা গেছেন। অথচ দুর্গে তখন ১৪৬ জন ইংরেজ ছিলেনই না। আর এমন ছোট একটি ঘরে ১৪৬ জন মানুষ কিছুতেই সংকুলান হওয়া সম্ভব নয়। অথচ তার হিসাব-নিকাশ বোধ সম্পূর্ণ লুপ্ত হয়েছিল। আর এই মিথ্যাকে চিরস্থায়ী রূপ দেওয়ার জন্য তিনি কলকাতায় ব্লাক হোল মনুমেন্ট নির্মাণ করেছিলেন। পরে গর্ভনর ওয়ারেন হেস্টিংস এই মনুমেন্ট সরিয়ে দেন।
ঘসেটি বেগম : নবাব আলিবর্দি খানের জ্যেষ্ঠ কন্যা ঘসেটি বেগম তথা মেহেরুন্নেসা। আলিবর্দি খানের বড় ভাই হাজি আহমদের বড় ছেলে নওয়াজিস মোহাম্মদ শাহমৎ জঙ্গের সঙ্গে তাঁর বিয়ে হয়। তাদের কোনো সন্তান ছিল না তাই তিনি ছোট বোন আমিনা বেগমের ছেলে অর্থাৎ সিরাজউদ্দৌলার ভাই একরামউদ্দৌলাকে পোষ্যপুত্র হিসেবে গ্রহণ করেছিলেন। তার প্রত্যাশা ছিল যে, একরামউদ্দৌলা নবাব হলে নবাব মাতা হিসেবে রাজকার্য পরিচালনা করার সুযোগ পাবেন। কিন্তু একরামউদ্দৌলা বসন্ত রোগে অক্রান্ত হয়ে অকালে মৃত্যুবরণ করলে ঘসেটি বেগম নৈরাশ্যে অক্রান্ত হন।
ঘসেটি বেগমের স্বামী নওয়াজিস মোহাম্মদ ছিলেন ভগ্ন-স্বাস্থ্য ও দুর্বল চিত্তের অধিকারী ব্যক্তি। তিনি নিজে শাসনকার্য পরিচালনা করতে পারতেন না। শাসনকার্য পরিচালনা করতেন তার সেনাপতি হোসেন কুলি খাঁ। এই হোসেন কুলি খাঁয়ের সঙ্গে ঘসেটি বেগমের অনৈতিক সম্পর্ক ছিল বলে অনুমান করা হয়। ফলে আলিবর্দি খানের নির্দেশে সিরাজউদ্দৌলা হোসেন কুলী খাঁকে হত্যা করেন। ঘসেটি বেগম এই হত্যাকাণ্ডকে কখনই মেনে নিতে পারেননি। তাই তিনি সিরাজউদ্দৌলার প্রতি সর্বদাই ছিলেন প্রতিশোধ পরায়ণ।
বিক্রমপুরের অধিবাসী রাজা রাজবল্লভ ঢাকায় নওয়াজেস মোহাম্মদের দেওয়ান ছিলেন। ঘসেটি বেগম রাজবল্লভের সঙ্গে ষড়যন্ত্র করে সিরাজকে সিংহাসনচ্যুত করতে চেয়েছিলেন। কিন্তু সিরাজউদ্দৌলা যথাসময়ে এই ষড়যন্ত্রের কথা জেনে যান এবং ষড়যন্ত্র নস্যাৎ করে দেন। খালা ঘসেটি বেগমকে তিনি মুর্শিদাবাদের সুরম্য মতিঝিল প্রাসাদ থেকে সরিয়ে দিয়ে রাজপ্রাসাদে প্রায় বন্দি অবস্থায় রাখেন এবং তার সমস্ত টাকাকড়ি, গয়নাগাটি ও সোনাদানা বাজেয়াপ্ত করেন। কিন্তু ঘসেটি বেগমের ষড়যন্ত্র থেমে থাকেনি। তিনি নানা কৌশলে নবাব সিরাজের বিশ্বাসঘাতক আমাত্য ও ইংরেজদের সঙ্গে সম্পর্ক রেখে চলেছিলেন। ১৭৫৭ সালে পলাশির যুদ্ধে ঘসেটি বেগম ও তার দলবলের বিজয় হলেও আর দশজন বিশ্বাসঘাতকের মতো তার পরিণতিও ছিল বেদনাবহ। প্রথমে তাকে ঢাকায় অন্তরীণ করা হয়। পরে মিরনের চক্রান্তে বুড়িগঙ্গা ও শীতলক্ষার সন্ধিস্থলে ফেলে দিয়ে তাঁকে হত্যা করা হয়।
ড্রেক : রোজার ড্রেক ছিলেন ইস্ট ইন্ডিয়া কোম্পানির কলকাতার গভর্নর। ১৭৫৬ সালে সিরাজউদ্দৌলা কলকাতা আক্রমণ করেন। নবাবের আক্রমণের মুখে টিকতে না পেরে প্রাণ ভয়ে সঙ্গ-সাথিদের ফোর্ট উইলিয়ম দুর্গে ফেলে তিনি নৌকায় চড়ে কলকাতা ছেড়ে ফলতায় পালিয়ে যান।
পুনরায় ক্লাইভ কলকাতা অধিকার করলে ড্রেক গভর্নর হিসেবে দায়িত্বভার গ্রহণ করেন। কিন্তু পলাশির যুদ্ধের পর কোম্পানি ড্রেকের পরিবর্তে রবার্ট ক্লাইভকে কলকাতার গভর্নর নিযুক্ত করে। পলাশির যুদ্ধে জয়লাভের পরে গভর্নর ড্রেককে মিরজাফর তার রাজকোষ থেকে দুই লক্ষ আশি হাজার টাকা দিয়েছিলেন।
মানিকচাঁদ : রাজা মানিকচাঁদ ছিলেন নবাবের অন্যতম সেনাপতি। তিনি বাঙালি কায়স্থ, ঘোষ বংশে তার জন্ম। নবাবের গোমস্তা হিসেবে তার কর্মজীবন শুরু হয়। পরে আলিবর্দির সুনজরে পড়ে মুর্শিদাবাদে সেরেস্তাদারি পেয়েছিলেন্ ১৭৫৬ সালে জুন মাসে কলকাতা দখল করে নবাব কলকাতা শহরের আলি নগর নামকরণ করেন। আর মাণিকচাঁদকে করেন কলকাতার গভর্নর।
কিন্তু বিশ্বাসঘাতক মানিকচাঁদ ইংরেজদের সঙ্গে সর্বদাই যোগাযোগ রক্ষা করে চলেছেন। ক্লাইভ মাদ্রাজ থেকে কলকাতা পৌঁছে মানিকচাঁদকে পত্র লিখে তার সহযোগিতার জন্য কৃতজ্ঞতাজ্ঞাপন করেন। এক সময় নবাব সিরাজ মানিকচাঁদকে কলকাতার সোনাদানা লুঠ করে কুক্ষিগত করার অপরাধে বন্দি করেন। অবশেষে রায়দুর্লভদের পরামর্শে সাড়ে দশ লক্ষ টাকা জরিমানা দিয়ে মানিকচাঁদ মুক্তি পেয়েছিলেন। মানিকচাঁদ ক্লাইভের সঙ্গে যুদ্ধ না-করে কলকাতা ছেড়ে হুগলি পলায়ন করেছিলেন এবং পলাশির যুদ্ধের পূর্বে ক্লাইভকে বিনা বাধায় মুর্শিদাবাদের দিকে অগ্রসর হতে সাহায্য করেছিলেন।
জগৎশেঠ : জগৎশেঠ জৈন সম্প্রদায়ের মানুষ ছিলেন এবং তাঁর পেশা ছিল ব্যবসায়। বহুকাল ধরে হিন্দু সমাজভুক্ত হয়ে এই সমাজেরই অংশ হয়ে উঠেছিলেন তিনি। তার প্রকৃত নাম ফতেহ চাঁদ। জগৎশেঠ তার উপাধি। এর অর্থ হলো জগতের টাকা আমদানিকারী বা বিপুল অর্থের অধিকারী কিংবা অর্থ লগ্নির ব্যবসায়ী। নবাব সরফরাজ খাঁকে হটিয়ে আলিবর্দিকে সিংহাসনে আরোহনের ব্যাপারে তাঁর ভূমিকা ছিল। সুতরাং তিনি খুভ স্বাবাবিকভাবেই মনে করেছিলেন যে, নবাব আলিবর্দির মৃত্যুর পর নবাব সিরাজউদ্দৌলা তাদের বশীভূত থাকবেন এবং ব্যবসা-বাণিজ্যের ক্ষেত্রে অবৈধ সুযোগ-সুবিধা দিবেন। কিন্তু সিরাজউদ্দৌলা সততা ও নিষ্ঠার ভিন্ন প্রকৃতির এক যুবক। তিনি কিছুতেই এদের অন্যায়ের কাছে মাথা নত করেননি। বরং জগৎশেঠকে তার ষড়যন্ত্রের জন্য বিভিন্নভাবে লাঞ্ছিত করেছেন। জগৎশেঠও অন্যান্য বিশ্বাসঘাতকদের সঙ্গে সিরাজউদ্দৌলার পতনে নিষ্ঠুর ভূমিকায় অবতীর্ণ হয়েছিলেন।
আমিনা বেগম : নবাব আলিবর্দির কনিষ্ঠ কন্যা আমিনা বেগম। আলিবর্দির বড় ভাই হাজি আহমদের পুত্র জয়েন উদ্দিনের সঙ্গে তাঁর বিয়ে হয়। তাঁর তিন সন্তান। এরা হলেন মির্জা মুহাম্মদ সিরাজউদ্দৌলা, একরামউদ্দৌলা ও মির্জা হামদি। স্বামী জয়েনউদ্দিন ও পুত্র সিরাজউদ্দৌলার জীবনের চরম দুর্ভাগ্যের সঙ্গে তাঁর জীবনও আষ্টেপৃষ্ঠে জড়িয়েছিল। স্বামী জয়েনউদ্দিন প্রথমে উড়িষ্যার ও পরে বিহারের সুবেদার ছিলেন। ১৭৪৮ সালে আফগান অধিপতি আহমদ শাহ দুররানি পাঞ্জাব আক্রমণ করলে নবাব আলিবর্দির আফগান সৈন্যবাহিনী বিদ্রোহী হয়ে ওঠেন এবং পাটনা অধিকার করেন। বিদ্রোহীরা নবাবের বড় ভাই হাজি আহম্মদ ও জামাতা জয়েনউদ্দিনকে হত্যা করেন।
অতি অল্প বয়সে বিধবা আমিনা বেগম পুত্র নবাব সিরাজউদ্দৌলার মাতা হিসেবেও শান্তি লাভ করতে পারেননি। দেশি-বিদেশি বিশ্বাসঘাতকদের চক্রান্তে নবাব পরাজিত ও নিহত হলে এবং একটি হাতির পৃষ্ঠে তাঁর মরদেহ নিয়ে এলে মা আমিনা বেগম দিকবিদিক জ্ঞানশূন্য হয়ে আর্তনাদ করতে করতে ছেলেকে শেষবারের মতো দেখতে ছুটে আসেন। এ সময় মিরজাফরের রক্ষীরা তাঁর উপর চড়াও হয় এবং তাঁকে নির্যাতন করে আন্দর মহলে পাঠিয়ে দেয়। আমিনার এক পুত্র একরামউদ্দৌলা পূর্বেই বসন্ত রোগে মারা যান। পলাশির যুদ্ধে সিরাজউদ্দৌলা মিরজাফর ও অন্যান্য অমাত্যের বিশ্বাসঘাতকতায় পরাজিত ও নিহত হন। কনিষ্ঠ পুত্র মির্জা হামদিকেও মিরনের আদেশে নির্মমভাবে হত্যা করা হয়। আর আমিনা বেগমকে হাত-পা বেঁধে নদীতে ফেলে দিয়ে নির্মমভাবে হত্যা করা হয়।
মিরন : বিশ্বাসঘাতক মিরজাফরের তিন পুত্র। তারা হলেন: জ্যেষ্ঠ মিরন, মেজো নাজমুদ্দৌলা এবং কনিষ্ঠ সাইফুদ্দৌলা। মিরন পিতার মতই দুশ্চরিত্র, ব্যাভিচারী, নিষ্ঠুর এবং ষড়যন্ত্রকারী। মিরজাফরের সঙ্গে অন্যান্য বিশ্বাসঘাতক রাজ-অমাত্যদের যোগাযোগের কাজ করতেন মিরন। তারই ষড়যন্ত্রে এবং ব্যবস্থায় মোহাম্মদি বেগ হতভাগ্য নবাব সিরাজউদ্দৌলাকে নিষ্ঠুরভাবে হত্যা করেন। মিরন সিরাজউদ্দৌলার মধ্যম ভ্রাতা মৃত একরামউদ্দৌলার পুত্র মুরাদউদ্দৌলাকেও নিষ্ঠুরভাবে হত্যা করেন। তিনি সিরাজের প্রিয়তমা স্ত্রীকে বিবাহ করতে চেষ্টা করেছিলেন। কিন্তু লুৎফুন্নেসার তীব্র বিরোধিতার জন্য তার এই অভিলাষ পূর্ণ হয়নি। মিরনের অপরাধ ও পাপের সীমা নাই। বজ্রাঘাতে অকালে মারা যান এই কুৎসিত স্বভাবের মানুষটি।
মিরমর্দান : মিরমর্দান নবাব সিরাজউদ্দৌলার অত্যন্ত বিশ্বাসী সেনাপতি ছিলেন। পলাশির যুদ্ধে তিনি অসাধারণ বীরত্বের পরিচয় দিয়েছিলেন। এই অকুতোভয় বীর যোদ্ধা যুদ্ধ করতে করতে ইংরেজ শিবিরের দিকে এগুয়ে যাওয়ার সময় তার উরুতে গোলার আঘাত লাগে। মৃত্যুর কোলে ঢলে পড়ার পূর্ব মুহূর্ত পর্যন্ত তিনি যুদ্ধ করেছেন এবং অধিকাংশ সেনাপতির বিশ্বাসঘাতকতার পরিচয় দিয়ে যান।
মোহনলাল : মোহনলাল কাশ্মিরি সিরাজউদ্দৌলার অন্যতম বিশ্বস্ত সেনাপতি ছিলেন। শওকত জঙ্গের বিরুদ্ধে যুদ্ধ করার জন্য নবাব সিরাজউদ্দৌলা মোহনলালকে সেনাপতির দায়িত্ব দিয়ে প্রেরণ করেছিলেন। সেই যুদ্ধে তিনি জয়ী হয়েছিলেন। একসময় তিনি নবাবের প্রধানমন্ত্রীর পদে অধিষ্ঠিত হন। পলাশির যুদ্ধে মিরমর্দান গোলার আঘাতে মৃত্যুবরণ করলে মোহনলাল ফরাসি যোদ্ধা সাঁফ্রেকে সঙ্গে নিয়ে বীরদর্পে ইংরেজের বিরুদ্ধে যুদ্ধ চালিয়ে যান। কিন্তু মিরজাফর ও রায়দুর্লভের পরামর্শে সিরাজ মোহনলালকে যুদ্ধ বন্ধ করার নির্দেশ দেন। মোহনলাল পুত্রসহ ইংরেজদের হাতে বন্দি হন এবং ক্লাইভের নির্দেশে গুলি করে তাঁকে হত্যা করা হয়। অথচ ক্লাইভকে এক চিঠিতে ওয়াট্সন জানিয়েছেন যে, নবাবের শত্রুরা মোহনলালকে বিষ খাইয়ে হত্যা করতে চেয়েছিল যাতে নবাবকে বস্তুনিষ্ঠ পরামর্শ দেওয়ার কোনো লোক না থাকে।
মোহাম্মদি বেগ : মোহাম্মদি বেগ একজন নীচাশয় ও কৃতঘ্ন ব্যক্তি ও খুনি। পলাশির যুদ্ধে শোচনীয় পরাজয়ের পর স্ত্রী- কন্যাসহ পাটনার উদ্দেশ্যে যখন পালিয়ে যাচ্ছিলেন সিরাজ তখন মিরজাফরের ভাই মিরদাউদ সপরিবারে নবাবকে বন্দি করে রাজধানীতে নিয়ে আসে। গণবিক্ষোভের আশঙ্কায় ক্লাইভ দ্রুত সিরাজকে হত্যা করতে চান। তখন মিরনের আহবানে মোহাম্মদি বেগ সিরাজকে হত্যা করতে রাজি হয়। অথচ সিরাজের পিতা মির্জা জয়নুদ্দিন অনাথ বালক মোহাম্মদি বেগকে আদর-যত্নে মানুষ করেছিলেন। অথচ সেই মোহাম্মদি বেগ অর্থের লোভে অত্যন্ত নিষ্ঠুরভাবে পিটিয়ে ও ছুরিকাঘাতে হত্যা করে নবাব সিরাজউদ্দৌলাকে। ২রা জুলাই ১৭৫৭ সালে বাংলার শেষ স্বাধীন নবাব সিরাজউদ্দৌলা শহিদ হন।
রাজবল্লভ : রাজা রাজবল্লভ বিক্রমপুরের বাঙালি বৈদ্য সম্প্রদায়ের লোক ছিলেন। সিরাজউদ্দৌলার স্বার্থপর, অর্থলোলুপ, বিশ্বাঘাতক অমাত্যদের তিনি একজন। রাজবল্লভ ঢাকায় নৌবাহিনীর কেরানির কাজ করতেন। পরে ঢাকার গভর্নর ঘসেটি বেগমের স্বামী নোয়াজিশ খাঁর পেশকারের দায়িত্ব পালন করেন। ফলে খুব স্বাভাবিকভাবেই ঘসেটি বেগমের সঙ্গে তাঁর সখ্য গড়ে ওঠে এবং তিনি নবাব সিরাজের বিরুদ্ধে ষড়যন্ত্রে লিপ্ত হন। তিনি রাজা উপাধি লাভ করেন। হোসেন কুলী খাঁর মৃত্যুর পর রাজবল্লভ ঢাকার দেওয়ান নিযুক্ত হন। এ সময় গর্ভনর নোয়াজিশ খাঁর শাসন ব্যবস্থার দুর্বলতার সুযোগে রাজবল্লভ বিপুল অর্থবিত্তের অধিকারী হন। এই সংবাদ জেনে সিরাজ মুর্শিদাবাদ থেকে রাজবল্লভকে বন্দি করেন। কিন্তু আলিবর্দি খাঁর নির্দেশে রাজবল্লভ মুক্তি পান। রাজবল্লভের অবৈধ সম্পত্তি বাজেয়াপ্ত করার জন্য সিরাজ ঢাকায় লোক পাঠান। কিন্তু অতি ধুরন্ধর রাজবল্লভ পুত্র কৃষ্ণদাসের মাধ্যমে নৌকাভর্তি টাকাকড়ি ও স্বর্ণালংকার কলকাতায় পাঠিয়ে দেন। কৃষ্ণদাস তীর্থ যাত্রার নাম করে পুরি যাওয়ার পরিবর্তে কলকাতায় রোজার ড্রেকের ফোর্ট উইলিয়াম দুর্গে গিয়ে আশ্রয় নেন। নবাব ড্রেককে চিঠি দিয়ে কৃষ্ণদাসকে মুর্শিদাবাদে প্রেরণের জন্য বলেন। অর্থালিপ্সু ড্রেক তাকে পাঠাননি। রাজবল্লভ ইংরেজদের শক্তি সংহত করার জন্য সর্বদাই সচেষ্ট ছিলেন। তিনি নবাব সিরাজউদ্দৌলাকে উৎখাত করার জন্য শেষ পর্যন্ত নানাভাবে ষড়যন্ত্র করে গিয়েছেন।
লুৎফুন্নেসা : নবাব সিরাজউদ্দৌলার স্ত্রী লুৎফুন্নেসা। তিনি মির্জা ইরাজ খাঁনের কন্যা। ১৭৪৬ সালে নবাব সিরাজউদ্দৌলার সঙ্গে মহা ধুমধামে লুৎফুন্নেসার বিয়ে সম্পন্ন হয়। কিন্তু তার জীবন কুসুমাস্তীর্ণ ছিল না। প্রাসাদ রাজনীতির সঙ্গে তার কোনো সম্পর্ক না-থাকলেও তাঁকে বিসর্জন দিতে হয়েছে সব কিছু। ১৭৫৭ সালে পলাশির যুদ্ধে সিরাজের পরাজয়ে তিনি স্বামীর হাত ধরে অজানা গন্তব্যে পাড়ি জমিয়েছিলেন। কিন্তু পথিমধ্যে শত্রুর হাতে ধরা পড়েন তারা। সিরাজ বন্দি হয়ে চলে যান মুর্শিদাবাদে আর লুৎফুন্নেসাকে নিয়ে যাওয়া হয় ঢাকায়। সুতরাং স্বামীকে হত্যার দৃশ্য তিনি দেখেননি। মৃতদেহের সৎকারেও তিনি ছিলেন না। পরে যখন তাঁকে মুর্শিদাবাদে ফিরিয়ে আনা হয় তখন তিনি নিঃস্ব, আপন বলে পৃথিবীতে তাঁর কেউ নেই। খোশবাগের গোরস্থানে স্বামীর সমাধিতে সন্ধ্যাপ্রদীপ জ্বালিয়ে তার নিঃসঙ্গ জীবন কাটে। মিরন তাঁকে বিয়ে করতে চেয়েছিল। কিন্তু লুৎফুন্নেসা ঘৃণাভরে তা প্রত্যাখান করেন। ১৭৭০ সাল পর্যন্ত তিনি জীবিত ছিলেন।
রায়দুর্লভ : নবাব আলিবর্দির বিশ্বস্ত অমাত্য রাজা জানকীরামের ছেলে রায়দুর্লভ। রায়দুর্লভ ছিলেন উড়িষ্যার পেশকার ও পরে দেওয়ানি লাভ করেন। রাঘুজি ভৌসলা উড়িষ্যা আক্রমণ করে রায়দুর্লভকে বন্দি করেন। ৩ লক্ষ টাকা জরিমানা দিয়ে তিনি মুর্শিদাবাদ চলে আসেন এবং রাজা রামনারায়ণের মুৎসুদ্দি পদে নিয়োজিত হন। তিনি নবাব আলিবর্দির আনুকূল্যে লাভ করেন এবং নবাবের সৈন্যবিভাগে নিযুক্ত হন। কিন্তু নবাব সিরাজের সঙ্গে তার ভালো সম্পর্ক ছিল না। তাই নবাব সিরাজউদ্দৌলা তাকে পদোন্নতি প্রদান করেননি। ফলে নবাবের বিরুদ্ধে নানামুখী ষড়যন্ত্রে তিনি অংশগ্রহণ করেন। পলাশির যুদ্ধে মিরজাফর ও রায়দুল্লভ অন্যায়ভাবে নবাব সিরাজকে যুদ্ধ বন্ধ করার পরামর্শ দেন। তাদের কুপরামর্শে সিরাজ যুদ্ধ বন্ধ করে দেন। ফলে ক্লাইভের সৈন্যরা প্রায় বিনাযুদ্ধে জয় লাভ করে। পলাশির যুদ্ধের পর এই বিশ্বাসঘাতক সুখে-শান্তিতে বসবাস করতে পারেননি। বরং মিরন তার বিরুদ্ধে অর্থ আত্মসাতের অভিযোগ উত্থাপন করেন এবং তাঁর মৃত্যুদণ্ড হয়। ইংরেজরা তাকে রক্ষা করেন এবং তিনি কলকাতা থেকে পালিয়ে যান। কিন্তু তত দিনে রায়দুর্লভ সর্বস্বান্ত ও নিঃস্ব।
ডাচ : হল্যান্ডের অধিবাসীগণ ওলন্দাজ বা ডাচ নামে পরিচিত। ডাচ ইস্ট ইন্ডিয়া কোম্পানির আওতায় ডাচগণ ভারতবর্ষে ব্যবসা করার জন্য আসে ষোড়শ শতকে। ২০এ মার্চ ১৬০২ সালে প্রতিষ্ঠিত এই প্রতিষ্ঠানটিকে এশিয়ায় ২১ বছর ব্যবসা ও উপনিবেশ স্থাপনের অনুমতি দেয় সে দেশের সরকার। ভারতবর্ষে এরা বহু দিন ব্যবসা করেছে, কিন্তু ইংরেজদের সঙ্গে প্রতিযোগিতায় হেরে যায়। তাদের আর উপনিবেশ তৈরি করা সম্ভব হয়নি। কিন্তু ১৬০২ সাল থেকে ১৭৯৬ সাল পর্যন্ত এই কোম্পানি প্রায় দশ লক্ষ লোক ও ৪৭৮৫টি জাহাজ ভারতবর্ষে পাঠিয়েছিল।
ফরাসি : ফ্রান্সের অধিবাসীগণ ফরাসি নামে পরিচিত। ফ্রান্স ইস্ট ইন্ডিয়া কোম্পানি প্রতিষ্ঠিত হয় ১৬৬৪ সালে। মোগল শাসনামলে ফরাসি সরকারের নীতি অনুযায়ী এই কোম্পানি ব্যবসা ও রাজনীতির ক্ষেত্রে প্রভাব বিস্তার করে। ফরাসিদের স্বার্থ রক্ষাই ছিল তাদের উদ্দেশ্য। পন্ডিচেরি ও চন্দননগরে ফরাসিদের একচেটিয়া প্রভাব প্রতিষ্ঠিত হয়েছিল। ১৯৫৪ সাল পর্যন্ত এই দুটি স্থানে তারা বসতি ও ব্যবসা চালিয়েছিল।
ফোর্ট উইলিয়াম : কলকাতায় ইস্ট ইন্ডিয়া কোম্পানি কর্তৃক প্রতিষ্ঠিত বাণিজ্য-কুঠি। ১৭০৬ সালে এই কুঠি নির্মিত হয়। পরে এই কুঠি দুর্গ হিসেবে ব্যবহৃত হয়। ইংল্যান্ডের রাজা উইলিয়ামের সম্মানে এই কুঠির নামকরণ করা হয়।
আলিনগরের সন্ধি : ১৭৫৭ সালের ৯ই ফেব্রুয়ারি বাংলার নবাব সিরাজউদ্দৌলা এবং ভারতের ব্রিটিশ প্রতিনিধি রবার্ট ক্লাইভের সঙ্গে সম্পাদিত চুক্তি। এই চুক্তির শর্ত অনুযায়ী তখন কলকাতা নগরী ব্রিটিশ ইস্ট ইন্ডিয়া কোম্পানির কাছে হস্তান্তর করা হয়। চুক্তি অনুযায়ী ইংরেজরা সেখানে দুর্গ স্থাপন এবং টাকশাল প্রতিষ্ঠার সুযোগ লাভ করে।
              `
            },

        ];

        // Render Function
        function renderWorks(filteredWorks) {
            const container = document.getElementById('worksContainer');
            container.innerHTML = '';

            if (filteredWorks.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 py-20 col-span-3">কোনো লেখা পাওয়া যায়নি</p>`;
                return;
            }

            filteredWorks.forEach(work => {
                const cardHTML = `
      <div onclick="showFull('${work.title}')" class="bg-white rounded-2xl shadow-md hover:shadow-xl p-6 cursor-pointer transition-all">
        <span class="text-xs px-4 py-1.5 rounded-full ${getColor(work.category)}">
          ${getCategoryName(work.category)}
        </span>
        <h3 class="text-xl font-bold mt-4 mb-1">${work.title}</h3>
        <p class="text-emerald-700">${work.author}</p>
        <p class="mt-4 text-gray-600 line-clamp-4">${work.summary}</p>
        <p class="text-emerald-600 text-sm mt-5 font-medium">পুরো লেখা পড়ুন →</p>
      </div>
    `;
                container.innerHTML += cardHTML;
            });
        }

        function getCategoryName(cat) {
            const names = { golpo: "গল্প", kobita: "কবিতা", uponnas: "উপন্যাস", natok: "নাটক" };
            return names[cat];
        }

        function getColor(cat) {
            const colors = {
                golpo: "bg-blue-100 text-blue-700",
                kobita: "bg-purple-100 text-purple-700",
                uponnas: "bg-amber-100 text-amber-700",
                natok: "bg-rose-100 text-rose-700"
            };
            return colors[cat];
        }

        // Show Full Content
        // Show Full Content (Dark Mode Friendly)
        function showFull(title) {
            const work = works.find(w => w.title === title);
            if (!work) return;

            const isDark = document.documentElement.classList.contains('dark');

            const fullPage = `
    <div class="max-w-3xl mx-auto p-6 ${isDark ? 'dark bg-gray-900 min-h-screen' : 'bg-white min-h-screen'}">
      <button onclick="goBack()" 
        class="mb-8 flex items-center gap-2 text-emerald-600 hover:text-emerald-700 dark:text-emerald-400 dark:hover:text-emerald-300 font-medium">
        ← ফিরে যান
      </button>
      
      <h1 class="text-3xl font-bold ${isDark ? 'text-white' : 'text-gray-900'}">${work.title}</h1>
      <p class="text-xl ${isDark ? 'text-emerald-400' : 'text-emerald-700'} mt-2">${work.author}</p>
      
      <div class="my-8 p-6 rounded-2xl ${isDark ? 'bg-gray-800' : 'bg-gray-50'}">
        <h3 class="font-semibold mb-3 ${isDark ? 'text-gray-300' : 'text-gray-700'}">সারাংশ:</h3>
        <p class="leading-relaxed ${isDark ? 'text-gray-400' : 'text-gray-700'}">${work.summary}</p>
      </div>

      <h3 class="font-semibold text-lg mb-4 ${isDark ? 'text-gray-300' : 'text-gray-700'}">পুরো লেখা:</h3>
      <div class="prose leading-relaxed whitespace-pre-wrap ${isDark ? 'text-gray-300' : 'text-gray-800'}">
        ${work.content.replace(/\n/g, '<br>')}
      </div>
    </div>
  `;

            document.body.innerHTML = fullPage;
        }

        function goBack() {
            location.reload();   // এটা ঠিক আছে, কারণ পুরো সাইট রিলোড হয়ে Dark Mode আবার লোড হবে
        }

        // Search & Filter
        function searchWorks() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = works.filter(w =>
                w.title.toLowerCase().includes(term) ||
                w.author.toLowerCase().includes(term) ||
                w.summary.toLowerCase().includes(term)
            );
            renderWorks(filtered);
        }

        function filterCategory(cat) {
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById(cat).classList.add('active-tab');

            if (cat === 'all') {
                renderWorks(works);
            } else {
                const filtered = works.filter(w => w.category === cat);
                renderWorks(filtered);
            }
        }

        // Initial Load
        renderWorks(works);
    </script>
