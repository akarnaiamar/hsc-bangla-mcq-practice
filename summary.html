জন্মের কথা নিয়ে মায়ের উক্তি শুনে হাসুনির মায়ের কান লাল হয়ে ওঠে কিন্তু পরে বুকে যন্ত্রণা হয়। তাই রহিমাকে এসে বলে কথাটা।
–হয় বুড়া-বুড়ি দুইটাই মরুক–নয় ওনারে কন, এর একটা বিহিত করবার।
হঠাৎ সমবেদনায় রহিমার চোখ ছল ছল করে ওঠে। বলে,
—তুমি দুঃখ করিও না বিটি। আমি কমুনে।
মেয়েটাকে তার ভালোই লাগে। দুঃস্থা মেয়ে। স্বামী মারা যাবার পর থেকে বাপের বাড়িতে আছে। বাড়িতে তিন-তিনটে মর্দ ছেলে বসে বসে খায়। এক মুঠোর মতো যে জমি, সে-জমিতে ওদের পেট ভরে না। তাই টানাটানি, আধ-পেটা খেয়ে দিন গুজরান। বসে বসে অন্ন ধ্বংস করতে লজ্জা লাগে হাসুনির মায়ের। সে তো এক নয়, তার হাসুনিও আছে। তাই বাড়িতে ধান ভানে। কিন্তু কিছু একটা মুখ ফুটে চাইতে আবার লজ্জায় মরে যায়। (অভাব থাকলেও অভাব দেখাতে চায় না)
রহিমা বলে,
-শ্বশুর বাড়িতে যাও না ক্যান?
—অরা মনুষ্যি না।
–নিকা করে না ক্যান?
কয়েক মুহূর্ত থেমে হাসুনির মা বলে, দিলে চায় না বুবু। (সন্তানের মায়ায়)
জীবনে তার আর সখ নেই। তবে গায়ের আর মানুষের রক্ত তারও দেহে বয় বলে মাঠ ভরে ধান ফললে অন্তরে তার রঙ ধরে। বতোর দিনে বাড়ি বাড়ি কাজ করে হাসুনির মায়ের ক্লান্তি নেই। মুখে বরঞ্চ চিকনাইই দেখা দেয়। এমনি কোনো দিনে তাহের খোশ মেজাজে
বলে,
-শরীলে রঙ ধরছে ক্যান, নিকা করবি নাকি? (ভাই বোনের ‍খুনসুটি)
বুড়ি আমের আঁটির মতো মুখটা বাড়িয়ে বলে (আগ বাড়িয়ে কথা বলা),–খানকির বেটি নিকা করবো বলাই তো মানুষটারে খাইছে! (স্বামীর মৃত্যুর দায় স্ত্রীকে দেওয়া)
মানুষটা মানে তার মৃত স্বামী। তাহের কৌতুক বোধ করে। বলে, ক্যামনে খাইছস?
হাসুনির মায়ের অন্তর তখন খুশিতে টলমল (ধান পাওয়ায়)। কথা গায়ে মাখে না। হেসে বলে,–গিলা খাইছি। মা-বুড়ি আছে সামনে, নইলে গিলে খাওয়ার ভঙ্গিটাও একবার দেখিয়ে দিত।
দূরে ধানক্ষেতে ঝড় ওঠে, বন্য আসে পথভোলা অন্ধ হওয়ায়, দিগন্ত থেকে গড়িয়ে গড়িয়ে আসে অফুরন্ত ঢেউ। ধানক্ষেতের তাজা রঙে হাসুনির মায়ের মনে পুলক জাগে (বিয়ের ইচ্ছে)। আপন মনকেই ঠাট্টা করে বারবার শুধায় : নিকা করবি মাগি, নিকা করবি?
কিন্তু কাকে করে? ওই বাড়ির মানুষকে পেলে করে কী? তেল চকচকে জোয়ান কালো ছেলে। গলা ছেড়ে যখন গান ধরে তখন ধানের ক্ষেতে যেন ঢেউ ওঠে।

হাসুনির মাকে প্রহার ও বুড়োর বিচারে মজিদের প্রভাব
পরদিন তাহেরের বুড়ো বাপকে মজিদ ডেকে পাঠায়। এলে বলে, তোমার বিবি কী কয়? (সন্তানের জন্ম নিয়ে কুকথা)
বুড়ো ইতস্তত করে, ঘাড় চুলকে এধার-ওধার চেয়ে আমতা-আমতা করে। মজিদ ধমকে ওঠে।
-কও না ক্যান?
ধমক খেয়ে ঢোক গিলে বুড়ে বলে,–তা হুজুর ঘরের কথা আপনারে ক্যামনে কই? (ঘরের কথা পরকে বলতে সংকোচবোধ)
কতক্ষণ চুপ থেকে মজিদ ভারি গলায় বলে,–আমি জানি কী কয়। কিন্তু তুমি কেমন মদ্দ, দাঁড়াইয়া দাঁড়াইয়া শোনো হেই কথা? (স্ত্রীর মুখ থেকে এমন অপবাদ শুনেও চুপ থাকা)
দাঁড়িয়ে দাঁড়িয়ে শোনে এ কথা ঠিক নয়। তখন রাগে সে চোখে অন্ধকার দেখে, চেলা কাঠ নিয়ে ছুটে যায় বুড়িকে শেষ করবার জন্য (প্রতিবাদ)। এর মধ্যে একদিন হয়তো সে (বুড়ি) শেষই হয়ে যেত—যদি না ছেলেরা এসে বাধা দিত। কিন্তু সে কথাও বলতে পারে না মজিদের সামনে। (পারিবারিক কলহ) কেবল আস্তে বলে,–বুড়ির দেমাক খারাপ হইছে হুজুর। আপনে যদি দোয়া পানি দ্যান…
আবার কতক্ষণ নীরব থেকে মজিদ বলে,
–বিবিরে কইয়া দিও, অমন কথা যদি আর কোনোদিন কয় তাইলে মসিবৎ হইব। (খোদার পক্ষ থেকে শাস্তি)
মাথা নেড়ে বুড়ো চলে যাবার জন্যে পা বাড়ায়। কয়েক পা গিয়ে থামে, থেমে মাথা চুলকে বলে (ইতস্তত),—হুজুর, কোত্থিকা হুনলেন বেটির কথা? (ঘরের কথা কে বলল?)
–তা দিয়া তোমার দরকার কী? কিন্তু এই কথা জাইনো কোনো কথা আমার অজানা থাকে না (দৈববলে জানতে পারা/ মিথ্যা বলা)।
সারাপথ ভাবে বুড়ে। কে বলল কথাটা? বাড়ির গায়ে (নিকটবর্তী বাড়ি নেই) আর কোনো বাড়ি নেই যে, কেউ আড়ি পেতে শুনবে।
এককালে বুড়ো বুদ্ধিমান লোকই ছিল। সারাজীবন দুষ্ট প্রকৃতির বৈমাত্ৰেয় এক ভাইয়ের সাথে জায়গাজমি সম্পত্তি নিয়ে মারামারি মামলা-মকদ্দমা করে আজ সব দিক দিয়ে সে নিঃস্ব। জায়গাজমির মধ্যে আছে একমুঠো পরিমাণ জমি, যা দিয়ে একজনের পেট ভরে না। আর এদিকে পেয়েছে খিটখিটে মেজাজ। (নিঃস্ব হয়ে খিটখিটে মেজাজের অধিকারী) সবাইকে দু’চোখের বিষ (শত্রু) মনে হয়। বুড়িটার হয়তো তার ছোঁয়াচ লেগেই অমন হয়েছে (বুড়োর মেজাজের প্রভাব বুড়ির উপর)। নইলে বহুদিন আগে যৌবনে কেমন হাসিখুশি ছটফট মেয়ে ছিল সে। স্থির থাকত না এক মুহূর্ত, নাচত কেবল নাচত, আর খইয়ের মতো কথা ফুটত মুখ দিয়ে। আজ তার সুন্দর দেহমান পচে গিয়ে এই হাল হয়েছে।
বুড়ি যে ছেলেদের জন্ম নিয়ে কথাটা বলতে শুরু করেছে তা বেশিদিন নয়। সাধারণ গালগালি দিয়ে আর স্বাদ হয় না (বুড়োকে ক্ষেপানো যায় না); তাই এমন এককথা বের করেছে যা বুড়োর আত্মায় গিয়ে খচ করে লাগে। কথাটা মিথ্যা জেনেও প্ৰচণ্ড ক্ৰোধে জ্বলে ওঠে অন্তরটা।
বুড়ো ভাবে, ছেলেরা বলতে পারে না কথাটা (মজিদকে জানাতে পারে না)। সে বিষয়ে নিঃসন্দেহ। তবে কি হাসুনির মা বলেছে? তার তো ও বাড়িতে যাতায়াত আছে।
একটা বিষয়ে কিন্তু গোলমাল নেই তার মনে। অন্তরের শক্তিতে মজিদ ব্যাপারটা জানতে পেরেছে সে কথা সে বিশ্বাস করে না।
যত ভাবে কথাটা তত জ্বলে ওঠে বুড়ো (ঘরের খবর পর জানল কেন?)। যে বলেছে সেকি কথাটার গুরুত্ব বোঝে না? কথাটা কী বাইরে ছড়াবার মতো (আত্মসম্মানবোধ)? এর বিহিত (মীমাংসা) ঘরেই হয়, বাইরে হয় না।–তা যতই আলেম-খোদাবন্দ মানুষ তার বিহিত করতে আসুক না কেন। তাছাড়া, কথাটায় যে বিন্দুমাত্র সত্য নেই কে বলতে পারে? (বুড়ির দেওয়া অপবাদ সত্যও হতে পারে)
এককালে বুড়ি উড়নি মেয়ে ছিল, তার হাসি আর নাচন দেখে পাগল হতো কত লোক। বৈমাত্রেয় ভাইটির সঙ্গে ঝগড়া-বিবাদের শুরুতে একবার একটা লোক ঘরে ঢোকার জনরব উঠেছিল। (বুড়ির শ্লীলতাহানির চেষ্টা) একদিন তার (বুড়োর) অনুপস্থিতিতে সে কাণ্ডটি নাকি ঘটেছিল। কিন্তু ঘরের বউ অনেক ঠ্যাঙানি খেয়েও কথাটা যখন স্বীকার করেনি তখন সে বিশ্বাস করে নিয়েছিল যে, তা দুষ্ট প্রকৃতির বৈমাত্রেয় ভাইটির সৃষ্টি ছাড়া কিছু নয়। (বুড়ির নামে মিথ্যা অপবাদ)
অন্দরে (বাড়িতে) ঢুকেই সামনে দেখলে হাসুনির মাকে। দেখেই চড় চড় করে মেজাজ গরম হয়ে উঠে, ঘূর্ণি খেয়ে চোখ অন্ধকার হয়ে যায়। বকের মতো গলা বাড়িয়ে ছুটে গিয়ে তাকে ধরে এক আছাড়ে মাটিতে ফেলে দেয়। তারপর শুরু হয় প্রহার। প্ৰহার করতে করতে বুড়োর মুখে ফেনা (গালাগাল) উঠে যায়। আর বলে কেবল একটি কথা।–ওরে ভাতার-খাইগা জারুণি, তোর বাপরে (মজিদ) গিয়া কইলি ক্যামনে ওই কথা? (ঘরের কথা পরকে বলা)
প্ৰাণের আশ মিটিয়ে বুড়ো তার মেয়েকে মারে। ছেলেরা তখন ঘরে ছিল না বলে তাকে (হাসুনির মাকে) রক্ষা করবার কেউ ছিল না। বুড়ি অবশ্য ওধারে পা ছড়িয়ে তীক্ষ্ম-কণ্ঠে বিলাপ জুড়ে দেয়, কিন্তু বিলাপ শুনে দমবার পাত্ৰ বুড়ো নয়।
সে-দিন দুপুরে মুখে আঘাতের চিহ্ন ও সারা দেহে ব্যথা নিয়ে চুপিচুপি ঘর থেকে বেরিয়ে হাসুনির মা সোজা চলে গেল মজিদের বাড়ি। মজিদ তখন জিরুচ্ছে আর সে-ঘরেই নিচে পাটিতে বসে রহিমা কাঁথায় শেষ কটা ফোঁড় দিচ্ছে (সুঁইয়ের ফোড়)।
হাসুনির মা মজিদের সামনে আসে না। কিন্তু আজ সটান ঘরে ঢুকে তার সামনেই রহিমার পাশে বসে মরাকান্না (বিলাপ) জুড়ে দিলো। প্ৰথমে কিছু বোঝা গেলো না (কান্নায়)। কথা স্পষ্টতর হয়ে এলে এইটুকু বোঝা গেলো যে, সে রহিমাকে বলছে; ওনারে কন, আমার মওতের জন্য যানি দোয়া করে।
মজিদ হুঁকা টানে আর চেয়ে চেয়ে দেখে। ক্ৰন্দনরতা মেয়ে তার ভালোই লাগে। কথায় কথায় ঠোঁট ফুলবে, লুটিয়ে পড়ে কঁদবে এমন একটা বউয়ের স্বপ্ন (অভিমানী মনোভাব) দেখত প্ৰথম যৌবনে। রহিমার না আছে অভিমান, না আছে চপলতা (চঞ্চলতা)! অপরাধ না করে থাকলেও মজিদ বলছে বলে যে-কোনো কথা নির্বিবাদে মেনে নেয় (অনুগত মনোভাব)। অমন মানুষ ভালো লাগে না তার।
পরে সব কথা শুনে মজিদের মুখ হঠাৎ কঠিন হয়ে যায়। বুড়ো গিয়ে তার মেয়েকে মেরেছে। মেরেছে এই জন্য যে, সে এসে তাকে কথাটা বলে দিয়েছে।
অনেকক্ষণ গুম (নীরব) হয়ে থেকে মজিদ গম্ভীর কণ্ঠে রহিমাকে বলে,–অরে। যাইতে কও। আর কও আমি দেখুম নি।
একটু পরে রহিমা বলে,–ও যাইবার চায় না। ডরায়।
মজিদ আড়চোখে একবার তাকায় হাসুনির মায়ের দিকে (মনোভাব বুঝার চেষ্টা)। কান্না থামিয়ে মজিদের দিকে পিঠ দিয়ে বসে (পেছন ফিরে বসা) আছে, আর ঘোমটা-টানা মাথা নত করে নখ দিয়ে মাটি খুটছে। ওধারে ফেরানো মুখটি দেখবার জন্যে এক মুহূর্ত কৌতুহল বোধ করে মজিদ (হাসুনির মায়ের প্রতি আকর্ষণ)। তারপর তেমনি গভীর কণ্ঠে বলে–থাক তাইলে এইখানে।

অপরাহ্ণে জমায়েত হয়। একা বিচার করতে ভরসা হয় না যেন মজিদের (বুড়োর উদ্ধত মনোভাব)। ঢেঙা বুড়ো লোকটা শয়তানের খাম্বা, অন্তরে তার কুটিলতা আর অবিশ্বাস।
খালেক ব্যাপারীও এসেছে। মাতববর না হলে শাস্তি বিধান হয় না, বিচার চলে না। রায় অবশ্য মজিদই দেয়, কিন্তু সেটা মাতব্বরের মুখ দিয়ে বেরুলে ভালো দেখায়।
একটু তফাতে (দূরে) মাটিতে বসে চুপচাপ হয়ে আছে তাহেরের বাপ, মুখটি একদিকে সরানো।
খালেক ব্যাপারী বাজখাঁই (কর্কশ কণ্ঠে) গলায় প্রশ্ন করে,–তোমার বিবি কী বলে? 
মুখ না তুলে (বিচারের পরোয়া না করে) বুড়ো বলে,–হেই কথা আপনার ব্যাক্কই জানেন।
কে একজন গলা উঠিয়ে বলে, কথা ঠিক কইরা কও মিঞা।
বুড়ো ওদিকে একবার ফিরেও তাকায় না।
খালেক ব্যাপারী আবার প্রশ্ন করে,–এহন কও, হেই কথা তুমি ঢাকবার চাও ক্যান? (বিবির অপবাদের কথা আড়াল করতে চাওয়া)
কথাটা যেন বুঝল না ঠিকমতো–এমন একটা ভঙ্গি করে বুড়ো তাকায় সকলের পানে। তারপর বলে, -এইটা কি কওনের কথা? বুড়িমাগী ঝুটমুট একখান কথা কয়–তা বইলা আমি কী পাড়ায় ঢোল-সোহরাত (বাদ্য বাজিয়ে প্রচার) দিমু? (এসব বাজে কথার প্রচার করাই ভালো না)
ওর কথা বলার ভঙ্গি (উদ্ধত ভঙ্গি) ব্যাপারীর মোটেই ভালো লাগে না। মজিদ নীরব হয়ে থাকে, কিন্তু উত্তর শুনে তারও চোখ জ্বলে ধিকিধিকি।
লোকটির উত্তরে কিন্তু ভুল নেই। তাই প্ৰত্যুত্তরের জন্য সহসা কিছু না পেয়ে খালেক ব্যাপারী ধমকে উঠে বলে,–কথা ঠিক কইরা কইবার পারো না?
জমায়েতের মধ্যে কয়েকটা গলা আবার চেচিয়ে ওঠে,–কথা ঠিক কইরা কও মিঞা, কথা ঠিক কইরা কও।
বৈঠক শান্ত হলে খালেক ব্যাপারী আবার বলে,—তুমি তোমার মাইয়ারে ঠ্যাঙাইছ ক্যান?
–আমার মাইয়া আমি ঠ্যাঙাইছিা! (নিজের সন্তানকে শাসনের ক্ষমতা আছে)
–লম্বামুখ খাড়া করে নির্বিকারভাবে উত্তর দেয় তাহেরের বাপ, যেন ভয়-ডর নেই। অবশ্য হাতের দিকে লক্ষ্য করলে দেখা যায়, আঙুলগুলো কাঁপছে। ভেতরে তার ক্ৰোধের আগুন জ্বলছে—বাইরে যতই ঠান্ডা থাকুক না কেন? (উপরে নীরব থাকলেও ভেতরে ক্রোধে ফেটে পড়ছে)
ব্যাপারী কী একটা বলতে যাচ্ছিল, এবার হাত নেড়ে মজিদ তাকে থামিয়ে নিজে বলবার জন্য তৈরি হয়। ব্যাপারটা আগে গোড়া থেকে ব্যাপারীকে বুঝিয়ে বলেছিল সে এবং ভেবেছিল তার পক্ষে থেকে খালেক ব্যাপারীই কাজটা ঠিকমতো চালিয়ে নেবে কিন্তু তার প্রশ্নগুলো তেমন জুতসই হচ্ছে না। বলছে আর যেন ঠাস করে মুখের ওপর চড় খাচ্ছে। (কথার বিপরীতে প্রত্যুত্তর)
মজিদ গম্ভীর গলায় বলে,—ভাই সকল! বলে থেমে তাকায় সবার পানে। পিঠ সোজা করে বসেছে, কোলের ওপর হাত। আসল কথা শুরু করার আগে সে এমন একটা আবহাওয়া সৃষ্টি করে যে, মনে হয় সূরা ফাতেহা পড়ে তার বক্তব্য শুরু করবে। কিন্তু আরেক বার ‘ভাই সকল’ বলে সে কথা শুরু করে। বলে, খোদাতায়ালার কুদরত মানুষের বুঝবার ক্ষমতা নাই; দোষগুণে তৈয়ার মানুষ। মানুষের মধ্যে তাই শয়তান আছে, ফেরেস্তাও আছে। (ভালো-মন্দ গুণের মিশ্রনে মানুষ) তাদের মধ্যে গুনাগার আছে, নেকবন্দ আছে। কুৎসা রটানো বড় গৰ্হিত কাজ (মানুষের সম্মানহানি করে)। কিন্তু যারা শয়তানের চতুরী বুঝতে পারে না, যারা তাদের লোভনীয় ফাঁদে ধরা দেয় এবং খোদার ভয়কে দিল থেকে মুছে ফেলে–তারা এইসব গৰ্হিত কাজে নিজেদের লিপ্ত করে (অপরের নামে অপবাদ দেয়)। মানুষের রসনা বড় ভয়ানক বস্তু, সে-রসনা বিষাক্ত সাপের রসনার চেয়েও ভয়ঙ্কর হতে পারে। প্ৰক্ষিপ্ত সে রসনা (মুখের কথা) তার বিষে পরিবারকে-পরিবার ধ্বংস করে দিতে পারে, নিমেষে আগুন ধরিয়ে দিতে পারে সমস্ত পৃথিবীতে।
ঋজু ভঙ্গিতে (সোজা হয়ে) বসে গম্ভীর কণ্ঠে ঢালাসুরে মজিদ বলে চলে। কথায় তার মধু। স্তব্ধ ঘরে তার কণ্ঠে একটা সুর তোলে, যে সুরে মোহিত হয়ে পড়ে শ্রোতারা।
একবার মজিদ থামে। শান্ত চোখ, কারো দিকে তাকায় না। সে দাড়িতে আলগোছে হাত বুলিয়ে তারপর আবার শুরু করে,
—পৃথিবীর মধ্যে যিনি সবচেয়ে শ্রেষ্ঠ ব্যক্তি তাঁর ও তাঁর পরিবারের বিরুদ্ধেও মানুষের সে রসনা প্ৰক্ষিপ্ত হয়েছে। পঞ্চম হিজরিতে প্ৰিয় পয়গম্বরের নিকট বনু আল-মুস্তালিখের বিরুদ্ধে লড়াই করে প্রত্যাবর্তন করবার সময় তাঁর ছোট বিবি আয়েশা কী করে দলচ্যুত হয়ে পড়েন। তারপর তিনি পথ হারিয়ে ফেলেন। এক নওজোয়ান সিপাই তাকে খুঁজে পায়। পেয়ে তাঁকে সসম্মানে নিজেরই উটে বসিয়ে আর নিজে পায়দল হেঁটে প্রিয় পয়গম্বরের কাছে পৌঁছে দিয়ে যায়। যাদের অন্তরে শয়তানের একচ্ছত্ৰ প্ৰভুত্ব–যারা তারই চক্রান্তে খোদার রোশনাই থেকে নিজের হৃদয়কে বঞ্চিত করে রাখে, তাদেরই বিষাক্ত রসনা সেদিন কর্মতৎপর হয়ে উঠল (মুনাফিকরা আয়েশা রা.কে অপবাদ দিল)। হজরতের এত পেয়ারা বিবির নামেও তারা কুৎসা রটাতে লাগল। বড় ব্যথা পেলেন পয়গম্বর। খোদার কাছে কেঁদে বললেন, এয়া খোদা পরওয়ারদেগার, নির্দোষ আমার বিবি কেন এত লাঞ্ছনা ভোগ করবে, কেন এ অকথ্য বদনাম সহ্য করবে? উত্তরে খোদাতায়ালা মানব জাতিকে বললেন—
থেমে বিসমিল্লাহ পড়ে মজিদ সূরায়ে আন-নূর থেকে খানিকটা কেরাত করে শোনায়। তার গম্ভীর কণ্ঠ হঠাৎ মিহি সুরে ভেঙে পড়ে। স্তব্ধ ঘরে বিচিত্র সুরঝঙ্কার ওঠে। শুনে জমায়েতের অনেকের চোখ ছলছল করে ওঠে। (তাফসির শুনে কাঁদতে থাকে)
হঠাৎ এক সময়ে মজিদ কেরাত বন্ধ করে সরাসরি তাহেরের বাপের পানে তাকায়, যে লোকটা এতক্ষণ একটা বিদ্রোহী ভাব নিয়ে কঠিন হয়ে ছিল, তারও চোখ এখন নরম (ধর্মীয় বয়ানে প্রভাবিত করা)। বসে থাকার মধ্যে উদ্ধত ভাবটাও যেন নেই। চোখাচোখি হতে সে চোখ নামায়।
কয়েক মুহূর্ত তার পানে তাকিয়ে থেকে গলা উঠিয়ে মজিদ বলে যে, খোদাতায়ালার ভেদ তারই সৃষ্ট বান্দার পক্ষে বোঝা সম্ভব নয়। মানুষের মধ্যে তিনি বিষময় রসনা দিয়েছেন, মধুময় রসনাও দিয়েছেন। উদ্ধত করেও সৃষ্টি করেছেন তাকে, মাটির মতো করেও সৃষ্টি করেছেন (বিনয়ী ও উদ্ধত মনোভাব)। সে যাই হোক, মানুষের কাছে আপন সংসার, আপন বালবাচ্চা দুনিয়ার সব চাইতে প্ৰিয়। তাদের সুখ-শান্তির জন্য সে অক্লান্ত পরিশ্রম করে, জীবনের সঙ্গে লড়াই করে। আপন সংসারের ভালাই ছাড়া অন্য কিছু ভাবতে পারে না সে। কিন্তু যে মেয়েলোক আপন সংসার আপন হাতে ভাঙতে চায় এবং আপন সন্তানের জন্ম সম্পর্কে কুৎসা রটনা করে, সে নিজের বিরুদ্ধে কাজ করে, খোদার বিরুদ্ধে আঙ্গুল ওঠায়—তার গুনাহ বড় মস্ত গুনাহ, তার শাস্তি বড় কঠিন শাস্তি। (কলহের জেরে নিজের চরিত্র সম্পর্কে কটু কথা বলা মস্ত অপরাধ)
হঠাৎ মজিদের গলা ঝনঝন করে ওঠে।
—তুমি কী মনে করো মিঞা? তুমি কী মনে করে তোমার বিবি মিছা বদনাম করে? তুমি কী হলফ কইরা বলতে পারো তোমার দিলে ময়লা নাই? (যৌবনকালে বিবির নামে দেওয়া সেই অপবাদ তুমি কি বিশ্বাস কর নাই?)
যে-লোক কিছুক্ষণ আগে খালেক ব্যাপারীর মতো লোকের মুখের ওপর ঠাস ঠাস জবাব (তর্ক) দিচ্ছিল, মজিদের প্রশ্নে সে এখন বিভ্ৰান্ত হয়ে যায় (ধর্মীর আলোচনার প্রভাব)। কোথা দিয়ে কোথায় তাকে আনে মজিদ, সে বোঝে না। মন ঘাটতে গিয়ে দেখে সেখানে সন্দেহ–এতদিন পর আজ সন্দেহ! বহুদিন আগে তার বউ যখন চড়ুই পাখির মতো নাচত, হাসিখুশি উজ্জ্বলতায় চারিদিকে আলো ছড়াত, তখন যে জনরব উঠেছিল (অপবাদের কথা) সে-কথাই তার স্মরণ হয়। কোনোদিন সে-কথা সে বিশ্বাস করেনি। তখন কথাটা যদি সত্যি বলে প্ৰমাণিত হতোও, সে তাকে তালাক দিতে পারত। গলা টিপে খুন করে ফেললেও বেমানান দেখাত না। কিন্তু আজ এতদিন পরে যদি দেখে সেদিন তারই ভুল হয়েছিল (অপবাদের কথা বিশ্বাস করে), তবে সে কী করতে পারে? বউ আজ শুধু কঙ্কাল, পচন ধরা মাংসের রদ্দি খোলস–তাকে নিয়ে সে কী করবে? অন্ধকার ভবিষ্যতের (পরকালীন ভয়) মধ্যে যে ভীতির সৃষ্টি হবে সে-ভীতি দূর করবে। কী করে?
মজিদ গলা চড়িয়ে ধমকের সুরে আবার বলে,–কী মিঞা? তোমার দিলে কী ময়লা আছে? তুমি কী ঢাকবার চাও কিছু, লুকাইবার চাও কোনো কথা?
মজিদ থামলে ঘরময় রুদ্ধনিঃশ্বাসের স্তব্ধতা নামে এবং সে-স্তব্ধতার মধ্যে তার কেরাতের সুরব্যঞ্জনা আবার যেন আপনা থেকেই ঝঙ্কৃত হয়ে ওঠে। সে-ঝঙ্কার মানুষের কানে লাগে, প্ৰাণে লাগে।
তাহেরের বাপ এধার-ওধার তাকায়, অস্থির-অস্থির করে। একবার ভাবে বলে, না, তার দিলে কিছুই নাই, তার দিল সাফ। বুড়ি বেটির দেমাক খারাপ হয়েছে, তাকে কষ্ট দেবার জন্যই অমন বুটমুঠ কথা বানিয়ে বলে। কিন্তু কথাটা আসে না মুখ দিয়ে। (স্ত্রীর নামে অভিযোগ দিতে চায় না)
অবশেষে অসহায়ের মতো তাহেরের বাপ বলে,–কী কমু? আমার দিলের কথা। আমি জানি না। ক্যামনে কমু দিলের কথা?
–কিছু তুমি ঢাকবার চাও, লুকাইবাব চাও?
অস্থির হয়ে ওঠা চোখে বুড়ো আবার তাকায় মজিদের পানে। তার মুখ ঝুলে পড়েছে (মাথা নত), থাই পাচ্ছে না কোথাও।
—তুমি কিছু লুকাইবার চাও, কিছু ছাপাইবার (লুকানো) চাও? তুমি তোমার মাইয়ারে তাইলে ঠ্যাঙাইছ ক্যান? তার গায়ে দড়া (রশি) পড়ছে ক্যান? তার গা নীল-নীল হইছে (মাইরের দাগ) ক্যান?
সভা নিশ্বাস রুদ্ধ করে রাখে। লোকেরাও বোঝে না ঠিক কোথা দিয়ে কোথায় যাচ্ছে ব্যাপারটা। তবে বিভ্রান্ত বুড়োটির পানে চেয়ে সমবেদনা হয় না; বরঞ্চ তাকে দেখে মনে এখন বিদ্বেষ আর ঘৃণা আসে। (বুড়োর উপর সবার ক্ষোভ) ও যেন ঘোর পাপী। পাপের জ্বালায় এখন ছটফট করছে। দোজখের লেলিহান শিখা যেন স্পর্শ করেছে তাকে।
হঠাৎ ঋজু হয়ে বসে মজিদ চোখ বোজে। তারপর সে বিসমিল্লাহ পড়ে আবার কেরাত শুরু করে। মুহূর্তে মিহি মধুর হয়ে ওঠে তার গলা, শান্তর ঝরনার মতো বেয়ে বেয়ে আসে, ঝরে ঝরে পড়ে অবিশ্রান্ত করুণায়!
তারপর সর্বসমক্ষে ঢেঙা বদমেজাজী বৃদ্ধ লোকটি কাঁদতে শুরু করে (অনুশোচনা)। সে কাঁদে, কাঁদে, কেউ ব্যাঘাত করে না তার কান্নায়। অবশেষে কান্না থামলে মজিদ শান্ত গলায় বলে,–তুমি কিংবা তোমার বিবি গুনাহ কইরা থাকলে খোদা বিচার করবেন। কিন্তু তুমি তোমার মাইয়ার কাছে মাফ চাইবা, তারে ঘরে নিয়া যত্নে রাখব। আর মাজারে সিন্নি দিব পাঁচ পয়সার।
মজিদ নিজে তার মাফ দাবি করে না। কারণ মেয়ের কাছে চাইলে তারই কাছে চাওয়া হবে। নির্দেশ তো তারই। তারই হুকুম তালিম করবে সে।

বুড়ো বাড়ি গিয়ে সটান শুয়ে পড়ে। তারপর চোখ বুজে চুপচাপ ভাবে। মাথাটা যেন খোলসা হয়ে এসেছে। হঠাৎ তার মনে হয়, সারা গ্রামের জমায়েতের সামনে দাঁড়িয়ে সে নির্লজ্জভাবে সায় দিয়ে এসেছে বুড়ির কথায় (বুড়ির অপবাদ সত্য মনে করে নিজের পরিবারের ক্ষতি করা)। সে কথার সত্যাসত্য সম্পর্কে প্রশ্ন তোলেনি, বরঞ্চ পরিষ্কারভাবে বলে এসেছে সে কথা সত্যিই। এবং লোককে এ-কথাও জানিয়ে এসেছে যে, সে একটা দুর্বল মানুষ (প্রতিবাদ করতে না পারায়), এত বড় একটা অন্যায়ের কথা দোষিণীর (বুড়ি) আপনি মুখ থেকে শুনেও চুপ করে আছে কারণ তার মেরুদণ্ড নেই। সে কথা সর্বসমক্ষে কেঁদে বুঝিয়ে দিয়ে এসেছে।
হঠাৎ রক্ত চড় চড় করে ওঠে। ভাবে, উঠে গিয়ে চেলাকাঠ দিয়ে এ মুহূর্তেই বুড়ির আমসিপান মুখখানা (শুকনো মুখ) ফাটিয়ে উড়িয়ে দিয়ে আসে। কিন্তু কেমন একটা অবসাদে দেহ ছেয়ে থাকে। চুপচাপ শুয়ে কেবল ভাবে। পৌরুষের গর্ব ধূলিস্মাৎ হয়ে আছে যেন। (বীরত্ব হারিয়ে যাওয়া)
আর সে ওঠেই না। বুড়ি মাঝে মাঝে শান্তগলায় ছেলেদের প্রশ্ন করে,—দেখত, ব্যাটা মরল নাকি?
ছেলেরা ধমকে ওঠে মায়ের ওপর। বলে, কী যে কও! মুখে লাগাম নাই তোমার? (স্বামীর মৃত্যু কামনা)
হতাশ হয়ে বুড়ি বলে,–তাই ক। আমার কি তেমন কপালডা!
আর মারবে না প্ৰতিশ্রুতি সত্ত্বেও বড় ভয়ে ভয়ে হাসুনির মা ঘরে ফিরে এসেছিল। ভয় যে, সেখানে যা বলেছে বলেছে, কিন্তু একবার হাতে নাতে পেলে তাকে ঠিক খুন করে ফেলবে বুড়ো। সে এখন অবাক হয়ে ঘুরঘুর করে, উঁকি মেরে বাপের শায়িত নিশ্চল দেহটি চেয়ে দেখে কখনো কখনো। কখনো বা আড়াল থেকে শুষ্ক গলায় প্রশ্ন করে,–বাপজান, খাইবা না?
বাপ কথা কয় না।
দুদিন পরে ঝড় ওঠে। আকাশে দুরন্ত হওয়া আর দলে-ভারি কালো কালে মেঘে লড়াই লাগে; মহব্বতনগরের সর্বোচ্চ তালগাছটি বন্দী পাখির মতো আছড়াতে থাকে (ঝড়ের তীব্রতা)। হাওয়া মাঠে ঘূর্ণিপাক খেয়ে আসে, তিৰ্যক ভঙ্গিতে বাজপাখির মতো শোঁ করে নেমে আসে, কখনো ভোঁতা প্ৰশস্ততায় হাতির মতো ঠেলে এগিয়ে যায়।
ঝড় এলে হাসুনির মার হৈ হৈ করা অভ্যাস। হাসুনি কোথায় গেলো রে, ছাগলটা কোথায় গেলো রে, লাল কুটিওয়ালা মুরগিটা কোথায় গেলে রে; তীক্ষ্ণ গলায় চেঁচামেচি করে, আথালি-পাথালি (দিশাহীন) ছুটোছুটি করে, আর কী একটা আদিম উল্লাসে তার দেহ নাচে। (ঝড়ের আনন্দে)
ঝড় আসছে। হু-হু করে, কিন্তু হাসুনির মা মুরগিটা খুঁজে পায় না। পেছনে ঝোপঝাড়ে দেখে, বাইরে যায়, ও ধারে আমগাছে আশ্রয় নিয়েছে কিনা দেখে, বৃষ্টির ঝাপটায় বুজে আসা চোখে পিট-পিট করে তাকিয়ে কুরকুর আওয়াজ করে ডাকে, কিন্তু কোথাও তার (মুরগির) সন্ধান পায় না। শেষে ভাবে, কী জানি, হয়তো বাপের মাচার তলেই মুরগিটা গিয়ে লুকিয়েছে। পা টিপে টিপে ঘরে ঢুকে মাচার তলে উঁকি মারতেই তার বাপ হঠাৎ কথা বলে। গলা দুর্বল, শূন্য শূন্য ঠেকে। বলে,—আমারে চাইরডা চিড়া আইনা দে।
মেয়ে ছুটে গিয়ে কিছু চিড়াগুড় এনে দেয়।
বাপ গবগব করে খায়। ক্ষিধে রাক্ষসের মতো হয়ে উঠেছে।
চিড়ে কটা গলাধঃকরণ করে বলে,
–পানি দে।
মেয়ে ছুটে পানি আনে। সর্বাঙ্গ তার ভিজে সপসপ করছে, কিন্তু সেদিকে খেয়াল নেই। অনুতাপ আর মায়া মমতায় বাপের কাছে সে গলে গেছে (আদরের কাছে রাগের পরাজয়)। বাপের ব্যথায় তার বুক চিনচিন করে।
বুড়ো ঢকঢক করে পানি খায়। তারপর একটু ভাবে। শেষে বলে,–আর চাইরডা চিড়া দিবি মা?মেয়ে আবার ছোটে। চিড়া আনে আরো, সঙ্গে আরেক লোটা পানিও আনে।
দুদিনের রোজা ভেঙে বুড়ো ধনুকের মতো পিঠ বেঁকিয়ে মাচার ওপর অনেকক্ষণ বসে বসে ভাবে, দৃষ্টি কোণের অন্ধকারের মধ্যে নিবদ্ধ।
বাইরে হাওয়া গোঙিয়ে গোঙিয়ে ওঠে, ঘরের চাল হাওয়া আর বৃষ্টির ঝাপটায় গুমরায় (গুমর গুমর শব্দ)। সিক্ত কাপড়ে দূরে দাঁড়িয়ে মেয়ে নীরব হয়ে থাকে। হঠাৎ কেন তার চোখ ছলছল করে (অনুশোচনায় জর্জরিত বাবার অবস্থা দেখে)। তবে ঘরের অন্ধকার আর বৃষ্টির পানিতে ভেজা দুঃখের মধ্যে সে অশ্রু ধরা পড়বার কথা নয়।
অবশেষে বাপ বলে–মাইয়া তোর কাছে মাফ চাই। বুড়া মানুষ মতিগতির আর ঠিক নাই! তোরে না বুইঝা কষ্ট দিছি হে-দিন।
মেয়ে কী বলবে। বোকার মতো দাঁড়িয়ে থাকে। তারপর মুরগি খোঁজার অজুহাতে (লজ্জায়) বাইরে ঝড়ের মধ্যে দাঁড়াতেই চোখে আরো পানি আসে হু-হু করে, অর্থহীনভাবে, আর বৃষ্টিতে ধুয়ে যায় সে-পানি।
সেদিন সন্ধ্যায় বুড়ো চলে গেলো (নিরুদ্দেশ)। কেউ বলতে পারল না, গেলো কোথায়? ছেলেরা অনেক খোঁজে। আশেপাশে গ্রামের লোকদের জিজ্ঞাসাবাদ করে, মতিগঞ্জের সড়ক ধরে তিন ক্রোশ দূরে গঞ্জে গিয়েও অনেক তালাশ করে। কেউ বলে, নদীতে ডুবছে। তাই যদি হয় তবে সন্ধান পাবার জো নেই। খরস্রোতা বিশাল নদী, সে নদী কোথায় কতদূরে তার দেহ ভাসিয়ে তুলেছে কে জানে। (সর্বসম্মুখে অপমানিত হওয়ার লজ্জায় অনুশোচনায় বুড়োর নিরুদ্দেশ)
ঘরে বুড়ি স্তব্ধ হয়ে থাকে (বুড়ো চলে যাওয়ায়)। যে তাঁর মৃত্যুর জন্যে এত আগ্ৰহ দেখাত সে আর কথা কয় না। হাসুনির মা দূর থেকে মজিদের মিষ্টি মধুর কোরান তেলাওয়াত শুনেছে অনেকদিন। সে আল্লার কথা স্মরণ করে বলে,–আল্লা-আল্লা কও মা।
বুড়ি তখন জেগে উঠে কয়েকবার শিশুর মতো বলে, আল্লা, আল্লা…। মজিদের শিক্ষায় গ্রামবাসীরা এ কথা ভালোভাবে বুঝেছে যে, পৃথিবীতে যাই ঘটুক জন্ম-মৃত্যু শোক-দুঃখ–যার অর্থ অনেক সময় খুঁজে পাওয়া ভার হয়ে ওঠে।–সব খোদা ভালোর জন্যেই করেন। তাঁর সৃষ্টির মর্ম যেমন সাধারণ মানুষের পক্ষে বোঝা দুষ্কর তেমন নিত্যনিয়ত তিনি যা করেন তার গূঢ়তত্ত্ব বোঝাও দুষ্কর। তবে এটা ঠিক, তিনি যা করেন মঙ্গলের জন্যই করেন (প্রবল বিশ্বাস)। ঘটনার রূপ অসহনীয় হতে পারে, কিন্তু অন্তর্নিহিত উদ্দেশ্য শেষ পর্যন্ত মানুষের মঙ্গল, তার ভালাই (নিজের তকদিরকে মেনে নেওয়া)। অতএব যে জিনিস বোঝার জন্যে নয়, তার জন্যে কৌতূহল প্ৰকাশ করা অর্থহীন! (সাধারণ জ্ঞানে খোদার রহস্য বুঝা দুষ্কর)
ঠিক সে কারণেই বুড়ো কোথায় পালিয়েছে বা তার মৃতদেহ কোথাও ভেসে উঠেছে কি না জানিবার জন্যে কৌতূহল হতে পারে, কিন্তু কেন পালিয়েছে তা নিয়ে বিন্দুমাত্র কৌতূহল হবার কথা নয়। যারা মজিদের শিক্ষার যথার্থ মর্ম উপলব্ধি করতে সক্ষম হয়নি, তাদের মধ্যে অবশ্য প্রশ্নটি যে একেবারে জাগে না এমন নয়। কিন্তু সে-প্ৰশ্ন দ্বিতীয়ার চাঁদের মতো ক্ষীণ, উঠেই ডুবে যায়, ব্যাখ্যাতীত অজানা বিশাল আকাশের মধ্যে থই পায় না (মজিদের সিদ্ধান্তের বিরুদ্ধে কথা বলার সাহস হয় না)। যেখানে জন্ম-মৃত্যু, ফসল হওয়া-না-হওয়া বা খেতে পাওয়া না-পাওয়া একটা অদৃশ্য শক্তির দ্বারা নিয়ন্ত্রিত, সেখানে একটি লোকের নিরুদ্দেশ হবার ঘটনা কতখানি আর কৌতূহল জাগাতে পারে! যা মানুষের স্মরণে জাগ্রত হয়ে থাকে বহুদিন, তা সে-অপরাধের ঘটনা। মজিদের সামনে সেদিন লোকটি কেমন ছটফট করেছিল, পাপের জ্বালায় কেমন অস্থির করেছিল (অনুশোচনা)–যেন দোজখের আগুনের লেলিহান শিখা তাকে স্পর্শ করেছে। তারপর তার কান্না। শয়তানের শক্তি ধূলিস্মাৎ হয়ে গিয়েছিল সে-কান্নার মধ্যে। (অনুশোচনায় পূর্বের সব পাপমোচন হয়েছে)
এ বিচিত্র দুনিয়ায় যারা আবার আর দশজনের চাইতে বেশি জানে ও বোঝে, বিশাল রহস্যের প্রান্তটুকু অন্তত ধরতে পারে বলে দাবি করে, তাদের কদর প্রচুর (খোদার ‍কুদরতের রহস্য যারা ‍বুঝতে পারে)। সালুতে ঢাকা মাছের পিঠের মতো চিরনীরব মাজারটি একটি দুৰ্ভেদ্য, দুর্লঙ্ঘনীয় রহস্যে আবৃত (মাজারের বাস্তবতাই একটা রহস্য)। তারই ঘনিষ্ঠতার মধ্যে যে মানুষ বসবাস করে তার দ্বারাই সম্ভব মহারহস্যকে ভেদ করা, অনাবৃত করা। মজিদের ক্ষুদ্র চোখদুটি যখন ক্ষুদ্রতর হয়ে ওঠে। আর দিগন্তের ধূসরতায় আবছা হয়ে আসে, তখনই তার সামনে সে-সৃষ্টি-রহস্য নিরাবরণ স্পষ্টতায় প্ৰতিভাত হয়–সে-কথা এরা বোঝে।

হাসুনির মা’র মনেও প্রশ্ন নেই। মাসগুলো ঘুরে এলে বরঞ্চ বাপের নিরুদ্দেশ হবার মধ্যে একটা অন্তর্নিহিত অর্থ খুজে পায় (বাবার নিরুদ্দেশকে মেনে নেয়)।–খোদার জিনিস খোদা তুইলা লইয়া গেছে। তারপর মা’র প্রতি অগ্নি দৃষ্টি হানে।
–বাপ আমাগো নেকবন্দ মানুষ আছিল। বুড়ি কিছু বলে না। খেলোয়াড় চলে গেছে, খেলবে কার সাথে। (ঝগড়া করার সাথী চলে গেছে) তাই যেন চুপচাপ থাকে।
প্ৰথম প্ৰথম হাসুনির মা মজিদের বাসায় আসত না। লজ্জা হতো। মার লজ্জা নেই বলে তার লজ্জা (হাসুনির মায়ের মতো তার মা পর্দা করে না)। তারপর ক্রমে ক্ৰমে আসতে লাগল। কখনো ক্বচিৎ মজিদের সামনাসামনি হয়ে গেলে মাথায় আধহাত ঘোমটা টেনে আড়ালে গিয়ে দাঁড়াত আর বুকটা দুরুদুরু কঁপত ভয়ে। বতোর দিনে এ বাড়িতে যাতায়াত যখন বেড়ে গেলো তখন একদিন উঠানে একেবারে সামনা সামনি হয়ে গেলে। মজিদের হাতে হুঁকা। হাসুনির মা ফিরে দাঁড়িয়েছে এমন সময়ে মজিদ বলে, –হুঁকায় এক ছিলিম তামাক ভইরা দেও গো বিটি।
কয়েক মুহূর্ত ইতস্তত করে ঘুরে দাঁড়িয়ে সে হুঁকাটা নেয়। বুক কাঁপতে থাকে ধকধক করে, আর লজ্জায় চোখ বুজে আসতে চায়। (মজিদের সামনে পড়ায়)
হুঁকাটা দিতে গিয়ে মজিদ কয়েক মুহূর্ত সেটা ধরে রাখে। তারপর হঠাৎ বলে, আহা!
তার গলা বেদনায় ছলছল করে।
তারপর থেকে সংকোচ আর ভয় কাটে (মজিদের সামনে নিঃসংকোচে দেখা দেয়)। ক্ৰমে ক্ৰমে সে খোলা মুখে সামনে দিয়ে আসা-যাওয়া শুরু করে। না করে উপায় কী! বতোর দিনে কাজের অন্ত নেই। মানুষ তো রহিমা আর সে। ধান এলানো মাড়ানো, সিদ্ধ করা, ভানা–কত কাজ।একদিন উঠানে ধান ছড়াতে ছড়াতে হঠাৎ বহুদিন পর হাসুনির মা তার পুরানো আর্জি জানায়। রহিমাকে বলে,–ওনারে কন, খোদায় যানি আমার মওত দেয়।
হঠাৎ রহিমা রুষ্ট স্বরে বলে,–অমন কথা কইওনা, ঘরে বালা আইসে। (মৃত্যু কামনা ঠিক না)
পরদিন মজিদ একটা শাড়ি আনিয়ে দেয়। বেগুনি রঙ, কালো পাড়। খুশি হয়ে হাসুনির মা মুখ গম্ভীর করে। বলে,—আমার শাড়ির দরকার কী বুবু (হাসুনির মায়ের প্রতি মজিদের অনৈতিক আকর্ষণ)? হাসুনির একটা জামা দিলে ও পরত খন।
হঠাৎ কী হয়, রহিমা কিছু বলে না (হাসুনির মায়ের প্রতি আকর্ষণ দেখে রহিমা মনঃক্ষুণ্ন হয়)। অন্যদিন হলে, কথা না বলুক অন্তত হাসতো। আজ হাসেও না।

হাসুনির মায়ের প্রতি অনৈতিক আকর্ষণ

পৌষের শীত। প্ৰান্তর থেকে ঠান্ডা হাওয়া এসে হাড় কঁপায়। গভীর রাতে রহিমা আর হাসুনির মা ধান সিদ্ধ করে। খড়কুটো দিয়ে আগুন জ্বালিয়েছে, আলোকিত হয়ে উঠেছে সারা উঠানটা; ওপরে আকাশ অন্ধকার। গানগনে আগুনের শিখা যেন সেই কালো আকাশ গিয়ে ছোঁয়। ওধারে ধোঁয়া হয়, শব্দ হয় ভাপের। যেন শতসহস্ৰ সাপ শিস দেয়।
শেষ রাতের দিকে মজিদ ঘর থেকে একবার বেরিয়ে আসে। খড়ের আগুনের উজ্জ্বল আলো লেপাজোকা সাদা উঠানটায় (উঠোনে আগুনের আলো প্রতিফলিত হচ্ছে) ঈষৎ লালচে হয়ে প্ৰতিফলিত হয়ে ঝকঝাক করে। সেই ঈষৎ লালচে উঠানের পশ্চাতে দেখে হাসুনির মাকে, তার পরনে বেগুনি শাড়িটা। যে আলো সাদা মসৃণ উঠানটাকে শুভ্ৰতায় উজ্জ্বল করে তুলেছে, সে আলোই তেমনি তার উন্মুক্ত গলা-কাঁধের খানিকটা অংশ আর বাহু উজ্জ্বল করে তুলেছে। দেখে মজিদের চোখ এখানে অন্ধকারে চকচক করে। (হাসুনির মাকে দেখে মজিদের চারিত্রিক লালসা)
কিছুক্ষণ পর ঘরে গিয়ে বিছানায় শুয়ে মজিদ আশপাশ করে। উঠান থেকে শিসের আওয়াজ এসে বেড়ার গায়ে শিরশির করে। তাই শোনে আর আশপাশ করে মজিদ। তারই মধ্যে কখন দ্রুততর, ঘনতর। হয়ে ওঠে মুহূর্তগুলি।
এক সময়ে মজিদ আবার বেরিয়ে আসে। এসে কিছুক্ষণ আগে হাসুনির মায়ের উজ্জ্বল বাহু-কাঁধ-গলার জন্য যে রহিমাকে সে লক্ষ্য করেনি, সে-রহিমাকেই ডাকে। ডাকের স্বরে প্রভুত্ব! দুনিয়ায় তার চাইতে এই মুহূর্তে অধিকতর শক্তিশালী, অধিকতর ক্ষমতাবান আর কেউ নেই যেন। খড়কুটোর আলোর জন্য ওপরে আকাশ তেমনি অন্ধকার। সীমাহীন সে আকাশ এখন কালো আবরণে সীমাবদ্ধ। (গভীর রাত) মানুষের দুনিয়া আর খোদার দুনিয়া আলাদা হয়ে গেছে। (উঠোনে আলো ও ব্যস্ততা অথচ আকাশে অন্ধকার নীরবতা)
রহিমা ঘরে এলে মজিদ বলে, পা-টা একটু টিপা দিবা?
এ গলার স্বর রহিমা চেনে। (স্ত্রীর সাথে একান্ত সময় কাটানো) অন্ধকার ঘরের মধ্যে মূর্তির মতো কয়েক মুহূর্ত স্তম্ভিতভাবে দাঁড়িয়ে থেকে আস্তে বলে,—ওইধারে এত কাম, ফজরের আগে শেষ করন লাগবো।
–থোও তোমার কাজ। মজিদ গর্জে ওঠে। গর্জাবে না কেন। যে ধান সিদ্ধ হচ্ছে সে ধান তো তারই। এখানে সে মালিক। সে মালিকানায় এক আনারও অংশীদার নেই কেউ।
রহিমার দেহভরা ধানের গন্ধ। যেন জমি, ফসল ধরেছে। ঝুঁকে ঝুঁকে সে পা টেপে। ওকে তাকিয়ে তাকিয়ে দেখে মজিদ, আর ধানের গন্ধ শোকে। শীতের রাতে ভারী হয়ে নাকে লাগে সে-গন্ধ।
অন্ধকারে সাপের মতো চকচক করে তার চোখ। মনের অস্থিরতা কাটে না। কাউকে সে জানাতে চায় কী কোনো কথা? তারই দেওয়া বেগুনি রঙের শাড়ি পরা মেয়েলোকটিকে খড়কুটোর আলোতে তখন যার দেহের কতক অংশ জ্বলজ্বল করছিল লালিত্যে (মাধুর্য)—তাকে একটা কথা জানাতে চায় যেন (অনৈতিক আকর্ষণ)। তবে জানানোর পথে বৃহৎ বাধার দেয়াল বলে (খোদার ভয়) রাত্রির এই মুহূর্তে অন্ধকার আকাশের তলে অসীম ক্ষমতাশীল প্ৰভুত্ব অস্থির অস্থির করে, দেয়াল ভেদ করার সূক্ষ্ম, ঘোরালো পন্থার সন্ধান করতে গিয়ে অধীর হয়ে পড়ে। (সংযত রাখা)
তখন পশ্চিম আকাশে শুকতারা জ্বলজ্বল করছে। উঠানে আগুন নিভে এসেছে, উত্তর থেকে জোর ঠান্ডা হাওয়া বইতে শুরু করেছে। রহিমা ফিরে এসে মুখ তুলে চায় না। হাসুনির মা দাঁতে চিবিয়ে দেখছিল, ধান সিদ্ধ হয়েছে কি না। সেও তাকায় না রহিমার পানে। কথা বলতে গিয়ে মুখে কথা বাধে।
তারপর পূর্ব আকাশ হতে স্বপ্নের মতো ক্ষীণ, শ্লথগতি আলো এসে রাতের অন্ধকার যখন কাটিয়ে দেয় তখন হঠাৎ ওরা দুজনে চমকে উঠে। মজিদ কখন উঠে গিয়ে ফজরের নামাজ পড়তে শুরু করেছে। হালকা মধুর কণ্ঠ গ্ৰীষ্ম প্ৰত্যুষের ঝিরঝির হাওয়ার মতো ভেসে আসে!
ওরা তাকায় পরস্পরের পানে। নতুন এক দিন শুরু হয়েছে খোদার নাম নিয়ে। তার নামোচ্চারণে সংকোচ কাটে।

লোকদের সে যাই বলুক, বতোর দিনে মজিদ কিন্তু ভুলে যায় গ্রামের অভিনয়ে তার কোন পালা। মাজারের পাশে গত বছরে ওঠানো টিন আর বেড়ার ঘর মগরার পর মগরা ধানে ভরে উঠে। মাজার জেয়ারত করতে এসে লোকেরা চেয়ে চেয়ে দেখে তার ধান। গভীর বিস্ময়ে তারা ধীরে ধীরে মাথা নাড়ে, মজিদকে অভিনন্দিত করে। শুনে মজিদ মুখ গম্ভীর করে। দাড়িতে হাত বুলিয়ে আকাশের পানে তাকায়। বলে, খোদার রহমত। খোদাই রিজিক দেনেওয়ালা। তারপর ইঙ্গিতে মাজারের প্রতি দৃষ্টি আকর্ষণ করে, বলে আর তানার দোয়া।
শুনে কারো কারো চোখ ছলছল করে ওঠে, আর আবেগে রুদ্ধ হয়ে আসে কণ্ঠ। কেন আসবে না। ধান হয়েছে এবার। মজিদের ঘরে যেমন মগরাগুলো উপচে পড়ছে ধানের প্রাচুর্যে, তেমনি ঘরো-ঘরে ধানের বন্যা। তবে জীবনে যারা অনেক দেখেছে, যারা সমঝদার, তারা অহংকার দাবিয়ে রাখে। ধানের প্রাচুর্যে কারো কারো বুকে আশঙ্কাও জাগে। (পরবর্তী বছর ধান কম হওয়ার আশঙ্কা)
বস্তুত, মজিদকে দেখে তাদের আসল কথা (খোদার প্রতি কৃতজ্ঞতা) স্মরণ হয়। খোদার রহমত না হলে মাঠে মাঠে ধান হতে পারে না। তাঁর রহমত যদি শুকিয়ে যায়–বর্ষিত না হয়, তবে খামার শূন্য হয়ে খাঁ খাঁ করে। বিশেষ দিনে (খুশির দিনে) সে কথাটা স্মরণ করবার জন্য মজিদের মতো লোকের সাহায্য নেয় (ধান পাওয়ার আনন্দে যেন খোদাকে ভুলে না যায়)। তার কাছেই শোকর গুজার করবার ভাষা শিখতে আসে।
অপূর্ব দীনতায় চোখ তুলে মজিদ বলে, দুনিয়াদারি কী তার কাজ? (দুনিয়ার অর্থ-সম্পদের প্রতি অনাগ্রহ) খোদাতালা অবশ্য দুনিয়ার কাজকামকে অবহেলা করতে বলেননি, কিন্তু যার অন্তরে খোদা-রাসুলের স্পর্শ লাগে, তার কী আর দুনিয়াদারি ভালো লাগে?
—বলে মজিদ চোখ পিট পিট করে–যেন তার চোখ ছলছল (খোদার শুকরিয়ায় কান্না) করে উঠেছে। যে শোনে সে মাথা নাড়ে ঘন ঘন। অস্পষ্ট গলায় সে আবার বলে, –খোদার রহমত সব।
আরো বলে যে, সে-রহমতের জন্যে সে খোদার কাছে হাজারবার শোকর গুজার করে। কিন্তু আবার দু-মুঠো ভাত খেতে না পেলেও তার চিন্তা নেই। খোদার ওপর যারা প্ৰাণ-মন-দেহ ন্যস্ত এবং খোদার ওপর যে তোয়াক্কল করে (ভরসা), তার আবার এসব তুচ্ছ কথা নিয়ে ভাবনা! বলতে বলতে এবার একটা বিচিত্ৰ হাসি ফুটে ওঠে মজিদের মুখে, কোটরাগত চোখ ঝাপসা হয়ে পড়ে দিগন্তপ্রসারী দূরত্বে। (বাড়ির কথা মনে পড়া)
কিন্তু আজ সকালে মজিদের সে চোখে একটা জ্বালাময় ছবি (হাসুনির মায়ের ছবি) ভেসে ওঠে থেকে থেকে। গনগনে আগুনের পাশে বেগুনি রঙের শাড়ি পর একটি অস্পষ্ট নারীকে দেখে। স্মৃতিতে তার উলঙ্গ বাহু ও কাঁধ আরো শুভ্ৰ হয়ে ওঠে। তার যে চোখে দিগন্তপ্রসারী দূরত্ব জেগে ওঠে, সে চোখ ক্রমশ সূক্ষ্ম ও সূচাগ্র তীক্ষ্ণ হয়ে ওঠে।
হঠাৎ সচেতন হয়ে মজিদ প্রশ্ন করে,—তোমার কেমন ধান হইল মিঞা?
তুমি বলুক আপনি বলুক সকলকে মিঞা বলে সম্বোধন করার অভ্যাস মজিদের। লোকটি ঘাড় চুলকে নিতিবিতি করে বলে, যা-ই হইছে তাই যথেষ্ট (কৃতজ্ঞতা)। ছেলেপুলে লইয়া দুই বেলা খাইবার পারুম।
আসলে এদের বড়াই করাই অভ্যাস। পঞ্চাশ মণ ধান হলে অন্তত একশো মণ বলা চাই। বতোর দিন উঁচিয়ে উঁচিয়ে রাখা ধানের প্রতি সবার দৃষ্টি আকর্ষণ করানো চাই (সম্পদের অহংকার)। লোকটির ধান ভালোই হয়েছে, বলতে গেলে গত দশ বছরে এমন ফসল হয়নি। কিন্তু মজিদের সামনে বড়াই করা তো দূরের কথা, ন্যায্য কথাটা বলতেই তার মুখে কেমন বাধে। তাছাড়া, খোদার কালাম জানা লোকের সামনে ভাবনা কেমন যেন গুলিয়ে যায়। কী কথা বললে কী হবে বুঝে না উঠে সতর্কতা অবলম্বন করে।
কথার কথা বলে মজিদ, তাই উত্তরের প্রতি লক্ষ্য থাকে না। তার অন্তরে ক্রমশ যে আগুন জ্বলে উঠছে তারই শিখার উত্তাপ অনুভব করে (হাসুনির মায়ের প্রতি অনৈতিক আকর্ষণ)। সে-উত্তাপ ভালোই লাগে।
লোকটি অবশেষে উঠে দাঁড়ায়। তবে যাবার আগে হঠাৎ এমন একটা কথা বলে যে, মজিদ যেখানে দাঁড়িয়েছিল সেখানেই বৃক্ষের মতো দাঁড়িয়ে থাকে অনেকক্ষণ। এবং যে আগুন জ্বলে উঠছিল অন্তরে, তা মুহূর্তে নির্বাপিত হয়।

আওয়ালপুরের পীরের আগমন

সংক্ষেপে ব্যাপারটি হলো এই।–গৃহস্থদের গোলায় যখন ধান ভরে ওঠে তখন দেশময় আবার পীরদের সফর শুরু হয়। এই সময় খাতির-যত্নটা হয়, মানুষের মেজাজটাও খোলসা থাকে (টাকা পয়সা থাকায়)। যেবার আকাল পড়ে সেবার অতি ভক্ত মুরিদের ঘরেও দু’দিন গা ঢেলে থাকতে ভরসা হয় না পীর সাহেবদের।
দিন কয়েক হলো, তিন গ্ৰাম পরে এক পীর সাহেব এসেছেন। ইউনিয়ন বোর্ডের প্রেসিডেন্ট মতলুব খাঁ তাঁর পুরানো মুরিদ। তিনি সেখানেই উঠেছেন।
প্ৰচণ্ড পথশ্ৰম স্বীকার করে এই দূর দেশে আসেন। সে কতদিন আগে তা পীর সাহেবও সঠিকভাবে জানেন না। কিন্তু এ-অজ্ঞতা স্বীকাৰ্য নয় বলে কোনো এক পাঠান বাদশাহের মৃত্যুর সঙ্গে হিসাব মিলিয়ে সে স্মরণীয় আগমনকে একটা নির্দিষ্ট সময়ের মধ্যে নির্ণীত করা হয়। যে দেশ ছেড়ে এসেছেন, সে-দেশের সঙ্গে আজ অবশ্য কোনো সম্বন্ধ নেই। কেবল বৃহৎ খড়গনাসা (লম্বা নাক) গৌরবর্ণ চেহারাটি ছাড়া। ময়মনসিংহ জেলার কোনো এক অঞ্চলে বংশানুক্ৰমে বসবাস করছেন বলে তাঁদের ভাষাটাও এমন বিশুদ্ধভাবে স্থানীয় রূপ লাভ করেছে যে, মুরিদানির কাজ করবার প্রাক্কালে (পিরগিরি করার পূর্বে) উত্তর ভারতে কোনো এক স্থানে গিয়ে তাঁকে উর্দু জবান এস্তেমাল করে আসতে হয়েছিল।

পীর সাহেবের খ্যাতির শেষ নেই, তার সম্বন্ধে গল্পেরও (অলৌকিক কাহিনি) শেষ নেই। সে গল্প তাঁর রূহানি তাকত ও কাশফ নিয়ে (আধ্যাত্মিক শক্তি)। মাজারের ছায়ার তলে আছে বলে সমাজে জানাজা পড়ানো খোনকার মোল্লার চেয়ে মজিদের স্থান অনেক উঁচুতে, কিন্তু রূহানি তাকত তাঁর নেই বলে অন্তরে অন্তরে দীনতা বোধ করে। কখনো কখনো খোলাখুলিভাবে লোকসমক্ষে সে দীনতা ব্যক্ত করে। কিন্তু এমন ভাষায় ও ভঙ্গিতে যে তা মহৎ ব্যক্তির দীনতা প্ৰকাশের পর্যায়ে গিয়ে পড়ে এবং প্ৰতিক্রিয়া লক্ষ্য করে মজিদ নিশ্চিন্ত থাকে। (আধ্যাত্মিক শক্তি না থাকলেও গ্রামবাসী আপত্তি করে না)
কিন্তু জাঁদরেল পীররা যখন আশেপাশে এসে আস্তানা গাড়েন তখন কিন্তু মজিদ শঙ্কিত হয়ে (মাজারের ব্যবসায়ের ভয়ে) ওঠে। ভয় হয়, তার বিস্তৃত প্ৰভাব কৃষ্ণপক্ষের চাঁদের মতো মিলিয়ে যাবে, অন্য এক ব্যক্তি এসে যে বৃহৎ মায়াজাল বিস্তার করবে তাতে সবাই একে একে জড়িয়ে পড়বে।
অন্যের আত্মার শক্তিতে অবশ্য মজিদের খাঁটি বিশ্বাস নেই। আপন হাতে সৃষ্ট মাজারের পাশে বসে দুনিয়ার অনেক কিছুতেই তার বিশ্বাস হয় না। তবে এসব তার অন্তরের কথা, প্ৰকাশের কথা নয়। অতএব কিছুমাত্র বিশ্বাস ছাড়াও সে আশ্চৰ্য ধৈর্যসহকারে অন্যের ক্ষমতার ভূয়সী প্ৰশংসা করে। বলে, খোদাতালার ভেদ বোঝা কী সহজ কথা (অন্য পীরের শক্তির প্রতি সমর্থন)? কার মধ্যে তিনি কী বস্তু দিয়েছেন সে কেবল তিনিই বলতে পারেন।
এবার মজিদের মন কিন্তু কদিন ধরে (অনিশ্চিত ভবিষ্যতের চিন্তায়) থমথম করে। সব সময়েই হাওয়ায় ভেসে আসে পীর সাহেবের কার্যকলাপের কথা। এদিকে মাজারে লোকদের আসা-যাওয়াও প্ৰায় থেমে যায়। বতোর দিনে মানুষের কাজের অন্ত নেই ঠিক কিন্তু যেটুকু অবসর পায় তা তারা ব্যয় করতে থাকে পীর সাহেবের বাতরস-স্ফীত পদযুগলে (বাত রোগে আক্রান্ত পায়ে) একবার চুমু দেবার আশায়। পদচুম্বন অবশ্য সবার ভাগ্যে ঘটে না। দিনের পর দিন ভিড় ঠেলে অতি নিকটে পৌঁছেও অনেক সময় বাসনা চরিতার্থ হয় না। সন্নিকটে গিয়ে তার নূরানি চেহারার দীপ্তি দেখে কারো চোখ ঝলসে যায়, কারো এমন চোখ-ভাসানো কান্না পায় যে, আর এগোবার আশা ত্যাগ করতে হয়। ভাগ্যবান যারা, তারা পীর সাহেবের হাতের স্পর্শ হতে শুরু করে দু-এক শব্দ আদেশ-উপদেশ বা তামাক-গন্ধ-ভারী বুকের হাওয়াও লাভ করে।
রাত্ৰে বিছানায় শুয়ে মজিদ গম্ভীর হয়ে থাকে। রহিমা গা টেপে, কিন্তু টেপে যেন আস্ত পাথর (চিন্তায় শরীর পাথরের রূপ ধারণ)। অবশেষে মজিদকে সে প্রশ্ন করে, —আপনার কী হইছে?
মজিদ কিছু বলে না।
উত্তরের জন্যে কতক্ষণ অপেক্ষা করে রহিমা হঠাৎ বলে,–এক পীর সাহেব আইছেন না হেই গোরামে, তানি নাকি মরা মাইনষেরে জিন্দা কইরা দেন?
পাথর এবার হঠাৎ নড়ে। আবছা অন্ধকারে মজিদের চোখ জ্বলে ওঠে। ক্ষণকাল নীরব থেকে হঠাৎ কটমট করে তাকিয়ে সে প্রশ্ন করে,—মরা মানুষ জিন্দা হয় ক্যামনে?
প্রশ্নটা কৌতূহলের নয় দেখে রহীমা দমে গেলো। তারপর আর কোনো কথা হয় না। এক সময় রহিমা পাশে শুয়ে আলগোছে ঘুমিয়ে পড়ে।
মজিদ ঘুমোয় না। সে বুঝেছে, ব্যাপারটা অনেক দূর এগিয়ে গেছে, এবার কিছু একটা না করলে নয় (পীরের আধ্যাত্মিক শক্তি পরীক্ষা ও বাস্তবতা দেখা)। আজও অপরাহ্ণে সে দেখেছে, মতিগঞ্জের সড়কটা দিয়ে দলে দলে লোক চলছে উত্তর দিকে।
মজিদ ভাবে আর ভাবে। রাত যত গভীর হয় তত আগুন হয়ে ওঠে মাথা। মানুষের নিৰ্বোধ বোকামির জন্যে আর তার অকৃতজ্ঞতার জন্যে (মজিদকে বাদ দিয়ে অন্য পীর ধরায়) একটা মারাত্মক ক্রোধ ও ঘৃণা, উষ্ণ রক্তের মধ্যে টগবগ করতে থাকে। সে ছটফট করে একটা নিস্ফল ক্ৰোধে।
এক সময় ভাবে, ঝালর-দেয়া সালু কাপড়ে আবৃত নকল মাজারটিই এদের উপযুক্ত শিক্ষা, তাদের নিমকহারামির যথার্থ প্রতিদান (মাজারের মিথ্যা ভয় দেখি গ্রামে প্রভাব বিস্তার)। ভাবে, একদিন মাথায় খুন চড়ে গেলে সে তাদের বলেই দেবে আসল কথা (ক্ষোভে সত্য প্রকাশ)। বলে দিয়ে হাসবে হা হা করে গগন বিদীর্ণ করে। শুনে যদি তাদের বুক ভেঙে যায়। তবেই তৃপ্ত হবে তার রিক্ত মন। মজিদ তার ঘরবাড়ি বিক্রি করে সরে পড়বে দুনিয়ার অন্য পথে-ঘাটে। এ বিচিত্র বিশাল দুনিয়ায় কী যাবার জায়গার কোনো অভাব আছে?
অবশ্য এ ভাবনা গভীর রাতে নিজের বিছানায় শুয়েই সে ভাবে। যখন মাথা শীতল হয়, নিষ্ফল ক্ৰোধ হতাশায় গলে যায়, তখন সে আবার গুম হয়ে থাকে। তারপর শ্ৰান্ত, বিক্ষুব্ধ মনে হঠাৎ একটি চিকন বুদ্ধিরশ্মি প্ৰতিফলিত হয়। (পীরকে যাচাই করা)
শীঘ্ৰ তার চোখ দুটি চকচক করে ওঠে, শ্বাস দ্রুততর হয়। উত্তেজনায় আধা উঠে বসে অন্ধকার ভেদ করে রহিমার পানে তাকায়। পাশে সে অঘোর ঘুমে বেচাইন। একটি হাঁটু উলঙ্গ হয়ে মজিদের দেহ ঘেঁষে আছে।
তাকেই অকারণে কয়েক মুহূর্ত চেয়ে চেয়ে দেখে মজিদ, তারপর আবার চিৎ হয়ে শুয়ে চোখখোলা মৃতের মতো পড়ে থাকে।
মজিদ যখন আওয়ালপুর গ্রামে পৌঁছলো তখন সূৰ্য হেলে পড়েছে। মতলুব মিঞার বাড়ির সামনেকার মাঠ লোকে-লোকারণ্য। তারই মধ্যে কোথায় যে পীর সাহেব বসে আছেন বোঝা মুশকিল। মজিদ বেঁটে মানুষ। পায়ের আঙ্গুলে দাঁড়িয়ে বকের মতো গলা বাড়িয়ে পীর সাহেবকে একবার দেখবার চেষ্টা করে। কিন্তু কালো মাথার সমুদ্রে দৃষ্টি কেবল ব্যাহত হয়ে ফিরে আসে।
একজন বললে যে, বটগাছটার তলে তিনি বসে আছেন। তখন মাঘের শেষাশেষি। তবু জন-সমুদ্রের উত্তাপে পীর সাহেবের গরম লেগেছে বলে তাঁর গায়ে হাতির কানের মতো মস্ত ঝালরওয়ালা পাখা নিয়ে হাওয়া করছে একটি লোক; কেবল সেই পাখাটা থেকে থেকে নজরে পড়ে।
মুখ তুলে রেখে ভিড় ঠেলে এগিয়ে যেতে লাগল মজিদ। সামনে শত শত লোক সব বিভোর হয়ে বসে আছে, কেউ কাউকে লক্ষ্য করবার কথা নয়। মজিদকে চেনে এমন লোক ভিড়ের মধ্যে অনেক আছে বটে কিন্তু তারা কেউ আজ তাকে চেনে না। যেন বিশাল সূর্যোদয় হয়েছে, আর সে-আলোয় প্ৰদীপের আলো নিশ্চিহ্ন হয়ে গেছে। (মজিদের প্রভাব নিমিষেই মিলিয়ে যাচ্ছে)
পীর সাহেব আজ দফায় দফায় ওয়াজ করেছেন। যখন ওয়াজ শেষ করে তিনি বসে পড়েন তখন অনেকক্ষণ ধরে তাঁর বিশাল বপু (শরীর) দ্রুত শ্বাসের তালে তালে ওঠা-নামা করে, আর শুভ্র চওড়া কপালে জমে ওঠা বিন্দু-বিন্দু ঘাম খোলা মাঠের উজ্জ্বল আলোয় চকচক করে। পাখা হাতে দাঁড়িয়ে থাকা লোকটি জোরে হাত চালায়।

এ সময় পীর সাহেবের প্রধান মুরিদ মতলুব মিঞা হুজুরের গুণাগুণ সহজ ভাষায় ব্যাখ্যা করে বলে। এ কথা সর্বজনবিদিত যে, সে বলে, পীর সাহেব সূৰ্যকে ধরে রাখবার ক্ষমতা রাখেন। (অন্ধ বিশ্বাস) উদাহরণ দিয়ে বলে হয়তো তিনি এমন এক জরুরি কাজে আটকে আছেন যে, ওধারে জোহরের নামাজের সময় গড়িয়ে যাচ্ছে। কিন্তু তা হলে কী হবে, তিনি যতক্ষণ পর্যন্ত না হুকুম দেবেন ততক্ষণ পর্যন্ত সূৰ্য এক আঙ্গুলও নড়তে পারে না! শুনে কেউ আহা-আহা বলে, কারো-বা আবার ডুকরে কান্না আসে। কেবল মজিদের চেহারা কঠিন হয়ে ওঠে। (মিথ্যা গালগপ্প শুনে) সজোরে নড়তে থাকা পাখাটার পানে তাকিয়ে সে মূর্তিবৎ (মূর্তির মতো) বসে থাকে।
আধা ঘণ্টা পরে শীতল দ্বিপ্ৰাহরিক আমেজে জনতা ঈষৎ ঝিমিয়ে এসেছে, এমনি সময়ে হঠাৎ জমায়েতের নানাস্থান থেকে রব উঠল। একটা ঘোষণা মুখে মুখে সারা ময়দানে ছড়িয়ে পড়ল।—পীর সাহেব আবার ওয়াজ করবেন।
পীর সাহেবের আর সে-গলা নেই (যৌবনের গলার জোর নেই)। সূক্ষ্ম তারের কম্পনের মতো হাওয়ায় বাজে তাঁর গলা। জমায়েতের কেউ প্ৰতি মুহূর্তে হা-হা করে উঠেছে বলে সে-ক্ষীণ আওয়াজও সব প্ৰান্তে শোনা যায় না। কিন্তু, মজিদ কান খাড়া করে শোনে এবং শোনবার প্রচেষ্টার ফলে চোখ কুঞ্চিত হয়ে ওঠে। (আবেগে প্রভাবিত না হয়ে মজিদ পীরের কথা বুঝার চেষ্টা করে)

পীর সাহেবের গলার কম্পমান সূক্ষ্ম তারের মতো ক্ষীণ আওয়াজই আধা ঘণ্টা ধরে বাজে। তারপর বিচিত্র সুর করে তিনি একটা ফারসি বয়েত (ফার্সি কবিতা) বলে ওয়াজ ক্ষান্ত করেন।
বলেন, সোহবতে সোয়ালে তুরা সোয়ালে কুনাদ (সুসঙ্গ মানুষকে ভালো করে)। শুনে জমায়েতের অর্ধেক লোক কেঁদে ওঠে। তারপর তিনি যখন বাকিটা বলেন–সোহবতে তোয়ালে তুরা তোয়ালে কুনাদ (কুসঙ্গ তেমনি তাকে আবার খারাপ করে।)–তখন গোটা জমায়েতেরই সমস্ত সংযমের বাঁধ ভেঙে যায় (পীরের কথায় আবেগতাড়িত হয়ে), সকলে হাউ-হাউ করে কেঁদে ওঠে।
বসে পড়ে পীর সাহেব পাখাওয়ালার পানে লাল হয়ে ওঠা চোখে তাকিয়ে পাখা-সঞ্চালন দ্রুততর করবার জন্য ইশারা করছেন এমন সময়ে সামনের লোকেরা সব ছুটে গিয়ে পীর সাহেবকে ঘেরাও করে ফেলল। হঠাৎ পাগল হয়ে উঠেছে তারা। যে যা পারল ধরল। কেউ পা, কেউ হাত, কেউ আস্তিনের অংশ।
তারপর এক কাণ্ড ঘটল। মানুষের ভাবমত্ততা দেখে পীর সাহেব অভ্যস্ত। কিন্তু আজকের ক্ৰন্দনরত জমায়েতের নিকটবর্তী লোকগুলোর সহসা এই আক্রমণ তাঁর বোধ হয় সহ্য হলো না। তিনি হঠাৎ নিজেকে ছাড়িয়ে নিয়ে যুবকের সাবলীল সহজ ভঙ্গিতে মাথার ওপরে গাছটার ডালে উঠে গেলেন। দেখে হায় হায় করে উঠল (পীরের পা চুম্বন করতে না পারায়)। পীর সাহেবের সাঙ্গপাঙ্গরা আর তা শুনে জমায়েতও হায় হায় করে উঠল। সাঙ্গপাঙ্গরা তখন সুর করে গীত ধরলে এই মর্মে যে, তাদের পীর সাহেব তো শূন্যে উঠে গেছেন (মানুষের অতি আবেগ থেকে বাঁচতে), এবার কী উপায়?
পীর সাহেব অবশ্য ডালে বসে তখন দিব্যি বাতরস-ভারী পা দোলাচ্ছেন। ফাগুনের আগুনের দ্রুত বিস্তারের মতো পীর সাহেবের শূন্যে ওঠার কথা দেখতে না দেখতে ছড়িয়ে গেলো। যারা তখন ফারসি বয়েতের অর্থ না বুঝে কেবল সুর শুনেই কেঁদে উঠেছিল, এবার তারা মড়া-কান্না জুড়ে বসল। পীর সাহেব কী তাদের ফাঁকি দিয়ে চলে যাচ্ছেন? কিন্তু গেলে, অজ্ঞ মূর্খ তারা পথ দেখবে কী করে?
জোয়ারী ঢেউয়ের মতো সম্মুখে ভেসে এল জনস্রোত। অনেক মড়া-কান্না ও আকুতি-বিকুতির পর পীর সাহেব বৃক্ষডাল হতে অবশেষে অবতরণ করলেন।
বেলা তখন বেশ গড়িয়ে এসেছে আর মাঠের ধারে গাছগুলোর ছায়া দীর্ঘতর হয়ে (জোহরের নামাযের ওয়াক্ত শেষ হওয়া) সে মাঠেরই বুক পর্যন্ত পৌঁছেছে, এমন সময় পীর সাহেবের নির্দেশে একজন হঠাৎ উঠে দাঁড়িয়ে বলল, —ভাই সকল, আপনার সব কাতারে দাঁড়াইয়া যান।
কয়েক মুহূর্তের মধ্যে নামাজ শুরু হয়ে গেলো।
নামাজ কিছুটা অগ্রসর হয়েছে এমন সময় হঠাৎ সারা মাঠটা যেন কেঁপে উঠল। শতশত নামাজরত মানুষের নীরবতার মধ্যে খ্যাপা কুকুরের তীক্ষ্মতায় নিঃসঙ্গ একটা গলা আর্তনাদ করে উঠল।
সে-কণ্ঠ মজিদের।

আওয়ালপুরের পীরকে নিয়ে সংঘর্ষ

—যতসব শয়তানি, বেদাতি কাজকারবার। খোদার সঙ্গে মশকরা! নামাজ ভেঙে কেউ কথা কইতে পারে না। তাই তা শেষ না হওয়া পর্যন্ত সবাই নীরবে মজিদের অশ্রাব্য গালাগালি শুনল।
মোনাজাত হয়ে গেলে সাঙ্গাপাঙ্গদের তিনজন এগিয়ে এল। একজন কঠিন গলায় প্রশ্ন করল, –চেঁচামিচি করত কিছকা ওয়াস্তে? (শোরগোল করছ কেন?
লোকটি আবার পশ্চিমে এলেম শিখে (ভারত থেকে) এসে অবধি বাংলা জবানে কথা কয় না।
মজিদ বললে,–কোন নামাজ হইলো এটা?
—কাহে? জোহরকা নামাজ হুয়া।
উত্তর শুনে আবার চিৎকার করে গালাগাল শুরু করল মজিদ। বললে, এ কেমন বেশরিয়তি কারবার (শরীয়ত বিরোধী কাজ), আছরের সময় জোহরের নামাজ পড়া?
সাঙ্গপাঙ্গরা প্ৰথমে ভালোভাবেই বোঝাতে চেষ্টা করল ব্যাপারটা। তারা বললে যে, মজিদ তো জানেই পীর সাহেবের হুকুম ব্যতীত জোহরের নামাজের সময় যেতে পারে না। পশ্চিম থেকে এলেম শিখে এসেছে, সে বোঝানোর পন্থাটা প্ৰায় বৈজ্ঞানিক করে তোলে (মাসালা দিয়ে বোজানো)। সে বলে যে, যেহেতু ভাদ্রমাস থেকে ছায়া আসলি এক-এক কদম করে বেড়ে যায়, সেহেতু দুকদমের ওপর দুই লাঠি হিসেব করে চমৎকার জোহরের নামাজের সময়ে আছে।
মজিদ বলে, মাপো। পীর সাহেবের সাঙ্গপাঙ্গরা যতদূর সম্ভব দীর্ঘ দীর্ঘ ছয় কদম ফেলে তার সঙ্গে দুই লাঠি যোগ করেও যখন ছায়ার নাগাল পেল না। তখন বললে, তর্ক যখন শুরু হয়েছিল তখন ছায়া ঠিক নাগালের মধ্যেই ছিল। (পীরের প্রতি অন্ধবিশ্বাস)
শুনে মজিদ কুৎসিততমভাবে মুখ বিকৃত করে। সঙ্গে সঙ্গে কয়েকবার মুখ খিস্তি (মুখ বাঁকিয়ে) করে বললে,–কেন, তখন তোগো পীর ধইরা রাখবার পারল না সুরুযটারে? (সর্বসম্মুখে পীরর গোমর ফাঁস)

তারপর সরে গিয়ে সে বজ্ৰকণ্ঠে ডাকলে,–মহব্বতনগর যাইবেন কে কে?
মহব্বতনগর গ্রামের লোকেরা এতক্ষণ বিমূঢ় হয়ে ব্যাপারটা দেখছিল। কারো মনে ভয়ও হয়েছিল।–এই বুঝি পীর সাহেবের সাঙ্গপাঙ্গরা ঠেঙিয়ে দেয় মজিদকে! এবার তার ডাক শুনে একে একে তারা ভিড় থেকে খসে এল।
মতিগঞ্জের সড়কে উঠে ফিরতিমুখো পথ ধরে মজিদ একবার পেছন ফিরে তাকিয়ে থুথু ফেলে, তওবা কেটে, নিঃশ্বাসের নীচে শয়তানকে অশ্রাব্য ভাষায় গালাগাল করল, তারপর দ্রুতপায়ে হাঁটতে লাগল। সঙ্গের লোকেরা কিন্তু কিছু বলল না। তারা যদিও মজিদকে অনুসরণ করে বাড়ি ফিরে চলেছে কিন্তু মন তাদের দোটানার দ্বন্দ্বে দোল (মজিদ বড় নাকি এতদিনের বিশ্বস্ত আওয়ালপুরের পীর) খায়। চোখে তাদের এখনো অশ্রুর শুষ্ক রেখা। (পীরের বয়ানের প্রভাব)
সে-রাত্রে ব্যাপারীকে নিয়ে এক জরুরি বৈঠক বসল। সবাই এসে জমলে, মজিদ সকলের পানে কয়েকবার তাকাল। তার চোখ জ্বলছে একটা জ্বালাময়ী অথচ পবিত্র ক্ৰোধে (গ্রামবাসীকে বিভ্রান্তি থেকে মুক্ত করায়)। শয়তানকে ধ্বংস করে মূর্খ, বিপথচালিত মানুষদের রক্ষা করার কল্যাণকর বাসনায় সমস্ত সত্তা সমুজ্জ্বল হয়ে উঠেছে।

মজিদ গুরুগম্ভীর কণ্ঠে সংক্ষেপে তাঁর বক্তব্য পেশ করল।–ভাই সকলরা, সকলে অবগত আছেন যে, বেদাতি কোনো কিছু খোদাতা’লার অপ্রিয় এবং সেই থেকে সত্যিকার মানুষ যারা তাদেরকে তিনি দূরে থাকতে বলেছেন। এ-কথাও তারা জানে যে, শয়তান মানুষকে প্ৰলুব্ধ করবার জন্যে মনোমুগ্ধকর রূপ ধারণ করে তার সামনে উপস্থিত হয় এবং অত্যন্ত কৌশল সহকারে তাকে বিপথে চালিত করবার প্রয়াস পায়। শয়তানের সে রূপ যতই মনোমুগ্ধকর হোক না কেন, খোদার পথে যারা চলাচল করে তাদের পক্ষে সে মুখোশ চিনে ফেলতে বিন্দুমাত্র দেরি হয় না। তাছাড়া শয়তানের প্রচেষ্টা যতই নিপুণ হোক না কেন, একটি দুর্বলতার জন্যে তার সমস্ত কারসাজি ভণ্ডুল হয়ে যায়। তা হলো বেদাতি কাজকারবারের প্রতি শয়তানের প্রচণ্ড লোভ। এখানে এ কথা স্পষ্টভাবে বুঝতে হবে যে, শয়তান যদি মানুষকে খোদার পথেই নিয়ে গেলো, তাহলে তার শয়তানি রইল কোথায়।
ভনিতার (ভূমিকা) পর মজিদ আসল কথায় আসে। একটু দম নিয়ে সে আবার তার বক্তব্য শুরু করে।—আউয়ালপুরে তথাকথিত যে পীর সাহেবের আগমন ঘটেছে তার কার্যকলাপ মনোযোগ দিয়ে লক্ষ্য করলে উক্ত মন্তব্যের যথার্থতা প্ৰমাণিত হয়। মুখোশ তার ঠিকই আছে— যে মুখোশকে ভুল করে মানুষ তাঁর কবলে গিয়ে পড়বে। কিন্তু তার উদ্দেশ্য মানুষকে বিপথে নেয়া, খোদার পথ থেকে সরিয়ে জাহান্নামের দিকে চালিত করা। সেই উদ্দেশ্যই তথাকথিত পীরটি কৌশলে চরিতার্থ করবার চেষ্টায় আছেন। পাঁচ ওয়াক্ত নামাজের জন্য খোদা সময় নির্দিষ্ট করে দিয়েছেন। কিন্তু একটা ভুয়া কথা বলে তিনি এতগুলো ভালো মানুষের নামাজ প্ৰতিদিন মকরূহ করে দিচ্ছেন। তাঁর চক্রান্তে পড়ে কত মুসল্লি ইমানদার মানুষ–যাঁরা জীবনে একটিবার নামাজ কাজা করেননি তাঁরা খোদার কাছে গুনাহ্‌ করছেন।

এই পর্যন্ত বলে বিস্ময়াহত স্তব্ধ লোকগুলোর পানে মজিদ। কতক্ষণ চেয়ে থাকে। তারপর আরো কয়েক মুহূর্ত নীরবে দাড়িতে হাত বুলায়।
গলা কেশে এবার খালেক ব্যাপারী বৈঠকের পানে তাকিয়ে বাজখাঁই গলায় প্রশ্ন করে, হুনলেন তো ভাই সকল?
সাব্যস্ত হলো, অন্তত এ-গ্রামের কোনো মানুষ পীর সাহেবের ত্রিসীমানায় ঘেঁষবে না।
এরপর মহব্বতনগরের লোক আওয়ালপুরে একেবারে গেলো যে না, তা নয়। কিন্তু গেলো অন্য মতলবে (সংঘর্ষ করতে)। পরদিন দুপুরেই একদল যুবক মজিদকে না জানিয়ে একটা জেহাদি জোশে বলীয়ান হয়ে পীর সাহেবের সভায় গিয়ে উপস্থিত হলো (ধর্মীয় কারণে গ্রামবাসীর মধ্যে বিভেদ)। এবং পরে তারা বড় সড়কটার উত্তর দিকে না গিয়ে গেলো দক্ষিণ দিকে করিমগঞ্জে (আক্রমণ করতে গিয়ে নিজেরাই পর্যদুস্ত হয়েছে)। করিমগঞ্জে একটি হাসপাতাল আছে।
অপরাহ্ণে সংবাদ পেয়ে মজিদ ক্যানভাসের জুতো পরে (নরম জুতো) ছাতা বগলে করিমগঞ্জ গেলো। হাসপাতালে আহত ব্যক্তিদের পাশে বসে অনেকক্ষণ ধরে শয়তান ও খোদার কাজের তারতম্য আরো বিষদভাবে বুঝিয়ে বলল, বেহেস্ত ও দোজখের জলজ্যান্ত বৰ্ণনাও করল (আক্রমণকারীদের মধ্যে অনুপ্রেরণা জাগাতে) কতক্ষণ।
কালু মিঞা গোঙায়। চোখে তার বেদনার পানি। সে বলে শয়তানের চেলারা তার মাথাটা ফাটিয়ে দুফাঁক করে দিয়েছে। মজিদ তাকিয়ে দেখে, মস্ত ব্যান্ডেজ তার মাথায়। দেখে সে মাথা নাড়ে, দাড়িতে হাত বুলায়, তারপর দুনিয়া যে মস্ত বড় পরীক্ষা-ক্ষেত্র তা মধুর সুললিত কণ্ঠে বুঝিয়ে বলে। কালু মিঞা শোনে কি-না কে জানে, একঘেয়ে সুরে গোঙাতে থাকে। (যন্ত্রণায়)
রাতে এশার নামাজ পড়ে বিদায় নিতে মজিদ হঠাৎ অন্তরে কেমন বিস্ময়কর ভাব বোধ করে। কম্পাউন্ডারকে ডাক্তার মনে করে বলে,—পোলাগুলিরে একটু দেখবেন। ওরা বড় ছোয়াবের কাম করছে! ওদের যত্ন নিলে আপনারও ছোয়াব হইবো।
ভাঙ-গাঁজা খাওয়া রসকষশূন্য হাড়গিলে চেহারা কম্পাউন্ডারের। প্ৰথমে দুটো পয়সার লোভে তার চোখ চকচক করে উঠেছিল (রোগীদের থেকে অত্যধিক টাকা নেওয়া), কিন্তু ছোয়াবের কথা শুনে একবার আপাদমস্তক মজিদকে দেখে নেয়। তারপর নিরুত্তরে হাতের শিশিটা ঝাঁকাতে ঝাঁকাতে অন্যত্র চলে যায়।

গ্রামে ফিরে মজিদ কালু মিঞার বাপের সঙ্গে দুচারটি কথা কয়। বুড়ো এক ছিলিম তামাক এনে দেয়। মজিদ নিজে গিয়ে ছেলেকে দেখে এসেছে বলে কৃতজ্ঞতায় তার চোখ ছলছল করে। হুকা তুলে নেবার আগে মজিদ বলে,–কোনো চিন্তা করবা না মিঞা, খোদা ভরসা। তারপর বলে যে, হাসপাতালের বড় ডাক্তারকে সে নিজেই বলে এসেছে, ওদের যেন আদর যত্ন হয়। ডাক্তারকে অবশ্য কথাটা বলার কোনো প্ৰয়োজন ছিল না, কারণ, গিয়ে দেখে এমনিতেই শাহী কাণ্ডকারখানা। ওষুধপত্র বা সেবা শুশ্ৰূষার শেষ নেই। (কালুর বাপকে মিথ্যা বলে আশ্বস্ত করে)
খুব জোরে দম কষে একগাল ধোঁয়া ছেড়ে আরো শোনায় যে, তবু তার কথা শুনে ডাক্তার বললেন, তিনি দেখবেন ওদের যেন অযত্ন বা তকলিফ না হয়। তারপর আরেকটা কথার লেজুড় লাগায়। কথাটা অবশ্য মিথ্যে এবং সজ্ঞানে সুস্থ দেহে মিথ্যে কথা কয় বলে মনে মনে তাওবা কাটে। কিন্তু কী করা যায়; দুনিয়াটা বড় বিচিত্র জায়গা। সময়-অসময়ে মিথ্যে কথা না বললে নয়। (মিথ্যা না বললে লোকদের নিকট মর্যাদা থাকে না) বলে, ডাক্তার সাহেব তার মুরিদ কি-না তাই সেখানে মজিদের বড় খাতির।
বাইরে নিরুদ্বিগ্ন ও স্বচ্ছন্দ থাকলেও ভেতরে ভেতরে মজিদের মন ক-দিন ধরে চিন্তায় ঘুরপাক খায়। আওয়ালপুরে যে পীর সাহেব আস্তানা গেড়েছে তিনি সোজা লোক নন (নতুন আগমন নয়)। বহু পুরুষ আগে দীর্ঘ পথশ্ৰম স্বীকার করে আবক্ষ দাড়ি নিয়ে শানদার জোব্ববাজুব্বা পরে যে লোকটি এদেশে আসেন, তাঁর রক্ত ভাটির দেশের মেঘ পানিতেও একেবারে আনোনা হয়ে যায়নি। পানসা হয়ে গিয়ে থাকলেও পীর সাহেবের শরীরে সে-ভাগ্যান্বেষী দুঃসাহসী ব্যক্তিরই রক্ত। কাজেই একটা পাল্টা জবাবের অস্বস্তিকর প্ৰত্যাশায় থাকে মজিদ (প্রতি আক্রমণ)। মহব্বতনগরের লোকেরা আর ওদিকে যায় না (আক্রমণের ভয়ে)। কাজেই, আক্রমণ যদি একান্ত আসেই, আগেভাগে তার হদিস পাবার জো নেই। সেজন্যে মজিদের মনে অস্বস্তিটা রাতদিন আরো খচখচ করে।
মজিদ ও তরফ থেকে কিছু একটা আশা করলে কী হবে, তিনগ্রাম ডিঙিয়ে মহব্বতনগরে এসে হামলা করার কোনো খেয়াল পীর সাহেবের মনে ছিল না। তার প্রধান কারণ তাঁর জয়িফ অবস্থা (দুর্বল ও বয়স্ক শরীর)। এ বয়সে দাঙ্গাবাজি হৈ হাঙ্গামা আর ভালো লাগে না। শাগরেদদের মধ্যে কেউ কেউ, বিশেষ করে প্রধান মুরিদ মতলুব খাঁ একটা জঙ্গী ভাব দেখালেও হুজুরের নিস্পৃহতা দেখে শেষ পর্যন্ত তারা ঠান্ডা হয়ে যায়। পীর সাহেব অপরিসীম উদারতা দেখিয়ে বলেন, কুত্তা তোমাকে কামড়ালে তুমিও কী উলটে তাকে কামড়ে দেবে? যুক্তি উপলব্ধি করে শাকরেদর নিরস্ত হয়। তবু স্থির করে যে, মজিদ কিংবা তার চেলারা যদি কেউ এধারে আসে তবে একহাত দেখে নেওয়া যাবে। সে দিন কালুদের কল্লা যে ধড় থেকে আলাদা করতে পারেনি, সে-জন্যে মনে প্ৰবল আফসোস হয়।

আওয়ালপুরের পীরের প্রতি মজিদের ক্ষোভ

গ্রামের একটি প্রাণি কিন্তু ব্যাপারটা ঠিক পছন্দ করে না। সে অন্দরের লোক, আর তার তাগিদটা প্ৰায় বাঁচা-মরার মতো জোরালো (মাতৃত্বের স্বাদ নিতে)। পীর সাহেবের সাহায্যের তার একান্ত প্রয়োজন। না হলে জীবন শেষ পৰ্যন্ত বিফলে যায়।
সে হলো খালেক ব্যাপারীর প্রথম বিবি আমেনা। নিঃসন্তান মানুষ। তেরো বছর বয়সে বিয়ে করেছিল, আজ তিরিশ পেরিয়ে গেছে। শূন্য কোল নিয়ে হা-হুতাশের সঙ্গে বুক বেঁধে তবু থাকা (সন্তান না হওয়ার কষ্ট মেনে নেওয়া) যেত, কিন্তু চোখের সামনে সতীন তনু বিবিকে ফি-বৎসর আস্ত আস্ত সন্তানের জন্ম দিতে দেখে বড় বিবির আর সহ্য হয় না। দেখা সওয়ার একটা সীমা আছে, যা পেরিয়ে গেলে তার একটা বিহিত করা একান্ত প্রয়োজনীয় হয়ে পড়ে। আওয়ালপুরে পীর সাহেবের আগমন সংবাদ পাওয়া অবধি আমেনা বিবি মনে একটা আশা পোষণ করছিল যে, এবার হয়তো বা একটা বিহিত করা যাবে। আগামী বছর তানু বিবির কোলে যখন নতুন এক আগন্তুক ট্যা-ট্যা করে উঠবে তখন সেও কণ্ঠ কাতর করে বলতে পারবে, তার গাটা কেমন-কেমন করছে (সন্তান সম্ভাবনা), বুক ঠেলে কেবল যেন বমি আসতে চায়। তখন নানিবুড়ির ডাক (ধাত্রী) পড়বে। শেষে নানিবুড়ি মাথা নেড়ে হেসে রসিকতা করে বলবে, ওস্তাদের মাইর শেষ কাটালে। কারণ যৌবনের দিক থেকে সে তানু বিবির মতো জোয়ার-লাগা ভরাগাঙ না হলেও (অতি সুন্দরী না হলেও) একেবারে টসকোনো নয়, বোঁচা-চ্যাবকা কালো মানুষও নয়। রঙে ছাতা পড়বার উপক্রম করলেও (বয়সের ভার পড়লেও) এখনো সে-রঙ ধবধব করে, নাকে সতীনের মতো জ্বলজ্বলে নাকছবি না থাকলেও তা খাড়া, টিকালে। তার সন্তান আকাশের চাঁদের মতো সুন্দর হবেই।
কিন্তু মুশকিল হলো কথাটা পাড়া (গ্রামবাসী আওয়ালপুরের পীরের বিরোধী) নিয়ে। প্রথমত, ব্যাপারীকে নিরালা (একাকী) পাওয়া দুষ্কর। দ্বিতীয়ত, চোখের পলকের জন্যে পেলেও তখন আবার জিহবা নড়ে না (বলতে ভয় পায়)। ফিকির ফন্দি করতে করতে এ দিকে মজিদ কাণ্ডটা করে বসল। কিন্তু আমেনা বিবি মরিয়া হয়ে উঠেছে। সুযোগটা ছাড়া যায় না (সন্তানের জন্য পানি পড়া)। সারা জীবন যে মেয়েলোকের সন্তান হয়নি, পীর সাহেবের পানিপড়া খেয়ে সেও কোলে ছেলে পেয়েছে।
একদিন লাজ-শরমের বালাই ছেড়ে আমেনা বিবি বলেই বসে, পীর সাবের থিকা একটু পানিপড়া আইনা দেন না।
শুনে অবাক হয় ব্যাপারী। নিটোল (সুন্দর) স্বাস্থ্য বিবির, কোনোদিন জ্বরজারি, পেট-কামড়ানি পর্যন্ত হয় না।
—পানিপড়া ক্যান? আমেনা বিবি লজ্জা পেয়ে আলগোছে ঘোমটা টেনে সেটি আরো দীর্ঘতর করে, আর তার মনের কথা ব্যাপারী যেন বিনা উত্তরেই বোঝে।— তাই দোয়া করে মনে মনে (সন্তানের জন্য)।
উত্তর পায় না বলেই ব্যাপারী বোঝে। তারপর বলে,-আইচ্ছা। কিন্তু পরক্ষণেই মনে পড়ে যে, পীর সাহেবের ত্ৰিসীমায় আর তো ঘেঁষা যায় না, অবশ্য পীর সাহেবকে মজিদ খোদ ইবলিশ শয়তান বলে ঘোষণা করলেও তবু বউয়ের খাতিরে পানিপড়ার জন্যে তাঁর কাছে যেতে বাধত না, কারণ পীর নামের এমন মাহাত্ম্য যে, শয়তান ডেকেও সে নামকে অন্তরে অন্তরে লেবাস-মুক্ত করা যায় না (বিশ্বাস দূরীভূত হয় না)। গাভুর-চাষী-মাঠাইলারা পারলেও অন্তত বিস্তর জমিজমার মালিক খালেক ব্যাপারী তা পারে না (একজন শয়তান বলে পরে তাকে সম্মান করা)। কিন্তু সাধারণ লোকে যেটা স্বচ্ছন্দে করতে পারে সেটা আবার তার দ্বারা সম্ভব নয়। তা হলো শয়তানকে শয়তান ডেকে সমাজের সামনে ভরদুপুরে তাকে আবার পীর ডাকা। সমাজের মূল হলো একটি লোক–যার আঙুলের ইশারায় গ্রাম ওঠে বসে, সাদাকে কালো বলে, আসমানকে জমিন বলে। সে হলো মজিদ। জীবনস্রোতে মজিদ আর খালেক ব্যাপারী কী করে এমন খাপে খাপে মিলে গেছে যে, অজান্তে অনিচ্ছায়ও দুজনের পক্ষে উলটো পথে যাওয়া সম্ভব নয়। একজনের আছে মাজার, আরেক জনের জমি-জোতের প্রতিপত্তি। (ধর্মের ও অর্থের জোর) সজ্ঞানে না জানলেও তারা একাট্টা, পথ তাদের এক।
সে জন্যে সে ভাবিত হয়, দু’দিন আমেনা বিবির কান্নাসজল কণ্ঠের আকুতি মিনতি উপেক্ষা করে। অবশেষে বিবির কাতর দৃষ্টি সহ্য করতে না পেরেই হয়তো একটা উপায় ঠাহর করে ব্যাপারী।
ঘরে দ্বিতীয় পক্ষের স্ত্রীর এক ভাই থাকে। নাম ধলামিঞা। বোকা কিছিমের মানুষ, পরের বাড়িতে নির্বিবাদে খায়-দায় ঘুমায় আর বোন জামাইয়ের ভাত এতই মিঠা লাগে যে, নড়ার নাম করে না বছরান্তেও (পরগাছা মুরুব্বি)। আড়ালে আড়ালে থাকে। ক্বচিৎ কখনো দেখা হয়ে গেলে দুটি কথা হয় কি হয় না, কোনোদিন মেজাজ ভালো থাকলে ব্যাপারী হয়তো-বা শালার সঙ্গে খানিক মস্করাও করে।
তাকে ডেকে ব্যাপারী বললে : একটা কাম করেন। ধলামিঞা?
ব্যাপারীর সামনে বসে কথা কইতে হলে চরম অস্বস্তি বোধ করে সে। কেমন একটা পালাই-পালাই ভাব তাকে অস্থির করে রাখে। কোনোমতে বলে, –কী কন দুলামিঞা?
কী তার কাজ ব্যাপারী। আগাগোড়া বুঝিয়ে বলে। আগে প্রথম বিবির দিলের খায়েশের কথা দীর্ঘ ভনিতাসহকারে বর্ণনা করে। তারপর বলে, ব্যাপারটা অত্যন্ত গোপনীয় এবং আওয়ালপুর তাকে রওয়ানা হতে হবে শেষরাতের অন্ধকারে, যাতে কাকপক্ষীও খবর না পায়। আর সেখানে গিয়ে তাকে প্রচুর সাবধানতা অবলম্বন করতে হবে। এ গ্রাম থেকে গেছে- এ-কথা ঘূণাক্ষরেও বলতে পারবে না। বলবে যে, করিমগঞ্জের ওপারে তার বাড়ি। বড় বিপদে পড়ে এসেছে পীর সাহেবের দোয়াপানির জন্যে। তার এক নিকটতম নিঃসন্তান আত্মীয়ার একটা ছেলের জন্যে বড় সখ হয়েছে। সখের চেয়েও যেটা বড় কথা, সেটা হলো এই যে, শেষ পর্যন্ত কোনো ছেলেপুলে যদি না-ই হয় তবে বংশে বাতি জ্বালাবার আর কেউ থাকবে না। মোট কথা, ব্যাপারটা এমন করুণভাবে তাকে বুঝিয়ে বলতে হবে যে, শুনে পীর সাহেবের মন গলে যেন পানি হয়ে যায়।
বিবির বড় ভাই, কাজেই রেস্তায় মুরুবিবা (সম্পর্কে মুরুব্বি)। তবু ধমকে ধামকে কথা বলে ব্যাপারী। পরগাছা মুরুবিকে আবার সম্মান, তার সঙ্গে আবার কেতাদুরস্ত কথা (মান বুঝে কথা)।
—কি গো ধলামিঞা, বুঝলান নি। আমার কথাডা?
–জি, বুঝছি। কাঁধ পর্যন্ত ঘাড় কাৎ করে ধলামিঞা জবাব দেয়। প্ৰস্তাব শুনে মনে মনে কিন্তু ভাবিত হয়। ভাবনার মধ্যে এই যে, আওয়ালপুর ও মহব্বতনগরের মাঝপথে একটা মস্ত তেঁতুল গাছ পড়ে এবং সবাই জানে যে, সেটা সাধারণ গাছ নয়, দস্তুরমতে দেবংশি (অশরীরী বা ভূতের ভয়)।
কাকপক্ষী যখন ঘুমিয়ে থাকে তখন অনেক রাত। অত রাতে কী একাকী ঐ তেঁতুল গাছের সন্নিকটে ঘেঁষা যায়? ভাবনার মধ্যে এও ছিল যে, যে সব দাঙ্গা-হাঙ্গামার কথা শুনেছে, তারপর কোন সাহসে পা দেয় মতলুব খাঁর গ্রামে। তেঁতুল গাছের ফাঁড়িটা কাটলেও (ভূতের ভয় কাটলেও গ্রামবাসীরর মাইরের ভয় রয়ে যায়) ঐখানে গিয়ে পীর সাহেবের দজ্জাল সাঙ্গপাঙ্গদের হাত থেকে রেহাই পাওয়া নেহাত সহজ হবে না। নিজের পরিচয় নিশ্চয়ই সে লুকোবার চেষ্টা করবে, কিন্তু ধরা পড়ে যাবে না, কী বিশ্বাস! কে কখন চিনে ফেলে কিছু ঠিক নেই। যে ঢেঙা লম্বা, ধলামিঞা।
–ভাবেন কী? হুমকি দিয়ে ব্যাপারী প্রশ্ন করে।
–জি, কিছু না! তবু কয়েক মুহূর্ত তার পানে চেয়ে থেকে ব্যাপারী বলে,–আরেক কথা। কথাডা যানি আপনার বইনে না হুনে (আমেনা বিবি যেন না জানে)। আপনারে আমি বিশ্বাস করলাম।
–তা করবার পারেন।
সারাদিন ধলামিঞা ভাবে, ভাবে। ভাবতে ভাবতে ধলামিঞার কালামিঞা বনে যাবার যোগাড়। বিকেলের দিকে কিন্তু একটা বুদ্ধি গজায়। ব্যাপারীর অনুপস্থিতির সুযোগে বাইরের ঘরে বসে। নলের হুঁকায় টান দিচ্ছিল, হঠাৎ সেটা নামিয়ে রেখে সে সরাসরি বাইরে চলে যায়। তারপর দীর্ঘ দীর্ঘ পা ফেলে। হাঁটিতে থাকে মোদাচ্ছের পীরের মাজারের দিকে। হাঁটার ঢঙ দেখে পথে দু-চারজন লোক থ হয়ে দাঁড়িয়ে যায়।—তারা ভ্ৰক্ষেপ নেই। (দ্রুত গতিত হাঁটা)
বাইরেই দেখা হয় মজিদের সঙ্গে। গাছতলায় দাঁড়িয়ে কার সঙ্গে কথা কইছে। কাছে গিয়ে গলা নিচু করে (গোপনে) সে বললে,–আপনার লগে একটু কথা আছিল।
গলাটা বিনয়ে নম্র হলেও উত্তেজনায় কাঁপছে। (সংবেদনশীল তথ্য ফাঁসের উত্তেজনায়)
খালেক ব্যাপারী তখন যে দীর্ঘ ভনিতা সহকারে আমেনা বিবির মনের ইচ্ছার কথা প্ৰকাশ করেছিল, তারই ওপর রঙ ফেনিয়ে, এখানে-সেখানে দরদের ফোঁটা ছিটিয়ে এবং ফেনিয়ে-ফুলিয়ে দীর্ঘতর করে ধলামিঞা কথা পাড়ে। বলে, মেয়েমানুষের মন, বড় অবুঝ। নইলে সাক্ষাৎ ইবলিশ শয়তান জেনেও তারই পানিপড়া খাবার সাধ জাগবে কেন আমেনা বিবির?
কিন্তু মেয়েমানুষ যখন পুরুষের গলা জড়িয়ে ধরে তখন আর নিস্তার থাকে না (নারীর আবদারের নিকট পুরুষ অসহায়)। খালেক ব্যাপারী আর কী করে। ধলামিঞাকে ডেকে বলে দিলো, আওয়ালপুরে গিয়ে পীর সাহেবটির কাছ থেকে সে যেন পানিপড়া নিয়ে আসে।
মজিদ নীরবে শোনে। হঠাৎ তার মুখে ছায়া পড়ে। কিন্তু ক্ষণকালের জন্যে। তারপর সহজ গলায় প্রশ্ন করে,—তা কখন যাইবেন আওয়ালপুর?
ধলামিঞা হঠাৎ ফিচকি দিয়ে হাসে।
–আওয়ালপুর গেলে কি আর আপনার কাছে আহি? কী কেলা পানি-পড়াডা দিব হে লোকটা? বেচারির মনে মনে যখন একটা ইচ্ছা ধরছে তখন ফাঁকির কাম কি ঠিক হইব?–আমি কই, আপনেই দেন পানিপড়াডা আর কথাডা একদিন চাইপা যান। (অনৈতিক কাজের প্রস্তাব)
অনেকক্ষণ মজিদ চুপ হয়ে থাকে। এর মধ্যে মুখে ছায়া আসে, যায়। তার পানে চেয়ে আর তার দীর্ঘ নীরবতা দেখে ধলামিঞার সব উত্তেজনা শীতল (প্রস্তাবে রাজি না হওয়ায়) হয়ে আসে। অবশেষে সন্দিগ্ধ কণ্ঠে সে প্ৰশ্ন করে,–কী কন?
–কী আর কমু। এই সব কাম কী চাপাচাপি দিয়া হয়। এ কী আইন-আদালত না মামলা-মকদ্দমা? দলিল দস্তাবেজ জাল হয়, কিন্তু খোদাতালার কালাম জাল হয় না। আপনে আওয়ালপুরেই যান।
মুহূর্তে ধলামিঞার মুখ ফ্যাকাশে হয়ে ওঠে ভয়ে (মজিদ রাজি না হওয়ায়)। রাতের অন্ধকারে দেবংশি তেঁতুল গাছটা কী যে ভয়াবহ রূপ ধারণ করে, ভাবতেই বুকের রক্ত শীতল হয়ে আসে। তাছাড়া পীর সাহেবের ডাণ্ডাবাজ চেলাদের কথা ভাবলেও গলা শুকিয়ে আসে। অনেকক্ষণ চুপ করে থেকে হয়তো ভয়টাকে হজম করে নিয়ে ভগ্নগলায় ধলামিঞা বলে,–আপনে না দিলে না দিলেন। কিন্তু হেই পীরের কাছে আমি যামু না।
—যাইবেন না। ক্যান? এবার একটু রুষ্ট স্বরে মজিদ বলে, ব্যাপারী মিঞা যখন পাঠাইতেছেন তখন যাইবেন না ক্যান? (প্রতিশ্রুত কাজ পালনে তাগিদ)
উক্তিটা দুইদিকে কাটে (উভয় সংকটে পড়া)। কোনটা নিয়ে কোনটা ফেলে ঠিক করতে না পেরে ধলামিঞা বিভ্রান্ত হয়ে যায়। অবশেষে কথাটার সঠিক মৰ্মাৰ্থ উপলব্ধি করার চেষ্টা ছেড়ে সরাসরি বলে,–হেই কথা আমি বুঝি না। কাইল সকালে এক বোতল পানি দিয়া যামুনে, আপনি পইড়া দিবেন।
ধলামিঞার মতলব, শেষরাতে উঠে গ্রামের বাইরে কোথাও গা-ঢাকা দিয়ে থাকবে, দুপুরের দিকে ফিরে এসে মজিদের কাছ থেকে বোতলটা নিয়ে যাবে। আর পীর সাহেবের খেদমতে পৌঁছে দেবার জন্যে ব্যাপারী যে টাকা দেবে তার অর্ধেক বেমালুম পকেটস্থ করে বাকিটা মজিদকে দেবে। মজিদ প্ৰায় ঘরের লোক। ব্যাপারীর কাছে তার দাবি-দাওয়া নেই। দিলেও চলে, না দিলেও চলে। তবু কথাটা ধামাচাপা দিয়ে রাখতে হলে মজিদের মুখকেও চাপা দিতে হয় (মজিদকে ঘুসের প্রস্তাব)।
–তাইলে পাকাপাকি কথা হইল। ভরদুপুরে আমি আসুম নে পানিপড়া নিবার জন্য।
তারপর তাড়াতাড়ি বলে, ঠগের পিছনে (আওয়ালপুরের পীর) বেহুদা টাকা ঢালন কী বিবেক-বিবেচনার কাম? টাকার ইঙ্গিতটা স্পষ্ট এবং লোভনীয় বটে। কিন্তু তবুও মজিদ তার কথায় অটল থাকে। নিমরাজিও হয় না। কঠিন গলায় বলে,—না, আপনে আওয়ালপুরেই যান।
এতক্ষণ পর ধলামিঞা বোঝে যে, মজিদের কথাটা রাগের। বিবির খাতিরে ব্যাপারী মজিদের নির্দেশের বরখেলাফ কোরে সেই ঠগ-পীরের কাছেই লোক পাঠাবে পড়াপানি আনবার জন্যে।—সেটা তার পছন্দসই নয়। না হবারই কথা। ব্যাপারটা ঘোড়া ডিঙিয়ে ঘাস খাবার মতো। ধলামিঞা ভারী মুখ নিয়ে প্ৰস্থান করে। ঘরে ফিরে আবার ভাবতে শুরু করে। কিন্তু কোনো বুদ্ধি ঠাহর করবার আগেই মজিদ এসে উপস্থিত হয় ব্যাপারীর বৈঠকখানায়।
যতক্ষণ নতুন এক ছিলিম তামাক সাজানো হয় কল্কিতে, ততক্ষণ দুজনে গরু ছাগলের কথা কয়। দু’এক বাড়িতে গরুর ব্যারামের কথা শোনা যাচ্ছে! মজিদের ধামড়া গাইটা পেট ফুলে ঢোল হয়ে আছে। রহিমা কত চেষ্টা করছে কিন্তু গাইটা দানা-পানি নিচ্ছে না মুখে। খাচ্ছেও না কিছু, দুধও দিচ্ছে না এক ফোঁটা।
তামাক এলে কতক্ষণ নীরবে ধূমপান করে মজিদ। তারপর এক সময় মুখ তুলে প্রশ্ন করে,—হেই পীরের বাচ্চা পীর শয়তানের খবর কী? এহনো ঈমানদার মানুষের সর্বনাশ করতাছে না সট্‌কাইছে?
প্রশ্ন শুনে খালেক ব্যাপারী ঈষৎ চমকে ওঠে, তারপর তার চোখের পাতায় নাচুনি ধরে (চোখে অন্ধকার দেখা)। চোখ অনেক কারণেই নাচে। তাই শুধু নাচলেই ঘাবড়াবার কোনো কারণ নেই। কিন্তু ব্যাপারীর মনে হয়, তামাকের ধোয়ার পশ্চাতে মজিদের চোখ হঠাৎ অস্বাভাবিকভাবে তীক্ষ্ণ হয়ে উঠেছে এবং সে চোখ দিয়ে সে তার মনের কথা কেতাবের অক্ষরগুলোর মতো আগাগোড়া অনায়াসে পড়ে ফেলছে।
-কী জানি, কাইবার পারি না। অবশেষে ব্যাপারী উত্তর দেয়। কিন্তু আওয়াজ শুনে মনে হয় গলাটা যেন ধ্বসে গেছে হঠাৎ। সজোরে একবার কেশে নিয়ে বলে, হয়তো গেছে গিয়া।
মজিদ আস্তে বলে,—তাইলে আর তানার কাছে লোক পাঠাইয়া কী করবেন? (পানিপড়া আনা)
–লোক পাঠামু তানার কাছে! বিস্ময়ে ব্যাপারী ফেটে পড়ে। কিন্তু মজিদের শীতল চোখ দুটোর পানে তাকিয়ে হঠাৎ সে বোঝে যে, মিথ্যা কথা বলা বৃথা। শুধু বৃথা নয়, চেষ্টা করলে ব্যাপারটা বড় বিসদৃশও দেখাবে। যে করেই হোক, মজিদ খবরটা জেনেছে।
একবার সজোরে কেশে বসে যাওয়া গলাকে অপেক্ষাকৃত চাঙ্গা করে তুলে ব্যাপারী বলে,–হেই কথা আমিও ভাবতাছি। আছে কী না আছে–হুদাহুদি পাঠান। তবু মেয়েমানুষের মন। সতীন আছে ঘরে। ক্যামনে কখন দিলে চোট পায় ডর লাগে। তা যাক। পাইলে পাইল, না পাইলে নাই। আসলে মন বোঝান আর কী। ঠগ পীরের পানিপড়ায় কী কোনো কাম হয়?
ধাক্কাটা সামলে (পীর নিয়ে মজিদের আকস্মিক প্রশ্ন) নিয়ে ব্যাপারী ধীরে ধীরে সব বুঝিয়ে বলবার চেষ্টা করে। বলে, মজিদকে সে বলে বলে করেও বলতে পারেনি। আসল কথা তার সাহস হয়নি, পাছে মজিদ মনে ধরে কিছু।
কথাটা মজিদের যে পছন্দ হয় তা স্পষ্ট বোঝা যায় (ক্ষমতাবান লোক তাকে সমীহ করে)। সে হুঁকায় জোর টান দিয়ে একগাল ধোয়া ছেড়ে চোখ গম্ভীর করে তোলে।
ব্যাপারীর মতো বিস্তর জমিজমার মালিক ও প্ৰতিপত্তিশালী লোক তাকে ভয় পায়–শুনে পুলকিত হবারই কথা। ব্যাপারী আরো বলে যে, ধলামিঞাকে বিস্তারিত নির্দেশ দিয়েছে–ঘূণাক্ষরেও কেউ যেন বুঝতে না পারে সে মহব্বতনগরের লোক। তাছাড়া, এ গ্রামে কেউ যেন তাকে আওয়ালপুর যেতে না দেখে। কারণ, তাহলে মজিদের নির্দেশের বরখেলাপ করা হয় খোলাখুলিভাবে
ধলামিঞাকে যতটা বেকুফ ভাবছিলাম, ব্যাপারী বলে, ততটা বেকুফ হে না। হে ভাবছে ভুয়া পানি আইনা ফায়দা কী। তানার যখন একটা ছেলের সখ হইছেই…
মজিদ বাধা দেয়। ধলামিঞার গুণচর্চায় তার আকর্ষণ নেই। হঠাৎ মধুর হাসি হেসে বলে,–খালি আমার দুঃখডা এই যে, আপনার বিবি আমারে একবার কইয়াও দেখলেন না। আমার থিকা ঠগ-পীর বেশি হইল? আমার মুখে কী জোর নাই?
—আহা-হা, মনে নিবেন না কিছু। মেয়েমানুষের মন। দূৱ থিকা যা হোনে তাতেই ঢলে।
–কথাডা ঠিক কইছেন। মজিদ মাথা নেড়ে স্বীকার করে। তারপর বলে, তয় কথা কি, তাগো কথা হুনলে পুরুষমানুষ আর পুরুষ থাকে না (ব্যাপারীর ব্যক্তিত্ববোধে আঘাত), মেয়েমানুষেরও অধম হয়। তাগো কথা হুনলে কি দুনিয়া চলে?
ব্যাপারীর মস্ত গোঁফে আর ঘন দাড়িতে পাক ধরেছে। মজিদের কথায় সে গভীরভাবে লজ্জা পায়। তখনকার মতো মজিদের ভঙ্গিতেই বলে,—ঠিকই কইছেন কথাডা। কিন্তু কি করি এহন। কাইন্দা কাইটা ধরছে বিবি।
–তানারে কন, পেটে যে বেড়ি পড়ছে হে বেড়ি না খোলন পর্যন্ত পোলাপাইনের আশা নাই। শয়তানের পানিপড়া খাইয়া কি হে বেড়ি খুলবো? (ব্যক্তিস্বার্থে মজিদের নতুন প্রতারণা)
পেটে বেড়ি পড়ার কথা সম্পূর্ণ নতুন শোনায়। শুনে ব্যাপারীর চোখ হঠাৎ কৌতূহলে ভরে ওঠে (সম্ভাবনার ইঙ্গিত)। সে ভাবে, বেড়ি, কিসের বেড়ি?
মজিদ হাসে। ব্যাপারীর অজ্ঞতা দেখেই তার হাসি পায়। তারপর বলে,–পেটে বেড়ি পড়ে বইলাই তো স্ত্রীলোকের সন্তানাদি হয় না। কারো পড়ে সাত প্যাঁচ, কারো চোদ্দ। একুশ বেড়িও দেখেছি একটা। তয় সাতের উপরে হইলে ছাড়ান যায় না। আমার তো চোদ্দ প্যাঁচ।
ব্যাপারী উৎকষ্ঠিত কণ্ঠে প্রশ্ন করে,–আমার বিবিরডা ছাড়ান যায় না?
–ক্যান ছাড়ান যায় না। তয় কথা হইতেছে, আগে দেখন লাগবে কয় প্যাঁচ তানার। কথাটা শুনে ব্যাপারী আবার না ভাবে যে, মজিদ তার স্ত্রীর উদরাঞ্চল নগ্নদৃষ্টি (নগ্ন পেট দেখবে) দিয়ে তাকিয়ে দেখবে–তাই তাড়াতাড়ি বলে, এর একটা উপায় আছে।
উপায়টা কী, বলে মজিদ। একদিন সেহরি না খেয়ে আমেনা বিবিকে রোজা রাখতে হবে। সেদিন কারে সঙ্গে কথা কইতে পারবে না এবং শুদ্ধচিত্তে সারাদিন কোরান শরীফ পড়তে হবে। সন্ধ্যার দিকে এফতার না করে মাজার শরীফে আসতে হবে। সেখানে মজিদ বিশেষ ধরনের দোয়া-দরূদ পড়ে একটা পড়াপানি তৈরি করে তাকে পান করতে দেবে। তারপর আমেনা বিবিকে মাজারের চারপাশে সাতবার ঘুরতে হবে।
যদি সাত প্যাঁচ হয় তবে সাত পাঁক দেবার পরই হঠাৎ তার পেট ব্যথায় টনটন করে উঠবে। ব্যথাটা এমন হবে যে, মনে হবে প্রসববেদনা উপস্থিত হয়েছে।
ব্যাপারী উদ্বিগ্ন কণ্ঠে প্রশ্ন করে,—আর সাত পাকে যদি ব্যথা না ওঠে?
–তয় বুঝতে হইব যে, তানার চোদ্দ প্যাঁচ কি আরো বেশি। সাত প্যাঁচ হইলে দুশ্চিন্তার কারণ নাই।

তারপর মজিদ আবার গরু ছাগলের কথা পাড়ে। এক সময় আড়চোখে ব্যাপারীর পানে তাকিয়ে দেখে (মনোভাব বুঝার চেষ্টা), গৃহপালিত জীবজন্তুর ব্যারামের কথায় তেমন মনোযোগ যেন নেই তার। আরো দুচারটে অসংলগ্ন কথার পর মজিদ উঠে পড়ে।
ফেরবার পথে মোল্লা শেখের বাড়ির কাছে কঁঠাল গাছের তলে একটা মূর্তি নজরে পড়ে। মূর্তি ওখানেই দাঁড়িয়ে ছিল না, তাকে আসতে দেখে দাঁড়িয়েছে। মগরেবের কিছু দেরি আছে, কিন্তু শীতসন্ধ্যা ধোঁয়াটে বলে দূর থেকে অস্পষ্ট দেখায় সে-মূর্তি। তবু তাকে চিনতে মজিদের এক পলক দেরি হয় না। সে হাসুনির মা। মুখটা ওপাশে ঘুরিয়ে আলতভাবে দাঁড়িয়ে আছে।
নিকটবর্তী হতেই হাসুনির মা কেমন এক কান্নার ভঙ্গিতে মুখ হাতে ঢাকে। আরো কাছে গিয়ে মজিদ থমকে দাঁড়ায়, দাড়িতে হাত সঞ্চালন করে কয়েক মুহূর্ত তাকে চেয়ে দেখে। তারপর বলে, -কী গো হাসুনির মা?
যে-কান্নার ভঙ্গিতে তখন হাতে মুখ ঢেকেছিল, সে এবার মজিদের প্রশ্নে আস্তে নাকিসুরে কেঁদে ওঠে। কান্নাটাই মুখ্য উদ্দেশ্য নয়, আসল উদ্দেশ্য এই বলা যে, যা ঘটছে তা হাসবার নয়, কান্নার ব্যাপার।
আকস্মিক উদ্বেগ বোধ করে মজিদ। মেয়েটার চলন-বিলন কেমন যেন নম্র। বয়স হলেও আনাড়ি বেঠিকপানা ভাব। হাতে নিলে যেন গলে যাবে। মাসখানেক আগে একদিন শেষরাতে খড়কুটোর উজ্জ্বল আলোয় যার নগ্ন বাহু-পিঠ-কাঁধ দেখেছিল মজিদ, সে যেন ভিন্ন কোনো মানুষ। এখন তাকে দেখে শ্বসন দ্রুততর হয় না (উত্তেজনা বা অনুভূতি কাজ করে না)।
কণ্ঠে দরদ মাখিয়ে মজিদ প্রশ্ন করে,–কী হইছে তোমার বিটি?
এবার নাক ফ্যাৎ ফ্যাৎ করে হাসুনির মা অস্পষ্ট কণ্ঠে বলে,–মা মরছে!
বজ্রাহত হবার ভান করে মজিদ। আর তার মুখ দিয়ে অভ্যাসবশত সে-কথাটাই নিঃসৃত হয়, যা আজ কতশত বছর যাবৎ কোটি কোটি খোদার বান্দারা অন্যের মৃত্যু সংবাদ শুনে উচ্চারণ করে আসছে। তারপর বলে,–আহা ক্যামনে মরলে গো বেটি?
–অ্যামনে।
এমনি মারা গেছে কথাটা কেমন যেন শোনায় (মৃতের প্রতি শোক না থাকায়)। পলকের মধ্যে মজিদের স্মরণ হয় তাহেরের বৃদ্ধ ঢেঙা বাপের বিচারের দৃশ্য। তার জন্য অবশ্য অনুতাপ বোধ কবে না মজিদ। কেবল মনে হয় কথাটা। থেমে আবার প্রশ্ন করে,–ছ্যামরারা কই?
–আছে! ধান বিক্রি কইরা ঠ্যাঙের উপর ঠাঙ তুইলা আছে। ছোটডি কয় কেরায়া নায়ের (ভাড়া নৌকার) মাঝি হইবো।
–দাফন কাফনের যোগাড়যন্ত্র করতাছে নি?
—করতাছে। মোল্লা শেখে জানাজা পড়ব।
খেলাল তুলে হঠাৎ দাঁত খোঁচাতে থাকে মজিদ, কপালে ক-টা রেখা ফোটে। তারপর চিন্তিত গলায় বলে,—মওতের আগে খোদার কাছে মাফ চাইছিল নি তহুর মা?
ধাঁ করে হাসুনির মা মুখ ঘুরিয়ে তাকায় মজিদের পানে। দেখতে না দেখতে চোখে ভয় ঘনিয়ে ওঠে।
–মাফ চাইছিল কিনা কইবার পারি না!
কয়েক মুহূর্ত মজিদ। নীরব থাকে। এ-সময়ে কপালে আরো কয়েকটি রেখা ফুটে ওঠে। কিছু না বললেও হাসুনির মা বোঝে, মজিদ তার মায়ের কবরের আজাবের কথা ভাবে। মায়ের মৃত্যুতে সে তেমন কিছু শোক পেয়েছে বলা যায় না। বার্ধক্যের শেষ স্তরে কারো মৃত্যু ঘটলে দুঃখটা তেমন জোরালভাবে বুকে লাগে না। তবে মায়ের কোঁকড়ানো রাগ-ঝোলা যে মৃত দেহটি এখনো ঘরের কোণে নিম্পন্দভাবে পড়ে আছে সে-দেহটিকে নিয়ে যখন পেছনের জঙ্গলের ধারে কদম গাছের তলে কবর দেওয়া হবে, তখন হয়তো দমকা হাওয়ার মতো বুকে সহসা হাহাকার জাগবে (দুঃখ অনুভূত)। তারপর শীঘ্ৰ আবার মিলিয়ে যাবে সে হাহাকার। কিন্তু তার মা নিঃসঙ্গ সে-কবরে লোক চোখের অন্তরালে অকথ্য যন্ত্রণাভোগ করবে– এ কথা ভাবতেই মেয়ের মন ভয়ে ও বেদনায় নীল হয়ে ওঠে। কলাপাতার মতো কেঁপে উঠে সে প্রশ্ন করে,
–মায়ের কবরে আজব হইবো?
সরাসরি কথাটার উত্তর দিতে মজিদের মুখে বাঁধে (দুঃখের কথা সরাসরি বলা যায় না)। থেমে বলে,—খোদা তারে বেহেস্তে-নাছিব করো, আহা!
একবার আড়াচোখে তাকায় হাসুনির মার দিকে। চোখে মরণভীতির মতো গাঢ় ছায়া দেখে হয়তো বা একটু দুঃখও হয়। ভাবে, তার জন্যে লোকটি নিজেই দায়ী। আর যাই হোক, মজিদের কথাকে যে অবহেলা করে খাড়া হয়ে দাঁড়াতে চায় তাকে সে মাফ করতে পারে না।
তারপর দ্রুতপায়ে হাঁটতে শুরু করে মজিদ। বাঁ ধারে মাঠ। দিগন্তের কাছে ধূসর ছায়া দেখে মনে ভয় হয় (নামাযের ওয়াক্ত চলে যাওয়া)। নামাজ কাজ হবে না তো?

আমেনা বিবিকে শাস্তি

পরের শুক্রবার আমেনা বিবি রোজা রাখে। পীর সাহেবের পানিপড়া পাবে না জেনে প্ৰথমে নিরাশ হয়েছিল, কিন্তু পেটে বেড়ির কথা শুনে এবং প্যাঁচ যদি সাতটির বেশি না হয় তবে মজিদ তার একটা বিহিত কমতে পারবে শুনে শীঘ্ৰ মন থেকে নিরাশা কেটে গিয়ে আশার সঞ্চার হলো। আস্তে আস্তে একটা ভয়ও এল মনে। প্যাঁচ যদি সাতের বেশি হয়, চোদ্দ কিংবা একুশ? মজিদের নিজের বউয়ের তো সাতের বেশি। সে নাকি একুশও দেখেছে।
ব্যাপারটা গোপন রাখবে স্থির করেছিল আমেনা বিবি; কিন্তু এ-সব কথা হলে বাতাসে কথা হতে শুরু করে (নেতিবাচক সংবাদ দ্রুত ছড়ায়)। তানু বিবিই গল্প ছড়ায় এবং শুক্রবার সকাল থেকে নানা মেয়েলোক আসতে থাকে দেখা করতে। আমেনা বিবি কারো সঙ্গে কথা কয় না। ঘরের কোণে আবছায়ার মধ্যে মাদুরে বসে গুনগুনিয়ে কোরান শরীফ পড়ে। মাথায় ঘোমটা, মুখটা ইতোমধ্যে দুশ্চিন্তায় শুকিয়ে উঠেছে। পাড়াপড়শীরা এসে দেখে দেখে যায়, তারপর আড়ালে তানু বিবির সঙ্গে নিচু গলায় কথা কয়। তানু বিবি অবিশ্রান্ত পান বানায় আর মেহমানদের খাওয়ায়।

দুপুরের কিছু আগে মজিদের বাড়ি থেকে রহিমা আসে। হাতে ঘষা-মাজা তামার গ্লাসে পানি। এমনি পানি নয়–পড়াপানি। মজিদ বলে পাঠিয়েছে গোসল করার আগে আমেনা বিবি পেটে পানিটা যেন ঘষে। দোয়া-দরূদ পড়া পানি, তার প্রতিটি ফোটা পবিত্র। কাজেই মাখবার সময় পুকুরের পানিতে দাঁড়িয়েই যেন মাখে।
রহিমা সঙ্গে সঙ্গে ফিরে যায় না। পান-সাদা খায়, তানু বিবির সঙ্গে সুখ-দুঃখের কথা কয়। এক সময় তানু বিবি প্রশ্ন করে, বইন, আপনেও তো মাজারের পাশে সাত পাক দিছেন না?
–আমি দেই নাই।
–দেন নাই? বিস্মিত হয়ে তানু বিবি বলে।—তায় তানি ক্যামনে জানলেন আপনার চোদ্দ প্যাঁচ?
রহিমা লজ্জার হাসি হেসে বলে,—তানি যে আমার স্বামী। স্বামী হইলে এ্যামনেই বোঝে। (স্বামী-স্ত্রীর মধ্যে গোপন কিছু থাকে না)
–তয় তানি বোঝেন না ক্যান (আমেনার বিষয়টি ব্যাপারি কেন ধরতে পারে নি)? তানু বিবির তানি মানে খালেক ব্যাপারী।
রহিমা মুশকিলে পড়ে। দুই তানিতে যে প্রচুর তফাৎ আছে সে কথা কী করে বোঝায়! তানু বিবি একটু বোকা অথচ আবার দেমাকি কিছিমের মানুষ। স্বামী বিস্তর জমিজমার মালিক বলে ভাবে, তার তুলনায় আর কেউ নেই। শেষে রহিমা আস্তে বলে,–তানি যে খোদার মানুষ।
আমেনা বিবিকে গোসল করিয়ে বাড়িতে ফেরে রহিমা। মজিদ উৎকষ্ঠিত স্বরে বলে,—পড়াপানিডা নাপাক জাগায় পড়ে নাই তো?
–না। যা পড়েছে তালাবের মধ্যেই পড়েছে।
সূৰ্য যখন দিগন্ত সীমার কাছাকাছি পৌঁছেছে তখন জোয়ান-মদ্দ দু’জন বেহারা পাল্কি এনে লাগাল অন্দর ঘরের বেড়ার পাশে।
এক ঢিলের পথ, কিন্তু ব্যাপারীর বউ হেঁটে যেতে পারে না।
ব্যাপারী হাঁকে,–কই তৈয়ার হইছেন নি?
আমেনা বিবি আবছায়ার মধ্যে তখনো গুনগুনিয়ে কোরান শরীফ পড়ছে। দুপুরের দিকে চেহারায় তবু কিছু জৌলুস ছিল, এখন বেলা শেষের ম্লান আলোয় একেবারে ফ্যাকাশে ঠেকে (রোজা থাকায়)। তার চোখের সামনে আঁকাবাঁকা প্যাচানো অক্ষরগুলো নাচে (আরবি অক্ষর), আবছা হয়ে গিয়ে আবার স্পষ্ট হয়ে ওঠে, ছোট হয়ে আবার হঠাৎ বড় হয়ে যায়। আর শুষ্ক ঠোঁট দুটো থেকে থেকে থরথরিয়ে কেঁপে ওঠে।

তানু বিবি গিয়ে ডাকে,–ওঠ বুবু সময় হইছে।
ডাক শুনে ফাঁসির আসামীর মতো আমেনা বিবি চমকে উঠে। ভীতবিহবল দৃষ্টিতে একবার তাকায় সতীনের পানে। তারপর সূরা শেষ করে কোরান শরীফ বন্ধ করে, গেলাফে ভরে, শেষে পালকস্পর্শের মতো আলগোছে তাতে চুমু খায়। সেটা ও রেহেলা নিয়ে উঠে দাঁড়াতেই হঠাৎ তার মাথা ঘুরে চোখ অন্ধকার হয়ে যায় (দুর্বলতায়), আর শরীরটা টাল খেয়ে প্ৰায় পড়ে যাবার উপক্রম করে। তানু বিবি ধরে ফেলে তাকে। তারপর একটু আদা-নুন মুখে দিয়ে ঘরের কোণেই মগরেবের নামাজটা আমেনা বিবি সেরে নেয়।
উঠানের পথটুকু অতিক্রম করতে অত্যন্ত পরিশ্রান্ত বোধ করে আমেনা বিবি। পুরা ত্রিশ দিন রোজা রেখেও যে বিন্দুমাত্ৰ কাহিল হয় না সে একদিনের রোজাতেই একেবারে যেন ভেঙে গেছে (মানসিক চাপ থাকায়)। গায়ে মাথায় বুটিকার হলুদ রংয়ের একটা চাদর দিয়েছে। সেটা বুকের কাছে চেপে ধরে গুটি গুটি পায়ে হাঁটে। কিসের এত ভয় তাকে পিষে ধরেছে কঘণ্টায় যে-ভয় দীর্ঘ রোগভোগ করা মানুষের মতো তাকে দুর্বল করে ফেলেছে? এক যুগেরও ওপরে যে নিঃসন্তান থাকতে পারল সে যদি জানে যে, ভবিষ্যতেও সে তেমনি নিঃসন্তান থাকবে, তবে এমন মুষড়ে যাবার কী আছে? এ প্রশ্ন আমেনা বিবি তার নিজের মনকেই জিজ্ঞাসা করে।
তবে কথা হচ্ছে কি (ভয়ের কারণ), তেরো বছরের কথা একদিনে জানেনি, জেনেছে ধাপে ধাপে, ধীরে ধীরে, প্ৰতি বৎসরের শূন্যতা থেকে। সে শূন্যতাও আবার পরবর্তী বছরের আশায় শীঘ্ৰ ক্ষয়ে তেজশূন্য হয়ে গেছে। ভবিষ্যৎ জীবনের শূন্যতার কথা তেমনি বছরে বছরে যদি জানে তবে আঘাতটা দীর্ঘকালব্যাপী সময়ের মধ্যে ছড়িয়ে গিয়ে তীব্রতায় হ্রাস পাবে, মনে কিছু-বা লাগলেও গায়ে লাগবে না। কিন্তু এক মুহূর্তে সে কথা জানলে বুক ভেঙে যাবে না, বেঁচে থাকবার তাগিদ কি হঠাৎ ফুরিয়ে যাবে না?
সে ভয়ে (আশা ভঙ্গের) দু’কদমের পথ ঘাস শূন্য মসৃণ ক্ষুদ্র উঠানটা পেরুতে গিয়ে আমেনা বিবির পা চলে না; সে-ভয়ের জন্যেই জোর পায় না কোমরে, চোখে ঝাপসা দেখে। একবার ভাবে, ফিরে যায় ঘরে। কাজ কী জেনে ভবিষ্যতের কথা। যাই হোক, দয়ালুদের মধ্যে সেরা দয়ালু। সে খোদার ইচ্ছাই তো অক্ষরে অক্ষরে প্রতিপালিত হবে।
কিন্তু গুটি গুটি করে চলেও পা এগিয়ে চলে। মনের ইচ্ছায় না হলেও চলে লোকদের খাতিরে। ঢাকঢোল বাজিয়ে যোগাড়যন্ত্র করিয়ে এখন পিছিয়ে যেতে পারে না। পুরুষ হলে হয়তো বা পারত, মেয়েলোক হয়ে পারে না (সমাজ অমান্য করা)। সমাজ যাকেই ক্ষমা করুক না কেন, বিরুদ্ধ ইচ্ছা দ্বারা চালিত, দো-মনা, খুশির বশের মানুষের আয়োজন ভঙ্গ করা নারীকে ক্ষমা করে না। (সমাজে নারীদের দুর্বল অবস্থান) এ-সমাজে কোনো মেয়ে আত্মহত্যা করবে বলে একবার ঘোষণা কোরে সে মনের ভয়ে (লোকের কথা শোনা) আবার বিপরীত কথা বলতে পারে না। সমাজই আত্মহত্যার মাল-মশলা জুগিয়ে দেবে, সর্বতভাবে সাহায্য করবে যাতে তার নিয়ত হাসিল হয়, কিন্তু ফাঁকি দিয়ে তাকে আবার বাঁচতে দেবে না। মেয়েলোকের মনের মশকরা সহ্য করবে অতটা দুর্বল নয় সমাজ। এখানে তাদের বেহুদিপনার জায়গা নেই।

মজিদ অপেক্ষা করছিল। বেহারারা পালকিটা মাজার ঘরের দরজার কাছে আস্তে নামিয়ে রাখল।
ব্যাপারী মজিদের কাছে গিয়ে দাঁড়ায়। আস্তে বলে,—নামবো?
মজিদ আজ লম্বা কোর্তা পরেছে, মাথায় ছোটখাটো একটা পাগড়িও বেঁধেছে। মুখ গম্ভীর। বলে,–তানারে নামায়া মাজার ঘরের ভিতরে লইয়া যান। থেমে বলে,–তানার ওজু আছে নি?
ব্যাপারী ছুটে যায় পালকির কাছে। পর্দা ঈষৎ ফাঁক করে নিচু গলায় প্রশ্ন করে,–আছে নি ওজু?
অস্পষ্ট ভঙ্গিতে মাথা নেড়ে আমেনা বিবি জানায়, আছে।
–তয় নামেন।
মজিদ একটু তফাতে দাঁড়িয়ে থাকে। হঠাৎ সে চিকন সুরে দোয়া দরূদ পড়তে শুরু করে, গলায় বিচিত্ৰ সূক্ষ্ম কারুকার্যের খেলা হতে থাকে। কিন্তু তাতে চোখের তীক্ষ্ণতা কাটে না। চোখ হঠাৎ তার তীক্ষ্ম হয়ে উঠেছে। পালকির পর্দা ফাঁক করে নামবার জন্যে আমেনা বিবি যখন এক পা বাড়ায় তখন সূচের তীক্ষ্ণতায় তার দৃষ্টি বিদ্ধ হয় সে পায়ে (অনৈতিক আকর্ষণ)। সাদা মসৃণ পা, রোদ-পানি বা পথের কাদামাটি যেন কখনো স্পর্শ করেনি। মজিদের গলার কারুকাৰ্য আরো সূক্ষ্ম হয়।
হলুদ রঙের বুটিদার চাদরটা আমেনা বিবি ঘোমটার ওপরে টান করে ধরে রেখেছে। তবু পালকি থেকে নেমে সে যখন মাজার ঘরে গিয়ে দাঁড়ায় তখন আড়াচোখে তার পানে তাকিয়ে মজিদ কিছুটা বিস্মিত হয় (সৌন্দর্য দেখে)। নতুন বউয়ের মতো চোখ তার বোজা। তবে লজ্জায় যে নয় তা দ্বিতীয়বার তাকালেই বোঝা যায়। লজ্জায় ম্রিয়মাণ নতুন বউয়ের আত্মসচেতন রক্তাভা তাতে নেই। সে-মুখ ফ্যাকাশে, রক্তশূন্য এবং সে-মুখে দুনিয়ার ছায়া নেই।
আমেনা বিবি কয়েক মুহূর্তের জন্যে চোখটা আধাআধি খোলে। ঘরে ইতোমধ্যে অন্ধকার ঘনিয়ে উঠেছে। দুটো মোমবাতি ম্লানভাবে আলো ছড়ায়। সে আলোর সামনে সে দেখে ঝালরওয়ালা সালু কাপড়ে আবৃত চিরনীরব মাজারটি। সে নীরবতা যেন বিস্ময়করভাবে শক্তিমান। আর সে শক্তি বিদ্যুৎ-চমকের মতো শতফলায় বিচ্ছুরিত হয় প্ৰতি মুহূর্তে। মানুষের রক্তস্রোত যদি থেমেও থাকে তবে তার আঘাতে আশা ও বিশ্বাসের জোয়ার আসে ধমনিতে (মাজারের শক্তিতে প্রভাবিত হওয়ার কল্পনা)। তথাপি মহাকাশের মতো সে মাজার প্রগাঢ় নীরব আর মহাকাশের মতোই বিশাল ও অন্তহীন সে নীরবতা। যে আমেনা বিবি চোখ আধা খুলে তাকায় সেদিকে, সে আর পলক ফেলে না।
মজিদ আবার আড়াচোখে তাকায় তার পানে। কী দেখে আমেনা বিবি? মাজারকে অমন করে কাউকে সে দেখতে দেখেনি (আমেনার ভবিষ্যৎ সিদ্ধান্ত মাজারের উপর বলে তা নিরীক্ষণ করে)। তার ঠোঁট বিড়বিড় করে, গলায় তেমনি সূক্ষ্ম সুরের লহরি খেলে। কিন্তু এবার সে থামে, জিহবা দিয়ে ঠোঁট ভিজিয়ে গলা কাশে।
–তানারে বইবার কন।
ব্যাপারী বিবিকে বলে,–বহেন।
মাজারের ধারাটিতে আমেনা বিবি আস্তে বসে। তাকায় না কারো পানে। মাজারের নীরবতা যেন তার বুক ভরিয়ে দিয়েছে- সে আবার চোখ বুজে থাকে। মনে হয় তার শাস্তি হয়েছে, আর আশা নেই। সন্তানের কামনা এক বৃহৎ সত্যের উপলব্ধির মধ্যে বিলীন হয়ে গেছে, লোভ-বাসনার অবসান হয়েছে। তাই হয়তো মজিদের ভয় হয়। সে আর তাকায় না এদিকে। তবু বিড়বিড় করে নিজের ক্ষুদ্র কোটরাগত চোখে চমক জাগে থেকে থেকে।
ঘরের কোণে একটি পাত্রে পানি ছিল। এবার সেটি তুলে নিয়ে মজিদ অন্য ধারে গিয়ে বসে। পানি পড়বে, যে-পড়াপানি খেয়ে আমেনা বিবি পাক দেবে। তার ঠোঁট তেমনি বিড়বিড় করে, হাতে পানির পাত্রটা তুলে নেওয়ায় হয়তো-বা তা ঈষৎ দ্রুততর হয়। ঘরের মধ্যে প্ৰগাঢ় নিঃশব্দতা। এ নিঃশব্দতার মধ্যে তার গলার অস্পষ্ট মিহি আওয়াজ কোনো আদিম সাপের গতির মতো জীবন্ত হয়ে থাকে। তার কণ্ঠে যদি সাপের গতি থাকে তবে তার মনেও এক উদ্যত সাপ ফণা তুলে আছে ছোবল মারবার জন্যে (আমেনার উপর ব্যক্তিস্বার্থ চরিতার্থ করা)। আমেনা বিবির বোজা চোখ মজিদের ভালো লাগে না, কিন্তু পালকি থেকে নামবার সময় তার যে সাদা সুন্দর পা-টা দেখেছিল, সে-পা-ই তার মনে সাপকে (অপরের স্ত্রীর প্রতি পাপের আকর্ষণ) জাগিয়ে তুলেছে। সাপ জেগে উঠেছে ছোবল মারবার জন্যে। তার জিহবা লিকলিক করে, উদ্যত দীর্ঘ গলা বেয়ে উঠে আসে বিষ। সুন্দর পা–দেখে স্নেহ-মমতা উঠে না এসে, আসে বিষ। স্নেহ-মমতাই যদি গলাগলিয়ে, গদগদ হয়ে জেগে উঠত তবে মজিদ রূপালি ঝালরওয়ালা চমৎকার সালু কাপড়টাই ছিড়ে এখানকার ঘরবাড়ি ভেঙে অনেক আগে প্ৰাণের ভয়ে পালিয়ে যেত। এবং যেত সেখানেই যেখানে নির্মল আলো হাওয়া রোগ-জীবাণুভরা লালাসিক্ত কেতাবের জালির মধ্যে দিয়ে নিঃসৃত হয়ে আসে না, আসে উন্মুক্ত বিশাল আকাশ পথে–যেখানে কাদামাটি লাগেনি এমন পা দেখে অন্তরে বিষাক্ত সাপ জেগে উঠে ফণা ধরে না। (সত্যিকারার্থে যেখানে ধর্মচর্চায় হয় সেখানে যেত। কিন্তু এখানে কুমন্ত্রণা পেয়েও সে তা উপভোগ করে)
থেকে থেকে মজিদ পানিতে ফুঁ দেয়। আর আবছা আলোয় তার ক্ষুদ্র চোখ চক্কর খায়। কখনো তার দৃষ্টি খালেক ব্যাপারীর ওপরও নিবদ্ধ হয়। আজ তার পানে তাকিয়ে মজিদের মনে হয়, ব্যাপারীর মেদবহুল স্ফীত উদরসম্বলিত দেহটি কেমন যেন অসহায়। একটু তফাতে সে যে মাথা নিচু করে বসে আছে, সে-বসে থাকার মধ্যে শক্তি নেই। সে কেমন ধ্বসে আছে, বিস্তর জমিজমাও ঠেস দিয়ে ধরে রাখতে পারেনি তার স্কুল দেহটা। চোখ আবার ঘোরে, চক্কর খায়। হলুদ রঙের বুটিদার চাদরে ঢাকা মুখটা এখান থেকে নজরে পড়ে না। তবু থেকে থেকে সেখানেই ঠক্কর খায় মজিদের ঘূর্ণমান দৃষ্টি।

এক সময় মজিদ উঠে দাঁড়ায়। গলা কেশে আস্তে বলে,—পানিটা দেন।
ব্যাপারীও তার স্থুল দেহ নিয়ে উঠে দাঁড়ায়। এগিয়ে এসে পানিটা নেয়, তারপর আমেনা বিবির মৃত মানুষের মতো স্তব্ধ মুখের সামনে সেটা ধরে। আমেনা বিবি চোখ খুলে তাকায়, আস্তে, পাপড়ি খোলার মতো। তারপর চাদরের তলে একটা হাত নড়ে। সে হাতটি ধীরে ধীরে বেরিয়ে পাত্রটি যখন নেয় তখন একবার তার চুড়িতে অতি মৃদু ঝঙ্কার ওঠে।
আমেনা বিবি পাত্রটি কয়েক মুহূর্ত মুখের সামনে ধরে থাকে। তারপর তুলে ঠোঁটের কাছে ধরে। একটু পরে প্রগাঢ় নীরবতায় মজিদের সজাগ কানে সাবধানী বেড়ালের দুধ খাওয়ার মতো চুকচুক আওয়াজ এসে বাজে। পান করায় অধীরতা নেই। খোদার নামছোয়া পানি; তালাবের (কুয়া) সাধারণ পানি নয়। তাছাড়া তৃষ্ণার পানিও নয় যে, শুষ্ক গলা নিমেষে শুষে নেবে সবটা। ধীরে ধীরে পান করে সে, বুকটা শীতল হয়। তারপর মুখ না ফিরিয়ে আস্তে শূন্য পাত্রটা বাড়িয়ে ধরে। পায়ের মতো সুন্দর হাত। মোমবাতির ম্লান আলোয় মনে হয়, সে-হাত শুধু সাদা নয়, অদ্ভুতভাবে কোমল।
হাতটি যখন আবার চাদরের তলে অদৃশ্য হয়ে যায় তখন মজিদ বলে,—তানারে উঠবার কন। এহন পাক দেওন লাগবো।
আমেনা বিবি উঠে দাঁড়ায়। দাঁড়িয়েই মনে হয় বসে পড়বে, কিন্তু সামান্য দুলেই স্থির হয়ে যায়।
–আমি দোয়া-দরূদ পড়তাছি। তানারে পাক দিবার কন। ডান দিক থিকা পাক দিবেন, আগে ডাইন পা বাড়াইবেন। বাড়ানের আগে বিসমিল্লাহ কইবেন।
মজিদ কোণে বসে। একবার সামনে দিয়ে যখন আমেনা বিবি ঘুরে যায়। তখন তার চোখ চকচক করে ওঠে আবছা অন্ধকারে। কালো রঙের পাড়ের তল থেকে আমেনা বিবির পা নিঃশব্দে বেরিয়ে আসে। একবার ডান পা আরেকবার বাঁ। শব্দ হয় না। কাছাকাছি যখন আসে তখন মজিদের ভেতরে সাপের গলাটা (বদ মতলব) সামান্য চমকে পেছনে যায়, যেন ছোবল দেবে। মজিদ একবার ঢোক গেলে, তারপর কণ্ঠের সুর আরো মিহি করে তোলে।
একপাক, দুইপাক। আমেনা বিবি স্বপ্নের (সন্তানের কামনায়) ঘোরে যেন হাঁটে। যে স্তব্ধতায় তার মুখ জমে আছে, সে-স্তব্ধতায় বিন্দুমাত্ৰ প্ৰাণ নেই। ও মুখ কখনো যেন কথা কয়নি, হাসেনি, কাঁদেনি। মনেও তার কিছু নেই। অতীতের স্মৃতির মতো মনে পড়ে কী একটা বাসনার কথা-বছরে বছরে যে-বাসনা অপূৰ্ণ থেকে আরো তীব্রতর হয়েছে। কী একটা অভাবের কথা, কী একটা শূন্যতার কথা। কিন্তু সেসব অতীতের স্মৃতির মতো অস্পষ্ট। একটা মহাশক্তির সন্নিকটে এসে মানুষ আমেনা বিবির আর সুখ-দুঃখ অভাব-অভিযোগ নেই। একটা প্রখর, অত্যুজ্জ্বল আলো তার ভেতরটা কানা (মাজারের শক্তি) করে দিয়েছে। সেখানে তার নিজের কথা আর চোখে পড়ে না।
একপাক, দুইপাক। তারপর তিন পাকে অর্ধেক। ক-পা এগুলেই মজিদকে পেরিয়ে যাবে। কিন্তু এমন সময় হঠাৎ বৈশাখী মেঘের আকস্মিক আবির্ভাবের মতো কী একটা বৃহৎ ছায়া এসে আমেনা বিবিকে অন্ধকার করে দিলো। অর্থ না বুঝে মুখ ফিরিয়ে স্বামীর পানে তাকাবার চেষ্টা করল, হয়তো বা তাকে আলিঝালি দেখলা। কিন্তু তারপর আর কিছু দেখল না, জানল না ক-প্যাঁচ পড়েছে তার পেটে, জানল না মাজারের মধ্যে শায়িত শক্তিশালী লোকটির কী বলবার আছে, ক’পাক দিলে তাঁর অন্তরে দয়া উথলে উঠত।
ব্যাপারী বিদ্যুৎগতিতে উঠে পড়ে অস্ফুট কণ্ঠে অর্তনাদ করে বলে,–কী হইল?
চোখের সামনে আমেনা বিবি মূর্ছা গেছে। বুটিদার চাদরটা আর হাত দিয়ে আঁকড়ে ধরে রাখতে পারেনি বলে তার মুখটা খোলা। সে মুখে দাঁত লেগে আছে।
বাইরে মাজারে রহিমা আসে না। আজি আমেনা বিবি এসেছে বলে হয়তো আসত যদি না সঙ্গে থাকত ব্যাপারী (পরপুরুষের সামনে পর্দা)। মাজার ঘরের বেড়ার ফুটোতে চোখ পেতে সে ব্যাপারটা দেখছিল। সঙ্গে হাসুনির মা-ও ছিল। রহিমা মনে মনে স্থির করেছিল, পাক দেওয়া চুকে গেলে আমেনা বিবিকে ভেতরে নিয়ে যাবে, সখ করে যে ফিরনিটা করেছে তা দেবে খেতে, তারপর দুয়েক খিলি পান চিবোতে চিবোতে দু’দণ্ড সুখ-দুঃখের গল্পও করবে। নিজে সে স্বল্প-ভাষী মানুষ, কিন্তু আমেনা বিবির হৃদয়ের সঙ্গে তার হৃদয়ের কোথায় যেন সমতা,  (নিঃসন্তান থাকায়) যা-ই কথা হোক না কেন দেখতে দেখতে আলাপ জমে ওঠে। কিন্তু ফুটো দিয়ে রহিমা যে-দৃশ্য দেখল তারপর গল্পগুজবের আশা তাকে ত্যাগ করতে হলো। ব্যাপারীর লজ্জা কাটিয়ে বাইরে এসে সে আর হাসুনির মা অতিথিকে ভেতরে নিয়ে গেলো। নিয়ে গেলো পাঁজাকোলে করে, মুখে কথা ফোটাবার উদ্দেশ্যে। সখ করে তৈরি করা ফিরনির কথা বা পান খেয়ে দুদণ্ড গল্প করার কথা ভুলে গেলো।
মজিদ আর ব্যাপারী মাজার ঘরেই চুপ হয়ে বসে রইল, দু’জনের মুখে চিন্তার রেখা। তারপর মজিদ আস্তে উঠে অন্দর ঘরের বেড়ার পাশে বৈঠকখানায় গিয়ে হুঁকা ধরিয়ে আবার ফিরে এসে ব্যাপারীকে ডেকে নিয়ে গেলো। দুজনেই এক এক করে হুঁকা টানে, কথা নেই কারো মুখে।
মজিদ ভাবে এক কথা। যে আমেনা বিবির পীরের পানিপড়া খাবার সখ হয়েছিল সে আমেনা বিবির ওপর–আকার-ইঙ্গিতে বা মুখের ভাবে প্ৰকাশ না করলেও–মজিদের মনে একটা নিষ্ঠুর রাগ দেখা দিয়েছিল। তবে একটা নিষ্ঠুর শাস্তিও সে স্থির করেছিল (দুর্বল অবস্থায় মাজার ঘুরিয়ে কষ্ট দেওয়া)। আজ সন্ধ্যার আবছা অস্পষ্ট আলোয় আমেনা বিবির সাদা কোমল পা দেখে শাস্তি বিধানের সে প্রবল ইচ্ছা বিন্দুমাত্র প্রশমিত না হয়ে বরঞ্চ আরো নিষ্ঠুরতমভাবে শাণিত হয়ে উঠেছিল। কিন্তু অপ্ৰত্যাশিতভাবে অসময়ে আমেনা বিবির মূর্ছা যাওয়া সমস্ত কিছু যেন গোলমাল করে দিলো। মুঠোর মধ্যে এসেও সে যেন ফসকে গেলো, যে মজিদের ক্ষমতাকে সে এতদিন উপেক্ষা করেছে তার প্রতি আজও অবজ্ঞা দেখাল, তাকে নিষ্ঠুরভাবে আঘাত করতে সুযোগ দিয়েও দিলো না। দিয়েও দিলো না বলে মেয়েলোকটি যেন চরম বাহাদুরি দেখাল, সমস্ত আস্ফালনের মুখে চুন দিলো।
হুঁকাটা রেখে হঠাৎ এবার ব্যাপারী কথা বলে। বলে,—দিনভর রোজা রাখনে বড় দুর্বল হইছিল তানি।
মজিদ কয়েক মুহূর্ত চুপ থাকে। তারপর গভীর কণ্ঠে বলে,- রোজা রাখনে দুর্বল হইছিল কথাডা ঠিক, কিন্তু আমি যে পানিপড়াডা দিলাম।–তা কিসের জন্য? শরীলে তাকত হইবার জন্য না? এমন তাছির (প্রভাব) হেই পানিপড়ার যে পেটে গেলে একমাসের ভুখা মানুষও লগে লগে চাঙ্গা হইয়া ওঠে। শরীলের দুর্বলতার জন্য তিনি অজ্ঞান হন নাই। মজিদ থামে। কী একটা কথা বলেও বলে না। ব্যাপারী মুখ ফিরিয়ে তাকায় মজিদের পানে, কতক্ষণ তার চিন্তিত-ব্যথিত চোখ চেয়ে চেয়ে দেখে। তারপর প্রশ্ন করে,–তায় ক্যান তানি অজ্ঞান হইছেন?
আপনে তানার স্বামী–ক্যামনে কই মুখের উপরে?
হঠাৎ ব্যাপারীর চোখ সন্দিগ্ধ হয়ে ওঠে এবং তা একবার কানিয়ে চেয়ে লক্ষ্য করে দেখে মজিদ। ব্যাপারীর চোখে সন্দেহের জোয়ার আসুক, আসুক ক্রোধের অনল-কণা। মজিদ আস্তে হুঁকাটা তুলে নেয়। তাকে ভাবতে সময় দিতে হবে। বাইরে কুয়াশাচ্ছন্ন রহস্যময় জ্যোৎস্না। তার আলোয় ঘরের কুপিটার শিখা মনে হয় এক বিন্দু রক্ত—টাট্‌কা লাল টকটকে। খোলা দরজা দিয়ে কুয়াশাচ্ছন্ন ম্লান জ্যোৎস্নার পানেই চেয়ে থাকে মজিদ, দৃষ্টিতে মানুষের জীবনের ব্যর্থতার বোঝা। তাতে বিদ্বেষ নেই, পতিতের প্রতি ক্ৰোধ-ঘৃণা নেই, আছে শুধু অপরিসীম ব্যথা, হতপ্রশ্নের নিশ্চুপতা।
আচমকা ব্যাপারী মজিদের একটি হাত ধরে বসে। তার বয়স্ক গলায় শিশুর আকুলতা জাগে। বলে,–কন, ক্যান তানি অজ্ঞান হইছেন? ভিতরে কী কোনো কথা আছে?
একবার বলে বলে ভাব করে মজিদ, তারপর হঠাৎ সোজা হয়ে বসে রসনা সংযত করে। মাথা নেড়ে বলে,–না। কওন যায় না। থেমে আবার বলে, তয় একটা কথা আমার কওন দরকার; তানারে তালাক দেন। (আমেনার প্রতি মজিদের তীব্র ক্ষোভ)
আমেনা বিবিকে সে তালাক দেবে! তেরো বছর বয়সে ফুটফুটে যে মেয়েটি এসে তার সংসারে ঢোকে এবং যে এত বছর যাবৎ তার ঘরকন্না করছে, তাকে তালাক দেবে সে? সত্যি কথা, বড় বিবির প্রতি তার তেমন মায়া-মহব্বত নাই। কিছু থাকলেও তানু বিবির আসার পর থেকে তা ঢাকা পড়ে আছে, কিন্তু তবু বহুদিনের বসবাসের পর একটা সম্বন্ধ আড়ালে-আবডালে (সম্পর্কের মায়া) গজিয়ে না উঠেছে এমন নয়। তাই হঠাৎ তালাক দেবার কথা শুনে ব্যাপারী হকচকিয়ে ওঠে তারপর কতক্ষণ সে বজ্ৰাহতের মতো বসে থাকে।
মজিদ কিছুই বলে না। বাইরের ম্লান জ্যোৎস্নার পানে বেদনাভারী চোখে চেয়ে তেমনি স্থিরভাবে বসে থাকে। আর অপেক্ষা করে। অনেকক্ষণ সময় কাটলেও ব্যাপারী যখন কিছু বলে না। (তালাকে আগ্রহী না হওয়ায়) তখন সে আলাগোছে বলে,
-কথাডা কইতাম, কিন্তু এক কারণে এখন না কওনই স্থির করছি। তহুর বাপের কথা মনে আছে নি?
ব্যাপারী ভারী গলায় আস্তে বলে,–হে তহুর বাপের কথা মাইনষের ভুইলা গেছে। এমন কী তার রক্তের পোলা-মাইয়ারাও ভুইলা গেছে। কিন্তু আমি ভুলবার পারি নাই। ক্যান জানেন?
যন্ত্রচালিতের মতো ব্যাপারী প্রশ্ন করে,–ক্যান?
–কারণ হেই ব্যাপার থিকা একটা সোনার মতো মূল্যবান কথা শিখছি আমি। কথাডা হইল- এই  পাক দিল আর গুণাগার দিল এক সুতায় বাঁধা থাকে। আর কেউ যদি গুনাগার দিলের শাস্তি দিবার চায় তখন পাক দিলই শাস্তি পায়। তহুর বাপের দিল সাফ আছিল, তাই শাস্তি পাইল হেই। এদিকে তারে কষ্ট দিয়া আমি গুনাগার হইলাম। (তহুর বাপকে শাস্তি দেওয়ায় মজিদের মনে অনুশোচনা)
