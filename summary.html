                summary: "সারাংশ লিখো",
                content: `
পাকা দুই ক্রোশ পথ হাঁটিয়া স্কুলে বিদ্যা অর্জন (কষ্টে বিদ্যার্জনের চিত্র) করিতে যাই। আমি একা নই—দশ-বারোজন। যাহাদেরই বাটী (বাড়ি) পল্লীগ্রামে, তাহাদেরই ছেলেদের শতকরা আশিজনকে এমনি করিয়া বিদ্যালাভ করিতে হয়। ইহাতে লাভের অঙ্কে শেষ পর্যন্ত একেবারে শূন্য না পড়িলেও (পরিশ্রমের তুলনায় সামান্য বিদ্যালাভ), যাহা পড়ে, তাহার হিসাব করিবার পক্ষে এই কয়টা কথা চিন্তা করিয়া দেখিলেই যথেষ্ট হইবে যে, যে ছেলেদের সকাল আটটার মধ্যে বাহির হইয়া যাতায়াতে চার ক্রোশ পথ (আসা-যাওয়া) ভাঙ্গিতে হয়—চার ক্রোশ মানে আট মাইল নয়, ঢের বেশি (প্রতিকূল যাতায়াত ব্যবস্থার কারণে)— বর্ষার দিনে মাথার উপর মেঘের জল ও পায়ের নিচে এক হাঁটু কাদা এবং গ্রীষ্মের দিনে জলের বদলে কড়া সূর্য এবং কাদার বদলে ধূলার সাগর সাঁতার দিয়া স্কুল-ঘর করিতে হয়, সে দুর্ভাগা বালকদের মা-সরস্বতী খুশি হইয়া বর (আশীর্বাদ) দিবেন কি, তাহাদের যন্ত্রণা দেখিয়া কোথায় যে তিনি মুখ লুকাইবেন, ভাবিয়া পান না (বাচ্চাদের কষ্টে বিদ্যার্জনের চিত্র দেখেই দেবী সরস্বতী আশীর্বাদ দিবেন)।

তার পরে এই কৃতবিদ্য (শিক্ষালাভ করেছে যারা) শিশুর দল বড় হইয়া একদিন গ্রামেই বসুন, আর ক্ষুধার জ্বালায় অন্যত্রই যান—তাঁদের চার-ক্রোশ হাঁটা বিদ্যার তেজ আত্মপ্রকাশ (বিদ্যা নিয়ে অহংকার) করিবেই করিবে। কেহ কেহ বলেন শুনিয়াছি, আচ্ছা, যাদের ক্ষুধার জ্বালা, তাদের কথা না হয় নাই ধরিলাম (অভাবী লোকেরা গ্রাম ছেড়ে যেতে পারে), কিন্তু যাঁদের সে জ্বালা নাই (স্বচ্ছল লোক), তেমন সব ভদ্রলোকেই বা কী সুখে গ্রাম ছাড়িয়া পলায়ন করেন? তাঁরা বাস করিতে থাকিলে তো পল্লীর এত দুর্দশা হয় না! (স্বচ্ছল লোকেরা বসবাস করলেই গ্রামের উন্নতি হত)

ম্যালেরিয়ার কথাটা না হয় নাই পাড়িলাম। সে যাক, কিন্তু ঐ চার-ক্রোশ হাঁটার জ্বালায় কত ভদ্রলোকেই যে ছেলেপুলে লইয়া গ্রাম ছাড়িয়া শহরে পালান তাহার আর সংখ্যা নাই। তারপরে একদিন ছেলেপুলের পড়াও শেষ হয় বটে, তখন কিন্তু শহরের সুখ-সুবিধা রুচি লইয়া আর তাঁদের গ্রামে ফিরিয়া আসা চলে না। (অন্যত্র স্থানান্তর হওয়ার কারণে গ্রামের উন্নতি হয় না)

কিন্তু থাক এ-সকল বাজে কথা। স্কুলে যাই—দু’ক্রোশের মধ্যে এমন আরও তো দুই তিনখানা গ্রাম পার হইতে হয়। কার বাগানে আম পাকিতে শুরু করিয়াছে, কোন বনে বঁইচি ফল (কাঁটাযুক্ত ফল) অপর্যাপ্ত ফলিয়াছে (প্রচুর পরিমাণে ফলেছে), কার গাছে কাঁঠাল এই পাকিল বলিয়া, কার মর্তমান (মিয়ানমারের একটি স্থান) রম্ভার কাঁদি (বার্মার একটি কলার জাত) কাটিয়া লইবার অপেক্ষা মাত্র, কার কানাচে (ঘরের পেছনের অংশের উঠান) ঝোপের মধ্যে আনারসের গায়ে রঙ ধরিয়াছে (পাকা), কার পুকুর-পাড়ের খেজুর-মেতি (খেজুরমাথি- খেজুরগাছের মাথায় থাকা মিষ্টি শাঁস) কাটিয়া খাইলে ধরা পড়িবার সম্ভাবনা অল্প, এইসব খবর লইতেই সময় যায়, কিন্তু আসল যা বিদ্যা—কামস্কাটকার (রাশিয়ার অন্তর্গত একটি উপদ্বীপ) রাজধানীর নাম কী (পেত্রোপাভলোভস্ক) এবং সাইবেরিয়ার (রাশিয়ার একটি বিস্তীর্ণ ভূ-ভাগ) খনির মধ্যে রূপা মেলে, না সোনা মেলে—এ সকল দরকারি তথ্য অবগত হইবার ফুরসতই মেলে না। (তারা মোটেও বই পড়ে না কেবল দুরন্তপনা করেই তাদের সময় যায়)

জনৈক পল্লীবালকের ডায়েরি হইতে নকল। তার আসল নামটা কাহারও জানিবার প্রয়োজন নাই, নিষেধও আছে। ডাকনামটা না হয় ধরুন, ন্যাড়া।

কাজেই এক্‌জামিনের সময় এডেন কি জিজ্ঞাসা করিলে বলি পারশিয়ার বন্দর, আর হুমায়ুনের (বাবার নাম বাবর) বাপের নাম জানিতে চাহিলে লিখিয়া দিয়া আসি তোগলক খাঁ এবং আজ চল্লিশের কোঠা (৪০-৪৯) পার হইয়াও দেখি, ও সকল বিষয়ের ধারণা প্রায় একরকমই আছে—তারপরে প্রোমোশনের (ফলাফলের দিন) দিন মুখ ভার করিয়া বাড়ি ফিরিয়া আসিয়া কখনো বা দল বাঁধিয়া মতলব করি, মাস্টারকে ঠ্যাঙানো উচিত (খারাপ ফলের কারণে), কখনো বা ঠিক করি, অমন বিশ্রী স্কুল ছাড়িয়া দেওয়াই কর্তব্য। (নিজের দোষের কারণে অপরকে দায় দেওয়া)

আমাদের গ্রামের একটি ছেলের সঙ্গে মাঝে মাঝেই স্কুলের পথে দেখা হইত। তার নাম ছিল মৃত্যুঞ্জয়। আমাদের চেয়ে সে বয়সে অনেক বড়। থার্ড ক্লাসে (৮ম শ্রেণি) পড়িত। কবে যে সে প্রথম থার্ড ক্লাশে উঠিয়াছিল, এ খবর আমরা কেহই জানিতাম না—সম্ভবতঃ তাহা প্রত্নতাত্ত্বিকের (পুরাতত্ত্ব গবেষক) গবেষণার বিষয়—আমরা কিন্তু তাহার ঐ থার্ড ক্লাসটাই চিরদিন দেখিয়া আসিয়াছি। তাহার ফোর্থ ক্লাসে (৭ম শ্রেণি) পড়ার ইতিহাসও কখনো শুনি নাই, সেকেন্ড ক্লাসে (৯ম শ্রেণি) উঠার খবরও কখনো পাই নাই। মৃত্যুঞ্জয়ের বাপ-মা ভাই-বোন কেহই ছিল না; ছিল শুধু গ্রামের একপ্রান্তে একটা প্রকাণ্ড আম-কাঁঠালের বাগান, আর তার মধ্যে একটা পোড়োবাড়ি (পরিত্যক্ত বাড়ি), আর ছিল এক জ্ঞাতি খুড়া (চাচা)। খুড়ার কাজ ছিল ভাইপোর নানাবিধ দুর্নাম রটনা করা—সে গাঁজা খায়, সে গুলি খায়, এমনি আরও কত কী! তার আর একটা কাজ ছিল বলিয়া বেড়ানো—ঐ বাগানের অর্ধেকটা তাঁর নিজের অংশ (সম্পত্তি দখলের অপচেষ্টা), নালিশ করিয়া দখল করার অপেক্ষা মাত্র। অবশ্য দখল একদিন তিনি পাইয়াছিলেন বটে, কিন্তু সে জেলা-আদালতে নালিশ করিয়া নয়—উপরের আদালতের হুকুমে (মৃত্যুঞ্জয়ের মৃত্যুর মাধ্যমে/ স্রষ্টার নির্দেশে)। কিন্তু সে কথা পরে হইবে।

মৃত্যুঞ্জয় নিজে রাঁধিয়া খাইত এবং আমের দিনে ঐ আম-বাগানটা জমা দিয়াই (বাগান ভাড়া দিয়ে) তাহার সারা বৎসরের খাওয়া-পরা চলিত এবং ভাল করিয়াই চলিত। যেদিন দেখা হইয়াছে, সেই দিনই দেখিয়াছি মৃত্যুঞ্জয় ছেঁড়া-খোঁড়া মলিন বইগুলি বগলে করিয়া পথের এক ধার দিয়া নীরবে চলিয়াছে। তাহাকে কখনো কাহারও সহিত যাচিয়া (আগ্রহ সহকারে) আলাপ করিতে দেখি নাই—বরঞ্চ উপযাচক হইয়া (আগ্রহ নিয়ে) কথা কহিতাম আমরাই। তাহার প্রধান কারণ ছিল এই যে, দোকানের খাবার কিনিয়া খাওয়াইতে গ্রামের মধ্যে তাহার জোড়া ছিল না। আর শুধু ছেলেরাই নয়। কত ছেলের বাপ কতবার যে গোপনে ছেলেকে দিয়া তাহার কাছে স্কুলের মাহিনা (বেতন) হারাইয়া গেছে, বই চুরি গেছে, ইত্যাদি বলিয়া টাকা আদায় করিয়া লইত (বিভিন্ন অজুহাতে মৃত্যুঞ্জয়ের থেকে টাকা নিত), তাহা বলিতে পারি না। কিন্তু ঋণ স্বীকার করা ত দূরের কথা, ছেলে তাহার সহিত একটা কথা কহিয়াছে এ-কথাও কোন বাপ ভদ্র-সমাজে কবুল করিতে চাহিত না (অকৃতজ্ঞ মনোভাব)—গ্রামের মধ্যে মৃত্যুঞ্জয়ের ছিল এমনি সুনাম (ব্যঙ্গার্থে- গ্রামবাসী গোপনে মৃত্যুঞ্জয়ের থেকে সাহায্য নিত অথচ প্রকাশ্যে তার সাথে সম্পর্ক রাখাকে অপমান মনে করত)।

অনেকদিন মৃত্যুঞ্জয়ের সহিত দেখা নাই। একদিন শোনা গেল সে মর-মর (মুমূর্ষু অবস্থায়)। আর একদিন শোনা গেল, মালোপাড়ার (মাছ ধরা ও বিক্রি করা যাদের পেশা) এক বুড়া মালো তাহার চিকিৎসা করিয়া এবং তাহার মেয়ে বিলাসী সেবা করিয়া মৃত্যুঞ্জয়কে যমের মুখ হইতে এ-যাত্রা ফিরাইয়া আনিয়াছে। (বাবার চিকিৎসা ও মেয়ের সেবায় মৃত্যুঞ্জয় মৃত্যু থেকে ফিরে এসেছে)

অনেকদিন তাহার অনেক মিষ্টান্নের সদ্ব্যয় (অপব্যয় করা) করিয়াছি—মনটা কেমন করিতে লাগিল (কৃতজ্ঞতাবোধ), একদিন সন্ধ্যার অন্ধকারে লুকাইয়া (গ্রামাবাসী যাতে না দেখে) তাহাকে দেখিতে গেলাম। তাহার পোড়ো-বাড়িতে প্রাচীরের বালাই নাই। স্বচ্ছন্দে ভিতরে ঢুকিয়া দেখি, ঘরের দরজা খোলা, বেশ উজ্জ্বল একটি প্রদীপ জ্বলিতেছে, আর ঠিক সুমুখেই তক্তপোশের (কাঠের চৌকি) উপর পরিষ্কার ধপধপে বিছানায় মৃত্যুঞ্জয় শুইয়া আছে, তাহার কঙ্কালসার (কঙ্কালের মতো) দেহের প্রতি চাহিলেই বুঝা যায়, বাস্তবিক যমরাজ চেষ্টার ত্রুটি কিছু করেন নাই (মৃত্যু সুনিশ্চিত ছিল), তবে যে শেষ পর্যন্ত সুবিধা করিয়া উঠিতে পারেন নাই, সে কেবল ওই মেয়েটির জোরে। সে শিয়রে (মাথার নিকটে) বসিয়া পাখার বাতাস করিতেছিল, অকস্মাৎ মানুষ দেখিয়া চমকিয়া উঠিয়া দাঁড়াইল। এই সেই বুড়া সাপুড়ের মেয়ে বিলাসী। তাহার বয়স আঠারো কি আটাশ ঠাহর করিতে পারিলাম না (দীর্ঘদিন মৃত্যুঞ্জয়ের সেবা করার কারণে চেহারায় বয়সের ছাপ পড়া)। কিন্তু মুখের প্রতি চাহিবামাত্রই টের পাইলাম, বয়স যাই হোক, খাটিয়া খাটিয়া আর রাত জাগিয়া জাগিয়া ইহার শরীরে আর কিছু নাই। ঠিক যেন ফুলদানিতে জল দিয়া ভিজাইয়া রাখা বাসী ফুলের মতো। হাত দিয়া এতটুকু স্পর্শ করিলে, এতটুকু নাড়াচাড়া করিতে গেলেই ঝরিয়া পড়িবে।

মৃত্যুঞ্জয় আমাকে চিনিতে পারিয়া বলিল, কে, ন্যাড়া?
বলিলাম, হুঁ।
মৃত্যুঞ্জয় কহিল, বসো।
মেয়েটা ঘাড় হেঁট করিয়া (মাথা নিচু করে) দাঁড়াইয়া রহিল। মৃত্যুঞ্জয় দুই-চারিটা কথায় যাহা কহিল, তাহার মর্ম এই যে, প্রায় দেড়মাস হইতে চলিল সে শয্যাগত। মধ্যে দশ-পনরো দিন সে অজ্ঞান অচৈতন্য অবস্থায় পড়িয়া ছিল, এই কয়েকদিন হইল সে লোক চিনিতে পারিতেছে এবং যদিচ এখনো সে বিছানা ছাড়িয়া উঠিতে পারে না, কিন্তু আর ভয় নাই (শরীর দুর্বল থাকলেও মৃত্যুর ভয় নেই)।

ভয় নাই থাকুক। কিন্তু ছেলেমানুষ হইলেও এটা বুঝিলাম, আজও যাহার শয্যা ত্যাগ করিয়া উঠিবার ক্ষমতা হয় নাই, সেই রোগীকে এই বনের মধ্যে একাকী যে মেয়েটি বাঁচাইয়া তুলিবার ভার লইয়াছিল, সে কতবড় গুরুভার (এই নির্জন বনে মুমূর্ষু রোগী নিয়ে থাকা কত বড় সাহসের কাজ)! দিনের পর দিন, রাত্রির পর রাত্রি তাহার কত সেবা, কত শুশ্রূষা, কত ধৈর্য, কত রাত-জাগা! সে কত বড় সাহসের কাজ! কিন্তু যে বস্তুটি (পরস্পরের ভালোবাসা) এই অসাধ্য-সাধন করিয়া তুলিয়াছিল তাহার পরিচয় যদিচ সেদিন পাই-নাই, কিন্তু আর একদিন পাইয়াছিলাম (মৃত্যুঞ্জয়ের প্রতি বিলাসীর ভালোবাসার কতটা গভীর, তা সেদিন বুঝতে পারিনি)।
ফিরিবার সময় মেয়েটি আর একটি প্রদীপ লইয়া আমার আগে আগে ভাঙ্গা প্রাচীরের শেষ পর্যন্ত আসিল। এতক্ষণ পর্যন্ত সে একটি কথাও কহে নাই, এইবার আস্তে আস্তে বলিল, রাস্তা পর্যন্ত তোমায় রেখে আসব কি?
বড় বড় আমগাছে সমস্ত বাগানটা যেন একটা জমাট অন্ধকারের মতো বোধ হইতেছিল, পথ দেখা ত দূরের কথা, নিজের হাতটা পর্যন্ত দেখা যায় না। বলিলাম, পৌঁছে দিতে হবে না, শুধু আলোটা দাও।
সে প্রদীপটা আমার হাতে দিতেই তাহার উৎকণ্ঠিত মুখের (মৃত্যুঞ্জয়ের প্রতি চিন্তিত) চেহারাটা আমার চোখে পড়িল। আস্তে আস্তে সে বলিল, একলা যেতে ভয় করবে না ত? একটু এগিয়ে দিয়ে আসব?
মেয়েমানুষ জিজ্ঞাসা করে, ভয় করবে না তো? সুতরাং মনে যাই থাক, প্রত্যুত্তরে শুধু একটা ‘না’ বলিয়াই অগ্রসর হইয়া গেলাম (নারীদের সামনে দুর্বলতা প্রকাশ না করা)।
সে পুনরায় কহিল, “ঘন-জঙ্গলের পথ, একটু দেখে দেখে পা ফেলে যেয়ো (সাবধানে যেও)।”

সর্বাঙ্গে কাঁটা দিয়া উঠিল, কিন্তু এতক্ষণে বুঝিলাম উদ্বেগটা তাহার কিসের জন্য (মৃত্যুঞ্জয়ের জন্য) এবং কেন সে আলো দেখাইয়া এই বনের পথটা পার করিয়া দিতে চাহিতেছিল। হয়ত সে নিষেধ শুনিত না, সঙ্গেই যাইত, কিন্তু পীড়িত মৃত্যুঞ্জয়কে একাকী ফেলিয়া যাইতেই বোধ করি তাহার শেষ পর্যন্ত মন সরিল না।

কুড়ি-পঁচিশ বিঘার বাগান। সুতরাং পথটা কম নয়। এই দারুণ অন্ধকারের মধ্যে প্রত্যেক পদক্ষেপই বোধ করি ভয়ে ভয়ে করিতে হইত, কিন্তু পরক্ষণেই মেয়েটির কথাতেই সমস্ত মন এমনি আচ্ছন্ন হইয়া রহিল যে, ভয় পাইবার আর সময় পাইলাম না (মেয়েটির কথা ভাবতে ভাবতে বিশাল বন নিমিষেই পার হয়ে গেল)। কেবল মনে হইতে লাগিল, একটা মৃতকল্প রোগী লইয়া থাকা কত কঠিন! মৃত্যুঞ্জয় ত যে কোন মুহূর্তেই মরিতে পারিত, তখন সমস্ত রাত্রি এই বনের মধ্যে মেয়েটি একাকী কী করিত! কেমন করিয়া তাহার সে রাতটা কাটিত!

এই প্রসঙ্গে অনেকদিন পরের একটা কথা আমার মনে পড়ে। এক আত্মীয়ের মৃত্যুকালে আমি উপস্থিত ছিলাম। অন্ধকার রাত্রি—বাটীতে ছেলেপুলে চাকর-বাকর নাই, ঘরের মধ্যে শুধু তাঁর সদ্য-বিধবা স্ত্রী, আর আমি। তাঁর স্ত্রী তো শোকের আবেগে দাপাদাপি করিয়া (বিলাপ করা) এমন কাণ্ড করিয়া তুলিলেন যে, ভয় হইল তাঁহারও প্রাণটা বুঝি বাহির হইয়া যায় বা। কাঁদিয়া কাঁদিয়া বার বার আমাকে প্রশ্ন করিতে লাগিলেন, তিনি স্বেচ্ছায় যখন সহমরণে (স্বামীর মৃত্যুর কারণে স্ত্রীর স্বেচ্ছায় আত্মহত্যা) যাইতে চাহিতেছেন, তখন সরকারের কী (এতে অন্যরা প্রভাবিত হবে বলে সরকার অনুমতি দেয় না)? তাঁর যে আর তিলার্ধ বাঁচিতে সাধ (বিন্দুমাত্র বাঁচার ইচ্ছা নেই) নাই, এ কি তাহারা বুঝিবে না? তাহাদের ঘরে কি স্ত্রী নাই? তাহারা কি পাষাণ (স্বামী হারানোর শোক কি তারা বুঝে না)? আর এই রাত্রেই গ্রামের পাঁচজনে যদি নদীর তীরের কোন একটা জঙ্গলের মধ্যে তাঁর সহমরণের যোগাড় করিয়া দেয় ত পুলিশের লোক জানিবে কি করিয়া? এমনি কত কী (স্বামী শোকে পাগল)। কিন্তু আমার তো আর বসিয়া বসিয়া তাঁর কান্না শুনিলেই চলে না! পাড়ায় খবর দেওয়া চাই—অনেক জিনিস যোগাড় করা চাই (মৃতদেহ সৎকারের ব্যবস্থা)। কিন্তু আমার বাহিরে যাইবার প্রস্তাব শুনিয়াই তিনি প্রকৃতিস্থ (জ্ঞান ফিরে পাওয়া) হইয়া উঠিলেন। চোখ মুছিয়া বলিলেন, ভাই, যা হবার সে ত হইয়াছে, আর বাইরে গিয়ে কি হইবে? রাতটা কাটুক না। (নিজের ভয়কে আড়াল করার চেষ্টা)
বলিলাম, অনেক কাজ, না গেলেই যে নয়।
তিনি বলিলেন, হোক কাজ, তুমি বসো।
বলিলাম, বসলে চলবে না, একবার খবর দিতেই হইবে, বলিয়া পা বাড়াইবামাত্রেই তিনি চিৎকার করিয়া উঠিলেন, ওরে বাপরে! আমি একলা থাকতে পারব না।
কাজেই আবার বসিয়া পড়িতে হইল। কারণ, তখন বুঝিলাম, যে-স্বামী জ্যান্ত থাকিতে তিনি নির্ভয়ে পঁচিশ বৎসর একাকী ঘর করিয়াছেন, তাঁর মৃত্যুটা যদি বা সহে, তাঁর মৃতদেহটা এই অন্ধকার রাত্রে পাঁচ মিনিটের জন্যও সহিবে না (স্বামীর মৃত্যু মেনে নিলেও মৃতদেহের সাথে থাকাটা মেনে নিতে পারবে না)। বুক যদি কিছুতে ফাটে (যন্ত্রণা যদি কিছুতে হয়) তো সে এই মৃত স্বামীর কাছে একলা থাকিলে।

কিন্তু দুঃখটা তাঁহার তুচ্ছ করিয়া দেখানও আমার উদ্দেশ্য নহে। কিংবা তাহা খাঁটি নয় (স্বাভাবিক ভয় দিয়ে প্রকৃত ভালোবাসা প্রমাণ করা যায় না) এ কথা বলাও আমার অভিপ্রায় নহে। কিংবা একজনের ব্যবহারেই তাহার চূড়ান্ত মীমাংসা হইয়া গেল তাহাও নহে। কিন্তু এমন আরও অনেক ঘটনা জানি, যাহার উল্লেখ না করিয়াও আমি এই কথা বলিতে চাই যে, শুধু কর্তব্য-জ্ঞানের জোরে অথবা বহুকাল ধরিয়া একসঙ্গে ঘর করার অধিকারেই এই ভয়টাকে (মুমূর্ষু রোগী নিয়ে থাকা) কোন মেয়েমানুষই অতিক্রম করিতে পারে না। ইহা আর একটা শক্তি (নিঃস্বার্থ ভালোবাসার শক্তি) যাহা বহু স্বামী-স্ত্রী একশ বৎসর একত্রে ঘর করার পরেও হয়ত তাহার কোন সন্ধান পায় না। (বিলাসী ও মৃত্যুঞ্জয়ের প্রেমের মহিমা)
কিন্তু সহসা সেই শক্তির পরিচয় যখন কোন নরনারীর কাছে পাওয়া যায়, তখন সমাজের আদালতে আসামী করিয়া তাহাদের দণ্ড দেওয়ায় আবশ্যক যদি হয় তো হোক, কিন্তু মানুষের যে বস্তুটি সামাজিক নয় (মানুষের ব্যক্তিগত ভালোবাসা যখন সমাজের কাঠগড়ায় বিচারের সম্মুখীন হয়), সে নিজে যে ইহাদের দুঃখে গোপনে অশ্রু বিসর্জন না করিয়া কোন মতেই থাকিতে পারে না।

প্রায় মাস-দুই মৃত্যুঞ্জয়ের খবর লই নাই। যাঁহারা পল্লিগ্রাম দেখেন নাই কিংবা ওই রেলগাড়ির জানালায় মুখ বাড়াইয়া দেখিয়াছেন (পল্লীগ্রাম সম্পর্কে সুধারণা রাখেন), তাঁহারা হয়ত সবিস্ময়ে বলিয়া উঠিবেন, এ কেমন কথা? এ কি কখনো সম্ভব হইতে পারে যে অত-বড় অসুখটা চোখে দেখিয়া আসিয়াও মাস-দুই আর তার খবরই নাই (এতটা অকৃতজ্ঞতাবোধ দেখানো)? তাঁহাদের অবগতির জন্য বলা আবশ্যক যে, এ শুধু সম্ভব নয়, এই হইয়া থাকে। একজনের বিপদে (ধনী ও গরিবের ব্যাপারে গ্রামবাসীর দ্বিমুখী আচরণ) পাড়াসুদ্ধ ঝাঁক বাঁধিয়া উপুড় হইয়া পড়ে, এই যে একটা জনশ্রুতি আছে, জানি না তাহা সত্যযুগের (পুরাণে বর্ণিত প্রথম যুগ) পল্লীগ্রামের ছিল কি না, কিন্তু একালে তো কোথাও দেখিয়াছি বলিয়া মনে করিতে পারি না। তবে তাহার মরার খবর যখন পাওয়া যায় নাই, তখন সে যে বাঁচিয়া আছে এ ঠিক (নেতিবাচক কথাই অধিক প্রচার করা হয়। সুতরাং তার মরার সংবাদ পাওয়া না গেলে সে জীবিত আছে, এটাই মনে করতে হবে)।

এমনি সময়ে হঠাৎ একদিন কানে গেল, মৃত্যুঞ্জয়ের সেই বাগানের অংশীদার খুড়া তোলপাড় করিয়া বেড়াইতেছে যে, গেল—গেল, গ্রামটা এবার রসাতলে (অধঃপতন) গেল! নালতের (গ্রামের নাম) মিত্তির (মিত্র) বলিয়া সমাজে আর তাঁর মুখ বাহির (ধর্মবিরোধী কাজ করায়) করিবার জো রহিল না—অকালকুষ্মাণ্ডটা একটা সাপুড়ের মেয়ে নিকা (তাচ্ছিল্য) করিয়া ঘরে আনিয়াছে। আর শুধু নিকা নয়, তাও না হয় চুলায় যাক, তাহার হাতে ভাত পর্যন্ত খাইতেছে! গ্রামে যদি ইহার শাসন না থাকে (সম্পত্তি দখলের জন্য গ্রামবাসীকে উত্তেজিত করা) তো বনে গিয়া বাস করিলেই ত হয়! কোড়োলা, হরিপুরের সমাজ এ কথা শুনিলে যে—ইত্যাদি ইত্যাদি।

তখন ছেলে-বুড়ো সকলের মুখের ঐ এক কথা,—অ্যাঁ—এ হইল কি? কলি (পুরাণে বর্ণিত শেষ যুগ) কি সত্যই উলটাইতে বসিল! (পৃথিবী কি ধ্বংসের দ্বারপ্রান্তে পৌঁছে গেল)
খুড়া বলিয়া বেড়াইতে লাগিলেন, এ যে ঘটিবে (ধর্মহীন কাজ), তিনি অনেক আগেই জানিতেন। তিনি শুধু তামাশা দেখিতেছিলেন; কোথাকার জল কোথায় গিয়া পড়ে (অপরাধকে প্রশ্রয় দেওয়া)। নইলে পর নয়, প্রতিবেশী নয়, আপনার ভাইপো! তিনি কি বাড়ি লইয়া যাইতে পারিতেন না? তাঁহার কি ডাক্তার বৈদ্য দেখাইবার ক্ষমতা ছিল না? তবে কেন যে করেন নাই, এখন দেখুন সবাই। কিন্তু আর তো চুপ করিয়া থাকা যায় না! এ যে মিত্তির বংশের নাম ডুবিয়া যায়! গ্রামের যে মুখ পোড়ে! (গ্রামের কলঙ্ক হয়)

তখন আমরা গ্রামের লোক মিলিয়া যে কাজটা করিলাম, তাহা মনে করিলে আমি আজও লজ্জায় মরিয়া যাই (বিলাসীকে মারায় অনুশোচনা)। খুড়া চলিলেন নালতের মিত্তির-বংশের অভিভাবক হইয়া, আর আমরা দশ-বারোজন সঙ্গে চলিলাম গ্রামের বদন দগ্ধ না হয় এইজন্য (গ্রামের যেন দুর্নাম না হয়)।
মৃত্যুঞ্জয়ের পোড়ো-বাড়িতে গিয়া যখন উপস্থিত হইলাম তখন সবেমাত্র সন্ধ্যা হইয়াছে। মেয়েটি ভাঙ্গা বারান্দায় একধারে রুটি গড়িতেছিল, অকস্মাৎ লাঠিসোঁটা হাতে এতগুলি লোককে উঠানের উপর দেখিয়া ভয়ে নীলবর্ণ হইয়া গেল (ফ্যাকাশে বর্ণ ধারণ করা)।

খুড়ো ঘরের মধ্যে উঁকি মারিয়া দেখিলেন মৃত্যুঞ্জয় শুইয়া আছে। চট করিয়া শিকলটা টানিয়া দিয়া (যাতে মৃত্যুঞ্জয় প্রতিবাদ না করতে পারে), সেই ভয়ে মৃতপ্রায় মেয়েটিকে সম্ভাষণ (গালিগালাজ) শুরু করিলেন। বলা বাহুল্য, জগতের কোন খুড়া কোনো কালে বোধ করি ভাইপোর স্ত্রীকে ওরূপ সম্ভাষণ (এমন গালিগালাজ করে হীনম্মন্যতার পরিচয় দেয়নি) করে নাই। সে এমনি যে, মেয়েটি হীন সাপুড়ের মেয়ে হইয়াও তাহা সহিতে পারিল না (আত্মমর্যাদায় আঘাত), চোখ তুলিয়া বলিল, বাবা আমারে বাবুর সাথে নিকে দিয়েছে জানো! (প্রতিবাদ)

খুড়া বলিলেন, তবে রে! ইত্যাদি ইত্যাদি। এবং সঙ্গে সঙ্গেই দশ-বারোজন বীরদর্পে হুঙ্কার দিয়া তাহার ঘাড়ে পড়িল। কেহ ধরিল চুলের মুঠি, কেহ ধরিল কান, কেহ ধরিল হাত-দুটো—এবং যাহাদের সে সুযোগ ঘটিল না, তাহারাও নিশ্চেষ্ট হইয়া রহিল না (অন্যরা বিলাসীকে মারতে উত্তেজিত করতে থাকে)।
কারণ, সংগ্রাম-স্থলে আমরা কাপুরুষের ন্যায় চুপ করিয়া থাকিতে পারি, আমাদের বিরুদ্ধে এতবড় দুর্নাম রটনা করিতে বোধ করি নারায়ণের কর্তৃপক্ষেরও চক্ষুলজ্জা হইবে (কুরুক্ষেত্রে নারায়ণের নির্লজ্জ ভূমিকার চেয়ে বিলাসীকে মারতে গ্রামবাসীর ভূমিকা আরও নির্লজ্জ ছিল)। এইখানে একটা অবান্তর কথা বলিয়া রাখি। শুনিয়াছি নাকি বিলাত (ইংল্যান্ড) প্রভৃতি ম্লেচ্ছদেশে (অহিন্দু/ অসভ্য বর্বর দেশ) পুরুষদের মধ্যে একটা কুসংস্কার (ব্যঙ্গ) আছে, স্ত্রীলোক দুর্বল এবং নিরুপায় বলিয়া তাহার গায়ে হাত তুলিতে নাই (সমাজে দুর্বলের প্রতি নির্যাতনের চিত্র)। এ আবার একটা কী কথা! সনাতন হিন্দু (হিন্দুধর্মের পরিবর্তনে যারা বিশ্বাসী না) এ কুসংস্কার মানে না। আমরা বলি, যাহারই গায়ে জোর নাই, তাহারই গায়ে হাত তুলিতে পারা যায়। তা সে নর-নারী যাই হোক না কেন।

মেয়েটি প্রথমেই সেই যা একবার আর্তনাদ করিয়া উঠিয়াছিল, তারপরে একেবারে চুপ করিয়া গেল (শোক সহ্য করা)। কিন্তু আমরা যখন তাহাকে গ্রামের বাহিরে রাখিয়া আসিবার জন্য হিঁচড়াইয়া লইয়া চলিলাম, তখন সে মিনতি করিয়া বলিতে লাগিল, “বাবুরা, আমাকে একটিবার ছেড়ে দাও, আমি রুটিগুলো ঘরে দিয়ে আসি। বাইরে শিয়াল-কুকুরে খেয়ে যাবে—রোগা-মানুষ সমস্ত রাত খেতে পাবে না” (স্বামীর প্রতি যত্নশীল মনোভাব)।

মৃত্যুঞ্জয় রুদ্ধ-ঘরের (বদ্ধ ঘর) মধ্যে পাগলের মতো মাথা কুটিতে লাগিল (ক্রমাগত আঘাত করা), দ্বারে পদাঘাত করিতে লাগিল এবং শ্রাব্য-অশ্রাব্য বহুবিধ ভাষা (গালাগাল) প্রয়োগ করিতে লাগিল। কিন্তু আমরা তাহাতে তিলার্ধ বিচলিত হইলাম না (গ্রামবাসী মৃত্যুঞ্জয়ের গালাগালে প্রতিক্রিয়া না জানানো)। স্বদেশের মঙ্গলের জন্য সমস্ত অকাতরে সহ্য করিয়া (গালাগাল) তাহাকে হিড়হিড় করিয়া টানিয়া লইয়া চলিলাম। (ব্যঙ্গ প্রকাশ ও সংকীর্ণ মানসিকতা)
চলিলাম বলিতেছি, কেননা আমিও বরাবর সঙ্গে ছিলাম, কিন্তু কোথায় আমার মধ্যে একটুখানি দুর্বলতা ছিল, আমি তাহার গায়ে হাত দিতে পারি নাই (পূর্ব পরিচয়ের কারণে)। বরঞ্চ কেমন যেন কান্না পাইতে লাগিল (বিলাসীর প্রতি সমবেদনা)। সে যে অত্যন্ত অন্যায় করিয়াছে এবং তাহাকে গ্রামের বাহির করাই উচিত বটে, কিন্তু এটাই যে আমরা ভালো কাজ করিতেছি, সেও কিছুতে মনে করিলাম না। কিন্তু আমার কথা যাক।

আপনারা মনে করিবেন না, পল্লীগ্রামে উদারতার একান্ত অভাব। মোটেই না। বরঞ্চ বড়লোক হইলে আমরা এমন সব ঔদার্য প্রকাশ করি যে, শুনিলে আপনারা অবাক হইয়া যাইবেন।
এই মৃত্যুঞ্জয়টাই যদি না তাহার হাতে ভাত খাইয়া অমার্জনীয় অপরাধ করিত, তা হইলে ত আমাদের এত রাগ হইত না। আর কায়েতের (জাত) ছেলের সঙ্গে সাপুড়ের মেয়ের নিকা—এ তো একটা হাসিয়া উড়াইবার কথা! কিন্তু কাল (ধর্মের অবমাননা) করিল যে ঐ ভাত খাইয়া! হোক না সে আড়াই মাসের রোগী, হোক না সে শয্যাশায়ী! কিন্তু তাই বলিয়া ভাত! লুচি নয়, সন্দেশ নয়, পাঁঠার মাংস নয়! ভাত খাওয়া যে অন্ন-পাপ! সে ত আর সত্য সত্যই মাপ করা যায় না! তা নইলে পল্লীগ্রামের লোক সংকীর্ণচিত্ত নয়। চার-ক্রোশ-হাঁটা-বিদ্যা যেসব ছেলের পেটে, তারাই তো একদিন বড় হইয়া সমাজের মাথা (নেতা) হয়! দেবী বীণাপাণির বরে (সরস্বতী দেবীর আশীর্বাদে) সঙ্কীর্ণতা তাহাদের মধ্যে আসিবে কি করিয়া!

এই তো ইহারই কিছুদিন পরে প্রাতঃস্মরণীয় স্বর্গীয় মুখোপাধ্যায় মহাশয়ের বিধবা পুত্রবধূ মনের বৈরাগ্যে বছর-দুই কাশীবাস করিয়া যখন ফিরিয়া আসিলেন, তখন নিন্দুকেরা কানাকানি করিতে লাগিল যে, অর্ধেক সম্পত্তি ঐ বিধবার এবং পাছে তাহা বেহাত হয়, এই ভয়েই ছোটবাবু অনেক চেষ্টা অনেক পরিশ্রমের পর বৌঠানকে যেখান হইতে ফিরাইয়া আনিয়াছেন, সেটা কাশীই বটে। (স্বামীর মৃত্যুর শোকে স্ত্রী বাড়ির বাইরে চলে যায়। স্ত্রীলোকটি দেহব্যবসায় বা ইত্যাদি অপকর্মের সাথে জড়িত ছিল। পরবর্তীতে সম্পত্তি বণ্টনের সময় মহিলাকে সেখান থেকে আনা হয়। তখন গ্রামবাসী কানাকানি করলে গ্রামের ব্রাহ্মণদের ঘুস দিয়ে মহিলা সম্পর্কে চারিত্রিক সার্টিফিকেট নেওয়া হয়।) যাই হোক, ছোটবাবু তাহার স্বাভাবিক ঔদার্যে, গ্রামের বারোয়ারি পূজা (সব গ্রাম মিলে যে পূজা হয়) বাবদ দুইশত টাকা দান করিয়া, পাঁচখানা গ্রামের ব্রাহ্মণের সদক্ষিণা উত্তম ফলাহারের পর, প্রত্যেক সদব্রাহ্মণের হাতে যখন একটা করিয়া কাঁসার গেলাস দিয়া বিদায় করিলেন, তখন ধন্য ধন্য পড়িয়া গেল। এমনকি পথে আসিতে অনেকেই দেশের এবং দশের কল্যাণের নিমিত্ত কামনা করিতে লাগিলেন, এমন সব যারা বড়লোক, তাদের বাড়িতে বাড়িতে, মাসে মাসে এমন সব সদানুষ্ঠানের আয়োজন হয় না কেন? (ব্রাহ্মণদের চারিত্রিক অধঃপতন)

কিন্তু যাক। মহত্ত্বের কাহিনী আমাদের অনেক আছে। যুগে যুগে সঞ্চিত হইয়া প্রায় প্রত্যেকে পল্লীবাসীর দ্বারেই স্তূপাকার হইয়া উঠিয়াছে। এই দক্ষিণ বঙ্গের অনেক পল্লীতে অনেকদিন ঘুরিয়া গৌরব করিবার মত অনেক বড় বড় ব্যাপার প্রত্যক্ষ করিয়াছি। চরিত্রেই বল, ধর্মেই বল, সমাজেই বল, আর বিদ্যাতেই বল, শিক্ষা একেবারেই পুরা হইয়া আছে; এখন শুধু ইংরাজকে কষিয়া গালিগালাজ করিতে পারিলেই দেশটা উদ্ধার হইয়া যায়। (ব্যঙ্গ প্রকাশ)

বৎসর-খানেক গত হইয়াছে। মশার কামড় আর সহ্য করিতে না পারিয়া সবেমাত্র সন্ন্যাসীগিরিতে ইস্তফা দিয়া ঘরে ফিরিয়াছি। একদিন দুপুরবেলা ক্রোশ-দুই দূরের মালোপাড়ার ভিতর দিয়া চলিয়াছি, হঠাৎ দেখি, একটা কুটিরের (কুঁড়েঘর) দ্বারে বসিয়া মৃত্যুঞ্জয়। তার মাথায় গেরুয়া রঙের (কিছুটা কমলা রং) পাগড়ি, বড় বড় দাড়ি-চুল, গলায় রুদ্রাক্ষ ও পুঁতির মালা—কে বলিবে এ আমাদের সেই মৃত্যুঞ্জয় (অবয়ব পরিবর্তনের কারণে)! কায়স্থের ছেলে একটা বছরের মধ্যেই জাত দিয়া (জাত বিসর্জন) একেবারে পুরাদস্তুর সাপুড়ে হইয়া গেছে।

মানুষ কত শীঘ্র যে তাহার চৌদ্দ-পুরুষের জাতটা বিসর্জন দিয়া আর একটা জাত হইয়া উঠিতে পারে, সে এক আশ্চর্য ব্যাপার। ব্রাহ্মণের ছেলে মেথরানি বিবাহ করিয়া মেথর হইয়া গেছে এবং তাহাদের ব্যবসা অবলম্বন করিয়াছে, এ বোধ করি আপনারা সবাই শুনিয়াছেন। আমি সদব্রাহ্মণের ছেলেকে এন্ট্রান্স পাস করার পরেও ডোমের মেয়ে বিবাহ করিয়া ডোম (নীচু বর্ণের লোক যারা মূলত মৃতদেহ ব্যবচ্ছেদ করে) হইতে দেখিয়াছি। এখন সে ধুচুনি কুলো (চাল ধোয়ার কুলো) বুনিয়া বিক্রয় করে, শুয়ার চরায়। ভাল কায়স্থ-সন্তানকে কসাইয়ের মেয়ে বিবাহ করিয়া কসাই হইয়া যাইতেও দেখিয়াছি। আজ সে স্বহস্তে গরু কাটিয়া বিক্রয় করে—তাহাকে দেখিয়া কাহার সাধ্য বলে, কোনো কালে সে কসাই ভিন্ন আর-কিছু ছিল! কিন্তু, সকলেরই ওই একই হেতু (স্ত্রীর প্রতি ভালোবাসা)। আমার তাই তো মনে হয়, এমন করিয়া এত সহজে পুরুষকে যাহারা টানিয়া নামাইতে পারে (স্ত্রীর অবদান), তাহারা কি এমনিই অবলীলাক্রমে তাহাদের ঠেলিয়া উপরে তুলিতে পারে না? যে পল্লীগ্রামের পুরুষদের সুখ্যাতিতে আজ পঞ্চমুখ (প্রশংসায় পূর্ণ) হইয়া উঠিয়াছি, গৌরবটা কি একা শুধু তাহাদেরই? শুধু নিজেদের জোরেই এত দ্রুত নিচের দিকে নামিয়া চলিয়াছে! অন্দরের দিক হইতে কি এতটুকু উৎসাহ, এতটুকু সাহায্য আসে না? (স্ত্রীদের উৎসাহেই পুরুষদের উত্থান-পতন হয়)

কিন্তু থাক। ঝোঁকের মাথায় হয়ত বা অনধিকার চর্চা (সমাজ নিয়ে সমালোচনা) করিয়া বসিব। কিন্তু আমার মুশকিল হইয়াছে এই যে, আমি কোনমতেই ভুলিতে পারি না, দেশের নব্বইজন নর-নারীই ঐ পল্লীগ্রামেরই মানুষ এবং সেইজন্য কিছু একটা আমাদের করা চাই-ই (সামাজিক উন্নতি করা)। যাক। বলিতেছিলাম যে, দেখিয়া কে বলিবে এই সেই মৃত্যুঞ্জয়। কিন্তু আমাকে সে খাতির করিয়া বসাইল। বিলাসী পুকুরে জল আনিতে গিয়াছিল, আমাকে দেখিয়া সেও ভারি খুশি হইয়া বার বার বলিতে লাগিল, তুমি না আগলালে সে রাত্তিরে আমাকে তারা মেরেই ফেলত। আমার জন্যে কত মারই না জানি তুমি খেয়েছিলে।
কথায় কথায় শুনিলাম, পরদিনই তাহারা এখানে উঠিয়া আসিয়া ক্রমশঃ ঘর বাঁধিয়া বাস করিতেছে এবং সুখে আছে। সুখে যে আছে, এ কথা আমাকে বলার প্রয়োজন ছিল না, শুধু তাহাদের মুখের পানে চাহিয়াই আমি তাহা বুঝিয়াছিলাম (সুখের অনুভূতি চেহারায় ফুটে উঠে)।

তাই শুনিলাম, আজ কোথায় নাকি তাহাদের সাপ-ধরার বায়না (চুক্তি) আছে এবং তাহারা প্রস্তুত হইয়াছে, আমিও অমনি সঙ্গে যাইবার জন্য লাফাইয়া উঠিলাম। ছেলেবেলা হইতেই দুটো জিনিসের উপর আমার প্রবল শখ ছিল। এক ছিল গোখরা সাপ ধরিয়া পোষা, আর ছিল মন্ত্র-সিদ্ধ হওয়া।
সিদ্ধ হওয়ার (কবিরাজি বিদ্যায় পারদর্শী) উপায় তখনো খুঁজিয়া বাহির করিতে পারি নাই, কিন্তু মৃত্যুঞ্জয়কে ওস্তাদ লাভ করিবার আশায় আনন্দে উৎফুল্ল হইয়া উঠিলাম। সে তাহার নামজাদা শ্বশুরের শিষ্য, সুতরাং মস্ত লোক। আমার ভাগ্য যে অকস্মাৎ এমন সুপ্রসন্ন হইয়া উঠিবে, তাহা কে ভাবিতে পারিত?
কিন্তু শক্ত কাজ এবং ভয়ের কারণ আছে বলিয়া প্রথমে তাহারা উভয়েই আপত্তি করিল, কিন্তু আমি এমনি নাছোড়বান্দা হইয়া উঠিলাম যে, মাস-খানেকের মধ্যে আমাকে সাগরেদ (শিক্ষার্থী বানাতে) করিতে মৃত্যুঞ্জয় পথ পাইল না। সাপ ধরার মন্ত্র এবং হিসাব শিখাইয়া দিল এবং কবজিতে ওষুধ-সমেত মাদুলি বাঁধিয়া দিয়া দস্তুরমত সাপুড়ে বানাইয়া তুলিল।

মন্ত্রটা কি জানেন? তার শেষটা আমার মনে আছে—
ওরে কেউটে তুই মনসার বাহন—
মনসা দেবী আমার মা—
ওল্‌ট পালট পাতাল-ফোঁড়—
ঢোঁড়ার (নির্বিষ সাপ) বিষ তুই নে, তোর বিষ ঢোঁড়ারে দে
—দুধরাজ, মণিরাজ!
কার আজ্ঞা—বিষহরির আজ্ঞা।

ইহার মানে যে কি, তাহা আমি জানি না (মন্ত্রের সত্য-মিথ্যা যাচাই না করা)। কারণ, যিনি এই মন্ত্রের দ্রষ্টা ঋষি (সাধনা বলে মন্ত্র পাওয়া) ছিলেন—নিশ্চয়ই কেহ না কেহ ছিলেন—তাঁর সাক্ষাৎ কখনো পাই নাই।
অবশেষে একদিন এই মন্ত্রের সত্য-মিথ্যার চরম মীমাংসা হইয়া গেল বটে, কিন্তু যতদিন না হইল, ততদিন সাপ ধরার জন্য চতুর্দিকে প্রসিদ্ধ হইয়া গেলাম। সবাই বলাবলি করিতে লাগিল, হ্যাঁ, ন্যাড়া একজন গুণী লোক বটে। সন্ন্যাসী অবস্থায় কামাখ্যায় (আসামের একটি অঞ্চল) গিয়া সিদ্ধ হইয়া আসিয়াছে। এতটুকু বয়সের মধ্যে এতবড় ওস্তাদ হইয়া অহংকারে আমার আর মাটিতে পা পড়ে না, এমনি জো হইল।

বিশ্বাস করিল না শুধু দুইজন। আমার গুরু যে, সে তো ভালো-মন্দ কোন কথাই বলিত না। কিন্তু বিলাসী মাঝে মাঝে মুখ টিপিয়া হাসিয়া বলিত (রসিকতা), “ঠাকুর, এসব ভয়ঙ্কর জানোয়ার, একটু সাবধানে নাড়াচাড়া করো।” বস্তুতঃ বিষদাঁত ভাঙ্গা, সাপের মুখ হইতে বিষ বাহির করা প্রভৃতি কাজগুলা এমনি অবহেলার সহিত করিতে শুরু করিয়াছিলাম যে, সেসব মনে পড়িলে আমার আজও গা কাঁপে। (তখন ভয়ংকর কাজের কথা মনে করে)
আসল কথা হইতেছে এই যে, সাপধরাও কঠিন নয় এবং ধরা সাপ দুই-চারদিন হাঁড়িতে পুরিয়া রাখার পরে তাহার বিষদাঁত ভাঙ্গাই হোক, আর নাই হোক কিছুতেই কামড়াইতে চাহে না। চক্র (ফণা) তুলিয়া কামড়াইবার ভান করে, ভয় দেখায়, কিন্তু কামড়ায় না।

মাঝে মাঝে আমাদের গুরু-শিষ্যের সহিত বিলাসী তর্ক করিত। সাপুড়েদের সবচেয়ে লাভের ব্যবসা হইতেছে শিকড় বিক্রি করা (প্রতারণামূলক ব্যবসায়), যা দেখাইবামাত্র সাপ পলাইতে পথ পায় না (শিকড়কে অস্ত্র মনে করে ভয়ে পালিয়ে যায়)। কিন্তু তার পূর্বে সামান্য একটু কাজ করিতে হইত, যে-সাপটা শিকড় দেখিয়া পলাইবে, তাহার মুখে একটা শিক পুড়াইয়া বারকয়েক ছ্যাঁকা দিতে হয়। তারপরে তাহাকে শিকড়ই দেখান হোক আর একটা কাঠিই দেখান হোক, সে যে কোথায় পলাইবে ভাবিয়া পায় না। এই কাজটার বিরুদ্ধে বিলাসী ভয়ানক আপত্তি করিয়া মৃত্যুঞ্জয়কে বলিত, দেখ, এমন করিয়া মানুষ ঠকাইয়ো না।
মৃত্যুঞ্জয় কহিত, সবাই করে—এতে দোষ কি? (নিজের অপরাধ হালকা মনে করা)
বিলাসী বলিত, করুগ গে সবাই। আমাদের তো খাবার ভাবনা নেই, আমরা কেন মিছিমিছি লোক ঠকাতে যাই?
আর একটা জিনিস আমি বরাবর লক্ষ্য করিয়াছি। সাপ-ধরার বায়না আসিলেই বিলাসী নানাপ্রকারে বাধা দিবার চেষ্টা করিত (স্বামী যেন ঝুঁকিপূর্ণ কাজে না যায়)—আজ শনিবার, আজ মঙ্গলবার, এমনি কত কি। মৃত্যুঞ্জয় উপস্থিত না থাকিলে সে তো একেবারেই ভাগাইয়া দিত, কিন্তু উপস্থিত থাকিলে মৃত্যুঞ্জয় নগদ টাকার লোভ সামলাইতে পারিত না। আর আমার তো একরকম নেশার মত হইয়া দাঁড়াইয়াছিল। নানাপ্রকারে তাহাকে উত্তেজিত করিতে চেষ্টার ত্রুটি করিতাম না। বস্তুতঃ ইহার মধ্যে মজা ছাড়া ভয় যে কোথাও ছিল, এ আমাদের মনেই স্থান পাইত না। কিন্তু এই পাপের দণ্ড আমাকে একদিন ভালো করিয়াই দিতে হইল।

সেদিন ক্রোশ-দেড়েক দূরে এক গোয়ালার বাড়ি সাপ ধরিতে গিয়াছি। বিলাসী বরাবরই সঙ্গে যাইত, আজও সঙ্গে ছিল। মেটে-ঘরের মেঝে খানিকটা খুঁড়িতেই একটা গর্তের চিহ্ন পাওয়া গেল। আমরা কেহই লক্ষ্য করি নাই, কিন্তু বিলাসী সাপুড়ের মেয়ে—সে হেঁট হইয়া কয়েক টুকরা কাগজ তুলিয়া লইয়া আমাকে বলিল, ঠাকুর, একটু সাবধানে খুঁড়ো। সাপ একটা নয়, এক জোড়া তো আছে বটেই, হয়ত বা বেশিও থাকিতে পারে।

মৃত্যুঞ্জয় বলিল, “এরা যে বলে একটাই এসে ঢুকেছে। একটাই দেখতে পাওয়া গেছে।”
বিলাসী কাগজ দেখাইয়া কহিল, “দেখছ না বাসা করেছিল?”
মৃত্যুঞ্জয় কহিল, “কাগজ তো ইঁদুরেও আনতে পারে!” (সাপ ইঁদুরের বাসা দখল করে। বিলাসীর কথা গুরুত্বহীন মনে করা)
বিলাসী কহিল, দুই-ই হতে পারে। কিন্তু দুটো আছেই আমি বলছি।

বাস্তবিক বিলাসীর কথাই ফলিল এবং মর্মান্তিকভাবেই সেদিন ফলিল। মিনিট দশেকের মধ্যেই একটা প্রকাণ্ড খরিশ গোখরো ধরিয়া ফেলিয়া মৃত্যুঞ্জয় আমার হাতে দিল। কিন্তু সেটাকে ঝাঁপির মধ্যে পুরিয়া ফিরিতে না ফিরিতে মৃত্যুঞ্জয় উঃ—করিয়া নিঃশ্বাস ফেলিয়া বাহিরে আসিয়া দাঁড়াইল। তাহার হাতের উলটা পিঠ দিয়া ঝরঝর করিয়া রক্ত পড়িতেছিল।

প্রথমটা সবাই যেন হতবুদ্ধি (আকস্মিক বিপদের কারণে) হইয়া গেলাম। কারণ, সাপ ধরিতে গেলে সে পলাইবার জন্য ব্যাকুল না হইয়া বরঞ্চ গর্ত হইতে একহাত মুখ বাহির করিয়া দংশন করে, এমন অভাবনীয় ব্যাপার জীবনে এই একটিবার মাত্র দেখিয়াছি। পরক্ষণেই বিলাসী চিৎকার করিয়া ছুটিয়া গিয়া আঁচল দিয়া তাহার হাতটা বাঁধিয়া ফেলিল এবং যত রকমের শিকড়-বাকড় সে সঙ্গে আনিয়াছিল, সমস্তই তাহাকে চিবাইতে দিল (ভেষজ চিকিৎসা)। মৃত্যুঞ্জয় নিজের মাদুলি তো ছিলই, তাহার উপরে আমার মাদুলিটাও খুলিয়া তাহার হাতে বাঁধিয়া দিলাম। আশা, বিষ ইহার ঊর্ধ্বে আর উঠিবে না বরং আমার সেই ‘বিষহরির আজ্ঞা’ মন্ত্রটা সতেজে বারবার আবৃত্তি করিতে লাগিলাম। চতুর্দিকে ভিড় জমিয়া গেল এবং অঞ্চলের মধ্যে যেখানে যত গুণী (সাপের ব্যাপারে পারদর্শী) ব্যক্তি আছেন, সকলকে খবর দিবার জন্য দিকে দিকে লোক ছুটিল। বিলাসীর বাপকেও সংবাদ দিবার জন্য লোক গেল।

আমার মন্ত্র পড়ার আর বিরাম নাই কিন্তু ঠিক সুবিধা হইতেছে বলিয়া মনে হইল না। তথাপি আবৃত্তি সমভাবেই চলিতে লাগিল। কিন্তু মিনিট পনের-কুড়ি পরেই যখন মৃত্যুঞ্জয় একবার বমি করিয়া দিল, তখন বিলাসী মাটির উপরে একেবারে আছাড় খাইয়া পড়িল। আমিও বুঝিলাম, আমার বিষহরির দোহাই (মন্ত্রের কার্যকারিতা নেই) বুঝি বা আর খাটে না।

নিকটবর্তী আরও দুই-চারিজন ওস্তাদ আসিয়া পড়িলেন এবং আমরা কখনো বা একসঙ্গে, কখনো বা আলাদা তেত্রিশ কোটি (তেত্রিশ প্রকার) দেব-দেবীর দোহাই পাড়িতে লাগিলাম। কিন্তু বিষ দোহাই মানিল না, রোগীর অবস্থা ক্রমেই মন্দ হইতে লাগিল। যখন দেখা গেল ভালো কথায় হইবে না, তখন তিন-চারজন ওঝা মিলিয়া বিষকে এমনি অকথ্য অশ্রাব্য গালিগালাজ করিতে লাগিল যে, বিষের কান থাকিলে সে মৃত্যুঞ্জয় তো মৃত্যুঞ্জয়, সেদিন দেশ ছাড়িয়া পলাইত (অপমানে বিষ দেশ ছেড়ে পালিয়ে যেত)। কিন্তু কিছুতেই কিছু হইল না। আরও আধ ঘণ্টা ধস্তাধস্তির পরে রোগী তাহার বাপ-মায়ের দেওয়া মৃত্যুঞ্জয় নাম, তাহার শ্বশুরের দেওয়া মন্ত্রৌষধি, সমস্ত মিথ্যা প্রতিপন্ন করিয়া ইহলোকের লীলা সাঙ্গ করিল। বিলাসী তাহার স্বামীর মাথাটা কোলে করিয়া বসিয়াছিল, সে যেন একেবারে পাথর (অধিক শোকে) হইয়া গেল।

যাক, তাহার দুঃখের কাহিনিটা আর বাড়াইব না। কেবল এইটুকু বলিয়া শেষ করিব যে, সে সাতদিনের বেশি বাঁচিয়া থাকাটা সহিতে পারিল না। আমাকে শুধু একদিন বলিয়াছিল, “ঠাকুর, আমার মাথার দিব্যি রইল, এসব তুমি আর কখনো করো না।” (এগুলো দেখলে স্বামীর কথা মনে পড়ে)
আমার মাদুলি-কবজ তো মৃত্যুঞ্জয়ের সঙ্গে সঙ্গে কবরে গিয়াছিল, ছিল শুধু বিষহরির আজ্ঞা। (মৃত্যুঞ্জয়ের মৃত্যুর সাথে সাথে সাপ ধরার অনুশীলন শেষ) কিন্তু সে আজ্ঞা যে ম্যাজিস্ট্রেটের আজ্ঞা (সাপের মন্ত্র ম্যাজিস্ট্রেটের আদেশের মতো সুদৃঢ় না) নয়, এবং সাপের বিষ যে বাঙ্গালির বিষ (কথায় সীমাবদ্ধ) নয়, তাহা আমিও বুঝিয়াছিলাম।

একদিন গিয়া শুনিলাম, ঘরে তো বিষের অভাব ছিল না, বিলাসী আত্মহত্যা করিয়া মরিয়াছে এবং শাস্ত্রমতে সে নিশ্চয়ই নরকে গিয়াছে। কিন্তু যেখানেই যাক, আমার নিজের যখন যাইবার সময় আসিবে, তখন ওইরূপ কোন একটা নরকে যাওয়ার প্রস্তাবে পিছাইয়া দাঁড়াইব না, এইমাত্র বলিতে পারি (ভালোবাসাহীন স্বর্গে যাওয়ার চেয়ে ভালোবাসাপূর্ণ নরকে যেতে চায়)।

খুড়ামশাই ষোল আনা বাগান দখল করিয়া অত্যন্ত বিজ্ঞের মত চারিদিকে বলিয়া বেড়াইতে লাগিলেন, ওর যদি না অপঘাতে (নিন্দা প্রকাশ) মৃত্যু হবে, তো হবে কার? পুরুষমানুষ অমন একটা ছেড়ে দশটা করুক না (নীচু বংশে বিবাহ), তাতে তো তেমন আসে-যায় না—না হয় একটু নিন্দাই হতো। কিন্তু হাতে ভাত খেয়ে মরতে গেলি কেন (বংশের অমর্যাদা)? নিজে মরলো, আমার পর্যন্ত মাথা হেঁট করে গেল। না পেলে একফোঁটা আগুন, না পেলে একটা পিণ্ডি (চালের গোলাকার পিঠা), না হলো একটা ভুজ্যি উচ্ছুগ্যু (ব্রাহ্মণদের জন্য উৎসর্গকৃত খাবার)।

গ্রামের লোক একবাক্যে বলিতে লাগিল, তাহাতে আর সন্দেহ কী! অন্নপাপ। বাপ রে! এর কি আর প্রায়শ্চিত্ত আছে!
বিলাসীর আত্মহত্যার ব্যাপারটাও অনেকের কাছে পরিহাসের বিষয় হইল। আমি প্রায় ভাবি, এ অপরাধ (পরস্পর ভালোবাসা) হয়ত ইহারা উভয়েই করিয়াছিল, কিন্তু মৃত্যুঞ্জয় তো পল্লীগ্রামেরই ছেলে, পাড়াগাঁয়ের তেলে-জলেই তো মানুষ (গ্রামের সংস্কৃতি মেনেই বড় হয়েছে)। তবু এত বড় দুঃসাহসের কাজে প্রবৃত্ত করাইয়াছিল তাহাকে যে বস্তুটা (বিলাসীর ভালোবাসা) সেটা কেহ একবার চোখ মেলিয়া দেখিতে পাইল না? (ভালোবাসা উপলব্ধি করতে না পারা)

আমার মনে হয় যে দেশের নর-নারীর মধ্যে পরস্পরের হৃদয় জয় করিয়া বিবাহ করিবার রীতি নাই, বরঞ্চ তাহা নিন্দার সামগ্রী, যে দেশের নর-নারী আশা করিবার (মন জয় করার) সৌভাগ্য, আকাঙ্ক্ষা করিবার ভয়ঙ্কর আনন্দ হইতে চিরদিনের জন্য বঞ্চিত, যাহাদের (মন) জয়ের গর্ব, পরাজয়ের ব্যথা, কোনটাই জীবনে একটিবারও বহন করিতে হয় না, যাহাদের ভুল করিবার দুঃখ, আর ভুল না করিবার আত্মপ্রসাদ, কিছুরই বালাই নাই, যাহাদের প্রাচীন এবং বহুদর্শী (অনেক দেখেছেন যিনি) বিজ্ঞ-সমাজ সর্বপ্রকারের হাঙ্গামা (সামাজিক কুপ্রথার প্রতিবাদ না করা) হইতে অত্যন্ত সাবধানে দেশের লোককে তফাত করিয়া, আজীবন কেবল ভালোটি হইয়া থাকিবারই ব্যবস্থা করিয়া দিয়াছেন, তাই বিবাহ-ব্যাপারটা যাহাদের শুধু নিছক contract তা সে যতই কেননা বৈদিক মন্ত্র দিয়া document পাকা করা হোক, সে দেশের লোকের সাধ্যই নাই মৃত্যুঞ্জয়ের অন্ন-পাপের কারণ বোঝে (ভালোবাসাহীন সমাজ ভালোবাসার কি বুঝবে?)। বিলাসীকে যাঁহারা পরিহাস করিয়াছিলেন, তাঁহারা সকলেই সাধু গৃহস্থ এবং সাধ্বী গৃহিণী—অক্ষয় সতীলোক তাঁহারা সবাই পাইবেন, তাও আমি জানি, কিন্তু সেই সাপুড়ের মেয়েটি যখন একটি পীড়িত শয্যাগত লোককে তিল তিল করিয়া (মন) জয় করিতেছিল, তাহার তখনকার সে গৌরবের কণামাত্রও হয়ত আজিও ইহাদের কেহ চোখে দেখেন নাই। মৃত্যুঞ্জয় হয়ত নিতান্তই একটা তুচ্ছ মানুষ ছিল, কিন্তু তাহার হৃদয় জয় করিয়া দখল করার আনন্দটাও তুচ্ছ নয়, সে সম্পদও অকিঞ্চিৎকর নহে।

এই বস্তুটাই এ দেশের লোকের পক্ষে বুঝিয়া ওঠা কঠিন। আমি ভূদেববাবুর পারিবারিক প্রবন্ধেরও দোষ দিব না এবং শাস্ত্রীয় তথা সামাজিক বিধি-ব্যবস্থারও নিন্দা করিব না। করিলেও, মুখের উপর কড়া জবাব দিয়া যাঁহারা বলিবেন, এই হিন্দু-সমাজ তাহার নির্ভুল বিধি-ব্যবস্থার জোরেই অত শতাব্দীর অতগুলা বিপ্লবের মধ্যে বাঁচিয়া আছে (হিন্দু সমাজ এখনো টিকে আছে- তার মানে এই ধর্মের নিয়ম সব সঠিক), আমি তাঁহাদেরও অতিশয় ভক্তি (ধর্মের প্রতি সম্মানবোধ) করি, প্রত্যুত্তরে আমি কখনই বলিব না, টিকিয়া থাকাই চরম সার্থকতা নয় এবং অতিকায় হস্তী লোপ পাইয়াছে কিন্তু তেলাপোকা টিকিয়া আছে (ধর্মের কুসংস্কারের প্রতি কটাক্ষ)। আমি শুধু এই বলিব যে, বড়লোকের নন্দগোপালটির মত দিবারাত্রি চোখে চোখে এবং কোলে কোলে রাখিলে যে সে বেশটি থাকিবে, তাহাতে কোন সন্দেহ নাই, কিন্তু একেবারে তেলাপোকাটির মতো বাঁচাইয়া (ব্যক্তিত্বহীন জীবন) রাখার চেয়ে এক-আধবার কোল হইতে নামাইয়া আরও পাঁচজন মানুষের মত দু-এক পা হাঁটিতে দিলেও প্রায়শ্চিত্ত করার মত পাপ হয় না।

শেষবেলায় খালে এখন পুরো ভাটা। জল নেমে গিয়ে কাদা আর ভাঙা ইটপাটকেল ও ওজনে ভারি আবর্জনা বেরিয়ে পড়েছে। কংক্রিটের (সিমেন্ট-বালু ও পথরকুচির সংমিশ্রণে তৈরি শক্ত ঢালাই) পুলের কাছে খালের ধারে লাগানো সালতি (শাল বা তালকাঠ দ্বারা নির্মিত সরু ডিঙ্গি নৌকা) থেকে খড় তোলা হচ্ছে পাড়ে। পাশাপাশি জোড়া লাগানো দুটো বড় সালতি বোঝাই আঁটিবাধা খড় তিনজনের মাথায় চড়ে গিয়ে জমা হচ্ছে ওপরের মস্ত গাদায়। ওঠানামার পথে ওরা খড় ফেলে নিয়েছে কাদায় (চলাচলের সুবিধার্থে)। সালতি থেকে ওদের মাথায় খড় তুলে দিচ্ছে দুজন। একজনের বয়স হয়েছে, আধপাকা চুল, রোগা শরীর। অন্যজন মাঝবয়সী, বেঁটে, জোয়ান, মাথায় ঠাসা কদমছাটা রুক্ষ চুল।
পুলের তলা দিয়ে ভাটার টান ঠেলে এগিয়ে এল সরু লম্বা আরেকটা সালতি, দু-হাত চওড়া হয়নি না হয়। দু-মাথায় দাঁড়িয়ে দুজন প্রৌঢ়া (প্রবীণ/ যৌবন ও বার্ধক্যের মধ্যবর্তী বয়ঃপ্রাপ্ত ব্যক্তি) বিধবা লগি (নৌকা ঠেলে চালানোর জন্য বাঁশের সরু ও লম্বা লাঠি/ আঁকশি) ঠেলছে, ময়লা মোটা থানের আঁচল দুজনেরই কোমরে বাঁধা। মাঝখানে গুটিসুটি (জড়সড়) হয়ে বসে আছে অল্পবয়সী একটি বৌ। গায়ে জামা আছে, নকশা পাড়ের সস্তা সাদা শাড়ি। আঁটসাঁট থমথমে গড়ন, গোলগাল মুখ।
“মাসি-পিসি ফিরছে কৈলেশ”, বুড়ো লোকটি (রহমান) বলল।
কৈলাশ বাহকের মাথায় খড় চাপাতে ব্যস্ত ছিল। চটপট শেষ আঁটিটা চাপিয়ে দিয়ে সে যখন ফিরল, মাসি-পিসির সালতি দু-হাতের (অতি নিকটে) মধ্যে এসে গেছে।
“ও মাসি, ওগো পিসি, রাখো রাখো। খপর আছে শুনে যাও।”
সামনের দিকে লগি পুঁতে মাসি-পিসি সালতির গতি ঠেকায়, আহ্লাদি সিঁথির সিঁদুর পর্যন্ত ঘোমটা (সামাজিক প্রথা) টেনে দেয়।। সামনে থেকে মাসি বলে বিরক্তির সঙ্গে, “বেলা আর নেই কৈলেশ।” পেছনে থেকে পিসি বলে, “অনেকটা পথ যেতে হবে কৈলেশ।”
মাসি-পিসির গলা ঝরঝরে (রুক্ষ মনোভাব), আওয়াজ একটু মোটা, একটু ঝংকার (তেজ) আছে। কৈলাশের খবরটা গোপন, দুজনে লম্বা লম্বা সালতির দু-মাথায় থাকলে সম্ভব নয় চুপে চুপে বলা (ব্যক্তিগত বিষয় সবাইকে জানাতে চায় না)। মাসি বড় সালতির খড় ঠেকানো বাঁশটা চেপে ধরে থাকে, পিসি লগি হাতে নিয়েই পিছন থেকে এগিয়ে আসে সামনের দিকে। আহ্লাদি যেখানে ছিল সেখানে বসেই কান পেতে রাখে। কথাবার্তা সে সব শুনতে পায় সহজেই। কারণ, সে যাতে শুনতে পায় এমনি করেই বলে কৈলাশ (স্বামীর ব্যাপারে আগ্রহী করে তুলতে)।“বলি মাসি, তোমাকেও বলি পিসি”, কৈলাশ শুরু করে, “মেয়াকে একদম শ্বশুরঘর পাঠাবে না মনে করেছ যদি, সে কেমন ধারা কথা হয়? এত বড় সোমত্ত (উপযুক্ত) মেয়া, তোমরা দুটি মেয়েলোক বাদে ঘরে একটা পুরুষমানুষ নেই (নিরাপত্তার ব্যবস্থা নেই), বিপদ-আপদ ঘটে যদি তো-”
মাসি বলে, “খুনসুটি (হাসি-তামাশার রসালাপ) রাখো দিকি কৈলেশ তোমার, মোদ্দাকথাটা কী তাই কও, বললে না যে খপর আছে, কী?”
পিসি বলে, “খপরটা কী তাই কও। বেলা বেশি নেই কৈলেশ।”
মাসি-পিসির সাথে পারা যাবে না (ভাব জমানো যাবে না) জানে কৈলাশ। অগত্যা ফেনিয়ে রসিয়ে বলবার বদলে সে সোজা কথায় আসে, “জগুর সাথে দেখা হলো কাল। খড় তুলে দিতে সাঁঝ (সন্ধ্যা) হয়ে গেল, তা দোকানে এটটু-মানে আর কি চা খেতে গেছি চায়ের দোকানে, জগুর সাথে দেখা।”
মাসি বলে, “চায়ের দোকান না কীসের দোকান তা বুঝিছি কৈলেশ, তা কথাটা কী?”
পিসি বলে, “সেথা ছাড়া (মদ-জুয়ার আড্ডা) আর ওকে (জগুকে) কোথা দেখবে। হাতে দুটো পয়সা এলে তোমারও স্বভাব বিগড়ে যায়। কৈলেশ। তা, কী বললে জগু?”
কৈলাশ ফাঁপরে (কথায় আটকে পড়া/ হতবুদ্ধি হওয়া) পড়ে আড়চোখে (বাঁকা দৃষ্টি) চায় আহ্লাদির দিকে (মনোভাব জানার চেষ্টা), হঠাৎ বেমক্কা জোরের সঙ্গে প্রতিবাদ করে যে (জোর গলায় মাসি-পিসির কথার প্রতিবাদ করে না), তা নয়, পুলের কাছেই চায়ের দোকান, মাসি-পিসি গিয়ে জিজ্ঞাসা করুক না সেখানে। তারপরেই জোর হারিয়ে বলে, “ওসব একরকম ছেড়ে দিয়েছে জগু। লোকটা কেমন বদলে গেছে মাসি, সত্যি কথা পিসি, জগু আর সেই জগু নেই (সহমর্মিতা প্রকাশ)। বৌকে নিতে চায় এখন। তোমরা নাকি পণ করেছ মেয়া পাঠাবে না, তাতেই চটে আছে। সম্মান তো আছে একটা মানুষের, কবার নিতে এল তা মেয়া দিলে না, তাই তো নিতে আসে না আর। আমি বলি কী, নিজেরা যেচে (আগ্রহ সহকারে) এবার পাঠিয়ে দেও মেয়াকে।”
মাসি বলে, “পেট শুকিয়ে লাথি ঝাঁটা খেতে? কলকেপোড়া ছ্যাঁকা (হুকার উপরে কলকেতে থাকা আগুন) খেতে? খুঁটির সাথে দড়িবাধা হয়ে থাকতে দিনভর রাতভর?”
পিসি-বলে, “মেয়া না পাঠাই, জামাই এলে রাখিনি জামাই-আদরে তাকে? ছাগলটা (সর্বস্ব দিয়ে আপ্যায়ন) বেচে দিয়ে খাওয়াইনি ভালোমন্দ দশটা জিনিস (পুরুষতান্ত্রিক সমাজের বৈশিষ্ট্য)?”
মাসি বলে, “ফের আসুক, আদরে রাখব যদ্দিন থাকে। বজ্জাত হোক, খুনে হোক, জামাই তো (প্রথানুগত্য)। ঘরে এলে খাতির না করব কেন? তবে মেয়া মোরা পাঠাব না।”
পিসি বলে, “নে কৈলেশ, মরতে মোরা মেয়াকে পাঠাব না।” (নির্যাতনকারীদের হাতে মেয়েকে তুলে দিব না)
বুড়ো রহমান একা খড় চাপিয়ে যায় বাহকদের মাথায়, চুপচাপ শুনে যায় এদের কথা। ছলছল চোখে একবার তাকায় (মেয়ের কথা মনে পড়ায়) আহ্লাদির দিকে। তার মেয়েটা শ্বশুরবাড়িতে মরেছে অল্পদিন আগে। কিছুতে যেতে চায়নি মেয়েটা, দাপাদাপি করে কেঁদেছে (বিলাপ করে কাঁদা) যাওয়া ঠেকাতে, ছোট অবুঝ মেয়ে (বাল্যবিবাহের ইঙ্গিত)। তার ভালোর জন্যেই তাকে জোর-জবরদস্তি করে পাঠিয়ে দিয়েছিল। আহ্লাদির সঙ্গে তার চেহারায় কোনো মিল নাই। বয়সে সে ছিল অনেক ছোট, চেহারা ছিল অনেক বেশি রোগা। তবু আহ্লাদির ফ্যাকাশে (রক্তশূন্য) মুখে তারই মুখের ছাপ রহমান দেখতে পায়, খড়ের আঁটি তুলে দেবার ফাঁকে ফাঁকে যখনই সে তাকায় আহ্লাদির দিকে।
কৈলাশ বলে, “তবে আসল কথাটা বলি। জগু মোকে বললে, এবার সে মামলা করবে বৌ নেবার জন্য। তার বিয়ে করা বৌকে তোমরা আটকে রেখেছ বদ মতলবে (আহ্লাদির বাবার বাড়ি দখল করতে)। মামলা করলে বিপদে পড়বে। সোয়ামি নিতে চাইলে বৌকে আটকে রাখার আইন নেই। জেল হয়ে যাবে তোমাদের। আর যেমন বুঝলাম, মামলা জগু করবেই আজকালের মধ্যে। মরবে তোমরা জান মাসি (ভীষণ বিপদে পড়া), জান পিসি, মারা পড়বে তোমরা একেবারে।”
আহ্লাদি একটা শব্দ করে, অস্ফুট আর্তনাদের মতো (মাসি পিসির সমস্যার কথা ভেবে)। মাসি ও পিসি মুখ চাওয়া-চাওয়ি করে কয়েকবার। মনে হয়, মনে তাদের একই কথা উদয় হয়েছে, চোখে চোখে চেয়ে সেটা শুধু জানাজানি করে নিল তারা।
মাসি বলল, “জেলে নয় গেলাম কৈলেশ, কিন্তু মেয়া যদি সোয়ামির কাছে না যেতে চায় খুন হবার ভয়ে? (সাহসিকতা ও বিচক্ষণতা প্রকাশ)”
বলে মাসি বড় সালতির খড় ঠেকানো বাঁশ ছেড়ে দিয়ে লগি গুঁজে দেয় কাদায়, পিসি তরতর করে পিছনে গিয়ে লগি কাদায় খুঁজে হেলে পড়ে, শরীরের ভারে সরু লম্বা সালতিটাকে এগিয়ে দেয় ভাটার টানের বিপক্ষে। বেলা একরকম নেই। ছায়া নামছে চারদিকে। (অন্ধকার নেমে আসা)

শকুনরা (অশুভ প্রতীক মেনে কুসংস্কার) উড়ে এসে বসছে পাতাশূন্য শুকনো গাছটায়। একটা শকুন উড়ে গেল এ আশ্রয় ছেড়ে অল্প দূরে আরেকটা গাছের দিকে। ডাল ছেড়ে উড়তে আর নতুন ডালে গিয়ে বসতে কী তার পাখা ঝাপটানি! (শকুনের আনন্দ মানে মানুষের ক্ষতির ইঙ্গিত)
মায়ের বোন মাসি আর বাপের বোন পিসি ছাড়া বাপের ঘরের কেউ নেই আহ্লাদির। দুর্ভিক্ষ কোনোমতে ঠেকিয়েছিল তার বাপ। মহামারীর একটা রোগে, কলেরায়, সে, তার বৌ আর ছেলেটা শেষ হয়ে গেল। মাসি-পিসি তার (আহ্লাদির বাবার) আশ্রয়ে মাথা গুঁজে আছে অনেক দিন, দূর ছাই সয়ে (কোনো রকমে বেঁচে থাকা) আর কুড়িয়ে পেতে খেয়ে নিরাশ্রয় বিধবারা যেমন থাকে। নিজেদের ভরণপোষণের কিছু তারা রোজগার করত ধান ভেনে (ঢেঁকিতে ছেটে চাল থেকে তুষ পৃথক করা), কাঁথা সেলাই করে, ডালের বড়ি (চালকুমড়া ও ডাল পিষে ছোট ছোট খাদ্যবস্তু যা শুকিয়ে সবজির সাথে দেয়) বেচে, হোগলা গেঁথে (এক জাতীয় উদ্ভিদ দিয়ে মাদুর তৈরি), শাকপাতা ফলমূল ডাঁটা কুড়িয়ে, এটা ওটা জোগাড় করে। শাকপাতা খুদকুঁড়ো ভোজন, বছরে দুজোড়া থান পরন খরচ তো এই। বছরের পর বছর ধরে কিছু পুঁজি পর্যন্ত হয়েছিল দুজনের, রূপোর টাকা আধুলি সিকি (চার আনা/ আট আনা রূপা)। দুর্ভিক্ষের সময়টা বাঁচবার জন্য তাদের (মাসি-পিসির) লড়তে হয়েছে সাংঘাতিকভাবে, আহ্লাদির বাপ তাদের থাকাটা শুধু বরাদ্দ রেখে খাওয়া ছাঁটাই করে দিয়েছিল (থাকার ব্যবস্থা করলেও খাওয়ার কোনো ব্যবস্থা ছিল না) একেবারে পুরোপুরি।
তারও (আহ্লাদির বাবা) তখন বিষম অবস্থা। নিজেরা বাঁচে কি বাঁচে না, তার ওপর জগুর লাথির চোটে মরমর মেয়ে এসে হাজির। সে কোনদিক সামলাবে? মাসি-পিসির সেবা-যত্নেই আহ্লাদি অবশ্য সেবার বেঁচে গিয়েছিল, তার বাপ-মাও সেটা স্বীকার করেছে (কৃতজ্ঞতাবোধ)। কিন্তু কী করবে, গলা কেটে রক্ত দিয়ে সে ধার শোধ করা যদি-বা সম্ভব, অন্ন দেওয়ার ক্ষমতা কোথায় পাবে। পাল্লা দিয়ে (প্রাণপণে চেষ্টা করা) মাসি-পিসি আহ্লাদির জীবনের জন্য লড়েছিল, পেল যদি তো খেয়ে, না-পেল যদি তো না-খেয়েই।

অবস্থা যখন তাদের অতি কাহিল, চারদিকে না-খেয়ে মরা শুরু করেছে মানুষ, মরণ ঠেকাতেই ফুরিয়ে আসছে তাদের জীবনীশক্তি; একদিন মাসি বলে পিসিকে, “একটা কাজ করবি বেয়াইন? তাতেও তোরও দুটো পয়সা আসে, মোরও দুটো পয়সা আসে।” শহরের বাজারে তরিতরকারি ফলমূলের দাম চড়া। (দুর্ভিক্ষের কারণে)
গাঁ থেকে কিনে যদি বাজারে গিয়ে বেচে আসে তারা, কিছু রোজগার হবে। একা মাসির ভরসা হয় না সালতি বেয়ে অতদূর যেতে (নিরাপত্তাহীনতা), যাওয়া-আসাও একার দ্বারা হবে না তার। পিসি রাজি হয়েছিল। এতে কিছু হবে কি না হবে ভগবান জানে, কিন্তু যদি হয় তবে রোজগারের একটা নতুন উপায় মাসি পেয়ে যাবে আর সে পাবে না, তাকে না পেলে অন্য কারো সাথে হয়ত মাসি বন্দোবস্ত (আয়োজন) করবে, তা কি পারে পিসি ঘটতে দিতে (হিংসা থেকে মাসির সঙ্গদান)।
সেই থেকে শুরু হয় গেরস্তের বাড়তি শাকসবজি ফলমূল নিয়ে মাসি-পিসির সালতি বেয়ে শহরের বাজারে গিয়ে বেচে আসা। গাঁয়ের বাবু বাসিন্দারাও (সম্ভ্রান্ত লোক) নগদ পয়সার জন্য বাগানের জিনিস বেচতে দেয়।
মাসি-পিসির ভাব ছিল আগেও। অবস্থা এক, বয়স সমান, একঘরে বাস, পরস্পরের কাছে ছাড়া সুখ-দুঃখের কথা তারা কাকেই-বা বলবে, কেই-বা শুনবে। তবে হিংসা দ্বেষ রেষারেষিও ছিল যথেষ্ট, কোন্দলও (ছোট কারণে বড় ঝগড়া) বেধে যেত কারণে অকারণে।
পিসি এ বাড়ির মেয়ে, এ তার বাপের বাড়ি। মাসি উড়ে এসে জুড়ে বসেছে (অযাচিতভাবে এসে সর্বেসর্বা হওয়া) এখানে। তাই মাসির উপর পিসির একটা অবজ্ঞা অবহেলার ভাব ছিল। এই নিয়ে পিসির অহংকার আর খোচাই সবচেয়ে অসহ্য লাগত মাসির। ধীর শান্ত দুঃখী মনে হতো এমনি তাদের, কিন্তু ঝগড়া বাধলে অবাক হয়ে যেতে হতো তাদের দেখে। সে কী রাগ, সে কী তেজ, সে কী গো! মনে হতো এই বুঝি কামড়ে দেয় একে অপরকে, এই বুঝি কাটে বঁটি দিয়ে।
শাকসবজি বেচে বাঁচবার চেষ্টায় একসঙ্গে কোমর বেঁধে নেমে (প্রাণপণে চেষ্টা করা) পড়ামাত্র সব বিরোধ সব পার্থক্য উড়ে গিয়ে দুজনের হয়ে গেল একমন, একপ্রাণ (বৃহৎ স্বার্থের জন্য ক্ষুদ্র স্বার্থ বিসর্জন)। সে মিল জমজমাট হয়ে উঠল আহ্লাদির ভার ঘাড়ে পড়ায় (দায়িত্বশীলতা বৃদ্ধি পেয়ে)। নিজের পেট ভরানো শুধু নয়, নিজেদের বেঁচে থাকা শুধু নয়, তাদের দুজনেরই এখন আহ্লাদি আছে। খাইয়ে পরিয়ে যত্নে রাখতে হবে তাকে, শ্বশুরঘরের কবল থেকে বাঁচাতে হবে তাকে, গাঁয়ের বজ্জাতদের নজর থেকে সামলে রাখতে হবে, কত দায়িত্ব তাদের, কত কাজ, কত ভাবনা।

বাপ মা বেঁচে থাকলে আহ্লাদিকে হয়ত শ্বশুরবাড়ি যেতে হতো, মাসি-পিসিও বিশেষ কিছু বলতো কি না সন্দেহ (আপনজনের কর্তৃত্ব পর দেখাতে পারে না)। কিন্তু তারা তো নেই, এখন মাসি-পিসিরই সব দায়িত্ব। বিনা পরামর্শে আপনা থেকেই তাদের ঠিক হয়েছিল, আহ্লাদিকে পাঠানো হবে না। আহ্লাদিকে কোথাও পাঠানোর কথা তারা ভাবতেও পারে না। বিশেষ করে ওই খুনেদের  কাছে (জগুর পরিবার) কখনো মেয়ে তারা পাঠাতে পারে, যাবার কথা ভাবলেই মেয়ে যখন আতঙ্কে পাঁশুটে (ফ্যাকাশে/ বিবর্ণ) মেরে যায়?
বাপের ঘরদুয়ার জমিজমাটুকু আহ্লাদিকে বর্তেছে (উত্তরাধিকার সূত্রে পাওয়া), জগুর বৌ নেবার আগ্রহও খুবই স্পষ্ট (জমির লোভ)। সামান্যই ছিল তার বাপের, তারও (জগুর) সিকিমতো আছে মোটে, বাকি গেছে গোকুলের কবলে। তবু মুফতে (বিনামূল্যে) যা পাওয়া যায় তাতেই জগুর প্রবল লোভ।

খালি ঘরে আহ্লাদিকে রেখে কোথাও যাবার সাহস তাদের হয় না। দুজনে মিলে যদি যেতে হয় কোথাও আহ্লাদিকে তারা সঙ্গে নিয়ে যায়। মাসি বলে, ‘ডরাস্‌নি আহ্লাদি (সংসার ভাঙার ভয়)। ভাঁওতা (ফাঁকিবাজি/ চাপাবাজি/প্রতারণা) দিয়ে আমাদের দমাবার ফিকির সব। নয় তো কৈলেশকে দিয়ে ওসব কথা বলায় মোদের? (সাহস থাকলে জগু নিজে এমন হুমকি দিত)
পিসি বলে, “দুদিন বাদে ফের আসবে দেখিস জামাই (স্ত্রীর টানে)। তখন শুধোলে বলবে, কই না, আমি তো ওসব কিছু বলি নি কৈলেশকে (দোষ আড়ালের চেষ্টা)।
মাসি বলে, ‘চার মাসে পড়লি (অন্তঃসত্ত্বা), আর কটা দিন বা। মা-মাসির কাছেই রইতে হয় এ সময়টা, জামাই এলে বুঝিয়ে বলব (প্রচলিত নিয়ম)।
পিসি বলে, “ছেলের মুখ দেখে পাষাণ নরম হয়, জানিস আহ্লাদি (কঠোর মনের পুরুষও নরম হয়ে যায়)। তোর পিসে ছিল জগুর মতো। খোকাটা কোলে আসতে কী হয়ে গেল সেই মানুষ। চুপি চুপি এসে এটা ওটা খাওয়ায়, উঠতে বলি তো ওঠে, বসতে বলি তো বসে (স্ত্রীর অনুগত)। মাসি বলে, তোর মেসো ঠিক ছিল, শাউড়ি ননদ ছিল বাঘ (নিষ্ঠুর আচরণ)। উঠতে বসতে কী ছ্যাঁচা খেয়েছি (মানসিক নির্যাতন) ভাবলে বুক কাঁপে।
কিন্তু জানিস আহ্লাদি, মেয়েটা যেই কোলে এল শাউড়ি ননদ যেন মোকে মাথায় করে রাখলে বাঁচে।
পিসি বলে, “তুইও যাবি, সোয়ামির ঘর করবি। ডরাসনি, ডর কীসের? (সংসার ভাঙার ভয় নেই)

বাড়ি ফিরে দীপ জ্বেলে মাসি-পিসি রান্নাবান্না সারতে লেগে যায়। বাইরে দিন কাটলেও আহ্লাদির পরিশ্রম কিছু হয়নি, শুয়ে বসেই দিন কেটেছে। তবু মাসি-পিসির কথায় সে একটু শোয়। শরীর নয়, মনটা তার কেমন (অনিশ্চিত ভবিষ্যতের কথা ভেবে)? করছে। নিজেকে তার ছ্যাচড়া, নোংরা, নর্দমার মতো লাগে (অপরের আশ্রয়ে থাকায় আত্মমর্যাদায় লাগে)। মাসি-পিসির আড়ালে থেকেও সে টের পায় কীভাবে মানুষের পর মানুষ তাকাচ্ছে তার দিকে (খারাপ ইঙ্গিত), কতজন কতভাবে মাসি-পিসির সঙ্গে আলাপ জমাচ্ছে  তরিতরকারির মতো তাকেও কেনা যায় কি না যাচাই করবার জন্য (নামমাত্র টাকা দিয়ে বিয়ের প্রস্তাব)। গাঁয়েরও কতজন তার কত রকমের দর দিয়েছে মাসি-পিসির কাছে। মাসি-পিসিকে চিনে (কঠোরতা দেখে) তারা অনেকটা চুপচাপ হয়ে গেছে আজকাল, কিন্তু গোকুল হাল ছাড়েনি। (আহ্লাদিকে বিয়ের ব্যাপারে)

মাসি-পিসিকে পাগল করে তুলেছে গোকুল। মায়ের বাড়া (মায়ের চেয়ে অধিক যত্ন করে) তার এই মাসি-পিসি, কী দুর্ভোগ তাদের তার জন্য। মাসি-পিসিকে এত যন্ত্রণা দেওয়ার চেয়ে সে নয় শ্বশুরঘরের লাঞ্ছনা সইত, জগুর লাথি খেত। ঈষৎ তন্দ্রার ঘোরে শিউরে ওঠে (কেঁপে উঠে) আহ্লাদি।
একপাশে মাসি আর একপাশে পিসিকে না নিয়ে শুলে কি চলবে তার কোনোদিন? রান্না সেরে খাওয়ার আয়োজন করছে মাসি-পিসি, একেবারে ভাতটাত বেড়ে আহ্লাদিকে ডাকবে। ভাগাভাগি কাজ তাদের এমন সহজ হয়ে গেছে যে বলাবলির দরকার তাদের হয় না, দুজনে মিলে কাজ করে যেন একজনে করছে। এবার ব্যঞ্জনে (তরকারি) নুন দেবে এ কথা বলতে হয় না পিসিকে, ঠিক সময়ে নুনের পাত্র সে এগিয়ে দেয় মাসির কাছে। বলাবলি করছে তারা আহ্লাদির কথা, আহ্লাদির সুখদুঃখ, আহ্লাদির সমস্যা, আহ্লাদির ভবিষ্যৎ। জামাই যদি আসে, একটি কড়া কথা তাকে বলা হবে না, এতটুকু খোঁচা দেওয়া হবে না। (পুরুষতান্ত্রিক সমাজের বৈশিষ্ট্য) উপদেশ দিতে গেলে চটবে জামাই, পুরুষমানুষ তো যতই হোক, এটা করা তার উচিত নয়, এসব কিছু বলা হবে না তাকে।
জামাই এসেছে তাই আনন্দ রাখবার যেন ঠাঁই নেই এই ভাব দেখাবে মাসি-পিসি। আহ্লাদিকে শিখিয়ে দিতে হবে সোয়ামি এসেছে বলে যেন আহ্লাদে গদগদ (খুশির আবেগ প্রকাশ করে) হবার ভাব দেখায়। যে কদিন থাকে জামাই, সে যেন অনুভব করে, সে-ই এখানকার কর্তা, সে-ই সর্বেসর্বা (সবকিছুর প্রধান)।

বাইরে থেকে হাঁক আসে কানাই চৌকিদারের। মাসি-পিসি পরস্পরের মুখের দিকে তাকায়, জোরে নিঃশ্বাস পড়ে দুজনের (ভয়ে)। সারাটা দিন গেছে লড়ে আর লড়ে (পরিশ্রম করে)। সরকারবাবুর সঙ্গে বাজারের তোলা (বাজারের খাজনা) নিয়ে ঝগড়া করতে অর্ধেক জীবন বেরিয়ে গেছে দু-জনের। এখন এল চৌকিদার কানাই।
হাঙ্গামা না আসে রাত্রে, গায়ে লোক যখন ঘুমোচ্ছে। রসুই চালায় (রান্নাঘর) ঝাঁপ এঁটে মাসি-পিসি বাইরে যায়। শুক্লপক্ষের একাদশীর উপোস করেছে (পুণ্যের আশায়) তারা দুজনে গতকাল। আজ দ্বাদশী, জ্যোৎস্না বেশ উজ্জ্বল।
কানাইয়ের সাথে গোকুলের যে তিনজন পেয়াদা এসেছে তাদের মাসি-পিসি চিনতে পারে, মাথায় লাল পাগড়ি-আঁটা লোকটা তাদের অচেনা।
কানাই বলে, ‘কাছারিবাড়ি যেতে হবে একবার (বিচারের জন্য)।
মাসি বলে, ‘এত রাতে?
পিসি বলে, ‘মরণ নেই?
কানাই বলে, ‘দারোগাবাবু এসে বসে আছেন বাবুর (সরকারবাবু) সাথে। যেতে একবার হবে গো দিদিঠাকরুনরা। বেঁধে নিয়ে যাবার হুকুম আছে।
মাসি-পিসি মুখে মুখে তাকায়। পথের পাশে ডোবার ধারে কাঁঠাল গাছের ছায়ায় তিন-চারজন ঘুপটি মেরে আছে (আহ্লাদিকে অপহরণ করতে)। স্পষ্টই দেখতে পেয়েছে মাসি-পিসি। ওরা যে গাঁয়ের গুন্ডা সাধু বৈদ্য ওসমানেরা তাতে সন্দেহ নেই, বৈদ্যের ফেটি-বাঁধা বাবরি চুলওয়ালা মাথাটায় পাতার ফাঁকে জ্যোৎস্না পড়েছে। তারা যাবে কাছারিতে কানাই আর পেয়াদা কনস্টেবলের সঙ্গে। ওরা এসে আহ্লাদিকে নিয়ে যাবে।
মাসি বলে, “মোদের একজন গেলে হবে না কানাই? (বিচক্ষণতা প্রকাশ ও আহ্লাদির নিরাপত্তার জন্য)
পিসি বলে, আমি যাই চলো?
কর্তা ডেকেছেন দুজনকে। মাসি-পিসি দুজনেই আবার তাকায় মুখে মুখে। মাসি বলে, কাপড়টা ছেড়ে (কাপড় পরিবর্তন) আসি কানাই।’
পিসি বলে, ‘হাত ধুয়ে আসি, একদণ্ড লাগবে না।’
তাড়াতাড়িই ফিরে আসে তারা। মাসি নিয়ে আসে বঁটিটা হাতে করে, পিসির হাতে দেখা যায় রামদার মতো মস্ত একটা কাটারি। মাসি বলে, ‘কানাই, কত্তাকে বোলো, মেয়েনোকের এত রাতে কাছারিবাড়ি যেতে নজ্জা করে। কাল সকালে যাব।
পিসি বলে, এত রাতে মেয়েনোককে কাছারিবাড়ি ডাকতে কত্তার নজ্জা করে না কানাই?

কানাই ফুঁসে ওঠে (উদ্দেশ্য সফল না হওয়ায়)। না যদি যাও ঠাকরুনরা ভালোয় ভালোয়, ধরে বেঁধে টেনেহিঁচড়ে নিয়ে যাবার হুকুম আছে। কিন্তু বলে রাখলাম।
মাসি বঁটিটা বাগিয়ে ধরে (আক্রমণাত্মক ভঙ্গি) দাঁতে দাঁত কামড়ে বলে, “বটে? ধরে বেঁধে টেনেহিঁচড়ে নিয়ে যাবে? এসো। কে এগিয়ে আসবে এসো। বঁটির এক কোপে গলা ফাঁক করে দেব।’
পিসি বলে, ‘আয় না বজ্জাত হারামজাদারা, এগিয়ে আয় না? কাটারির কোপে গলা কাটি দু-একটার।
দু-পা এগোয় তারা দ্বিধাভরে। মাসি-পিসির মধ্যে ভয়ের লেশটুকু না দেখে সত্যিই তারা খানিকটা ভ্যাবাচ্যাকা খেয়ে গিয়েছে। (মাসি-পিসির দৃঢ়তা দেখে) মারাত্মক ভঙ্গিতে বঁটি আর দা উঁচু হয় মাসি-পিসির।
মাসি বলে, “শোনো কানাই, এ কিন্তু এর্কি (রসিকতা) নয় মোটে। তোমাদের সাথে মোরা মেয়েনোক পারব না জানি কিন্তু দুটো-একটাকে মারব জখম করব ঠিক (নিজেদের রক্ষার জন্য সর্বাত্মক প্রচেষ্টা)।
পিসি বলে, ‘মোরা নয় মরব। (আহ্লাদিকে রক্ষায় জীবনত্যাগ)
তারপর বিনা পরামর্শেই মাসি-পিসি হঠাৎ গলা ছেড়ে দেয়। প্রথমে শুরু করে মাসি, তারপর যোগ দেয় পিসি। আশপাশে যত বাসিন্দা আছে সকলের নাম ধরে গলা ফাটিয়ে তারা হাঁক দেয়, ও বাবাঠাকুর! ও ঘোষ মশায়! ও জনাদ্দন! ওগো কানুর মা! বিপিন! বংশী …’
কানাই অদৃশ্য হয়ে যায় দলবল নিয়ে (লোকজন চলে আসায়)। হাঁকাহাঁকি ডাকাডাকি শুরু হয়ে যায় পাড়ায়, অনেকে ছুটে আসে, কেউ কেউ ব্যাপার অনুমান করে ঘরের জানালা দিয়ে উঁকি দেয় বাইরে না বেরিয়ে।

এই হট্টগোলের পর আরও নিঝুম আরও থমথমে মনে হয় রাত্রিটা (ভয় কাটে না)। আহ্লাদিকে মাঝখানে নিয়ে শুয়ে ঘুম আসে না মাসি-পিসির চোখে। বিপদে পড়ে হাঁক দিলে পাড়ার এত লোক ছুটে আসে, এমনভাবে প্রাণ খুলে এতখানি জ্বালার সঙ্গে নিজেদের মধ্যে খোলাখুলিভাবে গোকুল আর দারোগা ব্যাটার চোদ্দপুরুষ উদ্ধার করতে সাহস পায়, জানা ছিল না মাসি-পিসির। তারা হাঁকডাক শুরু করেছিল খানিকটা কানাইদের ভড়কে দেবার জন্যে, এত লোক এসে পড়বে আশা করেনি। তাদের জন্য যতটা নয়, গোকুল আর দারোগার ওপর রাগের জ্বালাই যেন ওদের ঘর থেকে টেনে বার করে এনেছে মনে হলো সকলের কথাবার্তা শুনে।
কেমন একটা স্বস্তি বোধ করে মাসি-পিসি (লোকজন সাথে থাকায়)। বুকে নতুন জোর পায়। মাসি বলে, ‘জানো বেয়াইন, ওরা ফের ঘুরে আসবে মন বলছে। এত সহজে ছাড়বে কি।’
পিসি বলে, তাই ভাবছিলাম।
মেয়েটাকে কুটুমবাড়ি সরিয়ে দেওয়ায় সোনাদের ঘরে মাঝরাতে আগুন ধরিয়েছিল সেবার (নিরাপত্তাহীনতার কারণে সোনারা আহ্লাদিকে অন্য বাড়িতে পাঠায়, ফলে তাদের ঘরে আগুন দেয়)। খানিক চুপচাপ ভাবে দুজনে। মাসি বলে, “সজাগ রইতে হবে রাতটা (সতর্কতা)।
পিসি বলে, তাই ভালো। কাঁথা কম্বলটা চুবিয়ে রাখি জলে, কী জানি কী হয়। (দ্রুত আগুন নেভানোর জন্য)
আস্তে চুপি চুপি তারা কথা কয়, আহ্লাদির ঘুম না ভাঙে। অতি সন্তর্পণে তারা বিছানা ছেড়ে ওঠে। আহ্লাদির বাপের আমলের গোরুটা নেই, গামলাটা আছে। ঘড়া (বড় পিতলের কলসি) থেকে জল ঢেলে মোটা কাঁথা আর পুরনো ছেঁড়া একটা কম্বল চুবিয়ে রাখে, চালায় আগুন ধরে উঠতে উঠতে গোড়ায় চাপা দিয়ে নেভানো যাতে সহজ হয়। ঘড়ায় আর হাঁড়ি কলসিতে আরও জল এনে রাখে তারা ডোবা থেকে। বঁটি আর দা রাখে হাতের কাছেই। যুদ্ধের আয়োজন করে তৈরি হয়ে থাকে মাসি-পিসি। (বজ্জাতদের বিরুদ্ধে সংগ্রাম ও মাসি-পিসির বুদ্ধিদীপ্ত প্রতিরোধ)

পাঠ–পরিচিতি- “মাসি-পিসি” গল্পটি প্রথম প্রকাশিত হয় কলকাতার পূর্বাশা পত্রিকায় ১৩৫২ বঙ্গাব্দের চৈত্র সংখ্যায় (মার্চ-এপ্রিল ১৯৪৬)। পরে এটি সংকলিত হয় ‘পরিস্থিতি’ (অক্টোবর ১৯৪৬) নামক গল্পগ্রন্থে। বর্তমান পাঠ গ্রহণ করা হয়েছে ঐতিহ্য প্রকাশিত মানিক-রচনাবলি পঞ্চম খণ্ড থেকে। স্বামীর নির্মম নির্যাতনের শিকার পিতৃমাতৃহীন এক তরুণীর করুণ জীবনকাহিনি নিয়ে রচিত হয়েছে। “মাসি-পিসি” গল্প। আহ্লাদি নামক ওই তরুণীর মাসি ও পিসি দুজনই বিধবা ও নিঃস্ব। তারা তাদের অস্তিত্বরক্ষার পাশাপাশি বিরূপ বিশ্ব থেকে আহ্লাদিকে রক্ষার জন্য যে বুদ্ধিদীপ্ত ও সাহসী সংগ্রাম পরিচালনা করে সেটাই গল্পটিকে তাৎপর্যপূর্ণ করে তুলেছে। অত্যাচারী স্বামী এবং লালসা-উন্মত্ত জোতদার, দারোগা ও গুন্ডা-বদমাশদের আক্রমণ থেকে আহ্লাদিকে নিরাপদ রাখার ক্ষেত্রে অসহায় দুই বিধবার দায়িত্বশীল ও মানবিক ও প্রশংসনীয়। দুর্ভিক্ষের মর্মস্পর্শী স্মৃতি, জীবিকা নির্বাহের কঠিন সংগ্রাম, নারী হয়ে নৌকাচালনা ও সবজির ব্যবসায় পরিচালনা প্রভৃতি এ গল্পের বৈচিত্র্যময় দিক।

আমার বলিতে  দ্বিধা নাই যে, আমি আজ তাঁহাদেরই দলে, যাঁহারা কর্মী নন ধ্যানী (ধ্যানীরা পরিকল্পনা করে, কর্মীরা তা বাস্তবায়ন করে)। যাঁহারা মানব জাতির কল্যাণ সাধন করেন (বুদ্ধিবৃত্তিক) সেবা দিয়া, কর্ম দিয়া, তাঁহারা মহৎ যদি না-ই হন, অন্তত ক্ষুদ্র নন (ধ্যানীদের অবদান মোটেও ফেলনা নয়)। ইহারা থাকেন শক্তির পেছনে রুধির ধারা (রক্ত প্রবাহ) মতো গোপন, ফুলের মাঝে মাটির মমতা-রসের মতো অলক্ষ্যে (ধ্যানীরা বুদ্ধি দিয়ে কর্মীদের পরিচালনা করেন)।

আমি কবি-বনের পাখির মতো স্বভাব আমার গান করার। কাহারও ভালো লাগিলেও গাই, ভালো না লাগিলেও গাহিয়া যাই (স্বভাবজাত বৈশিষ্ট্য)। বায়স (কাক) ফিঙে যখন বেচারা গানের পাখিকে (কোকিল) তাড়া করে, তীক্ষ্ণ চঞ্চু (ধারালো ঠোঁট) দ্বারা আঘাত করে, তখনও সে এক গাছ হইতে উড়িয়া আন গাছে গিয়া গান ধরে (শত প্রতবিন্ধকতার পরও স্বভাবজাত বৈশিষ্ট্য কেউ ভুলতে পারে না)। তাহার হাসিতে গান, তাহার কান্নায় গান। সে গান করে আপন মনের আনন্দে (কোনো প্রাপ্তি বা ফলের আশায় নয়)-যদি তাহাতে কাহারও অলস-তন্দ্রা, মোহ-নিন্দ্রা (জড়তা) টুটিয়া যায় (ইতিবাচক পরিবর্তন আসে), তাহার একান্ত দৈব (কবির কৃতিত্ব নয়)। যৌবনের সীমা পরিক্রমণ আজও আমার শেষ হয় নাই (লেখক যৌবনকে ধারণ করে)। কাজেই আমি যে গান গাই, তাহা যৌবনের গান। তারুণ্যের ভরা-ভাদরে (পরিপূর্ণ সময়ে) যদি আমরা গান জোয়ার আনিয়া থাকে (তরুণদের অনুপ্রেরণা জোগায়), তাহা আমার অগোচরে; যে চাঁদ সাগরে জোয়ার জাগায়, সে হয়তো তাহার শক্তি সম্বন্ধে আজও না-ওয়াকিফ (অনবগত)। (অনেক শক্তিই জানে না- তার সামর্থ্য বা প্রভাব কতটুকু)

আমি বক্তাও নহি (বেশি কথা বলার পক্ষপাতী নই)। আমি কমবক্তার দলে। বক্তৃতায় যাঁহারা দিগ্বিজয়ী, বক্তিয়ার খিলজি (ব্যঙ্গ প্রকাশ), তাঁহাদের বাক্যের সৈন্য সামন্ত অত দ্রুতবেগে কোথা হইতে কেমন করিয়া আসে বলিতে পারি না (তাদের বিরামহীন অতি কথন দেখে কবি অবাক হয়)। তাহা দেখিয়া লক্ষ্মণ সেন আপেক্ষা আমরা বেশি অভিভূত হইয়া পড়ি। তাঁহাদের বাণী আসে বৃষ্টিধারায় মতো অবিরল ধারায়। আমাদের কবিদের বাণী বহে ক্ষীণ ভীরু ঝরনাধারার মতো। ছন্দের দুকূল (ভাব ও ভাষা) প্রাণপণে আঁকড়িয়া ধরিয়া সে সঙ্গীত গুঞ্জন করিতে করিতে বহিয়া যায়। পদ্মা ভাগীরথীর মতো খরস্রোতা যাঁহাদের বাণী (বক্তাদের বাণী), আমি তাঁহাদের বহু পশ্চাতে (অতি কথনে কবি অভ্যস্ত নয়)।

আমার একমাত্র সম্বল-আপনাদের তরুণদের প্রতি আমার অপরিসীম ভালোবাসা, প্রাণের টান। তারুণ্যকে, যৌবনকে, আমি যেদিন হইতে গান গাহিতে শিখিয়াছি, সেদিন হইতে বারে বারে সালাম করিয়াছি, সশ্রদ্ধ নমস্কার নিবেদন করিয়াছি (যুবক হওয়ার পর থেকেই কবি যৌবনকে শ্রদ্ধা করে আসছেন), জবাকুসুমসঙ্ককাশ তরুণ অরুণকে দেখিয়া (জবাফুলের মতো উজ্জ্বল সূর্য) প্রথম মানব যেমন করিয়া সশ্রদ্ধ নমস্কার করিয়াছিলেন, আমার প্রথম জাগরণ প্রভাবে তেমন সশ্রদ্ধ বিস্ময় লইয়া যৌবনকে অন্তরের শ্রদ্ধা নিবেদন করিয়াছি, তাহার স্তবগান গায়িহাছি। তরুণ অরুণের মতোই যে তারুণ্য তিমিরি বিদারী (মনের অন্ধকার দূর করে), সে যে আলোর দেবতা (সূর্য)। রঙের খেলা খেলিতে খেলিতে তাহার উদয়, রং ছড়াইতে ছড়াইতে তাহার অস্ত। যৌবন সূর্য যেথায় অস্তমিত, দুঃখের তিমির কুন্তলা নিশীথিনীর সেই তো লীলভূমি। (মনের যৌবনের সমাপ্তি মানেই বার্ধক্যের দুঃখ শুরু)

আমি যৌবনের পূজারী কবি বলিয়াই যদি আমায় আপনারা আপনাদের মালার মধ্যমণি করিয়া থাকেন, তাহা হইলে আমার অভিযোগ করিবার কিছুই নাই। আপনাদের মহাদান আমি সানন্দে শির নত করিয়া গ্রহণ করিলাম। আপনাদের দলপতি হইয়া নয়, আপনাদের দলভুক্ত হইয়া, সহযাত্রী হইয়া। আমাদের দলে কেহ দলপতি নাই (আমরা সবাই রাজা), আজ আমরা শত দিক হইতে শত শত তরুণ মিলিয়ে তারুণ্যের শতদল ফুটাইয়া তুলিয়াছি (তারুণ্যের পদ্মফুল)। আমার সকলে মিলিয়া এক সিদ্ধি (আমাদের সকলের একটাই সাধনা তা হচ্ছে তারুণ্য), এক ধ্যানের মৃণাল (পদ্মের ডাঁট) ধরিয়া বিকশিত হইতে চাই।

বার্ধক্য তাহাই-যাহা পুরাতনকে, মিথ্যাকে, মৃত্যুকে আঁকড়িয়া পড়িয়া থাকে, (পুরোনো সংস্কার ধরে রাখতে চায় বা পরিবর্তনে বিশ্বাসী না) বৃদ্ধ তাহারাই-যাহারা মায়াচ্ছন্ন নব মানবের অভিনব জয় যাত্রার শুধু বোঝা নয়, বিঘ্ন (সমর্থন তো করেই না, বরং প্রতিবন্ধতা তৈরি করে); শতাব্দীর নব যাত্রীর চলার ছন্দে ছন্দ মিলাইয়া যাহারা কুচকাওয়াজ করিতে জানে না, পারে না (সময়ের সাথে চলতে পারে না); যাহারা জীব হইয়াও জড়; যাহারা অটল সংস্কারের পাষাণস্তুপ আঁকড়িয়া পড়িয়া আছে (কুসংস্কারকে বুকে চেপে ধরে রাখে)।
বৃদ্ধ তাহারাই যাহারা নব অরুণোদয় দেখিয়া নিদ্রাভঙ্গের ভয়ে দ্বার রুদ্ধ করিয়া পড়িয়া থাকে। আলোক পিয়াসী প্রাণচঞ্চল শিশুদের কল কোলাহলে যাহারা বিরক্ত হইয়া অভিসম্পাত করিতে থাকে। জীর্ণ পুঁথি চাপা পড়িয়া যাহাদের নাভিশ্বাস বহিতেছে (অতি বিদ্যার কারণে যাদের মানুষের সাথে মিশে শ্বাস নিতে পারে না), অতি জ্ঞানের অগ্নিমান্দ্যে (বদহজমে) যাহারা আজ কঙ্কালসার বৃদ্ধ তাহরাই। ইহাদের ধর্মই বার্ধক্য। বার্ধক্যকে সব সময় বয়সের ফ্রেমে বাঁধা যায় না। (বয়সের বিবেচনা যৌবন-বার্ধক্য নির্ণীত হয় না, বরং কর্মই এই দুইয়ের সংজ্ঞা)

বহু যুবককে দেখিয়াছি যাহাদের যৌবনের উর্দির নিচে বার্ধক্যের কঙ্কাল মূর্তি। আবার বহু বৃদ্ধকে দেখিয়াছি- যাঁহাদের বার্ধক্যের জীর্ণাবরণের তলে মেঘলুপ্ত সূর্যের মতো প্রদীপ্ত যৌবন। তরুণ নামের জয়-মুকুট শুধু তাহারই যাহার শক্তি অপরিমাণ, গতিবেগ ঝঞ্ঝার ন্যায়, তেজ নির্মেঘ আষাঢ় মধ্যাহ্নের মার্তন্ডপ্রায়, বিপুল যাহার আশা, ক্লান্তিহীন যাহার উৎসাহ, বিরাট যাহার ঔদার্য (বড় মানসিকতার পরিচয়), অফুরন্ত যাহার প্রাণ, অটল যাহার সাধনা, মৃত্যু যাহার মুঠিতলে (মৃত্যুকে যার ভয় নেই)।

তারুণ্য দেখিয়াছি আরবের বেদুইনদের মাঝে, তারুণ্য দেখিয়াছি মহাসমরের সৈনিকের মুখে, কালাপাহাড়ের অসিতে, কামাল-করিম-মুসোলিনি-সানইয়াৎ লেনিনের শক্তিতে।
যৌবন দেখিয়াছি তাহাদের মাঝে- যাহারা বৈমানিকরূপে অনন্ত আকাশের সীমা খুঁজিতে গিয়া প্রাণ হারায়, আবিষ্কারকরূপে নব-পৃথিবীর সন্ধানে গিয়া আর ফিরে না, গৌরীশৃঙ্গ কাঞ্চনজঙ্ঘার শীর্ষদেশ (হিমালয় জয় করতে গিয়ে) অধিকার করিতে গিয়া যাহারা তুষার-ঢাকা পড়ে, অতল সমুদ্রের নীল মঞ্জুষার মণি আহরণ করিতে গিয়া সলিল সমাধি লাভ করে, মঙ্গলগ্রহে, চন্দ্রলোকে যাইবার পথ আবিষ্কার করিতে গিয়া নিরুদ্দেশ হইয়া যায়। পবন-গতিকে পশ্চাতে ফেলিয়া যাহারা উড়িয়া যাইতে চায়, নব নব গ্রহ-নক্ষত্রের সন্ধান করিতে করিতে যাহাদের নয়ন-মণি নিভিয়া যায়- যৌবন দেখিয়াছি সেই দুরন্তদের মাঝে। যৌবনের মাতৃরূপ (সেবাপরায়ণ দিক) দেখিয়াছি- শব বহন করিয়া যখন সে যায় শ্মশানঘাটে, গোরস্থানে, অনাহারে থাকিয়া যখন সে অন্ন পরিবেশন করে দুর্ভিক্ষ বন্যা-পীড়িতদের মুখে, বন্ধুহীন রোগীর শয্যাপার্শ্বে যখন সে রাত্রির পর রাত্রি জাগিয়া পরিচর্যা করে, যখন সে পথে পথে গান গাহিয়া ভিখারী সাজিয়া দুর্দশাগ্রস্তদের জন্য ভিক্ষা করে, যখন দুর্বলের পাশে বল হইয়া দাঁড়ায়, হতাশের বুকে আশা জাগায়।

ইহাই যৌবন, এই ধর্ম যাহাদের তাহারাই তরুণ। তাহাদের দেশ নাই, জাতি নাই, অন্য ধর্ম নাই (দেশ-জাতিতে যারা সীমাবদ্ধ না)। দেশ-কাল-জাতি-ধর্মের সীমার ঊর্ধ্বে ইহাদের সেনানিবাস। আজ আমরা- মুসলিম তরুণেরা- যেন অকুণ্ঠিত চিত্তে মুক্তকণ্ঠে বলিতে পারি- ধর্ম আমাদের ইসলাম, কিন্তু প্রাণের ধর্ম আমাদের তারুণ্য, যৌবন (আমাদের অনুপ্রেরণা তারুণ্য)। আমরা সকল দেশের, সকল জাতির, সকল ধর্মের, সকল কালের (বিশ্ব মানবতার)। আমরা মুরিদ যৌবনের। এই জাতি-ধর্ম-কালকে অতিক্রম করিতে পারিয়াছে যাঁহাদের যৌবন (সংকীর্ণ কার্যপরিধিতে সীমাবদ্ধ না), তাঁহারাই আজ মহামানব, মহাত্মা, মহাবীর। তাহাদিগকে সকল দেশের সকল ধর্মের সকল লোক সমান শ্রদ্ধা করে।

পথ-পার্শ্বের ধর্ম-অট্টালিকা আজ পড় পড় হইয়াছে, তাহাকে ভাঙিয়া ফেলিয়া দেওয়াই আমাদের ধর্ম, ঐ জীর্ণ অট্টালিকা চাপা পড়িয়া বহু মানবের মৃত্যুর কারণ হইতে পারে (ধর্মের অপব্যবহার মানব জাতির অকল্যাণ বয়ে আনতে পারে)। যে-ঘর আমাদের আশ্রয় দান করিয়াছে, তাহা যদি সংস্কারাতীত হইয়া আমাদেরই মাথায় পড়িবার উপক্রম করে, তাহাকে ভাঙিয়া নতুন করিয়া গড়িবার দুঃসাহস আছে একা তরুণেরই (ধর্মের অপব্যবহার রোধ)। খোদার দেওয়া এই পৃথিবীর নিয়ামত হইতে যে নিজেকে বঞ্চিত রাখিল, সে যত মোনাজাতই করুক, খোদা তাহা কবুল করিবেন না। খোদা হাত দিয়াছেন বেহেশত ও বেহেশতি চিজ অর্জন করিয়া লইবার জন্য, ভিখারীর মতো হাত তুলিয়া ভিক্ষা করিবার জন্য নয়। আমাদের পৃথিবী আমরা আমাদের মনের মতো করিয়া গড়িয়া লইব। ইহাই হউক তরুণের সাধনা।
