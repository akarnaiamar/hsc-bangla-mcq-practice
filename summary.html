                content: `
চাঁদনি (কলকাতার মার্কেট) থেকে নয়সিকে (১ সিকে = ২৫ পয়সা বা চার আনা) দিয়ে একটা শার্ট কিনে নিয়েছিলুম। তখনকার দিনে বিচক্ষণ বাঙালির (ফাঁকি দিয়ে বগি ব্যবহার করায়) জন্য ইয়োরোপিয়ান থার্ড (‘ইয়োরোপিয়ান থার্ড’ ছিল তৃতীয় শ্রেণীর একটি বিশেষ কোচ, যা মূলত ইউরোপীয় যাত্রীদের জন্য নির্ধারিত ছিল। এই শ্রেণীটি সাধারণত ভারতীয় যাত্রীদের জন্য উন্মুক্ত ছিল না।) নামক একটি অত্যন্ত প্রয়োজনীয় প্রতিষ্ঠান ভারতের সর্বত্র আনাগোনা করত। হাওড়া স্টেশনে সেই থার্ডে উঠতে যেতেই এক ফিরিঙ্গি হেঁকে বলল, “এটা ইয়োরোপিয়ানদের জন্য।” (সংরক্ষিত কোচ)
আমি গাঁক গাঁক করে (ভাঙাচুরা ইংরেজিতে) বললুম, “ইয়োরোপিয়ান তো কেউ নেই। চল, তোমাতে আমাতে ফাঁকা গাড়িটা কাজে লাগাই।” এক তুলনাত্মক ভাষাতত্ত্বের বইয়ে পড়েছিলুম, “বাংলা শব্দের অন্ত্যদেশে অনুস্বার যোগ করিলে সংস্কৃত হয়; ইংরেজি শব্দের প্রাগদেশে (শুরুতে) জোর দিয়া কথা বলিলে সায়েবি ইংরেজি হয় (ইংরেজদের মতো উচ্চারণ)।” (রসিকতা করে বলছেন- “বুঝে না বুঝে সাহেবি ভাব ধরলেই কেউ সাহেব হয়ে যায় না!”) অর্থাৎ পয়লা সিলেবলে অ্যাকসেন্ট দেওয়া খারাপ রান্নায় লঙ্কা ঠেসে দেওয়ার মতো— সব পাপ ঢাকা পড়ে যায়। সোজা বাংলায় এরই নাম গাঁক গাঁক করে ইংরেজি বলা। (যেমন-  “Important” বলার সময় বলে “IM-portant”, বা “Station” বলছে “STAY-shun”— যেন সাহেবি টাচ আসে!)। ফিরিঙ্গি তালতলার নেটিভ, (যার চালচলন, পোশাক, কথাবার্তা বিদেশিদের মতো, কিন্তু সে বাস করে কলকাতার তালতলার মতো সাধারণ জায়গায়- বাহ্যিকভাবে সাহেবসুলভ, কিন্তু মূলত গেঁয়ে লোক!), কাজেই আমার ইংরেজি শুনে ভারি খুশি হয়ে জিনিসপত্র গোছাতে সাহায্য করল।
কিন্তু এদিকে আমার ভ্রমণের উৎসাহ ক্রমেই চুপসে আসছিল। এতদিন পাসপোর্ট জামাকাপড় যোগাড় করতে ব্যস্ত ছিলুম, অন্য কিছু ভাববার ফুরসত পাইনি (ভ্রমণের প্রতিকূলতা)। গাড়ি ছাড়ার সঙ্গে সঙ্গেই প্রথম যে ভাবনা আমার মনে উদয়
হলো সেটা অত্যন্ত কাপুরুষজনোচিত— মনে হলো আমি একা। ফিরিঙ্গিটি লোক ভালো। আমাকে গুম (গুমোট বা চিন্তিত) হয়ে শুয়ে থাকতে দেখে বলল, “এত মনমরা হলে কেন? গোয়িং ফার? (অনেক দূর যেতে হবে)” দেখলুম, বিলিতি কায়দা জানে (বাহ্যিক ভদ্রতা)। “হোয়ার আর ইউ গোয়িং?” বলল না ।
তা সে যাই হোক, সায়েবের সঙ্গে আলাপচারিতা আরম্ভ হলো। তাতে লাভও হলো। সন্ধ্যা হতে না হতেই সে প্রকাণ্ড এক চুবড়ি খুলে (মোটা কাপড় বা বস্তার তৈরি থলে বা পাটের ব্যাগ) বলল, তার ‘ফিয়াসে’ (বাগদত্তা) নাকি উৎকৃষ্ট ডিনার তৈরি করে সঙ্গে দিয়েছে এবং তাতে নাকি একটা পুরাদস্তুর পল্টন (সেনাদল) পোষা যায়। আমি আপত্তি জানিয়ে বললুম যে আমিও কিছু কিছু সঙ্গে এনেছি, তবে সে নিতান্ত নেটিভ বস্তু (দেশীয় খাবার), হয়ত বড্ড বেশি ঝাল। খানিকক্ষণ তর্কাতর্কির পর স্থির হলো, সব কিছু মিলিয়ে দিয়ে ব্রাদারলি ডিভিশন করে আলাকার্ত ভোজন (রাজকীয় বুফে), যার যা খুশি খাবে।
সায়েব যেমন যেমন তার সব খাবার বের করতে লাগল, আমার চোখ দুটো সঙ্গে সঙ্গে জমে যেতে লাগল (একইরকম খাদ্য দেখে)। সেই শিককাবাব, সেই ঢাকাই পরোটা, মুরগি মুসল্লম, আলু-গোস্ত। আমিও তাই নিয়ে এসেছি জাকারিয়া স্ট্রিট থেকে (কলকাতার বিখ্যাত স্ট্রিটফুডের স্থান)।
এবার সায়েবের চক্ষুস্থির হওয়ার পালা (কিংকর্তব্যবিমূঢ়))। ফিরিস্তি মিলিয়ে একই মাল বেরোতে লাগল। এমনকি শিককাবাবের জায়গায় শামিকাবাব নয়, আলু-গোস্তের বদলে কপি-গোস্ত পর্যন্ত নয়। আমি বললুম, “ব্রাদার, আমার ফিয়াসে নেই, এসব জাকারিয়া স্ট্রিট থেকে কেনা।”
একদম হুবহু একই স্বাদ । সায়েব খায় আর আনমনে বাইরের দিকে তাকায় (লজ্জায়)। আমারও আবছা আবছা মনে পড়ল, যখন সওদা করছিলুম (খাবার কেনা) তখন যেন এক গাব্দাগোব্দা ফিরিঙ্গি মেমকে (মোটাসোটা গোলগাল মহিলা) হোটেলে যা পাওয়া যায় তাই কিনতে দেখেছি। ফিরিঙ্গিকে বলতে যাচ্ছিলুম তার ফিয়াসের একটা বর্ণনা দিতে, কিন্তু থেমে গেলুম।
ভোর কোথায় হলো মনে নেই। জুন মাসের গরম পশ্চিমে গৌরচন্দ্রিকা (পূর্বাভাস দিয়ে আসে না) করে নামে না। সাতটা বাজতে না বাজতেই চড়চড় করে টেরচা হয়ে (বাঁকা হয়ে রোদ আসা) গাড়িতে ঢোকে আর বাকি দিনটা কী রকম করে কাটবে তার আভাস তখনই দিয়ে দেয় (তীব্র তাপদাহ) ৷ গাড়ি যেন কালোয়াত (ক্ল্যাসিক শিল্পী) ঊর্ধ্বশ্বাসে ছুটেছে (গাড়িটি এতটাই নিয়ন্ত্রিত আর শৈল্পিকভাবে চলছে যে মনে হচ্ছে সে যেন শাস্ত্রীয় সংগীত পরিবেশন করছে), কোনো গতিকে রোদ্দুরের তবলচিকে হার মানিয়ে যেন কোথাও গিয়ে ঠান্ডায় জিরোবে (গাড়ির গতি এতটাই তীব্র ছিল, যেন রোদ্দুরের তবলার মতো ছন্দে ছুটছে, আর শেষে গন্তব্যে গিয়ে থেমে যাবে শান্ত হয়ে।)। আর রোদ্দুরও চলেছে সঙ্গে সঙ্গে ততোধিক ঊর্ধ্বশ্বাসে (তবলার তীব্র গতির মতো রোদের উত্তাপও বেড়ে চলছে)। সে পাল্লায় প্যাসেঞ্জারদের প্রাণ যায়। (গাড়ির উর্ধ্বগতি ও রোতের তীব্রতা)
গাড়ি এর মাঝে আবার ভোল (বেশ) ফিরিয়ে নিয়েছে (যাত্রীদের পরিবর্তন)। দাড়ি লম্বা হয়েছে (মুসলমান যাত্রী বেড়েছে), টিকি খাটো হয়েছে (হিন্দু যাত্রী কমেছে), নাদুসনুদুস লালাজিদের মিষ্টি মিষ্টি ‘আইয়ে বৈঠিয়ে’ আর শোনা যায় না (মিষ্টভাষী ব্যবসায়ী যাত্রীরা অনুপস্থিত) (ভারত থেকে পাকিস্তানে চলে আসা)। এখন ছ-ফুট লম্বা পাঠানদের ‘দাগা, দাগা, দিলতা, রাওড়া,’ পাঞ্জাবিদের ‘তুবি, অসি’, আর শিখ সর্দারজিদের জালবন্ধ দাড়ির (ঘন দাড়ি) হরেক রকম বাহার।

সামনের বুড়ো সর্দারজিই প্রথম আলাপ আরম্ভ করলেন। ‘গোয়িঙ্গ ফার?’ নয়, সোজাসুজি ‘কহাঁ জাইয়েগা?’ আমি ডবল তসলিম (সালাম দিয়ে) করে সবিনয় উত্তর দিলুম— ভদ্রলোক ঠাকুরদার বয়সী আর জবরজঙ্গ দাড়ি (ঘন বড় দাঁড়ি)-গোঁফের ভিতর অতি মিষ্ট মোলায়েম হাসি। জিজ্ঞাসা করলেন, পেশাওয়ারে কাউকে চিনি? না হোটেলে উঠব। বললুম ‘বন্ধুর বন্ধু স্টেশনে আসবেন, তবে তাঁকে কখনো দেখিনি, তিনি যে আমাকে কী করে চিনবেন সে সম্বন্ধে ঈষৎ উদ্বেগ আছে।’

সর্দারজি হেসে বললেন, “কিছু ভয় নেই, পেশাওয়ার স্টেশনে এক গাড়ি বাঙালি নামে না, আপনি দু-মিনিট সবুর করলেই তিনি আপনাকে ঠিক খুঁজে নেবেন (পোশাকে ও অবয়বেই বাঙালিকে চেনা যায়)।”
আমি সাহস পেয়ে বললুম, “তা তো বটেই, তবে কিনা শার্ট পরে এসেছি (শার্ট-প্যান্ট সাধারণত বাঙালির ঐতিহ্য না)—” সর্দারজি এবার অট্টহাস করে বললেন, “শার্টে যে এক ফুট জায়গা ঢাকা পড়ে তাই দিয়ে মানুষ মানুষকে চেনে নাকি (ব্যঙ্গ প্রকাশ-শুধুমাত্র কোনো ব্যক্তির পোশাক বা বাহ্যিক চেহারা দিয়ে তার প্রকৃত পরিচয় বা তার চরিত্র বিচার করা উচিত নয়)?”
আমি আমতা আমতা করে বললুম, “তা নয়, তবে কিনা ধুতি-পাঞ্জাবি পরলে হয়ত ভালো হতো।”
সর্দারজিকে হারাবার উপায় নেই। বললেন, “এও তো তাজ্জবকি বাত (আশ্চর্যের বিষয়)- পাঞ্জাবি পরলে বাঙালিকে চেনা যায় (বাহ্যিক অবয়বে তো মানুষ চেনা যায় না)?”
আমি আর এগলুম না। বাঙালি ‘পাঞ্জাবি’ (পাঞ্জাবের অধিবাসী) ও পাঞ্জাবি কুর্তায় কী তফাত সে সম্বন্ধে সর্দারজিকে কিছু বলতে গেলে তিনি হয়ত আমাকে আরও বোকা বানিয়ে দেবেন। তার চেয়ে বরঞ্চ উনিই কথা বলুন, আমি শুনে যাই। জিজ্ঞাসা করলুম, “সর্দারজি শিলওয়ার বানাতে ক-গজ কাপড় লাগে ?”
বললেন, “দিল্লিতে সাড়ে তিন, জলন্ধরে (পাঞ্জাবের একটি রাজ্য) সাড়ে চার, লাহোরে সাড়ে পাঁচ, লালমুসায় সাড়ে ছয়, রাওলপিন্ডিতে সাড়ে সাত, তারপর পেশাওয়ার এক লক্ষে সাড়ে দশ, খাস পাঠানমুল্লুক কোহাট খাইবারে পুরো থান।” (সাংস্কৃতিক ও অর্থনৈতিক ভিন্নতা তুলে ধরা)
‘বিশ গজ!’
“হ্যাঁ, তাও আবার খাকি শার্টিং (বিশেষ ধরনের কাপড়) দিয়ে বানানো । ”
আমি বললুম, “এ রকম এক বস্তা কাপড় গায়ে জড়িয়ে চলাফেরা করে কী করে? মারপিট, খুন-রাহাজানির কথা বাদ দিন।”
সর্দারজি বললেন, “আপনি বুঝি কখনো বায়স্কোপ যান না (সিনেমা প্রদর্শন)? আমি এই বুড়োবয়সেও মাঝে মাঝে যাই । না গেলে ছেলে-ছোকরাদের মতিগতি বোঝাবার (বর্তমান সময়ের কালচার) উপায় নেই— আমার আবার একপাল নাতি-নাতনি। এই সেদিন দেখলুম, দুশো বছরের পুরোনো গল্পে এক মেমসায়েব ফ্রকের পর ফ্রক পরেই যাচ্ছেন, পরেই যাচ্ছেন— মনে নেই, দশখানা না বারোখানা। তাতে নিদেনপক্ষে (কমপক্ষে) চল্লিশগজ কাপড় লাগার কথা। সেই পরে যদি মেমরা নেচেকুঁদে থাকতে পারেন, তবে মদ্দা পাঠান বিশগজি শিলওয়ার পরে মারপিট করতে পারবে না কেন?” আমি খানিকটা ভেবে বললুম, “হক কথা; তবে কিনা বাজে খরচ।”

ইতোমধ্যে গল্পের ভিতর দিয়ে খবর পেয়ে গিয়েছি যে পাঠানমুল্লুকের প্রবাদ, “দিনের বেলা পেশাওয়ার ইংরেজের, রাত্রে পাঠানের। (নিরাপত্তাহীনতা)” শুনে গর্ব অনুভব করেছি বটে যে বন্দুকধারী পাঠান কামানধারী ইংরেজের সঙ্গে পাল্লা দিতে পারে কিন্তু বিন্দুমাত্র আরাম বোধ করিনি। গাড়ি পেশাওয়ার পৌঁছবে রাত নয়টায়। তখন যে কার রাজত্বে গিয়ে পৌছব তাই মনে মনে নানা ভাবনা ভাবছি; এমন সময় দেখি গাড়ি এসে পেশাওয়ারেই দাঁড়াল । 
                                                                              ২ 
প্ল্যাটফরমে বেশি ভিড় নেই। জিনিসপত্র নামাবার ফাঁকে লক্ষ করলুম যে ছ-ফুটি পাঠানদের চেয়েও একমাথা উঁচু এক ভদ্রলোক আমার দিকে এগিয়ে আসছেন। কাতর নয়নে তাঁর দিকে তাকিয়ে যতদূর সম্ভব নিজের বাঙালিত্ব জাহির করার সঙ্গে সঙ্গেই (পরিচয় দেওয়ার সাথেই) তিনি এসে উত্তম উর্দুতে আমাকে বললেন, তাঁর নাম শেখ আহমদ আলী। আমি নিজের নাম বলে এক হাত এগিয়ে দিতেই তিনি তাঁর দুহাতে সেটি লুফে নিয়ে দিলেন এক চাপ- পরম উৎসাহে, গরম সংবর্ধনায়। সে চাপে আমার হাতের পাঁচ আঙুল তাঁর দুই থাবার ভিতর তখন লুকোচুরি খেলছে।
খানিকটা কোলে-পিঠে, খানিকটা টেনে-হিঁচড়ে (ভিড় থেকে মুক্ত করে) তিনি আমাকে স্টেশনের বাইরে এনে একটা টাঙায় (ঘোড়ার গাড়ি) বসালেন। আমি তখন শুধু ভাবছি ভদ্রলোক আমাকে চেনেন না, জানেন না, আমি বাঙালি তিনি পাঠান। তবে যে এত সংবর্ধনা করছেন তার মানে কী (আন্তরিকতা দেখে অনিশ্চয়তাবোধ)? এর কতটা আন্তরিক, আর কতটা লৌকিকতা?
আজ বলতে পারি পাঠানের অভ্যর্থনা সম্পূর্ণ নির্জলা আন্তরিক । অতিথিকে বাড়িতে ডেকে নেওয়ার মতো আনন্দ পাঠান অন্য কোনো জিনিসে পায় না আর সে অতিথি যদি বিদেশি হয় তা হলে তো আর কথাই নেই ।
                                                                                ৩
আরবি ভাষায় একটি প্রবাদ আছে “ইয়োম উস সফর, নিসফ উস্ সফর” অর্থাৎ কিনা যাত্রার দিনই অর্ধেক ভ্রমণ (ভ্রমণের সবচেয়ে বড় ও কঠিন অংশ হলো যাত্রা শুরু করা।)। পূর্ব বাংলায়ও একই প্রবাদ প্রচলিত আছে। সেখানে বলা হয়, ‘উঠোন সমুদ্র পেরলেই আধেক মুশকিল আসান (নিজের আরামের স্থল পার হতে পারা সমুদ্র জয়ের চেয়ে কম নয়)।’ আহমদ আলীর উঠোন পেরোতে গিয়ে আমার পাক্কা সাতদিন কেটে গেল। আটদিনের দিন সকালবেলা আহমদ আলী স্বয়ং আমাকে একখানা বাসে ড্রাইভারের পাশে বসিয়ে তাকে আমার জান-মাল বাঁচাবার জন্য বিস্তর দিব্যদিলাশা (দোয়া ও শুভকামনা) দিয়ে বিদায় নিলেন। হাওড়া স্টেশনে মনে হয়েছিল ‘আমি একা’, এখন মনে হলো ‘আমি ভয়ংকর একা’। ‘ভয়ংকর একা’ এই অর্থে যে নো ম্যানস ল্যান্ডই বলুন আর খাস আফগানিস্তানই বলুন, এসব জায়গায় মানুষ আপন আপন প্রাণ নিয়েই ব্যস্ত (জীবনের ঝুঁকি)।
সাধারণ লোকের বিবেকবুদ্ধি এসব দেশে এরকম কথাই কয় (নিরাপত্তাহীনতার অভ্যস্ত)। তবু আফগানিস্তান স্বাধীন সভ্য দেশ (ব্যঙ্গ); আর পাঁচটা দেশ যখন খুন-খারাবির প্রতি এত বেমালুম উদাসীন নয় তখন তাঁদেরও তো কিছু একটা করবার আছে এই ভেবে দু-চারটে পুলিশ দু-একদিন অকুস্থলে (দুর্ঘটনা স্থলে) ঘোরাঘুরি করে যায় (লোকদেখানো নিরাপত্তার ব্যবস্থা)।
ডানদিকে ড্রাইভার শিখ সর্দারজি। বয়স ষাটের কাছাকাছি। কাঁচাপাকা দীর্ঘ দাড়ি ও পরে জানতে পারলুম রাতকানা। বাঁ দিকে আফগান সরকারের এক কর্মচারী। পেশাওয়ার গিয়েছিলেন কাবুল বেতারকেন্দ্রের মালসরঞ্জাম ছাড়িয়ে আনবার জন্য । সব ভাষাই জানেন অথচ বলতে গেলে এক ফরাসি ছাড়া অন্য কোনো ভাষাই জানেন না । অর্থাৎ আপনি যদি তাঁর ইংরেজি না বোঝেন তবে তিনি ভাবখানা করেন যেন আপনিই যথেষ্ট ইংরেজি জানেন না, তখন তিনি ফরাসির যে ছয়টি শব্দ জানেন সেগুলো ছাড়েন। তখনো যদি আপনি তার বক্তব্য না বোঝেন তবে তিনি উর্দু ঝাড়েন। শেষটায় এমন ভাব দেখান যে অশিক্ষিত বর্বরদের সঙ্গে কথা বলবার ঝকমারি আর তিনি কত পোহাবেন? অথচ পরে দেখলুম ভদ্রলোক অত্যন্ত বন্ধুবৎসল, বিপন্নের সহায়। তারও পরে বুঝতে পারলুম ভাষা বাবদে ভদ্রলোকের এ দুর্বলতা কেন যখন শুনতে পেলুম যে তিনি অনেক ভাষায় পাণ্ডিত্যের দাবি করে বেতারে চাকরি পেয়েছেন।
বাসের পেটে একপাল কাবুলি ব্যবসায়ী। পেশাওয়ার থেকে সিগারেট, গ্রামোফোন, রেকর্ড, পেলেট-বাসন, ঝাড়-লণ্ঠন, ফুটবল, বিজলি-বাতির সাজ-সরঞ্জাম, কেতাব-পুঁথি, এক কথায় দুনিয়ার সব জিনিস কিনে নিয়ে যাচ্ছে। বাদবাকি প্রায় সব কিছুই আমদানি করতে হয় হিন্দুস্থান থেকে, কিছুটা রুশ থেকে। এসব তথ্য জানবার জন্য আফগান সরকারের বাণিজ্য প্রতিবেদন পড়তে হয় না, কাবুল শহরে একটা চক্কর মারলেই হয়। সে সব পরের কথা । পেশাওয়ার থেকে জমরুদ দুর্গ সাড়ে দশ মাইল সমতল ভূমি। সেখানে একদফা পাসপোর্ট দেখাতে হলো। তারপর খাইবার গিরিসংকট।
                                                                          8
দুদিকে হাজার ফুট উঁচু পাথরের নেড়া পাহাড় (গাছপালা বিহীন কেবল পাথরের পাহাড়)। মাঝখানে খাইবারপাস (পাকিস্তান ও আফগানিস্তানের মাঝে সংযোগ সড়ক)। এক জোড়া রাস্তা এঁকেবেঁকে একে অন্যের গা ঘেঁষে চলেছে কাবুলের দিকে। এক রাস্তা মোটরের জন্য (আধুনিক রাস্তা দ্রুতগামী যানের জন্য), অন্য রাস্তা উট খচ্চর গাধা ঘোড়ার পণ্যবাহিনী বা ক্যারাভানের জন্য (মরুভূমিতে অনেক মানুষ উট বা ঘোড়ায় চড়ে দলবদ্ধভাবে পণ্য পরিবহন করত— একে বলা হত ক্যারাভান)। সংকীর্ণতম স্থলে দুই রাস্তায় মিলে ত্রিশ হাতও হবে না (সেই পাহাড়ি পথে দু’টি রাস্তা মিলেও মাত্র ত্রিশ হাত চওড়া— অর্থাৎ, খুবই সংকীর্ণ পথ)। সে রাস্তা আবার মাতালের মতো টলতে টলতে এতই এঁকেবেঁকে গিয়েছে (আঁকাবাঁকা জটিল রাস্তা) যে, যে কোনো জায়গায় দাঁড়ালে চোখে পড়ে ডানে বাঁয়ে পাহাড়, সামনে পিছনে পাহাড় ।
দ্বিপ্রহর সূর্য সেই নরককুণ্ডে সোজা নেমে এসেছে—তাই নিয়ে চতুর্দিকের পাহাড় যেন লোফালুফি খেলছে (দুপুরবেলা সূর্য ঠিক মাথার ওপরে। সেই তীব্র রোদে পাহাড়-ঘেরা জায়গাটা এমন গরম আর উত্তপ্ত, যেন একটা অগ্নিকুণ্ড। যেন চারপাশের পাহাড়গুলো সূর্যকে নিয়ে বাচ্চাদের মতো বল খেলার মতো খেলছে)। অবাক হয়ে দেখছি সেই গরমে বুখারার পুস্তিন (ফার) ব্যবসায়ীরা (উজবেকিস্তানের কোট ব্যবসায়ীরা) দুই ইঞ্চি পুরু লোমওয়ালা চামড়ার ওভারকোট গায়ে দিয়ে (এসব কোট ঠান্ডা দেশে পরে) খচ্চর খেদিয়ে খেদিয়ে ভারতবর্ষের দিকে চলেছে। সর্দারজিকে রহস্য (তীব্র গরমে শীতের পোশাক) সমাধানের অনুরোধ জানালে তিনি বললেন, যাদের অভ্যাস হয়ে গিয়েছে তাদের পক্ষে সত্যই এরকম পুরু জামা এই গরমে আরামদায়ক। বাইরের গরম ঢুকতে পারে না, শরীর ঠান্ডা রাখে। ঘাম তো আর এদেশে হয় না (মধ্য এশিয়ার বাতাসে আদ্রতা কম, তাই ঘাম হয় না বা টের পাওয়া যায় না), আর হলেই বা কি (কৌতুক প্রকাশ)? এরা তার থোড়াই পরোয়া করে । এটুকু বলতে বলতেই দেখলুম গরমের হল্কা (তপ্ত বাতাস) মুখে ঢুকে সর্দারজির গলা শুকিয়ে দিল। গল্প জমাবার চেষ্টা বৃথা।

কত দেশের কত রকমের লোক পণ্যবাহিনীর সঙ্গে সঙ্গে চলেছে। কত ঢঙের টুপি, কত রঙের পাগড়ি, কত যুগের অস্ত্র-গাদাবন্দুক (পুরোনো লম্বা নলওয়ালা বন্দুক) থেকে আরম্ভ করে আধুনিকতম জর্মন মাউজার (এক ধরনের রাইফেল)। দামেস্কের বিখ্যাত সুদর্শন তরবারি, সুপারি কাটার জাঁতির মতো ‘জামধর’ মোগল ছবিতে দেখেছিলুম (বিশেষ পোশাক পরিহিত মোগল যুগের প্রহরী), বাস্তবে দেখলুম হুবহু সেই রকম গোলাপি সিল্কের কোমরবন্ধে (বেল্ট) গোঁজা। কারো হাতে কানজোখা (প্রাচীন ভারতীয় অস্ত্র) পেতলে বাঁধানো লাঠি, কারো হাতে লম্বা ঝকঝকে বর্শা। উঠের পিঠে পশমে রেশমে বোনা কত রঙের কার্পেট, কত আকারের সামোভার (রাশিয়ান চা তৈরির ফ্লাক্স)। বস্তা বস্তা পেস্তা বাদাম আখরোট কিসমিস আলুবুখারা চলেছে হিন্দুস্থানের বিরিয়ানি পোলাওয়ের জৌলুস বাড়াবার জন্য। আরও চলেছে, শুনতে পেলুম, কোমরবন্ধের নিচে, ইজেরের ভাঁজে (লুঙ্গির মতো), পুস্তিনের লাইনিংয়ের (জ্যাকেটের ভাঁজে) ভিতরে আফিং আর হাসিস না ককেনই, না আরও কিছু।
সবাই চলেছে অতি ধীরে অতি মন্থরে।

পাঠান দু-বার বলেছিলেন, আমি তৃতীয়বার সেই প্রবাদ শপথরূপে গ্রহণ করলুম (গাড়ির মন্থর গতিতে অভিযোগ না করা)। ‘হন্তদন্ত হওয়ার মানে শয়তানের পন্থায় চলা। কে বলে বিংশ শতাব্দীতে অলৌকিক ঘটনা ঘটে না? আমার সকল সমস্যা সমাধান করেই (ব্যঙ্গ প্রকাশ) যেন ধড়াম করে শব্দ হলো। কাবুলি তড়িৎ গতিতে চোখের ফেটা খুলে (চোখ বড় করে) আমার দিকে বিবর্ণ মুখে তাকাল, আমি সর্দারজির দিকে তাকালুম। তিনি দেখি অতি শান্তভাবে (বিপদে প্রতিক্রিয়া নেই) গাড়িখানা এক পাশে নিয়ে দাঁড় করালেন। বললেন, টায়ার ফেঁসেছে। প্রতিবারেই হয়। এই গরমে না হওয়াই বিচিত্র।’

প্রয়োজন ছিল না, তবু সর্দারজি আমাদের স্মরণ করিয়ে দিলেন যে, খাইবার পাসের রাস্তা দুটো সরকারের বটে, কিন্তু দুদিকের জমি পাঠানের। সেখানে নেমেছ কি মরেছ (অনিরাপদ অবস্থা)। আড়ালে-আবডালে পাঠান সুযোগের অপেক্ষায় ওৎ পেতে বসে আছে (ছিনতাই রাহাজানির জন্য)। নামলেই কড়াক- পিঙ্ । তারপর কী কায়দায় সব কিছু হরণ করে তার বর্ণনা দেবার আর প্রয়োজন নেই।
পাঠান যাতে ঠিক রাস্তার বুকের ওপর রাহাজানি না করে তার জন্য খাইবার পাসের দুদিকে যেখানে বসতি আছে সেখানকার পাঠানদের ইংরেজ দু-টাকা করে বছরে খাজনা দেয়। পরে আরেকটি শর্ত অতি কষ্টে আদায় করেছে। আফ্রিদি আফ্রিদিতে ঝগড়া বাধলে রাস্তার এপারে ওপারে যেন বন্দুক না মারা হয়।
মোটর আবার চলল । কাবুলির গলা ভেঙে গিয়েছে। তবু বিড়বিড় করে যা বলছিলেন, তার নির্যাস-
কিচ্ছু ভয় নেই সায়েব- কালই কাবুল পৌঁছে যাচ্ছি। সেখানে পৌঁছে কব্ করে কাবুল নদীতে ডুব দেব। বরফগলা হিমজল পাহাড় থেকে নেমে এসেছে, দিল জান কলিজা সব ঠাণ্ডা হয়ে যাবে। আমি বললুম, “আপনার মুখে ফুলচন্দন পড়ুক।” (ভ্রমণের তীব্র প্রতিকূলতায় ভালোর প্রত্যাশা যেন স্বপ্ন মনে হয়)
হঠাৎ দেখি সামনে একি! মরীচিকা? সমস্ত রাস্তা বন্ধ করে গেট কেন? মোটর থামল। পাসপোর্ট দেখাতে হলো । গেট খুলে গেল। আফগানিস্তানে ঢুকলুম। বড়ো বড়ো হরফে সাইনবোর্ডে লেখা—
কাবুলি বললেন, “দুনিয়ার সব পরীক্ষা পাস করার চেয়ে বড় পরীক্ষা খাইবারপাস পাস করা (প্রতিকূলতা)। আলহামদুলিল্লা (খুদাকে ধন্যবাদ)।”
আমি বললুম, “আমেন ।
                                                                                  ৫
খাইবার পাস তো দুঃখে-সুখে পেরোলুম এবং মনে মনে আশা করলুম এইবার গরম কমবে। কমলো বটে, কিন্তু পাসের ভিতর পিচ-ঢালা রাস্তা ছিল (মানুষের তৈরি রাস্তা)—তা সে সংকীর্ণ হোক আর বিস্তীর্ণই হোক। এখন আর রাস্তা বলে কোনো বালাই নেই। হাজারো বৎসরের লোক-চলাচলের ফলে পাথর এবং অতি সামান্য মাটির ওপর যে দাগ পড়েছে তারই উপর দিয়ে মোটর চলল (প্রাকৃতিক রাস্তা)। এ দাগের ওপর দিয়ে পণ্যবাহিনীর যেতে আসতে কোনো অসুবিধা হয় না (ধীরে চলে বলে)। কিন্তু মোটর-আরোহীর পক্ষে যে কতদূর পীড়াদায়ক হতে পারে (রুক্ষ পথের কষ্টকর অভিজ্ঞতা) তার খানিকটা তুলনা হয় বীরভূম-বাঁকুড়ায় ডাঙ্গা ও খোয়াইয়ে (পাথুরে ও অসমতল মাটির রাস্তা) রাত্রিকালে গোরুর গাড়ি চড়ার সঙ্গে— যদি সে গাড়ি কুড়ি মাইল বেগে চলে, ভিতরে খড়ের পুরু তোশক না থাকে এবং ছোটবড় নুড়ি (পাথর) দিয়ে ডাঙ্গা-খোয়াই (অসমতল মাটি-পাথরের রাস্তা) ছেয়ে ফেলা হয়। (কষ্টকর ও ঝাকুনিদায়ক রাস্তা)
লান্ডিকোটাল থেকে দক্কা দশ মাইল ।
সেই মরুপ্রান্তরে দক্কাদুর্গ অত্যন্ত অবান্তর বলে মনে হলো (বিভিন্ন প্রতিকূলতার কারণে মরুভূমির মধ্যে দুর্গ অবান্তর)। মাটি আর খড় মিশিয়ে পিটে পিটে উঁচু দেয়াল গড়ে তোলা হয়েছে আশপাশের রঙের সঙ্গে রং মিলিয়ে- ফ্যাকাশে, ময়লা, ঘিনঘিনে হলদে রং। দেয়ালের ওপরের দিকে এক সারি গর্ত; দুর্গের লোক তারই ভিতরে দিয়ে বন্দুকের নল গলিয়ে নিরাপদে বাইরের শত্রুকে গুলি করতে পারে। দূর থেকে সেই কালো কালো গর্ত দেখে মনে হয় যেন অন্ধের উপড়ে নেওয়া চোখের শূন্য কোটর।
কিন্তু দুর্গের সামনে এসে বাঁ দিকে তাকিয়ে চোখ জুড়িয়ে গেল। ছলছল করে কাবুল নদী বাঁক নিয়ে এক পাশ দিয়ে চলে গিয়েছেন- ডান দিকে এক ফালি সবুজ আঁচল লুটিয়ে পড়েছে।
কাবুলি বললেন,
“চলুন দুর্গের ভিতরে যাই। পাসপোর্ট দেখাতে হবে। আমরা সরকারি কর্মচারী। তাড়াতাড়ি ছেড়ে দেবে। তাহলে সন্ধ্যার আগেই জালালাবাদ পৌঁছতে পারব।”
দুর্গের অফিসার আমাকে বিদেশি দেখে প্রচুর খাতির-যত্ন করলেন। দক্কার মতো জায়গায় বরফের কল (পানিকে বরফে রূপান্তরের মেশিন) থাকার কথা নয়, কিন্তু যে শরবত খেলুম তার জন্য ঠাণ্ডা জল কুঁজোতে (পানি ঠান্ডা রাখার জন্য মাটির পাত্র) কী করে তৈরি করা সম্ভব হলো বুঝতে পারলুম না।
                                                                               ৬
আফগানিস্তানের অফিসার যদি কবি হতে পারেন, তবে তাঁর পক্ষে পির হয়ে ভবিষ্যদ্বাণী করাও কিছুমাত্র বিচিত্র নয় (কবিরা যেমন কল্পনা দিয়ে ভবিষ্যতের কথা দেখতে পারে, তেমনই পিরও করেন ভবিষ্যতের পূর্বাভাস দেয়- রসবোধ প্রকাশ)। তিন-তিনবার চাকা ফাটলো, আর ইঞ্জিন সর্দারজির ওপর গোসা করে দুবার গুম (ইঞ্জিন বন্ধ) হলেন। চাকা সারাল হ্যাজি ম্যানন – তদারক করলেন সর্দারজি।
জালালাবাদ পৌঁছবার কয়েক মাইল আগে সর্দারজির কোমরবন্ধ অথবা নীবিবন্ধ কিংবা বেল্ট- যাই বলুন, ছিঁড়ে দুটুকরো হলো। তখন খবর পেলুম সর্দারজিও রাতকানা। রেডিওর কর্মচারী আমার কানটাকে মাইক্রোফোন ভেবে ফিস ফিস করে প্রচার করে দিলেন, “অদ্যকার মতো আমাদের অনুষ্ঠান এইখানেই সমাপ্ত হলো। কাল সকাল সাতটায় আমরা আবার উপস্থিত হব।”
আধ মাইলটাক দূরে আফগান সরাই (বিশ্রামস্থল)। বেতারের সায়েব ও আমি আস্তে আস্তে সেদিকে এগিয়ে চললুম। বাদবাকি আর সকলে হৈ-হল্লা করে (উৎসব সহকারে) করে গাড়ি ঠেলে নিয়ে চলল। সর্দারজি তন্বী (নরম স্বরে) করে বললেন, “একটু পা চালিয়ে। সন্ধ্যা হয়ে গেলে সরাইয়ের দরজা বন্ধ করে দেবে।”
সরাই তো নয়, ভীষণ দুশমনের মতো দাঁড়িয়ে এক চৌকো দুর্গ (চারকোণা দুর্গ)। “কর্মঅন্তে নিভৃত পান্থশালাতে” (কাজ শেষ করে নিরিবিলি কোনো যাত্রাবিরতির ঘরে) বলতে আমাদের চোখে যে স্নিগ্ধতার ছবি ফুটে উঠে এর সঙ্গে তার কোনো সংশ্রব নেই (পরিবেশ মনোমুগ্ধকর নয়)। ত্রিশ ফুট উঁচু হলদে মাটির নিরেট চারখানা দেয়াল, সামনের খানাতে এক বিরাট দরজা- তার ভেতর দিয়ে উট, বাস, ডবল-ডেকার পর্যন্ত অনায়াসে ঢুকতে পারে, কিন্তু ভেতরে যাবার সময় মনে হয়, এই শেষ ঢোকা, এ দানবের পেট থেকে আর বেরোতে হবে না (এত অন্ধকার ও বিশাল যে, মনে হয় দানব গিলে ফেলেছে)। ঢুকেই থমকে দাঁড়ালুম। কত শত শতাব্দীর পুঞ্জীভূত দুর্গন্ধ আমাকে ধাক্কা মেরেছিল বলতে পারি নে, কিন্তু মনে হলো আমি যেন সে ধাক্কায় তিন গজ পিছিয়ে গেলুম। ব্যাপারটা কী বুঝতে অবশ্য বেশি সময় লাগল না। এলাকাটা মৌসুমি হাওয়ার বাইরে, তাই এখানে কখনো বৃষ্টি হয় না- যথেষ্ট উঁচু নয় বলে বরফও পড়ে না । আশেপাশে নদী বা ঝরনা নেই বলে ধোয়ামোছার জন্য জলের বাজে খরচার কথাও ওঠে না। অতএব সিকন্দরশাহি বাজিরাজ (রাজকীয় ঘোড়া) থেকে আরম্ভ করে পরশুদিনের আস্ত ভেড়ার পাল যে সব ‘অবদান’ রেখে গিয়েছে (ব্যঙ্গাত্মক রসিকতা), তার স্থূলভাগ মাঝে মাঝে সাফ করা হয়েছে বটে, কিন্তু সূক্ষ্ম গন্ধ সর্বত্র এমনি স্তরীভূত হয়ে আছে যে, ভয় হয় ধাক্কা দিয়ে না সরালে এগিয়ে যাওয়া অসম্ভব। সূচিভেদ্য (সুঁচ দিয়ে ঢোকানো যায়) অন্ধকার দেখেছি, এই প্রথম সূচিভেদ্য দুর্গন্ধ শুকলুম। (এমন অন্ধকার দেখেছি যেখানে সুঁচও ঢুকবে না, কিন্তু এবার এমন গন্ধ পেলাম, যেটা এতটাই তীব্র ও ঘন, মনে হচ্ছে সুঁচ দিয়ে ফুঁড়ে ঢুকানো যাবে!)
                                                                               ৭
ভোরবেলা ঘুম ভাঙল আজান শুনে । নামাজ পড়ালেন বুখারার এক পুস্তিন সদাগর। উৎকৃষ্ট আরবি উচ্চারণ শুনে বিস্ময় মানলুম যে তুর্কিস্তানে এত ভালো উচ্চারণ টিকে রইল কী করে। বেতারওয়ালাকে জিজ্ঞাসা করাতে তিনি বললেন, “আপনি নিজেই জিজ্ঞেস করুন না।” আমি বললুম, “কিছু যদি মনে করেন?” আমার এই সংকোচে তিনি এত আশ্চর্য হলেন যে বুঝতে পারলুম, খাস প্রাচ্য দেশে অচেনা-অজানা লোককে যে কোনো প্রশ্ন জিজ্ঞাসা করতে বাধা নেই। পরে জানলুম, যার সম্বন্ধে (সুন্দর তেলাওয়াত নিয়ে প্রশ্ন) কৌতূহল দেখানো হয় সে তাতে বরঞ্চ খুশিই হয়। মোটরে বসে তারই খেই (প্রসঙ্গ) তুলে নিয়ে আগের রাতের অভিজ্ঞতার জমাখরচা নিতে লাগলুম।
চোখ বন্ধ অবস্থায়ই ঠাণ্ডা হাওয়ার প্রথম পরশ পেলুম; খুলে দেখি সামনে সবুজ উপত্যকা- রাস্তার দুদিকে ফসল ক্ষেত। সর্দারজি পরিচয় করিয়ে দিয়ে বললেন, ‘জালালাবাদ’। তখন দুদিকেই সবুজ, আর লোকজনের ঘরবাড়ি। সামান্য একটি নদী ক্ষুদ্রতম সুযোগ পেলে যে কী মোহন সবুজের লীলাখেলা দেখাতে পারে (কৃষিক্ষেত্রে নদীর গুরুত্ব) জালালাবাদে তার অতি মধুর তসবির (ছবি)। এমনকি যে দু-চারটে পাঠান রাস্তা দিয়ে যাচ্ছিল তাদের চেহারাও যেন সীমান্তের পাঠানের চেয়ে মোলায়েম বলে মনে হলো (প্রাকৃতিক পরিবেশ মানুষের অন্তরে প্রভাব বিস্তার করে)। লক্ষ করলুম, যে পাঠান শহরে গিয়ে সেখানকার মেয়েদের বেপর্দামি নিন্দা করে তারই বউ-ঝি ক্ষেতে কাজ করছে অন্য দেশের মেয়েদেরই মতো। মুখ তুলে বাসের দিকে তাকাতেও তাদের আপত্তি নেই (গুরুত্ব সহকারে পর্দা মানে না)। বেতার কর্তাকে জিজ্ঞাসা করতে তিনি গম্ভীরভাবে বললেন, “আমার যতদূর জানা, কোনো দেশের গরিব মেয়েই পর্দা মানে না, অন্তত আপন গাঁয়ে মানে না। শহরে গিয়ে মধ্যবিত্তের অনুকরণে কখনো পর্দা মেনে ‘ভদ্রলোক হবার চেষ্টা করে’ কখনো কাজ-কর্মের অসুবিধা হয় বলে গাঁয়ের রেওয়াজই বজায় রাখে।” আমি জিজ্ঞাসা করলুম, “আরবের বেদুইন মেয়েরা”।
তিনি বললেন, ‘আমি ইরাকে তাদের বিনা পর্দায় ছাগল চরাতে দেখেছি।’
গাড়ি সদর রাস্তা ছেড়ে জালালাবাদ শহরে ঢুকল। কাবুলিরা সব বাসের পেট থেকে বেরিয়ে এক মিনিটের ভেতর অন্তর্ধান। কেউ একবার জিজ্ঞেস পর্যন্ত করল না, বাস ফের ছাড়বে কখন । আমার তো এই প্রথম যাত্রা, তাই সর্দারজিকে শুধালাম “বাস আবার ছাড়বে কখন?” সর্দারজি বললেন, আবার যখন সবাই জড়ো হবে। জিজ্ঞেস করলুম সে কবে? সর্দারজি যেন একটু বিরক্ত হয়ে বললেন, “আমি তার কী জানি? সবাই খেয়েদেয়ে ফিরে আসবে যখন তখন।”
বেতারকর্তা বললেন, “ঠায় দাঁড়িয়ে করছেন কী? আসুন আমার সঙ্গে।” আমি শুধালাম, “আর সব গেল কোথায়? ফিরবেই বা কখন?”
তিনি বললেন, “ওদের জন্য আপনি এত উদ্বিগ্ন হচ্ছেন কেন, আপনি তো ওদের মালজানের জিম্মাদার নন।” আমি বললুম, “তা তো নই-ই। কিন্তু যেরকম ভাবে হুট করে সবাই নিরুদ্দেশ হলো তাতে তো মনে হলো না যে ওরা শিগগির ফিরবে। আজ সন্ধ্যায় তা হলে কাবুল পৌঁছব কী করে?”
বেতারকর্তা বললেন, ‘সে আশা শিকেয় তুলে রাখুন। এদের তো কাবুল পৌঁছবার কোনো তাড়া নেই। বাস যখন ছিল না, তখন ওরা কাবুল পৌঁছত পনেরো দিনে, এখন চার দিন লাগলেও তাদের আপত্তি নেই। জালালাবাদে পৌঁছেছে এখানে সক্কলেরই কাকা-মামা-শালা, কেউ-না-কেউ আছে, তাদের তত্ত্বতালাশ করবে, খাবে-দাবে, তারপর ফিরে আসবে।’
                                                                                 ৮
মোটর ছাড়ল অনেক বেলায়। কাজেই বেলাবেলি (দিনে দিনে) কাবুল পৌঁছবার আর কোনো ভরসাই রইল না। পেশাওয়ার থেকে জালালাবাদ একশ মাইল, জালালাবাদ থেকে কাবুল আরও একশ মাইল । শাস্ত্রে লেখে, সকলে পেশওয়ার ছেড়ে সন্ধ্যায় জালালাবাদ পৌঁছবে। পরদিন ভোরবেলা জালালাবাদ ছেড়ে সন্ধ্যায় কাবুল। তখনই বোঝা উচিত ছিল যে, শাস্ত্র মানে অল্প লোকেই। পরে জানলুম একমাত্র মেল বাস ছাড়া আর কেউ শাস্ত্রনির্দিষ্ট বেগে চলে না। সন্ধ্যা কাটল নালার পারে, নারগিস বনের এক পাশে, চিনার মর্মরের মাঝখানে। (কোনো সরু নদীর ধারে, পাশেই নারগিস ফুলে ভরা এক বন, আর তার ওপরে চিনার ফলের গাছের পাতারা বাতাসে ফিসফিস করছে।)
সূর্যাস্তের শেষ আভাটুকু চিনার-পল্লব থেকে মুছে যাওয়ার পরে ডাক-বাংলোর খানসামা (খাবার পরিবেশক) আহার দিয়ে গেল। খেয়েদেয়ে সেখানেই চারপাই (চৌকি) আনিয়ে শুয়ে পড়লুম ।
শেষরাত্রে ঘুম ভাঙল অপূর্ব মাধুরীর মাঝখানে। হঠাৎ শুনি নিতান্ত কানের পাশে জলের কুলুকুলু শব্দ আর আমার সর্বদেহ জড়িয়ে নাকমুখ ছাপিয়ে কোন অজানা সৌরভ সুন্দরীর মধুর নিঃশ্বাস ।
শেষরাত্রে নৌকা যখন বিল ছেড়ে নদীতে নামে তখন যেমন নদীর কুলুকুলু শব্দে ঘুম ভেঙে যায়, জানলার পাশে শিউলি গাছ থাকলে শরতের অতি ভোরে যে রকম তন্দ্রা টুটে যায় (প্রকৃতির স্নিগ্ধতা), এখানে তাই হলো কিন্তু দুয়ে মিলে গিয়ে। এ সংগীত বহুবার শুনেছি, কিন্তু তার সঙ্গে এহেন সৌরভসোহাগ জীবনে আর কখনো পাইনি।
সেই আধা-আলো-অন্ধকারে চেয়ে দেখি দিনের বেলার শুকনো নালা জলে ভরে গিয়ে দুই কূল ছাপিয়ে নারগিসের পা ধুয়ে দিয়ে ছুটে চলেছে। বুঝলুম নালার উজানে দিনের বেলায় বাঁধ দিয়ে জল বন্ধ করা হয়েছিল— ভোরের আজানের সময় নিমলার বাগানের পালা; বাঁধ খুলে দিতেই নালা ছাপিয়ে জল ছুটেছে— তারই পরশে নারগিস নয়ন মেলে তাকিয়েছে (বনের সৌন্দর্য ফুটে উঠেছে)। এর গান ওর সৌরভে মিশে গিয়েছে।
আর যে-চিনারের পদপ্রান্তে উভয়ের সংগীতে সৌরভ উচ্ছ্বসিত হয়ে উঠেছে, সে তার মাথা তুলে দাঁড়িয়ে আছে প্রভাতসূর্যের প্রথম রশ্মির নবীন অভিষেকের জন্য। দেখতে-না-দেখতে চিনার সোনার মুকুট পরে নিল (সূর্যের সোনালি আভা) – পদপ্রান্তে পুষ্পবনের গন্ধধূপে (সুগন্ধে) বৈতালিক (ভোরে-সন্ধ্যায় গাওয়া ভক্তিমূলক গান) মুখরিত হয়ে উঠল। (পায়ের কাছে ফুলে ভরা বনের মিষ্টি গন্ধ ধূপের মতো ছড়িয়ে পড়ল, আর সেই গন্ধময় পরিবেশে ভেসে উঠল বৈতালিক সঙ্গীত — সব মিলিয়ে যেন চারপাশ এক মুগ্ধ মুহূর্তে ডুবে গেল।)

ভোরের নামাজ শেষ হতেই সর্দারজি ভেঁপু বাজাতে আরম্ভ করলেন। ভাবগতিক দেখে মনে হলো তিনি মনস্থির করে ফেলেছেন, আজ সন্ধ্যায় যে করেই হোক কাবুল পৌঁছবেন।

                content: `
সমাজের (রাষ্ট্রের) কাজ কেবল টিকে থাকার সুবিধা দেওয়া নয় (বেচে থাকাটাই সার্থকতা নয়), মানুষকে (মানসিকভাবে) বড় করে তোলা, বিকশিত (সমৃদ্ধ) জীবনের জন্য মানুষের জীবনে আগ্রহ জাগিয়ে দেওয়া (মানুষের মধ্যে অনুপ্রেরণা জাগানো)। স্বল্পপ্রাণ (সংবেদনশীল) স্থূলবুদ্ধি (অদূরদর্শী) ও জবরদস্তিপ্রিয় (বিচার বিবেচনাহীন) মানুষে সংসার (সমাজ) পরিপূর্ণ। তাদের কাজ নিজের জীবনকে সার্থক ও সুন্দর করে তোলা নয়, অপরের সার্থকতার পথে অন্তরায় সৃষ্টি করা (অপরের উন্নতিতে প্রতিবন্ধকতা সৃষ্টি করা)। প্রেম ও সৌন্দর্যের (মানবিক প্রেমের অভাবে) স্পর্শ লাভ করেনি বলে এরা নিষ্ঠুর ও বিকৃতবুদ্ধি (যথাযথ চিন্তাচেতনাহীন)। এদের একমাত্র দেবতা অহংকার। তারই চরণে তারা নিবেদিতপ্রাণ। ব্যক্তিগত অহংকার, পারিবারিক অহংকার, জাতিগত অহংকার- এ সবের নিশান ওড়ানোই এদের কাজ (অহংকারের মাধ্যমে বিভেদ সৃষ্টিই করাই তাদের কাজ)। মাঝে মাঝে মানবপ্রেমের কথাও তারা বলে (লৌকিকতা)। কিন্তু তাতে নেশা ধরে না, মনে হয় আন্তরিকতাশূন্য, উপলব্ধিহীন বুলি ।

এদের স্থানে এনে দিতে হবে বড় মানুষ— সূক্ষ্মবুদ্ধি (বিচক্ষণ) উদারহৃদয় (বড় মনের অধিকারী) গভীরচিত্ত (গভীর চেতনার অধিকারী) ব্যক্তি, যাদের কাছে বড় হয়ে উঠবে জীবনের বিকাশ (সমৃদ্ধ জীবনের প্রত্যাশা), কেবল টিকে থাকা নয় (মানবেতর জীবন যাপন নয়)। তাদের কাছে জীবনাদর্শের প্রতীক হবে প্রাণহীন ছাঁচ বা কল নয় (লক্ষ্যহীন জীবন নয়), সজীব বৃক্ষ— যার বৃদ্ধি আছে, গতি আছে, বিকাশ আছে, ফুলে ফলে পরিপূর্ণ হয়ে অপরের সেবার জন্য প্রস্তুত হওয়া যার কাজ (অপরের সেবা করাই বৃক্ষের কাজ)। বৃক্ষের জীবনের গতি ও বিকাশকে উপলব্ধি করা দরকার (বৃক্ষকে উপলব্ধি করে মানুষের জীবন সার্থক করা), নইলে সার্থকতা ও পরিপূর্ণতার ছবি চোখের সামনে ফুটিয়ে তোলা সম্ভব হবে না।

বৃক্ষের দিকে তাকালে জীবনের তাৎপর্য উপলব্ধি সহজ হয়। তাই, বারবার সেদিকে তাকানো প্রয়োজন (শিক্ষা নেওয়ার জন্য)। মাটির রস টেনে নিয়ে নিজেকে মোটাসোটা করে তোলাতেই বৃক্ষের কাজের সমাপ্তি নয় (আত্মকেন্দ্রিক কাজেই বৃক্ষ সীমাবদ্ধ থাকে না)। তাকে ফুল ফোটাতে হয়, ফল ধরাতে হয়। নইলে তার জীবন অসম্পূর্ণ থেকে যাবে (অপরের জন্য কাজ করতে না পারায়)। তাই বৃক্ষকে সার্থকতার প্রতীক হিসেবে গ্রহণ করার প্রয়োজনীয়তা সজীবতা ও সার্থকতার এমন জীবন্ত দৃষ্টান্ত আর নেই (বৃক্ষ থেকে মানুষ নিজের জন্য সার্থক ও অপরের জন্য পরিপূর্ণ হতে পারে)।

অবশ্য রবীন্দ্রনাথ অন্য কথা বলেছেন। ফুলের ফোটা আর নদীর গতির সঙ্গে তুলনা করে তিনি নদীর গতির মধ্যেই মনুষ্যত্বের সাদৃশ্য দেখতে পেয়েছেন। তাঁর মনে মনুষ্যত্বের বেদনা নদীর গতিতেই উপলব্ধ হয়, ফুলের ফোটায় নয় । ফুলের ফোটা সহজ, নদীর গতি সহজ নয়— তাকে অনেক বাধা ডিঙানোর দুঃখ পেতে হয় (মানুষের জীবন ফুল ফোটার মতো সহজ নয়, শত প্রতিবন্ধকতা পার হতে হয়)। কিন্তু ফুলের ফোটার দিকে না তাকিয়ে বৃক্ষের ফুল ফোটানোর দিকে তাকালে বোধ হয় রবীন্দ্রনাথ ভালো করতেন (ফুল নয়, ফুল ফোটাতে বৃক্ষের ত্যাগকে অনুসরণ করতে বলা হয়েছে)। তপোবনপ্রেমিক (প্রকৃতি প্রেমিক) রবীন্দ্রনাথ কেন যে তা করলেন না বোঝা মুশকিল।

জানি, বলা হবে : (বাহ্যিক দৃষ্টিতে) নদীর গতিতে মনুষ্যত্বের দুঃখ যতটা স্পষ্ট হয়ে ওঠে বৃক্ষের ফুল ফোটানোয় তা তত স্পষ্ট হয়ে ওঠে না। তাই কবি নদীকেই মনুষ্যত্বের প্রতীক করতে চেয়েছেন।
উত্তরে বলব : চর্মচক্ষুকে বড় না করে কল্পনা ও অনুভূতির চক্ষুকে (অন্তর্দৃষ্টি দিয়ে পরিস্থিতি পর্যবেক্ষণ করা) বড় করে তুললে বৃক্ষের বেদনাও সহজে উপলব্ধি করা যায়। আর বৃক্ষের সাধনায় যেমন একটা ধীরস্থির ভাব দেখতে পাওয়া যায়, মানুষের সাধনায়ও তেমনি একটা ধীরস্থির ভাব দেখতে পাওয়া যায়, আর এটাই হওয়া উচিত নয় কি (স্থিরতাই সাধনার সাফল্য)? অনবরত ধেয়ে চলা মানুষের সাধনা হওয়া উচিত নয় (অস্থিরতার মাধ্যমে সাধনা অর্জন করা যায় না)। যাকে বলা হয় গোপন ও নীরব সাধনা তা বৃক্ষেই অভিব্যক্ত, নদীতে নয় । তাছাড়া বৃক্ষের সার্থকতার ছবি যত সহজে উপলব্ধি করতে পারি, নদীর সার্থকতার ছবি তত সহজে উপলব্ধি করা যায় না (সার্থকতা ছাড়া সাধনা মূল্যহীন)। নদী সাগরে পতিত হয় সত্য, কিন্তু তার ছবি আমরা প্রত্যহ দেখতে পাই না। বৃক্ষের ফুল ফোটানো ও ফল ধরানোর ছবি কিন্তু প্রত্যহ চোখে পড়ে। দোরের কাছে দাঁড়িয়ে থেকে সে অনবরত নতি (বিনয়), শান্তি ও সেবার বাণী প্রচার করে (বৃক্ষের বার্তা)।

সাধনার ব্যাপারে প্রাপ্তি একটা বড় জিনিস (অনুপ্রেরণার জন্য)। নদীর সাগরে পতিত হওয়ায় সেই প্রাপ্তি স্পষ্ট হয়ে ওঠে না। সে তো প্রাপ্তি নয়, আত্মবিসর্জন (প্রাপ্তি ছাড়া আত্মবিসর্জন সাফল্য নয়)। অপরপক্ষে বৃক্ষের প্রাপ্তি চোখের সামনে ছবি হয়ে ফুটে ওঠে। ফুলে ফলে যখন সে পরিপূর্ণ হয়ে ওঠে তখন আপনা থেকেই বলতে ইচ্ছা হয় : এই তো সাধনার সার্থকতা। বৃক্ষে প্রাপ্তি ও দান (নিজের জন্য প্রাপ্তি ও অপরের জন্য দান)। সৃজনশীল মানুষেরও প্রাপ্তি ও দানে পার্থক্য দেখা যায় না। যা তার প্রাপ্তি তা-ই তার দান ।
বৃক্ষের পানে তাকিয়ে রবীন্দ্রনাথ নিশ্চয়ই অন্তরের সৃষ্টিধর্ম উপলব্ধি করেছেন। বহু কবিতায় তার পরিচয় পাওয়া যায়। কিন্তু গদ্যে তিনি তা স্পষ্ট করে বলেননি। বললে ভালো হতো। তাহলে নিজের ঘরের কাছেই যে সার্থকতার প্রতীক রয়েছে, সে সম্বন্ধে আমরা সচেতন হতে পারতাম।

নীরব ভাষায় বৃক্ষ আমাদের সার্থকতার গান গেয়ে শোনায়। অনুভূতির কান দিয়ে সে গান শুনতে হবে। তাহলে বুঝতে পারা যাবে জীবনের মানে বৃদ্ধি (আত্মিক বৃদ্ধি), ধর্মের মানেও তাই। প্রকৃতির যে ধর্ম মানুষের সে ধর্ম; পার্থক্য কেবল তরুলতা ও জীবজন্তুর বৃদ্ধির ওপর তাদের নিজেদের কোনো হাত নেই, মানুষের বৃদ্ধির ওপরে তার নিজের হাত রয়েছে (ভালো-মন্দ পরিমাপের মাপকাঠি মানুষের জানা আছে)। আর এখানেই মানুষের মর্যাদা। মানুষের বৃদ্ধি কেবল দৈহিক নয়, আত্মিকও। মানুষকে আত্মা সৃষ্টি করে নিতে হয় (আত্মশুদ্ধি অর্জন করে নিতে হয়), তা তৈরি পাওয়া যায় না। সুখ-দুঃখ-বেদনা উপলব্ধির ফলে অন্তরের যে পরিপক্বতা, তাই তো আত্মা। এই আত্মারূপ (আত্মশুদ্ধির অর্জন) ফল স্রষ্টার উপভোগ্য । তাই মহাকবির (শেক্সপিয়র) মুখে শুনতে পাওয়া যায় : ‘Ripeness is all’- পরিপক্বতাই সব (পরিপূর্ণ বিকাশসাধন)।

আত্মাকে মধুর ও পুষ্ট করে গড়ে তুলতে হবে। নইলে তা স্রষ্টার উপভোগের উপযুক্ত হবে না। বিচিত্র অভিজ্ঞতা, প্রচুর প্রেম ও গভীর অনুভূতির দ্বারা আত্মার পরিপুষ্টি ও মাধুর্য সম্পাদন সম্ভব। তাই তাদের সাধনাই মানুষের শিক্ষার প্রধান বিষয়বস্তু (সাহিত্যের গুরুত্ব)। বস্তুজিজ্ঞাসা তথা বিজ্ঞান কখনো শিক্ষার প্রধান বিষয়বস্তু হতে পারে না (বিজ্ঞান বস্তু নিয়ে কাজ করে, মানুষের আত্মা-মন নিয়ে নয়)। কেননা, তাতে আত্মার উন্নতি হয় না- জীবনবোধ ও মূল্যবোধে অন্তর পরিপূর্ণ হয় না; তা হয় সাহিত্য-শিল্পকলার দ্বারা। তাই শিক্ষাক্ষেত্রে তাদের এত মূল্য।

ওপরে যে বৃদ্ধির কথা বলা হলো বৃক্ষের জীবন তার চমৎকার নিদর্শন। বৃক্ষের অঙ্কুরিত হওয়া থেকে ফলবান হওয়া পর্যন্ত সেখানে কেবলই বৃদ্ধির ইতিহাস। বৃক্ষের পানে তাকিয়ে আমরা লাভবান হতে পারি— জীবনের গূঢ় অর্থ (প্রচ্ছন্ন গভীর তাৎপর্য) সম্বন্ধে সচেতন হতে পারি বলে।
বৃক্ষ যে কেবল বৃদ্ধির ইশারা তা নয়- প্রশান্তিরও ইঙ্গিত। অতি শান্ত ও সহিষ্ণুতায় সে জীবনের গুরুভার বহন করে।

                content: `
সে ছিল চমৎকার এক সুন্দরী তরুণী। নিয়তির ভুলেই (মন্দভাগ্য) যেন এক কেরানির (নিম্নপদস্থ কর্মচারী) পরিবারে তার জন্ম হয়েছে। তার ছিল না কোনো আনন্দ, কোনো আশা। পরিচিত হবার, প্রশংসা পাওয়ার, প্রেমলাভ করার এবং কোনো ধনী অথবা বিশিষ্ট লোকের সঙ্গে বিবাহিত হওয়ার কোনো উপায় তার ছিল না (সমাজ ব্যবস্থার কারণে)। তাই শিক্ষা পরিষদ আপিসের সমান্য এক কেরানির সঙ্গে বিবাহ সে স্বীকার করে নিয়েছিল (উপায়ান্তর না দেখে)। নিজেকে সজ্জিত করার অক্ষমতার জন্য সে সাধারণভাবেই থাকত। কিন্তু তার শ্রেণির অন্যতম হিসেবে সে ছিল অসুখী (দরিদ্র হলেও বিলাসিতা না করতে পারায় তার মনে দুঃখ ছিল)। তাদের কোনো জাতিবর্ণ নেই (গরিবের কোনো জাতভেদ নেই)। কারণ জন্মের পরে পরিবার থেকেই তারা শ্রী, সৌন্দর্য ও মাধুর্য সম্পর্কে সজাগ হয়ে ওঠে। সহজাত চাতুর্য, প্রকৃতিগত সুরুচিপূর্ণ ও আর বুদ্ধির নমনীয়তাই হলো তাদের আভিজাত্য, যার ফলে অনেক সাধারণ পরিবারের মেয়েকেও বিশিষ্ট মহিলার সমকক্ষ করে তোলে (বয়সের পরিপক্কতা)। সর্বদা তার মনে দুঃখ।
তার ধারণা (উচ্চাশা), যত সব সুরুচিপূর্ণ ও বিলাসিতার বস্তু আছে, সেগুলির জন্যই তার জন্ম হয়েছে। তার বাসকক্ষের দারিদ্র, হতশ্রী দেওয়াল, জীর্ণ চেয়ার এবং বিবর্ণ জিনিসপত্রের জন্য সে ব্যথিত হতো (দারিদ্র্য দেখে)। তার মতো অবস্থার (দরিদ্র মেয়েরা) অন্য কোনো মেয়ে এসব জিনিস যদিও লক্ষ্য করত না, সে এতে দুঃখিত ও ক্রুদ্ধ হতো। যে খর্বকায় ব্রেটন (ফ্রান্সের একটি অঞ্চল) এই সাধারণ ঘরটি তৈরি করেছিল তাকে দেখলেই তার মনে বেদনাভরা দুঃখ আর বেপরোয়া সব স্বপ্ন জেগে উঠত। সে ভাবত তার থাকবে প্রাচ্য-চিত্র শোভিত, উচ্চ ব্রোঞ্জের আলোকমণ্ডিত পার্শ্বকক্ষ (শোবার ঘর)। আর থাকবে দুজন বেশ মোটাসোটা গৃহ-ভৃত্য। তারা খাটো পায়জামা পরে যে বড় আরামকেদারা দুটি গরম করার যন্ত্র থেকে বিক্ষিপ্ত ভারি হওয়ায় নিদ্রালু হয়ে উঠেছে, তাতে শুয়ে ঘুমিয়ে থাকবে (তখন মেয়েটি প্রভাব খাটাবে)। সে কামনা করে একটি বৈঠকখানা, পুরানো রেশমি পর্দা সেখানে ঝুলবে। থাকবে তাতে বিভিন্ন চমৎকার আসবাব, যার ওপর শোভা পাবে অমূল্য সব প্রাচীন কৌতূহল উদ্দীপক সামগ্রী। যেসব পরিচিত ও আকাঙ্ক্ষিত পুরুষ সব মেয়েদের কাম্য, সেসব অন্তরঙ্গ বন্ধুদের সঙ্গে বিকাল পাঁচটায় গল্পগুজব করবার জন্য ছোট সুরভিত একটি কক্ষ সেখানে থাকবে।
তিনদিন ধরে ব্যবহৃত একখানা টেবিলক্লথ ঢাকা গোল একটি টেবিলে তার স্বামীর বিপরীত দিকে সে যখন সান্ধ্যভোজে বসে এবং খুশির আমেজে তার স্বামী বড় সুরুয়ার (তরকারি) পাত্রটির ঢাকনা তুলতে বলে, ও কী ভালো মানুষ! এর চেয়ে ভালো কিছু আমি চাই না (স্বামী মেয়েটির উচ্ছসিত প্রশংসা করবে)- তখন তার মনে পড়বে আড়ম্বরপূর্ণ সান্ধ্যভোজের কথা, উজ্জ্বল রৌপ্যপাত্রাদি, মায়াময় বনভূমির মধ্যে প্রাচীন বিশিষ্ট ব্যক্তি ও বিরল পাখির চিত্রশোভিত কারুকার্যপূর্ণ পর্দা দিয়ে ঢাকা দেওয়ালের কামনা। সে ভাবে, অপরূপ পাত্রে পরিবেশিত হবে অপূর্ব খাদ্য আর গোলাপি রংয়ের রোহিত মাছের টুকরা অথবা মুরগির পাখনা খেতে খেতে মুখে সিংহ-মানবীর হাসি (বীরপুরুষের হাসি) নিয়ে কান পেতে শুনবে চুপি-চুপি-বলা প্রণয়লীলার কাহিনি।
তার কাছে ফ্রক বা জড়োয়া গহনা (ভারী গহনা) নেই-নেই বলতে কিছু নেই (বলার মতো কিছুই নেই)। অথচ ঐ সব বস্তুই (বিলাসী দ্রব্য) তার প্রিয়। তার ধারণা ঐসবের জন্যই তার সৃষ্টি। সুখী করার, কাম্য হওয়ার, চালাক ও প্রণয়যাচিকা (কারো আকাঙ্ক্ষিত হওয়ার) হবার কতই না তার ইচ্ছা। তার কনভেন্টের (মিশনারি পরিচালিত স্কুল) সহপাঠিনী এক ধনী বান্ধবী ছিল। তার সঙ্গে দেখা করতে তার ভালো লাগত না। কারণ, দেখা করে ফিরে এসে তার খুব কষ্ট লাগত। বিরক্তি, দুঃখ, হতাশা ও নৈরাশ্যে সমস্ত দিন ধরে সে কাদঁত।

এক সন্ধ্যায় হাতে একটি বড় খাম নিয়ে বেশ উল্লাসিত হয়ে তার স্বামী ঘরে ফিরল। সে বলল, ‘এই যে, তোমার জন্য এক জিনিস এনেছি।’ মেয়েটি তাড়াতাড়ি খামটি ছিড়ে তার ভিতর থেকে একখানা ছাপানো কার্ড বের করল (নিমন্ত্রণপত্র)। তাতে নিচের কথাগুলি মুদ্রিত ছিল,
‘জনশিক্ষা মন্ত্রী ও মাদাম জর্জ রেমপননু আগামী ১৮ই জানুয়ারি সন্ধ্যায় তাহাদের নিজ বাসগৃহে মসিঁয়ে ও মাদাম লোইসেলের উপস্থিতি কামনা করেন।’

তার স্বামী যেমন আশা করেছিল তেমনভাবে খুশি হওয়ার পরিবর্তে মেয়েটি বিদ্বেষের ভাব নিয়ে আমন্ত্রণ লিপিখানা টেবিলের উপর নিক্ষেপ করে বিড় বিড় করে বলে, ‘ওখানা নিয়ে তুমি আমায় কী করতে বল?’ কিন্তু লক্ষ্মীটি, আমি ভেবেছিলাম, এতে তুমি খুশি হবে। তুমি বাইরে কখনও যাও না, তাই এই এক চমৎকার সুযোগ! এটা জোগাড় করতে আমাকে অনেক কষ্ট করতে হয়েছে। সবাই একখানা চায়, কিন্তু খুব বেছে বেছে দেওয়া হয়েছে (নির্বাচিত লোকদের)। কর্মচারীদের বেশি দেওয়া হয়নি। সেখানে তুমি গোটা সরকারি মহলকে দেখতে পাবে।
বিরক্তির দৃষ্টিতে তার দিকে তাকিয়ে মেয়েটি অধীরভাবে বলে উঠল; ঐ ঘটনার মতো একটি ব্যাপার কী পরে আমি যাব বলে তুমি মনে কর? সে ঐ সম্পর্কে কিছু ভাবেনি। তাই সে বিব্রতভাবে বলে, কেন? থিয়েটারে যাবার সময় তুমি যেই পোশাকটা পর সেটা পরবে। ওটা আমার কাছে খুব সুন্দর লাগে।
তার স্ত্রীকে ফুঁপিয়ে ফুঁপিয়ে কাঁদতে দেখে সে (স্বামী) আতঙ্কে নির্বাক ও হতবুদ্ধি হয়ে গেল। তার (স্বামী) চোখের পাশ থেকে বড় দুফোঁটা অশ্রু তার গালের উপর গড়িয়ে পড়ল।
সে থতমতভাবে বলল, “কী হলো? কী হলো তোমার?”
প্রবল চেষ্টায় মেয়েটি নিজের বিরক্তি দমন করে (স্বামীর সহানুভূতি বিরক্ত লাগে), তার সিক্ত গা মুছে ফেলে শান্ত কন্ঠে জবাব দেয়। কিছুই না। শুধু আমার কোনো পোশাক নেই বলে আমি ঐ ব্যাপারে যেতে পারব না। তোমার যে কোনো সহকর্মীর স্ত্রীর পোশাক আমার চেয়ে যদি ভালো থাকে, কার্ডখানা নিয়ে তাকে দাও।
সে (স্বামী) মনে মনে দুঃখ পায়। তারপর সে জবাব দেয়, “মাতিলদা, বেশ তো চল আলাপ করি আমরা। এমন কোনো পোশাক অন্য কোনো উপলক্ষেও যা দিয় কাজ চলবে অথচ বেশ সাদাসিধা, তার দাম কত আর হবে?
কয়েক সেকেন্ড মেয়েটি চিন্তা করে দেখে এমন একটি সংখ্যার বিষয় স্থির করল যা চেয়ে বসলে হিসাবি কেরানির (স্বামী) কাছ থেকে সঙ্গে সঙ্গে এক আতঙ্কিত প্রত্যাখান যেন না আসে। শেষপর্যন্ত ইতস্তত করে, মেয়েটি বলল, “আমি ঠিক বলতে পারছিনা, তবে আমার মনে হয় চারশ ফ্রাঁ হলে তা কেনা যাবে।
শুনে তার মুখ ম্লান হয়ে গেল। কারণ, তার যেসব বন্ধু গত রবিবার নানতিয়ারের সমভূতিতে ভরতপাখি (এক ধরনের ছোট্ট পাখি) শিকারে গিয়েছিল, আগামী গ্রীষ্মে তাদের সঙ্গে যোগ দেওয়ার ইচ্ছায় একটি বন্দুক কিনবার জন্য ঠিক ততটা অর্থই সে সঞ্চয় করেছিল। তা সত্ত্বেও জবাব দিল, “বেশ তো। আমি তোমায় চারশত ফ্রাঁ দেব। কিন্তু বেশ সুন্দর একটি পোশাক কিনে নিও।
বল নাচের দিন যতই এগিয়ে আসতে থাকে ততই মাদাম লোইসেলকে বিচলিত ও উদ্বিগ্ন মনে হয়। অবশ্য তার পোশাক প্রায় তৈরি হয়ে এসেছে। একদিন সন্ধ্যায় তার স্বামী তাকে বলল, “তোমার হয়েছে কী? গত দুই তিনদিন ধরে তোমার কাজকর্ম কেমন অদ্ভুত ঠেকছে (অমনোযোগী আচরণ)। শুনে মেয়েটি জবাব দেয়। আমার কোনো মণিমুক্তা, একটি দামি পাথর কিছুই নেই যা দিয়ে আমি নিজেকে সাজাতে পারি। আমায় দেখলে কেমন গরিব গরিব মনে হবে। তাই এই অনুষ্ঠানে আমার না যাওয়াই ভালো হবে।
স্বামী বলল, কিছু সত্যকার ফুল (তাজা ফুল) দিয়ে তুমি সাজতে পার।এই ঋতুতে তাতে বেশ সরুচিপূর্ণ দেখায়। দশ ফ্রাঁ দিলে তুমি দুটি কি তিনটি অত্যন্ত চমৎকার গোলাপফুল পাবে।

মেয়েটি ঐ কথায় আশ্বস্ত হলো না। সে জবাবে বলল, না ধনী মেয়েদের মাঝখানে পোশাকে পরিচ্ছদে ঐ রকম খেলো দেখানোর (মিথ্যা সাজ দেখানো) মতো আর বেশি কিছু অপমানজনক নেই।
তখন তার স্বামী চেঁচিয়ে উঠল, “আচ্ছা কী বোকা দেখ আমরা! যাও, তোমার বান্ধবী মাদার ফোরসটিয়ারের সঙ্গে দেখা করে তাকে বল তার জড়োয়া গহনা যেন তোমায় ধার দেয়। এটুকু আদায় করার তো তার সঙ্গে তোমায় পরিচয় যথেষ্ট।”
সে আনন্দধ্বনি করে উঠল। তারপর সে বলল, “সত্যিই তো! এটা আমি ভাবিনি।”
পরদিন সে তার বান্ধবীর বাড়িতে গিয়ে তার দুঃখের কাহিনি তাকে বলল। মাদাম ফোরসটিয়ার তার কাঁচের দরজা লাগানো গোপনকক্ষে গিয়ে বড় একটি গহনার বাক্স বের করে এনে তা খুলে বলল, “ভাই, যা ইচ্ছা এখান থেকে নাও।”
সে প্রথমে দেখল কয়েকটি কঙ্কণ, তারপর একটি মুক্তার মালা। ও মণিমুক্তা-খচিত চমৎকার কারুকার্য-ভরা-একটি সোনার ভিনিশাঁর ‘ক্রশ’ (ভেনিসের তৈরি ক্রুশ)। আয়নার সামনে গিয়ে সে জড়োয়া গহনাগুলি পরে পরে দেখে আর ইতস্তত করে (পছন্দ-অপছন্দ নিয়ে দোমনা), কিন্তু ওগুলি নেওয়ার সিদ্ধান্তও করতে ছেড়ে যেতেও পারে না। তারপরও সে জিজ্ঞাসা করে, “আর কিছু নেই তোমার?”
কেন? আছে, তোমার যা পছন্দ তুমি তা বেছে নাও।
হঠাৎ সে কালো স্যাটিনের (মসৃণ ও চকচকে রেশমি কাপড়) একটি বাক্সে দেখল অপরূপ একখানা হীরার হার। অদম্য কামনায় (না পাওয়ার ভয়ে) তার বুক দুর দুর করে। সেটা তুলে নিতে গিয়ে তার হাত কাঁপে।
সে তার পোশাকের উপর দিয়ে সেটা গলায় তুলে নেয় এবং সেগুলো দেখে আনন্দে বিহ্বল হয়ে যায়। তারপর উদ্বেগভরা ইতস্ততভাবে সে জিজ্ঞাসা করল, “তুমি ঐখানা (হীরার হার) আমায় শুধু ধার দেবে? শুধু এটা?”
কেন দেব না? নিশ্চয় দেব।
সে সবেগে তার বান্ধবীর গলা জড়িয়ে ধরে, পরম আবেগে তাকে বুকে চেপে ধরে। তারপর তার সম্পদ নিয়ে সে চলে আসে।‘বল’ নাচের দিন এসে গেল। মাদাম লোইসেলের জয়জয়কার। সে ছিল সবচেয়ে সুন্দরী, সুরুচিময়ী, সুদর্শনা হাস্যময়ী ও আনন্দপূর্ণ। সব পুরুষ তাকে লক্ষ্য করছিল, তার নাম জিজ্ঞাসা করে তার সঙ্গে আলাপের আগ্রহ প্রকাশ করছিল। মন্ত্রিসভার সব সদস্যের তার সঙ্গে ‘ওয়ালটজ’ নৃত্য করতে ইচ্ছা হচ্ছিল। স্বয়ং শিক্ষামন্ত্রী তার দিকে দৃষ্টি দিচ্ছিলেন। আনন্দে মত্ত হয়ে আবেগ ও উৎসাহ নিয়ে সে নৃত্য করছিল। তার রূপের বিজয়গর্বে, সাফল্যের গৌরবে সে আর কিছুই ভাবে না। এক আনন্দের মেঘের ওপর দিয়ে যেন ভেসে আসছিল! এই সব আহুতি (আহ্বান) ও মুগ্ধতা আর জাগ্রত সব কামনা। যে কোনো মেয়ের অন্তরে এই পরিপূর্ণ বিজয় কত মধুর!ভোর চারটার দিকে সে বাড়ি ফিরে গেল। অন্য সেই তিনজন ভদ্রলোকের স্ত্রী খুব বেশি ফুর্তিতে মত্ত ছিল, তাদের সঙ্গে তার স্বামী ছোট বিশ্রামকক্ষে মধ্যরাত্রি পর্যন্ত আধঘুমে বসেছিল। বাড়ি ফিরবার পথে গায়ে জড়াবার জন্য তারা যে আটপৌরে (সর্বদা ব্যবহার্য) সাধারণ চাদর নিয়ে এসেছিল সে তার কাঁধের ওপর সেটি ছড়িয়ে দেয়। ‘বল’ নাচের পোশাক অপরূপ সৌন্দর্যের সঙ্গে ঐটির দারিদ্র্য সপুরিস্ফূট হয়ে উঠছিল। মেয়েটি তা অনুভব করতে পারে। তাই অন্য যেসব ধনী মেয়ে দামি পশমি চাদর দিয়ে গা ঢেকেছিল তাদের চোখে না পড়বার জন্য সে তাড়াতাড়ি এগিয়ে যেতে লাগল।
লোইসেল তাকে টেনে ধরে বলল, “থামো, তোমার ঠান্ডা লেগে যাবে ওখানে। আমি একখানা গাড়ি ডেকে আনি।”
কিন্তু মেয়েটি কোনো কথায় কান না দিয়ে তাড়াতাড়ি সিঁড়ি বেয়ে নামতে থাকে। রাস্তায় যখন তারা পৌঁছে গেল, সেখানে কোনো গাড়ি পাওয়া গেল না। তারা গাড়ির খোঁজ করতে করতে দূরে কোনো একখানাকে দেখে তার গাড়োয়ানকে ডাকতে থাকে।
হতাশ হয়ে (গাড়ি না পাওয়ায়) কাঁপতে কাঁপতে তারা সিন নদীর দিকে হাঁটতে থাকে। শেষ পর্যন্ত সে পুরাতন একখানা তারা পায়, তাহলো সেই নিশাচর দুই-যাত্রীর গাড়ি যা প্যারিতে (প্যারিস) সন্ধ্যার পর লোকের চোখে পড়ে তার একখানা, যেইদিনে এইগুলি নিজের দুর্দশা দেখাতে লজ্জা পায়। ঐখানি তাদের মার্টার স্ট্রিটে ঘরের দরজা পর্যন্ত নিয়ে গেল। তারা ক্লান্তভাবে তাদের কক্ষে গেল।মেয়েটির সব কাজ শেষ। কিন্তু স্বামীর ব্যাপারে তার মনে পড়ল যে দশটায় তাকে আপিসে গিয়ে পৌঁছাতে হবে। নিজেকে গৌরবময় রূপে (নিজের রূপের সৌন্দর্য) শেষ একবার দেখার জন্য সে আয়নার সামনে গিয়ে তার গলায় চাদরখানা খোলে। হঠাৎ সে আর্তনাদ করে উঠল। তার হারখানা গলায় জড়ানো নেই। তার স্বামীর পোশাক তখন মাত্র অর্ধেক খোলা হয়েছে। সে জিজ্ঞাসা করল কী হয়েছে?
উত্তেজিতভাবে মেয়েটি তার দিকে ফিরে বলল, “আমার-আমার কাছে-মাদাম ফোরস্টিয়ারের হারখানা নেই।”
আতঙ্কিতভাবে সে (স্বামী) উঠে দাঁড়াল, “কী বললে। তা কী করে হবে? এটা সম্ভব নয়।” পোশাকের ও বর্হিবাসের ভাঁজের মধ্যে, পকেটে, সব জায়গায় তারা খোঁজ করে। কিন্তু তা পাওয়া গেল না।
স্বামী জিজ্ঞাসা করল, “ঐ বাড়ি থেকে চলে আসার সময় যে তোমার গলায় ছিল, তোমার ঠিক মনে আছে?”
হ্যাঁ, আমরা যখন বিশ্রামকক্ষ দিয়ে বেরিয়ে আসছিলাম, তখনও তা ছিল আমার খেয়াল আছে। কিন্তু তুমি যদি ওটা রাস্তায় হারাতে, ওটা পড়বার শব্দ আমাদের কানে শোনা উচিত ছিল। গাড়ির মধ্যেই নিশ্চয়ই পড়েছে মনে হয়। হ্যাঁ, সম্ভবত তাই।
তুমি গাড়ির নম্বরটি টুকে নিয়েছিল?
না।
আর তুমি কি তা লক্ষ করেছিলে?
না।
হতাশভাবে তারা একে অপরের দিকে তাকিয়ে থাকে। শেষ পর্যন্ত লোইসেল আবার পোশাক পরে। সে বলল, “আমি যাচ্ছি। দেখি যতটা রাস্তা আমরা হেঁটেছিলাম, সেখানে খুঁজে পাওয়া যায় কি না।”
তারপর সে গেল মেয়েটি তার সান্ধ্য গাউন পরেই সে রয়ে গেল। বিছানায় শুতে যাবার শক্তি তার নেই। কোনো উচ্চাশা বা ভাবনা ছাড়াই সে একখানা চেয়ারে গা এলিয়ে পড়ে রইল।
সকাল সাতটার দিকে তার স্বামী ফিরে এলো। কিছুই সে খুঁজে পায়নি। সে পুলিশের কাছে ও গাড়ির আপিসে গিয়েছিল এবং পুরস্কার ঘোষণা করে একটা বিজ্ঞাপনও দিয়ে এসেছে। সে যথাসাধ্য করে এসেছে বলে তাদের মনে কিছুটা আশা হলো। ঐ ভয়ানক বিপর্যয়ে (দামি হার হারানোর ভয়ে) মেয়েটি সারাদিন এক বিভ্রান্ত অবস্থায় কাটাল।
সন্ধ্যাবেলা যখন লোইসেল ফিরে এলো তখন তার মুখে যন্ত্রণার মলিন ছাপ, কিছুই সে খুঁজে পায়নি। সে বলল, তোমার বান্ধবীকে লিখে দিতে হবে যে হারখানার আংটা তুমি ভেঙে ফেলেছ, তাই তা তুমি মেরামত করতে দিয়েছ।। তাতে আমরা ভেবে দেখবার সময় পাব।তার নিদের্শমত মেয়েটি তাই লিখে দিল। এক সপ্তাহ শেষ হওয়ায় তারা সব আশা ত্যাগ করল। বয়সে পাঁচ বছরের বড় লোইসেল ঘোষণা করল, “ঐ জড়োয়া গহনা ফেরত দেবার ব্যবস্থা আমাদের করতে হবে।”
পরদিন যেই বাক্সে ওটা ছিল, তার ভিতরে যেই স্বর্ণকারের নাম ছিল, তার কাছে তারা সেটা নিয়ে গেল। সে তার খাতাপত্র ঘেঁটে বলল, “মাদাম, ঐ হারখানা আমি বিক্রি করিনি, আমি শুধু বাক্সটা দিয়েছিলাম।”
তারপর তারা সেই হারটির মত হার খোঁজ করার জন্য, তাদের স্মৃতির উপর নির্ভর করে এক স্বর্ণকার থেকে অন্য স্বর্ণকারের কাছে যেতে থাকে। দুজনেরই শরীর বিরক্তি ও উদ্বেগে খারাপ হয়ে গেছে।
প্যালেস রয়েলে তারা এমন এক হীরার কণ্ঠহার দেখল সেটা ঠিক তাদের হারানো হারের মতো। তার দাম চল্লিশ হাজার ফ্রাঁ। ছত্রিশ হাজার ফ্রাঁতে তারা তা পেতে পারে। তিনদিন যেন ওটা বিক্রি না করে সে জন্য তারা স্বর্ণকারকে বিশেষভাবে অনুরোধ করল। তারা আরও ব্যবস্থা করল যে, যদি ফেব্রুয়ারি মাস শেষ হওয়ার আগে ঐ হারটি খুঁজে পাওয়া যায়, তারা এটা ফেরত দিলে চৌত্রিশ হাজার ফ্রাঁ ফেরত নিতে পারবে।
লোইসেলের কাছে তার বাবার মৃত্যুর পরে প্রাপ্ত আঠারো হাজার ফ্রাঁ ছিল। বাকিটা সে ধার করল। মাদাম লোইসেল যখন জড়ো গহনা মাদাম ফোরস্টিয়ারকে ফেরত দিতে গেল তখন শেষোক্ত মেয়েটি (ফোরস্টিয়ার) নির্জীবকণ্ঠে (উচ্ছ্বাস না দেখিয়ে) বলল, “ওটা আরও আগে তোমার ফেরত দেওয়া উচিত ছিল; কারণ তা আমারও দরকার হতে পারত।
তার বান্ধবী সেই ভয় করেছিল, তেমনভাবে সে গহনার বাক্সটি খুলল না। যদি বদলে দেওয়া হয়েছে। টের পেত, সে কী মনে করত? সে কী বলত? সে কী তাকে অপহারক ভাবত?এবার মাদাম লোইসেল দারিদ্রের জীবনের ভয়াবহতা (জীবনের কঠিন বাস্তবতা) বুঝতে পারে। সে তার নিজের কাজ সম্পূর্ণ সাহসের সঙ্গেই করে যায়। ঐ দুঃখজনক দেনা শোধ করা প্রয়োজন। সে তা দেবে।
দাসীকে তারা বিদায় করে দিল। তারা তাদের বাসা পরিবর্তন করল। নিচু ছাদের কয়েকটি কামরা তারা ভাড়া করল। ঘরকন্নার কঠিন (গৃহস্থালি কাজ) সব কাজ ও রান্নাঘরের বিরক্তিকর কাজকর্ম সে শিখে নিল। তার গোলাপি নখ দিয়ে সে বাসন ধোয়, তৈলাক্ত পাত্র ও ঝোল রাঁধার কড়াই মাজে। ময়লা কাপড় চোপড়, শেমিজ, বাসন মোছার গামছা সে পরিষ্কার করে দড়িতে শুকাতে দেয়। রোজ সকালে সে আবর্জনা নিয়ে রাস্তায় ফেলে। সিঁড়ির প্রত্যেক ধাপে শ্বাস নেবার জন্য থেমে থেমে সে জল তোলে।
সাধারণ পরিবারের মেয়ের মতো পোশাক পরে সে হাতে ঝুড়ি নিয়ে মুদি, কসাই ও ফলের দোকানে যায় এবং তার দুঃখের পয়সার একটির জন্য পর্যন্ত দর কষাকষি করে। প্রত্যেক মাসেই সময় চেয়ে কিছু দলিল বদল করতে হয়, কাউকে কিছু শোধ দিতে হয় (ঋণ করা ও পরিশোধ করা)।
তার স্বামীও সন্ধ্যাবেলা কাজ করে। সে কয়েজকন ব্যবসায়ীর হিসাবের খাতা ঠিক করে। রাত্রে এক পাতা পাঁচ ‘সাও’ হিসেবে সে প্রায় লেখা নকল করে। এরকম জীবন দশ বছর ধরে চলল। দশ বছরের শেষে তারা সব কিছু মহাজনের সুদসহ প্রাপ্য নিয়ে সব ক্ষতিপূরণ করে ফেলতে পারে। তাছাড়া কিছু তাদের সঞ্চয়ও হলো।মাদাম লোইসেলকে দেখলে এখন বয়স্কা বলে মনে হয়। সে এখন গরিব গৃহস্থঘরের শক্ত, কর্মঠ ও অমার্জিত মেয়ের মতো হয়ে গেছে। তার চুল অবিন্যস্ত ঘাঘরা একপাশে মোচড়ানো, হাতগুলো লাল। সে চড়াগলায় কথা বলে এবং বড় বড় কলসিতে জল এনে মেঝে ধোয়। কিন্তু কখনও তার স্বামী যখন আপিসে থাকে, জানালার ধারে বসে বিগত দিনের সেই সান্ধ্য অনুষ্ঠান ও সেই ‘বল’ নাচে তাকে এত সুন্দর দেখাচ্ছিল ও এমন অতিরিক্ত প্রশংসা পেয়েছিল, তার কথা সে ভাবে (অতীত সুখের দিন স্মরণ)।
যদি সে গলার সেই হারখানা না হারাত তাহলে কেমন হতো? কে জানে কে বলতে পারে? কী অনন্য সাধারণ এই জীবন আর তার মধ্যে কত বৈচিত্র্য! সামান্য একটি বস্তুতে (আকস্মিক বিপদ ও সৌভাগ্যের অনিশ্চয়তা) কী করে একজন ধ্বংস হয়ে যেতে আবার বাঁচতেও পারে!এক রবিবারে সারা সপ্তাহের নানা দুশ্চিন্তা মন থেকে দূর করার জন্য সে যখন চাম্পস এলসিসে ঘুরে বেড়াচ্ছিল, হঠাৎ একটি শিশু নিয়ে ভ্রমণরতা একজন মেয়ে তার চোখ পড়ল। সে হলো মাদাম ফোরস্টিয়ার। সে এখনও যুবতী, সুন্দরী ও আকর্ষণীয়া। দেখে মাদাম লোইসেলের মন খারাপ হয়ে গেল (নিজের দুঃখ স্মরণ করে)।
সে কি ঐ মেয়েটির সঙ্গে কথা বলবে? হ্যাঁ, অবশ্যই বলবে। তাকে যখন সব শোধ করা হয়েছে, তখন সব কিছু খুলে সে বলবে। কেন বলবে না? সে মেয়েটির কাছে এগিয়ে গিয়ে বলল, সুপ্রভাত জেনি, তার বন্ধু তাকে চিনতে পারল না। এক সাধারণ মানুষ তাকে এমন অন্তরঙ্গভাবে সম্বোধন করায় সে অবাক হলো।
সে বিব্রতভাবে বলল, “কিন্তু মাদাম-আপনাকে চিনতে পারলাম না। বোধহয় আপনার ভুল হয়েছে।”
না, আমি মাতিলদা লোইসেল।
তার বান্ধবী বিস্ময়ে চেঁচিয়ে উঠে বলল, হায়, আমার বেচারি মাতিলদা। এমনভাবে কী করে তুমি বদলে গেলে?
হ্যাঁ, তোমার সঙ্গে দেখা হবার পর তেকে আমার দুর্দিন যাচ্ছে- বেশ কিছু দুঃখের দিন গেছে আর সেটা হয়েছে শুধু তোমার জন্য।
আমার জন্য? তা কী করে হলো?
সেই যে কমিশনারের বল নাচের দিন তুমি আমাকে তোমার হীরার হার পরতে গিয়েছিলে, মনে পড়ে?
হ্যাঁ, বেশ মনে আছে।
কথা হচ্ছে, সেখানা আমি হরিয়ে ফেলেছিলাম।
কী বলছ তুমি? কী করে তা আমায় তুমি ফেরত দিয়েছিলে?
ঠিক সেখানার মতো একটি তোমাকে আমি ফেরত দিয়েছিলাম। তার দাম দিতে দশ বছর লেগেছে। তুমি বুঝতেই পার। আমদের মতো লোক যাদের কিছুই ছিল না, তাদের পক্ষে তা সহজ ছিল না। কিন্তু তা শেষ হযেছে এবং সেজন্য আমি এখন ভালোভাবে নিশ্চিন্ত হয়েছি।
মাদাম ফোরস্টিয়ার তাকে কথার মাঝপথে থামিয়ে বলল, “তুমি বলছ যে, আমারটা ফিরিয়ে দেবার জন্য তুমি একখানা হীরার হার কিনেছিলে?”
হ্যাঁ, তা তুমি খেয়াল করনি? ঐ দুটি এক রকম ছিল বলে সে গর্বের ভাবে ও সরল আনন্দে হাসল (মাতিলদার হার বদলের বিষয়টি ধরতে না পারায়)।
দেখে মাদার ফোরস্টিয়ারের মনে খুব লাগল (মিথ্যা আত্মতৃপ্তি থাকায়)। সে তার দুটি হাত নিজের হাতের মধ্যে নিয়ে বলল, “হায়, আমার বেচারি মাতিলদা। আমারটি ছিল নকল। তার দাম পাঁচশত ফ্রাঁর বেশি হবে না।”

১। যশের (খ্যাতির উদ্দেশ্যে) জন্য লিখিবেন না। তাহা হইলে যশও হইবে না, লেখাও ভাল হইবে না। (প্রাপ্তির আশায় প্রথমেই লেখা যাবে না) লেখা ভালো হইলে যশ আপনি আসিবে।
২। টাকার জন্য লিখিবেন না। ইউরোপে এখন অনেক লোক টাকার জন্যই লেখে এবং টাকাও পায়; লেখাও ভালো হয়। কিন্তু আমাদের এখনও সেদিন হয় নাই (আমাদের লেখার মান এখনো ইউরোপের মতো হয়নি)। এখন অর্থের উদ্দেশ্যে লিখিতে গেলে, লোক-রঞ্জন-প্রবৃত্তি প্রবল হইয়া পড়ে। এখন আমাদিগের দেশের সাধারণ পাঠকের রুচি ও শিক্ষা বিবেচনা করিয়া লোক-রঞ্জন করিতে গেলে রচনা বিকৃত ও অনিষ্টকর হইয়া উঠে। (আমাদের পাঠকরা ভালো-মন্দ যাচাই করতে পারে না)
৩। যদি মনে এমন বুঝিতে পারেন যে, লিখিয়া দেশের বা মনুষ্যজাতির কিছু মঙ্গল সাধন করিতে পারেন, অথবা সৌন্দর্য সৃষ্টি করিতে পারেন, তবে অবশ্য লিখিবেন (লেখার প্রকৃত উদ্দেশ্য অপরের কল্যাণ)। যাঁহারা অন্য উদ্দেশ্যে লেখেন, তাঁহাদিগকে যাত্রাওয়ালা (মানুষের মঙ্গল ছাড়া অন্য কিছু) প্রভৃতি নীচ ব্যবসায়ীদিগের সঙ্গে গণ্য করা যাইতে পারে।
৪। যাহা অসত্য, ধর্মবিরুদ্ধ; পরনিন্দা বা পরপীড়ন বা স্বার্থসাধন যাহার উদ্দেশ্য, সে সকল প্রবন্ধ কখনও হিতকর হইতে পারে না, সুতরাং তাহা একেবারে পরিহার্য্য। সত্য ও ধর্মই সাহিত্যের উদ্দেশ্য (নৈতিক ও ধর্মীয় আলোচনা)। অন্য উদ্দেশ্যে লেখনী-ধারণ মহাপাপ।
৫। যাহা লিখিবেন, তাহা হঠাৎ ছাপাইবেন না। কিছু কাল ফেলিয়া রাখিবেন। কিছুকাল পরে উহা সংশোধন করিবেন। তাহা হইলে দেখিবেন, প্রবন্ধে অনেক দোষ আছে। কাব্য নাটক উপন্যাস দুই এক বৎসর ফেলিয়া রাখিয়া তার পর সংশোধন করিলে বিশেষ উৎকর্ষ (লেখনির পরিপক্কতা) লাভ করে। যাঁহারা সাময়িক সাহিত্যের (উদ্দেশ্যহীন সাহিত্য) কার্যে ব্রতী, তাঁহাদের পক্ষে এই নিয়ম রক্ষাটি ঘটিয়া উঠে না। এজন্য সাময়িক সাহিত্য, লেখকের পক্ষে অবনতিকর।
৬। যে বিষয়ে যাহার অধিকার (জ্ঞান) নাই, সে বিষয়ে তাহার হস্তক্ষেপ অকর্তব্য। এটি সোজা কথা, কিন্তু সাময়িক সাহিত্যে এ নিয়মটি রক্ষিত হয় না। (অজ্ঞাত বিষয়ে মানুষ জ্ঞান প্রদান করে)
৭। বিদ্যা প্রকাশের চেষ্টা করিবেন না। বিদ্যা থাকিলে, তাহা আপনিই প্রকাশ পায়, চেষ্টা করিতে হয় না। বিদ্যা প্রকাশের চেষ্টা পাঠকের অতিশয় বিরক্তিকর এবং রচনার পারিপাট্যের বিশেষ হানিজনক। এখনকার প্রবন্ধে ইংরেজি, সংস্কৃত, ফরাসি, জার্মান কোটেশন বড় বেশি দেখিতে পাই। যে ভাষা আপনি জানেন না, পরের গ্রন্থের সাহায্যে সে ভাষা হইতে কদাচ (কখনোই) উদ্ধৃত করিবেন না।

৯। যে স্থানে অলঙ্কার বা ব্যঙ্গ বড় সুন্দর বলিয়া বোধ হইবে, সেই স্থানটি কাটিয়া দিবে, এটি প্রাচীন বিধি (কাউকে ব্যঙ্গ করে না লেখা)। আমি সে কথা বলি না। কিন্তু আমার পরামর্শ এই যে সে স্থানটি বন্ধুবর্গকে পুনঃ পুনঃ পড়িয়া শুনাইবে। যদি ভালো না হইয়া থাকে, তবে দুই চারি বার পড়িলে লেখকের নিজেরই আর উহা ভালো লাগিবে না—বন্ধুবর্গের নিকট পড়িতে লজ্জা করিবে। তখন উহা কাটিয়া দিবে।
১০। সকল অলঙ্কারের শ্রেষ্ঠ অলঙ্কার সরলতা। যিনি সোজা কথায় আপনার মনের ভাব সহজেই পাঠককে বুঝাইতে পারেন, তিনিই শ্রেষ্ঠ লেখক। কেননা, লেখার উদ্দেশ্য পাঠককে বুঝান।
১১। কাহারও অনুকরণ করিও না। অনুকরণে দোষগুলি অনুকৃত হয়, গুণগুলি হয় না, অমুক ইংরেজি বা সংস্কৃত বা বাঙ্গালা লেখক এইরূপ লিখিয়াছেন, আমিও এরূপ লিখিব, এ কথা কদাপি মনে স্থান দিও না।
