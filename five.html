<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">শওকত আলীর 'কপিলদাস মুর্মুর শেষ কাজ' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১. "ধর বুড়োটিকে, ঘরে কাড়ে সে ধেনুখান" কার উক্তি?
(ক) দীনদাসের (খ) মহিন্দরের
(গ) সলিমুদ্দিনের (ঘ) বিনোদ মাঝির
উত্তর: (ক) দীনদাসের

২. শওকত আলী কত সালে জন্মগ্রহণ করেন?
(ক) ১৯৩৬ সালে (খ) ১৯৩৭ সালে
(গ) ১৯৩৮ সালে (ঘ) ১৯৩৯ সালে
উত্তর: (ক) ১৯৩৬ সালে

৩. শওকত আলী কখন রাজনীতিতে যুক্ত হন?
(ক) ছাত্রজীবনে (খ) কর্মজীবনে
(গ) অবসর জীবনে (ঘ) শেষ জীবনে
উত্তর: (ক) ছাত্রজীবনে

৪. শওকত আলী কত সালে মৃত্যুবরণ করেন?
(ক) ২০১৭ (খ) ২০১৮
(গ) ২০১৯ (ঘ) ২০২০
উত্তর: (খ) ২০১৮

৫. 'কপিলদাস মুর্মুর শেষ কাজ' গল্পে কোন ঋতুর কাহিনি বর্ণিত হয়েছে?
(ক) শরহকাল (খ) শীতকাল
(গ) হেমন্তকাল (ঘ) বসন্তকাল
উত্তর: (খ) শীতকাল

৬. বাতাস উঠলে ট্যাঙ্কের পানিতে কাঁপন লাগে না কেন?
(ক) বাতাসের শক্তি কম (খ) পানি অনেক নিচে
(গ) পানি অনেক ভারী (ঘ) ময়লা পানি তাই
উত্তর: (খ) পানি অনেক নিচে

৭. ট্যাঙ্কের পানির তলায় কী চিকচিক করে?
(ক) পাথর (খ) বালি
(গ) নুড়ি (ঘ) শৈবাল
উত্তর: (খ) বালি

৮. সবুজ গুচ্ছ স্রোতের ভেতরে কোন দিকে মাথা রেখে এপাশ ওপাশ ফেরে?
(ক) উজান দিকে (খ) ভাঁটির দিকে
(গ) ভাটির দিকে (ঘ) সামনের দিকে
উত্তর: (গ) ভাটির দিকে

৯. নিচের কোনটি স্থির স্থির করে উজানে ছুটে গেলেও আবার ভাটিতে ফিরে আসে?
(ক) সবুজ গুচ্ছ (খ) দু-একটি মাছ
(গ) শীতের ঘাম (ঘ) পানির স্রোত
উত্তর: (খ) দু-একটি মাছ

১০. নিচের কোনটি গুম গুম শব্দ করে ওঠে?
(ক) সবুজ গুচ্ছ (খ) পানির স্রোত
(গ) সাঁকোর থামগুলো (ঘ) বড়ো বাঙ্কার

(ক) শীতের শান্ত ভাব (খ) আকাশ, পাথর আর দিগন্ত
(গ) চতুর দু-একটি মাছ (ঘ) সবুজ গুচ্ছ

১২. কপিলদাস মুর্মু কীভাবে ঝিমোতে থাকে?
(ক) চোখ বন্ধ করে (খ) রোদের দিকে পিঠ মেলে
(গ) কপালে হাত দিয়ে (ঘ) ট্যাঙ্কের কিনারায় শুয়ে
উত্তর: (খ) রোদের দিকে পিঠ মেলে

১৩. 'কপিলদাস মুর্মুর শেষ কাজ' গল্পে পঁ পঁ চিৎকার করতে করতে কী ছুটেছে?
(ক) চালের খেত (খ) কপিলদাস মুর্মু
(গ) গোপীনাথ (ঘ) চিনিকলের ট্রাকগুলো
উত্তর: (ঘ) চিনিকলের ট্রাকগুলো

১৪. কে ধান-দই টাটকা ঠাণ্ডার জন্য দাঁড় করে রেখেছে?
(ক) বিনোদ মাঝি (খ) সলিমুদ্দিন
(গ) গোপীনাথ (ঘ) কপিলদাস মুর্মু
উত্তর: (ক) বিনোদ মাঝি

১৫. 'কপিলদাস মুর্মুর শেষ কাজ' গল্পে রাখাল বাঁশিতে কোন সুর বাজিয়ে যাচ্ছে?
(ক) মোহন সুর (খ) প্রীতি সুর
(গ) বুনো সুর (ঘ) ঘনিয়ান সুর
উত্তর: (গ) বুনো সুর

১৬. কপিলদাস মুর্মু ট্যাঙ্কের পাশে চুপচাপ বসে আছে কেন?
(ক) সে অসুস্থ তাই
(খ) সে জীবন নিয়ে ভাবছে তাই
(গ) সে বৃদ্ধ হয়েছে এজন্য
(ঘ) সে ঘটনার পারস্পারিকতা মিলাচ্ছে তাই
উত্তর: (ঘ) সে ঘটনার পারস্পারিকতা মিলাচ্ছে তাই

১৭. 'কপিলদাস মুর্মুর শেষ কাজ' গল্পে সবজি খেত তছনছ করে কে?
(ক) সোনামুখী (খ) ছাগল
(গ) কপিলদাস মুর্মু (ঘ) সিঙরী
উত্তর: (খ) ছাগল

১৮. বিনু মাঝির বউয়ের নাম কী?
(ক) সিঙরী (খ) সোনামুখী
(গ) হিলী (ঘ) রঞ্জি
উত্তর: (খ) সোনামুখী

১৯. সিঙরীর ভাইয়ের নাম কী?
(ক) কপিলদাস (খ) সলিমুদ্দিন
(গ) নগেন ছোটো (ঘ) মহিন্দর
উত্তর: (গ) নগেন ছোটো

২০. নদীর ওপারে খোলা পাথরে গাঁয়ের কুকুর কী তাড়িয়ে নিয়ে আসে?
(ক) শিয়াল (খ) খরগোশ
(গ) বনবিড়াল (ঘ) সজারু
উত্তর: (খ) খরগোশ

২১. কপিলদাস মুর্মু কেন কোনো কথা কাউকে জিজ্ঞেস করে না?
(ক) সে নির্বোধ তাই
(খ) সব ঘটনা গোলানো মনে হয়
(গ) নীরবতা ভালো লাগে
(ঘ) সব তথ্য সে নির্দিষ্ট
উত্তর: (খ) সব ঘটনা গোলানো মনে হয়

২২. সংসারের ভেতরে শান্ত, ধীর ও নিরবচ্ছিন্ন কী আছে বলে কপিলদাসের মনে হয়?
(ক) নিত্য কলহ (খ) বৈচিত্র্য
(গ) পরম শান্তি (ঘ) একটা স্রোত
উত্তর: (ঘ) একটা স্রোত

২৩. কপিলদাসের ভাবনায় সংসারের অনেক ভেতরকার স্রোতটি কেমন?
(ক) সময়ের সাথে সাথে বেগবান (খ) সাঁওতালদের রক্তে রাঙানো
(গ) কখনো শান্ত, কখনো অশান্ত (ঘ) শান্ত, ধীর ও নিরবচ্ছিন্ন
উত্তর: (ঘ) শান্ত, ধীর ও নিরবচ্ছিন্ন

২৪. কপিলদাস মুর্মুকে আজকাল প্রায়ই কীসে পেয়ে বসে?
(ক) শ্রান্তি (খ) পরিতৃপ্ত ভাব
(গ) শিকারের নেশা (ঘ) ঘুম ঘুম ভাব
উত্তর: (খ) পরিতৃপ্ত ভাব

২৫. 'কপিলদাস মুর্মুর শেষ কাজ' গল্পে কোন সময় তুমুল নাচ জোড়ার কথা বলা আছে?
(ক) বৈশাখিতে (খ) বসন্ত বরণে
(গ) পুশনা পরবে (ঘ) চড়ক পূজায়
উত্তর: (গ) পুশনা পরবে

২৬. 'কপিলদাস মুর্মুর শেষ কাজ' গল্পে কাদের গলায় শানানো স্বর?
(ক) ছেলেদের (খ) ছোটদের
(গ) মেয়েদের (ঘ) গায়েনদের
উত্তর: (গ) মেয়েদের

২৭. কপিলদাস মুর্মু কাকে টাঙনের পানিতে ধাক্কা মেরে ফেলে দিয়েছিল?
(ক) মহাজনকে (খ) জয়হরিকে
(গ) দিবোদাসকে (ঘ) ম্যানুয়েল পাদ্রিকে
উত্তর: (ঘ) ম্যানুয়েল পাদ্রিকে

২৮. কপিলদাস মুর্মুর বাবার নাম কী?
(ক) বিনোদ মুর্মু (খ) শুকদেব মুর্মু
(গ) দিবোদাস মুর্মু (ঘ) জয়হরি মুর্মু
উত্তর: (গ) দিবোদাস মুর্মু

২৯. কপিলদাস মুর্মুর কুকুরের গায়ের রঙ কী রকম ছিল?
(ক) লাল (খ) বাদামি
(গ) কালো (ঘ) সাদা
উত্তর: (গ) কালো

৩০. কপিলদাসের কুকুর কীভাবে মারা যায়?
(ক) বাঘের আক্রমণে (খ) বিষ প্রয়োগে
(গ) বার্ধক্যের কারণে (ঘ) সাপের কামড়ে
উত্তর: (ক) বাঘের আক্রমণে

৩১. গল্প আরম্ভ করলেই কপিলদাস মুর্মু কোন ঘটনায় চলে আসে?
(ক) সাঁওতাল বস্তির (খ) বাঘ মারার
(গ) মেলার ঘটনায় (ঘ) পুশনা পরবের
উত্তর: (গ) মেলার ঘটনায়

৩২. কে সাঁওতাল বস্তির মোড়ল ছিল?
(ক) কপিলদাস মুর্মু (খ) জয়হরি
(গ) ম্যানুয়েল পাদ্রি (ঘ) গোপীনাথ
উত্তর: (ঘ) গোপীনাথ

৩৩. সাঁওতাল বস্তি পোড়ার সময় গোপীনাথ হ্যাঁ হুঁ কিছুই করে না কেন?
(ক) নিরুপায় (খ) পরিস্থিতির শিকার
(গ) স্বাজাত্যবোধহীনতা (ঘ) ভীরুতা
উত্তর: (গ) স্বাজাত্যবোধহীনতা

৩৪. "হামরা মহাজনের সঙ্গে নাই, আধিয়ার কিষানের সঙ্গে হামরা।"- কথাটি কে বলেছিল?
(ক) কপিলদাস মুর্মু (খ) মোহন কিস্কু
(গ) চতুর মাঝি (ঘ) কেউ একজন
উত্তর: (ঘ) কেউ একজন

রবীন্দ্রনাথ ঠাকুরের ‘দুই বিঘা জমি’ কবিতায় দেখা যায় জমিদার উপেনের জমিতে বাগান করতে চায়। কিন্তু উপেন জমি দিতে চায় না। তখন জমিদার জোর করে উপেনের জমি দখল করে। কিন্তু উপেনের মধ্যে কোনো প্রতিবাদী রূপ দেখা যায় না। সে শুধু ঈশ্বরের কাছে বলে রাখে।

নিচের উদ্দীপকটি পড়ে নিচের দুটি প্রশ্নের উত্তর দাও:

নিচের উদ্দীপকটি পড়ে নিচের দুটি প্রশ্নের উত্তর দাও:
উঁই চং মারমা পার্বত্য চট্টগ্রামের একজন আদিবাসী। সে সারাদিন চাষাবাদের কাজ করে অন্যের জমিতে। কিন্তু জমির মালিক উঁই চং মারমাকে তার ন্যায্য ফসলের ভাগ দেয় না। শোষণের মধ্য দিয়ে বয়ে চলে তার কঠোর সংগ্রামী জীবন।

১৩৬. জমির মালিক ‘কপিলদাস মুর্মুর শেষ কাজ’ গল্পের কোন চরিত্রের প্রতিনিধি?
(ক) কপিলদাস (খ) বিনোদ মিস্ত্রি
(গ) মহাজন (ঘ) মোড়ল
উত্তর: (গ) মহাজন
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let reviewList = [];
        let reviewMode = false;
        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadReviewList() {
            const saved = localStorage.getItem(STORAGE_KEY + "_review");
            if (saved) reviewList = JSON.parse(saved);
        }

        function saveReviewList() {
            localStorage.setItem(STORAGE_KEY + "_review", JSON.stringify(reviewList));
        }

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
            <button onclick="toggleReviewMode()" id="review-btn" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                📌 Need to Review (${reviewList.length})
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            let filteredData = data.map((q, i) => ({ ...q, originalIndex: i }));

            if (reviewMode) {
                filteredData = filteredData.filter(item => reviewList.includes(item.originalIndex));
            } else if (wrongQuestionsOnly) {
                filteredData = filteredData.filter((item, i) =>
                    userAnswers[i] && userAnswers[i] !== data[i].answer
                );
            }

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" 
                            ${reviewList.includes(originalIdx) ? 'checked' : ''} 
                            onchange="toggleReview(${originalIdx}, this.checked)"
                            class="w-5 h-5 accent-purple-500">
                        <span class="text-purple-400 text-sm font-medium">Review</span>
                    </label>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        function toggleReview(qIndex, isChecked) {
            if (isChecked) {
                if (!reviewList.includes(qIndex)) reviewList.push(qIndex);
            } else {
                reviewList = reviewList.filter(idx => idx !== qIndex);
            }
            saveReviewList();
            updateReviewButton();
        }

        function updateReviewButton() {
            const btn = document.getElementById('review-btn');
            if (btn) btn.textContent = `📌 Need to Review (${reviewList.length})`;
        }

        function toggleReviewMode() {
            reviewMode = !reviewMode;
            const btn = document.getElementById('review-btn');

            if (reviewMode) {
                btn.style.backgroundColor = '#6b21a8';
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
            } else {
                btn.style.backgroundColor = '';
                btn.innerHTML = `📌 Need to Review (${reviewList.length})`;
            }

            const container = document.getElementById('quiz-container');
            container.style.opacity = '0.5';
            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
            loadReviewList();
            updateReviewButton();
        };
    </script>
