<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">মাইকেল মধুসূদন দত্ত এর 'বিভীষণের প্রতি মেঘনাদ' পদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। শমন-ভবন কী? 
(ক) দেবালয় (খ) যমালয় (গ) যজ্ঞাগার (ঘ) বাসালয়
উত্তর: (খ) যমালয়

২। 'হায় তাত উচিত কি তব এ কাজ' বলতে কী বোঝানো হয়েছে? 
(ক) কুম্ভকর্ণের সহায়তা (খ) লক্ষ্মণের প্রবেশ (গ) বিভীষণের সহায়তা (ঘ) রামচন্দ্রের আজ্ঞা
উত্তর: (গ) বিভীষণের সহায়তা

উদ্দীপকের আলোকে ৩ ও ৪ নং প্রশ্নের উত্তর দাও:
"মুক্তিযোদ্ধা কমান্ডার মতিউর একটি সফল অপারেশনের পর তারাপুর গ্রামে বিশ্রাম নিচ্ছিলেন। পার্শ্ববর্তী গ্রামের রাজাকার ইদ্রিস তথ্যটি পাকিস্তানি হানাদার বাহিনীকে জানিয়ে দিল। হানাদার বাহিনী এসে কমান্ডার মতিউরকে মেরে ফেলে। মতিউর প্রতিরোধের সুযোগ পর্যন্ত পেলেন না।"

৩। উদ্দীপকের ইদ্রিস চরিত্রটি "বিভীষণের প্রতি মেঘনাদ" কবিতার কোন চরিত্রের প্রতিনিধিত্ব করছে? 
(ক) কুম্ভকর্ণের (খ) বিভীষণের (গ) লক্ষ্মণের (ঘ) রামের
উত্তর: (খ) বিভীষণের

৪। উক্ত চরিত্রের সাথে সাদৃশ্যপূর্ণ চরণ— 
i. নিজ গৃহপথ, তাত দেখাও তস্করে?
ii. রাঘব দাস আমি; কী প্রকারে/তাহার বিপক্ষ কাজ করিব।
iii. গতি যার নীচ সহ, নীচ সে দুর্মতি।
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৫। মাইকেল মধুসূদন দত্ত কোথায় জন্মগ্রহণ করেন? 
(ক) যশোরের সাগরদাঁড়ি (খ) নরসিংদীর পাড়াতলি (গ) ঝিনাইদহের সাগরদাঁড়ি (ঘ) দিনাজপুরের সাগরদাঁড়ি
উত্তর: (ক) যশোরের সাগরদাঁড়ি

৬। কবি ছাড়াও মধুসূদন দত্ত অন্য কোন পরিচয়ে স্বনামধন্য ছিলেন? 
(ক) নাট্যকার (খ) প্রাবন্ধিক (গ) গীতিকার (ঘ) গল্পকার
উত্তর: (ক) নাট্যকার

৭। 'একেই কি বলে সভ্যতা' ও 'বুড়ো সালিকের ঘাড়ে রোঁ' মধুসূদনের কোন ধরণের রচনা? 
(ক) কবিতা (খ) ছোটগল্প (গ) প্রহসন (ঘ) নাটক
উত্তর: (গ) প্রহসন

৮। বাংলা কাব্যজগতে অমিত্রাক্ষর ছন্দের স্রষ্টা কোন কবি? 
(ক) রবীন্দ্রনাথ ঠাকুর (খ) সত্যেন্দ্রনাথ দত্ত (গ) মাইকেল মধুসূদন দত্ত (ঘ) জীবনানন্দ দাশ
উত্তর: (গ) মাইকেল মধুসূদন দত্ত

৯। "মেঘনাদবধ-কাব্যটি নয়টি সর্গে রচিত"— এখানে সর্গ বলতে বোঝানো হয়েছে— 
(ক) বেহেশত (খ) অধ্যায় (গ) সরণি (ঘ) সারণি
উত্তর: (খ) অধ্যায়

১০। মধুসূদন দত্ত মৃত্যুবরণ করেন কোথায়? 
(ক) ঢাকায় (খ) যশোর (গ) কলকাতায় (ঘ) লন্ডনে
উত্তর: (গ) কলকাতায়

১১। "এতক্ষণে"—অরিন্দম কহিলা বিষাদে;— বাক্যটির মর্মার্থ কী? 
(ক) এতক্ষণ পরে মেঘনাদ কথা বলল (খ) বিস্মিত ও বিপন্ন মেঘনাদ বলল (গ) এতক্ষণে মেঘনাদ শত্রুকে দেখল (ঘ) এতক্ষণে মেঘনাদ গৌরবের কথা বলল
উত্তর: (খ) বিস্মিত ও বিপন্ন মেঘনাদ বলল

১২। 'অরিকে (শত্রু) দমন করে যে'— এর এককথায় প্রকাশ কোনটি? 
(ক) অরিজিৎ (খ) জিতেন্দ্রিয় (গ) অরিন্দম (ঘ) অরিধবধ
উত্তর: (গ) অরিন্দম

১৩। "জানিনু কেমনে আসি লক্ষণ পশিল!"— এখানে লক্ষণ কেমন করে রাক্ষসপুরীতে আসে বলে মেঘনাদ জানতে পেরেছে বা বুঝতে পেরেছে? 
(ক) বানরের পিঠে চড়ে (খ) মন্ত্রবলে (গ) বিভীষণের সহায়তায় (ঘ) অরিকে দমন করে
উত্তর: (গ) বিভীষণের সহায়তায়

১৪। মেঘনাদের মতে বিভীষণের কোন কাজটি উচিত হয়নি? 
(ক) লক্ষ্মণকে হত্যা করা (খ) যজ্ঞাগারে প্রবেশে লক্ষ্মণকে সাহায্য করা (গ) রাবণকে অপমান করা (ঘ) মেঘনাদকে বাধা দেওয়া
উত্তর: (খ) যজ্ঞাগারে প্রবেশে লক্ষ্মণকে সাহায্য করা

১৫। বাসব কে? 
(ক) রাঘবের সহোদর (খ) দেবতাদের রাজা ইন্দ্র (গ) মেঘনাদ (ঘ) বিভীষণ
উত্তর: (খ) দেবতাদের রাজা ইন্দ্র

১৬। রঘু বংশের শ্রেষ্ঠ সন্তান রামচন্দ্রকে কী হিসেবে অভিহিত করা হয়? 
(ক) রঘুনাথ (খ) রঘুপতি (গ) রাঘব (ঘ) রঘুরাজ
উত্তর: (গ) রাঘব

১৭। বিভীষণ নিজেকে রামের আজ্ঞাবহ দাস হিসেবে পরিচয় দিলে মেঘনাদের কী করতে ইচ্ছে করে? 
(ক) নাচতে (খ) হাসতে (গ) মরতে (ঘ) কাঁদতে
উত্তর: (গ) মরতে

১৮। “স্থাপিলা বিধুরে বিধি স্থাণুর ললাটে” বলতে কী বোঝানো হয়েছে?
(ক) বিধাতা চাঁদকে আকাশে উজ্জ্বল করে স্থাপন করেছেন
(খ) বিধাতা চাঁদকে আকাশে উজ্জ্বল করে স্থাপন করেছেন
(গ) বিধাতা চাঁদকে আকাশে নিশ্চল করে স্থাপন করেছেন
(ঘ) বিধাতা চাঁদকে আকাশে ঘূর্ণায়মান করে স্থাপন করেছেন
উত্তর: (গ) বিধাতা চাঁদকে আকাশে নিশ্চল করে স্থাপন করেছেন

১৯। “নাহি শিশু লঙ্কাপুরে, শুনি না হাসিবে এ কথা!”— কোন কথা?
(ক) বিভীষণের কপটতার কথা
(খ) লক্ষ্মণের যজ্ঞাগারে প্রবেশের কথা
(গ) বিভীষণের লক্ষ্মণকে সহায়তা করার কথা
(ঘ) নিরস্ত্র মেঘনাদের কাছে কপট লক্ষ্মণের যুদ্ধ প্রার্থনা করার কথা
উত্তর: (ঘ) নিরস্ত্র মেঘনাদের কাছে কপট লক্ষ্মণের যুদ্ধ প্রার্থনা করার কথা

২০। মেঘনাদ বিভীষণকে কী ছাড়ার কথা বলেছেন?
(ক) অস্ত্র (খ) অস্ত্রাগারের দ্বার (গ) ভণ্ডামি (ঘ) ছদ্মবেশ
উত্তর: (খ) অস্ত্রাগারের দ্বার

২১। প্রগলভে দাম্ভিকতার সাথে কে যজ্ঞাগারে প্রবেশ করে?
(ক) মেঘনাদ যজ্ঞাগারে (খ) লক্ষ্মণ
(গ) বিভীষণ যজ্ঞাগারে (ঘ) লক্ষ্মণ লঙ্কাপুরীতে
উত্তর: (খ) লক্ষ্মণ

২২। “মহামন্ত্র-বলে যথা নম্রশিরঃ ফণী”— বাক্যটির অর্থ কী?
(ক) মন্ত্রপূত সাপ যেমন মাথা নত করে
(খ) সাপের ফণা ধরা অবস্থা হঠাৎ নত হওয়া
(গ) মহৌষধের কাছে সাপের বিষ কমে যাওয়া
(ঘ) ঐশ্বর্যশালীর মাথা নত হওয়া
উত্তর: (ক) মন্ত্রপূত সাপ যেমন মাথা নত করে

২৩। “নহি দোষী আমি”— কে বলেছে?
(ক) লক্ষ্মণ (খ) বিভীষণ (গ) মেঘনাদ (ঘ) রাবণ
উত্তর: (খ) বিভীষণ

২৪। লঙ্কার অধঃপতনকে বিভীষণ কিসের সাথে তুলনা করেছে?
(ক) প্রলয়ে পৃথিবী ডুবে যাওয়ার সাথে
(খ) প্রলয়ে ঘরবাড়ি ডুবে যাওয়ার সাথে
(গ) প্রলয়ে জনজীবন বিপর্যস্ত হয়ে যাওয়ার সাথে
(ঘ) প্রলয়ে দেবালয় ডুবে যাওয়ার সাথে
উত্তর: (ক) প্রলয়ে পৃথিবী ডুবে যাওয়ার সাথে

২৫। লঙ্কাপুরী কালসলিলে ডুবে গেলে বিভীষণ কোথায় আশ্রয় নেয়?
(ক) মেঘনাদের যজ্ঞাগারে (খ) রাবণের পদাশ্রয়ে
(গ) রাঘব বা রামের পদাশ্রয়ে (ঘ) পাতালপুরীতে
উত্তর: (গ) রাঘব বা রামের পদাশ্রয়ে

২৬। “পরদোষে কে চাহে মজিতে?” বাক্যের অর্থ কী?
(ক) অন্যের দোষ কে কাঁধে নিতে চায়?
(খ) অন্যের দোষ কে মোচন করতে চায়?
(গ) অন্যের দোষে কে বিপদগ্রস্ত হতে চায়?
(ঘ) অন্যের দোষে কে মরতে চায়?
উত্তর: (গ) অন্যের দোষে কে বিপদগ্রস্ত হতে চায়?

২৭। ‘বিভীষণের প্রতি মেঘনাদ’ কাব্যাংশে ‘দুর্মতি’ শব্দটি কোন অর্থে ব্যবহৃত হয়েছে?
(ক) দুর্গতি (খ) অসৎ বা মন্দ বুদ্ধি (গ) মন্দ শক্তি (ঘ) দুর্বিষহ পরিস্থিতি
উত্তর: (খ) অসৎ বা মন্দ বুদ্ধি

২৮। ‘পরঃ পরঃ সদা’ বাক্যের মর্মার্থ কী?
(ক) পর সব সময় পর নয় (খ) পর কখনো আপন হয় না
(গ) পর গুণবান হলেও সর্বদা পর (ঘ) শত্রু গুণবান হলেও সর্বদা পর
উত্তর: (গ) পর গুণবান হলেও সর্বদা পর

২৯। মন্দ স্বভাব বোঝাতে ‘বিভীষণের প্রতি মেঘনাদ’ কাব্যাংশে নিচের কোন শব্দটি ব্যবহৃত হয়েছে?
(ক) হীন (খ) নিকৃষ্ট (গ) ইতর (ঘ) নীচ
উত্তর: (ঘ) নীচ

৩০। আকাশ শব্দটির কোন প্রতিশব্দটি ‘বিভীষণের প্রতি মেঘনাদ’ কাব্যাংশে ব্যবহৃত হয়েছে?
(ক) নীলিমা (খ) আসমান (গ) অম্বর (ঘ) গগন
উত্তর: (গ) অম্বর

৩১। নিচের কোন শব্দটি ভিন্নার্থক?
(ক) বলবান (খ) বল (গ) বীর (ঘ) বলী
উত্তর: (খ) বল

৩২। ‘এবে’ শব্দটির সঠিক অর্থ কোনটি?
(ক) এবং (খ) এখন (গ) এমন (ঘ) এভাবে
উত্তর: (খ) এখন

৩৩। ‘মজাইলা’ শব্দটির অর্থ কী?
(ক) মজে গেলে (খ) বিপদগ্রস্ত করা (গ) সঙ্গে আছে (ঘ) সই করেছ
উত্তর: (খ) বিপদগ্রস্ত করা

৩৪। ‘রাবণ-আত্মজ’ কাকে বলা হয়েছে?
(ক) বিভীষণকে (খ) বীরবাহুকে (গ) মেঘনাদকে (ঘ) প্রমীলাকে
উত্তর: (গ) মেঘনাদকে

৩৫। ‘রথী’ শব্দটি দিয়ে কী বোঝায়?
(ক) রথে চড়ে যে (খ) রথের মালিক (গ) রথচালক (ঘ) শ্রেষ্ঠ
উত্তর: (গ) রথচালক ৩৬। ‘তস্কর’ শব্দটির অর্থ কোনটি?
(ক) তুষের ঘর (খ) তক্ষক (গ) চোর (ঘ) তাসের ঘর
উত্তর: (গ) চোর

৩৭। ‘রাবণ-অনুজ’ বলতে কাকে বোঝানো হয়েছে?
(ক) রামকে (খ) লক্ষ্মণকে (গ) বিভীষণকে (ঘ) কুম্ভকর্ণকে
উত্তর: (গ) বিভীষণকে

৩৮। ‘প্রগলভে’ শব্দটি দ্বারা কী বোঝানো হয়েছে?
(ক) প্রলোভন দেখিয়ে (খ) প্রাগ্রসর হয়ে (গ) নির্ভীক চিত্তে (ঘ) নিরপেক্ষভাবে
উত্তর: (গ) নির্ভীক চিত্তে

৩৯। ‘মৃগেন্দ্র’ শব্দটির অর্থ কী?
(ক) নেকড়ে বাঘ (খ) পশরাজ সিংহ (গ) শিয়াল পণ্ডিত (ঘ) হরিণ শাবক
উত্তর: (খ) পশরাজ সিংহ

৪০। বাংলা সাহিত্যে রেনেসাঁস বা নবজাগরণের মূল লক্ষ্য ছিল কোনটি?
(ক) ঈশ্বরবিমুখতা (খ) মানবকেন্দ্রিকতা (গ) দেবনির্ভরতা (ঘ) বিজ্ঞানমনস্কতা
উত্তর: (খ) মানবকেন্দ্রিকতা

৪১। বাল্মীকি-রামায়ণকে নব মূল্যায়নের মাধ্যমে মধুসূদন হীনরূপে প্রতিষ্ঠিত করেছেন কোন চরিত্রগুলোকে?
(ক) রাবণ ও মেঘনাদকে (খ) মেঘনাদ ও বিভীষণকে (গ) রাম ও লক্ষ্মণকে (ঘ) রাবণ ও বিভীষণকে
উত্তর: (গ) রাম ও লক্ষ্মণকে

৪২। 'মেঘনাদবধ' কাব্যটি কত সালে প্রকাশিত হয়?
(ক) ১৮৬০ (খ) ১৮৬১ (গ) ১৮৬২ (ঘ) ১৮৬৮
উত্তর: (খ) ১৮৬১

৪৩। 'মেঘনাদবধ-কাব্যে' কত দিনের ঘটনা বর্ণিত আছে?
(ক) দুই দিন ও দুই রাত্রির (খ) দুই দিন ও তিন রাত্রির (গ) তিন দিন ও দুই রাত্রির (ঘ) তিন দিন ও তিন রাত্রির
উত্তর: (খ) দুই দিন ও তিন রাত্রির

৪৪। মাইকেল মধুসূদন ছিলেন—
i. কবি ii. নাট্যকার iii. ঔপন্যাসিক
নিচের কোনটি সঠিক? (ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৪৫। মাইকেল মধুসূদন দত্তের সাহিত্যকর্মে ফুটে উঠেছে—
i. ধর্মবোধ ii. স্বদেশপ্রেম iii. মানবিকতা
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (খ) ii ও iii

৪৬। 'বিভীষণের প্রতি মেঘনাদ' কাব্যাংশে ফুটে উঠেছে—
i. মেঘনাদের মাতৃভূমির প্রতি ভালোবাসা ii. বিভীষণের বিশ্বাসঘাতকতায় মেঘনাদের বিস্ময় iii. মেঘনাদের কৃতিত্ব
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i, ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) i, ii ও iii

৪৭। 'বিভীষণের প্রতি মেঘনাদ' কাব্যাংশে মেঘনাদ যে কারণে বিভীষণকে গঞ্জনা বা তিরস্কার করতে চাইলেও করে না—
i. গুরুজন বলে ii. অপরাধী বলে iii. পিতৃতুল্য বলে
নিচের কোনটি সঠিক? (ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৪৮। বিভীষণ নিজেকে রামের দাস বলে পরিচয় দিলে মেঘনাদ তাকে স্মরণ করিয়ে দেয়—
i. চাঁদ মাটিতে গড়াগড়ি খাওয়ার অসম্ভব ii. স্বচ্ছ সরোবরের রাজহাঁসের কাদায় যাওয়া অবাস্তব iii. শেয়ালের সাথে সিংহের মিত্রভাব অসম্ভব
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৯। বিভীষণ জলাঞ্জলি দেয়—
i. জাতিত্ব ii. ভ্রাতৃত্ব iii. জাতি
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৫০। মেঘনাদের স্বভাব বৈশিষ্ট্যের যে ভাব কাব্যাংশে ফুটে উঠেছে—
i. প্রচণ্ড ক্ষোভ ii. বিশ্বাসঘাতকতা iii. মাতৃভূমির প্রতি ভালোবাসা
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (গ) i ও iii

৫১। মেঘনাদের মতে বিভীষণের বর্বরতার পেছনে ক্রিয়াশীল ছিল—
i. নীচতা ii. মন্দ বুদ্ধি iii. লোলুপতা
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ৫২ ও ৫৩ নং প্রশ্নের উত্তর দাও:
"নতুন কাজের বুয়া রহিমা বাড়ির ছোট মেয়ে টুনিকে একটু বেশি আদর করে, তাই টুনি সবসময় রহিমার সাথে থাকতে পছন্দ করে। একদিন বাড়ির অন্য সদস্যরা যখন অফিসে ছিল, সেই সুযোগে ছেলেধরা পার্টির কাছে টুনিকে বিক্রি করে দেয় রহিমা।"

৫২। নিচের কোন চরণটি উদ্দীপকের সাথে সাদৃশ্যপূর্ণ?
(ক) নাহি শিশু লঙ্কাপুরে, শুনি না হাসিবে (খ) প্রফুল্ল কমলে কীটবাস (গ) নিজগৃহপথ, তাত, দেখাও তস্করে? (ঘ) চণ্ডালে বসাও আনি রাজার আলয়ে?
উত্তর: (খ) প্রফুল্ল কমলে কীটবাস

৫৩। রহিমা বিভীষণের মধ্যে সাদৃশ্য হলো—
i. বিশ্বাসঘাতকতায় ii. নীচ ও ঘৃণা প্রবৃত্তিতে iii. দেশদ্রোহিতায়
নিচের কোনটি সঠিক? (ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৫৪। বাংলা ভাষার প্রথম আধুনিক কবি কে? 
(ক) রবীন্দ্রনাথ ঠাকুর (খ) মাইকেল মধুসূদন দত্ত (গ) কাজী নজরুল ইসলাম (ঘ) সুধীন্দ্রনাথ দত্ত
উত্তর: (খ) মাইকেল মধুসূদন দত্ত

৫৫। বাংলা সাহিত্যে সনেটের আবিষ্কারক কে? 
(ক) মাইকেল মধুসূদন দত্ত (খ) সুধীন্দ্রনাথ দত্ত (গ) রবীন্দ্রনাথ ঠাকুর (ঘ) কাজী নজরুল ইসলাম
উত্তর: (ক) মাইকেল মধুসূদন দত্ত

৫৬। 'উত্তরিলা কাতরে রাবণি'; এখানে 'রাবণি' বলতে কবি কাকে বুঝিয়েছেন? 
(ক) রাবণকে (খ) রাবণের স্ত্রীকে (গ) রাবণের পুত্র মেঘনাদকে (ঘ) রাবণের সহোদর বিভীষণকে
উত্তর: (গ) রাবণের পুত্র মেঘনাদকে

৫৭। 'মহামন্ত্র-বলে যথা নম্রশিরঃ ফণী'—চরণটির অন্তর্নিহিত অর্থ কী? 
(ক) প্রশ্নবাণে বিদ্ধ হয়ে রাবণের মাথা নত অবস্থা (খ) প্রশ্নবাণে বিদ্ধ হয়ে বিভীষণের মাথা নত অবস্থা 
(গ) প্রশ্নবাণে বিদ্ধ হয়ে মেঘনাদের মাথা উঁচু অবস্থা (ঘ) লক্ষ্মণের হাতে মেঘনাদের পরাস্ত হওয়া
উত্তর: (খ) প্রশ্নবাণে বিদ্ধ হয়ে বিভীষণের মাথা নত অবস্থা

৫৮। 'জ্ঞাতি' বলতে বোঝায়? 
(ক) জাতি (খ) জানা (গ) সগোত্র (ঘ) উপজাতি
উত্তর: (গ) সগোত্র

৫৯। মেঘনাদ চরিত্রের সাথে সম্পর্কযুক্ত নয়— 
(ক) বাসববিজয়ী (খ) অসীম সাহসী (গ) দৈবের অধীন (ঘ) দেশদ্রোহী
উত্তর: (ঘ) দেশদ্রোহী

৬০। "হায়, তাত, উচিত কি তব এ কাজ?"—চরণটিতে 'তাত' শব্দটি কী অর্থে ব্যবহৃত হয়েছে? 
(ক) তার জন্য (খ) পিতা (গ) পিতৃব্য বা চাচা (ঘ) পিতার বন্ধু
উত্তর: (গ) পিতৃব্য বা চাচা

৬১। 'বাসবত্রাস' বলতে কাকে বোঝায়? 
(ক) শিবকে (খ) ইন্দ্রকে (গ) মেঘনাদকে (ঘ) রামকে
উত্তর: (গ) মেঘনাদকে

৬২। মেঘনাদ 'দুরাচার দৈত্য' বলে কাকে অভিহিত করেছে? 
(ক) রাম (খ) ইন্দ্র (গ) বিভীষণ (ঘ) লক্ষ্মণ
উত্তর: (ঘ) লক্ষ্মণ

৬৩। কবিতায় প্রতিটি পঙক্তি কোন ২ টি পর্বে বিন্যস্ত? 
(ক) ৮ + ৪ (খ) ৮ + ৬ (গ) ৬ + ৪ (ঘ) ৬ + ৮
উত্তর: (খ) ৮ + ৬

৬৪। সৌমিত্রি কে? 
(ক) রাম (খ) রাবণ (গ) বিভীষণ (ঘ) লক্ষ্মণ
উত্তর: (ঘ) লক্ষ্মণ

৬৫। “বিরত সতত পাপে দেবকুল”— পঙক্তিটির অর্থ কী? 
(ক) দেবতারা পাপ থেকে বিরত থাকে (খ) দেবকুল পাপে নিমজ্জিত (গ) পাপের কারণে দেবকুল দূরে সরে গেছে (ঘ) সততা আর পাপ দেবতার মাঝেও আছে
উত্তর: (ক) দেবতারা পাপ থেকে বিরত থাকে

৮২। ‘প্রলয়ে যেমতি বসুধা, ডুবিছে লঙ্কা এ কালসলিলে’—পঙক্তিতে যে অলংকারগুলো ব্যবহৃত হয়েছে—

i. ঘৃণা ii. প্রতিজ্ঞা iii. আত্মবিশ্বাস

৮৬। বিভীষণকে রক্ষোরথী, বিজ্ঞতম প্রভৃতি বিশেষণে অভিহিত করার পেছনে যে বিষয়গুলো ক্রিয়াশীল—
i. তোষামোদ ii. স্বজাত্যবোধ জাগানো iii. আত্মসম্মানবোধ জাগানো
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ৮৭ ও ৮৮ নং প্রশ্নের উত্তর দাও:
"১৯৭১ সালের স্বাধীনতা যুদ্ধে দেশের সকল মানুষ স্বাধীনতার পক্ষে কাজ করেনি। কেউ কেউ তীব্র বিরোধিতাও করেছে, যা অত্যন্ত দুঃখজনক এবং নিন্দনীয়।"

৮৭। উদ্দীপকটির সাথে তোমার পঠিত কোন কবিতার মিল খুঁজে পাও?
(ক) ফেব্রুয়ারি ১৯৬৯ (খ) আমি কিংবদন্তির কথা বলছি (গ) আঠারো বছর বয়স (ঘ) বিভীষণের প্রতি মেঘনাদ
উত্তর: (ঘ) বিভীষণের প্রতি মেঘনাদ

৮৮। উদ্দীপক ও তোমার পঠিত কবিতার সাদৃশ্যপূর্ণ ভাব কোনটি?
(ক) কাপুরুষতা (খ) দেশদ্রোহিতা (গ) নির্ভীকতা (ঘ) ধর্মভীরুতা
উত্তর: (খ) দেশদ্রোহিতা

উদ্দীপকের আলোকে ৮৯ ও ৯০ নং প্রশ্নের উত্তর দাও:
"১৯৭১ সালের ২৫ শে মার্চ রাতে পাকিস্তানি হানাদার বাহিনী এদেশের হাজার হাজার নিরস্ত্র মানুষকে অন্যায়ভাবে হত্যা করে। বাঙালি আজও তাদের ঘৃণাভরে স্মরণ করে।"

৮৯। উদ্দীপকে বর্ণিত হত্যার সঙ্গে ‘বিভীষণের প্রতি মেঘনাদ’ কবিতায় কার হত্যার মিল পাওয়া যায়?
(ক) রাঘব (খ) মেঘনাদ (গ) বিভীষণ (ঘ) কুম্ভকর্ণ
উত্তর: (খ) মেঘনাদ (নোট: কারণ মেঘনাদকেও যজ্ঞাগারে নিরস্ত্র অবস্থায় আক্রমণ করা হয়েছিল)
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
</body>

</html>
