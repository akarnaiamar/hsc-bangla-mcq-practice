<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">মাইকেল মধুসূদন দত্ত এর 'বিভীষণের প্রতি মেঘনাদ' পদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। শমন-ভবন কী? 
(ক) দেবালয় (খ) যমালয় (গ) যজ্ঞাগার (ঘ) বাসালয়
উত্তর: (খ) যমালয়

২। 'হায় তাত উচিত কি তব এ কাজ' বলতে কী বোঝানো হয়েছে? 
(ক) কুম্ভকর্ণের সহায়তা (খ) লক্ষ্মণের প্রবেশ (গ) বিভীষণের সহায়তা (ঘ) রামচন্দ্রের আজ্ঞা
উত্তর: (গ) বিভীষণের সহায়তা

উদ্দীপকের আলোকে ৩ ও ৪ নং প্রশ্নের উত্তর দাও:
"মুক্তিযোদ্ধা কমান্ডার মতিউর একটি সফল অপারেশনের পর তারাপুর গ্রামে বিশ্রাম নিচ্ছিলেন। পার্শ্ববর্তী গ্রামের রাজাকার ইদ্রিস তথ্যটি পাকিস্তানি হানাদার বাহিনীকে জানিয়ে দিল। হানাদার বাহিনী এসে কমান্ডার মতিউরকে মেরে ফেলে। মতিউর প্রতিরোধের সুযোগ পর্যন্ত পেলেন না।"

৩। উদ্দীপকের ইদ্রিস চরিত্রটি "বিভীষণের প্রতি মেঘনাদ" কবিতার কোন চরিত্রের প্রতিনিধিত্ব করছে? 
(ক) কুম্ভকর্ণের (খ) বিভীষণের (গ) লক্ষ্মণের (ঘ) রামের
উত্তর: (খ) বিভীষণের

৪। উক্ত চরিত্রের সাথে সাদৃশ্যপূর্ণ চরণ— 
i. নিজ গৃহপথ, তাত দেখাও তস্করে?
ii. রাঘব দাস আমি; কী প্রকারে/তাহার বিপক্ষ কাজ করিব।
iii. গতি যার নীচ সহ, নীচ সে দুর্মতি।
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৫। মাইকেল মধুসূদন দত্ত কোথায় জন্মগ্রহণ করেন? 
(ক) যশোরের সাগরদাঁড়ি (খ) নরসিংদীর পাড়াতলি (গ) ঝিনাইদহের সাগরদাঁড়ি (ঘ) দিনাজপুরের সাগরদাঁড়ি
উত্তর: (ক) যশোরের সাগরদাঁড়ি

৬। কবি ছাড়াও মধুসূদন দত্ত অন্য কোন পরিচয়ে স্বনামধন্য ছিলেন? 
(ক) নাট্যকার (খ) প্রাবন্ধিক (গ) গীতিকার (ঘ) গল্পকার
উত্তর: (ক) নাট্যকার

৭। 'একেই কি বলে সভ্যতা' ও 'বুড়ো সালিকের ঘাড়ে রোঁ' মধুসূদনের কোন ধরণের রচনা? 
(ক) কবিতা (খ) ছোটগল্প (গ) প্রহসন (ঘ) নাটক
উত্তর: (গ) প্রহসন

৮। বাংলা কাব্যজগতে অমিত্রাক্ষর ছন্দের স্রষ্টা কোন কবি? 
(ক) রবীন্দ্রনাথ ঠাকুর (খ) সত্যেন্দ্রনাথ দত্ত (গ) মাইকেল মধুসূদন দত্ত (ঘ) জীবনানন্দ দাশ
উত্তর: (গ) মাইকেল মধুসূদন দত্ত

৯। "মেঘনাদবধ-কাব্যটি নয়টি সর্গে রচিত"— এখানে সর্গ বলতে বোঝানো হয়েছে— 
(ক) বেহেশত (খ) অধ্যায় (গ) সরণি (ঘ) সারণি
উত্তর: (খ) অধ্যায়

১০। মধুসূদন দত্ত মৃত্যুবরণ করেন কোথায়? 
(ক) ঢাকায় (খ) যশোর (গ) কলকাতায় (ঘ) লন্ডনে
উত্তর: (গ) কলকাতায়

১১। "এতক্ষণে"—অরিন্দম কহিলা বিষাদে;— বাক্যটির মর্মার্থ কী? 
(ক) এতক্ষণ পরে মেঘনাদ কথা বলল (খ) বিস্মিত ও বিপন্ন মেঘনাদ বলল (গ) এতক্ষণে মেঘনাদ শত্রুকে দেখল (ঘ) এতক্ষণে মেঘনাদ গৌরবের কথা বলল
উত্তর: (খ) বিস্মিত ও বিপন্ন মেঘনাদ বলল

১২। 'অরিকে (শত্রু) দমন করে যে'— এর এককথায় প্রকাশ কোনটি? 
(ক) অরিজিৎ (খ) জিতেন্দ্রিয় (গ) অরিন্দম (ঘ) অরিধবধ
উত্তর: (গ) অরিন্দম

১৩। "জানিনু কেমনে আসি লক্ষণ পশিল!"— এখানে লক্ষণ কেমন করে রাক্ষসপুরীতে আসে বলে মেঘনাদ জানতে পেরেছে বা বুঝতে পেরেছে? 
(ক) বানরের পিঠে চড়ে (খ) মন্ত্রবলে (গ) বিভীষণের সহায়তায় (ঘ) অরিকে দমন করে
উত্তর: (গ) বিভীষণের সহায়তায়

১৪। মেঘনাদের মতে বিভীষণের কোন কাজটি উচিত হয়নি? 
(ক) লক্ষ্মণকে হত্যা করা (খ) যজ্ঞাগারে প্রবেশে লক্ষ্মণকে সাহায্য করা (গ) রাবণকে অপমান করা (ঘ) মেঘনাদকে বাধা দেওয়া
উত্তর: (খ) যজ্ঞাগারে প্রবেশে লক্ষ্মণকে সাহায্য করা

১৫। বাসব কে? 
(ক) রাঘবের সহোদর (খ) দেবতাদের রাজা ইন্দ্র (গ) মেঘনাদ (ঘ) বিভীষণ
উত্তর: (খ) দেবতাদের রাজা ইন্দ্র

১৬। রঘু বংশের শ্রেষ্ঠ সন্তান রামচন্দ্রকে কী হিসেবে অভিহিত করা হয়? 
(ক) রঘুনাথ (খ) রঘুপতি (গ) রাঘব (ঘ) রঘুরাজ
উত্তর: (গ) রাঘব

১৭। বিভীষণ নিজেকে রামের আজ্ঞাবহ দাস হিসেবে পরিচয় দিলে মেঘনাদের কী করতে ইচ্ছে করে? 
(ক) নাচতে (খ) হাসতে (গ) মরতে (ঘ) কাঁদতে
উত্তর: (গ) মরতে

১৮। “স্থাপিলা বিধুরে বিধি স্থাণুর ললাটে” বলতে কী বোঝানো হয়েছে?
(ক) বিধাতা চাঁদকে আকাশে উজ্জ্বল করে স্থাপন করেছেন
(খ) বিধাতা চাঁদকে আকাশে উজ্জ্বল করে স্থাপন করেছেন
(গ) বিধাতা চাঁদকে আকাশে নিশ্চল করে স্থাপন করেছেন
(ঘ) বিধাতা চাঁদকে আকাশে ঘূর্ণায়মান করে স্থাপন করেছেন
উত্তর: (গ) বিধাতা চাঁদকে আকাশে নিশ্চল করে স্থাপন করেছেন

১৯। “নাহি শিশু লঙ্কাপুরে, শুনি না হাসিবে এ কথা!”— কোন কথা?
(ক) বিভীষণের কপটতার কথা
(খ) লক্ষ্মণের যজ্ঞাগারে প্রবেশের কথা
(গ) বিভীষণের লক্ষ্মণকে সহায়তা করার কথা
(ঘ) নিরস্ত্র মেঘনাদের কাছে কপট লক্ষ্মণের যুদ্ধ প্রার্থনা করার কথা
উত্তর: (ঘ) নিরস্ত্র মেঘনাদের কাছে কপট লক্ষ্মণের যুদ্ধ প্রার্থনা করার কথা

২০। মেঘনাদ বিভীষণকে কী ছাড়ার কথা বলেছেন?
(ক) অস্ত্র (খ) অস্ত্রাগারের দ্বার (গ) ভণ্ডামি (ঘ) ছদ্মবেশ
উত্তর: (খ) অস্ত্রাগারের দ্বার

২১। প্রগলভে দাম্ভিকতার সাথে কে যজ্ঞাগারে প্রবেশ করে?
(ক) মেঘনাদ যজ্ঞাগারে (খ) লক্ষ্মণ
(গ) বিভীষণ যজ্ঞাগারে (ঘ) লক্ষ্মণ লঙ্কাপুরীতে
উত্তর: (খ) লক্ষ্মণ

২২। “মহামন্ত্র-বলে যথা নম্রশিরঃ ফণী”— বাক্যটির অর্থ কী?
(ক) মন্ত্রপূত সাপ যেমন মাথা নত করে
(খ) সাপের ফণা ধরা অবস্থা হঠাৎ নত হওয়া
(গ) মহৌষধের কাছে সাপের বিষ কমে যাওয়া
(ঘ) ঐশ্বর্যশালীর মাথা নত হওয়া
উত্তর: (ক) মন্ত্রপূত সাপ যেমন মাথা নত করে

২৩। “নহি দোষী আমি”— কে বলেছে?
(ক) লক্ষ্মণ (খ) বিভীষণ (গ) মেঘনাদ (ঘ) রাবণ
উত্তর: (খ) বিভীষণ

২৪। লঙ্কার অধঃপতনকে বিভীষণ কিসের সাথে তুলনা করেছে?
(ক) প্রলয়ে পৃথিবী ডুবে যাওয়ার সাথে
(খ) প্রলয়ে ঘরবাড়ি ডুবে যাওয়ার সাথে
(গ) প্রলয়ে জনজীবন বিপর্যস্ত হয়ে যাওয়ার সাথে
(ঘ) প্রলয়ে দেবালয় ডুবে যাওয়ার সাথে
উত্তর: (ক) প্রলয়ে পৃথিবী ডুবে যাওয়ার সাথে

২৫। লঙ্কাপুরী কালসলিলে ডুবে গেলে বিভীষণ কোথায় আশ্রয় নেয়?
(ক) মেঘনাদের যজ্ঞাগারে (খ) রাবণের পদাশ্রয়ে
(গ) রাঘব বা রামের পদাশ্রয়ে (ঘ) পাতালপুরীতে
উত্তর: (গ) রাঘব বা রামের পদাশ্রয়ে

২৬। “পরদোষে কে চাহে মজিতে?” বাক্যের অর্থ কী?
(ক) অন্যের দোষ কে কাঁধে নিতে চায়?
(খ) অন্যের দোষ কে মোচন করতে চায়?
(গ) অন্যের দোষে কে বিপদগ্রস্ত হতে চায়?
(ঘ) অন্যের দোষে কে মরতে চায়?
উত্তর: (গ) অন্যের দোষে কে বিপদগ্রস্ত হতে চায়?

২৭। ‘বিভীষণের প্রতি মেঘনাদ’ কাব্যাংশে ‘দুর্মতি’ শব্দটি কোন অর্থে ব্যবহৃত হয়েছে?
(ক) দুর্গতি (খ) অসৎ বা মন্দ বুদ্ধি (গ) মন্দ শক্তি (ঘ) দুর্বিষহ পরিস্থিতি
উত্তর: (খ) অসৎ বা মন্দ বুদ্ধি

২৮। ‘পরঃ পরঃ সদা’ বাক্যের মর্মার্থ কী?
(ক) পর সব সময় পর নয় (খ) পর কখনো আপন হয় না
(গ) পর গুণবান হলেও সর্বদা পর (ঘ) শত্রু গুণবান হলেও সর্বদা পর
উত্তর: (গ) পর গুণবান হলেও সর্বদা পর

২৯। মন্দ স্বভাব বোঝাতে ‘বিভীষণের প্রতি মেঘনাদ’ কাব্যাংশে নিচের কোন শব্দটি ব্যবহৃত হয়েছে?
(ক) হীন (খ) নিকৃষ্ট (গ) ইতর (ঘ) নীচ
উত্তর: (ঘ) নীচ

৩০। আকাশ শব্দটির কোন প্রতিশব্দটি ‘বিভীষণের প্রতি মেঘনাদ’ কাব্যাংশে ব্যবহৃত হয়েছে?
(ক) নীলিমা (খ) আসমান (গ) অম্বর (ঘ) গগন
উত্তর: (গ) অম্বর

৩১। নিচের কোন শব্দটি ভিন্নার্থক?
(ক) বলবান (খ) বল (গ) বীর (ঘ) বলী
উত্তর: (খ) বল

৩২। ‘এবে’ শব্দটির সঠিক অর্থ কোনটি?
(ক) এবং (খ) এখন (গ) এমন (ঘ) এভাবে
উত্তর: (খ) এখন

৩৩। ‘মজাইলা’ শব্দটির অর্থ কী?
(ক) মজে গেলে (খ) বিপদগ্রস্ত করা (গ) সঙ্গে আছে (ঘ) সই করেছ
উত্তর: (খ) বিপদগ্রস্ত করা

৩৪। ‘রাবণ-আত্মজ’ কাকে বলা হয়েছে?
(ক) বিভীষণকে (খ) বীরবাহুকে (গ) মেঘনাদকে (ঘ) প্রমীলাকে
উত্তর: (গ) মেঘনাদকে

৩৫। ‘রথী’ শব্দটি দিয়ে কী বোঝায়?
(ক) রথে চড়ে যে (খ) রথের মালিক (গ) রথচালক (ঘ) শ্রেষ্ঠ
উত্তর: (গ) রথচালক 

৩৬। ‘তস্কর’ শব্দটির অর্থ কোনটি?
(ক) তুষের ঘর (খ) তক্ষক (গ) চোর (ঘ) তাসের ঘর
উত্তর: (গ) চোর

৩৭। ‘রাবণ-অনুজ’ বলতে কাকে বোঝানো হয়েছে?
(ক) রামকে (খ) লক্ষ্মণকে (গ) বিভীষণকে (ঘ) কুম্ভকর্ণকে
উত্তর: (গ) বিভীষণকে

৩৮। ‘প্রগলভে’ শব্দটি দ্বারা কী বোঝানো হয়েছে?
(ক) প্রলোভন দেখিয়ে (খ) প্রাগ্রসর হয়ে (গ) নির্ভীক চিত্তে (ঘ) নিরপেক্ষভাবে
উত্তর: (গ) নির্ভীক চিত্তে

৩৯। ‘মৃগেন্দ্র’ শব্দটির অর্থ কী?
(ক) নেকড়ে বাঘ (খ) পশরাজ সিংহ (গ) শিয়াল পণ্ডিত (ঘ) হরিণ শাবক
উত্তর: (খ) পশরাজ সিংহ

৪০। বাংলা সাহিত্যে রেনেসাঁস বা নবজাগরণের মূল লক্ষ্য ছিল কোনটি?
(ক) ঈশ্বরবিমুখতা (খ) মানবকেন্দ্রিকতা (গ) দেবনির্ভরতা (ঘ) বিজ্ঞানমনস্কতা
উত্তর: (খ) মানবকেন্দ্রিকতা

৪১। বাল্মীকি-রামায়ণকে নব মূল্যায়নের মাধ্যমে মধুসূদন হীনরূপে প্রতিষ্ঠিত করেছেন কোন চরিত্রগুলোকে?
(ক) রাবণ ও মেঘনাদকে (খ) মেঘনাদ ও বিভীষণকে (গ) রাম ও লক্ষ্মণকে (ঘ) রাবণ ও বিভীষণকে
উত্তর: (ক) রাবণ ও মেঘনাদকে

৪২। 'মেঘনাদবধ' কাব্যটি কত সালে প্রকাশিত হয়?
(ক) ১৮৬০ (খ) ১৮৬১ (গ) ১৮৬২ (ঘ) ১৮৬৮
উত্তর: (খ) ১৮৬১

৪৩। 'মেঘনাদবধ-কাব্যে' কত দিনের ঘটনা বর্ণিত আছে?
(ক) দুই দিন ও দুই রাত্রির (খ) দুই দিন ও তিন রাত্রির (গ) তিন দিন ও দুই রাত্রির (ঘ) তিন দিন ও তিন রাত্রির
উত্তর: (ক) দুই দিন ও দুই রাত্রির

৪৪। মাইকেল মধুসূদন ছিলেন—
i. কবি ii. নাট্যকার iii. ঔপন্যাসিক
নিচের কোনটি সঠিক? (ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৪৫। মাইকেল মধুসূদন দত্তের সাহিত্যকর্মে ফুটে উঠেছে—
i. ধর্মবোধ ii. স্বদেশপ্রেম iii. মানবিকতা
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (খ) ii ও iii

৪৬। 'বিভীষণের প্রতি মেঘনাদ' কাব্যাংশে ফুটে উঠেছে—
i. মেঘনাদের মাতৃভূমির প্রতি ভালোবাসা 
ii. বিভীষণের বিশ্বাসঘাতকতায় মেঘনাদের বিস্ময় 
iii. মেঘনাদের কৃতিত্ব
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৭। 'বিভীষণের প্রতি মেঘনাদ' কাব্যাংশে মেঘনাদ যে কারণে বিভীষণকে গঞ্জনা বা তিরস্কার করতে চাইলেও করে না—
i. গুরুজন বলে 
ii. অপরাধী বলে 
iii. পিতৃতুল্য বলে
নিচের কোনটি সঠিক? (ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৪৮। বিভীষণ নিজেকে রামের দাস বলে পরিচয় দিলে মেঘনাদ তাকে স্মরণ করিয়ে দেয়—
i. চাঁদ মাটিতে গড়াগড়ি খাওয়ার অসম্ভব 
ii. স্বচ্ছ সরোবরের রাজহাঁসের কাদায় যাওয়া অবাস্তব 
iii. শেয়ালের সাথে সিংহের মিত্রভাব অসম্ভব
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৯। বিভীষণ জলাঞ্জলি দেয়—
i. জাতিত্ব ii. ভ্রাতৃত্ব iii. জাতি
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৫০। মেঘনাদের স্বভাব বৈশিষ্ট্যের যে ভাব কাব্যাংশে ফুটে উঠেছে—
i. প্রচণ্ড ক্ষোভ ii. বিশ্বাসঘাতকতা iii. মাতৃভূমির প্রতি ভালোবাসা
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (গ) i ও iii

৫১। মেঘনাদের মতে বিভীষণের বর্বরতার পেছনে ক্রিয়াশীল ছিল—
i. নীচতা ii. মন্দ বুদ্ধি iii. লোলুপতা
নিচের কোনটি সঠিক? (ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ৫২ ও ৫৩ নং প্রশ্নের উত্তর দাও:
"নতুন কাজের বুয়া রহিমা বাড়ির ছোট মেয়ে টুনিকে একটু বেশি আদর করে, তাই টুনি সবসময় রহিমার সাথে থাকতে পছন্দ করে। একদিন বাড়ির অন্য সদস্যরা যখন অফিসে ছিল, সেই সুযোগে ছেলেধরা পার্টির কাছে টুনিকে বিক্রি করে দেয় রহিমা।"

৫২। নিচের কোন চরণটি উদ্দীপকের সাথে সাদৃশ্যপূর্ণ?
(ক) নাহি শিশু লঙ্কাপুরে, শুনি না হাসিবে (খ) প্রফুল্ল কমলে কীটবাস (গ) নিজগৃহপথ, তাত, দেখাও তস্করে? (ঘ) চণ্ডালে বসাও আনি রাজার আলয়ে?
উত্তর: (খ) প্রফুল্ল কমলে কীটবাস

৫৩। রহিমা বিভীষণের মধ্যে সাদৃশ্য হলো—
i. বিশ্বাসঘাতকতায় ii. নীচ ও ঘৃণা প্রবৃত্তিতে iii. দেশদ্রোহিতায়
নিচের কোনটি সঠিক? (ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৫৪। বাংলা ভাষার প্রথম আধুনিক কবি কে? 
(ক) রবীন্দ্রনাথ ঠাকুর (খ) মাইকেল মধুসূদন দত্ত (গ) কাজী নজরুল ইসলাম (ঘ) সুধীন্দ্রনাথ দত্ত
উত্তর: (খ) মাইকেল মধুসূদন দত্ত

৫৫। বাংলা সাহিত্যে সনেটের আবিষ্কারক কে? 
(ক) মাইকেল মধুসূদন দত্ত (খ) সুধীন্দ্রনাথ দত্ত (গ) রবীন্দ্রনাথ ঠাকুর (ঘ) কাজী নজরুল ইসলাম
উত্তর: (ক) মাইকেল মধুসূদন দত্ত

৫৬। 'উত্তরিলা কাতরে রাবণি'; এখানে 'রাবণি' বলতে কবি কাকে বুঝিয়েছেন? 
(ক) রাবণকে (খ) রাবণের স্ত্রীকে (গ) রাবণের পুত্র মেঘনাদকে (ঘ) রাবণের সহোদর বিভীষণকে
উত্তর: (গ) রাবণের পুত্র মেঘনাদকে

৫৭। 'মহামন্ত্র-বলে যথা নম্রশিরঃ ফণী'—চরণটির অন্তর্নিহিত অর্থ কী? 
(ক) প্রশ্নবাণে বিদ্ধ হয়ে রাবণের মাথা নত অবস্থা (খ) প্রশ্নবাণে বিদ্ধ হয়ে বিভীষণের মাথা নত অবস্থা 
(গ) প্রশ্নবাণে বিদ্ধ হয়ে মেঘনাদের মাথা উঁচু অবস্থা (ঘ) লক্ষ্মণের হাতে মেঘনাদের পরাস্ত হওয়া
উত্তর: (খ) প্রশ্নবাণে বিদ্ধ হয়ে বিভীষণের মাথা নত অবস্থা

৫৮। 'জ্ঞাতি' বলতে বোঝায়? 
(ক) জাতি (খ) জানা (গ) সগোত্র (ঘ) উপজাতি
উত্তর: (গ) সগোত্র

৫৯। মেঘনাদ চরিত্রের সাথে সম্পর্কযুক্ত নয়— 
(ক) বাসববিজয়ী (খ) অসীম সাহসী (গ) দৈবের অধীন (ঘ) দেশদ্রোহী
উত্তর: (ঘ) দেশদ্রোহী

৬০। "হায়, তাত, উচিত কি তব এ কাজ?"—চরণটিতে 'তাত' শব্দটি কী অর্থে ব্যবহৃত হয়েছে? 
(ক) তার জন্য (খ) পিতা (গ) পিতৃব্য বা চাচা (ঘ) পিতার বন্ধু
উত্তর: (গ) পিতৃব্য বা চাচা

৬১। 'বাসবত্রাস' বলতে কাকে বোঝায়? 
(ক) শিবকে (খ) ইন্দ্রকে (গ) মেঘনাদকে (ঘ) রামকে
উত্তর: (গ) মেঘনাদকে

৬২। মেঘনাদ 'দুরাচার দৈত্য' বলে কাকে অভিহিত করেছে? 
(ক) রাম (খ) ইন্দ্র (গ) বিভীষণ (ঘ) লক্ষ্মণ
উত্তর: (ঘ) লক্ষ্মণ

৬৩। কবিতায় প্রতিটি পঙক্তি কোন ২ টি পর্বে বিন্যস্ত? 
(ক) ৮ + ৪ (খ) ৮ + ৬ (গ) ৬ + ৪ (ঘ) ৬ + ৮
উত্তর: (খ) ৮ + ৬

৬৪। সৌমিত্রি কে? 
(ক) রাম (খ) রাবণ (গ) বিভীষণ (ঘ) লক্ষ্মণ
উত্তর: (ঘ) লক্ষ্মণ

৬৫। “বিরত সতত পাপে দেবকুল”— পঙক্তিটির অর্থ কী? 
(ক) দেবতারা পাপ থেকে বিরত থাকে (খ) দেবকুল পাপে নিমজ্জিত (গ) পাপের কারণে দেবকুল দূরে সরে গেছে (ঘ) সততা আর পাপ দেবতার মাঝেও আছে
উত্তর: (ক) দেবতারা পাপ থেকে বিরত থাকে

৬৬। রাঘবদাস কে? 
(ক) রাম (খ) লক্ষ্মণ (গ) মেঘনাদ (ঘ) বিভীষণ
উত্তর: (ঘ) বিভীষণ

৬৭। “গতি যার নীচ সহ, নীচ সে দুর্মতি”—বলতে কী বোঝানো হয়েছে? 
(ক) মন্দলোকেও ভালো কাজ করে (খ) ব্যবহারে বংশের পরিচয় (গ) হীনলোকের প্রবৃত্তি অসৎ (ঘ) মন্দ লোক সবার শত্রু
উত্তর: (গ) হীনলোকের প্রবৃত্তি অসৎ

৬৮। 'নিকষা সতী তোমার জননী'—এখানে 'নিকষা' বলে কাকে সম্বোধন করা হয়েছে? 
(ক) সীতাকে (খ) রাবণের স্ত্রীকে (গ) বিভীষণের মাকে (ঘ) রামের স্ত্রী
উত্তর: (গ) বিভীষণের মাকে

৬৯। 'ব্যূহ রচনা' অর্থ কী? [ক্যান্টনমেন্ট পাবলিক স্কুল এন্ড কলেজ, রংপুর]
(ক) প্রতিরোধী বেষ্টনী তৈরি করা (খ) অপ্রতিরোধী বেষ্টনী তৈরি করা (গ) বিশৃঙ্খলা তৈরি করা (ঘ) বিপদগ্রস্ত করা
উত্তর: (খ) অপ্রতিরোধী বেষ্টনী তৈরি করা (নোট: প্রেক্ষাপট অনুযায়ী এটি সৈন্য সমাবেশের প্রতিরোধী সজ্জা)

৭০। মেঘনাদ কোন অপমান সইতে না পারার কথা বলেছে? 
(ক) যুদ্ধে অপমানিত হওয়ার অপমান (খ) বিভীষণের শত্রুতার অপমান (গ) লক্ষ্মণকে সাহায্য করার অপমান (ঘ) লক্ষ্মণের যজ্ঞাগারে প্রবেশের অপমান
উত্তর: (ঘ) লক্ষ্মণের যজ্ঞাগারে প্রবেশের অপমান

৭১। 'বিভীষণের প্রতি মেঘনাদ' কবিতায় শূলপাণিভনিভ কে? 
(ক) রাবণ (খ) বিভীষণ (গ) মেঘনাদ (ঘ) কুম্ভকর্ণ
উত্তর: (ঘ) কুম্ভকর্ণ (নোট: এখানে মেঘনাদকে শিবের মতো তেজস্বী বোঝানো হয়েছে)

৭২। 'ঘরের শত্রু বিভীষণ'— এ প্রবাদ বাক্যটি বিভীষণের কোন আচরণকে কেন্দ্র করে প্রচলিত? 
(ক) স্বজনের প্রতি উদাসীনতা (খ) পরধর্মের অনুসরণ (গ) শত্রুপক্ষের সাথে আঁতাত (ঘ) দুর্জনের সাহচর্য
উত্তর: (গ) শত্রুপক্ষের সাথে আঁতাত

৭৩। পৃথিবীর কোন সমার্থক শব্দটি 'বিভীষণের প্রতি মেঘনাদ' কাব্যাংশে ব্যবহৃত হয়েছে? 
(ক) বসুন্ধরা (খ) ধরণি (গ) বসুধা (ঘ) বিশ্ব
উত্তর: (গ) বসুধা

৭৪। শাস্ত্রে বলে, গুণবান যদি— গুণহীন—। শূন্যস্থানে উপযুক্ত শব্দ দুটি হলো— 
(ক) পরজন, স্বজন (খ) স্বজন, পরজন (গ) পরজন, আপনজন (ঘ) আপনজন, স্বজন
উত্তর: (ক) পরজন, স্বজন

৭৫। অমিত্রাক্ষর ছন্দ বলতে বোঝায়— 
(ক) চরণের মিল প্রবহমানতা (খ) অন্ত্যমিলের অভাব ও প্রবহমানতা (গ) চরণের আদিতে অমিল প্রবহমানতা (ঘ) চরণের মধ্যে মিল প্রবহমানতা
উত্তর: (খ) অন্ত্যমিলের অভাব ও প্রবহমানতা

৭৬। ‘মহারথী প্রথা’ বলতে কী বোঝায়?
(ক) মহান রথযাত্রা (খ) বৃহৎ রথযাত্রা (গ) শ্রেষ্ঠ রথযাত্রা (ঘ) শ্রেষ্ঠ বীরদের আচরণ প্রথা
উত্তর: (ঘ) শ্রেষ্ঠ বীরদের আচরণ প্রথা

৭৭। ‘বিভীষণের প্রতি মেঘনাদ’ কবিতায় কীসে স্বাধীন ব্যবহার হয়েছে?
(ক) ছন্দে (খ) অন্ত্যমিলে (গ) অলংকারে (ঘ) বিরামচিহ্নে
উত্তর: (ঘ) বিরামচিহ্নে

৭৮। মেঘনাদকে ‘বাসবত্রাস’ বলার কারণ কী?
(ক) বাসবের মতো ভয়ঙ্কর বলে (খ) বাসবকে বিতাড়িত করেছে বলে (গ) বাসবকে পরাজিত করেছে বলে (ঘ) বাসবের শস্ত্রহরণ করেছে বলে
উত্তর: (গ) বাসবকে পরাজিত করেছে বলে

৭৯। ‘চণ্ডালে বসাও আনি রাজার আলয়ে’—পঙক্তিটির মধ্যে দিয়ে কোন ভাব সর্বাধিক জোরালো হয়েছে?
(ক) বিস্ময় (খ) ঘৃণা (গ) তিরস্কার (ঘ) ক্রোধ
উত্তর: (গ) তিরস্কার

৮০। ‘প্রফুল্ল কমলে কীটবাস?’ বলতে কী বোঝানো হয়েছে?
(ক) বিভীষণের বিশ্বাসঘাতকতাকে (খ) লঙ্কাপুরীতে বিভীষণের অবস্থানকে 
(গ) লঙ্কাপুরীতে মেঘনাদের অবস্থানকে (ঘ) নিকুম্ভিলা যজ্ঞাগারে লক্ষ্মণের অবস্থানকে
উত্তর: (ঘ) নিকুম্ভিলা যজ্ঞাগারে লক্ষ্মণের অবস্থানকে

৮১। ‘বিভীষণের প্রতি মেঘনাদ’ কবিতায় মেঘনাদের যে ভাব ফুটে উঠেছে তা হলো—
i. দেশদ্রোহিতার বিরুদ্ধে ঘৃণা ii. বিশ্বাসঘাতকতা iii. মাতৃভূমির প্রতি ভালোবাসা
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৮২। ‘প্রলয়ে যেমতি বসুধা, ডুবিছে লঙ্কা এ কালসলিলে’—পঙক্তিতে যে অলংকারগুলো ব্যবহৃত হয়েছে—
i. উপমা ii. অনুপ্রাস iii. রূপক
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৮৩। ‘আহব’ শব্দের সমার্থ শব্দগুচ্ছ কোনটি?
i. রণ, আহ্বান, ডঙ্কা ii. সমর, সম্রাট, রাজা iii. যুদ্ধ-বিগ্রহ, সংগ্রাম
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) iii (ঘ) i, ii ও iii
উত্তর: (গ) iii

৮৪। ‘লঙ্কার কলঙ্ক আজি ভঞ্জিব আহবে’—পঙক্তিটির গভীরে লুকায়িত আছে—
i. ঘৃণা ii. প্রতিজ্ঞা iii. আত্মবিশ্বাস
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৮৫। ‘কেলিনু শৈবালে ভুলি কমল কানন’ উক্তিটি নিচের কোন চরণের সাথে সম্পর্কিত?
i. স্বচ্ছ সরোবরে করে কেলি রাজহংস, যায় কি সে কভু, প্রভু, পঙ্কিল সলিলে
ii. ‘নাহি দোষী আমি, বৎস, বৃথা ভর্ৎস মোরে’
iii. নির্গুণ স্বজন শ্রেয়ঃ; পরঃ পরঃ সদা!
নিচের কোনটি সঠিক? 
(ক) i (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i

৮৬। বিভীষণকে রক্ষোরথী, বিজ্ঞতম প্রভৃতি বিশেষণে অভিহিত করার পেছনে যে বিষয়গুলো ক্রিয়াশীল—
i. তোষামোদ ii. স্বজাত্যবোধ জাগানো iii. আত্মসম্মানবোধ জাগানো
নিচের কোনটি সঠিক? 
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপকের আলোকে ৮৭ ও ৮৮ নং প্রশ্নের উত্তর দাও:
"১৯৭১ সালের স্বাধীনতা যুদ্ধে দেশের সকল মানুষ স্বাধীনতার পক্ষে কাজ করেনি। কেউ কেউ তীব্র বিরোধিতাও করেছে, যা অত্যন্ত দুঃখজনক এবং নিন্দনীয়।"

৮৭। উদ্দীপকটির সাথে তোমার পঠিত কোন কবিতার মিল খুঁজে পাও?
(ক) ফেব্রুয়ারি ১৯৬৯ (খ) আমি কিংবদন্তির কথা বলছি (গ) আঠারো বছর বয়স (ঘ) বিভীষণের প্রতি মেঘনাদ
উত্তর: (ঘ) বিভীষণের প্রতি মেঘনাদ

৮৮। উদ্দীপক ও তোমার পঠিত কবিতার সাদৃশ্যপূর্ণ ভাব কোনটি?
(ক) কাপুরুষতা (খ) দেশদ্রোহিতা (গ) নির্ভীকতা (ঘ) ধর্মভীরুতা
উত্তর: (খ) দেশদ্রোহিতা

উদ্দীপকের আলোকে ৮৯ ও ৯০ নং প্রশ্নের উত্তর দাও:
"১৯৭১ সালের ২৫ শে মার্চ রাতে পাকিস্তানি হানাদার বাহিনী এদেশের হাজার হাজার নিরস্ত্র মানুষকে অন্যায়ভাবে হত্যা করে। বাঙালি আজও তাদের ঘৃণাভরে স্মরণ করে।"

৮৯। উদ্দীপকে বর্ণিত হত্যার সঙ্গে ‘বিভীষণের প্রতি মেঘনাদ’ কবিতায় কার হত্যার মিল পাওয়া যায়?
(ক) রাঘব (খ) মেঘনাদ (গ) বিভীষণ (ঘ) কুম্ভকর্ণ
উত্তর: (খ) মেঘনাদ (নোট: কারণ মেঘনাদকেও যজ্ঞাগারে নিরস্ত্র অবস্থায় আক্রমণ করা হয়েছিল)

৯০। উদ্দীপকে বর্ণিত বাঙালি জাতির মনের কথা মেঘনাদের যে ভাষা দিয়ে প্রকাশ করা হয়–
i. উচিত কি তব এ কাজ
ii. জ্ঞাতিত্ব, ভ্রাতৃত্ব, জাতি এ সকলে দিলা জলাঞ্জলি
iii. বৃথা এ সাধনা ধীমান, রাঘবদাস আমি
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ৯১ ও ৯২ নং প্রশ্নের উত্তর দাও।
হউক সে মহাজ্ঞানী, মহা ধনবান,
অসীম ক্ষমতা তার অতুল সমান।
কিন্তু সে সাধেনি কভু জন্মভূমি হিত,
স্বজাতির সেবা যেবা করেনি কিঞ্চিৎ।
জানাও সে নরাধমে জানাও সত্বর,
অতীব ঘৃণিত সেই পামর বর্বর।

৯১। উদ্দীপকের সাথে কোন কবির কবিতার সাদৃশ্য আছে?
(ক) কাজী নজরুল
(খ) রবীন্দ্রনাথ ঠাকুর
(গ) মাইকেল মধুসূদন দত্ত
(ঘ) আহসান হাবীব
উত্তর: (গ) মাইকেল মধুসূদন দত্ত

৯২। উদ্দীপক ও উক্ত কবির ভাবের সাদৃশ্যের কারণ হলো–
i. দেশদ্রোহিতা
ii. স্বজাত্যবোধ
iii. বিশ্বাসঘাতকতা
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ৯৩ ও ৯৪ নং প্রশ্নের উত্তর দাও।
হিদাম ও দুখীরাম দুই ভাই। ঘটনাক্রমে হিদাম তার স্ত্রীকে খুন করলেও দুখীরাম তা নিজের ঘাড়ে চেপে নেয় এবং খুনের দায়ের ভার ফেলে দুখীরাম নিজ স্ত্রীর ওপর। কারণ দুখীরামের ভাবনা বউ গেলে বউ পাব, কিন্তু ভাই গেলে ভাই আর ফিরে পাওয়া সম্ভব নয়।

৯৩। উদ্দীপকের দুখীরামের ভাবনার বিপরীত চরিত্রের ধারক কে?
(ক) কুম্ভকর্ণ
(খ) রাবণ
(গ) মেঘনাদ
(ঘ) বিভীষণ
উত্তর: (ঘ) বিভীষণ

৯৪। উদ্দীপকের আলোকে ঐ চরিত্রের বিপরীত ভাব ফুটে ওঠে যে চেতনায়–
i. বিশ্বাসঘাতকতায়
ii. দেশাত্মবোধে
iii. দেশদ্রোহিতায়
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৯৫। 'নিজ কর্ম-দোষে, হায়, মজাইলা এ কনক-লঙ্কা' এই কর্ম-দোষ হলো–
(ক) মেঘনাদের
(খ) রাবণের
(গ) শূর্পণখার
(ঘ) বিভীষণের
উত্তর: (খ) রাবণের

৯৬। মধুসূদন বিষয়ে নিচের কোন উক্তিটি ঠিক নয়?
(ক) তিনি চতুর্দশপদী কবিতার প্রবর্তক
(খ) তিনি অমিত্রাক্ষর ছন্দের প্রবর্তক
(গ) তিনি পয়ার ছন্দের প্রবর্তক
(ঘ) তিনি বহু ভাষায় দক্ষ ছিলেন
উত্তর: (গ) তিনি পয়ার ছন্দের প্রবর্তক

৯৭। 'বিভীষণের প্রতি মেঘনাদ' কবিতায় রাজহংস কোথায় খেলা করে?
(ক) পঙ্কজ-কাননে
(খ) স্বচ্ছ সরোবরে
(গ) পঙ্কিল সলিলে
(ঘ) শৈবাল দলে
উত্তর: (খ) স্বচ্ছ সরোবরে

৯৮। মেঘনাদের প্রশ্নবাণে বিদ্ধ হয়ে বিভীষণ কীভাবে উত্তর দেয়?
(ক) হাস্য বদনে
(খ) মলিন বদনে
(গ) অবনত মস্তকে
(ঘ) করুণ নয়নে
উত্তর: (খ) মলিন বদনে

৯৯। কোনটি মাইকেল মধুসূদন দত্তের পত্রকাব্য?
(ক) বিলাতের পত্র
(খ) হিমালয়
(গ) ব্রজাঙ্গনা
(ঘ) বীরাঙ্গনা
উত্তর: (ঘ) বীরাঙ্গনা

১০০। 'পরদোষে কে চাহে মজিতে?'– উক্তিটি কার?
(ক) রামের
(খ) বীরবাহুর
(গ) বিভীষণের
(ঘ) মেঘনাদের
উত্তর: (গ) বিভীষণের

১০১। "'থাকিবে দেবেশ্বরে, পরাক্রমে দাসের।'"– নিজেকে 'দাস' বলার পেছনে মেঘনাদের কোন মনোভাবটি ক্রিয়াশীল?
(ক) বিনয়
(খ) বংশগৌরব
(গ) অহমিকা
(ঘ) হীনম্মন্যতা
উত্তর: (ক) বিনয়

১০২। 'মহমন্ত্র-বলে যথা নম্রশিরঃ ফণী / মলিনবদন লাজে, উত্তরিলা রথী'– এখানে রথী কে?
(ক) রাম
(খ) লক্ষ্মণ
(গ) মেঘনাদ
(ঘ) বিভীষণ
উত্তর: (ঘ) বিভীষণ

১০৩। "'নিজ কর্ম-দোষে, হায়, মজাইলা/ এ কনক-লঙ্কা রাজা'" উদ্ধৃতিতে "নিজ কর্ম-দোষ" কোন প্রসঙ্গে ব্যবহৃত?
(ক) সীতাকে অপহরণ
(খ) শূর্পণখার নাক কর্তন
(গ) রামের বিরুদ্ধে যুদ্ধ ঘোষণা
(ঘ) রামের বনবাস যাত্রা
উত্তর: (ক) সীতাকে অপহরণ

১০৪। 'নিকুম্ভিলা' যজ্ঞাগারে মেঘনাদ যে দেবতার পূজারত অবস্থায় ছিল–
(ক) অগ্নিদেবের
(খ) বরুণদেবের
(ग) ইন্দ্রদেবের
(ঘ) সোমদেবের
উত্তর: (ক) অগ্নিদেবের

উদ্দীপকের আলোকে ১০৫ ও ১০৬ নং প্রশ্নের উত্তর দাও।
জীবনযাপনের সমস্ত সুবিধা নিশ্চিত থাকার পরও কেবল অসৎসঙ্গের কারণে নেশা ও সন্ত্রাসের পথ বেছে নেয় ইকবাল।

১০৫। উদ্দীপকের ইকবাল 'বিভীষণের প্রতি মেঘনাদ' কবিতার কোন চরিত্রের সাথে তুলনীয়?
(ক) রাবণ
(খ) সৌমিত্রী
(গ) বিভীষণ
(ঘ) কুম্ভকর্ণ
উত্তর: (গ) বিভীষণ

১০৬। উদ্দীপকটি ভাবগত দিক থেকে 'বিভীষণের প্রতি মেঘনাদ' কবিতার কোন অংশকে ধারণ করে?
(ক) যায় কি সে কভু, পঙ্কিল সলিলে, শৈবালদলের ধাম?
(খ) নিজ কর্ম-দোষে, হায়, মজাইলা এ কনক-লঙ্কা রাজা, মজিলা আপনি!
(গ) প্রফুল্ল কমলে কীটবাস? কহ তাত, সহিব কেমনে?
(ঘ) নিজগৃহপথ, তাত, দেখাও তস্করে?
উত্তর: (খ) নিজ কর্ম-দোষে, হায়, মজাইলা এ কনক-লঙ্কা রাজা, মজিলা আপনি!

১০৭। মধুসূদন-পূর্ব হাজার বছরের বাংলা কবিতা কোন ছন্দে লেখা হতো?
(ক) মুক্তক
(খ) স্বরবৃত্ত
(গ) পয়ার
(ঘ) গদ্যছন্দ
উত্তর: (গ) পয়ার

১০৮। অমিত্রাক্ষর ছন্দ মূলত কোন ছন্দ?
(ক) অক্ষরবৃত্ত
(খ) মাত্রাবৃত্ত
(গ) স্বরবৃত্ত
(ঘ) মিশ্র
উত্তর: (ক) অক্ষরবৃত্ত

১০৯। কত সালে মধুসূদন দত্ত ধর্মান্তরিত হয়ে নামের পূর্বে 'মাইকেল' শব্দটি যোগ করেন?
(ক) ১৮৪৩
(খ) ১৮৪৪
(গ) ১৮৪৫
(ঘ) ১৮৪৬
উত্তর: (ক) ১৮৪৩

১১০। সূচনালগ্নে মাইকেল মধুসূদন দত্ত কোন ভাষায় সাহিত্য রচনা করেন?
(ক) বাংলা
(খ) ইংরেজি
(গ) সংস্কৃত
(ঘ) ফরাসি
উত্তর: (খ) ইংরেজি

১১১। সনেটের অপর নাম কী?
(ক) গঠিত কবিতা
(খ) চতুর্দশপদী কবিতা
(গ) চারণ কবিতা
(ঘ) বিয়োগান্ত কবিতা
উত্তর: (খ) চতুর্দশপদী কবিতা

১১২। 'জানিনু কেমনে আসি লক্ষণ পশিল, রক্ষঃপুরে!'– এখানে রক্ষঃপুরে বলতে কী বোঝানো হয়েছে?
(ক) রাক্ষসের পুরীতে
(খ) নিকুম্ভিলা যজ্ঞাগারে
(গ) রাক্ষসের নগরে
(ঘ) লঙ্কাপুরীতে
উত্তর: (খ) নিকুম্ভিলা যজ্ঞাগারে

১১৩। মেঘনাদের মতে, বিভীষণের কোন কাজটি অনুচিত হয়েছে?
(ক) মেঘনাদকে বাধা দেওয়া
(খ) যজ্ঞাগারে প্রবেশে লক্ষ্মণকে সাহায্য করা
(গ) লক্ষ্মণকে হত্যা করা
(ঘ) রাবণকে অপমান করা
উত্তর: (খ) যজ্ঞাগারে প্রবেশে লক্ষ্মণকে সাহায্য করা

১১৪। 'চণ্ডালে বসাও আনি রাজার আলয়ে'– এখানে প্রকাশিত হয়েছে–
(ক) ঘৃণা
(খ) হিংসা
(গ) প্রতিবাদ
(ঘ) অহংকার
উত্তর: (ক) ঘৃণা

১১৫। 'লঙ্কার কলঙ্ক আজি ভঞ্জিব আহবে।'– এখানে 'ভঞ্জিব আহবে' দ্বারা কী বোঝানো হয়েছে?
(ক) যুদ্ধ দ্বারা বিনষ্ট করা
(খ) কলঙ্ক লেপন করা
(গ) কালিমামুক্ত করা
(ঘ) উদ্ধার করা
উত্তর: (ক) যুদ্ধ দ্বারা বিনষ্ট করা

১১৬। বিভীষণ মেঘনাদকে কী বলে সম্বোধন করেছে?
(ক) ধীমান
(খ) মহারথী
(গ) দাস
(ঘ) ভ্রাতুষ্পুত্র
উত্তর: (ক) ধীমান

১১৭। 'রুধিলা বাসবত্রাস;– এখানে বাসবত্রাস কে?
(ক) মেঘনাদ
(খ) লক্ষ্মণ
(গ) রাবণ
(ঘ) বিভীষণ
উত্তর: (ক) মেঘনাদ

১১৮। 'নম্রশিরঃ ফণী' অর্থে মন্ত্রপূত কে মাথা নত করে?
(ক) কুকুর
(খ) মানুষ
(গ) সাপ
(ঘ) বিড়াল
উত্তর: (গ) সাপ

১১৯। রাম-রাবণের যুদ্ধে স্বপক্ষ ত্যাগকারী–
(ক) মহারথী
(খ) কুম্ভকর্ণ
(গ) বিভীষণ
(ঘ) অরিদম
উত্তর: (গ) বিভীষণ

১২০। "'স্বচ্ছ সরোবরে করে কেলি রাজহংস'"– কে?
(ক) লক্ষ্মণ
(খ) রাম
(গ) রাবণ
(ঘ) বিভীষণ
উত্তর: (ঘ) বিভীষণ

১২১। 'অবিদিত নহে কিছু তোমার চরণে'– উক্তিটি কার?
(ক) বিভীষণের
(খ) রাবণের
(গ) মেঘনাদের
(ঘ) বীরবাহুর
উত্তর: (গ) মেঘনাদের

১২২। 'কী দেখি ডরিবে এ দাস হেন দুর্বল মানবে'– এ বাক্যে মেঘনাদ চরিত্রের কোন বৈশিষ্ট্যটি ফুটে উঠেছে?
(ক) আত্ম-অনুশোচনা
(খ) জাত্যাভিমানের অহংকার
(গ) অমিত তেজ
(ঘ) প্রতিশোধ স্পৃহা
উত্তর: (গ) অমিত তেজ

১২৩। লঙ্কাপুরী কালসলিলে ডুবলে বিভীষণ কোথায় আশ্রয় নেয়?
(ক) রাঘবের পদাশ্রয়ে
(খ) মেঘনাদের যজ্ঞাগারে
(গ) নিকষা জননীর কাছে
(ঘ) বনে
উত্তর: (ক) রাঘবের পদাশ্রয়ে

১২৪। মেঘনাদের দৃষ্টিতে নন্দন-কাননে কে ভ্রমণ করেছে?
(ক) কীট
(খ) কিন্নর
(গ) দৈত্য
(ঘ) মানব
উত্তর: (গ) দৈত্য

১২৫। প্রফুল্ল কমলে কীটবাস– কীট হিসেবে কাকে অভিহিত করা হয়েছে?
(ক) লক্ষ্মণকে
(খ) মেঘনাদকে
(গ) বিভীষণকে
(ঘ) রাবণকে
উত্তর: (ক) লক্ষ্মণকে

১২৬। আত্মপক্ষ সমর্থনের ক্ষেত্রে বিভীষণ কোন বিষয়টিকে সামনে এনেছে?
(ক) ইতিহাস চেতনা
(খ) স্বজাত্যবোধ
(গ) প্রতিবাদী চেতনা
(ঘ) নৈতিকতাবোধ
উত্তর: (ঘ) নৈতিকতাবোধ

১২৭। মেঘনাদের ক্ষোভের পেছনে প্রকৃত অর্থে কোন কারণটি বিবেচ্য?
(ক) শত্রুদের জন্য আতঙ্ক
(খ) অরিদের সাথে লাগাত বলে
(গ) শত্রুকে দমন করে বলে
(ঘ) তার কোনো অরি ছিল না বলে
উত্তর: (গ) শত্রুকে দমন করে বলে

উদ্দীপকের আলোকে ১৫৪ ও ১৫৫ নং প্রশ্নের উত্তর দাও।

উদ্দীপকের আলোকে ১৬২ ও ১৬৩ নং প্রশ্নের উত্তর দাও।
'সোহরাব রোস্তম' কাহিনীতে দেখা যায়, সোহরাব রোস্তমকে পরাজিত করেও তৎকালীন রীতি অনুযায়ী প্রথম সুযোগেই হত্যা করেনি। কিন্তু রোস্তম তা না করে প্রথম সুযোগেই সোহরাবের বুকে ঢুকিয়ে দেয় তীক্ষ্ণধার তলোয়ার।

১৬০। উদ্দীপকের রোস্তম 'বিভীষণের প্রতি মেঘনাদ' কবিতার কোন চরিত্রের প্রতিনিধি?
(ক) মেঘনাদ
(খ) রাবণ
(গ) বিভীষণ
(ঘ) লক্ষ্মণ
উত্তর: (ঘ) লক্ষ্মণ

১৬১। এরূপ প্রতিনিধিত্বের কারণ–
i. কূটকৌশল গ্রহণ
ii. যুদ্ধের নীতি ভঙ্গ
iii. বীরত্বের অপমান
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let reviewList = [];
        let reviewMode = false;
        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadReviewList() {
            const saved = localStorage.getItem(STORAGE_KEY + "_review");
            if (saved) reviewList = JSON.parse(saved);
        }

        function saveReviewList() {
            localStorage.setItem(STORAGE_KEY + "_review", JSON.stringify(reviewList));
        }

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
            <button onclick="toggleReviewMode()" id="review-btn" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                📌 Need to Review (${reviewList.length})
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            let filteredData = data.map((q, i) => ({ ...q, originalIndex: i }));

            if (reviewMode) {
                filteredData = filteredData.filter(item => reviewList.includes(item.originalIndex));
            } else if (wrongQuestionsOnly) {
                filteredData = filteredData.filter((item, i) =>
                    userAnswers[i] && userAnswers[i] !== data[i].answer
                );
            }

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" 
                            ${reviewList.includes(originalIdx) ? 'checked' : ''} 
                            onchange="toggleReview(${originalIdx}, this.checked)"
                            class="w-5 h-5 accent-purple-500">
                        <span class="text-purple-400 text-sm font-medium">Review</span>
                    </label>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        function toggleReview(qIndex, isChecked) {
            if (isChecked) {
                if (!reviewList.includes(qIndex)) reviewList.push(qIndex);
            } else {
                reviewList = reviewList.filter(idx => idx !== qIndex);
            }
            saveReviewList();
            updateReviewButton();
        }

        function updateReviewButton() {
            const btn = document.getElementById('review-btn');
            if (btn) btn.textContent = `📌 Need to Review (${reviewList.length})`;
        }

        function toggleReviewMode() {
            reviewMode = !reviewMode;
            const btn = document.getElementById('review-btn');

            if (reviewMode) {
                btn.style.backgroundColor = '#6b21a8';
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
            } else {
                btn.style.backgroundColor = '';
                btn.innerHTML = `📌 Need to Review (${reviewList.length})`;
            }

            const container = document.getElementById('quiz-container');
            container.style.opacity = '0.5';
            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
            loadReviewList();
            updateReviewButton();
        };
    </script>
