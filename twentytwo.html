<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">রবীন্দ্রনাথের 'অপরিচিতা' গল্প</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। কৃষ্ণচূড়া আমাদের চেতনার রঙ, কারণ এতে রয়েছে-
(ক) অত্যাচারের পটভূমি (খ) অতীত ঐতিহ্য
(গ) রঙের সমতা (ঘ) ইতিহাসের উদ্দীপনা
উত্তর: (ঘ) ইতিহাসের উদ্দীপনা

২। কবির দৃষ্টিতে আমাদের চেতনার রঙ কী?
(ক) রক্তাক্ত রাজপথ (খ) শহীদের রক্তের বুদবুদ
(গ) একুশের কৃষ্ণচূড়া (ঘ) রক্তাক্ত মিছিল
উত্তর: (গ) একুশের কৃষ্ণচূড়া

৩। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কার চোখে আলোচিত ঢাকা?
(ক) সালাম (খ) রফিক
(গ) বরকত (ঘ) জব্বার
উত্তর: (ক) সালাম

৪। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় ভাষা শহীদ সালামের নাম কতবার উল্লেখ করা হয়েছে?
(ক) তিন (খ) চার
(গ) পাঁচ (ঘ) ছয়
উত্তর: (খ) চার

৫। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় সালামের হাতে কীসের মতো বর্ণমালা ঝরে?
(ক) বৃষ্টি (খ) ফুল
(গ) আলো (ঘ) নক্ষত্র
উত্তর: (ঘ) নক্ষত্র

৬। ‘মানবিক বাগান’ বলতে কী বোঝানো হয়েছে?
(ক) পল্লববন (খ) বাস্তবের বিশালতা
(গ) মানবীয় জগৎ (ঘ) হরিৎ উপত্যকা
উত্তর: (গ) মানবীয় জগৎ

৭। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় ‘একুশের কৃষ্ণচূড়া আমাদের চেতনারই রঙ’ পঙক্তিতে উল্লিখিত চেতনার প্রকৃতি-
(ক) প্রতিবাদী (খ) সংগ্রামী
(গ) বিদ্রোহী (ঘ) জাগ্রত
উত্তর: (খ) সংগ্রামী

৮। ‘আবার ফুটেছে দ্যাখো কৃষ্ণচূড়া থরে থরে শহরের পথে’- চরণটি আমাদের জাতীয় জীবনের কোন দিকটি তুলে ধরে?
(ক) গণ আন্দোলন (খ) ভাষা আন্দোলন
(গ) স্বাধীনতা আন্দোলন (ঘ) স্বদেশি আন্দোলন
উত্তর: (ক) গণ আন্দোলন

৯। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় ‘আবার সালাম নামে রাজপথে’ কেন?
(ক) ভাষা সংগ্রামে যোগ দিতে
(খ) গণজাগরণে যোগ দিতে
(গ) জাতিগত দাঙ্গা প্রতিরোধ করতে
(ঘ) ঘাতকের আস্তানা প্রতিরোধ করতে
উত্তর: (খ) গণজাগরণে যোগ দিতে

১০। শহরের পথে থরে থরে কোন ফুল ফুটেছে?
(ক) শিমুল (খ) পলাশ
(গ) কৃষ্ণচূড়া (ঘ) রক্তজবা
উত্তর: (গ) কৃষ্ণচূড়া

১১। “সে ফুল আমাদের প্রাণ”,- বলতে কী বোঝানো হয়েছে?
(ক) কৃষ্ণচূড়া (খ) চেতনার রঙ
(গ) একুশে ফেব্রুয়ারি (ঘ) বাংলা ভাষা
উত্তর: (ঘ) বাংলা ভাষা

১২। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কে শূন্যে ফ্ল্যাগ তোলে?
(ক) বরকত (খ) রফিক
(গ) জব্বার (ঘ) সালাম
উত্তর: (ঘ) সালাম

১৩। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কার মুখকে ‘তরুণ শ্যামল পূর্ব বাংলার’ সঙ্গে তুলনা করা হয়েছে?
(ক) সালাম (খ) রফিক
(গ) বরকত (ঘ) আসাদ
উত্তর: (ক) সালাম

১৪। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কার চোখে আজ আলোচিত ঢাকা?
(ক) রফিকের (খ) জব্বারের
(গ) বরকতের (ঘ) সালামের
উত্তর: (ঘ) সালামের

১৫। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কৃষ্ণচূড়া ফুলকে কবির কাছে কেমন মনে হয়?
(ক) রক্তে রঞ্জিত বর্ণমালা (খ) রক্তে রঞ্জিত জামা
(গ) পতাকার লাল রঙ (ঘ) শহীদের ঝলকিত রক্তের বুদবুদ
উত্তর: (ঘ) শহীদের ঝলকিত রক্তের বুদবুদ

১৬। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় একুশের কৃষ্ণচূড়ার রঙকে কবি কীসের রঙ হিসেবে উল্লেখ করেছেন?
(ক) মাটি ও মানুষের (খ) বাঙালির চেতনা
(গ) বাঙালির ঐতিহ্য (ঘ) জাতীয় পতাকা
উত্তর: (খ) বাঙালির চেতনা

১৭। ভাষা শহীদের ‘রক্তের বুদবুদ’ কোনটি?
(ক) পলাশফুল (খ) কমলবন
(গ) বর্ণমালা (ঘ) কৃষ্ণচূড়া
উত্তর: (ঘ) কৃষ্ণচূড়া

১৮। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় ঘাতকের থাবার সম্মুখে কে বুক পাতে?
(ক) সালাম (খ) বিপ্লবী
(গ) জনগণ (ঘ) বরকত
উত্তর: (ঘ) বরকত

১৯। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় সালামের হাত থেকে কী ঝরে?
(ক) বর্ণমালা (খ) স্মৃতিগন্ধ
(গ) রক্তের বুদবুদ (ঘ) মাতার অশ্রুজল
উত্তর: (ক) বর্ণমালা

২০। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় “চতুর্দিকে মানবিক বাগান, কমলবন হচ্ছে—”
(ক) তছনছ (খ) ধ্বংস
(গ) লুণ্ঠিত (ঘ) বিপর্যস্ত
উত্তর: (ক) তছনছ

২১। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতাটি কোন কাব্যগ্রন্থ থেকে চয়ন করা হয়েছে?
(ক) নিজ বাসভূমে (খ) বন্দি শিবির থেকে
(গ) বিধ্বস্ত নীলিমা (ঘ) বুক তার বাংলাদেশের হৃদয়
উত্তর: (ক) নিজ বাসভূমে

২২। উনসত্তরের গণঅভ্যুত্থানে কাজ করছে - চেতনা।
(ক) লাহোর প্রস্তাবের (খ) স্বাধীনতার
(গ) স্বৈরাচার বিরোধী (ঘ) একুশের
উত্তর: (ঘ) একুশের

২৩। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় প্রকাশ পেয়েছে—
i. দেশপ্রেম
ii. গণজাগরণ
iii. সংগ্রামী চেতনা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২৪। ‘বাস্তবের বিশাল চত্বরে হৃদয়ের হরিৎ উপত্যকায়’- কী হয়?
(ক) ‘বরকত বুক পাতে ঘাতকের থাবার সম্মুখে’
(খ) ‘..... দুঃখিনী মাতার অশ্রুজলে ফোটে ফুল’
(গ) ‘শিহরিত ক্ষণে ক্ষণে আনন্দের রৌদ্রে আর দুঃখের ছায়ায়’
(ঘ) ‘কেউ বা ভীষণ জেদি, দারুণ বিপ্লবে ফেটে পড়া’
উত্তর: (ক) ‘বরকত বুক পাতে ঘাতকের থাবার সম্মুখে’

২৫। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কতজন ভাষাশহীদের নাম উল্লেখ আছে?
(ক) ১ জন (খ) ২ জন
(গ) ৩ জন (ঘ) ৪ জন
উত্তর: (খ) ২ জন

২৬। কোনটি শামসুর রাহমানের কাব্য?
(ক) বিমুখ প্রান্তর (খ) কালোর কলস
(গ) রৌদ্র করোটিতে (ঘ) পূর্বাভাস
উত্তর: (গ) রৌদ্র করোটিতে

২৭। বন্দি শিবির থেকে’ কোন অর্থ জ্ঞাপক?
(ক) অবরুদ্ধ সময়ের জীবন (খ) জেলবন্দী
(গ) গৃহবন্দী (ঘ) পলাতক ঘাঁটি
উত্তর: (ক) অবরুদ্ধ সময়ের জীবন

২৮। শামসুর রাহমানের প্রথম কাব্যগ্রন্থ কোনটি?
(ক) প্রথম গান দ্বিতীয় মৃত্যুর আগে (খ) রৌদ্র করোটিতে
(গ) নিজ বাসভূমে (ঘ) এক ধরনের
উত্তর: (ক) প্রথম গান দ্বিতীয় মৃত্যুর আগে

উদ্দীপকের আলোকে ২৯ ও ৩০ নং প্রশ্নের উত্তর দাও।
১৯৭১ সালে মাতৃভূমির মুক্তির জন্য অকাতরে জীবন বিসর্জন দেন মতিউর রহমান, মোস্তফা কামাল, মহিউদ্দীন জাহাঙ্গীরসহ লক্ষ লক্ষ মানুষ। তাঁদের আত্মত্যাগের মধ্য দিয়ে জন্ম নেয় স্বাধীন বাংলাদেশ।

২৯। উদ্দীপকের ত্যাগী মানুষদের প্রতিচ্ছবি “ফেব্রুয়ারি ১৯৬৯” কবিতায় যাদের নির্দেশ করে তারা হলেন—
i. সালাম
ii. বরকত
iii. দুঃখিনী মাতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩০। ওই ব্যক্তিদের আত্মত্যাগের মূলমন্ত্র কী ছিল?
(ক) আদর্শ (খ) দেশপ্রেম
(গ) বিদ্রোহ (ঘ) স্বাধিকার
উত্তর: (খ) দেশপ্রেম

৩১। ‘ফেব্রুয়ারি ১৯৬৯’-এর কবির নামের সঠিক বানান কোনটি?
(ক) শামছুর রহমান (খ) শামসুর রহমান
(গ) শামছুর রহামান (ঘ) শামসুর রহামান
উত্তর: (খ) শামসুর রহমান

৪৪। ‘কমলবন হচ্ছে তছনছ’ দিয়ে কবি বোঝাতে চেয়েছেন—
(ক) মানবিকতা, সুন্দর ও কল্যাণের জগৎ ধ্বংস করা হচ্ছে
(খ) পূর্ব পাকিস্তানের মানুষের উপর অত্যাচার চলছে
(গ) নিরীহ মানুষকে তাদের অধিকার থেকে বঞ্চিত করা হয়েছে
(ঘ) মানুষের মাঝে ভেদাভেদ সৃষ্টি তৎপরতা চলছে
উত্তর: (ক) মানবিকতা, সুন্দর ও কল্যাণের জগৎ ধ্বংস করা হচ্ছে

৪৫। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় হৃদয়ের হরিৎ উপত্যকা বলতে কী বোঝানো হয়েছে?
(ক) রাজপথকে (খ) বাংলাদেশকে
(গ) বধ্যভূমিকে (ঘ) হৃদয়ের শ্যামল উপত্যকাকে
উত্তর: (খ) বাংলাদেশকে

৪৬। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কবি ‘কমলবন’ শব্দটি কোন অর্থে ব্যবহার করেছেন?
(ক) পদ্মবন (খ) কল্যাণ
(গ) জীবন (ঘ) মহিমা
উত্তর: (খ) কল্যাণ

৪৭। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় যে শিল্পভাষ্য ফুটে উঠেছে—
(ক) প্রতিবাদী চেতনা (খ) সংগ্রামী চেতনা
(গ) আত্মাহুতি (ঘ) শাসক গোষ্ঠীর শোষণ
উত্তর: (খ) সংগ্রামী চেতনা

৪৮। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কবি কোন বিষয়টিকে অধিক গুরুত্ব দিয়েছেন?
(ক) ভাষা আন্দোলনের সংগ্রামী চেতনা
(খ) ঘাতকের শৃঙ্খল
(গ) গতিহীন জীবন
(ঘ) কৃষ্ণচূড়া ফুলের সৌন্দর্য
উত্তর: (ক) ভাষা আন্দোলনের সংগ্রামী চেতনা

৪৯। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতাটি কোন কারণে সার্থক?
(ক) ভাষার জন্যে (খ) রসের জন্যে
(গ) বর্ণমালার জন্যে (ঘ) চেতনার জন্যে
উত্তর: (ঘ) চেতনার জন্যে

৫০। কোন কবির রাষ্ট্রভাষা আন্দোলন থেকে শুরু করে পরবর্তী সকল গণতান্ত্রিক আন্দোলনে সমর্থন ছিল?
(ক) শামসুর রাহমান (খ) আবু জাফর ওবায়দুল্লাহ
(গ) আহসান হাবিব (ঘ) ফররুখ আহমদ
উত্তর: (ক) শামসুর রাহমান

৫১। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় ‘আবার সালাম নামে রাজপথে’- কবি একথা বলে কী বুঝিয়েছেন?
(ক) অধিকার সচেতন জনতার উত্থান (খ) শহীদ সালামের আত্মার প্রভাব
(গ) সালামের উত্তরসূরীরা জেগে উঠেছে (ঘ) জীবনবাজ লড়াকুরা মাঠে নেমেছে
উত্তর: (ক) অধিকার সচেতন জনতার উত্থান

৫২। একুশের কৃষ্ণচূড়ার বিপরীত রঙ সম্পর্কে বলা যায়-
i. এ রঙ ভালো লাগে না
ii. এ রঙ সন্ত্রাস আনে
iii. এ রঙ আমাদের সমীহ জাগায়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ৫৩ ও ৫৪ নং প্রশ্নের উত্তর দাও।
“আন্তর্জাতিক মাতৃভাষা দিবসে কলেজের ‘যেমন খুশি তেমন সাজ’ অনুষ্ঠানে সজীব সেজেছে ভাস্কর্যরূপে তার সমস্ত শরীরে জড়ানো বাংলা বর্ণমালা।”

৫৩। উদ্দীপকের ভাস্কর্যটি ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় বর্ণিত কোন ব্যক্তিকে নির্দেশ করে?
(ক) রফিক (খ) সালাম
(গ) বরকত (ঘ) শফিক
উত্তর: (খ) সালাম

৫৪। কবিতায় বর্ণিত ঐ ব্যক্তি সম্পর্কে বলা যায়-
i. তিনি ভাষা শহীদ
ii. তার চোখে আলোচিত ঢাকা
iii. তিনি রাজপথে নেমে এসেছেন
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ৫৫ ও ৫৬ নং প্রশ্নের উত্তর দাও।
“ওরা কারা বুনোদল ঢোকে
...........
অস্ত্র হাতে নামে সান্ত্রী কাপুরুষ
কোটি মানুষের সমবায়ী সভ্যতার ভাষা ওরা রদ করবে ভাবে?”

৫৫। উদ্দীপকের ‘বুনোদল’, ফেব্রুয়ারি ১৯৬৯’ কবিতায় কাদের প্রতিনিধি?
(ক) পাকিস্তানি শাসক (খ) পাকিস্তানি হানাদার
(গ) পাক সরকার (ঘ) পশ্চিমা শোষক
উত্তর: (ক) পাকিস্তানি শাসক

৫৬। উদ্দীপকের ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় যে ভাবের প্রতিফলন ঘটেছে-
i. পাকিস্তানিদের অপশাসন
ii. হানাদারদের বর্বরতা
iii. ভাষার কণ্ঠরোধে বাঙালি-দমন
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ৫৭ নং প্রশ্নের উত্তর দাও।
শিকলে যাদের উঠেছে বাজিয়ে বীরের মুক্তি তরবারি আমরা তাদেরি ত্রিশ কোটি ভাই গাহি বন্দনা গীতি তারি।

৫৭। উদ্দীপকের ‘ত্রিশ কোটি ভাই’-এর সাথে ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কোন বিষয়টি মিল আছে?
(ক) কমলবন (খ) ঘাতকের অশুভ আস্তানা
(গ) ফুটন্ত কৃষ্ণচূড়া (ঘ) অবিনাশী বর্ণমালা
উত্তর: (গ) ফুটন্ত কৃষ্ণচূড়া

৫৮। নিচের কোনটি শামসুর রাহমানের কবিতা?
(ক) ফিরিয়ে নাও ঘাতক কাঁটা (খ) কেয়ার কাঁটা
(গ) আমার পূর্ব বাংলা (ঘ) অপরাহ্নের আলো
উত্তর: (ক) ফিরিয়ে নাও ঘাতক কাঁটা

৫৯। কত সালে কোন পত্রিকায় শামসুর রাহমানের প্রথম কবিতা প্রকাশিত হয়?
(ক) ১৯৪৯ সালে, ‘সাপ্তাহিক সোনার বাংলা
(খ) ১৯৪৮ সালে, ‘মাসিক মোহাম্মাদী’
(গ) ১৯৫০ সালে, ‘দৈনিক বাংলা’
(ঘ) ১৯৪৭ সালে, ‘মাসিক মাহে নাও’
উত্তর: (ক) ১৯৪৯ সালে, ‘সাপ্তাহিক সোনার বাংলা

৬০। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতার প্রকরণ বিষয়ে নিচের কোনটি যথার্থ?
(ক) অমিল মাত্রাবৃত্ত ও রূপকাত্মক ভাষা
(খ) সমিল প্রবহমান গদ্যছন্দ ও চিত্রাত্মক ভাষা
(গ) অমিত্রাক্ষর ছন্দ ও লোকজ শব্দ
(ঘ) গদ্যছন্দ ও প্রবহমান ভাষা
উত্তর: (ঘ) গদ্যছন্দ ও প্রবহমান ভাষা

৬১। “বাস্তবের বিশাল চত্বরে/হৃদয়ের হরিৎ উপত্যকায়”-কী হয়?
(ক) বরকত বুক পাতে ঘাতকের
(খ) দুঃখিনী মাতার অশ্রুজলে ফোটে ফুল
(গ) শিহরিত ক্ষণে ক্ষণে আনন্দের রৌদ্রে আর দুঃখের ছায়ায়
(ঘ) কেউ বা ভীষণ জেদি, দারুণ বিপ্লবে ফেটে পড়া
উত্তর: (খ) দুঃখিনী মাতার অশ্রুজলে ফোটে ফুল

৬২। “আবার ফুটেছে দ্যাখো কৃষ্ণচূড়া থরে থরে শহরের পথে”- চরণটি আমাদের কোন গৌরবান্বিত অধ্যায়কে ধারণ করে?
(ক) ভাষা আন্দোলন (খ) গণ আন্দোলন
(গ) অসহযোগ আন্দোলন (ঘ) স্বাধীনতা আন্দোলন
উত্তর: (খ) গণ আন্দোলন

৬৩। ‘ফ্ল্যাগ’ শব্দটি কোন ভাষার শব্দ?
(ক) ইংরেজি (খ) উর্দু
(গ) ফারসি (ঘ) বাংলা
উত্তর: (ক) ইংরেজি

৬৪। শামসুর রাহমান কোথায় জন্মগ্রহণ করেন?
(ক) চট্টগ্রাম (খ) ঢাকায়
(গ) বগুড়ায় (ঘ) নরসিংদীতে
উত্তর: (খ) ঢাকায়

৬৫। ১৯৬৯ এর আন্দোলন গণঅভ্যুত্থানে রূপ নেওয়ার কারণ কী?
(ক) সামাজিক অসন্তোষ (খ) রাষ্ট্রীয় অসন্তোষ
(গ) ছাত্র অসন্তোষ (ঘ) জাতিগত অসন্তোষ
উত্তর: (গ) ছাত্র অসন্তোষ

৬৬। কোন আন্দোলনের সাথে শামসুর রাহমানের সম্পৃক্ততা ছিল না?
(ক) ব্রিটিশ বিরোধী আন্দোলন (খ) ভাষা আন্দোলন
(গ) স্বাধীনতা যুদ্ধ (ঘ) গণতান্ত্রিক আন্দোলন
উত্তর: (ক) ব্রিটিশ বিরোধী আন্দোলন

৬৭। ‘এখন সে রঙে ছেয়ে গেছে পথ ঘাট, সারাদেশ’- এখানে কোন রঙের কথা বলা হয়েছে?
(ক) কৃষ্ণচূড়ার রং (খ) সন্ত্রাসের রং
(গ) ভালোবাসার রং (ঘ) বিপ্লবের রং
উত্তর: (খ) সন্ত্রাসের রং

৬৮। মুক্তিযুদ্ধকালে কবি কোন ছদ্মনামে কবিতা লিখতেন?
(ক) নীল লোহিত (খ) ভানুসিংহ
(গ) বীরবল (ঘ) মজলুম আদিব
উত্তর: (ঘ) মজলুম আদিব

৬৯। শামসুর রাহমান সম্পর্কে নিচের কোন উক্তিটি যথার্থ?
(ক) রোমান্টিক কবি (খ) পল্লীকবি
(গ) নাগরিক কবি (ঘ) বিপ্লবী কবি
উত্তর: (গ) নাগরিক কবি

৭০। রাত্রি-দিন বহুলোক কোথায় ভুলুণ্ঠিত হচ্ছে?
(ক) নিজ দেশে (খ) নিজ ঘরে
(গ) ঘাতকের আস্তানায় (ঘ) রাজপথে
উত্তর: (গ) ঘাতকের আস্তানায়

৭১। ১৯৮৭ সালে স্বৈরাচারী এরশাদবিরোধী গণআন্দোলনে একাত্মতা প্রকাশ করে কবি কোন পত্রিকা থেকে পদত্যাগ করেন?
(ক) দৈনিক ইত্তেফাক (খ) দৈনিক বাংলা
(গ) দৈনিক ইনকিলাব (ঘ) দৈনিক আজাদ
উত্তর: (খ) দৈনিক বাংলা

৭২। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কৃষ্ণচূড়া শহরের পথে ফুটে আছে—
(ক) থরে বিথরে (খ) সারি সারি হয়ে
(গ) বৈচিত্র্যপূর্ণভাবে (ঘ) নিবিড় হয়ে
উত্তর: (ঘ) নিবিড় হয়ে

৭৩। শামসুর রাহমান একুশে পদক পান কত সালে?
(ক) ১৯৬৬ সালে (খ) ১৯৭৭ সালে
(গ) ১৯৯১ সালে (ঘ) ১৯৯২ সালে
উত্তর: (খ) ১৯৭৭ সালে

৭৪। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতায় কবির স্মৃতিগন্ধে ভরপুর হয়ে আছে—

৮০। ১৯৬৯ সালের গণঅভ্যুত্থান কোন সরকারের বিরুদ্ধে শক্তি ছিল?

৮২। ‘ঘাতকের অশুভ আস্তানা’ বলতে কী বোঝানো হয়েছে?

৮৩। একুশের কৃষ্ণচূড়া মূলত—

৮৪। ‘সর্বদলীয় ছাত্র সংগ্রাম পরিষদ’ গণঅভ্যুত্থানে কত দফা কর্মসূচি ঘোষণা করে?
(ক) ১১ দফা (খ) ১৬ দফা
(গ) ২১ দফা (ঘ) ৬ দফা

৮৫। ‘ফেব্রুয়ারি ১৯৬৯’ কবিতার আড়ালে প্রকাশ পায়—
i. ভাষাশহীদদের মহান আত্মত্যাগ
ii. আন্দোলনে সাধারণ মানুষের অবদান
iii. অত্যাচারী শাসকের বিরুদ্ধে বাঙালির প্রতিবাদ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ৮৬ ও ৮৭ নং প্রশ্নের উত্তর দাও।
মিছিলের ভিড়ে যুবকটিকে মনে হলো কতদিনের চেনা তেজদীপ্ত কণ্ঠে আকাশ-বাতাস মুখরিত প্রাণ মুষ্টিবদ্ধ লোমশ হাতে তুলেছে নিশান।

৮৬। উদ্দীপকের যুবকটির সাথে মিল আছে—
(ক) রফিক (খ) বরকত
(গ) জব্বার (ঘ) সালাম
উত্তর: (ঘ) সালাম
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
