<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">রবীন্দ্রনাথের 'অপরিচিতা' গল্প</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। আঠারো বছর বয়সীদের তাজা প্রাণে কেমন যন্ত্রণা সৃষ্টি হয়?
(ক) সামান্য (খ) বীভৎস (গ) অসহ্য (ঘ) তীব্র
উত্তর: (গ) অসহ্য

২। বিপদের মুখে ‘আঠারো বছর বয়স’ কেমন?
(ক) প্রখর (খ) অগ্রণী (গ) দুর্বার (ঘ) দুঃসাহসী
উত্তর: (খ) অগ্রণী

৩। আঠারো বছর বয়স বেদনায় থরোথরো কাঁপে কেন?
(ক) শপথের কোলাহলে (খ) অজস্র ব্যর্থতার দীর্ঘশ্বাসে (গ) জয়ের আনন্দে (ঘ) অভিমানে
উত্তর: (খ) অজস্র ব্যর্থতার দীর্ঘশ্বাসে

৪। “আঠারো বছর বয়স” কবিতায় “পর্যায় নেয় মাথা তোলবার ঝুঁকি।”—চরণটিতে প্রকাশ পেয়েছে তারুণ্যের—
(ক) আত্মনির্ভরতা (খ) দৃঢ়তা (গ) স্বাভাবিকতা (ঘ) আত্মম্ভরিতা
উত্তর: (ক) আত্মনির্ভরতা

৫। “এখন যৌবন যার, যুদ্ধে যাবার তার শ্রেষ্ঠ সময়”—উপযুক্ত উদ্দীপকের সাথে নিচের কোন চরণের ভাব সাদৃশ্যপূর্ণ?
(ক) এ বয়সে কেউ মাথা নোয়াবার নয় (খ) এ বয়স জানে রক্তদানের পুণ্য (গ) এ বয়স তবু নতুন কিছু তো করে (ঘ) এ দেশের বুকে আঠারো আসুক নেমে
উত্তর: (খ) এ বয়স জানে রক্তদানের পুণ্য

৬। আঠারো বছর বয়স কী জানে না?
(ক) কাঁদা (খ) ভয় (গ) মাথা নোয়ানো (ঘ) রক্তদানের পুণ্য
উত্তর: (ক) কাঁদা

৭। ‘রক্তদানের পুণ্য’ বলতে কবি কী বোঝাতে চেয়েছেন?
(ক) তারুণ্যের আসক্তি (খ) বিপদ মোকাবিলায় ঝুঁকি (গ) মুক্তি ও কল্যাণের সংগ্রাম (ঘ) স্বাধীনভাবে চলার ঝুঁকি
উত্তর: (গ) মুক্তি ও কল্যাণের সংগ্রাম

৮। ‘এ বয়স কালো লক্ষ্য দীর্ঘশ্বাসে’ – এ পঙতি দ্বারা কী বোঝানো হয়েছে?
(ক) জীবনের ঝুঁকি (খ) প্রাণ বিসর্জন (গ) ব্যর্থতার দীর্ঘশ্বাস (ঘ) ভীতির বার্তা
উত্তর: (গ) ব্যর্থতার দীর্ঘশ্বাস

৯। “এদেশের বুকে আঠারো আসুক নেমে।” পঙতিটিতে কবির কোন মনোভাবের প্রকাশ ঘটেছে?
(ক) তারুণ্য শক্তির জাগরণের প্রত্যাশা (খ) তারুণ্য শক্তির অপচয়ে হতাশা (গ) আঠারো বছর বয়সের বৈশিষ্ট্য (ঘ) দুর্বার গতিতে এগিয়ে চলা
উত্তর: (ক) তারুণ্য শক্তির জাগরণের প্রত্যাশা

১০। সুকান্ত ভট্টাচার্য আমৃত্যু কোন পত্রিকার সম্পাদক ছিলেন?
(ক) দৈনিক বাংলা (খ) দৈনিক স্বাধীনতা (গ) পূর্বাশা (ঘ) সবুজপত্র
উত্তর: (খ) দৈনিক স্বাধীনতা

১১। সুকান্ত ভট্টাচার্য ফ্যাসিবিরোধী লেখক শিল্পী সংঘের পক্ষে কী কাব্যগ্রন্থ সম্পাদনা করেন?
(ক) মিঠে কড়া (খ) হরতাল (গ) অভিযান (ঘ) আকাল
উত্তর: (ঘ) আকাল

১২। ‘আঠারো বছর বয়স কবিতায় ‘সঁপে আত্মাকে শপথের কোলাহলে’—বলতে কী বোঝায়?
(ক) রক্তদানের পুণ্য (খ) আত্মত্যাগের মহিমা (গ) কথা ও কাজের ঐক্য (ঘ) যৌবনের দুঃসাহসিকতা
উত্তর: (খ) আত্মত্যাগের মহিমা

১৩। ‘এখন যৌবন যার মিছিলে যাবার তার শ্রেষ্ঠ সময়’—নিচের কোন চরণের সাথে উদ্দীপকের ভাবগত মিল রয়েছে?
(ক) পদাঘাতে চায় ভাঙতে পাথর বাধা (খ) শিহরিত ক্ষণে ক্ষণে আনন্দ আর রৌদ্রের ছায়া (গ) কাছ থেকে দূরে যারা তাহাদের বাণী যেনো শুনি (ঘ) অভাগা মানুষ যেনো আবার জেগে ওঠে এই আশায়
উত্তর: (ক) পদাঘাতে চায় ভাঙতে পাথর বাধা

১৪। ‘এ বয়স জানে রক্তদানের পুণ্য’ বলতে বোঝানো হয়েছে—
(ক) অধিকার আদায়ে রক্তদান (খ) স্বাধীনতার জন্য রক্তদান (গ) দেশের জন্য রক্তদান (ঘ) শুভ, কল্যাণ ও সুন্দরের জন্য রক্তদান
উত্তর: (ঘ) শুভ, কল্যাণ ও সুন্দরের জন্য রক্তদান

১৫। আঠারো বছর বয়সের নেতিবাচক দিক হচ্ছে, এ বয়স—
(ক) অনুগত (খ) পথভুলের শঙ্কাপূর্ণ (গ) ত্যাগের (ঘ) কোলাহলপূর্ণ
উত্তর: (খ) পথভুলের শঙ্কাপূর্ণ

১৬। ‘আঠারো বছর বয়স’ কবিতায় এ বয়সে প্রাণ তীব্র আর প্রখর বলতে বোঝানো হয়েছে—
(ক) বিদ্রোহ ও জটিলতা (খ) তীব্রতা ও সংবেদনশীলতা (গ) প্রগতি ও সংগ্রামশীলতা (ঘ) দুঃসাহস ও ক্ষিপ্রমতা
উত্তর: (খ) তীব্রতা ও সংবেদনশীলতা

১৭। ‘আঠারো বছর বয়স’ কোন ছন্দে রচিত?
(ক) অক্ষরবৃত্ত (খ) স্বরবৃত্ত (গ) গদ্যছন্দ (ঘ) মাত্রাবৃত্ত
উত্তর: (ঘ) মাত্রাবৃত্ত

১৮। সুকান্ত ভট্টাচার্য তাঁর কাব্যে একাত্মতা ঘোষণা করেছেন—
(ক) সশস্ত্র সংগ্রামের পক্ষে (খ) ধর্মের পক্ষে (গ) বিপ্লব ও মুক্তির পক্ষে (ঘ) উদারনীতির পক্ষে
উত্তর: (গ) বিপ্লব ও মুক্তির পক্ষে

১৯। নবীন জগৎ সন্ধানে যারা ছুটে মেরু-অভিযানে,
পক্ষ বাঁধিয়া উড়িয়া চলেছে যাহার ঊর্ধ্বপানে।
উদ্দীপকটিতে ‘আঠারো বছর বয়স’ কবিতায় তারুণ্যের যে দিকটি প্রকাশিত হয়েছে—
i. তারুণ্যের আবেগ
ii. তারুণ্যের দুর্নিবার রূপ
iii. তারুণ্যের আত্মোৎসর্গকারী রূপ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

২০। ‘আঠারো বছর বয়স ভয়ঙ্কর' কারণ, এ বয়সে—
i. আঘাত আসে
ii. প্রাণে অসহ্য যন্ত্রণা
iii. প্রাণ তীব্র আর প্রখর
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২১। “এ দেশের বুকে আঠারো আসুক নেমে”—আঠারো বছর বয়স কবিতার চরণটিতে কবির কোন মানসিকতা প্রকাশিত?
i. প্রধাবন্ধ জীবনের
ii. উদ্দীপনা ও সাহসিকতার
iii. চলার দুর্নিবার গতির
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

❖ উদ্দীপকের আলোকে ২২ ও ২৩ নং প্রশ্নের উত্তর দাও : 
‘আপদ আছে, জানি আঘাত আছে
তাই জেনে তো বক্ষে পরান নাচে।’

২২। উদ্দীপকটির ‘আঠারো বছর বয়স' কবিতার নিচের কোন চরণের সাথে মিল রয়েছে?
(ক) দুর্যোগে হাল ঠিকমতো রাখা ভার
(খ) প্রাণ দেওয়া- নেওয়া ঝুলিটা থাকে না শূন্য
(গ) বিপদের মুখে এ বয়স অগ্রণী
(ঘ) পদাঘাতে চায় ভাঙতে পাথর বাধা
উত্তর: (গ) বিপদের মুখে এ বয়স অগ্রণী

২৩। উদ্দীপকটির ভাবার্থ ‘আঠারো বছর বয়স’ কবিতার সাথে কোনো অর্থে অভিন্ন? [দি. বো. ২০]
(ক) শৃঙ্খলাবোধ (খ) বিশৃঙ্খলাবোধ (গ) অস্থিরতা (ঘ) সাহসিকতা
উত্তর: (ঘ) সাহসিকতা

❖ উদ্দীপকের আলোকে ২৪ ও ২৫ নং প্রশ্নের উত্তর দাও : একুশ মানে চেতনায় শাণিত ধারা
একুশ মানে মাথা নত না করা।

২৪। উদ্দীপকের ভাবের মিল পাওয়া যায় নিচের কোন চরণে?
(ক) আঠারো বছর বয়স ভয়ঙ্কর / তাজা তাজা প্রাণে অসহ্য যন্ত্রণা।
(খ) আঠারো বছর বয়স যেন দুর্বার / পথে প্রান্তরে ছোটায় বহু তুফান।
(গ) আঠারো বছর বয়স কী দুঃসহ / স্পর্ধায় নেয় মাথা তোলবার ঝুঁকি।
(ঘ) আঠারো বছর বয়সের নেই ভয় / পদাঘাতে চায় ভাঙতে পাথর বাধা।
উত্তর: (গ) আঠারো বছর বয়স কী দুঃসহ / স্পর্ধায় নেয় মাথা তোলবার ঝুঁকি।

২৫। উপর্যুক্ত উত্তরে তারুণ্যের যে বৈশিষ্ট্য প্রতিফলিত হয়েছে তা হলো—
i. সাহস
ii. প্রতিবাদ
iii. প্রতিরোধ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ২৬ ও ২৭ নং প্রশ্নের উত্তর দাও : রাশেদ গার্মেন্টস ফ্যাক্টরিতে শ্রমিকদের ন্যায্য মজুরির দাবি তোলায় শ্রমিক নেতা জামালকে চাকরি থেকে বরখাস্ত করা হয়। দারুণ অর্থকষ্টে পতিত হলেও জামাল হাল ছাড়ে না। দৃঢ় আত্মপ্রত্যয়ের সাথে শ্রমিকদের সঙ্গে নিয়ে দুর্নিবার আন্দোলন গড়ে তোলে।

২৬। উদ্দীপকের জামাল চরিত্রে আঠারো বছর বয়স কবিতার কোন বৈশিষ্ট্যটি বিদ্যমান? [ম. বো. ২২]
(ক) প্রখরতা (খ) অসহিষ্ণুতা (গ) উদ্যম (ঘ) স্পর্ধা
উত্তর: (গ) উদ্যম

২৭। উদ্দীপকের শেষ লাইনের সঙ্গে নিচের কোন লাইনটির ভাবগত সাদৃশ্য রয়েছে?
(ক) প্রখরতা (খ) অসহিষ্ণুতা (গ) উদ্যম (ঘ) স্পর্ধা
উত্তর: (ঘ) স্পর্ধা

❖ উদ্দীপকের আলোকে ২৮ ও ২৯ নং প্রশ্নের উত্তর দাও : ধ্বংস দেখে ভয় কেন তোর? প্রলয় নতুন সৃজন বেদন। আসছে নবীন জীবন হারা অসুন্দরের করতে ছেদন।

২৮। ‘আঠারো বছর বয়স' কবিতায় উল্লিখিত আঠারো বছর বয়সের কোন বৈশিষ্ট্যটি উদ্দীপকে ফুটে উঠেছে?
(ক) আত্মপ্রত্যয় (খ) উদ্যম (গ) উষ্ণতা (ঘ) সহনশীলতা
উত্তর: (ক) আত্মপ্রত্যয়

২৯। নিচের কোন চরণে উক্ত বৈশিষ্ট্য প্রকাশ পেয়েছে?
(ক) এ বয়স যেন ভীরু, কাপুরুষ নয়
(খ) আঠারো বছর বয়স ভয়ঙ্কর
(গ) এ বয়স বাঁচে দুর্যোগে আর ঝড়ে
(ঘ) এ বয়সে তাই নেই কোনো সংশয়
উত্তর: (ঘ) এ বয়সে তাই নেই কোনো সংশয়

❖ উদ্দীপকের আলোকে ৩০ নং প্রশ্নের উত্তর দাও : আমরা করি ভুল
অগাথ জলে ঝাঁপ দিয়ে
খুঁজিয়ে পাই কূল।
জীবন মরণ কড়ে
আমরা প্রস্তুত।
৩০। উদ্দীপকের সঙ্গে অধিকতর সাদৃশ্যপূর্ণ চরণ হলো—
i. ক্ষত-বিক্ষত হয় সহস্র প্রাণ
ii. আঠারো বছর বয়স জানে না কাঁদা
iii. বিরাট দুঃসাহসেরা দেয় যে উকি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩১। আঠারো বছর বয়সে কী নেই?
(ক) ঝুঁকি (খ) যন্ত্রণা (গ) সংশয় (ঘ) কাঁদা
উত্তর: (গ) সংশয়

৩২। ‘আঠারো বছর বয়স ভয়ংকর’ কারণ—
(ক) সবকিছু ভেঙে তছনছ করতে ইচ্ছে করে
(খ) নিশ্চল প্রথাবদ্ধ জীবনকে পেছনে ফেলে নতুন জীবন রচনার স্বপ্ন বোনে
(গ) এ বয়সে দেহ ও মনে স্থবিরতা, যন্ত্রণা আসে
(ঘ) শারীরিক, মানসিক, সামাজিক, রাজনৈতিক নানা জটিলতায় জড়িয়ে পড়ে
উত্তর: (খ) নিশ্চল প্রথাবদ্ধ জীবনকে পেছনে ফেলে নতুন জীবন রচনার স্বপ্ন বোনে

৩৩। ‘আঠারো বছর বয়স’ কবিতায় ‘আঠারো’ অর্থ—
(ক) উদ্ধত (খ) প্রতিবাদ (গ) জাগরণ (ঘ) যৌবন
উত্তর: (ঘ) যৌবন

৩৪। সুকান্ত ভট্টাচার্য কত বছর বয়সে মৃত্যুবরণ করেন?
(ক) ১৯ (খ) ২০ (গ) ২১ (ঘ) ২২
উত্তর: (গ) ২১

❖ উদ্দীপকের আলোকে ৩৫ নং প্রশ্নের উত্তর দাও :
ব্রিটিশ শাসকদের অত্যাচারে অতিষ্ঠ ভারতবাসী। ক্ষোভের আগুন ছড়িয়ে পড়ে সর্বত্র। মাস্টারদা সূর্য সেনের নেতৃত্বে ইউরোপিয়ান ক্লাব আক্রমণে এগিয়ে আসেন তাঁর অনেক অনুসারী। এঁদেরই একজন প্রীতিলতা ওয়াদ্দেদার। শেষ পর্যন্ত তিনি মৃত্যুকে বরণ করে নিয়েছেন কিন্তু আত্মসমর্পণ করেননি।

৩৫। প্রীতিলতার মাঝে “আঠারো বছর বয়স” কবিতার কোন দিকগুলো ফুটে উঠেছে?
i. তারুণ্য
ii. আত্মত্যাগ
iii. সর্বনাশের অভিঘাত
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩৬। সুকান্ত ভট্টাচার্যের পৈত্রিক নিবাস কোথায়?
(ক) গোপালগঞ্জের কোটালীপাড়ায় (খ) নরসিংদীর পাড়াতলি
(গ) মাগুরার মাঝাইল (ঘ) পিরোজপুরের শংকরপাশা
উত্তর: (ক) গোপালগঞ্জের কোটালীপাড়ায়

৩৭। সুকান্ত ভট্টাচার্য রচিত ‘ছাড়পত্র’ কী ধরনের রচনা?
(ক) নাটক (খ) উপন্যাস (গ) কাব্যগ্রন্থ (ঘ) প্রহসন
উত্তর: (গ) কাব্যগ্রন্থ

৩৮। আঠারো বছর বয়সে অহরহ উঁকি দেয়—
(ক) দুঃখ (খ) দুর্গতি (গ) প্রেম (ঘ) দুঃসাহস
উত্তর: (ঘ) দুঃসাহস

৩৯। আঠারো বছর বয়সে তরুণরা পদাঘাতে কী ভাঙতে চায়?
(ক) লোহার শিকল (খ) পাথর বাধা (গ) জেলের তালা (ঘ) পাহাড় বাধা
উত্তর: (খ) পাথর বাধা

৪০। ‘আঠারো বছর বয়স’ কবিতার প্রথম স্তবকে কী প্রকাশিত হয়েছে?
(ক) তারুণ্যের দুঃসাহসী রূপ (খ) তারুণ্যের মাতৃরূপ
(গ) তারুণ্যের শক্তিমত্তা (ঘ) তারুণ্যের অসহায়ত্ব
উত্তর: (ক) তারুণ্যের দুঃসাহসী রূপ

৪১। আঠারো বছর বয়সে কানে কী আসে?
(ক) যন্ত্রণা (খ) জয়ধ্বনি (গ) শঙ্খধ্বনি (ঘ) আহ্বান
উত্তর: (ক) মন্ত্রণা (দ্রষ্টব্য: কবিতায় 'কানে আসে কত মন্ত্রণা' উল্লেখ আছে)

৪২। আঠারো বছর তরুণরা কেমন বেগে চলে?
(ক) হাওয়ার বেগে (খ) ঝড়ের বেগে (গ) বাষ্পের বেগে (ঘ) ট্রেনের বেগে
উত্তর: (গ) বাষ্পের বেগে

৪৩। কবি সুকান্ত ভট্টাচার্যের সাথে নিচের কোন কবির কবিতার ভাবগত সাদৃশ্য খুঁজে পাওয়া যায়?
(ক) রবীন্দ্রনাথ ঠাকুর (খ) জসীমউদ্দীন (গ) কাজী নজরুল ইসলাম (ঘ) আহসান হাবীব
উত্তর: (গ) কাজী নজরুল ইসলাম

৪৪। ‘তাজা প্রাণে অসহ্য যন্ত্রণা’ কেন?
(ক) দৃঢ় পদক্ষেপে এগিয়ে যেতে হয় বলে (খ) দুঃসাহসী স্বপ্ন ও কল্পনার তাড়নায়
(গ) অন্যায়-অত্যাচার-শোষণ ইত্যাদি দেখে ক্ষুব্ধ হওয়ায় (ঘ) অতিরিক্ত আত্মবিশ্বাসী হওয়ার কারণে
উত্তর: (গ) অন্যায়-অত্যাচার-শোষণ ইত্যাদি দেখে ক্ষুব্ধ হওয়ায়

৪৫। ‘আঠারো বছর বয়স’ কবিতায় কবি ‘সঁপে আত্মাকে শপথের কোলাহলে’ বলতে বুঝিয়েছেন—
(ক) রক্তদানের পুণ্য (খ) কথা ও কাজের ঐক্য
(গ) আত্মত্যাগের মহিমা (ঘ) যৌবনের দুঃসাহসিকতা
উত্তর: (গ) আত্মত্যাগের মহিমা

৪৬। নিচের কোনটিতে আঠারো বছর বয়সের ইতিবাচক দিকের প্রতিফলন ঘটেছে?
(ক) এ বয়সে কানে আসে কত মন্ত্রণা (খ) এ বয়স কাঁপে বেদনায় থরো থরো
(গ) সঁপে আত্মাকে শপথের কোলাহলে (ঘ) দুর্যোগে হাল ঠিকমতো রাখা ভার
উত্তর: (গ) সঁপে আত্মাকে শপথের কোলাহলে

৪৭। ‘আঠারো বছর বয়স’ কবিতায় ‘শপথের কোলাহল’ বলতে কবি কী বোঝাতে চেয়েছেন?
(ক) নতুন কাজের জন্য নতুন শপথের আবদ্ধ হওয়া (খ) কাজ না করে শুধু শপথ করে যাওয়া
(গ) প্রচুর কোলাহলের মধ্যে শপথ করা (ঘ) সবাই যেখানে শপথ করে সেখানে শপথ নেওয়া
উত্তর: (ক) নতুন কাজের জন্য নতুন শপথের আবদ্ধ হওয়া

৪৮। আঠারো বছর বয়স দুঃসহ কেন?
(ক) পাথর বাধা ভাঙতে চায় বলে (খ) বাষ্পের বেগে স্টিমারের মত চলে বলে
(গ) প্রাণে অসহ্য যন্ত্রণার কারণে (ঘ) স্পর্ধায় মাথা তোলবার ঝুঁকির কারণে
উত্তর: (ঘ) স্পর্ধায় মাথা তোলবার ঝুঁকির কারণে

৪৯। “আঠারো বছর বয়স” কবিতায় “স্পর্ধায় নেয় মাথা তোলবার ঝুঁকি।”—চরণটিতে প্রকাশ পেয়েছে তারুণ্যের—
(ক) আত্মনির্ভরতা (খ) দৃঢ়তা (গ) স্বাবলম্বিতা (ঘ) আত্মম্ভরিতা
উত্তর: (ক) আত্মনির্ভরতা

৫০। আঠারো বছর বয়সে কীসের প্রস্তুতি নিতে হয়?
(ক) আত্মসংযমী হওয়ার (খ) স্বনির্ভর হওয়ার (গ) ত্যাগী হওয়ার (ঘ) ধ্যানী হওয়ার
উত্তর: (খ) স্বনির্ভর হওয়ার

৫১। ‘আঠারো বছর বয়স কী দুঃসহ’—কেন?
(ক) এ বয়সে নিজের পায়ে দাঁড়ানোর ঝুঁকি নিতে হয় (খ) এ বয়সে নানা জনে নানা কথা বোঝায়
(গ) এ বয়সে শারীরিক মানসিক পরিবর্তন হয় (ঘ) এ বয়সে নিজের পায়ে দাঁড়ানোর ঝুঁকি নিতে হয়
উত্তর: (ক/ঘ) এ বয়সে নিজের পায়ে দাঁড়ানোর ঝুঁকি নিতে হয়

৫২। আঠারো বছর বয়স কেন তাৎপর্যমণ্ডিত?
(ক) পাথর বাধা ভাঙতে চায় বলে (খ) প্রাণ তীব্র আর প্রখর চায় বলে
(গ) বিপদের মুখে অগ্রণী বলে (ঘ) নতুন কিছু করে বলে
উত্তর: (ঘ) নতুন কিছু করে বলে

৫৩। ‘রক্তদানের পুণ্য’ বলতে বোঝানো হয়েছে—
(ক) ন্যায় ও কল্যাণ প্রতিষ্ঠায় আত্মত্যাগ (খ) অজানাকে জানতে গিয়ে মৃত্যুবরণ
(গ) শত্রুর মোকাবিলায় জীবন বিসর্জন (ঘ) দুঃসাহসী অভিযানে প্রাণবিসর্জন
উত্তর: (ক) ন্যায় ও কল্যাণ প্রতিষ্ঠায় আত্মত্যাগ

৫৪। ‘এ বয়স জানে রক্তদানের পুণ্য’—এ বাক্যটি নিচের কোন বাক্যকে সমর্থন করে?
(ক) এ বয়স আত্মত্যাগের মহিমায় ভাস্বর (খ) এ বয়স নব নব অগ্রগতি সাধনের
(গ) এ বয়সে রক্তদানে পুণ্য অর্জন হয় (ঘ) এ বয়স যেন নিত্যনতুন করণীয় সম্পাদনের
উত্তর: (ক) এ বয়স আত্মত্যাগের মহিমায় ভাস্বর

৫৫। ‘আঠারো বছর বয়স’ কবিতায় দুঃসাহস বলতে কী বোঝানো হয়েছে?
(ক) তীব্র যন্ত্রণা (খ) দুঃসহ যন্ত্রণা (গ) লক্ষ ও উদ্যোগ (ঘ) স্বপ্ন ও উদ্যোগ
উত্তর: (ঘ) স্বপ্ন ও উদ্যোগ

৫৬। আঠারো বছর বয়সের কোনো ভয় নেই কেন?
(ক) এ বয়স সকল বাধা ভাঙতে পারে (খ) এ বয়সে কোনো বাধা ভাঙতে হয় না
(গ) এ বয়সে পরিবারের সকলের সহযোগিতায় চলা যায় (ঘ) এ বয়স ভয় বিশ্বাস করে না
উত্তর: (ক) এ বয়স সকল বাধা ভাঙতে পারে

৫৭। সহস্র প্রাণ ক্ষত-বিক্ষত হয়—
(ক) জীবনের লক্ষ্য ঠিক থাকে না বলে (খ) সমাজের অনাচার প্রতিকারে অপারগ বলে
(গ) নেতিবাচক বিষয়ে প্রতি বেশি ঝোঁকে বলে (ঘ) অজস্র আঘাত প্রতিরোধে অক্ষম বলে
উত্তর: (ক) জীবনের লক্ষ্য ঠিক থাকে না বলে

৫৮। তারুণ্যের কোন নেতিবাচক দিক সর্বনাশের দিকে ঠেলে দিতে পারে?
(ক) অভিমান (খ) লজ্জা (গ) অবিশ্বাস (ঘ) সিদ্ধান্তহীনতা
উত্তর: (ঘ) সিদ্ধান্তহীনতা

৫৯। কখন হার ঠিকমতো রাখা ভার হয়ে ওঠে?
(ক) শান্তিতে (খ) দুর্বিপাকে (গ) বিদ্রোহে (ঘ) দুর্যোগে
উত্তর: (ঘ) দুর্যোগে

৬০। তরুণরা ভয়ঙ্কর হয়ে উঠতে পারে কেন?
(ক) অন্যায়-অত্যাচার ও শোষণ বৈষম্য দেখে (খ) সমাজ-জীবনের বিকার, অসুস্থতা এবং সর্বনাশের অভিঘাতে
(গ) তারুণ্য শক্তির সহজাত বৈশিষ্ট্যের কারণে (ঘ) বিপদগামিতাই তারুণ্যের বহিঃপ্রকাশ তাই
উত্তর: (খ) সমাজ-জীবনের বিকার, অসুস্থতা এবং সর্বনাশের অভিঘাতে

৬১। ‘আঠারো বছর বয়স’ ভয়ংকর কেন?
(ক) এই বয়সে কোনো শাসন মানতে চায় না (খ) এ বয়স মাথা উঁচু করে বাঁচতে চায় বলে
(গ) এ বয়সে রক্তদান পুণ্য বলে (ঘ) কানে নানা মন্ত্রণা আসে বলে
উত্তর: (ঘ) কানে নানা মন্ত্রণা আসে বলে

৬২। ‘প্রাণ দেওয়া-নেওয়া ঝুলিটা থাকে না শূন্য’—জীবনের কোন সময়ে?
(ক) কৈশোর জীবনে (খ) কর্মজীবনে (গ) যৌবনে পদার্পণকালে (ঘ) অর্থ উপার্জনকালে
উত্তর: (গ) যৌবনে পদার্পণকালে

৬৩। ‘এ সময়ে সচেতন ও সচেষ্টভাবে নিজেকে পরিচালনা করতে না পারলে পদস্খলন হতে পারে।‘—উক্তিটি নিচের কোন চরণের বিশ্লেষিত রূপ?
(ক) আঠারো বছর কী দুঃসহ (খ) স্পর্ধায় নেয় মাথা তোলবার ঝুঁকি
(গ) এ বয়সে প্রাণ তীব্র আর প্রখর (ঘ) দুর্যোগে হাল ঠিকমতো রাখা ভার
উত্তর: (ঘ) দুর্যোগে হাল ঠিকমতো রাখা ভার

৬৪। ‘এ বয়স কালো লক্ষ্য দীর্ঘশ্বাসে’—কেন?
(ক) নির্ধারিত লক্ষ্যে পৌঁছাতে না পারায় (খ) দুর্যোগের দিশা হারানোয়
(গ) সংশয়হীন পথ চলার বাধা আসাতে (ঘ) পরোপকারের ব্যর্থতার কারণে
উত্তর: (ক) নির্ধারিত লক্ষ্যে পৌঁছাতে না পারায়

৬৫। আঠারো বছর বয়স কালো হয়ে যায়—
(ক) হাসিতে (খ) কষ্টে (গ) রোদে পুড়ে (ঘ) লক্ষ দীর্ঘশ্বাসে
উত্তর: (ঘ) লক্ষ দীর্ঘশ্বাসে

৬৬। ‘আঠারো বছর বয়স’ কীসের বাঁচে?
(ক) শান্তি ও অশান্তিতে (খ) দুর্যোগে আর ঝড়ে
(গ) হাসি আর কান্নায় (ঘ) ভালো ও মন্দে
উত্তর: (খ) দুর্যোগে আর ঝড়ে

৬৭। ‘এদেশের বুকে আঠারো আসুক নেমে’— কোন বৈশিষ্ট্যের কারণে কবি আঠারোর প্রত্যাশা করেছেন?
(ক) ইতিবাচকতা (খ) দুঃসাহস
(গ) প্রখরতা (ঘ) তারুণ্য
উত্তর: (ক) ইতিবাচকতা

৬৮। ‘এ দেশের বুকে আঠারো আসুক নেমে’— কেন?
(ক) শান্তির জন্য (খ) কল্যাণের জন্য
(গ) দেশপ্রেমিক হওয়ার জন্য (ঘ) অকল্যাণের জন্য
উত্তর: (খ) কল্যাণের জন্য

৬৯। ‘আঠারো বছর বয়স’ কবিতায় কবির প্রত্যাশা কী?
(ক) তারুণ্যধর্ম দিয়ে এ দেশ পরিচালিত হোক
(খ) তরুণের বিপর্যয় ডেকে আনুক
(গ) যৌবনধর্ম চির অটুট থাকুক
(ঘ) বার্ধক্য নেমে আসুক
উত্তর: (ক) তারুণ্যধর্ম দিয়ে এ দেশ পরিচালিত হোক

৭০। ‘আঠারো বছর বয়স’ কবিতায় কোন কালের বৈশিষ্ট্য তুলে ধরা হয়েছে?
(ক) বয়ঃসন্ধিকালের (খ) যৌবনের
(গ) শৈশবকালের (ঘ) বার্ধক্যের
উত্তর: (ক) বয়ঃসন্ধিকালের

৭১। আঠারো বছর বয়সের প্রধান বৈশিষ্ট্য কোনটি?
(ক) গতিশীলতা (খ) প্রগতি ও অগ্রগতি
(গ) নতুনকে ধারণ করা (ঘ) শক্তি ও সাহস
উত্তর: (খ) প্রগতি ও অগ্রগতি

৭২। সুকান্ত ভট্টাচার্য তাঁর কাব্যে একাত্মতা ঘোষণা করেছেন—
(ক) সশস্ত্র সংগ্রামের পক্ষে (খ) ধর্মের পক্ষে
(গ) বিপ্লব ও মুক্তির পক্ষে (ঘ) উগ্রবাদীতার পক্ষে
উত্তর: (গ) বিপ্লব ও মুক্তির পক্ষে

৭৩। ‘আঠারো বছর বয়স’ মাথা না নোয়াবার কারণ—
i. তারা দুঃসাহসী বলে
ii. দৈহিক ও মানসিক শক্তির অধিকারী বলে
iii. বিদ্রোহী চেতনায় লালিত বলে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৭৪। ‘আঠারো বছর বয়স’ জানে না কাঁদা; কারণ—
i. এ বয়সে মানুষ আত্মপ্রত্যয়ী
ii. মানুষ এ সময় স্বাধীনভাবে জীবনের মুখোমুখি হয়
iii. এ বয়সটা হাসি-তামাশার বয়স
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৭৫। আঠারো বছর বয়সে তরুণ মনকে ঘিরে ধরে—
i. দুঃসাহসী
ii. রোমাঞ্চকর কল্পনা
iii. সাহসী উদ্যোগ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৭৬। আঠারো বছর বয়সের প্রবল আবেগ ও উচ্ছ্বাস—
i. অদম্য দুঃসাহসের
ii. জীবনের ঝুঁকি নেওয়ার
iii. বাধা-বিপত্তিকে পেরিয়ে যাওয়ার
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৭৭। “এ দেশের বুকে আঠারো আসুক নেমে”— ‘আঠারো বছর বয়স’ কবিতার চরণটিতে কবির কোন মানসিকতা প্রকাশিত?
i. প্রধাবন্ধ জীবনের
ii. উদ্দীপনা ও সাহসিকতার
iii. চলার দুর্নিবার গতির
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৭৮। সুকান্ত ভট্টাচার্যের আঠারো বছর বয়স কবিতায় যে বৈশিষ্ট্য লক্ষ করা যায়—
i. বয়ঃসন্ধিকালের বৈশিষ্ট্য
ii. যৌবনের উদ্দীপনা
iii. নতুন জীবন রচনার স্বপ্ন
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৭৯। আঠারো বছর বয়সে প্রাণ—
i. তীব্র
ii. প্রখর
iii. ঝুঁকিপূর্ণ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৮০। ‘আঠারো বছর বয়স’ কবিতার ইতিবাচক কয়েকটি সম্ভাবনা হলো—
i. সাহসিকতা, দৃঢ়চেতা, শপথ গ্রহণ
ii. বিপদের মুখে অগ্রণী ভূমিকা, সংশয়হীন
iii. ভীরুতা, কাপুরুষতা, হীনম্মন্যতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৮১। কবি জাতীয় জীবনে তারুণ্য ও যৌবনশক্তির চালিকাশক্তি হওয়ার প্রত্যাশা করেছে। কারণ তারুণ্য ও যৌবনের আছে—
i. দুর্বার গতি
ii. নতুন জীবন রচনার শক্তি
iii. ধ্বংসের নির্মমতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

❖ উদ্দীপকের আলোকে ৮২ নং প্রশ্নের উত্তর দাও :
'আমি আপনারে ছাড়া করি না কাহারে কুর্নিশ।'

৮২। উদ্দীপকের সাথে ‘আঠারো বছর বয়স’ কবিতার কোন পঙক্তিটি সাদৃশ্যপূর্ণ?
(ক) বিরাট দুঃসাহসেরা দেয় উঁকি
(খ) এ বয়সে কেউ মাথা নোয়াবার নয়
(গ) আঠারো বছর বয়স যে দুর্বার
(ঘ) সঁপে আত্মাকে শপথের কোলাহলে
উত্তর: (খ) এ বয়সে কেউ মাথা নোয়াবার নয়

❖ উদ্দীপকের আলোকে ৮৩ ও ৮৪ নং প্রশ্নের উত্তর দাও :
১৯৯৮ সালের বন্যায় যখন মধুমতি নদীর বেড়িবাঁধ ধ্বংসের দ্বারপ্রান্তে, প্রবল নদীস্রোতে জীবনের মায়া উপেক্ষা করে একদল তরুণ এই বেড়িবাঁধ সংস্কারে ব্রতী হয়।

৮৩। উদ্দীপকের সাথে নিচের কোন কবিতার সাদৃশ্য আছে?
(ক) সুচেতনা (খ) প্রতিদান (গ) আঠারো বছর বয়স (ঘ) সোনার তরী
উত্তর: (গ) আঠারো বছর বয়স

৮৪। উদ্দীপকের সাথে উক্ত কবিতার সাদৃশ্যপূর্ণ পঙক্তি কোনটি?
(ক) স্পর্ধায় নেয় মাথা তোলবার ঝুঁকি
(খ) আঠারো বছর বয়সে জানে না কাঁদা
(গ) সঁপে আত্মাকে শপথের কোলাহলে
(ঘ) এ বয়স জানে রক্তদানের পুণ্য
উত্তর: (ঘ) এ বয়স জানে রক্তদানের পুণ্য

❖ উদ্দীপকের আলোকে ৮৫ নং প্রশ্নের উত্তর দাও :
হায়দার সাহেবের ছেলে গত জানুয়ারিতে আঠারোয় পা দিয়েছে। এখন সে একাই ভার্সিটি কোচিংয়ে যেতে চায় নিজেদের গাড়িতে না চড়ে পাবলিক গাড়িতে চড়ে। হায়দার সাহেব কোথাও যেন ছেলের একটা পরিবর্তন লক্ষ করেন।

৮৫। ‘আঠারো বছর বয়স’ কবিতার কোন দিকটি উদ্দীপকে ফুটে উঠেছে?
(ক) নির্ভরশীলতা পরিহার (খ) দুঃসাহস (গ) অনুভূতির তীব্রতা (ঘ) স্বনির্ভরতা
উত্তর: (ক) নির্ভরশীলতা পরিহার (নোট: এটি মূলত আত্মনির্ভরশীলতার প্রকাশ)

❖ উদ্দীপকের আলোকে ৮৬ ও ৮৭ নং প্রশ্নের উত্তর দাও :
ধ্বংস দেখে ভয় কেন তোর? প্রলয় নতুন সৃজন বেদন। আসছে নবীন জীবন হারা অসুন্দরের করতে ছেদন।

৮৬। ‘আঠারো বছর বয়স’ কবিতায় উল্লিখিত আঠারো বছর বয়সের কোন বৈশিষ্ট্যটি উদ্দীপকে ফুটে উঠেছে?
(ক) আত্মপ্রত্যয় (খ) উদ্যম (গ) উষ্ণতা (ঘ) সহনশীলতা
উত্তর: (ক) আত্মপ্রত্যয়

৮৭। নিচের কোন চরণে উক্ত বৈশিষ্ট্যটি প্রকাশ পেয়েছে?
(ক) এ বয়স যেন ভীরু, কাপুরুষ নয় (খ) আঠারো বছর বয়স ভয়ংকর
(গ) এ বয়স বাঁচে দুর্যোগে আর ঝড়ে (ঘ) এ বয়সে তাই নেই কোনো সংশয়
উত্তর: (ঘ) এ বয়সে তাই নেই কোনো সংশয়

❖ উদ্দীপকের আলোকে ৮৮ নং প্রশ্নের উত্তর দাও :
আমরা করি ভুল
অগাথ জলে ঝাঁপ দিয়ে
খুঁজিয়ে পাই কূল।
যেখানে ডাক পড়ে
জীবন মরণ কড়ে
আমরা প্রস্তুত।

৮৮। উদ্দীপকের সঙ্গে অধিকতর সাদৃশ্যপূর্ণ চরণ হলো—
i. ক্ষত-বিক্ষত হয় সহস্র প্রাণ
ii. আঠারো বছর বয়স জানে না কাঁদা
iii. বিরাট দুঃসাহসেরা দেয় যে উঁকি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ৮৯ ও ৯০ নং প্রশ্নের উত্তর দাও :
'আপদ আছে, জানি আঘাত আছে,
তাই জেনে তো বক্ষে পরাণ নাচে।'

৮৯। উদ্দীপকে ‘আঠারো বছর বয়স’ কবিতার কোন বৈশিষ্ট্যের প্রতিফলন ঘটেছে?
(ক) সাহসিকতা (খ) চঞ্চলতা (গ) শৃঙ্খলাবোধ (ঘ) নিশ্চলতা
উত্তর: (ক) সাহসিকতা

৯০। উদ্দীপকের সঙ্গে উপর্যুক্ত কবিতার যে চরণে ভাবের সাথে মিল আছে—
i. দুর্যোগে হাল ঠিকমতো রাখা ভার
ii. প্রাণ দেওয়া-নেওয়া ঝুলিটা থাকে না শূন্য
iii. বিপদের মুখে এ বয়স অগ্রণী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) iii (ঘ) i, ii ও iii
উত্তর: (গ) iii (বিপদের মুখে এ বয়স অগ্রণী)

৯১। সহস্র প্রাণ ক্ষত-বিক্ষত হয়— [য. বো. ১৭]
(ক) জীবনের লক্ষ্য ঠিক থাকে না বলে (খ) সমাজের অনাচার প্রতিকারে অপারগ বলে
(গ) নেতিবাচক বিষয়ের প্রতি বেশি ঝোঁকে বলে (ঘ) অজস্র আঘাত প্রতিরোধে অক্ষম বলে
উত্তর: (ক) জীবনের লক্ষ্য ঠিক থাকে না বলে

৯২। ‘আঠারো বছর বয়স’ কবিতায় দুঃসাহস বলতে কী বোঝানো হয়েছে?
(ক) তীব্র যন্ত্রণা (খ) দুঃসহ যন্ত্রণা (গ) লক্ষ দীর্ঘশ্বাস (ঘ) স্বপ্ন ও উদ্যোগ
উত্তর: (ঘ) স্বপ্ন ও উদ্যোগ

৯৩। ‘জন্মভূমি রক্ষাহেতু কে ডরে মরিতে / যে ডরে, ভীরু, সে মূঢ়, শত ধিক তারে’— উদ্দীপকের ভাববস্তু ‘আঠারো বছর বয়স’ কবিতার—
(ক) বিপরীতধর্মী (খ) সমধর্মী (গ) ভিন্নধর্মী (ঘ) সমাজরূঢ়
উত্তর: (খ) সমধর্মী

৯৪। ‘প্রাণ দেওয়া-নেওয়া ঝুলিটা থাকে না শূন্য’— জীবনের কোন সময়ে?
(ক) কৈশোর জীবনে (খ) কর্মজীবনে (গ) যৌবনে পদার্পণকালে (ঘ) অর্থ উপার্জনকালে
উত্তর: (গ) যৌবনে পদার্পণকালে

৯৫। কবি এ দেশের বুকে আঠারোকে প্রত্যাশা করেছেন কেন?
(ক) বিদ্রোহের জন্য (খ) প্রগতির জন্য (গ) শান্তির জন্য (ঘ) সমৃদ্ধির জন্য
উত্তর: (ঘ) সমৃদ্ধির জন্য (নোট: প্রেক্ষাপট অনুযায়ী দেশের ইতিবাচক পরিবর্তনের জন্য)

৯৬। ‘আঠারো বছর বয়স’ কবিতাটি কয় মাত্রার পর্বে রচিত?
(ক) ৬ মাত্রার (খ) ৫ মাত্রার (গ) ৭ মাত্রার (ঘ) ৮ মাত্রার
উত্তর: (ক) ৬ মাত্রার (এটি মাত্রাবৃত্ত ছন্দে রচিত)

৯৭। ‘আমি মানি না গো কোন আইন / আমি ভরা তরী করি ভরাডুবি, আমি ভীম ভাসমান মাইন।’ উদ্দীপকে ব্যক্ত ভাবের দ্যোতনা আছে নিচের কোনটিতে?
(ক) পদাঘাতে চায় ভাঙতে পাথর বাধা (খ) আঠারো বছর বয়স কী দুঃসহ (গ) আঠারো বছর বয়সের নেই ভয় (ঘ) এ বয়স জানে রক্তদানের পুণ্য
উত্তর: (ক) পদাঘাতে চায় ভাঙতে পাথর বাধা

❖ উদ্দীপকের আলোকে ৯৮ নং প্রশ্নের উত্তর দাও :
এসে গেছে ধ্বংসের বার্তা
দুর্যোগে পথ হয় হোক দুর্ভেদ্য
চিনে নেবে যৌবন-আত্মা।

৯৮। উদ্দীপকে বর্ণিত চিত্রের মধ্যে ‘আঠারো বছর বয়স’ কবিতার কোন দিকটি প্রতিফলিত হয়েছে?
i. ভয়ংকর ii. দুর্বার iii. অপ্রতিরোধ্য
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ৯৯ নং প্রশ্নের উত্তর দাও :
উদয়ের পথে শুনি কার বাণী
ভয় নাই ওরে ভয় নাই
নিঃশেষে প্রাণ যে করিবে দান
ক্ষয় নাই তার ক্ষয় নাই।

৯৯। উদ্দীপকটি এবং ‘আঠারো বছর বয়স’ কবিতাটির ভাববস্তু—
(ক) বিপরীতধর্মী (খ) সমধর্মী (গ) বিরূপ (ঘ) ভিন্নধর্মী
উত্তর: (খ) সমধর্মী

❖ উদ্দীপকের আলোকে ১০০ ও ১০১ নং প্রশ্নের উত্তর দাও :
‘সবাই যখন বুদ্ধি জোগায় আমরা করি ভুল।
সাবধানীরা বাঁধ বাঁধে সব আমরা ভাঙি কূল।’

১০০। উদ্দীপকের ভাবের সঙ্গে নিচের কোন চরণটির মিল রয়েছে?
(ক) আঠারো বছর বয়স ভয়ংকর (খ) এ বয়সে কানে আসে কত মন্ত্রণা (গ) বিপদের মুখে এ বয়স অগ্রণী (ঘ) এ বয়স জানে রক্তদানের পুণ্য
উত্তর: (ক) আঠারো বছর বয়স ভয়ংকর

১০১। উদ্দীপকে ‘আঠারো বছর বয়স’ কবিতার ভাবটি প্রকাশিত হয়েছে?
(ক) যন্ত্রণা (খ) দুঃসাহস (গ) সম্ভাবনা (ঘ) সতর্কতা
উত্তর: (খ) দুঃসাহস

❖ উদ্দীপকের আলোকে ১০২ ও ১০৩ নং প্রশ্নের উত্তর দাও :
পাড়ার মাঠে সামাজিক অনুষ্ঠানের আয়োজন করেছেন কিছু কলেজ পড়ুয়া তবে বয়োজ্যেষ্ঠরা এগুলোকে উৎপাত বলে মনে করে।

১০২। উদ্দীপকে ‘আঠারো বছর বয়স’ কবিতায় বর্ণিত আঠারো বছর বয়সীদের কোন সংকট দেখা গেছে?
(ক) বয়ঃজনিত সংকট (খ) মানসিক সংকট (গ) রাজনৈতিক সংকট (ঘ) সামাজিক সংকট
উত্তর: (ঘ) সামাজিক সংকট

১০৩। উক্ত সংকট থেকে উত্তরণের জন্য আঠারো বছর বয়সীদের—
i. আত্মবিশ্বাসী হতে হবে ii. স্বনির্ভর হতে হবে iii. আবেগ সংবরণ করতে হবে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

❖ উদ্দীপকের আলোকে ১০৪ ও ১০৫ নং প্রশ্নের উত্তর দাও :
‘মোরা ঝঞ্ঝার মতো উদ্যম / মোরা ঝর্ণার মতো চঞ্চল / মোরা বিধাতার মতো নির্ভয় / মোরা প্রকৃতির মতো সচ্ছল।’— [কাজী নজরুল ইসলাম]

১০৪। উদ্দীপকের সর্বনাম ও ‘আঠারো বছর বয়স’ কবিতার আঠারো বছর বয়সিরা কোন অর্থে অভিন্ন? [প্রয়োগ]
(ক) সম্ভাবনা (খ) অপ্রতিরোধ্য (গ) দুঃসাহসী (ঘ) প্রতিবাদী
উত্তর: (খ) অপ্রতিরোধ্য

১০৫। উক্ত বৈশিষ্ট্যের কারণে আঠারো বছর বয়সিরা— [উচ্চতর দক্ষতা]
i. সত্যানুসন্ধানী হয়ে ওঠে ii. কল্যাণকামী হয়ে ওঠে iii. ধ্বংসাত্মক হয়ে ওঠে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii

১০৬। আঠারো বছর বয়সে মানুষ জীবনের কোন পর্যায়ে পদার্পণ করে?

১০৭। আঠারো বছর বয়সে কীসের প্রস্তুতি নিতে হয়?
(ক) যুদ্ধে অংশগ্রহণের (খ) নিজের পায়ে দাঁড়ানোর
(গ) প্রেমের মূল্যদানের (ঘ) সংসারের দায়িত্ব পালনের

১০৮। কবির মতে, আঠারো বছর বয়সে মানুষ কীসের ঝুঁকি নেয়?
(ক) নিয়ম ভাঙার (খ) স্বাধীনভাবে চলার

১০৯। দুর্বিনীত যৌবনে পদার্পণ করে বলে আঠারো বছর বয়সে মানুষ কেমন হয়ে ওঠে?
(ক) আত্মনির্ভরশীল (খ) আত্মসংযমী
(গ) আত্মপ্রত্যয়ী (ঘ) সংবেদনশীল
উত্তর: (গ) আত্মপ্রত্যয়ী

১১০। আঠারো বছর বয়সের প্রধান বৈশিষ্ট্য কোনটি?
(ক) গতিশীলতা (খ) প্রগতি ও অগ্রগতি
(গ) নতুনকে ধারণ করা (ঘ) শক্তি ও সাহস
উত্তর: (খ) প্রগতি ও অগ্রগতি
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
