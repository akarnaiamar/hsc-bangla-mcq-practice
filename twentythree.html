<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System 23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">সৈয়দ ওয়ালীউল্লাহর 'লালসালু' উপন্যাস</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। মজিদের মহব্বতনগর গ্রামে প্রবেশটা কেমন ছিল?
(ক) অবধারিত (খ) নাটকীয়
(গ) কাব্যিক (ঘ) স্বাভাবিক
উত্তর: (খ) নাটকীয়

২। ‘মাজারটি তার শক্তির মূল’ বলতে কী বোঝানো হয়েছে?
(ক) বিশ্বাস (খ) আনুগত্য
(গ) ভীতি (ঘ) অনুরাগ
উত্তর: (খ) আনুগত্য

❖ উদ্দীপকের আলোকে ৩ ও ৪ নং প্রশ্নের উত্তর দাও।
কাজিপাড়া গ্রামের কামরুল কর্মসূত্রে ঢাকায় থাকেন। তিনি চিন্তা করলেন আধুনিক শিক্ষা ব্যতীত মুসলমানের পরিত্রাণ নেই। এ তাড়না থেকেই তিনি গ্রামে একটি সাধারণ শিক্ষার স্কুল প্রতিষ্ঠা করতে উদ্যোগ নিলেন। তিনি গ্রামের মানুষদের বোঝালেন, আধুনিক শিক্ষায় শিক্ষিত হতে না পারলে মুসলমানরা বর্তমান যুগে পিছিয়ে পড়বে। গ্রামের লোকেরা তাকে আর্থিক সহযোগিতা করতে সম্মত হলো। এ ক্ষেত্রে বাদ সাধল গ্রামের প্রভাবশালী ও রক্ষণশীল কতিপয় লোক। ফলে কামরুলের উদ্যোগ সফল হতে পারল না।

৩। উদ্দীপকের কামরুলের সঙ্গে ‘লালসালু’ উপন্যাসের কোন চরিত্রের মিল পাওয়া যায়?
(ক) তাহের (খ) খালেক
(গ) আক্কাস (ঘ) ধলা মিয়া
উত্তর: (গ) আক্কাস

৪। উক্ত চরিত্রের মধ্যে প্রাধান্য পেয়েছে—
i. সংগ্রামী মনোভাব ও আত্মশীলতা
ii. গ্রামের উন্নতি সাধনে আগ্রহ
iii. আধুনিক শিক্ষা বিস্তারের ইচ্ছা।
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৫। সৈয়দ ওয়ালীউল্লাহর সর্বশেষ কর্মস্থল কোনটি?
(ক) করাচি (খ) লন্ডন
(গ) জার্মানি (ঘ) প্যারিস
উত্তর: (ঘ) প্যারিস

৬। সৈয়দ ওয়ালীউল্লাহর পৈতৃক নিবাস কোথায়?
(ক) কুমিল্লা (খ) ফেনী
(গ) নোয়াখালী (ঘ) ব্রাহ্মণবাড়িয়া
উত্তর: (গ) নোয়াখালী

৭। ‘বহিপীর’—কার লেখা?
(ক) সৈয়দ ওয়ালীউল্লাহ (খ) শামসুর রহমান
(গ) আহসান হাবীব (ঘ) আল মাহমুদ
উত্তর: (ক) সৈয়দ ওয়ালীউল্লাহ

৮। ‘নয়নচারা’ সৈয়দ ওয়ালীউল্লাহর কোন ধরনের সাহিত্যকর্ম?
(ক) গল্প (খ) উপন্যাস
(গ) নাটক (ঘ) কবিতা
উত্তর: (ক) গল্প

৯। ‘চাঁদের অমাবস্যা’ সৈয়দ ওয়ালীউল্লাহর কোন ধরনের গ্রন্থ?
(ক) উপন্যাস (খ) ছোটগল্প
(গ) প্রবন্ধ (ঘ) কবিতা
উত্তর: (ক) উপন্যাস

১০। উপন্যাসের ঘটনা কীসে প্রাণ পায়?
(ক) চরিত্রের বৈচিত্র্যময় প্রকাশ (খ) মানুষের সামগ্রিক জীবন পরিবেশ
(গ) চরিত্রগুলোর পারস্পরিক সংলাপ (ঘ) সুসংবদ্ধ কাহিনির মাধ্যমে
উত্তর: (গ) চরিত্রগুলোর পারস্পরিক সংলাপ

১১। বাংলা সাহিত্যের প্রথম সার্থক উপন্যাস কোনটি?
(ক) চোখের বালি (খ) আলালের ঘরের দুলাল
(গ) দুর্গেশনন্দিনী (ঘ) পদ্মানদীর মাঝি
উত্তর: (গ) দুর্গেশনন্দিনী

১২। ‘লালসালু’ কোন শ্রেণির উপন্যাস?
(ক) সামাজিক উপন্যাস (খ) ঐতিহাসিক উপন্যাস
(গ) আঞ্চলিক উপন্যাস (ঘ) মনস্তাত্ত্বিক উপন্যাস
উত্তর: (ক) সামাজিক উপন্যাস

১৩। ‘লালসালু’ উপন্যাসের ইংরেজি অনুবাদের নাম কী?
(ক) The Tree Without Roots (খ) Tree Without Root
(গ) Trees Without Root (ঘ) Tree Without Roots
উত্তর: (ঘ) Tree Without Roots

১৪। ‘লালসালু’ উপন্যাসটি কোন কোন ভাষায় অনূদিত হয়?
(ক) বাংলা, ইংরেজি (খ) ইংরেজি, ফ্রেঞ্চ
(গ) হিন্দি, ফ্রেঞ্চ (ঘ) ইংরেজি, হিন্দি
উত্তর: (খ) ইংরেজি, ফ্রেঞ্চ

১৫। ‘লালসালু’ উপন্যাসটি প্রথম প্রকাশিত হয় কোন প্রকাশনা থেকে?
(ক) কথাবিতান (খ) কমরেড পাবলিশার্স
(গ) নওরোজ কিতাবিস্তান (ঘ) মল্লিক ব্রাদার্স
উত্তর: (খ) কমরেড পাবলিশার্স

১৬। ‘লালসালু’ উপন্যাসটি প্রথম প্রকাশিত হয় কত সালে?
(ক) ১৯৪৭ সালে (খ) ১৯৪৮ সালে
(গ) ১৯৫০ সালে (ঘ) ১৯৫১ সালে
উত্তর: (খ) ১৯৪৮ সালে

১৭। ‘লালসালু’ উপন্যাসে কোন বাস্তবচিত্র উপস্থাপিত হয়েছে?
(ক) বহুবিবাহ প্রথা (খ) মজিদের ভাগ্য অন্বেষণ
(গ) ধর্মের নামে ব্যবসা (ঘ) অন্ধবিশ্বাস
উত্তর: (গ) ধর্মের নামে ব্যবসা

১৮। মজিদ আক্কাসের স্কুল স্থাপনের প্রচেষ্টাকে বানচাল করে দেয় কারণ—
(ক) মজিদের প্রতিপত্তি কমে যাবে (খ) মক্তব শিক্ষা ব্যাহত হবে
(গ) শিক্ষা অন্ধবিশ্বাস দূর করবে (ঘ) ধর্মশিক্ষা হ্রাস পাবে
উত্তর: (গ) শিক্ষা অন্ধবিশ্বাস দূর করবে

১৯। ‘লালসালু’ উপন্যাসের মূল বক্তব্য হলো—
(ক) ধর্মীয় গোঁড়ামির নিঃশেষ (খ) নারীর অধিকার সচেতনতা
(গ) গ্রামীণ জীবনপ্রবাহ (ঘ) নারীর আনুগত্য
উত্তর: (গ) গ্রামীণ জীবনপ্রবাহ

২০। লালসালু উপন্যাসে মজিদ কীভাবে তার প্রভাব প্রতিষ্ঠিত করে?
(ক) অলৌকিক ক্ষমতাবলে (খ) সকলকে অন্ধ বিশ্বাসে আচ্ছন্ন করে
(গ) ভালো ব্যবহার দ্বারা (ঘ) কূটকৌশল দ্বারা
উত্তর: (খ) সকলকে অন্ধ বিশ্বাসে আচ্ছন্ন করে

২১। কীসের সুযোগে মজিদ তার প্রতারণার জাল বিস্তার করতে সক্ষম হয়েছে?
(ক) গ্রামবাসীর সরলতা ও ধর্মবিশ্বাসের সুযোগে
(খ) গ্রামবাসীর মনে ভয়ভীতি প্রদর্শনে
(গ) গ্রামবাসীর মূর্খামি ও বোকামির সুযোগে
(ঘ) গ্রামবাসীর সহায়-সম্পত্তির সুযোগে
উত্তর: (ক) গ্রামবাসীর সরলতা ও ধর্মবিশ্বাসের সুযোগে

২২। খালেক ব্যাপারী কর্তৃক আমেনা বিবিকে তালাক প্রদানের কারণ—
(ক) প্ররোচনা (খ) সন্দেহ
(গ) বিশ্বাসহীনতা (ঘ) নিঃসন্তান
উত্তর: (ক) প্ররোচনা

২৩। ‘লালসালু’ উপন্যাসে মজিদের মিথ্যার আশ্রয় নেওয়ার কারণ কী?
(ক) অর্থলোভ (খ) আধিপত্য বিস্তার
(গ) ধর্ম প্রতিষ্ঠা (ঘ) নিজ অস্তিত্ব রক্ষা
উত্তর: (ঘ) নিজ অস্তিত্ব রক্ষা

২৪। জমিলাকে নিয়ে রহিমা মনে কোন ভাব জাগে?
(ক) বড় বোনের (খ) মাতৃত্বের
(গ) শাশুড়ির (ঘ) সতিনের
উত্তর: (খ) মাতৃত্বের

২৫। মজিদের সমস্ত কর্মকাণ্ডে খালেক ব্যাপারী সমর্থন জানিয়েছেন কেন?
(ক) শোষণের স্বার্থে (খ) শ্রদ্ধাবশত
(গ) ভীত-সন্ত্রস্ত হয়ে (ঘ) অলৌকিক ক্ষমতাবলে
উত্তর: (ক) শোষণের স্বার্থে

২৬। ‘লালসালু’ উপন্যাসের অস্তিত্ব সচেতন চরিত্র কে?
(ক) রহিমা (খ) ধলা মিয়া
(গ) জমিলা (ঘ) খালেক ব্যাপারী
উত্তর: (গ) জমিলা

২৭। ‘তাই তারা ছোটে, ছোটে।’— কেন?
(ক) ধর্মের জন্য (খ) জীবিকার জন্য
(গ) কল্যাণের জন্য (ঘ) শিক্ষার জন্য
উত্তর: (খ) জীবিকার জন্য

২৮। ‘লালসালু’ উপন্যাসে বর্ণিত ‘কিন্তু দেশটা কেমন মরার দেশ’—বাক্যটিতে ‘মরার দেশ’ বলতে কী বোঝানো হয়েছে?
(ক) লোক শূন্যতা (খ) শস্য শূন্যতা
(গ) শিক্ষাহীনতা (ঘ) হৃদয়হীনতা
উত্তর: (খ) শস্য শূন্যতা

২৯। ছেলেমেয়েরা কখন আমসিপারা পড়ে?
(ক) সকালে (খ) বিকেলে
(গ) সন্ধ্যায় (ঘ) ভোরে
উত্তর: (ঘ) ভোরে

৩০। শস্যের চেয়ে টুপি বেশি, ধর্মের আগাছা বেশি— বলতে বোঝানো হয়েছে—
(ক) ধর্মের প্রভাব (খ) শস্যের আবাদ
(গ) ধর্মের ভয় (ঘ) ধর্মীয় গোঁড়ামি
উত্তর: (ঘ) ধর্মীয় গোঁড়ামি

৩১। ‘জ্বালাময়ী আশা’ বলতে কী বোঝানো হয়েছে?
(ক) ক্ষুধা ও যন্ত্রণাময় জীবন থেকে মুক্তির প্রত্যাশা
(খ) তীব্র খরায় ভালো ফসল প্রাপ্তির প্রত্যাশা
(গ) জালেপুরে বড় রুই মাছ প্রাপ্তির প্রত্যাশা
(ঘ) সন্তানহীনা রহিমার সন্তান লাভের প্রত্যাশা
উত্তর: (ক) ক্ষুধা ও যন্ত্রণাময় জীবন থেকে মুক্তির প্রত্যাশা

৩২। ‘আকাশটা বুঝি চটের মতো চিরে গেল’—কখন এমন মনে হয়?
(ক) মেঘ না থাকলে (খ) কাক আর্তনাদ করলে
(গ) হাওয়াশূন্য হলে (ঘ) নদীতে ঢেউ না থাকলে
উত্তর: (খ) কাক আর্তনাদ করলে

৩৩। অতি সন্তর্পণে ধানের ফাঁকে ফাঁকে তারা নৌকা চালায় কেন?
(ক) মাছের উপস্থিতি টের পেয়ে (খ) দক্ষ শিকারি বলে
(গ) শব্দ করলে মাছ পালায় বলে (ঘ) সতর্কতার মার নেই বলে
উত্তর: (গ) শব্দ করলে মাছ পালায় বলে

৩৪। “কোটরাগত নিমীলিত সে চোখে একটুও কম্পন নেই।”— ‘লালসালু’ উপন্যাসের উক্ত বাক্যে প্রকাশ পেয়েছে—
(ক) দৃষ্টির একাগ্রতা (খ) অপরাধবোধ
(গ) মানসিক দৃঢ়তা (ঘ) ধর্মান্ধতা
উত্তর: (গ) মানসিক দৃঢ়তা

৩৫। মহব্বতনগর গ্রামের মানুষদের ‘জাহেল’ বলা হয়েছে কেন?
(ক) তারা মূর্খ বলে (খ) তারা জেদি বলে
(গ) নিরক্ষর বলে (ঘ) পীরের মাজার ফেলে রেখেছে বলে
উত্তর: (ঘ) পীরের মাজার ফেলে রেখেছে বলে

৩৬। মহব্বতনগর আগমনের পূর্বে মজিদ কোথায় ছিল?
(ক) আউয়ালপুরে (খ) গারো পাহাড়ে
(গ) নোয়াখালীতে (ঘ) করিমগঞ্জে
উত্তর: (খ) গারো পাহাড়ে

৩৭। ‘লালসালু’ উপন্যাসে কে হাঁপানি রোগে আক্রান্ত?
(ক) সলেমনের বাপ (খ) কালুমতি
(গ) রেহান আলী (ঘ) মজিদ
উত্তর: (ক) সলেমনের বাপ

৩৮। কাপড়ে ঢাকা মানুষকে কোরআনের ভাষায় কী বলে?
(ক) মোদাব্বের (খ) মোদাচ্ছের
(গ) মোখলেস (ঘ) শহীদ
উত্তর: (খ) মোদাচ্ছের

৩৯। ‘লালসালু’ উপন্যাসের ‘মাছের পিঠের মতো মাজার’ বলতে রূপক অর্থে বোঝানো হয়েছে—
(ক) মাজারের গঠন (খ) মাজারের রহস্যময়তা
(গ) জমিদের ভণ্ডামি (ঘ) জমিলার প্রতিবাদ
উত্তর: (খ) মাজারের রহস্যময়তা

৪০। ‘আসলে সে ঠান্ডা ভীতু মানুষ’ বলতে ‘লালসালু’ উপন্যাসে কার কথা বলা হয়েছে?
(ক) জমিলা (খ) মজিদ
(গ) ব্যাপারী (ঘ) রহিমা
উত্তর: (ঘ) রহিমা

৪১। ‘লালসালু’ উপন্যাসে “হাড় বের করা দিনের কথা” বলতে কী বোঝানো হয়েছে?
(ক) প্রচণ্ড গরমে শরীরে পোশাক না থাকা (খ) প্রচণ্ড অভাবের দিনের কথা
(গ) রোগা মানুষের শারীরিক অবস্থার কথা (ঘ) মানুষের অত্যাচারে শরীরের হাড় বের করা
উত্তর: (খ) প্রচণ্ড অভাবের দিনের কথা

৪২। মজিদের সাথে বিয়ের আগে রহিমা ছিল—
(ক) বেওয়ারিশ (খ) বিধবা
(গ) খালেক ব্যাপারীর বউ (ঘ) ধলা মিয়ার বোন
উত্তর: (খ) বিধবা

৪৩। ‘তার আনুগত্য ধ্রুবতারার মতো অনড়’—কার?
(ক) জমিলার (খ) রহিমা
(গ) মজিদের (ঘ) খালেক ব্যাপারীর
উত্তর: (খ) রহিমা

৪৪। গ্রামের মানুষ খোদাকে স্মরণ করে কখন?
(ক) জমিতে ভালো ফসল ফললে (খ) জমিতে ফসল রোপণের সময়
(গ) ফসল কাটার সময় (ঘ) জমিতে ফাটল ধরলে
উত্তর: (ঘ) জমিতে ফাটল ধরলে

৪৫। ‘কলমা জানো মিঞা;—প্রশ্নটি মজিদ কাকে উদ্দেশ্য করে করেছিল?
(ক) তাহের কাদেরের বাপকে (খ) আক্কাসকে
(গ) দুদু মিঞাকে (ঘ) ধলা মিঞাকে
উত্তর: (গ) দুদু মিঞাকে

৪৬। ‘রহিমাও কেঁপে ওঠে, কী একটা মহাভয় তার রক্ত শীতল করে দেয়।’ ‘লালসালু’ উপন্যাসের উদ্ধৃতিতে রহিমার ভয়ের কারণ—
(ক) মজিদের নিষ্ঠুর আচরণ (খ) প্রাকৃতিক দুর্যোগের পূর্বাভাস
(গ) জমিলার বেপরোয়া আচরণ (ঘ) মাজারের ঐশী শক্তির কল্পনা
উত্তর: (ঘ) মাজারের ঐশী শক্তির কল্পনা

৪৭। মাজারের পাশে দাঁড়িয়ে রহিমা কার জন্য শান্তি প্রার্থনা করে?
(ক) আমেনার (খ) খেতানির মায়ের
(গ) জমিলার (ঘ) মজিদের
উত্তর: (খ) খেতানির মায়ের

৪৮। বুড়ো হাসুনির মাকে বেধড়ক প্রহার করে কেন?
(ক) আদেশ অমান্য করায় (খ) মজিদকে অপমান করায়
(গ) ঘরের কথা মজিদকে বলায় (ঘ) ঘরের বাইরে যাওয়ায়
উত্তর: (গ) ঘরের কথা মজিদকে বলায়

৪৯। ‘কথাটা মিথ্যা জেনেও প্রচণ্ড জ্বলে ওঠে অন্তর’—উক্তিটিতে কার অন্তর জ্বলে ওঠার কথা বোঝানো হয়?
(ক) রহিমা (খ) মজিদের
(গ) তাহেরের বাবার (ঘ) জমিলার
উত্তর: (গ) তাহেরের বাবার

৫০। মজিদ প্রথম যৌবনে কেমন বৌয়ের স্বপ্ন দেখত?
(ক) রহিমার মতো (খ) জমিলার মতো
(গ) আমেনার মতো (ঘ) হাসুনির মায়ের মতো
উত্তর: (ঘ) হাসুনির মায়ের মতো

৫১। কী বড় ভয়ঙ্কর বস্তু?
(ক) মানুষের হিংসা (খ) অর্থ
(গ) মানুষের ঈর্ষা (ঘ) মানুষের রসনা
উত্তর: (ঘ) মানুষের রসনা

৫২। ভেতরে ক্রোধের আগুন জ্বলছে বাইরে যত ঠাণ্ডা থাকুক না কেন— কার ভেতরে ক্রোধের আগুন জ্বলছে?
(ক) আক্কাসের (খ) খালেক ব্যাপারীর
(গ) মজিদের (ঘ) তাহের-কাদেরের বাপের
উত্তর: (ঘ) তাহের-কাদেরের বাপের

৫৩। ডেঙা বুড়োর বিচারে মজিদ কোন সুরা পাঠ করেছিল?
(ক) আল-ইমরান (খ) আল-বাকারা
(গ) আল-ফাতাহ (ঘ) আন-নূর
উত্তর: (ঘ) আন-নূর

৫৪। ‘অনুতাপ আর মায়া-মমতায় বাপের কাছে সে গলে গেছে।‘—এখানে হাসুনির মার কীসের অনুতাপ?
(ক) স্বামীর মৃত্যুতে অনুতাপ (খ) বাবার অপমানে অনুতাপ
(গ) মায়ের মৃত্যু কামনায় অনুতাপ (ঘ) বাবার মৃত্যু কামনায় অনুতাপ
উত্তর: (খ) বাবার অপমানে অনুতাপ

৫৫। ‘যেন শতসহস্র সর্প শিস দেয়’—উক্তিটির অন্তর্নিহিত তাৎপর্য কী?
(ক) মজিদের লোলুপ দৃষ্টি (খ) মজিদের কুবৃত্তি
(গ) মজিদের হিংস্র মনোভাব (ঘ) মজিদের বিষাক্ত চিন্তা
উত্তর: (ক) মজিদের লোলুপ দৃষ্টি

৫৬। “খেলোয়াড় চলে গেছে, খেলবে কার সাথে।”—এখানে ‘খেলোয়াড়’ কে?
(ক) মজিদ (খ) আক্কাস
(গ) সলেমনের বাপ (ঘ) তাহের-কাদেরের বাপ
উত্তর: (ঘ) তাহের-কাদেরের বাপ

৫৭। ‘মজিদের মন ক-দিন ধরে চিন্তায় ঘোরপাক খায়।‘— কারণ কী?
(ক) জমিলার অবাধ্যতা (খ) হাসুনির মায়ের উপস্থিতি
(গ) আউয়ালপুরের পিরের উপস্থিতি (ঘ) রহিমার সন্তান কামনা
উত্তর: (গ) আউয়ালপুরের পিরের উপস্থিতি

৫৮। আউয়ালপুরে আগত পিরের পূর্বপুরুষ কোথায় বাস করত?
(ক) মধ্যপ্রাচ্য (খ) ইরান
(গ) তুরস্ক (ঘ) সৌদি আরব
উত্তর: (ক) মধ্যপ্রাচ্য

৫৯। গ্রামে আগত পিরের পুরনো মুরিদ কে?
(ক) আলাউদ্দিন খাঁ (খ) মতলুব খাঁ
(গ) মোতালেব খাঁ (ঘ) মহি খাঁ
উত্তর: (খ) মতলুব খাঁ

৬০। ‘লালসালু’ উপন্যাসে মজিদ কোন সময় আউয়ালপুর গ্রামে পৌঁছালো?
(ক) সূর্য হেলে পড়লে (খ) দুপুরের পূর্বে
(গ) সূর্য ডুবে গেলে (ঘ) সূর্যোদয়ের সাথে সাথে
উত্তর: (ক) সূর্য হেলে পড়লে

৬১। ‘লালসালু’ উপন্যাসে হাসপাতালের অবস্থান কোথায়?
(ক) করিমগঞ্জে (খ) মহব্বতনগরে
(গ) আউয়ালগঞ্জে (ঘ) মতিগঞ্জে
উত্তর: (ক) করিমগঞ্জে

৬২। ‘ব্যাপারটা ঘোড়া ডিঙিয়ে ঘাস খাওয়ার মতো।’ কোন ব্যাপারটা?
(ক) আক্কাসের স্কুল প্রতিষ্ঠা
(খ) মেয়েলোকদের রহিমার কাছে আর্জি নিয়ে আসা
(গ) আমেনা বিবির জন্য আউয়ালপুরের কাছ থেকে পানি পড়া আনানো
(ঘ) জমিলার অবাধ্যতা
উত্তর: (গ) আমেনা বিবির জন্য আউয়ালপুরের কাছ থেকে পানি পড়া আনানো

৬৩। মজিদের ভাষায় স্ত্রীলোকদের সন্তানাদি হয় না কেন?
(ক) মাজারে শিরনি না দেওয়ায় (খ) পর্দাপ্রথা না মানায়
(গ) পেটে বেড়ি পড়ায় (ঘ) পিরদের পানিপড়া না খাওয়ায়
উত্তর: (গ) পেটে বেড়ি পড়ায়

৬৪। ‘লালসালু’ উপন্যাসে তাহের-কাদেরের মায়ের জানাজা কে পড়বে?
(ক) মজিদ (খ) আউয়ালপুরের পির
(গ) খালেক ব্যাপারী (ঘ) মোল্লা শেখ
উত্তর: (ঘ) মোল্লা শেখ

৬৫। আমেনা বিবি রোজা রাখে কী বার?
(ক) মঙ্গলবার (খ) শুক্রবার
(গ) সোমবার (ঘ) বুধবার
উত্তর: (খ) শুক্রবার

৬৬। মজিদের দোয়া পড়ার অস্পষ্ট মিহি আওয়াজকে কীসের সাথে তুলনা করা হয়েছে?
(ক) ঝরনার সাথে (খ) সুমধুর ধ্বনির সাথে
(গ) আদিম সাপের গতির সাথে (ঘ) বিচ্ছুরিত আলোর সাথে
উত্তর: (গ) আদিম সাপের গতির সাথে

৬৭। রহিমা আমেনা বিবির জন্য শখ করে কী রান্না করেছিল?
(ক) সেমাই (খ) পায়েস
(গ) ফিরনি (ঘ) ক্ষীর
উত্তর: (গ) ফিরনি

৬৮। আমেনা বিবি বিশেষ ভঙ্গিতে মাজারকে দেখে কেন?
(ক) শক্তির আধার ভেবে (খ) মজিদের আদেশে
(গ) নীরবতা উপলব্ধিতে (ঘ) লালসালু কাপড় দেখে
উত্তর: (ক) শক্তির আধার ভেবে

৬৯। “যেখানে সাপ জাগে, সেখানে আবার কোমলতার ফুল ফোটে।”— ‘লালসালু’ উপন্যাসের সেই বাক্যে ‘সাপ’ কী অর্থ প্রকাশ করে?
(ক) লালসা (খ) প্রতিহিংসা
(গ) কামনা (ঘ) প্রতিশোধ
উত্তর: (খ) প্রতিহিংসা

৭০। আক্কাসের বাবার নাম কী?
(ক) খালেক ব্যাপারী (খ) মোবারক মিয়া
(গ) কালু মিয়া (ঘ) মোদাব্বের মিয়া
উত্তর: (ঘ) মোদাব্বের মিয়া

৭১। ‘ওটা ছিল নিশানা, আনন্দের আর সুখের’—‘লালসালু’ উপন্যাসে ‘ওটা’ বলতে কী বোঝানো হয়েছে?
(ক) মসজিদ (খ) মাজার
(গ) নৌকা (ঘ) তালগাছ
উত্তর: (ঘ) তালগাছ

৭২। মসজিদ নির্মাণে খালেক ব্যাপারী কত আনা ব্যয় বহন করতে চায়?
(ক) ১০ আনা (খ) ১২ আনা
(গ) ১৪ আনা (ঘ) ১৬ আনা
উত্তর: (খ) ১২ আনা

৭৩। ঘরের ম্লান আলোয় কবরের অনাবৃত অংশটা কিসের মতো দেখায়—
(ক) মৃত মানুষের চোখের মতো (খ) উজ্জ্বল রুপালি চাঁদ
(গ) মাছের পিঠের মতো (ঘ) ঘোড়ার চোখের মতো
উত্তর: (ক) মৃত মানুষের চোখের মতো

৭৪। ‘তানি বুঝি দুলার বাপ’ ।— জমিলা কার সম্পর্কে এ উক্তি করেছে?
(ক) মোদাব্বের মিঞা (খ) খালেক বেপারী
(গ) মতলুব মিঞা (ঘ) মজিদ
উত্তর: (ঘ) মজিদ

৭৫। ‘লালসালু’ উপন্যাসের অবিশ্রান্ত ঢোলক বেজে চলে কোথায়?
(ক) মতিগঞ্জে (খ) গারো পাহাড়ে
(গ) ডোম পাড়ায় (ঘ) আউয়ালপুরে
উত্তর: (গ) ডোম পাড়ায়

৭৬। ‘সে যেন খাঁচায় ধরা পড়েছে।‘— কে খাঁচায় ধরা পড়েছে?
(ক) রহিমা (খ) জমিলা
(গ) আমেনা (ঘ) হাসুনির মা
উত্তর: (খ) জমিলা

৭৭। আমার বুদ্ধিতে জানি কুলায় না। তোমারে জিগাই, তুমিই কও।— এখানে মজিদ চরিত্রের কোন দিকটি প্রকাশ পেয়েছে?
(ক) নির্বুদ্ধিতা (খ) অসহায়ত্ব
(গ) কিংকর্তব্যবিমূঢ়তা (ঘ) দ্বিধান্বিত সত্তা
উত্তর: (খ) অসহায়ত্ব

৭৮। মজিদকে জমিলার থুতু দেওয়ার মধ্যে কী প্রকাশ পায়?
(ক) বিদ্রোহ (খ) ক্ষোভ
(গ) ঘৃণা (ঘ) সারল্য
উত্তর: (ক) বিদ্রোহ

৭৯। ‘লালসালু’ উপন্যাসের শেষ বাক্য কোনটি?
(ক) নাফরমানি করিও না
(খ) মুহূর্তের মধ্যে কেয়ামত হবে
(গ) খোদার উপর তোয়াক্কল রাখ
(ঘ) বিশ্বাসের পাথরে যেন খোদাই সে-চোখ
উত্তর: (ঘ) বিশ্বাসের পাথরে যেন খোদাই সে-চোখ

৮০। ‘ধান দিয়া কী হইব, মানুষের জান যদি না থাকে’— উক্তিটিতে কী মনোভাব প্রকাশ পেয়েছে?
(ক) ক্ষোভ (খ) নিন্দা
(গ) অভিমান (ঘ) কটুকথা
উত্তর: (ক) ক্ষোভ

৮১। ‘বাহে মুলুক’ বলতে ‘লালসালু’ উপন্যাসের কোন অঞ্চলকে বোঝানো হয়েছে?
(ক) উত্তরাঞ্চল (খ) দক্ষিণাঞ্চল
(গ) পূর্বাঞ্চল (ঘ) পশ্চিমাঞ্চল
উত্তর: (ক) উত্তরাঞ্চল

৮২। ‘নিরাকপড়া’ কথাটির অর্থ কী?
(ক) জনমানবশূন্য নিস্তব্ধ পরিবেশ
(খ) ভাদ্র মাসের শেষের বৃষ্টির অবস্থা
(গ) বাতাসহীন নিস্তব্ধ গুমোট আবহাওয়া
(ঘ) মেঘহীন গুমোট অবস্থা
উত্তর: (গ) বাতাসহীন নিস্তব্ধ গুমোট আবহাওয়া

৮৩। ‘বতোর’ কাদের উৎসব?
(ক) কৃষকদের (খ) ব্যবসায়ীদের
(গ) পির সম্প্রদায়ের (ঘ) পিরের মুরিদদের
উত্তর: (ক) কৃষকদের

৮৪। ‘রূঠা জমি’ কী?
(ক) নিষ্ফলা জমি (খ) উর্বরা জমি
(গ) ধানী জমি (ঘ) নিরাক জমি
উত্তর: (ক) নিষ্ফলা জমি

৮৫। ‘লালসালু’ উপন্যাসে অশীতিপর বৃদ্ধ কে?
(ক) পিরসাহেব (খ) আক্কাসের বাপ
(গ) সলেমনের বাপ (ঘ) তাহের-কাদেরের বাপ
উত্তর: (গ) সলেমনের বাপ

৮৬। ছোটবেলায় নোলক পরে হলদে শাড়ি পেঁচিয়ে ছুটোছুটি করত কে?
(ক) জমিলা (খ) আমেনা
(গ) হাসুনির মা (ঘ) রহিমা
উত্তর: (ঘ) রহিমা

৮৭। ‘ওনারে কন, আমার মওতের জন্য জানি দোয়া করে’— উক্তিটি কার?
(ক) রহিমা (খ) জমিলা
(গ) আমেনা (ঘ) হাসুনির মা
উত্তর: (ঘ) হাসুনির মা

৮৮। ‘লালসালু’ উপন্যাসে ঝড় এলে হৈ হৈ করার অভ্যাস কার?
(ক) হাসুনির মার (খ) জমিলার
(গ) রহিমার (ঘ) মজিদের
উত্তর: (ক) হাসুনির মার

৮৯। ‘লালসালু’ উপন্যাসে সিদ্ধ ধানের ভাপের শব্দটি ঔপন্যাসিক কীসের সাথে তুলনা করেছেন?
(ক) সাপের শিস (খ) কালো ধোঁয়া
(গ) আগুনের শিখা (ঘ) আলোকিত উঠান
উত্তর: (ক) সাপের শিস

৯০। ‘মজিদের মন ক-দিন ধরে চিন্তায় ঘোরপাক খায়।‘— কারণ কী?
(ক) জমিলার অবাধ্যতা (খ) হাসুনির মায়ের উপস্থিতি
(গ) আউয়ালপুরের পিরের উপস্থিতি (ঘ) রহিমার সন্তান কামনা
উত্তর: (গ) আউয়ালপুরের পিরের উপস্থিতি

৯১। “এখন সে ঝড়ের মুখে উড়ে চলা পাতা নয়”— ‘লালসালু’ উপন্যাসের এ বাক্যে প্রকাশ পেয়েছে মজিদের—
(ক) ধর্মীয় ও আর্থিক প্রভাব (খ) আর্থিক ও শারীরিক সক্ষমতা
(গ) আর্থিক ও সামাজিক প্রতিষ্ঠা (ঘ) ধর্মীয় ও সামাজিক প্রতিপত্তি
উত্তর: (গ) আর্থিক ও সামাজিক প্রতিষ্ঠা

৯২। ‘ও কি ঘরে বালা আনবার চায় নাকি? চায় নাকি আমার সংসার উচ্ছন্নে যাক, মড়ক লাগুক ঘরে’ উক্তিটি করেছিল—
(ক) খালেক ব্যাপারী (খ) মজিদ
(গ) রহিমা (ঘ) জমিলা
উত্তর: (খ) মজিদ

৯৩। “বিশ্বাসের পাথরে যেন খোদাই সে চোখ।” ‘লালসালু’ উপন্যাসে গ্রামবাসী সম্পর্কে লেখকের এ মন্তব্যের তাৎপর্য—
(ক) আত্মবিধ্বংসী ধর্মান্ধতা (খ) যুক্তিনিষ্ঠ আনুগত্য
(গ) বিশ্বাস ও যুক্তি দ্বান্দ্বিকতা (ঘ) অপরিসীম বিনয়
উত্তর: (ক) আত্মবিধ্বংসী ধর্মান্ধতা

৯৪। সর্বদর্শী অবস্থান থেকে কাহিনি বর্ণনা করা হয়েছে কোন রচনাটিতে?
(ক) লালসালু (খ) অপরিচিতা
(গ) বিলাসী (ঘ) আহ্বান
উত্তর: (ক) লালসালু

৯৫। বাংলাদেশের কথাসাহিত্যকে আন্তর্জাতিক মানে উন্নীত করার পথিকৃৎ কে?
(ক) সৈয়দ ওয়ালীউল্লাহ (খ) মীর মোশাররফ হোসেন
(গ) কাজী নজরুল ইসলাম (ঘ) আবু ইসহাক
উত্তর: (ক) সৈয়দ ওয়ালীউল্লাহ

৯৬। ‘লালসালু’ উপন্যাস অনুযায়ী কী না হলে বিদেশে এক পাও চলে না?
(ক) টাকা (খ) বদনা
(গ) হারিকেন (ঘ) টুপি
উত্তর: (খ) বদনা

৯৭। ‘লালসালু’ উপন্যাসে ঔপন্যাসিক রেলগাড়ির দৈর্ঘ্য দ্বারা কিসের ইঙ্গিত দিয়েছেন?
(ক) সভ্যতার (খ) আধুনিকতার
(গ) নোয়াখালির মানুষের (ঘ) যোগাযোগ ব্যবস্থার
উত্তর: (গ) নোয়াখালির মানুষের

৯৮। মজিদ মোনাজাতের ভঙ্গিতে দাঁড়িয়ে ছিল কেন?
(ক) আল্লাহ সন্তুষ্টি অর্জনে (খ) আল্লাহওয়ালা ভাব প্রদর্শনে
(গ) গভীর ধ্যানে (ঘ) পিরসাহেবের আদেশে
উত্তর: (খ) আল্লাহওয়ালা ভাব প্রদর্শনে

৯৯। মজিদের শারীরিক গড়নের ক্ষেত্রে নিচের কোনটি প্রযোজ্য?
(ক) মোটাসোটা (খ) যৌবনশক্তির অধিকারী
(গ) শীর্ণকায় (ঘ) তেজস্বী পুরুষ
উত্তর: (গ) শীর্ণকায়

১০০। মোদাচ্ছের পিরের কবর আবিষ্কার করায় মজিদ চরিত্রের কোন দিকটি উন্মোচিত হয়েছে?
(ক) ধর্মভীরুতা (খ) ধর্মান্ধতা
(গ) সচেতনতা (ঘ) মিথ্যাচার
উত্তর: (ঘ) মিথ্যাচার

১০১। বিভিন্ন গ্রাম থেকে মহব্বতনগরে মানুষ আসতে লাগে কেন?
(ক) মজিদকে দেখতে (খ) মাজার দেখতে
(গ) মোদাচ্ছের পিরকে দেখতে (ঘ) মাজারে মানত করতে
উত্তর: (ঘ) মাজারে মানত করতে

১০২। রহিমা চরিত্রের ক্ষেত্রে নিচের কোনটি প্রযোজ্য?

১৪৩। জমিলা থরথর করে কাঁপতে থাকে কেন?
(ক) ভয়ে (খ) ক্রোধে
(গ) লজ্জায় (ঘ) অভিমানে
উত্তর: (খ) ক্রোধে

১৪৪। দুদু মিঞা কয় ছেলের বাবা?
(ক) পাঁচ (খ) ছয়
(গ) সাত (ঘ) আট
উত্তর: (গ) সাত

১৪৫। পশ্চিম আকাশে শুকতারা কখন জ্বলে?
(ক) মধ্যরাতে (খ) শেষরাতে
(গ) সন্ধ্যাকালে (ঘ) ফজর শেষে
উত্তর: (খ) শেষরাতে

১৪৬। লড়াই করে প্রত্যাবর্তন করার সময় কে নবীর দলচ্যুত হন?
(ক) খাদিজা (খ) আয়েশা
(গ) জমিলা (ঘ) রহিমা
উত্তর: (খ) আয়েশা

১৪৭। মজিদ বিদেশ বিভুঁইয়ে অবস্থান করছিল কেন?
(ক) অশিক্ষিতদের মধ্যে খোদার আলো ছড়াতে
(খ) নিজ গ্রামে কবর ছিল না বলে
(গ) কবরকে পীরের মাজারে পরিণত করতে
(ঘ) নিজে এলেম শিক্ষা লাভ করতে
উত্তর: (ক) অশিক্ষিতদের মধ্যে খোদার আলো ছড়াতে

১৪৮। লোকেরা ধান কাটার সাথে আর কী করে?
(ক) আঁটি বাঁধে (খ) বকাঝকা করে
(গ) গীত গায় (ঘ) হাসাহাসি করে
উত্তর: (গ) গীত গায়

১৪৯। পশ্চিম থেকে যে এলেম শিখে এসেছে সে বোঝানোর পন্থাটা কী করে তোলে?
(ক) বৈজ্ঞানিক (খ) অবৈজ্ঞানিক
(গ) প্রাঞ্জল (ঘ) কঠিন
উত্তর: (ক) বৈজ্ঞানিক

১৫০। আমেনা বিবির ঘর ভাঙার পিছনে কোনটি কাজ করেছে?
(ক) সন্তান না হওয়া
(খ) মজিদের জিজ্ঞাসা
(গ) খালেক ব্যাপারীর অন্য নারীতে আসক্তি
(ঘ) রহিমা বিবির কূট-কৌশল
উত্তর: (খ) মজিদের জিজ্ঞাসা

১৫১। কোন দিনের কথা মনে হলে মজিদ শিউরে ওঠে?
(ক) আওয়ালপুরের পীর সাহেবের কথা
(খ) মজিদের কুকর্মের কথা
(গ) গারো পাহাড়ের কষ্টের দিনগুলোর কথা
(ঘ) হাশরের দিনের বিচারের কথা
উত্তর: (গ) গারো পাহাড়ের কষ্টের দিনগুলোর কথা

১৫২। জমিলাকে মাজারে সারা রাত বেঁধে রেখে শাস্তি দেওয়ার মধ্যে কী প্রকাশ পায়?
(ক) আধিপত্য রক্ষার চেষ্টা (খ) প্রতিশোধ স্পৃহা
(গ) অত্যাচারের চেষ্টা (ঘ) পাগলামি
উত্তর: (ক) আধিপত্য রক্ষার চেষ্টা

১৫৩। দশ কথায় রা নেই-কার?
(ক) রহিমা (খ) বুড়ির
(গ) হাসুনির মার (ঘ) তাহেরের বাপের
উত্তর: (ক) রহিমা

১৫৪। মাজারে রহিমা কাদের জন্য দোয়া করে?
(ক) মহব্বতনগরবাসীর জন্য (খ) মানবজাতির জন্য
(গ) বাপের বাড়ির মানুষের জন্য (ঘ) শ্বশুরবাড়ির জন্য
উত্তর: (খ) মানবজাতির জন্য

১৫৫। ‘ওগো কথা শুনলে পুরুষ মানুষ আর পুরুষ থাকে না, মেয়ে মানুষের অধম হয়।’ উক্তিটি কার?
(ক) মজিদের (খ) খালেক ব্যাপারীর
(গ) আওয়ালপুরের পীর সাহেবের (ঘ) মোদাচ্ছের পীরের
উত্তর: (ক) মজিদের

১৫৬। সারিবদ্ধ হয়ে মজুররা কিসের মতো কাস্তে নিয়ে ধান কাটে?
(ক) দ্বিতীয়র তারার মতো (খ) দ্বিতীয়র চাঁদের মতো
(গ) ধনুকের মতো (ঘ) তীরের মতো
উত্তর: (খ) দ্বিতীয়র চাঁদের মতো

১৫৭। মহব্বতনগর গ্রামের লোকগুলো ইদানীং কেমন হয়ে উঠেছে?
(ক) পরহেজগার (খ) দরিদ্র
(গ) অবস্থাপন্ন (ঘ) কবর ব্যবসায়ী
উত্তর: (গ) অবস্থাপন্ন

১৫৮। ‘থাক, কইবার দাও। খোদাই তার শাস্তি করিবে।'—কার উক্তি?
(ক) তাহেরের (খ) কাদেরের
(গ) রতনের (ঘ) হাসুনির মার
উত্তর: (খ) কাদেরের

১৫৯। খালেক ব্যাপারী মসজিদ নির্মাণে খরচের কত আনা বহন করতে চায়?
(ক) দশ আনা (খ) এগারো আনা
(গ) বার আনা (ঘ) ষোল আনা
উত্তর: (গ) বার আনা

১৬০। বুড়ি কেমনভাবে আল্লা, আল্লা বলে?
(ক) শিশুর মতো (খ) যুবকের মতো
(গ) কিশোরের মতো (ঘ) প্রৌঢ়ের মতো
উত্তর: (ক) শিশুর মতো

১৬১। পোলাটার জান ফিরাইয়া দেওয়ার জন্য খ্যান্তা বুড়ি মজিদকে কী দেয়?
(ক) তিন আনা (খ) পাঁচ আনা
(গ) ছয় আনা (ঘ) সাত আনা
উত্তর: (খ) পাঁচ আনা

১৬২। আক্কাস কোথায় কাজ করত?
(ক) পাটের আড়তে (খ) লঞ্চঘাটে
(গ) কাগজের মিলে (ঘ) সবজির আড়তে
উত্তর: (ক) পাটের আড়তে

১৬৩। সহজ প্রাণধর্মের উজ্জ্বল প্রতীক কে?
(ক) রহিমা (খ) জমিলা
(গ) আমেনা (ঘ) তানু বিবি
উত্তর: (খ) জমিলা

১৬৪। রেলগাড়ির কিসের কাঁটা নড়ে না?
(ক) ঘড়ির কাঁটা (খ) ইঞ্জিনের কাঁটা
(গ) ধৈর্যের কাঁটা (ঘ) ঝুপড়ির কাঁটা
উত্তর: (গ) ধৈর্যের কাঁটা

১৬৫। গ্রামবাসীর অন্তর কিসে জর্জরিত হয়ে ওঠে?
(ক) গালাগাল খেয়ে (খ) ব্যথায়
(গ) ক্ষোভে (ঘ) অনুশোচনায়
উত্তর: (ঘ) অনুশোচনায়

১৬৬। 'শত্রুর আভাস পাওয়া হরিণের চোখের মতোই সতর্ক হয়ে ওঠে তার চোখ'—কার চোখ?
(ক) আমেনার (খ) জমিলা
(গ) মজিদের (ঘ) খালেক ব্যাপারীর
উত্তর: (খ) জমিলার

১৬৭। ‘তাছির’ শব্দের অর্থ কী?
(ক) তোয়াজ করা (খ) পরিচর্যা করা
(গ) প্রতিবাদ করা (ঘ) প্রভাব
উত্তর: (ঘ) প্রভাব

১৬৮। মজিদের পাগড়ির পেছনটায় কতখানি লেজ ছিল?
(ক) হাত খানেক (খ) বিঘৎ খানেক
(গ) দেড় হাত (ঘ) চার আঙুল
উত্তর: (খ) বিঘৎ খানেক

১৬৯। তাহেরের বাবাকে দেখে সবার বিদ্বেষ আর ঘৃণা আসে কেন?
(ক) অত্যাচারী বলে (খ) মজিদের প্ররোচনায়
(গ) ধর্মীয় গোঁড়ামিতে (ঘ) আরবি না জানায়
উত্তর: (খ) মজিদের প্ররোচনায়

১৭০। নিদারুণ ভয়ে কে অসাড় হয়ে যায়?
(ক) রহিমা (খ) জমিলা
(গ) আমেনা বিবি (ঘ) ধলা মিঞা
উত্তর: (গ) আমেনা বিবি

১৭১। কবরের গায়ে কী লেগে ছিল?
(ক) জমিলার হাত (খ) জমিলার পা
(গ) জমিলার মাথা (ঘ) জমিলার মুখ
উত্তর: (খ) জমিলার পা

১৭২। মজিদের চোখ ছোট হয়ে আসে কেন?
(ক) প্রখর রোদে (খ) প্রচণ্ড রাগে
(গ) মজুরদের গীত শুনে (ঘ) প্রতিহিংসার কারণে
উত্তর: (গ) মজুরদের গীত শুনে

১৭৩। “মাটিরে কষ্ট দেওন গুনাহ।” মজিদের এই উক্তির মধ্যে আছে কোনটি?
(ক) ধর্মান্ধতা (খ) বিশ্বাস
(গ) ধার্মিকতা (ঘ) অজ্ঞতা
উত্তর: (খ) বিশ্বাস

১৭৪। গ্রামের আশেপাশে কারা আস্তানা গাড়লে মজিদ শঙ্কিত হয়ে ওঠে?
(ক) মৌলবিরা (খ) জাঁদরেল পীররা
(গ) প্রতিবেশীরা (ঘ) স্কুল মাস্টাররা
উত্তর: (খ) জাঁদরেল পীররা

১৭৫। মহব্বতনগর গ্রামের কয় গ্রাম পর নতুন এক পীর সাহেব এসেছে?
(ক) তিন গ্রাম (খ) চার গ্রাম
(গ) পাঁচ গ্রাম (ঘ) ছয় গ্রাম
উত্তর: (ক) তিন গ্রাম

১৭৬। মজিদ আওয়ালপুরের পীরের কাছে গিয়েছিল কেন?
(ক) অস্তিত্ব রক্ষায় (খ) পীর দর্শনে
(গ) সমস্যার সমাধানে (ঘ) মানত করতে
উত্তর: (ক) অস্তিত্ব রক্ষায়

১৭৭। ‘লালসালু’ উপন্যাসের প্রথম প্রকাশক কে?
(ক) সৈয়দ ওয়ালীউল্লাহ (খ) সৈয়দ হাবিবুল্লাহ
(গ) মুহাম্মদ আতাউল্লাহ (ঘ) নওরোজ কিতাবিস্তান
উত্তর: (গ) মুহাম্মদ আতাউল্লাহ

১৭৮। ‘লালসালু’ উপন্যাসে মেয়েলোকের মশরা বলতে বোঝানো হয়েছে—
(ক) নারীর অধিকার চেতনা (খ) নারী স্বাধীনতা
(গ) নারীর ইচ্ছা-অনিচ্ছা (ঘ) নারীর হাসি-তামাশা
উত্তর: (ক) নারীর অধিকার চেতনা

১৭৯। ‘আমার বুদ্ধিতে জানি কুলায় না’— মজিদের এই উক্তিতে প্রকাশ পেয়েছে—
(ক) অসহায়ত্ব (খ) অস্তিত্ববোধ
(গ) ধর্মবোধ (ঘ) অপারগতা
উত্তর: (ক) অসহায়ত্ব

১৮০। আগত পীরসাহেব সম্পর্কে লোকে কী বলে?
(ক) তার অলৌকিক ক্ষমতা ছিল
(খ) মরা মানুষ জিন্দা করতে পারত
(গ) এককালে তার চোখে আগুন ছিল
(ঘ) সহি পীরের খাঁটি ক্ষমতা ছিল
উত্তর: (খ) মরা মানুষ জিন্দা করতে পারত

১৮১। কাদের স্থান বেহেশতে সুনির্দিষ্ট?
(ক) আলেম (খ) মৌলবি
(গ) মাওলানা (ঘ) হাফেজ
উত্তর: (ঘ) হাফেজ

১৮২। মজিদের মতে দুনিয়ার মানুষের মতো কারা তাকে ভয় পায়?
(ক) ফেরেশতারা (খ) জিন-পরীরা
(গ) ভূতেরা (ঘ) হিংস্র প্রাণীরা
উত্তর: (খ) জিন-পরীরা

১৮৩। ‘ও যেন ঘোর পাপী।—এখানে কার কথা বলা হয়েছে?
(ক) মজিদ (খ) আক্কাস
(গ) খালেক ব্যাপারী (ঘ) তাহেরের বাপ
উত্তর: (ঘ) তাহেরের বাপ

১৮৪। গ্রামের লোকেরা কী চেনে?
(ক) মাজার আর কুসংস্কার (খ) জমি আর ধান
(গ) মাটি আর গান (ঘ) ধান আর গান
উত্তর: (খ) জমি আর ধান

১৮৫। মানুষের রসনা কার রসনার চেয়েও ভয়ঙ্কর বলে মজিদ মনে করে?
(ক) আগুনের (খ) সাপের
(গ) বাঘের (ঘ) জন্তু-জানোয়ারের
উত্তর: (খ) সাপের

১৮৬। ‘লালসালু’ উপন্যাসে নবাগত লোকটির কোটরাগত চোখে কী ছিল?
(ক) রাগ (খ) ক্ষোভ
(গ) প্রতিহিংসা (ঘ) আগুন
উত্তর: (ঘ) আগুন

১৮৭। ছোটবেলায় নাকে লোলক পরে হলদে শাড়ি পেঁচিয়ে ছোটাছুটি করত কে?
(ক) জমিলা (খ) রহিমা
(গ) হাসুনির মা (ঘ) আমেনা
উত্তর: (খ) রহিমা

১৮৮। মজিদ বুড়োকে মাজারে পাঁচপয়সা শিরনি দিতে বলে কেন?
(ক) দান হিসেবে (খ) মানত হিসেবে
(গ) শাস্তি হিসেবে (ঘ) মনোবাসনা পূর্ণ হওয়ায়
উত্তর: (ক) দান হিসেবে

১৮৯। ‘বিবি শিলাবৃষ্টি শুরু হইছে’—এ কথাটি দ্বারা মজিদ রহিমাকে কোনটি বুঝাতে চেয়েছে?
(ক) খোদা শয়তানকে তাড়াচ্ছে
(খ) লুপে লুপে খোদার ঢিল খাওয়ার সুযোগ হইছে
(গ) মাঠের ধান সব নষ্ট হচ্ছে
(ঘ) উপরের কোনোটিই নয়
উত্তর: (গ) মাঠের ধান সব নষ্ট হচ্ছে

১৯০। ব্যাপারীর অসহায়ত্বের মধ্যে কী প্রকাশ পেয়েছে?
(ক) অলৌকিক শক্তির কাছে দীন
(খ) কূটকৌশলের কাছে কিংকর্তব্যবিমূঢ়
(গ) প্রতারণার ফাঁদে নিরুপায়
(ঘ) অন্ধবিশ্বাসে বলীয়ান
উত্তর: (ঘ) অন্ধবিশ্বাসে বলীয়ান

১৯১। চির নীরব মাজারটি গ্রামবাসীদের কাছে রহস্যময় কেন?
(ক) তারা মাজার সম্পর্কে অজ্ঞ (খ) ধর্মের প্রতি উদাসীন
(গ) মাজারকে ভয় পায় (ঘ) মাজারকে শ্রদ্ধা করে
উত্তর: (ক) তারা মাজার সম্পর্কে অজ্ঞ

১৯২। মজিদ আমেনা বিবিকে তালাক দিতে বলে কেন?
(ক) শরীরের দুর্বলতার জন্য তিনি অজ্ঞান হননি বলে
(খ) মাজারের চারপাশে সাতবার ঘুরতে না পারার ব্যর্থতার জন্য
(গ) পাক দিল আর গুণাহগার দিল এক সুতায় বাঁধা থাকে বলে
(ঘ) পানিপড়া খেয়ে তিনি সাত পাক দিতে পারলেন বলে
উত্তর: (গ) পাক দিল আর গুণাহগার দিল এক সুতায় বাঁধা থাকে বলে

১৯৩। ‘লালসালু’ উপন্যাসে মজিদ চরিত্রটি কোন প্রকৃতির?
(ক) ধূর্ত (খ) বিচক্ষণ
(গ) অস্তিত্বকামী (ঘ) মনস্তাত্ত্বিক
উত্তর: (গ) অস্তিত্বকামী

১৯৪। আমেনা বিবির প্রতি মজিদের কোন দৃষ্টিভঙ্গির প্রকাশ ঘটেছে?
(ক) দয়া (খ) স্নেহ
(গ) লালসা (ঘ) ভালোবাসা
উত্তর: (গ) লালসা

১৯৫। নোয়াখালি অঞ্চলের মানুষেরা কোন বয়সে হাফেজ হয়?
(ক) শিশু বয়সে (খ) কিশোর বয়সে
(গ) গোঁফ না উঠতেই (ঘ) বয়স বাড়লে
উত্তর: (গ) গোঁফ না উঠতেই

১৯৬। প্রথম যৌবনে মজিদ কেমন বৌ-এর স্বপ্ন দেখত?
(ক) রহিমার মতো (খ) হাসুনির মায়ের মতো
(গ) জমিলার মতো (ঘ) আমেনার মতো
উত্তর: (খ) হাসুনির মায়ের মতো

১৯৭। ঘুমকাতুরে কে?
(ক) জমিলা (খ) রহিমা
(গ) আমেনা (ঘ) ভানু বিবি
উত্তর: (ক) জমিলা

১৯৮। নামাজের সময় সিজদায় গিয়ে কে আর উঠেনি?
(ক) রহিমা (খ) আমেনা
(গ) জমিলা (ঘ) মজিদ
উত্তর: (গ) জমিলা

১৯৯। আমেনা বিবির আনন্দ আর সুখের নিশানা কী?
(ক) থোতা মুখের তালগাছ (খ) তেঁতুলগাছ
(গ) মাজার (ঘ) বড় নদী
উত্তর: (ক) থোতা মুখের তালগাছ

২০০। ‘লালসালু’ উপন্যাসে মানুষের দুনিয়া আর খোদার দুনিয়া আলাদা হয়ে গেছে কীভাবে?
(ক) সীমাহীন কাশ কালো আবরণে সীমাবদ্ধ বলে
(খ) মাজারে আলো জ্বলে কিন্তু গ্রামে অন্ধকার বলে
(গ) খড়কুটোর আলোয় প্রাঙ্গণ আলোকিত হলেও আকাশ অন্ধকার তাই
(ঘ) মানুষ দুনিয়াকে আলোকিত করে আর খোদা আকাশ আলোকিত করে
উত্তর: (খ) মাজারে আলো জ্বলে কিন্তু গ্রামে অন্ধকার বলে

২০১। কোঁচ কী?
(ক) হরিণ শিকারের যন্ত্রবিশেষ (খ) কুমির শিকারের যন্ত্রবিশেষ
(গ) মাছ ধরার যন্ত্রবিশেষ (ঘ) পাখি শিকারের যন্ত্রবিশেষ
উত্তর: (গ) মাছ ধরার যন্ত্রবিশেষ

২০২। 'গরিব মানুষ, খাইবার পাই না।' উক্তিটির মর্মকথা কী?
(ক) ক্ষুধা-তৃষ্ণার কাছে সব ম্লান (খ) নির্যাতিতদের আর্তনাদ
(গ) প্রতিবাদী চেতনা (ঘ) ক্ষুধা দারিদ্র্যপীড়িত জীবন
উত্তর: (ক) ক্ষুধা-তৃষ্ণার কাছে সব ম্লান

২০৩। "সজ্ঞানে না জানলেও তারা একাট্টা, পথ তাদের এক।" —উক্তিটির তারা হলো—
(ক) নতুন পীর ও মজিদ (খ) খালেক ব্যাপারী ও মজিদ
(গ) নতুন পীর ও খালেক ব্যাপারী (ঘ) খালেক ব্যাপারী ও ধলা মিয়া
উত্তর: (খ) খালেক ব্যাপারী ও মজিদ

২০৪। 'লালসালু' উপন্যাসের প্রতিপাদ্য বিষয়—
i. কুসংস্কারাচ্ছন্নতা
ii. অতিপ্রাকৃত ঘটনা
iii. মাজার কেন্দ্রিক ধর্ম ব্যবসায়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

২০৫। 'লালসালু' উপন্যাসের চরিত্রসমূহ একদিকে—
i. কুসংস্কারাচ্ছন্ন ধর্মভীরু
ii. শোষিত-বঞ্চিত
iii. দরিদ্র গ্রামবাসী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২০৬। সৈয়দ ওয়ালীউল্লাহর মতে, ধর্মের ভিত্তিকে দুর্বল করে দিয়েছে—
i. অন্ধবিশ্বাস
ii. শঠতা
iii. কুসংস্কার
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২০৭। 'লালসালু' উপন্যাসে জমিলা চরিত্র অনন্য হয়ে উঠেছে—
i. প্রাণময় সত্তার উপস্থিতিতে
ii. কৈশোরের অবাধ্যতায়
iii. প্রতিবাদী আচরণে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২০৮। 'শস্যের চেয়ে টুপি বেশি, ধর্মের আগাছা বেশি।' উক্তিটির তাৎপর্য—
i. শস্যের খেতে আগাছা বেশি জন্মায়
ii. প্রচণ্ড অভাব অনটন থাকলেও মানুষগুলো ধর্মভীরু
iii. খাদ্য না থাকায় বেশিরভাগ মানুষ ধর্মাচার ও ভণ্ডামির আশ্রয় নেয়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

২০৯। 'লালসালু' উপন্যাসে দিনের পর দিন কবরের কোলে যা ব্যক্ত হতে লাগল, তা হলো—
i. মানুষের মর্মন্তুদ কান্না
ii. অশ্রুজল কৃতজ্ঞতা
iii. আশার কথা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২১০। 'মন তাদের দোটানার দ্বন্দ্বে দোল খায়।' —কেন?
i. নতুন পীরের প্রতি অবিশ্বাসে
ii. মজিদের প্রতি বিশ্বাসে
iii. নতুন পীরের প্রতি বিশ্বাসে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

২১১। 'দুনিয়াটা বড় বিচিত্র জায়গা। সময়-অসময়ে মিথ্যা কথা না বললে নয়।' —এ কথার মধ্যে মজিদ চরিত্রের যে দিকটি প্রকাশিত হয়েছে—
i. অনুশোচনা বোধ
ii. অস্তিত্ব রক্ষার প্রয়াস
iii. আত্মপক্ষ সমর্থনের চেষ্টা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২১২। রহিমা মজিদের দ্বিতীয় বিয়েতে প্রতিবাদ করে না কেন?
i. স্বামী ভক্তি ii. ধর্মনিষ্ঠা
iii. সমাজের আনুগত্য
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

২১৩। 'বিশ্বাসের পাথরে যেন খোদাই সে-চোখ'—উক্তিটির তাৎপর্য হলো—
i. নির্দ্বিধায় বিশ্বাস করা
ii. বিশেষ ক্ষমতার অধিকারী
iii. অন্ধভাবে বিশ্বাস করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ২১৪ ও ২১৫ নং প্রশ্নের উত্তর দাও।
'পদ্মানদীর মাঝি' উপন্যাসের হোসেন মিয়া যখন কেতুপুরে প্রথম এসেছিল তখন সে ছিল খুবই দরিদ্র। পরণে ছিল একটা ছেঁড়া লুঙ্গি। সময়ের আবর্তনে এখন সে অনেক সম্পদ ও প্রতিপত্তির মালিক।

২১৪। উদ্দীপকের হোসেন মিয়া ও 'লালসালু' উপন্যাসের মজিদ উভয়ই—
(ক) আগন্তুক (খ) ভণ্ড
(গ) ধার্মিক (ঘ) লোভী
উত্তর: (ক) আগন্তুক

২১৫। মজিদের মতো হোসেন মিয়াও—
i. সফল ii. কর্মঠ iii. ভাগ্যান্বেষী
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ২১৬ ও ২১৭ নং প্রশ্নের উত্তর দাও।
ন্যায়-অন্যায় বোধের চেয়েও আপন অস্তিত্বকে টিকিয়ে রাখার লড়াই আজ বড় হয়ে উঠেছে মালেকের জীবনে। তাই গাছের শিকড় তাবিজে ভরে তা স্বপ্নে পাওয়া ঔষধ বলে লোক ঠকাতে তার এতটুকু বাধে না।

২১৬। উদ্দীপকের মালেক ‘লালসালু’ কোন চরিত্রের প্রতিনিধিত্ব করে?
(ক) মজিদ (খ) খালেক ব্যাপারী
(গ) মতলুব খাঁ (ঘ) আওয়ালপুরের পীর
উত্তর: (ক) মজিদ

পীর সাহেব মহিলাদের প্রতি দুর্বল হওয়ায় বাড়িতে গিয়ে পর্দার আড়ালে নারীদেরকে নানারকম বক্তব্য দেয়। প্রয়োজনে মুরিদের সুন্দরী বউকে কৌশলে তালাক দিয়ে বিয়ে করতে দ্বিধা করে না।

২২০। উদ্দীপকের পীর সাহেবের সাথে কোন বিষয়ে মজিদের সাদৃশ্য রয়েছে?

ধর্মের অপব্যাখ্যা আর সামাজিক কুসংস্কারের কাছে অসহায় আত্মসমর্পণ করে আলেয়া, অথচ তারই বড় বোন রাহেলা সবকিছুকেই যুক্তি দিয়ে বিচার করতে চায়, যদিও পরিণামে তাকে কঠিন ফলই ভোগ করতে হয়।

২২৬। উদ্দীপকের নায়কের এরূপ সাদৃশ্যের প্রতিরূপ—

২২৭। উদ্দীপক ও ‘লালসালু’ উপন্যাসে নিচের কোন মন্তব্যকে যৌথভাবে ধারণ করে?
(ক) ধর্মের অপব্যাখ্যাকারীরা সমাজে প্রবলভাবে প্রভাব বিস্তার করে
(খ) যেকোনো শুভ উদ্যোগকে কুসংস্কারবাদীরা সন্দেহের চোখে দেখে
(গ) ধর্মের অপব্যাখ্যা যারা মেনে নেয় তারা শান্তিময় জীবনযাপন করে
(ঘ) প্রচলিত সমাজব্যবস্থায় বিরুদ্ধাচরণকারীরা সবসময়ই নিগৃহীত হয়
উত্তর: (ঘ) প্রচলিত সমাজব্যবস্থায় বিরুদ্ধাচরণকারীরা সবসময়ই নিগৃহীত হয়
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let reviewList = [];
        let reviewMode = false;
        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadReviewList() {
            const saved = localStorage.getItem(STORAGE_KEY + "_review");
            if (saved) reviewList = JSON.parse(saved);
        }

        function saveReviewList() {
            localStorage.setItem(STORAGE_KEY + "_review", JSON.stringify(reviewList));
        }

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
            <button onclick="toggleReviewMode()" id="review-btn" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                📌 Need to Review (${reviewList.length})
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            let filteredData = data.map((q, i) => ({ ...q, originalIndex: i }));

            if (reviewMode) {
                filteredData = filteredData.filter(item => reviewList.includes(item.originalIndex));
            } else if (wrongQuestionsOnly) {
                filteredData = filteredData.filter((item, i) =>
                    userAnswers[i] && userAnswers[i] !== data[i].answer
                );
            }

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" 
                            ${reviewList.includes(originalIdx) ? 'checked' : ''} 
                            onchange="toggleReview(${originalIdx}, this.checked)"
                            class="w-5 h-5 accent-purple-500">
                        <span class="text-purple-400 text-sm font-medium">Review</span>
                    </label>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        function toggleReview(qIndex, isChecked) {
            if (isChecked) {
                if (!reviewList.includes(qIndex)) reviewList.push(qIndex);
            } else {
                reviewList = reviewList.filter(idx => idx !== qIndex);
            }
            saveReviewList();
            updateReviewButton();
        }

        function updateReviewButton() {
            const btn = document.getElementById('review-btn');
            if (btn) btn.textContent = `📌 Need to Review (${reviewList.length})`;
        }

        function toggleReviewMode() {
            reviewMode = !reviewMode;
            const btn = document.getElementById('review-btn');

            if (reviewMode) {
                btn.style.backgroundColor = '#6b21a8';
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
            } else {
                btn.style.backgroundColor = '';
                btn.innerHTML = `📌 Need to Review (${reviewList.length})`;
            }

            const container = document.getElementById('quiz-container');
            container.style.opacity = '0.5';
            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
            loadReviewList();
            updateReviewButton();
        };
    </script>
