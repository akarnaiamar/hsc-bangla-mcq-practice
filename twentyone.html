<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">আখতারুজ্জামান ইলিয়াস এর 'রেইনকোট' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। ‘রেইনকোট’ গল্পে মিলিটারি ক্যাম্পটির অবস্থান কোথায় ছিল? [ম. বো. ২৩]
(ক) প্রিন্সিপালের অফিস (খ) প্রিন্সিপালের কোয়ার্টার
(গ) ফুটবল মাঠ (ঘ) জিমন্যাশিয়াম 
উত্তর: (ঘ) জিমন্যাশিয়াম

২। ‘রেইনকোট’ গল্পে কে এপ্রিলের শুরু থেকে বাংলা বলা ছেড়েছে? [য. বো. ২৩]
(ক) আব্দুস সাত্তার (খ) আকবর সাজিদ
(গ) আফাজ আহমদ (ঘ) ইসহাক মিয়া 
উত্তর: (ঘ) ইসহাক মিয়া

৩। ডক্টর আফাজ আহমদ ‘পাকিস্তানের শরীরের কাঁটা’ বলতে বুঝিয়েছেন— [য. বো. ২৩]
(ক) গেরিলা (খ) মিসক্রিয়্যান্ট
(গ) জেনারেল (ঘ) শহিদ মিনার 
উত্তর: (ঘ) শহিদ মিনার

৪। ‘রেইনকোট’ গল্পে ‘আন অথরাইজড কনস্ট্রাকশন’ বলতে বুঝানো হয়েছে— [কু. বো. ২৩]
(ক) কলেজ কম্পাউন্ড (খ) জিমনেশিয়াম
(গ) স্মৃতিসৌধ (ঘ) শহিদ মিনার 
উত্তর: (ঘ) শহিদ মিনার

৫। ‘সবই তো নরম্যাল হয়ে আসছে।'—এ বাক্যে প্রকাশিত হয়েছে— [ব. বো. ২৩]
(ক) সম্ভাবনা (খ) ব্যঙ্গ (গ) সন্তুষ্টি (ঘ) আশা
উত্তর: (খ) ব্যঙ্গ

৬। “মিসক্রিয়েন্টরা সব খতম।” —এখানে ‘মিসক্রিয়েন্ট’ বলতে কাদের বোঝানো হয়েছে? [রা. বো. ২৩; চ. বো. ১৬]
(ক) মুক্তিফৌজ (খ) পাকবাহিনী
(গ) শান্তিবাহিনী (ঘ) মিত্রবাহিনী
উত্তর: (ক) মুক্তিফৌজ

৭। প্রফেসর আকবর সাজিদকে প্রিন্সিপাল আজকাল তোয়াক্কা করে কেন? [চ. বো. ২৩]
(ক) শিক্ষিত মানুষ বলে (খ) মিলিটারিদের সাথে আঁতাত থাকায়
(গ) ভালো উর্দু বলতে পারে বলে (ঘ) মিসক্রিয়্যান্ট সহচর বলে
উত্তর: (গ) ভালো উর্দু বলতে পারে বলে

৮। কোন ঋতুর শেষের বৃষ্টিতে ‘রেইনকোট’ গল্পের নুরুল হুদার শীত শীত ভাব হয়? [কু. বো. ২৩]
(ক) শেষ শরতের (খ) শেষ বর্ষার
(গ) শেষ শীতের (ঘ) শেষ হেমন্তের 
উত্তর: (ঘ) শেষ হেমন্তের

৯। ‘রেইনকোট’ গল্পে মিরপুরের বিল দিয়ে আসা নৌকায় কী ছিল? [ব. বো. ২৩]
(ক) খাদ্য (খ) অস্ত্র (গ) সাহায্য (ঘ) আলমারি
উত্তর: (খ) অস্ত্র

১০। রেইনকোট খুলে ফেললেও নুরুল হুদার শরীরে রেইনকোটের কী অনুভূত হয়? [চ. বো. ২৩]
(ক) ওম (খ) গন্ধ
(গ) শীতলতা (ঘ) স্পর্শ
উত্তর: (ক) ওম

১১। ‘রেইনকোট’ গল্পে রেইনকোটটি কিসের প্রতীক? [দি. বো. ২৩: ম. বো. ২৩]
(ক) দেশপ্রেম (খ) সাহস
(গ) আভিজাত্য (ঘ) আত্মরক্ষা
উত্তর: (ক) দেশপ্রেম

১২। ‘রেইনকোট’ গল্পে নুরুল হুদার কাকে জড়িয়ে ধরে চুমু খেতে ইচ্ছে করছে? [য. বো. ২২]
(ক) পিওনকে (খ) স্ত্রীকে
(গ) মিলিটারিকে (ঘ) প্রিন্সিপালকে
উত্তর: (ক) পিওনকে

১৩। ‘রেইনকোট’ গল্পের কথক কে? [চ. বো. ১৬]
(ক) নুরুল হুদা (খ) গল্পকার
উত্তর: (ক) নুরুল হুদা

১৪। ‘রেইনকোট’ গল্পে প্রিন্সিপাল কেন সব স্কুল-কলেজ থেকে শহিদ মিনার হটাতে মিলিটারির নিকট নিবেদন করেছিল? [য. বো. ২২]
(ক) হিন্দুয়ানি চিহ্ন বলে (খ) চেতনা বহন করত বলে (গ) আনুগত্য প্রকাশ করতে (ঘ) মিলিটারিদের খুশি করতে
উত্তর: (খ) চেতনা বহন করত বলে

১৫। ‘রেইনকোট’ গল্পে রেইনকোটটি কার? [ঢা. বো. ১৭]
(ক) মিন্টুর (খ) নুরুল হুদার
(গ) আব্দুস সাত্তারের (ঘ) ড. আফাজ আহমেদের
উত্তর: (ক) মিন্টুর

১৬। ‘মিসক্রিয়েন্টরা সব খতম’—এখানে ‘মিসক্রিয়েন্ট’ বলতে কাদের বোঝানো হয়েছে? [চ. বো. ১৬]
(ক) মুক্তিফৌজ (খ) পাকবাহিনী
(গ) শান্তিবাহিনী (ঘ) মিত্রবাহিনী
উত্তর: (ক) মুক্তিফৌজ

১৭। ‘একটা জিপ উড়াইয়া দিছে, কমপক্ষে পাঁচটা খানসেনা খতম।’ তথ্যটি ‘রেইনকোট’ গল্পের কোন চরিত্রের মাধ্যমে জানা যায়? [রা. বো. ২২]
(ক) লেখক (খ) নুরুল হুদা
(গ) আসমা (ঘ) দোকানদার 
উত্তর: (ঘ) দোকানদার

১৮। “প্রিন্সিপালের কালো মুখ বেগুনি হয়”—কেন? [সি. বো. ২২]
(ক) আনন্দে (খ) বেদনায়
(গ) ভয়ে (ঘ) বিস্ময়ে
উত্তর: (গ) ভয়ে

১৯। ‘রেইনকোট’ গল্পে নুরুল হুদা কোন বিষয়ের শিক্ষক ছিলেন? [সি. বো. ২২]
(ক) পদার্থ (খ) রসায়ন (গ) বাংলা (ঘ) ইংরেজি
উত্তর: (খ) রসায়ন

২০। চাবুকের বাড়ির দিকে নুরুল হুদার আর মনোযোগ দেওয়া হয়ে ওঠে না কেন? [এইচএসসি পরীক্ষা ১৮]
(ক) আঘাত সয়ে যাওয়ায় (খ) মৃত্যু নিশ্চিত জানায়
(গ) শরীর অবশ হওয়ায় (ঘ) মুক্তিযোদ্ধাদের সম্পর্কে গভীর ভাবনায় 
উত্তর: (ঘ) মুক্তিযোদ্ধাদের সম্পর্কে গভীর ভাবনায়

২১। মিলিটারির চাবুকের আঘাত নুরুল হুদার কাছে কী বলে মনে হয়? [রা. বো. ১৭]
(ক) অসহ্য যন্ত্রণা (খ) অত্যাচার
(গ) অমানবিক কষ্ট (ঘ) স্রেফ উৎপাত 
উত্তর: (ঘ) স্রেফ উৎপাত

২২। ‘রেইনকোট’ গল্পে রেইনকোটটির মাধ্যমে ব্যঞ্জনাময় প্রকাশ ঘটেছে— [ঢা. বো. ২২]
(ক) মুক্তিযুদ্ধ ও সংগ্রাম (খ) পাকবাহিনীর অত্যাচার
(গ) উষ্ণতা, সাহস ও দেশপ্রেম (ঘ) মুক্তিযোদ্ধাদের আত্মত্যাগ
উত্তর: (গ) উষ্ণতা, সাহস ও দেশপ্রেম

২৩। ‘রেইনকোট’ গল্পে কোন বিষয়টি অধিক ব্যঞ্জনাময় হয়ে উঠেছে? [য. বো. ১৬]
(ক) গেরিলা আক্রমণ (খ) হানাদার বাহিনীর নিপীড়ন
(গ) নুরুল হুদার দেশপ্রেম (ঘ) রাজাকারদের দৌরাত্ম্য
উত্তর: (গ) নুরুল হুদার দেশপ্রেম

২৪। ‘রেইনকোট’ গল্পে ‘রেইনকোট’ বহন করছে— [চ. বো. ২২; দি. বো. ২২]

অথবা, ‘রেইনকোট’ গল্পে রেইনকোট কিসের তাৎপর্য বহন করে? 
(ক) মুক্তিযুদ্ধের ইতিহাস (খ) মুক্তিযুদ্ধের প্রেক্ষাপট
(গ) মুক্তিযুদ্ধের চেতনা (ঘ) ভাষা আন্দোলনের ঘটনা
উত্তর: (গ) মুক্তিযুদ্ধের চেতনা

২৫। ‘রেইনকোট’ গল্পে ভীতু নুরুল হুদার সাহসী হয়ে ওঠার মূল কারণ— [চ. বো., সি. বো.]
(ক) মিসক্রিয়েন্টদের ঠিকানা জানা (খ) সঞ্চারিত উষ্ণতা ও দেশপ্রেম (গ) কুলিদের আস্তানা চেনা (ঘ) গেরিলাদের সঙ্গে আঁতাত
উত্তর: (খ) সঞ্চারিত উষ্ণতা ও দেশপ্রেম

বহুপদী সমাপ্তিসূচক প্রশ্নোত্তর
২৬। ‘রেইনকোট’ গল্পে রেইনকোটটি কিসের প্রতীক? [ঢা. বো.]
i. প্রতিহিংসার
ii. দেশপ্রেমের
iii. মুক্তিযুদ্ধের
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

অভিন্ন তথ্যভিত্তিক প্রশ্নোত্তর
উদ্দীপকের আলোকে ২৭ ও ২৮ নং প্রশ্নের উত্তর দাও।
মুক্তিযুদ্ধ চলাকালে রাহাত ভাবল, দেশের এই সংকটময় মুহূর্তে আমি নিশ্চিন্তে ঘরে বসে থাকতে পারি না। তাই এলাকার ১০ জন যুবকের সাথে পরামর্শ করে পাড়ি জমায় প্রশিক্ষণ কেন্দ্রে।

২৭। অনুচ্ছেদের রাহাত চরিত্রে ভাবনা ‘রেইনকোট’ গল্পে কার মধ্যে খুঁজে পাওয়া যায়? [সি. বো. ২৩]
(ক) নুরুল হুদা (খ) মিন্টু (গ) ইসহাক মিয়া (ঘ) আব্দুস সাত্তার
উত্তর: (খ) মিন্টু

২৮। উক্ত সাদৃশ্যের অন্তর্নিহিত কারণ— [সি. বো. ২৩]
i. স্বদেশপ্রেম
ii. অসীম সাহসিকতা
iii. স্বাধীনতার আকাঙ্ক্ষা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপক (২৯ ও ৩০ নং প্রশ্নের জন্য):
“অসভ্য জয়ের লোভে, জ্বালায় শহর, গ্রামে গ্রামে
প্রাচীন সংহতি ভেঙে ভগ্নস্তূপে দূরের উলুক—” [ঢা. বো. ২৩]

২৯। উদ্দীপকে ‘রেইনকোট’ গল্পে কোন বিষয়টি সাদৃশ্যমান? 
(ক) নির্যাতন (খ) ধ্বংসাত্মক কার্যক্রম (গ) রাজনৈতিক কৌশল (ঘ) মুক্তিযুদ্ধ
উত্তর: (খ) ধ্বংসাত্মক কার্যক্রম

৩০। উক্ত বিষয়ে যা ফুটে উঠেছে— i. সভ্যতার ঐতিহ্য ভাঙা
ii. অপ্রতিরোধ্য হামলা
iii. মানুষকে বাস্তুহারা করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপক (৩১ ও ৩২ নং প্রশ্নের জন্য):
ইয়েস-নো-ভেরিগুড টাইপ ইংরেজি শিখে বাঙালি রামকানাই ইংরেজ নীলকরদের কাছে নিজেকে বিশ্বস্ত প্রমাণ করার জন্য নীলচাষীদের ওপর অমানবিক নির্যাতনের উপায় বাতলে দেয়। নির্যাতন অসহনীয় হয়ে উঠলে প্রতিরোধ ছাড়া উপায় থাকে না বাঙালি চাষীদের।

৩১। উদ্দীপকের রামকানাই ও ‘রেইনকোট’ গল্পে ইসহাক মিয়ার সাদৃশ্য— [ঢা. বো., ব. বো. ১৮]
i. ভাষা ব্যবহারে
ii. বিদেশি প্রীতিতে
iii. নির্যাতনে সহযোগিতায়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii 
উত্তর: (খ) i ও iii

৩২। উদ্দীপক ও ‘রেইনকোট’ গল্পে যুগপৎ প্রকাশিত হয়েছে— [ঢা. বো., ব. বো. ১৮]
(ক) বিদেশি ভাষার আগ্রাসন
(খ) বিদেশি শাসক কর্তৃক সীমাহীন নির্যাতন
(গ) দেয়ালে পিঠ ঠেকে যাওয়া মানুষের সম্মুখ গমন
(ঘ) দেশের জন্য জীবন বাজি রেখে যুদ্ধে ঝাঁপিয়ে পড়া 
উত্তর: (ঘ) দেশের জন্য জীবন বাজি রেখে যুদ্ধে ঝাঁপিয়ে পড়া

উদ্দীপক (৩৩ ও ৩৪ নং প্রশ্নের জন্য):
“মোরা একটি ফুলকে বাঁচাবো বলে যুদ্ধ করি
মোরা একটি মুখের হাসির জন্য অস্ত্র ধরি”

৩৩। উদ্দীপকে ‘মোরা’ শব্দটি ‘রেইনকোট’ গল্পের কোন চরিত্রকে প্রতিনিধিত্ব করে— [সি. বো. ১৬]
(ক) নুরুল হুদা (খ) মিন্টু (গ) প্রিন্সিপাল (ঘ) আকবর সাজিদ
উত্তর: (খ) মিন্টু

৩৪। উদ্দীপকের ভাবানুষঙ্গ ‘রেইনকোট’ গল্পের যে দিকটিকে প্রতিফলিত করে— [সি. বো. ১৬]
(ক) সাবভার্সিভ অ্যাকটিভিটিজ (খ) দেশপ্রেম 
(গ) ধ্বংসযজ্ঞ ও গণহত্যা (ঘ) মানবতাবোধ
উত্তর: (খ) দেশপ্রেম

উদ্দীপক (৩৫ ও ৩৬ নং প্রশ্নের জন্য):
“দূরে কিংবা কখনো খুবই কাছে
যাচ্ছে শোনা ফুটফাট গুলির আওয়াজ, ত্রাসে
বুক কাঁপে, পারিনা শুধোতে কে কোথায় গেল মরে,
দম বন্ধ করে চুপ করে পড়ে থাকি ঘরের কবরে।”

৩৫। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের সাদৃশ্য হলো— [কু. বো. ১৯]
i. পঁচিশে মার্চের রাতের আক্রমণ
ii. মানুষদের ধরে ক্যাম্পে নিয়ে যাওয়া
iii. গুলির আওয়াজ শুনতে পাওয়া
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৩৬। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের যে প্রসঙ্গটি মিলে যায়— [কু. বো. ১৯]
i. মুক্তিযুদ্ধ চলাকালীন
ii. নির্যাতিত বাঙালি
iii. মুক্তিযুদ্ধে মানুষের আত্মত্যাগ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

উদ্দীপক (৩৭ ও ৩৮ নং প্রশ্নের জন্য):
১৯৭১ সাল, জুন-জুলাই মাসে প্রচণ্ড বর্ষা হচ্ছে। বৃষ্টির পানিতে রাস্তা-ঘাট ডুবে গেছে। এই বর্ষার মধ্যে খাদ বুঝতে না পেরে পাকিস্তানি বাহিনীর একটি জিপ উল্টে যায়।

৩৭। উদ্দীপকের প্রাকৃতিক অবস্থাকে ‘রেইনকোট’ গল্পে কী নামে উপস্থাপন করা হয়েছে? [ম. বো. ২২]
(ক) জেনারেল সিজন (খ) জেনারেল মনসুর
(গ) জেনারেল উইন্টার (ঘ) জেনারেল রেইন 
উত্তর: (ঘ) জেনারেল রেইন

৩৮। এ বিষয়টি ১৯৭১ সালে গুরুত্বপূর্ণ ভূমিকা রেখেছিল। কারণ— [ম. বো. ২২]
i. পাকিস্তানিদের জন্য প্রতিকূল ছিল
ii. পাকিস্তানিরা এ বিষয়ে উদাসীন ছিল
iii. পাকিস্তানিরা এ বিষয়ে অনভ্যস্ত ছিল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপক (৩৯ ও ৪০ নং প্রশ্নের জন্য):
কলেজ থেকে ঘরে ফেরার পথে ছাত্র-পুলিশ সংঘর্ষের মধ্যে পড়ে যায় মাহমুদ। পুলিশের বেধড়ক লাঠিপেটায় সেদিন থেকেই সে হয়ে ওঠে ভাষা আন্দোলনের একনিষ্ঠ কর্মী।

৩৯। উদ্দীপকের মাহমুদ ‘রেইনকোট’ গল্পের কোন চরিত্রের সাথে তুলনীয়? [দি. বো. ১৯]
(ক) কুলি (খ) মিন্টু (গ) নুরুল হুদা (ঘ) ড. আফাজ
উত্তর: (ক) কুলি

৪০। উদ্দীপকটি ‘রেইনকোট’ গল্পটিকে যে প্রেক্ষাপট থেকে প্রতিনিধিত্ব করে তা হলো— [দি. বো. ১৯]
(ক) ছাত্র-রাজনীতি (খ) ভাষা আন্দোলন
(গ) স্বাধীনতা সংগ্রাম (ঘ) রাজনৈতিক চেতনা
উত্তর: (গ) স্বাধীনতা সংগ্রাম

উদ্দীপক (৪১ ও ৪২ নং প্রশ্নের জন্য):
মেডিকেলের সামনে দিয়ে প্রতিদিনের মতো কর্মস্থলে যাচ্ছিল সদাগরি অফিসের কনিষ্ঠ কেরানি মঞ্জু; হঠাৎ মিছিল আর গুলির শব্দ। ভাষা আন্দোলনকারীদের সাথে মঞ্জুর ওপরও বেধড়ক লাঠিচার্জ করে পুলিশ বাহিনী। তারপর থেকে মঞ্জু হয়ে ওঠে ভাষা আন্দোলনের সক্রিয় কর্মী।

৪১। উদ্দীপকের ‘পুলিশ বাহিনী’ ‘রেইনকোট’ গল্পে কাকে প্রতিনিধিত্ব করে? [কু. বো. ১৭]
(ক) রাজাকার (খ) মিলিটারি (গ) পুলিশ (ঘ) মিসক্রিয়েন্ট
উত্তর: (ঘ) মিসক্রিয়েন্ট

৪২। উদ্দীপকের মঞ্জু ও ‘রেইনকোট’ গল্পের নুরুল হুদার চারিত্রিক ঐক্য— [কু. বো. ১৭]
(ক) কর্মে (খ) শিক্ষায় (গ) ভাষা চেতনায় (ঘ) চেতনার পরিবর্তনে
উত্তর: (খ) শিক্ষায় (নোট: উদ্দীপকের প্রেক্ষাপট অনুযায়ী 'চেতনার পরিবর্তনে' উত্তর হওয়ার সম্ভাবনা থাকলেও বইয়ের উত্তরে 'শিক্ষায়' চিহ্নিত আছে)

উদ্দীপক (৪৩ ও ৪৪ নং প্রশ্নের জন্য):
পিতৃহীন সরল প্রকৃতির মৃদুলকে প্রভাবশালী মীর সাহেবের লোকেরা ধরে নিয়ে যায় এবং একটা মিথ্যা দলিলে স্বাক্ষর করতে বলে। মৃদুলের মনে পড়ে যায় বাবার শেষ উপদেশের কথা— ‘অন্যায়ের কাছে কখনো মাথা নত করো না বিপদের সম্ভাবনা জেনেও মৃদুল তার সিদ্ধান্তে অটল থাকে।

৪৩। উদ্দীপকের মৃদুল ‘রেইনকোট’ গল্পের কোন চরিত্রের প্রতিনিধিত্ব করে? [য. বো. ১৭]
(ক) ইসহাক (খ) আব্দুস সাত্তার (গ) আফজাল (ঘ) নুরুল হুদা 
উত্তর: (ঘ) নুরুল হুদা

৪৪। উদ্দীপকের বিষয়ের সাথে ‘রেইনকোট’ গল্পের সাদৃশ্য কোথায়? [য. বো. ১]
(ক) প্রতীকী ব্যঞ্জনায় (খ) পটভূমিতে (গ) ঘটনায় (ঘ) সমাজচিত্রে 
উত্তর: (ঘ) সমাজচিত্রে

৪৫। ‘নুরুল হুদার ঝুলন্ত শরীর যেন কবির পূর্বপুরুষ, যার পিঠে রক্তজবার মতো ক্ষত’। এ মন্তব্যের সঙ্গে প্রাসঙ্গিক হলো— [ঢাবি (খ-ইউনিট) ১৭-১৮]
(ক) পীড়িতের প্রতিবাদ (খ) আঘাতে অবিচল
(গ) প্রতিবাদের ধারাবাহিকতা (ঘ) সুনিপুণ প্রত্যাঘাত
উত্তর: (ক) পীড়িতের প্রতিবাদ

৪৬। ‘রেইনকোট’ গল্পে অধ্যক্ষ মহোদয়ের পিয়নের নাম কী? [ঢাবি (খ-ইউনিট) ১৬-১৭]
(ক) আবু ইসহাক (খ) আবুল ইসহাক
(গ) ইসহাক মিয়া (ঘ) ইসহাক কবির
উত্তর: (গ) ইসহাক মিয়া

৪৭। ‘রেইনকোট’ গল্পে পাকিস্তানের শরীরের কাঁটা বলা হয়েছে কাকে? [জবি (এ-ইউনিট) ১৬-১৭]
(ক) মুক্তিবাহিনীকে (খ) পুলিশ বাহিনীকে (পরবর্তী অংশ ছবিতে নেই)
(নোট: মূল উত্তর হবে শহিদ মিনারকে)
(৪৭ নং প্রশ্নের অবশিষ্টাংশ) (গ) শহিদ মিনারকে (ঘ) হাসপাতালকে
উত্তর: (গ) শহিদ মিনারকে

৪৮। ‘রেইনকোট’ গল্পে কোন ভাবের প্রতিফলন ঘটেছে? [জবি (চ-ইউনিট) ১৬-১৭]
(ক) গভীর আস্থা (খ) প্রতিকূল পরিবেশ
(গ) বর্ষাকাল (ঘ) সাহস ও দেশপ্রেম 
উত্তর: (ঘ) সাহস ও দেশপ্রেম

৪৯। মুক্তিযুদ্ধকে ‘পাকিস্তানের ইন্টারনাল অ্যাফেয়ার’ বলেছেন— [জবি (চ-ইউনিট) ১৬-১৭]
(ক) জন এফ কেনেডি (খ) হেনরি কিসিঞ্জার (গ) রিচার্ড নিক্সন (ঘ) জেরাল্ড ফোর্ড
উত্তর: (খ) হেনরি কিসিঞ্জার

৫০। ‘রেইনকোট’ গল্প অনুসারে গ্রাম-গঞ্জে মিলিটারিদের আক্রমণের প্রথম টার্গেট ছিল— [জবি (চ-ইউনিট) ১৯-২০]
(ক) হিন্দু ঘর-বাড়ি (খ) শহিদ মিনার (গ) মন্দির (ঘ) মুক্তি বাহিনীর আস্তানা
উত্তর: (খ) শহিদ মিনার

৫১। ‘রেইনকোট’ গল্পে মিন্টু কবে বাড়ি ছেড়ে দিয়েছিল? [জবি (চ-ইউনিট) ১৯-২০]
(ক) ২৩ মে (খ) ২৩ জুলাই
(গ) ২৩ জুন (ঘ) ২৩ আগস্ট
উত্তর: (গ) ২৩ জুন

৫২। ‘খোয়াবনামা’ উপন্যাস কার রচনা? [জাবি (গ১-ইউনিট) ১৭-১৮]
(ক) হুমায়ুন আজাদ (খ) হুমায়ুন আহমেদ
(গ) খালেকুজজামান ইলিয়াস (ঘ) আখতারুজ্জামান ইলিয়াস 
উত্তর: (ঘ) আখতারুজ্জামান ইলিয়াস

৫৩। কোনটি আখতারুজ্জামান ইলিয়াসের গল্পগ্রন্থ নয়? [জাবি (আই-ইউনিট) ১৭-১৮]
(ক) অন্য ঘরে অন্য স্বর (খ) জাল স্বপ্ন স্বপ্নের জাল
(গ) জন্ম যদি তব বঙ্গে (ঘ) দোজখের ওম
উত্তর: (গ) জন্ম যদি তব বঙ্গে

৫৪। ‘চিলেকোঠার সেপাই’ উপন্যাসটি কার লেখা? [রাবি (ক-ইউনিট) ১৭-১৮; জকানইবি (প-ইউনিট) ১৭-১৮]
(ক) মুহাম্মদ জাফর ইকবাল (খ) আখতারুজ্জামান ইলিয়াস (গ) শওকত আলী (ঘ) মানিক বন্দ্যোপাধ্যায়
উত্তর: (খ) আখতারুজ্জামান ইলিয়াস

৫৫। ‘বর্ষাকালেই তো জুৎ’ কথাটি ‘রেইনকোট’ গল্পে কবার বলা হয়েছে? [রাবি (খ-ইউনিট) ১৭-১৮]
(ক) একবার (খ) দুইবার (গ) তিনবার (ঘ) চারবার
উত্তর: (খ) দুইবার

৫৬। ‘দোজখের ওম’ গল্পগ্রন্থের রচয়িতা— [রাবি (ঘ-ইউনিট) ১৭-১৮; ইবি (খ-ইউনিট) ১৬-১৭; চবি (খ১-ইউনিট) ১৬-১৭]
(ক) শওকত ওসমান (খ) আনিসুজ্জামান
(গ) শওকত আলী (ঘ) আখতারুজ্জামান ইলিয়াস 
উত্তর: (ঘ) আখতারুজ্জামান ইলিয়াস

৫৭। ‘রেইনকোট’ গল্পের নুরুল হুদা কোন বিষয়ের লেকচারার ছিলেন? [চবি (খ-ইউনিট) ১৯-২০]
(ক) কেমিস্ট্রি (খ) ইংরেজি
(গ) বাংলা (ঘ) জিওগ্রাফি
উত্তর: (ক) কেমিস্ট্রি

৫৮। ‘রেইনকোট’ গল্পে বর্ণিত জেনারেল উইন্টার কোন দেশের প্রাকৃতিক বৈশিষ্ট্য? [চবি (খ-ইউনিট) ১৯-২০]
(ক) জার্মানি (খ) ইংল্যান্ড
(গ) রাশিয়া (ঘ) পাকিস্তান
উত্তর: (গ) রাশিয়া

৫৯। ‘রেইনকোট’ গল্পে কে মুক্তিযোদ্ধা ছিলেন? [চবি (ক-ইউনিট) ১৮-১৯]
(ক) ড. আফাজ আহমদ (খ) নুরুল হুদা
(গ) মিন্টু (ঘ) আব্দুল সাত্তার মৃধা
উত্তর: (গ) মিন্টু

৬০। কোনটিতে মুক্তিযুদ্ধের প্রসঙ্গ রয়েছে? [চবি (ছ-ইউনিট) ১৬-১৭]
(ক) জাদুঘরে কেন যাব (খ) রেইনকোট (গ) আমার পথ (ঘ) আহ্বান
উত্তর: (খ) রেইনকোট

৬১। ‘রেইনকোট’ গল্পে আছে ‘ঐ ঠিকানা বলে দিলে তাকে সসম্মানে ছেড়ে দেওয়া হবে।’ কোন ঠিকানার কথা বলা হয়েছে? [চবি (গ৩-ইউনিট) ১৬-১৭]
(ক) রাজাকারদের (খ) মুক্তিযোদ্ধাদের (গ) প্রিন্সিপালের (ঘ) উর্দু প্রফেসরের
উত্তর: (খ) মুক্তিযোদ্ধাদের

৬২। ‘রেইনকোট’ গল্পে ‘রাশিয়ার ছিল জেনারেল উইন্টার, আমাদের জেনারেল মনসুন’ প্রসঙ্গটি কোথায় উত্থাপিত হয়েছিল? [খুবি (খ-ইউনিট) ১৭-১৮]
(ক) ওয়েল্ডিং ওয়ার্কশপ ক্যাম্পে
(খ) পাশের ফ্ল্যাটের গোলগাল মুখের মহিলার কথায় (পরবর্তী অংশ ছবিতে নেই)
(৬২ নং প্রশ্নের অবশিষ্টাংশ) (গ) প্রিন্সিপালের কামরায়
(ঘ) স্টাফরুমে ফিসফিস করে কারো কথায় 
উত্তর: (ঘ) স্টাফরুমে ফিসফিস করে কারো কথায়

৬৩। ‘রেইনকোট’ গল্পে কোন অঞ্চলের মুক্তিযুদ্ধের কথা বলা হয়েছে? [বেরোবি (ক-ইউনিট) ১৯-২০]
(ক) ঢাকা (খ) সিলেট
(গ) কুমিল্লা (ঘ) ফরিদপুর
উত্তর: (ক) ঢাকা

৬৪। ‘রেইনকোট’ গল্পে ব্যবহৃত রেইনকোটটি কার? [বেরোবি (ক-ইউনিট) ১৭-১৮]
(ক) আব্দুস সাত্তারের (খ) আফাজ আহমেদের
(গ) কর্নেল সাহেবের (ঘ) মুক্তিযোদ্ধা মিন্টুর 
উত্তর: (ঘ) মুক্তিযোদ্ধা মিন্টুর

৬৫। কলেজের জিমন্যাশিয়াম ‘রেইনকোট’ গল্পে কী হিসেবে ব্যবহৃত হয়? [বেরোবি (ক-ইউনিট) ১৭-১৮]
(ক) পিয়নের বাসা (খ) মিলিটারি ক্যাম্প (গ) মুক্তিবাহিনীর ক্যাম্প (ঘ) অধ্যক্ষের বাসা
উত্তর: (খ) মিলিটারি ক্যাম্প

৬৬। ‘রেইনকোট’ গল্পটি কোন গ্রন্থ থেকে সংকলিত? [বেরোবি (ক-ইউনিট) ১৭-১৮]
(ক) খোয়ারি (খ) দুধভাতে উৎপাত
(গ) দোজখের ওম (ঘ) জাল স্বপ্ন স্বপ্নের জাল 
উত্তর: (ঘ) জাল স্বপ্ন স্বপ্নের জাল

৬৭। ‘রেইনকোট’ প্রতীকটি গল্পে কী অর্থে ব্যবহৃত হয়েছে? [বেরোবি (খ-ইউনিট) ১৭-১৮]
(ক) যুদ্ধ ও নিপীড়ন (খ) গেরিলা আক্রমণ
(গ) উষ্ণতা, সাহস ও দেশপ্রেম (ঘ) দেশপ্রেম ও আনুগত্য
উত্তর: (গ) উষ্ণতা, সাহস ও দেশপ্রেম

৬৮। ‘রেইনকোট’ গল্পে কোন ঋতুর কথা উল্লেখ করা হয়েছে? [বেরোবি (গ-ইউনিট) ১৬-১৭]
(ক) শীত (খ) বর্ষা (গ) হেমন্ত (ঘ) শরৎ
উত্তর: (খ) বর্ষা

৬৯। কার জবানিতে ‘রেইনকোট’ গল্পের অধিকাংশ ঘটনা বিবৃত হয়েছে? 
(ক) আব্দুস সাত্তার মৃধা (খ) ড. আফাজ আহমদ
(গ) আখতারুজ্জামান ইলিয়াস (ঘ) নুরুল হুদা 
উত্তর: (ঘ) নুরুল হুদা

৭০। নুরুল হুদাকে পাকিস্তানি হানাদার বাহিনীর তলব করার কারণ— 
(ক) কমান্ডারের নির্দেশে (খ) প্রিন্সিপালের অভিযোগে
(গ) মুক্তিযোদ্ধাদের সহযোগী ভেবে (ঘ) তাকে মুক্তিযোদ্ধা সন্দেহে
উত্তর: (গ) মুক্তিযোদ্ধাদের সহযোগী ভেবে

উদ্দীপক (৭১ ও ৭২ নং প্রশ্নের জন্য): 
মুক্তিফৌজ! কথাটা এত ভারী যে এই রকম অত্যাচারী সৈন্য দিয়ে ঘেরা অবরুদ্ধ ঢাকা শহরে বসে মুক্তিফৌজ শব্দটা শুনলেও কেমন যেন অবিশ্বাস্য মনে হয়। আবার ওই অবিশ্বাসের ভেতর থেকে একটা আশা, একটা ভরসার ভাব ধীরে ধীরে মনের কোণে জেগে উঠতে থাকে।

৭১। অনুচ্ছেদে “রেইনকোট” গল্পের কোন ভাবের প্রতিফলন ঘটেছে? 
(ক) পাক হানাদার বাহিনীর নৃশংসতা
(খ) মুক্তিযোদ্ধাদের অদম্য শক্তি-সাহস
(গ) মুক্তিযোদ্ধাদের প্রতি গভীর আস্থা 
(ঘ) যুদ্ধকালীন অবরুদ্ধ মানুষের উৎকণ্ঠা
উত্তর: (গ) মুক্তিযোদ্ধাদের প্রতি গভীর আস্থা

৭২। উক্ত ভাবটি যে বাক্যে প্রকাশ পেয়েছে তা হলো— 
(ক) মিসক্রিয়্যান্ট লোক ইলেকট্রিক ট্রান্সফর্মার তোড় দিয়া
(খ) একটা জিপ উড়াইয়া দিছে, কমপক্ষে পাঁচটা খানসেনা খতম 
(গ) নুরুল হুদার ঝুলন্ত শরীর এতটাই কাঁপে যে চাবুকের বাড়ির দিকে আর মনোযোগ দেওয়া হয়ে ওঠে না
(ঘ) বউয়ের এই ভাইটার জন্যই তাকে এক্সট্রা তটস্থ থাকতে হয়
উত্তর: (খ) একটা জিপ উড়াইয়া দিছে, কমপক্ষে পাঁচটা খানসেনা খতম

পাঠ্যবইয়ের বিষয়বস্তুর ধারাবাহিকতা অনুসারে প্রশ্নোত্তর
৭৩। আখতারুজ্জামান ইলিয়াসের জন্ম— 
(ক) ১৯৪২ সালের ১০ই জানুয়ারি
(খ) ১৯৪৩ সালের ১২ই ফেব্রুয়ারি (গ) ১৯৪৪ সালের ১০ই মার্চ
(ঘ) ১৯৪৫ সালের ১২ই এপ্রিল
উত্তর: (খ) ১৯৪৩ সালের ১২ই ফেব্রুয়ারি

৭৪। আখতারুজ্জামান ইলিয়াস কোথায় জন্মগ্রহণ করেন? 
(ক) গাইবান্ধার গোটিয়া গ্রামে (খ) ময়মনসিংহের অহিম গ্রামে
(গ) রংপুরের বীরসিংহ গ্রামে (ঘ) ফরিদপুরের কাঁঠালপাড়া গ্রামে
উত্তর: (ক) গাইবান্ধার গোটিয়া গ্রামে

৭৫। নিম্নের কোন লেখক মামাবাড়িতে জন্মগ্রহণ করেন? 
(ক) মুহাম্মদ জাফর ইকবাল (খ) সৈয়দ মুজতবা আলী
(গ) আখতারুজ্জামান ইলিয়াস (ঘ) আবুল ফজল
উত্তর: (গ) আখতারুজ্জামান ইলিয়াস

৭৬। আখতারুজ্জামান ইলিয়াসের পৈত্রিক নিবাস কোথায়? 
(ক) বগুড়া (খ) নেত্রকোনা
(গ) সিলেট (ঘ) আসাম
উত্তর: (ক) বগুড়া

৭৭। আখতারুজ্জামান ইলিয়াসের পিতার নাম কী? 
(ক) এ.টি.এম মোয়াজ্জেম (খ) খোরশেদ আলী সরদার
(গ) সৈয়দ আহমদ উল্লাহ (ঘ) বি.এম. ইলিয়াস 
উত্তর: (ঘ) বি.এম. ইলিয়াস

৭৮। আখতারুজ্জামান ইলিয়াস মূলত কী ছিলেন? [ইস্পাহানী পাবলিক স্কুল এন্ড কলেজ, কুমিল্লা]
(ক) সাংবাদিক (খ) ঔপন্যাসিক
(গ) কথাসাহিত্যিক (ঘ) প্রাবন্ধিক
উত্তর: (গ) কথাসাহিত্যিক

৭৯। আখতারুজ্জামান ইলিয়াসের ছোটগল্প গ্রন্থ কয়টি? 
(ক) ৩টি (খ) ৪টি
(গ) ৫টি (ঘ) ৬টি
উত্তর: (গ) ৫টি

৮০। আখতারুজ্জামান ইলিয়াস কতটি গল্প লিখেছেন? 
(ক) ২০টি (খ) ২৩টি
(গ) ২৮টি (ঘ) ৩৪টি
উত্তর: (গ) ২৮টি

৮১। আখতারুজ্জামান ইলিয়াস রচিত উপন্যাসের সংখ্যা কয়টি? [মির্জাপুর ক্যাডেট কলেজ, টাঙ্গাইল]
(ক) দুটি (খ) তিনটি
(গ) চারটি (ঘ) পাঁচটি
উত্তর: (ক) দুটি

৮২। নিচের কোনটি আখতারুজ্জামান ইলিয়াস রচিত গল্পগ্রন্থ? [শ্রীমঙ্গল সরকারি কলেজ, মৌলভীবাজার]
(ক) জাল স্বপ্ন স্বপ্নের জাল (খ) নয়নচারা
(গ) শিউলিমালা (ঘ) বহিপীর
উত্তর: (ক) জাল স্বপ্ন স্বপ্নের জাল

৮৩। ‘চিলেকোঠার সেপাই’ গ্রন্থটির লেখক কে? [বেগম বদরুন্নেসা সরকারি মহিলা কলেজ, ঢাকা; রাবি (ক-ইউনিট) ১৭-১৮; জকানইবি (প-ইউনিট) ১৭-১৮]
(ক) আনিসুজ্জামান (খ) আখতারুজ্জামান ইলিয়াস (গ) মানিক বন্দ্যোপাধ্যায় (ঘ) রোকেয়া সাখাওয়াত হোসেন
উত্তর: (খ) আখতারুজ্জামান ইলিয়াস

৮৪। আখতারুজ্জামান ইলিয়াস কত সালে মৃত্যুবরণ করেন? [দি বার্ডস রেসিডেনসিয়াল মডেল স্কুল এন্ড কলেজ, শ্রীমঙ্গল, মৌলভীবাজার]
(ক) ১৯৯৭ সালের ৪ঠা জানুয়ারি (খ) ১৯৯৬ সালের জানুয়ারি
(গ) ১৯৯৮ সালের ১০ জানুয়ারি (ঘ) ১৯৯৫ সালের ৫ মার্চ
উত্তর: (ক) ১৯৯৭ সালের ৪ঠা জানুয়ারি

৮৫। আখতারুজ্জামান ইলিয়াস কোন রোগে আক্রান্ত হয়ে মৃত্যুবরণ করেন? [সরকারি বিএল কলেজ, খুলনা]
(ক) ক্যান্সার (খ) জন্ডিস
(গ) কলেরা (ঘ) ধনুষ্টংকার
উত্তর: (ক) ক্যান্সার

৮৬। নুরুল হুদার জীবনের কী বারের ঘটনা ‘রেইনকোট’ গল্প আকারে উপস্থাপিত? [রাজশাহী ক্যাডেট কলেজ]
(ক) শনি (খ) রবি
(গ) সোম (ঘ) মঙ্গল 
উত্তর: (ঘ) মঙ্গল

৮৭। ‘রেইনকোট’ গল্পে কোন বারের উল্লেখ নেই? [সরকারি বেগম রোকেয়া কলেজ, রংপুর]
(ক) শনি (খ) রবি (গ) মঙ্গল (ঘ) বৃহস্পতি
উত্তর: (খ) রবি

৮৮। ‘সব ভেঙে দিল’—এখানে কী ভেঙে দেওয়ার কথা বলা হয়েছে? [সরকারি ইয়াছিন কলেজ, ফরিদপুর]
(ক) পরিকল্পনা (খ) আয়োজন
(গ) আরাম (ঘ) পূর্বপ্রস্তুতি
উত্তর: (গ) আরাম

৮৯। ‘রেইনকোট’ গল্পে কে দরজায় প্রবল কড়া নাড়ছিল? [নোয়াখালী সরকারি মহিলা কলেজ]
(ক) মিলিটারি (খ) ইসহাক মিয়া (গ) নুরুল হুদা (ঘ) আব্দুস সাত্তার
উত্তর: (খ) ইসহাক মিয়া

৯০। ‘এই কয়েক মাসে কত সুরাই সে মুখস্থ করেছে!’—এখানে ‘সে’ সর্বনাম দ্বারা কাকে বোঝানো হয়েছে? [ক্যান্টনমেন্ট কলেজ, যশোর]
(ক) প্রিন্সিপালকে (খ) ইকবালকে (গ) প্রিন্সিপালের পিয়নকে (ঘ) নুরুল হুদাকে 
উত্তর: (ঘ) নুরুল হুদাকে

৯১। ‘রেইনকোট’ গল্পে নুরুল হুদা কাকে জড়িয়ে ধরে চুমু খেতে ইচ্ছে করছে? [য. বো. ২২]
(ক) পিয়নকে (খ) স্ত্রীকে (গ) মিলিটারিকে (ঘ) প্রিন্সিপালকে
উত্তর: (ক) পিয়নকে

৯২। ‘পিয়নকে জড়িয়ে ধরে চুমু খেতে ইচ্ছা করছে’—নুরুল হুদার এমন উক্তির কারণ কী? [লালবাগ সরকারি মডেল স্কুল এন্ড কলেজ, ঢাকা]
(ক) পিয়নকে খুব স্নেহ করত বলে (খ) আকস্মিক বিপদ মুক্তির আনন্দে 
(গ) পিয়ন খুব উপকারী লোক বলে (ঘ) কলেজ বন্ধের খবর দিয়েছিল
উত্তর: (খ) আকস্মিক বিপদ মুক্তির আনন্দে

৯৩। মিলিটারির আশঙ্কায় দরজা খোলার পর পিয়ন ঘরে ঢুকলে নুরুল হুদার কী অনুভূতি হয়? [রংপুর ক্যাডেট কলেজ]
(ক) শঙ্কিত হয় (খ) বিস্মিত হয় (গ) আনন্দিত হয় (ঘ) গম্ভীর হয়
উত্তর: (গ) আনন্দিত হয়

৯৪। ‘গেট তোড় গিয়া’—‘রেইনকোট’ গল্পে উক্তিটি কার সঙ্গে সম্পর্কযুক্ত? [পাবলিক স্কুল এন্ড কলেজ, যশোর]
(ক) পিয়ন (খ) প্রফেসর (গ) প্রিন্সিপাল (ঘ) কর্নেল
উত্তর: (ক) পিয়ন

৯৫। ‘রেইনকোট’ গল্পে মিলিটারি ক্যাম্পটির অবস্থান কোথায় ছিল? [ম. বো. ২৩]
(ক) প্রিন্সিপালের অফিস (খ) প্রিন্সিপালের কোয়ার্টার (গ) ফুটবল মাঠ (ঘ) জিমনেশিয়াম 
উত্তর: (ঘ) জিমনেশিয়াম

৯৬। ‘আব্দুস সাত্তার মৃধা’ কোন বিষয়ের প্রফেসর ছিলেন? [সাউথ পয়েন্ট স্কুল এন্ড কলেজ, গুলশান, ঢাকা]
(ক) বাংলা (খ) কেমিস্ট্রি (গ) হিস্ট্রি (ঘ) জিওগ্রাফি 
উত্তর: (ঘ) জিওগ্রাফি

৯৭। ‘রেইনকোট’ গল্পে কে এপ্রিলের শুরু থেকে বাংলা বলা ছেড়েছে? [য. বো. ২৩]
(ক) আব্দুস সাত্তার (খ) আকবর সাজিদ (গ) আফাজ আহমদ (ঘ) ইসহাক মিয়া 
উত্তর: (ঘ) ইসহাক মিয়া

৯৮। ‘রেইনকোট’ গল্পে কে এখন দিনরাত উর্দুতে কথা বলে? [রাজউক উত্তরা মডেল কলেজ; দনিয়া কলেজ; সরকারি আজিজুল হক কলেজ, বগুড়া]
(ক) ড. আফাজ আহমদ (খ) আকবর সাজিদ (গ) ইসহাক মিয়া (ঘ) আব্দুস সাত্তার মৃধা
উত্তর: (গ) ইসহাক মিয়া

৯৯। ‘রেইনকোট’ গল্পের ইসহাক কোন মাসের শুরু থেকে বাংলা বলা ছেড়ে দিয়েছে? [বরিশাল সরকারি মহিলা কলেজ]
(ক) ডিসেম্বর (খ) ফেব্রুয়ারি (গ) মার্চ (ঘ) এপ্রিল 
উত্তর: (ঘ) এপ্রিল

১০০। হাঁপানির টান আছে কার? [সাভার ক্যান্টনমেন্ট পাবলিক স্কুল ও কলেজ]
(ক) আসমার (খ) প্রিন্সিপালের (গ) আব্দুল সাত্তার মৃধার (ঘ) নুরুল হুদার 
উত্তর: (ঘ) নুরুল হুদার

১০১। ‘রেইনকোট’ গল্পে পাকিস্তানের অখণ্ডতা রক্ষার জন্য উদ্বিগ্ন থাকে কে? [সরকারি মহিলা কলেজ, পাবনা]
(ক) নুরুল হুদা (খ) ড. আফাজ আহমদ (গ) আকবর সাজিদ (ঘ) মিন্টু
উত্তর: (খ) ড. আফাজ আহমদ

১০২। প্রিন্সিপাল কেন দিনরাত দোয়া দরুদ পড়তো? [শেরপুর সরকারি কলেজ]
(ক) ভয়ে (খ) বাংলাদেশের জন্য (গ) পাকিস্তানের জন্য (ঘ) মিলিটারির ভয়ে
উত্তর: (গ) পাকিস্তানের জন্য

১০৩। মিলিটারিদের শহিদ মিনার হটানো পরামর্শ প্রদানের মধ্য দিয়ে প্রিন্সিপাল চরিত্রে প্রকাশ পেয়েছে— [দি বার্ডস রেসিডেনসিয়াল মডেল স্কুল এন্ড কলেজ, মৌলভীবাজার]
(ক) দেশদ্রোহিতা (খ) অসততা (গ) অসচেতনতা (ঘ) হঠকারিতা
উত্তর: (ক) দেশদ্রোহিতা

১০৪। ‘রেইনকোট’ গল্পে প্রিন্সিপাল কেন সব স্কুল-কলেজ থেকে শহিদ মিনার হটাতে মিলিটারির নিকট নিবেদন করেছিল? [য. বো. ২২]
(ক) হিন্দুয়ানি চিহ্ন বলে (খ) চেতনা বহন করত বলে (গ) আনুগত্য প্রকাশ করতে (ঘ) মিলিটারিদের খুশি করতে
উত্তর: (খ) চেতনা বহন করত বলে

১০৫। ডক্টর আফাজ আহমদ ‘পাকিস্তানের শরীরের কাঁটা’ বলতে বুঝিয়েছেন— [য. বো. ২৩]
(ক) গেরিলা (খ) মিসক্রিয়্যান্ট (গ) জেনারেল (ঘ) শহিদ মিনার 
উত্তর: (ঘ) শহিদ মিনার

১০৬। পাকিস্তান বাঁচাতে হলে স্কুল কলেজ থেকে শহিদ মিনার হটাতে হবে, এ নিবেদনটি করেছেন— [দি. বো. ১৬]
(ক) মিন্টু (খ) ইসহাক (গ) প্রিন্সিপাল (ঘ) নুরুল হুদা
উত্তর: (গ) প্রিন্সিপাল

১০৭। প্রিন্সিপাল কখন মিলিটারির বড় কর্তাদের কাছে স্কুল-কলেজ থেকে শহিদ মিনার হটানোর জন্য সবিনয় নিবেদন করেছিলেন? [বরিশাল সরকারি মহিলা কলেজ]
(ক) জানুয়ারি মাসের শুরুতে (খ) ফেব্রুয়ারি মাসের মাঝামাঝি
(গ) মার্চ মাসের শুরুতে (ঘ) এপ্রিল মাসের মাঝামাঝি 
উত্তর: (ঘ) এপ্রিল মাসের মাঝামাঝি

১০৮। স্কুল-কলেজের শহিদ মিনার ভেঙে দেওয়ার মধ্যে দিয়ে কোথায় আঘাত করা হয়েছে? [বি এন কলেজ, ঢাকা]
(ক) বাঙালির ঐতিহ্যে (খ) বাঙালির চেতনায় (গ) বাঙালির স্বাধীনতায় (ঘ) বাঙালির মনে
উত্তর: (খ) বাঙালির চেতনায়

১০৯। ‘রেইনকোট’ গল্পে পাকিস্তানের শরীরের কাঁটা বলা হয়েছে কাকে? [ফেনী গার্লস ক্যাডেট কলেজ]
(ক) মুক্তিবাহিনীকে (খ) পুলিশ বাহিনীকে (গ) শহিদ মিনারকে (ঘ) হাসপাতালকে
উত্তর: (গ) শহিদ মিনারকে

১১০। পাকিস্তান বাঁচাতে হলে স্কুল কলেজ থেকে শহিদ মিনার হটাতে হবে, এ নিবেদনটি করেছেন— [দি. বো. ১৬]
(ক) মিন্টু (খ) ইসহাক (গ) প্রিন্সিপাল (ঘ) নুরুল হুদা
উত্তর: (গ) প্রিন্সিপাল

১১১। ‘পাকিস্তান যদি বাঁচাতে হয় তো সব স্কুল-কলেজ থেকে শহিদ মিনার হটাও।’—বাক্যটিতে শহিদ মিনার কিসের প্রতীক? [রংপুর ক্যাডেট কলেজ]
(ক) বাঙালি জাতীয়তাবাদের বিকাশের প্রতীক
(খ) বাঙালি জাতির সংগ্রামী চেতনার প্রতীক
(গ) বাঙালির প্রতিবাদী চেতনার প্রতীক 
(ঘ) বাঙালির বীরত্বের প্রতীক
উত্তর: (খ) বাঙালি জাতির সংগ্রামী চেতনার প্রতীক (বইভেদে 'সংগ্রামী চেতনা'ও হতে পারে)

১১২। ‘রেইনকোট’ গল্পে ‘আন অথরাইজড কনস্ট্রাকশন’ বলতে বুঝানো হয়েছে— [কু. বো. ২৩]
(ক) কলেজ কম্পাউন্ড (খ) জিমনেশিয়াম (গ) স্মৃতিসৌধ (ঘ) শহিদ মিনার 
উত্তর: (ঘ) শহিদ মিনার

১১৩। নুরুল হুদা নিজেকে প্রিন্সিপালের কী দাবি করে? [এস ও এস হারম্যান মেইনার স্কুল এন্ড কলেজ, ঢাকা]
(ক) আত্মীয় (খ) বন্ধু (গ) কলিগ (ঘ) সাব-অর্ডিনেট 
উত্তর: (ঘ) সাব-অর্ডিনেট

১১৪। ‘সবই তো নর্ম্যাল হয়ে আসছে।’—এ বাক্যে প্রকাশিত হয়েছে— [ব. বো. ২৩]
(ক) সম্ভাবনা (খ) ব্যঙ্গ (গ) সন্তুষ্টি (ঘ) আশা
উত্তর: (খ) ব্যঙ্গ

১১৫। “মিসক্রিয়েন্টরা সব খতম।” —এখানে ‘মিসক্রিয়েন্ট’ বলতে কাদের বোঝানো হয়েছে? [রা. বো. ২৩; চ. বো. ১৬]
(ক) মুক্তিফৌজ (খ) পাকবাহিনী (গ) শান্তিবাহিনী (ঘ) মিত্রবাহিনী
উত্তর: (ক) মুক্তিফৌজ

১১৬। ‘রেইনকোট’ গল্পে রেইনকোটটি কার? [ঢা. বো. ১৭]
(ক) মিন্টুর (খ) নুরুল হুদার (গ) আব্দুস সাত্তারের (ঘ) ড. আফাজ আহমেদের
উত্তর: (ক) মিন্টুর

১১৭। রেইনকোটের প্রকৃত মালিক কে? [বান্দরবান সরকারি কলেজ]
(ক) শ্যালক (খ) বন্ধু (গ) মিলিটারী (ঘ) বাসযাত্রী
উত্তর: (ক) শ্যালক (মিন্টু নুরুল হুদার শ্যালক)

১১৮। ‘রেইনকোট’ গল্পে রেইনকোটটি কার? [ঢা. বো. ১৭]
(ক) মিন্টুর (খ) নুরুল হুদার (গ) আব্দুস সাত্তারের (ঘ) ড. আফাজ আহমেদের
উত্তর: (ক) মিন্টুর

১১৯। মুক্তিযুদ্ধ চলাকালে নুরুল হুদা কতবার বাসা বদলান? [সরকারি দেবেন্দ্র কলেজ, মানিকগঞ্জ]
(ক) ৩ বার (খ) ৪ বার 
উত্তর: (খ) ৪ বার

১২০। ‘রেইনকোট’ গল্পে নুরুল হুদার চতুর্থ বাড়ির জানালা দিয়ে কী দেখা যায়? [রাজশাহী ক্যাডেট কলেজ]
(ক) নদী (খ) হাওর (গ) ধানক্ষেত (ঘ) শহিদ মিনার
উত্তর: (গ) ধানক্ষেত

১২১। পাকিস্তানের ‘ইন্টারনাল অ্যাফেয়ার্স’ কোনটি? [পুলিশ লাইন স্কুল এন্ড কলেজ, রংপুর]
(ক) বাংলাদেশ দখল করা (খ) দেশের গণতন্ত্র ফিরিয়ে দেওয়ার ইচ্ছা
(গ) বাঙালির ওপর নির্যাতন (ঘ) ইস্ট পাকিস্তানি মন্ত্রীদের বহাল রাখা
উত্তর: (গ) বাঙালির ওপর নির্যাতন

১২২। ‘রেইনকোট’ গল্পে ছোট মামা কে? [ড. মাহবুবুর রহমান মোল্লা কলেজ, ঢাকা]
(ক) মন্টু (খ) পিন্টু (গ) মিন্টু (ঘ) ঝন্টু
উত্তর: (গ) মিন্টু

১২৩। নুরুল হুদার মেয়ের বয়স কত বছর ছিল? [চট্টগ্রাম সরকারি মহিলা কলেজ]
(ক) তিন (খ) চার (গ) সাড়ে চার (ঘ) আড়াই 
উত্তর: (ঘ) আড়াই

১২৪। নুরুল হুদার ছেলের বয়স কত বছর? [আহম্মদ উদ্দিন শাহ শিশু নিকেতন স্কুল ও কলেজ, গাইবান্ধা]
(ক) তিন (খ) চার (গ) পাঁচ (ঘ) ছয়
উত্তর: (গ) পাঁচ

১২৫। প্রফেসর আকবর সাজিদকে প্রিন্সিপাল আজকাল তোয়াক্কা করে কেন? [চ. বো. ২৩]
(ক) শিক্ষিত মানুষ বলে (খ) মিলিটারিদের সাথে আঁতাত থাকায়
(গ) ভালো উর্দু বলতে পারে বলে (ঘ) মিসক্রিয়েন্ট সহচর বলে
উত্তর: (গ) ভালো উর্দু বলতে পারে বলে

১২৬। কিসের ওপর অবিরাম বৃষ্টি পড়ছে? [সৃষ্টি কলেজ, টাঙ্গাইল]
(ক) মাথার (খ) ছাতার (গ) রিকশার (ঘ) রেইনকোটের 
উত্তর: (ঘ) রেইনকোটের

১২৭। কোন ঋতুর শেষের বৃষ্টিতে ‘রেইনকোট’ গল্পের নুরুল হুদার শীত শীত ভাব হয়? [কু. বো. ২৩]
(ক) শেষ শরতের (খ) শেষ বর্ষার (গ) শেষ শীতের (ঘ) শেষ হেমন্তের 
উত্তর: (ঘ) শেষ হেমন্তের

১২৮। ‘একটা জিপ উড়াইয়া দিছে, কমপক্ষে পাঁচটা খানসেনা খতম।’ তথ্যটি ‘রেইনকোট’ গল্পের কোন চরিত্রের মাধ্যমে জানা যায়? [রা. বো. ২২]
(ক) লেখক (খ) নুরুল হুদা (গ) আসমা (ঘ) দোকানদার 
উত্তর: (ঘ) দোকানদার

১২৯। ‘রেইনকোট’ গল্পে মিরপুরের বিল দিয়ে আসা নৌকায় কী ছিল? [ব. বো. ২৩]
(ক) খাদ্য (খ) অস্ত্র (গ) সাহায্য (ঘ) আলমারি
উত্তর: (খ) অস্ত্র

১৩০। টুপিতে কোন তেজ আছে বলে ইঙ্গিত রয়েছে? [মির্জাপুর ক্যাডেট কলেজ, টাঙ্গাইল]
(ক) মুক্তিযোদ্ধার তেজ (খ) মিলিটারির তেজ (গ) অন্যায়ের তেজ (ঘ) সন্ত্রাসের তেজ
উত্তর: (খ) মিলিটারির তেজ

১৩১। রেইনকোটের পানি বাসে গড়ালেও নুরুল হুদাকে কেউ কিছু বলেনি কেন? [শ্রীনগর সরকারি কলেজ, মুন্সিগঞ্জ]
(ক) ভয়ে (খ) শ্রদ্ধায় (গ) দয়ায় (ঘ) আশঙ্কায়
উত্তর: (ক) ভয়ে

১৩২। বাসের লোক দুটো পালিয়ে গেল তাকে দেখেই। নুরুল হুদার এরূপ মনে হওয়ার কারণ কী? [বৃন্দাবন সরকারি কলেজ, হবিগঞ্জ]
(ক) তার উষ্কখুষ্ক বেশভূষা (খ) তার পায়ের বুটজুতো
(গ) তার পরনের রেইনকোট (ঘ) তার মাথার টুপি
উত্তর: (গ) তার পরনের রেইনকোট

১৩৩। কী দেখে নুরুল হুদার এক্সট্রা ভালো লাগে? [মিরপুর ক্যান্টনমেন্ট পাবলিক স্কুল ও কলেজ, ঢাকা]
(ক) ঝড়বৃষ্টি (খ) লাল রঙের বাস
(গ) ট্রান্সপারেন্ট আবরণ (ঘ) মানুষ ভয় পাচ্ছে
উত্তর: (গ) ট্রান্সপারেন্ট আবরণ
নোট: ১১৯ নং প্রশ্নটি পূর্ববর্তী পেজের শেষে শুরু হয়েছিল (বাসা বদলানোর সংখ্যা), যার উত্তর ছিল ৪ বার।

১৩৪। ‘রেইনকোট’ গল্পে বর্ণিত ক্রাক-ডাউনের রাতের সাথে ‘নূরলদীনের কথা মনে পড়ে যায়’ কবিতার বর্ণিত কোন বিষয়টি সম্পর্কযুক্ত? [আরডিএ ল্যাব স্কুল এন্ড কলেজ, বগুড়া]
(ক) তীব্র স্বচ্ছ পূর্ণিমা (খ) কালঘুম (গ) নষ্ট ক্ষেত (ঘ) কাল পূর্ণিমা
উত্তর: (খ) কালঘুম

১৩৫। ‘রেইনকোট’ গল্পে মসজিদের মাইক্রোফোন অকেজো ছিল কেন? [বিসিআইসি কলেজ, ঢাকা]
(ক) কর্নেলের হুকুমে (খ) নষ্ট হওয়ায় (গ) গুলি লেগেছিল (ঘ) বিদ্যুৎ না থাকায় 
উত্তর: (ঘ) বিদ্যুৎ না থাকায়

১৩৬। ‘দ্বিতীয়বার আল্লাহর মহত্ত্ব ঘোষণা করার সুযোগ তার আর মেলেনি’—কার সম্পর্কে বলা হয়েছে— [কুমিল্লা ভিক্টোরিয়া সরকারি কলেজ]
(ক) ইসহাকের (খ) মিন্টুর (গ) নুরুল হুদার (ঘ) মুয়াজ্জিনের 
উত্তর: (ঘ) মুয়াজ্জিনের

১৩৭। “প্রিন্সিপালের কালো মুখ বেগুনি হয়”—কেন? [সি. বো. ২২]
(ক) আনন্দে (খ) বেদনায় (গ) ভয়ে (ঘ) বিস্ময়ে
উত্তর: (গ) ভয়ে

১৩৮। ‘রেইনকোট’ গল্পে প্রিন্সিপালের মুখের রং পরিবর্তিত হয় কেন? [শহীদ বীর উত্তম লে: আনোয়ার গার্লস কলেজ, ঢাকা]
(ক) খুশিতে (খ) ভয়ে (গ) উত্তেজনায় (ঘ) দুশ্চিন্তায়
উত্তর: (খ) ভয়ে

১৩৯। ‘রেইনকোট’ গল্পে নুরুল হুদা কোন বিষয়ের শিক্ষক ছিলেন? [ব. বো. ২২; কু. বো. ১৬]
(ক) পদার্থ (খ) রসায়ন (গ) বাংলা (ঘ) ইংরেজি
উত্তর: (খ) রসায়ন

১৪০। ‘রেইনকোট’ গল্পে নুরুল হুদা পেশায় কী ছিলেন? [আজিমপুর গার্লস স্কুল এন্ড কলেজ, ঢাকা]
(ক) গায়ক (খ) চাকরিজীবী (গ) শিক্ষক (ঘ) কৃষক
উত্তর: (গ) শিক্ষক

১৪১। ‘রেইনকোট’ গল্পে নুরুল হুদা অফিসের জন্য কয়টি আলমারি আনা হয়েছিল বলে জানায়? [চট্টগ্রাম ক্যান্টনমেন্ট পাবলিক কলেজ]
(ক) ৩টি (খ) ২টি (গ) ৪টি (ঘ) ১টি 
উত্তর: (ক) ৩টি 

১৪২। ‘সে গ্যাংয়ের একজন সক্রিয় সদস্য’—উক্তিটি কার? [ব্রাহ্মণবাড়িয়া সরকারি কলেজ]
(ক) সাজিদের (খ) মিলিটারির (গ) প্রিন্সিপালের (ঘ) ইসহাকের
উত্তর: (খ) মিলিটারির

১৪৩। ‘রেইনকোট’ গল্পে ‘ছদ্মবেশী মিসক্রিয়েন্ট’ বলতে বোঝানো হয়েছে— [বৃন্দাবন সরকারি কলেজ, হবিগঞ্জ]
(ক) মুক্তিযোদ্ধাদের (খ) রাজাকারদের (গ) মুক্তিফৌঁজকে (ঘ) নুরুল হুদাকে
উত্তর: (ক) মুক্তিযোদ্ধাদের

১৪৪। ‘রাশিয়ার ছিল জেনারেল উইন্টার, আর আমাদের জেনারেল.....’ [জয়পুরহাট গার্লস ক্যাডেট কলেজ]
(ক) মনসুন (খ) সামার (গ) ইয়াহিয়া (ঘ) টিক্কা খান
উত্তর: (ক) মনসুন

১৪৫। ‘মিসক্রিয়েন্টদের ঠিকানা তো তার জানা আছে’—উক্তিটি তোমার পঠিত কোন রচনার? [সিলেট ক্যাডেট কলেজ]
(ক) মাসি-পিসি (খ) বায়ান্নর দিনগুলো (গ) রেইনকোট (ঘ) নেকলেস
উত্তর: (গ) রেইনকোট

১৪৬। ‘রেইনকোট’ গল্পের নুরুল হুদার ঝুলন্ত শরীর যেন ‘কিংবদন্তির কথা বলছি’ কবিতার কবির পূর্বপুরুষ, যার পিঠে রক্তজবার মতো ক্ষত।—এই মন্তব্যের সঙ্গে প্রাসঙ্গিক হলো— [ক্যান্টনমেন্ট পাবলিক স্কুল এন্ড কলেজ, সৈয়দপুর]
(ক) পীড়িতের প্রতিবাদ (খ) আঘাতে অবিচল (গ) প্রতিবাদের ধারাবাহিকতা (ঘ) সুনিপুণ প্রত্যাঘাত
উত্তর: (খ) আঘাতে অবিচল

১৪৭। চাবুকের বাড়ির দিকে নুরুল হুদার আর মনোযোগ দেওয়া হয়ে ওঠে না কেন? [এইচএসসি পরীক্ষা ১৮]
(ক) আঘাত সয়ে যাওয়ায় (খ) মৃত্যু নিশ্চিত জানায় (গ) শরীর অবশ হওয়ায় (ঘ) মুক্তিযোদ্ধাদের সম্পর্কে গভীর ভাবনায় 
উত্তর: (ঘ) মুক্তিযোদ্ধাদের সম্পর্কে গভীর ভাবনায়

১৪৮। মিলিটারির চাবুকের আঘাত নুরুল হুদার কাছে কী বলে মনে হয়? [রা. বো. ১৭]
(ক) অসহ্য যন্ত্রণা (খ) অত্যাচার (গ) অমানবিক কষ্ট (ঘ) স্রেফ উৎপাত 
উত্তর: (ঘ) স্রেফ উৎপাত

১৪৯। রেইনকোট খুলে ফেললেও নুরুল হুদার শরীরে রেইনকোটের কী অনুভূত হয়? [চ. বো. ২৩]
(ক) ওম (খ) গন্ধ
(গ) শীতলতা (ঘ) স্পর্শ
উত্তর: (ক) ওম

১৫০। রেইনকোট খুলে ফেললেও নুরুল হুদার শরীরে রেইনকোটের কী অনুভূত হয়? [মুমিনুন্নিসা সরকারি মহিলা কলেজ, ময়মনসিংহ]
(ক) রেইনকোটের ওম (খ) রেইনকোটের ভেজা গন্ধ
(গ) রেইনকোটের শীতলতা (ঘ) রেইনকোটের পুরনো গন্ধ
উত্তর: (ক) রেইনকোটের ওম

১৫১। ‘কিন্তু তার ওম তার শরীরে এখনো লেগেই রয়েছে।’ ‘রেইনকোট’ গল্পে ‘ওম’-এর ইঙ্গিত কী বোঝানো হয়েছে? [সরকারি গৌরনদী কলেজ, বরিশাল]
(ক) রেইনকোটের ভেতরের উষ্ণতা
(খ) মিলিটারিদের অত্যাচারের বেদনা
(গ) মিন্টুর দেশপ্রেমের চেতনা
(ঘ) নুরুল হুদার দেশপ্রেমের চেতনা
উত্তর: (গ) মিন্টুর দেশপ্রেমের চেতনা

১৫২। ‘রেইনকোট’ গল্পে ‘মিসক্রিয়্যান্ট’ বলতে কাদেরকে বোঝানো হয়েছে? [মৌলভীবাজার সরকারি কলেজ]
(ক) কলেজ শিক্ষকদের (খ) বাংলাদেশের মুক্তিযোদ্ধাদের
(গ) দেশদ্রোহী রাজাকারদের (ঘ) সাধারণ মানুষদের
উত্তর: (খ) বাংলাদেশের মুক্তিযোদ্ধাদের

১৫৩। ‘মিসক্রিয়্যান্ট’ বলতে কী বোঝায়? [ক্যান্টনমেন্ট কলেজ, কুমিল্লা সেনানিবাস; চুয়াডাঙ্গা সরকারি কলেজ]
(ক) মুক্তিযোদ্ধা (খ) দুষ্কৃতকারী
(গ) রাজাকার (ঘ) সন্ত্রাসী
উত্তর: (খ) দুষ্কৃতকারী

১৫৪। ‘রেইনকোট’ গল্পটি কত সালে প্রকাশিত হয়? [চুয়াডাঙ্গা সরকারি কলেজ]
(ক) ১৯৯৩ সালে (খ) ১৯৯৪ সালে
(গ) ১৯৯৫ সালে (ঘ) ১৯৯৬ সালে
উত্তর: (গ) ১৯৯৫ সালে

১৫৫। ‘রেইনকোট’ গল্পটি কোন গ্রন্থ থেকে নেওয়া হয়েছে? [বীরশ্রেষ্ঠ নূর মোহাম্মদ পাবলিক কলেজ, ঢাকা]
(ক) খোয়ারি (খ) দুধভাতে উৎপাত
(গ) দোজখের ওম (ঘ) জাল স্বপ্ন স্বপ্নের জাল
উত্তর: (ঘ) জাল স্বপ্ন স্বপ্নের জাল

১৫৬। ‘রেইনকোট’ গল্পের প্রেক্ষাপট কী? [কক্সবাজার সরকারি মহিলা কলেজ]
(ক) ১৯৫২-এর ভাষা-আন্দোলন
(খ) ১৯৬৯-এর গণঅভ্যুত্থান
(গ) ১৯৭১-এর মুক্তিযুদ্ধ
(ঘ) ১৯৭৫-এর বঙ্গবন্ধু হত্যাকাণ্ড
উত্তর: (গ) ১৯৭১-এর মুক্তিযুদ্ধ

১৫৭। ‘রেইনকোট’ গল্পের কথক কে? [চ. বো. ১৬]
(ক) নুরুল হুদা (খ) গল্পকার
(গ) আবদুস সাত্তার (ঘ) মিন্টু মিয়া
উত্তর: (ক) নুরুল হুদা

১৫৮। ‘রেইনকোট’ গল্পের কথক কে? [চ. বো. ১৬]
(ক) নুরুল হুদা (খ) গল্পকার
(গ) আবদুস সাত্তার (ঘ) মিন্টু মিয়া
উত্তর: (ক) নুরুল হুদা

১৫৯। 'রেইনকোট' গল্পে গল্পে 'রেইনকোট' বহন করছে— [চ. বো. ২২]
অথবা, 'রেইনকোট' গল্পে রেইনকোট কিসের তাৎপর্য বহন করে? [দি. বো. ২২]
(ক) মুক্তিযুদ্ধের ইতিহাস (খ) মুক্তিযুদ্ধের প্রেক্ষাপট
(গ) মুক্তিযুদ্ধের চেতনা (ঘ) ভাষা আন্দোলনের ঘটনা
উত্তর: (গ) মুক্তিযুদ্ধের চেতনা

১৬০। 'রেইনকোট' বর্তমানে বাংলাদেশের— [সরকারি সোহরাওয়ার্দী কলেজ, পিরোজপুর]
(ক) প্রতিবিম্ব (খ) প্রতিচ্ছবি
(গ) চেতনা (ঘ) রক্ষণশীলতা
উত্তর: (গ) চেতনা

১৬১। 'রেইনকোট' গল্পে রেইনকোটটির মাধ্যমে ব্যঞ্জনাময় প্রকাশ ঘটেছে— [ঢা. বো. ২২]
(ক) মুক্তিযুদ্ধ ও সংগ্রাম (খ) পাকবাহিনীর অত্যাচার
(গ) উষ্ণতা, সাহস ও দেশপ্রেম (ঘ) মুক্তিযোদ্ধাদের আত্মত্যাগ
উত্তর: (গ) উষ্ণতা, সাহস ও দেশপ্রেম

১৬২। 'রেইনকোট' গল্পে কোন বিষয়টি অধিক ব্যঞ্জনাময় হয়ে উঠেছে? [য. বো. ১৬]
(ক) গেরিলা আক্রমণ (খ) হানাদার বাহিনীর নিপীড়ন
(গ) নুরুল হুদার দেশপ্রেম (ঘ) রাজাকারদের দৌরাত্ম্য
উত্তর: (গ) নুরুল হুদার দেশপ্রেম

১৬৩। ‘রেইনকোট’ গল্পের প্রেক্ষাপটে নিম্নোক্ত কোন বিষয়টির প্রতি লেখক বেশি সচেতন ছিলেন? [ব. বো. ১৭]
(ক) রাজাকারদের দৌরাত্ম্য (খ) গেরিলাদের আক্রমণ
(গ) নুরুল হুদার দেশপ্রেম (ঘ) হানাদারদের নিপীড়ন
উত্তর: (গ) নুরুল হুদার দেশপ্রেম

১৬৪। ‘রেইনকোট’ গল্পে ভীতু নুরুল হুদার সাহসী হয়ে ওঠার মূল কারণ— [ঢা. বো., সি. বো.]
(ক) মিসক্রিয়্যান্টদের ঠিকানা জানা (খ) সঞ্চারিত উষ্ণতা ও দেশপ্রেম
(গ) কুলিদের আস্তানা চেনা (ঘ) গেরিলাদের সঙ্গে আঁতাত
উত্তর: (খ) সঞ্চারিত উষ্ণতা ও দেশপ্রেম

১৬৫। নুরুল হুদা সাহসী হয়েছিলেন কীভাবে? [রাজউক উত্তরা মডেল কলেজ, ঢাকা]
(ক) মিসক্রিয়্যান্টকারীদের কারণে (খ) অত্যাচারিত হওয়ার কারণে
(গ) রেইনকোট পরার কারণে (ঘ) মুক্তিযুদ্ধের কারণে
উত্তর: (গ) রেইনকোট পরার কারণে

১৬৬। ‘রেইনকোট’ গল্পে রেইনকোটটি কিসের প্রতীক? [দি. বো. ২৩; ম. বো. ২৩; জয়পুরহাট গার্লস ক্যাডেট কলেজ]
(ক) দেশপ্রেম (খ) সাহস
(গ) আভিজাত্য (ঘ) আত্মরক্ষা
উত্তর: (ক) দেশপ্রেম

১৬৭। মিন্টুর রেইনকোট গায়ে দিয়ে নুরুল হুদা কোথায় যাচ্ছিল? [ক্যান্টনমেন্ট পাবলিক স্কুল ও কলেজ, লালমনিরহাট]
(ক) জাদুঘরে (খ) শাহবাগে
(গ) ঢাকা মেডিকেলে (ঘ) ঢাকা কলেজে
উত্তর: (ঘ) ঢাকা কলেজে

১৬৮। 'তুমি আসবে বলে, হে স্বাধীনতা শহরের বুকে জলপাই রঙের ট্যাঙ্ক হলো।' উদ্দীপকটি ‘রেইনকোট’ গল্পের কোন বিষয়কে স্মরণ করিয়ে দেয়? [ঝিনাইদহ ক্যাডেট কলেজ]
(ক) গেরিলা আক্রমণ (খ) সেনাবাহিনীর তৎপরতা
(গ) আর্তনাদ (ঘ) ভয়
উত্তর: (খ) সেনাবাহিনীর তৎপরতা

১৬৯। ১৯৭১ সালে পাকিস্তানিরা বাংলাদেশের মানুষের ওপর নির্মম অত্যাচার চালায়। তখন পাকিস্তানের বিরুদ্ধে এদেশের মানুষও ঝাঁপিয়ে পড়ে। এই ঘটনার সাথে ‘রেইনকোট’ গল্পের কোন দিক মিল রয়েছে? [মাইলস্টোন কলেজ, ঢাকা]
(ক) বর্ণনায় (খ) প্রেক্ষাপট
(গ) দৃষ্টিভঙ্গিতে (ঘ) গঠনগত দিক দিয়ে
উত্তর: (খ) প্রেক্ষাপট

১৭০। মুক্তিযুদ্ধে মিলিটারিদের কোন দিকটি প্রকাশ পেয়েছে? [বাংলাদেশ মহিলা সমিতি বালিকা উচ্চ বিদ্যালয় ও কলেজ, চট্টগ্রাম]
(ক) মহত্ত্ব (খ) আধিপত্য
(গ) পৈশাচিকতা (ঘ) দেশপ্রেম
উত্তর: (গ) পৈশাচিকতা

১৭১। বঙ্গবন্ধুর ৭ই মার্চের ভাষণ ও ‘রেইনকোট’ গল্পের রেইনকোটটি মূলত কিসের প্রতীক? [হামিদপুর আল হেরা কলেজ, যশোর]
(ক) মুক্তিযুদ্ধে অংশগ্রহণ করার
(খ) মুক্তিযোদ্ধার স্বপ্ন পূরণ হওয়ার
(গ) মুক্তিযোদ্ধাদের একত্রিত হওয়ার
(ঘ) মুক্তিযোদ্ধাদের প্রেরণার উজ্জীবিত হওয়ার
উত্তর: (ঘ) মুক্তিযোদ্ধাদের প্রেরণার উজ্জীবিত হওয়ার

১৭২। জেনারেল স্টেটমেন্ট কোনটি? [বরিশাল সরকারি মহিলা কলেজ]
i. শনিতে সাত মঙ্গলে তিন, আর সব দিন দিন
ii. মঙ্গলে ভোররাতে হইল শুরু, তিন দিন মেঘের গুরু গুরু
iii. বুধের সকালে নামল জল, বিকালে মেঘ কয় এবার চল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৭৩। নুরুল হুদাকে পাকিস্তানি হানাদার বাহিনী তলব করার কারণ— [সরকারি বিএমসি মহিলা কলেজ, নওগাঁ]
i. মুক্তিযোদ্ধাদের সন্ধান পেতে
ii. মুক্তিযোদ্ধাদের সহযোগী সন্দেহে
iii. মুক্তিযোদ্ধা বলে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৭৪। 'পাকিস্তান যদি বাঁচাতে হয় তো সব স্কুল কলেজ থেকে শহিদ মিনার হটাও।'-প্রিন্সিপাল উক্তিটি করেছিলেন— [আইডিয়াল স্কুল এন্ড কলেজ, মতিঝিল, ঢাকা]
i. মিলিটারিদের আস্থভাজন হওয়ার জন্য
ii. মিলিটারিদের তোষামোদ করার জন্য
iii. জাতীয় চেতনাকে ম্লান করার জন্য
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৭৫। ‘রেইনকোট’ গল্পে উল্লিখিত প্রিন্সিপাল— [রংপুর ক্যাডেট কলেজ]
i. সুযোগ সন্ধানী
ii. দেশবিরোধী
iii. তোষামুদে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৭৬। প্রিন্সিপালের মতে পাকিস্তানকে বাঁচাতে হলে করতে হবে— [গাংনী সরকারি ডিগ্রি কলেজ, মেহেরপুর]
i. দোয়া
ii. স্থাপত্য উচ্ছেদ
iii. শহিদ মিনার হটানো
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৭৭। দেশে গণতন্ত্র ফিরিয়ে আনতে বদ্ধপরিকর— [বরিশাল সরকারি মহিলা কলেজ]
i. প্রেসিডেন্ট
ii. মিলিটারি
iii. মিসক্রিয়্যান্টরা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৭৮। মিলিটারিরা প্রত্যেকদিন ঢাকা শহরে কী করে?
i. বস্তিতে আগুন লাগিয়ে দেয়
ii. মেয়েদের ধরে নিয়ে যায়
iii. টপাটপ মানুষ মারে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৭৯। ক্র্যাক-ডাউনের রাতে নুরুল হুদার পরিবারের কারও ঘুম না হওয়ার কারণ—
i. স্টেনগানের শব্দ
ii. মানুষের কাতরানি
iii. প্রবল ঝড়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৮০। প্রিন্সিপালের কামরায় বসে থাকা মিলিটারি পাণ্ডাটি হতে পারে—
i. মেজর
ii. কর্নেল
iii. মেজর জেনারেল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৮১। ‘রেইনকোট’ গল্পে প্রকাশিত হয়েছে— [রা. বো. ২৩]
i. অনুভূতির তীব্রতা
ii. আবেগের তীব্রতা
iii. দেশপ্রেম
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৮২। ‘রেইনকোট’ গল্পে রেইনকোটটি কীসের প্রতীক? [ঢা. বো. ১৯]
i. প্রতিহিংসার
ii. দেশপ্রেমের
iii. মুক্তিযুদ্ধের
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

১৮৩। ‘রেইনকোট’ গল্পটি পাঠ শেষে শিক্ষার্থীরা জানতে পারবে— [সি. বো. ১৭]
i. মুক্তিযোদ্ধার স্বরূপ
ii. সাধারণ ব্যক্তির মুক্তিযুদ্ধের চেতনা
iii. পাকবাহিনীর বর্বরতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৮৪। ‘রেইনকোট’ গল্পে ‘রেইনকোট’ মূলত— [সরকারি মহিলা কলেজ, পাবনা]
i. মুক্তিযুদ্ধের প্রেরণার প্রতীক
ii. প্রতিবাদের ও সাহসের প্রতীক
iii. অন্যায়ের বিরুদ্ধে প্রতিরোধের প্রতীক
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ১৮৫ ও ১৮৬ নং প্রশ্নের উত্তর দাও।
ইয়েস-নো-ভেরিগুড টাইপ ইংরেজি শিখে বাঙালি রামকানাই ইংরেজ নীলকরদের কাছে নিজেকে বিশ্বস্ত প্রমাণ করার জন্য নীলচাষীদের উপর অমানবিক নির্যাতনের উপায় বাতলে দেয়। নির্যাতন অসহনীয় হয়ে উঠলে প্রতিরোধ ছাড়া উপায় থাকে না বাঙালি চাষীদের।

১৮৫। উদ্দীপকের রামকানাই ও ‘রেইনকোট’ গল্পে ইসহাক মিয়ার সাদৃশ্য— [ঢা. বো., ব. বো. ১৬]
i. ভাষা ব্যবহারে
ii. বিদেশি প্রীতিতে
iii. নির্যাতনে সহযোগিতায়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৮৬। উদ্দীপক ও ‘রেইনকোট’ গল্পে যুগপৎ প্রকাশিত হয়েছে— [ঢা. বো., ব. বো. ১৬]
(ক) বিদেশি ভাষার আগ্রাসন
(খ) বিদেশি শাসক কর্তৃক সীমাহীন নির্যাতন
(গ) দেয়ালে পিঠ ঠেকে যাওয়া মানুষের সম্মুখ গমন
(ঘ) দেশের জন্য জীবন বাজি রেখে যুদ্ধে ঝাঁপিয়ে পড়া
উত্তর: (খ) বিদেশি শাসক কর্তৃক সীমাহীন নির্যাতন

❖ উদ্দীপকের আলোকে ১৮৭ ও ১৮৮ নং প্রশ্নের উত্তর দাও।
“মোরা একটি ফুলকে বাঁচাবো বলে যুদ্ধ করি
মোরা একটি মুখের হাসির জন্য অস্ত্র ধরি”

১৮৭। উদ্দীপকে ‘মোরা’ শব্দটি ‘রেইনকোট’ গল্পের কোন চরিত্রকে প্রতিনিধিত্ব করে— [সি. বো. ১৬]
(ক) নুরুল হুদা (খ) মিন্টু
(গ) প্রিন্সিপাল (ঘ) আকবর সাজিদ
উত্তর: (খ) মিন্টু

১৮৮। উদ্দীপকের ভাবানুষঙ্গ ‘রেইনকোট’ গল্পের যে দিকটিকে প্রতিফলিত করে— [সি. বো. ১৬]
(ক) সাবভার্সিভ অ্যাক্টিভিটিজ (খ) দেশপ্রেম
(গ) ধ্বংসযজ্ঞ ও গণহত্যা (ঘ) মানবতাবোধ
উত্তর: (খ) দেশপ্রেম

❖ উদ্দীপকের আলোকে ১৮৯ ও ১৯০ নং প্রশ্নের উত্তর দাও।
“দূরে কিংবা কখনো খুবই কাছে
যাচ্ছে শোনা ফুটফাট গুলির আওয়াজ, ত্রাসে
বুক কাঁপে, পারিনা শুধোতে কে কোথায় গেল মরে,
দম বন্ধ করে চুপ করে পড়ে থাকি ঘরের কবরে।”

১৮৯। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের সাদৃশ্য হল— [কু. বো. ১৯]
i. পঁচিশে মার্চের রাতের আক্রমণ
ii. মানুষদের ধরে ক্যাম্পে নিয়ে যাওয়া
iii. গুলির আওয়াজ শুনতে পাওয়া
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

১৯০। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের যে প্রসঙ্গটি মিলে যায়— [কু. বো. ১৯]
i. মুক্তিযুদ্ধ চলাকালীন
ii. নির্যাতিত বাঙালি
iii. মুক্তিযুদ্ধে মানুষের আত্মত্যাগ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

❖ উদ্দীপকের আলোকে ১৯১ ও ১৯২ নং প্রশ্নের উত্তর দাও।
১৯৭১ সাল, জুন-জুলাই মাসে প্রচণ্ড বর্ষা হচ্ছে। বৃষ্টির পানিতে রাস্তা-ঘাট ডুবে গেছে। এই বর্ষার মধ্যে খাদ বুঝতে না পেরে পাকিস্তানি বাহিনীর একটি জিপ উল্টে যায়।

১৯১। উদ্দীপকের প্রাকৃতিক অবস্থাকে ‘রেইনকোট’ গল্পে কী নামে উপস্থাপন করা হয়েছে? [ম. বো. ২২]
(ক) জেনারেল সিজন (খ) জেনারেল মনসুর
(গ) জেনারেল উইন্টার (ঘ) জেনারেল রেইন
উত্তর: (ঘ) জেনারেল রেইন

১৯২। এ বিষয়টি ১৯৭১ সালে গুরুত্বপূর্ণ ভূমিকা রেখেছিল। কারণ— [ম. বো. ২২]
i. পাকিস্তানিদের জন্য প্রতিকূল ছিল
ii. পাকিস্তানিরা এ বিষয়ে উদাসীন ছিল
iii. পাকিস্তানিরা এ বিষয়ে অনভ্যস্ত ছিল
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

❖ উদ্দীপকের আলোকে ১৯৩ ও ১৯৪ নং প্রশ্নের উত্তর দাও।
কলেজ থেকে ঘরে ফেরার পথে ছাত্র-পুলিশ সংঘর্ষের মধ্যে পড়ে যায় মাহমুদ। পুলিশের বেধড়ক লাঠিপেটায় সেদিন থেকেই সে হয়ে ওঠে ভাষা আন্দোলনের একনিষ্ঠ কর্মী।

১৯৩। উদ্দীপকের মাহমুদ ‘রেইনকোট’ গল্পের কোন চরিত্রের সাথে তুলনীয়? [দি. বো. ১৯]
(ক) কুলি (খ) মিন্টু
(গ) নুরুল হুদা (ঘ) ড. আফাজ
উত্তর: (ক) কুলি

১৯৪। উদ্দীপকটি ‘রেইনকোট’ গল্পটিকে যে প্রেক্ষাপট থেকে প্রতিনিধিত্ব করে তা হল— [দি. বো. ১৯]
(ক) ছাত্র-রাজনীতি (খ) ভাষা আন্দোলন
(গ) স্বাধীনতা সংগ্রাম (ঘ) রাজনৈতিক চেতনা
উত্তর: (গ) স্বাধীনতা সংগ্রাম

❖ উদ্দীপকের আলোকে ১৯৫ ও ১৯৬ নং প্রশ্নের উত্তর দাও।
মেডিকেলের সামনে দিয়ে প্রতিদিনের মতো কর্মস্থলে যাচ্ছিল সদাগরি অফিসের কনিষ্ঠ কেরানি মঞ্জু; হঠাৎ মিছিল আর গুলির শব্দ। ভাষা আন্দোলনকারীদের সাথে মঞ্জুর ওপরও বেধড়ক লাঠিচার্জ করে পুলিশ বাহিনী। তারপর থেকে মঞ্জুও হয়ে ওঠে ভাষা আন্দোলনের সক্রিয় কর্মী।

১৯৫। উদ্দীপকের ‘পুলিশ বাহিনী’ ‘রেইনকোট’ গল্পে কাকে প্রতিনিধিত্ব করে? [কু. বো. ১৭]
(ক) রাজাকার (খ) মিলিটারি
(গ) পুলিশ (ঘ) মিসক্রিয়েন্ট
উত্তর: (ঘ) মিসক্রিয়েন্ট

১৯৬। উদ্দীপকের মঞ্জু ও ‘রেইনকোট’ গল্পের নুরুল হুদার চারিত্রিক ঐক্য— [কু. বো. ১৭]
(ক) কর্মে (খ) শিক্ষায়
(গ) ভাষা চেতনায় (ঘ) চেতনার পরিবর্তনে
উত্তর: (খ) শিক্ষায় (দ্রষ্টব্য: চিত্রে 'খ' চিহ্নিত থাকলেও সাধারণত এই ধরণের প্রশ্নে চেতনার পরিবর্তন উত্তর হয়)

❖ উদ্দীপকের আলোকে ১৯৭ ও ১৯৮ নং প্রশ্নের উত্তর দাও।
পিতৃহীন সরল প্রকৃতির মৃদুলকে প্রভাবশালী মীর সাহেবের লোকেরা ধরে নিয়ে যায় এবং একটা মিথ্যা দলিলে স্বাক্ষর করতে বলে। মৃদুলের মনে পড়ে যায় বাবার শেষ উপদেশের কথা— ‘অন্যায়ের কাছে কখনো মাথা নত করো না বিপদের সম্ভাবনা জেনেও মৃদুল তার সিদ্ধান্তে অটল থাকে।

১৯৭। উদ্দীপকের মৃদুল ‘রেইনকোট’ গল্পের কোন চরিত্রের প্রতিনিধিত্ব করে? [য. বো. ১৭]
(ক) ইসহাক (খ) আব্দুস সাত্তার
(গ) আফজাল (ঘ) নুরুল হুদা
উত্তর: (ঘ) নুরুল হুদা

১৯৮। উদ্দীপকের বিষয়ের সাথে ‘রেইনকোট’ গল্পের সাদৃশ্য কোথায়? [য. বো. ১]
(ক) প্রতীকী ব্যঞ্জনায় (খ) পটভূমিতে
(গ) ঘটনায় (ঘ) সমাজচিত্রে
উত্তর: (ঘ) সমাজচিত্রে

❖ উদ্দীপকের আলোকে ১৯৯ ও ২০০ নং প্রশ্নের উত্তর দাও।
৬৯-এর গণঅভ্যুত্থানে মিছিলে মিছিলে প্রকম্পিত রাজপথ। মিছিল শুনে অস্পষ্টভাষী পারভেজ দৌড়ে যায় মিছিলে। সর্বশক্তি দিয়ে চেষ্টা করে স্লোগান দিতে। একসময় পারভেজের কণ্ঠনালি ক্ষত-বিক্ষত হয়ে বেরিয়ে আসে স্পষ্ট ধ্বনি ‘বাংলা’।

১৯৯। উদ্দীপকের পারভেজ চরিত্রটি ‘রেইনকোট’ গল্পের কোন চরিত্রের প্রতিনিধিত্ব করে? [ঢাকা কমার্স কলেজ]
(ক) নুরুল হুদা (খ) আকবর সাজিদ
(গ) মিন্টু (ঘ) আব্দুস সাত্তার মৃধা
উত্তর: (ক) নুরুল হুদা

২০০। উদ্দীপকের ভাবানুষঙ্গ গল্পের যে অন্তর্নিহিত বিষয়ের ইঙ্গিতবাহী, তা হলো— [ঢাকা কমার্স কলেজ]
i. নির্বাকের সবাক হয়ে ওঠা
ii. সুপ্ত চেতনার জাগরণ
iii. মুক্তি-সংগ্রামে সাধারণ মানুষের অংশগ্রহণ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

❖ উদ্দীপকের আলোকে ২০১ ও ২০২ নং প্রশ্নের উত্তর দাও।
“মোরা একটি ফুলকে বাঁচাবো বলে যুদ্ধ করি
মোরা একটি মুখের হাসির জন্য অস্ত্র ধরি”

২০১। উদ্দীপকে ‘মোরা’ ‘রেইনকোট’ গল্পটির যে চরিত্রগুলোকে উপস্থাপন করে— [স্যার আশুতোষ সরকারি কলেজ, চট্টগ্রাম]
i. নুরুল হুদা
ii. মিন্টু
iii. আব্দুস সাত্তার মৃধা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

২০২। উদ্দীপকের ‘রেইনকোট’ গল্পের কোন মনোভাবটি প্রকাশ পেয়েছে?
(ক) উগ্র স্বাজাত্যবোধ (খ) নির্মল দেশপ্রেম
(গ) স্বজনপ্রীতি (ঘ) সাম্প্রদায়িক চেতনা
উত্তর: (খ) নির্মল দেশপ্রেম

❖ উদ্দীপকের আলোকে ২০৩ ও ২০৪ নং প্রশ্নের উত্তর দাও।
মুক্তিযুদ্ধ চলাকালে রাহাত ভাবল, দেশের এই সংকটাপন্ন মুহূর্তে আমি নিশ্চিন্তে ঘরে বসে থাকতে পারি না। তাই এলাকার ১০ জন যুবকের সাথে পরামর্শ করে পাড়ি জমায় প্রশিক্ষণ কেন্দ্রে।

২০৩। অনুচ্ছেদের রাহাত চরিত্রে ভাবনা ‘রেইনকোট’ গল্পে কার মধ্যে খুঁজে পাওয়া যায়? [সি. বো. ২৩]
(ক) নুরুল হুদা (খ) মিন্টু
(গ) ইসহাক মিয়া (ঘ) আব্দুস সাত্তার
উত্তর: (খ) মিন্টু

২০৪। উক্ত সাদৃশ্যের অন্তর্নিহিত কারণ— [সি. বো. ২৩]
i. স্বদেশপ্রেম
ii. অসীম সাহসিকতা
iii. স্বাধীনতার আকাঙ্ক্ষা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ২০৫ ও ২০৬ নং প্রশ্নের উত্তর দাও।
দেশের এই সংকটময় মুহূর্তে আমি ঘরে বসে থাকতে পারি না তাই ঢাকার আরও ২০ জন যুবকের সাথে আমিও পথ ধরেছি ওপার বাংলায়।

২০৫। উদ্দীপকের চরিত্রটি ‘রেইনকোট’ গল্পের কোন চরিত্রকে নির্দেশ করে? [ক্যান্টনমেন্ট কলেজ, যশোর]
(ক) নুরুল হুদা (খ) আব্দুস সাত্তার
(গ) মিন্টু (ঘ) ড. আফাজ আহমদ
উত্তর: (গ) মিন্টু

২০৬। উদ্দীপকে উক্ত চরিত্রের যে বৈশিষ্ট্য ফুটে উঠেছে— [ক্যান্টনমেন্ট কলেজ, যশোর]
i. স্বদেশপ্রেম
ii. অসীম সাহসিকতা
iii. স্বাধীনতার আকাঙ্ক্ষা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ২০৭ ও ২০৮ নং প্রশ্নের উত্তর দাও।
“অলভ্য জয়ের লোভে, জ্বালায় শহর, গ্রামে গ্রামে
প্রাচীন সংহতি ভেঙে ভগ্নস্তূপে দূরের উলুক—”
[ঢা. বো. ২৩; সাভার ক্যান্টনমেন্ট পাবলিক স্কুল ও কলেজ]

২০৭। উদ্দীপকে ‘রেইনকোট’ গল্পে কোন বিষয়টি সাদৃশ্যমান?
(ক) নির্যাতন (খ) ধ্বংসাত্মক কার্যক্রম
(গ) রাজনৈতিক কৌশল (ঘ) মুক্তিযুদ্ধ
উত্তর: (খ) ধ্বংসাত্মক কার্যক্রম

২০৮। উক্ত বিষয়ে যা ফুটে উঠেছে—
i. সভ্যতার ঐতিহ্য ভাঙা
ii. প্রতিরোধহীন হামলা
iii. মানুষকে বাস্তুহারা করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

❖ উদ্দীপকের আলোকে ২০৯ নং প্রশ্নের উত্তর দাও।
হত্যা, বিভীষিকা থেকে বাঁচতে সেদিন আছিয়া ছোট শিশুকে নিয়ে ছুটে যাচ্ছিলেন সীমান্তের দিকে। কিন্তু কয়েকজন পাকহানাদার তাকে অপহরণের জন্য উদ্যত হয়। এমন সময় ষোলো বছর বয়সি এক কিশোর ক্ষুব্ধ হয়ে পাকহানাদার বাহিনীর গাড়ির ওপর গ্রেনেড ছুড়ে।

২০৯। উদ্দীপকে ‘রেইনকোট’ গল্পের কোন বিষয়টির প্রতিফলন ঘটেছে? [হলি ক্রস কলেজ]
(ক) মুক্তিযোদ্ধাদের অদম্য শক্তি-সাহস
(খ) পাকহানাদার বাহিনীর নৃশংসতা
(গ) নিরীহ জীবন সংশয়ের চিত্র
(ঘ) দুঃসাহসী নারীদের বীরত্বের কথা
উত্তর: (খ) পাকহানাদার বাহিনীর নৃশংসতা

❖ উদ্দীপকের আলোকে ২১০ ও ২১১ নং প্রশ্নের উত্তর দাও।
‘বাতাসে লাশের গন্ধ ভাসে
মাটিতে লেগে আছে রক্তের দাগ।’

২১০। উদ্দীপকে ‘রেইনকোট’ গল্পের কোন বিষয়টির মিল রয়েছে? [আজিমপুর গভঃ গার্লস স্কুল এন্ড কলেজ, ঢাকা]
(ক) বাঙালির বীরত্ব (খ) বাঙালির সাহসিকতা
(গ) পাকবাহিনীর বর্বরতা (ঘ) পাকিস্তানিদের স্বার্থপরতা
উত্তর: (গ) পাকবাহিনীর বর্বরতা

২১১। উদ্দীপক ও রেইনকোট গল্পে বর্ণিত বীভৎসতা আমাদের মনে করিয়ে দেয়— [আজিমপুর গভঃ গার্লস স্কুল এন্ড কলেজ, ঢাকা]
(ক) মুক্তিযুদ্ধের ঘটনা (খ) স্বজন হারানোর বেদনা
(গ) বাঙালির দেশপ্রেম (ঘ) যুদ্ধকালীন ক্ষয়ক্ষতি
উত্তর: (ক) মুক্তিযুদ্ধের ঘটনা

❖ উদ্দীপকের আলোকে ২১২ ও ২১৩ নং প্রশ্নের উত্তর দাও।
তুমি আসবে বলে, হে স্বাধীনতা,
শহরের বুকে জলপাই রঙের ট্যাঙ্ক এলো
দানবের মতো চিৎকার করতে করতে

২১২। উদ্দীপকের শহরের চিত্র ‘রেইনকোট’ গল্পের কোন শহরের চিত্রের সাথে সাদৃশ্যপূর্ণ? [ফেনী সরকারি কলেজ]
(ক) ঢাকা (খ) চট্টগ্রাম
(গ) নারায়ণগঞ্জ (ঘ) সিলেট
উত্তর: (ক) ঢাকা

২১৩। উদ্দীপকের আবহে ‘রেইনকোট’ গল্পের যে দিকটি ফুটে উঠেছে— [ফেনী সরকারি কলেজ]
i. মুক্তিযুদ্ধের ভয়াবহ চিত্র
ii. পাকিস্তানিদের বর্বরতা
iii. বাঙালির স্বাধীনতার আকাঙ্ক্ষা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ২১৪ ও ২১৫ নং প্রশ্নের উত্তর দাও।
‘শাসকের শোষকের পীড়কের নিষ্ঠুর পীড়ন
রোধিতে ওরা করেছে পণ।’

২১৪। উদ্দীপকে ‘ওরা’ ‘রেইনকোট’ গল্পে কাদের সঙ্গে সাদৃশ্যপূর্ণ? [রাজেন্দ্রপুর ক্যান্টনমেন্ট পাবলিক স্কুল ও কলেজ, গাজীপুর]
(ক) মিসক্রিয়্যান্টদের (খ) মিলিটারিদের
(গ) প্রফেসরদের (ঘ) বাসের যাত্রীদের
উত্তর: (ক) মিসক্রিয়্যান্টদের

২১৫। উদ্দীপকটির চেতনা কিভাবে নুরুল হুদার মধ্যে প্রতিফলিত হয়েছে? [রাজেন্দ্রপুর ক্যান্টনমেন্ট পাবলিক স্কুল ও কলেজ, গাজীপুর]
(ক) কুলিদেুর জন্যে গভীরভাবে ভাবায়
(খ) মুক্তিযোদ্ধাদের ঠিকানা না বলায়
(গ) রেইনকোটটি নিয়ে প্রতিবাদ করায়
(ঘ) মিলিটারিদের সাথে আঁতাত না করায়
উত্তর: (খ) মুক্তিযোদ্ধাদের ঠিকানা না বলায়

❖ উদ্দীপকের আলোকে ২১৬ ও ২১৭ নং প্রশ্নের উত্তর দাও।
অলভ্য জয়ের লোভে, জ্বালায় শহরে গ্রামে গ্রামে প্রাচীন সংহতি ভেঙে ভগ্নস্তূপে দূরের উলুক বাঁধে কেল্লা।

২১৬। উদ্দীপকের ‘দূরের উলুক’ ‘রেইনকোট’ গল্পের কোন চরিত্রের প্রতিনিধিত্ব করে? [চট্টগ্রাম কলেজ]
(ক) প্রিন্সিপাল (খ) মিলিটারি
(গ) জেনারেল উইন্টার (ঘ) জেনারেল মনসুর
উত্তর: (খ) মিলিটারি

২১৭। উদ্দীপকের কোন ভাবের প্রতিফলন আমরা ‘রেইনকোট’ গল্পে লক্ষ করি? [চট্টগ্রাম কলেজ]
(ক) পাকিস্তানি বাহিনীর নৃশংসতা (খ) পাকিস্তানি বাহিনীর লোভ
(গ) অবরুদ্ধ মানুষের উৎকণ্ঠা (ঘ) জনজীবনের নিরাপত্তাহীনতা
উত্তর: (ক) পাকিস্তানি বাহিনীর নৃশংসতা

❖ উদ্দীপকের আলোকে ২১৮ ও ২১৯ নং প্রশ্নের উত্তর দাও।
‘বাতাসে লাশের গন্ধ ভাসে
মাটিতে লেগে আছে রক্তের দাগ
নদীতে পানার মতো ভেসে থাকা মানুষের পচা লাশ,
মুণ্ডহীন বালিকার কুকুরে খাওয়া বীভৎস শরীর
ভেসে ওঠে চোখের ভিতরে-আমি ঘুমুতে পারি না।’

২১৮। ‘রেইনকোট’ গল্পের কোন বিষয়টির সঙ্গে উদ্দীপকের মিল পাওয়া যায়? [ঠাকুরগাঁও সরকারি কলেজ]
(ক) বাঙালির বীরত্ব (খ) বাঙালির সাহসিকতা
(গ) পাকবাহিনীর বর্বরতা (ঘ) পাকিস্তানিদের স্বার্থপরতা
উত্তর: (গ) পাকবাহিনীর বর্বরতা

২১৯। উদ্দীপকের কবিমনের স্বাজাত্যবোধের চেতনা ‘রেইনকোট’ গল্পের শেষভাগে কার মধ্যে লক্ষ করা যায়? [ঠাকুরগাঁও সরকারি কলেজ]
(ক) কলেজের প্রিন্সিপালের (খ) লেকচারার নুরুল হুদার
(গ) নুরুল হুদার শ্যালকের (ঘ) আব্দুস সাত্তার মৃধার
উত্তর: (খ) লেকচারার নুরুল হুদার

বহুনির্বাচনি প্রশ্নোত্তর
অনুশীলনীর বহুনির্বাচনি প্রশ্নোত্তর
২২০। কার জবানিতে ‘রেইনকোট’ গল্পের অধিকাংশ ঘটনা বিবৃত হয়েছে?
(ক) আব্দুস সাত্তার মৃধা (খ) ড. আফাজ আহমদ
(গ) আখতারুজ্জামান ইলিয়াস (ঘ) নুরুল হুদা
উত্তর: (ঘ) নুরুল হুদা

২২১। নুরুল হুদাকে পাকিস্তানি হানাদার বাহিনীর তলব করার কারণ—
(ক) কমান্ডারের নির্দেশে
(খ) প্রিন্সিপালের অভিযোগে
(গ) মুক্তিযোদ্ধাদের সহযোগী ভেবে
(ঘ) তাকে মুক্তিযোদ্ধা সন্দেহে
উত্তর: (ঘ) তাকে মুক্তিযোদ্ধা সন্দেহে (দ্রষ্টব্য: চিত্রে উত্তর দেওয়া নেই, তবে গল্পের প্রেক্ষাপটে ‘গ’ সঠিক)

❖ উদ্দীপকের আলোকে ২২২ ও ২২৩ নং প্রশ্নের উত্তর দাও।
মুক্তিফৌজ! কথাটা এত ভারী যে এই রকম অত্যাচারী সৈন্য দিয়ে ঘেরা অবরুদ্ধ ঢাকা শহরে বসে মুক্তিফৌজ শব্দটা শুনলেও কেমন যেন অবিশ্বাস্য মনে হয়। আবার ওই অবিশ্বাসের ভেতর থেকে একটা আশা, একটা ভরসার ভাব ধীরে ধীরে মনের কোণে জেগে উঠতে থাকে।

২২২। অনুচ্ছেদে “রেইনকোট” গল্পের কোন ভাবের প্রতিফলন ঘটেছে?
(ক) পাক হানাদার বাহিনীর নৃশংসতা
(খ) মুক্তিযোদ্ধাদের অদম্য শক্তি-সাহস
(গ) মুক্তিযোদ্ধাদের প্রতি গভীর আস্থা
(ঘ) যুদ্ধকালীন অবরুদ্ধ মানুষের উৎকণ্ঠা
উত্তর: (ঘ) যুদ্ধকালীন অবরুদ্ধ মানুষের উৎকণ্ঠা

২২৩। উক্ত ভাবটি যে বাক্যে প্রকাশ পেয়েছে তা হলো—
(ক) মিসক্রিয়্যান্ট লোক ইলেকট্রিক ট্রান্সফর্মার তোড় দিয়া
(খ) একটা জিপ উড়াইয়া দিছে, কমপক্ষে পাঁচটা খানসেনা খতম
(গ) নুরুল হুদার ঝুলন্ত শরীর এতটাই কাঁপে যে চাবুকের বাড়ির দিকে আর মনোযোগ দেওয়া হয়ে ওঠে না
(ঘ) বউয়ের এই ভাইটার জন্যই তাকে এক্সট্রা তটস্থ থাকতে হয়
উত্তর: (ঘ) বউয়ের এই ভাইটার জন্যই তাকে এক্সট্রা তটস্থ থাকতে হয়

২২৪। আখতারুজ্জামান ইলিয়াস কোন তারিখে জন্মগ্রহণ করেন?
(ক) ১৯৪৩ খ্রিষ্টাব্দের ১২ ফেব্রুয়ারি
(খ) ১৯৫০ খ্রিষ্টাব্দের ১০ মে
(গ) ১৯৫২ খ্রিষ্টাব্দের ১৭ মে
(ঘ) ১৯৫৬ খ্রিষ্টাব্দের ১৪ এপ্রিল
উত্তর: (ক) ১৯৪৩ খ্রিষ্টাব্দের ১২ ফেব্রুয়ারি

২২৫। আখতারুজ্জামান ইলিয়াস কোন গ্রামে জন্মগ্রহণ করেন?
(ক) মরিচা গ্রামে (খ) চুকুলিয়া গ্রামে
(গ) গটিয়া গ্রামে (ঘ) শংকরপাশা গ্রামে
উত্তর: (গ) গটিয়া গ্রামে

২২৬। আখতারুজ্জামান ইলিয়াস কোথায় জন্মগ্রহণ করেন?
(ক) হাসপাতালে (খ) দাদার বাড়িতে
(গ) অনাথ আশ্রমে (ঘ) মামার বাড়িতে
উত্তর: (ঘ) মামার বাড়িতে

২২৭। আখতারুজ্জামান ইলিয়াস মূলত কী ছিলেন?
(ক) সাংবাদিক (খ) ঔপন্যাসিক
(গ) কথাসাহিত্যিক (ঘ) প্রাবন্ধিক
উত্তর: (গ) কথাসাহিত্যিক

২২৮। আখতারুজ্জামান ইলিয়াস রচিত গ্রন্থ কোনটি?
(ক) সভ্যতার সংকট (খ) সংস্কৃতি কথা
(গ) সংস্কৃতি ভাঙা সেতু (ঘ) শিক্ষা ও মনুষ্যত্ব
উত্তর: (গ) সংস্কৃতি ভাঙা সেতু

২২৯। আখতারুজ্জামান ইলিয়াস রচিত গ্রন্থ কয়টি?
(ক) ৩টি (খ) ৫টি
(গ) ৭টি (ঘ) ৯টি
উত্তর: (খ) ৫টি

২৩০। 'দোজখের ওম' আখতারুজ্জামান ইলিয়াস কোন ধরনের রচনা?
(ক) উপন্যাস (খ) প্রবন্ধ
(গ) গল্পগ্রন্থ (ঘ) নাটক
উত্তর: (গ) গল্পগ্রন্থ

২৩১। 'দুধভাতে উৎপাত' গল্পগ্রন্থের রচয়িতা কে?
(ক) শওকত ওসমান (খ) আখতারুজ্জামান ইলিয়াস
(গ) কাজী নজরুল ইসলাম (ঘ) হাসান আজিজুল হক
উত্তর: (খ) আখতারুজ্জামান ইলিয়াস

২৩২। নিচের কোনটি উপন্যাস?
(ক) আমার অবিশ্বাস (খ) অন্য ঘরে অন্য স্বর
(গ) খোয়াবনামা (ঘ) ছাড়পত্র
উত্তর: (গ) খোয়াবনামা

২৩৩। নিচের কোনটি মহাকাব্যিক রচনা?
(ক) চিলেকোঠার সেপাই (খ) অন্য ঘরে অন্য স্বর
(গ) খোঁয়ারি (ঘ) দোজখের ওম
উত্তর: (ক) চিলেকোঠার সেপাই

২৩৪। আখতারুজ্জামান ইলিয়াস কোন পুরস্কার লাভ করেন?
(ক) নাসিরউদ্দীন স্বর্ণপদক (খ) একুশে পদক
(গ) বাংলা একাডেমি (ঘ) মুক্তধারা পুরস্কার
উত্তর: (গ) বাংলা একাডেমি

২৩৫। আখতারুজ্জামান ইলিয়াস কত সালে 'বাংলা একাডেমি' পুরস্কার লাভ করেন?
(ক) ১৯৮৯ সালে (খ) ১৯৮২ সালে
(গ) ১৯৭১ সালে (ঘ) ১৯৭৭ সালে
উত্তর: (খ) ১৯৮২ সালে

২৩৬। আখতারুজ্জামান ইলিয়াস কোন তারিখে মৃত্যুবরণ করেন?
(ক) ১৯৭৭ সালের ৪ জানুয়ারি (খ) ১৯৯৬ সালের ১০ জানুয়ারি
(গ) ১৯৯৭ সালের ৪ জানুয়ারি (ঘ) ২০০০ সালের ১১ অক্টোবর
উত্তর: (গ) ১৯৯৭ সালের ৪ জানুয়ারি

২৩৭। 'দোয়া মনে হলো ঠিকই কিন্তু— মাথায় দিতে ভুলে গেল।'
(ক) মাথাল (খ) টুপিটা
(গ) হেলমেট (ঘ) পরচুলা
উত্তর: (খ) টুপিটা

২৩৮। পিওন ঘরে ঢুকলে নুরুল হুদার কী করতে ইচ্ছে করে?
(ক) জড়িয়ে ধরে দু'গালে চড় মারতে
(খ) জড়িয়ে ধরে কোলাকুলি করতে
(গ) জড়িয়ে ধরে চুমু খেতে
(ঘ) মিলিটারি ক্যাম্পে কাটিয়ে দিতে
উত্তর: (গ) জড়িয়ে ধরে চুমু খেতে

২৩৯। প্রিন্সিপালের কোয়ার্টার কোন দিকে?
(ক) কলেজের পুকুর পাড়ের উত্তর দিকে
(খ) কলেজের বাগানের দক্ষিণ পাশে
(গ) মাঠ পেরিয়ে একটি বাঁ দিকে
(ঘ) কলেজের ক্লাবের দেয়াল ঘেঁষে দক্ষিণ দিকে
উত্তর: (গ) মাঠ পেরিয়ে একটি বাঁ দিকে

২৪০। মিলিটারিরা কার কোয়ার্টারের সাথে থাকে? [জ্ঞান]
(ক) পিওনের বাসার সাথে (খ) প্রিন্সিপালের কোয়ার্টারের সাথে
(গ) কলেজের তৃতীয় শ্রেণির কর্মচারী কোয়ার্টারের সাথে (ঘ) কলেজ হোস্টেল সুপারের কোয়ার্টারের সাথে
উত্তর: (খ) প্রিন্সিপালের কোয়ার্টারের সাথে

২৪১। কলেজের জিমনেশিয়াম এখন কী হিসেবে ব্যবহৃত হচ্ছে? [জ্ঞান]
(ক) পিওনের বাসা (খ) প্রিন্সিপালের কোয়ার্টার
(গ) মিলিটারি ক্যাম্প (ঘ) মুক্তিবাহিনীর ক্যাম্প
উত্তর: (গ) মিলিটারি ক্যাম্প

২৪২। প্রিন্সিপালের বাড়ির গেটে বোমা ফেলা অর্থ কী? [অনুধাবন]
(ক) মুক্তিবাহিনীকে আটক করা (খ) মিলিটারি ক্যাম্প অ্যাটাক করা
(গ) মিলিটারিকে সাহায্য করা (ঘ) মিলিটারি ক্যাম্প অ্যাটাক করা
উত্তর: (ঘ) মিলিটারি ক্যাম্প অ্যাটাক করা

২৪৩। ‘রেইনকোট’ গল্পে কলেজটা এখন কাদের? [জ্ঞান]
(ক) শিক্ষকদের (খ) ছাত্রদের
(গ) মিলিটারির (ঘ) মুক্তিবাহিনীর
উত্তর: (গ) মিলিটারির

২৪৪। ইসহাক জিওগ্রাফির প্রফেসরের বাড়ির দিকে রওনা হয় কিসে করে? [জ্ঞান]
(ক) সি.এন.জি (খ) রিকশা
(গ) বাস (ঘ) বেবি ট্যাক্সি
উত্তর: (ঘ) বেবি ট্যাক্সি

২৪৫। ইসহাক এপ্রিল মাস থেকে কোন ভাষায় কথা বলে? [জ্ঞান]
(ক) আরবি (খ) হিন্দি
(গ) বাংলা (ঘ) উর্দু
উত্তর: (ঘ) উর্দু

২৪৬। হাঁপানির টান আছে কার? [অনুধাবন]
(ক) আসমার (খ) নুরুল হুদার
(গ) প্রিন্সিপালের (ঘ) আব্দুস সাত্তার মৃধার
উত্তর: (খ) নুরুল হুদার

২৪৭। প্রিন্সিপাল দিনরাত দোয়া-দরুদ পড়ে কার জন্য? [জ্ঞান]
(ক) মুক্তিবাহিনীর জন্য (খ) শিক্ষকদের জন্য
(গ) পাকিস্তানের জন্য (ঘ) পরিবারের জন্য
উত্তর: (গ) পাকিস্তানের জন্য

২৪৮। প্রিন্সিপাল কবে স্কুল-কলেজ থেকে শহিদ মিনার হটানোর জন্য আবেদন জানায়? [জ্ঞান]
(ক) যুদ্ধের শুরুতে (খ) এপ্রিল মাসের মাঝামাঝি
(গ) জুন মাসের শেষে (ঘ) মার্চ মাসের ২৫ তারিখে
উত্তর: (খ) এপ্রিল মাসের মাঝামাঝি

২৪৯। পাকিস্তানি বাহিনী গ্রামগঞ্জে গিয়েই প্রথমে কিসের দিকে কামান তাক করেছে? [জ্ঞান]
(ক) ধন-সম্পদের দিকে (খ) মুক্তিবাহিনীর দিকে
(গ) শহিদ মিনারের দিকে (ঘ) মেয়েলোকে দিকে
উত্তর: (গ) শহিদ মিনারের দিকে

২৫০। নুরুল হুদাকে এক্সট্রা তটস্থ থাকতে হয় কেন? [অনুধাবন]
(ক) মিন্টুর জন্য (খ) আসমার জন্য
(গ) পাকিস্তানি বাহিনীর জন্য (ঘ) প্রিন্সিপালের জন্য
উত্তর: (ক) মিন্টুর জন্য

২৫১। মিন্টু মগবাজারের দুই কামরার ফ্ল্যাট থেকে চলে যায় কবে? [জ্ঞান]
(ক) ১ এপ্রিল (খ) ৩০ মার্চ
(গ) ২৩ জুন (ঘ) ২১ ফেব্রুয়ারি
উত্তর: (গ) ২৩ জুন

২৫২। মিলিটারি আসার পর থেকে নুরুল হুদা কতবার বাড়ি বদল করে? [জ্ঞান]
(ক) তিনবার (খ) দুইবার
(গ) একবারও নয় (ঘ) চারবার
উত্তর: (ঘ) চারবার

২৫৩। “আমার ভাইটাকে আর ঢাকায় রাখলাম না।” —উক্তিটি কার? [অনুধাবন]
(ক) আসমার (খ) নুরুল হুদা
(গ) প্রিন্সিপালের (ঘ) নিচের তলার ভদ্রলোকের
উত্তর: (ঘ) নিচের তলার ভদ্রলোকের

২৫৪। পুবদিকের জানালা ধরে দাঁড়ালে কী চোখে পড়ে? [জ্ঞান]
(ক) মিলিটারির ক্যাম্প ও গাড়ি (খ) কলেজ ও প্রিন্সিপাল কোয়ার্টার
(গ) বিল আর ধানখেত (ঘ) মসজিদ ও রাস্তা
উত্তর: (গ) বিল আর ধানখেত

২৫৫। মিন্টু কোথায় আছে তা জানে কে? [জ্ঞান]
(ক) প্রিন্সিপাল (খ) পাকিস্তানি বাহিনী
(গ) নুরুল হুদা ও তার বউ (ঘ) আব্দুস সাত্তার মৃধা
উত্তর: (গ) নুরুল হুদা ও তার বউ

২৫৬। পাকিস্তানের ‘ইন্টারনাল অ্যাফেয়ার্স’ কোনটি? [উচ্চতর দক্ষতা]
(ক) বাংলাদেশ দখল করা (খ) দেশে গণতন্ত্র ফিরিয়ে দেওয়ার ইচ্ছা
(গ) বাঙালির ওপর নির্যাতন (ঘ) ইস্ট পাকিস্তানি মন্ত্রীদের বহাল রাখা
উত্তর: (গ) বাঙালির ওপর নির্যাতন

২৫৭। নুরুল হুদার নিচের ফ্ল্যাটে কে থাকে? [জ্ঞান]
(ক) ইলেকট্রিক ওয়ার্কশপের মালিক (খ) ওয়েলডিং ওয়ার্কশপের মালিক
(গ) ইঞ্জিনিয়ার (ঘ) রাজাকার
উত্তর: (খ) ওয়েলডিং ওয়ার্কশপের মালিক

২৫৮। “আব্বু ছোট মামা হয়েছে।”—কথাটির অর্থ কী? [উচ্চতর দক্ষতা]
(ক) আব্বুকে জানানো হচ্ছে ছোট মামা সম্পর্কে (খ) আব্বুকে ছোট মামার মতো লাগছে
(গ) আব্বু আর ছোট মামার একাত্মতা (ঘ) আব্বুর সাথে ছোট মামার বৈসাদৃশ্য
উত্তর: (খ) আব্বুকে ছোট মামার মতো লাগছে

২৫৯। মেয়ের ঘুম ভাঙা গলায় ভাঙা বুলি শুনে নুরুল হুদার অনুভূতি কেমন ছিল? [জ্ঞান]
(ক) খুব ভালো লাগছিল (খ) চমকে উঠেছিল
(গ) স্বর্গীয় অনুভূতি জাগে (ঘ) শান্তির ছোঁয়া লাগে প্রাণে
উত্তর: (খ) চমকে উঠেছিল

২৬০। নুরুল হুদার ছেলের বয়স কত? [জ্ঞান]
(ক) আড়াই বছর (খ) চার বছর
(গ) পাঁচ বছর (ঘ) সাড়ে পাঁচ বছর
উত্তর: (গ) পাঁচ বছর

২৬১। আব্বুকে ছোট মামার মতো দেখাচ্ছে—এই রায়টি কে দিয়েছিল? [জ্ঞান]
(ক) আড়াই বছরের মেয়ে (খ) আসমা
(গ) মিন্টুর ছেলে (ঘ) পাঁচ বছরের ছেলে
উত্তর: (ঘ) পাঁচ বছরের ছেলে

২৬২। ড্রেসিং টেবিলের সামনে নিজের নতুন রূপ দেখে নুরুল হুদার মনের অবস্থা কেমন হয়? [জ্ঞান]
(ক) নতুন রূপে ভ্যাবাচেকা খায় (খ) চমকে ওঠে
(গ) আনন্দিত হয় (ঘ) নিজেকে মিলিটারি মনে করে
উত্তর: (ক) নতুন রূপে ভ্যাবাচেকা খায়

২৬৩। “সাবভার্সিভ অ্যাক্টিভিটির সঙ্গে তারা সামহাউ অর আদার ইনভল্ভড”—উক্তিটি কার? [জ্ঞান]
(ক) মেজরের (খ) মিলিটারির
(গ) প্রিন্সিপালের (ঘ) ইসহাকের
উত্তর: (গ) প্রিন্সিপালের

২৬৪। নুরুল হুদা কোনগুলো থেকে শত হাত দূরে? [জ্ঞান]
(ক) মিসক্রিয়্যান্টদের সহায়তা করা (খ) মিন্টুর সাথে যোগাযোগ রাখা
(গ) সাবভার্সিভ অ্যাক্টিভিটিজ (ঘ) কলেজের দেয়াল ঘেঁষে বোমা ফাটানো
উত্তর: (গ) সাবভার্সিভ অ্যাক্টিভিটিজ

২৬৫। ফিরে এসে দেশের ভিতরে মিন্টু কী করে? [জ্ঞান]
(ক) দেশে ত্রাণ বিতরণ করে (খ) মিলিটারিদের সাথে বৈঠক করে
(গ) দমাদম মিলিটারি মারে (ঘ) বোনের সংসারে অশান্তি সৃষ্টি করে
উত্তর: (গ) দমাদম মিলিটারি মারে

২৬৬। “তাতে আর দুলাভাইয়ের দোষটা কোথায়?” —এখানে কার দুলাভাইয়ের কথা বলা হয়েছে? [জ্ঞান]
(ক) প্রিন্সিপালের (খ) মিন্টুর
(গ) ইসহাকের (ঘ) ওয়েলডিং ওয়ার্কশপের মালিকের
উত্তর: (খ) মিন্টুর

২৬৭। ‘রেইনকোট’ গল্পে ব্যবহৃত দ্বিরুক্তি শব্দযুগল কোনটি? [প্রয়োগ]
(ক) দমাদম, টপাটপ (খ) দমাদম, চুপচাপ
(গ) দমাদম, টপাটপ (ঘ) দমাদম, হই হই
উত্তর: (গ) দমাদম, টপাটপ

২৬৮। ‘টু শব্দটি না করা’ বাগধারাটির অর্থ কী? [অনুধাবন]
(ক) চুপচাপ লুকিয়ে থাকা (খ) প্রচণ্ড আঘাতের শব্দ
(গ) কোনো প্রতিবাদ না করা (ঘ) নীরব থাকা
উত্তর: (গ) কোনো প্রতিবাদ না করা

২৬৯। প্রিন্সিপালের কোয়ার্টার কোথায়? [জ্ঞান]
(ক) মিলিটারির ক্যাম্পের দেয়াল ঘেঁষে (খ) কলেজের দেয়াল ঘেঁষে
(গ) ইসহাকের ঘরের দেয়াল ঘেঁষে (ঘ) মিসক্রিয়্যান্টদের ঘাঁটির কাছে
উত্তর: (খ) কলেজের দেয়াল ঘেঁষে

২৭০। মিলিটারি ক্যাম্প কোথায়? [জ্ঞান]
(নিচে উত্তর বা অপশন অংশটি ছবিতে কাটা পড়েছে)
(ক) কলেজের দেয়াল ঘেঁষে
(খ) মিসক্রিয়্যান্টদের ঘাঁটির অদূরে
(গ) প্রিন্সিপালের কোয়ার্টারের পাশে
(ঘ) ইসহাকের বাড়ির পাশে
উত্তর: (গ) প্রিন্সিপালের কোয়ার্টারের পাশে

২৭১। ছেলেরা কলেজে আসে না কেন? [জ্ঞান]
(ক) সব ক্লাস বন্ধ বলে
(খ) কলেজে এলে মিলিটারি ধরে নিয়ে যাবে বলে
(গ) ছেলেরা সব মিসক্রিয়্যান্টদের দলে যোগ দিয়েছে বলে
(ঘ) স্যারেরা নিরুদ্দেশ বলে
উত্তর: (ক) সব ক্লাস বন্ধ বলে

২৭২। ক্লাস বন্ধ থাকলেও মাস্টারদের কলেজে আসতে হয় কেন? [জ্ঞান]
(ক) গোপন পরামর্শের জন্য
(খ) হাজিরা দিতে হয় বলে
(গ) প্রাইভেট পড়াতে
(ঘ) মিলিটারিদের সাথে আঁতাত করতে
উত্তর: (খ) হাজিরা দিতে হয় বলে

২৭৩। নুরুল হুদার কলিগরা কোথায় বসে ফিসফিস করে? [জ্ঞান]
(ক) প্রিন্সিপালের রুমে (খ) স্টাফ রুমে
(গ) মিলিটারির সামনে (ঘ) ক্লাসরুমে
উত্তর: (খ) স্টাফ রুমে

২৭৪। হিন্দুস্তান ও মিসক্রিয়্যান্টদের অবশ্যম্ভাবী পতন সম্বন্ধে ভবিষ্যদ্বাণী শোনে কে? [অনুধাবন]
(ক) নুরুল হুদা (খ) প্রিন্সিপাল
(গ) মিলিটারি (ঘ) মিন্টু
উত্তর: (ক) নুরুল হুদা

২৭৫। খ্যাসখ্যাসে গলায় হিন্দুস্তান ও মিসক্রিয়্যান্টদের অবশ্যম্ভাবী পতনের ভবিষ্যদ্বাণী কে করে? [জ্ঞান]
(ক) ইসহাক (খ) প্রিন্সিপাল
(গ) মিলিটারি (ঘ) মিন্টু
উত্তর: (খ) প্রিন্সিপাল

২৭৬। কোন ঘরে আজকাল সহজে কেউ ঘেঁষে না? [জ্ঞান]
(ক) ইসহাকের ঘরে
(খ) মিলিটারির ঘরে
(গ) ড. আফাজ আহমেদের ঘরে
(ঘ) ওয়েল্ডিং ওয়ার্কশপের মালিকের ঘরে
উত্তর: (গ) ড. আফাজ আহমেদের ঘরে

২৭৭। ড. আফাজ আহমেদের গলার স্বর কেমন? [জ্ঞান]
(ক) তোতলানো (খ) খ্যাসখ্যাসে
(গ) সুরেলা (ঘ) মোটা
উত্তর: (খ) খ্যাসখ্যাসে

২৭৮। কলেজের উর্দু প্রফেসরের নাম কি? [জ্ঞান]
(ক) ড. আফাজ আহমদ (খ) ইসহাক
(গ) আকবর আজিজ (ঘ) আকবর সাজিদ
উত্তর: (ঘ) আকবর সাজিদ

২৭৯। নুরুল হুদা বৃষ্টিতে রিকশার পরোয়া করে না কেন? [জ্ঞান]
(ক) রাস্তায় রিকশা নেই বলে (খ) রেইনকোট গায়ে আছে বলে
(গ) বাসস্ট্যান্ড কাছে বলে (ঘ) রিকশা ভাড়া নেই বলে
উত্তর: (খ) রেইনকোট গায়ে আছে বলে

২৮০। রেইনকোট পরে নুরুল হুদা কেমন করে হাঁটে? [জ্ঞান]
(ক) বীরদর্পে (খ) হনহন করে
(গ) ধীরে ধীরে (ঘ) জনগণকে ভয় দেখিয়ে
উত্তর: (খ) হনহন করে

২৮১। কোন ঋতুর শেষের বৃষ্টিতে নুরুল হুদার শীত শীত ভাব হয়? [জ্ঞান]
(ক) শরতের শেষে (খ) শেষ বর্ষায়
(গ) শেষ হেমন্তে (ঘ) শীতের শেষে
উত্তর: (গ) শেষ হেমন্তে

২৮২। “কিন্তু— ভেতরে কী সুন্দর ওম!” খালি ঘরে উপযুক্ত শব্দ কোনটি? [জ্ঞান]
(ক) মিলিটারির ঘরের (খ) শীতের পোশাকের
(গ) রেইনকোটের (ঘ) বাসের
উত্তর: (গ) রেইনকোটের

২৮৩। একটু বাচাল টাইপের কে? [জ্ঞান]
(ক) ইসহাক (খ) দোকানদার ছেলেটা
(গ) উর্দু সাজিদ (ঘ) আসমা
উত্তর: (খ) দোকানদার ছেলেটা

২৮৪। রেইনকোটের পানিতে বাস সয়লাব হয়ে গেলেও কেউ কিছু না বলার কারণ কী? [উচ্চতর দক্ষতা]
(ক) রেইনকোট পরিধান করা পোশাকে সবাই ঘাবড়ে গেছে
(খ) মিলিটারির পিস্তলের ভয়ে
(গ) মিলিটারির নির্যাতনের কথা জানা আছে বলে
(ঘ) মিলিটারির চেলা ভেবে
উত্তর: (ক) রেইনকোট পরিধান করা পোশাকে সবাই ঘাবড়ে গেছে

২৮৫। বাস থেকে নেমে যাওয়া দুজন যাত্রীকে নুরুল হুদার কাছে কী মনে হয়? [জ্ঞান]
(ক) মিসক্রিয়্যান্ট (খ) ক্রিমিনাল
(গ) চোর (ঘ) পকেটমার
উত্তর: (খ) ক্রিমিনাল

২৮৬। নামার সময় ক্রিমিনাল দুজনের একজন কী করল? [জ্ঞান]
(ক) ইসহাককে ধাক্কা মেরেছিল (খ) নুরুল হুদার দিকে পিছনে ফিরে তাকাল
(গ) জানালা দিয়ে লাফ দিল (ঘ) ইসহাককে ছুরি দিয়ে আঘাত করল
উত্তর: (খ) নুরুল হুদার দিকে পিছনে ফিরে তাকাল

২৮৭। বাসে যেতে যেতে কী দেখে নুরুল হুদার এক্সট্রা ভালো লাগে? [জ্ঞান]
(ক) দেশ-বিদেশের পতাকা (খ) পাকিস্তানের পতাকা
(গ) ট্রান্সপারেন্ট আবরণ (ঘ) বাংলাদেশের পতাকা
উত্তর: (গ) ট্রান্সপারেন্ট আবরণ

২৮৮। নুরুল হুদা সমস্ত ভালোলাগাটা চিড় খায় কখন? [জ্ঞান]
(ক) গাড়ি নষ্ট হয়ে গেলে (খ) হঠাৎ বাস ব্রেক কষলে
(গ) মিলিটারির আগমনে (ঘ) গোলাগুলি শুরু হলে
উত্তর: (খ) হঠাৎ বাস ব্রেক কষলে

২৮৯। ক্র্যাক-ডাউনের রাত কেটে ভোর হলে মিলিটারির গুলিতে ছাদ থেকে কে পড়ে যায়? [জ্ঞান]
(ক) প্রিন্সিপাল (খ) মসজিদের মুয়াজ্জিন সাহেব
(গ) ইসহাকের শ্যালক (ঘ) ইমাম সাহেব
উত্তর: (খ) মসজিদের মুয়াজ্জিন সাহেব

২৯০। “দ্বিতীয়বার আল্লাহর মহত্ত্ব ঘোষণা করার সুযোগ তার আর মেলেনি।”—কার সম্পর্কে বলা হয়েছে? [অনুধাবন]
(ক) ইসহাকের (খ) মিন্টুর
(গ) প্রিন্সিপালের (ঘ) মোয়াজ্জিনের
উত্তর: (ঘ) মোয়াজ্জিনের

২৯১। মিলিটারি যাবতীয় গাড়ি থামিয়ে কী করছে? [জ্ঞান]
(ক) প্যাসেঞ্জারদের তল্লাশি করছে (খ) গাড়ি ভাঙচুর করছে
(গ) জিপে করে প্যাসেঞ্জারদের বাড়ি পৌঁছে দিচ্ছে (ঘ) পকেটমারদের আটকাচ্ছে
উত্তর: (ক) প্যাসেঞ্জারদের তল্লাশি করছে

২৯২। “ছুঁচালো চোখের মণি কাঁটার মতো বিঁধে যায় তার মুখে”—কার চোখের মণির কথা বলা হয়েছে? [জ্ঞান]
(ক) মিলিটারির (খ) ইসহাকের
(গ) প্রিন্সিপালের (ঘ) মিন্টুর
উত্তর: (ক) মিলিটারির

২৯৩। “আগে বাড়ো”—ড্রাইভারকে কে নির্দেশনা দেয়? [জ্ঞান]
(ক) ইসহাক (খ) মিলিটারি
(গ) মিন্টু (ঘ) চোর ও পকেটমার
উত্তর: (খ) মিলিটারি

২৯৪। নুরুল হুদা বাস থেকে কোথায় নামে? [জ্ঞান]
(ক) আসাদ গেট (খ) নীলক্ষেত
(গ) নিউমার্কেট (ঘ) ঢাকা কলেজের গেট
উত্তর: (গ) নিউমার্কেট

২৯৫। প্রিন্সিপালের সিংহাসন-মার্কা চেয়ারে কে বসে রয়েছে? [জ্ঞান]
(ক) প্রিন্সিপাল নিজে (খ) জাঁদরেল টাইপের এক মিলিটারি পাণ্ডা
(গ) জনাব আকবর সাজিদ (ঘ) মিসক্রিয়্যান্টদের নেতা
উত্তর: (খ) জাঁদরেল টাইপের এক মিলিটারি পাণ্ডা

২৯৬। জাঁদরেল মিলিটারি পাণ্ডাকে দেখে প্রিন্সিপালের কালো মুখটা কেমন হয়? [জ্ঞান]
(ক) লাল (খ) নীল
(গ) বেগুনি (ঘ) ফ্যাকাশে
উত্তর: (গ) বেগুনি

২৯৭। “সেনাবাহিনীকে নিয়ে মজা করে শায়েরি করা খুব বড় অপরাধ”—মিলিটারি এ কথাটি কাকে বলে? [জ্ঞান]
(ক) প্রিন্সিপালকে (খ) আকবর সাজিদকে
(গ) নুরুল হুদাকে (ঘ) আব্দুস সাত্তার মৃধাকে
উত্তর: (ক) প্রিন্সিপালকে

২৯৮। সাজিদ সাহেব যদি পালিয়ে না থাকে তাহলে তার কপালে লিখন কে জানে? [জ্ঞান]
(ক) আল্লাহ (খ) আল্লাহ আর মিলিটারি
(গ) মিলিটারি (ঘ) ইসহাক
উত্তর: (খ) আল্লাহ আর মিলিটারি

২৯৯। কোন দুজনের চোখ বেঁধে দেওয়া হয়েছিল? [জ্ঞান]
(ক) প্রফেসর নুরুল হুদা ও প্রিন্সিপালের (খ) নুরুল হুদা ও আব্দুস সাত্তার মৃধার
(গ) প্রিন্সিপাল ও আকবর সাজিদের (ঘ) প্রিন্সিপাল ও আব্দুস সাত্তার মৃধার
উত্তর: (খ) নুরুল হুদা ও আব্দুস সাত্তার মৃধার

৩০০। কিছুদিন আগে কলেজে মোট কয়টি আলমারি কেনা হয়েছে?
(ক) পাঁচটি (খ) তিনটি
(গ) দশটি (ঘ) বারোটি
উত্তর: (গ) দশটি

৩০১। কলেজের জন্য কেনা আলমারিগুলো কোন গাড়ি করে নিয়ে আসা হয়?
(ক) ট্রাক (খ) পিকআপ
(গ) ঠেলাগাড়ি (ঘ) বাস
উত্তর: (গ) ঠেলাগাড়ি

৩০২। মিসক্রিয়্যান্টরা কলেজে কী বেশে ঢুকেছিল?
(ক) ফকিরের ছদ্মবেশে (খ) কুলির ছদ্মবেশে
(গ) পাগলের ছদ্মবেশে (ঘ) দরবেশের ছদ্মবেশে
উত্তর: (খ) কুলির ছদ্মবেশে

৩০৩। মিসক্রিয়্যান্ট কুলি গ্যাংয়ের সক্রিয় সদস্য হিসেবে তারা কার নাম বলেছে?
(ক) প্রিন্সিপাল ড. আফাজ আহমদের নাম
(খ) নূরুল হুদার নাম
(গ) মিন্টুর নাম
(ঘ) আব্দুস সাত্তার মৃধার নাম
উত্তর: (খ) নূরুল হুদার নাম

৩০৪। কেমিস্ট্রি ডিপার্টমেন্টে আলমারি সাজানোর সময় কোন ঋতু চলছিল?
(ক) গ্রীষ্ম (খ) বর্ষা
(গ) শরৎ (ঘ) হেমন্ত
উত্তর: (খ) বর্ষা

৩০৫। "বর্ষাকালই তো জুৎ"-কথাটি কে বলে?
(ক) একটি কুলি (খ) নূরুল হুদা
(গ) স্টাফরুমের কলিগ (ঘ) মিন্টু
উত্তর: (ক) একটি কুলি

৩০৬। "বাংলার বর্ষা তো শালার জানে না। রাশিয়ায় ছিল জেনারেল উইন্টার, আমাদের জেনারেল মনসুন।"-কথাটি কে বলেছিল?
(ক) এক কুলি (খ) স্টাফরুমের কলিগ
(গ) ছদ্মবেশী ছেলে (ঘ) মিন্টু
উত্তর: (খ) স্টাফরুমের কলিগ

৩০৭। মিলিটারি নূরুল হুদাকে একই প্রশ্ন করে জবাব না পেয়ে কী করে?
(ক) তাকে থাপ্পড় মারে (খ) তার মুখে ঘুষি মারে
(গ) তাকে দুধ-পাউরুটি খাওয়ায় (ঘ) তাকে চাবুক মারে
উত্তর: (খ) তার মুখে ঘুষি মারে

৩০৮। মিসক্রিয়্যান্টদের আস্তানা জানা আছে কিনা এ প্রসঙ্গে ফের জিজ্ঞেস করলে নূরুল হুদা কী উত্তর দেয়?
(ক) জানি না (খ) না
(গ) হ্যাঁ (ঘ) জি হুজুর
উত্তর: (গ) হ্যাঁ

৩০৯। মিসক্রিয়্যান্টদের ঠিকানা বলে দেওয়ার কথায় নূরুল হুদাকে মিলিটারিরা কী খাওয়ায়?
(ক) দুধ-কলা (খ) পাউরুটি-দুধ
(গ) দুধ-ভাত (ঘ) দই-চিড়া
উত্তর: (খ) পাউরুটি-দুধ

৩১০। নূরুল হুদার বেঁটেখাটো শরীরটাকে মিলিটারিরা কী করে?
(ক) পিটিয়ে লম্বা করে (খ) গরম পানিতে ডোবায়
(গ) ছাদে লাগানো আংটার সাথে ঝুলিয়ে দেয় (ঘ) ফাঁসি দেয়
উত্তর: (গ) ছাদে লাগানো আংটার সাথে ঝুলিয়ে দেয়

৩১১। সপাং সপাং চাবুকের বাড়িতে নূরুল হুদার কেমন মনে হচ্ছে?
(ক) যেন বৃষ্টি পড়ছে মিন্টুর রেইনকোটের উপর
(খ) যেন টিনের চালে বৃষ্টির শব্দ
(গ) নূপুরের নিক্বণ
(ঘ) মিসক্রিয়্যান্টদের মিছিল ও গোলাবারুদ
উত্তর: (ক) যেন বৃষ্টি পড়ছে মিন্টুর রেইনকোটের উপর

বহুপদী সমাপ্তিসূচক বহুনির্বাচনি প্রশ্নোত্তর:
৩১২। "প্রতিবাদের প্রবল ঝড়ে কাঁপছিল সব অন্যায়"-এ কথার সাথে সাদৃশ্যপূর্ণ প্রেক্ষাপটটি—
i. নূরুল হুদার নীরব প্রতিবাদ
ii. চাবুকের বাড়িকে তুচ্ছ করা
iii. অন্যায়ের কাছে নূরুল হুদার মাথা নত না করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩১৩। কলেজের দেওয়ালের পর রয়েছে—
i. বাগান
ii. টেনিস লন
iii. পুকুর
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩১৪। ‘রেইনকোট’ গল্পে পাকিস্তানিদের যেসব অন্যায় কাজের কথা উল্লেখ করা হয়েছে— [প্রয়োগ]
i. মানুষ মেরে সাফ করে দেওয়া
ii. বাড়িঘর জ্বালিয়ে দেওয়া
iii. ১৪৪ ধারা জারি করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩১৫। ‘রেইনকোট’ গল্পে উল্লিখিত মিলিটারির বিভিন্ন গুপ্তি হলো— [প্রয়োগ]
i. পাঞ্জাব আর্টিলারি
ii. কমান্ডো ফোর্স
iii. মিলিটারি পুলিশ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩১৬। বাসস্ট্যান্ডে নুরুল হুদাকে দাঁড়াতে দেখলে দোকানদার ছেলেটা যেসব খবর দেয়— [প্রয়োগ]
i. মুক্তিযোদ্ধা কর্তৃক খান সেনাদের মারার খবর
ii. মিলিটারির জিপ উড়িয়ে দেওয়ার খবর
iii. রংপুর-দিনাজপুরের বেশিরভাগ জায়গার স্বাধীন হওয়ার খবর
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩১৭। ক্র্যাক-ডাউনের রাতে নুরুল হুদা পরিবারের কারও ঘুম না হওয়ার কারণ— [অনুধাবন]
i. ট্যাঙ্কের হুঙ্কার
ii. স্টেনগানের শব্দ
iii. মানুষের কাতরানি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

অভিন্ন তথ্যভিত্তিক বহুনির্বাচনি প্রশ্নোত্তর
❖ উদ্দীপকের আলোকে ৩১৮ ও ৩১৯ নং প্রশ্নের উত্তর দাও।
“রাস্তার একদিকে এলাকায় গলির মধ্যে কারফিউ। ট্যাক্সিতে ড্রাইভার ছাড়া আরও তিন জন শিখ— এদের সাথে না নিয়ে দেড় টাকার পথে পনের টাকায় আসতেও ট্যাক্সিটা রাজি হয়নি। দোষ দেবে কে? মৃত্যুর আতঙ্কে থমথম করছে চারিদিক, প্রতিটি ইন্দ্রিয় দিয়ে তা অনুভব করা যায়। জীবনের মূল্য নিয়ে কে দরদস্তুর করবে? গুমটে ঘেমে ঘেমে প্রমথর শরীর ভিজে গিয়েছিল।”
[তথ্যসূত্র: স্বাধীনতা স্বাদ— মানিক বন্দ্যোপাধ্যায়]

৩১৮। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের যে সাদৃশ্য রয়েছে— [প্রয়োগ]
i. যুদ্ধের প্রেক্ষাপটে
ii. জীবন-মৃত্যুর মাঝে মানুষের অনিশ্চিত বেঁচে থাকা
iii. দেশপ্রেমের বিষয়ে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩১৯। উদ্দীপকে ‘প্রমথ’ চরিত্রের সাথে কার সাদৃশ্য রয়েছে? [অনুধাবন]
(ক) নুরুল হুদার (খ) প্রিন্সিপালের
(গ) মিন্টুর (ঘ) মিলিটারির
উত্তর: (ক) নুরুল হুদার

❖ উদ্দীপকের আলোকে ৩২০ ও ৩২১ নং প্রশ্নের উত্তর দাও।
“আমি যদি অহন থানার মধ্যে গিয়া দারোগারে ডাইকা কই, স্যার, আমার নাম আবদুল হানিফ, আমার বাপের নাম মরহুম ইব্রাহিম ওস্তাগর, কলতাবাজারের ডাম লালু আমার ওস্তাদ লাগে। আমি ডাম লালুর পাত্তির মান’ তো হালার পোলায় আমারে ধইরা রাইখা দিবো না? রাখবো তো?
[ফেব্রুয়ারি (ছোটগল্প)— আখতারুজ্জামান ইলিয়াস]

৩২০। উদ্দীপকের কোন বিষয়ের সাথে ‘রেইনকোট’ গল্পের মিল পাওয়া যায়? [উচ্চতর দক্ষতা]
(ক) অপরাধী চক্রে নাম লেখানো
(খ) আশ্রয়ের প্রত্যাশা
(গ) মিসক্রিয়্যান্টদের সাথে নিজেকে অভিযুক্ত করে গর্ববোধ করা
(ঘ) দেশপ্রেমে উদ্বুদ্ধ হওয়া
উত্তর: (গ) মিসক্রিয়্যান্টদের সাথে নিজেকে অভিযুক্ত করে গর্ববোধ করা

৩২১। উদ্দীপকের হানিফ ‘রেইনকোট’ গল্পের কোন চরিত্রটির প্রতিনিধিত্ব করে? [অনুধাবন]
(ক) ইসহাক (খ) প্রিন্সিপাল
(গ) নুরুল হুদা (ঘ) মিন্টু
উত্তর: (গ) নুরুল হুদা

❖ উদ্দীপকের আলোকে ৩২২ ও ৩২৩ নং প্রশ্নের উত্তর দাও।
তুমি আসবে বলে, হে স্বাধীনতা,
সাকিনা বিবির কপাল ভাঙল,
সিঁথির সিঁদুর মুছে গেল হরিদাসের।
তুমি আসবে বলে, হে স্বাধীনতা
শহরের বুকে জলপাই রঙের ট্যাঙ্ক এলো
দানবের মতো চিৎকার করতে করতে।
তুমি আসবে বলে, হে স্বাধীনতা,
ছাত্রাবাস, বস্তি উজাড় হলো।
রিকয়েললেস রাইফেল
আর মেশিন গান খই ফোটাল যত্রতত্র।
[তথ্যসূত্র: তোমাকে পাওয়ার জন্যে, হে স্বাধীনতা —শামসুর রহমান]

৩২২। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের সাদৃশ্যমূলক ঘটনা হলো— [উচ্চতর দক্ষতা]
i. ক্র্যাক-ডাউনের রাতে ট্যাঙ্কের হুঙ্কার
ii. নারী-পুরুষদের ধরে মিলিটারি ক্যাম্পে নিয়ে যাওয়া
iii. গোলাগুলির আওয়াজ শুনতে পাওয়া
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩২৩। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের যে প্রসঙ্গটি মিলে যায়— [প্রয়োগ]
i. মুক্তিযুদ্ধের সময়
ii. নির্যাতিত বাঙালি
iii. স্বাধীনতার জন্য এদেশের মানুষের আত্মত্যাগ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

শীর্ষস্থানীয় কলেজসমূহের টেস্ট পরীক্ষার বহুনির্বাচনি প্রশ্ন ও উত্তর
সাধারণ বহুনির্বাচনি প্রশ্ন
৩২৪। ‘রেইনকোট’ গল্পের প্রেক্ষাপট কী? [বীরশ্রেষ্ঠ নূর মোহাম্মদ পাবলিক কলেজ, ঢাকা]
(ক) ১৯৫২ সালের ভাষা আন্দোলন
(খ) ১৯৫৪ সালের যুক্তফ্রন্টের নির্বাচন
(গ) ১৯৬৯ সালের গণঅভ্যুত্থান
(ঘ) ১৯৭১ সালের মুক্তিযুদ্ধ
উত্তর: (ঘ) ১৯৭১ সালের মুক্তিযুদ্ধ

৩২৫। নিচের কোন ঋতুর নাম ‘রেইনকোট’ গল্পে উল্লিখিত আছে? [বগুড়া ক্যান্টনমেন্ট পাবলিক স্কুল ও কলেজ]
(ক) হেমন্ত (খ) শরৎ
(গ) বসন্ত (ঘ) গ্রীষ্ম
উত্তর: (ক) হেমন্ত

৩২৬। আখতারুজ্জামান ইলিয়াস কোন রোগে আক্রান্ত হয়ে মৃত্যুবরণ করেন? [সরকারি বঙ্গবন্ধু কলেজ, রূপসা, খুলনা]
(ক) ক্যান্সার (খ) জন্ডিস
(গ) কলেরা (ঘ) ধনুষ্টংকার
উত্তর: (ক) ক্যান্সার

৩২৭। ‘সাবভার্সিভ অ্যাক্টিভিটিজ’ বলতে কী বোঝায়? [সরকারি বঙ্গবন্ধু কলেজ, রূপসা, খুলনা]
(ক) যুদ্ধবিরোধী কার্যক্রম (খ) রাষ্ট্রবিরোধী কার্যক্রম
(গ) মানবতাবিরোধী কার্যক্রম (ঘ) গণতন্ত্রবিরোধী কার্যক্রম
