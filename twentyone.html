“যেন অগুনতি রক্তলোভী উন্মত্ত রোবট / জল্লাদের মতো ছুটাছুটি করে / বাংলাদেশে নামে হত্যাযজ্ঞে।”

৪০১। উদ্দীপকের জল্লাদেরা ‘রেইনকোট’ গল্পের কার প্রতিনিধিত্ব করে?
(ক) দেশপ্রেম
(খ) প্রকৃতিপ্রেম
(গ) মুক্তিযুদ্ধে পাকিস্তানি সেনাদের অত্যাচারের ইঙ্গিত
(ঘ) দালালদের কূটকৌশল
উত্তর: (গ) মুক্তিযুদ্ধে পাকিস্তানি সেনাদের অত্যাচারের ইঙ্গিত

৪০২। উদ্দীপকের জল্লাদেরা ‘রেইনকোট’ গল্পে কার প্রতিনিধিত্ব করে?
(ক) প্রিন্সিপালের
(খ) ইসহাক মিয়ার
(গ) মিসক্রিয়্যান্টদের
(ঘ) মিলিটারিদের
উত্তর: (ঘ) মিলিটারিদের

উদ্দীপকের আলোকে প্রশ্নের উত্তর দাও।
‘মোরা একটি ফুলকে বাঁচাবো বলে যুদ্ধ করি / মোরা একটি মুখের হাসির জন্য অস্ত্র ধরি।’

৪০৩। উদ্দীপকের ‘মোরা’ ‘রেইনকোট’ গল্পের যে চরিত্রগুলোকে উপস্থাপন করে—
i. নূরুল হুদা
ii. আবদুস সাত্তার মৃধা
iii. নূরুল হুদার শ্যালক
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ৪০৪ নং প্রশ্নের উত্তর দাও।
বঙ্গবন্ধু বললেন এবার বাংলা স্বাধীন হবে / বাংলায় মানুষে কাঁদবে কত পেটের ক্ষুধাতে / আছে হাড় নাই মাংস সব নিয়েছে রাবণ / হায়রে অসুরের ধ্বংস মানব সুরেতে!

৪০৪। উদ্দীপকে ‘রেইনকোট’ গল্পের কোন বিষয়টি ফুটে উঠেছে?
(ক) প্রতিবাদ
(খ) আস্থা
(গ) নৃশংসতা
(ঘ) উৎকণ্ঠা
উত্তর: (গ) নৃশংসতা

উদ্দীপকের আলোকে ৪০৫ নং প্রশ্নের উত্তর দাও।
এনেছি আগুন সূর্যের পাড়া থেকে / পোড়াবো শত্রু ভিটেমাটি ঘর তার / খোদার কসম ক্ষমা নেই তার আজ

৪০৫। উদ্দীপকে ‘রেইনকোট’ গল্পের কোন দিকটি উপস্থাপন করেছে—
(ক) উৎকণ্ঠা
(খ) দেশপ্রেম
(গ) সাহসিকতা
(ঘ) ঐক্যবদ্ধ
উত্তর: (খ) দেশপ্রেম

উদ্দীপকের আলোকে ৪০৬ ও ৪০৭ নং প্রশ্নের উত্তর দাও।
তুমি আসবে বলে, হে স্বাধীনতা, / শহরের বুকে জলপাই রঙের ট্যাঙ্ক এলো / দানবের মতো চিৎকার করতে করতে

৪০৬। উদ্দীপকের শহরের চিত্র ‘রেইনকোট’ গল্পের কোন শহরের চিত্রের সাথে সাদৃশ্যপূর্ণ?
(ক) ঢাকা
(খ) চট্টগ্রাম
(গ) নারায়ণগঞ্জ
(ঘ) সিলেট
উত্তর: (ক) ঢাকা

উদ্দীপকের আলোকে ৪০৭ ও ৪০৮ নং প্রশ্নের উত্তর দাও।
মুক্তিযুদ্ধের দিনগুলো ছিল ভয়ংকর অনিশ্চয়তায় ভরা। কেউ যুদ্ধ করেছে প্রাণপণে, আবার কেউ পাকিস্তানি হানাদারদের ভয়ে তাদের তোষামোদ করেছে। আবার কেউবা ভয়কে জয় করে শেষ পর্যন্ত মুক্তিযুদ্ধের চেতনায় উজ্জীবিত হয়েছে।

৪০৭। উদ্দীপকটিতে মুক্তিযুদ্ধের চেতনায় উজ্জীবিত মানুষগুলোর সঙ্গে ‘রেইনকোট’ গল্পে কার সাদৃশ্য রয়েছে?
(ক) প্রিন্সিপাল
(খ) নূরুল হুদা
(গ) মিন্টু
(ঘ) আকবর সাজিদ
উত্তর: (খ) নূরুল হুদা

৪০৮। নূরুল হুদার সাথে মুক্তিযুদ্ধের চেতনার সাদৃশ্যের বিষয়টি কোন দিক থেকে যৌক্তিক?
(ক) মিলিটারিদের সঠিক উত্তর না দেওয়া
(খ) নিজেকে কল্পনায় মুক্তিযোদ্ধাদের অংশ ভাবা
(গ) বাসযাত্রীদের রাজাকার ভাবা
(ঘ) মিন্টুর রেইনকোটটি পরা
উত্তর: (খ) নিজেকে কল্পনায় মুক্তিযোদ্ধাদের অংশ ভাবা

উদ্দীপকের আলোকে ৪০৯ ও ৪১০ নং প্রশ্নের উত্তর দাও।
বাতাসে লাশের গন্ধ ভাসে 
মাটিতে লেগে আছে রক্তের দাগ 
নদীতে পানার মতো ভেসে থাকা মানুষের পচা লাশ, 
মুণ্ডহীন বালিকার কুকুরের খাওয়া বীভৎস শরীর 
ভেসে ওঠে চোখের ভিতরে—আমি ঘুমতে পারি না।

৪০৯। ‘রেইনকোট’ গল্পের কোন বিষয়টির সঙ্গে উদ্দীপকের মিল পাওয়া যায়?
(ক) বাঙালির বীরত্ব
(খ) পাকবাহিনীর বর্বরতা
(গ) বাঙালির দেশপ্রেম
(ঘ) বাঙালির দুঃস্বপ্ন
উত্তর: (খ) পাকবাহিনীর বর্বরতা

৪১০। উপরের উদ্দীপকটি কবিমনের স্বাজাতবোধের চেতনা ‘রেইনকোট’ গল্পের শেষ ভাগে কার মধ্যে লক্ষ্য করা যায়?
(ক) প্রিন্সিপালের
(খ) লেকচারার নূরুল হুদার
(গ) পিওনের
(ঘ) আব্দুস সাত্তার মৃধার
উত্তর: (খ) লেকচারার নূরুল হুদার

উদ্দীপকের আলোকে ৪১১, ৪১২ ও ৪১৩ নং প্রশ্নের উত্তর দাও:
রজব আলী গ্রামে গ্রামে ঘুরে ঘুরে পাকহানাদারদের জন্য খবর সংগ্রহ করে। সে চায় পাকিস্তানের অখণ্ডতা। তাই সে পাক সেনাদের সহায়তা করে।

৪১১। রজব আলী ‘রেইনকোট’ গল্পের কোন চরিত্রকে স্মরণ করিয়ে দেয়?
(ক) ইসহাক
(খ) নূরুল হুদা
(গ) মিন্টু
(ঘ) প্রিন্সিপাল
উত্তর: (ঘ) প্রিন্সিপাল

৪১২। রজব আলী ও প্রিন্সিপাল স্বাধীনতা যুদ্ধের সময়কার কাদের প্রতিনিধি?
(ক) সাধারণ মানুষের
(খ) রাজাকারদের
(গ) হানাদারদের
(ঘ) মুক্তিযোদ্ধাদের
উত্তর: (খ) রাজাকারদের

৪১৩। রজব আলী ও প্রিন্সিপাল চরিত্রে প্রকাশ পেয়েছে—
i. স্বার্থান্বেষী
ii. বিশ্বাসঘাতকতা
iii. স্বদেশপ্রেম
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

উদ্দীপকের আলোকে ৪১৪ ও ৪১৫ নং প্রশ্নের উত্তর দাও:
তুমি আসবে বলে, হে স্বাধীনতা  
সাকিনা বিবির কপাল ভাঙল 
সিথির সিঁদুর মুছে গেল হরিদাসীর; 
তুমি আসবে বলে, হে স্বাধীনতা, 
শহরের বুকে জলপাই রঙের ট্যাঙ্ক এলো 
দানবের মতো চিৎকার করতে করতে।

৪১৪। উদ্দীপকের বিষয়বস্তুর সাথে ‘রেইনকোট’ গল্পের সাদৃশ্য রয়েছে—
i. নিপীড়িত বাংলার আর্তনাদ
ii. নিষ্ঠুরতার শিকার বাঙালি
iii. মানবরূপী পাকিস্তানিদের দানবীয় রূপ
নিচের কোনটি সঠিক?
(ক) i
(খ) ii
(গ) iii
(ঘ) i ও ii
উত্তর: (ঘ) i ও ii

৪১৫। উদ্দীপকে মূলভাব ফুটে উঠেছে নিচের কোন বাক্যটিতে?
উত্তর: (খ) মিরপুর ব্রিজ থেকে আসমার গোলাগুলির আওয়াজ শুনতে পাওয়া

উদ্দীপকের আলোকে ৪১৬ ও ৪১৭ নং প্রশ্নের উত্তর দাও:
ডিসেম্বর মাস এলেই মনে পড়ে যায় আমাদের মহান মুক্তিযুদ্ধের কথা, মনে পড়ে যায় আমাদের দেশের আত্মত্যাগী শহিদদের কথা। পাক হানাদার বাহিনীর অত্যাচারে বিলীন হয়ে যাওয়া স্মৃতির কথা। কত ত্যাগী মানুষের কথা—

৪১৬। উদ্দীপকের শহিদদের সাথে কার সাদৃশ্য আছে?
i. নূরুল হুদা
ii. নূরুলদীন
iii. বরকত
নিচের কোনটি সঠিক?
(ক) i
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i

৪১৭। কোন দৃষ্টিকোণ হতে নির্বাচিত চরিত্রটি উদ্দীপক সংশ্লিষ্ট?
i. প্রেক্ষাপট
ii. কৃতিত্ব
iii. সংগ্রামী চেতনা
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

উদ্দীপকের আলোকে ৪১৮ ও ৪১৯ নং প্রশ্নের উত্তর দাও:
শাসকের শোষকের পীড়কের নিষ্ঠুর পীড়ন / রোধিতে ওরা করেছে পণ

৪১৮। উদ্দীপকটির ‘ওরা’ ‘রেইনকোট’ গল্পে কাদের সাথে সাদৃশ্যপূর্ণ?
(ক) মিসক্রিয়্যান্টদের
(খ) মিলিটারিদের
(গ) প্রফেসর
(ঘ) বাসের যাত্রী
উত্তর: (ক) মিসক্রিয়্যান্টদের

৪১৯। উদ্দীপকটির চেতনা কীভাবে ‘রেইনকোট’ গল্পে নূরুল হুদা প্রতিফলিত হয়েছে?
(ক) মিলিটারিদের অত্যাচারের জবাব দেওয়া
(খ) মিলিটারিদের সাথে আপস না করায়
(গ) কুলিদের জন্য গভীরভাবে ভাবায়
(ঘ) রেইনকোট নিয়ে প্রতিবাদ করায়
উত্তর: (খ) মিলিটারিদের সাথে আপস না করায়

৪২০। কার জবানিতে ‘রেইনকোট’ গল্পের অধিকাংশ ঘটনা বিবৃত হয়েছে?
(ক) আবদুস সাত্তার মৃধা
(খ) ড. আফাজ আহমদ
(গ) আখতারুজ্জামান ইলিয়াস
(ঘ) নূরুল হুদা
উত্তর: (ঘ) নূরুল হুদা

৪২১। নূরুল হুদাকে পাকিস্তানি হানাদার বাহিনীর তলব করার কারণ—
(ক) কমান্ডারের নির্দেশে
(খ) প্রিন্সিপালের অভিযোগে
(গ) মুক্তিযোদ্ধাদের সহযোগী ভেবে
(ঘ) তাকে মুক্তিযোদ্ধা সন্দেহে
উত্তর: (গ) মুক্তিযোদ্ধাদের সহযোগী ভেবে

উদ্দীপকের আলোকে ৪২২ ও ৪২৩ নং প্রশ্নের উত্তর দাও।
মুক্তিফৌজ! কথাটা এত ভারী যে এই রকম অত্যাচারী সৈন্য দিয়ে ঘেরা অবরুদ্ধ ঢাকা শহরে বসে মুক্তিফৌজ শব্দটা শুনলেও কেমন যেন অবিশ্বাস্য মনে হয়। আবার ওই অবিশ্বাসের ভেতর থেকে একটা আশা, একটা ভরসার ভাব ধীরে ধীরে মনের কোণে জেগে উঠতে থাকে।

৪২২। অনুচ্ছেদে ‘রেইনকোট’ গল্পের কোন ভাবের প্রতিফলন ঘটেছে?
(ক) পাক হানাদার বাহিনীর নৃশংসতা
(খ) মুক্তিযোদ্ধাদের অদম্য শক্তি-সাহস
(গ) মুক্তিযোদ্ধাদের প্রতি গভীর আস্থা
(ঘ) যুদ্ধকালীন অবরুদ্ধ মানুষের উৎকণ্ঠা
উত্তর: (ঘ) যুদ্ধকালীন অবরুদ্ধ মানুষের উৎকণ্ঠা

৪২৩। উক্ত ভাবটি যে বাক্যে প্রকাশ পেয়েছে তা হলো—
(ক) মিসক্রিয়্যান্ট লোক ইলেকট্রিক ট্রান্সফর্মার তোড় দিয়া
(খ) একটা জিপ উড়াইয়া দিছে, কমপক্ষে পাঁচটা খানসেনা খতম
(গ) নূরুল হুদার ঝুলন্ত শরীর এতটাই কাঁপে যে চাবুকের বাড়ির দিকে আর মনোযোগ দেওয়া হয়ে ওঠে না।
(ঘ) বউয়ের এই ভাইটার জন্যই তাকে এক্সট্রা তটস্থ থাকতে হয়
উত্তর: (ঘ) বউয়ের এই ভাইটার জন্যই তাকে এক্সট্রা তটস্থ থাকতে হয়

সকল বোর্ডের এইচএসসি পরীক্ষার বহুনির্বাচনি প্রশ্ন ও উত্তর

৪২৪। ‘রেইনকোট’ গল্পে ভীতু নূরুল হুদার সাহসী হয়ে ওঠার মূল কারণ—
(ক) মিসক্রিয়্যান্টদের ঠিকানা জানা
(খ) সঞ্চারিত উষ্ণতা ও দেশপ্রেম
(গ) কুলিদের আস্তানা চেনা
(ঘ) গেরিলাদের সঙ্গে আঁতাত
উত্তর: (খ) সঞ্চারিত উষ্ণতা ও দেশপ্রেম

৪২৫। চাবুকের বাড়ির দিকে নূরুল হুদার আর মনোযোগ দেওয়া হয়ে ওঠে না কেন?
(ক) আঘাত সয়ে যাওয়ায়
(খ) মৃত্যু নিশ্চিত জানায়
(গ) মুক্তিযোদ্ধাদের সম্পর্কে গভীর ভাবনায়
(ঘ) শরীর অবশ হওয়ায়
উত্তর: (গ) মুক্তিযোদ্ধাদের সম্পর্কে গভীর ভাবনায়

৪২৬। ‘রেইনকোট’ গল্পে রেইনকোটটি কার?
(ক) মিন্টুর
(খ) নূরুল হুদার
(গ) আবদুস সাত্তারের
(ঘ) ড. আফাজ আহমদের
উত্তর: (ক) মিন্টুর

৪২৭। মিলিটারির চাবুকের আঘাত নূরুল হুদার কাছে কী বলে মনে হয়?
(ক) অসহ্য যন্ত্রণা
(খ) অত্যাচার
(গ) অমানবিক কষ্ট
(ঘ) স্রেফ উৎপাত
উত্তর: (ঘ) স্রেফ উৎপাত

৪২৮। ‘রেইনকোট’ গল্পের প্রেক্ষাপটে নিম্নোক্ত কোন বিষয়টির প্রতি লেখক বেশি সচেষ্ট ছিলেন?
(ক) রাজাকারদের দৌরাত্ম্য
(খ) গেরিলাদের আক্রমণ
(গ) নূরুল হুদার দেশপ্রেম
(ঘ) হানাদারদের নিপীড়ন
উত্তর: (গ) নূরুল হুদার দেশপ্রেম

৪২৯। ‘রেইনকোট’ গল্পে রেইনকোট বহন করেছে—
(ক) মুক্তিযুদ্ধের ইতিহাস
(খ) মুক্তিযুদ্ধের প্রেক্ষাপট
(গ) ভাষা আন্দোলনের চেতনা
(ঘ) মুক্তিযুদ্ধের চেতনা
উত্তর: (ঘ) মুক্তিযুদ্ধের চেতনা

৪৩০। ‘রেইনকোট’ গল্পে কোন বিষয়টি অধিক ব্যঞ্জনাময় হয়ে উঠেছে?
(ক) গেরিলা আক্রমণ
(খ) হানাদার বাহিনীর নিপীড়ন
(গ) নূরুল হুদার দেশপ্রেম
(ঘ) রাজাকারদের দৌরাত্ম্য
উত্তর: (গ) নূরুল হুদার দেশপ্রেম

৪৩১। ‘রেইনকোট’ গল্পে নূরুল হুদা কোন বিষয়ের শিক্ষক?
(ক) জিওগ্রাফি
(খ) বোটানি
(গ) হিস্ট্রি
(ঘ) কেমিস্ট্রি
উত্তর: (ঘ) কেমিস্ট্রি

৪৩২। ‘রেইনকোট’ গল্পে কথক কে?
(ক) নূরুল হুদা
(খ) গল্পকার
(গ) আবদুস সাত্তার
(ঘ) মিন্টু মিয়া
উত্তর: (ক) নূরুল হুদা

৪৩৩। 'মিসক্রিয়্যান্টরা সব খতম'— এখানে 'মিসক্রিয়্যান্ট' বলতে কাকে বোঝানো হয়েছে?
(ক) মুক্তিফৌজ
(খ) পাকবাহিনী
(গ) শান্তিবাহিনী
(ঘ) মিত্রবাহিনী
উত্তর: (ক) মুক্তিফৌজ

৪৩৪। ‘রেইনকোট’ গল্পে রেইনকোটটি কিসের প্রতীক?
i. প্রতিহিংসার
ii. দেশপ্রেমের
iii. মুক্তিযুদ্ধের
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৪৩৫। ‘রেইনকোট’ গল্পে ভীতু প্রকৃতির নূরুল হুদা মুক্তিযোদ্ধা শ্যালকের রেইনকোট গায়ে দিলে তার মধ্যে সঞ্চারিত হয়—
i. উষ্ণতা
ii. সাহস
iii. দেশপ্রেম
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৩৬। ‘রেইনকোট’ গল্পটি পাঠ শেষে শিক্ষার্থীরা জানতে পারবে—
i. মুক্তিযোদ্ধার স্বরূপ
ii. সাধারণ ব্যক্তির মুক্তিযুদ্ধের চেতনা
iii. পাক বাহিনীর বর্বরতা
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ৪৩৭ ও ৪৩৮ নং প্রশ্নের উত্তর দাও:
“দূরে কিংবা কখনো খুবই কাছে 
যাচ্ছে শোনা ফুটফাট গুলির আওয়াজ, ত্রাসে 
বুক কাঁপে, পারি না শুধোতে কে কোথায় গেল মরে, 
দম বন্ধ করে চুপ করে পড়ে থাকি ঘরের কবরে।”

৪৩৭। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের সাদৃশ্য হলো—
i. পঁচিশে মার্চের রাতের আক্রমণ
ii. মানুষদের ধরে ক্যাম্পে নিয়ে যাওয়া
iii. গুলির আওয়াজ শুনতে পাওয়া
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৪৩৮। উদ্দীপকের সাথে ‘রেইনকোট’ গল্পের যে প্রসঙ্গটি মিলে যায়—
i. মুক্তিযুদ্ধ চলাকালীন অবস্থা
ii. নির্যাতিত বাঙালি
iii. মুক্তিযুদ্ধে মানুষের আত্মত্যাগ
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

উদ্দীপকের আলোকে ৪৩৯ ও ৪৪০ নং প্রশ্নের উত্তর দাও:
কলেজ থেকে ঘরে ফেরার পথে ছাত্র-পুলিশ সংঘর্ষের মধ্যে পড়ে যায় মাহমুদ। পুলিশের বেধড়ক লাঠিপেটায় সেদিন সে হয়ে ওঠে ভাষা আন্দোলনের একনিষ্ঠ কর্মী।

৪৩৯। উদ্দীপকের মাহমুদ ‘রেইনকোট’ গল্পের কোন চরিত্রের সাথে তুলনীয়?
(ক) কুলি
(খ) মিন্টু
(গ) নূরুল হুদা
(ঘ) ডা. আফাজ
উত্তর: (গ) নূরুল হুদা

৪৪০। উদ্দীপকটি ‘রেইনকোট’ গল্পটিকে যে প্রেক্ষাপট থেকে প্রতিনিধিত্ব করে তা হলো—
(ক) ছাত্র-রাজনীতি
(খ) ভাষা আন্দোলন
(গ) স্বাধীনতা সংগ্রাম
(ঘ) রাজনৈতিক চেতনা
উত্তর: (ঘ) রাজনৈতিক চেতনা

উদ্দীপকের আলোকে ৪৪১ ও ৪৪২ নং প্রশ্নের উত্তর দাও:
পিতৃহীন সরল প্রকৃতির মৃদুলকে প্রভাবশালী মীর সাহেবের লোকেরা ধরে নিয়ে যায় এবং একটা মিথ্যা দলিলে স্বাক্ষর করতে বলে। মৃদুলের মনে পড়ে যায় বাবার শেষ উপদেশের কথা— ‘অন্যায়ের কাছে কখনও মাথা নত করো না।’ বিপদের সম্ভাবনা জেনেও মৃদুল তার সিদ্ধান্তে অটল থাকে।

৪৪১। উদ্দীপকের মৃদুল ‘রেইনকোট’ গল্পের কোন চরিত্রের প্রতিনিধিত্ব করে?
(ক) ইসহাক
(খ) আবদুস সাত্তার
(গ) আফাজ
(ঘ) নূরুল হুদা
উত্তর: (ঘ) নূরুল হুদা

৪৪২। উদ্দীপকের বিষয়ের সাথে ‘রেইনকোট’ গল্পের সাদৃশ্য কোথায়?
(ক) প্রতীকী ব্যঞ্জনায়
(খ) পটভূমিতে
(গ) ঘটনায়
(ঘ) সমাজচিত্রে
উত্তর: (ক) প্রতীকী ব্যঞ্জনায়

৪৪৩। উদ্দীপকের ‘পুলিশ বাহিনী’ ‘রেইনকোট’ গল্পের কাকে প্রতিনিধিত্ব করে?
(ক) রাজাকার
(খ) মিলিটারি
(গ) পুলিশ
(ঘ) মিসক্রিয়্যান্ট
উত্তর: (খ) মিলিটারি

৪৪৪। উদ্দীপকের মঞ্জু ও ‘রেইনকোট’ গল্পের নূরুল হুদার চারিত্রিক ঐক্য—
(ক) কর্মে
(খ) শিক্ষায়
(গ) ভাষা চেতনায়
(ঘ) চেতনার পরিবর্তনে
উত্তর: (ঘ) চেতনার পরিবর্তনে

উদ্দীপকের আলোকে ৪৪৫ ও ৪৪৬ নং প্রশ্নের উত্তর দাও:
ইয়েস-নো ভেরিগুড টাইপ ইংরেজি শিখে বাঙালি রামকানাই ইংরেজ নীলকরদের কাছে নিজেকে বিশ্বস্ত প্রমাণ করার জন্য নীলচাষিদের ওপর অমানবিক নির্যাতনের উপায় বাতলে দেয়। নির্যাতন অসহনীয় হয়ে উঠলে প্রতিরোধ ছাড়া উপায় থাকে না বাঙালি চাষিদের।

৪৪৫। উদ্দীপকের রামকানাই ও ‘রেইনকোট’ গল্পের ইসহাক মিয়ার সাদৃশ্য—
i. ভাষা ব্যবহারে
ii. বিদেশি প্রীতিতে
iii. নির্যাতনে সহযোগিতায়
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৪৬। উদ্দীপক ও ‘রেইনকোট’ গল্পে যুগপৎ প্রকাশিত হয়েছে—
(ক) বিদেশি ভাষার আগ্রাসন
(খ) বিদেশি শাসক কর্তৃক সীমাহীন নির্যাতন
(গ) দেয়ালে পিঠ ঠেকে যাওয়া মানুষের সম্মুখ গমন
(ঘ) দেশের জন্য জীবন বাজি রেখে যুদ্ধে ঝাঁপিয়ে পড়া
উত্তর: (গ) দেয়ালে পিঠ ঠেকে যাওয়া মানুষের সম্মুখ গমন

উদ্দীপকের আলোকে ৪৪৭ ও ৪৪৮ নং প্রশ্নের উত্তর দাও:
“মোরা একটি ফুলকে বাঁচাবো বলে যুদ্ধ করি  
মোরা একটি মুখের হাসির জন্য অস্ত্র ধরি।”

৪৪৭। উদ্দীপকে ‘মোরা’ শব্দটি ‘রেইনকোট’ গল্পের—
(ক) নূরুল হুদা
(খ) মিন্টু
(গ) প্রিন্সিপাল
(ঘ) আকবর সাজিদ
উত্তর: (খ) মিন্টু

৪৪৮। উদ্দীপকের ভাবানুষঙ্গ ‘রেইনকোট’ গল্পের দিকটিকে প্রতিফলিত করে—
(ক) সাবভার্সিভ অ্যাকটিভিটিজ
(খ) দেশপ্রেম
(গ) ধ্বংসযজ্ঞ ও গণহত্যা
(ঘ) মানবতাবোধ
উত্তর: (খ) দেশপ্রেম

শীর্ষস্থানীয় কলেজসমূহের টেস্ট পরীক্ষার বহুনির্বাচনি প্রশ্ন ও উত্তর

৪৪৯। নূরুল হুদার জীবনের কী বারের ঘটনা ‘রেইনকোট’ গল্প আকারে উপস্থাপিত?
(ক) শনি বার
(খ) রবি বার
(গ) সোম বার
(ঘ) মঙ্গল বার
উত্তর: (ঘ) মঙ্গল বার

৪৫০। ‘রেইনকোট’ গল্পের প্রেক্ষাপট কী?
(ক) ১৯৫২ সালের ভাষা আন্দোলন
(খ) ১৯৫৪ সালের যুক্তফ্রন্টের নির্বাচন
(গ) ১৯৬৯ সালের গণঅভ্যুত্থান
(ঘ) ১৯৭১ সালের মুক্তিযুদ্ধ
উত্তর: (ঘ) ১৯৭১ সালের মুক্তিযুদ্ধ

৪৫১। পাকিস্তানকে বাঁচাতে স্কুল-কলেজ থেকে শহিদ মিনার হটানোর কথা কেন বলা হয়েছে?
(ক) শরীয়তসম্মত নয় বলে
(খ) অধিকার আদায়ের স্মারক নিশ্চিহ্ন করতে
(গ) জাতীয় সংগীত মুছে ফেলতে
(ঘ) জাতীয় চেতনা বাধাগ্রস্ত করতে
উত্তর: (খ) অধিকার আদায়ের স্মারক নিশ্চিহ্ন করতে

৪৫২। নূরুল হুদা মিসক্রিয়্যান্টদের সাথে সম্পর্কযুক্ত স্বীকার করেন যে কারণে—
(ক) পাকিস্তানের অত্যাচারে
(খ) দেশপ্রেম বোধে
(গ) রেইনকোটের প্রভাবে
(ঘ) নিজেকে মুক্তির চেষ্টায়
উত্তর: (গ) রেইনকোটের প্রভাবে

৪৫৩। ‘রেইনকোট’ গল্পে নূরুল হুদা কোন কলেজের প্রভাষক?
(ক) রাজশাহী কলেজ
(খ) তেজগাঁও কলেজ
(গ) নটর ডেম কলেজ
(ঘ) ঢাকা কলেজ
উত্তর: (ঘ) ঢাকা কলেজ

৪৫৪। ‘রেইনকোট’ গল্পে প্রিন্সিপাল কাকে তোয়াজ করে?
(ক) নূরুল হুদাকে
(খ) আকবর সাজিদকে
(গ) বাচাল দোকানদারকে
(ঘ) কলেজের পিয়নকে
উত্তর: (খ) আকবর সাজিদকে

৪৫৫। ‘কিন্তু তার ওম তার শরীরে এখনো লেগেই আছে’— এ বাক্যে ‘ওম’ প্রতীকের অন্তরালে কোন বিষয়টি লুকায়িত?
(ক) সাহস
(খ) উষ্ণতা
(গ) চেতনা
(ঘ) শক্তি
উত্তর: (গ) চেতনা

৪৫৬। ‘রেইনকোট’ গল্পে পাকিস্তানের ‘শরীরের কাঁটা’ বলা হয়েছে কাকে?
(ক) পুলিশ বাহিনীকে
(খ) শহীদ মিনারকে
(গ) কলেজকে
(ঘ) মুক্তিবাহিনীকে
উত্তর: (খ) শহীদ মিনারকে

৪৫৭। ‘রেইনকোট’ গল্পে প্রিন্সিপালের নাম কী?
(ক) ড. আকবর সাজিদ
(খ) ড. আফাজ আহমদ
(গ) ড. আবদুস সাত্তার মৃধা
(ঘ) ড. ইসহাক
উত্তর: (খ) ড. আফাজ আহমদ

৪৫৮। মিন্টুর রেইনকোট গায়ে দিয়ে নূরুল হুদা কোথায় যাচ্ছিল?
(ক) জাদুঘরে
(খ) শাহবাগে
(গ) ঢাকা মেডিকেলে
(ঘ) ঢাকা কলেজে
উত্তর: (ঘ) ঢাকা কলেজে

৪৫৯। ‘দুধেভাতে উৎপাত’ গল্পগ্রন্থের রচয়িতা কে?
(ক) শওকত ওসমান
(খ) আখতারুজ্জামান ইলিয়াস
(গ) কাজী নজরুল ইসলাম
(ঘ) হাসান আজিজুল হক
উত্তর: (খ) আখতারুজ্জামান ইলিয়াস

৪৬০। নূরুল হুদা অফিসের জন্য কয়টি আলমারি কেনে?
(ক) দশটি
(খ) আটটি
(গ) তিনটি
(ঘ) দুটি
উত্তর: (ক) দশটি

৪৬১। ‘রেইনকোট’ গল্পটি কোন গ্রন্থ থেকে সংকলিত হয়েছে?
(ক) দোজখের ওম
(খ) পরিস্থিতি
(গ) খোয়ারি
(ঘ) জাল স্বপ্ন স্বপ্নের জাল
উত্তর: (ঘ) জাল স্বপ্ন স্বপ্নের জাল

৪৬২। পিয়নকে জড়িয়ে ধরে চুমা খেতে ইচ্ছে করছে। ‘রেইনকোট’ গল্পে নূরুল হুদার এই উক্তিতে কী প্রকাশ পেয়েছে?
(ক) পিয়নের প্রতি ভালোবাসা
(খ) শুভ সংবাদ পাওয়ার আনন্দ
(গ) সংশয় কেটে যাওয়ার আনন্দ
(ঘ) মিলিটারী না আসার আনন্দ
উত্তর: (গ) সংশয় কেটে যাওয়ার আনন্দ

৪৬৩। মিলিটারির চাবুকের আঘাত নূরুল হুদার কাছে কী বলে মনে হয়?
(ক) অসহ্য যন্ত্রণা
(খ) অত্যাচার
(গ) অমানবিক কষ্ট
(ঘ) স্রেফ উৎপাত
উত্তর: (ঘ) স্রেফ উৎপাত

৪৬৪। ‘রেইনকোট’ গল্পের নূরুল হুদাকে পাকিস্তানি বাহিনীর তলব করার কারণ—
(ক) কমান্ডারের নির্দেশ
(খ) মুক্তিযোদ্ধাদের সহযোগী ভেবে
(গ) মুক্তিযোদ্ধা সন্দেহে
(ঘ) প্রিন্সিপালের অভিযোগের ভিত্তিতে
উত্তর: (খ) মুক্তিযোদ্ধাদের সহযোগী ভেবে

৪৬৫। ‘সাবভার্সিভ অ্যাকটিভিটিজ’ বলতে কী বোঝায়?
(ক) যুদ্ধবিরোধী কার্যক্রম
(খ) রাষ্ট্রবিরোধী কার্যক্রম
(গ) মানবতাবিরোধী কার্যক্রম
(ঘ) গণতন্ত্রবিরোধী কার্যক্রম
উত্তর: (খ) রাষ্ট্রবিরোধী কার্যক্রম

৪৬৬। ‘মিসক্রিয়েন্টরা সব খতম’ এখানে ‘মিসক্রিয়েন্ট’ বলতে কাদের বোঝানো হয়েছে?
(ক) মুক্তিফৌজ
(খ) পাকবাহিনী
(গ) শান্তিবাহিনী
(ঘ) মিত্রবাহিনী
উত্তর: (ক) মুক্তিফৌজ

৪৬৭। নূরুল হুদার বাড়িতে রেখে যাওয়া রেইনকোটটি কার?
(ক) ইসহাক মিয়ার
(খ) মিলিটারিদের
(গ) মিন্টুর
(ঘ) আব্দুস সাত্তার মৃধার
উত্তর: (গ) মিন্টুর

৪৬৮। রেইনকোট খুলে ফেললেও নূরুল হুদা অনুভব করে—
(ক) শীতলতা
(খ) পুরনো গন্ধ
(গ) ভেজা ভাব
(ঘ) ওম
উত্তর: (ঘ) ওম

৪৬৯। ‘রেইনকোট’ গল্পে ছোটমামা কে?
(ক) খুশিতে
(খ) ভয়ে
(গ) উত্তেজনায়
(ঘ) দুশ্চিন্তায়
উত্তর: (খ) ভয়ে (দ্রষ্টব্য: এই প্রশ্নের উত্তরটি ছবির প্রেক্ষিতে 'ভয়ে' হিসেবে চিহ্নিত করা হয়েছে)।

৪৭০। ‘রেইনকোট’ গল্পে প্রিন্সিপালের মুখের রং পরিবর্তিত হয় কেন?
(ক) গেরিলা আক্রমণ
(খ) মুক্তিযুদ্ধের চেতনার উন্মোচন
(গ) পাকবাহিনীর বর্বরতা
(ঘ) নূরুল হুদার স্বীকারোক্তি
উত্তর: (খ) মুক্তিযুদ্ধের চেতনার উন্মোচন

৪৭১। ‘রেইনকোট’ গল্পে ছোট মামা কে?
(ক) মন্টু
(খ) পিন্টু
(গ) মিন্টু
(ঘ) ঝন্টু
উত্তর: (গ) মিন্টু

৪৭২। “ভোর রাত থেকে বৃষ্টি”— কোন রচনার শুরুতেই উল্লিখিত হয়েছে?
(ক) অপরিচিতা
(খ) জীবন ও বৃক্ষ
(গ) মাসি-পিসি
(ঘ) রেইনকোট
উত্তর: (ঘ) রেইনকোট

৪৭৩। ‘আব্বু ছোটো মামা হয়েছে। আব্বু ছোটো মামা হয়েছে।’— ছোটো মামা কে?
(ক) ইসহাক মিয়া
(খ) আব্দুস সাত্তার
(গ) ডা. আফাজ আহমদ
(ঘ) মিন্টু
উত্তর: (ঘ) মিন্টু

৪৭৪। ‘এ তো ভাবনার কথা’— যে ভাবনার কথা বলা হয়েছে—
(ক) অস্তিত্ব সংকট নিয়ে ভাবনা
(খ) ইসহাক মুক্তিযোদ্ধা কিনা তা ভাবনার কথা
(গ) পাকিস্তানি হানাদারদের হাত থেকে মুক্তির ভাবনা
(ঘ) মিন্টুর রেইনকোট ইসহাক পরবে কিনা তা ভাবনার কথা
উত্তর: (ক) অস্তিত্ব সংকট নিয়ে ভাবনা

৪৭৫। নূরুল হুদার সমস্ত ভালো লাগাটা চিড় খায় কখন?
(ক) গাড়ি নষ্ট হলে
(খ) হঠাৎ বাস ব্রেক কষলে
(গ) মিলিটারির আগমনে
(ঘ) গোলাগুলি শুরু হলে
উত্তর: (খ) হঠাৎ বাস ব্রেক কষলে

৪৭৬। ‘গেটে তোড় গিয়া’ রেইনকোট গল্পে উক্তিটি কার সঙ্গে নৈকট্যপূর্ণ?
(ক) পিয়ন
(খ) প্রফেসর
(গ) প্রিন্সিপাল
(ঘ) কর্নেল
উত্তর: (ক) পিয়ন

৪৭৭। আখতারুজ্জামান ইলিয়াস কোথায় জন্মগ্রহণ করেন?
(ক) বগুড়া
(খ) গাইবান্ধা
(গ) রংপুর
(ঘ) কুড়িগ্রাম
উত্তর: (খ) গাইবান্ধা

৪৭৮। “জ্বলে-পুড়ে-মরে ছারখার / তবু মাথা নোয়াবার নয়”— উদ্দীপকটি ‘রেইনকোট’ গল্পের কোন চরিত্রের সঙ্গে সাদৃশ্যপূর্ণ?
(ক) ইসহাক
(খ) মিন্টু
(গ) নূরুল হুদা
(ঘ) আফাজ আহমেদ
উত্তর: (গ) নূরুল হুদা

৪৭৯। ঢাকা কলেজের সামনে গেরিলা আক্রমণের ফলে কী ধ্বংস করে দেয়?

(ক) ইলেকট্রিক ওয়ার্কশপের মালিক
(খ) ওয়েলডিং ওয়ার্কশপের মালিক
(গ) ইঞ্জিনিয়ার
(ঘ) রাজাকার
উত্তর: (খ) ওয়েলডিং ওয়ার্কশপের মালিক

৫৪৪। গোড়ালি পর্যন্ত ঢাকা পড়েছে কোন পোশাকে?
(ক) বোরকা
(খ) রেইনকোট
(গ) পাঞ্জাবি
(ঘ) মিলিটারির পোশাক
উত্তর: (খ) রেইনকোট

৫৪৫। "আব্বু ছোটমামা হয়েছে"- কথাটির অর্থ কী? [উচ্চতর দক্ষতা]
(ক) আব্বুকে জানানো হচ্ছে ছোট মামা সম্পর্কে
(খ) আব্বুকে ছোট মামার মতো লাগছে
(গ) আব্বু আর ছোট মামার একাত্মতা
(ঘ) আব্বুর সঙ্গে ছোট মামার বৈসাদৃশ্য
উত্তর: (খ) আব্বুকে ছোট মামার মতো লাগছে

৫৪৬। মেয়ের ঘুম ভাঙা গলায় ভাঙা ভাঙা বুলি শুনে নুরুল হুদার অনুভূতি কেমন ছিল? [জ্ঞান]
(ক) খুব ভালো লাগছিল (খ) চমকে উঠেছিল
(গ) স্বর্গীয় অনুভূতি জাগে (ঘ) শান্তির ছোঁয়া লাগে প্রাণে
উত্তর: (খ) চমকে উঠেছিল

৫৪৭। নুরুল হুদার ছেলের বয়স কত? [জ্ঞান]
(ক) আড়াই বছর (খ) চার বছর
(গ) পাঁচ বছর (ঘ) সাড়ে পাঁচ বছর
উত্তর: (গ) পাঁচ বছর

৫৪৮। "আব্বুকে ছোটমামার মতো দেখাচ্ছে"- এই রায়টি কে দিয়েছিল? [জ্ঞান]
(ক) আড়াই বছরের মেয়ে (খ) আসমা
(গ) মিন্টুর ছেলে (ঘ) পাঁচ বছরের ছেলে
উত্তর: (ঘ) পাঁচ বছরের ছেলে

৫৪৯। ড্রেসিং টেবিলের সামনে নিয়ে নতুন রূপ দেখে নুরুল হুদার মনের অবস্থা কেমন হয়? [জ্ঞান]
(ক) নতুন রূপে ভ্যাবাচেকা খায় (খ) চমকে ওঠে
(গ) আনন্দিত হয় (ঘ) নিজেকে মিলিটারি মনে করে
উত্তর: (ক) নতুন রূপে ভ্যাবাচেকা খায়

৫৫০। 'সাবভার্সিভ অ্যাকটিভিটিজের সঙ্গে তারা সামহাউ অর আদার ইনভলভড'- উক্তিটি কার? [জ্ঞান]
(ক) মেজরের (খ) মিলিটারির
(গ) প্রিন্সিপালের (ঘ) ইসহাকের
উত্তর: (গ) প্রিন্সিপালের

৫৫১। নুরুল হুদা কোনগুলো থেকে শত হাত দূরে? [জ্ঞান]
(ক) মিসক্রিয়্যান্টদের সহায়তা করা
(খ) মিন্টুর সঙ্গে যোগাযোগ রাখা
(গ) সাবভার্সিভ অ্যাকটিভিটিজ
(ঘ) কলেজের দেয়াল ঘেঁষে বোমা ফাটানো
উত্তর: (গ) সাবভার্সিভ অ্যাকটিভিটিজ

৫৫২। ফিরে এসে দেশের ভিতরে মিন্টু কী করে? [জ্ঞান]
(ক) দেশে ত্রাণ বিতরণ করে (খ) মিলিটারিদের সাথে বৈঠক করে
(গ) দমাদম মিলিটারি মারে (ঘ) বোনের সংসারে অশান্তি সৃষ্টি
উত্তর: (গ) দমাদম মিলিটারি মারে

৫৫৩। প্রিন্সিপালের কোয়ার্টার কোথায়? [জ্ঞান]
(ক) মিলিটারির ক্যাম্পের দেয়াল ঘেঁষে
(খ) কলেজের দেয়াল ঘেঁষে
(গ) ইসহাকের ঘরের দেয়াল ঘেঁষে
(ঘ) মিসক্রিয়্যান্টদের ঘাঁটির কাছে
উত্তর: (খ) কলেজের দেয়াল ঘেঁষে

৫৫৪। মিলিটারি ক্যাম্প কোথায়? [জ্ঞান]
(ক) কলেজের দেয়াল ঘেঁষে
(খ) মিসক্রিয়্যান্টদের ঘাঁটির অদূরে
(গ) প্রিন্সিপালের কোয়ার্টারের পাশে
(ঘ) ইসহাকের বাড়ির পাশে
উত্তর: (খ) মিসক্রিয়্যান্টদের ঘাঁটির অদূরে

৫৫৫। ছেলেরা কলেজে আসে না কেন? [জ্ঞান]
(ক) সব ক্লাস বন্ধ বলে
(খ) কলেজে এলে মিলিটারি ধরে নিয়ে যাবে বলে
(গ) কলেজে সব মিসক্রিয়্যান্টদের দলে যোগ দিয়েছে বলে
(ঘ) স্যারেরা নিরুদ্দেশ বলে
উত্তর: (ক) সব ক্লাস বন্ধ বলে

৫৫৬। ক্লাস বন্ধ থাকলেও মাস্টারদের কলেজে আসতে হয় কেন? [জ্ঞান]
(ক) গোপন পরামর্শের জন্য
(খ) হাজিরা দিতে হয় বলে
(গ) প্রাইভেট পড়াতে
(ঘ) মিলিটারিদের সঙ্গে আঁতাত করতে
উত্তর: (খ) হাজিরা দিতে হয় বলে

৫৫৭। নুরুল হুদার কলিগরা কোথায় বসে ফিসফিস করে? [জ্ঞান]
(ক) প্রিন্সিপালের রুমে (খ) স্টাফ রুমে
(গ) মিলিটারির সামনে (ঘ) ক্লাসরুমে
উত্তর: (খ) স্টাফ রুমে

৫৫৮। হিন্দুস্তান ও মিসক্রিয়্যান্টদের অবশ্যম্ভাবী পতন সম্বন্ধে ভবিষ্যৎবাণী শোনে কে? [অনুধাবন]
(ক) নুরুল হুদা (খ) প্রিন্সিপাল
(গ) মিলিটারি (ঘ) মিন্টু
উত্তর: (ক) নুরুল হুদা

৫৫৯। খাসখাসে গলায় হিন্দুস্তান মিসক্রিয়্যান্টদের অবশ্যম্ভাবী পতনের ভবিষ্যৎবাণী কে করে? [জ্ঞান]
(ক) ইসহাক (খ) প্রিন্সিপাল
(গ) মিলিটারি (ঘ) মিন্টু
উত্তর: (খ) প্রিন্সিপাল

৫৬০। কোন ঘরে আজকাল সহজে কেউ ঘেঁষে না? [জ্ঞান]
(ক) ইসহাকের ঘরে
(খ) মিলিটারির ঘরে
(গ) ডা. আফাজ আহমদের ঘরে
(ঘ) ওয়েল্ডিং ওয়ার্কশপের মালিকের ঘরে
উত্তর: (গ) ডা. আফাজ আহমদের ঘরে

৫৬১। ডা. আফাজ আহমদের গলার স্বর কেমন? [জ্ঞান]
(ক) তোতলানো (খ) খ্যাসখ্যাসে
(গ) সুরেলা (ঘ) মোটা
উত্তর: (খ) খ্যাসখ্যাসে

৫৬২। কলেজের উর্দু প্রফেসরের নাম কী? [জ্ঞান]
(ক) ড. আফাজ আহমদ (খ) ইসহাক
(গ) আকবর আজিজ (ঘ) আকবর সাজিদ
উত্তর: (ঘ) আকবর সাজিদ

৫৬৩। নুরুল হুদা বৃষ্টিতে রিকশার পরোয়া করে না কেন? [জ্ঞান]
(ক) রাস্তায় রিকশা নেই বলে (খ) রেইনকোট গায়ে আছে বলে
(গ) বাসস্ট্যান্ড কাছে বলে (ঘ) রিকশা ভাড়া নেই বলে
উত্তর: (খ) রেইনকোট গায়ে আছে বলে

৫৬৪। রেইনকোট পরে নুরুল হুদা কেমন করে হাঁটে? [জ্ঞান]
(ক) বীরদর্পে (খ) হনহন করে
(গ) ধীরে ধীরে (ঘ) জনগণকে ভয় দেখিয়ে
উত্তর: (খ) হনহন করে

৫৬৫। কোন ঋতুর শেষের বৃষ্টিতে নুরুল হুদার শীত শীত ভাব হয়? [জ্ঞান]
(ক) শরতের শেষে (খ) শেষ বর্ষায়
(গ) শেষ হেমন্তে (ঘ) শীতের শেষে
উত্তর: (গ) শেষ হেমন্তে

৫৬৬। "কিন্তু-ভেতরে কী সুন্দর ওম!" খালি ঘরে উপযুক্ত শব্দ কোনটি? [জ্ঞান]
(ক) মিলিটারির ঘরের (খ) শীতের পোশাকের
(গ) রেইনকোটের (ঘ) বাসের
উত্তর: (গ) রেইনকোটের

৫৬৭। রেইনকোটের পানিতে বাস সয়লাব হয়ে গেলেও কেউ কিছু না বলার কারণ কী? [উচ্চতর দক্ষতা]
(ক) রেইনকোট পরিধান করা পোশাকে সবাই ঘাবড়ে গেছে
(খ) মিলিটারির পিস্তলের ভয়ে
(গ) মিলিটারির নির্যাতনের কথা জানা আছে বলে
(ঘ) মিলিটারির চ্যালা ভেবে
উত্তর: (ক) রেইনকোট পরিধান করা পোশাকে সবাই ঘাবড়ে গেছে

৫৬৮। বাস থেকে নেমে যাওয়া দুজন যাত্রীকে নুরুল হুদার কাছে কী মনে হয়? [জ্ঞান]
(ক) মিসক্রিয়্যান্ট (খ) ক্রিমিনাল
(গ) চোর (ঘ) পকেটমার
উত্তর: (খ) ক্রিমিনাল

৫৬৯। নামার সময় ক্রিমিনাল দুজনের কজন কী করল? [জ্ঞান]
(ক) ইসহাককে ধাক্কা মেরেছিল
(খ) নুরুল হুদার দিকে পেছন ফিরে তাকাল
(গ) জানালা দিয়ে লাফ দিল
(ঘ) ইসহাককে ছুরি দিয়ে আঘাত করল
উত্তর: (খ) নুরুল হুদার দিকে পেছন ফিরে তাকাল

৫৭০। কোন বাসস্টপেজে ঝিরঝির বৃষ্টিতে দাঁড়িয়ে বেশ কয়েকজন মানুষ অপেক্ষা করছিল? [জ্ঞান]
(ক) আমতলী (খ) বিজয় সরণি
(গ) আসাদ গেট (ঘ) কলেজ গেট
উত্তর: (গ) আসাদ গেট

৫৭১। বাসে যেতে যেতে কী দেখে নুরুল হুদার এক্সট্রা ভালো লাগে? [জ্ঞান]
(ক) দেশ-বিদেশের পতাকা (খ) পাকিস্তানের পতাকা
(গ) ট্রান্সপারেন্ট আবরণ (ঘ) বাংলাদেশের পতাকা
উত্তর: (গ) ট্রান্সপারেন্ট আবরণ

৫৭২। নুরুল হুদা সমস্ত ভালো লাগাটা চিড় খায় কখন? [জ্ঞান]
(ক) গাড়ি নষ্ট হয়ে গেলে (খ) হঠাৎ বাস ব্রেক কষলে
(গ) মিলিটারির আগমনে (ঘ) গোলাগুলি শুরু হলে
উত্তর: (খ) হঠাৎ বাস ব্রেক কষলে

৫৭৩। ক্র্যাক-ডাউনের রাত কেটে ভোর হলে মিলিটারির গুলিতে ছাদ থেকে কে পড়ে যায়? [জ্ঞান]
(ক) প্রিন্সিপাল (খ) মসজিদের মুয়াজ্জিন সাহেব
(গ) ইসহাকের শ্যালক (ঘ) ইমাম সাহেব
উত্তর: (খ) মসজিদের মুয়াজ্জিন সাহেব

৫৭৪। "দ্বিতীয়বার আল্লাহর মহত্ত্ব ঘোষণা করার সুযোগ তার আর মেলেনি।"- কার সম্পর্কে বলা হয়েছে? [অনুধাবন]
(ক) ইসহাকের (খ) মিন্টুর
(গ) প্রিন্সিপালের (ঘ) মুয়াজ্জিনের
উত্তর: (ঘ) মুয়াজ্জিনের

৫৭৫। মিলিটারি যাবতীয় গাড়ি থামিয়ে কী করছে? [জ্ঞান]
(ক) প্যাসেঞ্জারদের তল্লাশি করছে
(খ) গাড়ি ভাঙচুর করছে
(গ) জিপে করে প্যাসেঞ্জারদের বাড়ি পৌঁছে দিচ্ছে
(ঘ) পকেটমারদের আটকাচ্ছে
উত্তর: (ক) প্যাসেঞ্জারদের তল্লাশি করছে

৫৭৬। নুরুল হুদার চড়া বাসে কেমন মিলিটারি উঠল? [জ্ঞান]
(ক) বেঁটে, কালো (খ) ফর্সা, খাটো
(গ) লম্বা ও খুব ফর্সা (ঘ) খুব লম্বা ও মোটা
উত্তর: (গ) লম্বা ও খুব ফর্সা

৫৭৭। “ছুঁচালো চোখের মণি কাঁটার মতো বিঁধে যায় তার মুখে”- কার চোখের মণির কথা বলা হয়েছে? [জ্ঞান]
(ক) মিলিটারির (খ) ইসহাকের
(গ) প্রিন্সিপালের (ঘ) মিন্টুর
উত্তর: (ক) মিলিটারির

৫৭৮। 'আগে বাড়ো'- ড্রাইভারকে কে এই নির্দেশনা দেয়? [জ্ঞান]
(ক) ইসহাক (খ) মিলিটারি
(গ) মিন্টু (ঘ) চোর ও পকেটমার
উত্তর: (খ) মিলিটারি

৫৭৯। নুরুল হুদা বাস থেকে কোথায় নামে? [জ্ঞান]
(ক) আসাদগেট (খ) নীলক্ষেত
(গ) নিউমার্কেট (ঘ) ঢাকা কলেজের গেট
উত্তর: (গ) নিউমার্কেট

৫৮০। প্রিন্সিপালের সিংহাসন-মার্কা চেয়ারে কে বসে রয়েছে? [জ্ঞান]
(ক) প্রিন্সিপাল নিজে
(খ) জাঁদরেল টাইপের এক মিলিটারি পান্ডা
(গ) আকবর সাজিদ
(ঘ) মিসক্রিয়্যান্টদের নেতা
উত্তর: (খ) জাঁদরেল টাইপের এক মিলিটারি পান্ডা

৫৮১। “সেনাবাহিনীকে নিয়ে মজা করে শায়েরি করা খুব বড়ো অপরাধ”- মিলিটারি এ কথাটি কাকে বলে? [জ্ঞান]
(ক) প্রিন্সিপালকে (খ) আকবর সাজিদকে
(গ) নুরুল হুদাকে (ঘ) আব্দুস সাত্তার মৃধাকে
উত্তর: (ক) প্রিন্সিপালকে

৫৮২। সাজিদ সাহেব যদি পালিয়ে না থাকে তাহলে তার কপালের লিখন কে জানে? [জ্ঞান]
(ক) আল্লাহ (খ) আল্লাহ আর মিলিটারি
(গ) মিলিটারি (ঘ) ইসহাক
উত্তর: (খ) আল্লাহ আর মিলিটারি

৫৮৩। কোন দুজনের চোখ বেঁধে দেওয়া হয়েছিল? [জ্ঞান]
(ক) নুরুল হুদা ও প্রিন্সিপালের
(খ) নুরুল হুদা ও আব্দুস সাত্তার মৃধার
(গ) প্রিন্সিপাল ও আকবর সাজিদের
(ঘ) প্রিন্সিপাল ও আব্দুস সাত্তার মৃধার
উত্তর: (খ) নুরুল হুদা ও আব্দুস সাত্তার মৃধার

৫৮৪। কিছুদিন আগে কলেজে মোট কয়টি আলমারি কেনা হয়েছে? [জ্ঞান]
(ক) পাঁচটি (খ) তিনটি
(গ) দশটি (ঘ) বারোটি
উত্তর: (গ) দশটি

৫৮৫। কলেজের জন্য কেনা আলমারিগুলো কোন গাড়ি করে নিয়ে আসা হয়? [জ্ঞান]
(ক) ট্রাক (খ) পিকআপ
(গ) ঠেলাগাড়ি (ঘ) বাস
উত্তর: (গ) ঠেলাগাড়ি

৫৮৬। মিসক্রিয়্যান্টরা কলেজে কী বেশে ঢুকেছিল? [জ্ঞান]
(ক) ফকিরের ছদ্মবেশে (খ) কুলির ছদ্মবেশে
(গ) পাগলের ছদ্মবেশে (ঘ) দরবেশের ছদ্মবেশে
উত্তর: (খ) কুলির ছদ্মবেশে

৫৮৭। মিসক্রিয়্যান্ট কুলি গ্যাংয়ের সক্রিয় সদস্য হিসেবে তারা কার নাম বলেছে? [জ্ঞান]
(ক) প্রিন্সিপাল ড. আফাজ আহমদের নাম
(খ) নুরুল হুদার নাম
(গ) মিন্টুর নাম
(ঘ) আব্দুস সাত্তার মৃধার নাম
উত্তর: (খ) নুরুল হুদার নাম

৫৮৮। কেমিস্ট্রি ডিপার্টমেন্টে আলমারি সাজানোর সময় কোন ঋতু চলছিল? [জ্ঞান]
(ক) গ্রীষ্ম (খ) বর্ষা
(গ) শরৎ (ঘ) হেমন্ত
উত্তর: (খ) বর্ষা

৫৮৯। “বর্ষাকালই তো জুৎ”- কথাটি কে বলে? [অনুধাবন]
(ক) একজন কুলি (খ) নুরুল হুদা
(গ) স্টাফরুমের কলিগ (ঘ) মিন্টু
উত্তর: (ক) একজন কুলি

৫৯০। “বাংলার বর্ষা তো শালার জানা নেই। রাশিয়ায় ছিল জেনারেল উইন্টার, আমাদের জেনারেল মনসুন।”— কথাটি কে বলেছিল? [জ্ঞান]
(ক) এক কুলি (খ) স্টাফরুমের কলিগ
(গ) ছদ্মবেশী ছেলে (ঘ) মিন্টু
উত্তর: (খ) স্টাফরুমের কলিগ

৫৯১। মিলিটারি নুরুল হুদাকে একই প্রশ্ন করে জবাব না পেয়ে কী করে? [জ্ঞান]
(ক) তাকে থাপ্পড় মারে (খ) তার মুখে ঘুষি মারে
(গ) তাকে দুধ-পাউরুটি খাওয়ায় (ঘ) তাকে চাবুক মারে
উত্তর: (ক) তাকে থাপ্পড় মারে

৫৯২। মিসক্রিয়্যান্টদের আস্তানা জানা আছে কিনা এ প্রসঙ্গে ফের জিজ্ঞেস করলে নুরুল হুদা কী উত্তর দেয়? [জ্ঞান]
(ক) জানি না (খ) না
(গ) হ্যাঁ (ঘ) জি হুজুর
উত্তর: (গ) হ্যাঁ

৫৯৩। মিসক্রিয়্যান্টদের ঠিকানা বলে দেওয়ার কথায় নুরুল হুদাকে মিলিটারির কী খাওয়ায়? [জ্ঞান]
(ক) দুধ-কলা (খ) পাউরুটি-দুধ
(গ) দুধ-ভাত (ঘ) দই-চিঁড়া
উত্তর: (খ) পাউরুটি-দুধ

৫৯৪। ‘জেনারেল স্টেটমেন্ট’- এর বাংলা অর্থ কী? [জ্ঞান]
(ক) জেনারেলের বক্তব্য (খ) জেনারেলের কার্যসূচি
(গ) সাধারণ কর্মসূচি (ঘ) সাধারণ বিবৃতি
উত্তর: (ঘ) সাধারণ বিবৃতি

৫৯৫। ‘ফওরন’ অর্থ কী? [জ্ঞান]
(ক) দৌড়ানো (খ) ফড়ফড় করা
(গ) খবর দেওয়া (ঘ) তাড়াতাড়ি
উত্তর: (ঘ) তাড়াতাড়ি

৫৯৬। মুক্তিযোদ্ধাদের তৎপরতাকে পাকিস্তানি সরকার কী বলে অভিহিত করে? [জ্ঞান]
(ক) মিসক্রিয়্যান্ট (খ) জেনারেল স্টেটমেন্ট
(গ) সাবভার্সিভ অ্যাকটিভিটিজ (ঘ) ক্র্যাক-ডাউন
উত্তর: (গ) সাবভার্সিভ অ্যাকটিভিটিজ

৫৯৭। দ্বিতীয় বিশ্বযুদ্ধের সময় রাশিয়ায় কে ছিল? [জ্ঞান]
(ক) জেনারেল মনসুন (খ) জেনারেল সামার
(গ) জেনারেল উইন্টার (ঘ) জেনারেল স্প্রিং
উত্তর: (গ) জেনারেল উইন্টার

ডান পাশের কলাম:

৫৯৮। দ্বিতীয় বিশ্বযুদ্ধে হিটলার বাহিনী কোন বাহিনীর হাতে পর্যুদস্ত হয়েছিল? [জ্ঞান]
(ক) রুশ বাহিনী (খ) ফরাসি বাহিনী
(গ) ইরানি বাহিনী (ঘ) কাশ্মীর বাহিনী
উত্তর: (ক) রুশ বাহিনী

৫৯৯। ‘রেইনকোট’ গল্পটি কোন গল্পগ্রন্থে সংকলিত হয়? [জ্ঞান]
(ক) জাল স্বপ্ন স্বপ্নের জাল (খ) অন্যঘরে অন্য স্বর
(গ) দুধে ভাতে উৎপাত (ঘ) দোজখের ওম
উত্তর: (ক) জাল স্বপ্ন স্বপ্নের জাল

৬০০। ‘জাল স্বপ্ন স্বপ্নের জাল’ কত সালে প্রকাশিত হয়েছে? [জ্ঞান]
(ক) ১৯৯০ (খ) ১৯৯১
(গ) ১৯৯৫ (ঘ) ১৯৯৭
উত্তর: (ঘ) ১৯৯৭

৬০১। যখন ‘রেইনকোট’ গল্পটি রচিত হয় তখন মুক্তিযুদ্ধের কোন পর্যায়? [জ্ঞান]
(ক) শুরুর পর্যায় (খ) মাঝ পর্যায়
(গ) শেষ পর্যায় (ঘ) মুক্তিযুদ্ধ শেষ হয়ে গেছে
উত্তর: (গ) শেষ পর্যায়

৬০২। নুরুল হুদা ভীতু থেকে সাহসী হয়ে ওঠেন কীভাবে? [জ্ঞান]
(ক) রেইনকোট পরে (খ) মুক্তিযোদ্ধাদের দেখে
(গ) ধ্বংসাবস্থা দেখে (ঘ) যুদ্ধে অংশগ্রহণ করে
উত্তর: (ক) রেইনকোট পরে

বহুপদী সমাপ্তিসূচক বহুনির্বাচনি প্রশ্নোত্তর

৬০৩। “প্রতিবাদের প্রবল ঝড়ে কাঁপছিল সব অন্যায়”— এ কথার সঙ্গে সাদৃশ্যপূর্ণ প্রেক্ষাপটটি— [অনুধাবন]
i. নুরুল হুদার নীরব প্রতিবাদ
ii. চাবুকের বাড়িকে তুচ্ছ করা
iii. অন্যায়ের কাছে নুরুল হুদার মাথা নত না করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৬০৪। কলেজের দেওয়ালের পর রয়েছে— [প্রয়োগ]
i. বাগান
ii. টেনিস লন
iii. পুকুর
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(বি:দ্র: এই প্রশ্নের উত্তরের অংশটি ইমেজে অসম্পূর্ণ রয়েছে)
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৬০৫। ‘রেইনকোট’ গল্পে পাকিস্তানিদের যেসব অন্যায় কাজের কথা উল্লেখ করা হয়েছে— [প্রয়োগ]
i. মানুষ মেরে সাফ করে দেওয়া
ii. বাড়িঘর জ্বালিয়ে দেওয়া
iii. ১৪৪ ধারা জারি করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৬০৬। বাসস্ট্যান্ডে নুরুল হুদাকে দাঁড়াতে দেখলে দোকানদার ছেলেটা যেসব খবর দেয়— [প্রয়োগ]
i. মুক্তিযোদ্ধা কর্তৃক খান সেনাদের মারার খবর
ii. মিলিটারির জিপ উড়িয়ে দেওয়ার খবর
iii. রংপুর-দিনাজপুরের বেশিরভাগ জায়গার স্বাধীন হওয়ার খবর
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৬০৭। ক্র্যাক-ডাউনের রাতে নুরুল হুদা পরিবারের কারও ঘুম না হওয়ার কারণ— [অনুধাবন]
i. ট্যাংকের হুঙ্কার
ii. স্টেনগানের শব্দ
iii. মানুষের কাতরানি
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

অভিন্ন তথ্যভিত্তিক বহুনির্বাচনি প্রশ্ন

উদ্দীপকের আলোকে ৬০৮ ও ৬০৯ নং প্রশ্নের উত্তর দাও।
“রাস্তার এদিকের এলাকায় গলির মধ্যে কারফিউ। ট্যাক্সিতে ড্রাইভার ছাড়া আরো তিন জন শিখ— এদের সাথে না নিয়ে দেড় টাকার পথে পনের টাকায় আসতেও ট্যাক্সিরা রাজি হয়নি। দোষ দেবে কে? মৃত্যুর আতঙ্কে থমথম করছে চারিদিক, প্রতিটি ইন্দ্রিয় দিয়ে তা অনুভব করা যায়। জীবনের মূল্য নিয়ে কে দরদস্তুর করবে? গুমটে ঘেমে ঘেমে প্রমথর শরীর ভিজে গিয়েছিল।”

৬০৮। উদ্দীপকের সঙ্গে ‘রেইনকোট’ গল্পের যে সাদৃশ্য রয়েছে— [প্রয়োগ]
i. যুদ্ধের প্রেক্ষাপটে
ii. জীবন-মৃত্যুর মাঝে মানুষের অনিশ্চিত বেঁচে থাকা
iii. দেশপ্রেমের বিষয়ে
নিচের কোনটি সঠিক?

ডান পাশের কলাম:
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৬০৯। উদ্দীপকের ‘প্রমথ’ চরিত্রের সঙ্গে কার সাদৃশ্য রয়েছে? [অনুধাবন]
(ক) নুরুল হুদার (খ) প্রিন্সিপালের
(গ) মিন্টুর (ঘ) মিলিটারির
উত্তর: (ক) নুরুল হুদার

উদ্দীপকের আলোকে ৬১০ ও ৬১১ নং প্রশ্নের উত্তর দাও।
‘আমি যদি অহন থানার মধ্যে গিয়া দারোগারে ডাইকা কই, স্যার, আমার নাম আবদুল হানিফ, আমার বাপের নাম মরহুম ইব্রাহিম ওস্তাগর, কলতাবাজারের ডাম লালু আমার ওস্তাদ লাগে। আমি ডাম লালুর পার্টির মানু’, তো হালার পোলায় আমারে ধইরা রাইখা দিবো না? রাখবো তো?”

৬১০। উদ্দীপকের কোন বিষয়ের সঙ্গে ‘রেইনকোট’ গল্পের মিল পাওয়া যায়? [উচ্চতর দক্ষতা]
(ক) অপরাধী চক্রে নাম লেখানো
(খ) আশ্রয়ের প্রত্যাশা
(গ) মিসক্রিয়্যান্টদের সঙ্গে নিজেকে অভিযুক্ত করে গর্ববোধ করা
(ঘ) দেশপ্রেমে উদ্বুদ্ধ হওয়া
উত্তর: (গ) মিসক্রিয়্যান্টদের সঙ্গে নিজেকে অভিযুক্ত করে গর্ববোধ করা

৬১১। উদ্দীপকের হানিফ ‘রেইনকোট’ গল্পের কোন চরিত্রটির প্রতিনিধিত্ব করে? [অনুধাবন]
(ক) ইসহাক (খ) প্রিন্সিপাল
(গ) নুরুল হুদা (ঘ) মিন্টু
উত্তর: (গ) নুরুল হুদা

উদ্দীপকের আলোকে ৬১২ ও ৬১৩ নং প্রশ্নের উত্তর দাও।
তুমি আসবে বলে, হে স্বাধীনতা,
সাকিনা বিবির কপাল ভাঙল
সিঁথির সিঁদুর মুছে গেল হরিদাসীর।
তুমি আসবে বলে, হে স্বাধীনতা
শহরের বুকে জলপাই রঙের ট্যাংক এলো
দানবের মতো চিৎকার করতে করতে

৬১২। উদ্দীপকের সঙ্গে ‘রেইনকোট’ গল্পের সাদৃশ্যমূলক ঘটনা হলো— [উচ্চতর দক্ষতা]
i. ক্র্যাক-ডাউনের রাতে ট্যাংকের হুঙ্কার
ii. নারী-পুরুষদের ধরে মিলিটারি ক্যাম্পে নিয়ে যাওয়া
iii. গোলাগুলির আওয়াজ শুনতে পাওয়া
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৬১৩। উদ্দীপকের সঙ্গে ‘রেইনকোট’ গল্পের যে প্রসঙ্গটি মিলে যায়— [প্রয়োগ]
(বি:দ্র: এই প্রশ্নের অপশনগুলো ইমেজে অসম্পূর্ণ রয়েছে)
i. মুক্তিযুদ্ধের সময়
ii. নির্যাতিত জাতি
iii. স্বাধীনতার জন্য দেশের মানুষের আত্মত্যাগ
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            const filteredData = wrongQuestionsOnly
                ? data.map((q, i) => ({ ...q, originalIndex: i }))
                    .filter((q, i) => userAnswers[i] && userAnswers[i] !== q.answer)
                : data.map((q, i) => ({ ...q, originalIndex: i }));

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
        };
    </script>
