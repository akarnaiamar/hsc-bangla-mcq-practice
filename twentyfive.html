<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }

        /* Smooth Animation */
        .option-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        .correct {
            animation: correctAnim 0.6s ease forwards;
        }

        .wrong {
            animation: wrongAnim 0.6s ease forwards;
        }

        @keyframes correctAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongAnim {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Stats smooth transition */
        #stats {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">প্রমথ চৌধুরীর 'সাহিত্যের খেলা' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। 'পরার্থ' শব্দের অর্থ কোনটি?
(ক) পারিতোষিক  (খ) মনোজগৎ
(গ) পরোপকার  (ঘ) মনোরঞ্জন
উত্তর: (গ) পরোপকার

২। লেখকের মতে সাহিত্যের উদ্দেশ্য কোনটি?
(ক) সমাজের মনোরঞ্জন করা  (খ) অন্যের মনের অভাব পূর্ণ করা
(গ) মানুষের মনকে জাগানো  (ঘ) মনকে বিশ্বের খবর জাগানো
উত্তর: (গ) মানুষের মনকে জাগানো

৩। সাহিত্য 'স্বধর্মচ্যুত' হয় তখন, যখন সাহিত্যচর্চা হয়-
(ক) ফললাভের আকাঙ্ক্ষাশূন্য
(খ) জনসাধারণের মনোরঞ্জনের জন্য
(গ) জনসাধারণের মঙ্গলের জন্য
(ঘ) শিল্পীচিত্তের সম্পূর্ণতার লক্ষ্যে
উত্তর: (খ) জনসাধারণের মনোরঞ্জনের জন্য

❖ উদ্দীপকের আলোকে ৪ ও ৫ নং প্রশ্নের উত্তর দাও।
প্রচার শেষে জ্ঞানের কথার উদ্দেশ্য সফল। কিন্তু হৃদয়ভাবের কথা প্রচারে শেষ হয় না। তা কালজয়ী।

৪। 'সাহিত্যে খেলা' প্রবন্ধে অনুচ্ছেদটির 'জ্ঞানের কথার' সমর্থক ভাব হলো-
i. খবর প্রদান  ii. পাঠকের মনতুষ্টি  iii. মুখস্থবিদ্যা
নিচের কোনটি সঠিক?
(ক) i  (খ) i ও ii  (গ) ii ও iii  (ঘ) i, ii ও iii
উত্তর: (ক) i

৫। 'সাহিত্যে খেলা' প্রবন্ধ অনুসারে নিচের কোনটি অনুচ্ছেদের মূলভাবের সঙ্গে অধিক সঙ্গতিপূর্ণ?
(ক) মনের শূন্যতা পূর্ণ করাই সাহিত্যের লক্ষ্য
(খ) কল্যাণ সাধন করা সাহিত্যের লক্ষ্য
(গ) প্রশংসা অর্জনের জন্য সাহিত্যের সৃষ্টি
(ঘ) মনের সঙ্গে সম্পর্ক রচনা সাহিত্যের বৈশিষ্ট্য
উত্তর: (ঘ) মনের সঙ্গে সম্পর্ক রচনা সাহিত্যের বৈশিষ্ট্য

৬। বাংলা সাহিত্যে চলিত গদ্যরীতির প্রবর্তক কে?
(ক) প্রমথ চৌধুরী  (খ) মীর মশাররফ হোসেন
(গ) আব্দুর ওদুদ  (ঘ) বঙ্কিমচন্দ্র চট্টোপাধ্যায়
উত্তর: (ক) প্রমথ চৌধুরী

৭। প্রমথ চৌধুরীর সাহিত্যিক ছদ্মনাম কী?
(ক) নীললোহিত  (খ) ভানুসিংহ
(গ) বীরবল  (ঘ) কালকূট
উত্তর: (গ) বীরবল

৮। প্রমথ চৌধুরী সম্পাদিত 'সবুজপত্র' পত্রিকাটি প্রথম প্রকাশিত হয়?
(ক) ১৯১২ সালে  (খ) ১৯১৩ সালে
(গ) ১৯১৪ সালে  (ঘ) ১৯১৬ সালে
উত্তর: (গ) ১৯১৪ সালে

৯। প্রমথ চৌধুরীর গদ্যশৈলীর নিদর্শন রয়েছে কোনটিতে?
(ক) চার ইয়ারী কথা  (খ) বীরবলের হালখাতা
(গ) রায়তের কথা  (ঘ) উপরের সবগুলো গ্রন্থে
উত্তর: (ঘ) উপরের সবগুলো গ্রন্থে

১০। চলিত রীতিতে রচিত প্রথম গ্রন্থ কোনটি?
(ক) সাহিত্যে খেলা  (খ) বীরবলের হালখাতা
(গ) হেমন্তী  (ঘ) প্রভাবতী সম্ভাষণ
উত্তর: (খ) বীরবলের হালখাতা

১১। প্রমথ চৌধুরীর সনেট সংকলনের নাম কী?
(ক) সনেট পঞ্চাশৎ  (খ) সনেট সংকলন
(গ) সনেটগুচ্ছ  (ঘ) সনেট
উত্তর: (ক) সনেট পঞ্চাশৎ

১২। প্রমথ চৌধুরীর পৈতৃক নিবাস ছিল পাবনা জেলার কোন গ্রামে?
(ক) হরিপুর  (খ) মণিপুর
(গ) গোবিন্দপুর  (ঘ) রসুলপুর
উত্তর: (ক) হরিপুর

১৩। 'সাহিত্যে খেলা' প্রবন্ধে ফরাসি ভাস্কর রোদ্যঁ প্রসঙ্গ এসেছে কেন?
(ক) বিখ্যাত হওয়ার প্রসঙ্গে  (খ) বাড়তি উপার্জনের আশায়
(গ) শিল্পমাত্রই খেলা প্রসঙ্গে  (ঘ) মাটির পুতুল তৈরি করা
উত্তর: (গ) শিল্পমাত্রই খেলা প্রসঙ্গে

১৪। "যিনি গড়তে জানেন, তিনি শিবও গড়তে পারেন, বাঁদরও গড়তে পারেন।" এতে কার প্রশংসা কীর্তি হয়েছে?
(ক) বড় মাপের শিল্পীর  (খ) ছোট মাপের শিল্পীর
(গ) শিক্ষকের  (ঘ) গায়কের
উত্তর: (ক) বড় মাপের শিল্পীর

১৫। কোন রাজ্যে মহাপুরুষদের যা খুশি তা-ই করার অধিকার আছে?
(ক) বিজ্ঞান রাজ্যে  (খ) কলারাজ্যে
(গ) অরাজক রাজ্যে  (ঘ) অর্থরাজ্যে
উত্তর: (খ) কলারাজ্যে

১৬। 'সাহিত্যে খেলা' প্রবন্ধে দশ দিক বলতে কী বোঝানো হয়েছে?
(ক) বিষয় নির্বাচনের প্রসঙ্গ  (খ) সাহিত্যচর্চায় অনুপ্রবেশ
(গ) বড়মাপের শিল্পীর বৈশিষ্ট্য  (ঘ) ইতরশিল্পীর বৈশিষ্ট্য
উত্তর: (ক) বিষয় নির্বাচনের প্রসঙ্গ

১৭। কোথায় না বসলে আমাদের উপদেশ কেউ মানে না?
(ক) চেয়ারে  (খ) বেদিতে
(গ) টেবিলে  (ঘ) ক্ষমতায়
উত্তর: (খ) বেদিতে

১৮। কোথায় না চড়লে আমাদের অভিনয় কেউ দেখে না?
(ক) গাড়িতে  (খ) রঙ্গমঞ্চে
(গ) পাহাড়ে  (ঘ) ছাদে
উত্তর: (খ) রঙ্গমঞ্চে

১৯। কত ঘণ্টা আমরা টঙে চড়ে থাকতে চাই?
(ক) বিশ ঘণ্টা  (খ) পঁচিশ ঘণ্টা
(গ) চব্বিশ ঘণ্টা  (ঘ) ছাব্বিশ ঘণ্টা
উত্তর: (গ) চব্বিশ ঘণ্টা

২০। অনেকের পক্ষে নিজেদের আয়ত্তের বহির্ভূত উচ্চ স্থানে ওঠার চেষ্টাটাই কীসের কারণ?
(ক) মহাপতনের  (খ) পতনের
(গ) নষ্টের  (ঘ) উচ্চাশার
উত্তর: (ক) মহাপতনের

২১। কাদের পথ অনুসরণ করাই কর্তব্য?
(ক) মহাজনদের  (খ) শিক্ষকদের
(গ) সাধারণ লোকদের  (ঘ) ক্ষমতাভানদের
উত্তর: (ক) মহাজনদের

২২। প্রমথ চৌধুরীর মতে, খেলার রাজ্যে কোনো প্রভেদ নেই কেন?
(ক) সকলের সমান অধিকার আছে বলে  (খ) সকলে অংশগ্রহণ করতে পারে বলে
(গ) সবাই অংশ নিতে চায় বলে  (ঘ) সবাই আনন্দ পায় বলে
উত্তর: (ক) সকলের সমান অধিকার আছে বলে

২৩। প্রমথ চৌধুরীর মতে কোথায় ব্রাহ্মণ-শূদ্রের কোনো প্রভেদ নেই?
(ক) খেলার ময়দানে  (খ) বাজারে
(গ) স্কুলে  (ঘ) কলেজে
উত্তর: (ক) খেলার ময়দানে

২৪। কোনরূপ উচ্চ আশা নিয়ে সাহিত্যজগতে প্রবেশ করলে কোথায় পড়ে যেতে হবে?
(ক) নিম্ন শ্রেণিতে  (খ) নরকে
(গ) সমালোচনায়  (ঘ) উচ্চ শ্রেণিতে
উত্তর: (ক) নিম্ন শ্রেণিতে

২৫। 'সাহিত্যে খেলা' প্রবন্ধ অনুসারে সামাজিক জীব কারা?
(ক) কবিরা  (খ) হাততালি প্রত্যাশী লেখকেরা
(গ) ঔপন্যাসিকেরা  (ঘ) সাহিত্যিকেরা
উত্তর: (খ) হাততালি প্রত্যাশী লেখকেরা

২৬। বিশ্বমানবের মনের সঙ্গে নিত্য-নূতন সম্বন্ধ পাতানো কার নিত্যনৈমিত্তিক কর্ম?
(ক) শিক্ষক মনের  (খ) কবি মনের
(গ) ছাত্র মনের  (ঘ) লেখক মনের
উত্তর: (খ) কবি মনের

২৭। 'সাহিত্যে খেলা' প্রবন্ধে 'রঙ্গভূমি' বলতে কী বোঝানো হয়েছে?
(ক) আমোদ-প্রমোদের জায়গা  (খ) বক্তৃতা দেওয়ার স্থান
(গ) যে ভূমি রঙ্গে রাঙানো  (ঘ) উচ্চ কোনো মঞ্চ
উত্তর: (ক) আমোদ-প্রমোদের জায়গা

২৮। 'সাহিত্যে খেলা' প্রবন্ধে কোন মাঠের কথা উল্লেখ আছে?
(ক) মড়ের মাঠ  (খ) গড়ের মাঠ
(গ) পুলের মাঠ  (ঘ) খড়ের মাঠ
উত্তর: (খ) গড়ের মাঠ

২৯। 'সাহিত্যে খেলা' প্রবন্ধের কোন হলের কথা উল্লেখ আছে?
(ক) টাউন হল  (খ) ভিলেজ হল
(গ) পরীক্ষার হল  (ঘ) সিনেমা হল
উত্তর: (ক) টাউন হল

৩০। টাউন হলের বক্তৃতার উদ্দেশ্য কী?
(ক) ভালো কিছু করা  (খ) অতি মহৎ
(গ) উৎকৃষ্ট  (ঘ) নিকৃষ্ট
উত্তর: (খ) অতি মহৎ

৩১। মানুষের দেহমনের সকল প্রকার ক্রিয়ার মধ্যে ক্রীড়া শ্রেষ্ঠ হওয়ার কারণ কোনটি?
(ক) তা উদ্দেশ্যপ্রণোদিত বলে  (খ) তা অর্থহীন ও উদ্দেশ্যহীন বলে
(গ) হাততালি পাওয়া যায় বলে  (ঘ) মানুষের মনোরঞ্জন করে বলে
উত্তর: (খ) তা অর্থহীন ও উদ্দেশ্যহীন বলে

৩২। মানুষ বক্তৃতা শুনতে না গিয়ে খেলা দেখতে যায় কেন?
(ক) মনোরঞ্জন হয় বলে  (খ) আনন্দ পায় বলে
(গ) টাকা লাগে না বলে  (ঘ) খেলা মানুষ পছন্দ করে বলে
উত্তর: (খ) আনন্দ পায় বলে

৩৩। সাহিত্যে মানবাত্মা খেলা করে কেন?
(ক) সাহিত্য মনোরঞ্জন করে বলে  (খ) সাহিত্যে আনন্দ আছে বলে
(গ) সাহিত্য নীরস বলে  (ঘ) সাহিত্য খেলার মতো বলে
উত্তর: (ঘ) সাহিত্য খেলার মতো বলে

৩৪। যে খেলায় উপরি পাওনা আছে তার নাম কী?
(ক) মায়া খেলা  (খ) জুয়াখেলা
(গ) ক্রিকেট খেলা  (ঘ) ফুটবল খেলা
উত্তর: (খ) জুয়াখেলা

৩৫। "গীতের মর্মও বুঝেন না, গীতার ধর্মও বুঝেন না"- কে?
(ক) লাভের আশায় যে লেখনী ধারণ করে  (খ) বিনা লাভে যে লেখনী ধারণ করে
(গ) অনর্থক যে লেখনী ধারণ করে  (ঘ) আনন্দের জন্য যে লেখনী ধারণ করে
উত্তর: (ক) লাভের আশায় যে লেখনী ধারণ করে

৩৬। 'সাহিত্যে খেলা' প্রবন্ধে জীবজগতে একমাত্র নিষ্কাম কর্ম কী?
(ক) রান্না  (খ) পড়া
(গ) খেলা  (ঘ) লেখা
উত্তর: (গ) খেলা

৩৭। সৃষ্টির মধ্যে কবি ও বিশ্বস্রষ্টার সাদৃশ্য হচ্ছে-
(ক) উদ্দেশ্যের মধ্যে  (খ) আনন্দের মধ্যে
(গ) মর্যাদার মধ্যে  (ঘ) অধিকারের মধ্যে
উত্তর: (খ) আনন্দের মধ্যে

৩৮। 'সৃষ্টি তাঁর লীলামাত্র'- এখানে 'তাঁর' বলতে কাকে বোঝানো হয়েছে?
(ক) ঈশ্বরকে  (খ) লেখককে
(গ) ঈশ্বরের শক্তিকে  (ঘ) কবিকে
উত্তর: (ক) ঈশ্বরকে

৩৯। "কবির সৃষ্টিও এই বিশ্বসৃষ্টির অনুরূপ।" কথাটি বলতে বোঝানো হয়েছে-
(ক) সম উদ্দেশ্য  (খ) সম মর্যাদা
(গ) সম আনন্দ  (ঘ) সম অধিকার
উত্তর: (ক) সম উদ্দেশ্য

৪০। সমাজের মনোরঞ্জন করতে গেলে সাহিত্য স্বধর্মচ্যুত হয়ে পড়ে কেন?
(ক) সাহিত্য পাঠক বুঝতে পারে না বলে  (খ) মনোরঞ্জন সাহিত্যের উদ্দেশ্য নয় বলে
(গ) সাহিত্যের উদ্দেশ্য ভ্রষ্ট হয় বলে  (ঘ) সমাজ সাহিত্যকে গ্রহণ করতে পারে না বলে
উত্তর: (খ) মনোরঞ্জন সাহিত্যের উদ্দেশ্য নয় বলে

৪১। কাব্যজগতে যার নাম আনন্দ তারই নাম বেদনা কেন?
(ক) লেখক ও পাঠকের সমন্বয়ের অভাবে  (খ) পাঠকের নির্বুদ্ধিতার জন্য
(গ) পাঠকের রুচি পরিবর্তনের জন্য  (ঘ) কাব্যজগতের সীমাবদ্ধতার জন্য
উত্তর: (গ) পাঠকের রুচি পরিবর্তনের জন্য

৪২। সাহিত্যরাজ্যে খেলনা পেয়ে কার মনস্তুষ্টি হতে পারে?
(ক) লেখকের (খ) পাঠকের
(গ) সমালোচকের (ঘ) সাংবাদিকের
উত্তর: (খ) পাঠকের

৪৩। ‘বৈশ্য লেখকের পক্ষেই শূদ্র পাঠকের মনোরঞ্জন করা সংগত।’ উক্তিটিতে লেখকের কোন মনোভাব প্রকাশ পেয়েছে?
(ক) সনাতন ধর্মের বর্ণপ্রথার স্পষ্টীকরণ
(খ) লেখক-পাঠক সম্পর্কের স্বরূপ উদ্‌ঘাটন
(গ) সমাজের বৈষম্যের চিত্র নির্মাণ
(ঘ) সাহিত্যে পাঠক তোষণের বিরুদ্ধাচরণ
উত্তর: (ঘ) সাহিত্যে পাঠক তোষণের বিরুদ্ধাচরণ

৪৪। ‘সাহিত্যে খেলা’ প্রবন্ধে ‘সস্তা’ শব্দটির অর্থ কী?
(ক) খেলো করা (খ) বিক্রি করা
(গ) খেলা করা (ঘ) সচরাচর পাওয়া যায়
উত্তর: (ক) খেলো করা

৪৫। প্রমথ চৌধুরী পাঠকসমাজের কী না করার পরামর্শ দিয়েছেন?
(ক) চিত্তবিনোদন (খ) মনোরঞ্জন
(গ) প্রতারণা (ঘ) ঠকানো
উত্তর: (খ) মনোরঞ্জন

৪৬। কবির মতিগতি কার মতিগতির সম্পূর্ণ বিপরীত?
(ক) দাতার (খ) লেখকের
(গ) পাঠকের (ঘ) শিক্ষকের
উত্তর: (ঘ) শিক্ষকের

৪৭। শিক্ষা কী?
(ক) যা অনিচ্ছা সত্ত্বেও গলাধঃকরণ করতে বাধ্য হয়
(খ) স্বেচ্ছায় গ্রহণ করে
(গ) মানুষের ভেতরের মানুষকে জাগিয়ে তোলে
(ঘ) শিক্ষা মানুষ আনন্দের সাথে গ্রহণ করে
উত্তর: (গ) মানুষের ভেতরের মানুষকে জাগিয়ে তোলে

৪৮। শিক্ষা ও সাহিত্য পরস্পর—
(ক) বন্ধু (খ) বিপরীত
(গ) সমান (ঘ) সমান্তরাল
উত্তর: (খ) বিপরীত

৪৯। লেখকের মতে শিক্ষার কাজ কোনটি?
(ক) মানুষের মনকে বিশ্বের খবর জানানো
(খ) মানুষকে আনন্দ দান করা
(গ) মানুষের মনোরঞ্জন করা
(ঘ) মানুষের মনকে জাগানো
উত্তর: (ক) মানুষের মনকে বিশ্বের খবর জানানো

৫০। শিক্ষা ও সাহিত্যকে ‘সাহিত্যে খেলা’ প্রবন্ধে তুলনা করা হয়েছে—
(ক) জ্ঞান ও আনন্দরূপে (খ) আনন্দ ও দুঃখরূপে
(গ) জ্ঞান ও শক্তিরূপে (ঘ) আনন্দ ও উপদেশরূপে
উত্তর: (ক) জ্ঞান ও আনন্দরূপে

৫১। সাহিত্যের উদ্দেশ্য কোনটি?
(ক) আনন্দ দান করা (খ) মনকে ভাবিয়ে তোলা
(গ) কল্পনায় জগতে প্রবেশ করানো (ঘ)বেদনায় মর্মাহত করা
উত্তর: (ক) আনন্দ দান করা

৫২। কোন বস্তু লোকে অনিচ্ছা সত্ত্বেও গলাধঃকরণ করতে বাধ্য হয়?
(ক) সাহিত্য (খ) শিক্ষা
(গ) দর্শন (ঘ) সংস্কৃতি
উত্তর: (খ) শিক্ষা

৫৩। ‘সাহিত্যে খেলা’ প্রবন্ধের লেখকের মতে কাব্য কী নয়?
(ক) চিঠিপত্র (খ) মানপত্র
(গ) সংবাদপত্র (ঘ) আবেদনপত্র
উত্তর: (গ) সংবাদপত্র

৫৪। লেখকের মতে সাহিত্যের উদ্দেশ্য কোনটি?
(ক) সমাজের মনোরঞ্জন করা (খ) অন্যের মনের অভাব পূর্ণ করা
(গ) মানুষের মনকে জাগানো (ঘ) মনকে বিশ্বের খবর জানানো
উত্তর: (গ) মানুষের মনকে জাগানো

৫৫। শিক্ষার উৎস কোনটি?
(ক) খেলার মাঠ (খ) কবিতা
(গ) সংবাদপত্র (ঘ) রামায়ণ
উত্তর: (গ) সংবাদপত্র

৫৬। “আনন্দের ধর্মই এই যে তা সংক্রামক।” উক্তিটির তাৎপর্য হলো—
(ক) আনন্দ পরিমাপযোগ্য নয়
(খ) অধিক আনন্দ সংক্রামক রোগের মতো ক্ষতিকর
(গ) আনন্দ স্বভাবত অন্যের মধ্যে সঞ্চারিত হয়
(ঘ) আনন্দ উপভোগের জন্য কোনো বয়সের সীমারেখা নেই
উত্তর: (গ) আনন্দ স্বভাবত অন্যের মধ্যে সঞ্চারিত হয়

৫৭। কাব্যরস নামক অমৃতে আমাদের যে অরুচি জন্মেছে, লেখকের মতে এ জন্য দায়ী কে বা কারা?
(ক) ছাত্র-মাস্টার (খ) ছাত্র-অভিভাবক
(গ) মাস্টার-অভিভাবক (ঘ) স্কুল মাস্টার
উত্তর: (ঘ) স্কুল মাস্টার

৫৮। একালে সাহিত্যের ভার নিয়েছেন কারা?
(ক) মৌলভিরা (খ) সাহিত্যিকরা
(গ) কবিরা (ঘ) স্কুলমাস্টারেরা
উত্তর: (ঘ) স্কুলমাস্টারেরা

৫৯। ‘সাহিত্যে খেলা’ প্রবন্ধে স্কুল ও তার শিক্ষকের সমালোচনা করেছেন কীসের মাধ্যমে?
(ক) সাহিত্যে অবজ্ঞার মাধ্যমে (খ) কাব্যরসে অরুচির মাধ্যমে
(গ) খেলাধুলার মাধ্যমে (ঘ) বিরোধিতার মাধ্যমে
উত্তর: (খ) কাব্যরসে অরুচির মাধ্যমে

৬০। শিক্ষকের কাজ হচ্ছে কাব্যকে—
(ক) বধ করা (খ) শবচ্ছেদ করা
(গ) তত্ত্ব আবিষ্কার করা (ঘ) উপরের সবগুলো
উত্তর: (ঘ) উপরের সবগুলো

৬১। কোন কথাটি স্বীকার করতে শিক্ষকগণ অপ্রস্তুত?
(ক) কাব্যরসে যে আমাদের অরুচি
(খ) সাহিত্য রচনা যে আত্মার লীলা
(গ) কাব্য যে সংবাদপত্র নয়
(ঘ) কবিরাই যে যথার্থ সামাজিক জীব
উত্তর: (খ) সাহিত্য রচনা যে আত্মার লীলা

৬২। ‘সাহিত্যে খেলা’ প্রবন্ধে পড়বার ও বোঝবার বিষয় কোনটি?
(ক) কাব্য (খ) কৌতুক
(গ) ছড়া (ঘ) নাটক
উত্তর: (ক) কাব্য

৬৩। প্রমথ চৌধুরীর মতে কোন দুটির মধ্যে দা-কুমড়া সম্পর্ক?
(ক) হীরা ও কয়লা (খ) সোনা ও হীরা
(গ) কাচ ও কয়লা (ঘ) কাচ ও হীরা
উত্তর: (ঘ) কাচ ও হীরা

৬৪। “হীরক ও কাচ যমজ হলেও সহোদয় নয়” - উক্তিটিতে কোন ধরনের ভাব প্রকাশ পায়?
(ক) উদ্ভট রকমের (খ) বিপরীতমুখী
(গ) সমার্থক (ঘ) সহার্থক
উত্তর: (ঘ) সহার্থক

৬৫। পাথুরে কয়লা হীরার সবর্ণ না হলেও সগোত্র। এখানে কোন অর্থে প্রতিটি সগোত্র?
(ক) কয়লা ও হীরা একই রকম (খ) দুইটি সমমূল্যের
(গ) দুইটি পাওয়া যায় খনিতে (ঘ) কয়লা থেকে হীরার জন্ম বলে
উত্তর: (ঘ) কয়লা থেকে হীরার জন্ম বলে

৬৬। আমরা সাহিত্যে হীরাকে কোনটি বলে নিত্য ভুল করি?
(ক) সোনা (খ) রূপা
(গ) তামা (ঘ) কাচ
উত্তর: (ঘ) কাচ

৬৭। “সাহিত্যে খেলাচ্ছলে শিক্ষা দেয়?” উক্তিটি তাৎপর্য হলো—
(ক) খেলতে খেলতে শিক্ষা গ্রহণ (খ) আনন্দের সঙ্গে শিক্ষা গ্রহণ
(গ) শিক্ষার সঙ্গে খেলা করা (ঘ) খেলার ছলনায় শিক্ষা গ্রহণ
উত্তর: (খ) আনন্দের সঙ্গে শিক্ষা গ্রহণ

৬৮। ‘নরকের দুয়ার’ কার শ্রেষ্ঠ কীর্তি?
(ক) প্রমথ চৌধুরী (খ) রোদ্যঁ
(গ) ডিন্নি (ঘ) রবীন্দ্রনাথ ঠাকুর
উত্তর: (খ) রোদ্যঁ

৬৯। ‘প্রবৃত্তি’ শব্দটির অর্থ কী?
(ক) আকাঙ্ক্ষা (খ) ইচ্ছা
(গ) সত্তা (ঘ) পরোপকার
উত্তর: (খ) ইচ্ছা

৭০। হিন্দুধর্মে ‘শিব’ কীসের প্রতীক বলে প্রতীয়মান হয়?
(ক) অমঙ্গলের (খ) মঙ্গলের
(গ) আশার (ঘ) কামের
উত্তর: (খ) মঙ্গলের

৭১। ‘সাহিত্যে খেলা’ প্রবন্ধে ‘গতায়াত’ শব্দটি কোন অর্থে ব্যবহৃত হয়েছে?
(ক) অগত্য অর্থে (খ) যাতায়াত অর্থে
(গ) গতর অর্থে (ঘ) শরীরের আবরণ অর্থে
উত্তর: (খ) যাতায়াত অর্থে

৭২। ‘Lyric’-এর মানে কী?
(ক) ব্যঙ্গ কবিতা (খ) বিমূর্ত কবিতা
(গ) মূর্ত কবিতা (ঘ) গীতিকবিতা
উত্তর: (ঘ) গীতিকবিতা

৭৩। আপন মনে নিজে নিজে কথা বলাকে এক কথায় বলা হয়—
(ক) স্বগতোক্তি (খ) স্বউক্তি
(গ) নিজের উক্তি (ঘ) স্বীকারোক্তি
উত্তর: (ক) স্বগতোক্তি

৭৪। ‘স্বার্থ’ শব্দের সঠিক বিপরীতার্থক শব্দ কোনটি?
(ক) স্বার্থহীন (খ) পরার্থ
(গ) সস্বার্থ (ঘ) পরমার্থ
উত্তর: (খ) পরার্থ

৭৫। ‘মোক্ষলাভ’ শব্দের অর্থ কী?
(ক) দেহের অসুখ থেকে মুক্তি অর্জন
(খ) ধ্যানমগ্ন অবস্থায়
(গ) আত্মাকে শুদ্ধরূপে লাভ করা
(ঘ) আত্মার মুক্তি অর্জন
উত্তর: (ঘ) আত্মার মুক্তি অর্জন

৭৬। ‘পরমাত্মা’ মানে কী?
(ক) পরের আত্মা (খ) নিজের আত্মা
(গ) ঈশ্বর (ঘ) পরম সত্তা
উত্তর: (গ) ঈশ্বর

৭৭। ‘বৈশ্য’ কাদেরকে বলা হয়?
(ক) ব্যবসায়ী শ্রেণিকে (খ) উচ্চশ্রেণিকে
(গ) নিম্নশ্রেণিকে (ঘ) ব্রাহ্মণ শ্রেণিকে
উত্তর: (ক) ব্যবসায়ী শ্রেণিকে

৭৮। ‘সাহিত্যে খেলা’ প্রবন্ধে “বাজারে কাটা” বলতে কী বোঝানো হয়েছে?
(ক) কাটা পড়া (খ) নিঃশেষ হওয়া
(গ) অগ্নিমূল্য (ঘ) বিক্রি হওয়া
উত্তর: (ঘ) বিক্রি হওয়া

৭৯। ‘সাহিত্যে খেলা’ প্রবন্ধে ‘অভিনেতা’ অর্থে কোন শব্দটি ব্যবহৃত হয়েছে?
(ক) কৌপীন (খ) ভেঁপু বাদক
(গ) কুশীলব (ঘ) বৈশ্য
উত্তর: (গ) কুশীলব

(ক) ল্যাঙট (খ) টুপি
(গ) হিজাব (ঘ) ন্যাকড়া
উত্তর: (ক) ল্যাঙট

(ক) কাশিরাম দাস (খ) ভারতচন্দ্র
(গ) মুকুন্দরাম চক্রবর্তী (ঘ) বাল্মীকি
উত্তর: (ঘ) বাল্মীকি

৮২। প্রাচীন ভারতীয় সাহিত্যের আদি কবি ছিলেন—
(ক) গীতগোবিন্দ (খ) বাল্মীকি
(গ) প্রমথ চৌধুরী (ঘ) রোদ্যঁ
উত্তর: (খ) বাল্মীকি

৮৩। বাল্মীকির রামায়ণ জনপ্রিয় কেন?
(ক) শিক্ষামূলক গ্রন্থ হিসেবে (খ) ধর্মগ্রন্থ হিসেবে
(গ) সাহিত্যগ্রন্থ হিসেবে (ঘ) সবার মনোরঞ্জনের গ্রন্থ হিসেবে
উত্তর: (গ) সাহিত্যগ্রন্থ হিসেবে

৮৪। রামচন্দ্রের প্রতি মুনির উপদেশ সংবলিত সংস্কৃত রামায়ণ গ্রন্থের নাম কী?
(ক) বাল্মীকি রামায়ণ (খ) কৃত্তিবাসী রামায়ণ
(গ) যোগবাশিষ্ঠ রামায়ণ (ঘ) কাশীদাসী রামায়ণ
উত্তর: (গ) যোগবাশিষ্ঠ রামায়ণ

৮৫। ‘সাহিত্যে খেলা’ প্রবন্ধের নামকরণ করা হয়েছে—
(ক) অন্তর্নিহিত তাৎপর্যের ওপর ভিত্তি করে
(খ) বিষয়বস্তুর ওপর ভিত্তি করে
(গ) প্রতীকের ওপর ভিত্তি করে
(ঘ) রূপকের ওপর ভিত্তি করে
উত্তর: (খ) বিষয়বস্তুর ওপর ভিত্তি করে

৮৬। 'সাহিত্যে খেলা' প্রবন্ধের মূলবক্তব্য কী?

(খ) সাহিত্যচর্চার আদর্শ ও উদ্দেশ্য সম্পর্কে গুরুত্বারোপ করা
(গ) সাহিত্য পাঠের প্রতি উদ্বুদ্ধ করা
(ঘ) সাহিত্য ও শিক্ষার উদ্দেশ্য ব্যাখ্যা করা
উত্তর: (খ) সাহিত্যচর্চার আদর্শ ও উদ্দেশ্য সম্পর্কে গুরুত্বারোপ করা

৮৭। 'সাহিত্যে খেলা' প্রবন্ধের মূলত কোন বিষয়টি ফুটে উঠেছে?
(ক) শিক্ষার আদর্শ ও উদ্দেশ্য
(খ) সাহিত্য চর্চার আদর্শ ও উদ্দেশ্য
(গ) খেলাধুলার উদ্দেশ্য
(ঘ) বিনোদনের উদ্দেশ্য
উত্তর: (খ) সাহিত্য চর্চার আদর্শ ও উদ্দেশ্য

৮৮। 'সাহিত্যে খেলা' প্রবন্ধটির মূল প্রতিপাদ্য বিষয় কী?
(ক) সাহিত্যের স্বরূপ বিশ্লেষণ
(খ) সাহিত্যের উদ্দেশ্য বিশ্লেষণ
(গ) সাহিত্যের গুরুত্ব বিশ্লেষণ
(ঘ) সাহিত্যের উপযোগিতা বিশ্লেষণ
উত্তর: (খ) সাহিত্যের উদ্দেশ্য বিশ্লেষণ

৮৯। লেখকের মতে, সাহিত্যের উদ্দেশ্য হচ্ছে—

ii. বিশ্বের খবর জানানো
iii. আনন্দ দান
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) ii
(গ) iii
(ঘ) i ও iii
উত্তর: (গ) iii

৯০। 'সাহিত্যে খেলা' প্রবন্ধে জগদ্বিখ্যাত ফরাসি ভাস্কর রোদ্যঁর কথা উল্লেখ করার মূল কারণ হচ্ছে—
i. বড় শিল্পীরা কখনো এক করতে গিয়ে আরেক করেন না, তা বোঝানো
ii. সাহিত্য চর্চার আদর্শ ও উদ্দেশ্য সম্পর্কে সুস্পষ্ট ধারণা দেওয়া
iii. প্রকৃত ও মহৎ শিল্পকর্ম সাহিত্যজগতকে উচ্চাসনে স্থান দিতে পারে তা তুলে ধরা
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৯১। কবির কাব্যসৃষ্টি ও বিশ্বস্রষ্টার পৃথিবী সৃষ্টির সাথে সাদৃশ্য বিদ্যমান রয়েছে—

ii. সৌন্দর্য ও বস্তনিষ্ঠুতার মানদণ্ডে
iii. কর্মদক্ষতা ও কাল্পনিক ভাবনায়
নিচের কোনটি সঠিক?
(ক) i
(খ) ii
(গ) iii
(ঘ) i ও iii
উত্তর: (ক) i

৯২। “সমাজের মনোরঞ্জন করতে গেলে সাহিত্যে স্বধর্মচ্যুত হয়ে পড়ে।” এর অর্থ হলো—
i. সাহিত্যের আসল উদ্দেশ্য থাকে না

iii. সাহিত্যের কল্যাণধর্মিতা থাকে না
নিচের কোনটি সঠিক?
(ক) i
(খ) ii
(গ) iii
(ঘ) i ও iii
উত্তর: (ক) i

i. হিমালয়, রাস
ii. অভিপ্রায়, দুর্লভ
iii. সংবাদ, পরিচয়
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৯৪। 'সাহিত্যে খেলা' প্রবন্ধে বড় বড় শিল্পীদের সম্পর্কে বলা হয়েছে, তিনি গড়তে জানেন, তিনি—
i. শিবও গড়তে পারেন
ii. বাঁদরও গড়তে পারেন
iii. মানুষও গড়তে পারেন

(ক) i ও ii

(ঘ) i, ii ও iii

iii. তাঁদের যা-খুশি তাই করার অধিকার আছে
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii

৯৬। 'সাহিত্যে খেলা' প্রবন্ধ অনুসারে দর্শক ও শ্রোতৃমণ্ডলীর নয়ন মন আকর্ষণ করতে হলে—

iii. বেদিতে বসে উপদেশ দিতে হবে
নিচের কোনটি সঠিক?

ii. নিচুতেও নামতে চায়

i. তাঁরা শিব ও গড়তে পারেন
ii. তাঁরা বাঁদরও গড়তে পারেন
iii. তাঁরা শুধু শিব গড়তে পারেন

উত্তর: (ক) i ও ii

৯৯। 'শবচ্ছেদ' কথাটির অর্থ হলো—
i. মরদেহ কেটে পরীক্ষা করা
ii. মড়া কাটা
iii. মড়া পোড়ানো
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১০০। সাহিত্যের উদ্দেশ্য বলতে প্রমথ চৌধুরীর অভিমত হলো—
i. আনন্দ দান করা
ii. মনোরঞ্জন করা নয়
iii. শিক্ষা দান করা নয়
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১০১। প্রমথ চৌধুরী শিক্ষা ও সাহিত্যের মধ্যে যে পার্থক্য নির্ণয় করেছেন তা হলো—
i. শিক্ষার উদ্দেশ্য মানুষের মনকে বিশ্বের খবর জানানো
ii. সাহিত্যের উদ্দেশ্য মানুষের মনকে জাগানো
iii. শিক্ষার উদ্দেশ্য আনন্দদান করা, সাহিত্যের উদ্দেশ্য মনোরঞ্জন
নিচের কোনটি সঠিক?
(ক) i ও ii
(খ) i ও iii
(গ) ii ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

❖ উদ্দীপকের আলোকে ১০২ নং প্রশ্নের উত্তর দাও।
আসিফ সাহেব ছেলে-মেয়েকে নিয়ে বইমেলা থেকে ঘুরে ঘুরে বিভিন্ন গল্প, উপন্যাস, কবিতার বই কিনে দিলেন যেন তারা সাহিত্যে পাঠে অনুরাগী হয়ে মনে নতুন ভুবন তৈরি করতে পারে।

১০২। অনুচ্ছেদের ছেলেমেয়েদের হাতে বই তুলে দেওয়ার উদ্দেশ্যের সঙ্গে 'সাহিত্যে খেলা' প্রবন্ধের সামঞ্জস্যপূর্ণ ভাব হলো—
i. মনস্তুষ্টি
ii. মনোরঞ্জন
iii. আনন্দদান
নিচের কোনটি সঠিক?
(ক) i
(খ) ii
(গ) i ও iii
(ঘ) iii
উত্তর: (ঘ) iii

❖ উদ্দীপকের আলোকে ১০৩ ও ১০৪ নং প্রশ্নের উত্তর দাও।
সাম্যবাদে বিশ্বাসী গদ্য লেখক অসিত রায় ভাবলেন, ধর্মতত্ত্বকে এবার তার সাহিত্যের প্রকাশ মাধ্যম করবেন। আর তা করতে গিয়েই তার সাহিত্যে স্বধর্মচ্যুত হলো।

১০৩। নিচের কোন বাক্যের সাথে উদ্দীপকের মিল রয়েছে?
(ক) সাহিত্য ছেলের হাতের খেলনাও নয়
(খ) সাহিত্য গুরুর হাতের বেতও নয়
(গ) সাহিত্য খেলাচ্ছলে শিক্ষা দেয়
(ঘ) উদ্দেশ্য প্রণোদিত সাহিত্য সাহিত্য নয়
উত্তর: (ঘ) উদ্দেশ্য প্রণোদিত সাহিত্য সাহিত্য নয়

১০৪। উদ্দীপকের আলোকে 'সাহিত্যে খেলা' প্রবন্ধ থেকে এটা বোঝা যায় যে, সাহিত্যের মাধ্যমে—
i. কোনো খেলা করা উচিত নয়
ii. কোনো উদ্দেশ্য সাধনের চেষ্টা করা উচিত নয়
iii. কোনো আনন্দ দান করা উচিত নয়
নিচের কোনটি সঠিক?
(ক) i
(খ) ii
(গ) i ও ii
(ঘ) ii ও iii
উত্তর: (খ) ii

❖ উদ্দীপকের আলোকে ১০৫ ও ১০৬ নং প্রশ্নের উত্তর দাও।
হেডমাস্টার কামাল হোসেন 'ছাত্র-জীবনের দায়িত্ব ও কর্তব্য' শীর্ষক গ্রন্থ প্রণয়ন করেছেন। ছাত্ররা তাঁর উপদেশমূলক বইটি পড়ে না কিন্তু গল্পের বই পড়ে।

১০৫। 'ছাত্র-জীবনের দায়িত্ব ও কর্তব্য' শীর্ষক গ্রন্থটি 'সাহিত্যে খেলা' প্রবন্ধে উল্লিখিত কোন গ্রন্থের সঙ্গে সাদৃশ্যপূর্ণ?
i. যোগবাশিষ্ঠ রামায়ণ
ii. বাল্মীকির রামায়ণ
iii. ভগবৎ গীতা
নিচের কোনটি সঠিক?
(ক) i
(খ) ii
(গ) i ও ii
(ঘ) ii ও iii
উত্তর: (ক) i

১০৬। 'সাহিত্যে খেলা' প্রবন্ধের আলোকে ছাত্রদের গল্পের বই পড়ার কারণ, এগুলো—
(ক) শিক্ষামূলক
(খ) উদ্দেশ্যপূর্ণ
(গ) আনন্দদায়ক
(ঘ) উপদেশমূলক
উত্তর: (গ) আনন্দদায়ক

❖ উদ্দীপকের আলোকে ১০৭ ও ১০৮ নং প্রশ্নের উত্তর দাও।
রফিক দরিদ্র ঘরের সন্তান। সমাজ তাঁকে মূল্য দেয় না। সে কবি। তাঁর একটি কবিতা বিদেশি ভাষায় অনূদিত হলে প্রথম শ্রেণির কবিদের পাশাপাশি তাঁর নাম উচ্চারিত হয়। সমাজ আর তাঁকে এড়িয়ে যেতে পারে না।

১০৭। উদ্দীপকটি তোমার পাঠ্যবইয়ের কোন রচনাকে সমর্থন করে?
(ক) সাহিত্যে খেলা
(খ) অর্ধাঙ্গী
(গ) যৌবনের গান
(ঘ) একুশের গল্প
উত্তর: (ক) সাহিত্যে খেলা

১০৮। 'সাহিত্যে খেলা' প্রবন্ধের আলোকে উদ্দীপকের মূলভাবের সঙ্গে অধিক সাদৃশ্যপূর্ণ হলো—
i. সাহিত্য জগতে ধনী ও দরিদ্রের সমান অধিকার
ii. খেলার মাঠে সকলের সমান অধিকার
iii. সাহিত্য জগতে প্রবেশে দরিদ্রের অধিকার নেই
নিচের কোনটি সঠিক?
(ক) i
(খ) i ও ii
(গ) i ও iii
(ঘ) i, ii ও iii
উত্তর: (ক) i

❖ উদ্দীপকের আলোকে ১০৯ ও ১১০ নং প্রশ্নের উত্তর দাও।
শিক্ষক ক্লাসে পড়াতে এসে বলেন, সাহিত্যে ভাব ও আনন্দের ব্যাপার, শিক্ষা জ্ঞানের ব্যাপার। যিনি সাহিত্য থেকে নগদ লাভ চান, তার কাছে সাহিত্যের মূল্য নেই।

১০৯। "যিনি সাহিত্য থেকে নগদ লাভ চান, তার কাছে সাহিত্যের মূল্য নেই।" 'সাহিত্যে খেলা' প্রবন্ধে উক্তিটির সমর্থন মেলে—
i. তিনি শিক্ষা ও সাহিত্যকে একই ব্যাপার মনে করেন
ii. তার মতে শিক্ষা ও সাহিত্যে নগদ লাভ আছে
iii. তিনি গীতের অর্থ ও গীতার ধর্ম বোঝেন না

নিচের কোনটি সঠিক?
(ক) i
(খ) i ও ii
(গ) iii
(ঘ) ii ও iii
উত্তর: (গ) iii

১১০। 'সাহিত্যে খেলা' প্রবন্ধ অনুসারে নিচের কোনটি উদ্দীপককে সমর্থন করে?
(ক) সাহিত্য হচ্ছে আনন্দের ব্যাপার
(খ) সাহিত্য হচ্ছে জ্ঞানের ব্যাপার
(গ) সাহিত্য হচ্ছে শিক্ষার ব্যাপার
(ঘ) সাহিত্য হচ্ছে নগদ লাভের ব্যাপার
উত্তর: (ক) সাহিত্য হচ্ছে আনন্দের ব্যাপার

১১১। ভাস্কর রোদ্যঁর সমকক্ষ শিল্পীদের সাদৃশ্য কোথায়?
(ক) সকলের সৃষ্টিশিল্পের শিল্পগুণ এক
(খ) সকলেই ইচ্ছামতো শিল্পের খেলা খেলতে পারেন
(গ) সকলে শুধু শিল্পের জন্য বিখ্যাত
(ঘ) ভাবনা ও সৃষ্টি অনেক সময় বিপরীতধর্মী
উত্তর: (খ) সকলেই ইচ্ছামতো শিল্পের খেলা খেলতে পারেন

১১২। মর্ত্যবাসীদের পক্ষে কোথায় গমন করাটা বিশেষ নিন্দনীয় হয়েছে?
(ক) ভূতলে
(খ) রসাতলে
(গ) নিচে
(ঘ) পাতালে
উত্তর: (খ) রসাতলে

১১৩। 'সাহিত্যে খেলা' প্রবন্ধে 'রসাতলে গমন' বলতে কী বোঝানো হয়েছে?
(ক) রসের অতলে যাওয়া
(খ) নরকে যাওয়া
(গ) ধ্বংসপ্রাপ্ত হওয়া
(ঘ) অধঃপাতে যাওয়া
উত্তর: (ঘ) অধঃপাতে যাওয়া

১১৪। ‘লেখকরাও অবশ্য দশের কাছে হাততালির প্রত্যাশা রাখেন।'— এখানে 'হাততালি' অর্থ কী?
(ক) নিজেকে প্রকাশ করা
(খ) প্রেরণালাভ করা
(গ) স্বীকৃতিলাভ করা
(ঘ) নিজেকে বড় করা
উত্তর: (গ) স্বীকৃতিলাভ করা

১১৫। আনন্দ ও মনোরঞ্জন—
(ক) একই জিনিস
(খ) এককথা নয়
(গ) পরস্পর পরিপূরক
(ঘ) উদ্দেশ্য এক
উত্তর: (খ) এককথা নয়

১১৬। গীতিকবিতা হলো—
(ক) পল্লীমানুষের কবিতা
(খ) আত্মভাবপ্রধান কবিতা
(গ) সুরপ্রধান কবিতা
(ঘ) ছন্দপ্রধান কবিতা
উত্তর: (খ) আত্মভাবপ্রধান কবিতা

১১৭। ‘রঙ্গভূমি’ বলতে কী বোঝানো হয়েছে?
(ক) আমোদ-প্রমোদের জায়গা
(খ) বক্তৃতা দেওয়ার জায়গা
(গ) রঙ্গমঞ্চ
(ঘ) খেলার ময়দান
উত্তর: (ক) আমোদ-প্রমোদের জায়গা

১১৮। 'সাহিত্যে খেলা' প্রবন্ধটি কত সালে 'প্রবন্ধসংগ্রহ' বইয়ে সংকলিত হয়?
(ক) ১৯৫২ সালে
(খ) ১৯৫৩ সালে
(গ) ১৯৫৪ সালে
(ঘ) ১৯৫৫ সালে
উত্তর: (ক) ১৯৫২ সালে

১১৯। 'সাহিত্য অনুভূতিসাপেক্ষ তর্কসাপেক্ষ নয়'— এ 'অনুভুতি' কীরূপ?
(ক) প্রমাণের বিষয়
(খ) প্রমাণযোগ্য নয়
(গ) জ্ঞানের বিষয়
(ঘ) শিক্ষার বিষয়
উত্তর: (খ) প্রমাণযোগ্য নয়

১২০। ‘কাব্য সংবাদপত্র নয়’— উক্তিটির সঙ্গে সাহিত্যের উদ্দেশ্য সম্পর্কে কোন বিষয়টি সম্পর্কযুক্ত?
(ক) তথ্য নয়, তত্ত্বের
(খ) আনন্দের নয়, শিক্ষার
(গ) তথ্য নয়, আনন্দের
(ঘ) আনন্দের নয়, তত্ত্বের
উত্তর: (গ) তথ্য নয়, আনন্দের

১২১। ‘আমরা সাহিত্যে কাচকে হীরা এবং হীরাকে কাচ বলে নিত্য ভুল করি’— উক্তিটির অন্তর্নিহিত ভাব কোনটি?
(ক) সাহিত্যের অন্তর্নিহিত তাৎপর্য না বোঝা
(খ) সাহিত্যের উদ্দেশ্য সম্বন্ধে অবগত না হওয়া
(গ) সাহিত্যে ও শিক্ষার অবস্থানকে বিপরীতমুখী করা
(ঘ) সাহিত্যে যথেচ্ছাচার করা
উত্তর: (খ) সাহিত্যের উদ্দেশ্য সম্বন্ধে অবগত না হওয়া

১২২। স্কুলঘরে কাব্যের কোন দিকটির সাথে পরিচয় ঘটানো হয়?
(ক) রূপ
(খ) রস
(গ) ভাব
(ঘ) গুণ
উত্তর: (ঘ) গুণ

১২৩। বাল্মীকি প্রথমে কাদের জন্য 'রামায়ণ' রচনা করেন?
(ক) সাহিত্যিকদের জন্য
(খ) মুনি-ঋষিদের জন্য
(গ) ধার্মিকদের জন্য
(ঘ) পথভ্রষ্টদের জন্য
উত্তর: (খ) মুনি-ঋষিদের জন্য

১২৪। কাব্যের ঝুমঝুমি, বিজ্ঞানে চুষিকাঠি— এগুলোর সঙ্গে বর্তমান সাহিত্যের সাদৃশ্য কোথায়?

(খ) সাহিত্য রচনায় সহজ বিষয় অবলম্বন
(গ) পাঠকের সাথে লেখকের সহজ সম্পর্ক স্থাপন

iii. ইচ্ছামতো পাঠক সমাজ সৃষ্টি করা

১২৬। সাহিত্য যার ভার নেয় না—

iii. মনোরঞ্জনের

(ক) i ও ii

❖ উদ্দীপকের আলোকে ১২৭ ও ১২৮ নং প্রশ্নের উত্তর দাও।
অধ্যাপক কাজী রশিদ প্রায় বারো বছর ধরে অধ্যাপনা সুবাদে সুনামের সঙ্গে ছাত্রদের রবীন্দ্র ও নজরুল সাহিত্য পড়াচ্ছেন। ক্লাসে দায়িত্ব পালনে তিনি যথেষ্ট নিষ্ঠাবান। কিন্তু সাহিত্য পড়িয়ে তিনি কোনো আনন্দ পান না।

১২৭। কাজী রশিদের মানসিকতা বিশ্লেষণ করে 'সাহিত্যে খেলা' প্রবন্ধের আলোকে তাঁকে বলা যায়—
(ক) আত্মসচেতন
(খ) সাহিত্যপ্রেমিক
(গ) বিদ্যানুরাগী (ঘ) কর্তব্যপরায়ণ
উত্তর: (ঘ) कर्तव्यপরায়ণ

১২৮। 'সাহিত্যে খেলা' প্রবন্ধ অনুযায়ী কাজী রশিদ সম্পর্কে প্রযোজ্য—
i. তিনি কাব্যের রূপ দেখেছেন
ii. তিনি কাব্যের গুণ শুনেছেন
iii. তিনি কাব্যের বিশ্লেষণে দক্ষ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ১২৯ ও ১৩০ নং প্রশ্নের উত্তর দাও।
স্কুল-কলেজের শিক্ষা যে অনেকাংশে ব্যর্থ নয়, অনেক স্থলে মারাত্মক। কেননা, আমাদের স্কুল-কলেজ ছেলেদের স্বশিক্ষিত হওয়ার সে সুযোগ দেয় না। শুধু তাই নয়, স্বশিক্ষিত হওয়ার শক্তি পর্যন্ত নষ্ট করে।

১২৯। 'সাহিত্যে খেলা' প্রবন্ধের আলোকে উদ্দীপকে স্বশিক্ষিত হওয়ার সুযোগ না দেওয়ার জন্য দায়ী কোনটি?
(ক) শিক্ষাব্যবস্থা (খ) স্কুলমাস্টারেরা
(গ) শিক্ষাপ্রতিষ্ঠান (ঘ) ছাত্র-ছাত্রীরা
উত্তর: (ঘ) ছাত্র-ছাত্রীরা

১৩০। উদ্দীপকে 'সাহিত্যে খেলা' প্রবন্ধের যে বিষয়টি প্রকাশ পেয়েছে—
i. সাহিত্যের উদ্দেশ্যকে বধ করা
ii. সাহিত্যের উদ্দেশ্যকে ব্যাহত করা
iii. সাহিত্যের উদ্দেশ্যকে সফল করা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

১৩১। সাহিত্যের উদ্দেশ্য হলো—
i. আনন্দ দান করা
ii. শিক্ষা দান করা
iii. মানুষের মনকে জাগানো
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

❖ উদ্দীপকের আলোকে ১৩২ নং প্রশ্নের উত্তর দাও।
প্রচার শেষে জ্ঞানের কথার উদ্দেশ্য সফল। কিন্তু হৃদয়ভাবের কথা ও শেষ হয় না। তা কালজয়ী।

১৩২। 'সাহিত্যে খেলা' প্রবন্ধ অনুসারে নিচের কোনটি অনুচ্ছেদের মূল সঙ্গে অধিক সঙ্গতিপূর্ণ?
(ক) মনের শূন্যতা পূর্ণ করাই সাহিত্যের লক্ষ্য
(খ) কল্যাণ সাধন করা সাহিত্যের প্রধান লক্ষ্য
(গ) প্রশংসা অর্জনের জন্য সাহিত্যের সৃষ্টি
(ঘ) মনের সঙ্গে সম্পর্ক রচনা সাহিত্যের বৈশিষ্ট্য
উত্তর: (ঘ) মনের সঙ্গে সম্পর্ক রচনা সাহিত্যের বৈশিষ্ট্য
        `;

        // ====================== Main Logic ======================
        const STORAGE_KEY = document.title || "MCQ_Practice_Aporichita";

        let userAnswers = {};
        let wrongQuestionsOnly = false;
        let data = [];

        // ==================== Helper Functions ====================
        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) userAnswers = JSON.parse(saved);
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
        }

        function resetProgress() {
            if (confirm("সব প্রগ্রেস মুছে ফেলতে চান?")) {
                localStorage.removeItem(STORAGE_KEY);
                userAnswers = {};
                location.reload();
            }
        }

        function showStats() {
            const total = data.length;
            let attempted = 0, correct = 0;

            Object.keys(userAnswers).forEach(idx => {
                const index = parseInt(idx);
                if (index >= 0 && index < total) {
                    attempted++;
                    if (userAnswers[idx] === data[index].answer) correct++;
                }
            });

            const wrong = attempted - correct;
            const unanswered = total - attempted;
            return { total, correct, wrong, unanswered, attempted };
        }

        function updateStats() {
            const stats = showStats();
            const statsEl = document.getElementById('stats');
            if (statsEl) {
                statsEl.innerHTML = `
                <div>মোট প্রশ্ন: <b>${stats.total}</b></div>
                <div class="text-emerald-400">সঠিক: <b>${stats.correct}</b></div>
                <div class="text-rose-400">ভুল: <b>${stats.wrong}</b></div>
                <div class="text-amber-400">বাকি: <b>${stats.unanswered}</b></div>
            `;
            }
        }

        // ==================== Main Render Function ====================
        function renderQuiz() {
            loadProgress();
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data = parseData(rawText);

            // Stats Bar
            const statsDiv = document.createElement('div');
            statsDiv.id = 'stats';
            statsDiv.className = "bg-slate-800 p-5 rounded-2xl mb-6 flex flex-wrap justify-between items-center gap-4 text-sm font-medium shadow-inner";
            container.appendChild(statsDiv);

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex flex-wrap gap-3 mb-8";
            controls.innerHTML = `
            <button onclick="resetProgress()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                🔄 সব রিসেট করুন
            </button>
            <button onclick="toggleWrongOnly()" id="wrong-btn" class="bg-amber-600 hover:bg-amber-700 px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition">
                ❌ শুধু ভুল প্রশ্নগুলো আবার দাও
            </button>
        `;
            container.appendChild(controls);

            updateStats();

            // Filtered Questions
            const filteredData = wrongQuestionsOnly
                ? data.map((q, i) => ({ ...q, originalIndex: i }))
                    .filter((q, i) => userAnswers[i] && userAnswers[i] !== q.answer)
                : data.map((q, i) => ({ ...q, originalIndex: i }));

            filteredData.forEach((item) => {
                const originalIdx = item.originalIndex;
                const userChoice = userAnswers[originalIdx] || null;
                const isCorrect = userChoice === data[originalIdx].answer;

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol mb-8 transition-all duration-300";
                card.dataset.index = originalIdx;

                let statusHTML = '';
                if (userChoice) {
                    statusHTML = isCorrect
                        ? `<div class="inline-flex items-center gap-2 text-green-500 font-bold"><span>✓</span> সঠিক উত্তর</div>`
                        : `<div class="inline-flex items-center gap-2 text-red-500 font-bold"><span>✕</span> ভুল (সঠিক: ${data[originalIdx].answer})</div>`;
                }

                card.innerHTML = `
                <div class="flex justify-between mb-6">
                    <div class="text-lg font-semibold text-indigo-300">প্রশ্ন ${originalIdx + 1}</div>
                    <div class="text-xs bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full font-medium">
                        ${originalIdx + 1} / ${data.length}
                    </div>
                </div>

                <div class="text-gray-800 text-[1.1rem] leading-relaxed font-medium modecontrol mb-8">
                    ${item.question.replace(/\n/g, '<br>')}
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${originalIdx}">
                    ${Object.entries(item.options).map(([key, val]) => `
                        <div onclick="selectAnswer(${originalIdx}, '${key}', this)" 
                             class="option-card p-5 rounded-xl border-2 transition-all mcqoption cursor-pointer
                             ${userChoice === key ? (isCorrect ? 'correct border-green-500' : 'wrong border-red-500') : 'border-slate-600 hover:border-indigo-500'}">
                            <span class="font-bold text-indigo-400">(${key})</span> 
                            <span class="text-slate-200">${val}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="msg-${originalIdx}" class="mt-6 text-base font-medium">
                    ${statusHTML}
                </div>
            `;

                container.appendChild(card);
            });
        }

        // ==================== Answer Selection ====================
        window.selectAnswer = function (qIndex, selected, element) {
            const box = document.getElementById(`box-${qIndex}`);
            if (box) box.querySelectorAll('.option-card').forEach(opt => opt.style.pointerEvents = 'none');

            userAnswers[qIndex] = selected;
            saveProgress();

            const isCorrect = selected === data[qIndex].answer;

            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    box.querySelectorAll('.option-card').forEach(opt => {
                        if (opt.textContent.trim().startsWith(`(${data[qIndex].answer})`)) {
                            opt.classList.add('correct');
                        }
                    });
                }, 350);
            }

            updateStats();

            setTimeout(() => {
                renderQuiz();
            }, 900);
        };

        function toggleWrongOnly() {
            wrongQuestionsOnly = !wrongQuestionsOnly;
            const btn = document.getElementById('wrong-btn');

            if (wrongQuestionsOnly) {
                btn.innerHTML = `🔄 সব প্রশ্ন দেখাও`;
                btn.style.backgroundColor = '#4f46e5';
            } else {
                btn.innerHTML = `❌ শুধু ভুল প্রশ্নগুলো আবার দাও`;
                btn.style.backgroundColor = '';
            }

            const container = document.getElementById('quiz-container');
            container.style.transition = 'opacity 0.3s';
            container.style.opacity = '0.5';

            setTimeout(() => {
                renderQuiz();
                container.style.opacity = '1';
            }, 250);
        }

        // Parse Function (আগেরটা রাখুন)
        function parseData(text) {
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        // Initialize
        window.onload = function () {
            renderQuiz();
        };
    </script>
