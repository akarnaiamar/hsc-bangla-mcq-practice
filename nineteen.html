<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">কাজী নজরুল ইসলাম এর 'যৌবনের গান' গদ্য</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। নজরুল রচনার বৈশিষ্ট্য কী?
(ক) মানবতা (খ) দারিদ্রতা (গ) বিদ্রোহ (ঘ) প্রেম
উত্তর: (ক) মানবতা

২। হতাশের বুকে আশার সঞ্চার না করলে তাকে আমরা কী অভিধায় ভূষিত করব?
(ক) হতাশাগ্ৰস্ত (খ) বার্ধক্যগ্ৰস্ত (গ) বৃদ্ধ (ঘ) যৌবনহীন
উত্তর: (গ) বৃদ্ধ

৩। কবি কেন যৌবনশক্তির জয়গান করেছেন?
(ক) যৌবন বেগ থামে না বলে (খ) যৌবন শক্তি বিদ্রোহী বলে (গ) যৌবন শক্তি অফুরন্ত বলে (ঘ) যৌবন শক্তি পরিশ্রমী বলে
উত্তর: (গ) যৌবন শক্তি অফুরন্ত বলে

৪। বায়স চিত্তের স্বভাব কীরূপ?
(ক) অন্যদের সাহায্য করা (খ) অন্যদের তাড়া করা (গ) গানের প্রতি বিমুখতা (ঘ) অন্যদের গান অসহ্য লাগা
উত্তর: (খ) অন্যদের তাড়া করা

৫। নিচের কোনটিতে 'যৌবনের মাতৃরূপ' ফুটে উঠেছে?
(ক) হতাশার বুকে আশা জাগানোয় (খ) ক্লান্তিহীন উদ্যমে (গ) অপরিসীম ঔদার্যে (ঘ) অফুরন্ত প্রাণশক্তিতে
উত্তর: (ক) হতাশার বুকে আশা জাগানোয়

৬। 'যৌবনের মাতৃরূপ' আছে কার মধ্যে?
(ক) লাশ বহনকারী (খ) শ্মশানের অধিবাসী (গ) নবীন জগৎ সন্ধানকারী (ঘ) গানের পাখি
উত্তর: (ক) লাশ বহনকারী

৭। ‘ধর্ম আমাদের ইসলাম। কিন্তু প্রাণের ধর্ম আমাদের তারুণ্য।’ ‘যৌবন’ কথাটির তাৎপর্য কী?
(ক) যৌবন কোনো ধর্ম মানে না (খ) যৌবন সকল দেশ, ধর্ম ও কালের (গ) যৌবন দেশ-কাল ও ধর্ম মানে না (ঘ) যৌবন সকল দেশের
উত্তর: (গ) যৌবন দেশ-কাল ও ধর্ম মানে না

৮। তরুণ নামের জয়মুকুট শুধু তাহারই যাহার... অপরিমাস-
(ক) সাহস (খ) গতি (গ) শক্তি (ঘ) তেজ
উত্তর: (গ) শক্তি

৯। বাংলার সেন বংশের শেষ রাজা কে?
(ক) সামন্ত সেন (খ) লক্ষ্মণ সেন (গ) শম্ভুনাথ সেন (ঘ) বল্লাল সেন
উত্তর: (খ) লক্ষ্মণ সেন

১০। ১৯১২ সালে মাঞ্চু সাম্রাজ্যের পতনের পর নানকিং প্রজাতন্ত্রের রাষ্ট্রপতি নির্বাচিত হন-
(ক) কালাপাহাড় (খ) মুসোলিনি (গ) সানইয়াৎ (ঘ) লেনিন
উত্তর: (গ) সানইয়াৎ

১১। লেনিনের প্রকৃত নাম কী?
(ক) ভ্লাদিমির ইলিচ উলিয়ানফ (খ) জোসেফ স্ট্যালিন (গ) ভ্লাদিমির পুতিন (ঘ) ভ্লাদিমির স্টকইচ
উত্তর: (ক) ভ্লাদিমির ইলিচ উলিয়ানফ

১২। ‘যৌবনের গান’ প্রবন্ধে কোন গৌরীশৃঙ্গের কথা উল্লেখ করা হয়েছে?
(ক) হিমালয় (খ) কাঞ্চনজঙ্ঘা (গ) আন্দিজ (ঘ) তারাগড়
উত্তর: (খ) কাঞ্চনজঙ্ঘা

১৩। ‘যৌবনের গান’ অভিভাষণটি কবি কোথায় দিয়েছিলেন?
(ক) খুলনায় (খ) সিরাজগঞ্জে (গ) বগুড়াতে (ঘ) বর্ধমানে
উত্তর: (খ) সিরাজগঞ্জে

১৪। ‘যৌবনের গান’ প্রবন্ধের বিষয়বস্তুর সাথে মিল আছে প্রাবন্ধিকের-
(ক) বিদ্রোহী কবিতাঙ্গর (খ) সাম্যবাদের (গ) মানবপ্রেম (ঘ) সুর ও সংগীত
উত্তর: (গ) মানবপ্রেম

১৫। ‘যৌবনের গান’ প্রবন্ধে প্রাবন্ধিক দেখিয়েছেন-
i. যৌবনের বৈশিষ্ট্য ii. বার্ধক্যের বৈশিষ্ট্য iii. যৌবনের জয়গান
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১৬। ‘যৌবনের গান’ প্রবন্ধে লেখকের কোন বক্তব্যটি প্রকাশ পেয়েছে-
i. ইসলামী চেতনার আভাস ii. সাম্যবাদী কবিতার আভাস iii. তারুণ্যের জয়গান
নিচের কোনটি সঠিক?
(ক) ii ও iii (খ) i ও iii (গ) ii (ঘ) iii
উত্তর: (ঘ) iii

১৭। ‘কাক কোকিলকে তাড়িয়ে বেড়ায়।’ এখানে ‘কাক’ হলো-
i. যৌবনের প্রতীক ii. বার্ধক্যের প্রতীক iii. তারুণ্যের প্রতীক
নিচের কোনটি সঠিক?
(ক) i (খ) ii (গ) iii (ঘ) i ও iii
উত্তর: (খ) ii

❖ উদ্দীপকের আলোকে ১৮ ও ১৯ নং প্রশ্নের উত্তর দাও:
দেশের বড় শত্রু দুর্নীতি, সব ধরনের অন্যায় কাজ দুর্নীতির আওতাভুক্ত। সমাজ থেকে দুর্নীতি পুরোপুরি নির্মূল করতে হলে সর্বাগ্রে এগিয়ে আসতে হবে তরুণদের। বর্তমান দুঃসাহসী তরুণরাই পারে এদেশকে দুর্নীতিমুক্ত করতে।

১৮। উদ্দীপকে বর্ণিত তরুণদের ভূমিকা ‘যৌবনের গান’ প্রবন্ধের কীসের সাথে তুলনীয়?
(ক) যৌবনের মাতৃরূপ (খ) যৌবনের প্রকৃত রূপ (গ) যৌবনের বিকৃত রূপ (ঘ) যৌবনের আংশিক রূপ
উত্তর: (খ) যৌবনের প্রকৃত রূপ

১৯। উদ্দীপকের দুঃসাহসী তরুণদের শক্তি সম্পর্কে যে আশাবাদ ব্যক্ত হয়েছে ‘যৌবনের গান’ প্রবন্ধের আলোকে তাকে বলা যায়—
i. যৌবনশক্তি ii. বার্ধক্য-জরা iii. অফুরন্ত প্রাণচঞ্চলতা
নিচের কোনটি সঠিক?
(ক) i (খ) i ও ii (গ) i ও iii (ঘ) ii ও iii
উত্তর: (গ) i ও iii

❖ উদ্দীপকের আলোকে ২০ ও ২১ নং প্রশ্নের উত্তর দাও:
হাসান ও মাসুদ দুই বন্ধু। কলেজে একই ক্লাসে পড়ে। হাসান মাঝে মাঝে বলে, আমার দ্বারা কিছুই হবে না। জীবনটাই বৃথা। মাসুদ বলে, তুমি যা-ই বলো, আমাকে একটা কিছু হতেই হবে।

২০। ‘যৌবনের গান’ প্রবন্ধের আলোকে উদ্দীপকে হাসানের মধ্যে বার্ধক্যের যে বৈশিষ্ট্য দেখা যায়—
i. প্রাণশক্তির অভাব ii. হতাশ ও আস্থাহীনতা iii. সংস্কারের বেড়াজাল
নিচের কোনটি সঠিক?
(ক) i (খ) i ও ii (গ) i ও iii (ঘ) ii ও iii
উত্তর: (ঘ) ii ও iii

২১। কাজী নজরুল ইসলাম কোন গ্রামে জন্মগ্রহণ করেন?
(ক) চুরুলিয়া (খ) পারুলিয়া (গ) চুরুলিয়া (ঘ) আসানসোল
(নোট: এখানে অপশন ক ও গ উভয়ই চুরুলিয়া দেওয়া আছে) 
উত্তর: (গ) চুরুলিয়া

২২। ‘যুগ-বাণী’ কাজী নজরুল ইসলামের কোন ধরনের গ্রন্থ?
(ক) নাট্যগ্রন্থ (খ) গল্পগ্রন্থ (গ) প্রবন্ধগ্রন্থ (ঘ) কাব্যগ্রন্থ
উত্তর: (গ) প্রবন্ধগ্রন্থ

২৩। পুরাতনকে, মিথ্যাকে আঁকড়িয়া ধরে কে?
(ক) তারুণ্য (খ) বার্ধক্য (গ) প্রবীণ (ঘ) নবীন
উত্তর: (খ) বার্ধক্য

২৪। গানের পাখিকে তাড়া করে কে?
(ক) টিয়া (খ) বায়স (গ) ময়না (ঘ) চিল
উত্তর: (খ) বায়স (কাক)

২৫। ‘দ্বিধা’ শব্দটির অর্থ কোনটি?
(ক) সংকোচ (খ) ধৈর্য (গ) অলস (ঘ) বাধা
উত্তর: (ক) সংকোচ

২৬। ‘চক্ষু’ শব্দটি ‘যৌবনের গান’ প্রবন্ধে কী অর্থে ব্যবহৃত হয়েছে?
(ক) জিহ্বা (খ) ঠোঁট (গ) নাক (ঘ) কান
উত্তর: (খ) ঠোঁট

২৭। ‘যৌবনের গান’ প্রবন্ধটি মূলত কী?
(ক) ভাষণ (খ) প্রবন্ধ (গ) অভিভাষণ (ঘ) গল্প
উত্তর: (গ) অভিভাষণ

২৮। কোন সালে কবি নজরুল ইসলামকে বাংলাদেশের নাগরিকত্ব দেওয়া হয়?
(ক) ১৯৭২ (খ) ১৯৭১ (গ) ১৯৭৩ (ঘ) ১৯৭৬
উত্তর: (ঘ) ১৯৭৬ (ছবিতে ১৯৭৬ অপশনটি অস্পষ্ট থাকলেও সঠিক উত্তর ১৯৭৬)

২৯। ‘যৌবনের গান’-এ কথিত 'নীল মন্থর মণির' প্রতিচ্ছবি—
(ক) কাঞ্চনজঙ্ঘা (খ) বরফের নিচে (গ) সাগরতল (ঘ) গভীর জঙ্গল
উত্তর: (গ) সাগরতল

৩০। কবি ‘যৌবনের মাতৃরূপের’ যেসব দৃষ্টান্ত দিয়েছেন, তার মধ্যে কোনটির উল্লেখ নেই?
(ক) আহতকে হাসপাতালে নিয়ে যাওয়া (খ) হতাশের বুকে আশা জাগানো 
(গ) দুর্ভিক্ষগ্রস্তদের জন্য ভিক্ষা করা (ঘ) রাত জেগে রোগীর সেবা করা
উত্তর: (ক) আহতকে হাসপাতালে নিয়ে যাওয়া

৩১। ‘যৌবনের গান’-এ যাঁর উল্লেখ নেই—
(ক) মার্কস (খ) লক্ষ্মণ সেন (গ) লেনিন (ঘ) বখতিয়ার খিলজি
উত্তর: (ক) মার্কস

৩২। ‘কালাপাহাড়’ কে
(ক) হিন্দু যোদ্ধা (খ) মুসলিম যোদ্ধা (গ) দৈত্য (ঘ) পর্বত
উত্তর: (খ) মুসলিম যোদ্ধা

৩৩। কাজী নজরুল ইসলামের প্রবন্ধে কোনটি যৌবনের মাতৃরূপ?
(ক) বৈমানিক হয়ে আকাশে ওরা (খ) নব পৃথিবীর সন্ধান প্রয়াস (গ) বন্যাপিড়ীতদের মুখে অন্ন পরিবেশন (ঘ) সকলের প্রতি স্নেহ-বাৎসল্য
উত্তর: (গ) বন্যাপিড়ীতদের মুখে অন্ন পরিবেশন

৩৪। “তাহার হাসিতে গান, তাহার কান্নায় গান।”—‘যৌবনের গান’র বাক্যটিতে তাহার বলতে প্রকৃতপক্ষে কাকে বোঝানো হয়েছে?
(ক) কবিকে (খ) যুবককে (গ) গায়ককে (ঘ) পাখিকে
উত্তর: (ক) কবিকে

৩৫। “বিদ্রোহী” কবিতাটি কবি নজরুলের কোন কাব্যগ্রন্থের অন্তর্গত?
(ক) অগ্নিবীণা (খ) বিষের বাঁশি (গ) দোলনচাঁপা (ঘ) বাঁধনহারা
উত্তর: (ক) অগ্নিবীণা

৩৬। ‘মার্তণ্ডপ্রায়’ অর্থ কী?
(ক) চাঁদের আলো (খ) তারা (গ) সূর্যের মতো (ঘ) মায়ের মতো
উত্তর: (গ) সূর্যের মতো

৩৭। “আমি — বনের পাখির মতো স্বভাব আমার গান করার”—শূন্যস্থানে হবে-
(ক) কবি (খ) গায়ক (গ) শিল্পী (ঘ) লেখক
উত্তর: (ক) কবি

৩৮। কোন কবিতা রচনার জন্য নজরুল ইসলামের কারাদণ্ড হয়েছিল?
(ক) বিদ্রোহী (খ) আনন্দময়ীর আগমনে (গ) কাণ্ডারি হুঁশিয়ার (ঘ) অগ্রপথিক
উত্তর: (খ) আনন্দময়ীর আগমনে

৩৯। নজরুলের উপন্যাস কোনটি?
(ক) অগ্নিবীণা (খ) বিষের বাঁশি (গ) মৃত্যুক্ষুধা (ঘ) চক্রবাক (ঙ) প্রলয়শিখা
উত্তর: (গ) মৃত্যুক্ষুধা

৪০। ‘যৌবনের গান’-এ কোন নদীদ্বয়ের কথা বলা হয়েছে?
(ক) পদ্মা-মেঘনা (খ) পদ্মা-ভাগীরথী (গ) পদ্মা-সুরমা (ঘ) পদ্মা-যমুনা
উত্তর: (খ) পদ্মা-ভাগীরথী

৪১। ‘যৌবনের গান’ প্রবন্ধে লেখক কী হয়ে তরুণদের মহাদান গ্রহণ করতে চান?
(ক) মধ্যমণি (খ) দলপতি (গ) সহযাত্রী (ঘ) পূজারী
উত্তর: (গ) সহযাত্রী

৪২। ‘আমি কবি- বনের পাখির মতো স্বভাব আমার গান করার’- উক্তিটি বোঝানো হয়েছে—
(ক) যৌবনের উচ্ছলতা (খ) মানবকল্যাণে ব্রতী হওয়া 
(গ) তারুণ্যের প্রতি অকুণ্ঠ পক্ষপাত (ঘ) গানের পাখির সাথে কবিতার তুলনা
উত্তর: (ক) যৌবনের উচ্ছলতা

❖ উদ্দীপকের আলোকে ৪৩ ও ৪৪ নং প্রশ্নের উত্তর দাও:
পূর্বকালে ইউরোপে আইন দ্বারা কুষ্ঠরোগীদের নির্বাসন দেওয়া হতো। মানবপ্রেমিক ড্যানিয়েল যৌবনের ভোগ-লালসা ত্যাগ করে মালাকো দ্বীপে কুষ্ঠরোগীদের সেবায় ব্রতী হলেন। তিনি ঈশ্বরকে বললেন, প্রভু! আজ আমার প্রেম সকল পূর্ণতায় সফল ও সার্থক হলো।

৪৩। অনুচ্ছেদে ‘যৌবনের গান’ প্রবন্ধে বর্ণিত তারুণ্যের কোন বৈশিষ্ট্যের সর্বাধিক প্রতিফলন ঘটেছে?
(ক) উদাম (খ) ঔদার্য (গ) মাতৃরূপ (ঘ) সাধনা
উত্তর: (গ) মাতৃরূপ

৪৪। নিচের কোন বাক্যে অনুচ্ছেদের ভাব সবচেয়ে ভালোভাবে ধরা পড়েছে?
(ক) ইহারা থাকে শক্তির পিছনে রুধির ধারার মতো গোপন (খ) রং ছড়াইতে ছড়াইতে তাহাদের অন্ত 
(গ) যখন দুর্বলের পাশে বল হইয়া দাঁড়ায় (ঘ) তাহার হাসিতে গান, তাহার কান্নায় গান
উত্তর: (গ) যখন দুর্বলের পাশে বল হইয়া দাঁড়ায়

❖ উদ্দীপকের আলোকে ৪৫ ও ৪৬ নং প্রশ্নের উত্তর দাও:
‘বার্ধক্য কিছু কাড়তে পারে না বলে কিছু ছাড়তে পারে না— দুটি কালো চোখের জন্যও নয়, বিশ কোটি কালো লোকের জন্যও নয়’।

৪৫। এখানে ‘যৌবনের গান’ প্রবন্ধে বৃদ্ধের যে বৈশিষ্ট্যের পরিচয় পাওয়া যায়, তা হলো—
i. পশ্চাৎপদতা ii. রক্ষণশীলতা iii. স্থবিরতা
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii (গ) i ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৬। অনুচ্ছেদে বর্ণিত বার্ধক্যের বিপরীত ভাষা কোনটি?
(ক) শক্তির পিছনে রুধির ধারার মতো গোপন (খ) সে রাত্রির পর রাত্রি জাগিয়া পরিচর্যা করে 
(গ) তরুণ অরুণের মতোই যে তারুণ্য তিমির বিদারী (ঘ) অনন্ত আকাশের সীমা খুঁজিতে গিয়া প্রাণ হারায়
উত্তর: (ঘ) অনন্ত আকাশের সীমা খুঁজিতে গিয়া প্রাণ হারায়

৪৭। কাজী নজরুল ইসলাম কাদের পক্ষে ছিলেন?
(ক) কর্মীদের (খ) ধ্যানীদের (গ) বৃদ্ধদের (ঘ) প্রাচীনপন্থিদের
উত্তর: (খ) ধ্যানীদের

৪৮। লেখকের মতো যারা মহৎ তারা কোথায় থাকেন?
(ক) শক্তির সামনে (খ) শক্তির পিছনে (গ) সবার সামনে (ঘ) মনের মধ্যে
উত্তর: (খ) শক্তির পিছনে

৪৯। যারা মানবজাতির কল্যাণে নিয়োজিত তাদেরকে লেখক কোনটির সাথে তুলনা করেছেন?
(ক) গাছের সাথে (খ) রুধির ধারার সাথে (গ) ফুলের সাথে (ঘ) পাখির সাথে
উত্তর: (খ) রুধির ধারার সাথে

৫০। কবি গান গেয়ে যান কেন?
(ক) গান গাইতে পছন্দ করেন বলে (খ) কবির স্বভাব গান গাওয়া 
(গ) গানই কবির একমাত্র ভরসা (ঘ) কবির গান সকলে পছন্দ করেন
উত্তর: (খ) কবির স্বভাব গান গাওয়া

৫১। কবি নিজের ভূমিকাকে গানের পাখির সঙ্গে সাদৃশ্যমণ্ডিত করে লিখেছেন কেন?
(ক) সহজাত স্বভাব-বৈশিষ্ট্যের কারণে (খ) গানের পাখি সুমধুর সুরে গান গায় বলে 
(গ) গান করাই তাঁর স্বভাব বলে (ঘ) গানের পাখি স্বেচ্ছাবিহারী বলে
উত্তর: (ক) সহজাত স্বভাব-বৈশিষ্ট্যের কারণে

৫২। ‘গানের পাখি’ বলতে কোন পাখিতে বোঝানো হয়েছে?
(ক) কাককে (খ) দোয়েলকে (গ) কোকিলকে (ঘ) কবুতরকে
উত্তর: (গ) কোকিলকে

৫৩। ‘মোহনিদ্রা’ শব্দটি কী অর্থে ব্যবহৃত হয়েছে?
(ক) চেতনা (খ) জড়তা (গ) অজ্ঞাত (ঘ) ভাবাবিষ্ট
উত্তর: (খ) জড়তা

৫৪। কবি যৌবনের গান গাইতে পছন্দ করেন কেন?
(ক) যৌবনের সীমা পরিক্রমণ এখনও শেষ হয়নি বলে (খ) কবি যৌবন ধরে রাখতে চান বলে
(গ) যৌবন শ্রেষ্ঠ সম্পদ বলে (ঘ) যৌবন হারিয়ে যায় না বলে
উত্তর: (গ) যৌবন শ্রেষ্ঠ সম্পদ বলে

৫৫। তারুণ্যের ভরা-ভাদরে লেখকের গান কী এনে দেয়?
(ক) ভাটা (খ) জোয়ার (গ) ঢেউ (ঘ) ঝড়
উত্তর: (খ) জোয়ার

৫৬। ‘যৌবনের গান’ প্রবন্ধে লেখক নিজেকে কীসের সাথে তুলনা করেছেন?
(ক) চাঁদ (খ) সূর্য (গ) নক্ষত্র (ঘ) আলো
উত্তর: (ক) চাঁদ

৫৭। “আমি বক্তাও নই, আমি কর্মজার দলে।”— এ উক্তির তাৎপর্য কোনটি?
(ক) কাজ নয়, কথায় বিশ্বাসী (খ) কথায় নয়, কাজে বিশ্বাসী (গ) কম কথার গুরুত্ব বেশি (ঘ) প্রাবন্ধিক কম কথায় বিশ্বাসী
উত্তর: (খ) কথায় নয়, কাজে বিশ্বাসী

৫৮। লেখক কবিদের বাণীকে কীসের সাথে তুলনা করেছেন?
(ক) বৃষ্টিধারা (খ) নদীর স্রোত (গ) ঝরনা ধারা (ঘ) রুধির ধারা
উত্তর: (গ) ঝরনা ধারা

৫৯। লেখক কাঁদের বহু পশ্চাতে?
(ক) কবিদের (খ) বক্তাদের (গ) গায়কদের (ঘ) নায়কদের
উত্তর: (খ) বক্তাদের

৬০। লেখক কাকে সশ্রদ্ধ নমস্কার নিবেদন করেন?
(ক) কবিদের (খ) তারুণ্যকে (গ) গায়কদের (ঘ) বক্তাদের
উত্তর: (খ) তারুণ্যকে

৬১। ‘যৌবনের গান’ প্রবন্ধে আলোর দেবতা কে?
(ক) তারুণ্য (খ) বার্ধক্য (গ) প্রবীণ (ঘ) নেতা
উত্তর: (ক) তারুণ্য

৬২। তারুণ্যকে লেখক কীসের সাথে তুলনা করেছেন?
(ক) নতুন সূর্যের সাথে (খ) নতুন চাঁদের সাথে (গ) নতুন দিনের সাথে (ঘ) নক্ষত্রের সাথে
উত্তর: (ক) নতুন সূর্যের সাথে

৬৩। যারা লেখককে মালার মধ্যমণি করে রাখতে চান লেখক তাদের কী হয়ে থাকতে চান?
(ক) দলপতি (খ) নেতা (গ) দলভুক্ত (ঘ) বন্ধু
উত্তর: (গ) দলভুক্ত

৬৪। তরুণরা কীভাবে বিকশিত হয়?
(ক) বিচিত্রভাবে (খ) আন্দোলন করে (গ) এক ধ্যানের মৃণাল ধরে (ঘ) নিজে নিজেই
উত্তর: (গ) এক ধ্যানের মৃণাল ধরে

৬৫। বৃদ্ধরা মিথ্যাকে, মৃত্যুকে আঁকড়ে ধরে কেন?
(ক) উদ্যমী বলে (খ) সাহসী বলে (গ) প্রাণচাঞ্চল্য নেই বলে (ঘ) অলস বলে
উত্তর: (গ) প্রাণচাঞ্চল্য নেই বলে

৬৬। লেখকের মতে বার্ধক্যের বিষয়টি নির্ভর করে কোনটির ওপর?
(ক) শারীরিক গঠন (খ) বয়সের ওপর (গ) মানসিকতায় (ঘ) চারিত্রিক গঠন
উত্তর: (গ) মানসিকতায়

৬৭। কারা বৃদ্ধ?
(ক) দুর্বল (খ) রক্ষণশীল (গ) সমালোচক (ঘ) সমাজপতি
উত্তর: (খ) রক্ষণশীল

৬৮। লেখকের মতে বার্ধক্য তা-ই, যা—
(ক) যা পুরাতনকে আঁকড়ে পড়ে থাকে (খ) যা মিথ্যাকে আঁকড়ে পড়ে থাকে 
(গ) যা মৃত্যুকে আঁকড়ে পড়ে থাকে (ঘ) উপরের সবগুলো
উত্তর: (ঘ) উপরের সবগুলো

৬৯। লেখক বহু বৃদ্ধদের বার্ধক্যের জীর্ণাবরণের তলে কীসের মতো প্রদীপ্ত যৌবন দেখেছেন?
(ক) সিংহের মতো (খ) আলোকিত চন্দ্রের মতো (গ) মেঘলুপ্ত সূর্যের মতো (ঘ) নক্ষত্রের মতো
উত্তর: (গ) মেঘলুপ্ত সূর্যের মতো

৭০। তরুণ নামের জয়মুকুট কার প্রাপ্য?
(ক) যার শক্তি অপরিমাপ (খ) যার গতি খঞ্জর ন্যায় (গ) যার উৎসাহ ক্লান্তিহীন (ঘ) উপরের সবগুলো
উত্তর: (ঘ) উপরের সবগুলো

৭১। “বহু যুবককে দেখিয়াছি যাহাদের যৌবনের উর্দির নিচে বার্ধক্যের কঙ্কাল মূর্তি।”— লেখকের এ বক্তব্যের সঙ্গে সাদৃশ্যপূর্ণ কোনটি?
(ক) পশ্চাৎগামী (খ) অগ্রসরতা (গ) আশাবাদ (ঘ) বিপথগামী
উত্তর: (ক) পশ্চাৎগামী

৭২। ‘অভিসম্পাত’ শব্দটি দ্বারা কী বোঝানো হয়েছে?
(ক) অভিজাত (খ) অভিবাদন (গ) অভিশাপ (ঘ) আশীর্বাদ
উত্তর: (গ) অভিশাপ

৭৩। বার্ধক্য বিচারের মানদণ্ড কোনটি?
(ক) বয়স (খ) প্রাণধর্ম (গ) শিক্ষা (ঘ) স্বাস্থ্য
উত্তর: (খ) প্রাণধর্ম

৭৪। ‘নাভিশ্বাস’ শব্দটি দ্বারা কোনটি বোঝানো হয়েছে?
(ক) নিঃশ্বাসের কষ্ট (খ) মৃতবৎ (গ) মরণাপন্ন অবস্থা (ঘ) শোচনীয় অবস্থা
উত্তর: (গ) মরণাপন্ন অবস্থা

৭৫। বার্ধক্যকে বয়সের ফ্রেমে বাঁধা যায় না কেন?
(ক) বার্ধক্য বয়সের মধ্যে লুকায়িত থাকে না (খ) বয়স হইলেই মানুষ বৃদ্ধ হয়ে যায় বলে (গ) যৌবনের মধ্যেও বার্ধক্য লুকিয়ে থাকে বলে (ঘ) বার্ধক্য সকলের জীবনে আসে বলে
উত্তর: (ক) বার্ধক্য বয়সের মধ্যে লুকায়িত থাকে না

৭৬। তারুণ্যশক্তিকে কবি বেদুইনদের সাথে তুলনা করেছেন, কারণ তরুণেরা—
(ক) আলোর পূজারি (খ) তিমিরবিদারি (গ) সংগ্ৰামী (ঘ) গতিময়
উত্তর: (গ) সংগ্ৰামী

৭৭। যৌবনের ধর্ম কী?
(ক) রক্ষণশীলতা (খ) কুসংস্কারাচ্ছন্নতা (গ) ন্যায় ও কল্যাণ প্রতিষ্ঠা (ঘ) বার্ধক্যকে তাড়া করা
উত্তর: (গ) ন্যায় ও কল্যাণ প্রতিষ্ঠা

৭৮। কবি তারুণ্য কোথায় দেখেছেন?
(ক) আরব বেদুইনদের মাঝে (খ) আফ্রিকানদের মাঝে (গ) এশিয়ানদের মাঝে (ঘ) আরবীয়দের মাঝে
উত্তর: (ক) আরব বেদুইনদের মাঝে

৭৯। ‘যৌবনের গান’ প্রবন্ধে কাদের নয়নমণি নিভে যায়?
(ক) যারা সৈনিকরূপে যুদ্ধ করে (খ) যারা বৈমানিকরূপে আকাশে ওড়ে (গ) যারা অতল সমুদ্রে যায় (ঘ) যারা নতুন নতুন গ্রহ-নক্ষত্র সন্ধান করে
উত্তর: (ঘ) যারা নতুন নতুন গ্রহ-নক্ষত্র সন্ধান করে

৮০। যৌবনের মাতৃরূপ বলতে যা বোঝানো হয়েছে—
(ক) যৌবনের প্রাণচঞ্চলতাকে (খ) যৌবনের গতিময়তাকে (গ) যৌবনের প্রাণশক্তিকে (ঘ) যৌবনের সেবাপরায়ণতাকে
উত্তর: (ঘ) যৌবনের সেবাপরায়ণতাকে

৮১। “তারুণ্যের দেশ নাই, জাতি নাই, ধর্ম নাই”— এ উক্তির মর্মকথা কী?
(ক) তরুণরা সংকীর্ণমনা (খ) তরুণরা ধর্মে বিশ্বাস করে না (গ) তরুণরা সংকীর্ণ গণ্ডিতে আবদ্ধ নয় (ঘ) তরুণরা একা চলতে পছন্দ করে
উত্তর: (গ) তরুণরা সংকীর্ণ গণ্ডিতে আবদ্ধ নয়

৮২। ‘যৌবনের গান’ প্রবন্ধের লেখকের মতে আমরা কার মুরিদ?
(ক) পিরের (খ) কবিদের (গ) যৌবনের (ঘ) সাহসীদের
উত্তর: (গ) যৌবনের

৮৩। যাদের যৌবন জাতি-ধর্ম-কালকে অতিক্রম করতে পেরেছে, তাঁরা—
(ক) মহামানব (খ) মহাত্মা (গ) মহাবীর (ঘ) উপরের সবগুলো
উত্তর: (ঘ) উপরের সবগুলো

৮৪। ওই ‘জীর্ণ অট্টালিকা’ বলতে লেখক কী বুঝিয়েছেন?
(ক) শহরের অচল দালান (খ) জীর্ণ সংস্কৃতি (গ) বার্ধক্য (ঘ) ধর্ম-অট্টালিকা
উত্তর: (ঘ) ধর্ম-অট্টালিকা

৮৫। লেখকের মতে, খোদ কার মোনাজাত কবুল করবেন না?
(ক) ভীতু বৃদ্ধদের (খ) পাপীদের (গ) যে নেয়ামত থেকে নিজেকে বঞ্চিত রাখে (ঘ) খোদার আদেশ যে অমান্য করে
উত্তর: (গ) যে নেয়ামত থেকে নিজেকে বঞ্চিত রাখে

৮৬। ‘তিমিরকুন্তলা’ শব্দটি ‘যৌবনের গান’ প্রবন্ধে কী অর্থে ব্যবহৃত হয়েছে?
(ক) সূর্য (খ) রাত্রি (গ) দিন (ঘ) অন্ধকার
উত্তর: (খ) রাত্রি

৮৭। কালাপাহাড় ভয়ংকর ও প্রলয়ংকর ধ্বংসের প্রতীক হয়ে আছেন কেন?
(ক) আক্রমণাত্মক ভূমিকার জন্য (খ) মারমুখী ভূমিকার জন্য (গ) বীভৎস চেহারার জন্য (ঘ) ভয়ংকর মূর্তির জন্য
উত্তর: (ক) আক্রমণাত্মক ভূমিকার জন্য

৮৮। ‘আতাতুর্ক’ শব্দটি দিয়ে কী বোঝানো হয়েছে?
(ক) তুরস্কের প্রেসিডেন্ট (খ) তুরস্কের জনক (গ) তুরস্কের পালনকর্তা (ঘ) তুরস্কের প্রধানমন্ত্রী
উত্তর: (খ) তুরস্কের জনক

৮৯। সিনর বেনিতো মুসোলিনি কোন দেশের অধিবাসী ছিলেন?
(ক) রাশিয়া (খ) ইংল্যান্ড (গ) ফ্রান্স (ঘ) ইতালি
উত্তর: (ঘ) ইতালি

৯০। আততায়ীর হাতে নিহত হন কে?
(ক) মুসোলিনি (খ) কামাল পাশা (গ) সান-ইয়াৎ-সেন (ঘ) লেনিন
উত্তর: (ক) মুসোলিনি

৯১। জারের রাজতন্ত্রের পতন ঘটে কেন?
(ক) রুশ বিপ্লবের সাফল্যের কারণে (খ) লেনিনের নেতৃত্বের কারণে (গ) যুদ্ধের মাধ্যমে (ঘ) অর্থনৈতিক মন্দার কারণে
উত্তর: (ক) রুশ বিপ্লবের সাফল্যের কারণে

৯২। ‘লেনিন’ ছদ্মনামটি কোন বিপ্লবের সাথে জড়িত?
(ক) ফরাসি (খ) শিল্প (গ) চীন (ঘ) রুশ
উত্তর: (ঘ) রুশ (১৯১৭)

৯৩। ‘লেনিন’ সমাজতান্ত্রিক রাষ্ট্রের রূপকার হিসেবে বিশ্ববিখ্যাত হয়ে আছেন কীভাবে?
(ক) সমাজতান্ত্রিক অর্থনীতির মূলভিত্তি রচনার মাধ্যমে (খ) যুদ্ধের মাধ্যমে 
(গ) বিপ্লবের মাধ্যমে (ঘ) শান্তি-বিস্তারের মাধ্যমে
উত্তর: (ক) সমাজতান্ত্রিক অর্থনীতির মূলভিত্তি রচনার মাধ্যমে

৯৪। ‘মুরিদ’ শব্দটি ‘যৌবনের গান’ প্রবন্ধে কী অর্থে ব্যবহৃত হয়েছে?
(ক) শিষ্য (খ) গুরু (গ) শিক্ষক (ঘ) শিক্ষার্থী
উত্তর: (ক) শিষ্য

৯৫। ‘নেয়ামত’ শব্দটি ‘যৌবনের গান’ প্রবন্ধে কী অর্থে ব্যবহৃত হয়েছে?
(ক) খাদ্যসামগ্রী অর্থে (খ) ধন-সম্পদ অর্থে (গ) পানীয় অর্থে (ঘ) সাহায্য অর্থে
উত্তর: (খ) ধন-সম্পদ অর্থে

৯৬। কাজী নজরুল ইসলাম যৌবনের প্রশস্তি গেয়েছেন কেন?
(ক) যৌবন গতিশীল ও প্রত্যাশাময় বলে (খ) যৌবনে শক্তি থাকে বলে 
(গ) যৌবন জড়তা নিয়ে থাকে বলে (ঘ) যৌবন কখনো বার্ধক্য হয় না বলে
উত্তর: (ক) যৌবন গতিশীল ও প্রত্যাশাময় বলে

৯৭। সাধারণত ‘যৌবন’ বলতে আমরা কী বুঝি?
(ক) জীবনকালের নির্দিষ্ট সময়কে (খ) প্রাণচাঞ্চল্যকে (গ) উদ্যমকে (ঘ) সাহসিকতাকে
উত্তর: (ক) জীবনকালের নির্দিষ্ট সময়কে

৯৮। তরুণ নামের জয়মুকুট শুধু তাহারই—
i. অফুরন্ত যাহার প্রাণ ii. বিরাট যাহার ঔদার্য iii. ক্লান্তিহীন যাহার উৎসাহ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) ii ও iii (গ) i, ii ও iii (ঘ) i ও iii
উত্তর: (গ) i, ii ও iii

৯৯। ধ্যানীরা মানবজাতির কল্যাণ করেন—
i. সেবা দিয়ে ii. কর্ম দিয়ে iii. শক্তি দিয়ে
নিচের কোনটি সঠিক?
(ক) ii ও iii (খ) i ও iii (গ) i ও ii (ঘ) ii
উত্তর: (গ) i ও ii

১০০। বার্ধক্য বলতে প্রাবন্ধিক বুঝিয়েছেন—
i. পুরাতনকে ii. মিথ্যাকে iii. মৃত্যুকে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১০১। ‘যৌবনের গান’ প্রবন্ধে প্রাবন্ধিক যৌবনের প্রশস্তি গেয়েছেন। তার কারণ হলো—
i. যৌবন অফুরন্ত প্রাণশক্তির আধার
ii. বিশ্বমানবতার সেবায় তার অবাধ পথচলা
iii. তার গতিময় উদ্দীপনা প্রত্যাশাময়
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii (গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

১০২। ‘যৌবনের গান’ প্রবন্ধ অনুসারে বনের পাখির মতো স্বভাব যার, তিনি—
i. কারও ভালো লাগলেও গান করেন

                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
</body>

</html>
