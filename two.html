<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Noto+Sans+Bengali:wght@100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Noto Sans Bengali", sans-serif;
        }

        body {
            background-color: #0a0f1c;
            color: #e2e8f0;
        }

        #quiz-container .bg-white {
            background-color: #1a2338 !important;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.3s ease;
        }

        #quiz-container .bg-white:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4);
            transform: translateY(-2px);
        }

        /* প্রশ্নের টেক্সট */
        .modecontrol {
            color: #f1f5f9 !important;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* অপশন কার্ড */
        .option-card {
            background-color: #1e2937 !important;
            border: 2px solid #475569;
            color: #e2e8f0;
            font-size: 1.05rem;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #6366f1;
            background-color: #28344d !important;
            transform: translateX(4px);
        }

        /* সঠিক-ভুল উত্তর */
        .correct {
            background-color: #14532d !important;
            border-color: #4ade80 !important;
            color: #a1e4b8 !important;
        }

        .wrong {
            background-color: #7f1d1d !important;
            border-color: #f87171 !important;
            color: #fda4af !important;
        }

        /* হেডার */
        h1 {
            color: #a5b4fc !important;
            text-shadow: 0 2px 10px rgba(129, 140, 248, 0.3);
        }

        /* মেসেজ */
        #quiz-container .text-green-600 {
            color: #4ade80 !important;
        }

        #quiz-container .text-red-600 {
            color: #f87171 !important;
        }

        .mcqoption {
            cursor: pointer;
        }

        .border-gray-100 {
            border-color: rgb(42 91 189) !important;
        }
    </style>
</head>

<body class="bg-[#0a0f1c] text-slate-200 py-12 font-sans dark min-h-screen">

    <div class="max-w-3xl mx-auto px-4">
        <div class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-bold text-center text-indigo-400 tracking-tight">
                MCQ প্র্যাকটিস
            </h1>
            <p class="text-slate-400 mt-2 text-lg">রবীন্দ্রনাথের 'সোনার তরী' কবিতা</p>
        </div>

        <div id="quiz-container" class="space-y-8"></div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        document.documentElement.classList.add('dark');
        tailwind.config = {
            darkMode: 'class',
            content: [],
        }
        const rawText = `
১। সাহিত্যকর্মের পাশাপাশি অনন্য চিত্রশিল্পী হিসেবে ও প্রতিভার স্বাক্ষর রেখেছেন কে?
(ক) মাইকেল মধুসূদন দত্ত (খ) বঙ্কিমচন্দ্র চট্টোপাধ্যায়
(গ) রবীন্দ্রনাথ ঠাকুর (ঘ) শরৎচন্দ্র চট্টোপাধ্যায়
উত্তর: (গ) রবীন্দ্রনাথ ঠাকুর

২। ‘বিশ্বভারতী’ কে প্রতিষ্ঠা করেন?
(ক) শরৎচন্দ্র চট্টোপাধ্যায়ের (খ) রবীন্দ্রনাথ ঠাকুরের
(গ) বঙ্কিমচন্দ্র চট্টোপাধ্যায়ের (ঘ) কাজী নজরুল ইসলামের
উত্তর: (খ) রবীন্দ্রনাথ ঠাকুরের

৩। রবীন্দ্রনাথ ঠাকুরের প্রকাশিত প্রথম কাব্যগ্রন্থের নাম কী?
(ক) বনফুল (খ) চিত্রা
(গ) মানসী (ঘ) সোনার তরী
উত্তর: (ক) বনফুল

৪। রবীন্দ্রনাথ ঠাকুর কত সালে নোবেল পুরস্কার লাভ করেন?
(ক) ১৯১৩ সালে (খ) ১৯১৪ সালে
(গ) ১৯১৫ সালে (ঘ) ১৯১৬ সালে
উত্তর: (ক) ১৯১৩ সালে

৫। ‘কূলে একা বসে আছি, নাহি ভরসা’ বলতে কবি কী বুঝিয়েছেন?
(ক) অনিশ্চয়তা (খ) অপ্রাপ্তিবোধ
(গ) হতাশা (ঘ) আশঙ্কা
উত্তর: (ক) অনিশ্চয়তা

৬। কৃষক ভরসা না পাওয়ার কারণ কী?
(ক) গ্রামীণ পরিবেশ (খ) খরস্রোতা নদী
(গ) বর্ষার দুর্যোগ (ঘ) ফসল তোলার তাড়া
উত্তর: (গ) বর্ষার দুর্যোগ

৭। ‘সোনার তরী’ কবিতায় ‘ভরা ভরা’ শব্দগুচ্ছ কী বোঝাতে ব্যবহৃত হয়েছে?
(ক) পূর্ণতা বোঝাতে (খ) বিপুলতা বোঝাতে
(গ) প্রয়োজনীয়তা বোঝাতে (ঘ) স্বল্পতা বোঝাতে
উত্তর: (খ) বিপুলতা বোঝাতে

৮। ধান কাটা শেষ হওয়ার মধ্যদিয়ে কবিতাটিতে কী প্রকাশ পেয়েছে?
(ক) কর্মের পরিণতি (খ) কর্মময় জীবন
(গ) ফসলের কাজ সম্পন্ন হওয়া (ঘ) ফসল তোলার তাড়া
উত্তর: (ক) কর্মের পরিণতি

৯। পরপারের গ্রামখানি কীরূপ?
(ক) আঁকা ছবির মতো (খ) অস্পষ্ট ও অপূর্ব
(গ) ধোঁয়াশার মতো (ঘ) কালো ও বিবর্ণ
উত্তর: (ঘ) কালো ও বিবর্ণ

১০। ‘আমি একেলা’ কথাটির মধ্য দিয়ে মূলত কোন দিকটি উন্মোচিত হয়েছে?
(ক) পৃথিবীতে মানুষ একা (খ) কৃষকের একা থাকা
(গ) শিল্পস্রষ্টার অপূর্ণতা (ঘ) মহাকালের নিঃসঙ্গতা
উত্তর: (গ) শিল্পস্রষ্টার অপূর্ণতা

১১। ‘সোনার তরী’ কবিতায় কে ভরা পালে চলে যায়?
(ক) কৃষক (খ) কবি
(গ) মাঝি (ঘ) তরী
উত্তর: (গ) মাঝি

১২। ‘সোনার তরী’ কবিতায় কোন ঋতুর প্রভাব লক্ষ করা যায়?
(ক) গ্রীষ্ম (খ) বর্ষা
(গ) শরৎ (ঘ) হেমন্ত
উত্তর: (খ) বর্ষা

১৩। বৈরী পরিবেশে গান গাইতে মাঝির এগিয়ে আসা তার কোন বৈশিষ্ট্য নির্দেশ করে?
(ক) শান্ত রূপ (খ) সংগীত প্রেম
(গ) আনন্দিত আগমন (ঘ) নির্মোহ মনোভাব
উত্তর: (ঘ) নির্মোহ মনোভাব

১৪। ‘ঢেউগুলো নিরুপায়’ কথাটির মধ্যে দিয়ে মূলত কোন বিষয়টি বোঝানো হয়েছে?
(ক) খরস্রোতা নদীর উন্মত্ততা (খ) বর্ষা প্রকৃতির রুদ্র রূপ
(গ) শিল্পস্রষ্টার অপূর্ণতা (ঘ) কাল আপন গতিতে বহমান
উত্তর: (ঘ) কাল আপন গতিতে বহমান

১৫। ‘বারেক ভিড়াও তরী কূলেতে এসে’ চরণে কৃষকের কীরূপ আবেদন প্রকাশিত হয়েছে?
(ক) নির্দেশ (খ) অনুনয়
(গ) নিবেদন (ঘ) আদেশ
উত্তর: (খ) অনুনয়

১৬। কৃষককে দেখে সোনার তরীর মাঝির কেমন অনুভূতি হয়?
(ক) কৌতূহলী হয় (খ) নির্বিকার থাকে
(গ) বিরক্ত হয় (ঘ) আনন্দিত হয়
উত্তর: (খ) নির্বিকার থাকে

১৭। মাঝির কোনো দিকে না তাকানোর অন্তর্নিহিত কারণ কী?
(ক) মহাকাল আপন গতিতে চলে
(খ) মানবজীবন মাঝির মতোই নির্মোহ
(গ) মহাকাল কৃষকের প্রতি অনাগ্রহী
(ঘ) প্রকৃতি-পরিবেশ মহাকালকে প্রভাবিত করে না
উত্তর: (ক) মহাকাল আপন গতিতে চলে

১৮। ধান কাটার পর কৃষকের মনে কীসের উদয় হয়?
(ক) আশঙ্কার (খ) আনন্দের
(গ) বেদনার (ঘ) অহংকারের
উত্তর: (ক) আশঙ্কার

১৯। নৌকার মাঝিকে দেখে প্রথমটায় কৃষকের কী ধারণা হয়?
(ক) পরিচিত (খ) পূর্ব পরিচিত
(গ) অপরিচিত (ঘ) সাহায্যকারী
উত্তর: (খ) পূর্ব পরিচিত

২০। হিংস্র নদীর স্রোত কোথায় খেলা করছিল?
(ক) নৌকার পাশে (খ) ক্ষেতের চারিদিকে
(গ) ক্ষেতের পাশে (ঘ) নৌকার চারিদিকে
উত্তর: (খ) ক্ষেতের চারিদিকে

২১। ‘সোনার তরী’ কবিতায় কৃষকের ভরসা নেই কেন?
(ক) কাজে ফাঁকি দিয়েছে বলে (খ) কর্মস্পৃহা নেই বলে
(গ) অনিশ্চিত পরিণতির কথা ভেবে (ঘ) আকাশে মেঘ ডাকছে বলে
উত্তর: (গ) অনিশ্চিত পরিণতির কথা ভেবে

২২। জলকে ‘বাঁকা’ বলে অভিহিত করার কারণ কী?
(ক) প্রতিকূল পরিস্থিতি (খ) স্রোতের খরতা
(গ) নদীর পরিস্থিতি (ঘ) জলের প্রবহমানতা
উত্তর: (ক) প্রতিকূল পরিস্থিতি

২৩। মাঝিকে কোথায় তরী ভেড়ানোর কথা বলা হয়েছে?
(ক) ধানক্ষেতে (খ) নদীকূলে
(গ) পরপারে (ঘ) দূরবর্তী গ্রামে
উত্তর: (খ) নদীকূলে

২৪। ‘গান গেয়ে তরী বেয়ে কে আসে পারে।’— প্রকৃতপক্ষে উক্তিটিতে কাকে ইঙ্গিত করা হয়েছে?
(ক) মৃত্যুদূত (খ) মহাকাল
(গ) নিষ্ঠুর সময় (ঘ) অপরিচিত মাঝি
উত্তর: (খ) মহাকাল

২৫। ‘সকলি দিলাম তুলে’ চরণটিতে কৃষকের কেমন মনোভাব প্রকাশিত হয়েছে?
(ক) স্থান না পাওয়ার আক্ষেপ (খ) একা পড়ে থাকার হতাশা
(গ) আন্তরিক নিবেদন (ঘ) অসহায় আত্মসমর্পণ
উত্তর: (ঘ) অসহায় আত্মসমর্পণ

২৬। রোমেলের দাদুর বয়স একশ পার হয়ে গেলেও বেঁচে থাকার তীব্র বাসনা তাঁর। রোমেলের দাদুর এই বাসনা প্রতিধ্বনিত হয়েছে ‘সোনার তরী’র কোন্ পঙক্তিতে?
(ক) যত চাও তত লও তরণী- পরে
(খ) এখন আমারে লহো করুণা করে
(গ) ওগো, তুমি কোথা যাও কোন্ বিদেশে?
(ঘ) শুধু তুমি নিয়ে যাও/ক্ষণিক হেসে
উত্তর: (খ) এখন আমারে লহো করুণা করে

২৭। মাঝির তরীতে কৃষক স্থান পেল না কেন?
(ক) তরীটি ছোটো ছিল বলে (খ) মাঝির মনে ধরেনি বলে
(গ) ধানে তরী পূর্ণ বলে (ঘ) সময় ছিল না বলে
উত্তর: (গ) ধানে তরী পূর্ণ বলে

২৮। ‘শূন্য নদীর তীরে/ রহিনু পড়ি’— বলতে কবি কী বোঝাতে চেয়েছেন?
(ক) মৃত্যুর অনিবার্যতা (খ) কালের প্রবহমানতা
(গ) কৃষকের অসহায়তা (ঘ) অপ্রাপ্তির বেদনা
উত্তর: (ক) মৃত্যুর অনিবার্যতা

২৯। ‘আমরা সকল নিয়ে বসে আছি সর্বনাশের আশায়’— উদ্ধৃতাংশের সাথে মিল রয়েছে ‘সোনার তরী’ কবিতার কোন চরণে?
(ক) কূলে একা বসে আছি, নাহি ভরসা।
(খ) এতকাল নদীকূলে/যাহা লয়ে ছিনু ভুলে
(গ) এখন আমারে লহো করুণা করে
(ঘ) শূন্য নদীর তীরে/রহিনু পড়ি-
উত্তর: (ক) কূলে একা বসে আছি, নাহি ভরসা।

৩০। ‘ব্যক্তিজীবন অসার’— এ বোধ কবিতার কোন চরণের মধ্য দিয়ে প্রকাশিত হয়েছে?
(ক) শুধু তুমি নিয়ে যাও/ক্ষণিক হেসে
(খ) সকলি দিলাম তুলে/ধরে বিধরে
(গ) শূন্য নদীর তীরে/রহিনু পড়ি
(ঘ) এপারেতে ছোটো ক্ষেত, আমি একেলা
উত্তর: (গ) শূন্য নদীর তীরে/রহিনু পড়ি

৩১। ‘সোনার তরী’ কবিতাটিতে নিঃসঙ্গ কৃষক বলতে মূলত কাকে বোঝানো হয়েছে?
(ক) কবিকে (খ) শিল্পীকে
(গ) অভিনেতাকে (ঘ) গায়ককে
উত্তর: (ক) কবিকে

৩২। বর্ষার চিত্রের আড়ালে ‘সোনার তরী’ কবিতায় কোন চিত্র ফুটে উঠেছে?
(ক) মানবমুক্তির চিত্র (খ) মানুষের কর্মময়তার চিত্র
(গ) মানবজীবনের দার্শনিকতা (ঘ) মানবমৃত্যুর অনিবার্যতা
উত্তর: (গ) মানবজীবনের দার্শনিকতা

৩৩। ‘সোনার তরী’ কবিতায় গঠনগত বৈশিষ্ট্যের মিল রয়েছে নিচের কোন্টির সাথে?
(ক) সংকেতধর্মিতা (খ) রূপকধর্মিতা
(গ) বাস্তবধর্মিতা (ঘ) গীতিধর্মিতা
উত্তর: (খ) রূপকধর্মিতা

৩৪। সৃষ্টিকর্মকে সোনার ফসল বলা হয়েছে কেন?
(ক) সৃষ্টিকর্ম উৎকৃষ্ট বলে (খ) সৃষ্টিকর্ম শ্রমের ফল বলে
(গ) সৃষ্টিকর্ম বিখ্যাত বলে (ঘ) সৃষ্টিকর্ম অবিনশ্বর বলে
উত্তর: (ঘ) সৃষ্টিকর্ম অবিনশ্বর বলে

৩৫। শিল্পাচার্য জয়নুল বেঁচে নেই। কিন্তু তাঁর ছবি এখনো মানুষকে প্রেরণা দেয়। জয়নুলের ছবি ‘সোনার তরী’ কবিতার কোন দিককে উন্মোচন করে?
(ক) ফসলের গুরুত্ব (খ) মাঝির নির্বিকারত্ব
(গ) কর্মফলের গুরুত্ব (ঘ) সাংসারিক চেতনা
উত্তর: (গ) কর্মফলের গুরুত্ব

৩৬। সবুজ মিয়া একজন কাঠমিস্ত্রি। তার তৈরি আসবাব ক্রেতারা বহুমূল্যে ক্রয় করলেও তাকে কেউ মূল্যায়ন করে না। ক্রেতাদের মানসিকতা ‘সোনার তরী’ কবিতার কোন বিষয়কে ইঙ্গিত করে?
(ক) প্রতিকূল পরিবেশে কৃষকের দুরবস্থা
(খ) জাগতিক বিষয়ে মাঝির নির্বিকারত্ব
(গ) ব্যক্তি মানুষের মৃত্যুর অনিবার্যতা
(ঘ) কৃষকের প্রতি মহাকালের অনাগ্রহ
উত্তর: (ঘ) কৃষকের প্রতি মহাকালের অনাগ্রহ

৩৭। ‘সোনার তরী’ কবিতায় বর্ণিত নদীটির স্রোত—
i. বর্ষার মতো ধারালো
ii. ক্ষুরের মতো ধারালো
iii. বিদ্যুতের মতো ক্ষিপ্র
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৩৮। ‘সোনার তরী’ কবিতায় বর্ণিত ধানক্ষেতটি—

ii. আকারে ছোটো
iii. নদীর স্রোতে বিলীয়মান
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৩৯। ‘সোনার তরী’ কবিতায় মাঝি—
i. ভরা পালে চলে যায়
ii. কৃষকের অনুনয়ে সাড়া দেয়
iii. গান গেয়ে তরী বায়
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৪০। কৃষক তাঁর সোনার ধান মাঝিকে দিলো—
i. সুবিন্যস্ত করে সাজিয়ে
ii. সম্পূর্ণরুপে
iii. আংশিক
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৪১। “ঠাঁই নাই, ঠাঁই নাই- ছোটো সে তরী।” উক্তিটির মাধ্যমে বোঝানো হয়েছে—
i. কৃষকের ফসলে তরীটি ছিল পরিপূর্ণ
ii. তরীতে ফসল ব্যতীত অন্য কিছুর জায়গা নেই
iii. মহাকাল ব্যক্তি মানুষকে গ্রহণ করে না
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪২। কবিতাটিতে মেঘের গর্জন ইঙ্গিত করে—
i. বৈরী আবহাওয়াকে
ii. কৃষকের বিপন্ন অবস্থাকে
iii. বর্ষার স্নিগ্ধ রূপটিকে
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৪৩। কবিতাটিতে পরপারের গ্রামটি নির্দেশ করে—
i. লোকালয়ের অস্তিত্ব
ii. গ্রামীণ পরিবেশকে
iii. মৃত্যুর ওপারের জগৎকে
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৪৪। নৌকার মাঝির কোনো দিকে না তাকানো নির্দেশ করে—
i. পারিপার্শ্বিক ঘটনা বিষয়ে সে নির্লিপ্ত
ii. কৃষকের বিপন্ন অবস্থাকে সে গুরুত্ব দেয়নি
iii. বস্তু জগতের ঘটনাক্রমে মহাকালকে ছুঁতে পারে না
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৫। যে উদ্ধৃতি বা উদ্ধৃতিগুচ্ছ বিপদের অবস্থাকে বোঝায়—
i. খরা নদী ক্ষুরধারা খরপরশা
ii. চারিদিকে বাঁকা জল করিছে খেলা
iii. এপারেতে ছোটো ক্ষেত, আমি একেলা
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

৪৬। ‘সোনার তরী’ কবিতায় ‘শূন্য নদীর তীর’ কীসের ইঙ্গিত বহন করে?
i. নিঃসঙ্গ বেদনাবোধের
ii. অনিবার্য আসন্ন বিনয়ের
iii. জনশূন্য পরিবেশের
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ক) i ও ii

৪৭। কবির শূন্য নদীর তীরে পড়ে থাকার কারণ—
i. সোনার তরী কবিকে স্থান দেয়নি
ii. সোনার তরী পরিপূর্ণ হয়ে যাওয়া
iii. মহাকাল শুধু কবির কর্মকে স্থান দেয়, ব্যক্তিকে নয়
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ৪৮ ও ৪৯ নং প্রশ্নের উত্তর দাও:
‘ব্রহ্মদর্শনে মৃত্যুই শেষ কথা নয়। মৃত ব্যক্তি পুনর্জন্মের মধ্যদিয়ে নতুন জীবন লাভ করে।’

৪৮। উদ্দীপকের বক্তব্যের সঙ্গে তোমার পঠিত কোন রচনার সাদৃশ্য পরিলক্ষিত হয়?
(ক) আমার পথ (খ) মানব-কল্যাণ
(গ) সোনার তরী (ঘ) তাহারেই পড়ে মনে
উত্তর: (গ) সোনার তরী

৪৯। উদ্দীপকের সঙ্গে ‘সোনার তরী’ কবিতার বৈপরীত্য রয়েছে—
i. বক্তব্য বিষয়ে
ii. মৃত্যুর স্বরূপ ভাবনায়
iii. দৃষ্টিকোণের দিক থেকে
নিচের কোন্টি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ৫০ ও ৫১ নং প্রশ্নের উত্তর দাও:
মানুষ ঠকিয়ে সম্পদের পাহাড় গড়েছেন নিঃসন্তান মোড়ল। তবুও তার মনে সুখ নেই। কেবলই ভাবেন, তিনি মারা গেলে এই সম্পদের কী হবে।

৫০। উদ্দীপকে ‘সোনার তরী’ কবিতায় কোন দিকটি ফুটে উঠেছে?
(ক) দর্শন চিন্তা (খ) মৃত্যু চিন্তা
(গ) দুর্যোগ চিন্তা (ঘ) কর্মফলের চিন্তা
উত্তর: (খ) মৃত্যু চিন্তা

৫১। উদ্দীপকের সঙ্গে ‘সোনার তরী’ কবিতার বৈসাদৃশ্য রয়েছে—
i. মৃত্যুর ভাবনায়
ii. অর্থ-সম্পদ চিন্তায়
iii. বিষয়বস্তুগত দিক থেকে
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

❖ উদ্দীপকের আলোকে ৫২ ও ৫৩ নং প্রশ্নের উত্তর দাও:
‘মানুষের মৃত্যু হলে তবুও মানব থেকে যায়; অতীতের থেকে উঠে আজকের মানুষের কাছে।’

৫২। উদ্দীপকের সঙ্গে ‘সোনার তরী’ কবিতার পার্থক্য কোথায়?
(ক) মৃত্যুর ভাবনায় (খ) বিষয়বস্তুতে
(গ) পারমার্থিক চিন্তায় (ঘ) মৃত্যুর অনিবার্যতায়
উত্তর: (ক) মৃত্যুর ভাবনায়

৫৩। উক্ত পার্থক্যের অন্তর্নিহিত কারণ—
i. বিষয়বস্তু
ii. কবিদ্বয়ের ভিন্ন দৃষ্টিকোণ
iii. উদ্দীপকের কবির আশাবাদ
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ৫৪ ও ৫৫ নং প্রশ্নের উত্তর দাও:
‘আর কত দূরে নিয়ে যাবে মোরে হে সুন্দরী
বলো কোন্ পার ভিড়িবে তোমার সোনার তরী।’

৫৪। উদ্দীপকটি ‘সোনার তরী’ কবিতার কোন ভাবকে প্রকাশ করে?
(ক) কৃষকের তরীতে পার হওয়ার আকাঙ্ক্ষা
(খ) পৃথিবীতে কৃষকের থেকে যাওয়া স্বপ্ন
(গ) কৃষকের না পাওয়ার বেদনা
(ঘ) মানবজীবনের অনিবার্যতা
উত্তর: (ক) কৃষকের তরীতে পার হওয়ার আকাঙ্ক্ষা

৫৫। উদ্দীপকটির ‘হে সুন্দরী’ এবং ‘সোনার তরী’ কবিতার মাঝি—
i. উভয়ই ত্রাণকর্তা
ii. উভয়ই চালিকা শক্তি
iii. উভয়ই পথ নির্দেশক
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (ঘ) i, ii ও iii

❖ উদ্দীপকের আলোকে ৫৬ ও ৫৭ নং প্রশ্নের উত্তর দাও:
জামিল সাহেব তাঁর সমস্ত সঞ্চয় দিয়ে নিজ গ্রামে দাতব্য চিকিৎসালয়সহ নানা সেবামূলক প্রতিষ্ঠান তৈরি করেন। প্রায় দুই যুগ আগে তিনি মারা গেলেও মানুষ তাঁর কৃতকর্মের দ্বারা আজ উপকৃত হচ্ছে।

৫৬। উদ্দীপকের জামিল সাহেবের কীর্তি ‘সোনার তরী’ কবিতার কিসের প্রতীক?
(ক) সোনার তরী (খ) অচেনা মাঝি
(গ) সোনার ধান (ঘ) খরস্রোতা নদী
উত্তর: (গ) সোনার ধান

৫৭। উদ্দীপকের মূলভাব প্রকাশক চরণ—
i. এখন আমারে লহো করুণা করে।
ii. সকলি দিলাম তুলে/ধরে বিধরে-
iii. আমারি সোনার ধানে গিয়েছে ভরি।
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (গ) ii ও iii

৫৮। ‘ঠাঁই’ শব্দের অর্থ হলো—
(ক) স্থান (খ) আশ্রয়
(গ) দাঁড়ানো (ঘ) কূল
উত্তর: (ক) স্থান

৫৯। ‘বর্ষা’ শব্দের রূপান্তরিত রূপ কোনটি?
(ক) বরষা (খ) বরশা
(গ) বর্শা (ঘ) বরসা
উত্তর: (ক) বরষা

৬০। ‘সোনার তরী’ কবিতায় ফসলের জমির চারদিকে বেষ্টিত জলরাশি কিসের প্রতীক?
(ক) কালস্রোতের (খ) নিঃসঙ্গতার
(গ) নির্বিকারত্বের (ঘ) অসহায়ত্বের
উত্তর: (ক) কালস্রোতের

৬১। ‘ক্ষুরধারা’ কবিতায় কী অর্থে ব্যবহৃত হয়েছে?
(ক) ক্ষুরের মতো ধারালো বর্শা (খ) ক্ষুরের মতো ধারালো অস্ত্র
(গ) ক্ষুরের মতো ধারালো নদী (ঘ) ক্ষুরের মতো ধারালো স্রোত
উত্তর: (ঘ) ক্ষুরের মতো ধারালো স্রোত

৬২। ‘ধারালো বর্শার মতো’ বোঝাতে কোন শব্দটি ব্যবহৃত হয়েছে?
(ক) ক্ষুরধারা (খ) প্রবাহ
(গ) খরপরশা (ঘ) ভরাভরা
উত্তর: (গ) খরপরশা

৬৩। ‘সোনার তরী’ কবিতাটিতে কোন্টির মাধ্যমে গাছপালার কালচে রহস্যময় অবস্থা বোঝানো হয়েছে?
(ক) পরপারে দেখি আঁকা (খ) তরুছায়ামসী-মাখা
(গ) চারিদিকে বাঁকা জল (ঘ) গ্রামখানি মেঘে ঢাকা
উত্তর: (খ) তরুছায়ামসী-মাখা

৬৪। ‘সোনার তরী’ কবিতাটি কবির কোন কাব্যগ্রন্থ থেকে নেওয়া হয়েছে?
(ক) চিত্রা (খ) বলাকা
(গ) সোনার তরী (ঘ) মানসী
উত্তর: (গ) সোনার তরী

৬৫। তরী বয়ে আসা মাঝিটিকে চেনা মনে হওয়ায় কৃষকের মনে কীরূপ ভাব উদয় হয়?
(ক) ভয়ে আতঙ্কিত হয় (খ) আশার আলো খুঁজে পায়
(গ) সন্দেহের দৃষ্টিতে দেখে (ঘ) আবেগে কান্না চলে আসে
উত্তর: (খ) আশার আলো খুঁজে পায়

৬৬। ‘সোনার তরী’ কবিতাটি কত মাত্রার মাত্রাবৃত্ত ছন্দে রচিত হয়েছে?
(ক) ৬ মাত্রার (খ) ৮ মাত্রার
(গ) ৫ মাত্রার (ঘ) ৪ মাত্রার
উত্তর: (খ) ৮ মাত্রার

৬৭। ‘সোনার তরী’ কবিতাটি অপূর্ণ পর্ব কয় মাত্রার?
(ক) ৮ মাত্রার (খ) ৭ মাত্রার
(গ) ৬ মাত্রার (ঘ) ৫ মাত্রার
উত্তর: (ঘ) ৫ মাত্রার

৬৮। ‘চারিদিকে বাঁকা জল করিছে খেলা’। পঙক্তিটিতে প্রকাশ পেয়েছে—
i. কালের গর্ভে সবকিছু হারানোর শঙ্কা
ii. বর্ষার পল্লিপ্রকৃতির মোহনীয় রূপ
iii. কৃষকূপী কবির অসহায়ত্ব
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৬৯। ‘সোনার তরী’ কবিতা পড়ে বলা যায়—
i. কীর্তিমানের মৃত্যু নাই
ii. জন্মিলে মরিতে হবে
iii. জন্ম হোক যথা তথা কর্ম হোক ভালো
নিচের কোনটি সঠিক?
(ক) i ও ii (খ) i ও iii
(গ) ii ও iii (ঘ) i, ii ও iii
উত্তর: (খ) i ও iii

৭০। ‘সোনার তরী’ কবিতায় ‘বাঁকা জল’ বলতে প্রতীকী অর্থে কী বোঝানো হয়েছে?
(ক) কবির ব্যক্তিসত্তা (খ) মহাকাল
(গ) কালস্রোত (ঘ) কবির সৃষ্টিকর্ম
উত্তর: (গ) কালস্রোত

৭১। ‘রাশি রাশি ভাড়া ভাড়া’- শব্দের এরূপ ব্যবহারকে কী বলে?
(ক) পুনরুক্তি (খ) ক্রিয়া বিশেষণ
(গ) অলংকার (ঘ) নির্ধারক বিশেষণ
উত্তর: (ঘ) নির্ধারক বিশেষণ

৭২। ‘কর্মীর চেয়ে কর্ম অধিক প্রত্যাশিত’ এটি কোন কবিতার ভাবার্থ?
(ক) জীবন-বন্দনা (খ) বড়দাশা
(গ) সোনার তরী (ঘ) কবর
উত্তর: (গ) সোনার তরী

৭৩। রবীন্দ্রনাথের সোনার তরীতে মূলত ব্যক্ত হয়েছে—
(ক) বর্ষার চিত্র (খ) কবির বেদনা
(গ) মেঘের গর্জন (ঘ) কবির আনন্দ
উত্তর: (খ) কবির বেদনা

৭৪। ‘কাটিতে কাটিতে ধান এল বরষা।’— এখানে ‘কাটিতে কাটিতে’ কোন অর্থে ব্যবহৃত দ্বিরুক্ত শব্দ?
(ক) নিরন্তরতা (খ) বিলম্ব
(গ) সমাপ্তি (ঘ) সম্ভাবনা
উত্তর: (ক) নিরন্তরতা

৭৫। ‘তরুছায়ামসী মাখা’ কোন রঙের প্রসঙ্গ?
(ক) মেটে (খ) সবুজ
(গ) ধূসর (ঘ) কালচে
উত্তর: (ঘ) কালচে

৭৬। ‘শ্রাবণগগন ঘিরে’ এর পরের চরণ কোনটি?
(ক) শূন্য নদীর তীরে (খ) ঘন মেঘ ঘুরে ফিরে
(গ) ধরে বিধরে (ঘ) যত চাও তত লও তরণী পরে
উত্তর: (খ) ঘন মেঘ ঘুরে ফিরে

৭৭। ‘সোনার তরী’ কবিতার পঙক্তি সংখ্যা—
(ক) ৪০ (খ) ৪২
(গ) ৪৬ (ঘ) ৪৮
উত্তর: (খ) ৪২

৭৮। ‘খরপরশা’ শব্দের আভিধানিক অর্থ—
(ক) খরস্রোত (খ) তীব্র গতি
(গ) ধারালো বর্শা (ঘ) তীক্ষ্ণ তীর
উত্তর: (গ) ধারালো বর্শা

৭৯। রবীন্দ্রনাথ ঠাকুর তাঁর ‘সোনার তরী’ কবিতাটি যে স্থানে বসে নাম-
(ক) শান্তিনিকেতন (খ) জোড়াসাঁকো
(গ) শিলাইদহ (ঘ) খুলনা
উত্তর: (গ) শিলাইদহ

৮০। ‘যত চাও তত লও’ বাক্যটি কী জাতীয় বাক্যের উদাহরণ?
(ক) নির্ধারক বিশেষণ (খ) ব্যতিহার
(গ) ক্রিয়া বিশেষণ (ঘ) সাপেক্ষ সর্বনাম
উত্তর: (ঘ) সাপেক্ষ সর্বনাম

৮১। ‘শূন্য নদীর তীরে রহিনু পড়ি’— এখানে যে ভাবটি প্রকাশ পেয়েছে—
(ক) ভয় (খ) উল্লাস
(গ) বিরক্তি (ঘ) অপূর্ণতার বেদনা
উত্তর: (ঘ) অপূর্ণতার বেদনা

৮২। ‘সোনার তরী’ কবিতায় গ্রামখানি মেঘে ঢাকা ছিল কখন?
(ক) সন্ধ্যাবেলা (খ) প্রভাতবেলা
(গ) অপরাহ্নবেলা (ঘ) দুপুরবেলা
উত্তর: (খ) প্রভাতবেলা

৮৩। ‘সোনার তরী’ কবিতার মূল ভাববস্তুগত বিষয় কী?
(ক) নদী ও নৌকা (খ) কৃষক ও ধান
(গ) প্রকৃতি ও জীবন (ঘ) মহাকাল ও মানুষ
উত্তর: (ঘ) মহাকাল ও মানুষ

৮৪। ‘সোনার তরী’ কাব্যে প্রকাশ পেয়েছে—
(ক) ভক্তিবাদ (খ) মরমীবাদ
(গ) ভাববাদ (ঘ) সাম্যবাদ
উত্তর: (গ) ভাববাদ

৮৫। ‘সোনার তরী’ কবিতায় কয়টি চরিত্র পাওয়া যায়?
(ক) ২ টি (খ) ৩ টি
(গ) ১ টি (ঘ) ৪ টি
উত্তর: (ক) ২ টি

৮৬। “ওগো তুমি কোথা যাও কোন্ বিদেশে?” কাকে উদ্দেশ্য করে বলা হয়েছে?
(ক) ছায়াকে (খ) মাঝিকে
(গ) কবিকে (ঘ) কাউকে নয়
উত্তর: (খ) মাঝিকে

৮৭। ‘শেষের কবিতা’ উপন্যাস হলে ‘শেষ লেখা’ কী?
(ক) উপন্যাস (খ) ছোটগল্প
(গ) কাব্যগ্রন্থ (ঘ) নাটক
উত্তর: (গ) কাব্যগ্রন্থ

৮৮। কবি ‘ছোটো খেত’ বলতে কী বোঝাতে চেয়েছেন?
(ক) আয়তনে ছোটো খেত (খ) নদীর ছোটো চর
(গ) মানুষের জীবনপরিধি (ঘ) অজানার দেশ
উত্তর: (গ) মানুষের জীবনপরিধি

৮৯। বাঁকা জল খেলা করার মধ্যে দিয়ে নদীর জলের কোন দিকটি উন্মোচিত হয়েছে?
(ক) শান্তরূপ (খ) প্রবহমানতা
(গ) হিংস্রতা (ঘ) উদ্দামতা
উত্তর: (ঘ) উদ্দামতা

৯০। ‘সোনার তরী’ কবিতায় কৃষকের ভরসা নেই কেন?
(ক) কাজে ফাঁকি দিয়েছে বলে (খ) কর্মস্পৃহা নেই বলে
(গ) অনিশ্চিত পরিণতির কথা ভেবে (ঘ) আকাশে মেঘ ডাকছে বলে
উত্তর: (গ) অনিশ্চিত পরিণতির কথা ভেবে

৯১। কৃষকের নির্বিকার মাঝির দৃষ্টি আকর্ষণের চেষ্টা করেন কোন চরণটির মাধ্যমে?
(ক) এখন আমারে লহো করুণা করে
(খ) একখানি ছোটো খেত, আমি একেলা-
(গ) কূলে একা বসে আছি, নাহি ভরসা
(ঘ) ওগো, তুমি কোথা যাও কোন বিদেশে?
উত্তর: (ঘ) ওগো, তুমি কোথা যাও কোন বিদেশে?

৯২। ‘পরপারে’ রূপকের মধ্যে দিয়ে কবিতাটিতে মূলত কী বোঝানো হয়েছে?
(ক) মৃত্যুপরবর্তী জগৎ (খ) ওপারের গ্রাম
(গ) কল্পনার জগৎ (ঘ) দূরবর্তী গ্রাম
উত্তর: (ক) মৃত্যুপরবর্তী জগৎ

৯৩। “শূন্য নদীর তীরে/রহিনু পড়ি।”— কথাটি দিয়ে কী বোঝানো হয়েছে?
(ক) মৃত্যুর অনিবার্যতা (খ) কালের প্রবহমানতা
(গ) কৃষকের অসহায়তা (ঘ) অপ্রাপ্তির বেদনা
উত্তর: (ক) মৃত্যুর অনিবার্যতা

৯৪। ‘যাহা লয়ে ছিনু ভুলে’— এ কথাটির মধ্যে কী প্রচ্ছন্ন রয়েছে?
(ক) আক্ষেপ (খ) অনুশোচনা
(গ) আত্মসমালোচনা (ঘ) আত্মানুসন্ধান
উত্তর: (ঘ) আত্মানুসন্ধান

৯৫। ‘সোনার তরী’ কবিতাটি কীসের স্মারক?
(ক) প্রেম ও প্রণয়ের স্মারক (খ) গূঢ় রহস্য ও শ্রেষ্ঠত্বের স্মারক
(গ) নাগরিকতা ও দ্রোহের স্মারক (ঘ) জীবন ও যৌবনের স্মারক
উত্তর: (খ) গূঢ় রহস্য ও শ্রেষ্ঠত্বের স্মারক

৯৬। ‘সোনার তরী’ কবিতাটির নামকরণে কবি কোনটিকে গুরুত্ব দিয়েছেন?
(ক) চরিত্র চিত্রণকে (খ) ভাষার তীক্ষ্ণতাকে
(গ) রূপক অর্থকে (ঘ) সাধারণ অর্থকে
উত্তর: (গ) রূপক অর্থকে
        `;

        function parseData(text) {
            // উত্তর: (ক) এর পর নতুন প্রশ্ন শুরু হওয়ার লজিক
            const parts = text.trim().split(/(?=উত্তর:\s*\([ক-ঘ]\))/);
            const formattedQuestions = [];
            let currentStimulus = "";

            for (let i = 0; i < parts.length - 1; i++) {
                let questionSection = parts[i].trim();
                let answerSection = parts[i + 1].trim();

                // যদি আগের লুপ থেকে কোনো উদ্দীপক থাকে সেটা যোগ করা
                if (i === 0 && questionSection.includes("উদ্দীপক")) {
                    // প্রথম উদ্দীপক হ্যান্ডেল করা
                }

                // সঠিক উত্তর বের করা
                const ansMatch = answerSection.match(/উত্তর:\s*\(([ক-ঘ])\)/);
                const correctAnswer = ansMatch ? ansMatch[1] : "";

                // অপশনগুলো বের করা (রেগুলার এক্সপ্রেশন দিয়ে প্রত্যেকটি ব্র্যাকেট আলাদা করা)
                const options = {};
                ['ক', 'খ', 'গ', 'ঘ'].forEach(sym => {
                    const reg = new RegExp(`\\(${sym}\\)\\s*([^(\\n]+)`);
                    const match = questionSection.match(reg);
                    options[sym] = match ? match[1].trim() : "অপশন পাওয়া যায়নি";
                });

                // প্রশ্ন থেকে অপশনগুলো এবং উত্তর ক্লিনার করা যাতে শুধু উদ্দীপক/প্রশ্ন থাকে
                let cleanQuestion = questionSection.split(/\(ক\)/)[0].trim();

                formattedQuestions.push({
                    question: cleanQuestion,
                    options: options,
                    answer: correctAnswer
                });

                // উত্তর সেকশন থেকে ব্যবহৃত উত্তরটুকু সরিয়ে ফেলা যাতে পরের প্রশ্নের টেক্সট পাওয়া যায়
                parts[i + 1] = answerSection.replace(/উত্তর:\s*\([ক-ঘ]\)[^\n]*/, "").trim();
            }
            return formattedQuestions;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const data = parseData(rawText);

            data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-2xl shadow-xl border border-slate-700 modecontrol";

                card.innerHTML = `
                    <div class="text-gray-800 text-lg mb-5 leading-relaxed font-medium modecontrol">
                        ${item.question.replace(/\n/g, '<br>')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="box-${idx}">
                        ${Object.entries(item.options).map(([key, val]) => `
                            <div onclick="verify('${key}', '${item.answer}', ${idx}, this)" 
                                 class="option-card p-4 rounded-lg border-gray-100 bg-gray-50 hover:border-indigo-300 mcqoption">
                                <span class="font-bold text-indigo-600">(${key})</span> ${val}
                            </div>
                        `).join('')}
                    </div>
                    <div id="msg-${idx}" class="mt-4 text-sm font-bold hidden"></div>
                `;
                container.appendChild(card);
            });
        }

        window.verify = function (selected, correct, id, el) {
            const box = document.getElementById(`box-${id}`);
            const msg = document.getElementById(`msg-${id}`);
            const allOptions = box.querySelectorAll('.option-card');

            if (selected === correct) {
                el.classList.add('correct');
                msg.innerText = "✓ সঠিক উত্তর হয়েছে!";
                msg.className = "mt-4 text-green-600 font-bold";
            } else {
                el.classList.add('wrong');
                allOptions.forEach(opt => {
                    if (opt.innerText.trim().startsWith(`(${correct})`)) {
                        opt.classList.add('correct');
                    }
                });
                msg.innerText = "✕ ভুল উত্তর। সঠিক উত্তর হলো: (" + correct + ")";
                msg.className = "mt-4 text-red-600 font-bold";
            }

            msg.classList.remove('hidden');
            box.classList.add('pointer-events-none');
        };

        renderQuiz();
    </script>
</body>
